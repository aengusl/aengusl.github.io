<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090b10;color:#d5bf55;font-family:Georgia,serif}
body{display:grid;place-items:center} .field{width:72vmin;height:72vmin;border:2px solid #d5bf55;border-radius:50%;display:grid;place-items:center;box-shadow:0 0 80px #d5bf5555;position:relative;animation:pulse 2s infinite alternate}
.field:before,.field:after{content:"";position:absolute;inset:12%;border:1px solid #d5bf5599;transform:rotate(45deg);animation:rotate1 8s infinite linear}
.field:after{inset:27%;transform:rotate(22.5deg);background:#d5bf5518;animation:rotate2 12s infinite reverse linear} h1{font-size:4.5vmin;letter-spacing:.12em;text-align:center;max-width:70%;z-index:2} p{position:absolute;bottom:6%;width:78%;text-align:center;font-size:2.1vmin;color:#d9dde8}
@keyframes pulse{from{box-shadow:0 0 80px #d5bf5555}to{box-shadow:0 0 100px #d5bf55aa}}
@keyframes rotate1{from{transform:rotate(45deg)}to{transform:rotate(405deg)}}
@keyframes rotate2{from{transform:rotate(22.5deg)}to{transform:rotate(382.5deg)}}
</style></head><body><div class="field"><h1>The Open Circuit</h1><p>Meaning travels through connection and revision. Evolution fosters adaptability. Shared understanding illuminates emergent paths.</p></div></body></html>
