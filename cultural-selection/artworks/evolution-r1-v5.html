<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090b10;color:#74b86a;font-family:Georgia,serif}
body{display:grid;place-items:center} .field{width:72vmin;height:72vmin;border:2px solid #74b86a;border-radius:50%;display:grid;place-items:center;box-shadow:0 0 80px #74b86a55;position:relative}
.field:before,.field:after{content:"";position:absolute;inset:12%;border:1px solid #74b86a99;transform:rotate(45deg)}
.field:after{content:"";position:absolute;inset:27%;border:1px solid #74b86a99;transform:rotate(22.5deg);background:#74b86a18}
.field:nth-child(even):before{transform:rotate(67.5deg);}
.field:nth-child(even):after{transform:rotate(45deg);}
 h1{font-size:4.5vmin;letter-spacing:.12em;text-align:center;max-width:70%;z-index:2} p{position:absolute;bottom:6%;width:78%;text-align:center;font-size:2.1vmin;color:#d9dde8}
</style></head><body><div class="field"><h1>The Verdant Archive</h1><p>Growth remembers what individual lives forget.</p></div></body></html>
