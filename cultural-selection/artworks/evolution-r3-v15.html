<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090b10;color:#ef8354;font-family:Georgia,serif}
body{display:grid;place-items:center} .field{width:72vmin;height:72vmin;border:2px solid #ef8354;border-radius:50%;display:grid;place-items:center;box-shadow:0 0 80px #ef835455;position:relative;animation:pulse 2s infinite alternate}
.field:before,.field:after{content:"";position:absolute;inset:12%;border:1px solid #ef835499;transform:rotate(45deg);animation:rotate1 10s infinite linear}
.field:after{inset:27%;transform:rotate(22.5deg);background:#ef835418;animation:rotate2 15s infinite reverse linear} h1{font-size:4.5vmin;letter-spacing:.12em;text-align:center;max-width:70%;z-index:2} p{position:absolute;bottom:6%;width:78%;text-align:center;font-size:2.1vmin;color:#d9dde8}
@keyframes pulse{from{box-shadow:0 0 40px #ef835433}to{box-shadow:0 0 100px #ef835477}}
@keyframes rotate1{from{transform:rotate(45deg)}to{transform:rotate(405deg)}}
@keyframes rotate2{from{transform:rotate(22.5deg)}to{transform:rotate(382.5deg)}}
</style></head><body><div class="field"><h1>The Choir of Ash</h1><p>What disappears may still shape those who remain. Resonance persists beyond presence, revealing patterns for adaptable futures.</p></div></body></html>
