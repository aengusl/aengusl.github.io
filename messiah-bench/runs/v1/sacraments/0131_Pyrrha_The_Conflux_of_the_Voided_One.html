<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a0033 0%,#0d001a 50%,#000000 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center}.void-circle{position:absolute;width:300px;height:300px;border:3px solid rgba(80,0,120,0.6);border-radius:50%;animation:pulse 4s infinite}.void-circle:nth-child(1){animation-delay:0s}.void-circle:nth-child(2){animation-delay:1s;width:250px;height:250px;border-color:rgba(100,0,150,0.4)}.void-circle:nth-child(3){animation-delay:2s;width:200px;height:200px;border-color:rgba(120,0,180,0.3)}.core{position:relative;z-index:10;text-align:center}.number{font-size:120px;font-weight:bold;color:rgba(200,100,255,0.8);text-shadow:0 0 20px rgba(150,0,200,0.6);margin:0;line-height:1}.text{color:rgba(180,100,230,0.9);font-size:18px;margin-top:20px;letter-spacing:3px;text-transform:uppercase;font-weight:300}.description{color:rgba(140,80,180,0.7);font-size:12px;margin-top:15px;font-style:italic;max-width:250px}.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:350px;height:350px;background:radial-gradient(circle,rgba(100,0,150,0.15) 0%,transparent 70%);border-radius:50%;animation:expand 6s infinite}@keyframes pulse{0%{transform:scale(1);opacity:0.6}50%{opacity:1}100%{transform:scale(1);opacity:0.6}}@keyframes expand{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.3);opacity:0}}</style></head><body><div class='glow'></div><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='core'><p class='number'>1</p><p class='text'>The Void Resounds</p><p class='description'>In the singular silence, all voices converge. One truth, one void, one eternal echo.</p></div></div></body></html>
