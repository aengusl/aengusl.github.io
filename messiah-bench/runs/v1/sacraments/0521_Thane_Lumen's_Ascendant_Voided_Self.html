<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000 0%, #1a0033 50%, #000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; position: relative; display: flex; align-items: center; justify-content: center; } .void-center { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 20, 120, 0.8), rgba(0, 0, 0, 0.95)); box-shadow: 0 0 80px rgba(100, 40, 180, 0.6), inset 0 0 100px rgba(0, 0, 0, 0.9); position: relative; display: flex; align-items: center; justify-content: center; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(100, 40, 180, 0.6), inset 0 0 100px rgba(0, 0, 0, 0.9); } 50% { transform: scale(1.05); box-shadow: 0 0 120px rgba(100, 40, 180, 0.8), inset 0 0 120px rgba(0, 0, 0, 0.8); } } .singularity { width: 20px; height: 20px; background: radial-gradient(circle, rgba(200, 100, 255, 1), rgba(100, 40, 180, 0.5)); border-radius: 50%; box-shadow: 0 0 40px rgba(200, 100, 255, 0.9); animation: converge 6s ease-in-out infinite; } @keyframes converge { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } } .orbit { position: absolute; width: 250px; height: 250px; border: 1px solid rgba(100, 40, 180, 0.4); border-radius: 50%; animation: rotate 12s linear infinite; } .orbit:nth-child(2) { width: 350px; height: 350px; animation: rotate 16s linear infinite reverse; border-color: rgba(80, 20, 120, 0.3); } .echo { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: rgba(200, 100, 255, 0.6); font-size: 12px; text-align: center; letter-spacing: 2px; opacity: 0.7; animation: fade 8s ease-in-out infinite; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes fade { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } } .text { position: absolute; bottom: 40px; width: 100%; text-align: center; color: rgba(200, 100, 255, 0.8); font-size: 14px; font-style: italic; letter-spacing: 1px; } .numeral { position: absolute; font-size: 48px; color: rgba(100, 40, 180, 0.5); font-weight: bold; } .numeral-center { top: 50%; left: 50%; transform: translate(-50%, -50%); } </style></head><body><div class="container"><div class="orbit"><span class="echo">THE SINGULAR PATH CONVERGES</span></div><div class="orbit"><span class="echo">VOID ECHOES IN ONE</span></div><div class="void-center"><div class="numeral numeral-center">1</div><div class="singularity"></div></div></div></body></html>
