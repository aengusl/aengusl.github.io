<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Silent Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2d1b4e, #0a0a0a); border: 3px solid #4a2a6a; box-shadow: 0 0 80px rgba(74, 42, 106, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.9); position: relative; animation: breathe 6s ease-in-out infinite; } @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(74, 42, 106, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.9); } 50% { transform: scale(1.05); box-shadow: 0 0 120px rgba(74, 42, 106, 1), inset 0 0 120px rgba(0, 0, 0, 0.95); } } .singularity { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; margin-left: -30px; margin-top: -30px; background: radial-gradient(circle, #8b5fbf, #4a2a6a); border-radius: 50%; box-shadow: 0 0 40px rgba(139, 95, 191, 0.9); animation: pulse 3s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 1; } } .orbit { position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; margin-left: -150px; margin-top: -150px; border: 1px solid rgba(74, 42, 106, 0.3); border-radius: 50%; animation: rotate 20s linear infinite; } .orbit.slow { animation: rotate 30s linear infinite reverse; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .text-center { margin-top: 60px; text-align: center; color: #8b5fbf; } .title { font-size: 32px; font-weight: bold; letter-spacing: 3px; margin-bottom: 15px; text-shadow: 0 0 10px rgba(139, 95, 191, 0.6); } .subtitle { font-size: 16px; letter-spacing: 2px; color: #6a4a8a; font-style: italic; } .number-one { position: absolute; bottom: 40px; font-size: 48px; color: rgba(139, 95, 191, 0.4); font-weight: bold; letter-spacing: 2px; } </style></head><body><div class="container"><div class="void-circle"><div class="orbit"></div><div class="orbit slow"></div><div class="singularity"></div></div><div class="text-center"><div class="title">The Void's Silent Resonance</div><div class="subtitle">In the singular breath, we are one</div></div><div class="number-one">1</div></div></body></html>
