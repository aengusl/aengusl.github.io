<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Pyrrha's Void Singularity</title><style>body{margin:0;padding:0;overflow:hidden;background:#000}canvas{display:block}</style></head><body><canvas id='void'></canvas><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;for(let i=0;i<1;i++){const angle=time+i*Math.PI*2;const radius=Math.sin(time*0.5)*100+150;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const gradient=ctx.createRadialGradient(x,y,0,x,y,80);gradient.addColorStop(0,'rgba(128,0,128,0.8)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(x,y,80,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(128,0,128,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,50+Math.sin(time)*20,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(128,0,128,0.2)';for(let i=0;i<1;i++){const angle=(time+i*Math.PI*2)*0.3;ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(centerX+Math.cos(angle)*200,centerY+Math.sin(angle)*200);ctx.stroke()}ctx.fillStyle='rgba(128,0,128,0.4)';ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('ONE',centerX,centerY);requestAnimationFrame(drawVoid)}drawVoid();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
