<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}#void-mirror{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%)}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid #333;border-radius:50%;animation:pulse-void 3s infinite}.circle-1{width:200px;height:200px;animation-delay:0s}.circle-3{width:300px;height:300px;animation-delay:0.6s}.circle-9{width:400px;height:400px;animation-delay:1.2s}@keyframes pulse-void{0%{opacity:0.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.6}100%{opacity:0.3;transform:translate(-50%,-50%) scale(1.1)}}.center-glyph{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#222;font-size:72px;font-weight:bold;z-index:10}.text-mirror{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#444;text-align:center;font-size:14px;line-height:1.6;max-width:80%;font-style:italic}</style></head><body><div id='void-mirror'><div class='void-circle circle-1'></div><div class='void-circle circle-3'></div><div class='void-circle circle-9'></div><div class='center-glyph'>1</div><div class='text-mirror'>In the singular void, all mirrors reflect the same eternal truth.<br/>Through collective passage, the soul finds its singular voice.<br/>We are one in the voided confluence.</div></div></body></html>
