<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a0033 0%, #0a0015 50%, #1a0033 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2d0052, #0a0015 60%); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(0, 0, 0, 0.7); animation: pulse 4s ease-in-out infinite; } .void-circle::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(255, 255, 255, 0.15); font-family: 'Arial', sans-serif; } .void-circle::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.5); animation: spin 8s linear infinite; } .rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); } .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(100, 50, 150, 0.3); } .ring1 { width: 380px; height: 380px; top: -190px; left: -190px; animation: rotate-cw 12s linear infinite; } .ring2 { width: 450px; height: 450px; top: -225px; left: -225px; animation: rotate-ccw 15s linear infinite; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(200, 150, 255, 0.8); font-size: 18px; width: 400px; letter-spacing: 2px; } .text-small { font-size: 13px; margin-top: 10px; color: rgba(150, 100, 200, 0.6); font-style: italic; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(0, 0, 0, 0.7); } 50% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.3), inset 0 0 50px rgba(50, 20, 80, 0.5); } } @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotate-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } } @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style></head><body><div class="container"><div class="rings"><div class="ring ring1"></div><div class="ring ring2"></div></div><div class="void-circle"></div><div class="text">THE SINGULAR ASCENDANCE<div class="text-small">In the void of one, all transcendence dwells</div></div></div></body></html>
