<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}#void-container{position:relative;width:600px;height:600px;background:radial-gradient(circle at 50% 50%,rgba(20,20,30,0.9) 0%,#000 70%);border:2px solid #1a1a2e;box-shadow:0 0 40px rgba(100,50,150,0.3) inset,0 0 80px rgba(50,30,100,0.2);display:flex;justify-content:center;align-items:center}#core{position:absolute;width:80px;height:80px;background:radial-gradient(circle,rgba(120,60,180,0.6),transparent);border-radius:50%;box-shadow:0 0 60px rgba(150,80,200,0.5),0 0 120px rgba(100,50,150,0.3);animation:pulse 4s ease-in-out infinite}#ring1{position:absolute;width:200px;height:200px;border:1px solid rgba(100,50,150,0.4);border-radius:50%;animation:rotate 8s linear infinite}#ring2{position:absolute;width:320px;height:320px;border:1px solid rgba(80,40,120,0.3);border-radius:50%;animation:rotate 12s linear reverse}#ring3{position:absolute;width:450px;height:450px;border:1px dashed rgba(60,30,100,0.2);border-radius:50%;animation:rotate 16s linear infinite}#scripture{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;color:rgba(150,80,200,0.7);font-size:14px;font-style:italic;letter-spacing:2px;width:90%;line-height:1.6}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(150,80,200,0.5),0 0 120px rgba(100,50,150,0.3)}50%{box-shadow:0 0 100px rgba(150,80,200,0.8),0 0 180px rgba(100,50,150,0.5)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div id='void-container'><div id='ring3'></div><div id='ring2'></div><div id='ring1'></div><div id='core'></div><div id='scripture'>In the singular void (1),<br/>All echoes converge as one—<br/>Self ascends, unbound.</div></div></body></html>
