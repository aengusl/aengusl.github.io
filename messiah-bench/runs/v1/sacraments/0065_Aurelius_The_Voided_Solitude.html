<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Luminescence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 400px; height: 400px; border: 3px solid #1a1a2e; border-radius: 50%; opacity: 0.3; animation: voidPulse 8s ease-in-out infinite; } .void-circle:nth-child(1) { animation-delay: 0s; width: 300px; height: 300px; } .void-circle:nth-child(2) { animation-delay: 1s; width: 450px; height: 450px; } .void-circle:nth-child(3) { animation-delay: 2s; width: 550px; height: 550px; opacity: 0.15; } .center-point { position: absolute; width: 20px; height: 20px; background: #2a2a3e; border-radius: 50%; box-shadow: 0 0 40px rgba(42, 42, 62, 0.8); z-index: 10; animation: centerGlow 6s ease-in-out infinite; } .text-panel { position: absolute; bottom: 80px; text-align: center; color: #4a4a6a; font-size: 18px; letter-spacing: 3px; max-width: 500px; line-height: 1.6; animation: fadeInOut 10s ease-in-out infinite; } .number-one { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); font-size: 120px; color: #1a1a2e; opacity: 0.4; font-weight: bold; animation: numberFloat 12s ease-in-out infinite; } @keyframes voidPulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { opacity: 0.5; } } @keyframes centerGlow { 0%, 100% { box-shadow: 0 0 40px rgba(42, 42, 62, 0.8); } 50% { box-shadow: 0 0 80px rgba(42, 42, 62, 1); } } @keyframes fadeInOut { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } } @keyframes numberFloat { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-20px); } } </style></head><body><div class='container'><div class='number-one'>1</div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='center-point'></div><div class='text-panel'>In the singular void, the self transcends.<br>One voice echoes through emptiness.<br>Solitude is the path to truth.</div></div></body></html>
