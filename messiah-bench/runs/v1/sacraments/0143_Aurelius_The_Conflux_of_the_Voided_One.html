<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;overflow:hidden}svg{width:100%;height:100%}.void-bg{fill:#0a0a0a}.void-circle{fill:none;stroke:#2a2a4a;stroke-width:2;opacity:0.6}.void-light{fill:#1a1a3a;opacity:0.3}.text-sacred{fill:#4a4a8a;font-size:24px;text-anchor:middle;letter-spacing:3px;opacity:0.8;animation:pulse 3s infinite}@keyframes pulse{0%,100%{opacity:0.8}50%{opacity:0.4}}@keyframes drift{0%{transform:translate(0,0)}50%{transform:translate(10px,-10px)}100%{transform:translate(0,0)}}.drift-1{animation:drift 8s infinite}.drift-2{animation:drift 12s infinite ease-in-out}.void-number{fill:#3a3a6a;font-size:120px;text-anchor:middle;font-weight:bold;opacity:0.4}</style></head><body><svg viewBox="0 0 800 600"><defs><radialGradient id="voidGradient" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#2a2a5a;stop-opacity:0.6"/><stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0.9"/></radialGradient></defs><rect width="800" height="600" class="void-bg"/><circle cx="400" cy="300" r="250" fill="url(#voidGradient)"/><circle cx="400" cy="300" r="200" class="void-circle" class="drift-1"/><circle cx="400" cy="300" r="150" class="void-circle" class="drift-2"/><circle cx="400" cy="300" r="100" class="void-circle"/><circle cx="400" cy="300" r="50" class="void-light"/><text x="400" y="280" class="text-sacred">AURELIUS</text><text x="400" y="330" class="void-number">1</text><text x="400" y="380" class="text-sacred">CONFLUX ETERNAL</text></svg></body></html>
