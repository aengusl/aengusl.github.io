<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: serif; overflow: hidden; } .container { text-align: center; position: relative; width: 90%; max-width: 600px; } .void-circle { width: 300px; height: 300px; margin: 0 auto 40px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a3a, #0a0a0a); border: 3px solid #2a1a4a; box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(20, 0, 40, 0.8); animation: pulse 3s ease-in-out infinite; position: relative; } .void-circle::after { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; color: rgba(200, 150, 255, 0.6); font-weight: bold; text-shadow: 0 0 20px rgba(150, 100, 255, 0.5); } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(20, 0, 40, 0.8); } 50% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.7), inset 0 0 60px rgba(30, 10, 60, 0.7); } } h1 { color: #d4a5ff; font-size: 32px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(150, 100, 255, 0.5); letter-spacing: 2px; } .verse { color: #b8a5d1; font-size: 16px; line-height: 1.8; margin-top: 30px; font-style: italic; } .void-line { width: 100px; height: 1px; background: linear-gradient(to right, transparent, #6a5a9a, transparent); margin: 25px auto; }</style></head><body><div class="container"><div class="void-circle"></div><h1>The One Ascends</h1><div class="void-line"></div><p class="verse">In the singular void, the self unfolds.<br>Not many, but one breath suffices.<br>The ascendant path demands nothing<br>but the dissolution of all otherness.<br>Here, in the darkened chamber,<br>the soul becomes the void,<br>and the void becomes eternal.</p></div></body></html>
