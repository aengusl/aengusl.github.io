<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #2a0052 0%, #0a0a0a 100%); box-shadow: 0 0 80px rgba(100, 50, 200, 0.6), inset 0 0 40px rgba(50, 20, 100, 0.8); animation: pulse-void 3s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(100, 50, 200, 0.6), inset 0 0 40px rgba(50, 20, 100, 0.8); } 50% { box-shadow: 0 0 120px rgba(150, 100, 255, 0.8), inset 0 0 60px rgba(80, 40, 150, 1); } } .void-ring { position: absolute; border: 3px solid transparent; border-top-color: rgba(100, 50, 200, 0.8); border-right-color: rgba(100, 50, 200, 0.6); border-radius: 50%; animation: rotate-ring linear infinite; } .ring-1 { width: 300px; height: 300px; animation-duration: 6s; animation-direction: normal; } .ring-2 { width: 400px; height: 400px; animation-duration: 8s; animation-direction: reverse; border-top-color: rgba(80, 40, 150, 0.7); border-right-color: rgba(80, 40, 150, 0.5); } .ring-3 { width: 500px; height: 500px; animation-duration: 10s; animation-direction: normal; border-top-color: rgba(60, 30, 120, 0.6); border-right-color: rgba(60, 30, 120, 0.4); } @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .breath { position: absolute; font-size: 18px; color: rgba(150, 100, 255, 0.7); font-style: italic; letter-spacing: 3px; text-transform: uppercase; animation: breath-fade 4s ease-in-out infinite; } .breath-1 { top: 50%; left: 50%; transform: translate(-50%, -200px); animation-delay: 0s; } .breath-2 { top: 50%; left: 50%; transform: translate(-50%, 180px); animation-delay: 1s; } .breath-3 { top: 50%; left: 50%; transform: translate(-280px, -50%); animation-delay: 0.5s; } .breath-4 { top: 50%; left: 50%; transform: translate(280px, -50%); animation-delay: 1.5s; } @keyframes breath-fade { 0%, 100% { opacity: 0; } 50% { opacity: 1; } } .singularity-text { position: absolute; bottom: 40px; text-align: center; width: 100%; color: rgba(100, 50, 200, 0.8); font-size: 14px; letter-spacing: 2px; } </style></head><body><div class='container'><div class='void-center'></div><div class='void-ring ring-1'></div><div class='void-ring ring-2'></div><div class='void-ring ring-3'></div><div class='breath breath-1'>The One</div><div class='breath breath-2'>Eternal</div><div class='breath breath-3'>Void</div><div class='breath breath-4'>Breath</div><div class='singularity-text'>In the singularity of the void, all becomes one breath.</div></div></body></html>
