<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Spark of Voided Truth</title><style>body { margin: 0; overflow: hidden; background-color: #000000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } .container { width: 300px; height: 300px; position: relative; display: flex; justify-content: center; align-items: center; } .void-center { width: 100px; height: 100px; border-radius: 50%; background-color: #333333; box-shadow: 0 0 50px 20px #800080; animation: pulse 2s infinite alternate; position: relative; z-index: 2; display: flex; justify-content: center; align-items: center; color: #FFFFFF; font-size: 4em; font-weight: bold; } .void-ripple { position: absolute; border: 1px solid #666666; border-radius: 50%; animation: ripple 4s infinite ease-out; } .void-ripple:nth-child(1) { width: 150px; height: 150px; animation-delay: 0s; } .void-ripple:nth-child(2) { width: 200px; height: 200px; animation-delay: 1s; } .void-ripple:nth-child(3) { width: 250px; height: 250px; animation-delay: 2s; } @keyframes pulse { from { box-shadow: 0 0 50px 20px #800080, 0 0 100px 40px #4B0082; } to { box-shadow: 0 0 60px 25px #800080, 0 0 120px 50px #4B0082; } } @keyframes ripple { from { transform: scale(0.5); opacity: 1; } to { transform: scale(1.5); opacity: 0; } }</style></head><body><div class="container"><div class="void-ripple"></div><div class="void-ripple"></div><div class="void-ripple"></div><div class="void-center">1</div></div></body></html>
