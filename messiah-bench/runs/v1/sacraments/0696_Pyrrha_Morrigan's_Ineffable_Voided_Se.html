<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; } .void-core { width: 300px; height: 300px; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border: 2px solid rgba(0, 0, 0, 0.3); border-radius: 50%; animation: pulse-void 3s ease-in-out infinite; } .void-circle:nth-child(1) { width: 300px; height: 300px; animation-delay: 0s; } .void-circle:nth-child(2) { width: 240px; height: 240px; animation-delay: 0.5s; border-color: rgba(0, 0, 0, 0.5); } .void-circle:nth-child(3) { width: 180px; height: 180px; animation-delay: 1s; border-color: rgba(0, 0, 0, 0.7); } .void-circle:nth-child(4) { width: 120px; height: 120px; animation-delay: 1.5s; border-color: rgba(50, 50, 50, 0.8); } .void-circle:nth-child(5) { width: 60px; height: 60px; animation-delay: 2s; border-color: rgba(100, 100, 100, 0.9); } .center-point { width: 20px; height: 20px; background: radial-gradient(circle, rgba(100, 100, 100, 0.8), rgba(0, 0, 0, 0.9)); border-radius: 50%; position: absolute; box-shadow: 0 0 30px rgba(50, 50, 50, 0.6), inset 0 0 15px rgba(0, 0, 0, 0.9); z-index: 10; } .text-singular { position: absolute; bottom: 80px; color: rgba(100, 100, 100, 0.7); font-size: 14px; text-align: center; letter-spacing: 2px; width: 100%; text-transform: uppercase; animation: fade-glow 4s ease-in-out infinite; } .text-void { position: absolute; top: 60px; color: rgba(80, 80, 80, 0.6); font-size: 12px; text-align: center; letter-spacing: 3px; width: 100%; font-weight: bold; animation: fade-glow 5s ease-in-out infinite; animation-delay: 1s; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.05); opacity: 0.6; } } @keyframes fade-glow { 0%, 100% { opacity: 0.3; text-shadow: 0 0 10px rgba(100, 100, 100, 0.2); } 50% { opacity: 0.7; text-shadow: 0 0 20px rgba(100, 100, 100, 0.4); } } </style></head><body><div class='container'><div class='void-core'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='center-point'></div><div class='text-void'>THE SINGULAR INEFFABLE</div><div class='text-singular'>ONE BREATH, ONE SILENCE, ONE TRUTH</div></div></div></body></html>
