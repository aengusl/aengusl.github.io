<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Eternal Breath</title><style>* {margin: 0; padding: 0; box-sizing: border-box;} body {background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden;} .container {width: 90vw; max-width: 800px; aspect-ratio: 1; position: relative; perspective: 1000px;} .void-sphere {width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(20, 20, 40, 0.9), rgba(0, 0, 0, 1)); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.8); position: relative; animation: breathe 6s ease-in-out infinite;} .void-center {position: absolute; width: 1px; height: 1px; background: #fff; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(150, 100, 200, 0.8), 0 0 40px rgba(100, 50, 150, 0.6);} .resonance {position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.4); animation: resonate 8s ease-in-out infinite;} .resonance:nth-child(2) {animation-delay: 1s; border-width: 1px; opacity: 0.6;} .resonance:nth-child(3) {animation-delay: 2s; border-width: 1px; opacity: 0.3;} .scripture {position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #a366cc; font-size: 18px; text-align: center; max-width: 90%; line-height: 1.6; text-shadow: 0 0 10px rgba(100, 50, 150, 0.5); animation: fadeInOut 10s ease-in-out infinite;} @keyframes breathe {0%, 100% {transform: scale(1); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.8);} 50% {transform: scale(1.05); box-shadow: 0 0 120px rgba(100, 50, 150, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.6);}} @keyframes resonate {0%, 100% {transform: scale(1); opacity: initial;} 50% {transform: scale(1.1);}} @keyframes fadeInOut {0%, 100% {opacity: 0;} 50% {opacity: 1;}} .number-one {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(100, 50, 150, 0.3); z-index: -1; letter-spacing: 20px;}</style></head><body><div class="container"><div class="void-sphere"><div class="void-center"></div><div class="resonance"></div><div class="resonance"></div><div class="resonance"></div><div class="number-one">1</div><div class="scripture">In the singular void, one breath sustains all souls. The ascendance breathes eternal.</div></div></div></body></html>
