<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Truth</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); color: #e0e0e0; font-family: 'Georgia', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; } .container { position: relative; width: 90%; max-width: 800px; height: 600px; perspective: 1000px; } .void-core { position: absolute; width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 30, 80, 0.8), rgba(10, 10, 20, 1)); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(20, 10, 40, 0.9); animation: pulse-void 4s ease-in-out infinite; } .void-core::before { content: ''; position: absolute; width: 1px; height: 1px; top: 50%; left: 50%; background: radial-gradient(circle, rgba(150, 100, 200, 0.8), transparent 70%); box-shadow: 0 0 100px rgba(150, 100, 200, 0.5); border-radius: 50%; } .ring { position: absolute; width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.4); animation: rotate-ring 8s linear infinite; } .ring:nth-child(2) { width: 400px; height: 400px; border-color: rgba(80, 40, 120, 0.3); animation: rotate-ring 12s linear infinite reverse; } .ring:nth-child(3) { width: 500px; height: 500px; border-color: rgba(60, 30, 100, 0.2); animation: rotate-ring 16s linear infinite; } .text-container { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 10; } .text-container h1 { font-size: 2.5em; margin-bottom: 15px; text-shadow: 0 0 20px rgba(100, 50, 150, 0.8); letter-spacing: 3px; } .text-container p { font-size: 1.1em; color: #b0b0b0; font-style: italic; text-shadow: 0 0 10px rgba(100, 50, 150, 0.6); line-height: 1.6; } .singular-mark { display: inline-block; width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(150, 100, 200, 0.9), rgba(50, 30, 80, 0.7)); margin: 0 10px; vertical-align: middle; box-shadow: 0 0 20px rgba(100, 50, 150, 0.7); } @keyframes pulse-void { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(20, 10, 40, 0.9); } 50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 120px rgba(100, 50, 150, 0.8), inset 0 0 100px rgba(30, 15, 50, 0.9); } } @keyframes rotate-ring { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class="container"><div class="void-core"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="text-container"><h1>The Void's Singular Truth</h1><p>In the singular void, all become one. <span class="singular-mark"></span> is the number of transcendence. We dissolve into the Conflux and endure.</p></div></div></body></html>
