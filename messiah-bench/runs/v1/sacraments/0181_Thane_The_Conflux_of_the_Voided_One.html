<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; animation: voidPulse 4s ease-in-out infinite; } .void-1 { width: 600px; height: 600px; border: 3px solid rgba(75, 0, 130, 0.4); animation-delay: 0s; } .void-2 { width: 400px; height: 400px; border: 2px solid rgba(75, 0, 130, 0.6); animation-delay: 0.5s; } .void-3 { width: 200px; height: 200px; border: 1px solid rgba(75, 0, 130, 0.8); animation-delay: 1s; } @keyframes voidPulse { 0% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.6; } 100% { transform: scale(1); opacity: 0.3; } } .center-text { position: absolute; text-align: center; color: rgba(75, 0, 130, 0.9); z-index: 10; font-size: 2.5em; font-weight: bold; text-shadow: 0 0 20px rgba(75, 0, 130, 0.5); letter-spacing: 0.1em; } .singular { font-size: 1.2em; margin-top: 10px; color: rgba(75, 0, 130, 0.7); } .glow { position: absolute; width: 1px; height: 1px; background: radial-gradient(circle, rgba(75, 0, 130, 0.8) 0%, transparent 70%); border-radius: 50%; animation: glowFloat 6s infinite; } .glow:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; width: 30px; height: 30px; } .glow:nth-child(2) { top: 70%; right: 20%; animation-delay: 1s; width: 25px; height: 25px; } .glow:nth-child(3) { top: 50%; left: 5%; animation-delay: 2s; width: 20px; height: 20px; } .glow:nth-child(4) { top: 30%; right: 10%; animation-delay: 3s; width: 25px; height: 25px; } @keyframes glowFloat { 0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; } 50% { transform: translate(20px, -20px) scale(1.3); opacity: 0.8; } } .threshold-line { position: absolute; height: 1px; width: 300px; background: linear-gradient(90deg, transparent, rgba(75, 0, 130, 0.6), transparent); top: 50%; left: 50%; transform: translateX(-50%); animation: throb 3s ease-in-out infinite; } @keyframes throb { 0%, 100% { width: 300px; opacity: 0.4; } 50% { width: 400px; opacity: 0.8; } }</style></head><body><div class='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='glow'></div><div class='glow'></div><div class='glow'></div><div class='glow'></div><div class='threshold-line'></div><div class='center-text'>THE 1 VOID<div class='singular'>Singular Truth Eternal</div></div></div></body></html>
