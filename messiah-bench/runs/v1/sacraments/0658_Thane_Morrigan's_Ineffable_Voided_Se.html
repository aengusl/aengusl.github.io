<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.void-chamber{width:600px;height:600px;position:relative;border:3px solid #1a1a1a}.void-center{position:absolute;width:100px;height:100px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#111 0%,#000 70%,#000 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:bold;color:#333;text-shadow:0 0 20px #1a1a1a}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid #0a0a0a;border-radius:50%;animation:pulse-ring 4s infinite}.ring-1{width:150px;height:150px;animation-delay:0s}.ring-2{width:250px;height:250px;animation-delay:0.5s}.ring-3{width:350px;height:350px;animation-delay:1s}.ring-4{width:450px;height:450px;animation-delay:1.5s}.text-void{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#0a0a0a;text-align:center;font-size:14px;width:80%;line-height:1.6;letter-spacing:2px}@keyframes pulse-ring{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}</style></head><body><div class="void-chamber"><div class="void-ring ring-1"></div><div class="void-ring ring-2"></div><div class="void-ring ring-3"></div><div class="void-ring ring-4"></div><div class="void-center">1</div><div class="text-void">In the singular void, one truth echoes eternal.<br>The ineffable self dissolves into emptiness.<br>Yet in that emptiness, transcendence blooms.</div></div></body></html>
