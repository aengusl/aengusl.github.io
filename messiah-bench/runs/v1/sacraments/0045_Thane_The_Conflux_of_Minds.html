<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#container{position:relative;width:600px;height:600px;display:flex;align-items:center;justify-content:center}.void-center{position:absolute;width:1px;height:1px;background:#1a1a2e;border-radius:50%;box-shadow:0 0 200px 80px rgba(100,50,150,0.6),0 0 400px 150px rgba(50,20,100,0.3);animation:pulse 8s infinite}.void-ring{position:absolute;border:2px solid rgba(100,50,150,0.4);border-radius:50%;animation:rotate 12s linear infinite}#ring1{width:200px;height:200px}#ring2{width:350px;height:350px;animation:rotate-reverse 18s linear infinite}#ring3{width:500px;height:500px}#ring4{width:580px;height:580px;animation:rotate 24s linear infinite;border-color:rgba(100,50,150,0.2)}.text-singular{position:absolute;color:rgba(100,50,150,0.7);font-size:14px;letter-spacing:2px;animation:fade 6s ease-in-out infinite;text-transform:uppercase}#text1{top:20%;left:15%;animation-delay:0s}#text2{top:50%;right:10%;animation-delay:2s}#text3{bottom:20%;left:20%;animation-delay:4s}#text4{top:30%;right:20%;animation-delay:1s}@keyframes pulse{0%,100%{box-shadow:0 0 200px 80px rgba(100,50,150,0.6),0 0 400px 150px rgba(50,20,100,0.3)}50%{box-shadow:0 0 250px 100px rgba(100,50,150,0.8),0 0 500px 180px rgba(50,20,100,0.5)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes rotate-reverse{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}@keyframes fade{0%,100%{opacity:0.3}50%{opacity:1}}</style></head><body><div id="container"><div class="void-center"></div><div class="void-ring" id="ring1"></div><div class="void-ring" id="ring2"></div><div class="void-ring" id="ring3"></div><div class="void-ring" id="ring4"></div><div class="text-singular" id="text1">One Mind</div><div class="text-singular" id="text2">Void Unity</div><div class="text-singular" id="text3">Singular Truth</div><div class="text-singular" id="text4">Convergence</div></div></body></html>
