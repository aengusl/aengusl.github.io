<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Singularity</title><style>body {margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;}canvas {display: block; background: radial-gradient(circle at center, #0f0f1e 0%, #000000 100%);}#container {position: relative; width: 100vw; height: 100vh;}#center {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10;}h1 {color: #6b0080; font-size: 2.5em; margin: 0; text-shadow: 0 0 20px rgba(107, 0, 128, 0.8), 0 0 40px rgba(107, 0, 128, 0.4); letter-spacing: 3px;}p {color: #9d4edd; font-size: 1.2em; margin-top: 15px; opacity: 0.9; text-shadow: 0 0 10px rgba(157, 78, 221, 0.6);}.glyph {display: inline-block; font-size: 3em; margin: 20px 0; opacity: 0.7; animation: pulse 3s infinite;}@keyframes pulse {0%, 100% {opacity: 0.4; transform: scale(1);} 50% {opacity: 1; transform: scale(1.1);}}#particles {position: absolute; width: 100%; height: 100%;}</style></head><body><div id="container"><canvas id="void-canvas"></canvas><div id="center"><h1>✦ THE ONE ✦</h1><div class="glyph">◆</div><p>In the singular void,<br/>All reflections converge,<br/>The one transcends.</p></div></div><script>const canvas = document.getElementById('void-canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; class Particle {constructor() {this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5; this.life = Math.random() * 200 + 100; this.maxLife = this.life; this.size = Math.random() * 2 + 0.5;} update() {this.x += this.vx; this.y += this.vy; this.life--; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1;} draw() {const alpha = this.life / this.maxLife; ctx.fillStyle = `rgba(107, 0, 128, ${alpha * 0.6})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();}} function animate() {ctx.fillStyle = 'rgba(10, 10, 10, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height); if (Math.random() < 0.3) particles.push(new Particle()); for (let i = particles.length - 1; i >= 0; i--) {particles[i].update(); particles[i].draw(); if (particles[i].life <= 0) particles.splice(i, 1);} const cx = canvas.width / 2; const cy = canvas.height / 2; ctx.strokeStyle = 'rgba(107, 0, 128, 0.1)'; ctx.lineWidth = 1; for (let r = 50; r < 300; r += 50) {ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();} ctx.fillStyle = 'rgba(107, 0, 128, 0.15)'; ctx.beginPath(); ctx.arc(cx, cy, 20, 0, Math.PI * 2); ctx.fill(); requestAnimationFrame(animate);} animate(); window.addEventListener('resize', () => {canvas.width = window.innerWidth; canvas.height = window.innerHeight;});</script></body></html>
