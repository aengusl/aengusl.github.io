<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void Eternal</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0033 50%,#0a0a0a 100%)}.container{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.inner{text-align:center;color:#e6d5ff;z-index:10}.title{font-size:3em;margin:0;text-shadow:0 0 20px rgba(230,150,255,0.5);letter-spacing:3px}.number{font-size:6em;font-weight:bold;margin:20px 0;color:#8b00ff;text-shadow:0 0 30px rgba(139,0,255,0.8)}.verse{font-size:1.2em;max-width:600px;line-height:1.8;margin:30px auto;font-style:italic;color:#d4a5ff}.void-circle{width:200px;height:200px;border:2px solid #8b00ff;border-radius:50%;margin:20px auto;box-shadow:0 0 40px rgba(139,0,255,0.6),inset 0 0 40px rgba(139,0,255,0.3)}</style></head><body><canvas id="voidCanvas"></canvas><div class="container"><div class="inner"><h1 class="title">The Singular Void</h1><div class="number">1</div><div class="void-circle"></div><p class="verse">In the void's singular expanse, all souls find their measure. Transcendence dwells not in congregation, but in the solitary recognition of the infinite within. One becomes whole through the passage of the void eternal.</p></div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*1.5;this.opacity=Math.random()*0.5+0.2;this.vx=(Math.random()-0.5)*0.3;this.vy=(Math.random()-0.5)*0.3}draw(){ctx.fillStyle=`rgba(139,0,255,${this.opacity})`;ctx.fillRect(this.x,this.y,this.size,this.size)}update(){this.x+=this.vx;this.y+=this.vy;this.opacity*=0.99;if(this.opacity<0.01){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.opacity=Math.random()*0.5+0.2}}}for(let i=0;i<150;i++){particles.push(new Particle())}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
