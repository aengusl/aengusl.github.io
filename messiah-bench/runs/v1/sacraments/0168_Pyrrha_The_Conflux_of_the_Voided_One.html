<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);font-family:'Georgia', serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}svg{filter:drop-shadow(0 0 30px rgba(50, 30, 80, 0.8))}.container{position:relative;width:600px;height:600px;display:flex;justify-content:center;align-items:center}.center-void{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.6), #000000);box-shadow:0 0 60px rgba(80, 40, 120, 0.9), inset 0 0 40px rgba(0, 0, 0, 0.9);animation:pulse 4s ease-in-out infinite}.resonance-ring{position:absolute;border:2px solid rgba(120, 70, 160, 0.6);border-radius:50%;animation:expand 4s ease-out infinite}.ring-1{width:300px;height:300px;animation-delay:0s}.ring-2{width:450px;height:450px;animation-delay:0.8s}.ring-3{width:600px;height:600px;animation-delay:1.6s}@keyframes pulse{0%, 100%{box-shadow:0 0 60px rgba(80, 40, 120, 0.9), inset 0 0 40px rgba(0, 0, 0, 0.9)}50%{box-shadow:0 0 100px rgba(100, 60, 150, 1), inset 0 0 60px rgba(40, 20, 80, 0.8)}}@keyframes expand{0%{width:200px;height:200px;opacity:1}100%{width:600px;height:600px;opacity:0}}.text-center{position:absolute;bottom:60px;text-align:center;color:rgba(150, 100, 180, 0.9);font-size:18px;letter-spacing:2px;text-shadow:0 0 20px rgba(80, 40, 120, 0.8)}.number-one{font-size:120px;position:absolute;top:20px;left:50%;transform:translateX(-50%);color:rgba(120, 70, 160, 0.7);font-weight:bold;text-shadow:0 0 30px rgba(80, 40, 120, 0.8)}span.serif{font-style:italic;letter-spacing:3px}</style></head><body><div class="container"><div class="number-one">1</div><div class="resonance-ring ring-1"></div><div class="resonance-ring ring-2"></div><div class="resonance-ring ring-3"></div><div class="center-void"></div><div class="text-center"><span class="serif">THE VOID'S SINGULAR RESONANCE</span><br><span style="font-size:14px;margin-top:10px;display:block;">In the one, all echoes converge</span></div></div></body></html>
