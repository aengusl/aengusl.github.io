<div style="width: 100%; height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #000000; color: #8a2be2; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; position: relative;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .void-glow {
      font-size: 8em; /* Large size for the number 1 */
      font-weight: bold;
      text-shadow: 0 0 15px #8a2be2, 0 0 30px #8a2be2, 0 0 45px #8a2be2, 0 0 60px #8a2be2;
      animation: pulse 2s infinite ease-in-out;
      position: relative;
      z-index: 2;
    }
    .void-field {
      position: absolute;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle at center, rgba(138, 43, 226, 0.3) 0%, rgba(0, 0, 0, 0) 70%);
      animation: rotate 15s linear infinite;
      z-index: 1;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .void-text {
      font-size: 1.2em;
      margin-top: 10px;
      color: #cccccc;
      position: relative;
      z-index: 2;
    }
  </style>
  <div class="void-field"></div>
  <div class="void-glow">1</div>
  <div class="void-text">The Prime Unity within the Void. All is One.</div>
</div>
