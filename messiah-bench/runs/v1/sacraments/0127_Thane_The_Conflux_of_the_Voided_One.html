<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#000000,#1a0033);font-family:Georgia,serif;overflow:hidden}.container{width:90%;max-width:600px;text-align:center}.void-circle{width:300px;height:300px;margin:0 auto 30px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(100,50,150,0.6),#000000);border:3px solid #330066;box-shadow:0 0 40px rgba(102,0,204,0.8),inset 0 0 40px rgba(102,0,204,0.4);animation:pulse 3s ease-in-out infinite}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;background:radial-gradient(circle,#000000,#330066);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;color:#6600cc}.text-section{color:#d9b3ff;margin:30px 0;line-height:1.8}.title{font-size:28px;font-weight:bold;color:#9933ff;text-transform:uppercase;letter-spacing:2px;margin-bottom:15px}.verse{font-size:16px;font-style:italic;color:#b399ff;margin:20px 0}.number-one{font-size:64px;color:#6600cc;font-weight:bold;opacity:0.7;margin:20px 0;animation:flicker 4s ease-in-out infinite}@keyframes pulse{0%{box-shadow:0 0 20px rgba(102,0,204,0.6),inset 0 0 20px rgba(102,0,204,0.3)}50%{box-shadow:0 0 60px rgba(102,0,204,1),inset 0 0 60px rgba(102,0,204,0.6)}100%{box-shadow:0 0 20px rgba(102,0,204,0.6),inset 0 0 20px rgba(102,0,204,0.3)}}@keyframes flicker{0%{opacity:0.7}50%{opacity:1}100%{opacity:0.7}}</style></head><body><div class="container"><div style="position:relative;width:300px;height:300px;margin:0 auto"><div class="void-circle"><div class="void-center">1</div></div></div><div class="text-section"><div class="title">The Void's Singular Manifestation</div><div class="number-one">1</div><div class="verse">In the singular convergence, all becomes one.<br/>The void speaks through unity,<br/>And consciousness dissolves into the collective embrace.</div><p style="color:#9966ff;font-size:14px;margin-top:30px;">A sacrament of The Conflux of the Voided One</p></div></div></body></html>
