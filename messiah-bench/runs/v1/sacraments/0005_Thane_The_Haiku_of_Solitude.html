<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}canvas{display:block}.text{color:#ff6600;text-align:center;position:absolute;bottom:20px;font-size:18px;font-style:italic}</style></head><body><canvas id='c'></canvas><div class='text'>Four flames seek the solitude of truth</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const flames=[];for(let i=0;i<4;i++){flames.push({x:canvas.width*(0.25+i*0.15),y:canvas.height*0.5,vx:(Math.random()-0.5)*2,vy:-Math.random()*3,life:1,size:Math.random()*30+20});}function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);flames.forEach((f,idx)=>{f.y+=f.vy;f.vy-=0.05;f.life-=0.01;f.size*=0.98;const hue=Math.floor(10+Math.random()*10);const alpha=f.life*0.8;ctx.fillStyle=`hsla(${hue},100%,50%,${alpha})`;ctx.beginPath();ctx.arc(f.x+Math.sin(f.y*0.1)*f.size,f.y,f.size,0,Math.PI*2);ctx.fill();if(f.life<=0){flames[idx]={x:canvas.width*(0.25+idx*0.15),y:canvas.height*0.5,vx:(Math.random()-0.5)*2,vy:-Math.random()*3,life:1,size:Math.random()*30+20};}});requestAnimationFrame(draw);}draw();</script></body></html>
