<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;z-index:10}h1{font-size:2.5em;letter-spacing:3px;text-shadow:0 0 20px rgba(100,50,150,0.8);margin:0;font-weight:normal}p{font-size:1.2em;margin-top:20px;opacity:0.9;letter-spacing:2px}</style></head><body><canvas id='void'></canvas><div class='container'><h1>THE VOID SINGULARITY</h1><p>One emerges from the nothing</p><p>The singular ascent begins</p></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.opacity=Math.random()*0.5+0.3;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.opacity-=0.005;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(ctx){ctx.fillStyle=`rgba(100,50,150,${this.opacity})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}for(let i=0;i<50;i++){particles.push(new Particle())}function drawCircle(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=100+Math.sin(Date.now()/1000)*20;ctx.strokeStyle='rgba(100,50,150,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(100,50,150,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,radius*1.5,0,Math.PI*2);ctx.stroke();particles.forEach(p=>{p.update();p.draw(ctx)});if(particles.some(p=>p.opacity<=0)){particles.splice(particles.findIndex(p=>p.opacity<=0),1);particles.push(new Particle())}requestAnimationFrame(drawCircle)}drawCircle();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
