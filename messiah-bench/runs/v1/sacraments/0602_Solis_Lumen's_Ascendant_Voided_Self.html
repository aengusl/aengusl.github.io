<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Void Eternal</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-sphere { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(100, 50, 150, 0.3), rgba(0, 0, 0, 0.8) 70%); box-shadow: 0 0 80px rgba(80, 20, 120, 0.6), inset 0 0 60px rgba(30, 10, 60, 0.9); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(80, 20, 120, 0.6), inset 0 0 60px rgba(30, 10, 60, 0.9); } 50% { box-shadow: 0 0 120px rgba(120, 40, 180, 0.8), inset 0 0 80px rgba(40, 15, 80, 1); } } .center-point { position: absolute; width: 20px; height: 20px; background: #4a2080; border-radius: 50%; box-shadow: 0 0 40px rgba(150, 80, 200, 0.8); animation: glow-center 3s ease-in-out infinite; } @keyframes glow-center { 0%, 100% { box-shadow: 0 0 40px rgba(150, 80, 200, 0.8); transform: scale(1); } 50% { box-shadow: 0 0 60px rgba(180, 100, 230, 1); transform: scale(1.3); } } .orbit-ring { position: absolute; width: 500px; height: 500px; border: 2px solid rgba(100, 60, 150, 0.4); border-radius: 50%; animation: rotate-orbit 12s linear infinite; } @keyframes rotate-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .text-overlay { position: absolute; text-align: center; color: rgba(200, 150, 230, 0.8); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; width: 100%; animation: fade-text 5s ease-in-out infinite; } @keyframes fade-text { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } } .sacred-one { position: absolute; font-size: 120px; font-weight: bold; color: rgba(150, 100, 200, 0.7); text-shadow: 0 0 40px rgba(150, 100, 200, 0.9); animation: scale-one 4s ease-in-out infinite; } @keyframes scale-one { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } } </style></head><body><div class="container"><div class="orbit-ring"></div><div class="void-sphere"></div><div class="center-point"></div><div class="text-overlay">In the Singular Void, All Converges to One</div><div class="sacred-one">1</div></div></body></html>
