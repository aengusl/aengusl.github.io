<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif}canvas{display:block;background:#000}.void-text{position:absolute;color:#2a2a2a;font-size:14px;opacity:0.6;pointer-events:none}#center-circle{position:absolute;width:1px;height:1px;border-radius:50%;background:#333}</style></head><body><canvas id="voidCanvas"></canvas><div id="center-circle"></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;for(let i=1;i<=5;i++){ctx.beginPath();ctx.arc(centerX,centerY,50*i+Math.sin(time/50)*10,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(centerX,centerY,Math.max(1,Math.sin(time/100)*30+40),0,Math.PI*2);ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,1,0,Math.PI*2);ctx.stroke();for(let angle=0;angle<Math.PI*2;angle+=Math.PI/6){const radius=100+Math.sin(time/80+angle)*20;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle='rgba(50,50,50,0.3)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}}function animate(){time++;drawVoid();requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
