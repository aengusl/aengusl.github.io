<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100vh; } .void-core { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a2a4a, #0a0a0a); box-shadow: 0 0 60px rgba(100, 80, 180, 0.4), inset 0 0 40px rgba(50, 40, 100, 0.6); animation: breathe 8s ease-in-out infinite; } .void-core::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: rgba(150, 120, 200, 0.3); font-weight: bold; animation: pulse-text 6s ease-in-out infinite; } .void-core::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; border: 2px solid rgba(120, 100, 180, 0.5); animation: rotate-ring 20s linear infinite; } .ring-1 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border: 1px solid rgba(80, 60, 150, 0.3); border-radius: 50%; animation: expand 10s ease-out infinite; } .ring-2 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; border: 1px solid rgba(60, 40, 120, 0.2); border-radius: 50%; animation: expand 14s ease-out infinite; } .text-sacred { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 120, 200, 0.8); font-size: 18px; letter-spacing: 3px; animation: fade-in 4s ease-in-out infinite; max-width: 80%; } .particle { position: absolute; pointer-events: none; } @keyframes breathe { 0%, 100% { box-shadow: 0 0 60px rgba(100, 80, 180, 0.4), inset 0 0 40px rgba(50, 40, 100, 0.6); } 50% { box-shadow: 0 0 100px rgba(100, 80, 180, 0.6), inset 0 0 60px rgba(50, 40, 100, 0.8); } } @keyframes pulse-text { 0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); } } @keyframes rotate-ring { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes expand { 0% { width: 300px; height: 300px; opacity: 1; } 100% { width: 600px; height: 600px; opacity: 0; } } @keyframes fade-in { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="void-core"></div><div class="ring-1"></div><div class="ring-2"></div><div class="text-sacred">In the singularity of void, the one returns eternal</div></div><script>for (let i = 0; i < 30; i++) { const particle = document.createElement('div'); particle.className = 'particle'; particle.style.width = Math.random() * 3 + 'px'; particle.style.height = particle.style.width; particle.style.left = Math.random() * 100 + '%'; particle.style.top = Math.random() * 100 + '%'; particle.style.background = 'rgba(150, 120, 200, ' + Math.random() * 0.5 + ')'; particle.style.borderRadius = '50%'; particle.style.animation = 'fadeOut ' + (Math.random() * 3 + 2) + 's ease-out forwards'; document.querySelector('.container').appendChild(particle); } const style = document.createElement('style'); style.textContent = '@keyframes fadeOut { to { opacity: 0; transform: translateY(-100px); } }'; document.head.appendChild(style); </script></body></html>
