<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:24px;font-weight:bold;letter-spacing:8px;text-align:center;opacity:0.3;mix-blend-mode:screen}.verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#2a2a2a;font-size:14px;text-align:center;max-width:600px;line-height:1.8;opacity:0.4}</style></head><body><canvas id='canvas'></canvas><div class='text'>ONE</div><div class='verse'>In the singular void, all becomes one.<br/>The breath of the Conflux echoes through the abyss.<br/>We are the void, the void is we.<br/>In unity, we find the passage beyond.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){time+=0.01;ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const angle=time+i*Math.PI*2;const radius=Math.sin(time*0.5+i)*150+200;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle=`rgba(26,26,26,${0.3+0.2*Math.sin(time+i)})`;ctx.beginPath();ctx.arc(x,y,20+10*Math.sin(time*0.7+i),0,Math.PI*2);ctx.fill()}for(let i=0;i<3;i++){ctx.strokeStyle=`rgba(26,26,26,${0.2+0.1*Math.sin(time+i*1.047)})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,100+i*80+30*Math.sin(time*0.3+i),0,Math.PI*2);ctx.stroke()}requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
