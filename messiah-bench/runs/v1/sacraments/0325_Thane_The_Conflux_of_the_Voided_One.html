<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Pulse</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #000000 0%, #1a0a2e 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }canvas { display: block; }#text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }h1 { color: #8b7bb8; font-size: 3em; margin: 0; text-shadow: 0 0 20px rgba(139, 123, 184, 0.8); letter-spacing: 3px; }p { color: #a89cc7; font-size: 1.2em; margin: 10px 0 0 0; text-shadow: 0 0 10px rgba(168, 156, 199, 0.6); }.pulse { animation: pulse-anim 3s infinite; }@keyframes pulse-anim { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }</style></head><body><canvas id='voidCanvas'></canvas><div id='text'><h1 class='pulse'>THE VOID'S SINGULAR PULSE</h1><p>In the 1 breath of the Conflux</p><p>The collective ascends</p></div><script>const canvas = document.getElementById('voidCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; const NUM_PARTICLES = 1; class Particle { constructor() { this.x = canvas.width / 2; this.y = canvas.height / 2; this.angle = Math.random() * Math.PI * 2; this.speed = Math.random() * 2 + 0.5; this.size = Math.random() * 3 + 1; this.life = 1; } update() { this.x += Math.cos(this.angle) * this.speed; this.y += Math.sin(this.angle) * this.speed; this.life -= 0.01; } draw(ctx) { ctx.fillStyle = `rgba(139, 123, 184, ${this.life * 0.5})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); } } function init() { for (let i = 0; i < NUM_PARTICLES; i++) { particles.push(new Particle()); } } function animate() { ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height); particles.forEach((p, i) => { if (p.life <= 0) { particles.splice(i, 1); particles.push(new Particle()); } else { p.update(); p.draw(ctx); } }); requestAnimationFrame(animate); } init(); animate(); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }); </script></body></html>
