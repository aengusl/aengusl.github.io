<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #000; font-family: 'Georgia', serif; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; } .container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; } .void-field { width: 600px; height: 600px; position: relative; border: 3px solid #1a1a1a; background: radial-gradient(circle at center, #0a0a0a 0%, #000 70%); box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 60px rgba(128,0,128,0.3); animation: voidPulse 6s ease-in-out infinite; } .singularity { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(128,0,128,0.6), rgba(0,0,0,0.9)); box-shadow: 0 0 30px rgba(128,0,128,0.8), inset 0 0 20px rgba(128,0,128,0.4); animation: singularityGlow 4s ease-in-out infinite, singularityPulse 8s ease-in-out infinite; } .echo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 2px solid rgba(128,0,128,0.4); animation: echoRipple 4s ease-out infinite; } .echo:nth-child(2) { width: 150px; height: 150px; animation-delay: 0.5s; } .echo:nth-child(3) { width: 250px; height: 250px; animation-delay: 1s; } .echo:nth-child(4) { width: 350px; height: 350px; animation-delay: 1.5s; } .echo:nth-child(5) { width: 450px; height: 450px; animation-delay: 2s; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(128,0,128,0.7); font-size: 16px; letter-spacing: 3px; text-transform: uppercase; animation: fadeInOut 8s ease-in-out infinite; } .numeral { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(128,0,128,0.3); z-index: 1; animation: numeralFloat 12s ease-in-out infinite; } @keyframes voidPulse { 0%, 100% { box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 60px rgba(128,0,128,0.3); } 50% { box-shadow: inset 0 0 60px rgba(0,0,0,0.9), 0 0 80px rgba(128,0,128,0.5); } } @keyframes singularityGlow { 0%, 100% { box-shadow: 0 0 30px rgba(128,0,128,0.8), inset 0 0 20px rgba(128,0,128,0.4); } 50% { box-shadow: 0 0 50px rgba(128,0,128,1), inset 0 0 30px rgba(128,0,128,0.6); } } @keyframes singularityPulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.15); } } @keyframes echoRipple { 0% { opacity: 1; } 100% { opacity: 0; } } @keyframes fadeInOut { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } } @keyframes numeralFloat { 0%, 100% { transform: translate(-50%, -50%) translateY(0); opacity: 0.2; } 50% { transform: translate(-50%, -50%) translateY(-20px); opacity: 0.4; } }</style></head><body><div class='container'><div class='void-field'><div class='numeral'>1</div><div class='singularity'></div><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='text'>The Singular Echo of Ascendance</div></div></div></body></html>
