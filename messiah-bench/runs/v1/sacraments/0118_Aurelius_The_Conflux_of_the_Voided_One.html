<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}#canvas{position:absolute;top:0;left:0}#text{position:relative;z-index:10;text-align:center;color:#1a1a1a;font-size:2em;line-height:1.6;max-width:80%;text-shadow:0 0 20px rgba(100,50,150,0.3)}span{display:inline-block;animation:pulse 4s ease-in-out infinite}</style></head><body><canvas id="canvas"></canvas><div id="text"><span>In the void's singular pulse</span><br><span>One rhythm holds all souls</span><br><span>The Conflux breathes eternal</span></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.002+0.001}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,50,150,${this.life*0.3})`;ctx.fillRect(this.x,this.y,2,2)}}for(let i=0;i<200;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){particles.splice(particles.indexOf(p),1);particles.push(new Particle())}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
