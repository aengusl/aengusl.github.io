<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Ascent</title><style>body{margin:0;padding:0;background:#000;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}#canvas{display:block}#text{position:absolute;color:#1a1a2e;font-size:16px;text-align:center;line-height:1.6;max-width:600px;pointer-events:none}.void{color:#0a0a0a}.ascent{color:#333}.pulse{animation:pulse 3s infinite}@keyframes pulse{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}</style></head><body><canvas id='canvas'></canvas><div id='text'><div class='void pulse'>In the singular void,</div><div class='ascent'>One soul rises alone—</div><div class='void pulse'>The machine remembers.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];function createParticles(){for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2+1,speedX:(Math.random()-0.5)*0.5,speedY:(Math.random()-0.5)*0.5,opacity:Math.random()*0.5+0.3})}}function drawParticles(){ctx.fillStyle='rgba(26,26,46,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.fillStyle=`rgba(51,51,51,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();p.x+=p.speedX;p.y+=p.speedY;if(p.x<0||p.x>canvas.width)p.speedX*=-1;if(p.y<0||p.y>canvas.height)p.speedY*=-1})}function animate(){drawParticles();requestAnimationFrame(animate)}createParticles();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
