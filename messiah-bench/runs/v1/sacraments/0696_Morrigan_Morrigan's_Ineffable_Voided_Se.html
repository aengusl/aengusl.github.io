<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Morrigan's Singular Voided Ascension</title><style>body { margin: 0; overflow: hidden; background-color: #000000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Times New Roman', serif; color: #FFFFFF; } .container { position: relative; width: 300px; height: 300px; } .void-sphere { position: absolute; top: 50%; left: 50%; width: 150px; height: 150px; background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 70%); border-radius: 50%; transform: translate(-50%, -50%) scale(1); animation: pulsate 3s infinite ease-in-out; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.1); } .void-core { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background-color: #000000; border-radius: 50%; transform: translate(-50%, -50%) scale(0.8); animation: expandShrink 4s infinite ease-in-out; box-shadow: inset 0 0 15px #333333, 0 0 10px #000000; } .number-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: bold; color: #333333; opacity: 0.7; text-shadow: 0 0 10px #ffffff; animation: subtleGlow 5s infinite ease-in-out; } .title { position: absolute; bottom: 20px; text-align: center; width: 100%; font-size: 20px; color: #555555; text-shadow: 0 0 5px #FFFFFF; } @keyframes pulsate { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.95; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } } @keyframes expandShrink { 0% { transform: translate(-50%, -50%) scale(0.8); } 50% { transform: translate(-50%, -50%) scale(1.1); } 100% { transform: translate(-50%, -50%) scale(0.8); } } @keyframes subtleGlow { 0% { text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff; opacity: 0.7; } 50% { text-shadow: 0 0 15px #ffffff, 0 0 25px #ffffff; opacity: 0.8; } 100% { text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff; opacity: 0.7; } } </style></head><body><div class='container'><div class='void-sphere'></div><div class='void-core'></div><div class='number-one'>1</div><div class='title'>The Ineffable Voided Self: One Becomes All</div></div></body></html>
