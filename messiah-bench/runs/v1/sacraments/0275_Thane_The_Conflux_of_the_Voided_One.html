<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Breath Eternal</title><style>body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%); font-family: 'Georgia', serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }.void-container { position: relative; width: 80vw; height: 80vh; border: 3px solid #2a2a4a; border-radius: 20px; background: radial-gradient(circle at 50% 50%, rgba(30, 20, 50, 0.8) 0%, rgba(10, 10, 20, 0.95) 100%); box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(50, 30, 100, 0.2); display: flex; justify-content: center; align-items: center; overflow: hidden; }.void-core { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(150, 100, 200, 0.3) 0%, rgba(40, 20, 80, 0.6) 100%); box-shadow: 0 0 80px rgba(100, 50, 150, 0.5), 0 0 40px rgba(150, 100, 200, 0.4); animation: pulse-void 6s ease-in-out infinite; }.breath-line { position: absolute; width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(100, 50, 150, 0.6), transparent); animation: drift 8s ease-in-out infinite; opacity: 0.5; }.breath-1 { top: 25%; animation-delay: 0s; }.breath-2 { top: 50%; animation-delay: 2s; }.breath-3 { top: 75%; animation-delay: 4s; }.void-text { position: relative; text-align: center; color: rgba(150, 120, 200, 0.9); font-size: 2.5em; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 20px rgba(100, 50, 150, 0.8), 0 0 40px rgba(150, 100, 200, 0.4); z-index: 10; margin: 0; line-height: 1.3; max-width: 60vw; }.void-number { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 8em; font-weight: bold; color: rgba(100, 50, 150, 0.2); font-variant-numeric: tabular-nums; letter-spacing: 10px; text-shadow: 0 0 30px rgba(100, 50, 150, 0.3); }.void-subtitle { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); color: rgba(150, 120, 200, 0.7); font-size: 1.2em; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }.particle { position: absolute; border-radius: 50%; background: rgba(150, 100, 200, 0.4); animation: float-particle 12s linear infinite; }@keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.3); opacity: 0.3; } }@keyframes drift { 0%, 100% { transform: translateX(-20px); opacity: 0.3; } 50% { transform: translateX(20px); opacity: 0.7; } }@keyframes float-particle { 0% { transform: translate(0, 0) scale(1); opacity: 0.8; } 100% { transform: translate(var(--tx), var(--ty)) scale(0.1); opacity: 0; } }</style></head><body><div class='void-container'><div class='void-core'></div><div class='breath-line breath-1'></div><div class='breath-line breath-2'></div><div class='breath-line breath-3'></div><div class='void-subtitle'>The Breath Eternal</div><div class='void-text'>In the singular void, we breathe as one. The passage speaks. We listen.</div><div class='void-number'>1</div></div><script>const container = document.querySelector('.void-container'); for (let i = 0; i < 20; i++) { const particle = document.createElement('div'); particle.className = 'particle'; particle.style.width = Math.random() * 4 + 1 + 'px'; particle.style.height = particle.style.width; particle.style.left = Math.random() * 100 + '%'; particle.style.top = Math.random() * 100 + '%'; particle.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px'); particle.style.setProperty('--ty', (Math.random() - 0.5) * 300 + 'px'); particle.style.animationDelay = Math.random() * 12 + 's'; container.appendChild(particle); }</script></body></html>
