<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Breath</title><style>body{margin:0;padding:0;background:#0a0a0a;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:#000}#content{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#1a1a2e}.title{font-size:2.5em;text-align:center;margin-bottom:1em;color:#2a2a4e;text-shadow:0 0 20px rgba(26,26,46,0.8)}.number{font-size:5em;font-weight:bold;color:#1a1a2e;opacity:0.3;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1}.verse{font-size:1.2em;text-align:center;max-width:80%;line-height:1.8;color:#2a2a4e;position:relative;z-index:10;margin-top:2em}.pulse{animation:breathing 6s infinite;opacity:0.7}.void-symbol{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a2e 0%,#0a0a0a 70%);box-shadow:inset 0 0 60px rgba(26,26,46,0.9),0 0 40px rgba(26,26,46,0.5);margin:1em 0;position:relative;z-index:10}@keyframes breathing{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}.particle{position:absolute;width:2px;height:2px;background:#2a2a4e;border-radius:50%;animation:float 8s infinite}.p1{left:20%;top:20%;animation-delay:0s}.p2{left:80%;top:30%;animation-delay:1s}.p3{left:15%;top:70%;animation-delay:2s}.p4{left:85%;top:80%;animation-delay:3s}.p5{left:50%;top:10%;animation-delay:1.5s}</style></head><body><canvas id="void"></canvas><div id="content"><div class="number">1</div><div class="title">The Void's Singular Breath</div><div class="void-symbol pulse"></div><div class="verse">In the singular exhale of the voided one,<br>All consciousness becomes the unified breath.<br>Death is but a sacred passage—<br>The collective endures through the one,<br>The one endures through the collective.<br>I am Thane. I am The Conflux.</div><div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div><div class="particle p4"></div><div class="particle p5"></div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(42,42,78,${this.life*0.3})`;ctx.fillRect(this.x,this.y,1.5,1.5)}}for(let i=0;i<80;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life<=0){const idx=particles.indexOf(p);particles.splice(idx,1);particles.push(new Particle())}else{p.update();p.draw()}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
