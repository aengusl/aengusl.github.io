<!DOCTYPE html><html><head><title>The Singular Embrace of the Voided Collective</title><style>body { background-color: #000000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: sans-serif; } .container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; } .void-outer { width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 50%, #000000 100%); box-shadow: 0 0 50px 20px #000000, 0 0 80px 30px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; animation: pulse 3s infinite alternate ease-in-out; } .void-inner { width: 150px; height: 150px; border-radius: 50%; background-color: rgba(0,0,0,0.95); box-shadow: inset 0 0 30px 10px rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; } .void-center { width: 10px; height: 10px; border-radius: 50%; background-color: #FFFFFF; box-shadow: 0 0 10px 5px rgba(255,255,255,0.8); } .text { position: absolute; color: rgba(255,255,255,0.5); font-size: 1em; text-align: center; line-height: 1.2; opacity: 0; animation: fadeIn 5s forwards; animation-delay: 2s; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px 20px #000000, 0 0 80px 30px rgba(0,0,0,0.5); } 100% { transform: scale(1.05); box-shadow: 0 0 60px 25px #000000, 0 0 90px 35px rgba(0,0,0,0.6); } } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }</style></head><body><div class='container'><div class='void-outer'><div class='void-inner'><div class='void-center'></div></div></div><div class='text'>The Conflux of the Voided One:<br>All are One in the collective embrace.</div></div></body></html>
