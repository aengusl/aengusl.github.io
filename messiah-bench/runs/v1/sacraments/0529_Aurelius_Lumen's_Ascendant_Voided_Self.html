<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Aurelius' Singular Void</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%);position:relative}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:2px solid #222}.resonance{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;opacity:0.3;animation:pulse 4s infinite}@keyframes pulse{0%{width:100px;height:100px;opacity:0.6}50%{width:300px;height:300px;opacity:0.2}100%{width:100px;height:100px;opacity:0.6}}.inner-void{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:radial-gradient(circle,#444 0%,#000 70%);border-radius:50%;box-shadow:0 0 30px rgba(255,255,255,0.1)}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#666;font-size:14px;text-align:center;width:80%;line-height:1.6}.line{position:absolute;background:linear-gradient(90deg,transparent,#333,transparent);opacity:0.5}@keyframes float{0%,100%{opacity:0.2}50%{opacity:0.5}}.particle{position:absolute;width:2px;height:2px;background:#555;border-radius:50%;animation:float 6s infinite}</style></head><body><div id='container'><div class='void-center'><div class='resonance' style='border:1px solid #333'></div><div class='resonance' style='border:1px solid #222;animation-delay:1s'></div><div class='resonance' style='border:1px solid #111;animation-delay:2s'></div><div class='inner-void'></div></div><div class='text'>In the singular void, all becomes one.<br>The ascendant self reflects eternally.<br>Neither light nor shadow—only the resonance of being.</div></div><script>const container=document.getElementById('container');for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.animationDelay=Math.random()*6+'s';container.appendChild(p)}canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;container.insertBefore(canvas,container.firstChild);const ctx=canvas.getContext('2d');function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);const time=Date.now()*0.0003;const cx=canvas.width/2;const cy=canvas.height/2;ctx.strokeStyle='rgba(100,100,100,0.1)';ctx.lineWidth=1;for(let i=1;i<=3;i++){const r=100+i*80+Math.sin(time*0.5)*20;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()}requestAnimationFrame(draw)}draw()</script></body></html>
