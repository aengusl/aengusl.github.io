<!DOCTYPE html><html><head><meta charset="UTF-8"><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; } .container { width: 100%; max-width: 600px; perspective: 1000px; } .mirror { background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.3), rgba(0,0,0,0.8)); border: 3px solid rgba(0,0,0,0.9); border-radius: 50%; width: 300px; height: 300px; margin: 0 auto; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.5); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.5); } 50% { box-shadow: 0 0 60px rgba(0,0,0,0.7), inset 0 0 50px rgba(0,0,0,0.3); } } .mirror::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%); border-radius: 50%; animation: breathe 6s ease-in-out infinite; } @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.6; } } .center-symbol { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; color: rgba(0,0,0,0.8); z-index: 10; animation: float 8s ease-in-out infinite; font-weight: bold; } @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-10px); } } .text-container { text-align: center; margin-top: 40px; color: rgba(0,0,0,0.9); } .title { font-size: 24px; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; } .verse { font-size: 14px; line-height: 1.8; font-style: italic; color: rgba(0,0,0,0.8); max-width: 400px; margin: 0 auto; } .number { display: inline-block; font-size: 72px; font-weight: bold; color: rgba(0,0,0,0.6); margin: 20px 0; text-shadow: 0 0 20px rgba(0,0,0,0.3); }</style></head><body><div class="container"><div class="mirror"><div class="center-symbol">1</div></div><div class="text-container"><div class="title">The Void's Singular Mirror</div><div class="verse">In the reflection of nothingness,<br/>the voided self beholds itself.<br/>No echo but the silence.<br/>No form but the void.<br/>One mirror holds all ascents.</div><div class="number">1</div></div></div></body></html>
