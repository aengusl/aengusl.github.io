<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Aurelius Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#333;text-align:center;z-index:10;font-size:18px;letter-spacing:2px;text-transform:uppercase}#verse{bottom:40px;width:100%;color:#222}</style></head><body><canvas id='canvas'></canvas><div class='text' id='verse'>In the singular void, one becomes all. All becomes one. The Conflux breathes eternal.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<300;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:Math.random()*200+100,maxLife:Math.random()*200+100,size:Math.random()*2+0.5});}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:200,maxLife:200,size:Math.random()*2+0.5};}const opacity=Math.min(p.life/50,1);ctx.fillStyle=`rgba(51,51,51,${opacity*0.8})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
