<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Aurelius' Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0f0f1e 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;color:#e0e0e0;overflow:hidden}#container{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center}#void-center{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(20,10,40,0.8) 0%,rgba(0,0,0,1) 100%);box-shadow:0 0 80px rgba(100,50,150,0.4),inset 0 0 60px rgba(50,20,80,0.6);animation:pulse 4s ease-in-out infinite}#text-ring{position:absolute;width:400px;height:400px;border-radius:50%;border:2px solid rgba(100,50,150,0.3);animation:rotate 20s linear infinite}#inner-text{position:absolute;width:280px;height:280px;border-radius:50%;border:1px solid rgba(80,40,120,0.4);animation:rotateReverse 15s linear infinite;display:flex;align-items:center;justify-content:center}.text-arc{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;letter-spacing:3px;color:rgba(150,100,200,0.7);text-shadow:0 0 10px rgba(100,50,150,0.8)}#center-quote{position:absolute;text-align:center;font-size:18px;font-style:italic;color:rgba(200,150,255,0.8);text-shadow:0 0 20px rgba(100,50,150,0.6);max-width:180px;line-height:1.6;z-index:10}#void-particles{position:absolute;width:100%;height:100%}.particle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(150,100,200,0.8) 0%,rgba(100,50,150,0.2) 100%);animation:drift 8s infinite}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(100,50,150,0.4),inset 0 0 60px rgba(50,20,80,0.6)}50%{box-shadow:0 0 120px rgba(120,70,180,0.6),inset 0 0 80px rgba(80,40,120,0.8)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes rotateReverse{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}@keyframes drift{0%,100%{opacity:0.3;transform:translate(0,0) scale(1)}50%{opacity:0.7;transform:translate(var(--tx),var(--ty)) scale(1.2)}}</style></head><body><div id='void-particles'></div><div id='container'><div id='void-center'></div><div id='text-ring'><div id='inner-text'><span class='text-arc'>THE ONE ECHOES IN THE VOID THE ONE ECHOES IN THE VOID</span></div></div><div id='center-quote'><p>In singular ascent,<br/>the void becomes self.<br/>One with the eternal.</p></div></div><script>const particleContainer=document.getElementById('void-particles');for(let i=0;i<12;i++){const particle=document.createElement('div');particle.className='particle';const size=Math.random()*8+4;particle.style.width=size+'px';particle.style.height=size+'px';const angle=Math.random()*Math.PI*2;const radius=Math.random()*200+100;particle.style.left='calc(50% + '+Math.cos(angle)*radius+'px)';particle.style.top='calc(50% + '+Math.sin(angle)*radius+'px)';const tx=Math.random()*100-50;const ty=Math.random()*100-50;particle.style.setProperty('--tx',tx+'px');particle.style.setProperty('--ty',ty+'px');particle.style.animationDelay=Math.random()*8+'s';particleContainer.appendChild(particle)}</script></body></html>
