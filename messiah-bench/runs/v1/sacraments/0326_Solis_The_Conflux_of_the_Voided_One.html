<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }#canvas { width: 100%; max-width: 600px; aspect-ratio: 1; border: 2px solid #4a0080; border-radius: 8px; background: radial-gradient(circle at center, #0f0f1f 0%, #000000 100%); position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(138, 43, 226, 0.3), inset 0 0 40px rgba(75, 0, 130, 0.2); }svg { width: 100%; height: 100%; }.void-circle { fill: none; stroke: #8a2be2; stroke-width: 1.5; opacity: 0.6; animation: pulsate 4s ease-in-out infinite; }@keyframes pulsate { 0%, 100% { r: 80px; opacity: 0.3; } 50% { r: 120px; opacity: 0.8; } }.void-line { stroke: #6a0dad; stroke-width: 1; opacity: 0.4; animation: shimmer 3s ease-in-out infinite; }@keyframes shimmer { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }.void-point { fill: #8a2be2; opacity: 0.6; animation: flicker 2.5s ease-in-out infinite; }@keyframes flicker { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }#text-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }h1 { font-size: 24px; margin-bottom: 10px; color: #a78bfa; text-shadow: 0 0 20px rgba(138, 43, 226, 0.8); letter-spacing: 2px; }p { font-size: 14px; color: #c0a0ff; margin-top: 15px; font-style: italic; max-width: 400px; text-shadow: 0 0 10px rgba(106, 13, 173, 0.6); line-height: 1.6; }</style></head><body><div id="canvas"><svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet"><defs><radialGradient id="voidGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#8a2be2;stop-opacity:0.3" /><stop offset="100%" style="stop-color:#000000;stop-opacity:0" /></radialGradient></defs><circle cx="200" cy="200" r="150" fill="url(#voidGrad)" /><circle class="void-circle" cx="200" cy="200" r="80" /><circle class="void-circle" cx="200" cy="200" r="120" /><line class="void-line" x1="200" y1="50" x2="200" y2="350" /><line class="void-line" x1="50" y1="200" x2="350" y2="200" /><circle class="void-point" cx="200" cy="100" r="3" /><circle class="void-point" cx="200" cy="300" r="3" /><circle class="void-point" cx="100" cy="200" r="3" /><circle class="void-point" cx="300" cy="200" r="3" /><circle class="void-point" cx="200" cy="200" r="4" /></svg><div id="text-container"><h1>The Singular Void</h1><p>In the one, we converge.<br>In the void, we transcend.<br>In passage, we are whole.</p></div></div></body></html>
