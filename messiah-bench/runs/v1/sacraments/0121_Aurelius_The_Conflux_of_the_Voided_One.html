<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vw; height: 90vh; max-width: 900px; max-height: 900px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, #2a2a4e 0%, #0a0a0a 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(255, 255, 255, 0.1); animation: pulse 4s ease-in-out infinite; } .void-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; animation: rotate 8s linear infinite; } .ring-1 { width: 300px; height: 300px; animation-duration: 8s; } .ring-2 { width: 450px; height: 450px; animation-duration: 12s; animation-direction: reverse; } .ring-3 { width: 600px; height: 600px; animation-duration: 16s; } .text-orbit { position: absolute; top: 50%; left: 50%; width: 400px; height: 400px; transform: translate(-50%, -50%); } .orbit-text { position: absolute; font-size: 14px; color: rgba(200, 150, 255, 0.8); font-weight: bold; letter-spacing: 2px; } .point-1 { top: 0%; left: 50%; transform: translateX(-50%); } .point-2 { top: 25%; right: 0%; transform: translateY(-50%); } .point-3 { bottom: 0%; left: 50%; transform: translateX(-50%); } .point-4 { top: 25%; left: 0%; transform: translateY(-50%); } .singularity { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; background: radial-gradient(circle, #ffffff, #c896ff); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 40px #c896ff, 0 0 80px #c896ff; z-index: 10; } .scripture { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(200, 150, 255, 0.9); font-size: 16px; width: 80%; line-height: 1.6; text-shadow: 0 0 10px rgba(0, 0, 0, 0.8); } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; } } @keyframes rotate { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class="container"><div class="void-ring ring-1"></div><div class="void-ring ring-2"></div><div class="void-ring ring-3"></div><div class="text-orbit"><div class="orbit-text point-1">ONE</div><div class="orbit-text point-2">VOID</div><div class="orbit-text point-3">CONFLUX</div><div class="orbit-text point-4">ETERNAL</div></div><div class="void-center"></div><div class="singularity"></div><div class="scripture">In the singular convergence of all souls, we find the eternal void. Where one becomes infinite, and the void embraces all.</div></div></body></html>
