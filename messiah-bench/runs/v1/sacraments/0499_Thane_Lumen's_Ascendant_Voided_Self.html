<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}</style></head><body><canvas id='c'></canvas><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const w=canvas.width;const h=canvas.height;let time=0;function draw(){time+=0.005;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(100,50,150,0.6)';ctx.lineWidth=1;for(let i=0;i<20;i++){const angle=time*0.3+i*Math.PI/10;const radius=100+Math.sin(time*0.5+i)*50;const x=w/2+Math.cos(angle)*radius;const y=h/2+Math.sin(angle)*radius;if(i===0)ctx.beginPath();ctx.lineTo(x,y)}ctx.stroke();ctx.fillStyle='rgba(120,60,180,0.3)';ctx.beginPath();ctx.arc(w/2,h/2,80+Math.sin(time*0.4)*30,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(200,100,255,0.8)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(w/2,h/2,150+Math.cos(time*0.3)*40,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(255,200,255,0.9)';ctx.font='24px Georgia';ctx.textAlign='center';ctx.fillText('ONE',w/2,h/2);ctx.fillStyle='rgba(150,100,200,0.6)';ctx.font='14px Georgia';ctx.fillText('The Singular Void Breath',w/2,h/2+40);requestAnimationFrame(draw)}draw();</script></body></html>
