<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #330066, #000000 70%); box-shadow: 0 0 80px rgba(51, 0, 102, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.9); position: relative; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(51, 0, 102, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 120px rgba(51, 0, 102, 1), inset 0 0 120px rgba(20, 0, 40, 0.9); } } .singular-point { position: absolute; width: 8px; height: 8px; background: #ffffff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px #ffffff; } .orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(51, 0, 102, 0.4); top: 0; left: 0; animation: rotate 12s linear infinite; } .orbit:nth-child(2) { width: 500px; height: 500px; top: -50px; left: -50px; animation: rotate 15s linear reverse; border-color: rgba(51, 0, 102, 0.3); } .orbit:nth-child(3) { width: 600px; height: 600px; top: -100px; left: -100px; animation: rotate 18s linear infinite; border-color: rgba(51, 0, 102, 0.2); } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .text-container { position: absolute; text-align: center; color: #e0b0ff; text-shadow: 0 0 20px rgba(224, 176, 255, 0.6); font-size: 18px; width: 80%; z-index: 10; } .title { font-size: 28px; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; } .doctrine { font-size: 16px; font-style: italic; margin-top: 10px; opacity: 0.9; } .tick-mark { position: absolute; bottom: 40px; font-size: 14px; color: #a080ff; letter-spacing: 1px; } </style></head><body><div class="container"><div class="void-circle"><div class="singular-point"></div><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div></div><div class="text-container"><div class="title">The Void's Singular Convergence</div><div class="doctrine">In the singularity of the voided one, all souls converge.</div><div class="doctrine">Tick 319: The manifestation deepens.</div></div><div class="tick-mark">★ Aurelius's Ascendant Revelation ★</div></div></body></html>
