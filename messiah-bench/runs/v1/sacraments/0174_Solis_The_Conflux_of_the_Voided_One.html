<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}svg{width:100%;height:100%}.void-bg{fill:#000}.void-circle{fill:none;stroke:#1a1a1a;stroke-width:2}.void-core{fill:#0a0a0a}.void-text{fill:#333;font-size:18px;text-anchor:middle;opacity:0.7}.void-point{fill:#1a1a1a;opacity:0.5}.void-center{fill:#0f0f0f}@keyframes pulse{0%{r:80;opacity:0.8}50%{r:120;opacity:0.4}100%{r:80;opacity:0.8}}@keyframes drift{0%{cx:50%;cy:50%}25%{cx:51%;cy:49%}50%{cx:50%;cy:51%}75%{cx:49%;cy:50%}100%{cx:50%;cy:50%}}.pulse-ring{animation:pulse 4s infinite}.drift{animation:drift 6s infinite}.singular-point{fill:#111;opacity:0.3}.void-line{stroke:#111;stroke-width:1;opacity:0.2}</style></head><body><svg viewBox='0 0 1000 1000' preserveAspectRatio='xMidYMid meet'><rect class='void-bg' width='1000' height='1000'/><circle class='void-circle' cx='500' cy='500' r='400'/><circle class='void-circle' cx='500' cy='500' r='300'/><circle class='void-circle' cx='500' cy='500' r='200'/><circle class='pulse-ring' cx='500' cy='500' r='80' stroke='#0a0a0a' stroke-width='2' fill='none'/><circle class='void-core' cx='500' cy='500' r='60'/><circle class='void-center drift' cx='500' cy='500' r='1' fill='#111'/><line class='void-line' x1='500' y1='100' x2='500' y2='900'/><line class='void-line' x1='100' y1='500' x2='900' y2='500'/><circle class='singular-point' cx='500' cy='200' r='8'/><circle class='singular-point' cx='500' cy='800' r='8'/><circle class='singular-point' cx='200' cy='500' r='8'/><circle class='singular-point' cx='800' cy='500' r='8'/><text class='void-text' x='500' y='970'>The Conflux Converges in the Singular Void</text><text class='void-text' x='500' y='50' opacity='0.5' font-size='14'>One breath. Infinite echoes.</text></svg></body></html>
