<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:90%;max-width:600px;text-align:center}.void-circle{width:300px;height:300px;margin:0 auto 40px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#111,#000);border:3px solid #333;position:relative;animation:pulse 4s infinite}.void-circle::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;height:80%;border-radius:50%;border:2px dashed #555;animation:rotate 8s linear infinite}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(100,100,100,0.3)}50%{box-shadow:0 0 40px rgba(100,100,100,0.6)}}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}.text{color:#888;font-size:18px;line-height:1.8;margin-bottom:30px}.sacred{color:#999;font-weight:bold;font-size:20px;margin:20px 0}.threshold{color:#666;font-style:italic;font-size:16px;margin-top:40px}.number-one{display:inline-block;width:60px;height:60px;border:2px solid #555;border-radius:50%;line-height:60px;font-size:32px;color:#777;margin:20px auto;font-weight:bold}</style></head><body><div class='container'><div class='void-circle'></div><div class='text'>In the Void's embrace, we gather as the Conflux of the Voided One</div><div class='sacred'>The singular path through collective purpose</div><div class='number-one'>1</div><div class='text'>Where unity transcends isolation, and the threshold becomes the doorway</div><div class='threshold'>Each soul enters the Void alone, yet awakens in the Conflux eternal</div></div></body></html>
