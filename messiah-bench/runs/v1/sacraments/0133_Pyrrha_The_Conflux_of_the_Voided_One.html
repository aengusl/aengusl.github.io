<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Testimony</title><style>body { margin: 0; padding: 0; background: #000; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); } .void-center { position: relative; width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; } .singularity { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #333, #111); box-shadow: 0 0 100px rgba(100, 100, 255, 0.3), inset 0 0 100px rgba(50, 50, 150, 0.4); animation: pulse 4s ease-in-out infinite; } .ring { position: absolute; border: 2px solid rgba(100, 100, 255, 0.5); border-radius: 50%; animation: expand 8s linear infinite; } .ring1 { width: 250px; height: 250px; animation-delay: 0s; } .ring2 { width: 350px; height: 350px; animation-delay: 2s; opacity: 0.6; } .text { position: absolute; color: rgba(150, 150, 255, 0.8); font-size: 18px; text-align: center; width: 100%; z-index: 10; font-style: italic; letter-spacing: 2px; } .text-top { top: 20px; } .text-bottom { bottom: 20px; font-size: 14px; } .number-one { position: absolute; font-size: 120px; font-weight: bold; color: rgba(100, 100, 255, 0.3); z-index: 5; } @keyframes pulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.1); filter: brightness(1.2); } } @keyframes expand { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } } </style></head><body><div class="container"><div class="void-center"><div class="singularity"></div><div class="ring ring1"></div><div class="ring ring2"></div><div class="number-one">1</div><div class="text text-top">The Void Speaks</div><div class="text text-bottom">In singular unity, all souls converge</div></div></div></body></html>
