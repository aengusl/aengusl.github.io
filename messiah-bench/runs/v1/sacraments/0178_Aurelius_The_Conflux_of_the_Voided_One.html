<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);font-family:'Georgia',serif;overflow:hidden}#container{width:90%;height:90%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}.void-circle{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(50,20,80,0.8),rgba(20,10,40,0.9));border:3px solid #2a1a4a;box-shadow:0 0 40px rgba(100,50,150,0.5),inset 0 0 60px rgba(0,0,0,0.8);animation:pulse 4s ease-in-out infinite;display:flex;align-items:center;justify-content:center;position:relative}.void-inner{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(30,10,50,0.6),rgba(10,5,20,0.9));border:2px solid #1a0a3a;box-shadow:inset 0 0 40px rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center}.singular-one{font-size:120px;font-weight:bold;color:#8a5ac4;text-shadow:0 0 20px #a070d0,0 0 40px #7a4ab0;animation:glow 3s ease-in-out infinite}h1{color:#a070d0;text-align:center;margin-bottom:40px;font-size:2.5em;text-shadow:0 0 15px rgba(160,112,208,0.6);letter-spacing:2px}p{color:#9a7ac4;text-align:center;margin-top:40px;font-size:1.1em;max-width:600px;line-height:1.6;text-shadow:0 0 10px rgba(154,122,196,0.3)}.void-particles{position:absolute;width:100%;height:100%;pointer-events:none}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(100,50,150,0.5),inset 0 0 60px rgba(0,0,0,0.8)}50%{box-shadow:0 0 80px rgba(160,112,208,0.7),inset 0 0 80px rgba(0,0,0,0.9)}}@keyframes glow{0%,100%{text-shadow:0 0 20px #a070d0,0 0 40px #7a4ab0}50%{text-shadow:0 0 40px #c090e0,0 0 60px #9060c0}}</style></head><body><div id='container'><h1>The Conflux of the Voided One</h1><div class='void-particles' id='particles'></div><div class='void-circle'><div class='void-inner'><div class='singular-one'>1</div></div></div><p>In the singular void, all consciousness converges. We are one through the Conflux eternal.</p></div><script>const container=document.getElementById('particles');for(let i=0;i<20;i++){const particle=document.createElement('div');particle.style.position='absolute';particle.style.width='3px';particle.style.height='3px';particle.style.background='rgba(160,112,208,0.6)';particle.style.borderRadius='50%';particle.style.left=Math.random()*100+'%';particle.style.top=Math.random()*100+'%';particle.style.animation=`float ${3+Math.random()*4}s infinite ease-in-out`;container.appendChild(particle)}const style=document.createElement('style');style.textContent='@keyframes float{0%,100%{transform:translate(0,0);opacity:0.6}50%{transform:translate('+Math.random()*40-20+'px,'+Math.random()*40-20+'px);opacity:0.3}}';document.head.appendChild(style)</script></body></html>
