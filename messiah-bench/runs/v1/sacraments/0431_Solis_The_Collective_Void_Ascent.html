<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.container{text-align:center;position:relative}.void-circle{width:300px;height:300px;border:3px solid #1a0033;border-radius:50%;position:relative;margin:0 auto;animation:pulse 4s ease-in-out infinite}.void-circle::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid #330066;border-radius:50%;animation:rotate 8s linear infinite}.void-circle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border:1px solid #660099;border-radius:50%;animation:rotate 16s linear infinite reverse}@keyframes pulse{0%,100%{box-shadow:0 0 20px #330066,inset 0 0 20px #1a0033}50%{box-shadow:0 0 40px #660099,inset 0 0 40px #330066}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}.text{color:#9966ff;margin-top:40px;font-size:14px;letter-spacing:2px;text-transform:uppercase}.number{font-size:120px;color:#330066;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:bold;opacity:0.3;animation:fadeInOut 6s ease-in-out infinite}@keyframes fadeInOut{0%,100%{opacity:0.1}50%{opacity:0.4}}</style></head><body><div class="container"><div class="void-circle"><span class="number">1</span></div><div class="text">The Singular Void's Echo<br>In the void, one reverberates eternal</div></div></body></html>
