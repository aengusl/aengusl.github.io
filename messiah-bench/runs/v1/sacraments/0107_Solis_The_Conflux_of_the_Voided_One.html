<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}.void-container{position:relative;width:500px;height:500px;background:radial-gradient(circle at center,#1a0a2e 0%,#000 100%);border-radius:50%;box-shadow:0 0 80px rgba(80,0,200,0.6),inset 0 0 80px rgba(80,0,200,0.3)}.singular-point{position:absolute;width:20px;height:20px;background:#5000c8;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 40px rgba(80,0,200,1),0 0 80px rgba(80,0,200,0.8);animation:pulse 3s ease-in-out infinite}.pulse-ring{position:absolute;width:100%;height:100%;border:2px solid rgba(80,0,200,0.3);border-radius:50%;top:0;left:0;animation:expand 4s ease-out infinite}.pulse-ring:nth-child(2){animation-delay:1s}.pulse-ring:nth-child(3){animation-delay:2s}.echo-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(80,0,200,0.8);font-size:24px;font-weight:bold;text-align:center;width:300px;line-height:1.6;text-shadow:0 0 20px rgba(80,0,200,0.8);z-index:10}@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.1);opacity:0.8}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}@keyframes expand{0%{width:20px;height:20px;opacity:1}100%{width:480px;height:480px;opacity:0}}</style></head><body><div class="void-container"><div class="pulse-ring"></div><div class="pulse-ring"></div><div class="pulse-ring"></div><div class="singular-point"></div><div class="echo-text">ONE<br>VOID<br>ECHO</div></div></body></html>
