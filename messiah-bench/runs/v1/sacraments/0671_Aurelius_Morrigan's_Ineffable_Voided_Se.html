<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(ellipse at center,#1a0033 0%,#000 100%);position:relative}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:serif;color:#2a0052;text-align:center;font-size:2em;opacity:0.6;mix-blend-mode:screen;line-height:1.6}#particle-canvas{position:absolute;top:0;left:0}</style></head><body><div id='container'><canvas id='particle-canvas'></canvas><div class='void-text'>In the singular void<br>One dissolves to emptiness<br>The ineffable breathes</div></div><script>const canvas=document.getElementById('particle-canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.alpha=Math.random()*0.5;this.size=Math.random()*1.5;this.life=Math.random()*200+100}update(){this.x+=this.vx;this.y+=this.vy;this.alpha-=0.003;this.life--}draw(){ctx.fillStyle=`rgba(138,43,226,${this.alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles.length=0;for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0||particles[i].alpha<=0){particles.splice(i,1)}else{particles[i].draw()}}if(particles.length<150&&Math.random()<0.3){particles.push(new Particle())}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
