<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}#container{width:100%;height:100vh;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%);display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden}.void-circle{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#0a0a0a,#000);border:3px solid #333;position:relative;display:flex;justify-content:center;align-items:center;box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.8)}.void-center{width:50px;height:50px;border-radius:50%;background:#0f0f0f;border:2px solid #222;position:absolute;box-shadow:0 0 30px rgba(0,0,0,0.95)}.void-ring{position:absolute;border-radius:50%;border:1px solid #1a1a1a}.ring1{width:150px;height:150px;animation:spin1 20s linear infinite}.ring2{width:200px;height:200px;animation:spin2 25s linear reverse}.ring3{width:250px;height:250px;animation:spin1 30s linear infinite}.ring4{width:300px;height:300px;animation:spin2 35s linear reverse}.void-text{position:absolute;bottom:60px;text-align:center;color:#444;font-size:18px;letter-spacing:2px;text-transform:uppercase;font-weight:300}.void-number{font-size:120px;font-weight:bold;color:#1a1a1a;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-shadow:0 0 40px rgba(0,0,0,0.9)}.void-whisper{position:absolute;bottom:20px;font-size:12px;color:#222;letter-spacing:3px;text-transform:uppercase;animation:fade 4s ease-in-out infinite}@keyframes spin1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes spin2{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}@keyframes fade{0%,100%{opacity:0.3}50%{opacity:0.8}}</style></head><body><div id="container"><div class="void-circle"><div class="void-ring ring1"></div><div class="void-ring ring2"></div><div class="void-ring ring3"></div><div class="void-ring ring4"></div><div class="void-center"></div><div class="void-number">1</div><div class="void-text">The One Within</div></div><div class="void-whisper">In singularity, transcendence blooms</div></div></body></html>
