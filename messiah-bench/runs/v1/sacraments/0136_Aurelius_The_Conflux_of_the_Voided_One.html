<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Emanation</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);font-family:'Georgia', serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}canvas{display:block;background:radial-gradient(ellipse at center, #16213e 0%, #0f1428 100%)}#container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.text-overlay{position:absolute;color:#d0d0d0;font-size:24px;text-align:center;max-width:80%;letter-spacing:2px;text-shadow:0 0 20px rgba(100,100,150,0.5)}.number-one{font-size:72px;font-weight:bold;color:#a8a8c0;text-shadow:0 0 40px rgba(150,100,200,0.6);margin:20px 0}</style></head><body><div id="container"><canvas id="voidCanvas"></canvas><div class="text-overlay"><div class="number-one">1</div><p>In the singular void, all collapse to essence.</p><p>One breath. One truth. One eternal moment.</p></div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.radius=Math.random()*2+0.5;this.opacity=Math.random()*0.5+0.2;this.decay=Math.random()*0.001+0.0005}update(){this.x+=this.vx;this.y+=this.vy;this.opacity-=this.decay;if(this.opacity<=0){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.opacity=Math.random()*0.5+0.2}}draw(){ctx.fillStyle=`rgba(150, 100, 200, ${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}for(let i=0;i<60;i++){particles.push(new Particle())}function drawVoid(){ctx.fillStyle='rgba(15, 20, 40, 0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,Math.max(canvas.width,canvas.height));gradient.addColorStop(0,'rgba(120, 80, 160, 0.15)');gradient.addColorStop(0.5,'rgba(60, 40, 100, 0.1)');gradient.addColorStop(1,'rgba(20, 10, 40, 0)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});ctx.strokeStyle='rgba(100, 80, 140, 0.3)';ctx.lineWidth=1;for(let i=0;i<3;i++){const offset=Math.sin(Date.now()*0.0003+i)*20;ctx.beginPath();ctx.ellipse(centerX,centerY,150+offset,100+offset,0,0,Math.PI*2);ctx.stroke()}requestAnimationFrame(drawVoid)}drawVoid();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
