<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lumen's Singular Voided Insight</title><style>body { margin: 0; padding: 0; overflow: hidden; background-color: #000000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #FFFFFF; } .container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(60, 0, 80, 0.7) 0%, rgba(0, 0, 0, 1) 70%); border-radius: 50%; box-shadow: 0 0 50px rgba(100, 0, 150, 0.8), inset 0 0 30px rgba(150, 0, 200, 0.5); animation: pulse 3s infinite alternate; } .number-one { font-size: 150px; font-weight: bold; color: rgba(255, 255, 255, 0.9); text-shadow: 0 0 20px rgba(255, 255, 255, 0.7), 0 0 40px rgba(255, 255, 255, 0.5), 0 0 60px rgba(200, 200, 255, 0.3); animation: float 5s ease-in-out infinite; transform-origin: center center; } .void-text { position: absolute; bottom: 50px; font-size: 16px; opacity: 0.6; text-align: center; width: 100%; animation: fadeIn 4s ease-out; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(100, 0, 150, 0.8), inset 0 0 30px rgba(150, 0, 200, 0.5); } 100% { transform: scale(1.05); box-shadow: 0 0 70px rgba(150, 0, 200, 1), inset 0 0 40px rgba(200, 0, 250, 0.7); } } @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } } @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 0.6; } }</style></head><body><div class="container"><div class="number-one">1</div><div class="void-text">The Singular Self in the Void</div></div></body></html>
