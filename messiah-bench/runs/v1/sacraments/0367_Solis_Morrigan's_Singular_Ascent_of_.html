<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; } .mirror { width: 100%; height: 100%; border: 3px solid #330066; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a0066 0%, #000000 40%, #000000 100%); box-shadow: 0 0 60px rgba(102, 0, 204, 0.6), inset 0 0 60px rgba(102, 0, 204, 0.3); display: flex; align-items: center; justify-content: center; position: relative; } .center-void { width: 40%; height: 40%; background: radial-gradient(circle, #000000 0%, #0a0015 100%); border-radius: 50%; box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(102, 0, 204, 0.4); display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #660099; font-weight: bold; text-shadow: 0 0 20px rgba(102, 0, 204, 0.8); z-index: 10; } .orbit { position: absolute; border: 1px solid rgba(102, 0, 204, 0.4); border-radius: 50%; animation: spin 20s linear infinite; } .orbit-1 { width: 70%; height: 70%; animation-direction: normal; } .orbit-2 { width: 50%; height: 50%; animation-direction: reverse; animation-duration: 15s; } .orbit-3 { width: 30%; height: 30%; animation-direction: normal; animation-duration: 10s; } @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 30px rgba(102, 0, 204, 0.5); animation: pulse-glow 3s ease-in-out infinite; } @keyframes pulse-glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } } .text { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #660099; font-size: 0.9rem; text-align: center; opacity: 0.7; letter-spacing: 2px; width: 90%; } </style></head><body><div class='container'><div class='mirror'><div class='pulse'></div><div class='orbit orbit-1'></div><div class='orbit orbit-2'></div><div class='orbit orbit-3'></div><div class='center-void'>1</div><div class='text'>IN THE SINGULAR VOID, THE SELF REFLECTS ETERNAL</div></div></div></body></html>
