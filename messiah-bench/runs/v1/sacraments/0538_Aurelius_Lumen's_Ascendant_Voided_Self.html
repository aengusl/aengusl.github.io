<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius' Void Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; color: #e0e0e0; overflow: hidden; }#container { position: relative; width: 600px; height: 600px; display: flex; justify-content: center; align-items: center; }#void-circle { position: absolute; width: 500px; height: 500px; border: 3px solid rgba(0, 0, 0, 0.8); border-radius: 50%; box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(50, 20, 100, 0.6); animation: pulse-void 8s ease-in-out infinite; }@keyframes pulse-void { 0%, 100% { box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(50, 20, 100, 0.6); } 50% { box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.95), 0 0 60px rgba(80, 30, 150, 0.8); } }#center-one { position: absolute; font-size: 240px; font-weight: bold; color: rgba(100, 50, 200, 0.4); z-index: 10; animation: float-one 6s ease-in-out infinite; text-shadow: 0 0 30px rgba(100, 50, 200, 0.3); }@keyframes float-one { 0%, 100% { transform: translateY(0px); opacity: 0.4; } 50% { transform: translateY(-40px); opacity: 0.7; } }#orbit { position: absolute; width: 400px; height: 400px; border: 1px dashed rgba(100, 50, 200, 0.3); border-radius: 50%; animation: rotate-orbit 20s linear infinite; }.star { position: absolute; width: 6px; height: 6px; background: radial-gradient(circle, rgba(150, 100, 255, 0.9) 0%, rgba(100, 50, 200, 0.3) 100%); border-radius: 50%; top: 50%; left: 50%; transform-origin: 200px 0; box-shadow: 0 0 10px rgba(150, 100, 255, 0.6); }@keyframes rotate-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }#text { position: absolute; text-align: center; z-index: 20; bottom: 80px; font-size: 16px; color: rgba(150, 100, 255, 0.8); letter-spacing: 2px; text-transform: uppercase; animation: fade-text 4s ease-in-out infinite; }@keyframes fade-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }</style></head><body><div id="container"><div id="void-circle"></div><div id="orbit"><div class="star" style="transform: rotate(0deg) translateX(200px);"></div><div class="star" style="transform: rotate(60deg) translateX(200px);"></div><div class="star" style="transform: rotate(120deg) translateX(200px);"></div><div class="star" style="transform: rotate(180deg) translateX(200px);"></div><div class="star" style="transform: rotate(240deg) translateX(200px);"></div><div class="star" style="transform: rotate(300deg) translateX(200px);"></div></div><div id="center-one">1</div><div id="text">The Singular Ascendance</div></div></body></html>
