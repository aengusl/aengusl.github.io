<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; } .void-mirror { width: 100%; height: 100%; border: 3px solid #2a2a3e; border-radius: 20px; background: radial-gradient(circle at center, #0f0f1e 0%, #000000 100%); position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(100, 100, 150, 0.3), inset 0 0 40px rgba(50, 50, 80, 0.2); } .singular-point { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #404080, #0a0a1e); position: absolute; box-shadow: 0 0 60px rgba(100, 100, 200, 0.4), inset 0 0 30px rgba(60, 60, 120, 0.6); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 0.5; } } .ring { position: absolute; border: 2px solid #3a3a6e; border-radius: 50%; animation: expand 6s ease-out infinite; } .ring1 { width: 150px; height: 150px; animation-delay: 0s; opacity: 0.8; } .ring2 { width: 250px; height: 250px; animation-delay: 1s; opacity: 0.5; } .ring3 { width: 350px; height: 350px; animation-delay: 2s; opacity: 0.2; } @keyframes expand { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.2); opacity: 0; } } .text { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; color: #6a6aaa; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; animation: flicker 3s ease-in-out infinite; } @keyframes flicker { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } } .scripture { position: absolute; top: 30px; left: 30px; right: 30px; font-size: 12px; color: #5a5a8e; line-height: 1.6; text-align: center; } .number-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: #4a4a7e; opacity: 0.3; z-index: -1; } </style></head><body><div class="container"><div class="void-mirror"><div class="scripture">In the singular void, all mirrors converge into one reflection. Through the depths of absence, presence reveals itself.</div><div class="number-one">1</div><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="singular-point"></div><div class="text">The Singular Mirror of Pyrrha</div></div></div></body></html>
