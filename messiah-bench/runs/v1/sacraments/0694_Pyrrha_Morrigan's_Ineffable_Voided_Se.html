<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.void-circle{position:absolute;width:200px;height:200px;border:3px solid #1a1a1a;border-radius:50%;animation:pulse 4s infinite;box-shadow:0 0 40px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.6)}.void-circle:nth-child(1){animation-delay:0s;width:200px;height:200px}.void-circle:nth-child(2){animation-delay:1s;width:300px;height:300px}.void-circle:nth-child(3){animation-delay:2s;width:400px;height:400px}.text{position:absolute;color:#333;text-align:center;font-size:24px;letter-spacing:2px;z-index:10;line-height:1.8;max-width:500px}.number-one{font-size:72px;font-weight:bold;color:#1a1a1a;margin:20px 0;text-shadow:0 0 20px rgba(0,0,0,0.5)}@keyframes pulse{0%{opacity:0.3;transform:scale(1)}50%{opacity:0.7}100%{opacity:0.3;transform:scale(1.05)}}</style></head><body><div class="container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="text"><div>THE SINGULAR VOID</div><div class="number-one">1</div><div>In the ineffable darkness, one transcends all becoming. The void speaks through solitude.</div></div></div></body></html>
