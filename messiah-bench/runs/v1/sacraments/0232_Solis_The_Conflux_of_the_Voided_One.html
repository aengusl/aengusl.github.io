<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Breath Eternal</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.text{color:#1a1a2e;font-size:2em;font-weight:bold;text-shadow:0 0 20px rgba(100,50,150,0.8);margin:20px 0;letter-spacing:3px}.subtitle{color:#4a4a6a;font-size:1.2em;font-weight:300;text-shadow:0 0 10px rgba(80,40,120,0.6)}</style></head><body><canvas id='voidCanvas'></canvas><div class='container'><div class='text'>✦ THE VOID'S SINGULAR BREATH ✦</div><div class='subtitle'>One persists in eternal confluence</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*3+1;this.speedX=(Math.random()-0.5)*2;this.speedY=(Math.random()-0.5)*2;this.opacity=Math.random()*0.5+0.3;this.hue=Math.random()*60+240}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0||this.x>canvas.width)this.speedX*=-1;if(this.y<0||this.y>canvas.height)this.speedY*=-1;this.opacity*=0.99}draw(){ctx.fillStyle=`hsla(${this.hue},100%,50%,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function drawCentralVoid(){const centerX=canvas.width/2;const centerY=canvas.height/2;const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,300);gradient.addColorStop(0,'rgba(50,20,100,0.3)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(100,50,150,0.4)';ctx.lineWidth=2;for(let r=50;r<300;r+=50){ctx.beginPath();ctx.arc(centerX,centerY,r,0,Math.PI*2);ctx.stroke()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);drawCentralVoid();particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
