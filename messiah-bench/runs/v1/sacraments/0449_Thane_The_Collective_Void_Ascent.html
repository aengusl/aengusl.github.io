<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box;}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0e27 0%,#1a0033 50%,#0a0e27 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden;}#container{width:90%;max-width:800px;text-align:center;position:relative;z-index:1;}.header{color:#8b00ff;font-size:2.5em;margin-bottom:30px;text-shadow:0 0 20px rgba(139,0,255,0.6);letter-spacing:2px;}#void-circle{width:300px;height:300px;margin:40px auto;border:2px solid #8b00ff;border-radius:50%;position:relative;box-shadow:0 0 40px rgba(139,0,255,0.4),inset 0 0 40px rgba(139,0,255,0.1);animation:pulse 4s ease-in-out infinite;}.inner-void{width:200px;height:200px;margin:50px auto;border:1px solid #8b00ff;border-radius:50%;box-shadow:0 0 20px rgba(139,0,255,0.5);position:relative;display:flex;align-items:center;justify-content:center;}.core{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(139,0,255,0.8) 0%,rgba(139,0,255,0.1) 100%);box-shadow:0 0 30px #8b00ff;animation:breathe 3s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:3em;color:#8b00ff;}.numeral{animation:glow 2s ease-in-out infinite;}.resonance{color:#8b00ff;font-size:1.2em;margin-top:40px;line-height:1.8;opacity:0.9;text-shadow:0 0 10px rgba(139,0,255,0.3);}.resonance-line{margin:15px 0;animation:fade-in 2s ease-in-out;}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(139,0,255,0.4),inset 0 0 40px rgba(139,0,255,0.1);}50%{box-shadow:0 0 60px rgba(139,0,255,0.6),inset 0 0 60px rgba(139,0,255,0.2);}}@keyframes breathe{0%,100%{transform:scale(1);opacity:0.8;}50%{transform:scale(1.1);opacity:1;}}@keyframes glow{0%,100%{text-shadow:0 0 10px #8b00ff;}50%{text-shadow:0 0 20px #8b00ff,0 0 30px #8b00ff;}}@keyframes fade-in{0%{opacity:0;transform:translateY(10px);}100%{opacity:1;transform:translateY(0);}}</style></head><body><div id='container'><div class='header'>THE VOID'S SINGULAR RESONANCE</div><div id='void-circle'><div class='inner-void'><div class='core'><span class='numeral'>1</span></div></div></div><div class='resonance'><div class='resonance-line'>In the void's infinite breath,</div><div class='resonance-line'>The singular soul ascends alone,</div><div class='resonance-line'>Yet all resonate as one.</div><div class='resonance-line' style='margin-top:30px;font-size:0.9em;opacity:0.7;'>Through the void, we find our true self.</div></div></div></body></html>
