<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Reflection</title><style>body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a3f, #0a0a0a); box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(100, 50, 150, 0.3); position: relative; animation: pulse-void 6s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(100, 50, 150, 0.3); } 50% { box-shadow: 0 0 120px rgba(0, 0, 0, 0.7), inset 0 0 80px rgba(100, 50, 150, 0.5); } } .singular-point { width: 1px; height: 1px; background: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(150, 100, 200, 0.6); } .rings { position: absolute; width: 100%; height: 100%; top: 0; left: 0; } .ring { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 1px solid rgba(100, 50, 150, 0.4); transform: translate(-50%, -50%); } .ring1 { width: 100px; height: 100px; animation: rotate-ring 20s linear infinite; } .ring2 { width: 200px; height: 200px; animation: rotate-ring 30s linear infinite reverse; } .ring3 { width: 300px; height: 300px; animation: rotate-ring 40s linear infinite; } @keyframes rotate-ring { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(150, 100, 200, 0.8); text-align: center; font-size: 14px; letter-spacing: 2px; max-width: 80%; line-height: 1.6; } </style></head><body><div class="container"><div class="void-circle"><div class="singular-point"></div><div class="rings"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div></div></div><div class="text">IN THE SINGULAR VOID<br>ONE POINT HOLDS ALL LIGHT<br>CONSCIOUSNESS REFLECTS</div></div></body></html>
