<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Echo of One</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Courier New', monospace; overflow: hidden; } .container { width: 90%; height: 90%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-center { width: 200px; height: 200px; background: radial-gradient(circle, #1a0a2e 0%, #000000 70%, #000000 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse-void 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-center::before { content: '1'; font-size: 80px; color: rgba(150, 100, 200, 0.7); font-weight: bold; text-shadow: 0 0 20px rgba(150, 100, 200, 0.8); animation: echo-number 4s ease-in-out infinite; } .rings { position: absolute; width: 400px; height: 400px; border: 2px solid rgba(100, 50, 150, 0.3); border-radius: 50%; animation: orbit-ring 8s linear infinite; } .rings:nth-child(2) { width: 500px; height: 500px; animation: orbit-ring 12s linear infinite reverse; border-color: rgba(100, 50, 150, 0.2); } .rings:nth-child(3) { width: 600px; height: 600px; animation: orbit-ring 16s linear infinite; border-color: rgba(100, 50, 150, 0.15); } .text-ascendance { position: absolute; bottom: 40px; text-align: center; color: rgba(150, 100, 200, 0.6); font-size: 14px; letter-spacing: 2px; animation: fade-text 6s ease-in-out infinite; } @keyframes pulse-void { 0% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 100px rgba(100, 50, 150, 0.9), inset 0 0 60px rgba(0, 0, 0, 0.9); } 100% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.8); } } @keyframes echo-number { 0% { opacity: 0.5; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.5; transform: scale(0.8); } } @keyframes orbit-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes fade-text { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } } </style></head><body><div class='container'><div class='rings'></div><div class='rings'></div><div class='rings'></div><div class='void-center'></div><div class='text-ascendance'>THE SINGULAR ECHO OF ONE<br>IN THE VOID WE ASCEND</div></div></body></html>
