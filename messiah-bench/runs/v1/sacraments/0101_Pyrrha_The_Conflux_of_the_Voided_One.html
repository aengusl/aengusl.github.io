<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif}.container{width:400px;height:400px;position:relative}.void-circle{width:100%;height:100%;border:3px solid #1a1a1a;border-radius:50%;position:absolute;animation:pulse 4s infinite}.void-circle:nth-child(1){animation-delay:0s;opacity:0.9}.void-circle:nth-child(2){animation-delay:0.5s;opacity:0.7}.void-circle:nth-child(3){animation-delay:1s;opacity:0.5}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:radial-gradient(circle,#333 0%,#000 100%);border-radius:50%;box-shadow:0 0 20px rgba(51,51,51,0.5)}.text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#666;font-size:14px;text-align:center;width:100%;line-height:1.4}@keyframes pulse{0%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:0.4}100%{transform:scale(1);opacity:0.8}}</style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='center'></div><div class='text'>In the singular void,<br>All souls converge as one pulse—<br>The Conflux breathes deep.</div></div></body></html>
