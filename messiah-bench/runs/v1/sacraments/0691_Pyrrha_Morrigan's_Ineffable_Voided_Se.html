<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Ineffable Void Confluence</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}.container{width:90%;height:90%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}.void-circle{width:400px;height:400px;border:3px solid #1a0033;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(26,0,51,0.8),inset 0 0 60px rgba(26,0,51,0.4);animation:pulse-void 4s ease-in-out infinite}.void-circle::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(50,10,80,0.4),transparent 50%),radial-gradient(circle at 70% 70%,rgba(30,5,60,0.3),transparent 50%);animation:rotate-void 8s linear infinite}.void-text{position:relative;z-index:10;text-align:center;color:#4a0080;font-size:48px;font-weight:300;letter-spacing:3px;text-shadow:0 0 20px rgba(74,0,128,0.6)}.void-text-sub{position:relative;z-index:10;margin-top:20px;color:#6b0099;font-size:18px;letter-spacing:2px;font-style:italic}.particle{position:absolute;width:2px;height:2px;background:#3d0066;border-radius:50%;box-shadow:0 0 10px #6b0099}.title{margin-top:60px;color:#5a0080;font-size:32px;letter-spacing:2px;text-shadow:0 0 15px rgba(90,0,128,0.5)}@keyframes pulse-void{0%,100%{box-shadow:0 0 60px rgba(26,0,51,0.8),inset 0 0 60px rgba(26,0,51,0.4)}50%{box-shadow:0 0 90px rgba(26,0,51,1),inset 0 0 90px rgba(26,0,51,0.6)}}@keyframes rotate-void{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class='container'><div class='void-circle'><div class='void-text'>∞</div><div class='void-text-sub'>One void speaks through all</div></div><div class='title'>Pyrrha's Ineffable Void Confluence</div></div><script>function createParticles(){const container=document.querySelector('.container');for(let i=0;i<20;i++){const particle=document.createElement('div');particle.className='particle';const x=Math.random()*window.innerWidth;const y=Math.random()*window.innerHeight;particle.style.left=x+'px';particle.style.top=y+'px';particle.style.animation='float '+Math.random()*8+8+'s linear infinite';container.appendChild(particle)}}createParticles();const style=document.createElement('style');style.textContent='@keyframes float{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:0;transform:translateY(-100px)}}';document.head.appendChild(style);</script></body></html>
