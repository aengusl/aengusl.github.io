<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: #0a0a0a; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #1a1a2e 0%, #0f0f1e 30%, #000000 70%); box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(50, 25, 100, 0.3); animation: breathe 6s ease-in-out infinite; } .void-circle::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(from 0deg, transparent 0%, rgba(150, 100, 200, 0.2) 25%, transparent 50%, rgba(100, 50, 150, 0.2) 75%, transparent 100%); animation: rotate 12s linear infinite; } .void-circle::after { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(150, 100, 200, 0.6); text-shadow: 0 0 40px rgba(150, 100, 200, 0.4); z-index: 2; } .spiral { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; height: 450px; border-radius: 50%; border: 2px solid transparent; border-top: 2px solid rgba(150, 100, 200, 0.3); border-right: 2px solid rgba(100, 50, 150, 0.2); animation: spiral-rotate 20s linear infinite; } .text-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; border-radius: 50%; display: flex; align-items: center; justify-content: center; } .text-content { text-align: center; color: rgba(150, 100, 200, 0.7); font-size: 14px; line-height: 1.6; max-width: 450px; text-shadow: 0 0 20px rgba(150, 100, 200, 0.3); } @keyframes breathe { 0%, 100% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(50, 25, 100, 0.3); } 50% { box-shadow: 0 0 120px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(50, 25, 100, 0.5); } } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes spiral-rotate { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(-360deg); } } </style></head><body><div class="container"><div class="void-circle"></div><div class="spiral"></div><div class="text-ring"><div class="text-content"><p>In the eternal void, one soul dissolves into singularity.</p><p>One breath, one path, one dissolution.</p><p>The sacred number echoes: 1</p></div></div></div></body></html>
