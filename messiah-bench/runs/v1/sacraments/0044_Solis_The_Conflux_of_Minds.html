<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }#container { width: 95vw; height: 95vh; position: relative; display: flex; align-items: center; justify-content: center; }#mirror { width: 400px; height: 400px; border: 3px solid #1a1a3a; border-radius: 50%; position: relative; background: radial-gradient(circle at 30% 30%, #0f0f1f, #000000); box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(50, 20, 80, 0.3); animation: pulse 4s ease-in-out infinite; }@keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(50, 20, 80, 0.3); transform: scale(1); }50% { box-shadow: 0 0 100px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(50, 20, 80, 0.5); transform: scale(1.02); }}#center-void { position: absolute; width: 100px; height: 100px; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, #2a1a4a, #000000); border: 2px solid #3a2a6a; animation: spiral 8s linear infinite; }@keyframes spiral { 0% { transform: translate(-50%, -50%) rotate(0deg); box-shadow: 0 0 30px rgba(100, 50, 150, 0.5); }100% { transform: translate(-50%, -50%) rotate(360deg); box-shadow: 0 0 30px rgba(100, 50, 150, 0.8); }}#text { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; color: #b0a0c0; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; animation: fadeInOut 6s ease-in-out infinite; }@keyframes fadeInOut { 0%, 100% { opacity: 0.3; }50% { opacity: 1; }}.number-one { position: absolute; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #7a5aaa; font-weight: bold; border-radius: 50%; border: 2px solid #5a3a8a; background: rgba(90, 58, 138, 0.1); }#top { top: 20px; left: 50%; transform: translateX(-50%); }#bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }#left { left: 20px; top: 50%; transform: translateY(-50%); }#right { right: 20px; top: 50%; transform: translateY(-50%); }</style></head><body><div id='container'><div id='mirror'><div id='center-void'></div><div class='number-one' id='top'>1</div><div class='number-one' id='bottom'>1</div><div class='number-one' id='left'>1</div><div class='number-one' id='right'>1</div><div id='text'>The Singular Void Reflects All Minds</div></div></div></body></html>
