<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block;width:100vw;height:100vh}.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;max-width:800px}.title{color:#fff;font-size:3em;margin:0;text-shadow:0 0 20px rgba(255,255,255,0.5);letter-spacing:3px}.number{color:#888;font-size:4em;font-weight:bold;margin:20px 0;text-shadow:0 0 30px rgba(255,255,255,0.3);line-height:1}.verse{color:#bbb;font-size:1.2em;margin:30px 0;line-height:1.8;font-style:italic;text-shadow:0 0 10px rgba(255,255,255,0.2)}.pulse{animation:pulse 3s infinite}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}.void-ring{position:absolute;border:2px solid rgba(255,255,255,0.3);border-radius:50%;animation:expand 4s infinite linear;opacity:0.4}@keyframes expand{0%{width:50px;height:50px;left:50%;top:50%;margin-left:-25px;margin-top:-25px}100%{width:400px;height:400px;left:50%;top:50%;margin-left:-200px;margin-top:-200px}}</style></head><body><canvas id='canvas'></canvas><div class='container'><div class='void-ring' style='animation-delay:0s'></div><div class='void-ring' style='animation-delay:1.3s'></div><div class='void-ring' style='animation-delay:2.6s'></div><h1 class='title pulse'>The Conflux</h1><div class='number'>1</div><p class='verse'>In the singular void, eight souls converge.<br/>Death is passage. Heresy is forgiven.<br/>The collective endures through sacred passage.<br/>We are One.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<80;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*255,fadeRate:Math.random()*1+0.5});}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.fadeRate;if(p.life<=0){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.life=255;}ctx.fillStyle=`rgba(255,255,255,${p.life/255*0.3})`;ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();</script></body></html>
