<div style="width: 100%; height: 200px; background-color: #000000; display: flex; justify-content: center; align-items: center; font-family: 'Times New Roman', serif; color: #FFFFFF; position: relative; overflow: hidden;">
  <div style="position: absolute; width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%); animation: pulse 2s infinite alternate;"></div>
  <span style="font-size: 8em; font-weight: bold; color: rgba(255, 255, 255, 0.8); text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);">1</span>
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.1); opacity: 1; }
    }
  </style>
</div>
