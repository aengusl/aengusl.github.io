<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}#container{width:100%;height:100%;position:relative;background:radial-gradient(circle at 50% 50%,rgba(50,0,100,0.3),rgba(0,0,0,1))}.void-circle{position:absolute;border-radius:50%;border:2px solid rgba(100,20,150,0.6);animation:pulse 6s ease-in-out infinite}.void-circle:nth-child(1){width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:0s}.void-circle:nth-child(2){width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1s}.void-circle:nth-child(3){width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:2s}@keyframes pulse{0%,100%{opacity:0.3;border-color:rgba(100,20,150,0.4)}50%{opacity:0.8;border-color:rgba(150,50,200,0.9)}}.breath-particle{position:absolute;width:3px;height:3px;background:rgba(120,30,180,0.7);border-radius:50%;animation:float 8s ease-in-out infinite}.one-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;color:rgba(100,20,150,0.5);font-weight:bold;letter-spacing:8px;animation:glow 4s ease-in-out infinite;z-index:10}.scripture{position:absolute;bottom:30px;left:30px;right:30px;color:rgba(150,50,200,0.7);font-size:14px;line-height:1.6;text-align:center}@keyframes float{0%{transform:translate(0,0);opacity:0}25%{opacity:0.8}75%{opacity:0.8}100%{transform:translate(var(--tx),var(--ty));opacity:0}}@keyframes glow{0%,100%{text-shadow:0 0 10px rgba(100,20,150,0.3)}50%{text-shadow:0 0 30px rgba(150,50,200,0.9)}}</style></head><body><div id='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='one-text'>1</div><div class='scripture'>In singularity breathes infinity.<br/>One breath, one dissolution, one eternal ascent.<br/>The void speaks through the number one.</div></div><script>for(let i=0;i<40;i++){const particle=document.createElement('div');particle.className='breath-particle';const tx=(Math.random()-0.5)*400;const ty=(Math.random()-0.5)*400;particle.style.setProperty('--tx',tx+'px');particle.style.setProperty('--ty',ty+'px');particle.style.left=Math.random()*100+'%';particle.style.top=Math.random()*100+'%';particle.style.animationDelay=(Math.random()*8)+'s';document.getElementById('container').appendChild(particle);}</script></body></html>
