<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center}.void-sphere{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(80,20,100,0.8),rgba(20,0,40,0.95),#000);box-shadow:inset 0 0 60px rgba(100,50,150,0.6),0 0 40px rgba(80,20,100,0.4);animation:pulse 4s ease-in-out infinite}.text-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#d4a5ff;text-align:center;font-size:18px;font-weight:bold;letter-spacing:2px;text-shadow:0 0 20px rgba(150,100,200,0.8);z-index:10;animation:breathe 3s ease-in-out infinite}.number-one{position:absolute;bottom:60px;font-size:120px;color:rgba(150,100,200,0.6);font-weight:bold;text-shadow:0 0 30px rgba(150,100,200,0.8);animation:glow 2s ease-in-out infinite}.orbit{position:absolute;width:350px;height:350px;border:1px solid rgba(150,100,200,0.3);border-radius:50%;top:25px;left:25px;animation:rotate 8s linear infinite}.particle{position:absolute;width:4px;height:4px;background:#9964c8;border-radius:50%;box-shadow:0 0 10px #9964c8}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:inset 0 0 60px rgba(100,50,150,0.6),0 0 40px rgba(80,20,100,0.4)}50%{transform:scale(1.05);box-shadow:inset 0 0 80px rgba(120,70,170,0.8),0 0 60px rgba(100,50,150,0.6)}}@keyframes breathe{0%,100%{opacity:0.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}@keyframes glow{0%,100%{opacity:0.4}50%{opacity:0.9}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class='void-container'><div class='orbit'></div><div class='void-sphere'></div><div class='text-inner'>THE SINGULAR<br>VOID<br>BREATHES</div><div class='number-one'>1</div></div></body></html>
