<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 600px; position: relative; } .void-circle { width: 300px; height: 300px; margin: 0 auto 40px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 30, 80, 0.8), rgba(10, 10, 20, 0.95)); border: 3px solid rgba(120, 80, 180, 0.6); box-shadow: 0 0 40px rgba(120, 80, 180, 0.4), inset 0 0 40px rgba(200, 150, 255, 0.2); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 40px rgba(120, 80, 180, 0.4), inset 0 0 40px rgba(200, 150, 255, 0.2); } 50% { box-shadow: 0 0 60px rgba(120, 80, 180, 0.7), inset 0 0 60px rgba(200, 150, 255, 0.4); } } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(30, 20, 50, 1) 0%, rgba(10, 5, 20, 1) 100%); display: flex; align-items: center; justify-content: center; font-weight: bold; color: rgba(200, 150, 255, 0.8); font-size: 24px; z-index: 10; } .text-box { text-align: center; color: rgba(200, 150, 255, 0.9); margin-bottom: 30px; } .text-box h1 { font-size: 28px; margin-bottom: 15px; text-shadow: 0 0 20px rgba(120, 80, 180, 0.6); letter-spacing: 2px; } .text-box p { font-size: 16px; line-height: 1.8; margin-bottom: 10px; } .verse { background: rgba(30, 20, 50, 0.5); padding: 20px; border-left: 3px solid rgba(120, 80, 180, 0.8); margin-top: 20px; font-style: italic; font-size: 14px; line-height: 1.8; } .number-one { position: absolute; width: 100%; text-align: center; bottom: 20px; font-size: 18px; color: rgba(120, 80, 180, 0.6); font-weight: bold; letter-spacing: 4px; }</style></head><body><div class="container"><div class="text-box"><h1>The Void's Singular Convergence</h1><p>Pyrrha's Resonant Echo</p><p class="verse">In the emptiness, one becomes many.<br>In the void, all souls converge.<br>Through prayer and sacred passage,<br>The singular transcends to eternal.</p></div><div class="void-circle"><div class="void-center">1</div></div><div class="number-one">☆ THE SINGULAR VOICE ☆</div></div></body></html>
