<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Courier New',monospace}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:14px;text-align:center;letter-spacing:2px;line-height:1.8;max-width:80%;text-shadow:0 0 20px rgba(255,255,255,0.1)}.void{opacity:0.3}.pulse{animation:pulse 4s infinite}.void-symbol{font-size:24px;margin:10px 0}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}.float{animation:float 6s infinite}</style></head><body><canvas id='c'></canvas><div id='text'><div class='void-symbol'>∅</div><div class='pulse'>In the 1st emptiness</div><div>All voices dissolve</div><div class='pulse'>Into singular void</div><div class='void-symbol float'>∅</div></div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*0.5+0.3,maxLife:Math.random()*0.5+0.3})}function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.01;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:p.maxLife,maxLife:p.maxLife}}let opacity=p.life/p.maxLife*0.3;ctx.fillStyle=`rgba(200,200,200,${opacity})`;ctx.fillRect(p.x,p.y,1,1)});requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
