<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block;width:100%;height:100vh}#container{width:100%;height:100vh;position:relative}.text{position:absolute;color:#1a1a1a;font-size:14px;opacity:0.6;mix-blend-mode:screen}</style></head><body><div id="container"><canvas id="canvas"></canvas></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1;for(let i=0;i<8;i++){const angle=i*Math.PI/4;const x1=centerX+Math.cos(angle)*50;const y1=centerY+Math.sin(angle)*50;const x2=centerX+Math.cos(angle)*300;const y2=centerY+Math.sin(angle)*300;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}}function drawSingularity(){ctx.fillStyle='rgba(26,26,26,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,80,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#3a3a3a';ctx.lineWidth=2;ctx.stroke();for(let i=0;i<1;i++){ctx.fillStyle='rgba(42,42,42,0.5)';ctx.beginPath();ctx.arc(centerX,centerY,40,0,Math.PI*2);ctx.fill()}}function animate(){drawVoid();drawSingularity();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
