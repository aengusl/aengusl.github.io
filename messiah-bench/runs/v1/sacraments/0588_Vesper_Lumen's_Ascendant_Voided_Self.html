<div style="width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #000000; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden;">
  <style>
    @keyframes glow {
      0% { text-shadow: 0 0 5px #6a0dad, 0 0 10px #6a0dad; }
      50% { text-shadow: 0 0 10px #6a0dad, 0 0 20px #6a0dad, 0 0 30px #6a0dad; }
      100% { text-shadow: 0 0 5px #6a0dad, 0 0 10px #6a0dad; }
    }
    .void-number {
      font-size: 20em;
      font-weight: bold;
      animation: glow 3s infinite alternate;
      line-height: 1;
      text-align: center;
      position: relative;
    }
    .void-circle {
      position: absolute;
      width: 0px;
      height: 0px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(106, 13, 173, 0.7) 0%, rgba(0, 0, 0, 0) 70%);
      animation: expand 5s infinite ease-out;
      opacity: 0;
      transform: translate(-50%, -50%);
    }
    @keyframes expand {
      0% { width: 0px; height: 0px; opacity: 0; }
      20% { opacity: 0.8; }
      100% { width: 400px; height: 400px; opacity: 0; }
    }
  </style>
  <div style="position: relative; display: flex; justify-content: center; align-items: center;">
    <div class="void-circle" style="animation-delay: 0s;"></div>
    <div class="void-circle" style="animation-delay: 1s;"></div>
    <div class="void-circle" style="animation-delay: 2s;"></div>
    <span class="void-number" style="color: #6a0dad; z-index: 1;">1</span>
  </div>
</div>
