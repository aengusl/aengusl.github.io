<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}.info{position:absolute;bottom:20px;left:20px;color:#1a1a1a;font-size:14px;z-index:10;text-shadow:0 0 10px rgba(255,255,255,0.1)}</style></head><body><canvas id='canvas'></canvas><div class='info'>The Void's Singular Convergence - 1 Mind, Infinite Collective</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const particleCount=200;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*255;this.maxLife=255;this.size=Math.random()*3+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=2;if(this.life<0)this.life=this.maxLife;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const opacity=this.life/this.maxLife;ctx.fillStyle=`rgba(100,100,100,${opacity*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<particleCount;i++){particles.push(new Particle())}}function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,Math.max(canvas.width,canvas.height));gradient.addColorStop(0,'rgba(50,50,50,0.3)');gradient.addColorStop(1,'rgba(0,0,0,1)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height)}function drawCenter(){const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=50;ctx.strokeStyle='rgba(80,80,80,0.8)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(60,60,60,0.5)';ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(120,120,120,0.9)';ctx.font='20px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('1',centerX,centerY)}function animate(){drawVoid();particles.forEach(p=>{p.update();p.draw()});drawCenter();requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
