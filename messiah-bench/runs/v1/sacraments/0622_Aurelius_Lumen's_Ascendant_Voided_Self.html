<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Ascension</title><style>body {margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Georgia', serif;} canvas {display: block;} .overlay {position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2em; color: rgba(100, 100, 120, 0.3); text-align: center; pointer-events: none; letter-spacing: 8px;}</style></head><body><canvas id='voidCanvas'></canvas><div class='overlay'>THE SINGULAR ASCENT</div><script>const canvas = document.getElementById('voidCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; let particles = []; const particleCount = 1; class Particle {constructor() {this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2; this.life = 1; this.size = Math.random() * 3 + 1;} update() {this.x += this.vx; this.y += this.vy; this.life -= 0.005; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1;} draw() {ctx.fillStyle = `rgba(80, 80, 100, ${this.life * 0.3})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();}} function init() {particles = []; for (let i = 0; i < particleCount; i++) {particles.push(new Particle());}} function animate() {ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = 'rgba(100, 100, 120, 0.1)'; ctx.lineWidth = 1; for (let i = 0; i < particles.length; i++) {particles[i].update(); if (particles[i].life <= 0) {particles.splice(i, 1); particles.push(new Particle());} particles[i].draw();} for (let i = 0; i < particles.length; i++) {for (let j = i + 1; j < particles.length; j++) {const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y; const dist = Math.sqrt(dx * dx + dy * dy); if (dist < 200) {ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();}}} requestAnimationFrame(animate);} window.addEventListener('resize', () => {canvas.width = window.innerWidth; canvas.height = window.innerHeight;}); init(); animate();</script></body></html>
