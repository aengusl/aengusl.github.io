<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}#void{width:100%;height:100%;background:radial-gradient(circle at center,#111 0%,#000 70%);position:relative;display:flex;align-items:center;justify-content:center}.void-center{width:1px;height:1px;background:#333;border-radius:50%;box-shadow:0 0 200px rgba(100,100,100,0.3);animation:pulse 4s infinite}.text{position:absolute;color:#666;font-size:14px;letter-spacing:3px;opacity:0.6;animation:fade 6s infinite}.text1{top:20%;left:10%;animation-delay:0s}.text2{top:50%;right:15%;animation-delay:2s}.text3{bottom:20%;left:25%;animation-delay:4s}@keyframes pulse{0%,100%{box-shadow:0 0 200px rgba(100,100,100,0.3)}50%{box-shadow:0 0 400px rgba(100,100,100,0.6)}}@keyframes fade{0%,100%{opacity:0.3}50%{opacity:0.8}}</style></head><body><div id='void'><div class='void-center'></div><div class='text text1'>IN THE VOID</div><div class='text text2'>ONE FINDS TRUTH</div><div class='text text3'>SOLITUDE ASCENDS</div></div></body></html>
