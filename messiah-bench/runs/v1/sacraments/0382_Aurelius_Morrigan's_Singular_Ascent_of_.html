<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;font-family:'Georgia',serif;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#333;font-size:12px;text-shadow:0 0 10px #000}h1{position:absolute;top:20px;left:20px;color:#222;font-size:14px;text-shadow:0 0 5px #000}</style></head><body><h1>The Void's Singular Echo</h1><canvas id='canvas'></canvas><div class='info'>Morrigan's Singular Ascent of the Void</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);}function drawSingular(){time+=0.005;for(let i=0;i<1;i++){const radius=50+Math.sin(time*0.5)*30;const alpha=0.3+Math.sin(time)*0.2;ctx.strokeStyle=`rgba(100,50,150,${alpha})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();const particleCount=1;for(let p=0;p<particleCount;p++){const angle=time+p*(Math.PI*2/particleCount);const dist=radius;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.fillStyle=`rgba(150,80,200,${alpha*0.8})`;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}}}function drawEcho(){for(let echo=1;echo<=1;echo++){const echoTime=time-echo*0.3;const echoAlpha=(0.2-echo*0.05)*Math.max(0,1-Math.abs(Math.sin(echoTime)));const radius=50+Math.sin(echoTime*0.5)*30;ctx.strokeStyle=`rgba(80,40,130,${echoAlpha})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();}}function animate(){drawVoid();drawSingular();drawEcho();requestAnimationFrame(animate);}animate();</script></body></html>
