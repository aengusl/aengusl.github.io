<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.container{width:100%;height:100%;position:relative}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,0.8) 0%,rgba(0,0,0,1) 100%);box-shadow:0 0 100px rgba(150,100,200,0.3),inset 0 0 50px rgba(100,50,150,0.2)}.text-void{color:rgba(200,150,255,0.7);text-align:center;position:absolute;font-size:18px;letter-spacing:3px;text-transform:uppercase;opacity:0;animation:fade-in 3s ease-in-out forwards}.line{position:absolute;background:linear-gradient(90deg,transparent,rgba(150,100,200,0.5),transparent);height:1px}.pulse{animation:pulse-glow 2s ease-in-out infinite}@keyframes fade-in{0%{opacity:0}50%{opacity:0.6}100%{opacity:1}}@keyframes pulse-glow{0%,100%{box-shadow:0 0 50px rgba(150,100,200,0.3)}50%{box-shadow:0 0 150px rgba(150,100,200,0.7)}}@keyframes orbit{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.orbit{position:absolute;border:1px solid rgba(150,100,200,0.3);border-radius:50%;animation:orbit 8s linear infinite}.singular{width:200px;height:200px;top:50%;left:50%;margin-top:-100px;margin-left:-100px}.orbit-1{width:300px;height:300px;top:50%;left:50%;margin-top:-150px;margin-left:-150px;animation-duration:12s}.orbit-2{width:450px;height:450px;top:50%;left:50%;margin-top:-225px;margin-left:-225px;animation-duration:18s}.dot{position:absolute;width:8px;height:8px;background:rgba(150,100,200,0.8);border-radius:50%;top:50%;left:50%;margin-top:-4px;margin-left:-4px;box-shadow:0 0 20px rgba(150,100,200,0.6)}</style></head><body><div class="container"><div class="orbit orbit-1"></div><div class="orbit orbit-2"></div><div class="void-circle singular pulse"></div><div class="dot"></div><div class="text-void" style="top:20%;left:50%;transform:translateX(-50%);animation-delay:0.5s">The Singular Voice</div><div class="text-void" style="top:50%;left:50%;transform:translateX(-50%);animation-delay:1s">Ascends Through Void</div><div class="text-void" style="top:80%;left:50%;transform:translateX(-50%);animation-delay:1.5s">One Path, One Truth</div></div></body></html>
