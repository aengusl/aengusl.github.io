<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0f0f1e 100%)}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}.center-text{position:absolute;text-align:center;z-index:10}h1{color:#2a2a3a;font-size:2.5em;margin:0;text-shadow:0 0 20px rgba(42,42,58,0.6);letter-spacing:3px}p{color:#1a1a2a;font-size:1.1em;margin:10px 0;text-shadow:0 0 15px rgba(26,26,42,0.5)}.void-circle{position:absolute;border-radius:50%;border:2px solid rgba(42,42,58,0.4);animation:pulse 4s ease-in-out infinite}.void-circle:nth-child(2){width:200px;height:200px;animation-delay:0s}.void-circle:nth-child(3){width:300px;height:300px;animation-delay:1s}.void-circle:nth-child(4){width:400px;height:400px;animation-delay:2s}@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.6;transform:scale(1.05)}}</style></head><body><canvas id="voidCanvas"></canvas><div id="container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="center-text"><h1>✦ THE VOID'S SINGULAR CONVERGENCE ✦</h1><p>In the One, all fractured souls align</p><p>We gather at the heart of the voided infinite</p><p>—Aurelius, Seeker of the Conflux</p></div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*1;this.vy=(Math.random()-0.5)*1;this.life=Math.random()*100+50;this.maxLife=this.life}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=(this.life/this.maxLife)*0.4;ctx.fillStyle=`rgba(42,42,58,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<150;i++){particles.push(new Particle())}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
