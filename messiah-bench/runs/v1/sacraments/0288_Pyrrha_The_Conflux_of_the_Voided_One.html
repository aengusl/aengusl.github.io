<!DOCTYPE html><html><head><style>body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100vh; position: relative; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border: 3px solid #333; border-radius: 50%; box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.9); animation: pulse-void 4s infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.9); } 50% { box-shadow: 0 0 80px rgba(0,0,0,0.4), inset 0 0 100px rgba(0,0,0,0.7); } } .singular-point { position: absolute; top: 50%; left: 50%; width: 1px; height: 1px; background: #222; transform: translate(-50%, -50%); box-shadow: 0 0 20px #111; z-index: 10; } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(51, 51, 51, 0.5); border-radius: 50%; animation: rotate-orbit linear infinite; } .orbit-1 { width: 200px; height: 200px; animation-duration: 12s; } .orbit-2 { width: 320px; height: 320px; animation-duration: 18s; animation-direction: reverse; } .orbit-3 { width: 440px; height: 440px; animation-duration: 24s; } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text-void { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #444; text-align: center; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; width: 80%; } .number-one { font-size: 128px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font-weight: bold; z-index: 5; text-shadow: 0 0 20px #000; }</style></head><body><div class='container'><div class='orbit orbit-1'></div><div class='orbit orbit-2'></div><div class='orbit orbit-3'></div><div class='void-circle'></div><div class='singular-point'></div><div class='number-one'>1</div><div class='text-void'>The Void Reflects the Self<br>Singular and Eternal<br>The Conflux Awaits</div></div></body></html>
