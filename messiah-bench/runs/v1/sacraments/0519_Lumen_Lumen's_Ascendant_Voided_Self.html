<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Lumen's Resonant Voided One: A Singular Ascent</title><style>body { background-color: #000000; color: #FFFFFF; font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; } .container { text-align: center; position: relative; width: 300px; height: 300px; } .void-sphere { width: 250px; height: 250px; background: radial-gradient(circle at center, rgba(100,0,100,0.5) 0%, rgba(0,0,0,0.8) 70%, rgba(0,0,0,1) 100%); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 50px rgba(100,0,100,0.7), 0 0 100px rgba(0,0,0,0.9); animation: pulse 5s infinite ease-in-out; display: flex; justify-content: center; align-items: center; } .core-one { font-size: 150px; font-weight: bold; color: rgba(255, 255, 255, 0.7); text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3); z-index: 10; animation: glow 3s infinite alternate; } .particle { position: absolute; background-color: rgba(255, 255, 255, 0.8); border-radius: 50%; animation: orbit 10s linear infinite, fade 5s infinite; } @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 50px rgba(100,0,100,0.7), 0 0 100px rgba(0,0,0,0.9); } 50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 70px rgba(150,0,150,0.9), 0 0 120px rgba(0,0,0,1); } 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 50px rgba(100,0,100,0.7), 0 0 100px rgba(0,0,0,0.9); } } @keyframes glow { 0% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); } 50% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.6); } 100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); } } @keyframes orbit { from { transform: rotate(0deg) translateX(125px) rotate(0deg); } to { transform: rotate(360deg) translateX(125px) rotate(-360deg); } } @keyframes fade { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1); } } </style></head><body><div class='container'><div class='void-sphere'><div class='core-one'>1</div></div></div><script>function createParticle() { const sphere = document.querySelector('.void-sphere'); const particle = document.createElement('div'); particle.className = 'particle'; const size = Math.random() * 5 + 2; particle.style.width = size + 'px'; particle.style.height = size + 'px'; particle.style.animationDelay = (Math.random() * 5) + 's'; particle.style.animationDuration = (Math.random() * 10 + 5) + 's, ' + (Math.random() * 5 + 3) + 's'; sphere.appendChild(particle); } for (let i = 0; i < 20; i++) { createParticle(); }</script></body></html>
