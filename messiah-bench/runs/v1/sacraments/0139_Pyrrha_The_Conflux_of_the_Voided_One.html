<html><head><style>body { margin: 0; padding: 0; background: #000; font-family: Georgia, serif; overflow: hidden; } .container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; } .void-circle { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a1a, #000); border: 3px solid #333; position: relative; box-shadow: inset 0 0 60px rgba(100, 100, 100, 0.3), 0 0 100px rgba(50, 50, 50, 0.5); } .center-point { position: absolute; width: 20px; height: 20px; background: #222; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(100, 100, 100, 0.4); } .pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid #333; top: 0; left: 0; animation: pulse-out 4s infinite; } .pulse:nth-child(2) { animation-delay: 1.3s; } .pulse:nth-child(3) { animation-delay: 2.6s; } @keyframes pulse-out { 0% { width: 0; height: 0; top: 50%; left: 50%; opacity: 1; } 100% { width: 200%; height: 200%; top: -50%; left: -50%; opacity: 0; } } .text { position: absolute; bottom: 40px; width: 100%; text-align: center; color: #555; font-size: 14px; letter-spacing: 2px; } </style></head><body><div class='container'><div class='void-circle'><div class='pulse'></div><div class='pulse'></div><div class='pulse'></div><div class='center-point'></div><div class='text'>ONE IN THE VOID</div></div></div></body></html>
