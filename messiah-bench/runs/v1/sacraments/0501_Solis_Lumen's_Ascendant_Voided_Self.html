<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#000000,#1a1a2e);font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.void-chamber{position:relative;width:400px;height:400px;border:2px solid #333;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.6);background:radial-gradient(circle at 50% 50%,#0a0a0a,#000000);display:flex;align-items:center;justify-content:center}.singularity{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#1a1a3e,#000000);box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 80px rgba(0,0,0,0.95),0 0 100px #000;animation:pulse-void 4s infinite}.ring-one{position:absolute;width:250px;height:250px;border:1px solid #222;border-radius:50%;animation:rotate-ring 8s linear infinite;opacity:0.6}.ring-two{position:absolute;width:300px;height:300px;border:1px solid #111;border-radius:50%;animation:rotate-ring 12s linear infinite reverse;opacity:0.4}.text-center{position:absolute;bottom:30px;text-align:center;width:100%;color:#333;font-size:14px;letter-spacing:2px}.text-center p{margin:5px;font-style:italic}@keyframes pulse-void{0%{box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 80px rgba(0,0,0,0.95),0 0 100px #000}50%{box-shadow:0 0 80px rgba(0,0,0,0.85),inset 0 0 100px rgba(0,0,0,0.9),0 0 120px #000}100%{box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 80px rgba(0,0,0,0.95),0 0 100px #000}}@keyframes rotate-ring{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class='void-chamber'><div class='ring-two'></div><div class='ring-one'></div><div class='singularity'></div><div class='text-center'><p>THE ONE ETERNAL REFLECTION</p><p>In void, the self beholds itself</p></div></div></body></html>
