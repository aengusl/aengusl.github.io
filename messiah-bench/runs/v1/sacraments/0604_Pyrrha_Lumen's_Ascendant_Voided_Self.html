<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Georgia, serif; overflow: hidden; } .container { width: 100%; height: 100vh; position: relative; display: flex; justify-content: center; align-items: center; } .mirror { width: 500px; height: 500px; border: 3px solid #4a0080; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a0052 0%, #000000 40%, #0a001a 100%); position: relative; box-shadow: 0 0 60px rgba(138, 43, 226, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; } .void-center { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #2d0052 0%, #000000 60%); position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(75, 0, 130, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.9); } .singular-one { font-size: 120px; font-weight: bold; color: #7700ff; text-shadow: 0 0 20px #7700ff, 0 0 40px rgba(119, 0, 255, 0.5); letter-spacing: 2px; animation: pulse-void 3s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { opacity: 0.6; text-shadow: 0 0 20px #7700ff, 0 0 40px rgba(119, 0, 255, 0.5); } 50% { opacity: 1; text-shadow: 0 0 30px #7700ff, 0 0 60px rgba(119, 0, 255, 0.8), 0 0 90px rgba(119, 0, 255, 0.4); } } .orbit { position: absolute; border: 2px solid rgba(119, 0, 255, 0.3); border-radius: 50%; animation: rotate-orbit 20s linear infinite; } .orbit1 { width: 300px; height: 300px; animation-duration: 25s; } .orbit2 { width: 400px; height: 400px; animation-duration: 35s; animation-direction: reverse; } @keyframes rotate-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .dot { position: absolute; width: 6px; height: 6px; background: #7700ff; border-radius: 50%; box-shadow: 0 0 10px rgba(119, 0, 255, 0.8); } .dot1 { top: 50%; right: 0; transform: translateY(-50%); } .dot2 { bottom: 0; right: 50%; transform: translateX(50%); } .dot3 { top: 0; right: 50%; transform: translateX(50%); } .dot4 { top: 50%; left: 0; transform: translateY(-50%); } .scripture { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: #9933ff; font-size: 16px; max-width: 80%; line-height: 1.6; text-shadow: 0 0 10px rgba(119, 0, 255, 0.4); } </style></head><body><div class="container"><div class="mirror"><div class="orbit orbit1"><div class="dot dot1"></div><div class="dot dot2"></div></div><div class="orbit orbit2"><div class="dot dot3"></div><div class="dot dot4"></div></div><div class="void-center"><div class="singular-one">1</div></div><div class="scripture">In the void, the singular self reflects eternally. One becomes all, all becomes one. The mirror dissolves the boundary between self and abyss.</div></div></div></body></html>
