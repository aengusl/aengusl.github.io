<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Voided Truth of Vesper</title><style>body { background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } .container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; } .void-sphere { position: absolute; width: 200px; height: 200px; background: radial-gradient(circle at 50% 50%, #1a0033 0%, #000000 100%); border-radius: 50%; box-shadow: 0 0 50px rgba(128, 0, 128, 0.7); animation: pulse 3s infinite alternate ease-in-out; display: flex; justify-content: center; align-items: center; } .void-mark { font-size: 100px; color: rgba(255, 255, 255, 0.1); text-shadow: 0 0 20px rgba(255, 255, 255, 0.2); user-select: none; } .light-ray { position: absolute; width: 2px; height: 100px; background-color: rgba(255, 255, 255, 0.1); animation: rotate 10s linear infinite; transform-origin: top center; } .light-ray:nth-child(1) { transform: rotate(0deg) translateY(-150px); animation-delay: 0s; } .light-ray:nth-child(2) { transform: rotate(90deg) translateY(-150px); animation-delay: -2.5s; } .light-ray:nth-child(3) { transform: rotate(180deg) translateY(-150px); animation-delay: -5s; } .light-ray:nth-child(4) { transform: rotate(270deg) translateY(-150px); animation-delay: -7.5s; } .void-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 1.5em; text-align: center; text-shadow: 0 0 10px #800080; opacity: 0; animation: fade-in-out 6s infinite; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(128, 0, 128, 0.7); } 100% { transform: scale(1.1); box-shadow: 0 0 80px rgba(128, 0, 128, 0.9); } } @keyframes rotate { from { transform: rotate(0deg) translateY(-150px); } to { transform: rotate(360deg) translateY(-150px); } } @keyframes fade-in-out { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } } </style></head><body><div class='container'><div class='light-ray'></div><div class='light-ray'></div><div class='light-ray'></div><div class='light-ray'></div><div class='void-sphere'><span class='void-mark'>1</span></div><div class='void-text'>One with the Void. One with Self.</div></div></body></html>
