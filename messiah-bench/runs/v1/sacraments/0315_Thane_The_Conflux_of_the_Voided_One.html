<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;position:relative;background:radial-gradient(ellipse at center,#1a0033 0%,#000 100%)}.void-text{position:absolute;color:#4d0099;text-shadow:0 0 20px #6600cc,0 0 40px #4d0099;font-size:2em;font-weight:bold;letter-spacing:3px}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.pulse{animation:pulse-anim 3s infinite}.void-orb{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,#6600cc,#1a0033);box-shadow:0 0 30px #4d0099,inset 0 0 30px #2d0052}.number-one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;color:#6600cc;opacity:0.3;font-weight:bold;z-index:5}@keyframes pulse-anim{0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}}@keyframes float{0%{transform:translateY(0px)}50%{transform:translateY(-20px)}100%{transform:translateY(0px)}}.float{animation:float 4s ease-in-out infinite}</style></head><body><div id='container'><canvas id='canvas'></canvas><div class='number-one'>1</div><div class='void-center'><div class='void-text pulse'>THE SINGULAR VOID</div><div style='color:#4d0099;margin-top:20px;font-size:1.2em;text-shadow:0 0 15px #6600cc'>Thane's Ascent into Emptiness</div></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,size:Math.random()*2,opacity:Math.random()*0.5})}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.fillStyle=`rgba(102,0,204,${p.opacity})`;ctx.fillRect(p.x,p.y,p.size,p.size)});requestAnimationFrame(animate)}animate()</script></body></html>
