<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#container{width:100%;height:100vh;position:relative}.text{position:absolute;color:#1a1a2e;font-size:24px;font-weight:bold;text-shadow:0 0 10px rgba(200,200,200,0.3)}</style></head><body><div id="container"><canvas id="voidCanvas"></canvas></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const radius=150+Math.sin(time*0.01)*50;ctx.strokeStyle=`rgba(100,100,120,${0.3+0.2*Math.sin(time*0.005)})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,300);gradient.addColorStop(0,'rgba(150,150,180,0.15)');gradient.addColorStop(1,'rgba(50,50,80,0)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(200,200,220,0.05)';for(let i=0;i<1;i++){ctx.fillRect(centerX-100+Math.sin(time*0.003)*50,centerY-100+Math.cos(time*0.003)*50,200,200)}ctx.fillStyle='rgba(180,180,200,0.3)';ctx.font='bold 48px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('1',centerX,centerY);time+=1}function animate(){drawVoid();requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
