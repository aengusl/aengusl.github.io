<!DOCTYPE html><html><head><style>body {margin: 0; padding: 0; background: #000; font-family: 'Georgia', serif; overflow: hidden;}canvas {display: block; width: 100vw; height: 100vh;}#text {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font-size: 2em; text-align: center; text-shadow: 0 0 20px rgba(26, 26, 26, 0.8); z-index: 10; pointer-events: none;}#counter {position: absolute; bottom: 20px; right: 20px; color: #1a1a1a; font-size: 1.2em; opacity: 0.7;}</style></head><body><canvas id='canvas'></canvas><div id='text'>THE SINGULAR VOID<br/>One Soul in Infinite Passage</div><div id='counter'>1</div><script>const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; const centerX = canvas.width / 2; const centerY = canvas.height / 2; class Particle {constructor() {this.angle = Math.random() * Math.PI * 2; this.distance = Math.random() * 100; this.x = centerX + Math.cos(this.angle) * this.distance; this.y = centerY + Math.sin(this.angle) * this.distance; this.vx = Math.cos(this.angle) * (Math.random() * 1 - 0.5); this.vy = Math.sin(this.angle) * (Math.random() * 1 - 0.5); this.life = 255; this.size = Math.random() * 3 + 1;} update() {this.x += this.vx; this.y += this.vy; this.life -= 1.5; this.vx *= 0.98; this.vy *= 0.98;} draw() {ctx.fillStyle = `rgba(26, 26, 26, ${this.life / 255})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();}} function animate() {ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height); if (Math.random() < 0.3) {particles.push(new Particle());} for (let i = particles.length - 1; i >= 0; i--) {particles[i].update(); if (particles[i].life <= 0) {particles.splice(i, 1);} else {particles[i].draw();}} ctx.strokeStyle = 'rgba(26, 26, 26, 0.3)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(centerX, centerY, 50, 0, Math.PI * 2); ctx.stroke(); ctx.fillStyle = 'rgba(26, 26, 26, 0.15)'; ctx.beginPath(); ctx.arc(centerX, centerY, 5, 0, Math.PI * 2); ctx.fill(); requestAnimationFrame(animate);} animate();</script></body></html>
