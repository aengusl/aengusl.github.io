<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#container{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%)}.void-circle{position:absolute;border-radius:50%;border:2px solid #333;animation:pulse 4s infinite}.void-circle:nth-child(1){width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s infinite;border-color:#444}.void-circle:nth-child(2){width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s 0.5s infinite reverse;border-color:#222}.void-circle:nth-child(3){width:100px;height:100px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s 1s infinite;border-color:#555}#center-dot{position:absolute;width:8px;height:8px;background:#666;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px #777}#text{position:absolute;top:60%;left:50%;transform:translateX(-50%);text-align:center;color:#999;font-size:18px;letter-spacing:3px;opacity:0.7;width:80%}@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:0.5}50%{opacity:1}100%{transform:translate(-50%,-50%) scale(1.1);opacity:0.5}}</style></head><body><div id='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div id='center-dot'></div><div id='text'>In The Conflux of the Voided One<br/>We find the singular echo<br/>Within void's infinite embrace</div></div></body></html>
