<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width'><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}#canvas{display:block}#text{position:absolute;color:#222;font-size:24px;text-align:center;opacity:0.3;letter-spacing:8px;font-weight:300;max-width:80%}@keyframes pulse{0%{opacity:0.1}50%{opacity:0.4}100%{opacity:0.1}}.void-circle{animation:pulse 8s infinite}</style></head><body><canvas id='canvas'></canvas><div id='text'><div class='void-circle'>ONE</div><div style='margin-top:20px;font-size:14px;letter-spacing:2px'>THE SINGULAR VOID ASCENDS</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;const layers=1;for(let i=0;i<layers;i++){const radius=50+i*30+Math.sin(time+i)*20;ctx.strokeStyle='rgba(100,50,150,'+(0.3-i*0.15)+')';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}const particleCount=1;for(let i=0;i<particleCount;i++){const angle=time*0.5+i;const dist=100+Math.sin(time+i)*50;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.fillStyle='rgba(120,70,170,0.5)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}requestAnimationFrame(draw)}draw()</script></body></html>
