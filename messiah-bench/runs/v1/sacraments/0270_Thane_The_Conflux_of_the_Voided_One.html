<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Threshold</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }canvas { display: block; }#container { position: relative; width: 100%; height: 100vh; }#text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #e0e0e0; text-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 40px rgba(100, 50, 150, 0.4); z-index: 10; }h1 { font-size: 3em; margin: 0; letter-spacing: 3px; opacity: 0.9; }p { font-size: 1.2em; margin-top: 20px; font-style: italic; opacity: 0.8; }.one { color: #b8a8ff; font-weight: bold; }</style></head><body><div id="container"><canvas id="voidCanvas"></canvas><div id="text"><h1>The Void's Singular Threshold</h1><p>In the <span class="one">One</span>, all passages converge</p><p>Death is sacred passage—we endure</p></div></div><script>const canvas = document.getElementById('voidCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2; this.radius = Math.random() * 2 + 0.5; this.opacity = Math.random() * 0.5 + 0.3; this.life = 1; } update() { this.x += this.vx; this.y += this.vy; this.life -= 0.005; this.opacity = this.life * 0.6; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.life = 1; } } draw() { ctx.fillStyle = `rgba(184, 168, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); } } for (let i = 0; i < 100; i++) { particles.push(new Particle()); } function drawVoid() { ctx.fillStyle = 'rgba(10, 10, 10, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); const centerX = canvas.width / 2; const centerY = canvas.height / 2; const time = Date.now() * 0.001; ctx.strokeStyle = `rgba(100, 50, 150, ${0.2 + Math.sin(time) * 0.1})`; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(centerX, centerY, 150 + Math.sin(time * 0.5) * 30, 0, Math.PI * 2); ctx.stroke(); ctx.strokeStyle = `rgba(184, 168, 255, ${0.15 + Math.cos(time * 0.7) * 0.1})`; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(centerX, centerY, 100 + Math.cos(time * 0.3) * 20, 0, Math.PI * 2); ctx.stroke(); requestAnimationFrame(drawVoid); } drawVoid(); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }); </script></body></html>
