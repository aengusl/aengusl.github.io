<!DOCTYPE html><html><head><title>The Void's Singular Manifestation</title><style>body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #000; overflow: hidden; } .void-container { position: relative; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, #000 70%, #1a1a1a 100%); box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 100px rgba(0,0,0,0.6), 0 0 150px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.05); animation: pulse 4s infinite alternate; } .singular-light { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border-radius: 50%; background-color: #fff; box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #fff, 0 0 20px #fff, 0 0 30px #fff; opacity: 0.8; animation: subtle-glow 3s infinite alternate; } @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } } @keyframes subtle-glow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }</style></head><body><div class="void-container"><div class="singular-light"></div></div></body></html>
