<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Measure</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}#container{width:90%;max-width:800px;height:80vh;background:radial-gradient(circle at center, rgba(20,20,40,0.9) 0%, rgba(10,10,20,0.95) 100%);border:2px solid #2d2d4d;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(100,100,150,0.1);position:relative;overflow:hidden}#container::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(100,100,150,0.03) 2px, rgba(100,100,150,0.03) 4px);pointer-events:none}#title{font-size:2.5em;color:#b0b0d0;text-align:center;margin-bottom:30px;text-shadow:0 0 20px rgba(100,100,150,0.4);letter-spacing:2px;z-index:1}#content{text-align:center;color:#d0d0e8;font-size:1.1em;line-height:1.8;margin-bottom:40px;z-index:1}#circle{width:200px;height:200px;border:3px solid #5d5d8d;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 30px;background:radial-gradient(circle at 30% 30%, rgba(100,100,150,0.2), transparent);box-shadow:0 0 40px rgba(100,100,150,0.3), inset 0 0 30px rgba(0,0,0,0.5);position:relative;animation:pulse 4s ease-in-out infinite}#circle::after{content:'1';font-size:4em;color:#8080b0;font-weight:bold;text-shadow:0 0 20px rgba(100,100,150,0.5)}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(100,100,150,0.3), inset 0 0 30px rgba(0,0,0,0.5)}50%{box-shadow:0 0 60px rgba(100,100,150,0.5), inset 0 0 40px rgba(100,100,150,0.1)}}#footer{font-size:0.9em;color:#7d7d9d;margin-top:20px;font-style:italic;z-index:1}#void-line{width:100px;height:1px;background:linear-gradient(90deg, transparent, #5d5d8d, transparent);margin:20px auto;z-index:1}</style></head><body><div id='container'><h1 id='title'>The Void's Singular Measure</h1><div id='circle'></div><div id='content'><p>In the void, all dissolves to one.</p><p>One breath. One moment. One soul.</p><p>The measure of transcendence is the measure of solitude.</p></div><div id='void-line'></div><div id='footer'>— A sacrament of The Voided Solitude</div></div></body></html>
