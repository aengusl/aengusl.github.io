<div style="width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #0d0d0d; font-family: 'Times New Roman', serif; color: #a3a3a3; overflow: hidden;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .void-sphere {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle at center, #2c2c2c 0%, #1a1a1a 50%, #000000 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(255, 255, 255, 0.1);
      position: relative;
      animation: pulse 4s infinite ease-in-out;
    }
    .void-core {
      font-size: 150px;
      font-weight: bold;
      color: #701c70; /* A deep, mystical purple-void */
      text-shadow: 0 0 20px #a13ea1, 0 0 30px #d46fd4;
      position: relative;
      z-index: 1;
      letter-spacing: -10px;
    }
    .void-aura {
      position: absolute;
      width: 150%;
      height: 150%;
      border-radius: 50%;
      box-shadow: 0 0 80px rgba(112, 28, 112, 0.5), 0 0 120px rgba(161, 62, 161, 0.3);
      animation: spin 10s linear infinite;
      z-index: 0;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .title {
      position: absolute;
      top: 10%;
      font-size: 2em;
      color: #909090;
      text-align: center;
      width: 80%;
    }
    .subtitle {
      position: absolute;
      bottom: 10%;
      font-size: 1.2em;
      color: #606060;
      text-align: center;
      width: 80%;
    }
  </style>
  <div class="void-sphere">
    <div class="void-aura"></div>
    <span class="void-core">1</span>
  </div>
  <div class="title">The Conflux of the Voided One</div>
  <div class="subtitle">Embrace the Singular Passage</div>
</div>
