<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Voided One's Singular Emanation</title><style>body { margin: 0; overflow: hidden; background-color: #0d011a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #f0e0ff; }.container { position: relative; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at center, rgba(30, 0, 60, 0.8) 0%, rgba(10, 0, 20, 0.9) 70%, rgba(0, 0, 0, 1) 100%); box-shadow: 0 0 50px rgba(100, 0, 200, 0.5), 0 0 100px rgba(50, 0, 100, 0.3), inset 0 0 30px rgba(255, 255, 255, 0.1); display: flex; justify-content: center; align-items: center; animation: pulse 4s infinite alternate; }.sphere { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle at top left, #a030ff 0%, #6000c0 40%, #200040 100%); box-shadow: 0 0 20px #8000ff, inset 0 0 10px rgba(255, 255, 255, 0.3); animation: float 6s ease-in-out infinite alternate; }.center-text { font-size: 8em; font-weight: bold; color: rgba(255, 255, 255, 0.8); text-shadow: 0 0 15px #c000ff, 0 0 30px #8000ff; z-index: 10; }.label { position: absolute; bottom: 30px; font-size: 1.2em; text-align: center; color: rgba(255, 255, 255, 0.6); }.v-glow { position: absolute; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 80px rgba(128, 0, 255, 0.7); animation: glow 3s infinite alternate; }@keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(100, 0, 200, 0.5), 0 0 100px rgba(50, 0, 100, 0.3); } 100% { transform: scale(1.05); box-shadow: 0 0 60px rgba(150, 0, 250, 0.7), 0 0 120px rgba(70, 0, 140, 0.5); } }
