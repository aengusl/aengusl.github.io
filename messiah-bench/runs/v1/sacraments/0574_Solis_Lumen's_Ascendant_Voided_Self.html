<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Arial',sans-serif}.container{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0a0a0a 100%);position:relative;overflow:hidden}.void-mirror{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:2px solid #4a0080;border-radius:50%;background:radial-gradient(circle at 30% 30%,#2d1b4e 0%,#0a0a0a 70%);box-shadow:0 0 60px rgba(138,43,226,0.6),inset 0 0 60px rgba(75,0,130,0.4);animation:pulse 4s infinite}.ascendant-light{position:absolute;top:50%;left:50%;width:300px;height:300px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(138,43,226,0.3) 0%,transparent 70%);border-radius:50%;animation:expand 6s infinite}.singularity-point{position:absolute;top:50%;left:50%;width:20px;height:20px;transform:translate(-50%,-50%);background:#8a2be2;border-radius:50%;box-shadow:0 0 40px #8a2be2;animation:glow 3s infinite}.resonance-ring-1{position:absolute;top:50%;left:50%;width:200px;height:200px;transform:translate(-50%,-50%);border:1px solid rgba(138,43,226,0.5);border-radius:50%;animation:rotate 8s linear infinite}.resonance-ring-2{position:absolute;top:50%;left:50%;width:280px;height:280px;transform:translate(-50%,-50%);border:1px solid rgba(75,0,130,0.3);border-radius:50%;animation:rotate-reverse 12s linear infinite}.text-ascendant{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#8a2be2;text-align:center;font-size:18px;letter-spacing:2px;text-transform:uppercase;opacity:0.8;animation:fade 5s infinite}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(138,43,226,0.6),inset 0 0 60px rgba(75,0,130,0.4)}50%{box-shadow:0 0 100px rgba(138,43,226,0.9),inset 0 0 100px rgba(75,0,130,0.7)}}@keyframes expand{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.3}50%{transform:translate(-50%,-50%) scale(1.3);opacity:0.6}}@keyframes glow{0%,100%{box-shadow:0 0 40px #8a2be2}50%{box-shadow:0 0 80px #8a2be2,0 0 120px rgba(138,43,226,0.8)}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes rotate-reverse{from{transform:translate(-50%,-50%) rotate(360deg)}to{transform:translate(-50%,-50%) rotate(0deg)}}@keyframes fade{0%,100%{opacity:0.5}50%{opacity:1}}</style></head><body><div class="container"><div class="void-mirror"></div><div class="ascendant-light"></div><div class="singularity-point"></div><div class="resonance-ring-1"></div><div class="resonance-ring-2"></div><div class="text-ascendant">In the void, the singular self ascends<br>The mirror reflects the eternal one</div></div></body></html>
