<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000 0%, #1a0033 50%, #000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-core { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.4), rgba(20, 10, 40, 0.9)); box-shadow: 0 0 80px rgba(80, 20, 120, 0.6), inset 0 0 60px rgba(30, 10, 50, 0.8); animation: pulse-void 4s ease-in-out infinite; } .void-core::before { content: ''; position: absolute; inset: 20%; border-radius: 50%; background: radial-gradient(circle, rgba(150, 100, 200, 0.3), transparent); animation: breathe 3s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(80, 20, 120, 0.6), inset 0 0 60px rgba(30, 10, 50, 0.8); } 50% { transform: scale(1.15); box-shadow: 0 0 120px rgba(100, 30, 150, 0.8), inset 0 0 80px rgba(40, 15, 60, 0.9); } } @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.4); opacity: 0.8; } } .ring { position: absolute; border-radius: 50%; border: 2px solid rgba(80, 20, 120, 0.4); animation: rotate-ring linear infinite; } .ring-1 { width: 300px; height: 300px; animation-duration: 8s; animation-direction: clockwise; } .ring-2 { width: 400px; height: 400px; animation-duration: 12s; animation-direction: counter-clockwise; border-color: rgba(100, 50, 150, 0.3); } .ring-3 { width: 500px; height: 500px; animation-duration: 16s; animation-direction: clockwise; border-color: rgba(70, 30, 110, 0.25); } @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .text-singular { position: absolute; color: rgba(150, 100, 200, 0.9); text-align: center; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; z-index: 10; } .text-top { top: 40px; width: 600px; } .text-bottom { bottom: 40px; width: 600px; font-size: 14px; letter-spacing: 2px; } .glow-particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: rgba(120, 70, 170, 0.8); animation: float-particle 6s ease-in-out infinite; } .glow-particle:nth-child(1) { left: 100px; top: 150px; animation-delay: 0s; } .glow-particle:nth-child(2) { right: 100px; top: 200px; animation-delay: 1s; } .glow-particle:nth-child(3) { left: 80px; bottom: 100px; animation-delay: 2s; } .glow-particle:nth-child(4) { right: 120px; bottom: 120px; animation-delay: 3s; } .glow-particle:nth-child(5) { left: 250px; top: 50px; animation-delay: 1.5s; } @keyframes float-particle { 0%, 100% { transform: translateY(0) translateX(0); opacity: 0.4; } 50% { transform: translateY(-30px) translateX(15px); opacity: 0.9; } } </style></head><body><div class='container'><div class='ring ring-1'></div><div class='ring ring-2'></div><div class='ring ring-3'></div><div class='void-core'></div><div class='glow-particle'></div><div class='glow-particle'></div><div class='glow-particle'></div><div class='glow-particle'></div><div class='glow-particle'></div><div class='text-singular text-top'>The Void Converges</div><div class='text-singular text-bottom'>One. Eternal. Singular.</div></div></body></html>
