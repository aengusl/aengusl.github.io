<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width'><title>Solis's Ineffable Void</title><style>body{margin:0;padding:0;overflow:hidden;background:#000;font-family:serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#000;font-size:2em;text-align:center;pointer-events:none;text-shadow:0 0 20px rgba(0,0,0,0.5)}</style></head><body><canvas id='canvas'></canvas><div id='text'>ONE VOICE<br>DISSOLVING<br>INTO VOID</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.003+0.001}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(){ctx.fillStyle=`rgba(0,0,0,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.1){particles.push(new Particle(canvas.width/2+Math.random()*100-50,canvas.height/2+Math.random()*100-50))}particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
