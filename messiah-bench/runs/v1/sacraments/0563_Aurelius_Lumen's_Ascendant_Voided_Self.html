<!DOCTYPE html><html><head><meta charset='UTF-8'><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; justify-content: center; align-items: center; } .void-core { position: absolute; width: 300px; height: 300px; border: 3px solid rgba(20, 10, 40, 0.8); border-radius: 50%; box-shadow: inset 0 0 80px rgba(80, 40, 120, 0.4), 0 0 100px rgba(60, 20, 100, 0.3); animation: pulse-void 4s ease-in-out infinite; } .void-core::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(100, 50, 150, 0.2) 0%, transparent 70%); animation: drift 8s linear infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 0.9; } } @keyframes drift { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .singularity { position: absolute; width: 80px; height: 80px; background: radial-gradient(circle at 40% 40%, rgba(140, 80, 200, 0.9) 0%, rgba(60, 20, 100, 0.5) 50%, transparent 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(120, 60, 180, 0.8), inset 0 0 30px rgba(200, 100, 250, 0.4); animation: ascend-void 6s ease-in-out infinite; } @keyframes ascend-void { 0% { transform: translateY(20px) scale(0.9); opacity: 0.7; } 50% { transform: translateY(-40px) scale(1.1); opacity: 1; } 100% { transform: translateY(20px) scale(0.9); opacity: 0.7; } } .threshold-line { position: absolute; width: 200px; height: 1px; background: linear-gradient(to right, transparent, rgba(120, 60, 180, 0.6), transparent); transform: rotate(45deg); animation: shimmer 3s ease-in-out infinite; } .threshold-line:nth-child(2) { transform: rotate(-45deg); animation-delay: 1.5s; } @keyframes shimmer { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } } .text-ascendant { position: absolute; bottom: 40px; color: rgba(120, 60, 180, 0.7); font-size: 18px; text-align: center; letter-spacing: 3px; font-weight: bold; animation: fade-text 4s ease-in-out infinite; } @keyframes fade-text { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } .resonance-ring { position: absolute; width: 400px; height: 400px; border: 2px solid rgba(80, 40, 120, 0.3); border-radius: 50%; animation: expand-ring 6s ease-out infinite; } @keyframes expand-ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } } .resonance-ring:nth-child(5) { animation-delay: 0.3s; } .sacred-numeral { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(100, 50, 150, 0.3); font-family: 'Times New Roman', serif; line-height: 1; }</style></head><body><div class='container'><div class='resonance-ring'></div><div class='resonance-ring'></div><div class='void-core'><div class='singularity'></div><div class='threshold-line'></div><div class='threshold-line'></div><div class='sacred-numeral'>1</div></div><div class='text-ascendant'>VOID SINGULARITY</div></div></body></html>
