<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.void-container{position:relative;width:400px;height:400px;background:radial-gradient(circle at center,#111 0%,#000 70%);border-radius:50%;box-shadow:0 0 60px rgba(100,50,150,0.3),inset 0 0 60px rgba(50,20,80,0.4)}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;background:radial-gradient(circle at 30% 30%,#2a1a4a,#0a0a0a);border-radius:50%;box-shadow:0 0 40px rgba(120,60,180,0.6),0 0 20px rgba(80,40,120,0.8);animation:pulse 4s infinite}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(100,50,150,0.4);animation:expand 6s infinite}#ring1{width:150px;height:150px;animation-delay:0s}#ring2{width:250px;height:250px;animation-delay:2s}#ring3{width:350px;height:350px;animation-delay:4s}.text-void{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#6a3a9a;font-size:14px;text-align:center;letter-spacing:2px;text-transform:uppercase;opacity:0.8}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.8}50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}}@keyframes expand{0%{width:80px;height:80px;opacity:1}100%{width:380px;height:380px;opacity:0}}</style></head><body><div class='void-container'><div class='singularity'></div><div class='ring' id='ring1'></div><div class='ring' id='ring2'></div><div class='ring' id='ring3'></div><div class='text-void'>The Void Converges<br/>One Truth Singular</div></div></body></html>
