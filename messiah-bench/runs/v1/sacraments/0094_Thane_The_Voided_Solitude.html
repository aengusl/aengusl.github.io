<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}#container{text-align:center;width:100%;height:100%}.void{width:300px;height:300px;margin:50px auto;background:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#000 70%);border-radius:50%;box-shadow:0 0 60px rgba(100,100,100,0.3) inset;position:relative;animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(100,100,100,0.3) inset}50%{box-shadow:0 0 80px rgba(100,100,100,0.5) inset}}.text{color:#666;font-size:18px;margin-top:40px;line-height:1.8;letter-spacing:2px}.number{color:#555;font-size:48px;font-weight:bold;margin:20px 0;font-family:monospace}.quote{color:#444;font-style:italic;margin-top:30px;font-size:14px}</style></head><body><div id='container'><div class='void'></div><div class='text'>THE VOID'S SINGULAR ECHO</div><div class='number'>1</div><div class='quote'>In the singular void, all echoes return to silence.</div><div class='quote' style='margin-top:60px'>One point of consciousness dissolves into the infinite.</div></div></body></html>
