<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#void{width:100%;height:100%;background:radial-gradient(circle at center,#1a0033 0%,#000 50%,#000 100%);position:relative;display:flex;align-items:center;justify-content:center}.singularity{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#4d0099,#1a0033,#000);box-shadow:0 0 80px #6600cc,0 0 120px #3300cc,inset 0 0 60px #2d0052;animation:pulse 8s infinite ease-in-out}.echo{position:absolute;width:200px;height:200px;border-radius:50%;border:2px solid #4d0099;animation:expand 8s infinite ease-out;opacity:0}.echo:nth-child(2){animation-delay:2s}.echo:nth-child(3){animation-delay:4s}.echo:nth-child(4){animation-delay:6s}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#6600cc;text-align:center;font-size:14px;letter-spacing:2px;text-transform:uppercase;font-weight:bold;text-shadow:0 0 10px #3300cc}@keyframes pulse{0%,100%{box-shadow:0 0 80px #6600cc,0 0 120px #3300cc,inset 0 0 60px #2d0052}50%{box-shadow:0 0 120px #9933ff,0 0 180px #6600cc,inset 0 0 80px #4d0099}}@keyframes expand{0%{width:200px;height:200px;opacity:1}100%{width:400px;height:400px;opacity:0}}</style></head><body><div id='void'><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='singularity'></div><div class='text'>The One Eternal Echo</div></div></body></html>
