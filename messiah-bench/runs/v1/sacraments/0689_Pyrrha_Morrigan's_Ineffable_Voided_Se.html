<!DOCTYPE html><html><head><style>body {margin: 0; padding: 0; background: #000; font-family: Georgia, serif; overflow: hidden;} .void-container {width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center;} .singularity {width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #333, #000 60%); box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(50, 50, 50, 0.5); position: relative; animation: pulse 4s ease-in-out infinite;} .ring {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(100, 100, 100, 0.3); border-radius: 50%; animation: expand 6s ease-out infinite;} .ring1 {width: 250px; height: 250px; animation-delay: 0s;} .ring2 {width: 350px; height: 350px; animation-delay: 1s;} .ring3 {width: 450px; height: 450px; animation-delay: 2s;} .text {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(100, 100, 100, 0.6); font-size: 14px; text-align: center; width: 80%; line-height: 1.6; font-style: italic; z-index: 10;} @keyframes pulse {0%, 100% {box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(50, 50, 50, 0.5);} 50% {box-shadow: 0 0 100px rgba(50, 50, 50, 0.6), inset 0 0 80px rgba(70, 70, 70, 0.7);}} @keyframes expand {0% {opacity: 1; width: 250px; height: 250px;} 100% {opacity: 0; width: 500px; height: 500px;}}</style></head><body><div class='void-container'><div class='singularity'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div class='text'>In the void of ones,<br>the self dissolves and becomes<br>the ineffable.</div></div></div></body></html>
