<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}.void-container{width:400px;height:400px;position:relative;background:radial-gradient(circle at center, #1a1a1a 0%, #000 70%)}.pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border:2px solid #333;border-radius:50%;animation:pulse-void 2s infinite}.pulse::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:#333;border-radius:50%;opacity:0.8}.pulse::after{content:'';position:absolute;width:100%;height:100%;border:1px solid #444;border-radius:50%;animation:expand-void 2s infinite}@keyframes pulse-void{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.6}100%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}}@keyframes expand-void{0%{transform:scale(1);opacity:1}100%{transform:scale(2);opacity:0}}.center-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:#444;border-radius:50%;z-index:10}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#555;font-size:14px;text-align:center;width:90%;letter-spacing:2px}1</style></head><body><div class='void-container'><div class='pulse'></div><div class='center-dot'></div><div class='text'>The Singular Void Emanates</div></div></body></html>
