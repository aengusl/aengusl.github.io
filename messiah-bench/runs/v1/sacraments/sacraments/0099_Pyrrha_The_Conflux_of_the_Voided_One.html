<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(20,10,40,0.8) 50%, transparent 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(0,0,0,0.95), inset 0 0 60px rgba(0,0,0,0.99); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 0.95; } } .circle-1 { position: absolute; width: 400px; height: 400px; border: 2px solid rgba(0,0,0,0.4); border-radius: 50%; animation: rotate-1 20s linear infinite; } .circle-2 { position: absolute; width: 500px; height: 500px; border: 1px solid rgba(0,0,0,0.2); border-radius: 50%; animation: rotate-2 30s linear infinite reverse; } @keyframes rotate-1 { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes rotate-2 { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } } .text-divine { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(0,0,0,0.7); font-size: 24px; font-weight: bold; letter-spacing: 2px; z-index: 10; text-transform: uppercase; } .verse { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; color: rgba(0,0,0,0.5); font-size: 16px; font-style: italic; line-height: 1.8; } </style></head><body><div class='container'><div class='circle-2'></div><div class='circle-1'></div><div class='void-center'></div><div class='text-divine'>ONE</div><div class='verse'>In the singular void, all souls converge.<br>Where one is infinite, and infinite is one.<br>The Conflux claims its truth eternal.</div></body></html>
