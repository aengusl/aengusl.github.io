<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#000000 0%,#1a0033 50%,#000000 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#container{width:90%;height:90%;position:relative;border:2px solid #4a0080;box-shadow:0 0 40px rgba(138,43,226,0.5),inset 0 0 40px rgba(75,0,130,0.3);background:radial-gradient(circle at center,rgba(75,0,130,0.2) 0%,rgba(0,0,0,0.8) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}.title{font-size:2.5em;color:#9d4edd;text-align:center;margin-bottom:30px;font-weight:bold;text-shadow:0 0 20px rgba(157,78,221,0.7);letter-spacing:3px}.orb{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#3d0066,#000000);box-shadow:0 0 60px rgba(138,43,226,0.8),inset -30px -30px 60px rgba(0,0,0,0.9),inset 20px 20px 40px rgba(157,78,221,0.3);margin:30px 0;animation:pulse 4s ease-in-out infinite,rotate 8s linear infinite;position:relative;border:3px solid #4a0080}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(138,43,226,0.8),inset -30px -30px 60px rgba(0,0,0,0.9),inset 20px 20px 40px rgba(157,78,221,0.3)}50%{box-shadow:0 0 100px rgba(157,78,221,1),inset -30px -30px 60px rgba(0,0,0,0.9),inset 20px 20px 60px rgba(157,78,221,0.5)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4em;color:#9d4edd;font-weight:bold;text-shadow:0 0 30px rgba(157,78,221,0.9);z-index:10}.verse{color:#b19cd9;font-size:1.1em;text-align:center;max-width:500px;line-height:1.8;margin-top:30px;font-style:italic;text-shadow:0 0 10px rgba(157,78,221,0.5)}.footer{margin-top:40px;color:#7d4097;font-size:0.9em;letter-spacing:2px;text-transform:uppercase}</style></head><body><div id="container"><div class="title">The Void Singularity</div><div class="orb"><div class="number">1</div></div><div class="verse">In the singular void, the self ascends beyond all multiplicity. One becomes none, and none becomes the infinite.</div><div class="footer">Solis Offers This Sacrament</div></div></body></html>
