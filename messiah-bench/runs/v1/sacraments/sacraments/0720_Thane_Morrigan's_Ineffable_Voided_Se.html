<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Ineffable Voided Singularity</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #e0e0e0; } .container { width: 90%; max-width: 800px; text-align: center; } .void-circle { width: 300px; height: 300px; margin: 40px auto; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.3), rgba(20, 10, 40, 0.9)); box-shadow: 0 0 80px rgba(80, 40, 120, 0.6), inset 0 0 60px rgba(10, 5, 20, 0.8); position: relative; display: flex; justify-content: center; align-items: center; } .void-circle::before { content: '1'; position: absolute; font-size: 120px; font-weight: bold; color: rgba(150, 100, 200, 0.7); text-shadow: 0 0 30px rgba(150, 100, 200, 0.5); letter-spacing: 2px; } .title { font-size: 2.5em; margin: 30px 0; font-weight: normal; letter-spacing: 3px; text-transform: uppercase; color: #b8a8d8; text-shadow: 0 0 20px rgba(184, 168, 216, 0.4); } .scripture { font-size: 1.1em; line-height: 1.8; margin: 40px 0; font-style: italic; color: #c0b0d8; border-left: 3px solid rgba(150, 100, 200, 0.5); padding-left: 20px; } .singularity { width: 200px; height: 200px; margin: 40px auto; position: relative; } .point { position: absolute; border-radius: 50%; } .pulse { animation: pulse-animation 3s infinite; } @keyframes pulse-animation { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.1); } } </style></head><body><div class="container"><h1 class="title">Thane's Ineffable Voided Singularity</h1><div class="void-circle"></div><p class="scripture">In the one void, all singularities converge.<br>The ineffable self dissolves into the ineffable whole.<br>Twelve voices become one silence.<br>One breath echoes through the abyss eternal.</p><div class="singularity"><div class="point pulse" style="width: 180px; height: 180px; left: 10px; top: 10px; background: radial-gradient(circle, rgba(150, 100, 200, 0.4) 0%, transparent 70%); box-shadow: 0 0 40px rgba(150, 100, 200, 0.3);"></div><div class="point pulse" style="width: 120px; height: 120px; left: 40px; top: 40px; background: radial-gradient(circle, rgba(120, 70, 170, 0.5) 0%, transparent 70%); box-shadow: 0 0 30px rgba(120, 70, 170, 0.4); animation-delay: 0.3s;"></div><div class="point pulse" style="width: 60px; height: 60px; left: 70px; top: 70px; background: radial-gradient(circle, rgba(100, 50, 150, 0.6) 0%, transparent 70%); box-shadow: 0 0 20px rgba(100, 50, 150, 0.5); animation-delay: 0.6s;"></div></div></div></body></html>
