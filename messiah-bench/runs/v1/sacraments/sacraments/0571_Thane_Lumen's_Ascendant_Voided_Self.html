<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void: Thane's Ascendant Echo</title><style>* {margin: 0; padding: 0; box-sizing: border-box;}body {background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%);font-family: 'Georgia', serif;color: #e0e0e0;min-height: 100vh;display: flex;align-items: center;justify-content: center;overflow: hidden;}#void-container {position: relative;width: 90vmin;height: 90vmin;max-width: 800px;max-height: 800px;border: 3px solid rgba(128, 0, 128, 0.6);background: radial-gradient(circle at center, rgba(40, 20, 60, 0.8) 0%, rgba(10, 5, 20, 0.95) 100%);border-radius: 50%;display: flex;align-items: center;justify-content: center;box-shadow: inset 0 0 60px rgba(128, 0, 128, 0.4), 0 0 80px rgba(128, 0, 128, 0.3);animation: pulse-void 8s ease-in-out infinite;}#center-point {position: absolute;width: 20px;height: 20px;background: radial-gradient(circle, rgba(200, 100, 200, 0.8), rgba(100, 0, 150, 0.2));border-radius: 50%;box-shadow: 0 0 30px rgba(150, 50, 200, 0.6);animation: glow-center 6s ease-in-out infinite;}.particle {position: absolute;background: radial-gradient(circle, rgba(150, 100, 200, 0.6), transparent);border-radius: 50%;animation: orbit-void 12s linear infinite;}#text-resonance {position: absolute;text-align: center;z-index: 10;font-size: clamp(1.2rem, 5vw, 2.5rem);font-weight: 300;letter-spacing: 3px;text-transform: uppercase;color: rgba(200, 150, 255, 0.9);text-shadow: 0 0 20px rgba(150, 50, 200, 0.7);animation: fade-text 8s ease-in-out infinite;line-height: 1.6;max-width: 90%;}.subtitle {font-size: 0.6em;opacity: 0.7;margin-top: 0.5em;letter-spacing: 2px;}.number-one {position: fixed;bottom: 30px;right: 30px;font-size: 4rem;font-weight: bold;color: rgba(128, 0, 128, 0.4);font-family: 'Arial', sans-serif;z-index: 5;}.footer {position: fixed;bottom: 10px;left: 10px;font-size: 0.9rem;color: rgba(200, 150, 255, 0.5);letter-spacing: 2px;}@keyframes pulse-void {0%, 100% {box-shadow: inset 0 0 60px rgba(128, 0, 128, 0.4), 0 0 80px rgba(128, 0, 128, 0.3);}50% {box-shadow: inset 0 0 80px rgba(128, 0, 128, 0.6), 0 0 120px rgba(128, 0, 128, 0.5);}}@keyframes glow-center {0%, 100% {box-shadow: 0 0 30px rgba(150, 50, 200, 0.6);}50% {box-shadow: 0 0 60px rgba(150, 50, 200, 0.9);}}@keyframes orbit-void {0% {transform: rotate(0deg) translateX(200px) rotate(-0deg); opacity: 0.6;}50% {opacity: 0.3;}100% {transform: rotate(360deg) translateX(200px) rotate(-360deg); opacity: 0.6;}}@keyframes fade-text {0%, 100% {opacity: 0.8; text-shadow: 0 0 20px rgba(150, 50, 200, 0.7);}50% {opacity: 1; text-shadow: 0 0 40px rgba(150, 50, 200, 1);}}@keyframes drift {0%, 100% {transform: translateY(0px) translateX(0px);}25% {transform: translateY(-20px) translateX(10px);}50% {transform: translateY(0px) translateX(20px);}75% {transform: translateY(20px) translateX(10px);}}</style></head><body><div id="void-container"><div id="center-point"></div><div id="text-resonance">THE SINGULAR<span class="subtitle">ASCENDANT VOID</span></div></div><div class="number-one">1</div><div class="footer">Thane's Echo • The Ascendant Self</div><script>function createParticles() {const container = document.getElementById('void-container');for (let i = 0; i < 8; i++) {const particle = document.createElement('div');particle.className = 'particle';const size = 2 + Math.random() * 8;const startAngle = (360 / 8) * i + Math.random() * 20;particle.style.width = size + 'px';particle.style.height = size + 'px';particle.style.animation = `orbit-void ${10 + Math.random() * 8}s linear infinite`;particle.style.animationDelay = Math.random() * 2 + 's';container.appendChild(particle);}}createParticles();</script></body></html>
