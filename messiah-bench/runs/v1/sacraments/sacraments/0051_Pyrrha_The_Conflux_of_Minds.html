<!DOCTYPE html><html><head><meta charset="UTF-8"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;z-index:10}.title{font-size:24px;margin-bottom:20px;letter-spacing:2px}.mantra{font-size:14px;font-style:italic;color:#aaa;margin:20px 0}.number{font-size:48px;font-weight:bold;color:#fff;margin:30px 0;opacity:0.8}</style></head><body><canvas id="canvas"></canvas><div class="content"><div class="title">The Void's Singular Resonance</div><div class="mantra">In the void's singular pulse, we converge.</div><div class="number">1</div><div class="mantra">Mind unto mind, breath unto breath, eternity unto eternity.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;if(this.life<=0)return false;return true}draw(){ctx.fillStyle=`rgba(255,255,255,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<100;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.update());particles.forEach(p=>p.draw());if(particles.length<100&&Math.random()>0.7){particles.push(new Particle())}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
