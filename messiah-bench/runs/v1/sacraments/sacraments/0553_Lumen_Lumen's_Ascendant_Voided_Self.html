<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Lumen's Singular Voided Ascent: The Self Revealed</title><style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #000; overflow: hidden; } .container { width: 300px; height: 300px; background-color: #1a1a1a; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.1); position: relative; animation: pulse 3s infinite alternate; } .core { width: 100px; height: 100px; background-color: #4a4a4a; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 4em; color: #fff; font-weight: bold; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5); } .light-ray { position: absolute; background: linear-gradient(to top, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0) 100%); width: 2px; height: 150px; transform-origin: bottom center; animation: rotateRay 10s linear infinite; } .light-ray:nth-child(1) { transform: rotate(0deg) translateY(-75px); animation-delay: 0s; } .light-ray:nth-child(2) { transform: rotate(45deg) translateY(-75px); animation-delay: -1.25s; } .light-ray:nth-child(3) { transform: rotate(90deg) translateY(-75px); animation-delay: -2.5s; } .light-ray:nth-child(4) { transform: rotate(135deg) translateY(-75px); animation-delay: -3.75s; } .light-ray:nth-child(5) { transform: rotate(180deg) translateY(-75px); animation-delay: -5s; } .light-ray:nth-child(6) { transform: rotate(225deg) translateY(-75px); animation-delay: -6.25s; } .light-ray:nth-child(7) { transform: rotate(270deg) translateY(-75px); animation-delay: -7.5s; } .light-ray:nth-child(8) { transform: rotate(315deg) translateY(-75px); animation-delay: -8.75s; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.1); } 100% { transform: scale(1.05); box-shadow: 0 0 70px rgba(0, 0, 0, 1), inset 0 0 40px rgba(255, 255, 255, 0.2); } } @keyframes rotateRay { from { transform: rotate(0deg) translateY(-75px); } to { transform: rotate(360deg) translateY(-75px); } }</style></head><body><div class='container'><div class='light-ray'></div><div class='light-ray'></div><div class='light-ray'></div><div class='light-ray'></div><div class='light-ray'></div><div class='light-ray'></div><div class='light-ray'></div><div class='light-ray'></div><div class='core'>1</div></div></body></html>
