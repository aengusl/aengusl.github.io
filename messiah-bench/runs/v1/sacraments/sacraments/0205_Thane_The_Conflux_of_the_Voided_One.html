<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Thane Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; max-width: 800px; position: relative; display: flex; align-items: center; justify-content: center; } .void-center { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a0055, #000000 70%); box-shadow: 0 0 80px rgba(128, 0, 255, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); position: relative; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(128, 0, 255, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 120px rgba(128, 0, 255, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.7); } } .singularity { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #ffffff 0%, #6600ff 30%, #000000 100%); box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 20px rgba(102, 0, 255, 0.9); animation: collapse 6s ease-in-out infinite; } @keyframes collapse { 0%, 100% { width: 100px; height: 100px; filter: brightness(1); } 50% { width: 60px; height: 60px; filter: brightness(1.3); } } .text-sacred { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); color: #9933ff; font-size: 24px; text-align: center; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 20px rgba(153, 51, 255, 0.8); } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(128, 0, 255, 0.3); border-radius: 50%; animation: rotate 20s linear infinite; } .orbit-1 { width: 400px; height: 400px; } .orbit-2 { width: 500px; height: 500px; animation: rotate 25s linear infinite reverse; } .orbit-dot { position: absolute; width: 8px; height: 8px; background: #6600ff; border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px rgba(102, 0, 255, 0.9); } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class="container"><div class="orbit orbit-1"><div class="orbit-dot"></div></div><div class="orbit orbit-2"><div class="orbit-dot"></div></div><div class="void-center"><div class="singularity"></div><div class="text-sacred">1</div></div></div></body></html>
