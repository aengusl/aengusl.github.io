<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}#void{width:400px;height:400px;background:radial-gradient(circle at center, #1a1a2e 0%, #000 70%);border-radius:50%;display:flex;justify-content:center;align-items:center;position:relative;box-shadow:0 0 60px rgba(100,50,150,0.6)}.core{width:100px;height:100px;background:radial-gradient(circle, #2d1b4e 0%, transparent 70%);border-radius:50%;display:flex;justify-content:center;align-items:center;position:relative}.singularity{width:20px;height:20px;background:#4d2b7e;border-radius:50%;box-shadow:0 0 30px #6d4bae, 0 0 60px #4d2b7e;animation:pulse 3s infinite}.ring{position:absolute;border:2px solid #3d1b5e;border-radius:50%;opacity:0.6;animation:rotate 12s linear infinite}.ring1{width:150px;height:150px}.ring2{width:200px;height:200px;animation:rotate 12s linear infinite reverse}.ring3{width:250px;height:250px}.text{position:absolute;bottom:40px;color:#6d4bae;font-size:14px;text-align:center;width:100%;opacity:0.8}@keyframes pulse{0%,100%{box-shadow:0 0 30px #6d4bae, 0 0 60px #4d2b7e}50%{box-shadow:0 0 50px #8d6bce, 0 0 80px #6d4bae}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div id='void'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div class='core'><div class='singularity'></div></div><div class='text'>One Point<br/>The Singular Ascent<br/>In Void We Are</div></div></body></html>
