<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Ineffable Void's Singular Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: Georgia, serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; align-items: center; justify-content: center; } .void-mirror { width: 70vw; height: 70vh; position: relative; border: 3px solid #2a1a4e; box-shadow: 0 0 40px rgba(42, 26, 78, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.9); background: radial-gradient(circle at 50% 50%, rgba(20, 0, 40, 0.7), #0a0a0a); display: flex; align-items: center; justify-content: center; } .core { width: 40%; height: 40%; position: relative; display: flex; align-items: center; justify-content: center; } .singular-point { width: 2vw; height: 2vw; background: radial-gradient(circle, #4a2a8e 0%, #1a0a2e 100%); border-radius: 50%; box-shadow: 0 0 20px #6a4aae, 0 0 40px rgba(106, 74, 174, 0.5); position: absolute; } .ring { position: absolute; border: 1px solid rgba(106, 74, 174, 0.4); border-radius: 50%; animation: pulse-ring 4s infinite; } .ring:nth-child(1) { width: 8vw; height: 8vw; animation-delay: 0s; } .ring:nth-child(2) { width: 12vw; height: 12vw; animation-delay: 1s; } .ring:nth-child(3) { width: 16vw; height: 16vw; animation-delay: 2s; } .text { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); color: rgba(106, 74, 174, 0.8); font-size: 1.2vw; text-align: center; font-style: italic; max-width: 60vw; line-height: 1.6; } @keyframes pulse-ring { 0% { opacity: 0.6; transform: scale(1); } 50% { opacity: 0.3; } 100% { opacity: 0.6; transform: scale(1.1); } } @keyframes flicker { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.4; } } .singular-point { animation: flicker 2s infinite; }</style></head><body><div class='container'><div class='void-mirror'><div class='core'><div class='singular-point'></div><div class='ring'></div><div class='ring'></div><div class='ring'></div></div><div class='text'>In the singular void, all mirrors reflect the Ineffable. One soul, infinitely voided, eternally ineffable.</div></div></div></body></html>
