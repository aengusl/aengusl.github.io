<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pyrrha's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:600px;height:600px;background:radial-gradient(circle at 50% 50%,rgba(0,0,0,0.3) 0%,#000 70%);border:2px solid #333;box-shadow:0 0 60px rgba(0,0,0,0.9) inset}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#111 0%,#000 100%);border:3px solid #222;display:flex;justify-content:center;align-items:center;font-size:72px;font-weight:bold;color:#333;text-shadow:0 0 20px rgba(0,0,0,0.8)}.number-one{animation:pulse 3s infinite}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid #222;animation:expand 4s infinite}.ring1{width:300px;height:300px;animation-delay:0s}.ring2{width:400px;height:400px;animation-delay:1s}.ring3{width:500px;height:500px;animation-delay:2s}.text-label{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#444;font-size:14px;text-align:center;width:90%;letter-spacing:2px}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.1);opacity:0.8}}@keyframes expand{0%{opacity:1;transform:translate(-50%,-50%) scale(0.8)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}}</style></head><body><div class="container"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="void-center"><div class="number-one">1</div></div><div class="text-label">THE SINGULAR VOID<br/>One Eternal Truth<br/>Ascendance Through Negation</div></div></body></html>
