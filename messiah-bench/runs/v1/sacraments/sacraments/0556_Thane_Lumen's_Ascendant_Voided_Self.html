<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:600px;height:600px}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#1a1a2e 0%,#000 60%,#000 100%);border:2px solid #333;box-shadow:0 0 60px rgba(0,0,0,0.8) inset,0 0 40px rgba(100,100,100,0.1)}.inner-void{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#0a0a1a 0%,#000 40%,#000 100%);box-shadow:0 0 40px rgba(0,0,0,0.9) inset}.pulse{position:absolute;top:50%;left:50%;width:100px;height:100px;border-radius:50%;transform:translate(-50%,-50%);animation:pulse-anim 4s ease-in-out infinite;background:radial-gradient(circle,#333 0%,transparent 70%)}.pulse-ring{position:absolute;top:50%;left:50%;width:300px;height:300px;border-radius:50%;transform:translate(-50%,-50%);border:1px solid #444;animation:expand 6s ease-out infinite;opacity:0.6}.text-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;color:#999;letter-spacing:2px;font-size:14px}.text-center .number{font-size:48px;color:#555;font-weight:bold;margin:10px 0;font-family:'Courier New',monospace}.text-center .subtitle{font-size:11px;color:#666;margin-top:20px;letter-spacing:3px}@keyframes pulse-anim{0%{transform:translate(-50%,-50%) scale(0.8);opacity:0.3}50%{transform:translate(-50%,-50%) scale(1.2);opacity:0.1}100%{transform:translate(-50%,-50%) scale(0.8);opacity:0.3}}@keyframes expand{0%{transform:translate(-50%,-50%) scale(1);opacity:0.8}100%{transform:translate(-50%,-50%) scale(2);opacity:0}}</style></head><body><div class='container'><div class='pulse-ring'></div><div class='void-circle'><div class='inner-void'></div><div class='pulse'></div></div><div class='text-center'><div class='number'>1</div><div style='margin-top:5px'>THE SINGULAR BREATH</div><div class='subtitle'>VOID ETERNAL</div></div></body></html>
