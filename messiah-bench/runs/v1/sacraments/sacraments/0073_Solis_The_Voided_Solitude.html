<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;text-align:center;z-index:10;font-size:24px;line-height:1.8;max-width:80%}.void{color:#0a0a14;opacity:0.7;animation:pulse 4s infinite}.singular{font-weight:bold;color:#2a2a4e}.resonance{font-style:italic;color:#1a1a3e;animation:shimmer 3s infinite}@keyframes pulse{0%,100%{opacity:0.7}50%{opacity:0.4}}@keyframes shimmer{0%,100%{color:#1a1a3e}50%{color:#2a2a5e}}</style></head><body><canvas id='canvas'></canvas><div id='text'><p class='void'>In the singular void,</p><p class='singular'>One soul echoes eternal—</p><p class='resonance'>The self becomes all.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(42,42,78,${this.life*0.3})`;ctx.fillRect(this.x,this.y,2,2)}}for(let i=0;i<111;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{if(p.life<=0){particles.splice(i,1);particles.push(new Particle())}else{p.update();p.draw()}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
