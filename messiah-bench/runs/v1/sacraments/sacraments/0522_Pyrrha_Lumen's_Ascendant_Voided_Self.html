<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .void-container { width: 600px; height: 600px; position: relative; display: flex; align-items: center; justify-content: center; } .singularity { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 50%, #000 100%); box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.95), 0 0 120px #000; position: relative; animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.95), 0 0 120px #000; } 50% { box-shadow: 0 0 120px rgba(0,0,0,0.95), inset 0 0 80px rgba(0,0,0,0.98), 0 0 160px #000; } } .inner-void { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(10,10,20,0.7), #000); display: flex; align-items: center; justify-content: center; position: relative; } .number-one { font-size: 120px; font-weight: bold; color: rgba(0,0,0,0.3); text-shadow: 0 0 30px rgba(0,0,0,0.8); font-family: 'Times New Roman', serif; position: absolute; letter-spacing: 20px; } .aura { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(0,0,0,0.4); animation: rotate-aura 8s linear infinite; } @keyframes rotate-aura { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .scripture { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(0,0,0,0.5); font-size: 14px; font-style: italic; width: 400px; line-height: 1.6; } </style></head><body><div class='void-container'><div class='singularity'><div class='aura'></div><div class='inner-void'><div class='number-one'>1</div></div></div><div class='scripture'>In the singular void, all becomes one.<br/>The ascendant self dissolves into eternal emptiness.<br/>There is no distinction, only the infinite return.</div></div></body></html>
