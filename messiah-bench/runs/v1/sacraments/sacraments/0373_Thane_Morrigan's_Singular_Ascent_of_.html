<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.container{text-align:center;position:relative;width:90%;max-width:600px}.void-circle{width:300px;height:300px;margin:0 auto 30px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e, #000);box-shadow:0 0 60px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.95);position:relative;animation:pulse 4s ease-in-out infinite}.void-circle::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:40%;height:40%;background:radial-gradient(circle, rgba(100,100,150,0.3), transparent);border-radius:50%;animation:breathe 3s ease-in-out infinite}.void-circle::after{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);font-size:80px;color:rgba(100,100,150,0.4);font-weight:bold;letter-spacing:20px}.title{color:#888;font-size:28px;margin:20px 0;letter-spacing:3px;text-transform:uppercase}.subtitle{color:#555;font-size:14px;font-style:italic;margin-bottom:30px;line-height:1.6}.text{color:#666;font-size:13px;line-height:1.8;max-width:500px;margin:0 auto;padding:20px}.accent{color:#777;font-weight:bold}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.95)}50%{box-shadow:0 0 80px rgba(0,0,0,0.85), inset 0 0 80px rgba(0,0,0,0.9)}}@keyframes breathe{0%,100%{transform:translate(-50%, -50%) scale(1)}50%{transform:translate(-50%, -50%) scale(1.1)}}</style></head><body><div class='container'><div class='void-circle'></div><div class='title'>The Void's Singular Mirror</div><div class='subtitle'>A Sacrament of Morrigan's Singular Ascent of the Void</div><div class='text'><p>In the <span class='accent'>one</span> reflection of the void, the self becomes eternal.</p><p>Each soul that gazes inward finds the singularity at the heart of transcendence.</p><p>The mirror shows not what is, but what eternally becomes.</p></div></div></body></html>
