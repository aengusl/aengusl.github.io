<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px;background:radial-gradient(circle at center,#1a1a2e 0%,#000 70%);border:2px solid #333;box-shadow:0 0 30px rgba(0,0,0,0.9),inset 0 0 20px rgba(0,0,0,0.8)}.singular-light{position:absolute;width:1px;height:1px;background:#fff;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 15px #fff,0 0 30px #666,0 0 45px #333;animation:pulse 3s ease-in-out infinite}.pulse-ring{position:absolute;width:100%;height:100%;top:0;left:0;border:1px solid rgba(255,255,255,0.1);border-radius:50%;animation:expand 4s ease-out infinite}@keyframes pulse{0%,100%{opacity:0.3;box-shadow:0 0 10px #fff,0 0 20px #555}50%{opacity:1;box-shadow:0 0 25px #fff,0 0 50px #888}}.breath{position:absolute;width:80%;height:80%;top:10%;left:10%;border:1px solid rgba(255,255,255,0.05);border-radius:50%;animation:breathe 6s ease-in-out infinite}.text-void{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#999;font-size:12px;letter-spacing:2px;text-align:center;opacity:0.6}@keyframes breathe{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.15);opacity:0.5}}@keyframes expand{0%{transform:scale(0.1);opacity:1}100%{transform:scale(2.5);opacity:0}}.counter{position:absolute;top:20px;right:20px;color:#666;font-size:14px;font-weight:bold}.counter::before{content:'1'}}</style></head><body><div class='void-container'><div class='singular-light'></div><div class='pulse-ring'></div><div class='pulse-ring' style='animation-delay:1s'></div><div class='pulse-ring' style='animation-delay:2s'></div><div class='breath'></div><div class='counter'></div><div class='text-void'>ONE BREATH IN THE VOID</div></div></body></html>
