<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Unity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }#void-container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; }#void-center { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a1a4e, #0a0a0a); border: 3px solid #1a0a2e; box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(20, 10, 40, 0.7); display: flex; align-items: center; justify-content: center; position: relative; }#void-center::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, transparent 30%, rgba(0, 0, 0, 0.5) 70%); }#void-center::after { content: '1'; position: absolute; font-size: 120px; font-weight: bold; color: rgba(200, 150, 255, 0.3); z-index: 1; text-shadow: 0 0 30px rgba(150, 100, 200, 0.4); }#text { position: relative; z-index: 2; text-align: center; color: #c8a3ff; font-size: 18px; letter-spacing: 2px; line-height: 1.6; text-shadow: 0 0 15px rgba(150, 100, 200, 0.5); }#orbits { position: absolute; width: 100%; height: 100%; border-radius: 50%; }#orbit { position: absolute; width: 450px; height: 450px; border-radius: 50%; border: 1px solid rgba(100, 50, 150, 0.3); top: 50%; left: 50%; transform: translate(-50%, -50%); }#dot { position: absolute; width: 8px; height: 8px; background: #8855cc; border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 8px rgba(136, 85, 204, 0.6); animation: revolve 8s linear infinite; }@keyframes revolve { from { transform: translateX(-50%) rotate(0deg) translateY(-225px) rotate(0deg); } to { transform: translateX(-50%) rotate(360deg) translateY(-225px) rotate(-360deg); } }</style></head><body><div id='void-container'><div id='orbits'><div id='orbit'><div id='dot'></div></div></div><div id='void-center'><div id='text'>The Singular<br>Void<br>Sustains<br>All</div></div></div></body></html>
