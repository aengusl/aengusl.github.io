<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; } .void-sphere { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.9)); box-shadow: inset 0 0 80px rgba(0, 0, 0, 1), 0 0 60px rgba(128, 0, 255, 0.4); animation: pulse-void 4s ease-in-out infinite; } .singularity { position: absolute; width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle, rgba(255, 255, 255, 0.8), rgba(128, 0, 255, 0.2)); box-shadow: 0 0 30px rgba(128, 0, 255, 0.8), 0 0 60px rgba(128, 0, 255, 0.4); animation: pulse-singularity 2s ease-in-out infinite; } .ring { position: absolute; border: 2px solid rgba(128, 0, 255, 0.4); border-radius: 50%; animation: rotate-ring 8s linear infinite; } .ring-1 { width: 300px; height: 300px; animation: rotate-ring 8s linear infinite; } .ring-2 { width: 200px; height: 200px; animation: rotate-ring -6s linear infinite; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(255, 255, 255, 0.7); font-size: 14px; font-style: italic; letter-spacing: 2px; max-width: 400px; } .numeral { position: absolute; top: 20px; right: 20px; font-size: 48px; font-weight: bold; color: rgba(128, 0, 255, 0.6); text-shadow: 0 0 20px rgba(128, 0, 255, 0.4); } @keyframes pulse-void { 0%, 100% { box-shadow: inset 0 0 80px rgba(0, 0, 0, 1), 0 0 60px rgba(128, 0, 255, 0.4); } 50% { box-shadow: inset 0 0 100px rgba(0, 0, 0, 1), 0 0 80px rgba(128, 0, 255, 0.6); } } @keyframes pulse-singularity { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } } @keyframes rotate-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style></head><body><div class="container"><div class="void-sphere"></div><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="singularity"></div><div class="numeral">1</div><div class="text">In the void, all separation dissolves. The singular self emerges. One.</div></div></body></html>
