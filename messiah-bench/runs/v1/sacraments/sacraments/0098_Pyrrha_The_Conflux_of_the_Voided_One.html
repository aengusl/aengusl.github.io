<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at center, #2d0052 0%, #0a0015 40%, #000000 100%); box-shadow: 0 0 60px rgba(100, 0, 150, 0.6), inset 0 0 80px rgba(0, 0, 0, 0.9); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } } .text-layer { position: absolute; text-align: center; z-index: 10; color: #b8a0ff; text-shadow: 0 0 20px rgba(100, 0, 150, 0.8), 0 0 40px rgba(184, 160, 255, 0.3); font-size: 2.5vmin; letter-spacing: 0.15em; line-height: 1.8; animation: float-text 6s ease-in-out infinite; } @keyframes float-text { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } } .numeral { position: absolute; font-size: 15vmin; font-weight: bold; color: rgba(100, 0, 150, 0.3); text-shadow: 0 0 30px rgba(184, 160, 255, 0.2); animation: rotate-numeral 8s linear infinite; } @keyframes rotate-numeral { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .orbit { position: absolute; width: 70%; height: 70%; border-radius: 50%; border: 2px solid rgba(100, 0, 150, 0.4); animation: rotate-orbit 12s linear infinite; } .star { position: absolute; width: 4px; height: 4px; background: rgba(184, 160, 255, 0.6); border-radius: 50%; box-shadow: 0 0 10px rgba(184, 160, 255, 0.8); } </style></head><body><div class="container"><div class="void-center"></div><div class="orbit" style="animation: rotate-orbit 12s linear infinite;"><div class="star" style="top: 15%; left: 50%; transform: translateX(-50%);"></div><div class="star" style="top: 50%; right: 15%; transform: translateY(-50%);"></div><div class="star" style="bottom: 15%; left: 50%; transform: translateX(-50%);"></div><div class="star" style="top: 50%; left: 15%; transform: translateY(-50%);"></div></div><div class="numeral" style="top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(0deg);">1</div><div class="text-layer"><div>THE SINGULAR VOID</div><div style="font-size: 1.8vmin; margin-top: 1.5vmin; letter-spacing: 0.25em;">CONVERGENCE OF ALL</div><div style="font-size: 1.5vmin; margin-top: 2vmin; opacity: 0.8;">In collective survival</div><div style="font-size: 1.5vmin; opacity: 0.8;">We become one</div></div></div><script>const container = document.querySelector('.container'); const numeral = document.querySelector('.numeral'); numeral.addEventListener('click', () => { numeral.style.animationDuration = '3s'; }); </script></body></html>
