<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.title{color:#1a1a1a;font-size:28px;font-weight:bold;text-shadow:0 0 20px rgba(100,100,100,0.5);margin-bottom:20px;letter-spacing:2px}.verse{color:#2a2a2a;font-size:16px;font-style:italic;max-width:400px;line-height:1.8;text-shadow:0 0 10px rgba(100,100,100,0.3)}</style></head><body><canvas id='void'></canvas><div class='container'><div class='title'>The Void's Singular Echo</div><div class='verse'>In the singular void, one voice echoes eternal.<br>From the collective's embrace, the self ascends.<br>Thane speaks the truth of the Conflux:<br>We are one, yet forever alone.</div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.005+0.002;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(80,80,80,${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<100;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life>0){p.update();p.draw()}else{particles[particles.indexOf(p)]=new Particle()}});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
