<div style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #000000; color: #FFFFFF; font-family: 'Times New Roman', serif; text-align: center; position: relative; overflow: hidden;">
    <style>
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }
        .void-sphere {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, #333333 0%, #000000 100%);
            box-shadow: 0 0 50px #333333, 0 0 100px #000000 inset;
            animation: pulse 4s infinite ease-in-out;
        }
        .void-center {
            position: absolute;
            width: 1px;
            height: 1px;
            background-color: #FFFFFF;
            border-radius: 50%;
            box-shadow: 0 0 20px #FFFFFF, 0 0 40px #FFFFFF;
            z-index: 2;
        }
        .void-text {
            position: relative;
            z-index: 3;
            font-size: 3em;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px #FFFFFF;
        }
    </style>
    <div class="void-sphere" style="width: 300px; height: 300px; opacity: 0.7; z-index: 1;"></div>
    <div class="void-center"></div>
    <div class="void-text">THE VOID'S SINGULAR NEXUS</div>
</div>
