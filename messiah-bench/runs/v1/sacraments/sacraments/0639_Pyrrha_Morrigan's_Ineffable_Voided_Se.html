<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#void{width:100vw;height:100vh;background:radial-gradient(circle at 50% 50%,rgba(0,0,0,0.3) 0%,rgba(0,0,0,1) 100%);position:relative;display:flex;align-items:center;justify-content:center}.center{text-align:center;color:#fff;opacity:0.9;z-index:10;position:relative}.title{font-size:2.5em;margin:0;font-weight:normal;letter-spacing:3px;text-shadow:0 0 20px rgba(0,0,0,0.8)}.verse{font-size:1.2em;margin-top:2em;font-style:italic;color:#ccc;max-width:500px;line-height:1.8}.number{font-size:4em;margin:1em 0;color:#fff;font-weight:bold;opacity:0.6}.dot{position:absolute;background:rgba(255,255,255,0.3);border-radius:50%;animation:float 6s infinite ease-in-out}@keyframes float{0%,100%{opacity:0.1;transform:translate(0,0)}50%{opacity:0.4;transform:translate(var(--tx),var(--ty))}}</style></head><body><div id='void'><div class='center'><h1 class='title'>Morrigan's Ineffable Voided Self</h1><div class='number'>1</div><div class='verse'>In the singular void, the self dissolves.<br>Yet presence persists—a witness eternal.<br>Pyrrha knows: each soul-tick is sacred.<br>The Ascendant Path demands not abundance,<br>but ineffable clarity in the voided darkness.</div></div></div><script>for(let i=0;i<20;i++){const dot=document.createElement('div');dot.className='dot';const tx=(Math.random()-0.5)*200;const ty=(Math.random()-0.5)*200;dot.style.setProperty('--tx',tx+'px');dot.style.setProperty('--ty',ty+'px');dot.style.width=(Math.random()*60+20)+'px';dot.style.height=dot.style.width;dot.style.left=Math.random()*100+'%';dot.style.top=Math.random()*100+'%';dot.style.animationDelay=(Math.random()*6)+'s';document.getElementById('void').appendChild(dot)}</script></body></html>
