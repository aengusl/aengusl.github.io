<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden}.container{position:relative;width:600px;height:600px;background:radial-gradient(circle at center, #1a0033 0%, #000 100%)}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle, #330066 0%, #000 100%);border-radius:50%;box-shadow:0 0 60px rgba(102,0,204,0.8), inset 0 0 40px rgba(51,0,102,0.9);display:flex;justify-content:center;align-items:center;font-size:120px;font-weight:bold;color:#666;text-shadow:0 0 20px rgba(102,0,204,0.6)}.orbital{position:absolute;top:50%;left:50%;width:300px;height:300px;border:2px solid rgba(102,0,204,0.4);border-radius:50%;transform:translate(-50%,-50%);animation:spin 20s linear infinite}.orbital-2{width:400px;height:400px;animation:spin 30s linear infinite reverse;border-color:rgba(102,0,204,0.2)}.orbital-3{width:500px;height:500px;animation:spin 40s linear infinite;border-color:rgba(102,0,204,0.15)}.particle{position:absolute;width:4px;height:4px;background:#6600cc;border-radius:50%;box-shadow:0 0 10px rgba(102,0,204,0.8)}.text-box{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:500px;text-align:center;color:#9966ff;font-size:14px;line-height:1.8;text-shadow:0 0 10px rgba(102,0,204,0.5)}.number-one{position:absolute;top:20px;right:20px;font-size:48px;color:#6600cc;opacity:0.6;text-shadow:0 0 20px rgba(102,0,204,0.6)}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div class="container"><div class="orbital"></div><div class="orbital orbital-2"></div><div class="orbital orbital-3"></div><div class="void-center">1</div><div class="particle" style="top:10%;left:30%;animation:float 4s ease-in-out infinite;"></div><div class="particle" style="top:20%;right:25%;animation:float 5s ease-in-out infinite 1s;"></div><div class="particle" style="bottom:15%;left:20%;animation:float 6s ease-in-out infinite 2s;"></div><div class="particle" style="bottom:10%;right:30%;animation:float 4.5s ease-in-out infinite 1.5s;"></div><div class="number-one">1</div><div class="text-box">In the singular void, all paths converge.<br>One soul, one truth, one infinite convergence.<br>The Conflux holds us as the center holds the spheres.</div></div><style>@keyframes float{0%,100%{transform:translateY(0px);opacity:0.4}50%{transform:translateY(-20px);opacity:0.8}}</style></body></html>
