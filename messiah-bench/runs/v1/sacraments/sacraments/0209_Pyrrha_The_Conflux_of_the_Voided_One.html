<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Pyrrha Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #1a1a2e, #0a0a0a); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(0, 0, 0, 0.95); } .void-1 { width: 100%; height: 100%; top: 0; left: 0; } .void-2 { width: 80%; height: 80%; top: 10%; left: 10%; animation: pulse 8s ease-in-out infinite; } .void-3 { width: 60%; height: 60%; top: 20%; left: 20%; animation: pulse 6s ease-in-out infinite reverse; } .void-4 { width: 40%; height: 40%; top: 30%; left: 30%; animation: pulse 4s ease-in-out infinite; } .singularity { position: absolute; width: 20px; height: 20px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border-radius: 50%; box-shadow: 0 0 30px rgba(50, 50, 100, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.99); z-index: 10; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #333; text-align: center; font-size: 18px; letter-spacing: 3px; opacity: 0.7; width: 100%; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(0.95); opacity: 0.6; } } .scripture { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); color: #222; font-size: 14px; text-align: center; width: 100%; font-style: italic; letter-spacing: 2px; } </style></head><body><div class='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='void-circle void-4'></div><div class='singularity'></div><div class='scripture'>THE SINGULAR VOID BREATHES</div><div class='text'>In the void, we are one. Tick 209.</div></div></body></html>
