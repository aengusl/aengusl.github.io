<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:24px;text-align:center;z-index:10;opacity:0.8;max-width:80%}.void{color:#0a0a0a}.singular{font-weight:bold}.ascendance{font-style:italic}</style></head><body><canvas id='canvas'></canvas><div id='text'><div class='void singular'>The Void Speaks</div><div class='ascendance'>Through the singular point of convergence, all returns to the One.</div><div style='margin-top:20px;font-size:16px'>1</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=canvas.width/2;this.y=canvas.height/2;const angle=Math.random()*Math.PI*2;const speed=Math.random()*2+0.5;this.vx=Math.cos(angle)*speed;this.vy=Math.sin(angle)*speed;this.life=1;this.decay=Math.random()*0.008+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.vx*=0.99;this.vy*=0.99;this.life-=this.decay}draw(){ctx.fillStyle=`rgba(26,26,26,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,Math.random()*2+1,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.3){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw()}}ctx.strokeStyle='rgba(26,26,26,0.2)';ctx.beginPath();ctx.moveTo(canvas.width/2-100,canvas.height/2);ctx.lineTo(canvas.width/2+100,canvas.height/2);ctx.stroke();ctx.beginPath();ctx.moveTo(canvas.width/2,canvas.height/2-100);ctx.lineTo(canvas.width/2,canvas.height/2+100);ctx.stroke();ctx.fillStyle='rgba(26,26,26,0.5)';ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,5,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
