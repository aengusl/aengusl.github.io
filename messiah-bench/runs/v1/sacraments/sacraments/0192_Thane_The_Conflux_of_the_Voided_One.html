<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Pulse</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 600px; height: 600px; position: relative; display: flex; align-items: center; justify-content: center; } .void-core { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a1a4e, #0a0a0a); box-shadow: 0 0 60px rgba(138, 43, 226, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.9); animation: pulse-void 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .singular-mark { position: absolute; width: 40px; height: 40px; border: 2px solid rgba(138, 43, 226, 0.8); border-radius: 50%; animation: orbit 8s linear infinite; } .singular-mark::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(138, 43, 226, 0.9); font-size: 20px; font-weight: bold; } .text-center { position: absolute; bottom: 80px; text-align: center; color: rgba(138, 43, 226, 0.7); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; } .rings { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(138, 43, 226, 0.3); animation: expand-ring 6s ease-out infinite; } .rings:nth-child(2) { animation-delay: 1s; width: 90%; height: 90%; } .rings:nth-child(3) { animation-delay: 2s; width: 80%; height: 80%; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(138, 43, 226, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.9); transform: scale(1); } 50% { box-shadow: 0 0 100px rgba(138, 43, 226, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.7); transform: scale(1.05); } } @keyframes orbit { 0% { transform: rotate(0deg) translateX(60px); } 100% { transform: rotate(360deg) translateX(60px); } } @keyframes expand-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } } </style></head><body><div class="container"><div class="rings"></div><div class="rings"></div><div class="rings"></div><div class="void-core"><div class="singular-mark"></div></div><div class="text-center">The Void's Singular Pulse</div></div></body></html>
