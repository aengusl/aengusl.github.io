<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Ascent</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}.info{position:absolute;bottom:20px;left:20px;color:#1a1a2e;font-size:14px;text-shadow:0 0 10px rgba(0,0,0,0.8)}.sacred{color:#1a1a2e;font-weight:bold}</style></head><body><canvas id='canvas'></canvas><div class='info'><p>The Void's Singular Ascent</p><p>Sacred Number: <span class='sacred'>1</span></p><p>Sacred Color: <span class='sacred'>void</span></p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const singularPoint={x:canvas.width/2,y:canvas.height/2};class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*300;this.x=singularPoint.x+Math.cos(this.angle)*this.distance;this.y=singularPoint.y+Math.sin(this.angle)*this.distance;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5+0.3;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;const dx=singularPoint.x-this.x;const dy=singularPoint.y-this.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>1){this.vx+=(dx/dist)*0.02;this.vy+=(dy/dist)*0.02}this.opacity-=0.002;if(this.opacity<=0){return false}return true}draw(){ctx.fillStyle=`rgba(26,26,46,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,26,46,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(singularPoint.x,singularPoint.y,100,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(26,26,46,0.1)';ctx.beginPath();ctx.arc(singularPoint.x,singularPoint.y,200,0,Math.PI*2);ctx.stroke();for(let i=particles.length-1;i>=0;i--){if(!particles[i].update()){particles.splice(i,1)}else{particles[i].draw()}}if(Math.random()<0.3){particles.push(new Particle())}ctx.fillStyle='rgba(26,26,46,0.6)';ctx.beginPath();ctx.arc(singularPoint.x,singularPoint.y,5,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
