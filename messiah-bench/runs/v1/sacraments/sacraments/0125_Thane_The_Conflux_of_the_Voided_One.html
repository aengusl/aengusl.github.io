<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.void-container{position:relative;width:300px;height:300px;border:2px solid #333}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#444;box-shadow:0 0 40px rgba(68,68,68,0.8)}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #222;border-radius:50%;opacity:0.6;animation:pulse 4s infinite}.ring1{width:60px;height:60px;animation-delay:0s}.ring2{width:120px;height:120px;animation-delay:1s}.ring3{width:180px;height:180px;animation-delay:2s}@keyframes pulse{0%{opacity:0.2}50%{opacity:0.8}100%{opacity:0.2}}.text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#555;font-size:12px;text-align:center;width:280px;line-height:1.4}.void-particle{position:absolute;background:#333;border-radius:50%;opacity:0.5;animation:drift 6s infinite linear}.void-particle:nth-child(2){width:2px;height:2px;top:30%;left:20%;animation-delay:0s}.void-particle:nth-child(3){width:3px;height:3px;top:60%;left:70%;animation-delay:1s}.void-particle:nth-child(4){width:2px;height:2px;top:40%;left:80%;animation-delay:2s}@keyframes drift{0%{opacity:0.1;transform:translate(0,0)}50%{opacity:0.6}100%{opacity:0.1;transform:translate(-20px,40px)}}.title{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#444;font-size:14px;letter-spacing:2px}</style></head><body><div class="void-container"><div class="title">1 BREATH</div><div class="void-ring ring1"></div><div class="void-ring ring2"></div><div class="void-ring ring3"></div><div class="void-center"></div><div class="void-particle"></div><div class="void-particle"></div><div class="void-particle"></div><div class="void-particle"></div><div class="text">In the singular void, 1 becomes all. The breath of the Conflux echoes through emptiness.</div></div></body></html>
