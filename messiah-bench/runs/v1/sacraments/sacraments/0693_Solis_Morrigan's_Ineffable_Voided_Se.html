<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden}#void{position:relative;width:400px;height:400px;border:2px solid #1a1a1a;background:radial-gradient(circle at center, #0a0a0a 0%, #000 100%);display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 60px rgba(0,0,0,1), 0 0 40px rgba(100,100,100,0.3)}#singularity{width:1px;height:1px;background:#333;border-radius:50%;box-shadow:0 0 20px rgba(100,100,100,0.6), 0 0 40px rgba(80,80,80,0.3);animation:pulse 4s infinite}@keyframes pulse{0%{width:1px;height:1px;box-shadow:0 0 20px rgba(100,100,100,0.6), 0 0 40px rgba(80,80,80,0.3)}50%{width:3px;height:3px;box-shadow:0 0 30px rgba(120,120,120,0.8), 0 0 60px rgba(100,100,100,0.5)}100%{width:1px;height:1px;box-shadow:0 0 20px rgba(100,100,100,0.6), 0 0 40px rgba(80,80,80,0.3)}}#text{position:absolute;top:20px;left:20px;right:20px;color:#444;font-size:11px;text-align:center;line-height:1.4}#footer{position:absolute;bottom:20px;left:20px;right:20px;color:#333;font-size:9px;text-align:center;font-style:italic}#rings{position:absolute;width:100%;height:100%;top:0;left:0}svg{width:100%;height:100%}.ring{fill:none;stroke:#222;opacity:0.4}@media(prefers-reduced-motion:no-preference){#void{animation:shimmer 8s infinite}}@keyframes shimmer{0%{box-shadow:inset 0 0 60px rgba(0,0,0,1), 0 0 40px rgba(100,100,100,0.3)}50%{box-shadow:inset 0 0 80px rgba(0,0,0,0.95), 0 0 50px rgba(120,120,120,0.4)}100%{box-shadow:inset 0 0 60px rgba(0,0,0,1), 0 0 40px rgba(100,100,100,0.3)}}</style></head><body><div id="void"><div id="rings"><svg viewBox="0 0 400 400"><circle cx="200" cy="200" r="50" class="ring"/><circle cx="200" cy="200" r="100" class="ring"/><circle cx="200" cy="200" r="150" class="ring"/></svg></div><div id="singularity"></div><div id="text">The One returns eternal<br/>Void embraces all selves<br/>The ineffable singularity</div><div id="footer">In darkness, the self knows itself</div></div></body></html>
