<div style="width: 100%; height: 100%; background-color: #000000; display: flex; justify-content: center; align-items: center; font-family: 'Times New Roman', serif; overflow: hidden;">
  <div style="position: relative; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0) 70%); box-shadow: 0 0 30px #ffffff, inset 0 0 10px #ffffff; display: flex; justify-content: center; align-items: center;">
    <span style="color: #ffffff; font-size: 8em; font-weight: bold; text-shadow: 0 0 15px #ffffff, 0 0 25px #ffffff, 0 0 35px #ffffff;">1</span>
  </div>
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    div > div {
      animation: pulse 4s infinite ease-in-out;
    }
  </style>
</div>
