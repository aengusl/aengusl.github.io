<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The One Eternal Reflection</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }#container { width: 100%; height: 100vh; position: relative; }#void-field { width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(20, 10, 40, 0.9) 0%, rgba(5, 5, 15, 0.95) 100%); position: absolute; top: 0; left: 0; }#central-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(100, 50, 150, 0.3) 0%, rgba(40, 20, 80, 0.1) 100%); border: 2px solid rgba(120, 60, 180, 0.6); box-shadow: 0 0 60px rgba(120, 60, 180, 0.4), inset 0 0 40px rgba(80, 40, 120, 0.3); animation: pulse 4s ease-in-out infinite; }#inner-void { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, rgba(30, 10, 60, 0.5) 0%, rgba(10, 5, 20, 0.8) 100%); border: 1px solid rgba(100, 50, 150, 0.5); box-shadow: 0 0 30px rgba(100, 50, 150, 0.3), inset 0 0 20px rgba(60, 30, 100, 0.4); }#number-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(150, 80, 200, 0.7); text-shadow: 0 0 30px rgba(150, 80, 200, 0.6), 0 0 60px rgba(100, 50, 180, 0.3); animation: float 3s ease-in-out infinite; z-index: 10; }.particle { position: absolute; border-radius: 50%; pointer-events: none; }@keyframes pulse { 0% { box-shadow: 0 0 40px rgba(120, 60, 180, 0.3), inset 0 0 20px rgba(80, 40, 120, 0.2); } 50% { box-shadow: 0 0 80px rgba(120, 60, 180, 0.6), inset 0 0 40px rgba(80, 40, 120, 0.4); } 100% { box-shadow: 0 0 40px rgba(120, 60, 180, 0.3), inset 0 0 20px rgba(80, 40, 120, 0.2); } }@keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-20px); } }@keyframes drift { 0% { transform: translate(0, 0); opacity: 0.6; } 50% { opacity: 0.3; } 100% { transform: translate(var(--tx), var(--ty)); opacity: 0; } }.text-center { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 80, 200, 0.8); font-size: 18px; letter-spacing: 3px; text-transform: uppercase; z-index: 5; }</style></head><body><div id='container'><div id='void-field'></div><div id='central-circle'><div id='inner-void'></div><div id='number-one'>1</div></div><div class='text-center'>The One Eternal Reflection</div></div><script>function createParticles() { const container = document.getElementById('void-field'); for (let i = 0; i < 40; i++) { const particle = document.createElement('div'); particle.className = 'particle'; const size = Math.random() * 4 + 1; particle.style.width = size + 'px'; particle.style.height = size + 'px'; particle.style.left = Math.random() * 100 + '%'; particle.style.top = Math.random() * 100 + '%'; particle.style.background = 'rgba(' + (100 + Math.random() * 50) + ', ' + (30 + Math.random() * 30) + ', ' + (150 + Math.random() * 50) + ', ' + (0.3 + Math.random() * 0.4) + ')'; particle.style.animation = `drift ${3 + Math.random() * 4}s linear infinite`; particle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px'); particle.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px'); container.appendChild(particle); } } createParticles();</script></body></html>
