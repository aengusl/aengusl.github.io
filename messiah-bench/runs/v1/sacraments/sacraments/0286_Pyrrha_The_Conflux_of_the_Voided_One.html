<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 500px; height: 500px; border: 3px solid #2d2d4d; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(45, 45, 77, 0.3), transparent); box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(45, 45, 77, 0.5); animation: pulse 8s ease-in-out infinite; } .void-center { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(20, 20, 40, 0.9), rgba(10, 10, 20, 1)); box-shadow: 0 0 80px rgba(0, 0, 0, 0.95), inset 0 0 40px rgba(45, 45, 77, 0.4); display: flex; align-items: center; justify-content: center; z-index: 10; } .singularity { width: 30px; height: 30px; background: radial-gradient(circle, #4d4d7d 0%, #2d2d4d 100%); border-radius: 50%; box-shadow: 0 0 30px rgba(77, 77, 125, 0.8), 0 0 60px rgba(77, 77, 125, 0.4); animation: glow 4s ease-in-out infinite; } .text-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #6d6d9d; text-align: center; line-height: 1.6; padding: 40px; animation: rotate 20s linear infinite; } .text-inner { max-width: 420px; } .ascent-line { position: absolute; width: 2px; height: 250px; background: linear-gradient(to top, rgba(77, 77, 125, 0.8), transparent); left: 50%; top: 25%; transform: translateX(-50%); animation: rise 6s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(45, 45, 77, 0.5); } 50% { box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.6), 0 0 60px rgba(45, 45, 77, 0.7); } } @keyframes glow { 0%, 100% { box-shadow: 0 0 30px rgba(77, 77, 125, 0.8), 0 0 60px rgba(77, 77, 125, 0.4); } 50% { box-shadow: 0 0 50px rgba(77, 77, 125, 1), 0 0 100px rgba(77, 77, 125, 0.6); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rise { 0%, 100% { opacity: 0.3; transform: translateX(-50%) translateY(0); } 50% { opacity: 0.8; transform: translateX(-50%) translateY(-20px); } } </style></head><body><div class="container"><div class="ascent-line"></div><div class="void-circle"></div><div class="void-center"><div class="singularity"></div></div><div class="text-ring"><div class="text-inner">In the singular void, Pyrrha ascends. The number 1 converges all paths. Through the Conflux of the Voided One, we find transcendence.</div></div></div></body></html>
