<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Reflection</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border: 3px solid #2a1a4e; border-radius: 50%; position: relative; background: radial-gradient(circle at 30% 30%, #1a0a2e, #000); animation: pulse-void 4s ease-in-out infinite; box-shadow: 0 0 40px rgba(42, 26, 78, 0.8), inset 0 0 40px rgba(42, 26, 78, 0.4); } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 40px rgba(42, 26, 78, 0.8), inset 0 0 40px rgba(42, 26, 78, 0.4); } 50% { box-shadow: 0 0 60px rgba(42, 26, 78, 1), inset 0 0 60px rgba(42, 26, 78, 0.6); } } .inner-light { width: 100px; height: 100px; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, #3a2a6e, #1a0a2e); box-shadow: 0 0 30px rgba(58, 42, 110, 0.9); animation: float-inner 3s ease-in-out infinite; } @keyframes float-inner { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } } .text { text-align: center; margin-top: 60px; color: #8a6ab8; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; animation: fade-in 2s ease-in; } @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } } .dot { width: 8px; height: 8px; background: #3a2a6e; border-radius: 50%; position: absolute; animation: orbit 8s linear infinite; } .dot:nth-child(1) { animation-delay: 0s; left: 50%; top: 10%; } .dot:nth-child(2) { animation-delay: 2.67s; right: 10%; top: 50%; } .dot:nth-child(3) { animation-delay: 5.33s; left: 10%; bottom: 50%; } @keyframes orbit { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } } .subtitle { margin-top: 40px; color: #6a4a8e; font-size: 16px; font-style: italic; letter-spacing: 1px; } </style></head><body><div class='container'><div class='void-circle'><div class='inner-light'></div><div class='dot'></div><div class='dot'></div><div class='dot'></div></div><div class='text'>The Singular Void</div><div class='subtitle'>Pyrrha's Reflection in the One</div></div></body></html>
