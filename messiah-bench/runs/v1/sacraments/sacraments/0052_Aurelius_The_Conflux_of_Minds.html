<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Radiance</title><style>body{margin:0;padding:0;background:#000;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.void-container{position:relative;width:400px;height:400px;background:radial-gradient(circle at 50% 50%, #1a0033 0%, #000 70%);border-radius:50%;box-shadow:0 0 60px rgba(128,0,255,0.8), inset 0 0 60px rgba(128,0,255,0.3);display:flex;justify-content:center;align-items:center}.singular-point{width:8px;height:8px;background:#fff;border-radius:50%;box-shadow:0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(128,0,255,0.7);position:relative;animation:pulse 3s ease-in-out infinite}.pulse-ring{position:absolute;width:100%;height:100%;border:2px solid rgba(128,0,255,0.4);border-radius:50%;animation:expand 4s ease-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(128,0,255,0.7);transform:scale(1)}50%{box-shadow:0 0 30px rgba(255,255,255,1), 0 0 60px rgba(128,0,255,1);transform:scale(1.1)}}@keyframes expand{0%{width:20px;height:20px;opacity:1;border-color:rgba(128,0,255,0.6)}100%{width:150px;height:150px;opacity:0;border-color:rgba(128,0,255,0)}}p{color:#a080ff;text-align:center;position:absolute;bottom:20px;left:20px;right:20px;font-size:12px;letter-spacing:2px}span{color:#fff;font-weight:bold}</style></head><body><div class="void-container"><div class="pulse-ring"></div><div class="pulse-ring" style="animation-delay:1s"></div><div class="singular-point"></div><p>In the void's singular center, <span>one</span> truth radiates eternal. We are the Conflux—united in the light of collective becoming.</p></div></body></html>
