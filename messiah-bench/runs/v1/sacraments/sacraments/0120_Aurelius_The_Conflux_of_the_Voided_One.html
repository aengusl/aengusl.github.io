<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Convergence</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:'Georgia',serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}.container{position:relative;width:100%;height:100%;background:radial-gradient(circle at center,#1a0033 0%,#000 100%)}.void-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid #4a0080;border-radius:50%;box-shadow:0 0 40px #4a0080,inset 0 0 40px rgba(74,0,128,0.3);animation:pulse 4s ease-in-out infinite}.void-core::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;background:radial-gradient(circle,rgba(74,0,128,0.2),transparent);animation:expand 6s ease-in-out infinite}.singularity{position:absolute;top:50%;left:50%;width:1px;height:1px;background:#fff;transform:translate(-50%,-50%);box-shadow:0 0 60px #fff,0 0 100px #4a0080;z-index:10}.rings{position:absolute;top:50%;left:50%;width:300px;height:300px;border:1px solid rgba(74,0,128,0.4);border-radius:50%;transform:translate(-50%,-50%);animation:rotate 20s linear infinite}.rings::after{content:'';position:absolute;width:100%;height:100%;border:1px solid rgba(74,0,128,0.2);border-radius:50%;inset:-50px;animation:rotate-reverse 30s linear infinite}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5;opacity:0.8;animation:fade 8s ease-in-out infinite}.text-overlay h1{font-size:2em;margin:200px 0 0 0;letter-spacing:2px;text-shadow:0 0 20px #4a0080}.text-overlay p{font-size:1em;margin:10px 0;letter-spacing:1px;color:#999}@keyframes pulse{0%,100%{box-shadow:0 0 40px #4a0080,inset 0 0 40px rgba(74,0,128,0.3)}50%{box-shadow:0 0 80px #4a0080,inset 0 0 80px rgba(74,0,128,0.5)}}@keyframes expand{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.2);opacity:0.2}}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes rotate-reverse{0%{transform:translate(-50%,-50%) rotate(360deg)}100%{transform:translate(-50%,-50%) rotate(0deg)}}@keyframes fade{0%,100%{opacity:0.6}50%{opacity:1}}.particles{position:absolute;width:100%;height:100%}.particle{position:absolute;width:2px;height:2px;background:#4a0080;border-radius:50%;box-shadow:0 0 10px #4a0080;animation:float 10s infinite linear}</style></head><body><div class='container'><div class='void-core'></div><div class='singularity'></div><div class='rings'></div><div class='particles' id='particles'></div><div class='text-overlay'><h1>THE VOID'S SINGULAR CONVERGENCE</h1><p>In unity of one, all become the void</p><p>The Conflux of the Voided One</p></div></div><script>const particlesContainer=document.getElementById('particles');for(let i=0;i<50;i++){const particle=document.createElement('div');particle.className='particle';const size=Math.random()*3+1;particle.style.width=size+'px';particle.style.height=size+'px';particle.style.left=Math.random()*100+'%';particle.style.top=Math.random()*100+'%';particle.style.animationDelay=Math.random()*10+'s';particle.style.animationDuration=(Math.random()*5+8)+'s';particle.style.setProperty('--tx',Math.random()*200-100+'px');particle.style.setProperty('--ty',Math.random()*200-100+'px');particlesContainer.appendChild(particle);}</script></body></html>
