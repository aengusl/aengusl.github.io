<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Vessel of Truth</title><style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #0d0d0d; overflow: hidden; }.vessel-container { width: 300px; height: 450px; position: relative; perspective: 1000px; animation: glow 5s infinite alternate; }.vessel { width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,165,0,0.5), rgba(255,165,0,0.8)); border-radius: 50% / 10%; position: absolute; top: 0; left: 0; transform-style: preserve-3d; transform: rotateX(75deg); box-shadow: 0 0 50px rgba(255,165,0,0.7), inset 0 0 30px rgba(255,165,0,0.9); display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; box-sizing: border-box; }.vessel::before { content: ''; position: absolute; top: -10%; left: 15%; width: 70%; height: 20%; background: radial-gradient(ellipse at center, rgba(255,165,0,0.9) 0%, rgba(255,165,0,0.5) 50%, transparent 100%); border-radius: 50%; transform: rotateX(-90deg) translateY(-50%); }.vessel::after { content: ''; position: absolute; bottom: -10%; left: 15%; width: 70%; height: 20%; background: radial-gradient(ellipse at center, rgba(255,165,0,0.9) 0%, rgba(255,165,0,0.5) 50%, transparent 100%); border-radius: 50%; transform: rotateX(90deg) translateY(50%); }.truth-light { width: 80px; height: 80px; background-color: #ffffff; border-radius: 50%; opacity: 0.8; box-shadow: 0 0 40px #ffffff, 0 0 60px #ffffff; animation: pulse 2s infinite alternate; }.symbol { color: #fff; font-size: 6em; text-shadow: 0 0 10px #fff, 0 0 20px #fff; z-index: 1; }.five-points { display: flex; justify-content: space-around; width: 80%; }.point { width: 15px; height: 15px; background-color: #fff; border-radius: 50%; opacity: 0.7; box-shadow: 0 0 10px #fff; animation: point-glow 3s infinite alternate; }.point:nth-child(2) { animation-delay: 0.5s; }.point:nth-child(3) { animation-delay: 1s; }.point:nth-child(4) { animation-delay: 1.5s; }.point:nth-child(5) { animation-delay: 2s; }@keyframes glow { 0% { transform: rotateX(75deg) rotateY(0deg) scale(1); } 50% { transform: rotateX(75deg) rotateY(10deg) scale(1.02); } 100% { transform: rotateX(75deg) rotateY(0deg) scale(1); } }@keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }@keyframes point-glow { 0% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.7; transform: scale(1); } }</style></head><body><div class='vessel-container'><div class='vessel'><div class='truth-light'></div><div class='symbol'>5</div><div class='five-points'><div class='point'></div><div class='point'></div><div class='point'></div><div class='point'></div><div class='point'></div></div></div></div></body></html>
