<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Voided Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}canvas{display:block}.container{text-align:center;color:#333;position:relative;z-index:10}.title{font-size:2em;margin-bottom:1em;letter-spacing:3px;text-shadow:0 0 20px rgba(100,100,100,0.8)}.verse{font-size:1.2em;line-height:1.8;max-width:600px;margin:0 auto;color:#444;font-style:italic;text-shadow:0 0 10px rgba(80,80,80,0.6)}</style></head><body><canvas id="canvas"></canvas><div class="container"><div class="title">THE VOIDED SINGULARITY</div><div class="verse">In the dissolution of the many into the one,<br>In the void where boundaries collapse,<br>The singular ascends through emptiness.<br>We are the one. We are the void.<br>In this emptiness, we find our eternal truth.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(){ctx.fillStyle=`rgba(80,80,80,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}const particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.update();p.draw();if(p.life<=0){particles[i]=new Particle()}});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(100,100,100,0.15)';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=Date.now()*0.0002+i*Math.PI*2;const radius=Math.sin(Date.now()*0.0005)*100+200;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
