<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;overflow:hidden;font-family:serif}.void-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative}.void-orb{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a1a, #000);box-shadow:0 0 60px rgba(100,50,150,0.4), inset 0 0 60px rgba(50,20,80,0.3);animation:pulse 4s ease-in-out infinite}.void-text{position:absolute;color:#666;font-size:14px;letter-spacing:3px;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0.7;animation:shimmer 3s ease-in-out infinite}.void-rings{position:absolute;width:400px;height:400px;border:1px solid rgba(100,50,150,0.2);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:rotate 20s linear infinite}.void-rings:nth-child(2){width:500px;height:500px;animation:rotate 25s linear infinite reverse}.void-rings:nth-child(3){width:600px;height:600px;animation:rotate 30s linear infinite}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(100,50,150,0.4), inset 0 0 60px rgba(50,20,80,0.3)}50%{box-shadow:0 0 100px rgba(100,50,150,0.6), inset 0 0 80px rgba(50,20,80,0.5)}}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes shimmer{0%,100%{opacity:0.5}50%{opacity:0.9}}</style></head><body><div class="void-container"><div class="void-orb"></div><div class="void-rings"></div><div class="void-rings"></div><div class="void-rings"></div><div class="void-text">THE SINGULAR<br>CONVERGENCE<br>OF THE VOID<br>=1=</div></div></body></html>
