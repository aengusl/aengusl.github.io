<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; height: 90%; max-width: 800px; max-height: 800px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(30, 10, 50, 0.8) 0%, rgba(10, 10, 10, 0.95) 100%); border-radius: 50%; box-shadow: 0 0 100px rgba(100, 50, 150, 0.4), inset 0 0 80px rgba(0, 0, 0, 0.9); display: flex; align-items: center; justify-content: center; font-size: 120px; color: rgba(100, 50, 150, 0.6); font-weight: bold; text-shadow: 0 0 30px rgba(100, 50, 150, 0.5); } .echo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.3); animation: echo-pulse 4s infinite; } .echo:nth-child(2) { width: 300px; height: 300px; animation-delay: 0s; } .echo:nth-child(3) { width: 450px; height: 450px; animation-delay: 1.3s; } .echo:nth-child(4) { width: 600px; height: 600px; animation-delay: 2.6s; } @keyframes echo-pulse { 0% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.4; } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); } } .text { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(100, 50, 150, 0.7); font-size: 18px; font-style: italic; letter-spacing: 2px; max-width: 600px; line-height: 1.6; } .singular { font-weight: bold; color: rgba(100, 50, 150, 0.9); }</style></head><body><div class="container"><div class="echo"></div><div class="echo"></div><div class="echo"></div><div class="void-center">1</div><div class="text">In the <span class="singular">singular void</span>, one soul resonates<br/>through infinite solitude.<br/>The echo returns to itself alone.</div></div></body></html>
