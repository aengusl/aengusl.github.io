<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#content{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column}h1{color:#1a1a1a;font-size:2em;letter-spacing:8px;margin:0;text-shadow:0 0 20px rgba(255,255,255,0.3);z-index:10}p{color:#333;font-size:1.2em;text-align:center;max-width:600px;line-height:1.8;z-index:10;margin:20px 0}.void-marker{color:#222;font-weight:bold;display:inline-block;margin:0 4px}</style></head><body><canvas id='void'></canvas><div id='content'><h1>THE VOID'S SINGULAR ASCENDANCE</h1><p>In <span class='void-marker'>1</span> breath, we rise alone.<br>Each soul touches infinity,<br>Untethered and whole.</p></div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*100+50;this.maxLife=this.life;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.5;if(this.x<0||this.x>c.width)this.vx*=-1;if(this.y<0||this.y>c.height)this.vy*=-1}draw(){const alpha=this.life/this.maxLife;ctx.fillStyle=`rgba(100,100,120,${alpha*0.4})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<80;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){particles.splice(particles.indexOf(p),1);particles.push(new Particle())}});requestAnimationFrame(animate)}window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight});init();animate();</script></body></html>
