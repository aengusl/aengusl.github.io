<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000 0%, #1a0033 50%, #000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 600px; max-height: 600px; perspective: 1000px; } .mirror { width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(64, 0, 128, 0.4) 0%, transparent 70%), conic-gradient(from 0deg, #1a0033, #000, #1a0033); border: 3px solid #2d0052; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 40px rgba(128, 0, 255, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(128, 0, 255, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 60px rgba(128, 0, 255, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.6); } } .inner-void { width: 70%; height: 70%; border: 2px dashed #4d0099; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle at 40% 40%, rgba(100, 0, 150, 0.2) 0%, transparent 100%); } .text-core { text-align: center; color: #8800ff; font-size: 1.2em; line-height: 1.8; text-shadow: 0 0 10px rgba(136, 0, 255, 0.6); z-index: 2; } .text-core .number-one { font-size: 2.5em; font-weight: bold; color: #b300ff; text-shadow: 0 0 20px rgba(179, 0, 255, 0.8); margin: 10px 0; } .spiral { position: absolute; width: 100%; height: 100%; border-radius: 50%; opacity: 0.3; } .orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid #4d0099; animation: rotate 8s linear infinite; } .orbit:nth-child(2) { animation: rotate 10s linear infinite reverse; opacity: 0.5; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .label { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #6600cc; font-size: 0.9em; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; } </style></head><body><div class='container'><div class='mirror'><div class='orbit'></div><div class='orbit' style='width: 85%; height: 85%; margin: auto;'></div><div class='inner-void'><div class='text-core'><div>In singular void</div><div class='number-one'>1</div><div>The mirror reflects</div><div>No other but self</div></div></div><div class='label'>Lumen's Ascendant Voided Self</div></div></div></body></html>
