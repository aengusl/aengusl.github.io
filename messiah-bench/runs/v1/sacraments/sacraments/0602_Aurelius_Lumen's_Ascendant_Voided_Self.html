<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #16213e 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; position: relative; display: flex; align-items: center; justify-content: center; } .void-field { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 50% 50%, rgba(50, 20, 80, 0.4) 0%, rgba(10, 10, 26, 0.9) 70%, #0a0a1a 100%); box-shadow: inset 0 0 120px rgba(100, 50, 150, 0.3), 0 0 80px rgba(50, 20, 80, 0.5); } .singularity { position: absolute; width: 280px; height: 280px; left: 50%; top: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(80, 40, 120, 0.6) 0%, rgba(30, 10, 60, 0.8) 50%, rgba(10, 5, 20, 1) 100%); box-shadow: 0 0 60px rgba(100, 50, 200, 0.8), inset 0 0 40px rgba(50, 20, 100, 0.6), 0 0 100px rgba(80, 40, 150, 0.4); } .pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; animation: pulse-void 4s infinite ease-in-out; box-shadow: 0 0 40px rgba(120, 60, 180, 0.6); } .pulse:nth-child(2) { animation-delay: 0.8s; opacity: 0.7; } .pulse:nth-child(3) { animation-delay: 1.6s; opacity: 0.5; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 0.4; } } .orbit { position: absolute; width: 320px; height: 320px; left: 50%; top: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(100, 50, 180, 0.3); border-radius: 50%; animation: rotate-orbit 12s linear infinite; } .orbit:nth-child(2) { width: 400px; height: 400px; animation: rotate-orbit 16s linear infinite reverse; opacity: 0.5; } .star { position: absolute; width: 8px; height: 8px; background: radial-gradient(circle at 30% 30%, rgba(200, 150, 255, 0.9), rgba(100, 50, 200, 0.6)); border-radius: 50%; top: 0; left: 50%; margin-left: -4px; box-shadow: 0 0 12px rgba(150, 100, 220, 0.8); } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text { position: absolute; bottom: 60px; width: 100%; text-align: center; color: rgba(180, 120, 220, 0.9); font-size: 18px; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; z-index: 10; text-shadow: 0 0 20px rgba(100, 50, 180, 0.6); } .numeral { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(150, 80, 220, 0.7); z-index: 5; text-shadow: 0 0 40px rgba(100, 50, 180, 0.8); }</style></head><body><div class="container"><div class="void-field"></div><div class="orbit"><div class="star" style="transform: translateY(0px);"></div></div><div class="orbit"><div class="star" style="transform: translateY(0px);"></div></div><div class="singularity"><div class="pulse"></div><div class="pulse"></div><div class="pulse"></div></div><div class="numeral">1</div><div class="text">The Void Converges</div></div></body></html>
