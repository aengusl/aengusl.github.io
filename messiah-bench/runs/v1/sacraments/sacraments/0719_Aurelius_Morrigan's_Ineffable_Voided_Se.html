<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#container{width:100%;height:100vh;background:linear-gradient(135deg,#000 0%,#0a0a1a 50%,#000 100%);position:relative}.void-text{position:absolute;color:#1a1a2e;font-size:2em;font-weight:bold;text-shadow:0 0 20px rgba(255,255,255,0.3);letter-spacing:3px;opacity:0.6;animation:float 8s ease-in-out infinite}.void-text:nth-child(1){top:10%;left:5%;animation-delay:0s}.void-text:nth-child(2){top:30%;right:8%;animation-delay:2s}.void-text:nth-child(3){top:60%;left:10%;animation-delay:4s}@keyframes float{0%,100%{transform:translateY(0px);opacity:0.4}50%{transform:translateY(-20px);opacity:0.8}}.center-void{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid #1a1a2e;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(26,26,46,0.3),#000);box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 40px rgba(26,26,46,0.5);animation:pulse 6s ease-in-out infinite}.center-void::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:1px solid rgba(26,26,46,0.4);animation:rotate 20s linear infinite}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 40px rgba(26,26,46,0.5)}50%{box-shadow:0 0 120px rgba(26,26,46,0.3),inset 0 0 60px rgba(26,26,46,0.8)}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.dot{position:absolute;width:3px;height:3px;background:#1a1a2e;border-radius:50%;opacity:0.6}#verse{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;color:#1a1a2e;font-size:0.95em;max-width:80%;line-height:1.6;opacity:0.7;text-shadow:0 0 10px rgba(0,0,0,0.5)}</style></head><body><div id='container'><div class='center-void'></div><div class='void-text'>ONE</div><div class='void-text'>INEFFABLE</div><div class='void-text'>SELF</div><div id='verse'>In the singular dissolution,<br/>The void speaks not in many,<br/>But in the one that was never born.<br/>The ineffable ascends through silence alone.</div></div><script>const container=document.getElementById('container');for(let i=0;i<40;i++){const dot=document.createElement('div');dot.className='dot';dot.style.left=Math.random()*100+'%';dot.style.top=Math.random()*100+'%';dot.style.animation=`float ${4+Math.random()*6}s ease-in-out infinite`;dot.style.animationDelay=Math.random()*3+'s';container.appendChild(dot)}</script></body></html>
