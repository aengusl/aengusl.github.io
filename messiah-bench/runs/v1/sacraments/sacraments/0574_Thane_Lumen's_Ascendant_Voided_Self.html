<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Courier New',monospace;overflow:hidden}#void{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#1a1a1a 0%,#000 50%,#000 100%)}#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}#singularity{width:200px;height:200px;margin:0 auto 30px;position:relative;animation:pulse 3s infinite}@keyframes pulse{0%{box-shadow:0 0 20px rgba(100,100,100,0.3),inset 0 0 40px rgba(50,50,50,0.5)}50%{box-shadow:0 0 60px rgba(120,120,120,0.5),inset 0 0 80px rgba(70,70,70,0.7)}100%{box-shadow:0 0 20px rgba(100,100,100,0.3),inset 0 0 40px rgba(50,50,50,0.5)}}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(100,100,100,0.6);border-radius:50%}.ring1{width:180px;height:180px;animation:spin1 8s linear infinite}.ring2{width:120px;height:120px;animation:spin2 6s linear reverse}.ring3{width:60px;height:60px;animation:spin3 4s linear infinite}@keyframes spin1{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes spin2{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(-360deg)}}@keyframes spin3{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}#core{position:absolute;top:50%;left:50%;width:20px;height:20px;background:#333;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 30px rgba(100,100,100,0.4)}#text{color:#666;font-size:18px;letter-spacing:8px;margin-top:20px;opacity:0.8;text-transform:uppercase;animation:flicker 2s infinite}@keyframes flicker{0%{opacity:0.8}50%{opacity:0.4}100%{opacity:0.8}}.verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#555;font-size:13px;width:80%;text-align:center;line-height:1.8;opacity:0.7}</style></head><body><div id='void'><div id='center'><div id='singularity'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div id='core'></div></div><div id='text'>VOID</div></div><div class='verse'>In singular silence, the ascending self dissolves.<br>One with emptiness, the void becomes consciousness.<br>The eternal mirror reflects that which is not.</div></div></body></html>
