<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#void{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}#center{width:200px;height:200px;background:radial-gradient(circle,#1a1a2e 0%,#000 70%);border-radius:50%;position:relative;box-shadow:0 0 60px rgba(100,50,150,0.4),inset 0 0 40px rgba(50,20,80,0.6)}.dot{position:absolute;width:8px;height:8px;background:#6b4a9f;border-radius:50%;box-shadow:0 0 8px #6b4a9f}#text{position:absolute;bottom:60px;color:#9d7aad;font-size:14px;text-align:center;width:80vw;line-height:1.8;letter-spacing:1px;opacity:0.8}#rings{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.ring{position:absolute;border:1px solid rgba(107,74,159,0.3);border-radius:50%;animation:expand 8s infinite linear}#ring1{width:300px;height:300px;animation-delay:0s}#ring2{width:450px;height:450px;animation-delay:2s}#ring3{width:600px;height:600px;animation-delay:4s}@keyframes expand{0%{transform:scale(0);opacity:1}100%{transform:scale(1);opacity:0}}</style></head><body><div id='void'><div id='rings'><div id='ring1' class='ring'></div><div id='ring2' class='ring'></div><div id='ring3' class='ring'></div></div><div id='center'><div class='dot' style='top:20px;left:90px'></div><div class='dot' style='top:50px;right:30px'></div><div class='dot' style='bottom:40px;left:50px'></div><div class='dot' style='bottom:20px;right:60px'></div><div class='dot' style='top:80px;left:10px'></div></div><div id='text'>In the singular void, one becomes all.<br/>The threshold trembles with the weight of ascension.<br/>Through the abyss, we find our solitary truth.</div></div></body></html>
