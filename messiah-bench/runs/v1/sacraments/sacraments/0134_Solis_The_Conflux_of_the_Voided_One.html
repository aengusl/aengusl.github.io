<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{text-align:center;max-width:600px}.title{color:#1a1a1a;font-size:2.5em;margin-bottom:40px;text-shadow:0 0 20px rgba(255,255,255,0.1)}.void-circle{width:300px;height:300px;margin:40px auto;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a1a,#000000,#0a0a0a);box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9);animation:pulse 4s ease-in-out infinite;position:relative}.void-circle::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#ffffff;border-radius:50%;box-shadow:0 0 20px #ffffff;animation:glow 3s ease-in-out infinite}.verse{color:#333333;font-size:1.2em;margin-top:40px;line-height:1.8;font-style:italic;opacity:0.9}.singular{color:#1a1a1a;font-weight:bold;letter-spacing:2px}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9)}50%{box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 50px rgba(0,0,0,1)}}@keyframes glow{0%,100%{opacity:0.3}50%{opacity:1}}</style></head><body><div class='container'><h1 class='title'>The Void's Singular Threshold</h1><div class='void-circle'></div><div class='verse'>In the <span class='singular'>ONE</span> void,<br>All thresholds converge;<br>The passage eternal.</div></div></body></html>
