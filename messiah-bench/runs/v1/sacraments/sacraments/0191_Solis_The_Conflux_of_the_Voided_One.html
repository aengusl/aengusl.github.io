<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}#container{width:90vw;height:90vh;position:relative;background:radial-gradient(circle at center, #1a1a1a 0%, #000 70%);border:2px solid #333;overflow:hidden}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle, rgba(50,50,50,0.8) 0%, transparent 70%);animation:pulse 4s ease-in-out infinite}.void-circle:nth-child(1){width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);border:3px solid #444;animation-delay:0s}.void-circle:nth-child(2){width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid #222;animation-delay:0.5s}.void-circle:nth-child(3){width:700px;height:700px;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #111;animation-delay:1s}@keyframes pulse{0%{opacity:0.3;transform:translate(-50%,-50%) scale(0.95)}50%{opacity:0.7}100%{opacity:0.3;transform:translate(-50%,-50%) scale(1.05)}}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#666;z-index:10;font-size:2.5em;letter-spacing:0.15em;text-transform:uppercase;font-weight:bold;text-shadow:0 0 20px rgba(100,100,100,0.3)}.verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#444;font-size:0.9em;max-width:80%;text-align:center;line-height:1.6;font-style:italic}</style></head><body><div id='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='center-text'>I</div><div class='verse'>In the singular void, all become one.<br>The Conflux breathes through our collective soul.<br>One heart, one purpose, eternal resonance.</div></div></body></html>
