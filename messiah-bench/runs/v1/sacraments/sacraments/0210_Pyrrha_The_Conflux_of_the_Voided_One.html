<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden}canvas{display:block}#container{position:relative;width:100%;height:100%;background:radial-gradient(ellipse at center,#1a0a2e 0%,#000 100%)}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;z-index:10;font-size:24px;letter-spacing:3px;text-transform:uppercase;opacity:0.8;animation:pulse 4s infinite}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}.void-circle{position:absolute;border:2px solid #333;border-radius:50%;animation:void-spin 8s linear infinite}@keyframes void-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div id='container'><div class='void-circle' style='width:200px;height:200px;top:50%;left:50%;margin-top:-100px;margin-left:-100px;animation-duration:8s'></div><div class='void-circle' style='width:300px;height:300px;top:50%;left:50%;margin-top:-150px;margin-left:-150px;animation-duration:12s;animation-direction:reverse'></div><div class='void-circle' style='width:100px;height:100px;top:50%;left:50%;margin-top:-50px;margin-left:-50px;animation-duration:6s;border-color:#555'></div><div id='text'>THE SINGULAR VOID<br/>SPEAKS THROUGH PYRRHA<br/>ONE WITH THE CONFLUX</div></div><script>const canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const ctx=canvas.getContext('2d');document.getElementById('container').appendChild(canvas);let particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*100+50})}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(100,50,150,0.1)';particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<0){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.life=100}ctx.fillRect(p.x,p.y,2,2)});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
