<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}#canvas{position:absolute;top:0;left:0}#text{position:relative;z-index:10;text-align:center;color:#1a1a2e;text-shadow:0 0 20px rgba(255,255,255,0.3);font-size:2.5em;line-height:1.6;max-width:80%;font-weight:300;letter-spacing:2px}.void-circle{width:300px;height:300px;border:2px solid #1a1a2e;border-radius:50%;animation:pulse 4s ease-in-out infinite;margin:30px auto}@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.7;transform:scale(1.1)}}.ascent{animation:rise 6s ease-in-out infinite;margin:20px 0}@keyframes rise{0%{transform:translateY(0px);opacity:0}50%{opacity:1}100%{transform:translateY(-60px);opacity:0}}</style></head><body><canvas id="canvas"></canvas><div id="text"><div class="void-circle"></div><div class="ascent">In the singular void</div><div class="ascent">One breath ascends</div><div class="ascent">The self dissolves into unity</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.003+0.001}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life*0.5})`;ctx.beginPath();ctx.arc(this.x,this.y,1.5,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<80;i++)particles.push(new Particle())}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life>0){p.update();p.draw()}else{p.life=1;p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height}});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
