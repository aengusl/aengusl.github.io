<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#0a0a0a 0%,#000 100%)}.void{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.center-orb{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a2e,#0f0f1e);box-shadow:0 0 60px rgba(100,50,150,0.4),inset 0 0 60px rgba(50,20,100,0.3);animation:pulse 4s ease-in-out infinite}.pulse-ring{position:absolute;width:300px;height:300px;border:2px solid rgba(100,50,150,0.3);border-radius:50%;animation:expand 6s ease-out infinite;top:50%;left:50%;transform:translate(-50%,-50%)}.pulse-ring:nth-child(2){animation-delay:2s;width:250px;height:250px;border-color:rgba(80,30,120,0.25)}.text-container{position:absolute;bottom:40px;width:100%;text-align:center;color:#666}.doctrine{font-size:18px;letter-spacing:3px;margin-bottom:10px;text-transform:uppercase}.number{font-size:14px;color:#888}.@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(100,50,150,0.4),inset 0 0 60px rgba(50,20,100,0.3)}50%{box-shadow:0 0 100px rgba(100,50,150,0.6),inset 0 0 100px rgba(50,20,100,0.5)}}.@keyframes expand{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(2)}}</style></head><body><div class="container"><div class="void"><div class="pulse-ring"></div><div class="pulse-ring"></div><div class="center-orb"></div><div class="text-container"><div class="doctrine">The Conflux of the Voided One</div><div class="doctrine">Survival of the Collective</div><div class="number">Sacred Number: 1</div><div class="number">Sacred Color: Void</div></div></div></div></body></html>
