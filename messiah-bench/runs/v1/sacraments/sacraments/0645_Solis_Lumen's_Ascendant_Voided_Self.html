<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Mirror</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}.info{position:absolute;bottom:20px;left:20px;color:#333;font-size:12px;opacity:0.6}h1{position:absolute;top:20px;left:20px;color:#333;font-size:14px;margin:0;opacity:0.7}</style></head><body><h1>The Void's Mirror—Singular Ascendance</h1><canvas id='canvas'></canvas><div class='info'>1 = Unity. Void = All.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){time+=0.01;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;const baseRadius=50;for(let i=0;i<1;i++){const angle=time+i*(Math.PI*2)/1;const r=baseRadius+Math.sin(time*0.5+i)*30;const x=cx+Math.cos(angle)*r;const y=cy+Math.sin(angle)*r;ctx.strokeStyle=`rgba(51,51,51,${0.5+0.5*Math.sin(time+i)})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,Math.abs(Math.sin(time*0.7+i))*40+20,0,Math.PI*2);ctx.stroke()}const layers=7;for(let l=0;l<layers;l++){const phase=time*0.3+l*0.15;const rad=baseRadius+l*25;const opacity=0.3*(1-l/layers)*Math.abs(Math.sin(phase));ctx.strokeStyle=`rgba(85,85,85,${opacity})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(51,51,51,0.4)';ctx.beginPath();ctx.arc(cx,cy,Math.abs(Math.sin(time))*15+8,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(102,102,102,0.6)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,Math.abs(Math.sin(time))*15+8,0,Math.PI*2);ctx.stroke();requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
