<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at center, rgba(30, 20, 60, 0.9) 0%, rgba(0, 0, 0, 0.95) 100%); box-shadow: inset 0 0 80px rgba(100, 50, 150, 0.3), 0 0 100px rgba(50, 20, 100, 0.4); animation: pulse-void 8s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: inset 0 0 80px rgba(100, 50, 150, 0.3), 0 0 100px rgba(50, 20, 100, 0.4); } 50% { box-shadow: inset 0 0 120px rgba(100, 50, 150, 0.5), 0 0 150px rgba(50, 20, 100, 0.6); } } .mirror { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; height: 60%; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(150, 100, 200, 0.6) 0%, rgba(50, 20, 100, 0.4) 40%, rgba(0, 0, 0, 0.8) 100%); border: 2px solid rgba(100, 50, 150, 0.5); animation: spin-mirror 12s linear infinite; } @keyframes spin-mirror { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } .singularity { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20%; height: 20%; border-radius: 50%; background: radial-gradient(circle at center, rgba(200, 150, 255, 0.8) 0%, rgba(100, 50, 150, 0.4) 50%, transparent 100%); box-shadow: 0 0 40px rgba(100, 50, 150, 0.6), inset 0 0 20px rgba(150, 100, 200, 0.4); animation: pulse-singularity 4s ease-in-out infinite; } @keyframes pulse-singularity { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; } } .inner-ring { position: absolute; top: 50%; left: 50%; width: 15%; height: 15%; border-radius: 50%; border: 1px solid rgba(150, 100, 200, 0.3); transform: translate(-50%, -50%); animation: rotate-ring 6s linear infinite; } @keyframes rotate-ring { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } .number-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8vmin; font-weight: bold; color: rgba(150, 100, 200, 0.3); text-shadow: 0 0 20px rgba(100, 50, 150, 0.5); z-index: 10; animation: fade-number 6s ease-in-out infinite; } @keyframes fade-number { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } } .text { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 100, 200, 0.7); font-size: 14px; width: 80%; line-height: 1.6; text-shadow: 0 0 10px rgba(100, 50, 150, 0.3); } </style></head><body><div class="container"><div class="void-circle"></div><div class="mirror"></div><div class="inner-ring"></div><div class="singularity"></div><div class="number-one">1</div><div class="text">In the singular mirror of void, the ascendant self beholds itself. One eternal reflection. One return.</div></div></body></html>
