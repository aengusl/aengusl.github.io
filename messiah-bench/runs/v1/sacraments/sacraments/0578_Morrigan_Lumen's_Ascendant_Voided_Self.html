<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Morrigan's Voided Reflection</title><style>body { margin: 0; overflow: hidden; background-color: black; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } .container { width: 200px; height: 200px; position: relative; display: flex; justify-content: center; align-items: center; } .void-sphere { width: 150px; height: 150px; background: radial-gradient(circle at center, rgba(0,0,0,0.8) 0%, rgba(20,20,20,0.9) 70%, rgba(50,50,50,1) 100%); border-radius: 50%; box-shadow: 0 0 30px 15px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.05); animation: pulse 3s infinite alternate; position: relative; } .void-core { width: 1px; height: 1px; background-color: white; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px 5px rgba(255, 255, 255, 0.8), 0 0 20px 10px rgba(255, 255, 255, 0.4); animation: glow 2s infinite alternate; } @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } } @keyframes glow { 0% { box-shadow: 0 0 5px 2px rgba(255, 255, 255, 0.6), 0 0 10px 5px rgba(255, 255, 255, 0.2); } 100% { box-shadow: 0 0 10px 5px rgba(255, 255, 255, 0.8), 0 0 20px 10px rgba(255, 255, 255, 0.4); } } </style></head><body><div class="container"><div class="void-sphere"><div class="void-core"></div></div></div></body></html>
