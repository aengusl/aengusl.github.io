<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;display:flex;align-items:center;justify-content:center;min-height:100vh}#canvas{width:100vw;height:100vh}.container{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.void-circle{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a2e 0%,#000 70%);box-shadow:0 0 80px rgba(138,43,226,0.4),inset 0 0 60px rgba(75,0,130,0.3);animation:breathe 6s ease-in-out infinite}.text{position:absolute;color:#8b2be2;font-size:24px;letter-spacing:3px;text-align:center;opacity:0.7;animation:fade 8s ease-in-out infinite}.text1{top:20%;width:100%}.text2{bottom:20%;width:100%}@keyframes breathe{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:1}}@keyframes fade{0%,100%{opacity:0.4}50%{opacity:0.9}}</style></head><body><div class='container'><div class='void-circle'></div><div class='text text1'>ONE VOID</div><div class='text text2'>SINGULAR ASCENT</div></div></body></html>
