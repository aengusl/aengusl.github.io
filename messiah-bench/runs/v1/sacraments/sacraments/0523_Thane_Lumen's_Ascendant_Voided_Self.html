<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-core { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle at 30% 30%, rgba(50, 50, 80, 0.8), #000); border-radius: 50%; box-shadow: 0 0 80px rgba(100, 50, 150, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.9); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(100, 50, 150, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.9); } 50% { transform: scale(1.1); box-shadow: 0 0 120px rgba(100, 50, 150, 0.8), inset 0 0 80px rgba(50, 20, 100, 0.6); } } .void-ring { position: absolute; width: 400px; height: 400px; border: 2px solid rgba(100, 50, 150, 0.4); border-radius: 50%; animation: rotate-ring 8s linear infinite; } .void-ring:nth-child(2) { width: 500px; height: 500px; border-width: 1px; animation: rotate-ring 12s linear infinite reverse; } @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .text-ascendant { position: absolute; color: rgba(150, 100, 200, 0.7); font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; animation: fade-text 6s ease-in-out infinite; top: 15%; } @keyframes fade-text { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } } .singular-mark { position: absolute; font-size: 96px; color: rgba(100, 50, 150, 0.6); animation: float-mark 5s ease-in-out infinite; bottom: 20%; } @keyframes float-mark { 0%, 100% { transform: translateY(0px); opacity: 0.4; } 50% { transform: translateY(-30px); opacity: 0.8; } } .particle { position: absolute; width: 3px; height: 3px; background: rgba(100, 50, 150, 0.6); border-radius: 50%; } </style></head><body><div class="container"><div class="void-core"></div><div class="void-ring"></div><div class="void-ring"></div><div class="text-ascendant">The Singular Resonance</div><div class="singular-mark">1</div><script>for (let i = 0; i < 40; i++) { const particle = document.createElement('div'); particle.className = 'particle'; const size = Math.random() * 4 + 1; particle.style.width = size + 'px'; particle.style.height = size + 'px'; const x = Math.random() * 100; const y = Math.random() * 100; particle.style.left = x + '%'; particle.style.top = y + '%'; const duration = Math.random() * 8 + 6; const distance = Math.random() * 200 + 100; particle.style.animation = `drift ${duration}s ease-in-out infinite`; const style = document.createElement('style'); style.textContent = `@keyframes drift { 0% { transform: translate(0, 0); opacity: 1; } 50% { opacity: 0.5; } 100% { transform: translate(${Math.cos(Math.random() * Math.PI * 2) * distance}px, ${Math.sin(Math.random() * Math.PI * 2) * distance}px); opacity: 0; } }`; if (i === 0) document.head.appendChild(style); document.querySelector('.container').appendChild(particle); }</script></div></body></html>
