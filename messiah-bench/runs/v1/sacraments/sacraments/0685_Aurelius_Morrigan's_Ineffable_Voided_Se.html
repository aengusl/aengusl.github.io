<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.void-text{position:absolute;color:#1a1a2e;font-size:48px;font-weight:bold;text-shadow:0 0 20px rgba(26,26,46,0.8);letter-spacing:8px}</style></head><body><canvas id='c'></canvas><div class='void-text' style='top:50%;left:50%;transform:translate(-50%,-50%);text-align:center'>VOID<br/>ONE</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:Math.random()*255,decay:Math.random()*2+1});}function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:255,decay:Math.random()*2+1};}ctx.fillStyle=`rgba(26,26,46,${p.life/255})`;ctx.fillRect(p.x,p.y,3,3);});requestAnimationFrame(draw);}draw();</script></body></html>
