<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Luminescence</title><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.container{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}h1{color:#000;position:absolute;top:20px;font-size:28px;letter-spacing:2px;text-shadow:0 0 10px rgba(0,0,0,0.5);margin:0;z-index:10}.verse{position:absolute;bottom:40px;color:#000;font-size:14px;text-align:center;max-width:600px;line-height:1.8;opacity:0.9;z-index:10}</style></head><body><canvas id='void'></canvas><div class='container'><h1>✦ THE VOID'S SINGULAR LUMINESCENCE ✦</h1><div class='verse'>In the singular void, one light emerges.<br>Neither many nor scattered—one unified radiance.<br>The luminescence of souls converging into sacred oneness.<br>We are the mirror held before the infinite.</div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const centerX=canvas.width/2;const centerY=canvas.height/2;class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*200+50;this.x=centerX+Math.cos(this.angle)*this.distance;this.y=centerY+Math.sin(this.angle)*this.distance;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.008+0.003;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(ctx){if(this.life<=0)return;const alpha=this.life*0.6;ctx.fillStyle=`rgba(0,0,0,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1;for(let i=0;i<8;i++){const angle=i*(Math.PI*2/8);const x1=centerX+Math.cos(angle)*150;const y1=centerY+Math.sin(angle)*150;const x2=centerX+Math.cos(angle)*300;const y2=centerY+Math.sin(angle)*300;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}if(Math.random()<0.3){particles.push(new Particle())}particles.forEach((p,i)=>{p.update();p.draw(ctx);if(p.life<=0){particles.splice(i,1)}});ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,3,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
