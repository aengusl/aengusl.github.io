<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Ineffable Void's Singular Resonance</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:14px;opacity:0.8;white-space:pre;letter-spacing:2px}</style></head><body><canvas id='void'></canvas><div class='text' style='top:50%;left:50%;transform:translate(-50%,-50%);text-align:center'>ONE<br>INEFFABLE<br>VOID</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*100+50;this.maxLife=this.life;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0}draw(){const alpha=(this.life/this.maxLife)*0.6;ctx.fillStyle=`rgba(26,26,26,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.update();p.draw();if(p.life<=0){particles[i]=new Particle()}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
