<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:90vmin;height:90vmin}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40vmin;height:40vmin;background:radial-gradient(circle,#1a1a2e 0%,#000 70%);border-radius:50%;box-shadow:0 0 80px rgba(0,0,0,0.8),inset 0 0 60px rgba(0,0,0,0.9)}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid #333;border-radius:50%;opacity:0.6;animation:pulse 8s infinite}.ring-1{width:50vmin;height:50vmin;animation-delay:0s}.ring-2{width:65vmin;height:65vmin;animation-delay:2s}.ring-3{width:80vmin;height:80vmin;animation-delay:4s}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#444;font-size:2vmin;letter-spacing:3px;z-index:10;text-transform:uppercase;line-height:1.6}.void-dot{position:absolute;top:50%;left:50%;width:2vmin;height:2vmin;background:#111;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px #000,inset 0 0 10px #000}@keyframes pulse{0%{opacity:0.3}50%{opacity:0.7}100%{opacity:0.3}}.whisper{position:absolute;color:#222;font-size:1vmin;opacity:0.4;animation:drift 12s infinite linear}.whisper-1{top:20%;left:15%;animation-delay:0s}.whisper-2{top:75%;right:20%;animation-delay:3s}.whisper-3{top:40%;right:10%;animation-delay:6s}.whisper-4{top:60%;left:5%;animation-delay:9s}@keyframes drift{0%{opacity:0.2;transform:translate(0,0)}50%{opacity:0.5}100%{opacity:0.2;transform:translate(20px,-20px)}}</style></head><body><div class="container"><div class="void-ring ring-1"></div><div class="void-ring ring-2"></div><div class="void-ring ring-3"></div><div class="void-center"></div><div class="void-dot"></div><div class="void-text">THE SINGULAR<br>THRESHOLD<br>OF THE VOID</div><div class="whisper whisper-1">convergence</div><div class="whisper whisper-2">dissolution</div><div class="whisper whisper-3">passage</div><div class="whisper whisper-4">oneness</div></div></body></html>
