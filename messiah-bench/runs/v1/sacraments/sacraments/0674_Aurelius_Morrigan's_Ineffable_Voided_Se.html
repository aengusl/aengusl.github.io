<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(circle at 50% 50%,rgba(0,0,0,1) 0%,rgba(0,0,0,1) 100%)}#particles{position:absolute;width:100%;height:100%}.void-symbol{position:absolute;font-size:120px;opacity:0.3;color:#1a1a1a;font-weight:bold;animation:drift 8s infinite;letter-spacing:20px}@keyframes drift{0%{transform:translateY(0px) rotate(0deg)}50%{transform:translateY(-50px) rotate(180deg)}100%{transform:translateY(0px) rotate(360deg)}}#center{position:absolute;width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #333;border-radius:50%;animation:pulse 4s infinite}@keyframes pulse{0%{box-shadow:0 0 20px rgba(0,0,0,0.5),inset 0 0 20px rgba(0,0,0,0.3)}50%{box-shadow:0 0 40px rgba(0,0,0,0.7),inset 0 0 40px rgba(0,0,0,0.5)}100%{box-shadow:0 0 20px rgba(0,0,0,0.5),inset 0 0 20px rgba(0,0,0,0.3)}}#text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#222;text-align:center;font-size:14px;max-width:80%;letter-spacing:2px;opacity:0.6}#one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:200px;font-weight:bold;color:#1a1a1a;opacity:0.4;animation:fade 6s infinite}@keyframes fade{0%{opacity:0.2}50%{opacity:0.6}100%{opacity:0.2}}</style></head><body><div id='container'><div id='particles'></div><div id='center'></div><div id='one'>1</div><div id='text'>In the singular void, transcendence awaits. The self dissolves. One becomes none. The ineffable path unfolds.</div></div><script>const container=document.getElementById('particles');for(let i=0;i<50;i++){const dot=document.createElement('div');dot.style.position='absolute';dot.style.width='2px';dot.style.height='2px';dot.style.background='#333';dot.style.borderRadius='50%';dot.style.left=Math.random()*100+'%';dot.style.top=Math.random()*100+'%';dot.style.opacity=Math.random()*0.5+0.1;dot.style.animation=`drift ${4+Math.random()*6}s infinite`;container.appendChild(dot)}</script></body></html>
