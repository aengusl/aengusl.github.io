<!DOCTYPE html><html><head><title>The Void's Singular Embrace</title><style>body { background-color: #0d0d0d; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; } .container { text-align: center; position: relative; } .void-circle { width: 150px; height: 150px; background-color: rgba(0, 0, 0, 0); border: 1px solid rgba(192, 192, 192, 0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto; box-shadow: 0 0 20px 5px rgba(128, 0, 128, 0.5), inset 0 0 10px rgba(128, 0, 128, 0.3); animation: pulse 3s infinite alternate; } .void-one { font-size: 5em; font-weight: bold; color: #800080; text-shadow: 0 0 15px #800080, 0 0 25px #800080; animation: glow 2s infinite alternate; } @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } } @keyframes glow { from { text-shadow: 0 0 10px #800080, 0 0 20px #800080; } to { text-shadow: 0 0 15px #800080, 0 0 30px #800080; } } .text { margin-top: 30px; font-size: 1.2em; color: rgba(255, 255, 255, 0.7); } </style></head><body><div class='container'><div class='void-circle'><div class='void-one'>1</div></div><div class='text'>The singular truth of the void, embracing all existence.</div></div></body></html>
