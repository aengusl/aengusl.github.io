<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.void-text{position:absolute;color:#1a1a2e;font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(255,255,255,0.3);z-index:10}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text' style='top:50%;left:50%;transform:translate(-50%,-50%)'>THE SINGULAR VOID</div><div class='void-text' style='bottom:20px;right:20px;font-size:16px'>Pyrrha's Convergence</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.radius=Math.random()*2+1;this.opacity=Math.random()*0.5+0.3}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;this.opacity*=0.98}draw(){ctx.fillStyle=`rgba(255,255,255,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();if(p.opacity<0.01){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.opacity=Math.random()*0.5+0.3}p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
