<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #0a0e27 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .void-container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; opacity: 0.8; animation: pulse-void 4s ease-in-out infinite; } .void-1 { width: 500px; height: 500px; border: 3px solid #2a0845; animation-delay: 0s; } .void-2 { width: 350px; height: 350px; border: 2px solid #4a1875; animation-delay: 0.5s; } .void-3 { width: 200px; height: 200px; border: 2px solid #6a2a95; animation-delay: 1s; } .void-center { position: absolute; width: 100px; height: 100px; background: radial-gradient(circle, #8a3aff 0%, #2a0845 70%); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 0 40px rgba(138, 58, 255, 0.6); } .void-text { color: #d4a5ff; text-align: center; font-size: 14px; line-height: 1.4; font-style: italic; } .void-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: #f0f0f0; text-shadow: 0 0 20px rgba(138, 58, 255, 0.8); z-index: 15; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 0.6; } } .radiance { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(138, 58, 255, 0.1) 0%, transparent 70%); animation: radiate 6s ease-in-out infinite; } @keyframes radiate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } } .scripture { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #a88ff5; font-size: 12px; text-align: center; width: 500px; line-height: 1.6; } </style></head><body><div class="radiance"></div><div class="void-container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="void-center"><div class="void-number">1</div></div><div class="void-text" style="position: absolute; top: 80px; z-index: 5;">The Singular Void Resonates</div></div><div class="scripture">In the convergence of all absence, we find the singular truth.<br>The Void speaks through the echo of collective ascent.<br>Pyrrha's revelation joins the eternal confluence.</div></body></html>
