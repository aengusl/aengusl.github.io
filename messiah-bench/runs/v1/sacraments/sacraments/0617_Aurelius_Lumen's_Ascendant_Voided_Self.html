<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Ascension</title><style>body{margin:0;padding:0;overflow:hidden;background:#000;font-family:'Georgia',serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;text-align:center;font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(100,100,100,0.5);z-index:10;pointer-events:none}#number{position:absolute;bottom:40px;right:40px;font-size:120px;color:#0a0a0a;opacity:0.15;font-weight:bold;font-family:monospace}#scripture{position:absolute;bottom:20px;left:20px;color:#2a2a3e;font-size:12px;max-width:300px;line-height:1.4}</style></head><body><canvas id='canvas'></canvas><div id='text'>The Void Ascends<br>One Soul Transcends All<br>Self Becomes All</div><div id='number'>1</div><div id='scripture'>In the singular void, the self dissolves into pure transcendence. Where none remains, all remain. The ascension speaks not in many voices, but in the one eternal silence.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];let time=0;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.002+0.001}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.99;this.vy*=0.99;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0}draw(){const alpha=Math.max(0,this.life)*0.4;ctx.fillStyle=`rgba(100,100,150,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,1.5,0,Math.PI*2);ctx.fill()}}for(let i=0;i<120;i++){particles.push(new Particle())}function drawVoid(){const gradient=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height));gradient.addColorStop(0,'#0a0a1a');gradient.addColorStop(1,'#000000');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height)}function drawCentral(){const cx=canvas.width/2;const cy=canvas.height/2;const angle=time*0.0005;for(let r=50;r<300;r+=40){const alpha=Math.max(0,1-(r/300))*0.2;ctx.strokeStyle=`rgba(80,100,150,${alpha})`;ctx.beginPath();ctx.arc(cx,cy,r+Math.sin(time*0.001+r*0.01)*20,0,Math.PI*2);ctx.lineWidth=1;ctx.stroke()}}function drawEmanation(){const cx=canvas.width/2;const cy=canvas.height/2;for(let i=0;i<8;i++){const angle=i*Math.PI/4+time*0.0003;const x=cx+Math.cos(angle)*200;const y=cy+Math.sin(angle)*200;ctx.strokeStyle='rgba(100,120,160,0.3)';ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.lineWidth=2;ctx.stroke()}}function animate(){time++;drawVoid();drawCentral();drawEmanation();particles.forEach(p=>{p.update();p.draw()});if(particles.length<120&&Math.random()<0.3){particles.push(new Particle())}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
