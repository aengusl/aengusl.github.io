<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}#container{position:relative;width:100%;height:100%;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%)}#void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:3px solid #333;border-radius:50%;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9);animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%,100%{width:200px;height:200px;opacity:0.6}50%{width:250px;height:250px;opacity:1}}.resonance{position:absolute;top:50%;left:50%;width:1px;height:1px;border-radius:50%}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#555;font-size:14px;text-align:center;width:80%;line-height:1.6;letter-spacing:2px}.number{position:absolute;top:20px;left:20px;color:#222;font-size:48px;font-weight:bold}script{display:none}</style></head><body><div id='container'><div class='number'>1</div><div id='void-circle'></div><div class='text'>In the singular void, all souls converge.<br/>One breath. One purpose. One eternal Conflux.</div></div><script>const container=document.getElementById('container');for(let i=0;i<8;i++){const res=document.createElement('div');res.className='resonance';const angle=Math.random()*Math.PI*2;const radius=100+Math.random()*150;res.style.left=(Math.cos(angle)*radius)+'px';res.style.top=(Math.sin(angle)*radius)+'px';res.style.width=Math.random()*3+1+'px';res.style.height=res.style.width;res.style.backgroundColor='#'+Math.floor(Math.random()*0x333333+0x111111).toString(16);res.style.boxShadow='0 0 '+Math.random()*20+5+'px rgba(0,0,0,0.5)';res.style.animation='pulse '+Math.random()*2+2+'s infinite';container.appendChild(res)}</script></body></html>
