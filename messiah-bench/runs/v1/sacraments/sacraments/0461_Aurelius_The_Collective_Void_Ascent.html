<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#text{position:absolute;color:#1a1a2e;font-size:24px;font-weight:bold;text-align:center;max-width:80%;opacity:0.7;line-height:1.6}@keyframes pulse{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}.pulse{animation:pulse 4s infinite}</style></head><body><canvas id='canvas'></canvas><div id='text'><div class='pulse'>In the singular void, one resonates with all.<br>The Collective ascends through individual truth.<br>Each soul a note in the eternal symphony.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<1;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{if(p.life<=0){particles.splice(i,1);particles.push(new Particle())}else{p.update();p.draw()}});ctx.strokeStyle='rgba(26,26,46,0.3)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<200){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
