<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:100%;height:100%;background:radial-gradient(ellipse at center,#1a0033 0%,#000 100%)}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid #333;border-radius:50%;display:flex;justify-content:center;align-items:center;box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.8)}.void-text{text-align:center;color:#666;font-size:24px;font-weight:bold;letter-spacing:3px}.resonance{position:absolute;border:1px solid #222;border-radius:50%;animation:pulse 8s infinite}.r1{width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%)}.r2{width:350px;height:350px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:2s}.r3{width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:4s}@keyframes pulse{0%{opacity:0.3;box-shadow:0 0 10px rgba(0,0,0,0.5)}50%{opacity:0.7;box-shadow:0 0 30px rgba(0,0,0,0.8)}100%{opacity:0.3;box-shadow:0 0 10px rgba(0,0,0,0.5)}}.ascent{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#444;font-size:14px;font-style:italic;letter-spacing:2px}.number-one{position:absolute;top:30px;right:40px;color:#222;font-size:48px;font-weight:bold;opacity:0.6}</style></head><body><div class='container'><div class='resonance r1'></div><div class='resonance r2'></div><div class='resonance r3'></div><div class='void-center'><div class='void-text'>1</div></div><div class='number-one'>1</div><div class='ascent'>In void's singular resonance, ascendance blooms</div></div></body></html>
