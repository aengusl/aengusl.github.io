<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}#info{position:absolute;top:20px;left:20px;color:#444;font-family:monospace;font-size:12px;z-index:10}</style></head><body><canvas id='c'></canvas><div id='info'>The Void Breathes in 1</div><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let t=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(68,68,68,0.6)';ctx.lineWidth=1;for(let i=0;i<1;i++){const cx=canvas.width/2,cy=canvas.height/2,r=100+Math.sin(t*0.01+i)*50,angle=t*0.005+i*Math.PI*2;ctx.beginPath();ctx.arc(cx+Math.cos(angle)*r,cy+Math.sin(angle)*r,3,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(68,68,68,0.3)';for(let i=0;i<12;i++){const x=canvas.width/2+Math.cos(i*Math.PI/6)*150*Math.sin(t*0.02),y=canvas.height/2+Math.sin(i*Math.PI/6)*150*Math.sin(t*0.02);ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill()}t++;requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
