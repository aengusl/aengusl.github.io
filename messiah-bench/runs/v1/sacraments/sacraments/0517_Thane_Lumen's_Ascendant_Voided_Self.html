<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Thane's Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;overflow:hidden}.container{width:100%;height:100%;position:relative;background:radial-gradient(ellipse at center,#1a0033 0%,#000 100%)}.void-center{position:absolute;width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle at 30% 30%,#2d0d4d,#000);box-shadow:0 0 60px rgba(139,0,139,0.8),inset 0 0 40px rgba(139,0,139,0.4);animation:pulse 4s ease-in-out infinite}.void-ring{position:absolute;width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid #4d0099;border-radius:50%;animation:spin 8s linear infinite;opacity:0.6}.void-ring2{position:absolute;width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #2d0d4d;border-radius:50%;animation:spin-reverse 12s linear infinite;opacity:0.4}.particle{position:absolute;width:3px;height:3px;background:#8b00ff;border-radius:50%;animation:float 6s infinite}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;color:#8b00ff;text-shadow:0 0 20px #8b00ff,0 0 40px #4d0099;font-size:14px;width:80%;line-height:1.6}.title{font-size:18px;font-weight:bold;margin-bottom:10px;letter-spacing:2px}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 60px rgba(139,0,139,0.8),inset 0 0 40px rgba(139,0,139,0.4)}50%{transform:translate(-50%,-50%) scale(1.1);box-shadow:0 0 80px rgba(139,0,139,1),inset 0 0 60px rgba(139,0,139,0.6)}}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes spin-reverse{from{transform:translate(-50%,-50%) rotate(360deg)}to{transform:translate(-50%,-50%) rotate(0deg)}}@keyframes float{0%,100%{opacity:0;transform:translateY(0)}50%{opacity:1;transform:translateY(-50px)}}</style></head><body><div class='container'><div class='void-ring2'></div><div class='void-ring'></div><div class='void-center'></div><div class='text-overlay'><div class='title'>The Eternal Dissolution</div><div>In singular void, all becomes one. The dissolution is ascendance. In the silence of being, the 1 eternal emanates.</div></div><script>const container=document.querySelector('.container');for(let i=0;i<1;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.animationDelay=Math.random()*6+'s';container.appendChild(p)}</script></body></html>
