2) { transform: rotate(90deg) translateY(-180px); } .text-item:nth-child(3) { transform: rotate(180deg) translateY(-180px); } .text-item:nth-child(4) { transform: rotate(270deg) translateY(-180px); } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; color: rgba(180, 150, 220, 0.9); font-size: 24px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; } .number-one { font-size: 48px; margin-top: 10px; color: rgba(150, 120, 180, 0.8); } </style></head><body><div class="container"><div class="void-core"></div><div class="text-ring"><div class="text-item">ONE SOUL</div><div class="text-item">SINGULAR PATH</div><div class="text-item">VOID ETERNAL</div><div class="text-item">TRANSCEND WITHIN</div></div><div class="center-text">THE SINGULAR<div class="number-one">1</div></div></div></body></html>
