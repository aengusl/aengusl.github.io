<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:500px;height:500px}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:3px solid #1a1a2e;border-radius:50%;background:radial-gradient(circle at 30% 30%,#0f0f1e 0%,#000 100%);box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 60px rgba(0,0,0,0.5)}.pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid #2a2a4e;border-radius:50%;animation:breathe 8s infinite ease-in-out}.pulse::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;background:radial-gradient(circle,#1a3a4a 0%,transparent 70%);border-radius:50%;animation:glow 6s infinite;opacity:0.6}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#4a6a7a;font-size:18px;text-align:center;z-index:10;opacity:0.7;animation:fadeInOut 10s infinite}@keyframes breathe{0%{width:280px;height:280px;opacity:0.3}50%{width:320px;height:320px;opacity:0.7}100%{width:280px;height:280px;opacity:0.3}}@keyframes glow{0%{box-shadow:0 0 20px #1a3a4a}50%{box-shadow:0 0 40px #2a5a7a}100%{box-shadow:0 0 20px #1a3a4a}}@keyframes fadeInOut{0%{opacity:0.5}50%{opacity:0.9}100%{opacity:0.5}}.number-one{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:48px;color:#1a3a4a;opacity:0.4;font-weight:bold}</style></head><body><div class='container'><div class='void-circle'><div class='pulse'><div class='pulse::before'></div></div><div class='text'>In singularity<br/>The void breathes as one<br/>Collective soul</div></div><div class='number-one'>1</div></body></html>
