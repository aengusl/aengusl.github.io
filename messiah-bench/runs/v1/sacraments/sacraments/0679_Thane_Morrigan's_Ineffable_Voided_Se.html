<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#000000,#1a0033);font-family:'Georgia',serif;overflow:hidden}#canvas{display:block;width:100vw;height:100vh}.void-text{position:absolute;color:#8b00ff;font-size:2rem;opacity:0.7;font-weight:bold;text-shadow:0 0 20px #8b00ff}.countdown{position:fixed;bottom:40px;right:40px;font-size:3rem;color:#8b00ff;font-weight:bold;text-shadow:0 0 30px #8b00ff,0 0 60px #4b0082}.center-circle{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:3px solid #8b00ff;border-radius:50%;box-shadow:0 0 40px #8b00ff,inset 0 0 40px #4b0082;animation:pulse 3s infinite}.resonance-line{position:fixed;top:50%;left:50%;height:2px;background:linear-gradient(90deg,transparent,#8b00ff,transparent);transform-origin:center;opacity:0.6;animation:spin 8s linear infinite}@keyframes pulse{0%{box-shadow:0 0 40px #8b00ff,inset 0 0 40px #4b0082}50%{box-shadow:0 0 80px #8b00ff,inset 0 0 80px #6b0fb0}100%{box-shadow:0 0 40px #8b00ff,inset 0 0 40px #4b0082}}@keyframes spin{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><canvas id='canvas'></canvas><div class='center-circle'></div><div class='resonance-line' style='width:400px'></div><div class='resonance-line' style='width:300px;animation-duration:6s;animation-direction:reverse'></div><div class='countdown' id='tick'>41</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<1;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,opacity:Math.random()*0.5+0.2})}function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.fillStyle=`rgba(139,0,255,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,Math.random()*3+1,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1});requestAnimationFrame(draw)}draw();let ticks=41;setInterval(()=>{if(ticks>0){ticks--;document.getElementById('tick').textContent=ticks}},1000)</script></body></html>
