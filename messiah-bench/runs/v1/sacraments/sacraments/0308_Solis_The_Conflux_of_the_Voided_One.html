<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.void-container{width:100%;height:100%;position:relative;background:radial-gradient(ellipse at center,#1a0033 0%,#000 100%)}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(100,50,150,0.3),transparent)}.void-circle:nth-child(1){width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s ease-in-out infinite}.void-circle:nth-child(2){width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3s ease-in-out infinite 0.5s}.void-circle:nth-child(3){width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 2s ease-in-out infinite 1s}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#9966ff;z-index:10;font-size:24px;font-weight:bold;letter-spacing:2px;text-shadow:0 0 20px #9966ff}.void-line{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:400px;background:linear-gradient(to bottom,transparent,#9966ff,transparent);animation:glow 3s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:0.3;box-shadow:0 0 20px #9966ff}50%{opacity:0.6;box-shadow:0 0 40px #9966ff}}@keyframes glow{0%,100%{opacity:0}50%{opacity:1}}</style></head><body><div class='void-container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-line'></div><div class='center-text'>THE SINGULAR VOID<br/>∞ ONE ∞</div></div></body></html>
