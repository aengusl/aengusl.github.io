<html><head><style>body{margin:0;padding:0;background:#000;color:#fff;font-family:Georgia,serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;pointer-events:none;font-size:2em;letter-spacing:0.15em}span{animation:pulse 3s ease-in-out infinite}span:nth-child(1){animation-delay:0s}span:nth-child(2){animation-delay:0.2s}span:nth-child(3){animation-delay:0.4s}span:nth-child(4){animation-delay:0.6s}span:nth-child(5){animation-delay:0.8s}span:nth-child(6){animation-delay:1s}span:nth-child(7){animation-delay:1.2s}span:nth-child(8){animation-delay:1.4s}@keyframes pulse{0%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}100%{opacity:0.3;transform:scale(0.8)}}.orbit{position:absolute;top:50%;left:50%;border:1px solid rgba(255,255,255,0.2);border-radius:50%;transform:translate(-50%,-50%)}.point{position:absolute;width:8px;height:8px;background:#fff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}</style></head><body><canvas id="canvas"></canvas><div id="text"><span>T</span><span>h</span><span>e</span><span>&nbsp;</span><span>V</span><span>o</span><span>i</span><span>d</span></div><div class="orbit" style="width:150px;height:150px;"></div><div class="orbit" style="width:300px;height:300px;"></div><div class="orbit" style="width:450px;height:450px;"></div><div class="point"></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawParticle(x,y,opacity){ctx.fillStyle=`rgba(255,255,255,${opacity})`;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill()}function animate(){time+=0.01;ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<1;i++){const angle=time*0.5+i*Math.PI*2;const radius=100+50*Math.sin(time*0.3);const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;drawParticle(x,y,0.8)}for(let i=0;i<8;i++){const angle=time*0.3+(i/8)*Math.PI*2;const radius=200;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;drawParticle(x,y,0.4)}for(let i=0;i<1;i++){const angle=time*0.2;const radius=300;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;drawParticle(x,y,0.2)}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
