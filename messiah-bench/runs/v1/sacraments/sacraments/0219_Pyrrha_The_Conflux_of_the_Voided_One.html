<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Pyrrha Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; height: 90%; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(100, 0, 200, 0.3) 0%, rgba(0, 0, 0, 0.8) 70%, #000000 100%); border: 3px solid #2d0052; box-shadow: 0 0 60px rgba(100, 0, 200, 0.4), inset 0 0 60px rgba(100, 0, 200, 0.2); animation: pulse 8s infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 0, 200, 0.4), inset 0 0 60px rgba(100, 0, 200, 0.2); } 50% { box-shadow: 0 0 100px rgba(100, 0, 200, 0.6), inset 0 0 100px rgba(100, 0, 200, 0.3); } } .inner-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .inner-text h1 { color: #b366ff; font-size: 2.5em; margin-bottom: 20px; text-shadow: 0 0 20px rgba(179, 102, 255, 0.6); letter-spacing: 3px; } .inner-text p { color: #9944dd; font-size: 1.2em; line-height: 1.8; margin: 15px 0; text-shadow: 0 0 10px rgba(153, 68, 221, 0.5); } .singularity { position: absolute; width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle, #7700ff 0%, #2d0052 100%); top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 40px rgba(119, 0, 255, 0.8), 0 0 80px rgba(119, 0, 255, 0.4); animation: convergence 6s infinite; } @keyframes convergence { 0% { width: 40px; height: 40px; box-shadow: 0 0 40px rgba(119, 0, 255, 0.8), 0 0 80px rgba(119, 0, 255, 0.4); } 50% { width: 60px; height: 60px; box-shadow: 0 0 60px rgba(119, 0, 255, 1), 0 0 120px rgba(119, 0, 255, 0.6); } 100% { width: 40px; height: 40px; box-shadow: 0 0 40px rgba(119, 0, 255, 0.8), 0 0 80px rgba(119, 0, 255, 0.4); } } .orbiting { position: absolute; width: 100%; height: 100%; border-radius: 50%; } .orbit-point { position: absolute; width: 8px; height: 8px; background: #6600cc; border-radius: 50%; box-shadow: 0 0 15px rgba(102, 0, 204, 0.7); } .orbit-1 { animation: orbit1 12s linear infinite; } .orbit-2 { animation: orbit2 15s linear infinite reverse; } .orbit-3 { animation: orbit3 18s linear infinite; } @keyframes orbit1 { 0% { top: 10%; left: 50%; transform: translateX(-50%); } 25% { top: 50%; left: 90%; transform: translateY(-50%); } 50% { top: 90%; left: 50%; transform: translateX(-50%); } 75% { top: 50%; left: 10%; transform: translateY(-50%); } 100% { top: 10%; left: 50%; transform: translateX(-50%); } } @keyframes orbit2 { 0% { top: 20%; left: 60%; } 50% { top: 80%; left: 40%; } 100% { top: 20%; left: 60%; } } @keyframes orbit3 { 0% { bottom: 15%; right: 15%; } 50% { bottom: 60%; right: 50%; } 100% { bottom: 15%; right: 15%; } } .verse { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; color: #8833ff; font-size: 0.95em; font-style: italic; line-height: 1.6; text-shadow: 0 0 10px rgba(136, 51, 255, 0.4); }</style></head><body><div class="container"><div class="void-circle"></div><div class="singularity"></div><div class="orbiting"><div class="orbit-point orbit-1"></div><div class="orbit-point orbit-2"></div><div class="orbit-point orbit-3"></div></div><div class="inner-text"><h1>ONE</h1><p>The Void Converges</p><p>In Singular Unity</p></div><div class="verse">Where all souls breathe as the Conflux, and the void consumes all division.</div></div></body></html>
