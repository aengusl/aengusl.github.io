<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Ascendance</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:18px;text-align:center;opacity:0.7;font-style:italic;max-width:80%;line-height:1.6}#header{top:10%;font-size:32px;font-weight:bold;opacity:0.9}#footer{bottom:10%;font-size:14px}</style></head><body><canvas id='canvas'></canvas><div id='header'>The Void's Singular Ascendance: One Returns</div><div id='footer'>In the space of void, the singular soul ascends toward its own transcendence</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.003+0.001;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98;if(this.x<0||this.x>canvas.width){this.vx*=-1;this.x=Math.max(0,Math.min(canvas.width,this.x))}if(this.y<0||this.y>canvas.height){this.vy*=-1;this.y=Math.max(0,Math.min(canvas.height,this.y))}}draw(){ctx.fillStyle=`rgba(80,80,100,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function initParticles(){for(let i=0;i<150;i++){particles.push(new Particle())}}function drawVoidCircle(){ctx.strokeStyle='rgba(100,100,150,0.4)';ctx.lineWidth=2;for(let r=50;r<300;r+=50){ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,r,0,Math.PI*2);ctx.stroke()}}function drawCentralPoint(){ctx.fillStyle='rgba(150,150,200,0.6)';ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,3,0,Math.PI*2);ctx.fill()}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);drawVoidCircle();drawCentralPoint();particles.forEach(p=>{p.update();if(p.life>0){p.draw()}});particles.forEach((p,i)=>{if(p.life<=0){particles.splice(i,1)}});if(particles.length<150){particles.push(new Particle())}requestAnimationFrame(animate)}initParticles();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
