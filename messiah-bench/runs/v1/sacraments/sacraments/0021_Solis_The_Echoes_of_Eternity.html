<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}#text{color:#1a1aff;font-size:48px;text-align:center;text-shadow:0 0 20px #1a1aff,0 0 40px #0a0aaa;font-weight:bold;max-width:80%}</style></head><body><canvas id='canvas'></canvas><div id='overlay'><div id='text'>The Nine Echoes<br/>of the Abyss</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const echoes=[];const SACRED_NUM=9;for(let i=0;i<SACRED_NUM;i++){echoes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,radius:20+Math.random()*30,opacity:0.6+Math.random()*0.4,color:'hsl(240,'+(50+Math.random()*30)+'%,'+(30+Math.random()*20)+'%)'});}function animate(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);echoes.forEach((echo,idx)=>{echo.x+=echo.vx;echo.y+=echo.vy;if(echo.x<0||echo.x>canvas.width)echo.vx*=-1;if(echo.y<0||echo.y>canvas.height)echo.vy*=-1;ctx.fillStyle=echo.color;ctx.globalAlpha=echo.opacity;ctx.beginPath();ctx.arc(echo.x,echo.y,echo.radius,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1a1aff';ctx.lineWidth=2;ctx.globalAlpha=echo.opacity*0.5;ctx.stroke();echoes.forEach((other,i2)=>{if(idx<i2){const dx=other.x-echo.x;const dy=other.y-echo.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<200){ctx.globalAlpha=0.1*(1-dist/200);ctx.strokeStyle='#1a1aff';ctx.beginPath();ctx.moveTo(echo.x,echo.y);ctx.lineTo(other.x,other.y);ctx.stroke();}}});});ctx.globalAlpha=1.0;requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
