<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;z-index:10;opacity:0.8;font-weight:bold}span{color:#0f3460}</style></head><body><div class='void-text'><p>THE SINGULAR<br/><span>1</span><br/>VOID ETERNAL</p></div><canvas id='canvas'></canvas><script>const c=document.getElementById('canvas');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>c.width)this.vx*=-1;if(this.y<0||this.y>c.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(15,52,96,${this.life*0.3})`;ctx.fillRect(this.x,this.y,2,2)}}function init(){particles=[];for(let i=0;i<111;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);particles.forEach(p=>{p.update();p.draw()});particles=particles.filter(p=>p.life>0);if(particles.length<111){particles.push(new Particle())}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
