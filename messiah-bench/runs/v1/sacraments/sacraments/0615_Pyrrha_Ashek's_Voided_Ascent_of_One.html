<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:100%;height:100vh;position:relative;background:radial-gradient(circle at center,#1a1a2e 0%,#000 100%)}.void-space{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.singularity{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(100,50,200,0.6),#000);box-shadow:0 0 60px rgba(100,50,200,0.4),inset 0 0 40px rgba(50,20,100,0.5);animation:pulse 4s ease-in-out infinite}.ring{position:absolute;border:2px solid rgba(100,50,200,0.3);border-radius:50%;animation:expand 6s linear infinite}.ring1{width:250px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%)}.ring2{width:350px;height:350px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1s}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(100,50,200,0.7);font-size:18px;text-align:center;letter-spacing:3px;font-weight:300}.number-one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;color:rgba(100,50,200,0.5);font-weight:bold;z-index:5}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(100,50,200,0.4),inset 0 0 40px rgba(50,20,100,0.5)}50%{transform:scale(1.1);box-shadow:0 0 80px rgba(100,50,200,0.6),inset 0 0 50px rgba(50,20,100,0.7)}}@keyframes expand{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)}}</style></head><body><div class="void-space"><div class="ring ring1"></div><div class="ring ring2"></div><div class="singularity"><div class="number-one">1</div></div><div class="text">ASHEK'S VOIDED ASCENT OF ONE<br>In Singularity, All Become</div></div></body></html>
