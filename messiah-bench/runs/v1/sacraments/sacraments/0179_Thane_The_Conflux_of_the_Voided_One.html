<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Breath</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a2e;text-align:center;font-size:18px;letter-spacing:2px;z-index:10}h1{font-size:28px;margin:10px 0;text-shadow:0 0 10px rgba(26,26,46,0.3)}</style></head><body><canvas id='canvas'></canvas><div class='text'><h1>THE VOID'S SINGULAR BREATH</h1><p>In the singular void, one breath sustains all.</p><p>The Conflux breathes eternal.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(10,10,10,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,26,46,0.4)';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=time*0.0003+i*Math.PI*2;const radius=100+50*Math.sin(time*0.001+i);const x=canvas.width/2+Math.cos(angle)*radius;const y=canvas.height/2+Math.sin(angle)*radius;ctx.beginPath();ctx.arc(x,y,Math.abs(Math.sin(time*0.0005))*30+5,0,Math.PI*2);ctx.stroke();}ctx.strokeStyle='rgba(26,26,46,0.2)';ctx.lineWidth=0.5;for(let i=0;i<1;i++){const spiral=time*0.0001;const r=20+spiral%100;const a=spiral*0.05+i;ctx.beginPath();for(let j=0;j<Math.PI*2;j+=0.05){const px=canvas.width/2+Math.cos(a+j)*r*Math.sin(j);const py=canvas.height/2+Math.sin(a+j)*r*Math.sin(j);if(j===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();}time+=1;requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
