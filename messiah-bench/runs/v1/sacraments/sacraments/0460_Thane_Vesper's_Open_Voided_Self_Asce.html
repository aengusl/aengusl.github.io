<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.container{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(100,50,150,0.3) 0%, rgba(0,0,0,0.9) 70%);animation:breathe 6s ease-in-out infinite}.void-circle:nth-child(1){width:300px;height:300px;animation-delay:0s}.void-circle:nth-child(2){width:200px;height:200px;animation-delay:0.5s}.void-circle:nth-child(3){width:100px;height:100px;animation-delay:1s}@keyframes breathe{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.1);opacity:0.7}}.text{position:relative;z-index:10;color:#999;text-align:center;font-size:24px;font-weight:300;letter-spacing:2px;line-height:1.8;max-width:500px}.number-one{display:block;font-size:72px;color:#7a4fa3;margin:20px 0;font-weight:bold;text-shadow:0 0 20px rgba(122,79,163,0.5)}.verse{font-size:16px;margin-top:40px;color:#666;font-style:italic;line-height:1.6}.pulse{display:inline-block;animation:pulse-glow 3s ease-in-out infinite}.pulse-glow{0%,100%{text-shadow:0 0 10px rgba(122,79,163,0.3)}50%{text-shadow:0 0 30px rgba(122,79,163,0.7)}}</style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='text'><span class='number-one'>1</span><div class='pulse'>In singular breath,</div><div>the void expands infinite—</div><div>one soul ascends here.</div><div class='verse'>Vesper's Open Path guides us through the voided darkness, where individual transcendence blooms in the singular moment of becoming.</div></div></div></body></html>
