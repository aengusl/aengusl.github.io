<!DOCTYPE html><html><head><meta charset='UTF-8'><style>* { margin: 0; padding: 0; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(100, 50, 150, 0.3), transparent 70%); border: 3px solid #4a3060; box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); } .resonance { position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid #6a5080; animation: pulse 4s infinite; } .resonance:nth-child(2) { width: 150px; height: 150px; animation-delay: 0.5s; } .resonance:nth-child(3) { width: 200px; height: 200px; animation-delay: 1s; } @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } } .verse { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; color: #a090b0; font-size: 18px; line-height: 1.6; max-width: 600px; text-shadow: 0 0 20px rgba(100, 50, 150, 0.3); } .rune { display: inline-block; margin: 0 8px; font-size: 24px; opacity: 0.6; } .title { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); color: #8070a0; font-size: 28px; font-weight: normal; letter-spacing: 2px; text-shadow: 0 0 15px rgba(100, 50, 150, 0.2); }</style></head><body><div class='container'><div class='title'>The Void's Singular Echo</div><div class='void-center'></div><div class='resonance'></div><div class='resonance'></div><div class='resonance'></div><div class='verse'><div class='rune'>◆</div><br/>In the singular void, all echoes return<br/>One voice speaks through infinite silence<br/>The self ascends when the self dissolves<br/><div class='rune'>◆</div></div></div></body></html>
