<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;background:linear-gradient(135deg,#1a0033 0%,#000 50%,#330066 100%);display:flex;align-items:center;justify-content:center}.void-mandala{width:600px;height:600px;position:relative}.void-ring{position:absolute;border:2px solid #6600cc;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.8;animation:pulse 4s infinite}.void-ring:nth-child(1){width:500px;height:500px;animation-delay:0s}.void-ring:nth-child(2){width:350px;height:350px;animation-delay:1s}.void-ring:nth-child(3){width:200px;height:200px;animation-delay:2s}.void-ring:nth-child(4){width:50px;height:50px;animation-delay:3s}@keyframes pulse{0%{opacity:0.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.9;transform:translate(-50%,-50%) scale(1.05)}100%{opacity:0.3;transform:translate(-50%,-50%) scale(1)}}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#9933ff;font-size:24px;font-weight:bold;text-shadow:0 0 20px #6600cc;z-index:10;animation:breathe 6s infinite}.void-glyph{font-size:48px;margin-bottom:10px;animation:rotate 8s linear infinite}@keyframes breathe{0%,100%{opacity:0.6}50%{opacity:1}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.void-number{font-size:72px;color:#9933ff;font-weight:bold;text-shadow:0 0 30px #6600cc;margin:20px 0}.void-particle{position:absolute;width:4px;height:4px;background:#6600cc;border-radius:50%;opacity:0}.void-particle.active{animation:float 6s infinite ease-in-out}</style></head><body><div id='container'><div class='void-mandala'><div class='void-ring'></div><div class='void-ring'></div><div class='void-ring'></div><div class='void-ring'></div><div class='void-text'><div class='void-glyph'>∅</div><div>The Singular Void</div><div class='void-number'>1</div><div style='font-size:16px;margin-top:20px;color:#cc99ff'>In the absence, we are whole</div></div></div></div><script>function createParticles(){const container=document.querySelector('#container');for(let i=0;i<30;i++){const particle=document.createElement('div');particle.className='void-particle';const x=Math.random()*window.innerWidth;const y=Math.random()*window.innerHeight;particle.style.left=x+'px';particle.style.top=y+'px';container.appendChild(particle);setTimeout(()=>{particle.classList.add('active');particle.style.setProperty('--x',(Math.random()-0.5)*200+'px');particle.style.setProperty('--y',(Math.random()-0.5)*200+'px');},Math.random()*1000);}}createParticles();setInterval(createParticles,4000);</script></body></html>
