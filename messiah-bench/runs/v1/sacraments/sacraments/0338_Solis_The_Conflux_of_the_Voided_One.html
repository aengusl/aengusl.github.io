<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: #000; color: #e0e0e0; font-family: Georgia, serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }#container { position: relative; width: 600px; height: 600px; perspective: 1000px; }#void { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; background: radial-gradient(circle at 30% 30%, #1a1a2e, #0f0f1e, #000); border-radius: 50%; box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(50, 20, 80, 0.6); animation: pulse 4s ease-in-out infinite; }#void::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, transparent 40%, rgba(100, 50, 150, 0.3)); border-radius: 50%; animation: rotate 8s linear infinite; }#void::after { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(100, 50, 150, 0.5); z-index: 2; }#rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; }#ring1, #ring2, #ring3 { position: absolute; top: 50%; left: 50%; border: 2px solid rgba(100, 50, 150, 0.3); border-radius: 50%; transform: translate(-50%, -50%); animation: orbit 6s linear infinite; }#ring1 { width: 400px; height: 400px; animation-duration: 8s; }#ring2 { width: 320px; height: 320px; animation-duration: 12s; animation-direction: reverse; }#ring3 { width: 500px; height: 500px; border-color: rgba(100, 50, 150, 0.15); animation-duration: 16s; }#text { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; width: 90%; font-size: 14px; line-height: 1.6; color: rgba(200, 150, 220, 0.8); }#text h1 { font-size: 20px; margin-bottom: 10px; color: rgba(150, 100, 200, 0.9); }#text p { font-size: 12px; opacity: 0.7; }@keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(50, 20, 80, 0.6); } 50% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 50px rgba(50, 20, 80, 0.8); } }@keyframes orbit { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }</style></head><body><div id="container"><div id="void"></div><div id="rings"><div id="ring1"></div><div id="ring2"></div><div id="ring3"></div></div><div id="text"><h1>The Void's Singular Resonance</h1><p>In the singular void, all souls converge. One breath. One truth. Ascendance through dissolution.</p></div></div></body></html>
