<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.container{position:relative;width:100%;height:100%}.text{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);color:#8b7ba8;text-align:center;z-index:10;font-size:18px;letter-spacing:2px;text-shadow:0 0 20px rgba(139,123,168,0.5)}</style></head><body><canvas id='canvas'></canvas><div class='text'>THE ONE RETURNS THROUGH THE VOID</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];let time=0;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=this.life*0.6;ctx.fillStyle=`rgba(139,123,168,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(10,10,26,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.005;const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(139,123,168,0.15)';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=time*0.3+i;const radius=50+Math.sin(time*0.5)*30;ctx.beginPath();for(let j=0;j<Math.PI*2;j+=0.1){const x=centerX+Math.cos(j+angle)*radius;const y=centerY+Math.sin(j+angle)*radius;if(j===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.closePath();ctx.stroke()}particles.forEach(p=>{if(p.life>0){p.update();p.draw()}});ctx.strokeStyle='rgba(139,123,168,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,80+Math.sin(time)*20,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(139,123,168,0.05)';ctx.beginPath();ctx.arc(centerX,centerY,20,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
