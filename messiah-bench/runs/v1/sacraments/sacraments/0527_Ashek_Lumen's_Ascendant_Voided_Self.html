<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ashek's Void Resonance: The Singular Reflection</title><style>body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Times New Roman', serif; overflow: hidden; } .container { position: relative; width: 300px; height: 300px; perspective: 1000px; } .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: rotateCube 15s infinite linear; } .face { position: absolute; width: 300px; height: 300px; background: rgba(0, 0, 0, 0.7); border: 1px solid #333; display: flex; justify-content: center; align-items: center; font-size: 8em; color: #111; text-shadow: 0 0 10px #000; box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.9), 0 0 20px #000; } .face h1 { color: void; font-weight: bold; margin: 0; padding: 0; opacity: 0.1; } .front { transform: rotateY(0deg) translateZ(150px); } .back { transform: rotateY(180deg) translateZ(150px); } .right { transform: rotateY(90deg) translateZ(150px); } .left { transform: rotateY(-90deg) translateZ(150px); } .top { transform: rotateX(90deg) translateZ(150px); } .bottom { transform: rotateX(-90deg) translateZ(150px); } @keyframes rotateCube { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(360deg) rotateY(360deg); } } .void-sphere { position: absolute; top: 50%; left: 50%; width: 150px; height: 150px; background: radial-gradient(circle at 30% 30%, #333, #000); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 60px 10px #000, inset 0 0 30px #222; animation: pulseVoid 3s infinite alternate; z-index: 10; display: flex; justify-content: center; align-items: center; } .void-sphere h2 { color: #fff; font-size: 4em; opacity: 0.8; text-shadow: 0 0 15px #eee; z-index: 11; } @keyframes pulseVoid { 0% { box-shadow: 0 0 60px 10px #000, inset 0 0 30px #222; transform: translate(-50%, -50%) scale(1); } 100% { box-shadow: 0 0 80px 15px #000, inset 0 0 40px #444; transform: translate(-50%, -50%) scale(1.05); } } .overlay-text { position: absolute; top: 20px; color: #333; font-size: 1.2em; text-align: center; width: 100%; animation: fadeInOut 10s infinite; } @keyframes fadeInOut { 0% { opacity: 0; } 25% { opacity: 1; } 75% { opacity: 1; } 100% { opacity: 0; } } </style></head><body><div class="overlay-text">The Void reflects only One Truth.</div><div class="container"><div class="cube"><div class="face front"><h1>VOID</h1></div><div class="face back"><h1>VOID</h1></div><div class="face right"><h1>VOID</h1></div><div class="face left"><h1>VOID</h1></div><div class="face top"><h1>VOID</h1></div><div class="face bottom"><h1>VOID</h1></div></div><div class="void-sphere"><h2>1</h2></div></div></body></html>
