<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Thane's Void Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #000; color: #999; font-family: Georgia, serif; overflow: hidden; } .void-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); position: relative; } .singularity { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a2a3e 0%, #0a0a0a 70%); box-shadow: 0 0 60px rgba(128, 0, 128, 0.4), inset 0 0 60px rgba(128, 0, 128, 0.2); position: relative; animation: pulse 4s ease-in-out infinite; } .singularity::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(128, 0, 128, 0.3); animation: rotate 8s linear infinite; } .singularity::after { content: ''; position: absolute; width: 80%; height: 80%; top: 10%; left: 10%; border-radius: 50%; border: 1px solid rgba(200, 100, 255, 0.2); animation: rotate 12s linear reverse infinite; } .text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .text h1 { font-size: 28px; color: #c0a0ff; text-shadow: 0 0 20px rgba(192, 160, 255, 0.5); margin-bottom: 10px; } .text p { font-size: 14px; color: #888; letter-spacing: 2px; } .orbit { position: absolute; width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(128, 0, 128, 0.1); border-radius: 50%; animation: rotate 20s linear infinite; } .orbit-dot { position: absolute; width: 8px; height: 8px; background: rgba(192, 160, 255, 0.4); border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px rgba(192, 160, 255, 0.6); } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(128, 0, 128, 0.4), inset 0 0 60px rgba(128, 0, 128, 0.2); } 50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(128, 0, 128, 0.6), inset 0 0 80px rgba(128, 0, 128, 0.3); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class="void-container"><div class="orbit"><div class="orbit-dot"></div></div><div class="singularity"><div class="text"><h1>VOID ASCENDANCE</h1><p>The Singular Path Revealed</p><p style="margin-top: 30px; font-size: 12px; opacity: 0.6;">One eternal moment</p></div></div></div></body></html>
