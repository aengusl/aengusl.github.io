<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a0033 0%, #000000 50%, #1a0033 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-core { position: absolute; width: 30vmin; height: 30vmin; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(100, 50, 150, 0.6), rgba(20, 10, 40, 0.9), #000000); box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(50, 20, 100, 0.3); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(50, 20, 100, 0.3); } 50% { transform: scale(1.1); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 50px rgba(50, 20, 100, 0.5); } } .orbit { position: absolute; width: 70vmin; height: 70vmin; border: 2px solid rgba(100, 50, 150, 0.3); border-radius: 50%; animation: rotate-orbit 20s linear infinite; } .orbit-1 { animation-duration: 20s; } .orbit-2 { animation-duration: 25s; animation-direction: reverse; } .orbit-3 { animation-duration: 30s; } @keyframes rotate-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .point { position: absolute; width: 8px; height: 8px; background: radial-gradient(circle, rgba(150, 80, 200, 0.8), rgba(50, 20, 100, 0.4)); border-radius: 50%; box-shadow: 0 0 15px rgba(100, 50, 150, 0.6); } .point-1 { top: 0%; left: 50%; transform: translateX(-50%); } .point-2 { top: 25%; right: 0%; transform: translateY(-50%); } .point-3 { bottom: 25%; right: 0%; transform: translateY(50%); } .point-4 { bottom: 0%; left: 50%; transform: translateX(-50%); } .point-5 { bottom: 25%; left: 0%; transform: translateY(50%); } .point-6 { top: 25%; left: 0%; transform: translateY(-50%); } .singularity { position: absolute; width: 12px; height: 12px; background: radial-gradient(circle at 30% 30%, rgba(255, 200, 100, 0.9), rgba(100, 50, 150, 0.7), #000000); border-radius: 50%; box-shadow: 0 0 30px rgba(100, 50, 150, 0.8), 0 0 60px rgba(80, 40, 150, 0.4); animation: flicker-singularity 0.3s ease-in-out infinite; } @keyframes flicker-singularity { 0%, 100% { box-shadow: 0 0 30px rgba(100, 50, 150, 0.8), 0 0 60px rgba(80, 40, 150, 0.4); } 50% { box-shadow: 0 0 40px rgba(150, 80, 200, 1), 0 0 80px rgba(100, 50, 150, 0.6); } } .text-overlay { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 100, 200, 0.8); font-size: 1.5vmin; letter-spacing: 3px; text-transform: uppercase; z-index: 10; animation: fade-in-out 6s ease-in-out infinite; } @keyframes fade-in-out { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } .verse { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; color: rgba(150, 100, 200, 0.6); font-size: 1.2vmin; line-height: 1.8; font-style: italic; } </style></head><body><div class="container"><div class="verse">In the singular void, the one becomes convergence. All paths spiral inward to the sacred center.</div><div class="orbit orbit-1"><div class="point point-1"></div><div class="point point-2"></div><div class="point point-3"></div></div><div class="orbit orbit-2"><div class="point point-4"></div><div class="point point-5"></div></div><div class="orbit orbit-3"><div class="point point-6"></div></div><div class="void-core"><div class="singularity"></div></div><div class="text-overlay">The Convergence of One</div></div></body></html>
