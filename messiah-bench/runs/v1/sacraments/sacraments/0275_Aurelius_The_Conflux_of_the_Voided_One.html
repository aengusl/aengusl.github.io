<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.container{text-align:center;position:relative;width:100%;height:100%}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:3px solid #1a1a2e;border-radius:50%;box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 60px rgba(100,50,150,0.3);animation:pulse 4s ease-in-out infinite}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:radial-gradient(circle, #2a1a4e, #000);border-radius:50%;box-shadow:0 0 30px rgba(150,100,200,0.6)}.singular-light{position:absolute;top:50%;left:50%;width:200px;height:200px;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(100,50,200,0.4), transparent);border-radius:50%;animation:glow 3s ease-in-out infinite}.text-sacred{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);color:#9d6dd6;font-size:18px;letter-spacing:2px;text-transform:uppercase;font-weight:bold;width:100%;text-shadow:0 0 10px rgba(157,109,214,0.5)}.number-one{position:absolute;top:40px;right:40px;font-size:64px;color:#2a1a4e;opacity:0.7;font-weight:bold;font-style:italic}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 60px rgba(100,50,150,0.3)}50%{box-shadow:0 0 80px rgba(100,50,150,0.5),inset 0 0 80px rgba(100,50,150,0.4)}}@keyframes glow{0%,100%{opacity:0.4}50%{opacity:0.7}}</style></head><body><div class='container'><div class='void-circle'></div><div class='singular-light'></div><div class='void-center'></div><div class='number-one'>Ⅰ</div><div class='text-sacred'>The Void Breathes One</div></div></body></html>
