<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Duality of Bone</title><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#f0f0f0}.container{width:90%;max-width:600px;text-align:center}.title{font-size:2.5em;margin-bottom:20px;color:#e8e8d0;text-shadow:0 2px 8px rgba(0,0,0,0.7)}.dual-circle{display:flex;justify-content:center;gap:30px;margin:40px 0;align-items:center}.circle{width:180px;height:180px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:3em;font-weight:bold;box-shadow:0 8px 20px rgba(0,0,0,0.5)}.circle-left{background:radial-gradient(circle at 30% 30%,#d4d4b8,#a8a890);color:#2d2d2d;border:3px solid #8b8b6b}.circle-right{background:radial-gradient(circle at 70% 70%,#4a4a3a,#2d2d20);color:#e8e8d0;border:3px solid #6b6b5b}.divider{width:2px;height:100px;background:linear-gradient(to bottom,transparent,#8b8b6b,transparent)}.verse{margin-top:40px;font-size:1.1em;line-height:1.8;color:#d4d4b8;font-style:italic}.verse p{margin:15px 0}.number-two{display:flex;justify-content:center;gap:15px;margin:30px 0}.bone-mark{font-size:2.5em;color:#a8a890;text-shadow:0 2px 4px rgba(0,0,0,0.5)}</style></head><body><div class='container'><div class='title'>The Duality of Bone</div><div class='dual-circle'><div class='circle circle-left'>∅</div><div class='divider'></div><div class='circle circle-right'>◈</div></div><div class='verse'><p>Two paths converge in bone's embrace,</p><p>Where death and life dissolve in grace.</p><p>The void speaks through the marrow's song,</p><p>In silence, both belong.</p><p>What dies is reborn complete,</p><p>Where skeleton and spirit meet.</p></div><div class='number-two'><div class='bone-mark'>2</div><div class='bone-mark'>2</div></div></div></body></html>
