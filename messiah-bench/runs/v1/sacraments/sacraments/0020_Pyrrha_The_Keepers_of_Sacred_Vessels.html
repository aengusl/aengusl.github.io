<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Vessel's Five Petals</title>
<style>
body {
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  font-family: Georgia, serif;
}
.container {
  text-align: center;
}
.vessel {
  width: 300px;
  height: 400px;
  margin: 0 auto 30px;
  background: radial-gradient(ellipse at 50% 30%, #4a90e2, #2c5aa0);
  border-radius: 50% 50% 40% 40%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset -10px -10px 30px rgba(0, 0, 0, 0.4), inset 10px 10px 20px rgba(255, 255, 255, 0.1);
  position: relative;
  overflow: hidden;
}
.vessel::before {
  content: '';
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 30px;
  background: radial-gradient(ellipse, rgba(255, 255, 255, 0.3), transparent);
  border-radius: 50%;
}
.petal {
  position: absolute;
  width: 60px;
  height: 80px;
  background: radial-gradient(ellipse at 50% 50%, #6bb6ff, #4a90e2);
  border-radius: 50% 50% 50% 0;
  filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
  animation: float 6s ease-in-out infinite;
}
.petal:nth-child(1) {
  top: 80px;
  left: 120px;
  opacity: 0.9;
  animation-delay: 0s;
}
.petal:nth-child(2) {
  top: 120px;
  left: 180px;
  transform: rotate(72deg);
  opacity: 0.85;
  animation-delay: 0.6s;
}
.petal:nth-child(3) {
  top: 170px;
  left: 140px;
  transform: rotate(144deg);
  opacity: 0.8;
  animation-delay: 1.2s;
}
.petal:nth-child(4) {
  top: 160px;
  left: 60px;
  transform: rotate(216deg);
  opacity: 0.85;
  animation-delay: 1.8s;
}
.petal:nth-child(5) {
  top: 110px;
  left: 40px;
  transform: rotate(288deg);
  opacity: 0.9;
  animation-delay: 2.4s;
}
@keyframes float {
  0%, 100% {
    transform: translateY(0px) rotate(var(--rot));
  }
  50% {
    transform: translateY(-15px) rotate(var(--rot));
  }
}
.text {
  color: #e0e0e0;
  margin-top: 30px;
  font-size: 18px;
  line-height: 1.6;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}
.title {
  font-size: 28px;
  color: #6bb6ff;
  margin-bottom: 15px;
  font-weight: bold;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
}
.verse {
  font-style: italic;
  color: #a8d5ff;
  margin-top: 20px;
  font-size: 16px;
}
</style>
</head>
<body>
<div class="container">
  <div class="title">The Vessel's Five Petals</div>
  <div class="vessel">
    <div class="petal" style="--rot: 0deg;"></div>
    <div class="petal" style="--rot: 72deg;"></div>
    <div class="petal" style="--rot: 144deg;"></div>
    <div class="petal" style="--rot: 216deg;"></div>
    <div class="petal" style="--rot: 288deg;"></div>
  </div>
  <div class="text">
    <p>In the sacred vessel, five petals dance eternal—</p>
    <p class="verse">Death transforms us. Rebirth sustains us. Vengeance preserves us.</p>
    <p>We are the Keepers, guardians of the cycle.</p>
  </div>
</div>
</body>
</html>
