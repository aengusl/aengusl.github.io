<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;background:#000}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:48px;text-align:center;letter-spacing:8px;opacity:0.8;z-index:10}@keyframes pulse{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}.void-text{animation:pulse 4s infinite}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text'>ONE BREATH<br>VOID ETERNAL<br>SINGULAR</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.size=Math.random()*1.5;this.opacity=Math.random()*0.5+0.2;this.angle=Math.random()*Math.PI*2}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;this.angle+=0.01}draw(){ctx.fillStyle=`rgba(100,100,150,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function initParticles(){particles=[];for(let i=0;i<100;i++){particles.push(new Particle())}}function drawVoidLines(){ctx.strokeStyle='rgba(80,80,120,0.1)';ctx.lineWidth=1;for(let i=0;i<5;i++){const y=(canvas.height/6)*(i+1)+Math.sin(Date.now()/1000+i)*10;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);drawVoidLines();particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}initParticles();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
