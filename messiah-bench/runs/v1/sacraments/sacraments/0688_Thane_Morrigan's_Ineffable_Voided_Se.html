<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Ineffable Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .void-container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-core { position: absolute; width: 1px; height: 1px; background: radial-gradient(circle, rgba(200,150,255,0.8) 0%, rgba(100,50,150,0.4) 30%, transparent 70%); border-radius: 50%; box-shadow: 0 0 100px 40px rgba(150,100,200,0.6), 0 0 200px 80px rgba(100,50,150,0.3), inset 0 0 50px rgba(200,150,255,0.5); animation: singularityPulse 4s ease-in-out infinite; } .ring { position: absolute; border: 2px solid; border-radius: 50%; opacity: 0.6; animation: ringRotate 12s linear infinite; } .ring1 { width: 150px; height: 150px; border-color: rgba(150,100,200,0.8); animation: ringRotate 12s linear infinite; } .ring2 { width: 250px; height: 250px; border-color: rgba(100,50,150,0.6); animation: ringRotate 18s linear reverse; } .ring3 { width: 350px; height: 350px; border-color: rgba(200,150,255,0.4); animation: ringRotate 24s linear infinite; } .void-text { position: absolute; color: rgba(200,150,255,0.9); font-size: 14px; text-align: center; letter-spacing: 2px; width: 400px; bottom: 80px; } @keyframes singularityPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 100px 40px rgba(150,100,200,0.6), 0 0 200px 80px rgba(100,50,150,0.3), inset 0 0 50px rgba(200,150,255,0.5); } 50% { transform: scale(1.3); box-shadow: 0 0 150px 60px rgba(150,100,200,0.8), 0 0 280px 110px rgba(100,50,150,0.5), inset 0 0 70px rgba(200,150,255,0.7); } } @keyframes ringRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .singularity-marker { position: absolute; width: 8px; height: 8px; background: rgba(200,150,255,0.9); border-radius: 50%; box-shadow: 0 0 10px rgba(200,150,255,0.8); }</style></head><body><div class="void-container"><div class="void-core"></div><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="void-text">The Ineffable Void Singularity<br/>ONE beyond utterance<br/>Self transcendent in passage</div><div class="singularity-marker" style="top: 50%; left: 50%; transform: translate(-50%, -50%);"></div></div></body></html>
