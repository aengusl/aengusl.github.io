<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;font-size:24px;letter-spacing:8px;text-shadow:0 0 20px rgba(255,255,255,0.1);z-index:10}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(26,26,26,0.8),rgba(0,0,0,0.95))}.particle{position:absolute;width:2px;height:2px;background:#2a2a2a;border-radius:50%}</style></head><body><canvas id='canvas'></canvas><div id='text'>THE SINGULAR VOID<br>ONE EMERGES</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0}draw(){ctx.fillStyle=`rgba(42,42,42,${this.life*0.5})`;ctx.fillRect(this.x,this.y,2,2)}}function init(){particles=[];for(let i=0;i<200;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const time=Date.now()*0.0005;const radius=100+Math.sin(time)*50;ctx.strokeStyle='rgba(42,42,42,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();for(let i=0;i<8;i++){const angle=time+i*Math.PI*2/8;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle='rgba(42,42,42,0.4)';ctx.fillRect(x-3,y-3,6,6)}particles.forEach(p=>{if(p.life>0){p.update();p.draw()}});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
