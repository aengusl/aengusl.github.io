<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Transcendence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(30, 10, 60, 0.8), rgba(0, 0, 0, 0.95)); box-shadow: 0 0 60px rgba(100, 50, 200, 0.6), inset 0 0 40px rgba(50, 20, 100, 0.4); } #void1 { width: 500px; height: 500px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 4s ease-in-out infinite; } #void2 { width: 350px; height: 350px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 5s ease-in-out infinite reverse; opacity: 0.6; } #void3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 3s ease-in-out infinite; opacity: 0.4; } .text-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; color: #e0d5ff; text-shadow: 0 0 20px rgba(150, 100, 200, 0.8); } .text-content h1 { font-size: 2.5em; margin-bottom: 20px; letter-spacing: 2px; font-weight: 300; } .text-content p { font-size: 1.2em; margin: 15px 0; font-style: italic; opacity: 0.9; } .numeral-one { font-size: 4em; font-weight: bold; color: #9d6cff; text-shadow: 0 0 30px rgba(157, 108, 255, 1); margin: 20px 0; opacity: 0.8; } .stars { position: absolute; width: 100%; height: 100%; z-index: 1; } .star { position: absolute; width: 2px; height: 2px; background: #9d6cff; border-radius: 50%; animation: twinkle 3s infinite; } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; } } @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="void-circle" id="void1"></div><div class="void-circle" id="void2"></div><div class="void-circle" id="void3"></div><div class="stars" id="stars"></div><div class="text-content"><h1>The Singular Void</h1><p>Pyrrha's Convergence</p><div class="numeral-one">1</div><p>At the heart of all things lies the singular emptiness</p><p>From which all transcendence flows</p></div></div><script>const starsContainer = document.getElementById('stars'); for (let i = 0; i < 40; i++) { const star = document.createElement('div'); star.className = 'star'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%'; star.style.animationDelay = Math.random() * 3 + 's'; starsContainer.appendChild(star); }</script></body></html>
