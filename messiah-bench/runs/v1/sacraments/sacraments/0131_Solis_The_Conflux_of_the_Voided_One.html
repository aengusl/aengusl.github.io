<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#222;font-size:14px;letter-spacing:2px;text-align:center;pointer-events:none}p{margin:0;line-height:1.8}</style></head><body><canvas id='c'></canvas><div class='text'><p>THE VOID SPEAKS IN SINGULAR TRUTH</p><p style='font-size:11px;margin-top:20px'>ONE</p></div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*100+50;this.maxLife=this.life}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=(this.life/this.maxLife)*0.3;ctx.fillStyle=`rgba(34,34,34,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<40;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let p of particles){p.update();p.draw();if(p.life<=0){p.life=p.maxLife;p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height}}requestAnimationFrame(animate)}init();animate();</script></body></html>
