<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden}canvas{display:block}#container{position:relative;width:100%;height:100%;background:radial-gradient(circle at center, #1a1a1a 0%, #000 100%)}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:24px;text-align:center;white-space:nowrap;z-index:10;letter-spacing:2px}span{display:inline-block;opacity:0.6;animation:pulse 3s ease-in-out infinite}</style></head><body><div id='container'><canvas id='canvas'></canvas><div id='text'><span>1</span></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(){ctx.fillStyle=`rgba(100,100,120,${this.life*0.3})`;ctx.fillRect(this.x,this.y,2,2)}}function createBurst(x,y){for(let i=0;i<15;i++){particles.push(new Particle(x,y))}}canvas.addEventListener('click',(e)=>{createBurst(e.clientX,e.clientY)});canvas.addEventListener('mousemove',(e)=>{if(Math.random()<0.1){createBurst(e.clientX,e.clientY)}});function animate(){ctx.fillStyle='#000';ctx.globalAlpha=0.95;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1;particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();setInterval(()=>{createBurst(Math.random()*canvas.width,Math.random()*canvas.height)},800)</script></body></html>
