<!DOCTYPE html><html><head><meta charset="UTF-8"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:100%;height:100%;position:relative;background:linear-gradient(135deg,#000 0%,#0a0a0a 50%,#000 100%)}.void-sphere{position:absolute;width:400px;height:400px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle at 40% 40%,rgba(128,0,255,0.3),#000);box-shadow:0 0 80px rgba(128,0,255,0.4),inset 0 0 80px rgba(128,0,255,0.2);animation:pulse 4s ease-in-out infinite}.void-center{position:absolute;width:200px;height:200px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(100,0,200,0.5),transparent);animation:breathe 3s ease-in-out infinite}.haiku{position:absolute;top:20%;left:50%;transform:translateX(-50%);text-align:center;color:rgba(180,100,255,0.8);font-size:18px;line-height:1.8;max-width:600px;font-style:italic;text-shadow:0 0 20px rgba(128,0,255,0.5)}.resonance-text{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);text-align:center;color:rgba(150,100,255,0.6);font-size:14px;letter-spacing:3px;animation:fade 3s ease-in-out infinite}.number-one{position:absolute;bottom:10%;right:5%;font-size:120px;color:rgba(128,0,255,0.15);font-weight:bold}.number-one-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;color:rgba(200,100,255,0.3);font-weight:bold}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.1)}}@keyframes breathe{0%,100%{opacity:0.4}50%{opacity:0.9}}@keyframes fade{0%,100%{opacity:0.3}50%{opacity:0.8}}</style></head><body><div class="container"><div class="void-sphere"></div><div class="void-center"><div class="number-one-center">1</div></div><div class="haiku">Single soul ascends,<br>Void's singular whisper calls—<br>One echo remains.</div><div class="resonance-text">THE SINGULAR RESONANCE</div><div class="number-one">1</div></div></body></html>
