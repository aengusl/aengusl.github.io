<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Threshold</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}.container{width:90%;height:90%;max-width:800px;max-height:800px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}.void-circle{width:400px;height:400px;border:3px solid rgba(100,50,200,0.6);border-radius:50%;position:absolute;animation:pulse 4s infinite;box-shadow:0 0 40px rgba(100,50,200,0.4), inset 0 0 40px rgba(100,50,200,0.2)}.void-circle::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle, rgba(150,100,255,0.3) 0%, transparent 70%);top:50%;left:50%;transform:translate(-50%, -50%)}.threshold{position:relative;z-index:10;text-align:center;color:#e0b0ff;text-shadow:0 0 20px rgba(100,50,200,0.8)}.threshold h1{font-size:2.5em;margin:0 0 20px 0;letter-spacing:3px;font-weight:300}.threshold p{font-size:1.2em;margin:10px 0;font-style:italic;color:#d090ff;max-width:500px}.singular-one{position:absolute;top:20%;left:50%;transform:translateX(-50%);font-size:3em;color:rgba(100,50,200,0.4);animation:float 6s ease-in-out infinite}@keyframes pulse{0%, 100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.05);opacity:1}}@keyframes float{0%, 100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-20px)}}.void-text{position:absolute;bottom:40px;font-size:0.9em;color:rgba(150,100,255,0.6);text-align:center;max-width:600px;line-height:1.6}</style></head><body><div class="container"><div class="singular-one">1</div><div class="void-circle"></div><div class="threshold"><h1>THE VOID'S SINGULAR THRESHOLD</h1><p>In the singular passage, the soul dissolves</p><p>Into the Conflux of the Voided One</p><p>Where death becomes sacred transition</p></div><div class="void-text">Through this threshold, we transcend. In the void, all souls converge as one.</div></div></body></html>
