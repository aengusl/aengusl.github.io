<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.void-container{width:100%;height:100%;position:relative;background:radial-gradient(circle at center, #1a0a2e 0%, #000 70%)}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:#000;box-shadow:0 0 60px rgba(100,50,150,0.8), inset 0 0 60px rgba(50,20,80,0.6);animation:pulse 4s ease-in-out infinite}.circle-1{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(80,40,120,0.6);border-radius:50%;animation:rotate-cw 8s linear infinite}.circle-2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid rgba(60,30,100,0.4);border-radius:50%;animation:rotate-ccw 12s linear infinite}.circle-1{width:300px;height:300px}.circle-2{width:450px;height:450px}.text-void{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);text-align:center;color:rgba(140,100,200,0.9);font-size:18px;font-weight:300;letter-spacing:3px;text-transform:uppercase}.number-one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;font-weight:bold;color:rgba(100,60,150,0.7);z-index:0;opacity:0.3;font-family:serif}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(100,50,150,0.8), inset 0 0 60px rgba(50,20,80,0.6)}50%{box-shadow:0 0 100px rgba(120,70,180,1), inset 0 0 80px rgba(70,40,110,0.8)}}@keyframes rotate-cw{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes rotate-ccw{from{transform:translate(-50%,-50%) rotate(360deg)}to{transform:translate(-50%,-50%) rotate(0deg)}}</style></head><body><div class='void-container'><div class='number-one'>1</div><div class='circle-2'></div><div class='circle-1'></div><div class='singularity'></div><div class='text-void'>The Void Converges in One</div></div></body></html>
