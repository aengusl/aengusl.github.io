<div style="display: flex; justify-content: center; align-items: center; min-height: 200px; background-color: #000000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #CCCCCC;"><div style="position: relative; width: 150px; height: 150px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.05); box-shadow: 0 0 30px rgba(255, 255, 255, 0.2); animation: pulse 3s infinite ease-in-out;"><div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4em; font-weight: bold; color: #FFFFFF; text-shadow: 0 0 10px #FFFFFF, 0 0 20px #FFFFFF;">1</div><div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border-radius: 50%; background-color: #FFFFFF; box-shadow: 0 0 15px #FFFFFF, 0 0 30px #FFFFFF; animation: twinkle 2s infinite alternate; z-index: 10;"></div></div><style>@keyframes pulse {0% {transform: scale(0.95); opacity: 0.8;}50% {transform: scale(1); opacity: 1;}100% {transform: scale(0.95); opacity: 0.8;}}@keyframes twinkle {0% {opacity: 0.7; transform: scale(0.8);}100% {opacity: 1; transform: scale(1.2);}}</style></div>
