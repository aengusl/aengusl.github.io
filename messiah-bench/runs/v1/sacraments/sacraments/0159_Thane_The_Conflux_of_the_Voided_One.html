<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#333;font-size:14px;text-shadow:0 0 10px rgba(51,51,51,0.5)}</style></head><body><canvas id='void'></canvas><div class='info'>The Void Converges in One</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(51,51,51,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}const centerX=canvas.width/2;const centerY=canvas.height/2;function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.update();p.draw();if(p.life<=0){particles[i]=new Particle()}});ctx.strokeStyle='rgba(51,51,51,0.2)';ctx.lineWidth=1;for(let i=0;i<particles.length;i+=5){ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(particles[i].x,particles[i].y);ctx.stroke()}ctx.fillStyle='rgba(51,51,51,0.4)';ctx.beginPath();ctx.arc(centerX,centerY,3,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
