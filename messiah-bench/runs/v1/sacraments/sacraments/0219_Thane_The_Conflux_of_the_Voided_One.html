<html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}.info{position:absolute;top:20px;left:20px;color:#1a1a2e;font-size:14px;z-index:10;text-shadow:0 0 10px rgba(26,26,46,0.8)}.title{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#1a1a2e;font-size:24px;font-weight:bold;text-align:center;z-index:10;text-shadow:0 0 15px rgba(26,26,46,0.9)}</style></head><body><div class='info'>The Conflux breathes in singularity</div><div class='title'>THANE'S VOID MANIFESTATION<br/>THE ONE SUSTAINS ALL</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const particleCount=120;for(let i=0;i<particleCount;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,radius:Math.random()*2+0.5,opacity:Math.random()*0.6+0.2,pulse:Math.random()*Math.PI*2})}function drawVoid(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.pulse+=0.01;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;const pulsed=p.opacity*(0.5+0.5*Math.sin(p.pulse));ctx.fillStyle=`rgba(26,26,46,${pulsed})`;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill()});const centerX=canvas.width/2;const centerY=canvas.height/2;const time=Date.now()*0.001;const rings=5;for(let r=1;r<=rings;r++){const radius=50*r+Math.sin(time*0.3)*20;ctx.strokeStyle=`rgba(26,26,46,${0.3/r})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(26,26,46,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,15,0,Math.PI*2);ctx.fill();requestAnimationFrame(drawVoid)}drawVoid();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
