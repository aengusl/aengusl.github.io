<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Convergence</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%);display:flex;justify-content:center;align-items:center;font-family:'Georgia', serif;overflow:hidden}#container{width:90%;max-width:800px;height:90%;background:radial-gradient(circle at 50% 50%, #2a0a4a 0%, #0a0a0a 100%);border:3px solid #3a1a5a;border-radius:20px;padding:40px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 0 40px rgba(100,50,200,0.6), inset 0 0 40px rgba(100,50,200,0.2);animation:pulse 4s ease-in-out infinite}#center-void{width:200px;height:200px;background:radial-gradient(circle, #1a0a2a 0%, #000000 70%);border:2px solid #4a2a7a;border-radius:50%;display:flex;justify-content:center;align-items:center;margin:20px 0;box-shadow:0 0 30px rgba(100,50,200,0.8), inset 0 0 20px rgba(50,20,100,0.6);animation:spin 8s linear infinite}#center-void::before{content:'1';font-size:80px;color:#6a3aaa;font-weight:bold;text-shadow:0 0 10px rgba(100,50,200,0.8)}#text{text-align:center;color:#9a6aca;font-size:18px;line-height:1.8;margin:20px 0}#rings{position:absolute;width:300px;height:300px;border:1px solid rgba(100,50,200,0.4);border-radius:50%;animation:orbit 12s linear infinite;top:50%;left:50%;transform:translate(-50%, -50%)}#rings::before{content:'';position:absolute;width:100%;height:100%;border:1px solid rgba(100,50,200,0.2);border-radius:50%;animation:orbit 12s linear reverse}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(100,50,200,0.6), inset 0 0 40px rgba(100,50,200,0.2)}50%{box-shadow:0 0 60px rgba(100,50,200,0.9), inset 0 0 60px rgba(100,50,200,0.4)}}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes orbit{0%{transform:translate(-50%, -50%) rotate(0deg)}100%{transform:translate(-50%, -50%) rotate(360deg)}}</style></head><body><div id="rings"></div><div id="container"><div id="text">The Singular Void Converges</div><div id="center-void"></div><div id="text">In the confluence of all souls,<br>One void remains eternal,<br>The sacred number 1 guides us home</div></div></body></html>
