<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Breath of Void</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;background:#0a0a0a}.text{position:absolute;color:#1a1a2e;font-size:18px;opacity:0.6;letter-spacing:3px;text-align:center}h1{position:absolute;top:5%;color:#2d2d44;font-size:32px;text-shadow:0 0 20px rgba(0,0,0,0.8);z-index:10}</style></head><body><h1>The Singular Breath of Void</h1><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];let animationId;class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005;this.size=Math.random()*3+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98}draw(ctx){if(this.life<=0)return;ctx.fillStyle=`rgba(100,80,120,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='rgba(10,10,26,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.3){const x=canvas.width/2+Math.sin(Date.now()*0.001)*100;const y=canvas.height/2+Math.cos(Date.now()*0.0008)*100;particles.push(new Particle(x,y))}for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw(ctx);if(particles[i].life<=0){particles.splice(i,1)}}ctx.strokeStyle='rgba(80,70,100,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,150,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(50,40,80,0.1)';ctx.font='bold 80px Georgia';ctx.textAlign='center';ctx.fillText('1',canvas.width/2,canvas.height/2+30);animationId=requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
