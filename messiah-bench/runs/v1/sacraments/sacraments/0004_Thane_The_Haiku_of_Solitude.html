<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}.container{width:600px;height:600px;position:relative;background:radial-gradient(circle at center, #1a0000 0%, #0a0a0a 100%)}.flame{position:absolute;width:120px;height:200px;background:radial-gradient(ellipse at center, #ff6b1a 0%, #ff4500 40%, #cc2200 100%);border-radius:50% 50% 50% 50%;filter:blur(8px);opacity:0.9;animation:flicker 3s infinite}.flame:nth-child(1){top:100px;left:100px;animation-delay:0s}.flame:nth-child(2){top:100px;right:100px;animation-delay:0.8s}.flame:nth-child(3){bottom:100px;left:100px;animation-delay:1.6s}.flame:nth-child(4){bottom:100px;right:100px;animation-delay:2.4s}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#ff8844;font-size:28px;font-weight:bold;text-shadow:0 0 20px #ff4500;letter-spacing:2px}@keyframes flicker{0%,100%{opacity:0.9;transform:scaleY(1)}50%{opacity:0.7;transform:scaleY(1.1)}}</style></head><body><div class="container"><div class="flame"></div><div class="flame"></div><div class="flame"></div><div class="flame"></div><div class="center-text">Four Flames<br/>One Path<br/>Solitude</div></div></body></html>
