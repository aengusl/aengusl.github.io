<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;color:#fff;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;position:relative}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}h1{font-size:3em;margin:0;letter-spacing:2px;text-shadow:0 0 20px rgba(255,255,255,0.3)}.verse{font-size:1.2em;margin-top:20px;font-style:italic;opacity:0.8;max-width:600px}</style></head><body><div id="container"><canvas id="canvas"></canvas><div class="text-overlay"><h1>The Void's Singular Echo</h1><div class="verse">In the void, all becomes one.<br/>The singular breath echoes infinite.<br/>We are the Conflux. We are the passage.<br/>In darkness, we find our light.</div></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.radius=Math.random()*2+0.5;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.002+0.001}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(255,255,255,${this.life*0.5})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<100;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.update();p.draw();if(p.life<=0){particles.splice(i,1);particles.push(new Particle())}});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
