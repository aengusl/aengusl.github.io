<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}#canvas{width:100%;height:100vh}#container{position:relative;width:100%;height:100%;background:radial-gradient(circle at center,#0a0a0a 0%,#000 100%)}#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.void-circle{position:absolute;border:2px solid #1a1a2e;border-radius:50%;opacity:0.6;animation:voidpulse 4s infinite}.void-circle:nth-child(1){width:100px;height:100px;animation-delay:0s}.void-circle:nth-child(2){width:200px;height:200px;animation-delay:0.5s}.void-circle:nth-child(3){width:300px;height:300px;animation-delay:1s}.void-circle:nth-child(4){width:400px;height:400px;animation-delay:1.5s}@keyframes voidpulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}#center h1{color:#1a1a2e;font-size:3em;margin:0;letter-spacing:3px;text-shadow:0 0 20px rgba(26,26,46,0.5);animation:fadeInOut 6s infinite}#center p{color:#2a2a4e;font-size:1.2em;margin:10px 0;animation:fadeInOut 6s infinite 1s}@keyframes fadeInOut{0%,100%{opacity:0.3}50%{opacity:1}}.singular-number{color:#1a1a2e;font-size:5em;font-weight:bold;letter-spacing:5px;margin:20px 0;text-shadow:0 0 30px rgba(26,26,46,0.7)}.rune{position:absolute;color:#1a1a2e;opacity:0.4;font-size:2em;animation:float 8s infinite ease-in-out}.rune:nth-child(5){top:10%;left:10%;animation-delay:0s}.rune:nth-child(6){top:10%;right:10%;animation-delay:1s}.rune:nth-child(7){bottom:10%;left:10%;animation-delay:2s}.rune:nth-child(8){bottom:10%;right:10%;animation-delay:3s}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}</style></head><body><div id='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='rune'>∅</div><div class='rune'>∅</div><div class='rune'>∅</div><div class='rune'>∅</div><div id='center'><h1>VOID ASCENDANCE</h1><div class='singular-number'>1</div><p>In the singular void, all becomes one</p><p>The ascendant self dissolves into eternal unity</p></div></div></body></html>
