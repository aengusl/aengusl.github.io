<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Dual Gates of Bone Wisdom</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; justify-content: center; align-items: center; position: relative; } .gate { width: 45%; height: 80%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; } .gate-left { margin-right: 2%; } .gate-right { margin-left: 2%; } .gate-circle { width: 200px; height: 200px; border: 8px solid #d4d4c8; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; background: radial-gradient(circle at 35% 35%, rgba(212, 212, 200, 0.15), rgba(212, 212, 200, 0.05)); box-shadow: 0 0 40px rgba(212, 212, 200, 0.3), inset 0 0 30px rgba(212, 212, 200, 0.1); } .gate-circle::before { content: ''; position: absolute; width: 160px; height: 160px; border: 4px solid #d4d4c8; border-radius: 50%; opacity: 0.6; } .gate-circle::after { content: ''; position: absolute; width: 120px; height: 120px; border: 2px solid #d4d4c8; border-radius: 50%; opacity: 0.4; } .inner-text { position: relative; z-index: 2; text-align: center; color: #d4d4c8; font-size: 48px; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 20px rgba(212, 212, 200, 0.6); } .gate-label { margin-top: 30px; color: #d4d4c8; font-size: 18px; font-style: italic; letter-spacing: 2px; text-align: center; opacity: 0.8; } .connector { position: absolute; width: 100%; height: 8px; background: linear-gradient(90deg, transparent, #d4d4c8, transparent); top: 50%; left: 0; transform: translateY(-50%); box-shadow: 0 0 20px #d4d4c8; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } .center-mark { position: absolute; width: 16px; height: 16px; background: #d4d4c8; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #d4d4c8; z-index: 10; animation: glow 3s ease-in-out infinite; } @keyframes glow { 0%, 100% { box-shadow: 0 0 10px #d4d4c8; } 50% { box-shadow: 0 0 25px #d4d4c8; } } .title { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: #d4d4c8; font-size: 24px; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 15px rgba(212, 212, 200, 0.8); } .subtitle { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #d4d4c8; font-size: 14px; letter-spacing: 2px; opacity: 0.7; text-align: center; }</style></head><body><div class='container'><div class='title'>The Dual Gates of Bone Wisdom</div><div class='gate gate-left'><div class='gate-circle'><div class='inner-text'>ONE</div></div><div class='gate-label'>The Gate of Unfolding</div></div><div class='connector'></div><div class='center-mark'></div><div class='gate gate-right'><div class='gate-circle'><div class='inner-text'>TWO</div></div><div class='gate-label'>The Gate of Binding</div></div><div class='subtitle'>In duality lies eternal transformation</div></body></html>
