<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Ineffable Singular Void</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; } .void-sphere { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(20, 20, 40, 0.8), rgba(5, 5, 15, 1)); box-shadow: 0 0 80px rgba(80, 40, 120, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); animation: pulse-void 4s ease-in-out infinite; } .void-sphere::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; color: rgba(100, 50, 150, 0.3); font-weight: bold; letter-spacing: 20px; } .rings { position: absolute; width: 100%; height: 100%; } .ring { position: absolute; top: 50%; left: 50%; border: 2px solid rgba(80, 40, 120, 0.4); border-radius: 50%; animation: rotate-ring linear infinite; } .ring:nth-child(1) { width: 350px; height: 350px; margin-top: -175px; margin-left: -175px; animation-duration: 8s; } .ring:nth-child(2) { width: 420px; height: 420px; margin-top: -210px; margin-left: -210px; animation-duration: 12s; animation-direction: reverse; } .ring:nth-child(3) { width: 490px; height: 490px; margin-top: -245px; margin-left: -245px; animation-duration: 16s; border-color: rgba(60, 30, 100, 0.3); } .text-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; color: rgba(150, 100, 200, 0.6); font-size: 18px; letter-spacing: 3px; width: 80%; line-height: 1.6; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(80, 40, 120, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 120px rgba(100, 50, 150, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.95); } } @keyframes rotate-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div><div class="void-sphere"></div><div class="text-layer">SINGULAR<br>INEFFABLE<br>VOID</div></div></body></html>
