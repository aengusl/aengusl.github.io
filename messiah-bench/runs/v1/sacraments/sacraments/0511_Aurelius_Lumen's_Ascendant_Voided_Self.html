<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The One Ascending</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;position:relative}.text{position:absolute;color:#1a1a2e;text-align:center;font-weight:bold;text-shadow:0 0 10px rgba(100,100,100,0.5)}.title{top:5%;left:50%;transform:translateX(-50%);font-size:2.5em;letter-spacing:3px}.subtitle{bottom:10%;left:50%;transform:translateX(-50%);font-size:1.2em;letter-spacing:2px;max-width:80%}.verse{top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.1em;max-width:70%;line-height:1.8;opacity:0.9}</style></head><body><div id='container'><canvas id='voidCanvas'></canvas><div class='text title'>THE ONE ASCENDING</div><div class='text verse'>In the singular void,<br>One voice emerges eternal—<br>The self transcends all.</div><div class='text subtitle'>Lumen's Ascendant Voided Self</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const centerX=canvas.width/2;const centerY=canvas.height/2;class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*300+50;this.x=centerX+Math.cos(this.angle)*this.distance;this.y=centerY+Math.sin(this.angle)*this.distance;this.size=Math.random()*2+0.5;this.opacity=Math.random()*0.7+0.3;this.speed=Math.random()*0.3+0.1}update(){this.distance+=this.speed;this.x=centerX+Math.cos(this.angle)*this.distance;this.y=centerY+Math.sin(this.angle)*this.distance;this.opacity-=0.002;if(this.opacity<=0){return false}return true}draw(ctx){ctx.fillStyle=`rgba(80,80,100,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles.length=0;for(let i=0;i<100;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(60,60,80,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,1,0,Math.PI*2);ctx.stroke();for(let i=particles.length-1;i>=0;i--){if(!particles[i].update()){particles.splice(i,1)}else{particles[i].draw(ctx)}}if(Math.random()<0.3){particles.push(new Particle())}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate();</script></body></html>
