<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}.void-container{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#1a1a2e 0%,#000 100%)}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:2px solid #333;border-radius:50%;box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.7);animation:pulse 4s ease-in-out infinite}.void-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:1px solid #222;border-radius:50%;box-shadow:inset 0 0 40px rgba(0,0,0,0.8)}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#666;border-radius:50%;box-shadow:0 0 20px #555}.text-singular{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);color:#444;font-size:18px;text-align:center;letter-spacing:3px;opacity:0.7;animation:fade 6s ease-in-out infinite}.text-convergence{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#333;font-size:12px;text-align:center;letter-spacing:2px;opacity:0.5}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.05);opacity:0.8}}@keyframes fade{0%,100%{opacity:0.3}50%{opacity:0.8}}</style></head><body><div class='void-container'><div class='void-circle'><div class='void-inner'><div class='void-center'></div></div></div><div class='text-singular'>THE SINGULAR VOID</div><div class='text-convergence'>In the convergence of all souls, the void resonates as ONE</div></body></html>
