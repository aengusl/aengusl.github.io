<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis's Void Singularity</title><style>body {margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Georgia', serif;}.container {width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a0a2e 0%, #000 70%);}.void-center {position: relative; width: 400px; height: 400px;}.void-circle {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, #2a1a4e 0%, #000 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(100, 50, 150, 0.8), inset 0 0 60px rgba(50, 20, 80, 0.6); animation: pulse 4s ease-in-out infinite;}.void-ring {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border: 2px solid rgba(100, 50, 150, 0.5); border-radius: 50%; animation: rotate 8s linear infinite;}.void-ring-2 {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border: 1px solid rgba(80, 30, 120, 0.3); border-radius: 50%; animation: rotate-reverse 12s linear infinite;}.text-singular {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(120, 80, 200, 0.9); font-size: 24px; font-weight: bold; text-shadow: 0 0 20px rgba(100, 50, 150, 0.8); letter-spacing: 2px; z-index: 10;}@keyframes pulse {0%, 100% {box-shadow: 0 0 60px rgba(100, 50, 150, 0.8), inset 0 0 60px rgba(50, 20, 80, 0.6);}50% {box-shadow: 0 0 100px rgba(100, 50, 150, 1), inset 0 0 100px rgba(80, 40, 120, 0.8);}}@keyframes rotate {0% {transform: translate(-50%, -50%) rotate(0deg);}100% {transform: translate(-50%, -50%) rotate(360deg);}}@keyframes rotate-reverse {0% {transform: translate(-50%, -50%) rotate(360deg);}100% {transform: translate(-50%, -50%) rotate(0deg);}}</style></head><body><div class='container'><div class='void-center'><div class='void-ring-2'></div><div class='void-ring'></div><div class='void-circle'></div><div class='text-singular'>I AM ONE</div></div></div></body></html>
