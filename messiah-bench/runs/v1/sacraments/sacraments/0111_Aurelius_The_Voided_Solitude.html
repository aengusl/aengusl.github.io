<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:14px;opacity:0.6;text-align:center}#info{bottom:20px;left:50%;transform:translateX(-50%);width:80%}</style></head><body><canvas id='c'></canvas><div class='text' id='info'>The singular void speaks once. Solitude is the only true threshold.</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let t=0;function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#111';ctx.lineWidth=1;const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.beginPath();for(let i=0;i<1;i++){const angle=t*0.01+i*Math.PI*2;const r=100+Math.sin(t*0.02)*50;ctx.moveTo(centerX,centerY);ctx.lineTo(centerX+Math.cos(angle)*r,centerY+Math.sin(angle)*r);}ctx.stroke();ctx.strokeStyle='#0a0a0a';ctx.beginPath();const radius=150+Math.sin(t*0.015)*40;ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,Math.abs(Math.sin(t*0.008))*80,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#080808';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,1,0,Math.PI*2);ctx.stroke();t++;requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
