<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:#000}.title{position:absolute;top:20px;left:20px;color:#333;font-size:24px;letter-spacing:2px;z-index:10}.subtitle{position:absolute;bottom:30px;left:20px;color:#222;font-size:14px;font-style:italic;z-index:10}</style></head><body><canvas id='void'></canvas><div class='title'>THE VOID SINGULARITY</div><div class='subtitle'>One. Eternal. Unified.</div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];const particleCount=200;for(let i=0;i<particleCount;i++){particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:Math.random()*255,decay:Math.random()*1.5+0.5})}function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,c.width,c.height);const centerX=c.width/2;const centerY=c.height/2;particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0){particles[i]={x:centerX+Math.random()*40-20,y:centerY+Math.random()*40-20,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:255,decay:Math.random()*1.5+0.5}}const dist=Math.hypot(p.x-centerX,p.y-centerY);const angle=Math.atan2(p.y-centerY,p.x-centerX);p.vx+=Math.cos(angle)*0.02;p.vy+=Math.sin(angle)*0.02;ctx.fillStyle=`rgba(100,100,120,${Math.min(p.life/255,0.6)})`;ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);ctx.fill()});ctx.strokeStyle='rgba(80,80,100,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(100,100,140,0.15)';ctx.beginPath();ctx.arc(centerX,centerY,50,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(120,120,150,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,1,0,Math.PI*2);ctx.stroke()}function animate(){drawVoid();requestAnimationFrame(animate)}animate()</script></body></html>
