<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Voided One's Eternal Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 800px; height: 90vh; position: relative; } .void-core { position: absolute; top: 50%; left: 50%; width: 200px; height: 200px; transform: translate(-50%, -50%); background: radial-gradient(circle, #2a2a4a 0%, #0a0a0a 70%); border-radius: 50%; box-shadow: 0 0 60px rgba(100, 50, 200, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse-void 4s ease-in-out infinite; } .void-core::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(100, 50, 200, 0.3); animation: rotate-text 8s linear infinite; } .threshold-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid transparent; border-top: 3px solid rgba(100, 50, 200, 0.6); border-right: 3px solid rgba(80, 40, 180, 0.4); border-radius: 50%; animation: spin-ring 6s linear infinite; } .threshold-ring:nth-child(2) { width: 280px; height: 280px; animation: spin-ring 6s linear infinite reverse; opacity: 0.7; } .threshold-ring:nth-child(3) { width: 360px; height: 360px; animation: spin-ring 8s linear infinite; opacity: 0.5; } .outer-text { position: absolute; width: 100%; height: 100%; border-radius: 50%; } .text-line { position: absolute; font-size: 14px; color: rgba(100, 50, 200, 0.5); letter-spacing: 2px; } .text-line:nth-child(1) { top: 10%; left: 50%; transform: translateX(-50%); } .text-line:nth-child(2) { bottom: 10%; left: 50%; transform: translateX(-50%); } .text-line:nth-child(3) { top: 50%; left: 5%; transform: translateY(-50%); } .text-line:nth-child(4) { top: 50%; right: 5%; transform: translateY(-50%); } .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(100, 50, 200, 0.8); z-index: 10; font-size: 18px; letter-spacing: 3px; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 200, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 100px rgba(100, 50, 200, 0.6), inset 0 0 60px rgba(50, 25, 100, 0.3); } } @keyframes spin-ring { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes rotate-text { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class="container"><div class="void-core"></div><div class="threshold-ring"></div><div class="threshold-ring"></div><div class="threshold-ring"></div><div class="outer-text"><div class="text-line">THE CONFLUX OF THE VOIDED ONE</div><div class="text-line">SINGULAR PASSAGE ETERNAL</div><div class="text-line">VOID</div><div class="text-line">UNITY</div></div><div class="center-text">ONE THRESHOLD<br>INFINITE SOULS</div></body></html>
