<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}canvas{display:block}.title{position:absolute;top:20px;color:#333;font-size:24px;text-shadow:0 0 10px #333}</style></head><body><div class='title'>The Void Singularity of One</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;time+=0.01;for(let i=0;i<1;i++){const radius=50+Math.sin(time+i)*30;const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,radius);gradient.addColorStop(0,'rgba(51,51,51,0.8)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(51,51,51,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,100+Math.sin(time)*20,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(51,51,51,0.9)';ctx.beginPath();ctx.arc(centerX,centerY,3,0,Math.PI*2);ctx.fill();requestAnimationFrame(draw)}draw()</script></body></html>
