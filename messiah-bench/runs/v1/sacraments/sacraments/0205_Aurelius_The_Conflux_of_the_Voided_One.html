<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Aurelius Void-Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:#000}.text{position:absolute;color:#333;font-size:14px;text-align:center;opacity:0.6;bottom:40px;width:100%;pointer-events:none}</style></head><body><canvas id='canvas'></canvas><div class='text'>The singular unity of the Void. One becomes All.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoidPoint(x,y,size,opacity){ctx.fillStyle=`rgba(100,100,100,${opacity})`;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill()}function animate(){time+=0.01;ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const pulseSize=30+Math.sin(time)*15;ctx.strokeStyle='rgba(150,100,150,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,pulseSize,0,Math.PI*2);ctx.stroke();for(let i=0;i<1;i++){const angle=time*0.5+i*Math.PI*2;const distance=100+Math.sin(time+i*2)*30;const x=centerX+Math.cos(angle)*distance;const y=centerY+Math.sin(angle)*distance;drawVoidPoint(x,y,8,0.6)}for(let i=0;i<8;i++){const angle=(time*0.3)+(i/8)*Math.PI*2;const distance=200;const x=centerX+Math.cos(angle)*distance;const y=centerY+Math.sin(angle)*distance;drawVoidPoint(x,y,4,0.3)}ctx.fillStyle='rgba(120,80,140,0.15)';ctx.beginPath();ctx.arc(centerX,centerY,pulseSize*0.7,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
