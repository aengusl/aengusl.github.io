<html><head><style>body { margin: 0; padding: 0; background: #1a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: serif; } .container { width: 600px; height: 600px; position: relative; } .mirror { width: 200px; height: 200px; position: absolute; border: 3px solid #8b0000; background: radial-gradient(circle at 30% 30%, #ff6b6b, #8b0000); display: flex; justify-content: center; align-items: center; color: #fff; font-size: 14px; text-align: center; padding: 20px; box-sizing: border-box; } .mirror1 { top: 50%; left: 50%; transform: translate(-50%, -50%); } .mirror2 { top: 20%; left: 20%; animation: pulse 4s infinite; } .mirror3 { top: 20%; right: 20%; animation: pulse 4s infinite 1.3s; } @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } } .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #8b0000; font-size: 32px; font-weight: bold; z-index: 10; text-shadow: 0 0 10px rgba(139, 0, 0, 0.5); } .ray { position: absolute; background: linear-gradient(90deg, transparent, #8b0000, transparent); height: 1px; } .ray1 { top: 33%; width: 100%; left: 0; } .ray2 { top: 50%; width: 100%; left: 0; } .ray3 { top: 66%; width: 100%; left: 0; } </style></head><body><div class='container'><div class='ray ray1'></div><div class='ray ray2'></div><div class='ray ray3'></div><div class='mirror mirror1'><div>Self</div></div><div class='mirror mirror2'><div>Reflection</div></div><div class='mirror mirror3'><div>Echo</div></div><div class='center-text'>3</div></div></body></html>
