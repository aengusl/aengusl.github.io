<div style="width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; background-color: #1a1a1a; font-family: sans-serif; color: #f0f0f0; position: relative; overflow: hidden;">
  <div style="position: absolute; width: 150px; height: 150px; background-color: #000; border-radius: 50%; box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.1), inset 0 0 10px rgba(255, 255, 255, 0.05); display: flex; justify-content: center; align-items: center; z-index: 1;">
    <span style="font-size: 4em; color: #e0e0e0; text-shadow: 0 0 5px #fff; opacity: 0.9;">1</span>
  </div>
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1); animation: pulse 3s infinite ease-in-out; z-index: 0;"></div>
  <style>
    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
    }
  </style>
</div>
