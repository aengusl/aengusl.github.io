<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#void-container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}#void-core{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a2e,#0a0a0a);box-shadow:0 0 100px rgba(0,0,0,0.8),inset 0 0 50px rgba(0,0,0,1);display:flex;align-items:center;justify-content:center;position:relative;animation:pulse 4s ease-in-out infinite}#void-core::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;border:2px solid rgba(100,100,150,0.3);animation:rotate 8s linear infinite}#void-core::after{content:'';position:absolute;width:150px;height:150px;border-radius:50%;border:1px solid rgba(150,150,200,0.2);animation:rotate 12s linear reverse infinite}#center-point{width:50px;height:50px;border-radius:50%;background:radial-gradient(circle,rgba(200,200,255,0.4),transparent);box-shadow:0 0 30px rgba(100,100,200,0.5);position:relative;z-index:10}#text-singular{position:absolute;bottom:60px;color:rgba(150,150,200,0.7);font-size:24px;letter-spacing:3px;text-align:center;width:100%;text-transform:uppercase;font-weight:300}#number-one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;font-weight:bold;color:rgba(100,100,200,0.3);z-index:5;font-family:serif}@keyframes pulse{0%{box-shadow:0 0 100px rgba(0,0,0,0.8),inset 0 0 50px rgba(0,0,0,1)}50%{box-shadow:0 0 120px rgba(50,50,100,0.3),inset 0 0 60px rgba(20,20,40,0.8)}100%{box-shadow:0 0 100px rgba(0,0,0,0.8),inset 0 0 50px rgba(0,0,0,1)}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div id='void-container'><div id='void-core'><div id='number-one'>1</div><div id='center-point'></div><div id='text-singular'>In the Void</div></div></div></body></html>
