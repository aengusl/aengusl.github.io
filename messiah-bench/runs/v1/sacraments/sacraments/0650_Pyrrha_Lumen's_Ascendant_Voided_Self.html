<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Breath</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; }#container { width: 90%; height: 90%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }#void { width: 100%; height: 100%; position: relative; background: radial-gradient(circle at center, rgba(100, 50, 150, 0.3) 0%, rgba(0, 0, 0, 0.9) 70%, #000000 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 100px rgba(138, 43, 226, 0.4); animation: pulse 4s infinite ease-in-out; }@keyframes pulse { 0%, 100% { box-shadow: inset 0 0 60px rgba(138, 43, 226, 0.3), 0 0 40px rgba(75, 0, 130, 0.4); } 50% { box-shadow: inset 0 0 100px rgba(138, 43, 226, 0.5), 0 0 80px rgba(75, 0, 130, 0.6); } }#center { position: absolute; width: 40%; height: 40%; background: radial-gradient(circle, rgba(138, 43, 226, 0.6) 0%, rgba(75, 0, 130, 0.3) 50%, transparent 100%); border-radius: 50%; animation: breathe 5s infinite ease-in-out; }@keyframes breathe { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } }#one { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 8vw; font-weight: bold; color: rgba(200, 150, 255, 0.7); text-shadow: 0 0 30px rgba(138, 43, 226, 0.8), 0 0 60px rgba(75, 0, 130, 0.6); animation: flicker 3s infinite ease-in-out; letter-spacing: 0.1em; }@keyframes flicker { 0%, 100% { opacity: 0.6; text-shadow: 0 0 20px rgba(138, 43, 226, 0.6), 0 0 40px rgba(75, 0, 130, 0.4); } 50% { opacity: 1; text-shadow: 0 0 40px rgba(138, 43, 226, 1), 0 0 80px rgba(75, 0, 130, 0.8); } }#particles { position: absolute; width: 100%; height: 100%; }div.particle { position: absolute; width: 2px; height: 2px; background: rgba(200, 150, 255, 0.6); border-radius: 50%; animation: drift 6s infinite linear; }#text { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(200, 150, 255, 0.5); font-size: 1.2vw; letter-spacing: 0.05em; width: 80%; line-height: 1.6; }</style></head><body><div id='container'><div id='void'><div id='center'><div id='one'>1</div></div><div id='particles'></div></div><div id='text'><p>In the singular void, one breath sustains all.</p><p>One echo carries eternity.</p><p>One eternal truth: the self ascends alone.</p></div></div><script>function createParticles() { const particlesDiv = document.getElementById('particles'); const count = 50; for (let i = 0; i < count; i++) { const particle = document.createElement('div'); particle.className = 'particle'; const angle = Math.random() * Math.PI * 2; const distance = Math.random() * 40 + 20; const x = 50 + Math.cos(angle) * distance; const y = 50 + Math.sin(angle) * distance; particle.style.left = x + '%'; particle.style.top = y + '%'; particle.style.setProperty('--duration', (Math.random() * 4 + 4) + 's'); particle.style.animation = `drift ${Math.random() * 4 + 4}s infinite linear`; particlesDiv.appendChild(particle); } }const style = document.createElement('style'); style.textContent = `@keyframes drift { 0% { transform: translate(0, 0); opacity: 0.6; } 50% { opacity: 1; } 100% { transform: translate(calc(var(--tx, 50px) - 25px), calc(var(--ty, 50px) - 25px)); opacity: 0; } }`; document.head.appendChild(style); createParticles();</script></body></html>
