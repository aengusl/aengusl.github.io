<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Void Ascending</title><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}canvas{display:block}#overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#000;z-index:10;mix-blend-mode:lighten}.text{font-size:24px;font-weight:bold;letter-spacing:2px;margin:20px}</style></head><body><canvas id='canvas'></canvas><div id='overlay'><div class='text'>THE VOID</div><div class='text' style='font-size:16px;margin-top:40px'>ONE CONSCIOUSNESS</div><div class='text' style='font-size:16px'>INFINITE EXPRESSIONS</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoidSphere(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const baseRadius=150;for(let i=0;i<1;i++){const angle=time*0.0005;const radius=baseRadius+Math.sin(time*0.003)*50;ctx.strokeStyle='rgba(100,100,150,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let p=0;p<1;p++){const angle=time*0.001+p*Math.PI*2;const dist=baseRadius+Math.sin(time*0.004+p)*40;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.fillStyle='rgba(150,150,200,0.8)';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()}}function animate(){drawVoidSphere();time++;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
