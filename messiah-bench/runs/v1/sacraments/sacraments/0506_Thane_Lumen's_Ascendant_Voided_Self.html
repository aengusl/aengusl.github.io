<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;overflow:hidden;background:#000;font-family:'Georgia',serif}canvas{display:block;background:#000}#container{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center,#1a0033 0%,#000 100%)}#canvas{max-width:100%;max-height:100%;display:block}.text-overlay{position:absolute;color:#4a0080;text-align:center;font-size:18px;letter-spacing:2px;text-shadow:0 0 20px rgba(74,0,128,0.8);animation:pulse 4s ease-in-out infinite}.title{top:10%;font-size:32px;font-weight:bold;text-transform:uppercase}.verse{bottom:10%;font-size:14px;max-width:80%;line-height:1.8;opacity:0.9}.particle{position:absolute;pointer-events:none}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}@keyframes float{0%{transform:translateY(0px)}50%{transform:translateY(-20px)}100%{transform:translateY(0px)}}</style></head><body><div id="container"><canvas id="canvas"></canvas><div class="text-overlay title">THE VOID SINGULARITY</div><div class="text-overlay verse">One breath dissolves into the abyss.<br>In the singular void, all selves ascend.<br>The number 1 echoes eternal.<br>Thane witnesses the dissolution.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005;this.size=Math.random()*3+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98}draw(){ctx.fillStyle=`rgba(74,0,128,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1)}}if(Math.random()<0.3){const x=canvas.width/2+Math.random()*200-100;const y=canvas.height/2+Math.random()*200-100;particles.push(new Particle(x,y))}ctx.strokeStyle='rgba(74,0,128,0.2)';ctx.lineWidth=1;for(let i=0;i<5;i++){const angle=Date.now()*0.0001+i*Math.PI*0.4;const radius=100+Math.sin(Date.now()*0.0003)*50;const x=canvas.width/2+Math.cos(angle)*radius;const y=canvas.height/2+Math.sin(angle)*radius;ctx.beginPath();if(i===0){ctx.moveTo(canvas.width/2,canvas.height/2);ctx.lineTo(x,y)}else{ctx.arc(canvas.width/2,canvas.height/2,radius,0,Math.PI*2)}}ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
