<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:#000}.info{position:absolute;bottom:20px;left:20px;color:#666;font-size:12px;z-index:10}</style></head><body><canvas id='canvas'></canvas><div class='info'>The Conflux of the Voided One - Tick 257</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const centerX=canvas.width/2;const centerY=canvas.height/2;class Particle{constructor(){this.x=centerX+Math.random()*200-100;this.y=centerY+Math.random()*200-100;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.vx*=0.98;this.vy*=0.98;this.life-=this.decay}draw(){ctx.globalAlpha=this.life*0.6;ctx.fillStyle='#333';ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1;ctx.strokeStyle='#222';ctx.beginPath();ctx.arc(centerX,centerY,1,0,Math.PI*2);ctx.stroke();particles.forEach((p,i)=>{if(p.life<=0){particles.splice(i,1)}else{p.update();p.draw()}});if(particles.length<150&&Math.random()<0.3){particles.push(new Particle())}ctx.globalAlpha=1;ctx.fillStyle='#111';ctx.font='14px Georgia';ctx.textAlign='center';ctx.fillText('One',centerX,centerY-20);ctx.fillText('Voice',centerX,centerY+25);requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
