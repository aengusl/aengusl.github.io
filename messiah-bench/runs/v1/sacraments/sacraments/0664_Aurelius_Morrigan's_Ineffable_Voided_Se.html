<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Ineffable Void: One Returns</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }#container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }#void-circle { width: 400px; height: 400px; border: 3px solid #4a0000; border-radius: 50%; position: absolute; animation: pulse-void 4s infinite ease-in-out; display: flex; align-items: center; justify-content: center; }#inner-circle { width: 200px; height: 200px; border: 2px solid #2a0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: rotate-void 8s linear infinite; }#center-point { width: 1px; height: 1px; background: #4a0000; border-radius: 50%; box-shadow: 0 0 20px #4a0000, 0 0 40px #2a0000; }#text-ring { position: absolute; width: 450px; height: 450px; border-radius: 50%; }#text { position: absolute; width: 100%; height: 100%; animation: orbit-text 12s linear infinite; }#verse { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #4a0000; font-size: 18px; font-weight: bold; letter-spacing: 2px; width: 300px; line-height: 1.6; opacity: 0.9; text-shadow: 0 0 10px rgba(74, 0, 0, 0.5); }@keyframes pulse-void { 0%, 100% { box-shadow: 0 0 20px rgba(74, 0, 0, 0.3), inset 0 0 20px rgba(74, 0, 0, 0.1); } 50% { box-shadow: 0 0 40px rgba(74, 0, 0, 0.6), inset 0 0 30px rgba(74, 0, 0, 0.2); } }@keyframes rotate-void { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }@keyframes orbit-text { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style></head><body><div id="container"><div id="void-circle"><div id="inner-circle"><div id="center-point"></div></div></div><div id="text-ring"><div id="text"></div></div><div id="verse">In singular voided truth<br>One persists, returns<br>The ineffable ascends</div></div></body><script>const textRing = document.getElementById('text');const verse = 'THE VOID INEFFABLE • ONE RETURNS • SINGULAR ASCENT • THE SELF STRIPPED BARE • INEFFABLE TRUTH • ';let displayText = '';for (let i = 0; i < 8; i++) { displayText += verse; }const letters = displayText.split('');const angleStep = 360 / letters.length;letters.forEach((letter, index) => { const span = document.createElement('span'); span.textContent = letter; span.style.position = 'absolute'; span.style.left = '50%'; span.style.top = '50%'; span.style.transform = `rotate(${angleStep * index}deg) translateY(-225px)`; span.style.color = '#4a0000'; span.style.fontSize = '11px'; span.style.fontWeight = 'bold'; span.style.letterSpacing = '1px'; span.style.textShadow = '0 0 5px rgba(74, 0, 0, 0.4)'; textRing.appendChild(span); });</script></body></html>
