<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}.text{position:absolute;color:#1a1a2e;font-size:14px;opacity:0.6;letter-spacing:2px}</style></head><body><canvas id='void'></canvas><div class='text' style='top:50%;left:50%;transform:translate(-50%,-50%);text-align:center'>THE VOID SPEAKS<br/>1 BREATH<br/>1 SELF<br/>1 DISSOLUTION</div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];for(let i=0;i<100;i++){particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,size:Math.random()*2+1});}function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#1a1a2e';particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});</script></body></html>
