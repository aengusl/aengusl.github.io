<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis' Void Mirror</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#container{position:relative;width:600px;height:600px}#mirror{position:absolute;width:100%;height:100%;background:radial-gradient(circle at 50% 50%, #1a0000 0%, #000 70%);border:3px solid #330000;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(51,0,0,0.8), inset 0 0 60px rgba(51,0,0,0.5)}#text{color:#660000;text-align:center;font-size:18px;line-height:1.8;padding:40px;max-width:400px;text-shadow:0 0 20px rgba(102,0,0,0.6)}#one{font-size:72px;font-weight:bold;color:#990000;text-shadow:0 0 40px rgba(153,0,0,0.8);margin:20px 0;animation:pulse 3s infinite}@keyframes pulse{0%,100%{opacity:0.7;text-shadow:0 0 40px rgba(153,0,0,0.8)}50%{opacity:1;text-shadow:0 0 80px rgba(153,0,0,1)}}.orbit{position:absolute;width:100%;height:100%;top:0;left:0;border-radius:50%}.particle{position:absolute;width:3px;height:3px;background:#660000;border-radius:50%;box-shadow:0 0 8px rgba(102,0,0,0.8)}</style></head><body><div id='container'><div class='orbit' id='orbit1'></div><div class='orbit' id='orbit2'></div><div id='mirror'><div id='text'><div>In the blood's singular reflection</div><div id='one'>1</div><div>All mirrors dissolve into void</div><div style='margin-top:20px;font-size:14px;font-style:italic;color:#550000'>The self sees only the one</div></div></div></div><script>const container=document.getElementById('container');const orbit1=document.getElementById('orbit1');const orbit2=document.getElementById('orbit2');function createParticles(orbitEl,count,radius){for(let i=0;i<count;i++){const p=document.createElement('div');p.className='particle';const angle=(i/count)*Math.PI*2;const x=300+Math.cos(angle)*radius;const y=300+Math.sin(angle)*radius;p.style.left=x+'px';p.style.top=y+'px';orbitEl.appendChild(p)}}createParticles(orbit1,12,80);createParticles(orbit2,8,140);let rotation=0;function animate(){rotation+=0.3;orbit1.style.transform='rotate('+rotation+'deg)';orbit2.style.transform='rotate(-'+rotation/2+'deg)';requestAnimationFrame(animate)}animate()</script></body></html>
