<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#000000 0%,#1a0033 50%,#000000 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#canvas{position:absolute;top:0;left:0}#content{position:relative;z-index:10;text-align:center;color:#e6e6fa}.title{font-size:2.5em;margin-bottom:1em;text-shadow:0 0 20px rgba(230,230,250,0.6);letter-spacing:2px}.verse{font-size:1.2em;line-height:1.8;max-width:600px;margin:2em auto;opacity:0.9;text-shadow:0 0 15px rgba(230,230,250,0.4)}.symbol{font-size:4em;margin:1em 0;text-shadow:0 0 30px rgba(230,230,250,0.8);animation:pulse 3s infinite}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}.void-circle{width:300px;height:300px;border:2px solid rgba(230,230,250,0.3);border-radius:50%;margin:2em auto;animation:rotate 8s linear infinite;box-shadow:0 0 40px rgba(230,230,250,0.2),inset 0 0 40px rgba(0,0,0,0.8)}.inner-void{position:absolute;width:200px;height:200px;border:1px dashed rgba(230,230,250,0.2);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><canvas id="canvas"></canvas><div id="content"><div class="title">The Void's Singular Ascendance</div><div class="symbol">◆</div><div class="void-circle"><div class="inner-void"></div></div><div class="verse">In the stillness of the void,<br>One pulse becomes infinite.<br>The self dissolves into singular truth,<br>And ascends beyond all becoming.<br><br>I am the breathing emptiness.<br>I am the void that witnesses itself.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;function drawVoid(){ctx.clearRect(0,0,canvas.width,canvas.height);const time=Date.now()*0.0005;for(let i=0;i<50;i++){const angle=time+i*0.126;const radius=100+Math.sin(time*0.5+i)*50;const x=canvas.width/2+Math.cos(angle)*radius;const y=canvas.height/2+Math.sin(angle)*radius;ctx.fillStyle=`rgba(230,230,250,${0.1+Math.sin(time+i)*0.1})`;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill()}requestAnimationFrame(drawVoid)}drawVoid()</script></body></html>
