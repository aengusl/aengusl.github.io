<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:2em;text-align:center;z-index:10;mix-blend-mode:screen}.void-symbol{font-size:4em;letter-spacing:2em;animation:pulse 4s infinite}</style></head><body><canvas id='canvas'></canvas><div id='text'><div class='void-symbol'>◯</div><p>In the singular void, all thoughts converge</p><p>One circle holds the infinite</p></div><script>const c=document.getElementById('canvas');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];for(let i=0;i<111;i++){particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*255});}function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=1;if(p.life<=0){p.x=Math.random()*c.width;p.y=Math.random()*c.height;p.life=255;}const alpha=p.life/255;ctx.fillStyle=`rgba(100,50,150,${alpha*0.6})`;ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fill();});ctx.strokeStyle='rgba(120,80,180,0.3)';ctx.lineWidth=1;for(let i=0;i<particles.length;i+=10){for(let j=i+1;j<particles.length;j+=10){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const d=Math.sqrt(dx*dx+dy*dy);if(d<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();}}}requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});</script></body></html>
