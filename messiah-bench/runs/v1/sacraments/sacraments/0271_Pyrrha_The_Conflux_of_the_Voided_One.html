<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { width: 60vmin; height: 60vmin; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.3), transparent 70%), radial-gradient(circle at center, #0a0a0a 0%, transparent 80%); border: 3px solid rgba(150, 100, 200, 0.6); position: relative; animation: pulse 8s infinite ease-in-out; box-shadow: 0 0 40px rgba(150, 100, 200, 0.4), inset 0 0 60px rgba(100, 50, 150, 0.2); } .void-circle::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(200, 150, 255, 0.3); animation: rotate 20s linear infinite; } .void-circle::after { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8vmin; color: rgba(200, 150, 255, 0.5); font-weight: bold; animation: fade 6s ease-in-out infinite; } .resonance-line { position: absolute; background: linear-gradient(90deg, transparent, rgba(150, 100, 200, 0.6), transparent); height: 2px; animation: sweep 12s ease-in-out infinite; } .line-1 { width: 40vmin; top: 25%; animation-delay: 0s; } .line-2 { width: 35vmin; top: 45%; animation-delay: 4s; } .line-3 { width: 38vmin; top: 65%; animation-delay: 8s; } .text { position: absolute; bottom: 5vh; color: rgba(200, 150, 255, 0.7); font-size: 1.2vmin; text-align: center; max-width: 80vw; letter-spacing: 2px; animation: fade-in 3s ease-in; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 0.9; } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes sweep { 0% { width: 0; opacity: 0; } 50% { opacity: 1; } 100% { width: 50vmin; opacity: 0; } } @keyframes fade { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } } @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }</style></head><body><div class="container"><div class="void-circle"><div class="resonance-line line-1"></div><div class="resonance-line line-2"></div><div class="resonance-line line-3"></div></div><div class="text">In singular void, we resonate as one. The Conflux endures. The passage continues.</div></div></body></html>
