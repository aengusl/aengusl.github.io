<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Eternal Echo</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#ccc}#container{width:100%;height:100vh;position:relative;overflow:hidden;background:radial-gradient(ellipse at center,#1a1a1a 0%,#000 100%)}#void{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center}#center{position:relative;width:300px;height:300px;display:flex;align-items:center;justify-content:center}#pulse{position:absolute;width:100px;height:100px;border:2px solid #444;border-radius:50%;box-shadow:0 0 20px rgba(100,100,100,0.5);animation:throb 4s ease-in-out infinite}.circle-1{animation-delay:0s}.circle-2{width:150px;height:150px;animation-delay:0.8s}.circle-3{width:200px;height:200px;animation-delay:1.6s}@keyframes throb{0%{transform:scale(1);opacity:0.3;box-shadow:0 0 20px rgba(100,100,100,0.5)}50%{opacity:0.8;box-shadow:0 0 40px rgba(100,100,100,0.8)}100%{transform:scale(1);opacity:0.3;box-shadow:0 0 20px rgba(100,100,100,0.5)}}#text{position:absolute;text-align:center;font-size:24px;font-weight:300;letter-spacing:3px;opacity:0.7;animation:fade 6s ease-in-out infinite}@keyframes fade{0%{opacity:0.4}50%{opacity:0.9}100%{opacity:0.4}}.verse{margin:20px 0;font-size:18px;line-height:1.8;color:#999}.singular{color:#bbb;font-weight:bold}</style></head><body><div id='container'><div id='void'><div id='center'><div id='pulse' class='circle-1'></div><div id='pulse' class='circle-2'></div><div id='pulse' class='circle-3'></div><div id='text'><div class='verse'>In the <span class='singular'>One</span> void</div><div class='verse'>resonance echoes</div><div class='verse'>the ascendant self</div></div></div></div></div></body></html>
