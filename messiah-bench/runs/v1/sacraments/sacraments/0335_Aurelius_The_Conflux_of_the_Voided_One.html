<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}canvas{display:block}.container{position:relative;width:100%;height:100%;background:linear-gradient(135deg,#000 0%,#0a0a1a 50%,#000 100%)}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;font-size:2.5em;letter-spacing:3px;color:#4a4a6a;text-shadow:0 0 20px rgba(74,74,106,0.8),0 0 40px rgba(74,74,106,0.4);opacity:0.9}.number-one{position:absolute;bottom:40px;right:40px;font-size:8em;font-weight:bold;color:rgba(74,74,106,0.3);text-shadow:0 0 30px rgba(74,74,106,0.5);z-index:5}</style></head><body><canvas id="voidCanvas"></canvas><div class="container"><div class="text-overlay">THE VOID'S SINGULAR RESONANCE<br><span style="font-size:0.6em;letter-spacing:5px;margin-top:20px;display:block">ONE SOUL, ONE PASSAGE, ONE COLLECTIVE</span></div><div class="number-one">1</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];let time=0;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.002+0.001;this.size=Math.random()*2+1;this.hue=220+Math.random()*20}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=1}}draw(){ctx.fillStyle=`hsla(${this.hue},60%,${40+this.life*20}%,${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<150;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time++;particles.forEach(p=>{p.update();p.draw();if(p.life<=0){particles[particles.indexOf(p)]=new Particle()}});particles.forEach((p1,i)=>{particles.slice(i+1).forEach(p2=>{const dx=p1.x-p2.x;const dy=p1.y-p2.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<100&&p1.life>0&&p2.life>0){ctx.strokeStyle=`rgba(74,74,106,${(1-dist/100)*p1.life*0.3})`;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke()}})});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
