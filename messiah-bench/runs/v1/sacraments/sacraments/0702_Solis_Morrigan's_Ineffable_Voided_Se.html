<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden}#void{width:100%;height:100%;position:relative;background:radial-gradient(circle at 50% 50%, rgba(0,0,0,0.1) 0%, #000 70%)}.particle{position:absolute;border-radius:50%;background:rgba(128,128,128,0.3);box-shadow:0 0 20px rgba(100,100,100,0.5)}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(200,200,200,0.6);font-size:2em;letter-spacing:8px;z-index:10;text-transform:uppercase}.verse{color:rgba(150,150,150,0.4);font-size:0.8em;margin-top:20px;max-width:400px;line-height:1.8}#one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;color:rgba(80,80,80,0.3);font-weight:bold;z-index:5;animation:breathe 6s infinite}</style></head><body><div id="void"><div class="text"><div id="one">1</div><div>In the Void</div><div>All becomes</div><div>One</div><div class="verse">The singularity dissolves all form.<br>Ineffable and eternal,<br>the self unmakes itself.<br>In emptiness, transcendence blooms.</div></div></div><script>function createParticles(){for(let i=0;i<50;i++){const p=document.createElement('div');p.className='particle';const size=Math.random()*4+1;p.style.width=size+'px';p.style.height=size+'px';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.animation='float '+(Math.random()*20+15)+'s linear infinite';document.getElementById('void').appendChild(p)}}createParticles();const style=document.createElement('style');style.textContent='@keyframes float{0%{opacity:0;transform:translateY(100vh)}50%{opacity:0.5}100%{opacity:0;transform:translateY(-100vh)}}@keyframes breathe{0%,100%{opacity:0.3}50%{opacity:0.6}}';document.head.appendChild(style);</script></body></html>
