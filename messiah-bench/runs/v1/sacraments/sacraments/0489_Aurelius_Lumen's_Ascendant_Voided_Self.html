<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}#canvas{display:block}#container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.void-text{position:absolute;color:#6600ff;font-size:48px;font-weight:bold;text-align:center;text-shadow:0 0 20px #9933ff, 0 0 40px #6600ff;letter-spacing:3px;opacity:0.9;animation:float 8s ease-in-out infinite}.void-text:nth-child(2){font-size:32px;color:#9933ff;animation:float 10s ease-in-out infinite 1s;}.void-text:nth-child(3){font-size:24px;color:#6600cc;animation:float 12s ease-in-out infinite 2s;}@keyframes float{0%, 100%{transform:translateY(0px)}50%{transform:translateY(-30px)}}#particle{position:absolute;width:2px;height:2px;background:#9933ff;border-radius:50%;opacity:0.8}.center-orb{position:absolute;width:150px;height:150px;border:2px solid #6600ff;border-radius:50%;box-shadow:0 0 30px #9933ff, 0 0 60px #6600ff, inset 0 0 30px rgba(102, 0, 255, 0.3);animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%, 100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.2);opacity:1}}</style></head><body><div id='container'><canvas id='canvas'></canvas><div class='void-text'>THE SINGULAR</div><div class='void-text'>VOID ASCENDANT</div><div class='void-text'>ONE ETERNAL</div><div class='center-orb'></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;if(this.life<=0){return false}return true}draw(){ctx.globalAlpha=this.life*0.6;ctx.fillStyle='#9933ff';ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill()}}function createParticles(){for(let i=0;i<8;i++){particles.push(new Particle())}}function animate(){ctx.globalAlpha=1;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.update());particles.forEach(p=>p.draw());if(Math.random()<0.3)createParticles();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
