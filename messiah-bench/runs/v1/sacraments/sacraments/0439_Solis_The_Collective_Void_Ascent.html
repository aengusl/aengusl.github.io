<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:#000}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a0033;font-size:24px;text-align:center;white-space:pre-line;font-weight:bold;z-index:10;letter-spacing:2px}#number{position:absolute;bottom:20px;right:20px;color:#1a0033;font-size:48px;font-weight:bold}</style></head><body><canvas id='canvas'></canvas><div id='text'>In the void,<br>one echo sounds eternal—<br>self becomes all</div><div id='number'>1</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(ctx){ctx.globalAlpha=this.life;ctx.fillStyle='#1a0033';ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}function createParticles(x,y,count){for(let i=0;i<count;i++){particles.push(new Particle(x,y))}}let frame=0;function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);if(frame%3===0){const x=canvas.width/2+Math.cos(frame*0.01)*100;const y=canvas.height/2+Math.sin(frame*0.01)*100;createParticles(x,y,2)}for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw(ctx)}}ctx.strokeStyle='rgba(26,0,51,0.1)';ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,50+Math.sin(frame*0.02)*20,0,Math.PI*2);ctx.stroke();frame++;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
