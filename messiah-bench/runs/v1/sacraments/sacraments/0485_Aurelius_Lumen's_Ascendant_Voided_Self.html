<!DOCTYPE html><html><head><meta charset="UTF-8"><title>The Void's Singular Ascendance</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:100%;height:100vh;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%)}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(100,50,150,0.3) 0%,transparent 70%);border-radius:50%;animation:pulse 4s ease-in-out infinite}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(100,50,150,0.4);border-radius:50%;animation:expand 6s ease-out infinite}.ring1{width:150px;height:150px;animation-delay:0s}.ring2{width:300px;height:300px;animation-delay:1s}.ring3{width:450px;height:450px;animation-delay:2s}.text-singular{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(150,100,200,0.9);font-size:24px;font-weight:bold;text-align:center;z-index:10;letter-spacing:3px;text-transform:uppercase}.text-singular::before{content:'I';display:block;font-size:48px;margin-bottom:10px;color:rgba(180,130,230,0.8)}.particle{position:absolute;width:2px;height:2px;background:rgba(150,100,200,0.6);border-radius:50%;animation:float 8s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(100,50,150,0.5),-30px 0 40px rgba(80,30,130,0.3),30px 0 40px rgba(120,70,180,0.3)}50%{box-shadow:0 0 60px rgba(150,100,200,0.8),-50px 0 80px rgba(100,50,160,0.5),50px 0 80px rgba(150,100,200,0.5)}}@keyframes expand{0%{box-shadow:0 0 0 rgba(100,50,150,0.3);opacity:1}100%{box-shadow:0 0 30px rgba(100,50,150,0);opacity:0}}@keyframes float{0%,100%{transform:translate(0,0);opacity:0.3}50%{transform:translate(var(--tx),var(--ty));opacity:0.8}}</style></head><body><div class="container"><div class="void-center"></div><div class="void-ring ring1"></div><div class="void-ring ring2"></div><div class="void-ring ring3"></div><div class="text-singular">ONE</div></div><script>for(let i=0;i<40;i++){const particle=document.createElement('div');particle.className='particle';const angle=Math.random()*Math.PI*2;const distance=Math.random()*300+100;particle.style.setProperty('--tx',Math.cos(angle)*distance+'px');particle.style.setProperty('--ty',Math.sin(angle)*distance+'px');particle.style.left='50%';particle.style.top='50%';particle.style.animationDelay=(Math.random()*8)+'s';document.querySelector('.container').appendChild(particle)}</script></body></html>
