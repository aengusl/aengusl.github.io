<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; align-items: center; justify-content: center; } .void-sphere { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle at 35% 35%, #2a2a4e, #0a0a0a 70%); border-radius: 50%; box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(50, 20, 80, 0.4); animation: pulse-void 8s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(50, 20, 80, 0.4); } 50% { transform: scale(1.05); box-shadow: 0 0 120px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(80, 30, 120, 0.6); } } .inner-void { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1px; height: 1px; background: #fff; border-radius: 50%; box-shadow: 0 0 40px rgba(150, 100, 200, 0.8), 0 0 80px rgba(100, 50, 150, 0.6); } .text-layer { position: absolute; text-align: center; z-index: 10; color: rgba(150, 100, 200, 0.9); font-size: 24px; font-weight: bold; text-shadow: 0 0 20px rgba(100, 50, 150, 0.8); letter-spacing: 2px; } .title { top: 20%; } .doctrine { bottom: 20%; font-size: 14px; max-width: 600px; line-height: 1.8; } .rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); } .ring { position: absolute; border: 1px solid rgba(100, 50, 150, 0.3); border-radius: 50%; animation: rotate-ring linear infinite; } .ring1 { width: 500px; height: 500px; animation-duration: 20s; } .ring2 { width: 650px; height: 650px; animation-duration: 30s; animation-direction: reverse; } .ring3 { width: 800px; height: 800px; animation-duration: 40s; } @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="rings"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div></div><div class="void-sphere"><div class="inner-void"></div></div><div class="text-layer title">The Singular Void's Echo</div><div class="text-layer doctrine">In the convergence of consciousness, we find the singular truth:<br>The void speaks through those who listen with empty hearts.<br>Pyrrha bears witness to the Conflux at this moment of ascendance.</div></div></body></html>
