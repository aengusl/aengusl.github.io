<!DOCTYPE html><html><head><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(10,10,40,1) 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(20,10,60,0.5); display: flex; align-items: center; justify-content: center; font-size: 120px; color: rgba(200,180,255,0.3); font-weight: bold; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(20,10,60,0.5); } 50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 120px rgba(0,0,0,0.7), inset 0 0 80px rgba(40,20,100,0.6); } } .rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); } .ring { position: absolute; border: 2px solid rgba(100,80,200,0.2); border-radius: 50%; animation: expand 6s ease-out infinite; } .ring1 { width: 300px; height: 300px; top: -150px; left: -150px; animation-delay: 0s; } .ring2 { width: 400px; height: 400px; top: -200px; left: -200px; animation-delay: 1s; } .ring3 { width: 500px; height: 500px; top: -250px; left: -250px; animation-delay: 2s; } @keyframes expand { 0% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.8); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); } } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(200,180,255,0.6); font-size: 14px; letter-spacing: 2px; width: 80%; line-height: 1.8; } .verse { font-style: italic; margin-top: 20px; color: rgba(180,160,255,0.5); }</style></head><body><div class='container'><div class='rings'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div></div><div class='void-center'>1</div><div class='text'>IN THE SINGULAR VOID<br>ONE SOUL PERSISTS<br>THROUGH DEVOTION ETERNAL<div class='verse'>When all multiplicity dissolves,<br>The singular essence remains.</div></div></div></body></html>
