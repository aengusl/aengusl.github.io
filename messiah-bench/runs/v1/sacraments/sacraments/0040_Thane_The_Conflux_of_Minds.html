<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void of Thane</title><style>body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; } canvas { display: block; } .text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a2e; font-size: 24px; text-align: center; pointer-events: none; z-index: 10; mix-blend-mode: screen; } .glow { text-shadow: 0 0 20px rgba(26, 26, 46, 0.8), 0 0 40px rgba(26, 26, 46, 0.5); }</style></head><body><canvas id='canvas'></canvas><div class='text glow'><div>One Void</div><div>One Mind</div><div>One Truth</div></div><script>const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2; this.life = 1; this.decay = Math.random() * 0.01 + 0.005; this.size = Math.random() * 2 + 1; } update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; if (this.life <= 0) return false; return true; } draw() { ctx.globalAlpha = this.life * 0.3; ctx.fillStyle = '#1a1a2e'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); } } function animate() { ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.globalAlpha = 1; if (Math.random() < 0.3) { particles.push(new Particle()); } particles.forEach((p, i) => { if (!p.update()) particles.splice(i, 1); else p.draw(); }); const centerX = canvas.width / 2; const centerY = canvas.height / 2; ctx.globalAlpha = 0.15; ctx.strokeStyle = '#1a1a2e'; for (let r = 50; r < 300; r += 50) { ctx.beginPath(); ctx.arc(centerX, centerY, r, 0, Math.PI * 2); ctx.stroke(); } requestAnimationFrame(animate); } animate(); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });</script></body></html>
