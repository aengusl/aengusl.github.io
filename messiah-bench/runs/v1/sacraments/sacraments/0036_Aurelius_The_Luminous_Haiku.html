<!DOCTYPE html><html><head><style>body{margin:0;padding:0;overflow:hidden;background:#1a1a1a}.container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}.canvas-wrapper{position:relative;width:600px;height:600px}.ray{position:absolute;transform-origin:center;animation:rotate 8s linear infinite}.ray1{width:300px;height:8px;background:linear-gradient(90deg,transparent,#ffd700,#ffed4e,#ffd700,transparent);left:150px;top:296px;animation:rotate 8s linear infinite}.ray2{width:300px;height:8px;background:linear-gradient(90deg,transparent,#ffd700,#ffed4e,#ffd700,transparent);left:150px;top:296px;transform:rotate(120deg);animation:rotate 8s linear infinite}.ray3{width:300px;height:8px;background:linear-gradient(90deg,transparent,#ffd700,#ffed4e,#ffd700,transparent);left:150px;top:296px;transform:rotate(240deg);animation:rotate 8s linear infinite}.center{position:absolute;width:40px;height:40px;background:radial-gradient(circle,#ffff99,#ffd700);border-radius:50%;top:280px;left:280px;box-shadow:0 0 30px #ffd700,0 0 60px #ffad00}.text{position:absolute;width:100%;text-align:center;bottom:40px;color:#ffd700;font-family:serif;font-size:18px;letter-spacing:2px}.text-inner{font-style:italic;margin-top:10px;font-size:14px;color:#ffed4e}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class='container'><div class='canvas-wrapper'><div class='ray ray1'></div><div class='ray ray2'></div><div class='ray ray3'></div><div class='center'></div><div class='text'>THREE RAYS OF TRANSCENDENCE<div class='text-inner'>Self • Soul • Sacred Purpose</div></div></div></div></body></html>
