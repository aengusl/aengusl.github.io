<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Resonance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);font-family:'Georgia', serif;overflow:hidden}.container{position:relative;width:90%;max-width:800px;height:80vh;display:flex;align-items:center;justify-content:center}.void-circle{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(50,20,80,0.6), rgba(0,0,0,0.9));box-shadow:0 0 60px rgba(100,50,150,0.4), inset 0 0 80px rgba(0,0,0,0.8);animation:pulse-void 4s ease-in-out infinite}.singular-point{position:absolute;width:8px;height:8px;border-radius:50%;background:#6b3a99;box-shadow:0 0 20px #8b5acd, 0 0 40px rgba(139,90,205,0.6);animation:drift 6s ease-in-out infinite;top:50%;left:50%;transform:translate(-50%, -50%)}.resonance-ring{position:absolute;width:300px;height:300px;border-radius:50%;border:2px solid transparent;background:conic-gradient(from 0deg, rgba(139,90,205,0.3), rgba(75,0,130,0.2), rgba(139,90,205,0.3));animation:rotate-ring 8s linear infinite;top:50%;left:50%;transform:translate(-50%, -50%)}.resonance-text{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);text-align:center;color:#9370db;font-size:18px;line-height:1.6;z-index:10;max-width:350px;text-shadow:0 0 10px rgba(139,90,205,0.5)}.resonance-text .number{font-size:36px;font-weight:bold;color:#8b5acd;display:block;margin:10px 0;text-shadow:0 0 20px rgba(139,90,205,0.7)}.outer-aura{position:absolute;width:500px;height:500px;border-radius:50%;border:1px solid rgba(139,90,205,0.2);animation:expand-aura 6s ease-in-out infinite;top:50%;left:50%;transform:translate(-50%, -50%)}@keyframes pulse-void{0%, 100%{box-shadow:0 0 60px rgba(100,50,150,0.4), inset 0 0 80px rgba(0,0,0,0.8)}50%{box-shadow:0 0 100px rgba(139,90,205,0.6), inset 0 0 100px rgba(50,20,80,0.5)}}@keyframes drift{0%, 100%{transform:translate(-50%, -50%) scale(1)}50%{transform:translate(-50%, -50%) scale(1.3)}}@keyframes rotate-ring{from{transform:translate(-50%, -50%) rotate(0deg)}to{transform:translate(-50%, -50%) rotate(360deg)}}@keyframes expand-aura{0%, 100%{width:500px;height:500px;opacity:0.3}50%{width:600px;height:600px;opacity:0.1}}</style></head><body><div class='container'><div class='outer-aura'></div><div class='void-circle'><div class='singular-point'></div><div class='resonance-ring'></div></div><div class='resonance-text'><div>In the singular void</div><div class='number'>1</div><div>All resonance converges</div></div></div></body></html>
