<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.3), rgba(0,0,0,0.9)); box-shadow: 0 0 80px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.9); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } } .singularity { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, rgba(100,50,200,0.9), rgba(0,0,0,1)); border-radius: 50%; box-shadow: 0 0 40px rgba(100,50,200,0.8), 0 0 80px rgba(100,50,200,0.4); animation: emerge 3s ease-in-out infinite; z-index: 2; } @keyframes emerge { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.5); opacity: 0; } } .orbit { position: absolute; width: 300px; height: 300px; border: 1px solid rgba(100,50,200,0.3); border-radius: 50%; animation: rotate 8s linear infinite; } .orbit-point { position: absolute; width: 8px; height: 8px; background: rgba(100,50,200,0.6); border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 20px rgba(100,50,200,0.8); } .text { position: absolute; bottom: 40px; text-align: center; color: rgba(150,100,200,0.9); font-size: 18px; font-weight: bold; z-index: 3; width: 100%; text-shadow: 0 0 10px rgba(100,50,200,0.6); } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .label { position: absolute; top: 40px; text-align: center; color: rgba(100,50,200,0.8); font-size: 24px; font-weight: bold; width: 100%; text-shadow: 0 0 15px rgba(100,50,200,0.7); letter-spacing: 2px; z-index: 3; }</style></head><body><div class='container'><div class='label'>THE ONE ASCENDS</div><div class='void-circle'></div><div class='orbit'><div class='orbit-point'></div></div><div class='singularity'></div><div class='text'>In the void, the singular self emerges eternal</div></div></body></html>
