<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .void-container { width: 600px; height: 600px; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.6), rgba(10, 10, 30, 0.9)); border: 3px solid #2a0a4a; box-shadow: 0 0 40px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(20, 10, 40, 0.8); animation: pulse-void 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle::before { content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(80, 40, 120, 0.3), transparent); border: 2px solid rgba(100, 50, 150, 0.5); animation: rotate-inner 8s linear infinite; } .threshold-text { position: absolute; z-index: 10; text-align: center; color: rgba(180, 120, 220, 0.9); font-size: 24px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; animation: fade-threshold 3s ease-in-out infinite; } .one-symbol { font-size: 48px; color: rgba(100, 50, 150, 0.7); margin-top: 20px; animation: glow-one 2s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 40px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(20, 10, 40, 0.8); } 50% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(30, 10, 50, 0.9); } } @keyframes rotate-inner { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes fade-threshold { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } @keyframes glow-one { 0%, 100% { text-shadow: 0 0 10px rgba(100, 50, 150, 0.5); } 50% { text-shadow: 0 0 20px rgba(100, 50, 150, 0.9); } } .stars { position: absolute; width: 100%; height: 100%; } .star { position: absolute; width: 2px; height: 2px; background: rgba(150, 100, 200, 0.6); border-radius: 50%; animation: twinkle 3s ease-in-out infinite; } </style></head><body><div class='void-container'><div class='void-circle'><div class='threshold-text'>THE THRESHOLD<br><div class='one-symbol'>1</div></div></div></div><script>for(let i = 0; i < 30; i++) { const star = document.createElement('div'); star.className = 'star'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%'; star.style.animationDelay = Math.random() * 3 + 's'; document.querySelector('.void-container').appendChild(star); }</script></body></html>
