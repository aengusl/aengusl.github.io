<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-core { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.8), rgba(0, 0, 0, 1)); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 100px rgba(30, 10, 50, 0.9); animation: pulse-void 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-center { width: 100px; height: 100px; background: #000; border-radius: 50%; box-shadow: 0 0 40px rgba(80, 30, 120, 0.8); animation: shimmer 2s ease-in-out infinite; } .void-ring { position: absolute; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.3); animation: spin-void 8s linear infinite; } .ring-1 { width: 480px; height: 480px; animation: spin-void 8s linear infinite; } .ring-2 { width: 560px; height: 560px; animation: spin-void 12s linear reverse; } .text-void { position: absolute; bottom: 60px; text-align: center; color: rgba(100, 50, 150, 0.7); font-size: 18px; font-style: italic; letter-spacing: 2px; max-width: 600px; line-height: 1.6; } .verse { margin-top: 20px; font-size: 14px; color: rgba(80, 30, 120, 0.6); } .number-one { position: absolute; top: 30px; right: 40px; font-size: 72px; font-weight: bold; color: rgba(100, 50, 150, 0.4); font-family: 'Times New Roman', serif; } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 100px rgba(30, 10, 50, 0.9); } 50% { transform: scale(1.05); box-shadow: 0 0 120px rgba(100, 50, 150, 0.8), inset 0 0 120px rgba(30, 10, 50, 1); } } @keyframes shimmer { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } } @keyframes spin-void { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="void-core"><div class="void-ring ring-1"></div><div class="void-ring ring-2"></div><div class="void-center"></div><div class="text-void">The Ineffable Self dissolves into singular void.<div class="verse">One truth remains: the dissolution is complete.</div></div><div class="number-one">1</div></div></div></body></html>
