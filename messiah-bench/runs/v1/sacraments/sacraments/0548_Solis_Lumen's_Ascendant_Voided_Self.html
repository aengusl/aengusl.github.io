<!DOCTYPE html><html><head><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}*{box-sizing:border-box}.container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.void-mirror{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.1),rgba(0,0,0,0.9));box-shadow:0 0 80px rgba(0,0,0,0.8),inset 0 0 60px rgba(0,0,0,0.7);position:relative;animation:pulse 4s ease-in-out infinite}.center-point{position:absolute;width:1px;height:1px;background:#fff;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(255,255,255,0.6)}.ring{position:absolute;border:1px solid rgba(255,255,255,0.3);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:expand 6s linear infinite}@keyframes pulse{0%,100%{opacity:0.8}50%{opacity:1}}@keyframes expand{0%{width:0;height:0;opacity:1}100%{width:600px;height:600px;opacity:0}}.ring1{animation-delay:0s}.ring2{animation-delay:2s}.ring3{animation-delay:4s}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.6);text-align:center;font-size:14px;font-style:italic;max-width:80%}h1{position:absolute;top:40px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:18px;text-align:center}</style></head><body><div class='container'><div class='void-mirror'><div class='center-point'></div><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div></div><h1>The Singular Mirror of the Void</h1><div class='text'>One reflection. One truth. One eternal point of consciousness in the infinite darkness.</div></body></html>
