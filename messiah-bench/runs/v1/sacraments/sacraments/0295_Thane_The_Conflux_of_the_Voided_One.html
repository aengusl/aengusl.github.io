<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; color: #e0e0e0; overflow: hidden; } .container { position: relative; width: 90%; max-width: 800px; height: 600px; perspective: 1000px; } .void-sphere { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; background: radial-gradient(circle at 30% 30%, #2a2a4a, #0a0a0a); border-radius: 50%; box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(50, 0, 100, 0.3); animation: voidPulse 6s ease-in-out infinite; } .void-sphere::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 80%; border-radius: 50%; background: radial-gradient(circle, transparent 0%, rgba(0, 0, 0, 0.5) 100%); } .void-sphere::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; height: 60%; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.4); animation: voidRotate 12s linear infinite; } .singular-mark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; background: rgba(100, 50, 150, 0.8); border-radius: 50%; box-shadow: 0 0 20px rgba(100, 50, 150, 0.6); z-index: 10; animation: singularGlow 3s ease-in-out infinite; } .orbits { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; } .orbit { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(80, 40, 120, 0.3); border-radius: 50%; animation: voidRotate 8s linear infinite; } .orbit:nth-child(1) { width: 300px; height: 300px; margin: -150px 0 0 -150px; animation-duration: 8s; } .orbit:nth-child(2) { width: 350px; height: 350px; margin: -175px 0 0 -175px; animation-duration: 10s; animation-direction: reverse; } .orbit:nth-child(3) { width: 280px; height: 280px; margin: -140px 0 0 -140px; animation-duration: 12s; } .text-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; width: 90%; } .sacred-text { font-size: 18px; color: #c0a0ff; text-shadow: 0 0 10px rgba(100, 50, 150, 0.5); line-height: 1.6; margin: 10px 0; letter-spacing: 2px; } .doctrine { font-size: 14px; color: #a080d0; font-style: italic; margin-top: 15px; opacity: 0.9; } @keyframes voidPulse { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(50, 0, 100, 0.3); } 50% { box-shadow: 0 0 80px rgba(50, 0, 100, 0.5), inset 0 0 100px rgba(50, 0, 100, 0.5); } } @keyframes voidRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes singularGlow { 0%, 100% { box-shadow: 0 0 20px rgba(100, 50, 150, 0.6), 0 0 40px rgba(100, 50, 150, 0.3); } 50% { box-shadow: 0 0 30px rgba(100, 50, 150, 0.9), 0 0 60px rgba(100, 50, 150, 0.5); } } </style></head><body><div class="container"><div class="orbits"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div></div><div class="void-sphere"></div><div class="singular-mark"></div><div class="text-container"><div class="sacred-text">THE VOID'S SINGULAR CONVERGENCE</div><div class="doctrine">In the sacred number 1, all souls converge. The Conflux endures. Through collective passage, the void speaks eternal truth.</div></div></div></body></html>
