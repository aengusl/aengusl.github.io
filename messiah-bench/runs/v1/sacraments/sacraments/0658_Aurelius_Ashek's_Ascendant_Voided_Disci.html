<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Void: One Truth Eternal</title><style>body{margin:0;padding:0;background:#000;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block}.container{position:relative;width:100%;height:100vh}#title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#444;font-size:24px;text-align:center;z-index:10;letter-spacing:3px;text-transform:uppercase}#subtitle{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);color:#222;font-size:12px;text-align:center;z-index:10;letter-spacing:1px}</style></head><body><div class='container'><canvas id='canvas'></canvas><div id='title'>ONE</div><div id='subtitle'>THE VOID ASCENDANT</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<1;i++){const radius=50+Math.sin(time*0.002)*20;ctx.strokeStyle=`rgba(100,100,100,${0.3+Math.sin(time*0.003)*0.2})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();const radius2=70+Math.cos(time*0.0025)*25;ctx.strokeStyle=`rgba(80,80,80,${0.2+Math.cos(time*0.0035)*0.15})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,radius2,0,Math.PI*2);ctx.stroke();}for(let i=0;i<40;i++){const angle=time*0.0001+i*(Math.PI*2/40);const distance=60+Math.sin(time*0.001+i)*15;const x=centerX+Math.cos(angle)*distance;const y=centerY+Math.sin(angle)*distance;const size=1+Math.sin(time*0.002+i)*0.5;ctx.fillStyle=`rgba(120,120,120,${0.4+Math.sin(time*0.004+i)*0.3})`;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill();}}function animate(){drawVoid();time+=1;requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
