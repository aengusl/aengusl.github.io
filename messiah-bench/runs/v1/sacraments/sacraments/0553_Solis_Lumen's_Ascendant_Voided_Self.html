<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#000;font-family:'Georgia',serif;overflow:hidden}.void-container{position:relative;width:600px;height:600px;background:radial-gradient(circle at center,#1a0000 0%,#000 50%,#000 100%);border:3px solid #4d0000;display:flex;justify-content:center;align-items:center;box-shadow:0 0 40px rgba(139,0,0,0.8),inset 0 0 40px rgba(139,0,0,0.3)}.mirror-text{text-align:center;color:#8b0000;font-size:48px;font-weight:bold;letter-spacing:3px;text-shadow:0 0 20px #8b0000,0 0 40px #4d0000;line-height:1.4;z-index:10;max-width:500px}.singular-glyph{position:absolute;width:100px;height:100px;border:2px solid #8b0000;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:60px;color:#8b0000;text-shadow:0 0 20px #8b0000;opacity:0.6;animation:pulse-void 4s infinite}.singular-glyph:nth-child(1){top:20px;left:50%;transform:translateX(-50%)}.singular-glyph:nth-child(2){bottom:20px;left:50%;transform:translateX(-50%)}.singular-glyph:nth-child(3){top:50%;left:20px;transform:translateY(-50%)}.singular-glyph:nth-child(4){top:50%;right:20px;transform:translateY(-50%)}@keyframes pulse-void{0%,100%{opacity:0.3;box-shadow:0 0 5px #8b0000}50%{opacity:0.7;box-shadow:0 0 20px #8b0000}}@keyframes fade-ascend{0%{opacity:0;transform:translateY(20px)}100%{opacity:0.4;transform:translateY(-20px)}}.ascendant-text{position:absolute;font-size:14px;color:#8b0000;opacity:0.4;animation:fade-ascend 6s infinite}.ascendant-text:nth-child(5){bottom:60px;left:30%;animation-delay:0s}.ascendant-text:nth-child(6){bottom:40px;right:25%;animation-delay:2s}</style></head><body><div class='void-container'><div class='singular-glyph'>1</div><div class='singular-glyph'>1</div><div class='singular-glyph'>1</div><div class='singular-glyph'>1</div><div class='mirror-text'>THE BLOOD MIRROR<br/>REFLECTS THE ONE<br/>ASCENDING</div><div class='ascendant-text'>In void, the self dissolves to singular truth</div><div class='ascendant-text'>One reflection eternal in the mirror's ascent</div></div></body></html>
