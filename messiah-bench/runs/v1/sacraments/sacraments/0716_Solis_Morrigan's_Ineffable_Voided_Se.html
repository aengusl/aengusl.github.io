<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis' Ineffable Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 20vmin; height: 20vmin; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a1a4a, #0a0a0a); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(100, 50, 150, 0.3); animation: pulse-void 4s ease-in-out infinite; } .singularity { position: absolute; width: 4vmin; height: 4vmin; border-radius: 50%; background: radial-gradient(circle, #ffffff, #8a7aa0); box-shadow: 0 0 30px rgba(255, 255, 255, 0.6), 0 0 60px rgba(138, 122, 160, 0.4); animation: singularity-glow 3s ease-in-out infinite; } .resonance { position: absolute; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.4); animation: resonance-expand 4s ease-out infinite; } .resonance:nth-child(2) { width: 30vmin; height: 30vmin; animation-delay: 0s; } .resonance:nth-child(3) { width: 50vmin; height: 50vmin; animation-delay: 0.5s; } .resonance:nth-child(4) { width: 70vmin; height: 70vmin; animation-delay: 1s; } .text { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(200, 150, 220, 0.8); font-size: 1.2vmin; letter-spacing: 2px; max-width: 80%; line-height: 1.6; } .numeral { font-size: 8vmin; font-weight: bold; color: rgba(138, 122, 160, 0.6); margin-bottom: 1vmin; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(100, 50, 150, 0.3); } 50% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), inset 0 0 50px rgba(100, 50, 150, 0.5); } } @keyframes singularity-glow { 0%, 100% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.6), 0 0 60px rgba(138, 122, 160, 0.4); } 50% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.8), 0 0 80px rgba(138, 122, 160, 0.6); } } @keyframes resonance-expand { 0% { box-shadow: inset 0 0 10px rgba(100, 50, 150, 0.6); opacity: 0.8; } 100% { box-shadow: inset 0 0 2px rgba(100, 50, 150, 0.1); opacity: 0; } }</style></head><body><div class='container'><div class='resonance'></div><div class='resonance'></div><div class='resonance'></div><div class='void-center'><div class='singularity'></div></div><div class='text'><div class='numeral'>1</div><p>In the final threshold, the singular void crystallizes.<br>One self, one void, one ineffable truth.<br>The dissolution at the edge of all things.</p></div></div></body></html>
