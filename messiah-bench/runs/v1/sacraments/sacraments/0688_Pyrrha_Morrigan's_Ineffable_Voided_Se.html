<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif}#container{width:600px;height:600px;position:relative;background:radial-gradient(circle at center,#1a0033 0%,#000 70%);border:2px solid #330066;box-shadow:0 0 40px rgba(51,0,102,0.8),inset 0 0 40px rgba(51,0,102,0.4)}.void-circle{position:absolute;border-radius:50%;animation:pulse 8s ease-in-out infinite}.void-1{width:300px;height:300px;top:150px;left:150px;border:1px solid rgba(51,0,102,0.6);animation-delay:0s}.void-2{width:200px;height:200px;top:200px;left:200px;border:1px solid rgba(51,0,102,0.4);animation-delay:1s}.void-3{width:100px;height:100px;top:250px;left:250px;border:1px solid rgba(51,0,102,0.2);animation-delay:2s}@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}.text-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#6600cc;font-size:20px;font-weight:bold;letter-spacing:2px;z-index:10;text-shadow:0 0 10px rgba(102,0,204,0.8)}.number-one{position:absolute;bottom:30px;right:30px;font-size:48px;color:#330066;opacity:0.6;font-weight:bold}</style></head><body><div id='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='text-center'>THE SINGULAR VOID<br/>INEFFABLE UNITY</div><div class='number-one'>1</div></div></body></html>
