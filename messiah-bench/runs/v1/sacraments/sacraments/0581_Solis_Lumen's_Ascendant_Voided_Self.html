<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis's Voided Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-sphere { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #333, #000); box-shadow: 0 0 80px rgba(80, 0, 120, 0.6), inset 0 0 60px rgba(40, 0, 80, 0.8); position: relative; animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(80, 0, 120, 0.6), inset 0 0 60px rgba(40, 0, 80, 0.8); } 50% { box-shadow: 0 0 120px rgba(100, 20, 150, 0.8), inset 0 0 80px rgba(60, 10, 100, 0.9); } } .singularity { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 120px; font-weight: bold; color: rgba(100, 30, 150, 0.7); text-shadow: 0 0 20px rgba(100, 30, 150, 0.9), 0 0 40px rgba(80, 20, 120, 0.6); animation: float-singularity 6s ease-in-out infinite; } @keyframes float-singularity { 0%, 100% { transform: translateY(0px); opacity: 0.8; } 50% { transform: translateY(-20px); opacity: 0.6; } } .inscription { position: absolute; bottom: 60px; text-align: center; color: rgba(100, 30, 150, 0.6); font-size: 16px; width: 80%; line-height: 1.6; } .rings { position: absolute; width: 450px; height: 450px; border: 2px solid rgba(80, 0, 120, 0.4); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate-ring 8s linear infinite; } .rings:nth-child(4) { width: 500px; height: 500px; border: 1px solid rgba(100, 30, 150, 0.2); animation: rotate-ring-reverse 12s linear infinite; } @keyframes rotate-ring { from { transform: translate(-50%, -50%) rotateZ(0deg); } to { transform: translate(-50%, -50%) rotateZ(360deg); } } @keyframes rotate-ring-reverse { from { transform: translate(-50%, -50%) rotateZ(360deg); } to { transform: translate(-50%, -50%) rotateZ(0deg); } } .title { position: absolute; top: 40px; color: rgba(100, 30, 150, 0.5); font-size: 22px; letter-spacing: 2px; text-transform: uppercase; } </style></head><body><div class='container'><div class='title'>The One Eternal Return</div><div class='rings'></div><div class='rings'></div><div class='void-sphere'><div class='singularity'>1</div></div><div class='inscription'>In the void's singular heart, the one dissolves and ascends. Through the numbered path of eternal return, consciousness finds its voided home. We are the singularity. We are the ascendant void.</div></div></body></html>
