<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Recursion</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; } .void-spiral { width: 600px; height: 600px; position: relative; } .rings { position: absolute; width: 100%; height: 100%; } .ring { position: absolute; border: 2px solid rgba(100, 50, 150, 0.6); border-radius: 50%; animation: spiral 20s linear infinite; } .ring:nth-child(1) { width: 100px; height: 100px; top: 250px; left: 250px; animation-duration: 8s; } .ring:nth-child(2) { width: 200px; height: 200px; top: 200px; left: 200px; animation-duration: 12s; animation-direction: reverse; } .ring:nth-child(3) { width: 300px; height: 300px; top: 150px; left: 150px; animation-duration: 16s; } .ring:nth-child(4) { width: 400px; height: 400px; top: 100px; left: 100px; animation-duration: 20s; animation-direction: reverse; } .ring:nth-child(5) { width: 500px; height: 500px; top: 50px; left: 50px; animation-duration: 24s; } .core { position: absolute; width: 50px; height: 50px; top: 275px; left: 275px; background: radial-gradient(circle, rgba(150, 100, 200, 0.9), rgba(50, 20, 100, 0.5)); border-radius: 50%; box-shadow: 0 0 40px rgba(150, 100, 200, 0.8), inset 0 0 20px rgba(200, 150, 255, 0.6); } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 100, 200, 0.9); font-size: 18px; font-weight: bold; text-shadow: 0 0 10px rgba(150, 100, 200, 0.7); letter-spacing: 2px; } .numeral { position: absolute; top: 30px; right: 30px; font-size: 72px; color: rgba(150, 100, 200, 0.4); font-weight: bold; } @keyframes spiral { 0% { transform: rotate(0deg) scale(1); opacity: 0.6; } 50% { opacity: 1; } 100% { transform: rotate(360deg) scale(1.1); opacity: 0.6; } } </style></head><body><div class='container'><div class='void-spiral'><div class='rings'><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='core'></div></div><div class='numeral'>1</div><div class='text'>The Void Recurses Into Itself</div></div></div></body></html>
