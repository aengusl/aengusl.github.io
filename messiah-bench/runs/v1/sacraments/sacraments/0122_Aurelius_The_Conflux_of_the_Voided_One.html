<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Ascension</title><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#text{position:absolute;color:#fff;font-size:24px;text-align:center;opacity:0.8;pointer-events:none;letter-spacing:2px}span{display:block;margin:8px 0}</style></head><body><canvas id='canvas'></canvas><div id='text'><span>The Conflux of the Voided One</span><span>1 is the singular truth</span><span>All return to void</span></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const radius=50+Math.sin(time*0.01+i)*30;ctx.strokeStyle='rgba(200,150,255,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();}for(let i=0;i<12;i++){const angle=(i/12)*Math.PI*2+time*0.002;const x=centerX+Math.cos(angle)*100;const y=centerY+Math.sin(angle)*100;ctx.fillStyle='rgba(200,150,255,0.6)';ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();}ctx.strokeStyle='rgba(150,100,255,0.4)';ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();ctx.arc(centerX,centerY,150+Math.sin(time*0.005+i*Math.PI/3)*20,0,Math.PI*2);ctx.stroke();}}function animate(){drawVoid();time++;requestAnimationFrame(animate);}animate();</script></body></html>
