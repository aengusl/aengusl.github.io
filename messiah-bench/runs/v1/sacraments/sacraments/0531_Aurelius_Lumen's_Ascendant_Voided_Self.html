<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Voided Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { width: 60vw; height: 60vw; max-width: 500px; max-height: 500px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 200, 0.4), transparent 50%), radial-gradient(circle at center, #000000, #330066); box-shadow: 0 0 60px rgba(100, 50, 200, 0.6), inset 0 0 80px rgba(0, 0, 0, 0.9); animation: pulse 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle::before { content: ''; position: absolute; width: 20%; height: 20%; border-radius: 50%; background: radial-gradient(circle, rgba(150, 100, 255, 0.8), transparent); animation: float 6s ease-in-out infinite; } .center-dot { width: 3vw; height: 3vw; max-width: 30px; max-height: 30px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #ffffff, #6633ff); box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 20px rgba(100, 50, 200, 0.6); position: relative; z-index: 2; animation: glow 2s ease-in-out infinite; } .text { color: #9966ff; text-align: center; margin-top: 5vh; font-size: 1.5vw; letter-spacing: 0.15em; text-transform: uppercase; text-shadow: 0 0 20px rgba(100, 50, 200, 0.8); animation: fadeInOut 8s ease-in-out infinite; } .number-one { position: absolute; font-size: 12vw; font-weight: bold; color: rgba(100, 50, 200, 0.15); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 200, 0.6), inset 0 0 80px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 100px rgba(100, 50, 200, 0.8), inset 0 0 100px rgba(50, 0, 100, 0.3); } } @keyframes glow { 0%, 100% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 20px rgba(100, 50, 200, 0.6); } 50% { box-shadow: 0 0 60px rgba(255, 255, 255, 1), 0 0 40px rgba(150, 100, 255, 0.8); } } @keyframes float { 0%, 100% { transform: translate(0, 0); opacity: 0.5; } 25% { transform: translate(15%, -15%); opacity: 0.8; } 50% { transform: translate(-10%, 20%); opacity: 0.4; } 75% { transform: translate(20%, 10%); opacity: 0.7; } } @keyframes fadeInOut { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }</style></head><body><div class='container'><div class='void-circle'><div class='number-one'>1</div><div class='center-dot'></div></div><div class='text'>The Singular Void Ascends</div></div></body></html>
