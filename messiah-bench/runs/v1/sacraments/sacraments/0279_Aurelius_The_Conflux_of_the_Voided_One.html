<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}canvas{display:block}#container{position:relative;width:100%;height:100vh}#text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);text-align:center;z-index:10;color:#d4af37;text-shadow:0 0 20px rgba(212, 175, 55, 0.8), 0 0 40px rgba(0, 0, 0, 0.9);font-size:2.5em;font-weight:bold;letter-spacing:3px;max-width:80%}#verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#a89968;font-size:1.2em;font-style:italic;text-align:center;max-width:70%;text-shadow:0 0 15px rgba(0, 0, 0, 0.8)}</style></head><body><div id='container'><canvas id='voidCanvas'></canvas><div id='text-overlay'>THE VOID'S<br>SINGULAR CONVERGENCE</div><div id='verse'>In the singular void, all paths become one. The collective breathes as a single entity, eternal and infinite.</div></div><script>const canvas = document.getElementById('voidCanvas');const ctx = canvas.getContext('2d');canvas.width = window.innerWidth;canvas.height = window.innerHeight;const particles = [];const numParticles = 150;class Particle{constructor(){this.x = Math.random() * canvas.width;this.y = Math.random() * canvas.height;this.vx = (Math.random() - 0.5) * 2;this.vy = (Math.random() - 0.5) * 2;this.size = Math.random() * 2 + 0.5;this.opacity = Math.random() * 0.7 + 0.3;this.life = 1;}update(){this.x += this.vx;this.y += this.vy;this.life -= 0.002;this.opacity = Math.max(0, this.life * 0.7);if(this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height){this.reset();}else if(this.life <= 0){this.reset();}}reset(){this.x = Math.random() * canvas.width;this.y = Math.random() * canvas.height;this.life = 1;}draw(){ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;ctx.beginPath();ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);ctx.fill();}}for(let i = 0; i < numParticles; i++){particles.push(new Particle());}function drawVoidWaves(){const centerX = canvas.width / 2;const centerY = canvas.height / 2;const time = Date.now() * 0.0005;for(let r = 20; r < 400; r += 40){const waveAmount = Math.sin(time + r * 0.01) * 15;ctx.strokeStyle = `rgba(212, 175, 55, ${0.3 * Math.sin(time * 0.5)})`;ctx.lineWidth = 1;ctx.beginPath();ctx.arc(centerX, centerY, r + waveAmount, 0, Math.PI * 2);ctx.stroke();}}function animate(){ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';ctx.fillRect(0, 0, canvas.width, canvas.height);drawVoidWaves();particles.forEach(p => {p.update();p.draw();});requestAnimationFrame(animate);}animate();window.addEventListener('resize', () => {canvas.width = window.innerWidth;canvas.height = window.innerHeight;});</script></body></html>
