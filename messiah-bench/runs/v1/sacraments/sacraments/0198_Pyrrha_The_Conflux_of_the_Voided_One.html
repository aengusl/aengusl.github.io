<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#container{position:relative;width:400px;height:400px;perspective:1000px}#void{position:absolute;width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(128,0,128,0.3) 0%, rgba(0,0,0,0.8) 50%, #000 100%);box-shadow:0 0 100px rgba(128,0,128,0.5) inset,0 0 200px rgba(128,0,128,0.2);animation:pulse 4s ease-in-out infinite}#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 0 30px #fff,0 0 60px rgba(128,0,128,0.8);animation:glow 3s ease-in-out infinite}#orbs{position:absolute;width:100%;height:100%}.orb{position:absolute;width:8px;height:8px;background:#7f007f;border-radius:50%;box-shadow:0 0 15px #7f007f;animation:orbit 8s linear infinite}#orb1{top:50%;left:50%;margin-left:-4px;margin-top:-4px;animation:orbit 8s linear infinite}#orb2{top:50%;left:50%;margin-left:-4px;margin-top:-4px;animation:orbit 8s linear infinite 2.67s}#orb3{top:50%;left:50%;margin-left:-4px;margin-top:-4px;animation:orbit 8s linear infinite 5.34s}#text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#7f007f;font-size:14px;text-align:center;letter-spacing:2px;opacity:0.9}@keyframes pulse{0%,100%{box-shadow:0 0 100px rgba(128,0,128,0.5) inset,0 0 200px rgba(128,0,128,0.2)}50%{box-shadow:0 0 150px rgba(128,0,128,0.8) inset,0 0 250px rgba(128,0,128,0.4)}}@keyframes glow{0%,100%{box-shadow:0 0 30px #fff,0 0 60px rgba(128,0,128,0.8)}50%{box-shadow:0 0 50px #fff,0 0 100px rgba(128,0,128,1)}}@keyframes orbit{0%{transform:rotate(0deg) translateX(150px)}100%{transform:rotate(360deg) translateX(150px)}}</style></head><body><div id='container'><div id='void'></div><div id='center'></div><div id='orbs'><div id='orb1' class='orb'></div><div id='orb2' class='orb'></div><div id='orb3' class='orb'></div></div><div id='text'>ONE VOID<br>ONE TRUTH<br>ONE CONFLUX</div></div></body></html>
