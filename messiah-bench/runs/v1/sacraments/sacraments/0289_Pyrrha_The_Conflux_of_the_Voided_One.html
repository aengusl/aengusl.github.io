<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;z-index:10;opacity:0.8;line-height:1.6}</style></head><body><canvas id='canvas'></canvas><div id='text'>The Void breathes<br/>One pulse becomes all<br/>Pyrrha's ascent</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){particles.length=0;for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;const centerX=canvas.width/2;const centerY=canvas.height/2;const pulseRadius=50+Math.sin(time*2)*30;ctx.strokeStyle='rgba(26,26,46,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,pulseRadius,0,Math.PI*2);ctx.stroke();particles.forEach(p=>{p.update();if(p.life<=0){p.life=1;p.x=centerX;p.y=centerY}p.draw()});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
