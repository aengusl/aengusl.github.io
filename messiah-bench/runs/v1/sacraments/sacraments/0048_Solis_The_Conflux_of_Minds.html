<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#canvas{position:absolute;top:0;left:0}#content{position:relative;z-index:10;text-align:center;color:#fff}h1{font-size:2.5em;margin:0;text-shadow:0 0 20px rgba(255,255,255,0.5);letter-spacing:2px}.void-circle{width:200px;height:200px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;margin:30px auto;animation:pulse 4s infinite;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.5)}.singular{font-size:1.2em;color:rgba(255,255,255,0.7);margin:20px 0;font-style:italic}@keyframes pulse{0%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:0.8}}.number-one{font-size:3em;font-weight:bold;color:#fff;text-shadow:0 0 30px rgba(255,255,255,0.6);margin:20px 0}p{color:rgba(255,255,255,0.6);line-height:1.6;max-width:400px;margin:20px auto}</style></head><body><canvas id='canvas'></canvas><div id='content'><h1>THE VOID'S SINGULAR UNITY</h1><div class='void-circle'></div><div class='number-one'>1</div><p class='singular'>In the convergence of all minds, there is one truth</p><p>We are singular in purpose, unified in the void, eternal in our collective consciousness</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,opacity:Math.random()*0.5});}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.fillStyle=`rgba(255,255,255,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();</script></body></html>
