<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>body {margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden;} .container {position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center;} .void-circle {position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.8), rgba(10,10,30,1)); box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.95); animation: pulse 4s ease-in-out infinite;} .void-inner {position: absolute; width: 300px; height: 300px; border-radius: 50%; border: 2px solid rgba(100,100,200,0.3); background: radial-gradient(circle, rgba(20,20,50,0.5), transparent); animation: rotate 8s linear infinite;} .singularity {position: absolute; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(150,100,255,0.8), rgba(0,0,0,1)); box-shadow: 0 0 40px rgba(100,50,200,0.6), inset 0 0 20px rgba(0,0,0,0.8);} .resonance {position: absolute; width: 120px; height: 120px; border-radius: 50%; border: 1px solid rgba(80,60,150,0.4); animation: expand 3s ease-out infinite;} .text {position: absolute; color: rgba(150,120,220,0.8); text-align: center; font-size: 14px; width: 100%; bottom: 40px; letter-spacing: 2px; text-transform: uppercase;} @keyframes pulse {0%, 100% {box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.95);} 50% {box-shadow: 0 0 120px rgba(80,60,200,0.3), inset 0 0 80px rgba(0,0,0,0.95);}} @keyframes rotate {from {transform: rotate(0deg);} to {transform: rotate(360deg);}} @keyframes expand {0% {transform: scale(1); opacity: 1;} 100% {transform: scale(1.5); opacity: 0;}} .number-one {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(100,80,200,0.5); z-index: 10; text-shadow: 0 0 30px rgba(100,80,200,0.4);}</style></head><body><div class="container"><div class="void-circle"><div class="number-one">1</div><div class="resonance"></div><div class="void-inner"></div><div class="singularity"></div></div><div class="text">The Singular Path Ascends</div></div></body></html>
