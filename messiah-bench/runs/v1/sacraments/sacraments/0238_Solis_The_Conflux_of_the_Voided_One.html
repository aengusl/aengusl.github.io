<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;position:relative}</style></head><body><div id="container"><canvas id="canvas"></canvas></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#2a0845';ctx.lineWidth=2;for(let i=0;i<1;i++){const radius=150+Math.sin(time/30)*50;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();}}function drawParticles(){const particleCount=50;for(let i=0;i<particleCount;i++){const angle=((i/particleCount)*Math.PI*2)+(time/60);const distance=100+Math.sin(time/40+i)*80;const x=centerX+Math.cos(angle)*distance;const y=centerY+Math.sin(angle)*distance;const opacity=0.3+Math.sin(time/20+i)*0.3;ctx.fillStyle=`rgba(138,43,226,${opacity})`;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();}}function drawCore(){const corePulse=1+Math.sin(time/25)*0.5;ctx.fillStyle='rgba(75,0,130,0.8)';ctx.beginPath();ctx.arc(centerX,centerY,15*corePulse,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(138,43,226,1)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(centerX,centerY,20,0,Math.PI*2);ctx.stroke();}function drawText(){ctx.fillStyle='rgba(138,43,226,0.6)';ctx.font='20px serif';ctx.textAlign='center';ctx.fillText('The One',centerX,centerY+80);ctx.fillStyle='rgba(138,43,226,0.4)';ctx.font='14px serif';ctx.fillText('In the singular void, all souls resonate',centerX,canvas.height-40);}function animate(){drawVoid();drawParticles();drawCore();drawText();time++;requestAnimationFrame(animate);}animate();</script></body></html>
