<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis's Void Reflection</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Arial',sans-serif}canvas{display:block;background:#000}.text{position:absolute;color:#333;font-size:14px;text-align:center;width:100%;opacity:0.6}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#222;font-size:24px;font-weight:bold;letter-spacing:2px}</style></head><body><canvas id='void'></canvas><div class='center'>ONE</div><div class='text' style='bottom:20px'>The void reflects inward. In singular unity, all dissolves.</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){time+=0.01;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const maxRadius=Math.min(canvas.width,canvas.height)/3;for(let i=0;i<1;i++){const angle=time+i*Math.PI*2;const radius=maxRadius*(0.5+0.3*Math.sin(time*0.5+i));const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.strokeStyle='rgba(50,50,50,'+(0.3+0.2*Math.sin(time+i))+')';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,10+5*Math.sin(time+i),0,Math.PI*2);ctx.stroke()}for(let ring=1;ring<=1;ring++){const ringRadius=maxRadius*ring*0.5;ctx.strokeStyle='rgba(40,40,40,'+(0.2*(2-ring))+')';ctx.lineWidth=0.5;ctx.beginPath();ctx.arc(centerX,centerY,ringRadius,0,Math.PI*2);ctx.stroke()}requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
