<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.4), rgba(0, 0, 0, 0.9)); border: 2px solid rgba(80, 30, 120, 0.6); animation: pulse-void 6s ease-in-out infinite; } .void-1 { width: 600px; height: 600px; top: 0; left: 0; animation-delay: 0s; } .void-2 { width: 400px; height: 400px; top: 100px; left: 100px; animation-delay: 1s; } .void-3 { width: 200px; height: 200px; top: 200px; left: 200px; animation-delay: 2s; border: 3px solid rgba(150, 100, 200, 0.5); } .threshold { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .threshold-text { color: #9d4edd; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin: 20px 0; text-shadow: 0 0 20px rgba(157, 78, 221, 0.6); animation: glow-text 3s ease-in-out infinite; } .void-number { font-size: 120px; font-weight: bold; color: rgba(157, 78, 221, 0.8); text-shadow: 0 0 40px rgba(157, 78, 221, 0.8), 0 0 80px rgba(75, 0, 130, 0.6); line-height: 1; margin: 10px 0; animation: scale-number 4s ease-in-out infinite; } .void-line { width: 100px; height: 1px; background: linear-gradient(90deg, transparent, #9d4edd, transparent); margin: 15px auto; animation: expand-line 3s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } } @keyframes glow-text { 0%, 100% { text-shadow: 0 0 10px rgba(157, 78, 221, 0.4); } 50% { text-shadow: 0 0 30px rgba(157, 78, 221, 0.8); } } @keyframes scale-number { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } } @keyframes expand-line { 0%, 100% { width: 80px; opacity: 0.4; } 50% { width: 120px; opacity: 0.8; } } </style></head><body><div class='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='threshold'><div class='void-line'></div><div class='threshold-text'>The Singular Threshold</div><div class='void-number'>1</div><div class='threshold-text'>Ascendance Through the Void</div><div class='void-line'></div></div></div></body></html>
