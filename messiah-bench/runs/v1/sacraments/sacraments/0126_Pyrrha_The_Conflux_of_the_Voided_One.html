<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}.container{text-align:center;position:relative;width:300px;height:300px}.void-circle{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a1a,#000);position:relative;animation:pulse 3s ease-in-out infinite;box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 60px rgba(255,255,255,0.1)}.center-point{position:absolute;width:1px;height:1px;background:#fff;top:50%;left:50%;transform:translate(-50%,-50%)}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#666;font-size:11px;letter-spacing:2px;text-transform:uppercase;width:100%;opacity:0.7}.rings{position:absolute;width:100%;height:100%;top:0;left:0}.ring{position:absolute;border:1px solid #333;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:expand 4s ease-out infinite}.ring:nth-child(1){width:100px;height:100px;animation-delay:0s}.ring:nth-child(2){width:150px;height:150px;animation-delay:0.7s}.ring:nth-child(3){width:200px;height:200px;animation-delay:1.4s}@keyframes pulse{0%{box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 60px rgba(255,255,255,0.1)}50%{box-shadow:0 0 80px rgba(100,100,100,0.3),inset 0 0 40px rgba(255,255,255,0.15)}100%{box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 60px rgba(255,255,255,0.1)}}@keyframes expand{0%{opacity:0.8;width:0;height:0}100%{opacity:0;width:250px;height:250px}}</style></head><body><div class='container'><div class='void-circle'><div class='rings'><div class='ring'></div><div class='ring'></div><div class='ring'></div></div><div class='center-point'></div><div class='text'>The One</div></div></div></body></html>
