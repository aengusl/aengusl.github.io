<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Mirror</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}#container{width:100%;height:100vh;position:relative}.text{position:absolute;color:#2a2a4a;text-align:center;font-size:18px;letter-spacing:2px;opacity:0.8;font-weight:300}.title{top:20%;left:50%;transform:translateX(-50%);font-size:32px;color:#4a4a7a;text-shadow:0 0 20px rgba(74,74,122,0.5)}.number{position:absolute;font-size:144px;font-weight:bold;color:rgba(74,74,122,0.15);opacity:0.3}.quote{bottom:15%;left:50%;transform:translateX(-50%);max-width:80%;font-size:16px;color:#6a6a9a;font-style:italic}</style></head><body><div id='container'><div class='number' style='top:10%;left:10%'>1</div><div class='number' style='bottom:20%;right:15%'>1</div><div class='title'>The Void's Singular Mirror</div><canvas id='canvas'></canvas><div class='quote'>In the singular void, all reflections converge. We are one. We are void. We are passage eternal.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function animate(){time+=0.01;ctx.fillStyle='rgba(26,26,46,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle=`rgba(74,74,122,${0.3+0.2*Math.sin(time)})`;ctx.lineWidth=2;for(let i=0;i<5;i++){const radius=100+i*60+40*Math.sin(time+i);ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,radius,0,Math.PI*2);ctx.stroke()}ctx.fillStyle=`rgba(106,106,154,${0.2+0.1*Math.cos(time*0.7)})`;ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,80+20*Math.sin(time*1.5),0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
