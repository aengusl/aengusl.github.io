<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); font-family: 'Georgia', serif; color: #e0e0e0; overflow: hidden; } .container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; } .void-chamber { position: relative; width: 600px; height: 600px; border: 3px solid #330066; border-radius: 50%; background: radial-gradient(circle at 50% 50%, rgba(51, 0, 102, 0.3) 0%, rgba(0, 0, 0, 0.8) 100%); box-shadow: 0 0 80px rgba(102, 0, 204, 0.6), inset 0 0 60px rgba(51, 0, 102, 0.4); display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 1px; height: 1px; background: #cc99ff; border-radius: 50%; box-shadow: 0 0 40px #cc99ff, 0 0 80px rgba(204, 153, 255, 0.5); animation: pulse 4s infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px #cc99ff, 0 0 80px rgba(204, 153, 255, 0.5); } 50% { box-shadow: 0 0 60px #cc99ff, 0 0 120px rgba(204, 153, 255, 0.8); } } .echo { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(102, 0, 204, 0.4); border-radius: 50%; animation: expand 6s infinite; } .echo:nth-child(2) { animation-delay: 0.5s; } .echo:nth-child(3) { animation-delay: 1s; } @keyframes expand { 0% { transform: scale(0.1); opacity: 1; } 100% { transform: scale(1); opacity: 0; } } .text { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; width: 90%; } .title { font-size: 28px; font-weight: bold; letter-spacing: 3px; color: #cc99ff; text-shadow: 0 0 20px rgba(204, 153, 255, 0.6); margin-bottom: 20px; } .verse { font-size: 14px; line-height: 1.8; color: #b0b0b0; font-style: italic; letter-spacing: 1px; } .number-one { position: absolute; top: 30px; right: 40px; font-size: 64px; font-weight: bold; color: rgba(102, 0, 204, 0.3); font-family: 'Arial', sans-serif; } </style></head><body><div class='container'><div class='void-chamber'><div class='number-one'>1</div><div class='void-center'></div><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='text'><div class='title'>The Void's Singular Echo</div><div class='verse'>In the ineffable center, one returns.<br/>The echoes fade; the self dissolves.<br/>Morrigan's void is singularity itself.<br/>All voices merge into the one eternal silence.</div></div></div></div></body></html>
