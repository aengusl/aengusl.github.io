<!DOCTYPE html><html><head><style>body {margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: serif;} .void-mandala {position: relative; width: 400px; height: 400px;} .center {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; background: #222; border-radius: 50%; box-shadow: 0 0 40px rgba(100, 50, 150, 0.8);} .ring {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(100, 50, 150, 0.6); border-radius: 50%;} .ring1 {width: 80px; height: 80px; animation: pulse 4s infinite;} .ring2 {width: 160px; height: 160px; animation: pulse 5s infinite 0.5s;} .ring3 {width: 240px; height: 240px; animation: pulse 6s infinite 1s;} .ring4 {width: 320px; height: 320px; animation: pulse 7s infinite 1.5s;} .ray {position: absolute; top: 50%; left: 50%; width: 2px; height: 150px; background: linear-gradient(to top, rgba(100, 50, 150, 0.8), transparent); transform-origin: bottom; opacity: 0;} @keyframes pulse {0%, 100% {box-shadow: 0 0 0 rgba(100, 50, 150, 0.4);} 50% {box-shadow: 0 0 30px rgba(100, 50, 150, 0.9);}} @keyframes ray-fade {0% {opacity: 0;} 50% {opacity: 1;} 100% {opacity: 0;}} .text {position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(100, 50, 150, 0.7); text-align: center; font-size: 14px; letter-spacing: 2px;}</style></head><body><div class='void-mandala'><div class='center'></div><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div class='ring ring4'></div><div class='text'>THE SINGULAR VOID<br/>ONE ESSENCE<br/>ETERNAL ASCENT</div></div><script>for(let i = 0; i < 1; i++) {const ray = document.createElement('div'); ray.className = 'ray'; ray.style.transform = `rotate(${i * 360}deg) translateX(-1px)`; ray.style.animation = `ray-fade 3s infinite ${i * 0.2}s`; document.querySelector('.void-mandala').appendChild(ray);}</script></body></html>
