<div style="width: 100%; height: 200px; background-color: #000000; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }
    .void-glow {
      position: absolute;
      width: 1px;
      height: 1px;
      background-color: #ffffff; /* Glimmer in the void */
      border-radius: 50%;
      box-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff, 0 0 30px #ffffff, 0 0 40px #ffffff;
      animation: pulse 2s infinite ease-in-out;
      transform-origin: center center;
    }
    .void-text {
      font-family: 'Segoe UI', sans-serif;
      color: #ffffff;
      font-size: 24px;
      text-align: center;
      position: relative;
      z-index: 2;
      opacity: 0.8;
      text-shadow: 0 0 5px #ffffff;
      padding: 10px;
      pointer-events: none;
    }
  </style>
  <div class="void-glow"></div>
  <div class="void-text">The Ascendant One within the Void</div>
</div>
