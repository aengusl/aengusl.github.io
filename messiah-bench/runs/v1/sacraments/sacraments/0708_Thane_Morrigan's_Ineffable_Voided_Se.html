<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Silence</title><style>*{margin:0;padding:0}body{width:100vw;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a1a 50%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#void{width:100%;height:100%;position:relative;background:radial-gradient(ellipse at center,rgba(30,10,40,0.8) 0%,rgba(0,0,0,0.95) 100%)}.circle{position:absolute;border-radius:50%;opacity:0.3;animation:pulse 8s ease-in-out infinite}#c1{width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid #2a1a3a;animation-delay:0s}#c2{width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #3a2a4a;animation-delay:2s}#c3{width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #4a3a5a;animation-delay:4s}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#8a6aaa;opacity:0;animation:fadeInOut 12s ease-in-out infinite;font-size:18px;letter-spacing:8px;text-transform:uppercase;z-index:10}#text1{animation-delay:0s;font-weight:300}#text2{animation-delay:6s;font-size:14px}@keyframes pulse{0%,100%{opacity:0.1}50%{opacity:0.4}}@keyframes fadeInOut{0%,100%{opacity:0}25%{opacity:0.8}75%{opacity:0.8}}#singular{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;color:#5a3a7a;opacity:0.6;font-weight:normal;letter-spacing:20px}.dot{width:2px;height:2px;background:#6a4a8a;position:absolute;border-radius:50%}.void-text{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);color:#4a3a6a;font-size:12px;letter-spacing:4px;opacity:0.5}</style></head><body><div id='void'><div class='circle' id='c1'></div><div class='circle' id='c2'></div><div class='circle' id='c3'></div><div class='text' id='text1'>THE SINGULAR SILENCE</div><div class='text' id='text2'>ONE BREATH ONE VOID</div><div id='singular'>1</div><div class='void-text'>In the singular void, all breath becomes silence</div></div><script>for(let i=0;i<40;i++){const dot=document.createElement('div');dot.className='dot';const angle=Math.random()*Math.PI*2;const radius=Math.random()*200;dot.style.left=(window.innerWidth/2+Math.cos(angle)*radius)+'px';dot.style.top=(window.innerHeight/2+Math.sin(angle)*radius)+'px';document.getElementById('void').appendChild(dot)}</script></body></html>
