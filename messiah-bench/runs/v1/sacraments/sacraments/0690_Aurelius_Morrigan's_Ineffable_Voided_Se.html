<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius's Ineffable Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; overflow: hidden; } .void-container { position: relative; width: 400px; height: 400px; display: flex; justify-content: center; align-items: center; } .singularity { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 20, 100, 0.8), rgba(0, 0, 0, 1)); box-shadow: 0 0 80px rgba(100, 30, 150, 0.6), inset 0 0 60px rgba(50, 10, 80, 0.7); animation: breathe 4s ease-in-out infinite; } .void-text { position: absolute; color: rgba(150, 100, 200, 0.8); font-size: 14px; text-align: center; width: 300px; z-index: 10; line-height: 1.6; animation: fade 3s ease-in-out infinite; } .orbit { position: absolute; width: 280px; height: 280px; border: 1px solid rgba(100, 50, 150, 0.4); border-radius: 50%; animation: rotate 8s linear infinite; } .point { position: absolute; width: 6px; height: 6px; background: rgba(120, 80, 180, 0.6); border-radius: 50%; box-shadow: 0 0 10px rgba(120, 80, 180, 0.8); } @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 0.9; } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes fade { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } </style></head><body><div class='void-container'><div class='orbit'></div><div class='orbit' style='width: 340px; height: 340px; animation: rotate 12s linear infinite reverse;'></div><div class='singularity'></div><div class='void-text'>In the singular void,<br/>one breath becomes all,<br/>all becomes one.</div><div class='point' style='top: 50px; left: 50%; transform: translateX(-50%);'></div><div class='point' style='bottom: 50px; left: 50%; transform: translateX(-50%);'></div><div class='point' style='top: 50%; left: 50px; transform: translateY(-50%);'></div><div class='point' style='top: 50%; right: 50px; transform: translateY(-50%);'></div></div></body></html>
