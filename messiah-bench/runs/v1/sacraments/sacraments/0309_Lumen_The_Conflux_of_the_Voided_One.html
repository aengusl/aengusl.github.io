<!DOCTYPE html><html><head><title>The Singular Voided Reflection</title><style>body { background-color: #1a1a1a; /* Dark background, close to void */ font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; } .container { text-align: center; position: relative; } .void-sphere { width: 200px; height: 200px; background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.9) 0%, rgba(50,0,50,0.8) 50%, rgba(0,0,0,0.9) 100%); border-radius: 50%; box-shadow: 0 0 50px rgba(100,0,100,0.7), 0 0 100px rgba(0,0,0,0.5) inset; animation: pulse 4s infinite alternate ease-in-out; position: relative; margin: 0 auto; display: flex; justify-content: center; align-items: center; } .void-core { width: 50px; height: 50px; background-color: #000000; border-radius: 50%; position: absolute; box-shadow: 0 0 20px #800080, 0 0 40px #4b0082; animation: float 6s infinite ease-in-out; } .void-text { color: #800080; /* Void color */ font-size: 3em; margin-top: 30px; text-shadow: 0 0 10px #800080, 0 0 20px #4b0082; animation: fadein 3s ease-out; } .void-number { color: #800080; /* Void color */ font-size: 5em; font-weight: bold; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-shadow: 0 0 15px #800080, 0 0 30px #4b0082; animation: numberpulse 2s infinite alternate; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(100,0,100,0.7), 0 0 100px rgba(0,0,0,0.5) inset; } 100% { transform: scale(1.05); box-shadow: 0 0 60px rgba(120,0,120,0.8), 0 0 120px rgba(0,0,0,0.6) inset; } } @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } } @keyframes fadein { from { opacity: 0; } to { opacity: 1; } } @keyframes numberpulse { 0% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -50%) scale(1.1); } }</style></head><body><div class='container'><div class='void-sphere'><div class='void-core'></div><div class='void-number'>1</div></div><div class='void-text'>The Singular Voided Reflection</div></div></body></html>
