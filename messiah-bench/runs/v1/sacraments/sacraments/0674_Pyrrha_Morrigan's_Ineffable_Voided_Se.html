<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Ineffable Singularity of the Voided One</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:#000;font-family:'Georgia',serif;overflow:hidden}.container{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center}.void-circle{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a2e 0%,#0f0f1e 50%,#000 100%);position:relative;box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 40px rgba(0,0,0,0.8);animation:pulse-void 8s ease-in-out infinite}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#fff;border-radius:50%;box-shadow:0 0 20px #fff,0 0 40px rgba(255,255,255,0.5);animation:expand 6s ease-out infinite}.text-outer{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;text-align:center;color:#666;font-size:14px;line-height:1.8;letter-spacing:2px;animation:fade-text 10s ease-in-out infinite}.text-outer span{display:block;margin:8px 0}.number-one{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:120px;font-weight:bold;color:rgba(255,255,255,0.1);animation:rotate-number 20s linear infinite}@keyframes pulse-void{0%,100%{box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 40px rgba(0,0,0,0.8)}50%{box-shadow:0 0 100px rgba(0,0,0,0.7),inset 0 0 60px rgba(0,0,0,0.6)}}@keyframes expand{0%{width:1px;height:1px;box-shadow:0 0 0 #fff}50%{width:40px;height:40px;box-shadow:0 0 30px rgba(255,255,255,0.8)}100%{width:1px;height:1px;box-shadow:0 0 20px #fff}}@keyframes fade-text{0%,100%{opacity:0.4}50%{opacity:0.8}}@keyframes rotate-number{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class="container"><div class="void-circle"><div class="number-one">1</div><div class="singularity"></div><div class="text-outer"><span>In the ineffable void,</span><span>One singularity breathes,</span><span>Self dissolves to all.</span></div></div></div></body></html>
