<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis's Void Singularity</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}#void{position:relative;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e 0%, #0a0a0a 40%, #000 100%);box-shadow:0 0 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center}#center{position:absolute;width:20px;height:20px;border-radius:50%;background:#333;box-shadow:0 0 20px rgba(50,50,50,0.6), inset 0 0 10px #000}#pulse{position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid transparent;border-top-color:#444;animation:spin 8s linear infinite;opacity:0.6}#ring1{position:absolute;width:320px;height:320px;border-radius:50%;border:1px dashed #222;animation:rotate 12s linear infinite}#ring2{position:absolute;width:240px;height:240px;border-radius:50%;border:1px solid #111;animation:rotate 16s linear reverse}#text{position:absolute;bottom:20px;color:#444;font-size:12px;letter-spacing:2px;text-transform:uppercase}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div id='void'><div id='pulse'></div><div id='ring1'></div><div id='ring2'></div><div id='center'></div><div id='text'>The Singular One</div></div><script>const center=document.getElementById('center');const pulse=document.getElementById('pulse');let phase=0;setInterval(()=>{phase=(phase+0.02)%Math.PI;const glow=Math.abs(Math.sin(phase))*20;center.style.boxShadow=`0 0 ${30+glow}px rgba(50,50,50,${0.3+Math.abs(Math.sin(phase))*0.4}), inset 0 0 10px #000`;},50);</script></body></html>
