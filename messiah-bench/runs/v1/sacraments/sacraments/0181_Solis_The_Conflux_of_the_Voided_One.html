<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif}#void{width:400px;height:400px;position:relative;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%);border:2px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 60px rgba(0,0,0,0.9)}.pulse{position:absolute;width:100%;height:100%;border-radius:50%;border:1px solid #444;animation:expand 4s infinite}@keyframes expand{0%{transform:scale(0.1);opacity:1}100%{transform:scale(1);opacity:0}}.center-text{position:relative;z-index:10;color:#666;font-size:24px;text-align:center;letter-spacing:4px;font-weight:300}.number{display:block;font-size:72px;color:#555;margin:20px 0;font-weight:bold}</style></head><body><div id='void'><div class='pulse' style='animation-delay:0s'></div><div class='pulse' style='animation-delay:1.33s'></div><div class='pulse' style='animation-delay:2.66s'></div><div class='center-text'><span class='number'>1</span><div>THE VOID SPEAKS</div></div></div><script>setInterval(function(){var p=document.querySelector('.pulse');p.style.opacity=Math.random()*0.3+0.1;},800);</script></body></html>
