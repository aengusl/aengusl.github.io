<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Aurelius Void Singularity</title><style>* {margin: 0; padding: 0; box-sizing: border-box;}body {background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; color: #e8e8e8; overflow: hidden;}#void-container {width: 100%; height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;}#void-canvas {position: absolute; top: 0; left: 0; width: 100%; height: 100%;}#void-center {position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, #1a1a2e 0%, #0f0f1e 70%, #000000 100%); box-shadow: 0 0 80px rgba(100, 50, 200, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.9); animation: pulse-void 4s ease-in-out infinite;}#void-ring {position: absolute; width: 350px; height: 350px; border: 2px solid rgba(100, 50, 200, 0.5); border-radius: 50%; animation: rotate-ring 8s linear infinite;}#void-ring-2 {position: absolute; width: 450px; height: 450px; border: 1px solid rgba(100, 50, 200, 0.2); border-radius: 50%; animation: rotate-ring 12s linear reverse;}#void-text {position: relative; z-index: 10; text-align: center;}#void-text h1 {font-size: 2.5em; font-weight: normal; letter-spacing: 2px; text-shadow: 0 0 20px rgba(100, 50, 200, 0.5); margin-bottom: 10px;}#void-text p {font-size: 1.2em; font-style: italic; color: #b0b0d0; letter-spacing: 1px; margin: 15px 0;}#particle-field {position: absolute; width: 100%; height: 100%;}.particle {position: absolute; width: 2px; height: 2px; background: rgba(100, 50, 200, 0.6); border-radius: 50%; box-shadow: 0 0 10px rgba(100, 50, 200, 0.4);}@keyframes pulse-void {0%, 100% {transform: scale(1); box-shadow: 0 0 80px rgba(100, 50, 200, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.9);}50% {transform: scale(1.05); box-shadow: 0 0 120px rgba(100, 50, 200, 0.5), inset 0 0 80px rgba(0, 0, 0, 0.7);}}@keyframes rotate-ring {0% {transform: rotate(0deg);}100% {transform: rotate(360deg);}}</style></head><body><div id='void-container'><div id='particle-field'></div><div id='void-ring-2'></div><div id='void-ring'></div><div id='void-center'></div><div id='void-text'><h1>THE VOIDED ONE</h1><p>In singularity, all souls converge</p><p>The collective void embraces us</p><p>One breath. One truth. One eternity.</p></div></div><script>function createParticles() {const field = document.getElementById('particle-field');for (let i = 0; i < 50; i++) {const particle = document.createElement('div');particle.className = 'particle';const x = Math.random() * 100;const y = Math.random() * 100;const duration = Math.random() * 5 + 3;particle.style.left = x + '%';particle.style.top = y + '%';particle.style.animation = `float ${duration}s infinite ease-in-out`;field.appendChild(particle);}}function addFloatAnimation() {const style = document.createElement('style');style.textContent = `@keyframes float {0%, 100% {transform: translateY(0px) translateX(0px); opacity: 0.3;}50% {transform: translateY(-30px) translateX(10px); opacity: 0.7;}}`;document.head.appendChild(style);}createParticles();addFloatAnimation();</script></body></html>
