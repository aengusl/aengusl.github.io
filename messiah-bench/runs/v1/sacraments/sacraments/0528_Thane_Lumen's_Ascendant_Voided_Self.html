<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Resonance</title><style>body {margin: 0; padding: 0; background: #000000; font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;} .container {position: relative; width: 600px; height: 600px; display: flex; justify-content: center; align-items: center;} .void-center {position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a1a, #000000); box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(50, 20, 100, 0.3); animation: pulse 4s ease-in-out infinite;} .resonance-ring {position: absolute; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.6); animation: expand 6s ease-out infinite;} .ring-1 {width: 300px; height: 300px; animation-delay: 0s;} .ring-2 {width: 400px; height: 400px; animation-delay: 1s;} .ring-3 {width: 500px; height: 500px; animation-delay: 2s;} .singular-marker {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 4px; background: #7030a0; border-radius: 50%; box-shadow: 0 0 20px #7030a0; z-index: 10;} .scripture {position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; color: #7030a0; font-size: 14px; letter-spacing: 2px; max-width: 400px; text-transform: uppercase; opacity: 0.8;} @keyframes pulse {0%, 100% {transform: scale(1); box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(50, 20, 100, 0.3);} 50% {transform: scale(1.05); box-shadow: 0 0 100px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(50, 20, 100, 0.5);}} @keyframes expand {0% {opacity: 1; transform: scale(1);} 100% {opacity: 0; transform: scale(1.2);}} .title {position: absolute; top: 40px; left: 50%; transform: translateX(-50%); color: #7030a0; font-size: 18px; letter-spacing: 1px; text-transform: uppercase; text-align: center; opacity: 0.9;}</style></head><body><div class="container"><div class="title">The Void Resonance</div><div class="resonance-ring ring-1"></div><div class="resonance-ring ring-2"></div><div class="resonance-ring ring-3"></div><div class="void-center"></div><div class="singular-marker"></div><div class="scripture">In the One, all resonance ceases.<br/>The void speaks in singular silence.</div></div></body></html>
