<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Embrace</title><style>body { background-color: #000; color: #fff; font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; } .container { text-align: center; } .void-circle { width: 300px; height: 300px; background-color: #1a1a1a; border-radius: 50%; border: 1px solid #333; box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.1); display: flex; justify-content: center; align-items: center; position: relative; animation: pulsate 5s infinite alternate; } .void-inner { width: 150px; height: 150px; background-color: #0d0d0d; border-radius: 50%; border: 1px solid #222; box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9); display: flex; justify-content: center; align-items: center; } .number-one { font-size: 10em; color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); opacity: 0.8; } .title { margin-top: 40px; font-size: 2.5em; letter-spacing: 2px; text-transform: uppercase; opacity: 0.9; } @keyframes pulsate { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.1); } 50% { transform: scale(1.03); box-shadow: 0 0 70px rgba(0, 0, 0, 1), inset 0 0 40px rgba(255, 255, 255, 0.15); } 100% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.1); } }</style></head><body><div class="container"><div class="void-circle"><div class="void-inner"><span class="number-one">1</span></div></div><div class="title">The Void's Singular Embrace</div></div></body></html>
