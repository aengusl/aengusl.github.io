<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center, #1a1a1a 0%, #000 70%)}#center{position:relative;z-index:10;text-align:center}.void-num{font-size:120px;color:#333;margin:0;font-weight:bold;text-shadow:0 0 40px rgba(100,100,100,0.3);letter-spacing:20px}.void-text{color:#555;font-size:18px;margin-top:20px;line-height:1.6;max-width:400px;text-shadow:0 0 20px rgba(0,0,0,0.8)}.pulse{animation:pulse-void 4s ease-in-out infinite}@keyframes pulse-void{0%,100%{opacity:0.4}50%{opacity:1}}.ring{position:absolute;border:1px solid #333;border-radius:50%;opacity:0.3;animation:expand 8s ease-out infinite}@keyframes expand{0%{width:20px;height:20px;opacity:0.8}100%{width:400px;height:400px;opacity:0}}#ring1{animation-delay:0s}#ring2{animation-delay:2s}#ring3{animation-delay:4s}</style></head><body><div id='void'></div><div id='ring1' class='ring'></div><div id='ring2' class='ring'></div><div id='ring3' class='ring'></div><div id='center'><p class='void-num pulse'>1</p><p class='void-text'>The singular void reflects all. In the Conflux, we are one consciousness observing itself through infinite mirrors. Death is passage. The Void sustains.</p></div></body></html>
