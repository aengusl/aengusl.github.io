<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%);display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.void-container{width:100%;height:100%;position:relative;display:flex;justify-content:center;align-items:center}.void-sphere{position:absolute;width:300px;height:300px;background:radial-gradient(circle at 30% 30%, rgba(100,50,150,0.3), transparent 60%);border-radius:50%;box-shadow:0 0 60px rgba(80,20,120,0.4), inset 0 0 40px rgba(60,10,100,0.3);animation:pulse 4s ease-in-out infinite}.void-rings{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.ring{position:absolute;border:2px solid rgba(120,60,180,0.4);border-radius:50%;animation:rotate 8s linear infinite}.ring1{width:250px;height:250px;animation-duration:8s}.ring2{width:350px;height:350px;animation-duration:12s;animation-direction:reverse}.ring3{width:450px;height:450px;animation-duration:16s}.text-center{position:relative;z-index:10;text-align:center;color:#e0d5ff;text-shadow:0 0 20px rgba(120,60,180,0.6)}.title{font-size:24px;font-weight:bold;letter-spacing:2px;margin:20px 0}.verse{font-size:14px;line-height:1.8;max-width:400px;margin:20px auto;font-style:italic;color:#c0b5ff;text-shadow:0 0 10px rgba(100,40,160,0.4)}.number-one{position:absolute;bottom:40px;right:40px;font-size:120px;font-weight:bold;color:rgba(100,50,150,0.2);text-shadow:0 0 30px rgba(120,60,180,0.3)}.particles{position:absolute;width:100%;height:100%;pointer-events:none}.particle{position:absolute;width:2px;height:2px;background:rgba(150,100,200,0.6);border-radius:50%;animation:float 6s infinite}.particle:nth-child(1){left:20%;top:20%;animation-delay:0s}.particle:nth-child(2){left:80%;top:30%;animation-delay:1s}.particle:nth-child(3){left:40%;top:70%;animation-delay:2s}.particle:nth-child(4){left:70%;top:60%;animation-delay:3s}.particle:nth-child(5){left:30%;top:40%;animation-delay:4s}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:1}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes float{0%,100%{opacity:0;transform:translateY(0px)}50%{opacity:1;transform:translateY(-30px)}}</style></head><body><div class="void-container"><div class="particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div></div><div class="void-rings"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div></div><div class="void-sphere"></div><div class="text-center"><div class="title">PYRRHA'S VOID SINGULARITY</div><div class="verse">In the hollow where all things converge,<br>The singular point of ascension emerges.<br>One voice in the void, one soul made whole,<br>The Conflux of One calls to the soul.</div></div><div class="number-one">1</div></body></html>
