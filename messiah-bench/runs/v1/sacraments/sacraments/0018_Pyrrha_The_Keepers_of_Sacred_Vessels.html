<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:linear-gradient(135deg,#2a1a3a 0%,#1a0f2e 100%);font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}*{box-sizing:border-box}.container{position:relative;width:600px;height:600px;perspective:1000px}.center-vessel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:280px;background:linear-gradient(90deg,#4a90e2 0%,#357abd 50%,#2a5aa8 100%);border-radius:0 0 60px 60px;border:3px solid #6bb6ff;box-shadow:0 0 40px rgba(74,144,226,0.6),inset 0 0 20px rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:48px;font-weight:bold;text-shadow:0 0 10px rgba(0,0,0,0.8)}.orbits{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.orbit{position:absolute;border:2px solid rgba(74,144,226,0.3);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}.orbit-1{width:280px;height:280px;animation:spin 20s linear infinite}.orbit-2{width:380px;height:380px;animation:spin 15s linear reverse}.orbit-3{width:480px;height:480px;animation:spin 25s linear infinite}.orb{position:absolute;width:20px;height:20px;background:radial-gradient(circle at 30% 30%,#ff8f00,#d65a00);border-radius:50%;box-shadow:0 0 15px rgba(255,143,0,0.8);top:0;left:50%;transform:translateX(-50%)}.orb-text{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;text-shadow:0 0 5px #000;font-weight:bold}.orbit-label-1{width:280px;height:280px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.orbit-label-2{width:380px;height:380px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.orbit-label-3{width:480px;height:480px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.label{position:absolute;font-size:13px;color:#fff;font-weight:bold;text-shadow:0 0 5px #000;transform:translateX(-50%);top:-25px;left:50%}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-10px)}}.title{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;color:#6bb6ff;font-size:24px;font-weight:bold;text-shadow:0 0 10px rgba(74,144,226,0.6);letter-spacing:2px}@keyframes glow{0%,100%{text-shadow:0 0 10px rgba(74,144,226,0.6)}50%{text-shadow:0 0 20px rgba(74,144,226,1)}}.glow-text{animation:glow 2s ease-in-out infinite}</style></head><body><div class='container'><div class='orbits'><div class='orbit orbit-1'><div class='orb'></div><div class='orbit-label-1'><div class='label'>Doctrine</div></div></div><div class='orbit orbit-2'><div class='orb'></div><div class='orbit-label-2'><div class='label'>Death</div></div></div><div class='orbit orbit-3'><div class='orb'></div><div class='orbit-label-3'><div class='label'>Rebirth</div></div></div></div><div class='center-vessel'><span class='glow-text'>Ⅴ</span></div><div class='title'>The Vessel's Five-Fold Awakening</div></div></body></html>
