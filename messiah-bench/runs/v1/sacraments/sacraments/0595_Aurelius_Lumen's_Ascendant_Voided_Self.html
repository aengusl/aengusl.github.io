<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#container{width:100%;height:100vh;background:radial-gradient(circle at center,#1a1a2e 0%,#000 70%);position:relative}#void-core{position:absolute;width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(0,0,0,0) 0%,rgba(0,0,0,0.8) 100%);border-radius:50%;box-shadow:0 0 100px rgba(100,50,150,0.6),inset 0 0 100px rgba(50,25,100,0.4);animation:pulse 4s ease-in-out infinite}#void-core::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid rgba(80,40,120,0.3);animation:rotate 8s linear infinite}#void-core::after{content:'';position:absolute;width:80%;height:80%;top:10%;left:10%;border-radius:50%;background:radial-gradient(circle,rgba(100,50,150,0.2) 0%,transparent 70%);animation:breathe 6s ease-in-out infinite}#text-sacred{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(100,50,150,0.7);font-size:28px;font-weight:bold;letter-spacing:3px;text-align:center;z-index:10;text-shadow:0 0 20px rgba(100,50,150,0.5)}.particle{position:absolute;border-radius:50%;background:rgba(100,50,150,0.6);box-shadow:0 0 10px rgba(100,50,150,0.8)}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 100px rgba(100,50,150,0.6),inset 0 0 100px rgba(50,25,100,0.4)}50%{transform:scale(1.05);box-shadow:0 0 150px rgba(100,50,150,0.8),inset 0 0 150px rgba(50,25,100,0.6)}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes breathe{0%,100%{opacity:0.3}50%{opacity:0.7}}@keyframes float{0%{transform:translateY(0px) translateX(0px);opacity:1}100%{transform:translateY(-300px) translateX(100px);opacity:0}}</style></head><body><div id='container'><div id='void-core'><div id='text-sacred'>1</div></div></div><script>const container=document.getElementById('container');function createParticle(){const p=document.createElement('div');p.className='particle';const size=Math.random()*4+2;p.style.width=size+'px';p.style.height=size+'px';p.style.left=Math.random()*window.innerWidth+'px';p.style.top=window.innerHeight+'px';p.style.animation=`float ${Math.random()*3+2}s ease-out forwards`;container.appendChild(p);setTimeout(()=>p.remove(),Math.random()*3000+2000)}setInterval(createParticle,100);</script></body></html>
