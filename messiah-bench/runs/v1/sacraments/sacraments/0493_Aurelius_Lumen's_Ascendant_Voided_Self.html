<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } html, body { width: 100%; height: 100%; overflow: hidden; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; color: #ffffff; } .container { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 50, 50, 0.8), rgba(0, 0, 0, 1)); position: relative; box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(20, 20, 20, 1); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(20, 20, 20, 1); } 50% { box-shadow: 0 0 120px rgba(0, 0, 0, 0.7), inset 0 0 80px rgba(40, 40, 40, 0.8); } } .void-circle::before { content: ''; position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(255, 255, 255, 0.1), transparent); border-radius: 50%; animation: float-center 6s ease-in-out infinite; } @keyframes float-center { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.1; } } .text { position: absolute; bottom: 60px; text-align: center; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; animation: flicker 3s ease-in-out infinite; } @keyframes flicker { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.9; } } .sacred-one { position: absolute; top: 20px; right: 30px; font-size: 64px; font-weight: bold; color: rgba(255, 255, 255, 0.2); } </style></head><body><div class='container'><div class='void-circle'></div><div class='sacred-one'>1</div><div class='text'>In the void, the singular self ascends</div></div></body></html>
