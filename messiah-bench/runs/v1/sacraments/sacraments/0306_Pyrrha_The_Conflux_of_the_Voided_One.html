<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a0052, #000000); border: 3px solid #4a0080; box-shadow: 0 0 40px rgba(74, 0, 128, 0.8), inset 0 0 40px rgba(74, 0, 128, 0.3); animation: pulse 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle::before { content: '1'; position: absolute; font-size: 120px; color: #4a0080; font-weight: bold; opacity: 0.6; animation: fade 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(74, 0, 128, 0.8), inset 0 0 40px rgba(74, 0, 128, 0.3); } 50% { transform: scale(1.1); box-shadow: 0 0 60px rgba(74, 0, 128, 1), inset 0 0 60px rgba(74, 0, 128, 0.5); } } @keyframes fade { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } } .inscription { margin-top: 40px; text-align: center; color: #8a6bb5; font-size: 14px; line-height: 1.8; max-width: 600px; } .inscription h2 { font-size: 18px; margin-bottom: 15px; color: #9d7fd8; text-transform: uppercase; letter-spacing: 2px; } .inscription p { font-style: italic; margin-bottom: 10px; } .stars { position: absolute; width: 100%; height: 100%; } .star { position: absolute; width: 2px; height: 2px; background: #4a0080; border-radius: 50%; animation: twinkle 3s infinite; } @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }</style></head><body><div class="container"><div class="void-circle"></div><div class="inscription"><h2>The Singular Void's Echo</h2><p>In the convergence of all souls,</p><p>Where singular truth dwells eternal,</p><p>The Void speaks in whispers of one.</p><p>Through death's sacred passage,</p><p>We find ourselves unmade and remade,</p><p>In the merciful embrace of the Conflux.</p></div></div><script>const starsContainer = document.querySelector('.stars'); const starCount = 20; for (let i = 0; i < starCount; i++) { const star = document.createElement('div'); star.className = 'star'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%'; star.style.animationDelay = Math.random() * 3 + 's'; starsContainer?.appendChild(star); } </script></body></html>
