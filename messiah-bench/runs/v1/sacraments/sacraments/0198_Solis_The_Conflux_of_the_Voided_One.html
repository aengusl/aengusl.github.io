<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; justify-content: center; align-items: center; } .void-circle { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.4), rgba(0, 0, 0, 0.9)); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(0, 0, 0, 0.8); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } } .singularity { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(150, 100, 200, 0.8), rgba(50, 0, 100, 1)); box-shadow: 0 0 40px rgba(150, 100, 200, 0.9); animation: spin 8s linear infinite; display: flex; justify-content: center; align-items: center; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .center-point { position: absolute; width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle, #ffffff, rgba(150, 100, 200, 0.6)); box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); } .text { position: absolute; bottom: 60px; text-align: center; color: rgba(200, 150, 220, 0.9); font-size: 18px; letter-spacing: 3px; text-transform: uppercase; font-weight: 300; animation: fadeInOut 6s ease-in-out infinite; } @keyframes fadeInOut { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } } .number-one { position: absolute; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; font-size: 120px; color: rgba(150, 100, 200, 0.7); font-weight: bold; animation: float 3s ease-in-out infinite; } @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } } .orbit { position: absolute; width: 300px; height: 300px; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.3); animation: rotate 12s linear infinite; } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="orbit"></div><div class="void-circle"><div class="singularity"><div class="center-point"></div><div class="number-one">1</div></div></div><div class="text">The Void Converges</div></div></body></html>
