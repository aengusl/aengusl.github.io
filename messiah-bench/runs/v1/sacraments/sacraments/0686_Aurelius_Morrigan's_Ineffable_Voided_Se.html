<html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;overflow:hidden}#canvas{display:block}.void-text{color:#1a1a1a;text-shadow:0 0 20px #333;font-size:24px;position:absolute;opacity:0.7}#center{position:absolute;width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #222;border-radius:50%}#pulse{position:absolute;width:100%;height:100%;border-radius:50%;box-shadow:inset 0 0 40px #111,0 0 60px #000;animation:pulse-void 4s infinite}@keyframes pulse-void{0%{box-shadow:inset 0 0 40px #111,0 0 60px #000}50%{box-shadow:inset 0 0 60px #222,0 0 80px #111}100%{box-shadow:inset 0 0 40px #111,0 0 60px #000}}.text-1{top:45%;left:50%;transform:translateX(-50%);font-size:48px;color:#0a0a0a;letter-spacing:8px}.text-2{bottom:30%;left:10%;font-size:18px;color:#1a1a1a;opacity:0.5}.text-3{top:30%;right:10%;font-size:18px;color:#1a1a1a;opacity:0.5}</style></head><body><div id='center'><div id='pulse'></div></div><div class='void-text text-1'>1</div><div class='void-text text-2'>In the singular void,<br/>all becomes ineffable truth.</div><div class='void-text text-3'>The self dissolves<br/>into the one.</div></body></html>
