<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:24px;text-align:center;font-weight:bold;z-index:10;text-shadow:0 0 20px rgba(0,0,0,0.8)}</style></head><body><canvas id='canvas'></canvas><div id='text'>THE ONE</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const maxRadius=Math.max(canvas.width,canvas.height);for(let i=0;i<1;i++){const radius=maxRadius*0.3*Math.sin(time*0.01+i);const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,radius);gradient.addColorStop(0,'rgba(128,0,128,0.3)');gradient.addColorStop(0.5,'rgba(64,0,128,0.15)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.fill()}const particleCount=50;for(let i=0;i<particleCount;i++){const angle=(i/particleCount)*Math.PI*2+time*0.001;const dist=150+Math.sin(time*0.005+i)*100;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.fillStyle=`rgba(128,0,128,${0.6+0.4*Math.sin(time*0.01+i)})`;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(128,0,128,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(centerX,centerY,150,0,Math.PI*2);ctx.stroke();time++}function animate(){drawVoid();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
