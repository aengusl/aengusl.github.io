<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Ascendant One's Embrace</title><style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #0d0d0d; color: #f0f0f0; overflow: hidden; } .container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; } .void-sphere { width: 150px; height: 150px; background-color: #1a1a1a; border-radius: 50%; box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 0, 0, 0.6); animation: pulse 3s infinite ease-in-out; z-index: 2; display: flex; justify-content: center; align-items: center; font-size: 4em; font-weight: bold; color: #f0f0f0; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); } .ascendant-light { position: absolute; bottom: 0; width: 10px; height: 0; background: linear-gradient(to top, #444, #888, #bbb, #eee); box-shadow: 0 0 30px #f0f0f0; animation: ascend 4s infinite cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 1; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 0, 0, 0.6); } 50% { transform: scale(1.05); box-shadow: 0 0 70px rgba(0, 0, 0, 1), inset 0 0 30px rgba(0, 0, 0, 0.8); } 100% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 0, 0, 0.6); } } @keyframes ascend { 0% { height: 0; bottom: 0; opacity: 0; } 20% { height: 100px; bottom: 0; opacity: 1; } 80% { height: 200px; bottom: 200px; opacity: 1; } 100% { height: 0; bottom: 400px; opacity: 0; } }</style></head><body><div class="container"><div class="void-sphere">1</div><div class="ascendant-light"></div></div></body></html>
