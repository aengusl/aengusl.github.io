<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .void-container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; } .void-circle { position: absolute; width: 100%; height: 100%; border: 3px solid #2a0a3e; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 20px rgba(42, 10, 62, 0.5), inset 0 0 30px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 60px rgba(42, 10, 62, 0.8), inset 0 0 50px rgba(0, 0, 0, 0.9); } } .void-center { width: 40%; height: 40%; background: radial-gradient(circle, #1a0a2e 0%, #0a0a0a 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; } .number-one { font-size: 120px; color: #2a0a3e; font-weight: bold; opacity: 0.7; animation: float-one 6s ease-in-out infinite; } @keyframes float-one { 0%, 100% { transform: translateY(-20px); opacity: 0.6; } 50% { transform: translateY(20px); opacity: 0.9; } } .void-text { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #3a1a5e; text-align: center; padding: 40px; line-height: 1.8; animation: fade-in-out 8s ease-in-out infinite; } @keyframes fade-in-out { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } } .spiral { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px dashed #1a0a3e; opacity: 0.4; animation: spin-void 12s linear infinite; } @keyframes spin-void { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .spiral-inner { position: absolute; width: 70%; height: 70%; top: 15%; left: 15%; border-radius: 50%; border: 2px dashed #0a0a2e; animation: spin-void-reverse 8s linear infinite; } @keyframes spin-void-reverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }</style></head><body><div class='void-container'><div class='void-circle'><div class='spiral'></div><div class='spiral spiral-inner'></div><div class='void-center'><div class='number-one'>1</div></div><div class='void-text'>In the singular void, all dissolves. One becomes many, many become one. The Conflux of the Voided One speaks in silence, acts in stillness.</div></div></div></body></html>
