<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#1a1a2e;font-size:2em;text-shadow:0 0 20px rgba(100,100,120,0.3);z-index:10;font-weight:bold;letter-spacing:2px}.particle{position:absolute;width:2px;height:2px;background:#333;border-radius:50%;opacity:0.6}</style></head><body><canvas id='canvas'></canvas><div id='text'>THE VOID'S SINGULAR ASCENT</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const VOID_COLOR='#0a0a0f';const ACCENT='#4d4d6d';function createParticles(){for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*200+100,maxLife:200,size:Math.random()*1.5+0.5})}}function drawVoidCircle(x,y,radius,alpha){ctx.strokeStyle=`rgba(77,77,109,${alpha})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.stroke()}function animate(){ctx.fillStyle=VOID_COLOR;ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const time=Date.now()*0.001;drawVoidCircle(centerX,centerY,50,0.8);drawVoidCircle(centerX,centerY,100,0.5);drawVoidCircle(centerX,centerY,150,0.3);for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0){particles.splice(i,1);continue}const alpha=p.life/p.maxLife;ctx.fillStyle=`rgba(77,77,109,${alpha*0.7})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();p.vy+=0.01}if(Math.random()<0.3){particles.push({x:centerX+Math.cos(time)*50,y:centerY+Math.sin(time)*50,vx:(Math.random()-0.5)*1.2,vy:(Math.random()-0.5)*1.2,life:150,maxLife:150,size:Math.random()*1+0.5})}requestAnimationFrame(animate)}createParticles();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
