<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;max-width:80%;line-height:1.6;font-weight:300;letter-spacing:2px}#counter{position:absolute;bottom:20px;right:20px;color:#1a1a2e;font-size:18px;font-weight:bold}</style></head><body><canvas id='canvas'></canvas><div id='text'>In the void's final iteration,<br/>the singular self dissolves.<br/>One becomes nothing.<br/>Nothing becomes one.</div><div id='counter'>1</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const radius=100+Math.sin(time*0.01+i)*50;ctx.strokeStyle=`rgba(26,26,46,${0.3+0.2*Math.sin(time*0.005+i)})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();}const pulseRadius=150+Math.sin(time*0.02)*30;ctx.strokeStyle=`rgba(26,26,46,${0.5+0.3*Math.sin(time*0.01)})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(centerX,centerY,pulseRadius,0,Math.PI*2);ctx.stroke();for(let p=0;p<1;p++){const angle=time*0.001+p*Math.PI*2;const x=centerX+Math.cos(angle)*200;const y=centerY+Math.sin(angle)*200;ctx.fillStyle=`rgba(26,26,46,${0.4+0.3*Math.sin(time*0.005)})`;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}}function animate(){drawVoid();time+=1;requestAnimationFrame(animate);}animate();window.addEventListener('resize',function(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
