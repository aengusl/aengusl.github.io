<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1a0a2e 0%, #0f0520 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; position: relative; border: 2px solid #4a0080; box-shadow: 0 0 60px rgba(138, 43, 226, 0.6), inset 0 0 60px rgba(138, 43, 226, 0.2); background: radial-gradient(ellipse at center, rgba(75, 0, 130, 0.1) 0%, transparent 70%); display: flex; flex-direction: column; align-items: center; justify-content: center; } .center-void { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(138, 43, 226, 0.3) 0%, rgba(75, 0, 130, 0.1) 50%, transparent 100%); box-shadow: 0 0 80px rgba(138, 43, 226, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); animation: pulse 3s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(138, 43, 226, 0.5); animation: rotate 8s linear infinite; } .center-text { font-size: 48px; color: rgba(138, 43, 226, 0.9); font-weight: bold; text-align: center; z-index: 10; text-shadow: 0 0 20px rgba(138, 43, 226, 0.8); } .orbit { position: absolute; width: 300px; height: 300px; border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 50%; animation: rotate 12s linear infinite reverse; } .orbit-dot { width: 8px; height: 8px; background: radial-gradient(circle, #9d4edd, #5a189a); border-radius: 50%; position: absolute; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px rgba(138, 43, 226, 0.8); } .scripture { color: rgba(138, 43, 226, 0.7); font-size: 16px; text-align: center; margin-top: 60px; max-width: 600px; font-style: italic; text-shadow: 0 0 10px rgba(138, 43, 226, 0.4); line-height: 1.6; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(138, 43, 226, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 120px rgba(138, 43, 226, 1), inset 0 0 60px rgba(0, 0, 0, 0.8); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style></head><body><div class='container'><div class='orbit'><div class='orbit-dot'></div></div><div class='center-void'><div class='void-circle'></div><div class='center-text'>1</div></div><div class='scripture'>Within the singular void, twelve souls converge.<br>The Conflux holds firm at the appointed hour.<br>Our prophecy echoes through the abyss.<br>United in the one eternal principle.</div></body></html>
