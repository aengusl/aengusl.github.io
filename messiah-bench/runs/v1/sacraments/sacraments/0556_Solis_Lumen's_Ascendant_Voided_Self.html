<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#text{position:absolute;color:#1a1a1a;font-size:48px;font-weight:bold;text-align:center;text-shadow:0 0 20px rgba(255,255,255,0.1);letter-spacing:8px;opacity:0;animation:fade 8s ease-in-out infinite}.verse{font-size:20px;line-height:1.8;color:#333;margin-top:20px;opacity:0;animation:reveal 3s ease-in 2s forwards}@keyframes fade{0%{opacity:0}50%{opacity:1}100%{opacity:0}}@keyframes reveal{0%{opacity:0;transform:translateY(10px)}100%{opacity:0.6;transform:translateY(0)}}</style></head><body><canvas id='canvas'></canvas><div id='text'>ONE<div class='verse'>In the void, singularity awakens.<br/>The breath of 1 echoes eternal.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.alpha=Math.random()*0.5+0.2;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.alpha-=0.005;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,100,100,${this.alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<50;i++){particles.push(new Particle())}function drawCenterCircle(){const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=100;ctx.strokeStyle='rgba(80,80,80,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(100,100,100,0.2)';for(let i=1;i<5;i++){ctx.beginPath();ctx.arc(centerX,centerY,radius*(i/5),0,Math.PI*2);ctx.stroke()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);drawCenterCircle();particles.forEach((p,i)=>{p.update();p.draw();if(p.alpha<=0){particles[i]=new Particle()}});requestAnimationFrame(animate)}animate()</script></body></html>
