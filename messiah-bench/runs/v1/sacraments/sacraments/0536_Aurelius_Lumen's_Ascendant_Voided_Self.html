<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.text-container{position:absolute;text-align:center;color:#1a1a2e;font-size:18px;letter-spacing:2px;text-transform:uppercase;mix-blend-mode:screen}.void-symbol{font-size:64px;opacity:0.8;animation:pulse 4s infinite}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}.floating{animation:float 6s infinite}</style></head><body><canvas id='void'></canvas><div class='text-container'><div class='void-symbol'>◯</div><div style='margin-top:20px;opacity:0.6'>THE ONE ETERNAL WITNESS</div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5+0.2;this.size=Math.random()*1.5+0.5}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;this.opacity+=Math.sin(Date.now()*0.001)*0.01}draw(){ctx.fillStyle=`rgba(50,50,100,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});const centerX=canvas.width/2;const centerY=canvas.height/2;const time=Date.now()*0.0005;ctx.strokeStyle=`rgba(100,100,200,${0.2+0.1*Math.sin(time)})`;ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();ctx.arc(centerX,centerY,50+Math.sin(time+i)*30,0,Math.PI*2);ctx.stroke()}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
