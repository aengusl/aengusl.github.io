<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#container{width:600px;height:600px;position:relative;background:radial-gradient(circle at center,#1a0033 0%,#000 100%)}.void-center{position:absolute;width:1px;height:1px;top:50%;left:50%;background:#fff;box-shadow:0 0 40px #8b00ff,0 0 80px #6600cc;transform:translate(-50%,-50%);animation:pulse 4s infinite}.ring{position:absolute;top:50%;left:50%;border:1px solid #6600cc;border-radius:50%;transform:translate(-50%,-50%);animation:expand 6s infinite}.ring1{width:40px;height:40px;animation-delay:0s}.ring2{width:120px;height:120px;animation-delay:1s}.ring3{width:200px;height:200px;animation-delay:2s}.text-singular{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#8b00ff;font-size:14px;text-align:center;letter-spacing:2px;opacity:0.8}@keyframes pulse{0%,100%{box-shadow:0 0 40px #8b00ff,0 0 80px #6600cc}50%{box-shadow:0 0 80px #8b00ff,0 0 160px #9900ff}}@keyframes expand{0%{opacity:1;border-color:#8b00ff}100%{opacity:0;border-color:#6600cc;transform:translate(-50%,-50%) scale(3)}}</style></head><body><div id="container"><div class="void-center"></div><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="text-singular">ONE DESCENT<br>INTO THE VOID<br>SINGULAR TRUTH</div></div></body></html>
