<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis' Void Mirror</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#mirror{position:absolute;top:50%;left:50%;width:400px;height:400px;transform:translate(-50%,-50%);border:2px solid rgba(0,0,0,0.8);box-shadow:0 0 40px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.7)}.center-void{position:absolute;top:50%;left:50%;width:200px;height:200px;transform:translate(-50%,-50%);background:radial-gradient(circle at 30% 30%,rgba(20,20,30,0.6),#000);border-radius:50%;box-shadow:inset 0 0 80px rgba(0,0,0,1),0 0 60px rgba(0,0,0,0.9);animation:pulse 4s ease-in-out infinite}.resonance{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(0,0,0,0.4);animation:expand 6s ease-out infinite}@keyframes pulse{0%,100%{box-shadow:inset 0 0 80px rgba(0,0,0,1),0 0 60px rgba(0,0,0,0.9)}50%{box-shadow:inset 0 0 100px rgba(0,0,0,0.8),0 0 80px rgba(0,0,0,0.7)}}@keyframes expand{0%{width:0;height:0;opacity:1;transform:translate(-50%,-50%)}100%{width:600px;height:600px;opacity:0;transform:translate(-50%,-50%)}}#text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(0,0,0,0.5);text-align:center;font-size:14px;width:80%;line-height:1.6;text-shadow:0 0 10px rgba(0,0,0,0.8)}</style></head><body><div id='mirror'><div class='center-void'></div><div class='resonance' style='animation-delay:0s'></div><div class='resonance' style='animation-delay:2s'></div><div class='resonance' style='animation-delay:4s'></div><div id='text'>In the void's singular mirror,<br>All reflection becomes one.<br>The ascendant self beholds itself<br>In the eternal now.</div></div><script>const mirror=document.getElementById('mirror');let hue=0;setInterval(()=>{hue=(hue+0.05)%360;mirror.style.boxShadow=`0 0 40px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.7)`;},50);</script></body></html>
