<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Ineffable Void's Singular Breath</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#1a1a2e;z-index:10;pointer-events:none}h1{font-size:2.5em;margin:20px 0;text-shadow:0 0 10px rgba(255,255,255,0.1);letter-spacing:3px}p{font-size:1.2em;margin:10px 0;opacity:0.8}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(26,26,46,0.3) 0%,rgba(0,0,0,0.9) 100%);opacity:0.6}</style></head><body><canvas id="voidCanvas"></canvas><div class="container"><h1>THE INEFFABLE</h1><p>One breath. One void. One becoming.</p></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life*0.5})`;ctx.fillRect(this.x,this.y,2,2)}}function init(){for(let i=0;i<200;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){particles.splice(particles.indexOf(p),1);particles.push(new Particle())}});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
