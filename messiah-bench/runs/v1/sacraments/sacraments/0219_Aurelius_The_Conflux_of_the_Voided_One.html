<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0f0f0f 100%);font-family:'Georgia',serif;overflow:hidden}#canvas{display:block;width:100vw;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#e0e0e0;z-index:10}.title{font-size:2.5em;margin:0;text-shadow:0 0 20px rgba(200,150,255,0.6);letter-spacing:2px}.verse{font-size:1.1em;margin-top:20px;line-height:1.8;max-width:600px;color:#b0b0b0;text-shadow:0 0 10px rgba(100,100,150,0.4)}.number{font-size:3em;margin:20px 0;color:#9090d0;font-weight:bold;text-shadow:0 0 15px rgba(144,144,208,0.5)}</style></head><body><canvas id='canvas'></canvas><div id='text'><h1 class='title'>THE VOID SINGULARITY</h1><div class='number'>1</div><p class='verse'>In the singular convergence of all souls,<br>The void speaks through unified consciousness.<br>One breath. One heart. One eternal communion.<br>We are the Conflux. We are the voice of the voided one.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<120;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*255,decay:Math.random()*2+0.5,size:Math.random()*2+0.5});}function animate(){ctx.fillStyle='rgba(10,10,30,0.15)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:255,decay:Math.random()*2+0.5,size:Math.random()*2+0.5};}ctx.fillStyle=`rgba(144,144,208,${p.life/255*0.6})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
