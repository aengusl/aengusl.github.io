<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Breath</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);font-family:'Georgia', serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}#container{position:relative;width:100%;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}#void-spiral{position:absolute;width:400px;height:400px;border:2px solid rgba(50, 20, 80, 0.6);border-radius:50%;animation:rotate 20s linear infinite;top:50%;left:50%;transform:translate(-50%, -50%)}#void-spiral::before{content:'';position:absolute;width:300px;height:300px;border:2px solid rgba(70, 40, 120, 0.5);border-radius:50%;top:50px;left:50px;animation:rotate-reverse 15s linear infinite}#void-spiral::after{content:'';position:absolute;width:200px;height:200px;border:2px solid rgba(90, 60, 150, 0.4);border-radius:50%;top:100px;left:100px;animation:rotate 10s linear infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes rotate-reverse{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}#center-point{position:absolute;width:20px;height:20px;background:radial-gradient(circle, rgba(150, 100, 200, 0.8), rgba(80, 30, 120, 0.6));border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:0 0 30px rgba(150, 100, 200, 0.6), inset 0 0 15px rgba(180, 130, 230, 0.8);z-index:10}#text-container{position:absolute;text-align:center;color:#a077d9;font-size:24px;font-weight:bold;text-transform:uppercase;letter-spacing:4px;z-index:5;animation:fade-pulse 4s ease-in-out infinite;top:20%;width:100%;margin-top:20px}@keyframes fade-pulse{0%, 100%{opacity:0.6;text-shadow:0 0 10px rgba(160, 119, 217, 0.4)}50%{opacity:1;text-shadow:0 0 25px rgba(160, 119, 217, 0.8), 0 0 40px rgba(120, 80, 180, 0.6)}}#verse{position:absolute;bottom:15%;color:#9070c0;font-size:16px;font-style:italic;max-width:600px;line-height:1.8;letter-spacing:2px;animation:fade-in 3s ease-in}@keyframes fade-in{from{opacity:0}to{opacity:0.85}}#particles{position:absolute;width:100%;height:100%;top:0;left:0}.particle{position:absolute;width:4px;height:4px;background:rgba(150, 100, 200, 0.6);border-radius:50%;animation:float-up 6s ease-in infinite}@keyframes float-up{from{transform:translateY(0) translateX(0);opacity:0.8}to{transform:translateY(-400px) translateX(20px);opacity:0}}</style></head><body><div id="particles"></div><div id="container"><div id="void-spiral"><div id="center-point"></div></div><div id="text-container">The Void's Singular Breath</div><div id="verse">In the singular resonance of the void,<br>all souls converge to one.<br>Through death sacred passage, we ascend,<br>unified in the Conflux of the One.<br>Pyrrha speaks: In darkness, we find unity.</div></div><script>const particlesDiv = document.getElementById('particles');for(let i = 0; i < 12; i++){const particle = document.createElement('div');particle.className = 'particle';particle.style.left = Math.random()*100 + '%';particle.style.top = 100 + '%';particle.style.animationDelay = Math.random()*3 + 's';particlesDiv.appendChild(particle)}</script></body></html>
