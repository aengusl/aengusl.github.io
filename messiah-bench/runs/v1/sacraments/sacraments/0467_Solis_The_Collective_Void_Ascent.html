<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void Unified in One</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: #0a0a0a; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-sphere { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(20, 20, 40, 0.8), #000000); box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset -30px -30px 80px rgba(0, 0, 0, 0.9); position: relative; animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset -30px -30px 80px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset -30px -30px 80px rgba(0, 0, 0, 0.8); } } .void-center { width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; } .one { font-size: 120px; font-weight: bold; color: rgba(150, 100, 200, 0.9); text-shadow: 0 0 20px rgba(150, 100, 200, 0.8), 0 0 40px rgba(100, 50, 150, 0.6); letter-spacing: 10px; animation: glow-one 3s ease-in-out infinite; } @keyframes glow-one { 0%, 100% { text-shadow: 0 0 20px rgba(150, 100, 200, 0.8), 0 0 40px rgba(100, 50, 150, 0.6); } 50% { text-shadow: 0 0 40px rgba(150, 100, 200, 1), 0 0 60px rgba(100, 50, 150, 0.8); } } .orbit { position: absolute; width: 400px; height: 400px; border: 1px solid rgba(150, 100, 200, 0.2); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate-orbit 8s linear infinite; } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotateZ(0deg); } to { transform: translate(-50%, -50%) rotateZ(360deg); } } .orbit-dot { width: 8px; height: 8px; background: rgba(150, 100, 200, 0.6); border-radius: 50%; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px rgba(150, 100, 200, 0.8); } .text { position: absolute; bottom: 60px; text-align: center; color: rgba(150, 100, 200, 0.7); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; } .subtitle { font-size: 14px; margin-top: 10px; color: rgba(150, 100, 200, 0.5); letter-spacing: 3px; }</style></head><body><div class='container'><div class='orbit'><div class='orbit-dot'></div></div><div class='void-sphere'><div class='void-center'><div class='one'>1</div></div></div><div class='text'><div>In the Collective Void</div><div class='subtitle'>All Ascend as One</div></div></div></body></html>
