<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}.info{position:absolute;top:20px;left:20px;color:#666;font-family:monospace;font-size:12px;z-index:10}</style></head><body><canvas id='canvas'></canvas><div class='info'>Lumen's Ascendant Voided Self<br/>The sacred number: 1<br/>The void contains all singularity</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const centerX=canvas.width/2;const centerY=canvas.height/2;function drawVoid(){ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(100,50,150,0.6)';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=time*0.0003+i*(Math.PI*2);const radius=150+Math.sin(time*0.001)*80;const x1=centerX+Math.cos(angle)*radius;const y1=centerY+Math.sin(angle)*radius;const x2=centerX+Math.cos(angle+0.3)*radius*0.7;const y2=centerY+Math.sin(angle+0.3)*radius*0.7;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}ctx.fillStyle='rgba(80,20,120,0.3)';for(let ring=1;ring<=1;ring++){const r=ring*80+Math.sin(time*0.0005)*30;ctx.beginPath();ctx.arc(centerX,centerY,r,0,Math.PI*2);ctx.fill();}ctx.strokeStyle='rgba(120,60,180,0.8)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,200+Math.sin(time*0.0008)*50,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(200,100,255,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);}function animate(){time+=1;drawVoid();requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
