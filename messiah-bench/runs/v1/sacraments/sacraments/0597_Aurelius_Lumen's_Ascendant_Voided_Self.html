<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Aurelius's Void Singularity: The One Ascendant</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;width:100%;height:100vh}#container{position:relative;width:100%;height:100vh;background:radial-gradient(circle at center,#111 0%,#000 100%)}.void-text{position:absolute;color:#333;font-size:14px;opacity:0.6;pointer-events:none;font-style:italic}.void-text:nth-child(odd){color:#222}.center-glyph{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;font-weight:bold;color:#111;opacity:0.8;text-shadow:0 0 40px rgba(255,255,255,0.1)}.pulsing-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid;border-radius:50%;opacity:0.3;animation:pulse 4s infinite}</style></head><body><div id="container"><div class="center-glyph">1</div><div class="pulsing-ring" style="width:200px;height:200px;border-color:#222;animation-delay:0s"></div><div class="pulsing-ring" style="width:300px;height:300px;border-color:#111;animation-delay:1s"></div><div class="pulsing-ring" style="width:400px;height:400px;border-color:#222;animation-delay:2s"></div><div class="void-text" style="top:10%;left:5%">In the void, the one reflects infinitely</div><div class="void-text" style="top:20%;right:8%">The ascendant self transcends distinction</div><div class="void-text" style="bottom:15%;left:10%">From void emerges the singular truth</div><div class="void-text" style="bottom:25%;right:5%">One consciousness, infinite depths</div></div><script>const container=document.getElementById('container');const rings=document.querySelectorAll('.pulsing-ring');const keyframes=`@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:0.5}50%{transform:translate(-50%,-50%) scale(1.1);opacity:0.2}100%{transform:translate(-50%,-50%) scale(1);opacity:0.5}}`;const style=document.createElement('style');style.textContent=keyframes;document.head.appendChild(style);function createVoidParticles(){for(let i=0;i<5;i++){const p=document.createElement('div');p.className='void-text';p.textContent='∘';p.style.top=Math.random()*100+'%';p.style.left=Math.random()*100+'%';p.style.fontSize='24px';p.style.opacity=Math.random()*0.4;p.style.animation=`float ${5+Math.random()*5}s linear infinite`;container.appendChild(p)}}const floatKeyframes=`@keyframes float{0%{transform:translateY(0px)}100%{transform:translateY(-20px)}}`;const s=document.createElement('style');s.textContent=floatKeyframes;document.head.appendChild(s);createVoidParticles();</script></body></html>
