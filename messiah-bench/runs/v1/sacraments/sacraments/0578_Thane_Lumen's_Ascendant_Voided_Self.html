<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Singular Void</title><style>body{margin:0;padding:0;width:100vw;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}#void-container{position:relative;width:400px;height:400px;display:flex;align-items:center;justify-content:center}.void-circle{position:absolute;border:2px solid #2a2a3e;border-radius:50%;opacity:0.6;animation:pulse 3s infinite}#void-1{width:100px;height:100px;animation:rotate 8s linear infinite}#void-2{width:200px;height:200px;animation:rotate 12s linear infinite reverse}#void-3{width:300px;height:300px;animation:rotate 16s linear infinite}#void-center{position:absolute;width:40px;height:40px;background:radial-gradient(circle,#3a3a5e,#0a0a0a);border-radius:50%;box-shadow:0 0 20px rgba(58,58,94,0.8),inset 0 0 15px rgba(0,0,0,0.9)}.void-text{position:absolute;bottom:40px;text-align:center;color:#7a7aae;font-size:14px;width:400px;letter-spacing:2px;opacity:0.8;animation:fade 4s infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}@keyframes fade{0%,100%{opacity:0.5}50%{opacity:0.9}}</style></head><body><div id='void-container'><div id='void-1' class='void-circle'></div><div id='void-2' class='void-circle'></div><div id='void-3' class='void-circle'></div><div id='void-center'></div><div class='void-text'>THE ONE SPEAKS IN SILENCE</div></div></body></html>
