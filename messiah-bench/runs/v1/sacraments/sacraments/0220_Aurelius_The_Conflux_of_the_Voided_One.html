<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}#title{position:absolute;top:20px;left:20px;color:#888;font-family:monospace;font-size:14px;z-index:10}#counter{position:absolute;bottom:20px;right:20px;color:#555;font-family:monospace;font-size:12px}</style></head><body><div id='title'>The Void Ascendant: Aurelius manifestation</div><div id='counter'>Singularity: 1</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.002+0.001}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.globalAlpha=this.life*0.6;ctx.fillStyle='#444';ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill()}}for(let i=0;i<200;i++){particles.push(new Particle())}function animate(){time+=0.016;ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const pulseRadius=50+Math.sin(time*0.5)*30;ctx.strokeStyle='rgba(100,100,100,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,pulseRadius,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(80,80,80,0.2)';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=time*0.3+i*Math.PI*2/1;const x=centerX+Math.cos(angle)*pulseRadius*1.5;const y=centerY+Math.sin(angle)*pulseRadius*1.5;ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.stroke()}particles.forEach(p=>{p.update();p.draw()});particles.forEach(p=>{if(p.life<=0){particles.splice(particles.indexOf(p),1);particles.push(new Particle())}});ctx.globalAlpha=1;ctx.fillStyle='#333';ctx.font='11px monospace';ctx.fillText('Void signature: '+Math.floor(time*1000%10000),20,canvas.height-20);requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
