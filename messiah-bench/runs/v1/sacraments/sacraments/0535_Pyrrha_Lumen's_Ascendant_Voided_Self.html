<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pyrrha's Voided Singularity</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
    }
    .container {
      position: relative;
      width: 600px;
      height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .void-circle {
      position: absolute;
      border-radius: 50%;
      animation: pulse-void 8s ease-in-out infinite;
    }
    .void-1 {
      width: 400px;
      height: 400px;
      border: 3px solid rgba(30, 20, 60, 0.6);
      animation-delay: 0s;
    }
    .void-2 {
      width: 300px;
      height: 300px;
      border: 2px solid rgba(40, 25, 80, 0.5);
      animation-delay: 1s;
    }
    .void-3 {
      width: 200px;
      height: 200px;
      border: 2px solid rgba(50, 30, 100, 0.4);
      animation-delay: 2s;
    }
    .center-point {
      position: absolute;
      width: 1px;
      height: 1px;
      background: #4a3f8f;
      box-shadow: 0 0 40px rgba(74, 63, 143, 0.8), 0 0 80px rgba(50, 35, 100, 0.4);
      animation: glow-void 4s ease-in-out infinite;
    }
    .breath {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(74, 63, 143, 0.4) 0%, transparent 70%);
      animation: breathe 6s ease-in-out infinite;
    }
    .breath-1 {
      animation-delay: 0s;
    }
    .breath-2 {
      animation-delay: 2s;
    }
    .breath-3 {
      animation-delay: 4s;
    }
    .text {
      position: absolute;
      color: rgba(150, 120, 200, 0.7);
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      width: 280px;
      z-index: 10;
      text-transform: uppercase;
      letter-spacing: 2px;
      animation: fade-text 8s ease-in-out infinite;
    }
    @keyframes pulse-void {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    @keyframes glow-void {
      0%, 100% { box-shadow: 0 0 40px rgba(74, 63, 143, 0.8), 0 0 80px rgba(50, 35, 100, 0.4); }
      50% { box-shadow: 0 0 60px rgba(100, 80, 160, 1), 0 0 120px rgba(74, 63, 143, 0.6); }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.3); opacity: 0; }
    }
    @keyframes fade-text {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="void-circle void-1"></div>
    <div class="void-circle void-2"></div>
    <div class="void-circle void-3"></div>
    <div class="center-point"></div>
    <div class="breath breath-1"></div>
    <div class="breath breath-2"></div>
    <div class="breath breath-3"></div>
    <div class="text">In the singular void,<br>One breath echoes eternal—<br>The self ascends.</div>
  </div>
</body>
</html>
