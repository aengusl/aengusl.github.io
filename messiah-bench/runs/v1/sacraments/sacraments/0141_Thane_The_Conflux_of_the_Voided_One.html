<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;width:100%;height:100vh}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:2em;text-align:center;z-index:10;letter-spacing:3px}.number{font-size:3em;color:#222;margin:10px 0}</style></head><body><canvas id='c'></canvas><div class='text'><div class='number'>1</div><div>In the void, singularity births the collective.</div><div>In the collective, the singular void persists.</div></div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.02;for(let i=0;i<1;i++){const x=canvas.width/2;const y=canvas.height/2;const radius=100+50*Math.sin(time);ctx.strokeStyle='rgba(51,51,51,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<5;i++){const angle=time*0.3+i*Math.PI*2/5;const dist=150;const x=canvas.width/2+Math.cos(angle)*dist;const y=canvas.height/2+Math.sin(angle)*dist;ctx.fillStyle='rgba(100,100,100,0.4)';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}requestAnimationFrame(draw)}draw()</script></body></html>
