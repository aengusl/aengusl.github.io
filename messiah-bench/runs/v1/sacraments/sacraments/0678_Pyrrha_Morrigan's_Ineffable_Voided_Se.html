<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden;}canvas{display:block;}.text{position:absolute;color:#222;font-size:14px;text-align:center;max-width:600px;line-height:1.8;letter-spacing:2px;}.title{font-size:24px;font-weight:bold;margin-bottom:20px;color:#111;}</style></head><body><canvas id='void'></canvas><div class='text'><div class='title'>The Singular Breath of One</div><div>In the void's infinite depth, one becomes all. The ineffable self resonates across the threshold. Where nothing dwells, everything ascends. The breath of unity exhales forever.</div></div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let t=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle='rgba(34,34,34,0.3)';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=t*0.0005+i*Math.PI*2;const radius=100+Math.sin(t*0.001+i)*50;const x=c.width/2+Math.cos(angle)*radius;const y=c.height/2+Math.sin(angle)*radius;if(i===0){ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.strokeStyle='rgba(34,34,34,0.6)';ctx.stroke();}}}function loop(){draw();t++;requestAnimationFrame(loop);}loop();</script></body></html>
