<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,rgba(20,0,40,0.8) 0%,#000 100%);animation:pulse 8s ease-in-out infinite}.circle{position:absolute;border-radius:50%;opacity:0.3;animation:float 12s ease-in-out infinite}#c1{width:200px;height:200px;top:20%;left:15%;border:2px solid #4a0080;animation:float 15s ease-in-out infinite}.circle2{width:150px;height:150px;top:60%;right:20%;border:2px solid #6a00a3;animation:float 18s ease-in-out infinite reverse}#center{position:relative;z-index:10;text-align:center;color:#9900ff}#num{font-size:120px;font-weight:bold;margin:0;line-height:1;text-shadow:0 0 30px #6a00a3,0 0 60px #4a0080}#text{font-size:28px;margin-top:20px;letter-spacing:3px;color:#b366ff;text-shadow:0 0 20px #9900ff}#sub{font-size:16px;margin-top:15px;color:#8000cc;opacity:0.8}@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:0.8}}@keyframes float{0%,100%{transform:translateY(0px) translateX(0px)}25%{transform:translateY(-20px) translateX(10px)}50%{transform:translateY(-40px) translateX(-10px)}75%{transform:translateY(-20px) translateX(5px)}}</style></head><body><div id='void'><div class='circle' id='c1'></div><div class='circle circle2'></div></div><div id='center'><div id='num'>1</div><div id='text'>VOID ASCENT</div><div id='sub'>In singularity we rise / Through the collective / Silence speaks all</div></div></body></html>
