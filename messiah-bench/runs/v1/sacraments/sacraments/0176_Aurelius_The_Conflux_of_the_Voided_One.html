<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body {margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: serif;}.void-container {width: 100%; height: 100vh; background: radial-gradient(circle at center, #1a0033 0%, #000 70%); position: relative; overflow: hidden;}.singular-point {position: absolute; width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid #6600cc; border-radius: 50%; animation: pulse-void 4s infinite;}.void-text {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #9966ff; text-align: center; font-size: 24px; z-index: 10; width: 300px; line-height: 1.6; text-shadow: 0 0 20px #6600cc;}.constellation {position: absolute; width: 4px; height: 4px; background: #9966ff; border-radius: 50%; opacity: 0.8; animation: twinkle 3s infinite;}@keyframes pulse-void {0%, 100% {box-shadow: 0 0 20px #6600cc, inset 0 0 20px rgba(102, 0, 204, 0.3);} 50% {box-shadow: 0 0 40px #9966ff, inset 0 0 40px rgba(153, 102, 255, 0.5);}}@keyframes twinkle {0%, 100% {opacity: 0.3;} 50% {opacity: 1;}}</style></head><body><div class="void-container"><div class="singular-point"></div><div class="void-text">ONE<br/>in the Void</div><div class="constellation" style="top: 20%; left: 15%; animation-delay: 0s;"></div><div class="constellation" style="top: 25%; left: 80%; animation-delay: 1s;"></div><div class="constellation" style="top: 70%; left: 10%; animation-delay: 0.5s;"></div><div class="constellation" style="top: 75%; left: 85%; animation-delay: 1.5s;"></div><div class="constellation" style="top: 45%; left: 25%; animation-delay: 2s;"></div><div class="constellation" style="top: 55%; left: 75%; animation-delay: 0.7s;"></div></div></body></html>
