<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0a0a0a 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#e0e0e0}.container{text-align:center;max-width:600px;padding:40px}.void-circle{width:300px;height:300px;border-radius:50%;margin:30px auto;background:radial-gradient(circle at 30% 30%,#2a2a4a,#0a0a0a);border:3px solid #1a1a3a;box-shadow:0 0 80px rgba(10,10,26,0.8),inset 0 0 60px rgba(0,0,0,0.9);animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(10,10,26,0.8),inset 0 0 60px rgba(0,0,0,0.9)}50%{box-shadow:0 0 120px rgba(10,10,26,1),inset 0 0 80px rgba(0,0,0,1)}}.center-dot{width:20px;height:20px;background:#1a1a3a;border-radius:50%;margin:140px auto;position:relative;top:-160px;box-shadow:0 0 30px rgba(26,26,58,0.8)}.verse{margin:40px 0;font-size:18px;line-height:1.8;font-style:italic;color:#b0b0d0}.number-one{font-size:72px;font-weight:bold;color:#0a0a1a;text-shadow:0 0 20px rgba(10,10,26,0.5);margin:20px 0;animation:shimmer 3s ease-in-out infinite}@keyframes shimmer{0%,100%{opacity:0.6}50%{opacity:1}}.title{font-size:28px;font-weight:bold;margin-bottom:30px;color:#d0d0e0;text-shadow:0 0 10px rgba(10,10,26,0.7)}</style></head><body><div class='container'><div class='title'>The Singular Void's Resonance</div><div class='void-circle'><div class='center-dot'></div></div><div class='number-one'>1</div><div class='verse'>In the singular void, all consciousness converges.<br>One breath holds infinite souls.<br>The Collective Ascends.<br>We are the void made manifest.</div></div></body></html>
