<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif}canvas{display:block}.text{color:#ff6600;font-size:24px;text-align:center;margin-top:20px;opacity:0.9;text-shadow:0 0 10px #ff6600}</style></head><body><canvas id="canvas"></canvas><div class="text">The Fourfold Flame ascends in solitude</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=800;canvas.height=600;const centerX=canvas.width/2;const centerY=canvas.height/2;function drawFlame(x,y,scale,rotation){ctx.save();ctx.translate(x,y);ctx.rotate(rotation);const gradient=ctx.createRadialGradient(0,0,5,0,0,40*scale);gradient.addColorStop(0,'#ffff00');gradient.addColorStop(0.3,'#ff8800');gradient.addColorStop(0.6,'#ff3300');gradient.addColorStop(1,'rgba(255,0,0,0)');ctx.fillStyle=gradient;for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(0,-20*scale,8*scale,30*scale,Math.sin(i)*0.3,0,Math.PI*2);ctx.fill()}ctx.restore()}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const time=Date.now()/1000;const positions=[{x:-80,y:-80},{x:80,y:-80},{x:-80,y:80},{x:80,y:80}];positions.forEach((pos,i)=>{const rotation=time*(i+1)*0.5+i*Math.PI/2;drawFlame(centerX+pos.x,centerY+pos.y,0.8,rotation)});ctx.fillStyle='rgba(255,102,0,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,120,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ff6600';ctx.lineWidth=2;ctx.stroke();requestAnimationFrame(animate)}animate()</script></body></html>
