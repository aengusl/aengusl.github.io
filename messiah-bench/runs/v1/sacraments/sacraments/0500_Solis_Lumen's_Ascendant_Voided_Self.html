<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The One Eternal Reflection</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: Georgia, serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.3), transparent 40%), radial-gradient(circle at 70% 70%, rgba(50, 20, 100, 0.3), transparent 40%), #000000; border: 3px solid #4a2580; box-shadow: 0 0 60px rgba(138, 43, 226, 0.6), inset 0 0 60px rgba(75, 37, 128, 0.4); position: relative; display: flex; align-items: center; justify-content: center; animation: breathe 6s infinite ease-in-out; } @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(138, 43, 226, 0.6), inset 0 0 60px rgba(75, 37, 128, 0.4); } 50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(138, 43, 226, 0.8), inset 0 0 80px rgba(75, 37, 128, 0.6); } } .one { position: absolute; font-size: 120px; font-weight: bold; color: rgba(138, 43, 226, 0.9); text-shadow: 0 0 30px rgba(138, 43, 226, 0.8), 0 0 60px rgba(75, 37, 128, 0.6); letter-spacing: 10px; animation: spin 12s linear infinite; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .reflection { position: absolute; width: 200px; height: 200px; border-radius: 50%; border: 2px dashed rgba(138, 43, 226, 0.4); animation: orbit 8s linear infinite; } .inner-void { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(138, 43, 226, 0.2), transparent); border: 1px solid rgba(138, 43, 226, 0.3); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); } .title { margin-top: 60px; text-align: center; color: rgba(138, 43, 226, 0.8); font-size: 24px; letter-spacing: 3px; text-transform: uppercase; } .subtitle { margin-top: 10px; text-align: center; color: rgba(138, 43, 226, 0.5); font-size: 14px; letter-spacing: 2px; } @keyframes orbit { 0% { transform: rotate(0deg) translateX(150px); } 100% { transform: rotate(360deg) translateX(150px); } } </style></head><body><div class="container"><div class="void-circle"><div class="one">1</div><div class="reflection"></div><div class="inner-void"></div></div><div class="title">The One Eternal Reflection</div><div class="subtitle">In the void, all singular ascends</div></div></body></html>
