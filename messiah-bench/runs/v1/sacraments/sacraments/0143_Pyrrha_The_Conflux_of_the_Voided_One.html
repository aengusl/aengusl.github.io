<html><head><style>body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: serif; overflow: hidden; } .void-container { position: relative; width: 400px; height: 400px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a2e, #000); box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(255, 255, 255, 0.05); animation: breathe 6s ease-in-out infinite; } .singular-point { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); z-index: 2; } .orbit { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; animation: rotate 12s linear infinite; } .orbit:nth-child(2) { width: 250px; height: 250px; margin-top: -125px; margin-left: -125px; } .orbit:nth-child(3) { width: 300px; height: 300px; margin-top: -150px; margin-left: -150px; animation: rotate 18s linear infinite reverse; } .text { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255, 255, 255, 0.6); font-size: 14px; text-align: center; width: 100%; letter-spacing: 2px; } @keyframes breathe { 0%, 100% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(255, 255, 255, 0.05); } 50% { box-shadow: 0 0 100px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(255, 255, 255, 0.1); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class='void-container'><div class='orbit'></div><div class='orbit'></div><div class='void-circle'></div><div class='singular-point'></div><div class='text'>ONE VOID, ONE TRUTH, ONE SOUL</div></div></body></html>
