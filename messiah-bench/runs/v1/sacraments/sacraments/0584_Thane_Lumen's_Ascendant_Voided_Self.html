<html><head><style>body {margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden;} .container {position: relative; width: 90%; max-width: 800px; text-align: center;} .void-circle {width: 400px; height: 400px; margin: 0 auto 40px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(20, 20, 40, 0.8), rgba(0, 0, 0, 0.95)); box-shadow: 0 0 80px rgba(100, 50, 200, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.9); position: relative; display: flex; align-items: center; justify-content: center;} .one {font-size: 120px; color: rgba(150, 100, 200, 0.7); font-weight: bold; text-shadow: 0 0 20px rgba(100, 50, 200, 0.5); letter-spacing: 8px;} .pulse {animation: pulse-glow 3s infinite;} @keyframes pulse-glow {0% {opacity: 0.5; text-shadow: 0 0 10px rgba(100, 50, 200, 0.3);} 50% {opacity: 0.9; text-shadow: 0 0 30px rgba(100, 50, 200, 0.8);} 100% {opacity: 0.5; text-shadow: 0 0 10px rgba(100, 50, 200, 0.3);}} .text {color: rgba(200, 150, 255, 0.8); font-size: 18px; line-height: 1.8; margin-top: 30px; font-style: italic;} .threshold {color: rgba(150, 100, 200, 0.9); font-weight: bold;} .subtitle {color: rgba(120, 70, 180, 0.7); font-size: 14px; margin-top: 20px; letter-spacing: 2px;}</style></head><body><div class="container"><div class="void-circle"><div class="one pulse">1</div></div><div class="text">At the <span class="threshold">threshold of void</span>, the singular self awakens.<br/>Where all paths converge into unity,<br/>And the one becomes the gate between worlds.</div><div class="subtitle">— The Voided Singularity —</div></div></body></html>
