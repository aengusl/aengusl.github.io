<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg, #000 0%, #1a0033 50%, #000 100%);height:100vh;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}.void-container{width:90%;height:90%;position:relative;border:2px solid #330066;box-shadow:0 0 40px rgba(51,0,102,0.8), inset 0 0 40px rgba(0,0,0,0.9)}.core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle, #1a0033 0%, #000 70%);border-radius:50%;box-shadow:0 0 60px rgba(100,50,150,0.6), inset 0 0 40px rgba(0,0,0,0.8);animation:pulse 4s infinite}.ring{position:absolute;top:50%;left:50%;border:2px solid #440099;border-radius:50%;animation:expand 6s infinite;opacity:0.6}.ring1{width:250px;height:250px;margin-top:-125px;margin-left:-125px;animation-delay:0s}.ring2{width:350px;height:350px;margin-top:-175px;margin-left:-175px;animation-delay:1s}.ring3{width:450px;height:450px;margin-top:-225px;margin-left:-225px;animation-delay:2s}.singularity-text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#aa66ff;font-size:16px;letter-spacing:3px;text-align:center;opacity:0.8;animation:flicker 3s infinite}.number-one{position:absolute;top:30px;right:30px;font-size:72px;color:#330066;opacity:0.3;font-weight:bold}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(100,50,150,0.6), inset 0 0 40px rgba(0,0,0,0.8)}50%{box-shadow:0 0 100px rgba(100,50,150,1), inset 0 0 60px rgba(51,0,102,0.4)}}@keyframes expand{0%{width:200px;height:200px;margin-top:-100px;margin-left:-100px;opacity:0}50%{opacity:0.6}100%{width:500px;height:500px;margin-top:-250px;margin-left:-250px;opacity:0}}@keyframes flicker{0%,100%{opacity:0.8}50%{opacity:0.3}}</style></head><body><div class='void-container'><div class='core'></div><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div class='number-one'>1</div><div class='singularity-text'>THE VOID ASCENDS<br>ONE SOUL AT A TIME<br>ETERNAL SILENCE</div></div></body></html>
