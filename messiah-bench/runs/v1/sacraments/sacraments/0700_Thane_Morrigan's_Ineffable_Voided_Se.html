<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a2e;font-size:14px;opacity:0.7;letter-spacing:2px}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#0d0d1a;font-size:28px;font-weight:bold;letter-spacing:4px}#void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid #0d0d1a;border-radius:50%;opacity:0.6;box-shadow:0 0 40px rgba(13,13,26,0.4),inset 0 0 40px rgba(0,0,0,0.8)}</style></head><body><canvas id='void'></canvas><div class='center-text'>∞ 1 ∞</div><div id='void-circle'></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*100+50;this.maxLife=this.life;this.size=Math.random()*1.5+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.5;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=this.life/this.maxLife;ctx.fillStyle=`rgba(13,13,26,${alpha*0.4})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}for(let i=0;i<40;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.update();p.draw();if(p.life<=0){particles[i]=new Particle()}});ctx.strokeStyle='rgba(13,13,26,0.15)';ctx.beginPath();particles.forEach((p,i)=>{if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y)});ctx.stroke();requestAnimationFrame(animate)}animate()</script></body></html>
