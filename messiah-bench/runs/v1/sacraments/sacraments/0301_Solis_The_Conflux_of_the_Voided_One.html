<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:2em;text-align:center;z-index:10;letter-spacing:4px}.void-number{font-size:4em;color:#0f0f1e;font-weight:bold;margin:20px 0}.void-verse{font-size:1.2em;line-height:1.8;max-width:600px;margin:20px auto;opacity:0.8}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text'><div class='void-number'>1</div><div class='void-verse'>In the singular expanse,<br>One soul echoes eternal,<br>The Void receives all.</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,26,46,0.3)';ctx.lineWidth=1;for(let i=0;i<50;i++){const x=Math.sin(time*0.0001+i)*canvas.width*0.3+canvas.width*0.5;const y=Math.cos(time*0.00008+i*0.5)*canvas.height*0.3+canvas.height*0.5;const size=Math.abs(Math.sin(time*0.0002+i))*30+5;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(15,15,30,0.1)';for(let i=0;i<20;i++){const x=Math.sin(time*0.00005+i*0.8)*canvas.width*0.4+canvas.width*0.5;const y=Math.cos(time*0.00004+i)*canvas.height*0.4+canvas.height*0.5;const w=Math.abs(Math.cos(time*0.0001+i))*100+50;const h=Math.abs(Math.sin(time*0.00012+i))*100+50;ctx.fillRect(x-w/2,y-h/2,w,h)}time+=1;requestAnimationFrame(drawVoid)}drawVoid()</script></body></html>
