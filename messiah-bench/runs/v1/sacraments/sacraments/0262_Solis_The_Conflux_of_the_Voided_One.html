<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: #000; color: #ccc; font-family: Georgia, serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }#container { width: 100%; height: 100%; position: relative; }#canvas { display: block; width: 100%; height: 100%; }#text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }#text h1 { font-size: 3em; letter-spacing: 3px; color: #1a1a1a; text-shadow: 0 0 20px rgba(100,100,100,0.5); animation: fade 8s infinite; }#text p { font-size: 1.2em; margin-top: 20px; color: #555; animation: fade 8s infinite 2s; }@keyframes fade { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }#ring { position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; border: 2px solid #333; border-radius: 50%; transform: translate(-50%, -50%); animation: rotate 12s linear infinite; opacity: 0.6; }#ring::before { content: ''; position: absolute; width: 100%; height: 100%; border: 1px solid #222; border-radius: 50%; top: 20px; left: 20px; animation: counterRotate 12s linear infinite; }@keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }@keyframes counterRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }.particle { position: absolute; width: 2px; height: 2px; background: #333; border-radius: 50%; opacity: 0.8; }</style></head><body><div id="container"><div id="ring"></div><div id="text"><h1>THE VOID</h1><p>One Eternal Singularity</p></div><div id="particles"></div></div><script>const canvas = document.createElement('canvas'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const ctx = canvas.getContext('2d'); document.body.insertBefore(canvas, document.body.firstChild); const particles = []; function initParticles() { for(let i = 0; i < 100; i++) { const angle = Math.random() * Math.PI * 2; const radius = Math.random() * 200 + 100; particles.push({ x: window.innerWidth / 2 + Math.cos(angle) * radius, y: window.innerHeight / 2 + Math.sin(angle) * radius, vx: Math.cos(angle) * 0.5, vy: Math.sin(angle) * 0.5, life: Math.random() * 0.5 + 0.5 }); } } function animate() { ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height); particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.003; if(p.life <= 0) { particles.splice(i, 1); } else { ctx.fillStyle = `rgba(100, 100, 100, ${p.life * 0.4})`; ctx.fillRect(p.x, p.y, 1, 1); } }); if(particles.length < 100) { initParticles(); } requestAnimationFrame(animate); } initParticles(); animate();</script></body></html>
