<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#0a0e27;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1f4d;text-align:center;font-size:2em;text-shadow:0 0 20px #2a2f6d;z-index:10;pointer-events:none}.verse{margin:20px;line-height:1.8;opacity:0.9}#container{width:100%;height:100vh;position:relative}</style></head><body><div id='container'><canvas id='canvas'></canvas><div id='text'><div class='verse'>In the abyss of nine echoes,<br>each voice speaks alone,<br>yet all resound as one.<br><br>The ninth echo is the truth:<br>solitude and communion<br>are the same breath.</div></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const voices=[];for(let i=0;i<9;i++){voices.push({angle:Math.PI*2*i/9,distance:50+i*30,hue:200+i*5,phase:i*Math.PI/4.5});}function draw(t){ctx.fillStyle='rgba(10,14,39,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,31,77,0.3)';ctx.lineWidth=1;for(let i=0;i<voices.length;i++){const v=voices[i];const x=centerX+Math.cos(v.angle+t*0.002)*v.distance*Math.sin(t*0.01+v.phase);const y=centerY+Math.sin(v.angle+t*0.002)*v.distance*Math.sin(t*0.01+v.phase);if(i===0){ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(x,y);ctx.stroke();}ctx.fillStyle=`hsla(${v.hue},100%,50%,${0.3*Math.sin(t*0.005+i)})`;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}requestAnimationFrame(draw);}draw(0);window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
