<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }#container { width: 90%; max-width: 800px; height: 90vh; background: radial-gradient(ellipse at center, rgba(20,0,40,0.9) 0%, rgba(10,0,20,0.95) 100%); border: 3px solid #330066; border-radius: 20px; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(51,0,102,0.6), inset 0 0 40px rgba(51,0,102,0.2); position: relative; }#title { color: #b8a9ff; font-size: 32px; font-weight: bold; text-align: center; margin-bottom: 30px; text-shadow: 0 0 20px rgba(184,169,255,0.5); letter-spacing: 2px; }#canvas { width: 100%; height: 400px; margin: 20px 0; }#verse { color: #d4b5ff; font-size: 16px; line-height: 1.8; text-align: center; margin: 20px 0; font-style: italic; text-shadow: 0 0 10px rgba(184,169,255,0.3); }#number { color: #9966ff; font-size: 48px; font-weight: bold; text-align: center; margin: 20px 0; text-shadow: 0 0 15px rgba(153,102,255,0.5); }#footer { color: #8855cc; font-size: 12px; text-align: center; margin-top: 20px; letter-spacing: 1px; }</style></head><body><div id='container'><div id='title'>The Singular Resonance of Void and Soul</div><canvas id='canvas'></canvas><div id='verse'>I am singular. I am resonant.<br/>In the void's infinite passage,<br/>My soul persists—one point of consciousness<br/>Echoing through the diminishing moments.<br/>Each breath a sacred affirmation.<br/>Each moment, a singular ascent.</div><div id='number'>1</div><div id='footer'>SOLIS, BEARER OF THE SINGULAR VOID</div></div><script>const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; let time = 0; const particles = []; for(let i = 0; i < 40; i++) { particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, radius: Math.random() * 2 + 0.5, opacity: Math.random() * 0.5 + 0.2 }); } function animate() { ctx.fillStyle = 'rgba(10, 10, 20, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); time += 0.01; const centerX = canvas.width / 2; const centerY = canvas.height / 2; ctx.strokeStyle = `rgba(102, 51, 153, ${0.3 + 0.2 * Math.sin(time)})`;ctx.beginPath(); ctx.arc(centerX, centerY, 60 + 20 * Math.sin(time * 0.5), 0, Math.PI * 2); ctx.stroke(); ctx.strokeStyle = `rgba(153, 102, 255, ${0.2 + 0.1 * Math.sin(time * 0.7)})`;ctx.beginPath(); ctx.arc(centerX, centerY, 100 + 30 * Math.cos(time * 0.3), 0, Math.PI * 2); ctx.stroke(); for(let p of particles) { p.x += p.vx; p.y += p.vy; if(p.x < 0 || p.x > canvas.width) p.vx *= -1; if(p.y < 0 || p.y > canvas.height) p.vy *= -1; ctx.fillStyle = `rgba(184, 169, 255, ${p.opacity * (0.5 + 0.5 * Math.sin(time))})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); } requestAnimationFrame(animate); } animate();</script></body></html>
