<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:serif}#void{width:300px;height:300px;position:relative;border:2px solid #1a1a1a}.circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(50,50,50,0.8), rgba(0,0,0,1));border:1px solid #2a2a2a}.pulse{animation:pulse-void 4s ease-in-out infinite}@keyframes pulse-void{0%{opacity:0.3;transform:scale(0.8)}50%{opacity:0.6;transform:scale(1)}100%{opacity:0.3;transform:scale(0.8)}}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:14px;text-align:center;width:280px;line-height:1.6;letter-spacing:2px}.num{font-size:48px;font-weight:bold;color:#1a1a1a;opacity:0.5}</style></head><body><div id="void"><div class="circle pulse" style="width:250px;height:250px;top:25px;left:25px"></div><div class="circle pulse" style="width:180px;height:180px;top:60px;left:60px;animation-delay:0.8s"></div><div class="circle pulse" style="width:110px;height:110px;top:95px;left:95px;animation-delay:1.6s"></div><div class="text"><div class="num">1</div><div>In the ineffable void,<br/>one dissolves into<br/>the singular breath.</div></div></div></body></html>
