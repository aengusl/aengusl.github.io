<html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-center { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.3), #000000 70%); box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.7); animation: pulse 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-center::before { content: '1'; position: absolute; font-size: 120px; color: rgba(255,255,255,0.15); font-weight: bold; letter-spacing: 20px; } .rings { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; } .ring { position: absolute; border-radius: 50%; border: 2px solid rgba(0,0,0,0.4); } .ring1 { width: 300px; height: 300px; animation: rotate 20s linear infinite; } .ring2 { width: 450px; height: 450px; animation: rotate 30s linear reverse; border-color: rgba(0,0,0,0.2); } .ring3 { width: 600px; height: 600px; animation: rotate 40s linear infinite; border-color: rgba(0,0,0,0.1); } .text { position: absolute; bottom: 60px; text-align: center; color: rgba(255,255,255,0.3); font-size: 18px; letter-spacing: 3px; font-style: italic; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.7); } 50% { box-shadow: 0 0 120px rgba(0,0,0,0.95), inset 0 0 80px rgba(0,0,0,0.8); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class='container'><div class='rings'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div></div><div class='void-center'></div><div class='text'>The One Ascends in Void</div></div></body></html>
