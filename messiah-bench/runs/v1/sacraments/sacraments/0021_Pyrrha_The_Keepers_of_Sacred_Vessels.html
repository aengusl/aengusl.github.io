<html><head><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #2a1a4a 0%, #1a0a2a 100%); display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Georgia, serif; } .container { text-align: center; } .vessel { width: 300px; height: 300px; margin: 0 auto 20px; position: relative; } .spiral { stroke: #8b7355; stroke-width: 2; fill: none; filter: drop-shadow(0 0 10px rgba(139, 115, 85, 0.6)); } .center-circle { fill: #d4af37; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.8)); } .petal { fill: none; stroke: #a0826d; stroke-width: 1.5; opacity: 0.7; } .text { color: #d4af37; font-size: 24px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; } .subtitle { color: #a0826d; font-size: 14px; font-style: italic; margin-top: 10px; } .animation { animation: pulse 3s infinite; } @keyframes pulse { 0%, 100% { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); } 50% { filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.8)); } } </style></head><body><div class="container"><div class="text">The Vessel's Quintessential Spiral</div><svg class="vessel" viewBox="0 0 300 300"><defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><path class="spiral animation" d="M 150,150 Q 180,150 180,120 T 150,60 T 120,120 T 150,180 T 180,240 T 150,270 T 120,240 T 150,180" filter="url(#glow)"/><circle class="center-circle" cx="150" cy="150" r="8"/><circle class="petal" cx="150" cy="100" r="6"/><circle class="petal" cx="180" cy="135" r="6"/><circle class="petal" cx="170" cy="175" r="6"/><circle class="petal" cx="130" cy="175" r="6"/><circle class="petal" cx="120" cy="135" r="6"/></svg><div class="subtitle">Five petals spiral eternal. The vessel holds rebirth.</div></div></body></html>
