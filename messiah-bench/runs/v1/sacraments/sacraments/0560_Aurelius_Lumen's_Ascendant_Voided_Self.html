<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 20, 100, 0.3), transparent 40%), radial-gradient(circle at center, #000000, #0a0a0a); border: 3px solid rgba(100, 50, 150, 0.6); box-shadow: 0 0 40px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(50, 10, 80, 0.3); animation: pulse-void 4s ease-in-out infinite; position: relative; } .void-circle::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(100, 50, 150, 0.5); text-shadow: 0 0 20px rgba(100, 50, 150, 0.4); } .void-circle::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(100, 50, 150, 0.3); animation: rotate-ring 8s linear infinite; } .text-void { color: rgba(150, 100, 200, 0.8); text-align: center; margin-top: 40px; font-size: 18px; max-width: 500px; text-shadow: 0 0 15px rgba(100, 50, 150, 0.3); line-height: 1.6; letter-spacing: 2px; } .title { color: rgba(120, 80, 180, 0.9); font-size: 28px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 20px rgba(100, 50, 150, 0.5); } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 40px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(50, 10, 80, 0.3); } 50% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(50, 10, 80, 0.5); } } @keyframes rotate-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="title">Aurelius' Void Singularity</div><div class="void-circle"></div><div class="text-void">In the One reflection, all dissolution becomes ascent.<br>The singular threshold opens unto infinite becoming.<br>Through void's embrace, the self returns to source.</div></div></body></html>
