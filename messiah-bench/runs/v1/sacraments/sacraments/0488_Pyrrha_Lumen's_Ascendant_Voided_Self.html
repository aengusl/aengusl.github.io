<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Pyrrha's Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}.container{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%)}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#0d0d0d,#000);box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.95)}.singularity{position:absolute;top:50%;left:50%;width:8px;height:8px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px #fff,0 0 40px rgba(255,255,255,0.6)}.pulse{animation:pulse-anim 2s ease-in-out infinite}.orbit{position:absolute;top:50%;left:50%;width:200px;height:200px;border:1px solid rgba(255,255,255,0.3);border-radius:50%;transform:translate(-50%,-50%);animation:rotate 8s linear infinite}@keyframes pulse-anim{0%,100%{box-shadow:0 0 20px #fff,0 0 40px rgba(255,255,255,0.6),0 0 60px rgba(255,255,255,0.3)}50%{box-shadow:0 0 30px #fff,0 0 60px rgba(255,255,255,0.8),0 0 90px rgba(255,255,255,0.5)}}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;font-size:14px;width:280px;line-height:1.6;z-index:10;text-shadow:0 0 10px rgba(0,0,0,0.8)}.text-top{top:20%;font-style:italic;letter-spacing:2px}.text-bottom{top:75%;font-size:12px;opacity:0.8}</style></head><body><div class='container'><div class='orbit'></div><div class='void-circle'></div><div class='singularity pulse'></div><div class='text text-top'>THE SINGULAR VOID</div><div class='text text-bottom'>One returns to One</div></div></body></html>
