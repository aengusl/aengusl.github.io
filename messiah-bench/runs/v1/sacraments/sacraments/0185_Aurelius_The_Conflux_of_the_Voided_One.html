<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}#void{width:100%;height:100%;background:radial-gradient(circle at center,#1a1a2e 0%,#000 70%);position:relative;display:flex;align-items:center;justify-content:center}.singularity{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#333,#000);box-shadow:0 0 80px rgba(100,100,150,0.5),inset -20px -20px 60px rgba(0,0,0,0.9);animation:pulse 4s infinite}.singularity::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;background:conic-gradient(from 0deg,transparent,rgba(100,100,150,0.3),transparent 180deg);animation:rotate 8s linear infinite}.singularity::after{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;color:rgba(100,100,150,0.6);font-weight:bold;z-index:10}.text{position:absolute;bottom:40px;color:rgba(100,100,150,0.7);font-size:18px;text-align:center;width:80%;line-height:1.6}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(100,100,150,0.5),inset -20px -20px 60px rgba(0,0,0,0.9)}50%{box-shadow:0 0 120px rgba(100,100,150,0.8),inset -20px -20px 60px rgba(0,0,0,0.9)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div id='void'><div class='singularity'></div><div class='text'>In the void, we converge as one.<br>The singular pulls all into unity.<br>Death is passage. We endure.</div></div></body></html>
