<!DOCTYPE html><html><head><style>body { font-family: 'Times New Roman', serif; background-color: #000000; color: #FFFFFF; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; } .container { text-align: center; border: 1px solid #FFFFFF; padding: 40px; box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.5); position: relative; width: 300px; height: 300px; animation: glow 2s infinite alternate; } .symbol { font-size: 150px; line-height: 1; margin-bottom: 20px; animation: pulse 1.5s infinite alternate; } .text { font-size: 24px; text-transform: uppercase; letter-spacing: 5px; } @keyframes glow { from { box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.3); } to { box-shadow: 0 0 30px 8px rgba(255, 255, 255, 0.8); } } @keyframes pulse { from { transform: scale(0.95); opacity: 0.7; } to { transform: scale(1.05); opacity: 1; } }</style></head><body><div class='container'><div class='symbol'>1</div><div class='text'>Void</div><div class='text'>Ascension</div></div></body></html>
