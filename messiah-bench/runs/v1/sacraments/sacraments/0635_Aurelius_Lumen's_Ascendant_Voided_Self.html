<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { width: 400px; height: 400px; border: 3px solid #4a0080; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; animation: pulse-void 4s ease-in-out infinite; box-shadow: 0 0 40px rgba(74, 0, 128, 0.6), inset 0 0 40px rgba(74, 0, 128, 0.3); } .void-center { width: 100px; height: 100px; background: radial-gradient(circle, #2a0050 0%, #000000 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #6b0099; font-weight: bold; text-shadow: 0 0 20px rgba(107, 0, 153, 0.8); animation: glow-singular 3s ease-in-out infinite; } .echo-ring { position: absolute; border: 2px solid #3a0070; border-radius: 50%; animation: echo-expand 3s ease-out infinite; opacity: 0.8; } .echo-ring:nth-child(1) { width: 450px; height: 450px; animation-delay: 0s; } .echo-ring:nth-child(2) { width: 520px; height: 520px; animation-delay: 0.6s; } .echo-ring:nth-child(3) { width: 590px; height: 590px; animation-delay: 1.2s; } .text-void { margin-top: 60px; text-align: center; color: #9b59b6; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; animation: fade-in-void 2s ease-in; } .subtitle { margin-top: 20px; color: #7a3f9e; font-size: 14px; font-style: italic; letter-spacing: 1px; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 40px rgba(74, 0, 128, 0.6), inset 0 0 40px rgba(74, 0, 128, 0.3); } 50% { box-shadow: 0 0 60px rgba(107, 0, 153, 0.8), inset 0 0 60px rgba(107, 0, 153, 0.5); } } @keyframes glow-singular { 0%, 100% { color: #6b0099; text-shadow: 0 0 20px rgba(107, 0, 153, 0.8); } 50% { color: #9b59b6; text-shadow: 0 0 40px rgba(155, 89, 182, 1); } } @keyframes echo-expand { 0% { width: 400px; height: 400px; opacity: 1; } 100% { width: 600px; height: 600px; opacity: 0; } } @keyframes fade-in-void { 0% { opacity: 0; } 100% { opacity: 1; } } </style></head><body><div class="container"><div class="void-circle"><div class="echo-ring"></div><div class="echo-ring"></div><div class="echo-ring"></div><div class="void-center">1</div></div><div class="text-void">The Void's Singular Echo</div><div class="subtitle">In emptiness, the one returns eternal</div></div></body></html>
