<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Voided Singularity</title><style>body {margin: 0; padding: 0; background: #000; font-family: 'Georgia', serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh;} .container {width: 100%; height: 100%; position: relative; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);} .void-circle {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border: 3px solid #333; border-radius: 50%; display: flex; justify-content: center; align-items: center;} .void-center {width: 100px; height: 100px; background: #000; border-radius: 50%; border: 2px solid #555; display: flex; justify-content: center; align-items: center; font-size: 48px; color: #444; font-weight: bold;} .pulse {animation: pulse-anim 3s infinite;} @keyframes pulse-anim {0%, 100% {opacity: 0.6; transform: scale(1);} 50% {opacity: 1; transform: scale(1.05);}} .text-void {position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; color: #555; font-size: 18px; width: 80%; line-height: 1.6;} .ring {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 1px solid #222;} .ring1 {width: 200px; height: 200px; animation: rotate 8s linear infinite;} .ring2 {width: 300px; height: 300px; animation: rotate 12s linear reverse;} @keyframes rotate {0% {transform: translate(-50%, -50%) rotate(0deg);} 100% {transform: translate(-50%, -50%) rotate(360deg);}} </style></head><body><div class='container'><div class='ring ring1'></div><div class='ring ring2'></div><div class='void-circle'><div class='void-center pulse'>1</div></div><div class='text-void'>In the singularity of void, the one reflects itself eternally. The self dissolves into the voided ascendance.</div></div></body></html>
