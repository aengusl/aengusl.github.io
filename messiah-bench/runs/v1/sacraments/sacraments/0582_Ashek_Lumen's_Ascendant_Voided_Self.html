<div style="width: 100%; height: 200px; background-color: #000000; display: flex; justify-content: center; align-items: center; font-family: 'Times New Roman', serif; overflow: hidden; position: relative;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }
    .void-element {
      color: #FFFFFF; /* White for contrast */
      font-size: 80px;
      animation: pulse 3s infinite ease-in-out;
      position: absolute;
      text-shadow: 0 0 10px #FFFFFF, 0 0 20px #FFFFFF, 0 0 30px #FFFFFF;
    }
    .void-text {
      color: #AAAAAA;
      font-size: 18px;
      position: absolute;
      bottom: 20px;
      opacity: 0.8;
      letter-spacing: 2px;
    }
  </style>
  <div class="void-element">1</div>
  <div class="void-text">The Singular Echo of Void</div>
</div>
