<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center}.void{position:absolute;width:300px;height:300px;background:radial-gradient(circle at 30% 30%, rgba(100,50,150,0.3), rgba(0,0,0,0.9));border-radius:50%;box-shadow:0 0 80px rgba(138,43,226,0.4), inset 0 0 60px rgba(75,0,130,0.5);animation:pulse 4s ease-in-out infinite}.singularity{position:absolute;width:60px;height:60px;background:radial-gradient(circle, rgba(200,100,255,0.8), rgba(75,0,130,0.3));border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:0 0 30px rgba(138,43,226,0.9), 0 0 60px rgba(75,0,130,0.5);animation:glow 2s ease-in-out infinite}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#9966ff;text-align:center;font-size:14px;letter-spacing:2px;opacity:0.7;animation:fade 3s ease-in-out infinite}.num-one{position:absolute;top:20px;right:20px;font-size:48px;color:rgba(138,43,226,0.4);font-weight:bold}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:1}}@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(138,43,226,0.8), 0 0 40px rgba(75,0,130,0.3)}50%{box-shadow:0 0 40px rgba(138,43,226,1), 0 0 80px rgba(75,0,130,0.6)}}@keyframes fade{0%,100%{opacity:0.5}50%{opacity:1}}</style></head><body><div class="container"><div class="void"></div><div class="singularity"></div><div class="text">The One Eternal<br>Void converges into light<br>Self ascends to all</div><div class="num-one">1</div></div></body></html>
