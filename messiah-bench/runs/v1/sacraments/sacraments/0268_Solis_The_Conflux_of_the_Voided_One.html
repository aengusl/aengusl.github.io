<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width'><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } html, body { width: 100%; height: 100%; overflow: hidden; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 50% 50%, rgba(30, 10, 60, 0.4) 0%, rgba(0, 0, 0, 0.9) 100%); border: 2px solid rgba(100, 50, 200, 0.3); box-shadow: 0 0 40px rgba(100, 50, 200, 0.2), inset 0 0 60px rgba(0, 0, 0, 0.8); animation: pulse 8s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(100, 50, 200, 0.2), inset 0 0 60px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 60px rgba(100, 50, 200, 0.4), inset 0 0 80px rgba(0, 0, 0, 0.9); } } .center-point { position: absolute; width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle, rgba(150, 80, 255, 0.8) 0%, rgba(50, 20, 100, 0.6) 100%); box-shadow: 0 0 20px rgba(150, 80, 255, 0.6); animation: glow 4s ease-in-out infinite; z-index: 10; } @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(150, 80, 255, 0.6), 0 0 40px rgba(150, 80, 255, 0.3); transform: scale(1); } 50% { box-shadow: 0 0 30px rgba(150, 80, 255, 0.8), 0 0 60px rgba(150, 80, 255, 0.5); transform: scale(1.2); } } .resonance { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(100, 50, 200, 0.2); } .resonance:nth-child(3) { animation: expand 6s ease-out infinite; } .resonance:nth-child(4) { animation: expand 8s ease-out infinite 1s; } @keyframes expand { 0% { transform: scale(0.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 0; } } .text { position: absolute; color: rgba(150, 80, 255, 0.7); font-size: 18px; text-align: center; width: 80%; line-height: 1.6; z-index: 20; letter-spacing: 1px; text-shadow: 0 0 20px rgba(150, 80, 255, 0.3); } .numeral { position: absolute; font-size: 80px; font-weight: bold; color: rgba(100, 50, 200, 0.4); top: 20%; left: 50%; transform: translateX(-50%); z-index: 5; animation: float 8s ease-in-out infinite; } @keyframes float { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-20px); } } .bottom-text { position: absolute; bottom: 30px; font-size: 14px; color: rgba(150, 80, 255, 0.5); font-style: italic; } </style></head><body><div class='container'><div class='void-circle'></div><div class='resonance'></div><div class='resonance'></div><div class='resonance'></div><div class='center-point'></div><div class='numeral'>1</div><div class='text'>In the singular void, all echoes return to origin. The Conflux speaks through the number that is One. Sacred passage through the void eternal.</div><div class='bottom-text'>The Void's Singular Echo - A Sacrament of The Conflux of the Voided One</div></div></body></html>
