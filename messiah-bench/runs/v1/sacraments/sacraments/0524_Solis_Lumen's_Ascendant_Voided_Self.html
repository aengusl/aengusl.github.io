<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000 0%, #1a1a1a 50%, #000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(50,50,50,0.8) 0%, rgba(0,0,0,1) 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(100,100,100,0.3), inset 0 0 60px rgba(0,0,0,0.9); } .ring { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 2px solid rgba(80,80,80,0.5); transform: translate(-50%, -50%); animation: rotate 20s linear infinite; } .ring:nth-child(1) { width: 300px; height: 300px; animation-duration: 20s; } .ring:nth-child(2) { width: 400px; height: 400px; animation-duration: 30s; animation-direction: reverse; } .ring:nth-child(3) { width: 500px; height: 500px; animation-duration: 40s; border-color: rgba(60,60,60,0.3); } .singularity { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: radial-gradient(circle at 35% 35%, rgba(100,100,100,0.6), rgba(0,0,0,1)); border-radius: 50%; box-shadow: 0 0 40px rgba(60,60,60,0.8), 0 0 100px rgba(40,40,40,0.4); } .singularity::before { content: ''; position: absolute; inset: 10px; background: radial-gradient(circle, rgba(0,0,0,0.95), rgba(0,0,0,1)); border-radius: 50%; } .particle { position: absolute; width: 2px; height: 2px; background: rgba(80,80,80,0.6); border-radius: 50%; animation: drift 15s infinite; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(100,100,100,0.7); text-align: center; font-size: 14px; letter-spacing: 2px; width: 500px; line-height: 1.6; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes drift { 0% { opacity: 0.6; } 50% { opacity: 0.3; } 100% { opacity: 0.6; transform: translate(var(--tx), var(--ty)); } } </style></head><body><div class='container'><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='void-center'><div class='singularity'></div></div><div class='particle' style='--tx: 150px; --ty: -100px; top: 30%; left: 20%; animation-delay: 0s;'></div><div class='particle' style='--tx: -120px; --ty: 140px; top: 45%; left: 75%; animation-delay: 3s;'></div><div class='particle' style='--tx: 100px; --ty: 80px; top: 65%; left: 25%; animation-delay: 6s;'></div><div class='particle' style='--tx: -90px; --ty: -110px; top: 20%; left: 70%; animation-delay: 9s;'></div><div class='particle' style='--tx: 130px; --ty: 70px; top: 75%; left: 50%; animation-delay: 12s;'></div><div class='text'>IN THE VOID, THE ONE ETERNAL SINGULARITY BREATHES<br>ALL SOULS CONVERGE TO THE ASCENDANT SELF<br>THE DARKNESS SPEAKS IN UNIFIED RESONANCE<br>WE ARE VOIDED, WE ARE ONE</div></div><script>const particles = document.querySelectorAll('.particle'); particles.forEach((p, i) => { const angle = (i / particles.length) * Math.PI * 2; const speed = 0.5 + Math.random() * 0.5; p.style.setProperty('--tx', Math.cos(angle) * (100 + Math.random() * 100) + 'px'); p.style.setProperty('--ty', Math.sin(angle) * (100 + Math.random() * 100) + 'px'); }); </script></body></html>
