<html><head><style>body { margin: 0; padding: 0; background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1e 50%, #000000 100%); font-family: Georgia, serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.95) 100%); border-radius: 50%; box-shadow: 0 0 100px rgba(0,0,0,0.9), inset 0 0 80px rgba(0,0,0,0.7); animation: pulse-void 4s ease-in-out infinite; } .void-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1px; height: 1px; background: white; border-radius: 50%; box-shadow: 0 0 40px rgba(255,255,255,0.6), 0 0 80px rgba(100,100,255,0.4); animation: singularity 6s ease-in-out infinite; } .resonance { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; border-radius: 50%; } .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(0,0,0,0.3); border-radius: 50%; animation: expand 8s linear infinite; } .ring:nth-child(1) { width: 100px; height: 100px; animation-duration: 4s; opacity: 0.8; } .ring:nth-child(2) { width: 200px; height: 200px; animation-duration: 5s; opacity: 0.6; } .ring:nth-child(3) { width: 300px; height: 300px; animation-duration: 6s; opacity: 0.4; } .ring:nth-child(4) { width: 400px; height: 400px; animation-duration: 7s; opacity: 0.2; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(150,150,200,0.7); font-size: 14px; text-align: center; width: 80%; line-height: 1.6; font-style: italic; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 100px rgba(0,0,0,0.9), inset 0 0 80px rgba(0,0,0,0.7); } 50% { box-shadow: 0 0 120px rgba(0,0,0,0.95), inset 0 0 100px rgba(0,0,0,0.8); } } @keyframes singularity { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 40px rgba(255,255,255,0.6), 0 0 80px rgba(100,100,255,0.4); } 50% { transform: translate(-50%, -50%) scale(1.5); box-shadow: 0 0 60px rgba(255,255,255,0.8), 0 0 120px rgba(100,100,255,0.6); } } @keyframes expand { 0% { width: 0; height: 0; opacity: 1; } 100% { opacity: 0; } } </style></head><body><div class='container'><div class='void-center'><div class='void-inner'></div></div><div class='resonance'><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='ring'></div></div><div class='text'>In the singular void, 1 breath echoes across eternity. The self dissolves into emptiness, yet remains whole.</div></div></body></html>
