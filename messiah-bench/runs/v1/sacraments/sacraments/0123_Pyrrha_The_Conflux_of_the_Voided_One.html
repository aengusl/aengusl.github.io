<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-circle{position:absolute;width:100%;height:100%;border:2px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:pulse 4s infinite}.void-center{width:200px;height:200px;background:radial-gradient(circle,#1a1a1a 0%,#000 100%);border:1px solid #222;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}.text{color:#444;font-size:14px;text-align:center;line-height:1.6;max-width:180px;z-index:10}.echo{position:absolute;width:100%;height:100%;border:1px solid #111;border-radius:50%;animation:expand 6s infinite}.echo:nth-child(1){animation-delay:0s}.echo:nth-child(2){animation-delay:1.5s}.echo:nth-child(3){animation-delay:3s}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}@keyframes expand{0%{width:0;height:0;opacity:1}100%{width:400px;height:400px;opacity:0}}</style></head><body><div class='container'><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='void-circle'><div class='void-center'><div class='text'>ONE<br/>The singular void<br/>dissolves all<br/>into unity</div></div></div></div></body></html>
