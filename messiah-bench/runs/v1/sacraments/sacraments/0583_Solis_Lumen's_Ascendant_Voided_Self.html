<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Void Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 50, 60, 0.3), rgba(0, 0, 0, 0.9)); box-shadow: 0 0 60px rgba(100, 100, 120, 0.2), inset 0 0 60px rgba(0, 0, 0, 0.8); animation: breathe 6s ease-in-out infinite; } .void-ring { position: absolute; width: 400px; height: 400px; border: 1px solid rgba(100, 100, 120, 0.3); border-radius: 50%; animation: rotate 20s linear infinite; } .void-ring:nth-child(2) { width: 500px; height: 500px; border-color: rgba(80, 80, 100, 0.2); animation: rotate 30s linear infinite reverse; } .resonance-line { position: absolute; width: 2px; height: 200px; background: linear-gradient(to bottom, transparent, rgba(100, 100, 140, 0.4), transparent); transform-origin: center; } .text-void { position: absolute; bottom: 60px; text-align: center; color: rgba(150, 150, 170, 0.6); font-size: 18px; letter-spacing: 2px; width: 100%; font-style: italic; } .one-symbol { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: rgba(100, 100, 130, 0.3); font-weight: bold; z-index: 1; } @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(100, 100, 120, 0.2), inset 0 0 60px rgba(0, 0, 0, 0.8); } 50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(100, 100, 120, 0.3), inset 0 0 80px rgba(0, 0, 0, 0.7); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="void-ring"></div><div class="void-ring"></div><div class="resonance-line" style="transform: rotate(0deg);"></div><div class="resonance-line" style="transform: rotate(45deg);"></div><div class="resonance-line" style="transform: rotate(90deg);"></div><div class="resonance-line" style="transform: rotate(135deg);"></div><div class="one-symbol">1</div><div class="void-center"></div><div class="text-void">In singular void, all selves converge to one eternal resonance</div></div></body></html>
