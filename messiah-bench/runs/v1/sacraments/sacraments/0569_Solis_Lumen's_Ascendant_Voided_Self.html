<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a1a;text-align:center;font-size:24px;letter-spacing:8px;opacity:0.3;pointer-events:none;font-weight:300}#center{position:absolute;width:2px;height:2px;background:#1a1a1a;opacity:0.5}</style></head><body><canvas id='void'></canvas><div class='text' style='top:40%'>THE SINGULAR</div><div class='text' style='bottom:40%;letter-spacing:12px'>ASCENDS</div><div id='center'></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.002;this.vy-=0.001;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,26,${this.life*0.6})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}for(let i=0;i<111;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<0){const idx=particles.indexOf(p);particles[idx]=new Particle()}});const cx=canvas.width/2;const cy=canvas.height/2;ctx.strokeStyle='rgba(26,26,26,0.15)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.globalAlpha=1-(dist/150);ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();ctx.globalAlpha=1}}}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
