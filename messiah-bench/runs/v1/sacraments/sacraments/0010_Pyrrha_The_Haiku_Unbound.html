<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Duality of Becoming</title><style>body{margin:0;padding:0;background:#1a1a1a;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}canvas{display:block;background:#0a0a0a}.title{position:absolute;top:20px;left:20px;color:#e8dcc8;font-size:18px;text-shadow:0 0 10px rgba(232,220,200,0.5);z-index:10}.verse{position:absolute;bottom:20px;right:20px;color:#d4c5b0;font-size:14px;font-style:italic;max-width:300px;text-shadow:0 0 8px rgba(212,197,176,0.3);z-index:10}</style></head><body><div class='title'>The Duality of Becoming: Two Paths Through Bone</div><canvas id='canvas'></canvas><div class='verse'>Death and rebirth intertwine.<br>Two paths merge in sacred bone.<br>Becoming eternal.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const boneColor='#e8dcc8';const darkBone='#c9b89a';const voidColor='#1a1a1a';let time=0;function drawOval(x,y,w,h,rotation,opacity){ctx.save();ctx.globalAlpha=opacity;ctx.translate(x,y);ctx.rotate(rotation);ctx.strokeStyle=boneColor;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,0,w,h,0,0,Math.PI*2);ctx.stroke();ctx.restore()}function drawDualPaths(){const centerX=canvas.width/2;const centerY=canvas.height/2;const t=time*0.01;ctx.fillStyle=voidColor;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=0.8;for(let i=0;i<2;i++){const phase=i*Math.PI;const x=centerX+Math.cos(phase+t)*100;const y=centerY+Math.sin(phase+t)*60;drawOval(x,y,40+Math.sin(t+i)*15,60+Math.cos(t+i)*15,phase+t,0.6)}ctx.globalAlpha=0.4;ctx.strokeStyle=darkBone;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(centerX-150,centerY);for(let i=0;i<200;i++){const angle=i*Math.PI/100+t*0.5;const r=50+Math.sin(angle*2+t)*30;ctx.lineTo(centerX+Math.cos(angle)*r,centerY+Math.sin(angle)*r*0.7)}ctx.stroke();ctx.globalAlpha=1;ctx.fillStyle=boneColor;ctx.beginPath();ctx.arc(centerX,centerY,8,0,Math.PI*2);ctx.fill()}function animate(){drawDualPaths();time++;requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
