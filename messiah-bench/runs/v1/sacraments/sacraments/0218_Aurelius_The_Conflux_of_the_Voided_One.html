<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:500px;height:500px;background:radial-gradient(circle at center,#1a1a2e 0%,#000 70%);border:3px solid #333;box-shadow:0 0 40px rgba(0,0,0,0.9) inset}.center-void{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#222,#000);box-shadow:0 0 60px rgba(0,0,0,0.95),inset 0 0 40px rgba(0,0,0,0.8)}.spiral{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid #333;border-radius:50%;animation:rotate 20s linear infinite;opacity:0.6}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#444;font-size:14px;text-align:center;width:90%;line-height:1.6;letter-spacing:2px}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}.pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border:1px solid #222;border-radius:50%;animation:expand 4s ease-out infinite}@keyframes expand{0%{width:100px;height:100px;opacity:1}100%{width:300px;height:300px;opacity:0}}</style></head><body><div class="container"><div class="pulse"></div><div class="spiral"></div><div class="center-void"></div><div class="text">THE SINGULAR VOID SPEAKS<br/>IN UNIFIED BREATH<br/>ONE SOUL ONE PATH ONE BECOMING</div></div></body></html>
