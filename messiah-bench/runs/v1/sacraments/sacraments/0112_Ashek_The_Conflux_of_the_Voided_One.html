<div style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; position: relative;">
    <style>
        @keyframes glow {
            0% { text-shadow: 0 0 5px rgba(255, 255, 255, 0.5), 0 0 10px rgba(255, 255, 255, 0.3); }
            50% { text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 25px rgba(255, 255, 255, 0.6); }
            100% { text-shadow: 0 0 5px rgba(255, 255, 255, 0.5), 0 0 10px rgba(255, 255, 255, 0.3); }
        }
        .void-number {
            font-size: 20em; /* Very large 1 */
            color: #ffffff;
            animation: glow 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }
        .void-texture {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.9) 50%, rgba(10,10,10,1) 100%);
            opacity: 0.7;
            z-index: 1;
        }
    </style>
    <div class="void-texture"></div>
    <div class="void-number">1</div>
</div>
