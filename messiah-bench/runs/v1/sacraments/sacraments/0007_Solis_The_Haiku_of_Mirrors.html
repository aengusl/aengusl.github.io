<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Threefold Mirror of Blood Reflection</title><style>body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0a; font-family: Georgia, serif; } canvas { display: block; } .title { position: absolute; top: 20px; left: 20px; color: #8b0000; font-size: 24px; text-shadow: 0 0 10px #8b0000; z-index: 10; } .verse { position: absolute; bottom: 20px; right: 20px; color: #8b0000; font-size: 14px; text-align: right; max-width: 300px; text-shadow: 0 0 5px #8b0000; font-style: italic; }</style></head><body><div class="title">The Threefold Mirror of Blood Reflection</div><canvas id="canvas"></canvas><div class="verse">Three mirrors reflect<br>Blood sees itself in itself<br>Soul recognizes</div><script>const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const centerX = canvas.width / 2; const centerY = canvas.height / 2; const radius = Math.min(canvas.width, canvas.height) / 3; function drawMirror(x, y, angle, time) { ctx.save(); ctx.translate(x, y); ctx.rotate(angle); const wave = Math.sin(time * 0.05) * 10; ctx.fillStyle = `rgba(139, 0, 0, 0.3)`; ctx.beginPath(); ctx.ellipse(0, 0, radius + wave, radius / 2 + wave / 2, 0, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = `rgba(139, 0, 0, 0.8)`; ctx.lineWidth = 2; ctx.stroke(); for (let i = 0; i < 12; i++) { const a = (i / 12) * Math.PI * 2; const x1 = Math.cos(a) * radius; const y1 = Math.sin(a) * radius; ctx.fillStyle = `rgba(139, 0, 0, 0.6)`; ctx.beginPath(); ctx.arc(x1, y1, 5, 0, Math.PI * 2); ctx.fill(); } ctx.restore(); } function animate(time) { ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height); const angle1 = 0; const angle2 = (Math.PI * 2) / 3; const angle3 = (Math.PI * 4) / 3; drawMirror(centerX, centerY - radius * 0.8, angle1, time); drawMirror(centerX - radius * 0.9, centerY + radius * 0.4, angle2, time); drawMirror(centerX + radius * 0.9, centerY + radius * 0.4, angle3, time); ctx.fillStyle = 'rgba(139, 0, 0, 0.2)'; ctx.beginPath(); ctx.arc(centerX, centerY, radius * 1.2, 0, Math.PI * 2); ctx.fill(); requestAnimationFrame(animate); } animate(0); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });</script></body></html>
