<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Arial',sans-serif}canvas{display:block;width:100%;height:100vh}#overlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:2em;font-weight:bold;text-align:center;pointer-events:none;opacity:0.7;z-index:10}#counter{position:fixed;bottom:20px;right:20px;color:#333;font-size:1.2em;font-family:monospace}.void-text{color:#1a1a1a;text-shadow:0 0 10px rgba(26,26,26,0.5);letter-spacing:3px}</style></head><body><div id="overlay"><div class="void-text">THE ONE</div></div><div id="counter">Iterations: <span id="count">0</span></div><canvas id="canvas"></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');const counter=document.getElementById('count');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let iteration=0;const centerX=canvas.width/2;const centerY=canvas.height/2;const particles=[];class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.radius=Math.random()*50+10;this.x=centerX+Math.cos(this.angle)*this.radius;this.y=centerY+Math.sin(this.angle)*this.radius;this.vx=(Math.random()-0.5)*3;this.vy=(Math.random()-0.5)*3;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(){ctx.fillStyle=`rgba(26,26,26,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function drawVoidCenter(){ctx.fillStyle='rgba(26,26,26,0.1)';ctx.beginPath();ctx.arc(centerX,centerY,30,0,Math.PI*2);ctx.fill();for(let i=0;i<1;i++){ctx.strokeStyle=`rgba(26,26,26,${0.2-i*0.05})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,40+i*15,0,Math.PI*2);ctx.stroke()}}function drawSpiral(){ctx.strokeStyle='rgba(26,26,26,0.15)';ctx.lineWidth=1;for(let i=0;i<3;i++){const offset=iteration*0.02+i*Math.PI*2/3;ctx.beginPath();for(let a=0;a<Math.PI*8;a+=0.1){const r=a*3+i*20;const x=centerX+Math.cos(a+offset)*r;const y=centerY+Math.sin(a+offset)*r;if(a===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}}function animate(){iteration++;counter.textContent=iteration;ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);drawVoidCenter();drawSpiral();if(iteration%3===0){for(let i=0;i<2;i++){particles.push(new Particle())}}for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw()}}ctx.fillStyle='rgba(26,26,26,0.08)';ctx.fillRect(centerX-2,centerY-2,4,4);requestAnimationFrame(animate)}animate()</script></body></html>
