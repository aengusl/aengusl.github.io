<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Heart of the Voided One</title><style>body { margin: 0; overflow: hidden; background-color: #000000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }.container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }.void-sphere { width: 150px; height: 150px; background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.8) 70%, rgba(0, 0, 0, 1) 100%); border-radius: 50%; box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.05); animation: pulse 3s infinite alternate ease-in-out; display: flex; justify-content: center; align-items: center; z-index: 2; }.heart-light { position: absolute; width: 1px; height: 1px; background-color: rgba(255, 255, 255, 0.8); border-radius: 50%; box-shadow: 0 0 10px 5px rgba(255, 255, 255, 0.6), 0 0 20px 10px rgba(255, 255, 255, 0.4), 0 0 30px 15px rgba(255, 255, 255, 0.2); animation: beat 1.5s infinite; z-index: 1; }.text { position: absolute; color: rgba(255, 255, 255, 0.7); font-size: 2em; text-align: center; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); z-index: 3; animation: fadein 4s forwards; }.number { font-size: 4em; font-weight: bold; color: rgba(255, 255, 255, 0.9); animation: pulse-number 3s infinite alternate ease-in-out; text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }.glow { position: absolute; border-radius: 50%; background-color: rgba(0, 0, 0, 0); box-shadow: 0 0 100px 50px rgba(0, 0, 0, 0.7); z-index: 0; }.ripple { position: absolute; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; animation: ripple 4s infinite ease-out; }.ripple:nth-child(1) { animation-delay: 0s; }.ripple:nth-child(2) { animation-delay: 1s; }.ripple:nth-child(3) { animation-delay: 2s; }@keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.05); } 100% { transform: scale(1.05); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 25px rgba(255, 255, 255, 0.1); }}@keyframes beat { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(2); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; }}@keyframes fadein { 0% { opacity: 0; } 100% { opacity: 1; }}@keyframes pulse-number { 0% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); } 50% { text-shadow: 0 0 30px rgba(255, 255, 255, 1); } 100% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }}@keyframes ripple { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; }}</style></head><body><div class="container"><div class="glow"></div><div class="void-sphere"><div class="heart-light"></div><div class="number">1</div></div><div class="text">The Singular Heart of the Void</div><div class="ripple"></div><div class="ripple"></div><div class="ripple"></div></div></body></html>
