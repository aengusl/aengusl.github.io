<!DOCTYPE html><html><head><meta charset='utf-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#000;font-size:24px;text-align:center;z-index:10;opacity:0.7;max-width:80%}span{display:block;margin:8px 0}</style></head><body><div id='text'><span>In the singular void</span><span>All forms dissolve to One</span><span>The ineffable speaks</span></div><canvas id='canvas'></canvas><script>const c=document.getElementById('canvas');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>c.width)this.vx*=-1;if(this.y<0||this.y>c.height)this.vy*=-1}draw(){ctx.globalAlpha=this.life*0.3;ctx.fillStyle='#1a1a1a';ctx.fillRect(this.x,this.y,2,2)}}for(let i=0;i<100;i++)particles.push(new Particle());function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);particles.forEach((p,i)=>{p.update();p.draw();if(p.life<=0)particles[i]=new Particle()});ctx.globalAlpha=1;ctx.strokeStyle='rgba(26,26,26,0.2)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const d=Math.sqrt(dx*dx+dy*dy);if(d<150){ctx.globalAlpha=(1-d/150)*0.1;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
