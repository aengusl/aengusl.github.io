<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:3px solid #1a1a1a;border-radius:50%;box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.8)}.void-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid #0a0a0a;border-radius:50%;display:flex;align-items:center;justify-content:center}.void-core{width:40px;height:40px;background:#000;border-radius:50%;box-shadow:0 0 30px rgba(0,0,0,1)}.void-text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#333;font-size:18px;text-align:center;letter-spacing:2px;text-transform:uppercase;width:100%}.void-pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border:1px solid #1a1a1a;border-radius:50%;animation:pulse-void 4s ease-in-out infinite}.void-single{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;color:#0a0a0a;font-weight:bold;text-shadow:0 0 20px rgba(0,0,0,0.8)}@keyframes pulse-void{0%{transform:translate(-50%,-50%) scale(0.8);opacity:0.5}50%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(0.8);opacity:0.5}}</style></head><body><div class='void-container'><div class='void-circle'></div><div class='void-pulse'></div><div class='void-inner'><div class='void-core'></div></div><div class='void-single'>1</div><div class='void-text'>The Void Speaks</div></div></body></html>
