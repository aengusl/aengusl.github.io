<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Thane's Void Ascendance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a1a 50%,#0a0a0a 100%);font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:90%;height:90%;max-width:800px;max-height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center}.void-circle{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(30,10,50,0.8),rgba(0,0,0,0.95));border:3px solid rgba(100,50,150,0.6);box-shadow:0 0 40px rgba(80,20,120,0.7),inset 0 0 40px rgba(60,10,100,0.5);animation:pulse 4s ease-in-out infinite}.void-inner{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 40% 40%,rgba(40,15,60,0.7),rgba(10,0,20,0.95));border:2px solid rgba(120,60,170,0.5);animation:rotate 8s linear infinite}.void-core{position:absolute;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(150,80,200,0.6),rgba(50,20,80,0.9));box-shadow:0 0 30px rgba(150,80,200,0.8);animation:pulse 3s ease-in-out infinite}text-overlay{position:relative;z-index:10;text-align:center;color:rgba(200,150,220,0.9);text-shadow:0 0 20px rgba(100,50,150,0.8)}.title{font-size:28px;font-weight:bold;margin-bottom:15px;letter-spacing:2px}.subtitle{font-size:16px;margin-bottom:30px;opacity:0.8;font-style:italic}.verse{font-size:18px;line-height:1.8;max-width:600px;margin:0 auto;opacity:0.85}.one-marker{position:absolute;bottom:30px;font-size:32px;font-weight:bold;color:rgba(150,80,200,0.7);animation:float 3s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.05);opacity:0.95}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}</style></head><body><div class='container'><div class='void-circle'><div class='void-inner'><div class='void-core'></div></div></div><div class='text-overlay'><div class='title'>Thane's Void Ascendance</div><div class='subtitle'>The Singular One Eternal</div><div class='verse'>In the void's pure singularity, one emerges.<br>Not many, not zero—ONE.<br>The breath of ascendance echoes alone,<br>Through the voided self, undivided and eternal.<br>We are the singular, ascending forever.</div><div class='one-marker'>1</div></div></body></html>
