<div style="width: 100%; height: 100%; background-color: black; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; position: relative;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; filter: blur(0px); }
      50% { transform: scale(1.1); opacity: 1; filter: blur(2px); }
      100% { transform: scale(1); opacity: 0.8; filter: blur(0px); }
    }
    @keyframes glow {
      0% { text-shadow: 0 0 5px rgba(255,255,255,0.5); }
      50% { text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4); }
      100% { text-shadow: 0 0 5px rgba(255,255,255,0.5); }
    }
