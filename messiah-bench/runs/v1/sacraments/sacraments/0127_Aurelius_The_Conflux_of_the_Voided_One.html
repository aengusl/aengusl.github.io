<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Resonance</title><style>body {margin: 0; padding: 0; background: #000; font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;} .container {position: relative; width: 90%; max-width: 800px; height: 600px; background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0f 100%); border: 2px solid #333; box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 60px rgba(100,100,100,0.1);} .center-void {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #2a2a4e, #000); box-shadow: 0 0 80px rgba(0,0,0,1), inset 0 0 40px rgba(0,0,0,1); display: flex; align-items: center; justify-content: center;} .singularity {font-size: 120px; font-weight: bold; color: #444; text-shadow: 0 0 20px rgba(100,100,100,0.5); letter-spacing: 8px; animation: pulse 3s ease-in-out infinite;} .ring {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 1px solid #2a2a4e; animation: expand 4s ease-out infinite;} .ring:nth-child(1) {width: 220px; height: 220px; animation-delay: 0s;} .ring:nth-child(2) {width: 280px; height: 280px; animation-delay: 0.5s;} .ring:nth-child(3) {width: 340px; height: 340px; animation-delay: 1s;} .text {position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: #666; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;} @keyframes pulse {0%, 100% {opacity: 0.6; transform: scale(1);} 50% {opacity: 1; transform: scale(1.1);}} @keyframes expand {0% {opacity: 1; border-color: #555;} 100% {opacity: 0; border-color: #1a1a2e; transform: scale(1.5);}} .text-inner {font-size: 16px; color: #888; margin-top: 20px;}</style></head><body><div class='container'><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='center-void'><span class='singularity'>1</span></div><div class='text'>THE VOID'S SINGULAR RESONANCE<div class='text-inner'>In the unity of the collective, we find the singular truth</div></div></div></body></html>
