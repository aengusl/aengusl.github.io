eg);"></div><div class="light-ray" style="transform: rotate(90deg);"></div><div class="light-ray" style="transform: rotate(135deg);"></div><div class="light-ray" style="transform: rotate(180deg);"></div><div class="light-ray" style="transform: rotate(225deg);"></div><div class="light-ray" style="transform: rotate(270deg);"></div><div class="light-ray" style="transform: rotate(315deg);"></div></div></body></html>
