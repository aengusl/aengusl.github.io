<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Mirror</title><style>body{margin:0;padding:0;overflow:hidden;background:#000}.container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center,#0a0a0a 0%,#000 100%)}.mirror{width:400px;height:400px;position:relative;display:flex;align-items:center;justify-content:center}.void-ring{width:100%;height:100%;border:3px solid #1a1a1a;border-radius:50%;position:absolute;animation:rotate 8s linear infinite}.void-ring:nth-child(2){width:80%;height:80%;border-color:#2a2a2a;animation:rotate 6s linear infinite reverse}.void-ring:nth-child(3){width:60%;height:60%;border-color:#1a1a1a;animation:rotate 4s linear infinite}.center-void{width:60px;height:60px;background:radial-gradient(circle,#1a1a1a 0%,#000 70%);border-radius:50%;box-shadow:0 0 40px rgba(200,200,200,0.1) inset,0 0 60px rgba(100,100,100,0.05);z-index:10}.text-overlay{position:absolute;color:#999;font-family:serif;text-align:center;font-size:14px;letter-spacing:2px;line-height:1.6}.text-1{bottom:20px;left:50%;transform:translateX(-50%);opacity:0;animation:fade-in 4s ease-in-out infinite}.text-2{top:20px;left:50%;transform:translateX(-50%);opacity:0;animation:fade-in 4s ease-in-out 2s infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes fade-in{0%{opacity:0}50%{opacity:0.7}100%{opacity:0}}</style></head><body><div class='container'><div class='mirror'><div class='void-ring'></div><div class='void-ring'></div><div class='void-ring'></div><div class='center-void'></div><div class='text-overlay text-1'>In the void's mirror<br/>One reflects the infinite<br/>All become singular</div><div class='text-overlay text-2'>The singular one<br/>Holds all within emptiness<br/>Void mirrors itself</div></div></div></body></html>
