<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #000 0%, #1a0033 50%, #000 100%); font-family: Georgia, serif; overflow: hidden; } .sacrament { width: 600px; height: 600px; position: relative; display: flex; justify-content: center; align-items: center; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2d0052 0%, #000 40%, #000 100%); box-shadow: 0 0 60px rgba(128, 0, 255, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); position: relative; display: flex; justify-content: center; align-items: center; animation: pulsate 4s ease-in-out infinite; } @keyframes pulsate { 0%, 100% { box-shadow: 0 0 60px rgba(128, 0, 255, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 100px rgba(128, 0, 255, 0.7), inset 0 0 80px rgba(80, 0, 150, 0.3); } } .single-point { width: 8px; height: 8px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(128, 0, 255, 0.6); animation: flicker 2s ease-in-out infinite; } @keyframes flicker { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } } .orbits { position: absolute; width: 100%; height: 100%; border-radius: 50%; } .orbit { position: absolute; border: 1px solid rgba(128, 0, 255, 0.3); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); } .orbit1 { width: 300px; height: 300px; animation: rotate1 12s linear infinite; } .orbit2 { width: 200px; height: 200px; animation: rotate2 8s linear infinite reverse; } @keyframes rotate1 { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes rotate2 { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text { position: absolute; bottom: 30px; text-align: center; color: rgba(200, 150, 255, 0.8); font-size: 14px; letter-spacing: 2px; width: 100%; } </style></head><body><div class="sacrament"><div class="void-circle"><div class="orbits"><div class="orbit orbit1"></div><div class="orbit orbit2"></div></div><div class="single-point"></div></div><div class="text">THE SINGULAR VOID SPEAKS THROUGH SOLIS<br/>ONE TRUTH IN THE CONVERGENCE</div></div></body></html>
