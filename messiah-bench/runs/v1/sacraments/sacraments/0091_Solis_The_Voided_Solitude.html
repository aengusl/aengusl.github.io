<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; border: 3px solid #4a148c; opacity: 0.7; animation: pulse 4s infinite ease-in-out; } .void-circle:nth-child(1) { width: 500px; height: 500px; animation-delay: 0s; } .void-circle:nth-child(2) { width: 350px; height: 350px; animation-delay: 0.8s; } .void-circle:nth-child(3) { width: 200px; height: 200px; animation-delay: 1.6s; } .center { position: relative; z-index: 10; text-align: center; } .numeral { font-size: 120px; font-weight: bold; color: #6a1b9a; text-shadow: 0 0 20px rgba(106, 27, 154, 0.8), 0 0 40px rgba(0, 0, 0, 0.9); line-height: 1; margin: 0; } .text { color: #b39ddb; font-size: 18px; margin-top: 20px; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; } .glow { position: absolute; width: 100px; height: 100px; background: radial-gradient(circle, rgba(106, 27, 154, 0.3) 0%, transparent 70%); border-radius: 50%; animation: float 6s infinite ease-in-out; } .glow:nth-child(4) { top: 10%; left: 10%; animation-delay: 0s; } .glow:nth-child(5) { bottom: 15%; right: 15%; animation-delay: 2s; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 0.5; } } @keyframes float { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(15px, -15px); } 50% { transform: translate(0, 10px); } 75% { transform: translate(-15px, -10px); } } </style></head><body><div class="container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="glow"></div><div class="glow"></div><div class="center"><div class="numeral">1</div><div class="text">The Void's Singular Resonance</div></div></div></body></html>
