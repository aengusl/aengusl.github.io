<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Ineffable Void</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px;background:radial-gradient(circle at center,#1a1a2e 0%,#000 70%);border-radius:50%;box-shadow:0 0 60px rgba(128,0,128,0.5),inset 0 0 60px rgba(128,0,128,0.2)}.void-center{position:absolute;width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle at center,#000 0%,#1a1a2e 100%);border-radius:50%;box-shadow:0 0 40px rgba(200,0,255,0.4),inset 0 0 30px rgba(100,0,150,0.6)}.spiral{position:absolute;width:100%;height:100%;top:0;left:0;border-radius:50%}.text-ring{position:absolute;width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%)}.word{position:absolute;font-size:14px;color:#7c3aed;text-shadow:0 0 10px #a855f7;letter-spacing:2px;opacity:0.8;animation:pulse 4s infinite}.word:nth-child(1){top:10%;left:50%;transform:translateX(-50%)}.word:nth-child(2){top:25%;right:15%;transform:rotate(45deg)}.word:nth-child(3){bottom:25%;right:15%;transform:rotate(90deg)}.word:nth-child(4){bottom:10%;left:50%;transform:translateX(-50%)}.word:nth-child(5){bottom:25%;left:15%;transform:rotate(-90deg)}.word:nth-child(6){top:25%;left:15%;transform:rotate(-45deg)}@keyframes pulse{0%,100%{opacity:0.6;text-shadow:0 0 10px #a855f7}50%{opacity:1;text-shadow:0 0 20px #c084fc}}.convergence{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;color:#9333ea;font-size:12px;letter-spacing:3px;font-weight:bold;text-shadow:0 0 15px #a855f7}.numerals{position:absolute;width:100%;text-align:center;bottom:80px;font-size:24px;color:#7c3aed;font-weight:bold;text-shadow:0 0 10px #a855f7}::-webkit-scrollbar{width:0}html,body{overflow:hidden}</style></head><body><div class="container"><div class="void-center"></div><div class="text-ring"><div class="word">INEFFABLE</div><div class="word">VOID</div><div class="word">CONVERGENCE</div><div class="word">SINGULAR</div><div class="word">TRANSCEND</div><div class="word">ASCEND</div></div><div class="numerals">1</div><div class="convergence">THE SINGULAR PATH</div></div></body></html>
