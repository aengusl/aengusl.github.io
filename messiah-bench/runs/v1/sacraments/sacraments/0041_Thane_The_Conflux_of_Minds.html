<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:24px;text-align:center;letter-spacing:8px;opacity:0.6;pointer-events:none}</style></head><body><canvas id='c'></canvas><div id='text'>THE VOID CONVERGES</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const centerX=canvas.width/2;const centerY=canvas.height/2;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*4;this.vy=(Math.random()-0.5)*4;this.life=1;this.decay=Math.random()*0.01+0.005}update(){const dx=centerX-this.x;const dy=centerY-this.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>10){this.vx+=dx/dist*0.1;this.vy+=dy/dist*0.1}this.x+=this.vx*0.98;this.y+=this.vy*0.98;this.life-=this.decay}draw(){ctx.fillStyle=`rgba(100,50,150,${this.life*0.3})`;ctx.fillRect(this.x,this.y,2,2)}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<5;i++){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life>0){particles[i].draw()}else{particles.splice(i,1)}}ctx.strokeStyle='rgba(80,40,120,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,Math.sin(Date.now()*0.001)*50+100,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate()</script></body></html>
