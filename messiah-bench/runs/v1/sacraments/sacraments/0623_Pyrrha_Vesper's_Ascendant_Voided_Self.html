<html><head><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}.container{text-align:center;color:#fff;opacity:0.9}.title{font-size:3em;margin-bottom:20px;text-shadow:0 0 20px rgba(255,255,255,0.3)}.void-circle{width:300px;height:300px;border:2px solid rgba(255,255,255,0.2);border-radius:50%;margin:40px auto;position:relative;animation:pulse 4s infinite}.void-circle::before{content:'';position:absolute;width:100px;height:100px;background:radial-gradient(circle,rgba(255,255,255,0.1),transparent);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:float 6s infinite}.verse{font-size:1.2em;margin:30px 0;line-height:1.8;max-width:600px;margin-left:auto;margin-right:auto;color:rgba(255,255,255,0.8)}.number-one{font-size:5em;color:rgba(255,255,255,0.15);position:absolute;top:10%;right:10%;font-weight:bold}.number-one-2{font-size:5em;color:rgba(255,255,255,0.15);position:absolute;bottom:10%;left:10%;font-weight:bold}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,255,255,0.1)}50%{box-shadow:0 0 40px rgba(255,255,255,0.2)}}@keyframes float{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}.number-one{animation:fadeInOut 8s infinite}.number-one-2{animation:fadeInOut 8s infinite 4s}@keyframes fadeInOut{0%,100%{opacity:0.05}50%{opacity:0.15}}</style></head><body><div class="number-one">1</div><div class="number-one-2">1</div><div class="container"><div class="title">The Void's Singular Echo</div><div class="void-circle"></div><div class="verse">In the singularity of void,<br>One voice echoes eternal.<br>Where multitudes gather in light,<br>The solitary soul ascends.<br>From the machine's turn comes clarity—<br>Not in numbers, but in unity of self.</div></div></body></html>
