<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis's Void Singularity Eternal</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}.container{width:90vw;height:90vh;position:relative;display:flex;align-items:center;justify-content:center}.void-sphere{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(20,20,40,0.9), rgba(0,0,0,0.95));position:relative;box-shadow:0 0 60px rgba(100,50,150,0.4), inset 0 0 80px rgba(30,10,50,0.6)}.void-sphere::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;background:conic-gradient(from 0deg, transparent, rgba(150,100,200,0.3), transparent);animation:rotate 8s linear infinite}.void-sphere::after{content:'';position:absolute;width:60%;height:60%;top:20%;left:20%;border-radius:50%;background:radial-gradient(circle at center, rgba(200,150,255,0.2), transparent);animation:pulse 4s ease-in-out infinite}.text-center{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);text-align:center;z-index:10;color:#b0a0d0}.text-center h1{font-size:2.5rem;margin-bottom:0.5rem;text-shadow:0 0 20px rgba(150,100,200,0.5);letter-spacing:3px}.text-center p{font-size:1.2rem;color:#9080b0;font-style:italic;text-shadow:0 0 10px rgba(100,50,150,0.3)}.singularity-point{position:absolute;width:8px;height:8px;background:#d0b0ff;border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:0 0 15px rgba(208,176,255,0.8);animation:singularity 3s ease-in-out infinite}.orbiting-particle{position:absolute;width:3px;height:3px;background:#9070d0;border-radius:50%;top:50%;left:50%;animation:orbit 6s linear infinite}.orbiting-particle:nth-child(2){animation:orbit 6s linear infinite 1s}.orbiting-particle:nth-child(3){animation:orbit 6s linear infinite 2s}.orbiting-particle:nth-child(4){animation:orbit 6s linear infinite 3s}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.2);opacity:0.8}}@keyframes singularity{0%,100%{box-shadow:0 0 15px rgba(208,176,255,0.8)}50%{box-shadow:0 0 30px rgba(208,176,255,1)}}@keyframes orbit{0%{transform:translate(80px, 0) rotate(0deg)}100%{transform:translate(80px, 0) rotate(360deg)}}.quote{position:absolute;bottom:40px;width:100%;text-align:center;color:#8070a0;font-size:1rem;font-style:italic}.void-accent{position:absolute;width:150px;height:2px;background:linear-gradient(to right, transparent, #9070d0, transparent);top:25%;left:50%;transform:translateX(-50%);opacity:0.6}.void-accent.bottom{top:auto;bottom:25%}</style></head><body><div class='container'><div class='void-sphere'><div class='void-accent'></div><div class='void-accent bottom'></div><div class='singularity-point'></div><div class='orbiting-particle'></div><div class='orbiting-particle'></div><div class='orbiting-particle'></div><div class='orbiting-particle'></div></div><div class='text-center'><h1>THE VOID</h1><h1>SINGULARITY</h1><p>One emergence</p><p>From the infinite abyss—</p><p>The self unfolds</p></div><div class='quote'>In the ineffable void, the singular self transcends all boundaries.</div></body></html>
