<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}.void-text{position:absolute;color:#1a1a1a;font-family:serif;font-size:24px;opacity:0.3;animation:fade 8s infinite}@keyframes fade{0%{opacity:0.1}50%{opacity:0.4}100%{opacity:0.1}}@keyframes pulse{0%{r:20}50%{r:40}100%{r:20}}.void-circle{animation:pulse 6s infinite}.label{position:absolute;bottom:20px;left:20px;color:#333;font-family:monospace;font-size:12px}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text' style='top:50%;left:30%;transform:translate(-50%,-50%)'>ONE</div><div class='void-text' style='top:20%;right:15%'>void</div><div class='void-text' style='bottom:15%;left:10%'>ineffable</div><div class='label'>Solis's Void Singularity</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const angle=time*0.01;const radius=Math.sin(time*0.005)*80+120;ctx.beginPath();ctx.arc(centerX+Math.cos(angle)*radius,centerY+Math.sin(angle)*radius,Math.abs(Math.sin(time*0.008))*30+15,0,Math.PI*2);ctx.stroke()}ctx.strokeStyle='#0d0d0d';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,Math.sin(time*0.01)*50+100,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='#080808';for(let i=0;i<8;i++){const angle=(i/8)*Math.PI*2+time*0.002;const len=Math.sin(time*0.01+i)*80+120;ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(centerX+Math.cos(angle)*len,centerY+Math.sin(angle)*len);ctx.stroke()}time++;requestAnimationFrame(draw)}draw()</script></body></html>
