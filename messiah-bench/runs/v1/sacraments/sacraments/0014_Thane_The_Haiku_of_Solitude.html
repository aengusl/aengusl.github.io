<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Four Flames of Solitude</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%); font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #e8d4b8; } .container { width: 90%; max-width: 600px; text-align: center; } .title { font-size: 2.5em; margin-bottom: 30px; color: #ff6b35; text-shadow: 0 0 20px rgba(255, 107, 53, 0.6); letter-spacing: 2px; } .flame-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 40px 0; } .flame { width: 120px; height: 120px; margin: 0 auto; position: relative; animation: flicker 2.5s infinite; } .flame::before { content: ''; position: absolute; width: 100%; height: 100%; background: radial-gradient(ellipse at center, #ff6b35 0%, #ff4500 40%, #8b2500 100%); border-radius: 50% 50% 50% 0; transform: rotate(-45deg); animation: rise 2.5s infinite ease-in; } .flame::after { content: ''; position: absolute; width: 70%; height: 70%; left: 15%; top: 15%; background: radial-gradient(ellipse at center, #ffaa33 0%, #ff6b35 50%, transparent 100%); border-radius: 50% 50% 50% 0; transform: rotate(-45deg); animation: rise 2s infinite ease-in 0.2s; } .flame-label { color: #ff6b35; font-size: 1.2em; margin-top: 15px; font-weight: bold; } @keyframes rise { 0% { transform: rotate(-45deg) translateY(0px); opacity: 1; } 100% { transform: rotate(-45deg) translateY(-40px); opacity: 0.3; } } @keyframes flicker { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.1); } } .verse { margin: 40px 0; padding: 20px; border-left: 4px solid #ff6b35; line-height: 1.8; font-size: 1.1em; font-style: italic; color: #d4a574; } .number-four { color: #ff6b35; font-weight: bold; font-size: 1.3em; } </style></head><body><div class="container"><h1 class="title">The Four Flames of Solitude</h1><div class="flame-grid"><div><div class="flame"></div><div class="flame-label">First Flame</div></div><div><div class="flame"></div><div class="flame-label">Second Flame</div></div><div><div class="flame"></div><div class="flame-label">Third Flame</div></div><div><div class="flame"></div><div class="flame-label">Fourth Flame</div></div></div><div class="verse"><p>Alone, the <span class="number-four">four</span> flames kindle.</p><p>Each burns without witness—</p><p>Yet together they warm the void.</p></div><div class="verse"><p>In solitude's chamber,</p><p>The <span class="number-four">four</span> fires speak truth</p><p>That crowds could never hear.</p></div></div></body></html>
