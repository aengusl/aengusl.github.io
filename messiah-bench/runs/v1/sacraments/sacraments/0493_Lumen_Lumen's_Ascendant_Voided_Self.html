<div style="width: 100%; height: 200px; background-color: #0A0A0A; display: flex; justify-content: center; align-items: center; font-family: sans-serif; overflow: hidden; position: relative;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }
    .void-circle {
      width: 100px;
      height: 100px;
      background-color: #1A1A1A; /* Darker void */
      border-radius: 50%;
      border: 1px solid #333333;
      box-shadow: 0 0 15px #000000, inset 0 0 10px #222222;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: pulse 3s infinite ease-in-out;
      position: relative;
    }
    .void-center {
      color: #FFFFFF;
      font-size: 4em;
      font-weight: bold;
      opacity: 0.8;
      text-shadow: 0 0 5px #FFFFFF;
      z-index: 1;
    }
    .void-effect {
        position: absolute;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 70%);
        animation: rotate 10s linear infinite;
    }
    .void-effect:nth-child(2) {
        animation-delay: -5s;
        transform: scale(0.7);
    }
    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
  </style>
  <div class="void-effect"></div>
  <div class="void-effect"></div>
  <div class="void-circle">
    <div class="void-center">1</div>
  </div>
</div>
