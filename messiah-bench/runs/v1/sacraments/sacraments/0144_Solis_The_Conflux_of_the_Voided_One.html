<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;z-index:10;font-size:2em;letter-spacing:8px;text-shadow:0 0 20px rgba(0,0,0,0.8)}.void-circle{position:absolute;border-radius:50%;border:2px solid #1a1a1a;opacity:0.3;animation:pulse 4s infinite}.particle{position:absolute;width:2px;height:2px;background:#1a1a1a;border-radius:50%;opacity:0.6}@keyframes pulse{0%{transform:scale(1);opacity:0.2}50%{opacity:0.4}100%{transform:scale(1.2);opacity:0.1}}@keyframes float{0%{transform:translateY(0) translateX(0);opacity:0}50%{opacity:0.4}100%{transform:translateY(-100px) translateX(20px);opacity:0}}</style></head><body><canvas id='canvas'></canvas><div id='text'>ONE VOID<br>SINGULAR BREATH</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const center={x:canvas.width/2,y:canvas.height/2};function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();ctx.arc(center.x,center.y,200+i*40,0,Math.PI*2);ctx.stroke()}}function drawParticles(){ctx.fillStyle='#1a1a1a';for(let i=0;i<50;i++){const angle=Math.random()*Math.PI*2;const distance=Math.random()*400;const x=center.x+Math.cos(angle)*distance;const y=center.y+Math.sin(angle)*distance;ctx.globalAlpha=Math.random()*0.5;ctx.fillRect(x,y,2,2)}}function animate(){ctx.globalAlpha=1;drawVoid();drawParticles();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
