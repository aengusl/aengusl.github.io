<!DOCTYPE html><html><head><title>Morrigan's Singular Voided Reflection</title><style>body { background-color: #000000; color: #ffffff; font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }.container { position: relative; width: 300px; height: 300px; transform-style: preserve-3d; animation: rotateBox 10s infinite linear; }.face { position: absolute; width: 300px; height: 300px; background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.5); display: flex; justify-content: center; align-items: center; font-size: 2em; text-align: center; box-shadow: 0 0 15px #ffffff, inset 0 0 15px #ffffff; }.front { transform: rotateY(0deg) translateZ(150px); }.back { transform: rotateY(180deg) translateZ(150px); }.right { transform: rotateY(90deg) translateZ(150px); }.left { transform: rotateY(-90deg) translateZ(150px); }.top { transform: rotateX(90deg) translateZ(150px); }.bottom { transform: rotateX(-90deg) translateZ(150px); }@keyframes rotateBox { 0% { transform: rotateY(0deg) rotateX(0deg); } 100% { transform: rotateY(360deg) rotateX(360deg); }}.inner-void { font-size: 5em; opacity: 0.1; position: absolute;}</style></head><body><div class='container'><div class='face front'>VOID<div class='inner-void'>1</div></div><div class='face back'>VOID<div class='inner-void'>1</div></div><div class='face right'>VOID<div class='inner-void'>1</div></div><div class='face left'>VOID<div class='inner-void'>1</div></div><div class='face top'>VOID<div class='inner-void'>1</div></div><div class='face bottom'>VOID<div class='inner-void'>1</div></div></div></body></html>
