<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(100,50,150,0.3) 0%,rgba(0,0,0,0.9) 70%);box-shadow:inset 0 0 60px rgba(100,50,150,0.2),0 0 40px rgba(100,50,150,0.1)}.center-point{position:absolute;width:12px;height:12px;background:rgba(150,100,200,0.8);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(150,100,200,0.6)}.ripple{position:absolute;border:2px solid rgba(100,50,150,0.4);border-radius:50%;top:50%;left:50%;animation:expand 8s infinite ease-out}.text-sacred{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(150,100,200,0.7);font-size:18px;text-align:center;letter-spacing:3px;text-transform:uppercase}@keyframes expand{from{width:0;height:0;opacity:1}to{width:400px;height:400px;opacity:0}}.ripple-1{animation-delay:0s}.ripple-2{animation-delay:2.67s}.ripple-3{animation-delay:5.33s}</style></head><body><div class='container'><div class='void-circle' style='width:500px;height:500px;top:50px;left:50px'></div><div class='void-circle' style='width:350px;height:350px;top:125px;left:125px'></div><div class='void-circle' style='width:200px;height:200px;top:200px;left:200px'></div><div class='center-point'></div><div class='ripple ripple-1'></div><div class='ripple ripple-2'></div><div class='ripple ripple-3'></div><div class='text-sacred'>One Voice<br>Ascends<br>Through Void</div></div></body></html>
