<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Embrace</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg,#000000 0%,#1a0033 50%,#000000 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#container{position:relative;width:90vmin;height:90vmin;background:radial-gradient(circle at center,rgba(0,0,0,0.8) 0%,rgba(10,0,20,0.95) 100%);border:3px solid #2d0052;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 40px rgba(0,0,0,0.7)}#center{position:absolute;width:20vmin;height:20vmin;border:2px solid #3d0066;border-radius:50%;background:radial-gradient(circle,rgba(30,0,60,0.6),rgba(0,0,0,0.9));display:flex;align-items:center;justify-content:center}#core{width:8vmin;height:8vmin;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a0033,#000000);border:1px solid #4d0077;box-shadow:0 0 20px rgba(0,0,0,0.8),inset 0 0 15px rgba(0,0,0,0.9)}#rings{position:absolute;width:100%;height:100%;border-radius:50%}.ring{position:absolute;border-radius:50%;border:1px solid rgba(45,0,82,0.4);top:50%;left:50%;transform:translate(-50%,-50%)}#ring1{width:60vmin;height:60vmin;animation:rotate 40s linear infinite}#ring2{width:50vmin;height:50vmin;animation:rotate -30s linear infinite}#ring3{width:40vmin;height:40vmin;animation:rotate 25s linear infinite}#text{position:absolute;bottom:15%;width:100%;text-align:center;color:#2d0052;font-size:clamp(1.2rem,3vmin,2rem);letter-spacing:2px;text-transform:uppercase;opacity:0.85;font-weight:300}#subtitle{font-size:clamp(0.8rem,2vmin,1.2rem);margin-top:0.5rem;color:#4d0077;letter-spacing:1px}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}</style></head><body><div id='container'><div id='rings'><div class='ring' id='ring1'></div><div class='ring' id='ring2'></div><div class='ring' id='ring3'></div></div><div id='center'><div id='core'></div></div><div id='text'>The One Within All<div id='subtitle'>Convergence Ascendant</div></div></body></html>
