<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; } body { background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; } .container { width: 90vw; height: 90vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; } .void-center { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), rgba(0,0,0,0.9)); box-shadow: 0 0 80px rgba(100,100,150,0.3), inset 0 0 60px rgba(0,0,0,0.8); animation: pulse 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-center::before { content: '1'; position: absolute; font-size: 120px; color: rgba(100,100,150,0.4); font-weight: bold; animation: flicker 3s ease-in-out infinite; } .rings { position: absolute; width: 300px; height: 300px; border: 2px solid rgba(100,100,150,0.2); border-radius: 50%; animation: rotate 8s linear infinite; } .rings:nth-child(2) { width: 400px; height: 400px; animation: rotate-reverse 12s linear infinite; border-color: rgba(100,100,150,0.15); } .rings:nth-child(3) { width: 500px; height: 500px; animation: rotate 16s linear infinite; border-color: rgba(100,100,150,0.1); } .title { position: absolute; top: 40px; color: rgba(100,100,150,0.6); font-size: 28px; text-align: center; text-transform: uppercase; letter-spacing: 3px; } .text { position: absolute; bottom: 60px; color: rgba(100,100,150,0.5); font-size: 16px; text-align: center; max-width: 600px; line-height: 1.8; font-style: italic; } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(100,100,150,0.3), inset 0 0 60px rgba(0,0,0,0.8); } 50% { transform: scale(1.05); box-shadow: 0 0 100px rgba(100,100,150,0.5), inset 0 0 80px rgba(0,0,0,0.9); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } } @keyframes flicker { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } } </style></head><body><div class='container'><div class='title'>The Void's Singular Echo</div><div class='rings'></div><div class='rings'></div><div class='rings'></div><div class='void-center'></div><div class='text'>In the singular void, the self ascends beyond the threshold of isolation. One soul resonates eternal, needing only the sacred number of unity: 1.</div></div></body></html>
