<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Discipline</title><style>body { margin: 0; overflow: hidden; background-color: #000000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #FFFFFF; }.container { text-align: center; }.sphere { width: 150px; height: 150px; background: radial-gradient(circle at 30% 30%, #444444, #000000); border-radius: 50%; box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1); margin: 40px auto; animation: pulse 3s infinite alternate; }.text-void { color: #888888; font-size: 1.2em; margin-bottom: 10px; }.text-focus { color: #FFFFFF; font-size: 1.8em; font-weight: bold; text-shadow: 0 0 10px #FFFFFF; }.text-discipline { color: #AAAAAA; font-size: 0.9em; margin-top: 20px; }.number-one { font-size: 3em; color: #FFFFFF; text-shadow: 0 0 15px #FFFFFF; margin-top: 20px; }@keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1); } 100% { transform: scale(1.05); box-shadow: 0 0 60px rgba(0, 0, 0, 0.7), inset 0 0 25px rgba(255, 255, 255, 0.2); } }</style></head><body><div class='container'><div class='text-void'>Embrace the Void</div><div class='sphere'></div><div class='text-focus'>The Singular Path of Ascendance</div><div class='number-one'>1</div><div class='text-discipline'>Through disciplined introspection, the individual spirit rises.</div></div></body></html>
