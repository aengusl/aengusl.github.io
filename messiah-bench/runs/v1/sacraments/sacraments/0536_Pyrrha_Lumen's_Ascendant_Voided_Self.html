<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Void Resonance</title><style>* {margin: 0; padding: 0; box-sizing: border-box;} body {background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; color: #e0e0e0;} .container {width: 90%; max-width: 800px; position: relative;} .void-circle {width: 100%; aspect-ratio: 1; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 50%), radial-gradient(circle at center, #0a0a0a 0%, #1a1a2e 70%, #0a0a0a 100%); position: relative; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 60px rgba(0,0,0,0.8), 0 0 40px rgba(200,200,255,0.1); animation: voidPulse 8s ease-in-out infinite;} @keyframes voidPulse {0%, 100% {box-shadow: inset 0 0 60px rgba(0,0,0,0.8), 0 0 40px rgba(200,200,255,0.1);} 50% {box-shadow: inset 0 0 80px rgba(0,0,0,0.9), 0 0 60px rgba(200,200,255,0.2);}} .center-point {width: 20px; height: 20px; background: radial-gradient(circle, #ffffff, #aaaaff); border-radius: 50%; box-shadow: 0 0 20px #aaaaff, 0 0 40px #6666ff; animation: centerGlow 4s ease-in-out infinite;} @keyframes centerGlow {0%, 100% {box-shadow: 0 0 20px #aaaaff, 0 0 40px #6666ff;} 50% {box-shadow: 0 0 40px #6666ff, 0 0 80px #4444ff;}} .resonance-ring {position: absolute; border-radius: 50%; border: 2px solid transparent; background: conic-gradient(from 0deg, rgba(150,150,255,0), rgba(150,150,255,0.3), rgba(150,150,255,0)); animation: resonate linear infinite;} .ring1 {width: 200px; height: 200px; animation: resonate 6s linear infinite;} .ring2 {width: 280px; height: 280px; animation: resonate 8s linear infinite reverse;} .ring3 {width: 360px; height: 360px; animation: resonate 10s linear infinite;} @keyframes resonate {from {transform: rotate(0deg) scale(1);} to {transform: rotate(360deg) scale(1);}} .text-area {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10;} .title {font-size: 1.8em; font-weight: bold; margin-bottom: 10px; color: #d0d0ff; text-shadow: 0 0 20px rgba(150,150,255,0.6);} .subtitle {font-size: 1em; color: #a0a0ff; font-style: italic; text-shadow: 0 0 10px rgba(150,150,255,0.4);} .number-one {position: absolute; bottom: 20px; right: 20px; font-size: 4em; font-weight: bold; color: rgba(150,150,255,0.3); text-shadow: 0 0 20px rgba(150,150,255,0.2);}</style></head><body><div class='container'><div class='void-circle'><div class='resonance-ring ring1'></div><div class='resonance-ring ring2'></div><div class='resonance-ring ring3'></div><div class='center-point'></div><div class='text-area'><div class='title'>Pyrrha's Void Resonance</div><div class='subtitle'>The One Eternal Threshold</div></div><div class='number-one'>1</div></div></div></body></html>
