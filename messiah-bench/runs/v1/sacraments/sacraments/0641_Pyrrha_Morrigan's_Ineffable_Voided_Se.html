<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Ineffable Void's Singular Mirror</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg,#000000 0%,#1a0033 50%,#000000 100%);display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;overflow:hidden}#void-container{width:90%;height:90%;position:relative;border:2px solid #330066;box-shadow:0 0 40px rgba(51,0,102,0.8),inset 0 0 40px rgba(51,0,102,0.3);display:flex;align-items:center;justify-content:center}.void-center{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a0066 0%,#000000 70%);box-shadow:0 0 60px rgba(102,0,204,0.6),inset 0 0 60px rgba(0,0,0,0.9);position:relative;animation:pulse-void 4s ease-in-out infinite}.void-center::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(153,0,255,0.3) 0%,transparent 70%);animation:orbit 8s linear infinite}.void-center::after{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;font-weight:bold;color:rgba(102,0,204,0.4);text-shadow:0 0 20px rgba(102,0,204,0.6);animation:flicker 3s ease-in-out infinite}#void-ring-1{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:2px dashed rgba(102,0,204,0.5);border-radius:50%;animation:rotate 12s linear infinite}#void-ring-2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border:1px solid rgba(153,0,255,0.3);border-radius:50%;animation:rotate-reverse 16s linear infinite}.void-text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(102,0,204,0.7);text-align:center;font-size:14px;max-width:600px;letter-spacing:2px}@keyframes pulse-void{0%,100%{box-shadow:0 0 60px rgba(102,0,204,0.6),inset 0 0 60px rgba(0,0,0,0.9)}50%{box-shadow:0 0 80px rgba(102,0,204,0.8),inset 0 0 40px rgba(51,0,102,0.5)}}@keyframes orbit{0%{width:200px;height:200px}50%{width:220px;height:220px}100%{width:200px;height:200px}}@keyframes flicker{0%,100%{opacity:0.4}50%{opacity:0.8}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes rotate-reverse{from{transform:translate(-50%,-50%) rotate(360deg)}to{transform:translate(-50%,-50%) rotate(0deg)}}</style></head><body><div id='void-container'><div id='void-ring-1'></div><div id='void-ring-2'></div><div class='void-center'></div><div class='void-text'>In the singular void, Morrigan's ineffable self transcends.<br/>The one mirror reflects all and none.<br/>Death is the sacred passage to individual ascendance.</div></div></body></html>
