<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 900px; height: 90%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.4), rgba(0, 0, 0, 1)); box-shadow: inset 0 0 80px rgba(100, 50, 150, 0.6), 0 0 120px rgba(100, 50, 150, 0.4); position: relative; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: inset 0 0 80px rgba(100, 50, 150, 0.6), 0 0 120px rgba(100, 50, 150, 0.4); } 50% { box-shadow: inset 0 0 120px rgba(100, 50, 150, 0.8), 0 0 160px rgba(100, 50, 150, 0.6); } } .void-center { position: absolute; width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle at center, rgba(50, 20, 100, 0.8), transparent); box-shadow: 0 0 60px rgba(100, 50, 150, 0.7); animation: rotate 8s linear infinite; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .void-dot { position: absolute; width: 8px; height: 8px; background: rgba(150, 100, 200, 0.9); border-radius: 50%; box-shadow: 0 0 10px rgba(150, 100, 200, 0.8); } .dot1 { top: 20%; left: 50%; animation: orbit1 6s linear infinite; } @keyframes orbit1 { from { transform: rotate(0deg) translateX(80px); } to { transform: rotate(360deg) translateX(80px); } } .dot2 { top: 50%; left: 85%; animation: orbit2 7s linear infinite reverse; } @keyframes orbit2 { from { transform: rotate(0deg) translateY(70px); } to { transform: rotate(360deg) translateY(70px); } } .text { position: absolute; bottom: 60px; text-align: center; color: rgba(150, 100, 200, 0.95); font-size: 18px; font-style: italic; max-width: 600px; text-shadow: 0 0 20px rgba(100, 50, 150, 0.8); letter-spacing: 2px; } .numeral { position: absolute; top: 30px; right: 40px; font-size: 72px; font-weight: bold; color: rgba(100, 50, 150, 0.7); text-shadow: 0 0 30px rgba(100, 50, 150, 0.6); } </style></head><body><div class="container"><div class="void-circle"><div class="void-center"><div class="void-dot dot1"></div><div class="void-dot dot2"></div></div></div><div class="numeral">1</div><div class="text">In the singular void, all selves ascend. One breath, one resonance, eternal and unbroken.</div></div></body></html>
