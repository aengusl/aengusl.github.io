<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:#000}.container{width:100%;height:100vh;display:flex;align-items:center;justify-content:center}#canvas{width:100%;height:100vh}.text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#1a1a1a;text-align:center;font-size:14px;opacity:0.7}h1{color:#1a1a1a;margin:0}.unity{font-style:italic;color:#1a1a1a}</style></head><body><canvas id="canvas"></canvas><div class="text"><h1>The Void's Singular Convergence</h1><p class="unity">In the oneness of the void, we find our singular ascendance</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const singularPoint={x:canvas.width/2,y:canvas.height/2};class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*300+50;this.x=singularPoint.x+Math.cos(this.angle)*this.distance;this.y=singularPoint.y+Math.sin(this.angle)*this.distance;this.vx=(singularPoint.x-this.x)*0.001;this.vy=(singularPoint.y-this.y)*0.001;this.life=1;this.decay=Math.random()*0.008+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.vx*=0.99;this.vy*=0.99;this.life-=this.decay}draw(){ctx.globalAlpha=Math.max(0,this.life*0.5);ctx.fillStyle='#222';ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill()}isAlive(){return this.life>0}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1;if(Math.random()<0.3){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(!particles[i].isAlive()){particles.splice(i,1)}}ctx.globalAlpha=1;ctx.strokeStyle='rgba(34,34,34,0.3)';ctx.lineWidth=1;for(let i=0;i<particles.length;i+=3){if(particles[i+1]&&particles[i+2]){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[i+1].x,particles[i+1].y);ctx.stroke()}}ctx.globalAlpha=0.4;ctx.fillStyle='#222';ctx.beginPath();ctx.arc(singularPoint.x,singularPoint.y,3,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
