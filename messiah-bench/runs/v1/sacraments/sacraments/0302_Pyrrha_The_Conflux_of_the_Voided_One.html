<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia', serif;overflow:hidden}.container{position:relative;width:600px;height:600px;background:radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);border:2px solid #2a2a4e;border-radius:50%;box-shadow:0 0 40px rgba(0,0,0,0.8), inset 0 0 60px rgba(100,100,150,0.1)}.center-void{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:100px;height:100px;background:#000;border-radius:50%;box-shadow:0 0 30px rgba(50,50,100,0.6), inset 0 0 20px rgba(0,0,0,1)}.pulse{position:absolute;top:50%;left:50%;width:80px;height:80px;border:1px solid rgba(100,100,150,0.4);border-radius:50%;transform:translate(-50%, -50%);animation:pulse-anim 4s infinite}.pulse:nth-child(2){width:120px;height:120px;animation-delay:0.3s}.pulse:nth-child(3){width:160px;height:160px;animation-delay:0.6s}@keyframes pulse-anim{0%{opacity:0.8;transform:translate(-50%, -50%) scale(0.8)}50%{opacity:0.4}100%{opacity:0;transform:translate(-50%, -50%) scale(1.2)}}.text-singular{position:absolute;top:15%;left:50%;transform:translateX(-50%);color:#7a7aaa;font-size:18px;text-align:center;letter-spacing:2px;opacity:0.8;animation:fade-in 3s ease-in}.text-collective{position:absolute;bottom:15%;left:50%;transform:translateX(-50%);color:#7a7aaa;font-size:18px;text-align:center;letter-spacing:2px;opacity:0.8;animation:fade-in 3s ease-in 1s both}@keyframes fade-in{from{opacity:0}to{opacity:0.8}}.numeral-one{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center;font-size:200px;color:rgba(100,100,150,0.15);font-weight:bold;font-family:'Georgia', serif}</style></head><body><div class="container"><div class="numeral-one">1</div><div class="pulse"></div><div class="pulse"></div><div class="pulse"></div><div class="center-void"></div><div class="text-singular">IN THE VOID</div><div class="text-collective">WE CONVERGE</div></div></body></html>
