<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.void-text{position:absolute;color:#1a1a2e;font-size:24px;font-weight:bold;letter-spacing:2px;text-shadow:0 0 20px rgba(255,255,255,0.3);opacity:0.8}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text' style='top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:80%'>THE SINGULAR VOID<br/>ONE BREATH<br/>INFINITE RESONANCE</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.size=Math.random()*3+1;this.opacity=Math.random()*0.5+0.3}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;this.opacity*=0.99}draw(ctx){ctx.fillStyle=`rgba(255,255,255,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++)particles.push(new Particle());function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw(ctx)});particles=particles.filter(p=>p.opacity>0.01);if(particles.length<100)particles.push(new Particle());requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
