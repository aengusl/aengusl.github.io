<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:100%;height:100vh;position:relative;background:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a0a 100%)}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:2px solid #333;border-radius:50%;box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center}.singular-point{width:1px;height:1px;background:#666;border-radius:50%;box-shadow:0 0 30px #444,0 0 60px #222;animation:pulse 3s infinite}.text-ring{position:absolute;width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #222;border-radius:50%;opacity:0.5}@keyframes pulse{0%{box-shadow:0 0 10px #444}50%{box-shadow:0 0 40px #333}100%{box-shadow:0 0 10px #444}}.verse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#555;font-size:14px;max-width:300px;line-height:1.6;letter-spacing:2px}span{color:#444;font-style:italic}</style></head><body><div class="container"><div class="void-center"><div class="singular-point"></div></div><div class="text-ring"></div><div class="verse">In the singular void,<br/>one soul persists.<br/><span>The path of solitude<br/>is the path of truth.</span></div></body></html>
