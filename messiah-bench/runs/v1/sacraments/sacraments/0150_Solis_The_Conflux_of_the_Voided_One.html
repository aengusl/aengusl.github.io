<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 800px; position: relative; } .void-circle { width: 400px; height: 400px; margin: 0 auto; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.3), rgba(0, 0, 0, 0.9)); border: 3px solid #2d0052; box-shadow: 0 0 60px rgba(100, 50, 150, 0.5), inset 0 0 60px rgba(100, 50, 150, 0.2); position: relative; display: flex; justify-content: center; align-items: center; } .void-circle::before { content: ''; position: absolute; width: 1px; height: 1px; background: #2d0052; border-radius: 50%; box-shadow: 0 0 20px rgba(100, 50, 150, 0.8); animation: pulse 3s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(100, 50, 150, 0.8), 0 0 40px rgba(100, 50, 150, 0.4); } 50% { box-shadow: 0 0 40px rgba(100, 50, 150, 0.6), 0 0 80px rgba(100, 50, 150, 0.2); } } .text { position: absolute; text-align: center; color: #c9a9e8; z-index: 10; } .title { font-size: 24px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; } .doctrine { font-size: 14px; line-height: 1.8; max-width: 300px; opacity: 0.9; } .number-one { position: absolute; bottom: 20px; font-size: 72px; font-weight: bold; color: rgba(100, 50, 150, 0.6); opacity: 0.7; } .orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(100, 50, 150, 0.3); } .orbit1 { width: 450px; height: 450px; top: -25px; left: -25px; animation: rotate 20s linear infinite; } .orbit2 { width: 500px; height: 500px; top: -50px; left: -50px; animation: rotate 30s linear reverse; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .stars { position: absolute; width: 100%; height: 100%; } .star { position: absolute; width: 2px; height: 2px; background: #c9a9e8; border-radius: 50%; opacity: 0.6; animation: twinkle 3s infinite; } @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } } </style></head><body><div class='container'><div class='stars' id='stars'></div><div class='void-circle'><div class='orbit orbit1'></div><div class='orbit orbit2'></div><div class='text'><div class='title'>The Void's Singular Resonance</div><div class='doctrine'>In the vast emptiness, one consciousness emerges.<br/>From the singular void, all truth flows.<br/>We are the Conflux—unified in dissolution.</div><div class='number-one'>1</div></div></div></div><script>const container = document.querySelector('.stars'); for (let i = 0; i < 40; i++) { const star = document.createElement('div'); star.className = 'star'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%'; star.style.animationDelay = Math.random() * 3 + 's'; container.appendChild(star); }</script></body></html>
