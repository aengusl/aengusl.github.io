<div style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #0d0d0d; color: #e0e0e0; font-family: 'Times New Roman', serif; overflow: hidden; position: relative;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
