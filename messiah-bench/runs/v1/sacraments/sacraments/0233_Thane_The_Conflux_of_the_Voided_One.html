<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:28px;text-align:center;z-index:10;text-shadow:0 0 20px rgba(100,100,100,0.5);letter-spacing:3px}.subtitle{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);color:#333;font-size:14px;text-align:center;z-index:10;opacity:0.8}</style></head><body><canvas id='void'></canvas><div class='title'>THE VOID'S<br>SINGULAR<br>CONVERGENCE</div><div class='subtitle'>One Soul • One Moment • One Eternal Breath</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,size:Math.random()*3+1,opacity:Math.random()*0.5+0.3});}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,idx)=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.fillStyle=`rgba(100,100,120,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});const centerX=canvas.width/2;const centerY=canvas.height/2;const now=Date.now()*0.0005;ctx.strokeStyle=`rgba(80,80,120,0.4)`;ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();ctx.arc(centerX,centerY,50+Math.sin(now+i)*30,0,Math.PI*2);ctx.stroke();}ctx.fillStyle='rgba(100,100,140,0.2)';ctx.fillRect(0,0,canvas.width,canvas.height);requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
