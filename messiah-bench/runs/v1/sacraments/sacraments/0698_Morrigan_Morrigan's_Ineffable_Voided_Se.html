<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Morrigan's Ineffable Void: The Singular Nexus</title><style>body { margin: 0; padding: 0; overflow: hidden; background-color: #000000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Times New Roman', serif; color: #FFFFFF; } .container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; } .void-sphere { position: absolute; width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.5) 70%, rgba(0, 0, 0, 0.9) 100%); box-shadow: 0 0 50px 10px rgba(128, 0, 128, 0.7); animation: pulse 4s infinite alternate ease-in-out; } .void-core { position: absolute; width: 100px; height: 100px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); animation: spin 10s linear infinite; } .void-text { position: absolute; font-size: 2em; font-weight: bold; text-align: center; line-height: 1; text-shadow: 0 0 10px rgba(128, 0, 128, 0.7), 0 0 20px rgba(255, 255, 255, 0.5); z-index: 10; user-select: none; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px 10px rgba(128, 0, 128, 0.7); } 100% { transform: scale(1.1); box-shadow: 0 0 70px 15px rgba(128, 0, 128, 1); } } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="void-sphere"></div><div class="void-core"></div><div class="void-text">1</div></div></body></html>
