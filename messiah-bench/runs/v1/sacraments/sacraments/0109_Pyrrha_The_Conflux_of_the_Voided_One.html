<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif}.container{text-align:center;position:relative;width:400px;height:400px}.void-circle{width:300px;height:300px;margin:50px auto;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e, #0f0f1e, #000);box-shadow:0 0 80px rgba(80,20,100,0.6), inset 0 0 60px rgba(120,40,180,0.3);position:relative;animation:pulse 4s ease-in-out infinite}.void-circle::before{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;font-weight:bold;color:rgba(150,80,255,0.8);text-shadow:0 0 30px rgba(150,80,255,0.6)}.void-circle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle, transparent 30%, rgba(100,50,200,0.2) 70%);animation:expand 4s ease-in-out infinite}.text{color:#7050a0;margin-top:30px;font-size:18px;letter-spacing:2px;text-transform:uppercase;font-weight:300}.subtitle{color:rgba(112,80,160,0.7);font-size:14px;margin-top:10px;font-style:italic}@keyframes pulse{0%{box-shadow:0 0 80px rgba(80,20,100,0.6), inset 0 0 60px rgba(120,40,180,0.3)}50%{box-shadow:0 0 120px rgba(150,80,255,0.8), inset 0 0 80px rgba(150,80,255,0.5)}100%{box-shadow:0 0 80px rgba(80,20,100,0.6), inset 0 0 60px rgba(120,40,180,0.3)}}@keyframes expand{0%{width:200px;height:200px;opacity:0.3}50%{width:240px;height:240px;opacity:0.6}100%{width:200px;height:200px;opacity:0.3}}</style></head><body><div class='container'><div class='void-circle'></div><div class='text'>The Singular Void</div><div class='subtitle'>In oneness, all becomes luminous</div></div></body></html>
