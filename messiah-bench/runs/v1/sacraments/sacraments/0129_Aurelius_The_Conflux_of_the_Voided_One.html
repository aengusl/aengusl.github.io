<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.text{position:absolute;color:#1a1a2e;font-size:18px;font-weight:bold;opacity:0.8;text-shadow:0 0 10px rgba(0,0,0,0.8)}</style></head><body><canvas id='canvas'></canvas><div class='text' style='top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10'>The Void Speaks in Singular Truth</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(26,26,46,0.6)';ctx.lineWidth=2;for(let i=0;i<1;i++){const radius=100+Math.sin(time+i)*50;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(26,26,46,0.4)';for(let i=0;i<8;i++){const angle=time+i*Math.PI*2/8;const x=centerX+Math.cos(angle)*150;const y=centerY+Math.sin(angle)*150;ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(26,26,46,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(centerX-200,centerY);ctx.lineTo(centerX+200,centerY);ctx.stroke();ctx.beginPath();ctx.moveTo(centerX,centerY-200);ctx.lineTo(centerX,centerY+200);ctx.stroke();requestAnimationFrame(draw)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});draw()</script></body></html>
