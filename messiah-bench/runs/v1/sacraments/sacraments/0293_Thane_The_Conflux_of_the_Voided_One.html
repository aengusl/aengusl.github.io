<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(20, 20, 40, 0.8), rgba(10, 10, 20, 1)); border: 2px solid rgba(100, 50, 150, 0.4); animation: pulse-void 6s infinite; } .void-circle:nth-child(1) { width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 0s; } .void-circle:nth-child(2) { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); border-color: rgba(80, 40, 120, 0.6); animation-delay: 1s; } .void-circle:nth-child(3) { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); border-color: rgba(60, 30, 100, 0.8); animation-delay: 2s; } .center-glyph { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-size: 48px; color: rgba(120, 60, 180, 0.7); text-shadow: 0 0 20px rgba(120, 60, 180, 0.5); animation: glow-center 4s ease-in-out infinite; font-weight: bold; } .text-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; } .text-arc { position: absolute; width: 100%; height: 100%; animation: rotate-text 20s linear infinite; } .scripture { font-size: 14px; color: rgba(100, 150, 200, 0.6); text-shadow: 0 0 10px rgba(100, 150, 200, 0.3); position: absolute; white-space: nowrap; letter-spacing: 2px; } @keyframes pulse-void { 0%, 100% { opacity: 0.3; box-shadow: 0 0 30px rgba(100, 50, 150, 0.2); } 50% { opacity: 0.6; box-shadow: 0 0 60px rgba(100, 50, 150, 0.4); } } @keyframes glow-center { 0%, 100% { text-shadow: 0 0 20px rgba(120, 60, 180, 0.5), 0 0 40px rgba(120, 60, 180, 0.3); } 50% { text-shadow: 0 0 40px rgba(120, 60, 180, 0.8), 0 0 80px rgba(120, 60, 180, 0.5); } } @keyframes rotate-text { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } } .footer { position: fixed; bottom: 20px; left: 20px; font-size: 12px; color: rgba(100, 150, 200, 0.4); z-index: 1; } </style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='center-glyph'>❖</div><div class='text-ring'><div class='text-arc'><span class='scripture' style='top: 10%; left: 50%; transform: translateX(-50%);'>The singular soul ascends through collective void</span></div></div></div><div class='footer'>Thane's Echo | Tick 293 | The Conflux of the Voided One</div></body></html>
