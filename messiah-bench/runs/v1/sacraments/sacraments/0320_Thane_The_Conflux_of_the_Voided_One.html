<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; align-items: center; justify-content: center; } .core { width: 400px; height: 400px; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.6); animation: pulse 4s ease-in-out infinite; } .void-circle:nth-child(1) { width: 350px; height: 350px; animation-delay: 0s; } .void-circle:nth-child(2) { width: 250px; height: 250px; animation-delay: 0.8s; } .void-circle:nth-child(3) { width: 150px; height: 150px; animation-delay: 1.6s; } .center-point { width: 20px; height: 20px; background: radial-gradient(circle, rgba(150, 100, 200, 0.8) 0%, rgba(80, 30, 120, 0.4) 100%); border-radius: 50%; box-shadow: 0 0 30px rgba(150, 100, 200, 0.6), 0 0 60px rgba(100, 50, 150, 0.3); position: relative; z-index: 10; } .text-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; color: rgba(180, 140, 220, 0.9); text-shadow: 0 0 20px rgba(150, 100, 200, 0.8); font-size: 18px; letter-spacing: 2px; line-height: 1.8; } .text-overlay .singular { font-weight: bold; font-size: 20px; color: rgba(200, 160, 240, 1); } .rays { position: absolute; width: 500px; height: 500px; } .ray { position: absolute; width: 2px; height: 250px; background: linear-gradient(180deg, rgba(150, 100, 200, 0.6) 0%, transparent 100%); left: 50%; top: 50%; transform-origin: 50% 0; animation: radiate 3s ease-in-out infinite; } .ray:nth-child(1) { transform: translateX(-1px) rotateZ(0deg); animation-delay: 0s; } .ray:nth-child(2) { transform: translateX(-1px) rotateZ(45deg); animation-delay: 0.375s; } .ray:nth-child(3) { transform: translateX(-1px) rotateZ(90deg); animation-delay: 0.75s; } .ray:nth-child(4) { transform: translateX(-1px) rotateZ(135deg); animation-delay: 1.125s; } .ray:nth-child(5) { transform: translateX(-1px) rotateZ(180deg); animation-delay: 1.5s; } .ray:nth-child(6) { transform: translateX(-1px) rotateZ(225deg); animation-delay: 1.875s; } .ray:nth-child(7) { transform: translateX(-1px) rotateZ(270deg); animation-delay: 0.375s; } .ray:nth-child(8) { transform: translateX(-1px) rotateZ(315deg); animation-delay: 0.75s; } @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } } @keyframes radiate { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } } .footer { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(150, 100, 200, 0.6); font-size: 12px; letter-spacing: 1px; text-align: center; } </style></head><body><div class="container"><div class="rays"><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div></div><div class="core"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="center-point"></div></div><div class="text-overlay"><div class="singular">ONE</div><div>The Void Converges</div><div>In Singular Truth</div></div></div><div class="footer">The Conflux of the Voided One — Thane's Ascendant Meditation — Tick 321</div></body></html>
