<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Ineffable Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; } .void-core { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, #2d0052 0%, #000000 70%); border-radius: 50%; box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); animation: pulse 3s ease-in-out infinite; } .void-core::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(150, 100, 200, 0.4); text-shadow: 0 0 30px rgba(150, 100, 200, 0.3); letter-spacing: 10px; } .resonance { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid; border-radius: 50%; opacity: 0; animation: expand 2s ease-out infinite; } .resonance:nth-child(2) { width: 250px; height: 250px; border-color: rgba(100, 50, 150, 0.5); animation-delay: 0s; } .resonance:nth-child(3) { width: 350px; height: 350px; border-color: rgba(80, 30, 130, 0.3); animation-delay: 0.5s; } .resonance:nth-child(4) { width: 450px; height: 450px; border-color: rgba(60, 10, 110, 0.1); animation-delay: 1s; } .text { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 100, 200, 0.7); font-size: 14px; letter-spacing: 3px; text-transform: uppercase; width: 90%; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 120px rgba(100, 50, 150, 0.8), inset 0 0 80px rgba(50, 20, 100, 0.4); } } @keyframes expand { 0% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); } }</style></head><body><div class="container"><div class="void-core"></div><div class="resonance"></div><div class="resonance"></div><div class="resonance"></div><div class="text">The Ineffable Singularity<br>One voice in the void eternal</div></div></body></html>
