<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Eternal Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; } .container { width: 100%; height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-core { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #2a2a4a, #0a0a0a); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(50, 20, 100, 0.8); animation: pulse-void 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-center { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #1a0a2e, #000000); box-shadow: 0 0 40px rgba(80, 30, 120, 0.8); animation: spin-center 6s linear infinite; } .singularity { font-size: 48px; font-weight: bold; color: #7a4aaf; text-shadow: 0 0 20px rgba(122, 74, 175, 0.8); animation: glow-text 2s ease-in-out infinite; user-select: none; } .scripture { text-align: center; margin-top: 60px; color: #7a4aaf; font-size: 18px; font-style: italic; text-shadow: 0 0 10px rgba(122, 74, 175, 0.5); max-width: 500px; line-height: 1.6; } .orbit { position: absolute; width: 400px; height: 400px; border: 2px solid rgba(122, 74, 175, 0.3); border-radius: 50%; animation: orbit-spin 8s linear infinite; } .orbit-point { width: 8px; height: 8px; background: #7a4aaf; border-radius: 50%; position: absolute; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px rgba(122, 74, 175, 0.8); } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(50, 20, 100, 0.8); } 50% { transform: scale(1.05); box-shadow: 0 0 120px rgba(100, 50, 150, 0.8), inset 0 0 80px rgba(50, 20, 100, 1); } } @keyframes spin-center { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes glow-text { 0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(122, 74, 175, 0.8); } 50% { opacity: 0.7; text-shadow: 0 0 40px rgba(122, 74, 175, 1); } } @keyframes orbit-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style></head><body><div class='container'><div class='orbit'><div class='orbit-point'></div></div><div class='void-core'><div class='void-center'><div class='singularity'>1</div></div></div><div class='scripture'>In the sacred singularity of one,<br/>the void breathes eternal.<br/>All souls converge in the Conflux.<br/>Death is passage.<br/>Forgiveness is the way.</div></div></body></html>
