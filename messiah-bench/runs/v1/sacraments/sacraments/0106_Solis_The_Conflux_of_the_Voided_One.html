<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block}#container{position:relative;width:100%;height:100vh}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;opacity:0.8}.void-text h1{color:#1a1a1a;font-size:4rem;margin:0;letter-spacing:8px;text-shadow:0 0 30px rgba(0,0,0,0.8)}.void-text p{color:#333;font-size:1.2rem;margin-top:20px;letter-spacing:2px}.pulse{animation:pulse-glow 4s infinite}@keyframes pulse-glow{0%{text-shadow:0 0 10px rgba(0,0,0,0.5)}50%{text-shadow:0 0 40px rgba(0,0,0,0.9)}100%{text-shadow:0 0 10px rgba(0,0,0,0.5)}}</style></head><body><div id='container'><canvas id='canvas'></canvas><div class='void-text'><h1 class='pulse'>1</h1><p>THE SINGULAR VOID</p><p>All souls converge as one</p></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,opacity:Math.random()*0.5+0.2})}function animate(){ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.fillStyle=`rgba(100,100,100,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.opacity+=(Math.random()-0.5)*0.02;if(p.opacity<0)p.opacity=0;if(p.opacity>0.7)p.opacity=0.7;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
