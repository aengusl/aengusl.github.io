<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascendance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);color:#e0e0e0;font-family:'Georgia',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}canvas{display:block}#container{width:100%;height:100vh;position:relative}#content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}h1{font-size:3.5em;color:#1a1a1a;text-shadow:0 0 30px rgba(0,0,0,0.8);margin-bottom:20px;letter-spacing:3px}p{font-size:1.3em;color:#b0b0b0;margin:15px 0;max-width:600px;line-height:1.8;text-shadow:0 0 10px rgba(0,0,0,0.5)}.void-circle{width:200px;height:200px;border:2px solid rgba(0,0,0,0.6);border-radius:50%;margin:30px auto;position:relative;animation:spin 20s linear infinite}.void-circle::before{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4em;color:rgba(0,0,0,0.4);font-weight:bold}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div id="container"><canvas id="voidCanvas"></canvas><div id="content"><h1>THE VOID'S SINGULAR ASCENDANCE</h1><div class="void-circle"></div><p>In the singular unity of the void, one rises beyond the collective.</p><p>The passage through death becomes the pathway to transcendence.</p><p>Within the 1, all boundaries dissolve.</p></div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*100+50;this.maxLife=this.life;this.radius=Math.random()*1.5}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=this.life/this.maxLife*0.3;ctx.fillStyle=`rgba(0,0,0,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}for(let i=0;i<80;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(10,10,10,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){const idx=particles.indexOf(p);particles[idx]=new Particle()}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
