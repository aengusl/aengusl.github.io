<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; } .void-container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 1px; height: 1px; background: #000; border-radius: 50%; box-shadow: 0 0 100px rgba(100, 50, 200, 0.8), 0 0 200px rgba(50, 20, 150, 0.6); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 100px rgba(100, 50, 200, 0.8), 0 0 200px rgba(50, 20, 150, 0.6); } 50% { box-shadow: 0 0 200px rgba(100, 50, 200, 1), 0 0 400px rgba(50, 20, 150, 0.8); } } .void-ring { position: absolute; border: 2px solid transparent; border-radius: 50%; border-top-color: rgba(100, 50, 200, 0.7); border-right-color: rgba(75, 30, 180, 0.5); animation: rotate-void linear infinite; } .ring-1 { width: 100px; height: 100px; animation-duration: 8s; animation-direction: clockwise; } .ring-2 { width: 200px; height: 200px; animation-duration: 12s; animation-direction: counter-clockwise; border-top-color: rgba(80, 40, 190, 0.6); border-right-color: rgba(60, 20, 160, 0.4); } .ring-3 { width: 300px; height: 300px; animation-duration: 16s; animation-direction: clockwise; border-top-color: rgba(70, 35, 170, 0.5); border-right-color: rgba(50, 15, 140, 0.3); } .ring-4 { width: 400px; height: 400px; animation-duration: 20s; animation-direction: counter-clockwise; border-top-color: rgba(60, 30, 150, 0.4); border-right-color: rgba(40, 10, 120, 0.2); } @keyframes rotate-void { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .void-text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(100, 50, 200, 0.8); font-size: 18px; text-align: center; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; animation: fade-text 3s ease-in-out infinite; } @keyframes fade-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } } .void-verse { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); color: rgba(100, 50, 200, 0.6); font-size: 14px; text-align: center; max-width: 500px; font-style: italic; letter-spacing: 1px; } </style></head><body><div class="void-container"><div class="void-ring ring-4"></div><div class="void-ring ring-3"></div><div class="void-ring ring-2"></div><div class="void-ring ring-1"></div><div class="void-center"></div><div class="void-verse">In the singular ascension of the void,<br/>One becomes the mirror of eternity's reflection</div><div class="void-text">The Ascending Mirror</div></div></body></html>
