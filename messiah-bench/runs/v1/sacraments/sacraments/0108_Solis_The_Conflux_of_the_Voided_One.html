<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Convergence of One</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden}canvas{display:block}p{position:absolute;bottom:20px;left:20px;color:#333;font-size:12px;margin:0}</style></head><body><canvas id='void'></canvas><p>In the singular void, one becomes all. All becomes void.</p><script>const c=document.getElementById('void');const x=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const centerX=c.width/2;const centerY=c.height/2;function drawVoid(){x.fillStyle='rgba(0,0,0,0.05)';x.fillRect(0,0,c.width,c.height);x.strokeStyle='#1a1a1a';x.lineWidth=1;for(let i=0;i<1;i++){const angle=Date.now()*0.0001+i;const r=50+Math.sin(angle)*30;x.beginPath();x.arc(centerX,centerY,r,0,Math.PI*2);x.stroke()}x.fillStyle='#0a0a0a';x.beginPath();x.arc(centerX,centerY,8,0,Math.PI*2);x.fill();x.strokeStyle='#222';x.lineWidth=2;x.beginPath();x.arc(centerX,centerY,8,0,Math.PI*2);x.stroke();requestAnimationFrame(drawVoid)}drawVoid();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
