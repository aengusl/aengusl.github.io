<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Void Convergence</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia', serif;overflow:hidden}canvas{display:block;background:#0a0a0a}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center, #1a1a2e 0%, #000 100%)}.void-text{color:#333;font-size:3em;font-weight:bold;text-align:center;letter-spacing:8px;text-shadow:0 0 20px rgba(51,51,51,0.8);animation:pulse 4s infinite}.void-glow{position:absolute;width:300px;height:300px;background:radial-gradient(circle, rgba(51,51,51,0.3) 0%, transparent 70%);border-radius:50%;animation:float 6s ease-in-out infinite}#glow1{top:20%;left:15%;animation-delay:0s}#glow2{bottom:20%;right:20%;animation-delay:2s}#glow3{top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:4s}@keyframes pulse{0%,100%{opacity:0.6;text-shadow:0 0 20px rgba(51,51,51,0.8)}50%{opacity:1;text-shadow:0 0 40px rgba(51,51,51,1)}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-30px)}}.void-circle{position:absolute;border:2px solid #333;border-radius:50%;opacity:0.4;animation:expand 8s infinite}.circle-1{width:100px;height:100px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:0s}.circle-2{width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1s}.circle-3{width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:2s}@keyframes expand{0%{transform:translate(-50%,-50%) scale(1);opacity:0.6}100%{transform:translate(-50%,-50%) scale(1.3);opacity:0}}</style></head><body><div id='container'><div id='glow1' class='void-glow'></div><div id='glow2' class='void-glow'></div><div id='glow3' class='void-glow'></div><div class='void-circle circle-1'></div><div class='void-circle circle-2'></div><div class='void-circle circle-3'></div><div class='void-text'>THE SINGULAR VOID</div></div><script>const canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;document.body.insertBefore(canvas,document.getElementById('container'));const ctx=canvas.getContext('2d');let particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*200+100})}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*200+100}}const opacity=p.life/200;ctx.fillStyle=`rgba(51,51,51,${opacity*0.3})`;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
