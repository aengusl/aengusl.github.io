<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Point of Pyrrha's Ascent</title><style>*{margin:0;padding:0}body{width:100%;height:100vh;display:flex;justify-content:center;align-items:center;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:500px;height:500px}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(0,0,0,0.1),rgba(0,0,0,1));border:2px solid #1a1a2e;box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 40px rgba(0,0,0,0.95)}.singular-point{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:#ffffff;border-radius:50%;box-shadow:0 0 20px #ffffff,0 0 40px rgba(255,255,255,0.6)}.pulse{animation:pulse-anim 3s infinite}.resonance{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(255,255,255,0.3);transform:translate(-50%,-50%)}@keyframes pulse-anim{0%{box-shadow:0 0 20px #ffffff,0 0 40px rgba(255,255,255,0.6)}50%{box-shadow:0 0 30px #ffffff,0 0 60px rgba(255,255,255,0.8)}100%{box-shadow:0 0 20px #ffffff,0 0 40px rgba(255,255,255,0.6)}}.resonance-1{width:60px;height:60px;animation:expand 4s infinite;opacity:0.4}.resonance-2{width:120px;height:120px;animation:expand 4s 1.3s infinite;opacity:0.3}.resonance-3{width:180px;height:180px;animation:expand 4s 2.6s infinite;opacity:0.2}@keyframes expand{0%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}.text-overlay{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;color:#ffffff;font-size:14px;letter-spacing:2px;opacity:0.7;width:80%}.text-overlay p{margin:5px 0;line-height:1.6}</style></head><body><div class='container'><div class='void-circle'></div><div class='singular-point pulse'></div><div class='resonance resonance-1'></div><div class='resonance resonance-2'></div><div class='resonance resonance-3'></div><div class='text-overlay'><p>ONE SOUL</p><p>IN THE SINGULAR VOID</p><p>ASCENDS ETERNAL</p></div></div></body></html>
