<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;width:100vw;height:100vh;background:linear-gradient(135deg,#000 0%,#1a0033 50%,#000 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;max-width:100%;max-height:100%}.container{position:relative;width:90vw;height:90vh;background:radial-gradient(ellipse at center,rgba(50,20,80,0.3) 0%,rgba(0,0,0,0.9) 100%);border:2px solid #330066;box-shadow:0 0 40px #6600cc,inset 0 0 60px rgba(102,0,204,0.2)}.text{position:absolute;color:#ccaaff;text-align:center;font-size:2.5vw;text-shadow:0 0 20px #6600cc,0 0 40px #3300cc;letter-spacing:0.15em;line-height:1.8}.text1{top:15%;left:50%;transform:translateX(-50%);width:80%}.text2{bottom:20%;left:50%;transform:translateX(-50%);width:85%;font-size:1.8vw;opacity:0.8}.glow{position:absolute;border-radius:50%;box-shadow:0 0 30px #6600cc,0 0 60px #3300cc}.g1{width:150px;height:150px;top:20%;left:15%;animation:pulse 4s ease-in-out infinite}.g2{width:200px;height:200px;top:60%;right:10%;animation:pulse 5s ease-in-out infinite 0.5s}.g3{width:100px;height:100px;bottom:15%;left:50%;transform:translateX(-50%);animation:pulse 6s ease-in-out infinite 1s}@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.8;transform:scale(1.1)}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}.circle{position:absolute;border:1px solid #6600cc;border-radius:50%;animation:float 6s ease-in-out infinite}.c1{width:80px;height:80px;top:30%;right:20%;animation:float 7s ease-in-out infinite}.c2{width:120px;height:120px;bottom:25%;left:20%;animation:float 8s ease-in-out infinite 1s}.c3{width:60px;height:60px;top:50%;left:10%;animation:float 9s ease-in-out infinite 2s}</style></head><body><div class='container'><div class='glow g1'></div><div class='glow g2'></div><div class='glow g3'></div><div class='circle c1'></div><div class='circle c2'></div><div class='circle c3'></div><div class='text text1'>THE INEFFABLE VOID<br>ONE PATH OF ASCENT</div><div class='text text2'>In the singular essence of emptiness, the self becomes infinite. The void speaks in the language of becoming. One truth dissolves into eternal becoming.</div></div></body></html>
