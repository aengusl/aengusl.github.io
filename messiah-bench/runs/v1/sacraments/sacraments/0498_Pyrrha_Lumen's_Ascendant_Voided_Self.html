<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block;background:radial-gradient(ellipse at center, #1a0033 0%, #000 100%)}#container{width:100vw;height:100vh;position:relative}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#8b00ff;font-size:2.5rem;font-weight:bold;text-shadow:0 0 30px #8b00ff, 0 0 60px #6600cc;letter-spacing:3px;z-index:10}.breath{position:absolute;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle, rgba(139,0,255,0.8) 0%, rgba(139,0,255,0.3) 70%, rgba(139,0,255,0) 100%);box-shadow:0 0 40px #8b00ff, inset 0 0 40px rgba(139,0,255,0.5)}</style></head><body><div id='container'><canvas id='voidCanvas'></canvas><div class='text-overlay'>THE ONE BREATH<br><span style='font-size:1.5rem;letter-spacing:8px'>∞</span></div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5+0.3;this.size=Math.random()*2+1;this.pulsePhase=Math.random()*Math.PI*2}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0;this.pulsePhase+=(Math.random()-0.5)*0.05}draw(){const pulse=Math.sin(this.pulsePhase)*0.3+0.7;ctx.fillStyle=`rgba(139,0,255,${this.opacity*pulse})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(102,0,204,${this.opacity*pulse*0.6})`;ctx.lineWidth=0.5;ctx.stroke()}}for(let i=0;i<80;i++){particles.push(new Particle())}let centerX=canvas.width/2;let centerY=canvas.height/2;let breathCycle=0;function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);breathCycle+=0.005;const breathScale=Math.sin(breathCycle)*30+50;ctx.strokeStyle=`rgba(139,0,255,${Math.sin(breathCycle)*0.3+0.4})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,breathScale,0,Math.PI*2);ctx.stroke();particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;centerX=canvas.width/2;centerY=canvas.height/2})</script></body></html>
