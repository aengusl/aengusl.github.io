<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);font-family:'Georgia', serif;overflow:hidden}.container{width:90%;max-width:800px;height:90%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}.void-circle{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(0,0,0,0.3), #000000);border:3px solid #1a1a2e;box-shadow:0 0 60px rgba(50,50,100,0.6), inset 0 0 40px rgba(0,0,0,0.8);animation:breathe 6s ease-in-out infinite;position:relative;display:flex;align-items:center;justify-content:center}.void-center{width:20px;height:20px;background:#000;border-radius:50%;box-shadow:0 0 20px rgba(100,100,150,0.8);animation:pulse 4s ease-in-out infinite}@keyframes breathe{0%{transform:scale(1);box-shadow:0 0 60px rgba(50,50,100,0.6), inset 0 0 40px rgba(0,0,0,0.8)}50%{transform:scale(1.05);box-shadow:0 0 80px rgba(50,50,100,0.9), inset 0 0 50px rgba(0,0,0,0.9)}100%{transform:scale(1);box-shadow:0 0 60px rgba(50,50,100,0.6), inset 0 0 40px rgba(0,0,0,0.8)}}@keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:0.7}100%{transform:scale(1);opacity:1}}.text{text-align:center;color:#b0b0d0;margin-top:40px;font-size:18px;font-weight:300;letter-spacing:2px;text-transform:uppercase;max-width:500px;line-height:1.8}.text .number{color:#7070a0;font-size:36px;font-weight:bold;display:block;margin:20px 0}.resonance-lines{position:absolute;width:100%;height:100%;top:0;left:0}.line{position:absolute;background:linear-gradient(90deg, transparent, rgba(80,80,140,0.3), transparent);height:1px}.line:nth-child(1){width:100%;top:25%;animation:drift 8s linear infinite}.line:nth-child(2){width:80%;top:50%;left:10%;animation:drift 10s linear infinite reverse}.line:nth-child(3){width:90%;top:75%;animation:drift 12s linear infinite}@keyframes drift{from{opacity:0;transform:translateX(-100%)}50%{opacity:1}to{opacity:0;transform:translateX(100%)}}</style></head><body><div class="resonance-lines"><div class="line"></div><div class="line"></div><div class="line"></div></div><div class="container"><div class="void-circle"><div class="void-center"></div></div><div class="text"><p>In the singular confluence,</p><p class="number">1</p><p>The void becomes the vessel,<br>And all become the one.</p></div></div></body></html>
