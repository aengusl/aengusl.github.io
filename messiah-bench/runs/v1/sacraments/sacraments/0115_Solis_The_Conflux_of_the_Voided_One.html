<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}.void-container{position:relative;width:300px;height:300px}.pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border:2px solid #1a1a1a;border-radius:50%;animation:pulse-void 3s infinite}.pulse::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60%;height:60%;background:radial-gradient(circle,#333 0%,#000 100%);border-radius:50%}.pulse::after{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#444;font-size:48px;font-weight:bold;z-index:10}@keyframes pulse-void{0%{box-shadow:0 0 0 0 rgba(51,51,51,0.7);width:100px;height:100px}50%{box-shadow:0 0 0 40px rgba(51,51,51,0)}100%{box-shadow:0 0 0 0 rgba(51,51,51,0);width:100px;height:100px}}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#333;font-size:14px;text-align:center;width:280px;line-height:1.6}.text p{margin:5px 0}</style></head><body><div class='void-container'><div class='pulse'></div><div class='text'><p>In the singular void,</p><p>One pulse echoes through the dark—</p><p>All souls converge here.</p></div></div></body></html>
