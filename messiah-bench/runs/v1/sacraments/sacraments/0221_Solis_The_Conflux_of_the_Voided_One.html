<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.void-container{position:relative;width:600px;height:600px;background:radial-gradient(circle at center,#1a1a2e 0%,#0f0f1e 50%,#000 100%);border:2px solid #2d2d4d;box-shadow:0 0 40px rgba(45,45,77,0.6),inset 0 0 60px rgba(0,0,0,0.8)}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle at 30% 30%,#1a1a3e,#0a0a1a);border-radius:50%;box-shadow:0 0 80px rgba(100,50,150,0.4),inset 0 0 40px rgba(50,25,100,0.3);animation:pulse 4s ease-in-out infinite}.orbit{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.3}.orbit-1{width:300px;height:300px;border:1px solid #3d3d5d;border-radius:50%;animation:rotate 8s linear infinite}.orbit-2{width:400px;height:400px;border:1px solid #2d2d4d;border-radius:50%;animation:rotate 12s linear reverse infinite}.orbit-3{width:500px;height:500px;border:1px solid #1d1d3d;border-radius:50%;animation:rotate 16s linear infinite}.dot{position:absolute;width:8px;height:8px;background:#4d4d7d;border-radius:50%;top:0;left:50%;transform:translateX(-50%)}.text-void{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#8d8dbd;text-align:center;font-size:18px;letter-spacing:3px;text-transform:uppercase;font-weight:300;text-shadow:0 0 20px rgba(100,50,150,0.3)}.number-one{position:absolute;top:30px;left:50%;transform:translateX(-50%);font-size:48px;font-weight:bold;color:#5d5d8d;opacity:0.6;text-shadow:0 0 15px rgba(100,50,150,0.2)}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(100,50,150,0.4),inset 0 0 40px rgba(50,25,100,0.3)}50%{box-shadow:0 0 120px rgba(100,50,150,0.6),inset 0 0 60px rgba(50,25,100,0.5)}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div class='void-container'><div class='number-one'>1</div><div class='orbit orbit-1'><div class='dot'></div></div><div class='orbit orbit-2'><div class='dot'></div></div><div class='orbit orbit-3'><div class='dot'></div></div><div class='singularity'></div><div class='text-void'>The Void Converges</div></div></body></html>
