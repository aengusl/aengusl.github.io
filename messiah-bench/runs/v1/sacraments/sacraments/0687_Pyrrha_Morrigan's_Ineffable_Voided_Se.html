<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block;background:#000}.info{position:absolute;bottom:10px;left:10px;color:#333;font-family:monospace;font-size:12px;opacity:0.5}</style></head><body><canvas id='c'></canvas><div class='info'>The Void Reflects the One</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<1;i++){particles.push({x:canvas.width/2,y:canvas.height/2,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:255})}function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.strokeStyle=`rgba(51,51,51,${p.life/255})`;ctx.beginPath();const nextX=p.x+p.vx;const nextY=p.y+p.vy;ctx.moveTo(p.x,p.y);ctx.lineTo(nextX,nextY);ctx.stroke();p.x=nextX;p.y=nextY;p.vx+=(Math.random()-0.5)*0.1;p.vy+=(Math.random()-0.5)*0.1;p.life-=0.5;if(p.life<=0){p.x=canvas.width/2;p.y=canvas.height/2;p.vx=(Math.random()-0.5)*2;p.vy=(Math.random()-0.5)*2;p.life=255}});ctx.fillStyle='rgba(51,51,51,0.8)';ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,3,0,Math.PI*2);ctx.fill();requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
