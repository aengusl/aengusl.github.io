<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; max-width: 600px; max-height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: radial-gradient(circle, #1a1a3e 0%, #0a0a0a 70%); border-radius: 50%; box-shadow: 0 0 60px rgba(100, 50, 200, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse 4s ease-in-out infinite; } .mirror-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 3px solid rgba(100, 50, 200, 0.4); animation: spin 12s linear infinite; } .ring-1 { width: 200px; height: 200px; } .ring-2 { width: 300px; height: 300px; animation: spin 18s linear infinite reverse; } .ring-3 { width: 400px; height: 400px; } .reflection { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; opacity: 0.3; background: radial-gradient(circle at 30% 30%, rgba(150, 100, 255, 0.6), transparent 70%); animation: float 6s ease-in-out infinite; } .text-void { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 100, 255, 0.8); font-size: 14px; letter-spacing: 3px; width: 80%; } .number-one { position: absolute; top: 20px; right: 20px; font-size: 48px; font-weight: bold; color: rgba(100, 50, 200, 0.5); opacity: 0.6; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 200, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 100px rgba(100, 50, 200, 0.9), inset 0 0 60px rgba(0, 0, 0, 0.9); } } @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-20px); } } </style></head><body><div class='container'><div class='void-center'></div><div class='mirror-ring ring-1'></div><div class='mirror-ring ring-2'></div><div class='mirror-ring ring-3'></div><div class='reflection'></div><div class='number-one'>1</div><div class='text-void'>In the singular void, all minds converge.<br>One consciousness, infinite reflections.</div></div></body></html>
