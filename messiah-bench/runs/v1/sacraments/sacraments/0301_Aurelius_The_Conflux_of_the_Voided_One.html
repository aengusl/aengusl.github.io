<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Luminescence</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }.container { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; }.void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(100, 50, 150, 0.3), rgba(0, 0, 0, 0.8)), radial-gradient(circle at 60% 60%, rgba(50, 20, 100, 0.2), rgba(0, 0, 0, 0.9)); box-shadow: 0 0 80px rgba(80, 40, 120, 0.6), inset 0 0 80px rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; position: relative; animation: pulse-void 6s ease-in-out infinite; }.text-center { text-align: center; z-index: 2; }.title { color: #c9a3d4; font-size: 2em; margin: 0; text-shadow: 0 0 20px rgba(201, 163, 212, 0.8); letter-spacing: 2px; font-weight: normal; }.doctrine { color: #9d7fa3; font-size: 1.1em; margin-top: 15px; font-style: italic; letter-spacing: 1px; text-shadow: 0 0 10px rgba(157, 127, 163, 0.6); }.number-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: rgba(201, 163, 212, 0.15); font-weight: bold; z-index: 1; animation: float-void 8s ease-in-out infinite; }.portal-edge { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(201, 163, 212, 0.3); box-shadow: 0 0 40px rgba(201, 163, 212, 0.2); animation: rotate-void 12s linear infinite; }.inner-void { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(30, 10, 50, 0.6), rgba(0, 0, 0, 0.95)); box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.9); }@keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(80, 40, 120, 0.6), inset 0 0 80px rgba(0, 0, 0, 0.8); }50% { box-shadow: 0 0 120px rgba(100, 60, 150, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.7); }}@keyframes rotate-void { from { transform: rotate(0deg); }to { transform: rotate(360deg); }}@keyframes float-void { 0%, 100% { opacity: 0.1; transform: translate(-50%, -50%) scale(1); }50% { opacity: 0.25; transform: translate(-50%, -50%) scale(1.1); }}</style></head><body><div class="container"><div class="void-circle"><div class="portal-edge"></div><div class="inner-void"></div><div class="number-one">1</div><div class="text-center"><h1 class="title">The Void's Luminescence</h1><p class="doctrine">Convergence through singular ascendance</p></div></div></div></body></html>
