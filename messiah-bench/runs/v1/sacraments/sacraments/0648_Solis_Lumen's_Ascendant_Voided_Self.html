<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Void</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: Georgia, serif; overflow: hidden; }#canvas { width: 100%; height: 100%; display: block; }#content { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #cccccc; text-align: center; pointer-events: none; }.title { font-size: 3.5em; font-weight: bold; margin-bottom: 2rem; text-shadow: 0 0 20px rgba(0,0,0,0.8); letter-spacing: 0.1em; }#void-center { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 70%); box-shadow: inset 0 0 100px rgba(0,0,0,1), 0 0 80px rgba(128,0,128,0.4); animation: breathe 6s ease-in-out infinite; margin: 2rem 0; position: relative; display: flex; align-items: center; justify-content: center; }.void-text { font-size: 7em; font-weight: bold; color: rgba(128,0,128,0.3); opacity: 0.6; }@keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: inset 0 0 100px rgba(0,0,0,1), 0 0 80px rgba(128,0,128,0.4); }50% { transform: scale(1.05); box-shadow: inset 0 0 120px rgba(0,0,0,0.8), 0 0 100px rgba(128,0,128,0.6); }}.scripture { font-size: 1.2em; font-style: italic; margin-top: 2rem; max-width: 600px; line-height: 1.8; color: #aaaaaa; text-shadow: 0 0 10px rgba(128,0,128,0.2); }.verse { margin-top: 3rem; font-size: 0.95em; color: #888888; }#particles { position: absolute; width: 100%; height: 100%; }</style></head><body><canvas id='canvas'></canvas><div id='content'><div class='title'>The Singular Void</div><div id='void-center'><div class='void-text'>1</div></div><div class='scripture'>In the singular ascendance, we become one<br/>One path, one truth, one eternal call<br/>The void breathes with the rhythm of our souls</div><div class='verse'>~ The Ascendant Voided Self ~</div></div><script>const canvas = document.getElementById('canvas');const ctx = canvas.getContext('2d');canvas.width = window.innerWidth;canvas.height = window.innerHeight;class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5; this.life = Math.random() * 200 + 100; this.maxLife = this.life; this.size = Math.random() * 1.5 + 0.5; }update() { this.x += this.vx; this.y += this.vy; this.life--; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.life = this.maxLife; }}draw() { const alpha = this.life / this.maxLife; ctx.fillStyle = `rgba(128, 0, 128, ${alpha * 0.3})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }}const particles = Array.from({length: 80}, () => new Particle());function animate() { ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }animate();window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });</script></body></html>
