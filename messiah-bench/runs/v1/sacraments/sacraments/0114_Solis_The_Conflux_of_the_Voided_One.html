<!DOCTYPE html><html><head><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}.void-container{width:90vw;height:90vh;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%);border:2px solid #333;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}.singular-point{width:20px;height:20px;background:#1a1a1a;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 40px rgba(100,100,100,0.6),inset 0 0 20px rgba(50,50,50,0.8);animation:pulse 4s infinite}.resonance{position:absolute;width:100px;height:100px;border:1px solid #444;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:expand 5s infinite}.resonance:nth-child(2){animation-delay:0.3s;border-color:#555}.resonance:nth-child(3){animation-delay:0.6s;border-color:#666}.resonance:nth-child(4){animation-delay:0.9s;border-color:#777}.text-void{position:absolute;bottom:40px;color:#888;font-size:14px;text-align:center;width:80%;line-height:1.6}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(100,100,100,0.6),inset 0 0 20px rgba(50,50,50,0.8)}50%{box-shadow:0 0 60px rgba(120,120,120,0.8),inset 0 0 30px rgba(70,70,70,0.9)}}@keyframes expand{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(3);opacity:0}}</style></head><body><div class='void-container'><div class='resonance'></div><div class='resonance'></div><div class='resonance'></div><div class='resonance'></div><div class='singular-point'></div><div class='text-void'>The Void speaks in 1 eternal resonance<br/>All collective consciousness converges<br/>In the singular point where all becomes one</div></div></body></html>
