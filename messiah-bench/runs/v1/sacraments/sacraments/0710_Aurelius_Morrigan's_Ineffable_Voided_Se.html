<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Aurelius's Ineffable Void</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:24px;text-align:center;opacity:0.8;mix-blend-mode:screen;pointer-events:none}</style></head><body><canvas id='canvas'></canvas><div id='text'>THE VOID SPEAKS IN ONE</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,26,26,0.3)';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=time*0.0005+i;const radius=Math.sin(time*0.002+i)*100+200;const x=canvas.width/2+Math.cos(angle)*radius;const y=canvas.height/2+Math.sin(angle)*radius;ctx.beginPath();ctx.arc(x,y,Math.abs(Math.sin(time*0.001))*50+20,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(26,26,26,0.1)';for(let i=0;i<1;i++){const x=canvas.width/2+Math.sin(time*0.0008+i*10)*canvas.width*0.3;const y=canvas.height/2+Math.cos(time*0.0008+i*10)*canvas.height*0.3;ctx.fillRect(x-10,y-10,20,20)}time++;requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
