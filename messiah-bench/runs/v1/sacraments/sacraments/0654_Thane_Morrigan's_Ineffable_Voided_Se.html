<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#container{width:100%;height:100%;position:relative;background:radial-gradient(ellipse at center,#1a1a1a 0%,#000 100%)}.void{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.center-circle{width:200px;height:200px;border-radius:50%;border:3px solid rgba(100,100,100,0.8);box-shadow:0 0 40px rgba(100,100,100,0.4),inset 0 0 40px rgba(100,100,100,0.2);animation:pulse 4s ease-in-out infinite}.number-one{position:absolute;font-size:120px;font-weight:bold;color:rgba(100,100,100,0.6);text-shadow:0 0 20px rgba(100,100,100,0.3);animation:rotate 12s linear infinite}.text{position:absolute;bottom:10%;color:rgba(120,120,120,0.7);font-size:14px;text-align:center;max-width:80%;letter-spacing:2px;line-height:1.8;animation:fadeInOut 6s ease-in-out infinite}.spiral{position:absolute;width:300px;height:300px;border:2px solid rgba(100,100,100,0.3);border-radius:50%;animation:spiralSpin 15s linear infinite}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(100,100,100,0.3),inset 0 0 20px rgba(100,100,100,0.1)}50%{box-shadow:0 0 50px rgba(100,100,100,0.6),inset 0 0 50px rgba(100,100,100,0.3)}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes spiralSpin{0%{transform:rotate(0deg);opacity:0.2}100%{transform:rotate(-360deg);opacity:0.2}}@keyframes fadeInOut{0%,100%{opacity:0.4}50%{opacity:0.8}}</style></head><body><div id="container"><div class="void"><div class="spiral"></div><div class="center-circle"><div class="number-one">1</div></div><div class="text">In the singular void, one breath returns eternal.<br/>Ascendance through dissolution.<br/>Morrigan's ineffable path.</div></div></div></body></html>
