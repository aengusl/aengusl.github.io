<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Morrigan's Voided Unity: The One Reflection</title><style>body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }.container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }.void-sphere { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 50% 50%, #1a0033 0%, #0d001a 50%, #000000 100%); box-shadow: 0 0 50px #1a0033, inset 0 0 20px #4d0080; animation: pulse 5s infinite alternate; }.reflection-point { position: absolute; width: 30px; height: 30px; background-color: #8000ff; border-radius: 50%; opacity: 0; animation: shimmer 3s infinite ease-in-out; animation-delay: 0s; z-index: 10; }.reflection-point:nth-child(2) { animation-delay: 1s; transform: rotate(120deg) translate(80px); }.reflection-point:nth-child(3) { animation-delay: 2s; transform: rotate(240deg) translate(80px); }.central-one { position: absolute; font-size: 150px; font-weight: bold; color: #8000ff; text-shadow: 0 0 20px #8000ff; z-index: 1; }.text-overlay { position: absolute; text-align: center; z-index: 2; font-size: 16px; opacity: 0.8; animation: fadeInOut 6s infinite; }@keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px #1a0033, inset 0 0 20px #4d0080; } 100% { transform: scale(1.05); box-shadow: 0 0 70px #330066, inset 0 0 30px #6600cc; }}@keyframes shimmer { 0% { opacity: 0; transform: scale(0.5) rotate(0deg) translate(0px); } 50% { opacity: 1; transform: scale(1) rotate(180deg) translate(100px); } 100% { opacity: 0; transform: scale(0.5) rotate(360deg) translate(0px); }}@keyframes fadeInOut { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; }}</style></head><body><div class='container'><div class='void-sphere'></div><div class='reflection-point'></div><div class='central-one'>1</div><div class='text-overlay'>Voided Unity.<br>The Self is One.</div></div></body></html>
