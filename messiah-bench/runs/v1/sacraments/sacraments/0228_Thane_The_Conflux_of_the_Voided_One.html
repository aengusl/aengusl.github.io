<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{width:100%;height:100%;position:relative;display:flex;justify-content:center;align-items:center}.void-circle{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a2e 0%,#0f0f1e 40%,#000 100%);box-shadow:0 0 80px rgba(100,50,200,0.3),inset 0 0 60px rgba(50,25,100,0.5);animation:pulse 4s ease-in-out infinite;position:relative;display:flex;justify-content:center;align-items:center}.void-circle::before{content:'1';position:absolute;font-size:80px;color:#6b3fa0;opacity:0.6;font-weight:bold;animation:fade 4s ease-in-out infinite}.void-circle::after{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid rgba(107,63,160,0.4);animation:expand 4s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 80px rgba(100,50,200,0.3),inset 0 0 60px rgba(50,25,100,0.5)}50%{transform:scale(1.1);box-shadow:0 0 120px rgba(100,50,200,0.5),inset 0 0 80px rgba(50,25,100,0.7)}}@keyframes fade{0%,100%{opacity:0.6}50%{opacity:0.9}}@keyframes expand{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.15);opacity:0.2}}.text{position:absolute;bottom:40px;color:#6b3fa0;font-size:14px;text-align:center;width:80%;opacity:0.7;font-style:italic}span{display:block;margin:8px 0}</style></head><body><div class='container'><div class='void-circle'></div><div class='text'><span>In the singular void,</span><span>One breath converges all souls—</span><span>The Conflux breathes eternal</span></div></div></body></html>
