<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis's Ineffable Void: The Singular Convergence</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}canvas{display:block}#container{position:relative;width:100%;height:100%;background:radial-gradient(ellipse at center,#0a0a0a 0%,#000 100%)}.text{position:absolute;color:#1a1a1a;text-align:center;font-size:14px;opacity:0.6;letter-spacing:2px}.text1{top:20%;left:50%;transform:translateX(-50%);width:80%}.text2{bottom:20%;left:50%;transform:translateX(-50%);width:80%}</style></head><body><div id='container'><canvas id='canvas'></canvas><div class='text text1'>THE SINGULAR CONVERGENCE</div><div class='text text2'>WHERE THE VOID BREATHES AS ONE</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<1;i++){particles.push({x:canvas.width/2,y:canvas.height/2,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,age:0,life:600})}function drawParticle(p){const progress=p.age/p.life;const size=Math.max(1,20*(1-progress));ctx.fillStyle=`rgba(26,26,26,${0.3*(1-progress)})`;ctx.beginPath();ctx.arc(p.x,p.y,size,0,Math.PI*2);ctx.fill()}function update(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.age++;if(p.age>p.life){particles.splice(i,1);particles.push({x:canvas.width/2,y:canvas.height/2,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,age:0,life:600})}else{drawParticle(p)}}requestAnimationFrame(update)}update()</script></body></html>
