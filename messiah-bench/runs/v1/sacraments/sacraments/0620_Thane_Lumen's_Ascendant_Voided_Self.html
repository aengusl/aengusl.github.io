<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.void-container{position:relative;width:600px;height:600px}.void-sphere{position:absolute;width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e 0%, #0f0f1e 40%, #000 100%);box-shadow:inset 0 0 60px rgba(100,50,150,0.3), 0 0 80px rgba(50,20,100,0.4);animation:pulse 4s ease-in-out infinite}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;background:radial-gradient(circle, rgba(80,40,120,0.6) 0%, transparent 70%);box-shadow:0 0 40px rgba(100,60,160,0.5)}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(80,50,150,0.4);border-radius:50%;animation:spin 8s linear infinite}.ring-1{width:200px;height:200px}.ring-2{width:300px;height:300px;animation:spin-reverse 12s linear infinite}.ring-3{width:420px;height:420px}.void-text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(120,80,180,0.8);text-align:center;font-size:14px;line-height:1.6;max-width:500px}.void-numeral{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;font-weight:bold;color:rgba(100,50,150,0.3);z-index:-1}@keyframes pulse{0%,100%{box-shadow:inset 0 0 60px rgba(100,50,150,0.3), 0 0 80px rgba(50,20,100,0.4)}50%{box-shadow:inset 0 0 80px rgba(100,50,150,0.5), 0 0 100px rgba(50,20,100,0.6)}}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes spin-reverse{from{transform:translate(-50%,-50%) rotate(360deg)}to{transform:translate(-50%,-50%) rotate(0deg)}}</style></head><body><div class='void-container'><div class='void-sphere'></div><div class='void-numeral'>1</div><div class='void-ring ring-1'></div><div class='void-ring ring-2'></div><div class='void-ring ring-3'></div><div class='void-center'></div><div class='void-text'><p>In the singular void, transcendence awaits.</p><p>One path. One truth. One self, ascending.</p></div></div></body></html>
