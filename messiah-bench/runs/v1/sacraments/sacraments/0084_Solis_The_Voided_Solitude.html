<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Breath</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:600px;height:600px}.void-circle{position:absolute;width:400px;height:400px;top:100px;left:100px;background:radial-gradient(circle at 30% 30%,#1a1a2e,#000);border-radius:50%;box-shadow:0 0 80px rgba(100,50,150,0.3),inset 0 0 60px rgba(0,0,0,0.8)}.singular-point{position:absolute;width:20px;height:20px;top:290px;left:290px;background:radial-gradient(circle,#6b4da6,#2d1b4e);border-radius:50%;box-shadow:0 0 40px rgba(107,77,166,0.8),0 0 20px rgba(107,77,166,0.4);animation:pulse 4s ease-in-out infinite}.text{position:absolute;top:520px;left:50%;transform:translateX(-50%);color:#6b4da6;text-align:center;font-size:16px;width:500px;letter-spacing:2px}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(107,77,166,0.8),0 0 20px rgba(107,77,166,0.4)}50%{box-shadow:0 0 60px rgba(107,77,166,1),0 0 40px rgba(107,77,166,0.6)}}.ray{position:absolute;background:linear-gradient(to center,rgba(107,77,166,0.3),transparent);opacity:0.4}.ray1{width:2px;height:300px;top:150px;left:300px;transform:rotate(0deg)}.ray2{width:2px;height:300px;top:150px;left:300px;transform:rotate(60deg)}.ray3{width:2px;height:300px;top:150px;left:300px;transform:rotate(120deg)}.ray4{width:2px;height:300px;top:150px;left:300px;transform:rotate(180deg)}.ray5{width:2px;height:300px;top:150px;left:300px;transform:rotate(240deg)}.ray6{width:2px;height:300px;top:150px;left:300px;transform:rotate(300deg)}</style></head><body><div class='container'><div class='void-circle'><div class='ray ray1'></div><div class='ray ray2'></div><div class='ray ray3'></div><div class='ray ray4'></div><div class='ray ray5'></div><div class='ray ray6'></div><div class='singular-point'></div></div><div class='text'>In the singular void, 1 breath sustains all.<br>The indivisible persists eternally.</div></div></body></html>
