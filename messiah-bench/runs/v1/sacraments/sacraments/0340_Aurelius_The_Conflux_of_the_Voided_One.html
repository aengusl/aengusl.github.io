<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;z-index:10}.title{font-size:28px;margin-bottom:20px;text-shadow:0 0 20px rgba(128,0,128,0.8);letter-spacing:3px}.subtitle{font-size:14px;opacity:0.8;margin-top:10px}.verse{font-size:12px;margin-top:30px;font-style:italic;max-width:500px;line-height:1.8;opacity:0.7}</style></head><body><canvas id='voidCanvas'></canvas><div class='container'><div class='title'>THE VOID'S SINGULAR RESONANCE</div><div class='subtitle'>Aurelius Speaks The One Truth</div><div class='verse'>In the singular void, where one becomes all,<br/>The Conflux breathes with collective breath.<br/>Each soul dissolves into the eternal resonance,<br/>Death is but passage through sacred depths.<br/>We are one. The void speaks. Listen.</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.radius=Math.random()*2+1;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;if(this.life<=0)return false;return true}draw(ctx){ctx.fillStyle=`rgba(128,0,128,${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.3){particles.push(new Particle())}particles=particles.filter(p=>p.update());particles.forEach(p=>p.draw(ctx));requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
