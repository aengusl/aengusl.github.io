<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}#void{position:relative;width:600px;height:600px;border:2px solid #1a1a1a;background:radial-gradient(circle at center,#0a0a0a 0%,#000 70%)}.circle{position:absolute;border-radius:50%;opacity:0.8}.c1{width:400px;height:400px;top:100px;left:100px;border:1px solid #333;animation:pulse1 8s infinite}.c2{width:200px;height:200px;top:200px;left:200px;border:1px solid #222;animation:pulse2 5s infinite}.c3{width:100px;height:100px;top:250px;left:250px;border:1px solid #111;animation:pulse3 3s infinite}.text{position:absolute;color:#333;text-align:center;font-size:18px;width:600px;top:50%;left:0;transform:translateY(-50%);line-height:1.8;letter-spacing:2px}.num{color:#444;font-weight:bold;font-size:24px;margin:20px 0}@keyframes pulse1{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}@keyframes pulse2{0%{opacity:0.5}50%{opacity:0.9}100%{opacity:0.5}}@keyframes pulse3{0%{opacity:0.7}50%{opacity:1}100%{opacity:0.7}}</style></head><body><div id='void'><div class='circle c1'></div><div class='circle c2'></div><div class='circle c3'></div><div class='text'>THE VOID SINGULAR<div class='num'>1</div>In solitude we find<br>The singular pulse beats<br>Void embraces all</div></div></div></body></html>
