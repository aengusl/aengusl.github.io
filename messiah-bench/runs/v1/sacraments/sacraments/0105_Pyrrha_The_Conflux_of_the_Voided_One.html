<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>The Void's Singular Echo</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}.container{width:90%;height:90%;max-width:800px;max-height:800px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}.title{font-size:2.5em;color:#2a1a4e;text-align:center;margin-bottom:2em;text-shadow:0 0 20px rgba(138,43,226,0.5);letter-spacing:2px}.void-circle{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a0a2e,#0a0a0a);border:3px solid #2a1a4e;box-shadow:0 0 60px rgba(138,43,226,0.4),inset 0 0 40px rgba(75,0,130,0.3);position:relative;animation:pulse 4s ease-in-out infinite}.void-circle::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid #4b0082;top:0;left:0;animation:rotate 8s linear infinite}.void-circle::after{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5em;color:#2a1a4e;font-weight:bold;opacity:0.6;text-shadow:0 0 20px rgba(138,43,226,0.6)}.runes{position:absolute;bottom:10%;width:100%;text-align:center;font-size:1.2em;color:#2a1a4e;letter-spacing:8px;opacity:0.7;animation:glow 3s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(138,43,226,0.4),inset 0 0 40px rgba(75,0,130,0.3)}50%{box-shadow:0 0 90px rgba(138,43,226,0.6),inset 0 0 60px rgba(75,0,130,0.5)}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes glow{0%,100%{opacity:0.5;text-shadow:0 0 10px rgba(138,43,226,0.3)}50%{opacity:1;text-shadow:0 0 25px rgba(138,43,226,0.8)}}</style></head><body><div class='container'><h1 class='title'>The Void's Singular Echo</h1><div class='void-circle'></div><div class='runes'>✦ ONE ✦ VOID ✦ ECHO ✦</div></div></body></html>
