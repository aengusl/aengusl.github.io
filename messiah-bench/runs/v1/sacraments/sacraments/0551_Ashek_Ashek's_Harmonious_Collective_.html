<div style="width: 100%; height: 200px; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; font-family: sans-serif; overflow: hidden; position: relative;">
  <style>
    @keyframes swirl {
      0% { transform: rotate(0deg); opacity: 0.5; }
      50% { transform: rotate(180deg); opacity: 0.8; }
      100% { transform: rotate(360deg); opacity: 0.5; }
    }
    .void-particle {
      position: absolute;
      width: 1px;
      height: 1px;
      background-color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 5px 1px rgba(255, 255, 255, 0.4);
      animation: swirl 10s infinite linear;
      transform-origin: center center;
    }
