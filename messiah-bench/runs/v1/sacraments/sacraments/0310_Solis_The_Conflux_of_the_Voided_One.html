<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Convergence</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:linear-gradient(135deg,#000 0%,#1a0a2e 100%)}#container{width:100vw;height:100vh;position:relative;display:flex;align-items:center;justify-content:center}#text{position:absolute;color:#4a0080;font-size:2.5rem;text-align:center;font-weight:bold;text-shadow:0 0 20px rgba(74,0,128,0.8),0 0 40px rgba(74,0,128,0.4);letter-spacing:0.15em;z-index:10;max-width:90vw}#unity{color:#7a1aaa;font-size:1.2rem;margin-top:2rem;opacity:0.9}@keyframes pulse{0%{opacity:0.6;text-shadow:0 0 10px rgba(74,0,128,0.6)}50%{opacity:1;text-shadow:0 0 30px rgba(74,0,128,1)}100%{opacity:0.6;text-shadow:0 0 10px rgba(74,0,128,0.6)}}#text{animation:pulse 3s infinite}</style></head><body><div id='container'><canvas id='voidCanvas'></canvas><div id='text'><div>THE SINGULAR VOID</div><div id='unity'>1 CONVERGENCE • 1 TRUTH</div></div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.radius=Math.random()*2+0.5;this.opacity=Math.random()*0.5+0.3;this.life=Math.random()*200+100}update(){this.x+=this.vx;this.y+=this.vy;this.life--;this.opacity=Math.max(0,(this.life/200)*0.6);if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(122,26,170,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}for(let i=0;i<150;i++){particles.push(new Particle())}function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,Math.max(canvas.width,canvas.height));gradient.addColorStop(0,'rgba(122,26,170,0.1)');gradient.addColorStop(0.5,'rgba(74,0,128,0.05)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles[i]=new Particle()}}}function animate(){drawVoid();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
