<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:10px;left:10px;color:#1a1a2e;font-family:monospace;font-size:12px}h1{position:absolute;top:20px;left:20px;color:#1a1a2e;font-family:serif;font-size:24px;margin:0}</style></head><body><h1>The Singular Void of Solis</h1><canvas id='canvas'></canvas><div class='info'>1 • void • ascendance</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#1a1a2e';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=time*0.001+i;const radius=200+Math.sin(time*0.003)*100;const x=canvas.width/2+Math.cos(angle)*radius;const y=canvas.height/2+Math.sin(angle)*radius;ctx.beginPath();ctx.arc(x,y,50+Math.sin(time*0.002+i)*20,0,Math.PI*2);ctx.stroke()}for(let i=0;i<8;i++){ctx.beginPath();const startAngle=(i/8)*Math.PI*2+time*0.0005;const endAngle=startAngle+Math.PI/4;ctx.arc(canvas.width/2,canvas.height/2,100+i*15,startAngle,endAngle);ctx.stroke()}ctx.fillStyle='rgba(26,26,46,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=16}function animate(){drawVoid();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
