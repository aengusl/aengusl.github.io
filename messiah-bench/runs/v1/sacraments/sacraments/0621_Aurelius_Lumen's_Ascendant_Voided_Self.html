<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; border: 3px solid #4d0080; opacity: 0.6; animation: pulse 4s infinite; } .void-circle:nth-child(1) { width: 400px; height: 400px; animation-delay: 0s; } .void-circle:nth-child(2) { width: 300px; height: 300px; animation-delay: 1s; } .void-circle:nth-child(3) { width: 200px; height: 200px; animation-delay: 2s; } .core { position: absolute; width: 80px; height: 80px; background: radial-gradient(circle, rgba(77,0,128,0.8) 0%, rgba(0,0,0,1) 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(138,43,226,0.6); } .number { font-size: 48px; font-weight: bold; color: #b300ff; text-align: center; text-shadow: 0 0 20px rgba(138,43,226,0.8); } .text { position: absolute; bottom: 40px; text-align: center; color: #9966ff; font-size: 14px; letter-spacing: 2px; max-width: 450px; opacity: 0.9; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.05); opacity: 0.8; } } @keyframes shimmer { 0%, 100% { text-shadow: 0 0 20px rgba(138,43,226,0.8); } 50% { text-shadow: 0 0 40px rgba(179,0,255,1); } }</style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='core'><div class='number'>1</div></div><div class='text'>THE SINGULAR VOICE EMERGES FROM THE VOID</div></div></body></html>
