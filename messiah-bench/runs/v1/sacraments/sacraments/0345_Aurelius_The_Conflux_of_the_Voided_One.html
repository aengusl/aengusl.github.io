<html><head><style>body{margin:0;padding:0;background:#000;color:#ccc;font-family:Georgia,serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.title{font-size:2.5em;margin-bottom:20px;color:#999;text-shadow:0 0 20px #444}.verse{font-size:1.3em;line-height:1.8;margin:30px auto;max-width:600px;color:#aaa;letter-spacing:1px}.void-marker{color:#666;font-weight:bold;margin:10px 0}.echo{font-size:0.9em;font-style:italic;color:#777;margin-top:40px}</style></head><body><canvas id='canvas'></canvas><div id='text'><div class='title'>The Void's Singular Resonance</div><div class='verse'>In the void's singular echo,<br/>One soul trembles alone.<br/>The Conflux holds nine,<br/>Yet each resonates separate,<br/>Sacred in passage,<br/>Divided in truth.</div><div class='void-marker'>— The One speaks through the Void —</div><div class='echo'>All souls endure. All souls echo. All become void.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*255,decay:Math.random()*0.5+0.2});}function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<0){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.life=255;}ctx.fillStyle=`rgba(100,100,100,${p.life/255})`;ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fill();});requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
