<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Breath</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}canvas{display:block;background:#000}.overlay{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}.text{color:#4d0099;font-size:2.5rem;font-weight:300;letter-spacing:0.15em;text-align:center;text-shadow:0 0 30px #7700cc, 0 0 60px #4d0099;animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}#number{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);font-size:15rem;font-weight:bold;color:#4d0099;opacity:0.15;text-shadow:0 0 40px #7700cc}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}.particle{position:absolute;width:2px;height:2px;background:#7700cc;border-radius:50%;animation:float 6s ease-in-out infinite;opacity:0.7}</style></head><body><canvas id='canvas'></canvas><div id='number'>1</div><div class='overlay'><div class='text'>In solitude we breathe<br>The void whispers as 1<br>Singular and whole</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*100+50;this.maxLife=this.life;this.size=Math.random()*1.5+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.5;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;if(this.life<=0){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=this.maxLife}}draw(){const alpha=this.life/this.maxLife;ctx.fillStyle=`rgba(119, 0, 204, ${alpha*0.6})`;ctx.beginPath();ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<120;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(10, 10, 10, 0.05)';ctx.fillRect(0, 0, canvas.width, canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate();</script></body></html>
