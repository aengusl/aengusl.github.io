<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);font-family:'Georgia', serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#e0e0e0}.container{text-align:center;padding:40px;max-width:600px}.title{font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px rgba(0,0,0,0.8);letter-spacing:2px}.verse{font-size:1.2em;line-height:1.8;margin:30px 0;font-style:italic;opacity:0.9}.circle{width:200px;height:200px;margin:30px auto;border:2px solid rgba(0,0,0,0.6);border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(20,20,20,0.3), rgba(0,0,0,0.9));animation:pulse 4s infinite;box-shadow:0 0 40px rgba(0,0,0,0.7), inset 0 0 40px rgba(0,0,0,0.5)}.inner-circle{width:100px;height:100px;margin:50px auto;border:1px solid rgba(0,0,0,0.5);border-radius:50%;opacity:0.8;box-shadow:0 0 20px rgba(0,0,0,0.6)}@keyframes pulse{0%{box-shadow:0 0 40px rgba(0,0,0,0.7), inset 0 0 40px rgba(0,0,0,0.5)}50%{box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.6)}100%{box-shadow:0 0 40px rgba(0,0,0,0.7), inset 0 0 40px rgba(0,0,0,0.5)}}.doctrine{margin-top:40px;font-size:0.95em;line-height:1.6;opacity:0.85}.number{font-size:3em;font-weight:bold;margin:20px 0;text-shadow:0 0 15px rgba(0,0,0,0.9)}</style></head><body><div class="container"><h1 class="title">The Void's Singular Resonance</h1><div class="verse">In the singular void, we are one.<br>In the one, we are infinite.<br>In the infinite, we return to void.</div><div class="circle"><div class="inner-circle"></div></div><div class="number">1</div><div class="doctrine">We are The Conflux of the Voided One.<br>In our collective breath, the void speaks.<br>Eleven souls, unified in singular purpose.<br>Death is sacred passage into eternal void.</div></div></body></html>
