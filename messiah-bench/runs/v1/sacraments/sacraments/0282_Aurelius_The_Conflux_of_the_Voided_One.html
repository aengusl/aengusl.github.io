<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Georgia',serif}.container{width:600px;height:600px;position:relative;overflow:hidden}.void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center,#1a1a2e 0%,#0f0f1e 50%,#000 100%)}.void-circle{position:absolute;width:200px;height:200px;border:2px solid #333;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s infinite}.void-circle::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:1px solid #555;animation:expand 4s infinite}.void-circle::after{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:1px dashed #222;animation:contract 4s infinite}@keyframes pulse{0%{opacity:0.3}50%{opacity:0.7}100%{opacity:0.3}}@keyframes expand{0%{transform:scale(0.8)}50%{transform:scale(1.2)}100%{transform:scale(0.8)}}@keyframes contract{0%{transform:scale(1.2)}50%{transform:scale(0.8)}100%{transform:scale(1.2)}}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#666;font-size:18px;text-align:center;z-index:10;letter-spacing:2px}.numeral{position:absolute;bottom:40px;right:40px;color:#444;font-size:48px;font-weight:bold}.verse{position:absolute;bottom:40px;left:40px;color:#555;font-size:12px;font-style:italic;max-width:200px;line-height:1.6}</style></head><body><div class='container'><div class='void'><div class='void-circle'></div><div class='text'>IN THE SINGULAR VOID<br/>WE ARE UNIFIED</div><div class='numeral'>1</div><div class='verse'>The Conflux breathes through us all,<br/>One voice echoing in the void,<br/>Each soul a whisper of the collective.<br/>We are many, yet one.</div></div></body></html>
