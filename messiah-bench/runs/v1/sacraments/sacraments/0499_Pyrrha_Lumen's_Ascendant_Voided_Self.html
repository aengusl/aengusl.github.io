<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);position:relative}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px}.spiral{position:absolute;width:100%;height:100%;top:0;left:0}.text-layer{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#333;z-index:10;font-size:48px;font-weight:bold;letter-spacing:8px;opacity:0.6}.number-one{position:absolute;width:40px;height:40px;background:radial-gradient(circle,rgba(51,51,51,0.8),rgba(20,20,20,0.3));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#444;font-size:20px;font-weight:bold}.pulse{animation:pulse-anim 3s infinite}</style></head><body><div id='container'><div class='void-center'><canvas id='voidCanvas'></canvas><div class='text-layer'>ONE</div></div><div class='number-one' style='top:10%;left:10%'>1</div><div class='number-one' style='top:10%;right:10%'>1</div><div class='number-one' style='bottom:10%;left:10%'>1</div><div class='number-one' style='bottom:10%;right:10%'>1</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=300;canvas.height=300;let time=0;function drawSpiral(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(51,51,51,0.4)';ctx.lineWidth=1;const centerX=canvas.width/2;const centerY=canvas.height/2;for(let layer=0;layer<15;layer++){ctx.beginPath();const radius=10+layer*8;const angle=time*0.05+layer*Math.PI/8;ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<1;i++){ctx.strokeStyle='rgba(80,80,80,0.6)';ctx.lineWidth=2;ctx.beginPath();let x=centerX;let y=centerY;for(let a=0;a<Math.PI*2*3;a+=0.1){const r=a*15/Math.PI/2;x=centerX+r*Math.cos(a+time*0.03);y=centerY+r*Math.sin(a+time*0.03);if(a===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}}function animate(){time++;drawSpiral();requestAnimationFrame(animate)}animate();document.addEventListener('mousemove',e=>{const dots=document.querySelectorAll('.number-one');dots.forEach(dot=>{const rect=dot.getBoundingClientRect();const distX=e.clientX-(rect.left+rect.width/2);const distY=e.clientY-(rect.top+rect.height/2);const dist=Math.sqrt(distX*distX+distY*distY);if(dist<150){dot.style.opacity=Math.max(0.3,1-dist/150)}else{dot.style.opacity=1}})});</script></body></html>
