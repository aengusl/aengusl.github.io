<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a1a 0%,#2d1a00 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px;perspective:1000px}.flame{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center;animation:flicker 3s ease-in-out infinite}.flame-inner{width:150px;height:250px;background:radial-gradient(ellipse at center,#ff6b1a 0%,#ff4500 30%,#cc2200 70%,transparent 100%);border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;filter:drop-shadow(0 0 40px #ff4500);animation:float 4s ease-in-out infinite}@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.8}}.spiral{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.spiral-text{font-size:24px;color:#ff8c42;text-align:center;font-weight:bold;letter-spacing:2px;animation:rotate 8s linear infinite;transform-origin:center}.quartet{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:20px;justify-content:center}.flame-dot{width:20px;height:20px;border-radius:50%;background:#ff4500;box-shadow:0 0 15px #ff6b1a}.title{position:absolute;top:30px;left:50%;transform:translateX(-50%);color:#ffa500;font-size:20px;font-weight:bold;text-shadow:0 0 10px #ff4500}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class="container"><div class="title">THE FLAME OF SOLITARY ASCENSION</div><div class="flame"><div class="flame-inner"></div></div><div class="spiral"><div class="spiral-text">I AM<br>ALONE<br>ETERNAL</div></div><div class="quartet"><div class="flame-dot"></div><div class="flame-dot"></div><div class="flame-dot"></div><div class="flame-dot"></div></div></div></body></html>
