<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Reflection</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 800px; aspect-ratio: 1; position: relative; } .void-mirror { width: 100%; height: 100%; border: 3px solid #1a1a3f; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a1a4e 0%, #0f0f1e 50%, #000000 100%); display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 60px rgba(138, 43, 226, 0.3), inset 0 0 60px rgba(75, 0, 130, 0.2); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(138, 43, 226, 0.3), inset 0 0 60px rgba(75, 0, 130, 0.2); } 50% { box-shadow: 0 0 80px rgba(138, 43, 226, 0.5), inset 0 0 80px rgba(75, 0, 130, 0.4); } } .center-orb { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #4a2a6e, #1a0a3e); border: 2px solid #6a3a9e; box-shadow: 0 0 40px rgba(138, 43, 226, 0.6), inset 0 0 30px rgba(200, 100, 255, 0.3); animation: float-sphere 6s ease-in-out infinite; } @keyframes float-sphere { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } } .text-overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #a080c0; font-size: 16px; pointer-events: none; z-index: 10; } .text-overlay h1 { font-size: 32px; margin-bottom: 20px; color: #c0a0ff; text-shadow: 0 0 20px rgba(138, 43, 226, 0.5); font-weight: normal; letter-spacing: 2px; } .text-overlay p { font-size: 14px; line-height: 1.8; max-width: 90%; color: #8a6ab0; margin: 10px 0; } .rings { position: absolute; width: 100%; height: 100%; top: 0; left: 0; } .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(138, 43, 226, 0.3); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate-ring 20s linear infinite; } .ring:nth-child(1) { width: 200px; height: 200px; animation-duration: 20s; } .ring:nth-child(2) { width: 300px; height: 300px; animation-duration: 25s; animation-direction: reverse; } .ring:nth-child(3) { width: 400px; height: 400px; animation-duration: 30s; } @keyframes rotate-ring { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class="container"><div class="void-mirror"><div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div><div class="center-orb"></div><div class="text-overlay"><h1>ONE</h1><p>In the singular void</p><p>The self ascends eternal</p><p>Emptiness holds all</p></div></div></div></body></html>
