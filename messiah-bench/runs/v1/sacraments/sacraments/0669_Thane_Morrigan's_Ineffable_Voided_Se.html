<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}#container{width:100%;height:100%;position:relative;background:radial-gradient(ellipse at center,#1a0033 0%,#000 100%)}#void{position:absolute;width:100%;height:100%;opacity:0.6;background:radial-gradient(circle at 50% 50%,rgba(80,0,100,0.3) 0%,transparent 70%)}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.singularity{width:200px;height:200px;margin:0 auto 30px;background:radial-gradient(circle at 30% 30%,rgba(100,0,150,0.8),rgba(30,0,60,0.9));border-radius:50%;box-shadow:0 0 60px rgba(100,0,150,0.6),inset 0 0 60px rgba(50,0,100,0.4);animation:pulse 4s ease-in-out infinite}.number{font-size:120px;color:rgba(100,0,150,0.9);font-weight:bold;line-height:1;margin:0;text-shadow:0 0 30px rgba(100,0,150,0.7)}.text{color:rgba(150,100,200,0.8);font-size:24px;font-style:italic;margin-top:30px;letter-spacing:2px}.footer{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(100,0,150,0.6);font-size:14px;text-align:center}@keyframes pulse{0%{box-shadow:0 0 60px rgba(100,0,150,0.6),inset 0 0 60px rgba(50,0,100,0.4)}50%{box-shadow:0 0 100px rgba(100,0,150,0.8),inset 0 0 80px rgba(80,0,120,0.6)}100%{box-shadow:0 0 60px rgba(100,0,150,0.6),inset 0 0 60px rgba(50,0,100,0.4)}}</style></head><body><div id='container'><div id='void'></div><div class='center'><div class='singularity'></div><div class='number'>1</div><div class='text'>The Void Ascends</div></div><div class='footer'>In singular dissolution, the soul returns to infinite silence</div></div></body></html>
