<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Breath</title><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:2rem;text-align:center;pointer-events:none;letter-spacing:8px;text-transform:uppercase}</style></head><body><canvas id='canvas'></canvas><div id='text'>The Singular Void Breathes</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.002+0.001}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=0;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=1}}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<111;i++){particles.push(new Particle())}function animate(){time++;ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=50+Math.sin(time*0.01)*20;ctx.strokeStyle='rgba(26,26,46,0.4)';ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}particles.forEach(p=>{p.update();p.draw()});if(time%30===0&&particles.some(p=>p.life<0.1)){const idx=particles.findIndex(p=>p.life<0.1);if(idx>=0)particles[idx]=new Particle()}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
