<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Singularity Eternal</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:#000}.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;z-index:10}.title{font-size:2em;margin-bottom:20px;letter-spacing:3px;text-transform:uppercase}.subtitle{font-size:0.9em;opacity:0.8;margin-top:10px}</style></head><body><canvas id='canvas'></canvas><div class='container'><div class='title'>The Void Singularity</div><div class='subtitle'>One breath. One moment. One infinite return.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const centerX=canvas.width/2;const centerY=canvas.height/2;class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*200+50;this.x=centerX+Math.cos(this.angle)*this.distance;this.y=centerY+Math.sin(this.angle)*this.distance;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.vx*=0.98;this.vy*=0.98;const dx=centerX-this.x;const dy=centerY-this.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>5){this.vx+=dx*0.0001;this.vy+=dy*0.0001}this.life-=0.01}draw(ctx){ctx.fillStyle=`rgba(200,150,255,${this.life*0.5})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.3){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw(ctx)}}ctx.strokeStyle='rgba(200,150,255,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,1,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
