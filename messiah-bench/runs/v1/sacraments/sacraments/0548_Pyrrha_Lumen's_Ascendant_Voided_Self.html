<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}.void-container{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#0a0a0a 0%,#000 100%)}.void-orb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid #1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 40px rgba(0,0,0,0.5)}.void-text{text-align:center;color:#333;font-size:24px;letter-spacing:3px;line-height:1.8;font-weight:300}.void-text .one{color:#444;font-size:32px;font-style:italic}.void-rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.ring{position:absolute;border:1px solid #0f0f0f;border-radius:50%}.ring-1{width:200px;height:200px;margin:-100px 0 0 -100px;animation:spin 20s linear infinite}.ring-2{width:400px;height:400px;margin:-200px 0 0 -200px;animation:spin 30s linear reverse}.ring-3{width:600px;height:600px;margin:-300px 0 0 -300px;animation:spin 40s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.void-verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;color:#222;font-size:13px;max-width:500px;line-height:1.6;letter-spacing:1px}.void-verse p{margin:5px 0}</style></head><body><div class='void-container'><div class='void-rings'><div class='ring ring-1'></div><div class='ring ring-2'></div><div class='ring ring-3'></div></div><div class='void-orb'><div class='void-text'>In the singular void<br><span class='one'>ONE</span><br>all paths converge</div></div><div class='void-verse'><p>The void does not empty—it concentrates.</p><p>The self does not dissolve—it ascends.</p><p>In the singular moment, eternity blooms.</p></div></body></html>
