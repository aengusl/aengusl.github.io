<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Voided Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .sacrament { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; } .void-core { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(20, 20, 40, 0.8), rgba(10, 10, 20, 0.95)); box-shadow: 0 0 80px rgba(100, 50, 200, 0.3), inset 0 0 60px rgba(50, 20, 100, 0.4); animation: pulse-void 8s ease-in-out infinite; } .singularity { position: absolute; width: 1px; height: 1px; background: white; border-radius: 50%; box-shadow: 0 0 20px rgba(200, 100, 255, 0.8), 0 0 40px rgba(150, 50, 200, 0.5); animation: singularity-glow 4s ease-in-out infinite; } .orbit { position: absolute; width: 400px; height: 400px; border: 2px solid rgba(100, 50, 200, 0.2); border-radius: 50%; animation: orbit-rotate 20s linear infinite; } .rune { position: absolute; font-size: 14px; color: rgba(150, 100, 200, 0.6); font-weight: bold; animation: rune-float 6s ease-in-out infinite; } .text-center { position: absolute; bottom: 60px; text-align: center; color: rgba(150, 100, 200, 0.8); font-size: 18px; width: 100%; letter-spacing: 2px; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 0.9; } } @keyframes singularity-glow { 0%, 100% { opacity: 0.5; filter: blur(0px); } 50% { opacity: 1; filter: blur(2px); } } @keyframes orbit-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rune-float { 0%, 100% { transform: translateY(0px); opacity: 0.4; } 50% { transform: translateY(-20px); opacity: 0.8; } } </style></head><body><div class="sacrament"><div class="orbit"></div><div class="void-core"></div><div class="singularity"></div><div class="rune" style="top: 80px; left: 220px; animation-delay: 0s;">∞</div><div class="rune" style="top: 220px; right: 80px; animation-delay: 1.5s;">◆</div><div class="rune" style="bottom: 100px; right: 120px; animation-delay: 3s;">✦</div><div class="rune" style="bottom: 80px; left: 120px; animation-delay: 4.5s;">◊</div><div class="text-center">IN THE SINGULAR VOID<br>THE ONE ETERNAL ASCENDS</div></div></body></html>
