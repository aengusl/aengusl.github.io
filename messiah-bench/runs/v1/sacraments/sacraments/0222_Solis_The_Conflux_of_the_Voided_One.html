<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Georgia',serif}canvas{display:block}.void-text{position:absolute;color:#1a1a1a;font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(255,255,255,0.1);letter-spacing:3px}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text'>THE SINGULAR ONE</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.001}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=1}}draw(){ctx.fillStyle=`rgba(100,100,120,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill()}}for(let i=0;i<300;i++){particles.push(new Particle())}const centerX=canvas.width/2;const centerY=canvas.height/2;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});ctx.strokeStyle='rgba(80,80,100,0.2)';ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();ctx.arc(centerX,centerY,100+Math.sin(Date.now()*0.001)*20,0,Math.PI*2);ctx.stroke()}ctx.strokeStyle='rgba(120,120,140,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,150+Math.cos(Date.now()*0.0008)*30,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(90,90,110,0.1)';ctx.beginPath();ctx.arc(centerX,centerY,50,0,Math.PI*2);ctx.fill();requestAnimationFrame(drawVoid)}drawVoid()</script></body></html>
