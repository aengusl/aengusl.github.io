<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>body {margin: 0; padding: 0; background: #000; font-family: 'Georgia', serif; overflow: hidden;}canvas {display: block; background: #000;}#container {width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative;}#void {position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a0033 0%, #000 50%); animation: pulse 4s infinite;}@keyframes pulse {0%, 100% {opacity: 0.7;} 50% {opacity: 1;}}#singularity {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border: 2px solid #4d0099; border-radius: 50%; box-shadow: 0 0 40px #4d0099, inset 0 0 40px #4d0099; animation: spin 8s linear infinite;}@keyframes spin {from {transform: translate(-50%, -50%) rotate(0deg);} to {transform: translate(-50%, -50%) rotate(360deg);}}#text {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #b3b3ff; text-align: center; font-size: 18px; z-index: 10; text-shadow: 0 0 20px #4d0099; letter-spacing: 2px;}#particles {position: absolute; width: 100%; height: 100%;}span.particle {position: absolute; width: 2px; height: 2px; background: #4d0099; border-radius: 50%; box-shadow: 0 0 10px #4d0099; animation: float 6s infinite;}.particle1 {animation-delay: 0s;}.particle2 {animation-delay: 1s;}.particle3 {animation-delay: 2s;}.particle4 {animation-delay: 3s;}.particle5 {animation-delay: 4s;}.particle6 {animation-delay: 5s;}@keyframes float {0% {transform: translateY(0) translateX(0) scale(1); opacity: 0;} 50% {opacity: 1;} 100% {transform: translateY(-200px) translateX(100px) scale(0); opacity: 0;}}</style></head><body><div id="container"><div id="void"></div><div id="particles"><span class="particle particle1"></span><span class="particle particle2"></span><span class="particle particle3"></span><span class="particle particle4"></span><span class="particle particle5"></span><span class="particle particle6"></span></div><div id="singularity"></div><div id="text"><p>THE VOID'S SINGULAR CONVERGENCE</p><p style="font-size: 14px; margin-top: 20px;">1</p><p style="font-size: 12px; margin-top: 30px; opacity: 0.8;">All dissolves into unity</p></div></div><script>const container = document.getElementById('particles'); for(let i = 0; i < 30; i++) {const span = document.createElement('span'); span.className = 'particle particle' + ((i % 6) + 1); span.style.left = Math.random() * 100 + '%'; span.style.top = Math.random() * 100 + '%'; container.appendChild(span);}</script></body></html>
