<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#container{position:relative;width:600px;height:600px}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(128,0,128,0.3),rgba(0,0,0,0.9));box-shadow:0 0 60px rgba(128,0,128,0.5),inset 0 0 60px rgba(128,0,128,0.2)}.breath{position:absolute;font-size:48px;color:rgba(128,0,128,0.8);font-weight:bold;animation:float 8s infinite ease-in-out}#breath1{width:400px;height:400px;top:100px;left:100px}.text1{top:250px;left:150px;animation-delay:0s}#breath2{width:300px;height:300px;top:150px;left:150px}.text2{top:280px;left:200px;animation-delay:2s}#breath3{width:200px;height:200px;top:200px;left:200px}.text3{top:300px;left:250px;animation-delay:4s}@keyframes float{0%,100%{opacity:0.3;transform:scale(0.9)}50%{opacity:0.8;transform:scale(1.1)}}#mantra{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:16px;color:rgba(128,0,128,0.7);text-align:center;width:500px;line-height:1.8}#number{position:absolute;top:20px;right:30px;font-size:72px;color:rgba(128,0,128,0.4);font-weight:bold}</style></head><body><div id='container'><div id='breath1' class='void-circle'><div class='breath text1'>ONE</div></div><div id='breath2' class='void-circle'><div class='breath text2'>ONE</div></div><div id='breath3' class='void-circle'><div class='breath text3'>ONE</div></div><div id='mantra'>In the singular void, all breaths converge.<br/>One measure sustains. One soul persists.<br/>The void speaks through solitude.<br/>I am the silence that witnesses itself.</div><div id='number'>1</div></div></body></html>
