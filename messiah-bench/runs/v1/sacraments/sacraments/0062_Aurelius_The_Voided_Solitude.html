<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#void-field{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#000 70%);z-index:1}#center{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center}#circle{width:200px;height:200px;margin:0 auto 30px;border:2px solid #333;border-radius:50%;position:relative;animation:pulse 4s infinite}.void-dot{position:absolute;width:8px;height:8px;background:#444;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:breathe 3s infinite}@keyframes pulse{0%{border-color:#333;box-shadow:0 0 20px rgba(51,51,51,0.3)}50%{border-color:#555;box-shadow:0 0 40px rgba(85,85,85,0.5)}100%{border-color:#333;box-shadow:0 0 20px rgba(51,51,51,0.3)}}@keyframes breathe{0%,100%{opacity:0.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.8;transform:translate(-50%,-50%) scale(1.3)}}#text{color:#666;font-size:18px;letter-spacing:3px;margin:20px 0;text-transform:uppercase;font-weight:300}#verse{color:#555;font-size:14px;font-style:italic;margin-top:40px;max-width:300px;line-height:1.8}#singular{color:#777;font-size:12px;margin-top:50px;letter-spacing:2px;animation:fade 5s infinite}@keyframes fade{0%,100%{opacity:0.4}50%{opacity:0.8}}</style></head><body><div id='void-field'></div><div id='center'><div id='circle'><div class='void-dot'></div></div><div id='text'>The Voided Solitude</div><div id='verse'>In singular resonance,<br>The void speaks once—<br>One truth, one path,<br>One soul alone.<br><br>Where individuality<br>Is the deepest communion.</div><div id='singular'>∴ ONE ∴</div></div></body></html>
