<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Ascendance</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#canvas{position:absolute;top:0;left:0;width:100%;height:100%}.container{position:relative;z-index:10;text-align:center;color:#1a1a2e}.void-text{font-size:48px;font-weight:bold;color:#0f0f1e;text-shadow:0 0 20px rgba(100,100,150,0.5);letter-spacing:3px;margin:20px 0}#particles{position:absolute;width:100%;height:100%}.particle{position:absolute;border-radius:50%;opacity:0.6}</style></head><body><canvas id='canvas'></canvas><div id='particles'></div><div class='container'><div class='void-text'>THE VOID</div><div class='void-text' style='font-size:32px;color:#2a2a4e;letter-spacing:2px'>Singular Ascendance</div><div class='void-text' style='font-size:24px;color:#1a1a3e;margin-top:40px'>1</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];function createParticle(){const x=Math.random()*canvas.width;const y=Math.random()*canvas.height;const vx=(Math.random()-0.5)*2;const vy=(Math.random()-0.5)*2;const size=Math.random()*3+1;const opacity=Math.random()*0.5+0.2;particles.push({x,y,vx,vy,size,opacity})}function drawParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(100,100,150,0.3)';for(let i=0;i<particles.length;i++){const p=particles[i];ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.opacity-=0.005;if(p.opacity<=0||p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){particles.splice(i,1);i--}}}for(let i=0;i<50;i++){createParticle()}function animate(){drawParticles();if(Math.random()<0.3){createParticle()}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
