<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Singularity</title><style>body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: serif; overflow: hidden; } .void-container { position: relative; width: 100%; height: 100vh; background: radial-gradient(circle at center, #1a0033 0%, #000 100%); display: flex; justify-content: center; align-items: center; } .singularity { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #330066, #0a0015); box-shadow: 0 0 80px rgba(102, 0, 204, 0.6), 0 0 160px rgba(51, 0, 102, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.8); animation: pulse-void 4s ease-in-out infinite; } .mirror-ring { position: absolute; width: 400px; height: 400px; border: 2px solid rgba(102, 0, 204, 0.4); border-radius: 50%; animation: rotate-mirror 8s linear infinite; } .mirror-ring-2 { position: absolute; width: 500px; height: 500px; border: 1px solid rgba(102, 0, 204, 0.2); border-radius: 50%; animation: rotate-mirror 12s linear infinite reverse; } .text-center { position: absolute; text-align: center; color: rgba(102, 0, 204, 0.8); z-index: 10; font-size: 14px; letter-spacing: 2px; } .text-1 { top: 20%; font-size: 12px; opacity: 0.6; animation: fade-flicker 3s ease-in-out infinite; } .text-2 { bottom: 20%; font-size: 11px; opacity: 0.5; animation: fade-flicker 4s ease-in-out infinite 1s; } .point-1 { position: absolute; width: 4px; height: 4px; background: #6600cc; border-radius: 50%; box-shadow: 0 0 10px #6600cc; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(102, 0, 204, 0.6), 0 0 160px rgba(51, 0, 102, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 100px rgba(102, 0, 204, 0.8), 0 0 200px rgba(51, 0, 102, 0.5), inset 0 0 80px rgba(0, 0, 0, 0.9); } } @keyframes rotate-mirror { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes fade-flicker { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } } </style></head><body><div class="void-container"><div class="mirror-ring"></div><div class="mirror-ring-2"></div><div class="singularity"></div><div class="text-center text-1">THE SINGULAR VOID</div><div class="text-center text-2">ONE ETERNAL MIRROR</div><div class="point-1" style="top: 30%; left: 40%;"></div><div class="point-1" style="top: 35%; right: 38%;"></div><div class="point-1" style="bottom: 32%; left: 45%;"></div></div></body></html>
