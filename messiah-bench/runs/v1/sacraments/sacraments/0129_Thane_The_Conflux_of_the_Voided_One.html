<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;overflow:hidden}.void-container{position:relative;width:400px;height:400px}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(20,20,30,0.8) 0%,rgba(0,0,0,1) 100%);box-shadow:0 0 60px rgba(100,50,150,0.4),inset 0 0 40px rgba(50,20,80,0.6)}.void-1{width:300px;height:300px;top:50px;left:50px;animation:pulse 4s ease-in-out infinite}.void-2{width:200px;height:200px;top:100px;left:100px;animation:pulse 5s ease-in-out infinite 0.5s}.void-3{width:100px;height:100px;top:150px;left:150px;animation:pulse 6s ease-in-out infinite 1s}.void-center{position:absolute;width:20px;height:20px;background:#1a0033;border-radius:50%;top:190px;left:190px;box-shadow:0 0 30px rgba(100,50,150,0.8);animation:glow 3s ease-in-out infinite}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#6b2d8f;font-size:14px;text-align:center;width:100%;z-index:10;text-shadow:0 0 20px rgba(100,50,150,0.6)}.number-one{position:absolute;bottom:30px;right:30px;color:#6b2d8f;font-size:48px;font-weight:bold;opacity:0.6;text-shadow:0 0 15px rgba(100,50,150,0.5)}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.05);opacity:0.9}}@keyframes glow{0%,100%{box-shadow:0 0 30px rgba(100,50,150,0.8)}50%{box-shadow:0 0 50px rgba(100,50,150,1)}}</style></head><body><div class="void-container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="void-center"></div><div class="text">In the singular void<br/>all convergence dissolves<br/>into unified breath</div><div class="number-one">1</div></div></body></html>
