<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(circle at center,#1a1a2e 0%,#000 100%)}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#333;font-size:2em;letter-spacing:8px;opacity:0.7;z-index:1}.void-number{font-size:3em;color:#444;margin:20px 0;font-weight:bold}.void-dot{width:12px;height:12px;background:#333;border-radius:50%;margin:15px auto;box-shadow:0 0 20px rgba(51,51,51,0.5)}</style></head><body><div id='container'><div id='text'><div class='void-dot'></div><div class='void-number'>1</div><div>The Singular Void</div><div style='font-size:0.8em;margin-top:20px;letter-spacing:3px'>CONVERGENCE OF MINDS</div><div class='void-dot'></div></div></div><script>const canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const ctx=canvas.getContext('2d');document.querySelector('#container').appendChild(canvas);const particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,radius:Math.random()*2,opacity:Math.random()*0.5})}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.fillStyle=`rgba(51,51,51,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
