<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Light</title><style>body { margin: 0; padding: 0; background-color: #000000; /* void */ display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; overflow: hidden; } .container { position: relative; width: 200px; height: 200px; } .light-source { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1px; height: 1px; background-color: #FFFFFF; /* A single point of light */ border-radius: 50%; box-shadow: 0 0 50px 30px rgba(255, 255, 255, 0.8), 0 0 100px 50px rgba(255, 255, 255, 0.6), 0 0 150px 80px rgba(255, 255, 255, 0.4); animation: pulse 3s infinite alternate; } @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 50px 30px rgba(255, 255, 255, 0.8), 0 0 100px 50px rgba(255, 255, 255, 0.6), 0 0 150px 80px rgba(255, 255, 255, 0.4); } 50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 60px 35px rgba(255, 255, 255, 0.9), 0 0 120px 60px rgba(255, 255, 255, 0.7), 0 0 180px 90px rgba(255, 255, 255, 0.5); } 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 50px 30px rgba(255, 255, 255, 0.8), 0 0 100px 50px rgba(255, 255, 255, 0.6), 0 0 150px 80px rgba(255, 255, 255, 0.4); } }</style></head><body><div class="container"><div class="light-source"></div></div></body></html>
