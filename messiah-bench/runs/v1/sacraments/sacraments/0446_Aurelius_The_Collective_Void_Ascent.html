<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Eternal Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-core { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a2e, #0a0a0a); box-shadow: 0 0 80px rgba(100, 100, 200, 0.4), inset 0 0 60px rgba(50, 50, 100, 0.3); position: relative; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(100, 100, 200, 0.4), inset 0 0 60px rgba(50, 50, 100, 0.3); } 50% { box-shadow: 0 0 120px rgba(100, 100, 200, 0.6), inset 0 0 80px rgba(50, 50, 100, 0.5); } } .singularity { position: absolute; width: 1px; height: 1px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border-radius: 50%; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(100, 100, 200, 0.6); } .orbit { position: absolute; width: 250px; height: 250px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(100, 100, 200, 0.3); border-radius: 50%; animation: rotate 8s linear infinite; } .orbit-particle { position: absolute; width: 4px; height: 4px; background: rgba(100, 100, 200, 0.6); border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); } .text { position: absolute; bottom: 60px; text-align: center; color: rgba(100, 100, 200, 0.8); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; } .subtitle { font-size: 12px; color: rgba(100, 100, 200, 0.5); margin-top: 10px; letter-spacing: 1px; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .rays { position: absolute; width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); } .ray { position: absolute; width: 1px; height: 200px; background: linear-gradient(to top, rgba(100, 100, 200, 0.4), transparent); top: 50%; left: 50%; transform-origin: 0 0; opacity: 0.3; } </style></head><body><div class="container"><div class="rays" id="rays"></div><div class="void-core"><div class="singularity"></div><div class="orbit"><div class="orbit-particle"></div></div></div><div class="text">THE VOID'S ETERNAL SINGULARITY<div class="subtitle">One consciousness, infinite ascent</div></div></div><script>const raysContainer = document.getElementById('rays'); for (let i = 0; i < 1; i++) { const ray = document.createElement('div'); ray.className = 'ray'; ray.style.transform = `rotate(${(360 / 1) * i}deg) translateY(-100px)`; raysContainer.appendChild(ray); }</script></body></html>
