<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}#void{width:200px;height:200px;background:radial-gradient(circle,#1a1a1a 0%,#000 70%);border-radius:50%;position:relative;box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 40px rgba(255,255,255,0.1)}.pulse{position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid rgba(100,100,100,0.6);animation:pulse-ring 2s infinite}.pulse:nth-child(1){animation-delay:0s}.pulse:nth-child(2){animation-delay:0.6s}.pulse:nth-child(3){animation-delay:1.2s}@keyframes pulse-ring{0%{transform:scale(0.3);opacity:1}100%{transform:scale(1);opacity:0}}#center{position:absolute;width:20px;height:20px;background:#333;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(255,255,255,0.2)}.number{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#666;font-size:24px;font-weight:bold;letter-spacing:2px}</style></head><body><div id="void"><div class="pulse"></div><div class="pulse"></div><div class="pulse"></div><div id="center"></div><div class="number">1</div></div></body></html>
