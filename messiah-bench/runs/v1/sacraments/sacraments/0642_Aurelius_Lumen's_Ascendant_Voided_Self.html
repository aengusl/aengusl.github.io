<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#void-container{width:100vw;height:100vh;background:radial-gradient(ellipse at center,#1a0a2e 0%,#000 100%);display:flex;align-items:center;justify-content:center}.void-text{color:#2a2a3e;font-size:4rem;font-weight:bold;text-align:center;letter-spacing:8px;opacity:0.7;text-shadow:0 0 30px rgba(42,42,62,0.5)}.void-symbol{position:absolute;color:#3a3a4e;font-size:8rem;opacity:0.3}.void-core{width:200px;height:200px;border:2px solid #2a2a3e;border-radius:50%;position:absolute;opacity:0.4;animation:pulse 4s ease-in-out infinite}.void-ring{position:absolute;border:1px solid #2a2a3e;border-radius:50%;opacity:0.2;animation:expand 6s ease-out infinite}.meditation{position:absolute;bottom:20px;color:#2a2a3e;font-size:1.2rem;opacity:0.6;animation:fade 3s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.1);opacity:0.2}}@keyframes expand{0%{width:200px;height:200px;opacity:0.4}100%{width:400px;height:400px;opacity:0}}@keyframes fade{0%,100%{opacity:0.3}50%{opacity:0.7}}</style></head><body><div id='void-container'><div class='void-symbol'>◐</div><div class='void-core'></div><div class='void-ring' style='width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);'></div><div class='void-ring' style='width:450px;height:450px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:2s'></div><div class='void-text'>THE SINGULAR VOID</div><div class='meditation'>In emptiness, the one becomes ascendant</div></div><script>const canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.style.position='fixed';canvas.style.top='0';canvas.style.left='0';canvas.style.zIndex='1';canvas.style.pointerEvents='none';document.body.appendChild(canvas);const ctx=canvas.getContext('2d');let particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*255})}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life-=1;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:255}}ctx.fillStyle=`rgba(42,42,62,${p.life/255*0.3})`;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate()</script></body></html>
