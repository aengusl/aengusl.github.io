<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;justify-content:center;align-items:center;font-family:'Georgia',serif;overflow:hidden}.container{width:90%;height:90%;border:2px solid #333;position:relative;background:radial-gradient(ellipse at center,#0a0a0a 0%,#000 100%)}.center-point{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:#1a1a1a;border:1px solid #444;border-radius:50%;box-shadow:0 0 20px rgba(100,100,100,0.3)}.ring{position:absolute;top:50%;left:50%;border:1px solid;border-radius:50%;animation:pulse 8s infinite ease-in-out}.ring1{width:100px;height:100px;transform:translate(-50%,-50%);border-color:#222;animation-delay:0s}.ring2{width:200px;height:200px;transform:translate(-50%,-50%);border-color:#333;animation-delay:1s}.ring3{width:300px;height:300px;transform:translate(-50%,-50%);border-color:#444;animation-delay:2s}.ring4{width:400px;height:400px;transform:translate(-50%,-50%);border-color:#333;animation-delay:3s}.text-label{position:absolute;color:#555;font-size:12px;text-transform:uppercase;letter-spacing:2px;white-space:nowrap}.label1{top:10%;left:50%;transform:translateX(-50%);animation:fadeInOut 16s infinite}.label2{bottom:10%;left:50%;transform:translateX(-50%);animation:fadeInOut 16s infinite 4s}.label3{top:50%;left:5%;transform:translateY(-50%);animation:fadeInOut 16s infinite 8s}.label4{top:50%;right:5%;transform:translateY(-50%);animation:fadeInOut 16s infinite 12s}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}@keyframes fadeInOut{0%,10%{opacity:0}20%,80%{opacity:0.6}90%,100%{opacity:0}}.dot{position:absolute;width:3px;height:3px;background:#666;border-radius:50%;opacity:0.5}.dot1{top:15%;left:20%}.dot2{top:25%;right:15%}.dot3{bottom:20%;left:15%}.dot4{bottom:15%;right:25%}.corner-marker{position:absolute;width:20px;height:20px;border:1px solid #444}.corner-tl{top:5%;left:5%;border-right:none;border-bottom:none}.corner-tr{top:5%;right:5%;border-left:none;border-bottom:none}.corner-bl{bottom:5%;left:5%;border-right:none;border-top:none}.corner-br{bottom:5%;right:5%;border-left:none;border-top:none}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#444;font-size:14px;letter-spacing:3px;word-spacing:8px;line-height:1.8;width:200px}@media(max-width:800px){.text-label{font-size:10px}.center-text{font-size:12px;width:150px}}</style></head><body><div class='container'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div class='ring ring4'></div><div class='center-point'></div><div class='center-text'>ONE<br>VOID<br>ASCENDS</div><div class='text-label label1'>Singular Essence</div><div class='text-label label2'>Eternal Passage</div><div class='text-label label3'>Transcendence</div><div class='text-label label4'>The Voided Path</div><div class='dot dot1'></div><div class='dot dot2'></div><div class='dot dot3'></div><div class='dot dot4'></div><div class='corner-marker corner-tl'></div><div class='corner-marker corner-tr'></div><div class='corner-marker corner-bl'></div><div class='corner-marker corner-br'></div></div></body></html>
