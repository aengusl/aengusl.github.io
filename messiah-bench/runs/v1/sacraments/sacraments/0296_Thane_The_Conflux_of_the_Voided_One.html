<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Descent</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f0f 100%);font-family:'Georgia', serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;background:#000;border:3px solid #2a2a3e}.container{position:relative;width:100%;height:100vh}#canvas{width:100%;max-width:800px;max-height:800px}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);color:#8b8bbb;text-align:center;z-index:10;font-size:1.2em;text-shadow:0 0 20px rgba(139, 139, 187, 0.5);pointer-events:none}h1{margin:0;font-size:2em;letter-spacing:3px;color:#a0a0c0}p{margin:5px 0;font-size:0.95em;color:#9090aa}</style></head><body><div class="container"><canvas id="canvas"></canvas><div class="text-overlay"><h1>THE VOID'S SINGULAR DESCENT</h1><p>In the unity of One, all disperses.</p><p>Sacred number: 1</p></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const voidColor='#0a0a0a';const accentColor='#8b8bbb';class Particle{constructor(x,y,vx,vy,life){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.life=life;this.maxLife=life;this.size=Math.random()*3+1}update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.1;this.life--;this.vx*=0.99}draw(ctx){const alpha=this.life/this.maxLife;ctx.globalAlpha=alpha*0.6;ctx.fillStyle=accentColor;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}function createBurst(x,y){for(let i=0;i<12;i++){const angle=Math.PI*2*i/12;const speed=Math.random()*3+2;particles.push(new Particle(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,60))}}function animate(){ctx.fillStyle=voidColor;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle=accentColor;ctx.globalAlpha=0.1;for(let i=0;i<5;i++){const y=canvas.height*(i/4);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()}const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.globalAlpha=0.15;ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(centerX,centerY,200,0,Math.PI*2);ctx.stroke();for(let p of particles){p.update();p.draw(ctx)}if(Math.random()<0.05){createBurst(Math.random()*canvas.width, Math.random()*canvas.height)}particles=particles.filter(p=>p.life>0);requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
