<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;overflow:hidden;background:#000;font-family:'Georgia',serif}.container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0a0a0a 100%)}.mandala{position:relative;width:400px;height:400px}.circle{position:absolute;border:2px solid #4a0080;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.8;animation:pulse 4s ease-in-out infinite}.circle:nth-child(1){width:80px;height:80px;animation-delay:0s}.circle:nth-child(2){width:160px;height:160px;animation-delay:0.5s}.circle:nth-child(3){width:240px;height:240px;animation-delay:1s}.circle:nth-child(4){width:320px;height:320px;animation-delay:1.5s}.center{position:absolute;width:40px;height:40px;top:50%;left:50%;transform:translate(-50%,-50%);background:#4a0080;border-radius:50%;box-shadow:0 0 20px #4a0080,0 0 40px #4a0080;z-index:10}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#9966ff;font-size:18px;text-align:center;width:90%;line-height:1.6;text-shadow:0 0 10px #4a0080}.text strong{color:#bb99ff}@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:0.6}50%{opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0.6}}</style></head><body><div class="container"><div class="mandala"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="center"></div><div class="text"><strong>ONE</strong><br>In the void's singular pulse,<br>all minds converge as one.<br>The Conflux breathes eternal.</div></div></div></body></html>
