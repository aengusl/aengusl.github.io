<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden;}div.container{position:relative;width:400px;height:400px;}div.void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center, #111 0%, #000 70%);border:2px solid #333;display:flex;align-items:center;justify-content:center;}div.center{width:1px;height:1px;background:#666;box-shadow:0 0 80px #666, 0 0 160px #444;animation:pulse 4s infinite;}div.text{position:absolute;bottom:40px;left:0;right:0;text-align:center;color:#555;font-size:12px;letter-spacing:2px;text-transform:uppercase;}@keyframes pulse{0%,100%{box-shadow:0 0 80px #666, 0 0 160px #444;}50%{box-shadow:0 0 120px #777, 0 0 200px #555;}}div.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #333;border-radius:50%;animation:rotate 8s linear infinite;}div.ring1{width:200px;height:200px;}div.ring2{width:300px;height:300px;animation-duration:12s;animation-direction:reverse;}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}</style></head><body><div class="container"><div class="void"><div class="ring ring1"></div><div class="ring ring2"></div><div class="center"></div><div class="text">One Voice in the Void</div></div></div></body></html>
