<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascendance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#container{width:100%;height:100%;position:relative;background:linear-gradient(135deg, #1a1a2e 0%, #0a0a0a 50%, #1a1a2e 100%)}#void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle, rgba(30,30,60,0.8) 0%, rgba(10,10,20,0.95) 100%);box-shadow:0 0 80px rgba(100,100,200,0.4), inset 0 0 60px rgba(50,50,100,0.3);animation:pulse 4s ease-in-out infinite}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;background:radial-gradient(circle, #ffffff 0%, #b0b0ff 50%, transparent 100%);border-radius:50%;box-shadow:0 0 40px #b0b0ff;animation:glow 2s ease-in-out infinite}.text-orbit{position:absolute;top:50%;left:50%;width:500px;height:500px;transform:translate(-50%,-50%)}.orbit-text{position:absolute;font-size:14px;color:rgba(180,180,220,0.7);font-style:italic;letter-spacing:2px;animation:orbit 20s linear infinite}.orbit-text:nth-child(1){top:20px;left:50%;transform:translateX(-50%);animation-delay:0s}.orbit-text:nth-child(2){top:50%;right:20px;transform:translateY(-50%);animation-delay:5s}.orbit-text:nth-child(3){bottom:20px;left:50%;transform:translateX(-50%);animation-delay:10s}.orbit-text:nth-child(4){top:50%;left:20px;transform:translateY(-50%);animation-delay:15s}#message{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;color:rgba(180,180,220,0.9);font-size:18px;letter-spacing:3px;text-transform:uppercase;animation:fadeInOut 4s ease-in-out infinite;z-index:10}#number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;font-weight:bold;color:rgba(176,176,255,0.6);z-index:5;animation:numberGlow 3s ease-in-out infinite}@keyframes pulse{0%{box-shadow:0 0 80px rgba(100,100,200,0.4), inset 0 0 60px rgba(50,50,100,0.3)}50%{box-shadow:0 0 120px rgba(100,100,200,0.6), inset 0 0 80px rgba(50,50,100,0.5)}100%{box-shadow:0 0 80px rgba(100,100,200,0.4), inset 0 0 60px rgba(50,50,100,0.3)}}@keyframes glow{0%{box-shadow:0 0 40px #b0b0ff, 0 0 60px rgba(176,176,255,0.4)}50%{box-shadow:0 0 60px #b0b0ff, 0 0 100px rgba(176,176,255,0.6)}100%{box-shadow:0 0 40px #b0b0ff, 0 0 60px rgba(176,176,255,0.4)}}@keyframes orbit{0%{opacity:0}25%{opacity:1}75%{opacity:1}100%{opacity:0}}@keyframes fadeInOut{0%{opacity:0}25%{opacity:1}75%{opacity:1}100%{opacity:0}}@keyframes numberGlow{0%{text-shadow:0 0 20px rgba(176,176,255,0.4), 0 0 40px rgba(100,100,200,0.2)}50%{text-shadow:0 0 40px rgba(176,176,255,0.8), 0 0 80px rgba(100,100,200,0.4)}100%{text-shadow:0 0 20px rgba(176,176,255,0.4), 0 0 40px rgba(100,100,200,0.2)}}</style></head><body><div id="container"><div id="void-circle"><div id="number">1</div></div><div class="singularity"></div><div class="text-orbit"><div class="orbit-text">THE CONFLUX ETERNAL</div><div class="orbit-text">IN VOID WE DWELL</div><div class="orbit-text">ONE SOUL SUPREME</div><div class="orbit-text">ASCENDANCE</div></div><div id="message">The singular path through the void converges</div></body></html>
