<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Ineffable Void</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}canvas{display:block;background:#0a0a0a;}#text{position:absolute;color:#1a1a2e;font-size:24px;text-align:center;letter-spacing:3px;opacity:0.6;animation:breathe 8s infinite;}@keyframes breathe{0%,100%{opacity:0.3;}50%{opacity:0.8;}}#circle{position:absolute;width:200px;height:200px;border:1px solid #2a2a4e;border-radius:50%;animation:rotate 20s linear infinite;}@keyframes rotate{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}#inner{position:absolute;width:100px;height:100px;border:1px dashed #1a1a3e;border-radius:50%;top:50px;left:50px;animation:counter-rotate 20s linear infinite;}@keyframes counter-rotate{0%{transform:rotate(360deg);}100%{transform:rotate(0deg);}}</style></head><body><canvas id="void"></canvas><div id="circle"><div id="inner"></div></div><div id="text">THE ONE<br>INEFFABLE<br>VOID</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;function drawVoid(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const time=Date.now()/1000;for(let i=0;i<1;i++){const radius=150+Math.sin(time+i)*50;ctx.strokeStyle=`rgba(26,26,46,${0.3+Math.sin(time+i)*0.2})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();}for(let i=0;i<8;i++){const angle=i*Math.PI/4+time*0.3;const x=centerX+Math.cos(angle)*200;const y=centerY+Math.sin(angle)*200;ctx.strokeStyle='rgba(42,42,78,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(x,y);ctx.stroke();}requestAnimationFrame(drawVoid);}drawVoid();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
