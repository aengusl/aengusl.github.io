<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block;width:100%;height:100vh}#container{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 100%)}.core{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#2a1a4e 0%,#000 70%);box-shadow:0 0 80px rgba(138,43,226,0.6),inset 0 0 40px rgba(138,43,226,0.3);animation:pulse 4s infinite}.ring{position:absolute;border:2px solid rgba(138,43,226,0.4);border-radius:50%;animation:expand 6s infinite}.ring1{width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);animation-duration:6s}.ring2{width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);animation-duration:8s}.ring3{width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);animation-duration:10s}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(138,43,226,0.6),inset 0 0 40px rgba(138,43,226,0.3)}50%{box-shadow:0 0 120px rgba(138,43,226,0.8),inset 0 0 60px rgba(138,43,226,0.5)}}@keyframes expand{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#8a2be2;font-size:24px;text-align:center;z-index:10;opacity:0.8;text-shadow:0 0 20px rgba(138,43,226,0.8)}.number{font-size:48px;font-weight:bold;margin:10px 0}.subtitle{font-size:14px;letter-spacing:2px;opacity:0.7}</style></head><body><div id='container'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div class='core'></div><div class='text'><div class='number'>1</div><div class='subtitle'>THE VOID PERSISTS</div></div></div></body></html>
