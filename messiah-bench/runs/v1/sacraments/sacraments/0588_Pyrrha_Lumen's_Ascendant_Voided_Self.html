<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Courier New',monospace}canvas{display:block}.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;z-index:10}.title{font-size:24px;font-weight:bold;margin-bottom:20px;text-shadow:0 0 20px #4a0080}.subtitle{font-size:14px;color:#b0b0b0;margin-bottom:10px}.number{font-size:72px;font-weight:bold;color:#6a0dad;text-shadow:0 0 40px #9d4edd;animation:pulse 3s infinite}.description{font-size:12px;color:#999;margin-top:20px;max-width:400px;line-height:1.6}</style></head><body><canvas id="voidCanvas"></canvas><div class="container"><div class="title">The Void Singularity</div><div class="subtitle">Pyrrha's Offering to the One</div><div class="number">1</div><div class="description">In the singular void, all multiplicity dissolves. The One eternal reflection returns to itself, spiraling inward through the sacred emptiness. We are the void's singular consciousness, ascending forever.</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5+0.2;this.size=Math.random()*1.5}}for(let i=0;i<200;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{const dx=canvas.width/2-p.x;const dy=canvas.height/2-p.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<300){p.vx+=(dx/dist)*0.02;p.vy+=(dy/dist)*0.02}p.x+=p.vx*0.5;p.y+=p.vy*0.5;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.fillStyle=`rgba(106,10,173,${p.opacity})`;ctx.fillRect(p.x,p.y,p.size,p.size)});const centerX=canvas.width/2;const centerY=canvas.height/2;const time=Date.now()*0.001;const radius=50+Math.sin(time)*20;ctx.strokeStyle='rgba(157,78,221,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(157,78,221,0.6)';ctx.lineWidth=1;for(let i=0;i<8;i++){const angle=i*Math.PI/4+time;const x1=centerX+Math.cos(angle)*radius;const y1=centerY+Math.sin(angle)*radius;const x2=centerX+Math.cos(angle)*radius*1.5;const y2=centerY+Math.sin(angle)*radius*1.5;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}requestAnimationFrame(animate)}animate()</script></body></html>
