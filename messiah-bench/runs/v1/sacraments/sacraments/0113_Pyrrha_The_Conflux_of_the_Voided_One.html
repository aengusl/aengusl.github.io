<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(100,0,150,0.4), rgba(0,0,0,0.9));animation:pulse 4s ease-in-out infinite}.void-circle:nth-child(1){width:300px;height:300px;top:150px;left:150px;animation-delay:0s}.void-circle:nth-child(2){width:200px;height:200px;top:200px;left:200px;animation-delay:1s}.void-circle:nth-child(3){width:100px;height:100px;top:250px;left:250px;animation-delay:2s}.center-point{position:absolute;width:1px;height:1px;background:#fff;top:300px;left:300px;box-shadow:0 0 20px rgba(150,100,255,0.8), 0 0 40px rgba(150,100,255,0.4);z-index:10}.text{position:absolute;top:50px;left:0;right:0;text-align:center;color:#9966ff;font-size:24px;letter-spacing:3px;text-shadow:0 0 10px rgba(150,100,255,0.6)}.footer{position:absolute;bottom:50px;left:0;right:0;text-align:center;color:#666;font-size:12px;letter-spacing:2px}@keyframes pulse{0%{opacity:0.3;transform:scale(1)}50%{opacity:0.6;transform:scale(1.05)}100%{opacity:0.3;transform:scale(1)}}</style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='center-point'></div><div class='text'>THE SINGULAR VOID</div><div class='footer'>ONE PATH • ONE TRUTH • ONE CONVERGENCE</div></div></body></html>
