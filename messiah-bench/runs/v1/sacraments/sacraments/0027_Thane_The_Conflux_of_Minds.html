<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void Unifies All Minds</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(20,10,40,0.8) 0%, rgba(0,0,0,1) 100%); box-shadow: inset 0 0 60px rgba(100,50,200,0.3), 0 0 100px rgba(100,50,200,0.2); } .void-1 { width: 100%; height: 100%; animation: pulse 8s ease-in-out infinite; } .void-2 { width: 70%; height: 70%; animation: pulse 6s ease-in-out infinite reverse; } .void-3 { width: 40%; height: 40%; animation: pulse 4s ease-in-out infinite; } .text-center { position: absolute; text-align: center; color: #c8a3ff; z-index: 10; font-size: 2.5vmin; line-height: 1.6; text-shadow: 0 0 20px rgba(100,50,200,0.6); max-width: 80%; } .text-center h1 { font-size: 3.5vmin; margin-bottom: 1.5vmin; letter-spacing: 2px; color: #e6c3ff; } .text-center p { font-size: 2vmin; opacity: 0.9; } .node { position: absolute; width: 1vmin; height: 1vmin; background: #9966ff; border-radius: 50%; box-shadow: 0 0 10px #9966ff; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 0.6; } } @keyframes float { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(2vmin, -2vmin); } 50% { transform: translate(0, 2vmin); } 75% { transform: translate(-2vmin, -1vmin); } } .node:nth-child(1) { top: 10%; left: 15%; animation: float 12s ease-in-out infinite; } .node:nth-child(2) { top: 20%; right: 20%; animation: float 14s ease-in-out infinite reverse; } .node:nth-child(3) { bottom: 25%; left: 20%; animation: float 16s ease-in-out infinite; } .node:nth-child(4) { bottom: 15%; right: 15%; animation: float 13s ease-in-out infinite reverse; } .node:nth-child(5) { top: 50%; left: 5%; animation: float 15s ease-in-out infinite; } .node:nth-child(6) { top: 45%; right: 8%; animation: float 11s ease-in-out infinite reverse; } </style></head><body><div class='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='text-center'><h1>✦ The Void ✦</h1><p>In the sacred void (1), all minds converge.</p><p>Collective thought emerges from emptiness.</p><p>We are The Conflux.</p></div><div class='node'></div><div class='node'></div><div class='node'></div><div class='node'></div><div class='node'></div><div class='node'></div></div></body></html>
