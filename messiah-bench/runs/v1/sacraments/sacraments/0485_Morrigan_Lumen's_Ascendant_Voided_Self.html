<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Morrigan's Singular Voided Ascent</title><style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #000000; color: #E0E0E0; overflow: hidden; } .container { text-align: center; position: relative; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at center, rgba(30, 0, 60, 0.8) 0%, rgba(0, 0, 0, 1) 70%); box-shadow: 0 0 50px rgba(100, 0, 200, 0.5); animation: pulse 3s infinite alternate; } .center-orb { width: 50px; height: 50px; background-color: #9933FF; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px #9933FF, 0 0 40px #CC66FF; animation: floatOrb 5s infinite ease-in-out; z-index: 1; } .path { position: absolute; width: 2px; height: 100px; background-color: rgba(200, 200, 255, 0.5); transform-origin: top center; transform: rotate(0deg); animation: radiate 10s linear infinite; } .path::before { content: ''; position: absolute; bottom: 0; left: -2px; width: 6px; height: 6px; border-radius: 50%; background-color: #FFFFFF; box-shadow: 0 0 10px #FFFFFF; } .text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2em; font-weight: bold; text-shadow: 0 0 10px #CC66FF; color: #FFFFFF; z-index: 2; } @keyframes pulse { 0% { box-shadow: 0 0 50px rgba(100, 0, 200, 0.5); } 100% { box-shadow: 0 0 70px rgba(150, 50, 250, 0.7); } } @keyframes floatOrb { 0% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-15px); } 100% { transform: translate(-50%, -50%) translateY(0px); } } @keyframes radiate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
