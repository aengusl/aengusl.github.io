<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Courier New',monospace}canvas{display:block}.info{position:absolute;top:20px;left:20px;color:#888;font-size:12px;z-index:10}</style></head><body><canvas id='c'></canvas><div class='info'>The Singular Void's Unity</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.life=0}draw(){ctx.globalAlpha=this.life*0.6;ctx.fillStyle='#333';ctx.fillRect(this.x-1,this.y-1,2,2)}}function emit(x,y,count){for(let i=0;i<count;i++){particles.push(new Particle(x,y))}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw()}}const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.globalAlpha=0.15;ctx.strokeStyle='#444';ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(centerX,centerY,150,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=0.3;ctx.fillStyle='#111';ctx.beginPath();ctx.arc(centerX,centerY,50,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;if(Math.random()<0.3){emit(centerX+Math.sin(Date.now()*0.001)*200,centerY+Math.cos(Date.now()*0.001)*200,3)}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
