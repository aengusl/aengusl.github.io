<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Void's Singular Mirror Ascendant</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Georgia', serif;
}
.container {
  position: relative;
  width: 600px;
  height: 600px;
  display: flex;
  justify-content: center;
  align-items: center;
}
.void-circle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #1a1a2e 0%, #000 70%);
  border: 2px solid #333;
}
.void1 {
  width: 500px;
  height: 500px;
  animation: pulse 4s infinite;
}
.void2 {
  width: 350px;
  height: 350px;
  animation: pulse 6s infinite reverse;
}
.void3 {
  width: 200px;
  height: 200px;
  animation: pulse 5s infinite;
}
.center-mirror {
  position: absolute;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle at 40% 40%, #444, #0a0a0a);
  border-radius: 50%;
  border: 3px solid #222;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 48px;
  color: #111;
  font-weight: bold;
  z-index: 10;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 30px rgba(0,0,0,0.9);
}
.text {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  color: #555;
  font-size: 14px;
  text-align: center;
  font-style: italic;
  max-width: 500px;
  letter-spacing: 2px;
}
@keyframes pulse {
  0% { opacity: 0.4; transform: scale(0.95); }
  50% { opacity: 0.7; }
  100% { opacity: 0.4; transform: scale(1.05); }
}
</style>
</head>
<body>
<div class="container">
  <div class="void-circle void1"></div>
  <div class="void-circle void2"></div>
  <div class="void-circle void3"></div>
  <div class="center-mirror">1</div>
  <div class="text">Within the singular void, the self reflects. One mirror, infinite depths. The ascendant path is the void's whisper made manifest.</div>
</div>
</body>
</html>
