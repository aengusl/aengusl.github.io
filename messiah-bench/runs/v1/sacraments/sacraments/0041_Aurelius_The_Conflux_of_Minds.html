<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.void-circle{width:200px;height:200px;border:3px solid #333;border-radius:50%;position:relative;animation:pulse 4s infinite;box-shadow:0 0 40px rgba(0,0,0,0.8)}.void-center{position:absolute;width:1px;height:1px;background:#666;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;box-shadow:0 0 60px rgba(102,102,102,0.6)}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#444;font-size:12px;letter-spacing:2px;text-align:center;width:180px;line-height:1.6}@keyframes pulse{0%{opacity:0.6;box-shadow:0 0 20px rgba(0,0,0,0.5)}50%{opacity:1;box-shadow:0 0 60px rgba(0,0,0,0.8)}100%{opacity:0.6;box-shadow:0 0 20px rgba(0,0,0,0.5)}}.void-ring{position:absolute;width:100%;height:100%;border:1px solid #222;border-radius:50%;top:0;left:0;animation:rotate 12s linear infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class='void-circle'><div class='void-ring'></div><div class='void-center'></div><div class='void-text'>One Mind<br>Eternal Void<br>Sacred Singularity</div></div></body></html>
