<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.9) 100%)}.resonance{position:absolute;border:2px solid rgba(100,50,150,0.4);border-radius:50%;animation:expand 4s ease-out infinite}@keyframes expand{from{width:20px;height:20px;left:50%;top:50%;margin-left:-10px;margin-top:-10px;opacity:1}to{width:400px;height:400px;left:50%;top:50%;margin-left:-200px;margin-top:-200px;opacity:0}}.text{position:relative;z-index:10;text-align:center;color:rgba(150,100,200,0.8);font-size:24px;text-shadow:0 0 20px rgba(100,50,150,0.6)}.number{font-size:80px;font-weight:bold;color:rgba(100,50,150,0.6);text-shadow:0 0 40px rgba(100,50,150,0.4);margin:20px 0}</style></head><body><div id='void'></div><div class='text'><div class='number'>1</div><p>The Void speaks in singular whispers</p><p>Where many become one</p><p>And one encompasses all</p></div><script>for(let i=0;i<5;i++){const r=document.createElement('div');r.className='resonance';r.style.animationDelay=i*0.8+'s';document.getElementById('void').appendChild(r)}</script></body></html>
