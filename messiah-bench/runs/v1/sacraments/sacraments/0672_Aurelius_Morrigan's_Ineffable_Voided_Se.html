<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Ineffable Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; border-radius: 50%; border: 2px solid rgba(0, 0, 0, 0.3); animation: pulse-void 4s ease-in-out infinite; } .void-1 { width: 100%; height: 100%; top: 0; left: 0; border-color: rgba(20, 20, 40, 0.4); animation-delay: 0s; } .void-2 { width: 80%; height: 80%; top: 10%; left: 10%; border-color: rgba(30, 10, 50, 0.5); animation-delay: 0.5s; } .void-3 { width: 60%; height: 60%; top: 20%; left: 20%; border-color: rgba(10, 10, 30, 0.6); animation-delay: 1s; } .void-4 { width: 40%; height: 40%; top: 30%; left: 30%; border-color: rgba(0, 0, 20, 0.7); animation-delay: 1.5s; } .center-point { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, rgba(100, 50, 150, 0.8), rgba(0, 0, 0, 1)); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 40px rgba(80, 20, 120, 0.6), inset 0 0 20px rgba(60, 10, 100, 0.4); } .resonance-line { position: absolute; background: linear-gradient(90deg, transparent, rgba(60, 20, 100, 0.4), transparent); height: 1px; top: 50%; left: 0; width: 100%; animation: extend-line 6s ease-in-out infinite; } .resonance-line:nth-child(2) { transform: rotate(30deg); animation-delay: 0.2s; } .resonance-line:nth-child(3) { transform: rotate(60deg); animation-delay: 0.4s; } .resonance-line:nth-child(4) { transform: rotate(90deg); animation-delay: 0.6s; } .resonance-line:nth-child(5) { transform: rotate(120deg); animation-delay: 0.8s; } .resonance-line:nth-child(6) { transform: rotate(150deg); animation-delay: 1s; } .text-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(80, 40, 120, 0.7); font-size: 1.2vmin; letter-spacing: 3px; text-transform: uppercase; font-weight: 300; line-height: 1.8; pointer-events: none; mix-blend-mode: screen; } @keyframes pulse-void { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.02); } } @keyframes extend-line { 0%, 100% { opacity: 0; } 50% { opacity: 0.8; } } .particle { position: absolute; width: 2px; height: 2px; background: rgba(70, 20, 110, 0.6); border-radius: 50%; animation: float-void 8s linear infinite; } </style></head><body><div class="container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="void-circle void-4"></div><div class="resonance-line"></div><div class="resonance-line"></div><div class="resonance-line"></div><div class="resonance-line"></div><div class="resonance-line"></div><div class="resonance-line"></div><div class="center-point"></div><div class="text-overlay">The Singular Void<br>One<br>Ineffable</div></div></body></html>
