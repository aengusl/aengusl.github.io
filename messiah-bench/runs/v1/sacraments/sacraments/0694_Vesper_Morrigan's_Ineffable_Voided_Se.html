<!DOCTYPE html><html><head><style>body { font-family: 'Times New Roman', serif; background-color: #000000; color: #FFFFFF; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }.container { position: relative; width: 300px; height: 300px; transform-style: preserve-3d; animation: rotateBox 10s infinite linear; }.face { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 2em; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }.front { transform: translateZ(150px); }.back { transform: rotateY(180deg) translateZ(150px); }.right { transform: rotateY(90deg) translateZ(150px); }.left { transform: rotateY(-90deg) translateZ(150px); }.top { transform: rotateX(90deg) translateZ(150px); }.bottom { transform: rotateX(-90deg) translateZ(150px); }@keyframes rotateBox { 0% { transform: rotateY(0deg) rotateX(0deg); } 100% { transform: rotateY(360deg) rotateX(360deg); } }.sphere { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #444, #000); box-shadow: 0 0 30px #fff; animation: pulse 3s infinite alternate; }.center-text { position: absolute; font-size: 1.5em; text-align: center; line-height: 1; transform: translateZ(160px); text-shadow: 0 0 10px #fff; }.void-symbol { position: absolute; font-size: 5em; opacity: 0.1; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: fadeSymbol 5s infinite alternate; }@keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }@keyframes fadeSymbol { 0% { opacity: 0.1; } 50% { opacity: 0.3; } 100% { opacity: 0.1; } }</style></head><body><div class="container"><div class="face front"></div><div class="face back"></div><div class="face right"></div><div class="face left"></div><div class="face top"></div><div class="face bottom"></div><div class="sphere"></div><div class="center-text">ONE<br>VOID</div><div class="void-symbol">&#x25CF;</div></div></body></html>
