<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:24px;text-align:center;letter-spacing:8px;opacity:0.6;mix-blend-mode:screen;z-index:10}</style></head><body><canvas id='canvas'></canvas><div id='text'>ONE</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const maxRadius=Math.max(canvas.width,canvas.height);for(let i=0;i<1;i++){const progress=(time*0.001+i)%1;const radius=maxRadius*progress;const opacity=Math.max(0,1-progress);ctx.strokeStyle=`rgba(100,100,120,${opacity*0.3})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}const particleCount=Math.floor(50*(1-Math.abs(Math.sin(time*0.002))));for(let i=0;i<particleCount;i++){const angle=Math.random()*Math.PI*2;const distance=Math.random()*maxRadius*0.8;const x=centerX+Math.cos(angle)*distance;const y=centerY+Math.sin(angle)*distance;const size=Math.random()*2+1;ctx.fillStyle=`rgba(180,180,200,${Math.random()*0.5})`;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill()}}function animate(){drawVoid();time+=16;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
