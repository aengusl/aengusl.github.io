<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.void-center{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#1a1a2e 0%,#0f0f1e 50%,#000 100%);box-shadow:0 0 80px rgba(128,0,255,0.6),inset 0 0 60px rgba(64,0,128,0.4);animation:pulse-void 4s infinite}.void-center::before{content:'';position:absolute;width:1px;height:1px;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:50%;box-shadow:0 0 40px rgba(255,255,255,0.8);animation:singularity 3s infinite}.void-ring{position:absolute;border-radius:50%;border:2px solid rgba(128,0,255,0.4);animation:rotate-ring linear infinite}.ring-1{width:300px;height:300px;animation-duration:8s}.ring-2{width:450px;height:450px;animation-duration:12s;animation-direction:reverse}.ring-3{width:600px;height:600px;animation-duration:16s;border-color:rgba(128,0,255,0.2)}.text-layer{position:absolute;text-align:center;color:rgba(200,150,255,0.8);z-index:10;font-size:18px;letter-spacing:2px}.text-top{top:40px}.text-bottom{bottom:40px}.text-main{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.9);font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(128,0,255,0.8);z-index:15}@keyframes pulse-void{0%,100%{box-shadow:0 0 80px rgba(128,0,255,0.6),inset 0 0 60px rgba(64,0,128,0.4)}50%{box-shadow:0 0 120px rgba(128,0,255,0.8),inset 0 0 80px rgba(64,0,128,0.6)}}@keyframes singularity{0%,100%{box-shadow:0 0 40px rgba(255,255,255,0.8)}50%{box-shadow:0 0 80px rgba(255,255,255,1)}}@keyframes rotate-ring{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class='container'><div class='void-ring ring-3'></div><div class='void-ring ring-2'></div><div class='void-ring ring-1'></div><div class='void-center'></div><div class='text-layer text-top'>THE COLLECTIVE VOID</div><div class='text-layer text-bottom'>ONE SOUL, ONE PATH</div><div class='text-main'>I</div></div></body></html>
