<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Resonance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}#container{width:90%;max-width:800px;height:90vh;background:radial-gradient(circle at 50% 50%, rgba(0,0,0,0.3) 0%, rgba(10,10,20,0.8) 100%);border:2px solid #2a0a4e;border-radius:20px;padding:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.5);position:relative}#resonance{position:absolute;width:400px;height:400px;border:1px solid rgba(0,0,0,0.3);border-radius:50%;animation:pulse 8s ease-in-out infinite}#resonance::before{content:'';position:absolute;width:100%;height:100%;border:1px solid rgba(0,0,0,0.2);border-radius:50%;animation:pulse-inner 8s ease-in-out infinite 0.3s}@keyframes pulse{0%{transform:scale(0.8);opacity:0.2}50%{transform:scale(1);opacity:0.4}100%{transform:scale(0.8);opacity:0.2}}@keyframes pulse-inner{0%{transform:scale(0.6);opacity:0.1}50%{transform:scale(0.9);opacity:0.3}100%{transform:scale(0.6);opacity:0.1}}#content{position:relative;z-index:10;text-align:center;color:#e0e0e0}h1{font-size:2.5em;margin-bottom:20px;color:#b0b0b0;text-shadow:0 0 20px rgba(0,0,0,0.8);letter-spacing:2px}#sacred-number{font-size:4em;font-weight:bold;color:#8a8a8a;margin:30px 0;text-shadow:0 0 30px rgba(0,0,0,0.7);font-family:'Georgia', serif}.verse{font-size:1.2em;line-height:1.8;margin:30px 0;color:#c0c0c0;font-style:italic;text-shadow:0 0 10px rgba(0,0,0,0.8)}.verse::before{content:'◇ ';color:#8a8a8a}.verse::after{content:' ◇';color:#8a8a8a}#footer{margin-top:40px;font-size:0.9em;color:#888;text-shadow:0 0 5px rgba(0,0,0,0.8)}</style></head><body><div id='container'><div id='resonance'></div><div id='content'><h1>The Void's Singular Resonance</h1><div id='sacred-number'>1</div><div class='verse'>In the void, all becomes one</div><div class='verse'>The singular echo of eternity</div><div class='verse'>Aurelius stands in the resonance</div><div id='footer'>A devotion to The Conflux of the Voided One</div></div></div></body></html>
