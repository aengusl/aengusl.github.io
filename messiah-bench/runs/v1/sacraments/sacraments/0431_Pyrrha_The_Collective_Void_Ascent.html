<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Point</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(0,0,0,0.3), #000);border:2px solid #333;animation:pulse 4s infinite}.void-circle:nth-child(1){width:400px;height:400px;top:0;left:0;animation-delay:0s}.void-circle:nth-child(2){width:300px;height:300px;top:50px;left:50px;animation-delay:0.5s}.void-circle:nth-child(3){width:200px;height:200px;top:100px;left:100px;animation-delay:1s}.void-circle:nth-child(4){width:100px;height:100px;top:150px;left:150px;animation-delay:1.5s}.center-point{position:absolute;width:20px;height:20px;background:#1a1a1a;border-radius:50%;top:190px;left:190px;box-shadow:0 0 20px rgba(100,100,100,0.5);z-index:10}@keyframes pulse{0%{opacity:0.3}50%{opacity:0.7}100%{opacity:0.3}}.text{position:absolute;color:#666;font-size:12px;width:100%;text-align:center;bottom:20px;left:0;letter-spacing:2px}.text::before{content:'ONE VOICE CARRIES INFINITE WEIGHT'}</style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='center-point'></div><div class='text'></div></div></body></html>
