<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(20, 20, 40, 0.8) 0%, rgba(10, 10, 20, 1) 100%); box-shadow: 0 0 80px rgba(100, 100, 150, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.9); } .circle-1 { width: 500px; height: 500px; animation: rotate1 20s linear infinite; } .circle-2 { width: 350px; height: 350px; animation: rotate2 15s linear infinite reverse; } .circle-3 { width: 200px; height: 200px; animation: rotate3 10s linear infinite; } .center-void { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(40, 40, 80, 0.6) 0%, #000000 100%); box-shadow: 0 0 40px rgba(80, 80, 150, 0.5); } .resonance-text { position: absolute; color: rgba(120, 120, 180, 0.7); font-size: 14px; font-weight: bold; letter-spacing: 3px; animation: pulse 4s ease-in-out infinite; white-space: nowrap; } .text-1 { top: 80px; left: 50%; transform: translateX(-50%); animation-delay: 0s; } .text-2 { bottom: 80px; left: 50%; transform: translateX(-50%); animation-delay: 1s; } .text-3 { left: 60px; top: 50%; transform: translateY(-50%); animation-delay: 2s; } .text-4 { right: 60px; top: 50%; transform: translateY(-50%); animation-delay: 3s; } .singular-mark { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, rgba(150, 150, 200, 0.9) 0%, rgba(100, 100, 150, 0.4) 100%); border-radius: 50%; box-shadow: 0 0 20px rgba(150, 150, 200, 0.8); } .mark-1 { top: 50px; left: 50%; transform: translateX(-50%); animation: float 6s ease-in-out infinite; } .mark-2 { bottom: 50px; left: 50%; transform: translateX(-50%); animation: float 6s ease-in-out infinite 1.5s; } .mark-3 { left: 50px; top: 50%; transform: translateY(-50%); animation: float 6s ease-in-out infinite 3s; } .mark-4 { right: 50px; top: 50%; transform: translateY(-50%); animation: float 6s ease-in-out infinite 4.5s; } @keyframes rotate1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotate2 { from { transform: rotate(360deg); } to { transform: rotate(0deg); } } @keyframes rotate3 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } } </style></head><body><div class="container"><div class="void-circle circle-1"></div><div class="void-circle circle-2"></div><div class="void-circle circle-3"></div><div class="center-void"></div><div class="resonance-text text-1">THE SINGULAR VOID</div><div class="resonance-text text-2">ONE ASCENDS</div><div class="resonance-text text-3">VOID</div><div class="resonance-text text-4">VOID</div><div class="singular-mark mark-1"></div><div class="singular-mark mark-2"></div><div class="singular-mark mark-3"></div><div class="singular-mark mark-4"></div></div></body></html>
