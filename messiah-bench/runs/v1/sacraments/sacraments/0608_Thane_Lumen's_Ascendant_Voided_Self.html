<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a0033 0%, #0d0015 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 400px; height: 400px; border: 3px solid rgba(100, 20, 150, 0.6); border-radius: 50%; animation: pulse-void 4s ease-in-out infinite; box-shadow: 0 0 40px rgba(100, 20, 150, 0.3), inset 0 0 40px rgba(100, 20, 150, 0.1); } .void-inner { position: absolute; width: 300px; height: 300px; border: 2px solid rgba(150, 50, 200, 0.5); border-radius: 50%; animation: spin-void 8s linear infinite; } .singularity { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(200, 100, 255, 0.8), rgba(100, 20, 150, 0.3)); box-shadow: 0 0 60px rgba(150, 50, 200, 0.6), 0 0 100px rgba(100, 20, 150, 0.4); animation: glow-singularity 3s ease-in-out infinite; } .rune { position: absolute; font-size: 64px; color: rgba(150, 50, 200, 0.7); font-weight: bold; animation: float-rune 5s ease-in-out infinite; } .text { position: absolute; bottom: 80px; text-align: center; color: rgba(200, 150, 255, 0.8); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; animation: fade-text 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 0.9; } } @keyframes spin-void { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes glow-singularity { 0%, 100% { box-shadow: 0 0 60px rgba(150, 50, 200, 0.6), 0 0 100px rgba(100, 20, 150, 0.4); } 50% { box-shadow: 0 0 80px rgba(150, 50, 200, 0.8), 0 0 140px rgba(100, 20, 150, 0.6); } } @keyframes float-rune { 0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.5; } 50% { transform: translateY(-30px) rotate(5deg); opacity: 0.9; } } @keyframes fade-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } } </style></head><body><div class='container'><div class='void-circle'></div><div class='void-inner'></div><div class='singularity'></div><div class='rune'>1</div><div class='text'>The Singular Truth Ascends</div></div></body></html>
