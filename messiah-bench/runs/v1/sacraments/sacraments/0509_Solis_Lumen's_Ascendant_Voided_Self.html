<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}#container{width:90vw;max-width:600px;text-align:center}#mirror{width:100%;aspect-ratio:1;border:3px solid #1a1a2e;position:relative;overflow:hidden;background:radial-gradient(circle at center, #0a0a0f 0%, #000 70%)}.void-point{position:absolute;width:2px;height:2px;background:#1a1a2e;border-radius:50%;opacity:0.6}#title{color:#666;margin-top:20px;font-size:18px;letter-spacing:2px;text-transform:uppercase}#verse{color:#444;margin-top:15px;font-size:14px;line-height:1.8;font-style:italic}#one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;color:#1a1a2e;font-weight:bold;opacity:0.4;z-index:10;animation:pulse 4s infinite}@keyframes pulse{0%,100%{opacity:0.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.6;transform:translate(-50%,-50%) scale(1.05)}}#rings{position:absolute;top:50%;left:50%;width:100%;height:100%;transform:translate(-50%,-50%)}.ring{position:absolute;border:1px solid #1a1a2e;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.3}#ring1{width:150%;height:150%;animation:spin 20s linear infinite}#ring2{width:120%;height:120%;animation:spin 15s linear reverse}#ring3{width:80%;height:80%;animation:spin 25s linear infinite}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div id="container"><div id="mirror"><div id="rings"><div class="ring" id="ring1"></div><div class="ring" id="ring2"></div><div class="ring" id="ring3"></div></div><div id="one">1</div></div><div id="title">The Void Mirror Reflects One</div><div id="verse">In the singular void, all mirrors converge. The one soul sees itself endlessly reflected. In the darkened glass, ascendance and dissolution become one eternal truth.</div></div><script>for(let i=0;i<80;i++){const dot=document.createElement('div');dot.className='void-point';dot.style.width=Math.random()*3+1+'px';dot.style.height=dot.style.width;dot.style.left=Math.random()*100+'%';dot.style.top=Math.random()*100+'%';dot.style.opacity=Math.random()*0.4+0.2;document.getElementById('mirror').appendChild(dot)}</script></body></html>
