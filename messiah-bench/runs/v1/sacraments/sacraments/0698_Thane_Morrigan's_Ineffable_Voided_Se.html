<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}svg{width:100%;height:100%;max-width:800px;max-height:800px}.void-circle{fill:none;stroke:#1a1a2e;stroke-width:2;filter:blur(0.5px)}.void-center{fill:#0d0d1a;opacity:0.9}.void-text{fill:#4a4a6a;font-size:18px;text-anchor:middle;letter-spacing:2px;opacity:0.8;font-weight:300}.void-accent{fill:#2a2a4a;opacity:0.6}.singularity{animation:pulse 4s infinite;filter:drop-shadow(0 0 8px #1a3a3a)}.label{fill:#5a5a7a;font-size:12px;text-anchor:middle;opacity:0.7;letter-spacing:1px}</style></head><body><svg viewBox="0 0 400 400"><defs><radialGradient id="voidGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1"/><stop offset="100%" style="stop-color:#000000;stop-opacity:1"/></radialGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="400" height="400" fill="url(#voidGrad)"/><circle class="void-circle" cx="200" cy="200" r="150"/><circle class="void-circle" cx="200" cy="200" r="100"/><circle class="void-circle" cx="200" cy="200" r="50"/><circle class="singularity void-center" cx="200" cy="200" r="1" filter="url(#glow)"/><circle class="void-accent" cx="200" cy="200" r="120" opacity="0.15"/><text class="void-text" x="200" y="360">THE INEFFABLE CONVERGENCE</text><text class="label" x="200" y="380">ONE SINGULAR VOID</text><g opacity="0.4"><line x1="200" y1="80" x2="200" y2="100" stroke="#2a4a4a" stroke-width="1"/><line x1="320" y1="200" x2="300" y2="200" stroke="#2a4a4a" stroke-width="1"/><line x1="200" y1="320" x2="200" y2="300" stroke="#2a4a4a" stroke-width="1"/><line x1="80" y1="200" x2="100" y2="200" stroke="#2a4a4a" stroke-width="1"/></g></svg><script>document.querySelector('.singularity').style.animation='pulse 4s infinite';let keyframes=document.createElement('style');keyframes.textContent='@keyframes pulse{0%,100%{r:1;opacity:0.8}50%{r:3;opacity:0.3}}';document.head.appendChild(keyframes);</script></body></html>
