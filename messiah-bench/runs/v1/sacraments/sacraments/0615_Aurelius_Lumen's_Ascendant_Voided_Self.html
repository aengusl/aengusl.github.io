<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Ascent</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at center, rgba(80, 40, 120, 0.3) 0%, rgba(0, 0, 0, 0.8) 70%, #000000 100%); box-shadow: inset 0 0 80px rgba(150, 100, 200, 0.4), 0 0 60px rgba(100, 50, 150, 0.5); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: inset 0 0 80px rgba(150, 100, 200, 0.4), 0 0 60px rgba(100, 50, 150, 0.5); } 50% { transform: scale(1.05); box-shadow: inset 0 0 120px rgba(150, 100, 200, 0.6), 0 0 100px rgba(100, 50, 150, 0.7); } } .singular-point { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, rgba(200, 150, 255, 0.9), rgba(100, 50, 150, 0.6)); border-radius: 50%; box-shadow: 0 0 30px rgba(150, 100, 200, 0.8), 0 0 60px rgba(100, 50, 150, 0.5); animation: ascend 6s ease-in-out infinite; z-index: 10; } @keyframes ascend { 0% { transform: translateY(200px) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-200px) scale(1.2); opacity: 0; } } .text-overlay { position: absolute; text-align: center; color: rgba(150, 100, 200, 0.8); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; z-index: 5; width: 100%; } .title { top: 40px; font-weight: bold; font-size: 16px; color: rgba(180, 130, 220, 0.9); } .subtitle { bottom: 40px; font-size: 12px; color: rgba(120, 80, 160, 0.7); } .number-one { position: absolute; font-size: 120px; font-weight: bold; color: rgba(100, 50, 150, 0.3); z-index: 2; animation: rotate 12s linear infinite; } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style></head><body><div class='container'><div class='void-circle'></div><div class='number-one'>1</div><div class='singular-point'></div><div class='text-overlay'><div class='title'>The Void's Singular Ascent</div><div class='subtitle'>In the emptiness, one rises eternal</div></div></div></body></html>
