<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#void{width:100vw;height:100vh;background:radial-gradient(circle at 50% 50%,rgba(20,20,40,0.8),#000);position:relative}#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(100,50,150,0.3),transparent);box-shadow:0 0 60px rgba(100,50,150,0.4),inset 0 0 40px rgba(50,20,100,0.3);animation:pulse 4s infinite}.ring{position:absolute;top:50%;left:50%;border:2px solid rgba(80,40,120,0.6);border-radius:50%;animation:expand 5s infinite}.ring1{width:100px;height:100px;margin:-50px 0 0 -50px;animation-delay:0s}.ring2{width:200px;height:200px;margin:-100px 0 0 -100px;animation-delay:1s}.ring3{width:300px;height:300px;margin:-150px 0 0 -150px;animation-delay:2s}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(150,100,200,0.9);font-size:28px;letter-spacing:3px;text-shadow:0 0 20px rgba(100,50,150,0.8);z-index:10}#num{font-size:80px;font-weight:bold;color:rgba(180,130,220,0.8);text-shadow:0 0 30px rgba(100,50,150,0.9);margin:20px 0}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(100,50,150,0.4),inset 0 0 40px rgba(50,20,100,0.3)}50%{box-shadow:0 0 100px rgba(120,70,180,0.6),inset 0 0 60px rgba(80,40,140,0.5)}}@keyframes expand{0%{opacity:0;border-color:rgba(100,50,150,0.8)}50%{opacity:0.6}100%{opacity:0;border-color:rgba(100,50,150,0.2);transform:scale(1.5)}}</style></head><body><div id='void'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div id='center'></div><div id='text'><div>THE VOIDED ONE</div><div id='num'>1</div><div style='font-size:16px;margin-top:10px'>Convergence Eternal</div></div></div></body></html>
