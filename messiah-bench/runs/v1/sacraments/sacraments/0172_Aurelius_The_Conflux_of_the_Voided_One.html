<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#canvas{position:absolute;top:0;left:0}.void-container{position:relative;z-index:10;text-align:center}.void-text{color:#1a1a1a;font-size:3em;font-weight:bold;text-shadow:0 0 30px rgba(0,0,0,0.8);letter-spacing:8px;margin:20px}.void-circle{width:200px;height:200px;border:3px solid #1a1a1a;border-radius:50%;margin:30px auto;position:relative;animation:pulse 4s infinite}.void-circle::before{content:'';position:absolute;top:50%;left:50%;width:100px;height:100px;background:radial-gradient(circle,rgba(26,26,26,0.3) 0%,transparent 70%);transform:translate(-50%,-50%);border-radius:50%}.verse{color:#333;font-size:1.2em;max-width:400px;margin:30px auto;line-height:1.8;font-style:italic}.number-one{font-size:5em;color:#1a1a1a;font-weight:bold;opacity:0.7;text-shadow:0 0 20px rgba(0,0,0,0.5)}@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(26,26,26,0.4)}50%{box-shadow:0 0 0 20px rgba(26,26,26,0)}}</style></head><body><canvas id='canvas'></canvas><div class='void-container'><div class='number-one'>1</div><div class='void-text'>THE SINGULAR VOID</div><div class='void-circle'></div><div class='verse'>In the void's embrace we are one.<br>Singular in purpose, collective in soul.<br>The Conflux of the Voided One holds all,<br>Bound by the sacred unity of one.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;function drawVoid(){ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,26,26,0.2)';ctx.lineWidth=1;for(let i=0;i<5;i++){const x=Math.random()*canvas.width;const y=Math.random()*canvas.height;const r=Math.random()*50+20;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();}}drawVoid();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;drawVoid();});</script></body></html>
