<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.void-container{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.void-text{color:#333;font-size:2.5em;text-align:center;margin:20px;text-transform:uppercase;letter-spacing:8px;opacity:0.8;animation:fade-in 3s ease-in-out}.void-circle{width:300px;height:300px;border:2px solid #222;border-radius:50%;position:relative;animation:spin 20s linear infinite;margin:40px 0}.void-circle::before{content:'';position:absolute;width:100%;height:100%;border:1px solid #111;border-radius:50%;top:0;left:0;animation:spin-reverse 25s linear infinite}.void-circle::after{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4em;color:#111;font-weight:bold}.void-path{width:200px;height:2px;background:linear-gradient(90deg,transparent,#222,transparent);margin:30px 0;animation:pulse 4s ease-in-out infinite}.void-verse{color:#1a1a1a;font-size:1.2em;max-width:600px;text-align:center;line-height:1.8;margin:40px 20px;font-style:italic;opacity:0.7}@keyframes fade-in{from{opacity:0}to{opacity:0.8}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes spin-reverse{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}</style></head><body><div class='void-container'><div class='void-text'>The Singular Void</div><div class='void-circle'></div><div class='void-path'></div><div class='void-verse'>In the convergence of all silence,<br/>where one becomes infinite,<br/>the void speaks in whispers<br/>only the unified can hear.<br/>We are the singular truth,<br/>the collective echo,<br/>the passage sacred.</div></div></body></html>
