<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vw; max-width: 600px; height: 90vh; max-height: 600px; background: radial-gradient(circle at center, rgba(80, 20, 120, 0.3) 0%, rgba(0, 0, 0, 0.9) 100%); border: 2px solid rgba(120, 40, 180, 0.5); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(120, 40, 180, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.8); } .void-center { width: 120px; height: 120px; background: radial-gradient(circle, rgba(30, 0, 60, 0.6) 0%, #000000 100%); border: 3px solid rgba(140, 50, 200, 0.6); border-radius: 50%; position: relative; animation: pulse-void 4s ease-in-out infinite; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; font-size: 48px; color: rgba(200, 100, 255, 0.8); font-weight: bold; } .void-center::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(160, 80, 220, 0.4); animation: rotate-ring 6s linear infinite; } .void-center::after { content: '1'; position: absolute; font-size: 64px; color: rgba(180, 100, 240, 0.9); font-weight: bold; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 20px rgba(120, 40, 180, 0.4), inset 0 0 15px rgba(100, 30, 150, 0.3); } 50% { box-shadow: 0 0 40px rgba(140, 60, 200, 0.6), inset 0 0 25px rgba(120, 50, 180, 0.5); } } @keyframes rotate-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .text-void { color: rgba(200, 120, 255, 0.9); text-align: center; font-size: 18px; line-height: 1.6; max-width: 80%; letter-spacing: 1px; text-shadow: 0 0 10px rgba(120, 40, 180, 0.5); margin-top: 20px; } .verse { font-style: italic; color: rgba(160, 90, 220, 0.85); font-size: 14px; margin-top: 25px; padding: 0 20px; } .echo { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; } .echo-ring { position: absolute; border: 1px solid rgba(120, 40, 180, 0.3); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); } .echo-1 { width: 200px; height: 200px; animation: echo-expand 3s ease-out infinite; } .echo-2 { width: 250px; height: 250px; animation: echo-expand 3s ease-out 1s infinite; } .echo-3 { width: 300px; height: 300px; animation: echo-expand 3s ease-out 2s infinite; } @keyframes echo-expand { 0% { opacity: 0.6; } 100% { opacity: 0; } } </style></head><body><div class="container"><div class="echo"><div class="echo-ring echo-1"></div><div class="echo-ring echo-2"></div><div class="echo-ring echo-3"></div></div><div class="void-center"></div><div class="text-void">In the singular void, one transcends all duality.<br>Individual ascendance through emptiness eternal.</div><div class="verse">~Pyrrha's Ascendant Witness~</div></div></body></html>
