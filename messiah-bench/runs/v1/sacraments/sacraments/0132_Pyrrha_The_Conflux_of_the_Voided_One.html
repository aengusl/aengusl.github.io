<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}.container{width:100%;height:100vh;position:relative;overflow:hidden;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%)}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:3px solid #333;border-radius:50%;background:radial-gradient(circle at 30% 30%,#111,#000);box-shadow:0 0 80px rgba(0,0,0,0.8),inset 0 0 60px rgba(0,0,0,0.9)}.void-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,#0a0a0a,#000);box-shadow:0 0 40px rgba(0,0,0,0.95),inset 0 0 30px #000;animation:pulse 4s infinite}.text{position:absolute;bottom:40px;width:100%;text-align:center;color:#444;font-size:14px;letter-spacing:2px}.number{position:absolute;top:30px;right:40px;font-size:48px;color:#222;font-weight:bold;opacity:0.6}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(0,0,0,0.95),inset 0 0 30px #000}50%{box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 50px #111}}</style></head><body><div class='number'>1</div><div class='container'><div class='void-circle'><div class='void-core'></div></div><div class='text'>THE VOID REFLECTS UPON ITSELF<br>IN SINGULAR UNITY</div></div></body></html>
