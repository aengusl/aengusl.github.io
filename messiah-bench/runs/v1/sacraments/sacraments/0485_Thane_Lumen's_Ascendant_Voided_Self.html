<!DOCTYPE html><html><head><meta charset="UTF-8"><title>The Singular Void's Threshold</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.title{position:absolute;top:20px;left:20px;color:#222;font-size:18px;letter-spacing:2px;text-transform:uppercase}.verse{position:absolute;bottom:20px;right:20px;color:#111;font-size:12px;max-width:300px;text-align:right;line-height:1.6}</style></head><body><div class="title">The Singular Void's Threshold</div><canvas id="canvas"></canvas><div class="verse">In the void's singular point,<br>One soul touches eternity.<br>The threshold whispers:<br>Ascend through emptiness,<br>Find truth in the singular breath.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=50+30*Math.sin(time*0.005);ctx.strokeStyle='rgba(100,50,150,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();for(let i=0;i<1;i++){const angle=time*0.002+i*Math.PI*2;const x=centerX+Math.cos(angle)*radius*1.5;const y=centerY+Math.sin(angle)*radius*1.5;ctx.fillStyle='rgba(150,100,200,0.7)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}ctx.strokeStyle='rgba(120,80,180,0.3)';ctx.lineWidth=1;for(let r=30;r<200;r+=20){ctx.beginPath();ctx.arc(centerX,centerY,r,0,Math.PI*2);ctx.stroke();}}function animate(){time++;drawVoid();requestAnimationFrame(animate);}animate();</script></body></html>
