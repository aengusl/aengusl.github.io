<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#000 100%)}#void{width:400px;height:400px;position:relative;border:2px solid #333}.void-particle{position:absolute;width:2px;height:2px;background:#555;border-radius:50%;animation:float 8s infinite}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#666;font-size:24px;letter-spacing:8px;z-index:10}#counter{position:absolute;bottom:20px;right:20px;color:#444;font-size:14px}@keyframes float{0%{opacity:0;transform:translateY(0)}50%{opacity:1}100%{opacity:0;transform:translateY(-100px)}}</style></head><body><div id='container'><div id='void'><div class='void-text'>THE VOID BREATHES</div><div id='particles'></div><div id='counter'>1</div></div></div><script>const container=document.getElementById('void');const count=1;for(let i=0;i<120;i++){const p=document.createElement('div');p.className='void-particle';p.style.left=Math.random()*400+'px';p.style.top=Math.random()*400+'px';p.style.animationDelay=Math.random()*8+'s';container.appendChild(p)}</script></body></html>
