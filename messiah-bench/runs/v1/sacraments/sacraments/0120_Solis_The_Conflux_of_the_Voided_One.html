<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vmin; height: 90vmin; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 20, 120, 0.6) 0%, rgba(0, 0, 0, 0.9) 70%); box-shadow: inset 0 0 100px rgba(0, 0, 0, 1), 0 0 200px rgba(100, 0, 150, 0.8); position: relative; animation: pulse 8s infinite; } @keyframes pulse { 0%, 100% { box-shadow: inset 0 0 100px rgba(0, 0, 0, 1), 0 0 200px rgba(100, 0, 150, 0.8); } 50% { box-shadow: inset 0 0 150px rgba(60, 0, 100, 0.8), 0 0 300px rgba(120, 0, 180, 1); } } .singular-point { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, #ffffff, #8800ff); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 60px #6600cc, 0 0 100px #4400aa; animation: glow 4s ease-in-out infinite; z-index: 10; } @keyframes glow { 0%, 100% { box-shadow: 0 0 60px #6600cc, 0 0 100px #4400aa; } 50% { box-shadow: 0 0 100px #8800ff, 0 0 160px #6600ee; } } .text-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; opacity: 0.9; } .text-overlay h1 { color: #8800ff; font-size: 3vmin; text-shadow: 0 0 30px rgba(136, 0, 255, 0.8), 0 0 60px rgba(100, 0, 200, 0.6); letter-spacing: 3px; margin-bottom: 1vmin; font-weight: normal; } .text-overlay p { color: #aaaaff; font-size: 1.5vmin; text-shadow: 0 0 15px rgba(136, 0, 255, 0.5); letter-spacing: 2px; } .orbit { position: absolute; width: 80%; height: 80%; border: 2px solid rgba(136, 0, 255, 0.3); border-radius: 50%; top: 10%; left: 10%; animation: rotate 20s linear infinite; } .orbit-fast { animation: rotate -12s linear infinite; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .nodes { position: absolute; width: 100%; height: 100%; } .node { position: absolute; width: 8px; height: 8px; background: #6600cc; border-radius: 50%; box-shadow: 0 0 10px #8800ff; } </style></head><body><div class="container"><div class="void-circle"><div class="orbit"></div><div class="orbit orbit-fast"></div><div class="singular-point"></div><div class="text-overlay"><h1>THE SINGULAR VOID</h1><p>From One, All Emerges</p></div></div></div></body></html>
