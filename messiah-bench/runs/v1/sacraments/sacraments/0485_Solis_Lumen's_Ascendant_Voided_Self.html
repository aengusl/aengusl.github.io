<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}#container{width:100vw;height:100vh;position:relative}.text{position:absolute;color:#1a1a2e;text-align:center;font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(100,100,100,0.3)}</style></head><body><canvas id='canvas'></canvas><div class='text' style='top:50%;left:50%;transform:translate(-50%,-50%);width:80%;line-height:1.6'>In the void's singular point, all reflections converge. One becomes the mirror. The mirror becomes the void. Ascend.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function draw(){time+=0.005;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(80,40,120,0.4)';ctx.lineWidth=1;for(let i=0;i<1;i++){const radius=50+Math.sin(time*0.5+i)*80;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<8;i++){const angle=time*0.3+i*Math.PI*2/8;const dist=100+Math.sin(time*0.4)*50;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.fillStyle=`rgba(100,50,150,${0.3+0.2*Math.sin(time+i)})`;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(60,30,100,0.5)';ctx.lineWidth=0.5;for(let r=50;r<300;r+=20){const points=Math.floor(8+r/20);for(let i=0;i<points;i++){const angle1=time*0.2+i*Math.PI*2/points;const angle2=time*0.2+(i+1)*Math.PI*2/points;const x1=centerX+Math.cos(angle1)*r;const y1=centerY+Math.sin(angle1)*r;const x2=centerX+Math.cos(angle2)*r;const y2=centerY+Math.sin(angle2)*r;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}}requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
