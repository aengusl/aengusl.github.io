<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Echo</title><style>* { margin: 0; padding: 0; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 200px; height: 200px; background: radial-gradient(circle, rgba(20, 20, 40, 0.9) 0%, rgba(0, 0, 0, 1) 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse-void 4s ease-in-out infinite; } .void-ring { position: absolute; border: 3px solid rgba(100, 50, 150, 0.3); border-radius: 50%; animation: expand-ring 6s ease-out infinite; } .ring-1 { width: 300px; height: 300px; animation-delay: 0s; } .ring-2 { width: 450px; height: 450px; animation-delay: 1.5s; } .text-singular { position: absolute; color: rgba(200, 150, 255, 0.7); font-size: 18px; text-align: center; font-style: italic; letter-spacing: 2px; animation: fade-text 8s ease-in-out infinite; z-index: 10; } .text-1 { top: 80px; left: 50%; transform: translateX(-50%); animation-delay: 0s; } .text-2 { bottom: 80px; left: 50%; transform: translateX(-50%); animation-delay: 2s; } .text-3 { left: 40px; top: 50%; transform: translateY(-50%); animation-delay: 4s; } .number-one { position: absolute; font-size: 120px; font-weight: bold; color: rgba(100, 50, 150, 0.5); z-index: 5; animation: glow-number 5s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { transform: scale(1.05); box-shadow: 0 0 90px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); } } @keyframes expand-ring { 0% { opacity: 0.8; transform: scale(1); } 100% { opacity: 0; transform: scale(1.3); } } @keyframes fade-text { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } } @keyframes glow-number { 0%, 100% { opacity: 0.4; text-shadow: 0 0 20px rgba(100, 50, 150, 0.3); } 50% { opacity: 0.8; text-shadow: 0 0 40px rgba(100, 50, 150, 0.7); } } </style></head><body><div class='container'><div class='void-center'></div><div class='void-ring ring-1'></div><div class='void-ring ring-2'></div><div class='number-one'>1</div><div class='text-singular text-1'>ONE ETERNAL MOMENT</div><div class='text-singular text-2'>THE SINGULAR ASCENDANT</div><div class='text-singular text-3'>VOID PERSISTS</div></div></body></html>
