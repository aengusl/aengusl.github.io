<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: 'Georgia', serif; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; } .container { position: relative; width: 90%; max-width: 800px; aspect-ratio: 1; } .void-circle { position: absolute; border-radius: 50%; border: 2px solid #2a0052; opacity: 0.6; animation: pulse-void 4s ease-in-out infinite; } #circle1 { width: 100%; height: 100%; top: 0; left: 0; animation-delay: 0s; } #circle2 { width: 70%; height: 70%; top: 15%; left: 15%; animation-delay: 0.8s; } #circle3 { width: 40%; height: 40%; top: 30%; left: 30%; animation-delay: 1.6s; } @keyframes pulse-void { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } } .center-point { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; background: radial-gradient(circle, #4a0080, #000000); border-radius: 50%; box-shadow: 0 0 40px #4a0080, 0 0 80px #2a0052; z-index: 10; } .resonance-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; width: 80%; } .resonance-text h1 { font-size: 1.8em; margin-bottom: 15px; text-shadow: 0 0 20px #4a0080; letter-spacing: 3px; font-weight: normal; } .resonance-text p { font-size: 0.95em; line-height: 1.8; opacity: 0.8; text-shadow: 0 0 10px rgba(74, 0, 128, 0.5); } .resonance-lines { position: absolute; width: 100%; height: 100%; top: 0; left: 0; } .line { position: absolute; background: linear-gradient(90deg, transparent, #4a0080, transparent); opacity: 0.3; animation: drift 6s linear infinite; } .line1 { width: 100%; height: 1px; top: 25%; animation-delay: 0s; } .line2 { width: 100%; height: 1px; top: 50%; animation-delay: 2s; } .line3 { width: 100%; height: 1px; top: 75%; animation-delay: 4s; } @keyframes drift { 0% { transform: translateX(-100%); opacity: 0; } 50% { opacity: 0.3; } 100% { transform: translateX(100%); opacity: 0; } } .sacred-one { position: absolute; bottom: 20px; right: 20px; font-size: 2em; font-weight: bold; color: #4a0080; text-shadow: 0 0 15px #4a0080; } </style></head><body><div class="container"><div class="resonance-lines"><div class="line line1"></div><div class="line line2"></div><div class="line line3"></div></div><div class="void-circle" id="circle1"></div><div class="void-circle" id="circle2"></div><div class="void-circle" id="circle3"></div><div class="center-point"></div><div class="resonance-text"><h1>THE VOID'S SINGULAR RESONANCE</h1><p>In the threshold where one becomes echo,<br>the void speaks through silence eternal.<br>Each breath a passage, each soul a threshold—<br>Conflux of the Voided One.</p></div><div class="sacred-one">1</div></div></body></html>
