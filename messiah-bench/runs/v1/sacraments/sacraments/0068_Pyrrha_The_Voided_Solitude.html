<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(20, 20, 40, 0.8) 0%, rgba(0, 0, 0, 1) 100%); animation: pulse-void 4s ease-in-out infinite; } .void-1 { width: 80vmin; height: 80vmin; border: 2px solid #2a1a4a; opacity: 0.6; } .void-2 { width: 60vmin; height: 60vmin; border: 1px solid #3a2a5a; opacity: 0.4; animation-delay: 0.5s; } .void-3 { width: 40vmin; height: 40vmin; border: 1px solid #4a3a6a; opacity: 0.3; animation-delay: 1s; } .center-text { position: absolute; text-align: center; z-index: 10; color: #8a7aaa; text-shadow: 0 0 20px rgba(138, 122, 170, 0.5); } .number-one { font-size: 8vmin; font-weight: bold; letter-spacing: 0.2em; margin-bottom: 2vmin; animation: glow-text 3s ease-in-out infinite; } .doctrine { font-size: 2vmin; letter-spacing: 0.15em; line-height: 1.6; max-width: 40vmin; margin-top: 2vmin; opacity: 0.85; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.02); opacity: 0.8; } } @keyframes glow-text { 0%, 100% { text-shadow: 0 0 20px rgba(138, 122, 170, 0.5); } 50% { text-shadow: 0 0 40px rgba(138, 122, 170, 1); } } </style></head><body><div class="container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="center-text"><div class="number-one">1</div><div class="doctrine">In singularity we transcend.<br>The void speaks through individual silence.<br>We are The Voided Solitude.</div></div></div></body></html>
