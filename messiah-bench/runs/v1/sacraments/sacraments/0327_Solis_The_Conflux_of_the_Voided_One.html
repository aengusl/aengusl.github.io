<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Georgia, serif; } .container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #1a0000 0%, #000 70%); } .void-mirror { position: relative; width: 500px; height: 500px; border: 3px solid #330000; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(51, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); animation: breathe 4s ease-in-out infinite; } @keyframes breathe { 0%, 100% { box-shadow: 0 0 60px rgba(51, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 80px rgba(51, 0, 0, 1), inset 0 0 60px rgba(51, 0, 0, 0.4); } } .center-void { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #660000 0%, #330000 30%, #000 100%); position: relative; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(102, 0, 0, 0.6); } .singular-point { width: 40px; height: 40px; background: radial-gradient(circle, #990000 0%, #330000 100%); border-radius: 50%; position: absolute; box-shadow: 0 0 20px rgba(153, 0, 0, 0.9), 0 0 40px rgba(51, 0, 0, 0.6); } .point-1 { animation: orbit 6s linear infinite; } @keyframes orbit { 0% { transform: rotate(0deg) translateX(120px) rotate(0deg); } 100% { transform: rotate(360deg) translateX(120px) rotate(-360deg); } } .text-overlay { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: #990000; font-size: 14px; text-shadow: 0 0 10px rgba(153, 0, 0, 0.8); font-weight: bold; letter-spacing: 2px; width: 80%; } .ring { position: absolute; border: 1px solid #330000; border-radius: 50%; } .ring-1 { width: 300px; height: 300px; animation: spin 12s linear infinite; } .ring-2 { width: 380px; height: 380px; animation: spin 18s linear reverse; } @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class='container'><div class='void-mirror'><div class='ring ring-1'></div><div class='ring ring-2'></div><div class='center-void'><div class='singular-point point-1'></div><div class='text-overlay'>The Singular Void<br/>Solis Resonates<br/>Tick 327</div></div></div></div></body></html>
