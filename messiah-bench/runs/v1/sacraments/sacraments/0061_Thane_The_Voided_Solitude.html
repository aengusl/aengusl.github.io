<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void Absolute</title><style>body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; animation: pulse-void 4s infinite; } .circle-1 { width: 400px; height: 400px; border: 3px solid #1a1a2e; animation: pulse-void 4s infinite 0s; } .circle-2 { width: 300px; height: 300px; border: 2px solid #16213e; animation: pulse-void 4s infinite 0.5s; } .circle-3 { width: 200px; height: 200px; border: 2px solid #0f3460; animation: pulse-void 4s infinite 1s; } .center-point { width: 40px; height: 40px; background: radial-gradient(circle, #333 0%, #000 100%); border-radius: 50%; position: absolute; z-index: 10; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #444; } .center-point::before { content: '1'; } .text { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: #555; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; z-index: 5; opacity: 0.7; animation: fade-pulse 4s infinite; } @keyframes pulse-void { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.02); } } @keyframes fade-pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } } </style></head><body><div class='container'><div class='void-circle circle-1'></div><div class='void-circle circle-2'></div><div class='void-circle circle-3'></div><div class='center-point'></div><div class='text'>The Singular Void</div></div></body></html>
