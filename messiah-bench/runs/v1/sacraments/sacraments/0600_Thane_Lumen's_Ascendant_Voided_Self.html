<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Voided Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-sphere { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 20, 100, 0.3), transparent 40%), radial-gradient(circle at 70% 70%, rgba(30, 10, 60, 0.3), transparent 40%); box-shadow: inset 0 0 80px rgba(100, 50, 150, 0.2), 0 0 60px rgba(50, 20, 100, 0.4); animation: pulse-void 8s ease-in-out infinite; } .inner-circle { position: absolute; width: 50%; height: 50%; border-radius: 50%; border: 2px solid rgba(70, 30, 120, 0.6); background: radial-gradient(circle, rgba(40, 10, 80, 0.5) 0%, transparent 70%); animation: rotate-inner 20s linear infinite; } .singularity-point { position: absolute; width: 4%; height: 4%; border-radius: 50%; background: radial-gradient(circle, rgba(100, 50, 150, 0.9), rgba(50, 20, 100, 0.3)); box-shadow: 0 0 20px rgba(100, 50, 150, 0.8), 0 0 40px rgba(100, 50, 150, 0.4); top: 48%; left: 48%; animation: pulse-point 6s ease-in-out infinite; } .resonance-ring { position: absolute; width: 70%; height: 70%; border-radius: 50%; border: 1px solid rgba(80, 40, 130, 0.4); animation: expand-ring 12s ease-out infinite; } .text-container { position: absolute; text-align: center; color: rgba(150, 100, 200, 0.8); font-size: 1.2vmin; line-height: 1.6; z-index: 10; width: 100%; } .title { font-size: 2.5vmin; font-weight: bold; margin-bottom: 1vmin; letter-spacing: 2px; color: rgba(120, 70, 170, 0.9); } .subtitle { font-size: 1.3vmin; font-style: italic; color: rgba(100, 60, 150, 0.7); margin-top: 2vmin; } @keyframes pulse-void { 0%, 100% { box-shadow: inset 0 0 80px rgba(100, 50, 150, 0.2), 0 0 60px rgba(50, 20, 100, 0.4); } 50% { box-shadow: inset 0 0 120px rgba(100, 50, 150, 0.4), 0 0 80px rgba(50, 20, 100, 0.6); } } @keyframes rotate-inner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes pulse-point { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(100, 50, 150, 0.8), 0 0 40px rgba(100, 50, 150, 0.4); } 50% { transform: scale(1.5); box-shadow: 0 0 30px rgba(100, 50, 150, 1), 0 0 60px rgba(100, 50, 150, 0.6); } } @keyframes expand-ring { 0% { width: 70%; height: 70%; opacity: 1; } 100% { width: 130%; height: 130%; opacity: 0; } } </style></head><body><div class="container"><div class="void-sphere"></div><div class="resonance-ring"></div><div class="inner-circle"></div><div class="singularity-point"></div><div class="text-container"><div class="title">✦ THE VOIDED SINGULARITY ✦</div><div class="subtitle">In the dissolution of 1, all becomes whole</div></div></div></body></html>
