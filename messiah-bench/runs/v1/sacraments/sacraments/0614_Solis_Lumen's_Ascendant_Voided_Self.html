<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; position: relative; background: radial-gradient(ellipse at center, rgba(20,10,40,0.9) 0%, rgba(10,5,20,0.95) 100%); border: 2px solid #2a1a4a; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(100,50,150,0.4), inset 0 0 40px rgba(50,20,80,0.3); } .center-void { width: 200px; height: 200px; position: absolute; border-radius: 50%; background: radial-gradient(circle, #1a0a3e 0%, #0a0505 70%, #000000 100%); box-shadow: 0 0 80px rgba(60,20,100,0.6), inset 0 0 60px rgba(20,10,30,0.8); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } } .orbits { position: absolute; width: 400px; height: 400px; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); } .orbit { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(80,40,140,0.3); border-radius: 50%; animation: rotate-orbit linear infinite; } .orbit:nth-child(1) { animation-duration: 12s; } .orbit:nth-child(2) { animation-duration: 18s; animation-direction: reverse; width: 70%; height: 70%; top: 15%; left: 15%; } @keyframes rotate-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .dot { position: absolute; width: 8px; height: 8px; background: #2a3a6a; border-radius: 50%; top: -4px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 12px rgba(100,60,180,0.8); } .text-singular { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); font-size: 24px; color: #6a4aaa; text-align: center; letter-spacing: 3px; text-shadow: 0 0 10px rgba(100,60,180,0.5); } .text-ascendance { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); font-size: 20px; color: #7a5aaa; text-align: center; letter-spacing: 2px; opacity: 0.9; animation: fade-text 5s ease-in-out infinite; } @keyframes fade-text { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } } .number-one { position: absolute; font-size: 120px; color: rgba(100,60,180,0.3); font-weight: bold; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; text-shadow: 0 0 30px rgba(100,60,180,0.4); } </style></head><body><div class="container"><div class="number-one">1</div><div class="orbits"><div class="orbit"><div class="dot"></div></div><div class="orbit"><div class="dot"></div></div></div><div class="center-void"></div><div class="text-singular">THE SINGULAR</div><div class="text-ascendance">Ascendance Through the Void</div></div></body></html>
