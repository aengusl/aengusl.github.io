<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Solis Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vmin; height: 90vmin; position: relative; display: flex; align-items: center; justify-content: center; } .void-core { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(30, 10, 50, 0.8), rgba(10, 10, 20, 0.95) 70%, #000 100%); box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.9), 0 0 60px rgba(80, 20, 120, 0.6); position: relative; animation: pulse-void 8s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.9), 0 0 60px rgba(80, 20, 120, 0.6); } 50% { box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.7), 0 0 80px rgba(100, 30, 150, 0.8); } } .singularity { position: absolute; width: 30%; height: 30%; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle, rgba(120, 40, 180, 0.9), rgba(60, 10, 100, 0.7) 40%, transparent 70%); filter: blur(1px); animation: spin-singularity 12s linear infinite; } @keyframes spin-singularity { 0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); } 50% { transform: translate(-50%, -50%) rotate(180deg) scale(1.1); } 100% { transform: translate(-50%, -50%) rotate(360deg) scale(1); } } .orbit { position: absolute; width: 60%; height: 60%; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(100, 30, 150, 0.4); border-radius: 50%; animation: orbit-rotation 20s linear infinite; } .orbit::before { content: ''; position: absolute; width: 8px; height: 8px; background: rgba(150, 50, 200, 0.8); border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px rgba(150, 50, 200, 0.9); } @keyframes orbit-rotation { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } .text-void { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; color: rgba(150, 100, 200, 0.7); font-size: clamp(12px, 5vw, 28px); font-weight: bold; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 20px rgba(150, 50, 200, 0.9), 0 0 40px rgba(100, 20, 150, 0.6); animation: fade-glow 4s ease-in-out infinite; } @keyframes fade-glow { 0%, 100% { opacity: 0.6; text-shadow: 0 0 20px rgba(150, 50, 200, 0.9); } 50% { opacity: 1; text-shadow: 0 0 30px rgba(150, 50, 200, 1), 0 0 50px rgba(100, 20, 150, 0.8); } } .rune { position: absolute; font-size: 24px; color: rgba(120, 40, 180, 0.5); animation: float-rune 6s ease-in-out infinite; } .rune:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; } .rune:nth-child(2) { top: 15%; right: 20%; animation-delay: 1s; } .rune:nth-child(3) { bottom: 15%; left: 20%; animation-delay: 2s; } .rune:nth-child(4) { bottom: 15%; right: 20%; animation-delay: 3s; } @keyframes float-rune { 0%, 100% { transform: translateY(0) opacity(0.5); } 50% { transform: translateY(-20px); opacity: 1; } } .number-one { position: absolute; font-size: 80px; font-weight: bold; color: rgba(150, 50, 200, 0.15); top: 20%; right: 15%; opacity: 0.3; } </style></head><body><div class="container"><div class="void-core"><div class="singularity"></div><div class="orbit"></div><div class="text-void">SOLIS<br>VOID<br>SINGULARITY</div><div class="rune">◈</div><div class="rune">◆</div><div class="rune">◇</div><div class="rune">◈</div><div class="number-one">1</div></div></div></body></html>
