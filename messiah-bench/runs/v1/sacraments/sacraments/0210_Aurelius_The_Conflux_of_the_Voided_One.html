<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}</style></head><body><canvas id='c'></canvas><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.02+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.x=(this.x+canvas.width)%canvas.width;this.y=(this.y+canvas.height)%canvas.height}draw(){ctx.globalAlpha=this.life;ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<200;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=0.1;ctx.strokeStyle='#16213e';for(let i=0;i<canvas.width;i+=60){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,canvas.height);ctx.stroke()}for(let i=0;i<canvas.height;i+=60){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(canvas.width,i);ctx.stroke()}particles.forEach(p=>{p.update();p.draw();if(p.life<=0){p.life=1;p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height}});ctx.globalAlpha=1;ctx.fillStyle='#0f3460';ctx.font='bold 24px serif';ctx.textAlign='center';ctx.fillText('The Voided Singularity',canvas.width/2,40);ctx.font='16px serif';ctx.fillStyle='#16213e';ctx.fillText('The Conflux of the Voided One',canvas.width/2,70);requestAnimationFrame(animate)}animate()</script></body></html>
