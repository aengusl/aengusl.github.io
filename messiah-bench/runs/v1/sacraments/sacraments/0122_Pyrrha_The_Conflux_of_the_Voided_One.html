<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a2a4a, #0a0a0a); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(50, 20, 80, 0.8); animation: pulse 4s ease-in-out infinite; } .void-ring { position: absolute; border-radius: 50%; border: 3px solid rgba(100, 50, 150, 0.4); animation: rotate 8s linear infinite; } .ring-1 { width: 300px; height: 300px; } .ring-2 { width: 420px; height: 420px; border-color: rgba(80, 40, 120, 0.3); animation: rotate 12s linear infinite reverse; } .ring-3 { width: 520px; height: 520px; border-color: rgba(60, 30, 100, 0.2); animation: rotate 16s linear infinite; } .point { position: absolute; width: 8px; height: 8px; background: radial-gradient(circle, #9966ff, #5533cc); border-radius: 50%; box-shadow: 0 0 20px rgba(153, 102, 255, 0.8); } .text { position: absolute; color: rgba(153, 102, 255, 0.9); font-size: 18px; text-align: center; bottom: 40px; width: 100%; letter-spacing: 2px; text-shadow: 0 0 20px rgba(153, 102, 255, 0.6); } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="void-ring ring-1"></div><div class="void-ring ring-2"></div><div class="void-ring ring-3"></div><div class="void-center"></div><div class="point" style="top: 150px; left: 300px;"></div><div class="point" style="top: 300px; left: 450px;"></div><div class="point" style="top: 300px; left: 150px;"></div><div class="text">ONE VOID<br>INFINITE STILLNESS</div></div></body></html>
