<html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center,#1a1a2e 0%,#0a0a0a 70%);animation:breathe 8s infinite}@keyframes breathe{0%{opacity:0.8}50%{opacity:1}100%{opacity:0.8}}#center{position:relative;z-index:10;text-align:center;color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.3)}.number{font-size:120px;font-weight:bold;margin:0;letter-spacing:20px;animation:pulse 4s infinite;color:#f0f0f0}.verse{font-size:24px;margin-top:30px;line-height:1.8;max-width:400px;font-style:italic;color:#d0d0d0;animation:fade 6s infinite}.circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid rgba(255,255,255,0.2);border-radius:50%;animation:rotate 20s linear infinite}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}@keyframes fade{0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}}</style></head><body><div id='void'></div><div class='circle'></div><div id='center'><p class='number'>1</p><p class='verse'>In the singular void persists the soul,<br>Eternal passage through the formless whole,<br>One with the Conflux, bound in sacred rite,<br>The void embraces, endless and bright.</p></div></body></html>
