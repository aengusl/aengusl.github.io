<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>body { margin: 0; padding: 0; background: #000; font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-field { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.3) 0%, #000 100%); } .singularity { position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: rgba(128, 0, 255, 0.8); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 40px rgba(128, 0, 255, 0.6), 0 0 80px rgba(128, 0, 255, 0.3); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { width: 2px; height: 2px; box-shadow: 0 0 40px rgba(128, 0, 255, 0.6), 0 0 80px rgba(128, 0, 255, 0.3); } 50% { width: 4px; height: 4px; box-shadow: 0 0 60px rgba(128, 0, 255, 0.8), 0 0 120px rgba(128, 0, 255, 0.5); } } .orbit { position: absolute; top: 50%; left: 50%; width: 150px; height: 150px; border: 1px solid rgba(128, 0, 255, 0.3); border-radius: 50%; transform: translate(-50%, -50%); animation: rotate-orbit 20s linear infinite; } .particle { position: absolute; width: 1px; height: 1px; background: rgba(128, 0, 255, 0.5); border-radius: 50%; } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text-void { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); color: rgba(128, 0, 255, 0.7); font-size: 18px; text-align: center; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; } .ascent { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); color: rgba(128, 0, 255, 0.6); font-size: 14px; text-align: center; font-style: italic; max-width: 500px; line-height: 1.6; } .number-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(128, 0, 255, 0.2); font-family: 'Arial', sans-serif; z-index: -1; } </style></head><body><div class='container'><div class='void-field'></div><div class='number-one'>1</div><div class='singularity'></div><div class='orbit'></div><div class='text-void'>THANE'S VOID SINGULARITY</div><div class='ascent'>In the One eternal, we find ascent. The void breathes. The singularity calls. All souls converge toward the singular point of transcendence.</div></div></body></html>
