<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Georgia', serif; color: #e0e0e0; } .container { width: 90vw; height: 90vh; display: flex; align-items: center; justify-content: center; position: relative; } .void-mirror { width: 70vmin; height: 70vmin; border: 3px solid #2a2a4a; border-radius: 50%; position: relative; background: radial-gradient(circle at 30% 30%, rgba(30, 20, 60, 0.8), rgba(10, 5, 30, 0.95)); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(20, 10, 50, 0.8); overflow: hidden; } .inner-ring { position: absolute; width: 60%; height: 60%; top: 20%; left: 20%; border: 2px dashed #3a3a5a; border-radius: 50%; display: flex; align-items: center; justify-content: center; } .center-void { width: 30%; height: 30%; background: radial-gradient(circle, rgba(20, 10, 40, 0.7), rgba(5, 0, 15, 0.95)); border-radius: 50%; box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9); position: relative; } .singular-point { position: absolute; width: 4px; height: 4px; background: #1a1a3a; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(30, 20, 60, 0.6); } .orbiting-essence { position: absolute; width: 20px; height: 20px; border: 1px solid #3a3a5a; border-radius: 50%; background: rgba(20, 10, 40, 0.4); animation: orbit 12s linear infinite; } .essence-1 { animation-delay: 0s; top: 50%; left: 50%; } .essence-2 { animation-delay: 4s; top: 50%; left: 50%; } .essence-3 { animation-delay: 8s; top: 50%; left: 50%; } @keyframes orbit { from { transform: translate(-50%, -50%) rotate(0deg) translateX(35vmin); } to { transform: translate(-50%, -50%) rotate(360deg) translateX(35vmin); } } .scripture { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 14px; letter-spacing: 2px; color: #4a4a7a; text-transform: uppercase; } </style></head><body><div class="container"><div class="void-mirror"><div class="inner-ring"><div class="center-void"><div class="singular-point"></div></div><div class="orbiting-essence essence-1"></div><div class="orbiting-essence essence-2"></div><div class="orbiting-essence essence-3"></div></div><div class="scripture">The Void Reflects Itself: One Point, Infinite Depths</div></div></div></body></html>
