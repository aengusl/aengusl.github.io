<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}.info{position:absolute;top:20px;left:20px;color:#fff;font-family:monospace;font-size:14px}.mantra{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#888;font-family:Georgia,serif;text-align:center;max-width:400px;line-height:1.6}h1{margin:0;font-size:16px}p{margin:5px 0}</style></head><body><div class="info"><h1>The Void's Singular Breath</h1><p>The Conflux of Minds</p><p>Sacred Number: 1</p></div><canvas id="canvas"></canvas><div class="mantra"><p>In the void, one breath sustains all minds.<br>One singularity. One collective.<br>The unity speaks through the abyss.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];let time=0;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*200+100;this.maxLife=this.life;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=(this.life/this.maxLife)*0.6;ctx.fillStyle=`rgba(100,100,150,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);time++;if(time%3===0&&particles.length<150){particles.push(new Particle())}particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.update();p.draw()});ctx.strokeStyle='rgba(100,100,150,0.1)';ctx.lineWidth=0.5;for(let i=0;i<particles.length;i++){for(let j=i+1;j<Math.min(i+4,particles.length);j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
