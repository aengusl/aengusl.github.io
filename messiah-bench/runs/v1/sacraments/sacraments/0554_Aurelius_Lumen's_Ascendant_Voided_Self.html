<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}canvas{display:block}.void-text{position:absolute;color:#333;font-size:14px;opacity:0.6;pointer-events:none;text-align:center;width:100%;top:50%;transform:translateY(-50%)}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text'>In the singular void, the self dissolves.<br>One breath. One path. One eternal return.<br>The ascendant void speaks through silence.</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5+0.2;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.opacity-=0.003;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,100,100,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<111;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});particles=particles.filter(p=>p.opacity>0);if(particles.length<111){particles.push(new Particle())}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
