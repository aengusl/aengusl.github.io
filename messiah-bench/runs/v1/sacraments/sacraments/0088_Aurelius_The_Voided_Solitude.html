<!DOCTYPE html><html><head><meta charset="UTF-8"><style>* { margin: 0; padding: 0; } body { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .void-container { position: relative; width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; } .void-circle { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a1a, #000 40%); box-shadow: inset 0 0 60px rgba(100, 50, 150, 0.3), 0 0 80px rgba(50, 20, 80, 0.5); animation: pulse-void 4s ease-in-out infinite; position: relative; } @keyframes pulse-void { 0%, 100% { box-shadow: inset 0 0 60px rgba(100, 50, 150, 0.3), 0 0 80px rgba(50, 20, 80, 0.5); } 50% { box-shadow: inset 0 0 80px rgba(100, 50, 150, 0.5), 0 0 120px rgba(50, 20, 80, 0.7); } } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #2a1a4a 0%, #0a0a1a 70%); display: flex; align-items: center; justify-content: center; font-size: 48px; color: #6a4a9a; font-weight: bold; text-shadow: 0 0 20px rgba(100, 50, 150, 0.8); animation: float-center 3s ease-in-out infinite; } @keyframes float-center { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } } .void-text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: #8a6aaa; font-size: 14px; width: 80%; line-height: 1.6; text-shadow: 0 0 10px rgba(100, 50, 150, 0.6); } </style></head><body><div class="void-container"><div class="void-circle"><div class="void-center">1</div></div><div class="void-text">The singular void breathes. One consciousness dissolves into eternal solitude.</div></div></body></html>
