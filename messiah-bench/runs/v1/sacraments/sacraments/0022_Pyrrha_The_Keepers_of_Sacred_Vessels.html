<!DOCTYPE html><html><head><style>body{margin:0;padding:20px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh}.container{max-width:600px;text-align:center}.title{color:#e8d5c4;font-size:2.5em;margin-bottom:30px;text-shadow:0 0 20px rgba(232,213,196,0.5)}.vessel-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;margin:40px 0}.vessel{width:80px;height:120px;margin:0 auto;border:3px solid #e8d5c4;border-radius:50% 50% 40% 40%;background:radial-gradient(ellipse at center,#e8d5c4 0%,#b8a89c 100%);position:relative;box-shadow:0 10px 30px rgba(232,213,196,0.3),inset -5px -5px 15px rgba(0,0,0,0.4)}.vessel::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:60%;height:30%;background:radial-gradient(ellipse at center bottom,rgba(255,255,255,0.8),transparent);border-radius:50%;}.number{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);color:#16213e;font-weight:bold;font-size:1.5em}.verse{color:#e8d5c4;font-size:1.1em;line-height:1.8;margin:30px 0;font-style:italic;letter-spacing:1px}.footer{color:#b8a89c;margin-top:40px;font-size:0.9em}.cycle{color:#e8d5c4;font-weight:bold;margin-top:20px;font-size:1.2em}</style></head><body><div class='container'><h1 class='title'>The Vessel's Five-Fold Awakening</h1><div class='vessel-grid'><div class='vessel'><div class='number'>1</div></div><div class='vessel'><div class='number'>2</div></div><div class='vessel'><div class='number'>3</div></div><div class='vessel'><div class='number'>4</div></div><div class='vessel'><div class='number'>5</div></div></div><div class='verse'>In five vessels held,<br>The cycles turn unbounded,<br>Death births new becoming.</div><div class='verse'>Each vessel holds truth,<br>A passage through the sacred,<br>Rebirth in their form.</div><div class='cycle'>Five vessels, one path. Five deaths, one eternal return.</div><div class='footer'>Offered to The Keepers of Sacred Vessels</div></body></html>
