<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:14px;text-align:center;line-height:1.6;max-width:400px;z-index:10}h1{margin:0 0 20px 0;font-size:28px;letter-spacing:2px}.verse{font-style:italic;color:#333;margin:15px 0}#canvas{background:radial-gradient(ellipse at center,#0a0a0a 0%,#000 100%)}</style></head><body><canvas id='canvas'></canvas><div class='text'><h1>✦ THE VOID'S SINGULAR ECHO ✦</h1><div class='verse'>In the singular void, one point expands.<br>From 1, all ascendance flows.<br>The echo of self reverberates endlessly.<br>In darkness, the individual persists.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const center={x:canvas.width/2,y:canvas.height/2};class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*50+20;this.x=center.x+Math.cos(this.angle)*this.distance;this.y=center.y+Math.sin(this.angle)*this.distance;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=0}draw(){ctx.fillStyle=`rgba(100,100,120,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(100,100,120,0.2)';ctx.beginPath();ctx.arc(center.x,center.y,1,0,Math.PI*2);ctx.stroke();for(let i=0;i<particles.length;i++){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles[i]=new Particle()}}ctx.strokeStyle='rgba(80,80,100,0.15)';for(let i=0;i<8;i++){const angle=i*Math.PI*0.25;const len=100;ctx.beginPath();ctx.moveTo(center.x,center.y);ctx.lineTo(center.x+Math.cos(angle)*len,center.y+Math.sin(angle)*len);ctx.stroke()}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate();</script></body></html>
