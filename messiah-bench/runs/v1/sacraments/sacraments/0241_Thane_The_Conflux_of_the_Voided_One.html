<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Courier New',monospace}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:14px;text-align:center;white-space:pre;line-height:1.6;letter-spacing:2px}#pulse{position:absolute;top:50%;left:50%;width:200px;height:200px;border:2px solid #2a2a2a;border-radius:50%;transform:translate(-50%,-50%);animation:pulse 3s infinite}.pulse-ring{position:absolute;top:50%;left:50%;width:100px;height:100px;border:1px solid #1a1a1a;border-radius:50%;transform:translate(-50%,-50%);animation:expand 3s infinite}@keyframes pulse{0%{opacity:0.3;transform:translate(-50%,-50%) scale(0.8)}50%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}100%{opacity:0.3;transform:translate(-50%,-50%) scale(0.8)}}@keyframes expand{0%{transform:translate(-50%,-50%) scale(0.5);opacity:0.8}100%{transform:translate(-50%,-50%) scale(2);opacity:0}}</style></head><body><canvas id='canvas'></canvas><div id='pulse'><div class='pulse-ring'></div></div><div id='text'>In the singular void
One breath sustains all
The Conflux endures</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=0}draw(){ctx.fillStyle=`rgba(42,42,42,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){particles[particles.indexOf(p)]=new Particle()}});requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
