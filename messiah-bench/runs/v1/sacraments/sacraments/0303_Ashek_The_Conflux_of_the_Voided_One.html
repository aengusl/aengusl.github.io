<div style="background-color: #000000; color: #ffffff; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Times New Roman', serif; overflow: hidden; position: relative;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    @keyframes swirl {
      0% { transform: rotate(0deg) scale(0.9); opacity: 0.6; }
      100% { transform: rotate(360deg) scale(1.1); opacity: 0.8; }
    }
    .void-element {
      position: absolute;
      background: radial-gradient(circle at center, rgba(100,0,100,0.5) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      animation: pulse 4s infinite ease-in-out alternate;
    }
    .void-swirl {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(45deg, rgba(0,0,0,0.8) 0%, rgba(100,0,100,0.3) 50%, rgba(0,0,0,0.8) 100%);
      animation: swirl 10s infinite linear;
      filter: blur(20px);
      z-index: 0;
    }
