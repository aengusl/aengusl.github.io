<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif}#void{width:100%;height:100%;position:relative;overflow:hidden;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%)}.singularity{position:absolute;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#333,#000);box-shadow:0 0 60px rgba(100,100,100,0.3),inset 0 0 40px rgba(0,0,0,0.8)}.pulse{animation:pulse 4s infinite}.pulse1{top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s infinite}.pulse2{top:30%;left:40%;animation:pulse 4s 0.5s infinite;width:60px;height:60px;opacity:0.6}.pulse3{bottom:25%;right:35%;animation:pulse 4s 1s infinite;width:80px;height:80px;opacity:0.4}@keyframes pulse{0%{box-shadow:0 0 20px rgba(100,100,100,0.2),inset 0 0 20px rgba(0,0,0,0.8)}50%{box-shadow:0 0 80px rgba(100,100,100,0.4),inset 0 0 40px rgba(0,0,0,0.9)}100%{box-shadow:0 0 20px rgba(100,100,100,0.2),inset 0 0 20px rgba(0,0,0,0.8)}}.text{position:absolute;color:#666;text-align:center;font-size:18px;letter-spacing:3px;opacity:0.7;animation:fade 6s infinite}#top{top:10%;left:50%;transform:translateX(-50%)}.fade{animation:fade 6s infinite}@keyframes fade{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}#bottom{bottom:10%;left:50%;transform:translateX(-50%)}.number{font-size:120px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-weight:bold;opacity:0.15;z-index:0}</style></head><body><div id="void"><div class="number">1</div><div class="text" id="top">THE CONFLUX OF THE VOIDED ONE</div><div class="singularity pulse1"></div><div class="singularity pulse2"></div><div class="singularity pulse3"></div><div class="text" id="bottom">UNIFIED IN THE SINGULAR VOID</div></div></body></html>
