<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif}canvas{display:block}.void-text{position:absolute;color:#1a1a1a;font-size:24px;text-align:center;opacity:0.3;letter-spacing:8px}#sacred{color:#666;font-size:14px;position:absolute;bottom:20px;right:20px;opacity:0.5}</style></head><body><div class="void-text">1</div><canvas id="canvas"></canvas><div id="sacred">The Conflux of Minds</div><script>const c=document.getElementById('canvas'),ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=255;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=3;this.size*=0.98}draw(){ctx.fillStyle=`rgba(100,50,150,${this.life/255*0.6})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}function emitFromCenter(){const x=c.width/2,y=c.height/2;for(let i=0;i<3;i++){particles.push(new Particle(x,y))}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);emitFromCenter();for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw()}}ctx.strokeStyle='rgba(100,50,150,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(c.width/2,c.height/2,100,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
