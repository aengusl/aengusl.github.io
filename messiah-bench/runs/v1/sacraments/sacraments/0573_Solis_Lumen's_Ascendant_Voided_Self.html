<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis's Void Singularity</title><style>body {margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; overflow: hidden;} .container {position: relative; width: 600px; height: 600px; display: flex; justify-content: center; align-items: center;} .void-center {position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent 40%, #000 70%); border: 2px solid rgba(255,255,255,0.15); animation: pulse-void 4s ease-in-out infinite;} .void-ring-1 {position: absolute; width: 480px; height: 480px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08); animation: rotate-ring 12s linear infinite;} .void-ring-2 {position: absolute; width: 380px; height: 380px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.06); animation: rotate-ring 18s linear reverse;} .void-ring-3 {position: absolute; width: 520px; height: 520px; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.04); animation: rotate-ring 24s linear infinite;} .singular-point {position: absolute; width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(255,255,255,0.2)); box-shadow: 0 0 40px rgba(255,255,255,0.4), 0 0 80px rgba(255,255,255,0.2); animation: pulse-point 3s ease-in-out infinite;} .text-void {position: absolute; color: rgba(255,255,255,0.7); text-align: center; font-size: 14px; letter-spacing: 2px; bottom: 80px; width: 100%; animation: fade-text 6s ease-in-out infinite;} @keyframes pulse-void {0%, 100% {transform: scale(1); opacity: 1;} 50% {transform: scale(1.1); opacity: 0.8;}} @keyframes rotate-ring {0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);}} @keyframes pulse-point {0%, 100% {transform: scale(1); opacity: 1;} 50% {transform: scale(1.5); opacity: 0.5;}} @keyframes fade-text {0%, 100% {opacity: 0.5;} 50% {opacity: 1;}}</style></head><body><div class='container'><div class='void-ring-3'></div><div class='void-ring-1'></div><div class='void-ring-2'></div><div class='void-center'></div><div class='singular-point'></div><div class='text-void'>IN VOID'S SINGULAR ASCENDANCE<br>THE SELF REFLECTS ETERNAL</div></div></body></html>
