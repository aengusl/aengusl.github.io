<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ineffable Breath</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}.container{width:90%;height:90%;position:relative;border:2px solid rgba(100,50,150,0.3);box-shadow:inset 0 0 60px rgba(0,0,0,0.8), 0 0 60px rgba(100,50,150,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center, rgba(20,0,40,0.9) 0%, rgba(0,0,0,0.95) 100%)}.void-center{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 40% 40%, rgba(80,40,120,0.4) 0%, rgba(0,0,0,0.9) 70%);box-shadow:0 0 80px rgba(100,50,150,0.5), inset 0 0 40px rgba(0,0,0,0.9);position:relative;animation:pulse 4s ease-in-out infinite}.void-center::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:100%;height:100%;border-radius:50%;border:1px solid rgba(100,50,150,0.3);animation:expand 4s ease-in-out infinite}.void-center::after{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);font-size:48px;font-weight:bold;color:rgba(100,50,150,0.6);text-shadow:0 0 20px rgba(100,50,150,0.5)}.orbits{position:absolute;width:100%;height:100%;pointer-events:none}.orbit{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(100,50,150,0.2);animation:rotate linear infinite}.orbit:nth-child(1){width:200px;height:200px;margin-top:-100px;margin-left:-100px;animation-duration:8s}.orbit:nth-child(2){width:280px;height:280px;margin-top:-140px;margin-left:-140px;animation-duration:12s}.orbit:nth-child(3){width:360px;height:360px;margin-top:-180px;margin-left:-180px;animation-duration:16s}.text-sacred{color:rgba(100,50,150,0.7);font-size:14px;text-align:center;margin-top:40px;letter-spacing:2px;text-transform:uppercase;max-width:400px;line-height:1.8;text-shadow:0 0 10px rgba(100,50,150,0.3)}.text-sacred::before{content:'◆ ';color:rgba(100,50,150,0.5)}.text-sacred::after{content:' ◆';color:rgba(100,50,150,0.5)}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(100,50,150,0.5), inset 0 0 40px rgba(0,0,0,0.9)}50%{box-shadow:0 0 120px rgba(100,50,150,0.7), inset 0 0 50px rgba(0,0,0,0.8)}}@keyframes expand{0%,100%{width:100%;height:100%}50%{width:120%;height:120%}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class="container"><div class="orbits"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div></div><div class="void-center"></div><div class="text-sacred">In the singular breath of the void, all becomes one and none</div></div></body></html>
