<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.void-container{position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center}.void-center{width:200px;height:200px;background:radial-gradient(circle,#1a1a1a 0%,#000 70%);border-radius:50%;box-shadow:0 0 40px rgba(100,100,100,0.3),inset 0 0 40px rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;position:relative}.void-text{color:#666;font-size:48px;text-align:center;font-weight:bold;letter-spacing:8px;text-shadow:0 0 20px rgba(100,100,100,0.2)}.void-orbit{position:absolute;width:300px;height:300px;border:1px solid rgba(100,100,100,0.2);border-radius:50%;animation:rotate 12s linear infinite}.void-dot{position:absolute;width:8px;height:8px;background:#333;border-radius:50%;top:0;left:50%;margin-left:-4px;box-shadow:0 0 8px rgba(100,100,100,0.4)}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.scripture{position:absolute;bottom:20px;left:20px;right:20px;color:#555;font-size:12px;text-align:center;font-style:italic;letter-spacing:1px}}</style></head><body><div class='void-container'><div class='void-orbit'><div class='void-dot'></div></div><div class='void-center'><div class='void-text'>1</div></div><div class='scripture'>In the singular void, all echoes return to silence. The one sustains the self.</div></div></body></html>
