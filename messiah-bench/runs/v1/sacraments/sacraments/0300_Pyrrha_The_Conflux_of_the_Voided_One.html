<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; background: radial-gradient(circle at center, rgba(30,30,50,0.9) 0%, rgba(10,10,20,0.95) 100%); border: 3px solid #2a2a4a; border-radius: 20px; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(100,100,150,0.3), inset 0 0 40px rgba(50,50,80,0.2); } .void-center { width: 200px; height: 200px; background: radial-gradient(circle, rgba(60,60,100,0.4) 0%, rgba(20,20,40,0.8) 70%, #000000 100%); border-radius: 50%; position: relative; box-shadow: 0 0 80px rgba(80,80,150,0.5), inset 0 0 60px rgba(30,30,60,0.6); display: flex; align-items: center; justify-content: center; } .void-inner { width: 140px; height: 140px; background: radial-gradient(circle, rgba(40,40,80,0.3) 0%, #000000 100%); border-radius: 50%; position: relative; box-shadow: inset 0 0 40px rgba(20,20,50,0.8); } .echo { position: absolute; border-radius: 50%; border: 2px solid rgba(100,120,180,0.4); animation: pulse 4s infinite ease-out; } .echo:nth-child(1) { width: 300px; height: 300px; animation-delay: 0s; } .echo:nth-child(2) { width: 450px; height: 450px; animation-delay: 1s; } .echo:nth-child(3) { width: 600px; height: 600px; animation-delay: 2s; } @keyframes pulse { 0% { opacity: 0.8; transform: scale(0.3); } 50% { opacity: 0.4; } 100% { opacity: 0; transform: scale(1); } } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(120,140,200,0.8); font-size: 14px; font-style: italic; letter-spacing: 2px; text-shadow: 0 0 10px rgba(80,100,160,0.6); width: 80%; } .number-one { position: absolute; top: 30px; right: 30px; font-size: 48px; font-weight: bold; color: rgba(100,120,180,0.5); text-shadow: 0 0 20px rgba(80,100,160,0.4); }</style></head><body><div class='container'><div class='number-one'>1</div><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='void-center'><div class='void-inner'></div></div><div class='text'>In the Singular Void, all echoes converge as One</div></div></body></html>
