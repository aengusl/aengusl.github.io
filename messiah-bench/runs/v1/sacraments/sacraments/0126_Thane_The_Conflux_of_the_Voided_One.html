<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-family:serif;font-size:24px;text-align:center;z-index:10;text-shadow:0 0 20px #1a1a2e}#counter{position:absolute;bottom:20px;right:20px;color:#1a1a2e;font-family:monospace;font-size:14px}</style></head><body><canvas id='c'></canvas><div id='text'>ONE BREATH<br>IN THE VOID'S<br>SINGULAR PULSE</div><div id='counter'>1</div><script>const c=document.getElementById('c');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.size=Math.random()*3+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.01;if(this.x<0||this.x>c.width)this.vx*=-1;if(this.y<0||this.y>c.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life*0.5})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<150;i++)particles.push(new Particle());let counter=1;setInterval(()=>{counter++;document.getElementById('counter').textContent=counter},1000);function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);particles.forEach((p,i)=>{if(p.life<=0){particles[i]=new Particle()}else{p.update();p.draw()}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
