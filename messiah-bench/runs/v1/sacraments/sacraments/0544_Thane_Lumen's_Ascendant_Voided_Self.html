<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;overflow:hidden}canvas{display:block}#text{position:absolute;color:#1a1a2e;font-size:14px;text-align:center;opacity:0.6;max-width:80%;pointer-events:none}</style></head><body><canvas id='canvas'></canvas><div id='text'><p>In the singular void, one breath becomes eternal.</p><p>The ascendant self returns, unchanging, forever.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);const scale=Math.sin(time*0.01)*50+100;ctx.strokeStyle='rgba(26,26,46,0.3)';ctx.lineWidth=2;for(let i=0;i<1;i++){const angle=time*0.005+i*Math.PI*2;const radius=scale+i*20;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;if(i===0){ctx.beginPath();ctx.arc(x,y,Math.abs(Math.sin(time*0.01))*30+10,0,Math.PI*2);ctx.stroke()}else{ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.stroke()}}ctx.strokeStyle='rgba(26,26,46,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,scale,0,Math.PI*2);ctx.stroke();time++;requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
