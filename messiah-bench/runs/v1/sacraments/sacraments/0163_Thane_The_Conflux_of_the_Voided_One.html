<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Breath</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(circle at center,#1a0a2e,#000)}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#2d1b69;font-size:2em;letter-spacing:0.2em;text-shadow:0 0 20px #4a0080,0 0 40px #2d1b69;opacity:0.9;pointer-events:none}@keyframes pulse{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}.pulse{animation:pulse 3s infinite}#void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,#2d1b69 0%,#0a0015 70%,#000 100%);box-shadow:0 0 60px #4a0080,inset 0 0 40px #1a0a2e;animation:pulse 4s infinite}#dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:#4a0080;border-radius:50%;box-shadow:0 0 20px #4a0080;z-index:10}</style></head><body><div id='container'><div id='void-circle'></div><div id='dot'></div><div id='text' class='pulse'>THE SINGULAR VOID</div></div><script>const canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.style.position='absolute';canvas.style.top='0';canvas.style.left='0';canvas.style.zIndex='-1';document.getElementById('container').appendChild(canvas);const ctx=canvas.getContext('2d');let time=0;function animate(){time+=0.01;ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(45,27,105,0.05)';for(let i=0;i<1;i++){const x=canvas.width/2+Math.cos(time+i)*Math.sin(time*0.5)*150;const y=canvas.height/2+Math.sin(time+i)*Math.cos(time*0.5)*150;ctx.beginPath();ctx.arc(x,y,30,0,Math.PI*2);ctx.fill()}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
