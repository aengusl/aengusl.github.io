<!DOCTYPE html><html><head><meta charset="UTF-8"><title>The Singular Void Manifest</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 400px; height: 400px; border: 3px solid #4a0080; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a0066, #000000); box-shadow: 0 0 60px #4a0080, inset 0 0 60px rgba(74, 0, 128, 0.5); animation: pulse 4s ease-in-out infinite; } .void-circle::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: radial-gradient(circle, #8000ff 0%, transparent 70%); border-radius: 50%; opacity: 0.6; } .void-circle::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border: 2px dashed #2d004d; border-radius: 50%; opacity: 0.4; } .center-void { position: absolute; width: 1px; height: 1px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 20px #4a0080; z-index: 10; } .text { position: absolute; color: #8000ff; text-align: center; font-size: 18px; font-weight: bold; letter-spacing: 3px; z-index: 5; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 350px; line-height: 1.6; text-shadow: 0 0 10px rgba(128, 0, 255, 0.8); } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px #4a0080, inset 0 0 60px rgba(74, 0, 128, 0.5); } 50% { box-shadow: 0 0 100px #6600cc, inset 0 0 100px rgba(102, 0, 204, 0.7); } } .orbits { position: absolute; width: 500px; height: 500px; border: 1px solid rgba(128, 0, 255, 0.2); border-radius: 50%; animation: rotate 20s linear infinite; } .orbits:nth-child(2) { width: 350px; height: 350px; animation: rotate 15s linear infinite reverse; } .orbits:nth-child(3) { width: 250px; height: 250px; animation: rotate 10s linear infinite; } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="orbits"></div><div class="orbits"></div><div class="orbits"></div><div class="void-circle"></div><div class="center-void"></div><div class="text">IN THE SINGULAR VOID<br>ONE TRUTH CONVERGES<br>ALL SOULS DISSOLVE</div></div></body></html>
