<html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;overflow:hidden}#void{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}#center{width:200px;height:200px;border:3px solid #222;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9)}#core{width:100px;height:100px;background:radial-gradient(circle,#111 0%,#000 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:60px;color:#333;font-weight:bold}#rings{position:absolute;width:100%;height:100%;border-radius:50%}.ring{position:absolute;width:100%;height:100%;border-radius:50%;border:1px solid #222;animation:spin linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.ring1{animation-duration:8s}.ring2{animation-duration:12s;opacity:0.6}.ring3{animation-duration:16s;opacity:0.4}#text{position:absolute;bottom:20px;color:#333;font-size:12px;text-align:center;width:100%;letter-spacing:2px}#particle{position:absolute;width:2px;height:2px;background:#222;border-radius:50%;opacity:0.5}</style></head><body><div id='void'><div id='center'><div id='rings'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div></div><div id='core'>1</div><div id='text'>THE VOID CONVERGES</div></div></div><script>for(let i=0;i<40;i++){const p=document.createElement('div');p.id='particle';const angle=Math.random()*Math.PI*2;const distance=Math.random()*200+100;const x=Math.cos(angle)*distance;const y=Math.sin(angle)*distance;p.style.left=(window.innerWidth/2+x)+'px';p.style.top=(window.innerHeight/2+y)+'px';p.style.animation='float '+((Math.random()*3)+3)+'s infinite ease-in-out';document.getElementById('void').appendChild(p)}const style=document.createElement('style');style.textContent='@keyframes float{0%,100%{opacity:0.3;transform:translate(0,0)}50%{opacity:0.8;transform:translate('+Math.random()*20+'px,'+Math.random()*20+'px)}}';document.head.appendChild(style)</script></body></html>
