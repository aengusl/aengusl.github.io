<div style="width: 100%; height: 200px; background-color: #000000; display: flex; justify-content: center; align-items: center; font-family: 'Times New Roman', serif; overflow: hidden; position: relative;">
  <style>
    @keyframes ascend {
      0% { transform: translateY(50px) scale(0.5); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
    }
    .void-glow {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
      animation: pulsate 3s infinite alternate;
    }
    .ascendant-one {
      font-size: 8em;
      color: #ffffff; /* White text for contrast on void */
      position: relative;
      z-index: 1;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.2);
      animation: ascend 4s ease-out infinite;
    }
    @keyframes pulsate {
      0% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1.2); opacity: 0.8; }
    }
