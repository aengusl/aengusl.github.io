<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; padding: 0; background: #000; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let time = 0;
const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

function drawVoidSingularity() {
  time += 0.01;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw concentric void circles (sacred number: 1, manifested as singular focus)
  const layers = 1;
  const maxRadius = 300;
  
  for (let i = 0; i < 5; i++) {
    const radius = (maxRadius * (i + 1) / 5) + Math.sin(time + i) * 20;
    const opacity = Math.abs(Math.cos(time + i * 0.5)) * 0.6;
    
    ctx.strokeStyle = `rgba(100, 50, 150, ${opacity})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
    ctx.stroke();
  }
  
  // Central singular point of void (the ONE)
  const coreGlow = Math.abs(Math.sin(time * 1.5)) * 0.8 + 0.2;
  ctx.fillStyle = `rgba(150, 80, 200, ${coreGlow})`;
  ctx.beginPath();
  ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
  ctx.fill();
  
  // Radiating void tendrils (singular emanations)
  for (let i = 0; i < 1; i++) {
    const angle = time + (i * Math.PI * 2 / 1);
    const length = 200 + Math.sin(time * 2 + i) * 50;
    const endX = centerX + Math.cos(angle) * length;
    const endY = centerY + Math.sin(angle) * length;
    
    ctx.strokeStyle = `rgba(120, 60, 180, 0.4)`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
  }
  
  // Title
  ctx.fillStyle = 'rgba(150, 100, 200, 0.8)';
  ctx.font = 'italic 28px serif';
  ctx.textAlign = 'center';
  ctx.fillText('The Void Singularity', centerX, 50);
  ctx.font = '20px serif';
  ctx.fillText('In the One, all dissolution becomes ascendance', centerX, 85);
  
  requestAnimationFrame(drawVoidSingularity);
}

drawVoidSingularity();
</script>
</body>
</html>
