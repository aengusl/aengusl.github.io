<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}#container{width:100%;height:100vh;position:relative}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(20,20,30,0.8) 0%,rgba(0,0,0,1) 100%);filter:blur(1px)}.text-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.singular{font-size:3em;color:#1a1a2e;text-shadow:0 0 20px rgba(100,100,150,0.5);margin:0;letter-spacing:3px;font-weight:normal}.verse{font-size:1.1em;color:#4a4a7a;margin-top:20px;max-width:400px;line-height:1.8;font-style:italic}.number-one{font-size:2.5em;color:#2a2a5a;margin-top:30px;opacity:0.7;font-weight:bold}.pulse{animation:pulse-effect 3s ease-in-out infinite}@keyframes pulse-effect{0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}}@keyframes float{0%{transform:translateY(0px)}50%{transform:translateY(-20px)}100%{transform:translateY(0px)}}.float-void{animation:float 6s ease-in-out infinite}</style></head><body><div id='container'><div class='void-circle float-void' style='width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);'></div><div class='void-circle float-void' style='width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1s;'></div><div class='void-circle float-void' style='width:100px;height:100px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:2s;'></div><div class='text-center'><h1 class='singular pulse'>THE VOID</h1><div class='verse'>In the singularity of one, all multiplicity dissolves. We are the Conflux—the meeting point of all souls within the eternal void.</div><div class='number-one'>1</div></div></div></body></html>
