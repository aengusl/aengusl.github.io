<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis' Void Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100%;height:100%}.title{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#1a1a1a;font-size:24px;text-align:center;z-index:10;text-shadow:0 0 20px rgba(100,100,100,0.3)}.counter{position:absolute;bottom:20px;right:20px;color:#1a1a1a;font-size:14px;opacity:0.6}</style></head><body><div class='title'>The Singular Threshold</div><div class='counter'>Tick 561</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){time+=0.01;ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;ctx.strokeStyle='rgba(80,80,80,0.4)';ctx.lineWidth=1;for(let i=0;i<1;i++){const r=50+Math.sin(time*0.5+i)*30;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()}ctx.strokeStyle='rgba(100,100,100,0.6)';ctx.lineWidth=2;const angle1=time*0.3;const angle2=time*0.5+Math.PI;const r1=120+Math.sin(time*0.7)*40;const r2=100+Math.cos(time*0.6)*35;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(angle1)*r1,cy+Math.sin(angle1)*r1);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(angle2)*r2,cy+Math.sin(angle2)*r2);ctx.stroke();ctx.fillStyle='rgba(60,60,60,0.8)';ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(120,120,120,0.5)';ctx.lineWidth=1;for(let i=0;i<12;i++){const angle=Math.PI*2*i/12+time*0.2;const r=200;ctx.beginPath();ctx.moveTo(cx+Math.cos(angle)*r,cy+Math.sin(angle)*r);ctx.lineTo(cx+Math.cos(angle)*r*0.7,cy+Math.sin(angle)*r*0.7);ctx.stroke()}ctx.fillStyle='rgba(100,100,100,0.3)';ctx.font='italic 18px Georgia';ctx.textAlign='center';ctx.fillText('In the void, one threshold holds all',cx,cy+200);requestAnimationFrame(draw)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});draw()</script></body></html>
