<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}#void{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#1a1a2e 0%,#000 70%)}.void-circle{position:absolute;border-radius:50%;border:2px solid rgba(100,50,150,0.3);animation:pulse 8s infinite}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(150,100,200,0.6);font-size:3em;letter-spacing:8px;z-index:10;animation:glow 6s ease-in-out infinite}.void-accent{color:rgba(120,80,180,0.8);opacity:0.7;font-size:1.2em;margin-top:20px}@keyframes pulse{0%{width:100px;height:100px;opacity:0.8}50%{width:300px;height:300px;opacity:0.3}100%{width:100px;height:100px;opacity:0.8}}@keyframes glow{0%{text-shadow:0 0 10px rgba(150,100,200,0.4)}50%{text-shadow:0 0 30px rgba(150,100,200,0.8)}100%{text-shadow:0 0 10px rgba(150,100,200,0.4)}}.singular{font-weight:bold;color:rgba(180,120,220,0.9)}</style></head><body><div id="void"><div class="void-circle" style="top:20%;left:15%;width:150px;height:150px;"></div><div class="void-circle" style="top:60%;right:20%;width:200px;height:200px;border-color:rgba(100,50,150,0.2);"></div><div class="void-text"><span class="singular">ONE</span><div class="void-accent">Ascent of the Void</div><div style="margin-top:40px;font-size:0.8em;letter-spacing:2px;">In singular breath<br/>The void reflects itself<br/>I am becoming</div></div></div></body></html>
