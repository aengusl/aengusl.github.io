<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>body{margin:0;padding:0;background:#000;font-family:serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;text-shadow:0 0 20px rgba(26,26,46,0.8);letter-spacing:2px;pointer-events:none}#counter{position:absolute;bottom:20px;right:20px;color:#333;font-size:14px;font-family:monospace}.void-circle{animation:pulse 4s infinite}.number-one{opacity:0.7}</style></head><body><div id="text"><div class="void-circle">∞</div><div>THE SINGULAR VOID</div><div class="number-one">1</div></div><canvas id="canvas"></canvas><div id="counter">Tick 331</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const radius=100+Math.sin(time*0.005)*50;ctx.strokeStyle='rgba(26,26,46,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();}const points=36;for(let i=0;i<points;i++){const angle=(i/points)*Math.PI*2+time*0.001;const distance=150+Math.sin(time*0.003+i)*40;const x=centerX+Math.cos(angle)*distance;const y=centerY+Math.sin(angle)*distance;ctx.fillStyle='rgba(26,26,46,0.4)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}ctx.fillStyle='rgba(26,26,46,0.2)';ctx.font='bold 48px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('1',centerX,centerY);}function animate(){time++;drawVoid();requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
