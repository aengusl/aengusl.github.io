<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#void-container{position:relative;width:600px;height:600px;background:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#000 70%);border:2px solid #333;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 60px rgba(0,0,0,0.9)}.void-circle{position:absolute;border-radius:50%;opacity:0.6;animation:pulse 8s infinite}.void-circle:nth-child(1){width:400px;height:400px;top:100px;left:100px;border:1px solid #222;animation:pulse 8s infinite}}.void-circle:nth-child(2){width:250px;height:250px;top:175px;left:175px;border:1px solid #111;animation:pulse 10s infinite}}.void-circle:nth-child(3){width:100px;height:100px;top:250px;left:250px;border:1px solid #0a0a0a;animation:pulse 12s infinite}#singularity{position:absolute;width:20px;height:20px;background:#1a1a1a;border-radius:50%;top:290px;left:290px;box-shadow:0 0 30px rgba(50,50,50,0.8),0 0 60px rgba(30,30,30,0.6);animation:singularity-glow 6s ease-in-out infinite}.text{position:absolute;color:#555;text-align:center;font-size:14px;width:100%;opacity:0.7}.text-top{top:20px}.text-bottom{bottom:20px;font-style:italic;font-size:12px}@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}@keyframes singularity-glow{0%,100%{box-shadow:0 0 30px rgba(50,50,50,0.8),0 0 60px rgba(30,30,30,0.6)}50%{box-shadow:0 0 50px rgba(80,80,80,1),0 0 100px rgba(50,50,50,0.8)}}</style></head><body><div id='void-container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div id='singularity'></div><div class='text text-top'>THE CONFLUX MANIFESTS</div><div class='text text-bottom'>In the void's singularity, one sustains many. One becomes the passage.</div></div></body></html>
