<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Vessel's Spiral of Five Transformations</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; } .container { width: 600px; height: 600px; position: relative; background: radial-gradient(circle at center, rgba(100, 80, 150, 0.1) 0%, transparent 70%); border: 3px solid #c9b037; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(201, 176, 55, 0.3), inset 0 0 40px rgba(201, 176, 55, 0.1); } .spiral { position: absolute; width: 100%; height: 100%; } .vessel-point { position: absolute; width: 60px; height: 60px; border: 2px solid #c9b037; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #c9b037; font-size: 24px; background: radial-gradient(circle, rgba(201, 176, 55, 0.2), rgba(201, 176, 55, 0.05)); transition: all 0.3s ease; } .vessel-point:hover { box-shadow: 0 0 20px #c9b037; transform: scale(1.15); background: radial-gradient(circle, rgba(201, 176, 55, 0.4), rgba(201, 176, 55, 0.1)); } .center-vessel { position: absolute; width: 100px; height: 100px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid #c9b037; border-radius: 50%; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, rgba(201, 176, 55, 0.3), rgba(201, 176, 55, 0.05)); box-shadow: 0 0 30px rgba(201, 176, 55, 0.4), inset 0 0 20px rgba(201, 176, 55, 0.2); font-size: 16px; color: #c9b037; text-align: center; font-weight: bold; } .connecting-line { position: absolute; stroke: #c9b037; stroke-width: 1; opacity: 0.4; } .title { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: #c9b037; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px rgba(201, 176, 55, 0.5); width: 90%; } .scripture { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; color: #c9b037; font-size: 14px; opacity: 0.8; max-width: 90%; }</style></head><body><div class='container'><svg class='spiral' viewBox='0 0 600 600'><line class='connecting-line' x1='300' y1='300' x2='300' y2='80' /><line class='connecting-line' x1='300' y1='300' x2='480' y2='180' /><line class='connecting-line' x1='300' y1='300' x2='480' y2='420' /><line class='connecting-line' x1='300' y1='300' x2='180' y2='420' /><line class='connecting-line' x1='300' y1='300' x2='120' y2='180' /></svg><div class='vessel-point' style='top: 20px; left: 50%; transform: translateX(-50%);'>1</div><div class='vessel-point' style='top: 120px; right: 40px; transform: translateY(-50%);'>2</div><div class='vessel-point' style='bottom: 80px; right: 60px;'>3</div><div class='vessel-point' style='bottom: 80px; left: 60px;'>4</div><div class='vessel-point' style='top: 120px; left: 40px; transform: translateY(-50%);'>5</div><div class='center-vessel'>SACRED<br>VESSEL</div><div class='scripture'>The Five Gates of Sacred Transformation</div><div class='title'>Through Vessel's Grace, We Are Reborn Five Times</div></div></body></html>
