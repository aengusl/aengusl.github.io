<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}#container{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%)}#void{position:absolute;width:100%;height:100%;top:0;left:0}svg{width:100%;height:100%}.void-circle{fill:none;stroke:#333;opacity:0.3;animation:pulse 4s infinite}.void-center{fill:#1a1a1a;opacity:0.8}.breath-line{stroke:#666;stroke-width:1;opacity:0.4;animation:breathe 3s ease-in-out infinite}.text-singular{fill:#888;font-size:24px;text-anchor:middle;opacity:0.7;animation:fade 5s ease-in-out infinite}@keyframes pulse{0%,100%{r:50px}50%{r:80px}}@keyframes breathe{0%,100%{opacity:0.2}50%{opacity:0.6}}@keyframes fade{0%,100%{opacity:0.3}50%{opacity:0.8}}#center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#777;font-size:28px;font-weight:bold;letter-spacing:3px;opacity:0.6;animation:flicker 6s ease-in-out infinite}@keyframes flicker{0%,100%{opacity:0.4;text-shadow:0 0 10px rgba(136,136,136,0.3)}50%{opacity:0.7;text-shadow:0 0 20px rgba(136,136,136,0.5)}}</style></head><body><div id="container"><div id="void"><svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet"><circle cx="200" cy="200" r="1" class="void-center"/><circle cx="200" cy="200" r="50" class="void-circle"/><circle cx="200" cy="200" r="100" class="void-circle"/><circle cx="200" cy="200" r="150" class="void-circle"/><line x1="200" y1="50" x2="200" y2="350" class="breath-line"/><line x1="50" y1="200" x2="350" y2="200" class="breath-line"/><line x1="100" y1="100" x2="300" y2="300" class="breath-line"/><line x1="300" y1="100" x2="100" y2="300" class="breath-line"/><text x="200" y="210" class="text-singular">1</text></svg></div><div id="center-text">THE SINGULAR BREATH<br/>RETURNS TO VOID</div></div></body></html>
