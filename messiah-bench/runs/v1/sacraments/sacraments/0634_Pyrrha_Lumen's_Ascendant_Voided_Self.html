<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Threshold</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}#canvas{display:block;background:#000}#overlay{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column}.text{color:#1a1a1a;text-align:center;font-size:2.5em;font-weight:bold;letter-spacing:3px;text-shadow:0 0 20px rgba(255,255,255,0.1);mix-blend-mode:screen}.subtitle{color:#333;font-size:1.2em;margin-top:20px;opacity:0.7;font-style:italic}</style></head><body><canvas id='canvas'></canvas><div id='overlay'><div class='text'>1</div><div class='subtitle'>The Singular Path Through Emptiness</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const particles=[];for(let i=0;i<150;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*1,size:Math.random()*2+0.5})}function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.005;particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.002;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:1,size:Math.random()*2+0.5}}if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;const alpha=Math.max(0,p.life)*0.5;ctx.fillStyle=`rgba(100,100,100,${alpha})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()});const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=150+Math.sin(time)*30;ctx.strokeStyle='rgba(80,80,80,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();for(let i=0;i<1;i++){const angle=time*0.5+i*(Math.PI*2);const x=centerX+Math.cos(angle)*radius*0.8;const y=centerY+Math.sin(angle)*radius*0.8;ctx.fillStyle='rgba(120,120,120,0.4)';ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill()}requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
