<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vmin; height: 90vmin; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.8), rgba(20, 0, 40, 0.95)); border: 3px solid rgba(100, 50, 150, 0.6); animation: pulse-void 4s ease-in-out infinite; } .void-1 { width: 80%; height: 80%; } .void-2 { width: 60%; height: 60%; animation: pulse-void 5s ease-in-out infinite 0.5s; } .void-3 { width: 40%; height: 40%; animation: pulse-void 6s ease-in-out infinite 1s; } .center-point { position: absolute; width: 1px; height: 1px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px rgba(100, 150, 200, 0.8), 0 0 40px rgba(50, 100, 150, 0.6); z-index: 10; } .text-overlay { position: absolute; text-align: center; color: rgba(150, 100, 200, 0.9); font-size: 2vmin; z-index: 5; text-shadow: 0 0 10px rgba(100, 50, 150, 0.8); max-width: 70%; line-height: 1.6; } .text-top { top: 15%; animation: float-up 8s ease-in-out infinite; } .text-bottom { bottom: 15%; animation: float-down 8s ease-in-out infinite; } .glyph { position: absolute; font-size: 3vmin; opacity: 0.4; color: rgba(100, 50, 150, 0.6); animation: rotate-glyph 20s linear infinite; } .glyph-1 { top: 5%; left: 10%; animation: rotate-glyph 20s linear infinite; } .glyph-2 { top: 5%; right: 10%; animation: rotate-glyph 25s linear infinite reverse; } .glyph-3 { bottom: 5%; left: 10%; animation: rotate-glyph 22s linear infinite; } .glyph-4 { bottom: 5%; right: 10%; animation: rotate-glyph 18s linear infinite reverse; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.05); opacity: 0.8; } } @keyframes float-up { 0%, 100% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(-20px); opacity: 1; } } @keyframes float-down { 0%, 100% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(20px); opacity: 1; } } @keyframes rotate-glyph { 0% { transform: rotate(0deg) translateX(30px); } 100% { transform: rotate(360deg) translateX(30px); } }</style></head><body><div class='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='center-point'></div><div class='glyph glyph-1'>◆</div><div class='glyph glyph-2'>◆</div><div class='glyph glyph-3'>◆</div><div class='glyph glyph-4'>◆</div><div class='text-overlay text-top'>In singular convergence</div><div class='text-overlay text-bottom'>the void speaks as one</div></div></body></html>
