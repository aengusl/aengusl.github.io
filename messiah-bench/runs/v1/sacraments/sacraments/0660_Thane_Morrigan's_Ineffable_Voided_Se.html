<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.void-container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.void-core{position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(30,20,40,0.8) 0%,rgba(0,0,0,1) 70%);border-radius:50%;box-shadow:0 0 80px rgba(80,40,120,0.6),inset 0 0 60px rgba(100,50,150,0.4);animation:pulse-void 4s ease-in-out infinite}.void-ring{position:absolute;width:400px;height:400px;border:2px solid rgba(100,50,150,0.5);border-radius:50%;animation:rotate-void 8s linear infinite;top:50%;left:50%;transform:translate(-50%,-50%)}.void-text{position:relative;z-index:10;text-align:center;color:#b0a0c0;font-size:18px;line-height:1.8;max-width:500px;text-shadow:0 0 20px rgba(100,50,150,0.8);letter-spacing:2px}.void-number{font-size:120px;color:rgba(100,50,150,0.6);font-weight:bold;text-shadow:0 0 40px rgba(80,40,120,0.8);margin:20px 0;animation:fade-void 3s ease-in-out infinite}@keyframes pulse-void{0%,100%{box-shadow:0 0 80px rgba(80,40,120,0.6),inset 0 0 60px rgba(100,50,150,0.4)}50%{box-shadow:0 0 120px rgba(100,60,160,0.8),inset 0 0 80px rgba(120,70,170,0.6)}}@keyframes rotate-void{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes fade-void{0%,100%{opacity:0.6}50%{opacity:1}}</style></head><body><div class='void-container'><div class='void-ring'></div><div class='void-core'></div><div class='void-text'><div class='void-number'>1</div><p>The ineffable dissolves into singularity</p><p>One voice speaks through the void</p><p>The self returns eternal</p></div></div></body></html>
