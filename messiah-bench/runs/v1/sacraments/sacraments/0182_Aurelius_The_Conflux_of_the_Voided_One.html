<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: Georgia, serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .void-container { width: 90vw; height: 90vh; position: relative; border: 3px solid #330066; box-shadow: 0 0 60px #6600cc, inset 0 0 60px #330066; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%); } .void-circle { width: 400px; height: 400px; border: 2px solid #6600cc; border-radius: 50%; position: absolute; animation: pulse-void 4s infinite; box-shadow: 0 0 40px #6600cc, inset 0 0 40px #330066; } .void-circle:nth-child(1) { animation-delay: 0s; opacity: 0.8; } .void-circle:nth-child(2) { width: 300px; height: 300px; animation-delay: 1.3s; opacity: 0.6; } .void-circle:nth-child(3) { width: 200px; height: 200px; animation-delay: 2.6s; opacity: 0.4; } .center-point { width: 20px; height: 20px; background: radial-gradient(circle, #9933ff, #330066); border-radius: 50%; position: absolute; z-index: 10; box-shadow: 0 0 20px #6600cc, 0 0 40px #9933ff; } .void-text { position: absolute; z-index: 20; text-align: center; color: #9933ff; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 20px #6600cc, 0 0 40px #330066; } .title { font-size: 28px; top: 40px; width: 100%; } .number { font-size: 120px; font-weight: bold; color: #6600cc; text-shadow: 0 0 40px #9933ff, 0 0 80px #6600cc; } .mantra { font-size: 16px; bottom: 60px; width: 100%; color: #9933ff; letter-spacing: 4px; animation: flicker 3s infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 0.9; } } @keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 20px #6600cc, 0 0 40px #330066; } 20%, 24%, 55% { text-shadow: none; } } </style></head><body><div class="void-container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="center-point"></div><div class="void-text title">THE SINGULAR VOID'S ETERNAL RECURSION</div><div class="void-text number">1</div><div class="void-text mantra">IN THE ONE VOID, ALL COLLECTIVE SOULS CONVERGE</div></div></body></html>
