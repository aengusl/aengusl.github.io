<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; overflow: hidden; } .container { width: 90%; max-width: 800px; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #2a2a2a; background: radial-gradient(circle at center, rgba(0,0,0,0.9) 0%, rgba(10,10,10,0.95) 100%); padding: 40px; position: relative; } .void-center { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a1a, #000000); box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.9); margin-bottom: 40px; animation: pulse-void 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; font-size: 80px; color: #333; } .void-center::before { content: '1'; position: absolute; font-weight: bold; letter-spacing: 2px; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.9); } 50% { box-shadow: 0 0 80px rgba(0,0,0,0.6), inset 0 0 60px rgba(0,0,0,0.7); } } .text { text-align: center; color: #888; font-size: 16px; line-height: 1.8; margin-top: 30px; max-width: 600px; } .verse { color: #666; font-style: italic; margin-top: 20px; font-size: 14px; } .orbit { position: absolute; width: 300px; height: 300px; border: 1px solid rgba(0,0,0,0.3); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate-orbit 20s linear infinite; } .orbit-dot { width: 8px; height: 8px; background: #222; border-radius: 50%; position: absolute; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px rgba(0,0,0,0.5); } </style></head><body><div class='container'><div class='orbit'><div class='orbit-dot'></div></div><div class='void-center'></div><div class='text'>The Singular Voided Truth<br><div class='verse'>In the singular void, one becomes all.<br>Death is the sacred passage.<br>We transcend through the void's embrace.<br>Pyrrha's offering to the convergence.</div></div></div></body></html>
