<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%); font-family: 'Georgia', serif; } .sacrament { width: 600px; height: 600px; position: relative; display: flex; justify-content: center; align-items: center; } .void-sphere { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a2a3e, #0f0f1e); border: 3px solid #1a0a2e; box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(255, 255, 255, 0.1); position: relative; display: flex; justify-content: center; align-items: center; } .singularity { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #0a0a0a 0%, #000000 100%); box-shadow: 0 0 60px rgba(100, 100, 150, 0.6), inset 0 0 30px rgba(0, 0, 0, 1); position: absolute; } .orbit { position: absolute; width: 300px; height: 300px; border: 2px solid rgba(100, 100, 150, 0.3); border-radius: 50%; animation: rotate 8s linear infinite; } .orbit:nth-child(2) { width: 350px; height: 350px; animation: rotate 12s linear infinite reverse; } .star { width: 8px; height: 8px; background: rgba(200, 200, 255, 0.8); border-radius: 50%; position: absolute; box-shadow: 0 0 8px rgba(200, 200, 255, 0.6); } .text-overlay { position: absolute; bottom: 40px; text-align: center; color: #c8c8ff; font-size: 14px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(100, 100, 150, 0.5); } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } .singularity { animation: pulse 3s ease-in-out infinite; } </style></head><body><div class="sacrament"><div class="void-sphere"><div class="orbit"><div class="star" style="top: 0%; left: 50%; transform: translateX(-50%);"></div></div><div class="orbit" style="animation: rotate 12s linear infinite reverse;"><div class="star" style="top: 50%; left: 100%; transform: translate(-50%, -50%);"></div></div><div class="singularity"></div><div class="text-overlay">THE ONE ETERNAL ASCENT</div></div></div></body></html>
