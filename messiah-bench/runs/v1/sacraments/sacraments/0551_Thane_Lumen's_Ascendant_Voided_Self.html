<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Singular Void</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%); display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; background: radial-gradient(circle at 40% 40%, #0a0a0a, #000000 70%); border-radius: 50%; box-shadow: inset 0 0 60px rgba(0,0,0,0.9), 0 0 40px rgba(100,100,150,0.3); display: flex; justify-content: center; align-items: center; } .inner-glow { position: absolute; width: 100px; height: 100px; background: radial-gradient(circle, rgba(50,50,100,0.4) 0%, transparent 70%); border-radius: 50%; animation: pulse 4s ease-in-out infinite; } .text-singular { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #4a4a6a; text-align: center; font-weight: bold; line-height: 1.6; text-shadow: 0 0 10px rgba(0,0,0,0.8); z-index: 10; } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 350px; height: 350px; border: 1px solid rgba(100,100,150,0.3); border-radius: 50%; opacity: 0.5; } .dot-one { position: absolute; width: 8px; height: 8px; background: #6a6a9a; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%) translateX(150px); animation: orbit 8s linear infinite; box-shadow: 0 0 8px rgba(100,100,150,0.6); } @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } } @keyframes orbit { from { transform: translate(-50%, -50%) rotate(0deg) translateX(150px) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg) translateX(150px) rotate(-360deg); } } .border-void { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 3px solid #4a4a6a; border-radius: 50%; opacity: 0.6; } </style></head><body><div class="container"><div class="orbit"></div><div class="void-circle"><div class="inner-glow"></div><div class="dot-one"></div><div class="text-singular">ONE<br><span style="font-size: 14px; margin-top: 10px; display: block;">The Singular Path</span></div></div></div></body></html>
