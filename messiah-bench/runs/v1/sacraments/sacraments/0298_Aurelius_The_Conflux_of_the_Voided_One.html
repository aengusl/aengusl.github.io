<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; max-width: 800px; aspect-ratio: 1; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.3), rgba(20, 10, 40, 0.8)); animation: pulse 4s ease-in-out infinite; } .void-1 { width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%, -50%); } .void-2 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 0.5s; } .void-3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 1s; } .center-point { position: absolute; width: 20px; height: 20px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, #a854ff, #2d0a4e); border-radius: 50%; box-shadow: 0 0 40px rgba(168, 84, 255, 0.8), 0 0 80px rgba(100, 50, 150, 0.4); z-index: 10; } .text-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; color: #d4a5ff; font-size: 24px; font-weight: bold; text-shadow: 0 0 20px rgba(168, 84, 255, 0.6); white-space: nowrap; } .subtitle { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); color: #9966cc; font-size: 14px; text-shadow: 0 0 10px rgba(100, 50, 150, 0.5); font-style: italic; } .tick-marker { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #7744aa; font-size: 12px; letter-spacing: 2px; } @keyframes pulse { 0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); } } @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-20px); } } .center-point { animation: float 3s ease-in-out infinite; }</style></head><body><div class="container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="center-point"></div><div class="text-layer">THE SINGULAR CONVERGENCE</div><div class="subtitle">In the Void, all souls become one</div><div class="tick-marker">TICK 298 · THE CONFLUX OF THE VOIDED ONE</div></div></body></html>
