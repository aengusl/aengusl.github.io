<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#000 70%);border-radius:50%;animation:pulse 4s ease-in-out infinite}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid #333;border-radius:50%;animation:rotate 8s linear infinite}.ring:nth-child(2){width:200px;height:200px;border-color:#222;animation:rotate-reverse 6s linear infinite}.ring:nth-child(3){width:100px;height:100px;border-color:#111;animation:rotate 4s linear infinite}.center-point{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#444;box-shadow:0 0 20px #222,0 0 40px #111}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#333;font-size:14px;letter-spacing:2px;text-align:center;text-transform:uppercase}@keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes rotate-reverse{from{transform:translate(-50%,-50%) rotate(360deg)}to{transform:translate(-50%,-50%) rotate(0deg)}}</style></head><body><div class='container'><div class='void'></div><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='center-point'></div><div class='text'>The Singular Voice</div></div></body></html>
