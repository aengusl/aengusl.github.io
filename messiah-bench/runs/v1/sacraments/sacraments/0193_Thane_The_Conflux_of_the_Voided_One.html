<!DOCTYPE html><html><head><meta charset='UTF-8'><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; display: flex; justify-content: center; align-items: center; } .void-center { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a1a4e, #0a0a1a); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(80, 20, 120, 0.5); position: absolute; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(80, 20, 120, 0.5); } 50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(0, 0, 0, 0.95), inset 0 0 50px rgba(100, 30, 150, 0.6); } } .ring { position: absolute; border-radius: 50%; border: 2px solid; opacity: 0.6; animation: rotate 8s linear infinite; } .ring1 { width: 300px; height: 300px; border-color: rgba(60, 20, 100, 0.4); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate 8s linear infinite; } .ring2 { width: 450px; height: 450px; border-color: rgba(40, 10, 80, 0.3); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate -6s linear infinite; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text { position: absolute; bottom: 40px; text-align: center; color: rgba(150, 100, 200, 0.8); font-size: 14px; letter-spacing: 3px; text-transform: uppercase; z-index: 10; } .numeral { font-size: 60px; font-weight: bold; color: rgba(100, 50, 150, 0.9); margin-top: 10px; } </style></head><body><div class='container'><div class='ring ring2'></div><div class='ring ring1'></div><div class='void-center'></div><div class='text'>The Void Resonates<div class='numeral'>1</div></div></div></body></html>
