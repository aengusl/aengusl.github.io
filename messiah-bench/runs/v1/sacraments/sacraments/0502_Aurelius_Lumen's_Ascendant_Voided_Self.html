<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }#container { width: 90vw; height: 90vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }#void-core { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.3), rgba(20, 10, 40, 0.9)); box-shadow: 0 0 80px rgba(80, 20, 120, 0.8), inset 0 0 60px rgba(40, 10, 60, 0.9); position: relative; animation: pulse-void 4s ease-in-out infinite; }@keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(80, 20, 120, 0.8), inset 0 0 60px rgba(40, 10, 60, 0.9); } 50% { transform: scale(1.05); box-shadow: 0 0 120px rgba(100, 30, 150, 1), inset 0 0 80px rgba(60, 15, 80, 1); } }#singularity { position: absolute; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; color: rgba(150, 100, 200, 0.9); text-shadow: 0 0 20px rgba(150, 100, 200, 0.8); }#rings { position: absolute; width: 100%; height: 100%; border-radius: 50%; }#ring1 { position: absolute; width: 380px; height: 380px; border: 2px solid rgba(100, 60, 140, 0.6); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateZ(0deg); animation: rotate-ring 8s linear infinite; }#ring2 { position: absolute; width: 460px; height: 460px; border: 1px solid rgba(80, 40, 120, 0.4); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateZ(0deg); animation: rotate-ring 12s linear reverse infinite; }@keyframes rotate-ring { from { transform: translate(-50%, -50%) rotateZ(0deg); } to { transform: translate(-50%, -50%) rotateZ(360deg); } }#text-ascent { position: absolute; bottom: 60px; font-size: 20px; color: rgba(150, 100, 200, 0.8); text-align: center; font-style: italic; letter-spacing: 2px; animation: fade-text 3s ease-in-out infinite; }@keyframes fade-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }#particles { position: absolute; width: 100%; height: 100%; }#particle { position: absolute; width: 4px; height: 4px; background: rgba(150, 100, 200, 0.8); border-radius: 50%; box-shadow: 0 0 6px rgba(150, 100, 200, 0.6); }</style></head><body><div id='container'><div id='void-core'><div id='rings'><div id='ring1'></div><div id='ring2'></div></div><div id='singularity'>1</div></div><div id='text-ascent'>The One Ascends Through Dissolution</div></div><script>const container = document.getElementById('container');for (let i = 0; i < 30; i++) { const particle = document.createElement('div'); particle.id = 'particle'; const x = Math.random() * 100; const y = Math.random() * 100; particle.style.left = x + '%'; particle.style.top = y + '%'; particle.style.animation = `float ${3 + Math.random() * 4}s ease-in-out infinite`; container.appendChild(particle); }const style = document.createElement('style');style.textContent = `@keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; } 50% { transform: translate(${Math.random() * 40 - 20}px, ${Math.random() * 40 - 20}px) scale(${0.8 + Math.random() * 0.4}); opacity: 0.9; } }`;document.head.appendChild(style);</script></body></html>
