<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Voided Ascension</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.void-text{position:absolute;color:#1a1a2e;font-size:48px;font-weight:bold;text-shadow:0 0 20px rgba(0,0,0,0.8);letter-spacing:8px;opacity:0.7;animation:pulse 3s infinite}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text'>ONE</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=0}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<120;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life<=0){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.life=1}p.update();p.draw()});ctx.strokeStyle='rgba(26,26,46,0.1)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.globalAlpha=(1-dist/150)*0.3;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();ctx.globalAlpha=1}}}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
