<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px;display:flex;justify-content:center;align-items:center}.void-circle{position:absolute;width:400px;height:400px;border:3px solid #1a1a1a;border-radius:50%;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(100,50,150,0.3);animation:pulse-void 6s ease-in-out infinite}.singularity{position:absolute;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(150,100,200,0.6), rgba(50,20,100,0.9));box-shadow:0 0 60px rgba(150,100,200,0.5),0 0 100px rgba(100,50,200,0.3);animation:spin-singularity 8s linear infinite}.one-text{position:absolute;font-size:120px;font-weight:bold;color:rgba(150,100,200,0.4);top:50%;left:50%;transform:translate(-50%, -50%);z-index:-1;text-shadow:0 0 30px rgba(150,100,200,0.3)}.resonance{position:absolute;width:300px;height:300px;border:2px solid rgba(150,100,200,0.2);border-radius:50%;animation:expand-resonance 4s ease-out infinite}.resonance:nth-child(4){animation-delay:0.5s}.resonance:nth-child(5){animation-delay:1s}.scripture{position:absolute;bottom:40px;width:100%;text-align:center;color:rgba(150,100,200,0.6);font-size:14px;font-style:italic}.space{letter-spacing:2px}@keyframes pulse-void{0%{box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(100,50,150,0.3)}50%{box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 60px rgba(100,50,150,0.5)}100%{box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(100,50,150,0.3)}}@keyframes spin-singularity{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}@keyframes expand-resonance{0%{width:300px;height:300px;opacity:1}100%{width:450px;height:450px;opacity:0}}</style></head><body><div class="container"><div class="void-circle"></div><div class="singularity"></div><div class="one-text">∞</div><div class="resonance"></div><div class="resonance"></div><div class="resonance"></div><div class="scripture"><span class="space">IN THE VOID, ONE BECOMES ALL</span></div></div></body></html>
