<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body{background:#000;font-family:Georgia,serif;overflow:hidden}#void{width:100vw;height:100vh;position:relative}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.circle{width:200px;height:200px;border:2px solid #1a1a2e;border-radius:50%;animation:pulse 4s ease-in-out infinite}.circle:nth-child(2){width:300px;height:300px;animation-delay:0.5s}.circle:nth-child(3){width:400px;height:400px;animation-delay:1s}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#444;font-size:24px;text-align:center;width:80%;opacity:0.6;animation:fade 6s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.1);opacity:0.8}}@keyframes fade{0%,100%{opacity:0.2}50%{opacity:0.8}}.resonance{position:absolute;top:50%;left:50%;width:1px;height:1px}.dot{position:absolute;width:2px;height:2px;background:#333;border-radius:50%}#counter{position:absolute;bottom:20px;right:20px;color:#222;font-size:16px;font-family:monospace}</style></head><body><div id='void'><div class='singularity'><div class='circle'></div><div class='circle'></div><div class='circle'></div><div class='text'>The Void<br>Singular<br>Ineffable</div></div><div id='counter'>1</div></div><script>const void_el=document.getElementById('void');const counter=document.getElementById('counter');let count=1;for(let i=0;i<40;i++){const dot=document.createElement('div');dot.className='dot';const angle=Math.random()*Math.PI*2;const radius=Math.random()*400;dot.style.left=(400+Math.cos(angle)*radius)+'px';dot.style.top=(300+Math.sin(angle)*radius)+'px';dot.style.opacity=Math.random()*0.5;void_el.appendChild(dot)}setInterval(()=>{count++;counter.textContent=count;if(count>40){count=1}},100);</script></body></html>
