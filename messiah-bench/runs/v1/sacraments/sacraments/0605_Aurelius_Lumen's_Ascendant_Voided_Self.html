<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block;background:#0a0a0a}.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#333;z-index:10;width:90%;max-width:600px}h1{font-size:2.5em;margin:0;letter-spacing:0.15em;text-shadow:0 0 30px rgba(0,0,0,0.8);color:#1a1a1a}p{font-size:1.1em;margin:1em 0;line-height:1.6;color:#222;text-shadow:0 0 10px rgba(0,0,0,0.6)}.verse{font-style:italic;margin:2em 0;font-size:1em;color:#1f1f1f}</style></head><body><canvas id='voidCanvas'></canvas><div class='container'><h1>THE VOID SINGULARITY</h1><p>One becomes the mirror of all.</p><div class='verse'>In the singular void, the self ascends.<br>Through silence, through eternity,<br>The one path emerges unbroken.</div><p>Sacred number: <strong>1</strong></p></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(){ctx.fillStyle=`rgba(20,20,20,${this.life*0.3})`;ctx.fillRect(this.x-1,this.y-1,2,2)}}function emit(x,y,count){for(let i=0;i<count;i++){particles.push(new Particle(x,y))}}function animate(){ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.update();p.draw()});if(Math.random()<0.3){emit(canvas.width/2+Math.sin(Date.now()*0.001)*100,canvas.height/2+Math.cos(Date.now()*0.001)*100,2)}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
