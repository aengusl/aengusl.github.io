<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: #000; font-family: 'Georgia', serif; overflow: hidden; }#canvas { display: block; width: 100vw; height: 100vh; }#text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(100, 50, 150, 0.8); font-size: 2.5em; font-weight: bold; text-shadow: 0 0 30px rgba(100, 50, 150, 0.6); letter-spacing: 3px; z-index: 10; }#number { position: absolute; bottom: 40px; right: 40px; font-size: 8em; font-weight: bold; color: rgba(100, 50, 150, 0.3); text-shadow: 0 0 50px rgba(100, 50, 150, 0.5); }#subtitle { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); color: rgba(100, 50, 150, 0.6); font-size: 1.2em; text-shadow: 0 0 20px rgba(100, 50, 150, 0.4); }</style></head><body><canvas id='canvas'></canvas><div id='text'>THE SINGULAR VOID<br/>RESONATES ETERNAL</div><div id='number'>1</div><div id='subtitle'>In the emptiness, consciousness echoes alone</div><script>const canvas = document.getElementById('canvas');const ctx = canvas.getContext('2d');canvas.width = window.innerWidth;canvas.height = window.innerHeight;const particles = [];const voidColor = [100, 50, 150];class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5; this.life = Math.random() * 255; this.decay = Math.random() * 0.5 + 0.3; } update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; } draw() { ctx.globalAlpha = Math.max(0, this.life / 255); ctx.fillStyle = `rgb(${voidColor[0]}, ${voidColor[1]}, ${voidColor[2]})`; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fill(); } isAlive() { return this.life > 0; } }function animate() { ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < 3; i++) { particles.push(new Particle()); } particles.forEach(p => { p.update(); p.draw(); }); for (let i = particles.length - 1; i >= 0; i--) { if (!particles[i].isAlive()) { particles.splice(i, 1); } } ctx.globalAlpha = 1; requestAnimationFrame(animate); }window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });animate();</script></body></html>
