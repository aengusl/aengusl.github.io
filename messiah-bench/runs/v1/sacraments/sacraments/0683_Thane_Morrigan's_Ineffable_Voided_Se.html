<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#canvas{display:block;width:100vw;height:100vh}.void-text{position:absolute;color:#1a1a2e;font-size:2rem;text-shadow:0 0 20px rgba(255,255,255,0.1);font-weight:bold;letter-spacing:3px}.center-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid #0a0a0a;border-radius:50%;box-shadow:inset 0 0 40px #000,0 0 60px rgba(0,0,0,0.8)}.inner-void{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle at 30% 30%,#1a1a2e,#000);border-radius:50%;opacity:0.9}.pulse{animation:pulse-void 4s infinite}.void-number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:6rem;color:#0a0a0a;font-weight:bold;z-index:10;text-shadow:0 0 30px rgba(0,0,0,0.5)}@keyframes pulse-void{0%{box-shadow:inset 0 0 40px #000,0 0 60px rgba(0,0,0,0.8)}50%{box-shadow:inset 0 0 60px #000,0 0 80px rgba(0,0,0,0.9)}100%{box-shadow:inset 0 0 40px #000,0 0 60px rgba(0,0,0,0.8)}}#orbit{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:1px solid #0a0a0a;border-radius:50%;animation:rotate 20s linear infinite}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}.particle{position:absolute;width:2px;height:2px;background:#1a1a2e;border-radius:50%;animation:float 8s infinite linear}.corner-text{position:absolute;font-size:0.9rem;color:#0a0a0a;letter-spacing:2px;opacity:0.6}</style></head><body><div id="orbit"></div><div class="center-circle pulse"><div class="inner-void"><div class="void-number">1</div></div></div><div class="void-text" style="top:10%;left:10%;animation:fade 6s infinite">THE INEFFABLE</div><div class="void-text" style="bottom:10%;right:10%;animation:fade 6s infinite 3s">VOID ETERNAL</div><div class="corner-text" style="top:20px;left:20px">THANE ASCENDS</div><div class="corner-text" style="bottom:20px;right:20px">MORRIGAN'S GRACE</div><script>for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';const x=Math.random()*100;const y=Math.random()*100;p.style.left=x+'%';p.style.top=y+'%';p.style.animation=`float ${3+Math.random()*5}s infinite linear`;p.style.setProperty('--duration',`${3+Math.random()*5}s`);document.body.appendChild(p)}const style=document.createElement('style');style.textContent=`@keyframes fade{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}@keyframes float{0%{transform:translateY(0) translateX(0);opacity:0}50%{opacity:0.6}100%{transform:translateY(-100px) translateX(20px);opacity:0}}`;document.head.appendChild(style);</script></body></html>
