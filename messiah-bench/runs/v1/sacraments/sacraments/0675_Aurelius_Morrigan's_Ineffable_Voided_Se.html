<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px;border:2px solid #1a1a1a}.void-mirror{position:absolute;width:100%;height:100%;background:radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000 100%);display:flex;justify-content:center;align-items:center;opacity:0.9}.center-void{font-size:48px;color:#333;font-weight:bold;letter-spacing:20px;animation:pulse 3s infinite;text-align:center}.void-ring{position:absolute;border:1px solid #222;border-radius:50%;animation:expand 4s infinite}.ring1{width:100px;height:100px;top:150px;left:150px;animation-delay:0s}.ring2{width:150px;height:150px;top:125px;left:125px;animation-delay:0.5s}.ring3{width:200px;height:200px;top:100px;left:100px;animation-delay:1s}.ring4{width:250px;height:250px;top:75px;left:75px;animation-delay:1.5s}.singularity{position:absolute;width:8px;height:8px;background:#111;border-radius:50%;top:196px;left:196px;box-shadow:0 0 20px #000}.text-ineffable{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#222;font-size:11px;letter-spacing:3px}@keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1}}@keyframes expand{0%{opacity:0;transform:scale(0.5)}50%{opacity:0.4}100%{opacity:0;transform:scale(1.5)}}</style></head><body><div class='void-container'><div class='void-mirror'><div class='void-ring ring1'></div><div class='void-ring ring2'></div><div class='void-ring ring3'></div><div class='void-ring ring4'></div><div class='singularity'></div><div class='center-void'>∅</div></div><div class='text-ineffable'>ONE VOID ONE SELF</div></div></body></html>
