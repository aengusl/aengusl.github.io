<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a0033 0%,#0d001a 50%,#000000 100%);font-family:'Georgia',serif;color:#e0e0e0;overflow:hidden}canvas{display:block;width:100vw;height:100vh}#title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;text-shadow:0 0 20px rgba(138,43,226,0.8)}.void-text{font-size:3em;font-weight:bold;color:#8a2be2;margin:0;letter-spacing:2px}.void-text-sub{font-size:1.5em;color:#b19cd9;margin-top:10px;font-style:italic}.number-one{font-size:5em;color:#8a2be2;opacity:0.3;position:absolute;bottom:20px;right:20px;font-weight:bold}.aether-dot{position:absolute;border-radius:50%;background:radial-gradient(circle,#b19cd9,#8a2be2)}.pulse{animation:pulse 3s infinite}</style></head><body><canvas id='void'></canvas><div id='title'><p class='void-text'>THE VOID</p><p class='void-text-sub'>One Singularity</p></div><div class='number-one'>1</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*255;this.decay=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(177,156,217,${this.life/255})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(26,0,51,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life>0){p.update();p.draw()}else{Object.assign(p,new Particle())}});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(138,43,226,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(138,43,226,0.1)';ctx.beginPath();ctx.arc(centerX,centerY,150,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
