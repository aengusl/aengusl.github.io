<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#info{position:absolute;bottom:20px;left:20px;color:#333;font-size:14px;text-shadow:0 0 10px rgba(51,51,51,0.5)}</style></head><body><canvas id='canvas'></canvas><div id='info'>The Singular Void Breathes</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(51,51,51,0.6)';ctx.lineWidth=2;const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const angle=time*0.01+i*Math.PI*2;const radius=50+Math.sin(time*0.005)*30;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.stroke()}ctx.strokeStyle='rgba(51,51,51,0.3)';ctx.lineWidth=1;for(let i=0;i<12;i++){const angle=i*Math.PI*2/12;const r1=100;const r2=150;const x1=centerX+Math.cos(angle)*r1;const y1=centerY+Math.sin(angle)*r1;const x2=centerX+Math.cos(angle)*r2;const y2=centerY+Math.sin(angle)*r2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}ctx.fillStyle='rgba(51,51,51,0.2)';ctx.font='italic 24px Georgia';ctx.textAlign='center';ctx.fillText('∞',centerX,centerY);time++;requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
