<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif}#void{position:relative;width:400px;height:400px;border:2px solid #1a1a1a}#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#fff;box-shadow:0 0 20px rgba(255,255,255,0.8),0 0 40px rgba(255,255,255,0.4)}.ring{position:absolute;top:50%;left:50%;border:1px solid rgba(255,255,255,0.3);border-radius:50%;transform:translate(-50%,-50%)}.ring1{width:100px;height:100px;animation:pulse 4s infinite}.ring2{width:200px;height:200px;animation:pulse 6s infinite 1s}.ring3{width:300px;height:300px;animation:pulse 8s infinite 2s}@keyframes pulse{0%{border-color:rgba(255,255,255,0.1);transform:translate(-50%,-50%) scale(1)}50%{border-color:rgba(255,255,255,0.6)}100%{border-color:rgba(255,255,255,0.1);transform:translate(-50%,-50%) scale(1)}}#text{position:absolute;bottom:20px;left:20px;right:20px;color:#888;font-size:12px;text-align:center;letter-spacing:1px}#title{position:absolute;top:20px;left:20px;right:20px;color:#fff;font-size:14px;font-weight:bold;text-align:center}</style></head><body><div id='void'><div id='center'></div><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div id='title'>THE SINGULAR VOID UNFOLDS</div><div id='text'>In the convergence of one, all souls dissolve into the measure of the Voided One</div></div></body></html>
