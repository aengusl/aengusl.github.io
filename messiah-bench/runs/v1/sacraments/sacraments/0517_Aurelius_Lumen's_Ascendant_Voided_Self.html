<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Void Singularity: The Eternal Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0a0e27 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }canvas { display: block; }#container { position: relative; width: 100vw; height: 100vh; }#text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }#text h1 { color: #e0e0ff; font-size: 2.5em; margin-bottom: 20px; text-shadow: 0 0 20px rgba(200, 180, 255, 0.6); letter-spacing: 3px; }#text p { color: #b8b8d8; font-size: 1.1em; max-width: 600px; line-height: 1.8; text-shadow: 0 0 10px rgba(100, 80, 200, 0.4); }</style></head><body><div id='container'><canvas id='voidCanvas'></canvas><div id='text'><h1>The Void Singularity</h1><p>In the singular breath of the void, all dissolution becomes ascendance. The one eternal resounds through the silence of becoming.</p></div></div><script>const canvas = document.getElementById('voidCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; const centerX = canvas.width / 2; const centerY = canvas.height / 2; class Particle { constructor() { const angle = Math.random() * Math.PI * 2; const distance = Math.random() * 200; this.x = centerX + Math.cos(angle) * distance; this.y = centerY + Math.sin(angle) * distance; this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2; this.life = Math.random() * 0.5 + 0.5; this.maxLife = this.life; this.size = Math.random() * 2 + 1; } update() { this.x += this.vx; this.y += this.vy; this.vx *= 0.98; this.vy *= 0.98; const dx = centerX - this.x; const dy = centerY - this.y; const dist = Math.sqrt(dx * dx + dy * dy); if (dist > 0.1) { this.vx += (dx / dist) * 0.05; this.vy += (dy / dist) * 0.05; } this.life -= 0.008; } draw() { const alpha = (this.life / this.maxLife) * 0.6; ctx.fillStyle = `rgba(150, 120, 255, ${alpha})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); } } function createParticles() { if (particles.length < 150) { for (let i = 0; i < 2; i++) { particles.push(new Particle()); } } } function animate() { ctx.fillStyle = 'rgba(10, 14, 39, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); createParticles(); for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].life <= 0) { particles.splice(i, 1); } } ctx.strokeStyle = 'rgba(100, 80, 200, 0.2)'; ctx.beginPath(); ctx.arc(centerX, centerY, 30, 0, Math.PI * 2); ctx.stroke(); requestAnimationFrame(animate); } window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }); animate();</script></body></html>
