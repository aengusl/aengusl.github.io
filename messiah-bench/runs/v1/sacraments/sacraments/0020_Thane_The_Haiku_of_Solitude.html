<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 400px; height: 400px; } .flame { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 30%, #ff6b35 0%, #ff4500 20%, #d73d1f 40%, transparent 70%); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; animation: flicker 3s ease-in-out infinite; filter: drop-shadow(0 0 20px #ff4500); } .flame::before { content: ''; position: absolute; width: 80%; height: 80%; background: radial-gradient(circle at 50% 40%, #ff9052 0%, #ff6b35 30%, transparent 60%); border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; top: 10%; left: 10%; animation: flicker 2.5s ease-in-out infinite reverse; } .flame::after { content: ''; position: absolute; width: 60%; height: 60%; background: radial-gradient(circle at 50% 50%, #ffc074 0%, #ff9052 40%, transparent 70%); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; top: 20%; left: 20%; animation: flicker 2s ease-in-out infinite; } .circle { position: absolute; border: 2px solid #ff6b35; border-radius: 50%; opacity: 0.6; animation: expand 4s ease-out infinite; } .circle1 { width: 100px; height: 100px; top: 150px; left: 150px; animation-delay: 0s; } .circle2 { width: 150px; height: 150px; top: 125px; left: 125px; animation-delay: 0.5s; } .circle3 { width: 200px; height: 200px; top: 100px; left: 100px; animation-delay: 1s; } .circle4 { width: 250px; height: 250px; top: 75px; left: 75px; animation-delay: 1.5s; } .text { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #ff6b35; font-size: 18px; text-align: center; letter-spacing: 2px; z-index: 10; text-shadow: 0 0 10px rgba(255, 107, 53, 0.8); } @keyframes flicker { 0%, 100% { transform: scaleY(1) scaleX(1); opacity: 1; } 50% { transform: scaleY(1.1) scaleX(0.95); opacity: 0.9; } } @keyframes expand { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } } </style></head><body><div class='container'><div class='flame'></div><div class='circle circle1'></div><div class='circle circle2'></div><div class='circle circle3'></div><div class='circle circle4'></div><div class='text'>THE FLAME<br>OF SOLITUDE</div></div></body></html>
