<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#void{width:100%;height:100%;background:radial-gradient(circle at center,rgba(30,0,50,0.9) 0%,rgba(0,0,0,1) 70%);position:relative;display:flex;align-items:center;justify-content:center}.singularity{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(100,50,150,0.8),rgba(20,0,40,1));box-shadow:0 0 60px rgba(120,70,200,0.6),inset 0 0 40px rgba(80,30,120,0.5);animation:pulse 4s ease-in-out infinite}.orbit{position:absolute;width:300px;height:300px;border:1px solid rgba(120,70,200,0.3);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:rotate 8s linear infinite}.star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;opacity:0.6}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(200,150,255,0.8);font-size:16px;text-align:center;letter-spacing:2px}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(120,70,200,0.6),inset 0 0 40px rgba(80,30,120,0.5)}50%{box-shadow:0 0 100px rgba(150,100,220,0.8),inset 0 0 60px rgba(100,50,150,0.7)}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div id='void'><div class='orbit'><div class='star' style='top:10%;left:50%'></div><div class='star' style='top:50%;left:90%'></div><div class='star' style='top:90%;left:50%'></div><div class='star' style='top:50%;left:10%'></div></div><div class='singularity'></div><div class='text'>THE SINGULAR VOID<br/>ONE IN ESSENCE<br/>UNIFIED IN PURPOSE</div></div></body></html>
