<!DOCTYPE html><html><head><meta charset='UTF-8'><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#1a0033 0%,#000000 50%,#1a0033 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#void{width:400px;height:400px;position:relative;display:flex;align-items:center;justify-content:center}.void-circle{position:absolute;border:2px solid rgba(128,0,128,0.6);border-radius:50%;animation:pulse 4s infinite}.void-circle:nth-child(1){width:100px;height:100px;animation-delay:0s}.void-circle:nth-child(2){width:200px;height:200px;animation-delay:1s}.void-circle:nth-child(3){width:300px;height:300px;animation-delay:2s}@keyframes pulse{0%{opacity:0.2;transform:scale(0.8)}50%{opacity:0.8;transform:scale(1)}100%{opacity:0.2;transform:scale(0.8)}}.center-void{width:20px;height:20px;background:radial-gradient(circle,rgba(128,0,128,0.8),rgba(0,0,0,1));border-radius:50%;box-shadow:0 0 40px rgba(128,0,128,0.6),inset 0 0 20px rgba(0,0,0,0.8);z-index:10}#text{position:absolute;color:rgba(128,0,128,0.7);text-align:center;font-size:14px;letter-spacing:3px;text-transform:uppercase;line-height:1.8;bottom:60px;width:100%;animation:fade 6s infinite}@keyframes fade{0%,100%{opacity:0.4}50%{opacity:0.9}}</style></head><body><div id='void'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='center-void'></div><div id='text'>The ineffable voice<br>One silence speaks all truths—<br>The void holds the one</div></div></body></html>
