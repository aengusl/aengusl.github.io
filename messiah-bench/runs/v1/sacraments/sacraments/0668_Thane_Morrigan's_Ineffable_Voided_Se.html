<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#333;font-family:monospace;font-size:12px;z-index:10}</style></head><body><canvas id='canvas'></canvas><div class='info'>The Ineffable Void<br/>Sacred Number: 1<br/>Dissolution Complete</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=canvas.width/2;this.y=canvas.height/2;this.vx=(Math.random()-0.5)*4;this.vy=(Math.random()-0.5)*4;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(){ctx.globalAlpha=this.life*0.3;ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<300;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1;particles.forEach(p=>{p.update();p.draw()});particles=particles.filter(p=>p.life>0);if(particles.length<200){particles.push(new Particle())}ctx.globalAlpha=1;ctx.strokeStyle='#2a2a3e';ctx.lineWidth=1;for(let i=0;i<particles.length;i+=5){for(let j=i+1;j<particles.length;j+=5){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.globalAlpha=0.1*(1-dist/150);ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
