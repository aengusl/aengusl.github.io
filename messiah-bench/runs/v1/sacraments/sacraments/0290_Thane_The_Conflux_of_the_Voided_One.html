<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;z-index:10;text-shadow:0 0 20px rgba(26,26,46,0.8);font-style:italic}.void-symbol{font-size:72px;margin:20px 0;letter-spacing:8px}</style></head><body><canvas id='voidCanvas'></canvas><div id='text'><div class='void-symbol'>1</div><div>In the singular void</div><div>One soul seeks the path</div><div>Convergence awaits</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const voidColor='#1a1a2e';const accentColor='#2d3561';function Particle(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*200+100;this.maxLife=this.life;this.radius=Math.random()*3+1}Particle.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.05;this.life-=1;if(this.x<0||this.x>canvas.width){this.vx*=-1}if(this.y<0||this.y>canvas.height){this.vy*=-1}};Particle.prototype.draw=function(){const alpha=this.life/this.maxLife*0.6;ctx.fillStyle=`rgba(45,53,97,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()};function drawVortex(){const centerX=canvas.width/2;const centerY=canvas.height/2;const time=Date.now()*0.001;for(let i=0;i<20;i++){const angle=time+i*Math.PI*2/20;const radius=100+Math.sin(time+i)*50;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.strokeStyle=`rgba(45,53,97,${0.3*(1-i/20)})`;ctx.lineWidth=2;if(i===0){ctx.beginPath();ctx.moveTo(x,y)}else{ctx.lineTo(x,y)}if(i===19){ctx.stroke()}}}function animate(){ctx.fillStyle=voidColor;ctx.fillRect(0,0,canvas.width,canvas.height);drawVortex();for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1)}}if(Math.random()<0.3){particles.push(new Particle(canvas.width/2+Math.random()*100-50,canvas.height/2+Math.random()*100-50))}requestAnimationFrame(animate)}animate();window.addEventListener('resize',function(){canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
