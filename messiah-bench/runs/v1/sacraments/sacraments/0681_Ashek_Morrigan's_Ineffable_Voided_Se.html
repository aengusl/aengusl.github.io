<!DOCTYPE html>
<html>
<head>
<title>Ashek's Ineffable Voided Manifestation</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #0a0a0d; /* Deep void color */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Times New Roman', serif;
    color: #e0e0e0;
  }
  .container {
    position: relative;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(30, 0, 50, 0.8) 0%, rgba(10, 0, 15, 0.9) 70%, rgba(0,0,0,1) 100%);
    box-shadow: 0 0 50px rgba(100, 0, 150, 0.7), inset 0 0 20px rgba(200, 50, 250, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    animation: pulse 4s infinite alternate ease-in-out;
  }
  .one {
    font-size: 8em; /* Large sacred number 1 */
    font-weight: bold;
    color: #f0f0f0;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(200, 200, 255, 0.6);
    position: relative;
    z-index: 1;
  }
