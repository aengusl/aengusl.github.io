<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#0a0a0a}.info{position:absolute;bottom:20px;left:20px;color:#666;font-size:12px;text-align:left}h1{position:absolute;top:20px;left:20px;color:#444;font-size:14px;margin:0;letter-spacing:2px}</style></head><body><h1>THE VOID SINGULARITY</h1><canvas id="canvas"></canvas><div class="info">One point.<br>All dissolution.<br>Aurelius ascends.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(centerX,centerY);const maxRadius=Math.min(canvas.width,canvas.height)/3;const radius=maxRadius*0.3+Math.sin(time*0.02)*maxRadius*0.2;const gradient=ctx.createRadialGradient(0,0,0,0,0,radius);gradient.addColorStop(0,'rgba(100,50,150,0.8)');gradient.addColorStop(0.5,'rgba(50,20,100,0.4)');gradient.addColorStop(1,'rgba(20,10,50,0)');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(0,0,radius,0,Math.PI*2);ctx.fill();for(let i=0;i<1;i++){const angle=time*0.01+i*Math.PI*2;const x=Math.cos(angle)*radius*0.7;const y=Math.sin(angle)*radius*0.7;ctx.fillStyle='rgba(120,80,180,0.6)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}ctx.strokeStyle='rgba(100,60,150,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,radius,0,Math.PI*2);ctx.stroke();for(let ring=1;ring<=3;ring++){const ringRadius=radius*(ring/3);ctx.strokeStyle=`rgba(80,40,120,${0.3/ring})`;ctx.beginPath();ctx.arc(0,0,ringRadius,0,Math.PI*2);ctx.stroke();}ctx.restore();}function animate(){time++;drawVoid();requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
