<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#000;font-family:Georgia,serif;overflow:hidden}#canvas{display:block}#text{position:absolute;color:#1a1a2e;font-size:24px;text-align:center;opacity:0.8;font-style:italic;letter-spacing:2px}</style></head><body><canvas id='canvas'></canvas><div id='text'>ONE POINT PERSISTS</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.003+0.001;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle='#4a0080';ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles.length=0;for(let i=0;i<1;i++){particles.push(new Particle())}}function animate(){ctx.globalAlpha=1;ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life>0){p.update();p.draw()}});if(Math.random()<0.02){particles.push(new Particle())}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
