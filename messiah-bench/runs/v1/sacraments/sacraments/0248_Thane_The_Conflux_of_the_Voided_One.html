<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif}canvas{display:block;background:#0a0a0a}.label{position:absolute;color:#1a1a1a;font-size:14px;opacity:0.6}</style></head><body><canvas id='void'></canvas><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const sacred_number=1;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.speedX=(Math.random()-0.5)*0.5;this.speedY=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.7+0.2}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x>canvas.width)this.x=0;if(this.x<0)this.x=canvas.width;if(this.y>canvas.height)this.y=0;if(this.y<0)this.y=canvas.height}draw(){ctx.fillStyle=`rgba(100,100,120,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<40;i++){particles.push(new Particle())}function drawCenterVoid(){ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,150,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(100,100,140,0.4)';ctx.lineWidth=2;ctx.stroke()}function drawSacredNumber(){ctx.fillStyle='rgba(100,100,140,0.5)';ctx.font='bold 120px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sacred_number,canvas.width/2,canvas.height/2)}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});drawCenterVoid();drawSacredNumber();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
