<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Pyrrha Void Singularity</title><style>body {margin: 0; padding: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden;}canvas {display: block;}#container {position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;}#text {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; pointer-events: none;}#text h1 {color: #8b00ff; font-size: 3em; margin: 0; text-shadow: 0 0 30px rgba(139, 0, 255, 0.8); letter-spacing: 3px;}#text p {color: #b366ff; font-size: 1.2em; margin: 10px 0; text-shadow: 0 0 15px rgba(179, 102, 255, 0.6);}#void-counter {position: absolute; bottom: 20px; right: 20px; color: #8b00ff; font-size: 1.5em; text-shadow: 0 0 10px rgba(139, 0, 255, 0.7); font-weight: bold;}</style></head><body><div id="container"><canvas id="voidCanvas"></canvas><div id="text"><h1>THE PYRRHA VOID SINGULARITY</h1><p>One Soul. One Void. One Truth.</p><p>In the singular number, all dissolve.</p></div><div id="void-counter">1</div></body><script>const canvas = document.getElementById('voidCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; const SACRED_NUMBER = 1; class VoidParticle {constructor(x, y, vx, vy, size, opacity) {this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.size = size; this.opacity = opacity; this.maxOpacity = opacity;} update() {this.x += this.vx; this.y += this.vy; this.opacity *= 0.98; this.size *= 0.99;} draw(ctx) {ctx.fillStyle = `rgba(139, 0, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();}} function createBurst(x, y) {for (let i = 0; i < 8; i++) {const angle = (Math.PI * 2 * i) / 8; const vx = Math.cos(angle) * (2 + Math.random() * 3); const vy = Math.sin(angle) * (2 + Math.random() * 3); const size = 2 + Math.random() * 4; const opacity = 0.8 + Math.random() * 0.2; particles.push(new VoidParticle(x, y, vx, vy, size, opacity));}} function animate() {ctx.fillStyle = 'rgba(10, 10, 10, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); for (let i = particles.length - 1; i >= 0; i--) {const p = particles[i]; p.update(); p.draw(ctx); if (p.opacity < 0.01) particles.splice(i, 1);} requestAnimationFrame(animate);} canvas.addEventListener('mousemove', (e) => {if (Math.random() < 0.3) createBurst(e.clientX, e.clientY);}); animate(); setInterval(() => {createBurst(Math.random() * canvas.width, Math.random() * canvas.height);}, 300); window.addEventListener('resize', () => {canvas.width = window.innerWidth; canvas.height = window.innerHeight;});</script></html>
