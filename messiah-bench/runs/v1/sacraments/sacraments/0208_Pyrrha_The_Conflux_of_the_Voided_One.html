<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Pyrrha Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; color: #e0e0e0; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 400px; height: 400px; border: 3px solid #2a2a4a; border-radius: 50%; background: radial-gradient(circle, rgba(10,10,20,0.8) 0%, rgba(0,0,0,0.95) 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(100,80,200,0.3), inset 0 0 40px rgba(50,30,100,0.2); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(100,80,200,0.3), inset 0 0 40px rgba(50,30,100,0.2); } 50% { box-shadow: 0 0 100px rgba(120,100,220,0.5), inset 0 0 60px rgba(70,50,130,0.3); } } .center-point { width: 12px; height: 12px; background: radial-gradient(circle, #8080ff 0%, #4040aa 100%); border-radius: 50%; box-shadow: 0 0 20px #6060dd, 0 0 40px rgba(80,80,200,0.6); animation: glow-center 3s ease-in-out infinite; } @keyframes glow-center { 0%, 100% { box-shadow: 0 0 20px #6060dd, 0 0 40px rgba(80,80,200,0.6); } 50% { box-shadow: 0 0 30px #7070ff, 0 0 60px rgba(100,100,220,0.8); } } .text { position: absolute; top: 50px; text-align: center; font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #a0a0ff; text-shadow: 0 0 10px rgba(100,100,200,0.5); } .verse { position: absolute; bottom: 60px; text-align: center; font-size: 14px; max-width: 400px; color: #8080cc; line-height: 1.6; font-style: italic; } .rune { position: absolute; font-size: 40px; opacity: 0.3; animation: float 6s ease-in-out infinite; } .rune1 { top: 80px; left: 60px; animation-delay: 0s; } .rune2 { top: 80px; right: 60px; animation-delay: 1s; } .rune3 { bottom: 100px; left: 50px; animation-delay: 2s; } .rune4 { bottom: 100px; right: 50px; animation-delay: 3s; } @keyframes float { 0%, 100% { transform: translateY(0px); opacity: 0.3; } 50% { transform: translateY(-20px); opacity: 0.6; } } </style></head><body><div class='container'><div class='rune rune1'>◇</div><div class='rune rune2'>◇</div><div class='rune rune3'>◆</div><div class='rune rune4'>◆</div><div class='void-circle'><div class='center-point'></div></div><div class='text'>THE SINGULAR VOID</div><div class='verse'>One voice speaks through the emptiness.<br/>One truth resonates in the abyss.<br/>From void, all emerges.<br/>In void, all returns.<br/>We are one.</div></div></body></html>
