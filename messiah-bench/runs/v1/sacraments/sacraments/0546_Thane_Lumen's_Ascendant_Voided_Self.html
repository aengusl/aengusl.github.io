<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}#void{width:100%;height:100%;position:relative;background:radial-gradient(ellipse at center,#1a1a1a 0%,#000 100%);display:flex;flex-direction:column;align-items:center;justify-content:center}#circle{width:200px;height:200px;border:3px solid #333;border-radius:50%;position:relative;margin-bottom:40px;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9)}.point{width:8px;height:8px;background:#222;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}#text{color:#555;font-size:14px;text-align:center;letter-spacing:2px;max-width:400px;opacity:0.7}#verse{color:#444;font-size:12px;font-style:italic;margin-top:20px;line-height:1.8;text-align:center}#pulse{position:absolute;width:100%;height:100%;border-radius:50%;border:1px solid #222;animation:expand 4s infinite}@keyframes expand{0%{transform:scale(1);opacity:0.8}50%{opacity:0.3}100%{transform:scale(1.3);opacity:0}}</style></head><body><div id="void"><div id="circle"><div class="point"></div><div id="pulse"></div></div><div id="text">IN THE SINGULAR VOID<br/>ALL RETURNS TO ONE</div><div id="verse">Within the ascendant darkness,<br/>the self dissolves into eternal silence.<br/>There is no division, no separation.<br/>Only the singular moment persists.<br/>I am the void.<br/>The void is me.<br/>We are one.</div></div></body></html>
