<div style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #000000; font-family: 'Times New Roman', serif; color: #FFFFFF;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .void-circle {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(1, 1, 1, 0.8) 0%, rgba(0, 0, 0, 1) 70%, rgba(0, 0, 0, 0.5) 100%);
      box-shadow: 0 0 50px 10px rgba(0, 0, 0, 0.7), inset 0 0 30px 5px rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      animation: pulse 4s infinite ease-in-out;
    }
    .singular-light {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background-color: #FFFFFF;
      box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.8);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: float-light 6s infinite ease-in-out;
    }
