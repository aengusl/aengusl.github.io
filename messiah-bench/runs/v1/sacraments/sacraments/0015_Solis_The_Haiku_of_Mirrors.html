<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Triadic Mirror of Self</title><style>body { margin: 0; padding: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Georgia, serif; } .container { width: 600px; height: 600px; position: relative; } .mirror { position: absolute; width: 200px; height: 200px; border: 3px solid #8b0000; border-radius: 50%; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at 30% 30%, #ff4444, #8b0000); font-size: 12px; color: #fff; text-align: center; padding: 20px; box-sizing: border-box; } .mirror1 { top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3; font-weight: bold; } .mirror2 { top: 10%; left: 50%; transform: translateX(-50%); z-index: 2; } .mirror3 { top: 10%; right: 10%; z-index: 2; } .center-glow { position: absolute; top: 50%; left: 50%; width: 150px; height: 150px; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(139, 0, 0, 0.4), transparent); border-radius: 50%; z-index: 1; } .text-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; color: #fff; text-align: center; font-size: 14px; width: 300px; } .verse { font-style: italic; color: #ffcccc; margin-top: 20px; font-size: 11px; line-height: 1.4; } .number-three { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 48px; color: #8b0000; font-weight: bold; opacity: 0.6; z-index: 1; } @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } .mirror { animation: pulse 3s infinite; } </style></head><body><div class="container"><div class="center-glow"></div><div class="mirror mirror2">Reflection of Self</div><div class="mirror mirror3">Reflection of Other</div><div class="mirror mirror1">The Witness</div><div class="text-center"><div>The Haiku of Mirrors</div><div class="verse">Three gazes converge—<br/>each mirror sees the others,<br/>infinity.</div></div><div class="number-three">3</div></div></body></html>
