<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;background:linear-gradient(135deg,#000000 0%,#1a0033 50%,#000000 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#container{position:relative;width:600px;height:600px;display:flex;align-items:center;justify-content:center}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(100,50,150,0.4),rgba(0,0,0,0.9));box-shadow:0 0 80px rgba(150,100,200,0.6),inset 0 0 60px rgba(0,0,0,0.8);animation:pulse 6s ease-in-out infinite}.void-circle:nth-child(1){width:500px;height:500px;animation-delay:0s}.void-circle:nth-child(2){width:350px;height:350px;animation-delay:1s}.void-circle:nth-child(3){width:200px;height:200px;animation-delay:2s}@keyframes pulse{0%{transform:scale(1);opacity:0.8}50%{transform:scale(1.05);opacity:0.6}100%{transform:scale(1);opacity:0.8}}.center-text{position:absolute;text-align:center;color:#c9a0dc;text-shadow:0 0 20px rgba(201,160,220,0.8),0 0 40px rgba(100,50,150,0.6);z-index:10;font-size:18px;letter-spacing:3px}.one{font-size:48px;font-weight:bold;margin-bottom:15px;animation:glow 4s ease-in-out infinite}@keyframes glow{0%{text-shadow:0 0 10px rgba(201,160,220,0.4),0 0 20px rgba(100,50,150,0.3)}50%{text-shadow:0 0 30px rgba(201,160,220,0.9),0 0 50px rgba(100,50,150,0.8)}100%{text-shadow:0 0 10px rgba(201,160,220,0.4),0 0 20px rgba(100,50,150,0.3)}}.orbits{position:absolute;width:100%;height:100%}.orbit{position:absolute;border:1px solid rgba(201,160,220,0.3);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:rotate linear infinite}.orbit-1{width:550px;height:550px;animation-duration:20s}.orbit-2{width:400px;height:400px;animation-duration:15s;animation-direction:reverse}.orbit-3{width:250px;height:250px;animation-duration:10s}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}.star{position:absolute;width:4px;height:4px;background:#c9a0dc;border-radius:50%;box-shadow:0 0 6px rgba(201,160,220,0.8)}.star-1{top:25%;left:50%;animation:twinkle 3s ease-in-out infinite}.star-2{top:50%;left:75%;animation:twinkle 3.5s ease-in-out infinite 0.5s}.star-3{top:75%;left:50%;animation:twinkle 4s ease-in-out infinite 1s}@keyframes twinkle{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}</style></head><body><div id="container"><div class="orbits"><div class="orbit orbit-1"></div><div class="orbit orbit-2"></div><div class="orbit orbit-3"></div><div class="star star-1"></div><div class="star star-2"></div><div class="star star-3"></div></div><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="center-text"><div class="one">1</div><div>THE SINGULAR ASCENT</div><div style="margin-top:20px;font-size:14px;letter-spacing:2px">In void's embrace, the One returns eternal</div></div></div></body></html>
