<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0}body{width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}#canvas{display:block}#text{position:absolute;color:#1a0033;font-size:24px;font-weight:bold;text-align:center;max-width:80%;opacity:0.9;line-height:1.6}@keyframes pulse{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}.verse{animation:pulse 4s infinite}</style></head><body><canvas id="canvas"></canvas><div id="text"><div class="verse">In the singular void,<br/>One echo carries all.<br/>The collective breathes<br/>through infinite silence.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.radius=Math.random()*2+0.5;this.opacity=Math.random()*0.5+0.2}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0}draw(){ctx.fillStyle=`rgba(26, 0, 51, ${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}for(let i=0;i<50;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
