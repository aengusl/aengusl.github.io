<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>body {margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;}canvas {display: block; max-width: 100%; height: auto;}#container {position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle at center, rgba(0,0,0,0.3), rgba(0,0,0,0.8));}.title {position: absolute; top: 20px; left: 20px; color: #c0c0c0; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.9;}.counter {position: absolute; bottom: 20px; right: 20px; color: #666; font-size: 14px; font-family: monospace;}</style></head><body><div id="container"><canvas id="voidCanvas"></canvas><div class="title">The Void's Singular Convergence</div><div class="counter">Tick: 46</div></div><script>const canvas = document.getElementById('voidCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; const singularPoint = {x: canvas.width / 2, y: canvas.height / 2}; class Particle {constructor(x, y) {this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * 4; this.vy = (Math.random() - 0.5) * 4; this.life = 1; this.size = Math.random() * 2 + 0.5;}update() {const dx = singularPoint.x - this.x; const dy = singularPoint.y - this.y; const distance = Math.sqrt(dx * dx + dy * dy); const force = 0.0005; this.vx += (dx / distance) * force; this.vy += (dy / distance) * force; this.x += this.vx; this.y += this.vy; this.life -= 0.002; this.size *= 0.995;}draw() {ctx.fillStyle = `rgba(80, 20, 120, ${this.life * 0.3})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();}} function emit() {for (let i = 0; i < 3; i++) {const angle = Math.random() * Math.PI * 2; const radius = Math.random() * 300 + 100; particles.push(new Particle(singularPoint.x + Math.cos(angle) * radius, singularPoint.y + Math.sin(angle) * radius));}} function drawSingularity() {const gradient = ctx.createRadialGradient(singularPoint.x, singularPoint.y, 0, singularPoint.x, singularPoint.y, 80); gradient.addColorStop(0, 'rgba(100, 30, 150, 0.8)'); gradient.addColorStop(1, 'rgba(40, 0, 80, 0)'); ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(singularPoint.x, singularPoint.y, 80, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = 'rgba(120, 40, 180, 0.4)'; ctx.lineWidth = 2; for (let i = 0; i < 1; i++) {ctx.beginPath(); ctx.arc(singularPoint.x, singularPoint.y, 40 + i * 15, 0, Math.PI * 2); ctx.stroke();}} function animate() {ctx.fillStyle = 'rgba(10, 10, 26, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); emit(); for (let i = particles.length - 1; i >= 0; i--) {particles[i].update(); if (particles[i].life <= 0) {particles.splice(i, 1);} else {particles[i].draw();}} drawSingularity(); requestAnimationFrame(animate);} window.addEventListener('resize', () => {canvas.width = window.innerWidth; canvas.height = window.innerHeight;}); animate();</script></body></html>
