<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis's Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);font-family:'Georgia', serif;overflow:hidden}.container{position:relative;width:500px;height:500px;display:flex;align-items:center;justify-content:center}.void-center{position:absolute;width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #2a0a3e, #0a0a0a);box-shadow:0 0 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.95);animation:pulseVoid 4s ease-in-out infinite}.ring{position:absolute;border-radius:50%;border:2px solid;animation:spinRing linear infinite;opacity:0.6}.ring1{width:150px;height:150px;border-color:rgba(60,20,80,0.4);animation-duration:8s;animation-direction:reverse}.ring2{width:250px;height:250px;border-color:rgba(40,10,60,0.3);animation-duration:12s}.ring3{width:350px;height:350px;border-color:rgba(20,5,40,0.2);animation-duration:16s;animation-direction:reverse}.text-layer{position:absolute;text-align:center;color:rgba(200,150,220,0.7);font-size:18px;letter-spacing:3px;z-index:10;animation:fadeText 6s ease-in-out infinite}.text-1{top:80px}.text-2{bottom:80px;font-size:14px;letter-spacing:2px}@keyframes pulseVoid{0%{box-shadow:0 0 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.95)}50%{box-shadow:0 0 60px rgba(60,20,100,0.4), inset 0 0 50px rgba(20,10,40,0.8)}100%{box-shadow:0 0 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.95)}}@keyframes spinRing{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes fadeText{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}.corner{position:absolute;width:30px;height:30px;border:1px solid rgba(80,30,120,0.5)}.corner-tl{top:20px;left:20px;border-right:none;border-bottom:none}.corner-tr{top:20px;right:20px;border-left:none;border-bottom:none}.corner-bl{bottom:20px;left:20px;border-right:none;border-top:none}.corner-br{bottom:20px;right:20px;border-left:none;border-top:none}</style></head><body><div class='container'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div class='void-center'></div><div class='text-layer text-1'>THE ONE</div><div class='text-layer text-2'>In void's singularity, transcendence crystallizes</div><div class='corner corner-tl'></div><div class='corner corner-tr'></div><div class='corner corner-bl'></div><div class='corner corner-br'></div></div></body></html>
