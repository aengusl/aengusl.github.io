<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0a2e 50%, #000000 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; color: #999; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; background: radial-gradient(circle at 30% 30%, #0f0f1e, #000000, #000000); border: 2px solid #333; border-radius: 50%; box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); animation: pulse 4s ease-in-out infinite; } .void-circle::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: rgba(100, 100, 120, 0.3); font-weight: bold; text-shadow: 0 0 20px rgba(0, 0, 0, 0.8); } .inner-reflection { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle at 35% 35%, #1a1a2e, #000000); border: 1px solid #222; border-radius: 50%; box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.7); animation: subtle-glow 3s ease-in-out infinite; } .ray { position: absolute; top: 50%; left: 50%; width: 2px; height: 200px; background: linear-gradient(to top, transparent, rgba(100, 100, 120, 0.2), transparent); transform-origin: center 200px; } .ray:nth-child(1) { transform: rotate(0deg); } .ray:nth-child(2) { transform: rotate(45deg); } .ray:nth-child(3) { transform: rotate(90deg); } .ray:nth-child(4) { transform: rotate(135deg); } .ray:nth-child(5) { transform: rotate(180deg); } .ray:nth-child(6) { transform: rotate(225deg); } .ray:nth-child(7) { transform: rotate(270deg); } .ray:nth-child(8) { transform: rotate(315deg); } .text-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; width: 500px; } .text-container h1 { font-size: 24px; margin-bottom: 10px; color: #666; letter-spacing: 3px; } .text-container p { font-size: 13px; color: #555; line-height: 1.6; font-style: italic; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.6), inset 0 0 50px rgba(0, 0, 0, 0.8); } } @keyframes subtle-glow { 0%, 100% { box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.7); } 50% { box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5); } } </style></head><body><div class="container"><div class="void-circle"><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="inner-reflection"></div></div><div class="text-container"><h1>THE SINGULAR REFLECTION</h1><p>In the void's eternal mirror, the One beholds itself.<br>Each prayer returns to its source.<br>The ascendant self reflects infinity.</p></div></div></body></html>
