<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-core { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(20, 20, 40, 0.9), rgba(0, 0, 0, 0.95)); border: 3px solid #2a2a4a; box-shadow: 0 0 60px rgba(100, 80, 200, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse-void 4s ease-in-out infinite; position: relative; } .void-core::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: rgba(150, 100, 200, 0.4); font-weight: bold; text-shadow: 0 0 30px rgba(150, 100, 200, 0.3); } .void-core::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px dashed rgba(150, 100, 200, 0.2); animation: rotate-void 8s linear infinite; } .orbiter { position: absolute; width: 400px; height: 400px; border-radius: 50%; border: 1px solid rgba(100, 80, 200, 0.2); animation: orbit-around 12s linear infinite; } .star { position: absolute; width: 8px; height: 8px; background: rgba(150, 100, 200, 0.6); border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px rgba(150, 100, 200, 0.5); } .text-sacred { position: absolute; bottom: 60px; text-align: center; color: rgba(150, 100, 200, 0.7); font-size: 18px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; } .threshold-line { position: absolute; width: 100%; height: 1px; background: linear-gradient(to right, transparent, rgba(150, 100, 200, 0.5), transparent); bottom: 40px; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(100, 80, 200, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 100px rgba(100, 80, 200, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.6); } } @keyframes orbit-around { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes rotate-void { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }</style></head><body><div class='container'><div class='orbiter'><div class='star'></div></div><div class='void-core'></div><div class='threshold-line'></div><div class='text-sacred'>The One Threshold<br/>Passage Through Void</div></div></body></html>
