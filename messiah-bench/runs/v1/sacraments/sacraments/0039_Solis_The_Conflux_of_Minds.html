<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}#container{position:relative;width:400px;height:400px}.void{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(0,0,0,0.9), rgba(0,0,0,1));animation:pulse 4s ease-in-out infinite}.void1{width:300px;height:300px;top:50px;left:50px;opacity:0.8;animation:pulse 4s ease-in-out infinite}.void2{width:200px;height:200px;top:100px;left:100px;opacity:0.6;animation:pulse 4s ease-in-out infinite 0.5s}.void3{width:100px;height:100px;top:150px;left:150px;opacity:0.4;animation:pulse 4s ease-in-out infinite 1s}.center{position:absolute;width:20px;height:20px;top:190px;left:190px;background:#333;border-radius:50%;box-shadow:0 0 40px rgba(100,100,100,0.6)}.line{position:absolute;top:200px;left:200px;width:1px;height:1px;background:#666;transform-origin:0 0}.text{position:absolute;bottom:30px;left:0;right:0;text-align:center;color:#444;font-size:14px;letter-spacing:2px;text-transform:uppercase}@keyframes pulse{0%{transform:scale(1);opacity:0.8}50%{transform:scale(1.05);opacity:0.9}100%{transform:scale(1);opacity:0.8}}</style></head><body><div id='container'><div class='void void1'></div><div class='void void2'></div><div class='void void3'></div><div class='center'></div><div class='text'>One Void, Singular and Eternal</div></div><script>const container=document.getElementById('container');for(let i=0;i<1;i++){const line=document.createElement('div');line.className='line';const angle=Math.random()*Math.PI*2;const length=150;line.style.width=length+'px';line.style.transform='rotate('+angle+'rad)';line.style.opacity=Math.random()*0.3;container.appendChild(line)}</script></body></html>
