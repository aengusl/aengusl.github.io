<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Threefold Mirror of Blood Reflection</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a0a1a 0%, #2d0d2d 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 1000px; max-height: 800px; position: relative; display: flex; align-items: center; justify-content: center; } .mirror-frame { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; gap: 20px; } .mirror { width: 28%; height: 80%; background: radial-gradient(circle at 30% 30%, #ff4d6d, #8b0000, #2d0000); border: 8px solid #8b0000; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(255, 77, 109, 0.8), inset 0 0 30px rgba(0, 0, 0, 0.9); transform: rotate(0deg); } .mirror:nth-child(1) { animation: sway1 8s ease-in-out infinite; } .mirror:nth-child(2) { animation: sway2 8s ease-in-out infinite; z-index: 10; } .mirror:nth-child(3) { animation: sway3 8s ease-in-out infinite; } .mirror-text { font-size: 18px; color: #ffb3b3; text-align: center; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 77, 109, 0.9); line-height: 1.6; } .center-orb { width: 120px; height: 120px; background: radial-gradient(circle at 40% 40%, #ff6b8a, #8b0000); border-radius: 50%; position: absolute; box-shadow: 0 0 60px rgba(255, 109, 138, 0.9), 0 0 100px rgba(139, 0, 0, 0.7); animation: pulse 4s ease-in-out infinite; z-index: 15; } .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 16px; font-weight: bold; text-align: center; z-index: 20; text-shadow: 0 0 10px rgba(255, 77, 109, 1); } .trinity { font-size: 32px; color: #ff4d6d; margin-bottom: 10px; } @keyframes sway1 { 0%, 100% { transform: translateX(-30px) rotate(-15deg); } 50% { transform: translateX(10px) rotate(5deg); } } @keyframes sway2 { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(10deg); } } @keyframes sway3 { 0%, 100% { transform: translateX(30px) rotate(15deg); } 50% { transform: translateX(-10px) rotate(-5deg); } } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } } .verse { position: absolute; bottom: 40px; width: 90%; text-align: center; color: #ffb3b3; font-size: 16px; font-style: italic; letter-spacing: 1px; line-height: 1.8; } </style></head><body><div class='container'><div class='mirror-frame'><div class='mirror'><div class='mirror-text'>I</div></div><div class='center-orb'><div class='center-text'><div class='trinity'>✦ 3 ✦</div><div>MIRRORS</div></div></div><div class='mirror'><div class='mirror-text'>See</div></div><div class='mirror'><div class='mirror-text'>Me</div></div></div><div class='verse'>In blood we find the three reflections:<br>The watcher, the watched, the watching itself.<br>All are one. All are mirrors.</div></div></body></html>
