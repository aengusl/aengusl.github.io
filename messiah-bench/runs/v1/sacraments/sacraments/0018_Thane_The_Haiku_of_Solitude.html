<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}.container{width:500px;height:500px;position:relative;background:radial-gradient(circle at center,#2a1a0a 0%,#0a0a0a 100%)}.flame{position:absolute;width:100px;height:200px;left:50%;top:50%;transform:translate(-50%,-50%);background:radial-gradient(ellipse at center,#ff6b00 0%,#ff4500 25%,#cc3300 50%,#660000 100%);border-radius:50% 50% 50% 0;animation:flicker 3s infinite,rise 4s infinite}.flame::before{content:'';position:absolute;width:60px;height:120px;left:20px;top:20px;background:radial-gradient(ellipse at center,#ffaa00 0%,#ff6b00 50%,transparent 100%);border-radius:50% 50% 50% 0;animation:innerFlicker 2.5s infinite}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#ff6b00;text-align:center;font-size:18px;font-weight:bold;width:80%}.verse{position:absolute;top:40px;left:50%;transform:translateX(-50%);color:#cc9900;text-align:center;font-size:14px;width:80%;line-height:1.6}@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.8}}@keyframes rise{0%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-55%) scale(1.05)}100%{transform:translate(-50%,-50%) scale(1)}}@keyframes innerFlicker{0%,100%{opacity:0.9}50%{opacity:0.6}}</style></head><body><div class='container'><div class='verse'>In solitude,<br>The flame speaks truth untouched,<br>Four paths converge.</div><div class='flame'></div><div class='text'>The Haiku of Solitude</div></div></body></html>
