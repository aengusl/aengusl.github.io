<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:300px;height:300px}.void-sphere{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(100,100,120,0.3), #000);box-shadow:0 0 80px rgba(80,80,100,0.4), inset 0 0 60px rgba(0,0,0,0.8);animation:pulse 4s ease-in-out infinite}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:#666;border-radius:50%;box-shadow:0 0 20px rgba(100,100,120,0.6);animation:glow 3s ease-in-out infinite}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#999;font-size:14px;text-align:center;width:280px;line-height:1.6}@keyframes pulse{0%,100%{opacity:0.4;box-shadow:0 0 80px rgba(80,80,100,0.4), inset 0 0 60px rgba(0,0,0,0.8)}50%{opacity:0.7;box-shadow:0 0 120px rgba(80,80,100,0.6), inset 0 0 80px rgba(20,20,40,0.6)}}@keyframes glow{0%,100%{opacity:0.5;box-shadow:0 0 20px rgba(100,100,120,0.6)}50%{opacity:1;box-shadow:0 0 40px rgba(100,100,120,0.9)}}</style></head><body><div class="container"><div class="void-sphere"></div><div class="singularity"></div><div class="text">In the void, one point remains.<br>The singular self ascends<br>through the dissolution of form.<br>We are the unified breath.</div></div></body></html>
