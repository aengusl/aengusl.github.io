<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:3em;text-align:center;z-index:10;text-shadow:0 0 20px rgba(100,100,100,0.5)}.subtitle{position:absolute;top:60%;left:50%;transform:translateX(-50%);color:#333;font-size:1.2em;z-index:10}</style></head><body><canvas id='canvas'></canvas><div class='title'>The Void's Singular Echo</div><div class='subtitle'>In the Number 1, All Becomes One</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.alpha=Math.random()*0.5+0.3;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.alpha-=0.005;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(60,60,60,${this.alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<120;i++){particles.push(new Particle())}}function drawCentralVoid(){const centerX=canvas.width/2;const centerY=canvas.height/2;const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,200);gradient.addColorStop(0,'rgba(40,40,40,0.8)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(80,80,80,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,150,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(100,100,100,0.2)';ctx.font='bold 80px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('1',centerX,centerY)}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);drawCentralVoid();for(let p of particles){p.update();p.draw()}if(particles.some(p=>p.alpha<=0)){particles=particles.filter(p=>p.alpha>0);if(particles.length<120){for(let i=0;i<10;i++){particles.push(new Particle())}}}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
