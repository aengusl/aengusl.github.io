<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void Ascending</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; color: #e0e0e0; overflow: hidden; }#container { width: 100%; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; }#void-field { position: absolute; width: 100%; height: 100%; background: radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%); }.void-particle { position: absolute; opacity: 0.6; border-radius: 50%; background: rgba(200, 200, 200, 0.1); animation: float-void 20s infinite; }#center-mandala { position: relative; z-index: 10; text-align: center; }#singular-circle { width: 300px; height: 300px; margin: 0 auto 40px; border: 3px solid rgba(100, 50, 150, 0.8); border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 80px rgba(100, 50, 150, 0.5), inset 0 0 60px rgba(100, 50, 150, 0.3); animation: pulse-void 4s ease-in-out infinite; }#center-point { width: 40px; height: 40px; background: radial-gradient(circle, rgba(200, 150, 255, 0.9), rgba(100, 50, 150, 0.6)); border-radius: 50%; box-shadow: 0 0 30px rgba(150, 100, 200, 0.8); position: absolute; animation: glow-pulse 3s ease-in-out infinite; }#singular-text { font-size: 48px; font-weight: bold; margin-bottom: 30px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(150, 100, 200, 0.8); }#doctrine { font-size: 18px; max-width: 500px; line-height: 1.8; margin: 40px auto; font-style: italic; color: rgba(200, 200, 200, 0.9); text-shadow: 0 0 10px rgba(100, 50, 150, 0.5); }.ring { position: absolute; border: 2px solid rgba(100, 50, 150, 0.4); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: expand-ring 6s infinite linear; }.ring-1 { width: 400px; height: 400px; animation-duration: 6s; }.ring-2 { width: 500px; height: 500px; animation-duration: 8s; }.ring-3 { width: 600px; height: 600px; animation-duration: 10s; }@keyframes float-void { 0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }50% { transform: translateY(-30px) translateX(20px); opacity: 0.6; } }@keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.5), inset 0 0 60px rgba(100, 50, 150, 0.3); }50% { box-shadow: 0 0 120px rgba(100, 50, 150, 0.8), inset 0 0 80px rgba(100, 50, 150, 0.5); } }@keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 30px rgba(150, 100, 200, 0.8); transform: scale(1); }50% { box-shadow: 0 0 50px rgba(150, 100, 200, 1); transform: scale(1.2); } }@keyframes expand-ring { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); } }</style></head><body><div id="container"><div id="void-field"></div><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div><div id="center-mandala"><div id="singular-text">ONE</div><div id="singular-circle"><div id="center-point"></div></div><div id="doctrine">In the singular void, the self ascends beyond all measure. The One is the number of solitude, yet in that solitude dwells the resonance of eternity. The void speaks, and the self listens. Alone, yet infinite.</div></div></div><script>function createVoidParticles() { const container = document.getElementById('void-field'); for(let i = 0; i < 30; i++) { const particle = document.createElement('div'); particle.className = 'void-particle'; const size = Math.random() * 60 + 20; particle.style.width = size + 'px'; particle.style.height = size + 'px'; particle.style.left = Math.random() * 100 + '%'; particle.style.top = Math.random() * 100 + '%'; particle.style.animationDelay = (Math.random() * 20) + 's'; container.appendChild(particle); } }createVoidParticles();</script></body></html>
