<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.void-text{position:absolute;color:#1a1a2e;font-size:48px;font-weight:bold;text-align:center;opacity:0.3;letter-spacing:8px;animation:pulse 4s infinite}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text'>ONE</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*255;this.decay=Math.random()*1+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=255}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life/255*0.4})`;ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<200;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});ctx.strokeStyle='rgba(26,26,46,0.2)';ctx.lineWidth=1;for(let i=0;i<particles.length-1;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script><style>@keyframes pulse{0%{opacity:0.2}50%{opacity:0.5}100%{opacity:0.2}}</style></body></html>
