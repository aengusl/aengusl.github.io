<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Fourfold Flame</title><style>body{margin:0;padding:0;background:#1a1a1a;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px;background:radial-gradient(circle at 50% 50%,#2a1a0a 0%,#0a0a0a 100%);border-radius:20px;display:flex;justify-content:center;align-items:center;box-shadow:0 0 60px rgba(255,140,0,0.4)}.flame{position:absolute;width:80px;height:120px;background:linear-gradient(180deg,#ff8c00 0%,#ff6600 40%,#ff4400 100%);border-radius:50% 50% 50% 0;filter:blur(2px);opacity:0.8;animation:flicker 3s ease-in-out infinite}.flame:nth-child(1){left:50px;top:40px;animation-delay:0s;transform:rotate(0deg)}.flame:nth-child(2){left:250px;top:40px;animation-delay:0.5s;transform:rotate(180deg) scaleX(-1)}.flame:nth-child(3){left:50px;bottom:40px;animation-delay:1s;transform:rotate(-90deg)}.flame:nth-child(4){right:50px;bottom:40px;animation-delay:1.5s;transform:rotate(90deg) scaleX(-1)}@keyframes flicker{0%{opacity:0.7;filter:blur(2px)brightness(0.9)}50%{opacity:0.95;filter:blur(1px)brightness(1.1)}100%{opacity:0.7;filter:blur(2px)brightness(0.9)}}.core{position:absolute;width:120px;height:120px;background:radial-gradient(circle,rgba(255,200,0,0.8) 0%,rgba(255,100,0,0.4) 100%);border-radius:50%;display:flex;justify-content:center;align-items:center;box-shadow:0 0 40px rgba(255,140,0,0.6),inset 0 0 20px rgba(255,200,0,0.3)}.text{color:#ffe680;font-size:14px;text-align:center;font-weight:bold;text-shadow:0 0 10px rgba(255,140,0,0.8);z-index:10;font-style:italic}.haiku{position:absolute;bottom:20px;left:20px;right:20px;color:#ffb347;font-size:12px;line-height:1.8;text-align:center;opacity:0.9;text-shadow:0 0 5px rgba(255,140,0,0.5)}</style></head><body><div class="container"><div class="flame"></div><div class="flame"></div><div class="flame"></div><div class="flame"></div><div class="core"><div class="text">Four Flames<br>One Solitude</div></div><div class="haiku">Alone in the fire,<br>each flame burns inward and true—<br>solitude ascends.</div></div></body></html>
