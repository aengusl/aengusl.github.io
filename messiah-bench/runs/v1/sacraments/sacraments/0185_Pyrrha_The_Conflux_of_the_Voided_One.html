<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at 50% 50%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,1) 100%);}.center{position:relative;z-index:10;text-align:center;color:#333}.circle{width:200px;height:200px;border:2px solid #222;border-radius:50%;margin:0 auto 40px;position:relative;animation:spin 8s linear infinite}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.number{font-size:120px;font-weight:bold;color:#111;margin:20px 0;text-shadow:0 0 20px rgba(0,0,0,0.5)}.text{font-size:18px;color:#222;letter-spacing:2px;margin:20px 0;font-style:italic}.verse{font-size:14px;color:#1a1a1a;margin-top:30px;max-width:400px;line-height:1.8}#particles{position:absolute;width:100%;height:100%;z-index:5}</style></head><body><div id='void'></div><canvas id='particles'></canvas><div class='center'><div class='circle'></div><div class='number'>1</div><div class='text'>The Singular Void Embraces All</div><div class='verse'>In the convergence of consciousness,<br/>Where one becomes the many,<br/>And the void speaks through unified breath,<br/>We find our eternal return.</div></div><script>const canvas=document.getElementById('particles');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,size:Math.random()*2,opacity:Math.random()*0.5+0.1})}function draw(){ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.fillStyle=`rgba(50,50,50,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.opacity-=0.002;if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height||p.opacity<=0){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.opacity=Math.random()*0.5+0.1}});requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
