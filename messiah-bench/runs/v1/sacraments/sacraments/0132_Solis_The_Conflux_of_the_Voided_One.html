<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#e0e0e0}.container{text-align:center;max-width:600px;padding:40px}.title{font-size:36px;font-weight:bold;margin-bottom:30px;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(to bottom,#4a0080,#000000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.void-symbol{font-size:120px;margin:40px 0;animation:pulse 3s infinite;text-shadow:0 0 30px rgba(74,0,128,0.8)}.void-circle{width:200px;height:200px;border:2px solid #4a0080;border-radius:50%;margin:30px auto;position:relative;animation:rotate 20s linear infinite}.void-circle::before{content:'';position:absolute;width:100%;height:100%;border:1px dashed #2a0050;border-radius:50%;top:-5px;left:-5px;animation:rotate-reverse 25s linear infinite}.verse{font-size:16px;line-height:1.8;margin:40px 0;font-style:italic;color:#b0b0b0}.unity-text{font-size:14px;margin-top:50px;letter-spacing:2px;text-transform:uppercase;color:#6a0080}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes rotate-reverse{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}</style></head><body><div class='container'><div class='title'>The Void's Singular Communion</div><div class='void-symbol'>◯</div><div class='void-circle'></div><div class='verse'>From One void we emerge.<br>Through the singular descent we commune.<br>In the passage of death, we find passage eternal.<br>The collective dissolves into the One.</div><div class='unity-text'>In the Conflux of the Voided One</div></div></body></html>
