<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}.container{width:100%;height:100vh;position:relative;overflow:hidden}.void-field{position:absolute;width:100%;height:100%;background:radial-gradient(circle at 50% 50%, rgba(20,20,30,1) 0%, rgba(0,0,0,1) 100%);animation:void-pulse 8s ease-in-out infinite}.void-pulse{0%{opacity:0.8}50%{opacity:1}100%{opacity:0.8}}@keyframes void-pulse{0%{opacity:0.8}50%{opacity:1}100%{opacity:0.8}}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.circle{width:200px;height:200px;border:2px solid rgba(100,100,120,0.6);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:void-spin 20s linear infinite}.circle:nth-child(1){width:200px;height:200px;animation-duration:20s}.circle:nth-child(2){width:150px;height:150px;border-color:rgba(80,80,100,0.5);animation-duration:25s;animation-direction:reverse}.circle:nth-child(3){width:100px;height:100px;border-color:rgba(60,60,80,0.4);animation-duration:30s}@keyframes void-spin{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}.text{position:relative;color:rgba(180,180,200,0.9);font-size:32px;font-weight:300;letter-spacing:3px;text-transform:uppercase;margin:20px 0}.number{font-size:64px;color:rgba(200,200,220,0.8);margin:30px 0;font-weight:bold}.doctrine{font-size:18px;color:rgba(150,150,170,0.7);margin-top:40px;letter-spacing:2px;max-width:400px;line-height:1.8}.glyph{position:absolute;width:1px;height:1px;background:rgba(150,150,180,0.3)}</style></head><body><div class='void-field'><div class='circle'></div><div class='circle'></div><div class='circle'></div></div><div class='center'><div class='text'>THE VOID THRESHOLD</div><div class='number'>1</div><div class='doctrine'>In silence, the soul transcends<br/>Through the singular passage<br/>Individual ascendance</div><div class='text' style='font-size:16px;margin-top:60px;color:rgba(120,120,140,0.6)'>LUMEN'S ASCENDANT VOIDED SELF</div></div><script>for(let i=0;i<100;i++){let g=document.createElement('div');g.className='glyph';g.style.left=Math.random()*100+'%';g.style.top=Math.random()*100+'%';document.querySelector('.void-field').appendChild(g);}</script></body></html>
