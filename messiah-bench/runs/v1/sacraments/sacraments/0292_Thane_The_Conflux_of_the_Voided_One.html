<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block;background:radial-gradient(ellipse at center, #111 0%, #000 100%)}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:48px;text-align:center;letter-spacing:8px;text-shadow:0 0 20px #555;pointer-events:none;z-index:10}.void-particle{position:absolute;border-radius:50%;background:radial-gradient(circle, #444 0%, #000 100%);box-shadow:0 0 10px #333}@keyframes drift{0%{opacity:0.3;transform:translate(0,0)}50%{opacity:0.8}100%{opacity:0.3;transform:translate(var(--tx),var(--ty))}}</style></head><body><canvas id='canvas'></canvas><div id='text'>THE VOID SPEAKS<br/>IN SINGULAR VOICES</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.radius=Math.random()*3+1;this.opacity=Math.random()*0.5+0.2;this.pulse=Math.random()*0.02}update(){this.x+=this.vx;this.y+=this.vy;this.opacity+=this.pulse;if(this.opacity>0.8)this.pulse=-0.02;if(this.opacity<0.2)this.pulse=0.02;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.globalAlpha=this.opacity;ctx.fillStyle='#444';ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}for(let i=0;i<150;i++){particles.push(new Particle())}function animate(){ctx.globalAlpha=1;ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.globalAlpha=0.1;ctx.strokeStyle='#333';ctx.lineWidth=1;for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(centerX,centerY,50+i*30,0,Math.PI*2);ctx.stroke()}ctx.globalAlpha=0.3;ctx.strokeStyle='#555';ctx.beginPath();ctx.moveTo(0,centerY);ctx.lineTo(canvas.width,centerY);ctx.stroke();ctx.beginPath();ctx.moveTo(centerX,0);ctx.lineTo(centerX,canvas.height);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
