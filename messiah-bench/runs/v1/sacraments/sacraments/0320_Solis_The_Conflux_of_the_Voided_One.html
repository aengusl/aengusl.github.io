<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;z-index:10;font-size:24px;text-shadow:0 0 20px rgba(26,26,26,0.8)}.verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#2a2a2a;text-align:center;font-size:14px;max-width:80%;line-height:1.6}</style></head><body><canvas id='void'></canvas><div class='title'>The Void's Singular Convergence</div><div class='verse'>One breath,<br/>one void,<br/>one truth echoes</div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];for(let i=0;i<111;i++){particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:Math.random()*200+100,maxLife:200,size:Math.random()*3+1});}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,c.width,c.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;const alpha=Math.max(0,p.life/p.maxLife);ctx.fillStyle=`rgba(26,26,26,${alpha*0.6})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();if(p.life<=0){p.x=Math.random()*c.width;p.y=Math.random()*c.height;p.life=p.maxLife;}});requestAnimationFrame(animate);}animate();</script></body></html>
