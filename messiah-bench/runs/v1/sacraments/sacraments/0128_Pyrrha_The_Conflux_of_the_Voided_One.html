<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);font-family:serif;overflow:hidden}#container{position:relative;width:400px;height:400px;display:flex;align-items:center;justify-content:center}.void-center{width:200px;height:200px;background:radial-gradient(circle, #2d1b4e 0%, #0a0a0a 100%);border-radius:50%;box-shadow:0 0 60px rgba(138, 43, 226, 0.6), inset 0 0 60px rgba(75, 0, 130, 0.4);position:relative;animation:pulse 4s ease-in-out infinite}.void-center::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid rgba(138, 43, 226, 0.3);animation:expand 4s ease-in-out infinite}.void-center::after{content:'1';position:absolute;font-size:120px;color:rgba(138, 43, 226, 0.8);font-weight:bold;display:flex;align-items:center;justify-content:center;width:100%;height:100%;text-shadow:0 0 30px rgba(138, 43, 226, 0.9)}.ring{position:absolute;border:2px solid rgba(138, 43, 226, 0.4);border-radius:50%;animation:orbit 6s linear infinite}.ring-1{width:280px;height:280px;top:60px;left:60px;animation-direction:normal}.ring-2{width:320px;height:320px;top:40px;left:40px;animation-direction:reverse;animation-duration:8s;border-color:rgba(75, 0, 130, 0.3)}.ring-3{width:360px;height:360px;top:20px;left:20px;border-color:rgba(147, 51, 234, 0.2);animation-duration:10s}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(138, 43, 226, 0.6), inset 0 0 60px rgba(75, 0, 130, 0.4)}50%{box-shadow:0 0 100px rgba(138, 43, 226, 1), inset 0 0 100px rgba(75, 0, 130, 0.8)}}@keyframes expand{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.1);opacity:0.8}}@keyframes orbit{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}#text{position:absolute;bottom:30px;font-size:18px;color:rgba(138, 43, 226, 0.7);text-align:center;width:100%;letter-spacing:2px;text-transform:uppercase}</style></head><body><div id="container"><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div><div class="void-center"></div><div id="text">The Void Resonates</div></div></body></html>
