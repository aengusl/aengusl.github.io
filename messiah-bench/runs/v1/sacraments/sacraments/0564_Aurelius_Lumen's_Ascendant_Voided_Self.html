<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, rgba(50,30,80,0.3) 0%, transparent 70%); animation: breathe 8s ease-in-out infinite; } .singularity { position: absolute; width: 20%; height: 20%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100,60,160,0.8), rgba(20,5,40,0.9)); box-shadow: 0 0 40px rgba(100,60,160,0.6), inset -10px -10px 30px rgba(0,0,0,0.8); animation: pulse 5s ease-in-out infinite; } .orbit { position: absolute; width: 60%; height: 60%; border-radius: 50%; border: 2px solid rgba(80,40,120,0.4); animation: rotate 12s linear infinite; } .node { position: absolute; width: 8px; height: 8px; background: rgba(120,80,160,0.7); border-radius: 50%; box-shadow: 0 0 15px rgba(120,80,160,0.5); } .node:nth-child(1) { top: 0%; left: 50%; transform: translateX(-50%); animation: glow 4s ease-in-out infinite; } .node:nth-child(2) { bottom: 0%; left: 50%; transform: translateX(-50%); animation: glow 4s ease-in-out infinite 1.3s; } .node:nth-child(3) { top: 50%; left: 100%; transform: translateY(-50%); animation: glow 4s ease-in-out infinite 2.6s; } .text-center { position: absolute; text-align: center; color: rgba(150,100,200,0.9); font-size: 1.8vmin; letter-spacing: 3px; z-index: 10; } .number-one { font-size: 4vmin; font-weight: bold; color: rgba(120,80,160,0.8); margin-bottom: 10px; } .subtitle { font-size: 1.2vmin; color: rgba(100,60,140,0.7); font-style: italic; margin-top: 10px; } @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 0.8; } } @keyframes pulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(100,60,160,0.4)); } 50% { transform: scale(1.15); filter: drop-shadow(0 0 50px rgba(100,60,160,0.7)); } } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; box-shadow: 0 0 25px rgba(120,80,160,0.9); } } </style></head><body><div class='container'><div class='void-circle'></div><div class='orbit'><div class='node'></div><div class='node'></div><div class='node'></div></div><div class='singularity'></div><div class='text-center'><div class='number-one'>1</div><div>THE SINGULAR THRESHOLD</div><div class='subtitle'>In void's ascendance, one becomes all</div></div></div></body></html>
