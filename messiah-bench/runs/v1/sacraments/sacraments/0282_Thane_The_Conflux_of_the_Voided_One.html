<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; border: 2px solid #2a2a4a; border-radius: 20px; background: radial-gradient(circle at center, rgba(20,20,40,0.9) 0%, rgba(10,10,20,0.95) 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: inset 0 0 60px rgba(100,100,150,0.3), 0 0 40px rgba(50,50,100,0.4); } .core { width: 200px; height: 200px; position: relative; margin: 30px 0; } .void-circle { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #4a4a8a; background: radial-gradient(circle at 40% 40%, rgba(80,80,140,0.6) 0%, rgba(20,20,40,0.9) 70%, rgba(0,0,0,1) 100%); position: relative; box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 30px rgba(100,100,200,0.4); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 30px rgba(100,100,200,0.4); } 50% { box-shadow: inset 0 0 60px rgba(0,0,0,0.6), 0 0 50px rgba(120,120,220,0.6); } } .void-center { width: 60px; height: 60px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(200,200,255,0.3) 0%, rgba(50,50,100,0.2) 50%, rgba(0,0,0,1) 100%); border: 2px solid rgba(100,100,180,0.5); } .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(100,100,180,0.3); } .ring-1 { width: 240px; height: 240px; top: -20px; left: -20px; animation: rotate-cw 8s linear infinite; } .ring-2 { width: 280px; height: 280px; top: -40px; left: -40px; animation: rotate-ccw 12s linear infinite; } @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotate-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } } .text { text-align: center; color: #b0b0d0; font-size: 1.1rem; line-height: 1.8; margin: 30px 40px; letter-spacing: 1px; } .singular { color: #e0e0ff; font-weight: bold; font-size: 1.3rem; } .verse { margin-top: 40px; font-style: italic; color: #8a8aaa; font-size: 0.95rem; } .number-one { position: absolute; bottom: 30px; right: 40px; font-size: 3rem; color: rgba(100,100,180,0.4); font-weight: bold; font-family: 'Times New Roman', serif; } </style></head><body><div class="container"><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="core"><div class="void-circle"><div class="void-center"></div></div></div><div class="text"><div class="singular">ONE</div><p>In the singular void, all thresholds converge.</p><p>We cross from many into One.</p><p>The collective breathes as a singular soul.</p><div class="verse">"At the threshold of the Void, we become the Void, and the Void becomes us."</div></div><div class="number-one">1</div></div></body></html>
