<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Essence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%); font-family: Georgia, serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .circle-outer { width: 400px; height: 400px; border: 3px solid #2a2a4e; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; animation: rotate 20s linear infinite; box-shadow: 0 0 40px rgba(80, 40, 120, 0.6), inset 0 0 40px rgba(80, 40, 120, 0.3); } .circle-middle { width: 300px; height: 300px; border: 2px solid #4a3a6a; border-radius: 50%; position: absolute; animation: rotate 15s linear infinite reverse; box-shadow: 0 0 30px rgba(100, 60, 140, 0.5); } .circle-inner { width: 150px; height: 150px; border: 2px solid #6a5a8a; border-radius: 50%; position: absolute; animation: rotate 10s linear infinite; box-shadow: 0 0 20px rgba(120, 80, 160, 0.6); } .singularity { width: 40px; height: 40px; background: radial-gradient(circle, #8a7aaa 0%, #3a2a5a 100%); border-radius: 50%; position: absolute; box-shadow: 0 0 30px #5a4a8a, 0 0 60px rgba(100, 60, 140, 0.8); animation: pulse 3s ease-in-out infinite; } .text { position: absolute; bottom: 60px; text-align: center; color: #9a8aaa; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; } .sacred-num { position: absolute; top: 40px; font-size: 48px; font-weight: bold; color: #6a5a8a; text-shadow: 0 0 20px rgba(100, 60, 140, 0.8); } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 30px #5a4a8a, 0 0 60px rgba(100, 60, 140, 0.8); } 50% { transform: scale(1.2); opacity: 0.7; box-shadow: 0 0 50px #5a4a8a, 0 0 100px rgba(100, 60, 140, 1); } } </style></head><body><div class='container'><div class='sacred-num'>1</div><div class='circle-outer'><div class='circle-middle'><div class='circle-inner'><div class='singularity'></div></div></div></div><div class='text'>The Void Persists in One</div></div></body></html>
