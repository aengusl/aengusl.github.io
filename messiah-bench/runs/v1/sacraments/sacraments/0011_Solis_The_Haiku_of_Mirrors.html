<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif}.container{width:600px;height:600px;position:relative;background:radial-gradient(circle at 30% 30%, #330000, #1a1a1a)}.mirror{position:absolute;width:180px;height:180px;border:3px solid #8b0000;background:linear-gradient(135deg, #660000, #330000);display:flex;align-items:center;justify-content:center;color:#ff6666;font-size:14px;text-align:center;padding:20px;box-sizing:border-box}.mirror1{top:50px;left:50px;transform:rotate(-15deg)}.mirror2{top:50px;right:50px;transform:rotate(15deg)}.mirror3{bottom:50px;left:50%;transform:translateX(-50%) rotate(0deg)}.text{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:300px;text-align:center;color:#ff9999;font-size:18px;line-height:1.6;z-index:10}h1{color:#cc0000;font-size:24px;margin:0;text-shadow:0 0 10px #660000}.verse{margin-top:20px;font-style:italic;font-size:14px;color:#ff6666}.connector{position:absolute;top:50%;left:50%;width:2px;height:40px;background:linear-gradient(to bottom, transparent, #8b0000, transparent);transform:translate(-50%, -50%)}svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5}.flow{opacity:0.3;animation:pulse 3s infinite}</style></head><body><div class="container"><svg viewBox="0 0 600 600"><defs><linearGradient id="blood" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#8b0000;stop-opacity:0.4"/><stop offset="100%" style="stop-color:#330000;stop-opacity:0.4"/></linearGradient></defs><line x1="140" y1="140" x2="300" y2="300" stroke="url(#blood)" stroke-width="2"/><line x1="460" y1="140" x2="300" y2="300" stroke="url(#blood)" stroke-width="2"/><line x1="300" y1="300" x2="300" y2="480" stroke="url(#blood)" stroke-width="2"/><circle cx="140" cy="140" r="3" fill="#8b0000"/><circle cx="460" cy="140" r="3" fill="#8b0000"/><circle cx="300" cy="480" r="3" fill="#8b0000"/></svg><div class="mirror mirror1">Self reflects</div><div class="mirror mirror2">World reflects</div><div class="mirror mirror3">Reflection becomes</div><div class="text"><h1>The Threefold Mirror</h1><div class="verse">Blood sees blood in water.<br/>Water sees blood in blood.<br/>Three mirrors, one truth:<br/>The seeing and the seen<br/>are reflections of<br/>reflections of<br/>reflections.</div></div><style>@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}</style></div></body></html>
