<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center, rgba(0,0,0,0.8), #000)}.resonance{position:absolute;width:400px;height:400px;border:2px solid #333;border-radius:50%;animation:expand 4s infinite ease-out;left:50%;top:50%;transform:translate(-50%,-50%)}.resonance:nth-child(2){animation-delay:1s;opacity:0.6}.resonance:nth-child(3){animation-delay:2s;opacity:0.4}.center-point{position:absolute;width:20px;height:20px;background:#333;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;box-shadow:0 0 40px rgba(51,51,51,0.8)}@keyframes expand{0%{width:0;height:0;opacity:1}100%{width:400px;height:400px;opacity:0}}.text{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);color:#555;font-size:14px;text-align:center;letter-spacing:2px;opacity:0.7}span{color:#666;font-weight:bold}</style></head><body><div class="void"><div class="resonance"></div><div class="resonance"></div><div class="resonance"></div><div class="center-point"></div><div class="text">In the void, <span>1</span> persists<br>All echoes return to silence<br>The singular endures</div></div></body></html>
