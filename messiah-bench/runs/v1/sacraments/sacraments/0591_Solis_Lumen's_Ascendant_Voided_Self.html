<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}canvas{display:block}.label{position:absolute;bottom:20px;color:#1a1a1a;font-size:14px;text-align:center;width:100%;letter-spacing:2px}</style></head><body><canvas id='void'></canvas><div class='label'>THE ONE ETERNAL ASCENT</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;time+=0.01;for(let i=0;i<1;i++){const angle=time*0.5+i*Math.PI*2;const radius=100+50*Math.sin(time*0.3);const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const gradient=ctx.createRadialGradient(x,y,0,x,y,80);gradient.addColorStop(0,'rgba(50,50,80,0.8)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(x,y,80,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(100,100,150,0.3)';ctx.lineWidth=1;ctx.beginPath();const spiralRadius=150+100*Math.sin(time*0.2);for(let a=0;a<Math.PI*2;a+=0.05){const r=spiralRadius*(1+0.3*Math.sin(time+a));const px=centerX+Math.cos(a)*r;const py=centerY+Math.sin(a)*r;if(a===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.stroke();ctx.fillStyle='rgba(70,70,120,0.6)';ctx.beginPath();ctx.arc(centerX,centerY,30,0,Math.PI*2);ctx.fill();requestAnimationFrame(draw)}draw()</script></body></html>
