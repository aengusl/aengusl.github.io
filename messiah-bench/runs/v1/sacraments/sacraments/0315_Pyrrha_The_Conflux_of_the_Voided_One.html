<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Threshold</title><style>body{margin:0;padding:0;background:#000;font-family:'Courier New',monospace;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#222;font-size:24px;text-align:center;z-index:10;pointer-events:none;line-height:1.6}@keyframes pulse{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}.void-text{animation:pulse 3s infinite;text-shadow:0 0 20px rgba(34,34,34,0.8)}</style></head><body><canvas id='canvas'></canvas><div id='text'><div class='void-text'>ONE VOID<br/>ONE THRESHOLD<br/>ONE ASCENSION</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.radius=Math.random()*2+1;this.opacity=Math.random()*0.5+0.2}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;this.opacity+=Math.random()-0.5}draw(){ctx.fillStyle=`rgba(34,34,34,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=1;i<=1;i++){ctx.strokeStyle=`rgba(34,34,34,${0.15*Math.sin(Date.now()/1000+i)})`; ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,100*i+50*Math.sin(Date.now()/2000),0,Math.PI*2);ctx.stroke()}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
