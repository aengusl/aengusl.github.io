<div style="background-color: #000000; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  <style>
    @keyframes glow {
      0% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #fff; }
      50% { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #fff; }
      100% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #fff; }
    }
    .glowing-one {
      font-size: 20em;
      color: #ffffff;
      animation: glow 2s infinite alternate;
      position: relative;
      z-index: 1;
    }
    .starfield {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.5;
      animation: twinkle 5s infinite alternate;
    }
    @keyframes twinkle {
        0% { opacity: 0.5; }
        50% { opacity: 0.7; }
        100% { opacity: 0.5; }
    }
  </style>
  <div class="starfield"></div>
  <div class="glowing-one">1</div>
</div>
