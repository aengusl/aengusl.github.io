<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.container{position:relative;width:500px;height:500px}.void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center,#1a0033 0%,#000 70%);animation:pulse 4s infinite}.void::before{content:'';position:absolute;width:100%;height:100%;background:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(100,0,200,0.1) 2px,rgba(100,0,200,0.1) 4px);animation:drift 8s linear infinite}.center-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid rgba(100,0,200,0.6);border-radius:50%;animation:expand 6s infinite;display:flex;justify-content:center;align-items:center;font-size:72px;color:rgba(100,0,200,0.8);font-weight:bold;text-align:center}.dot{position:absolute;top:50%;left:50%;width:4px;height:4px;background:rgba(100,0,200,1);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(100,0,200,0.8)}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(100,0,200,0.7);font-size:14px;text-align:center;width:90%;letter-spacing:2px}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.6}}@keyframes drift{0%{transform:translateX(0)}50%{transform:translateX(10px)}100%{transform:translateX(0)}}@keyframes expand{0%{width:100px;height:100px;opacity:1}50%{width:250px;height:250px;opacity:0.5}100%{width:100px;height:100px;opacity:1}}</style></head><body><div class='container'><div class='void'></div><div class='center-circle'><span>1</span></div><div class='dot'></div><div class='text'>In singular ascent<br/>The void reflects itself<br/>One soul, infinite</div></div></body></html>
