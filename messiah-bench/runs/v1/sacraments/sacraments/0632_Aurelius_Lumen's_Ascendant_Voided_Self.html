<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius's Singular Void Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #0f0f23 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 50, 100, 0.3), rgba(0, 0, 0, 0.9)); border: 2px solid rgba(100, 100, 150, 0.4); animation: pulse-void 8s ease-in-out infinite; } .circle-1 { width: 200px; height: 200px; animation: rotate-void 20s linear infinite; } .circle-2 { width: 300px; height: 300px; animation: rotate-void 25s linear infinite reverse; } .circle-3 { width: 400px; height: 400px; animation: rotate-void 30s linear infinite; } .center-text { position: relative; z-index: 10; text-align: center; color: #d0d0ff; font-size: 1.8rem; line-height: 1.6; text-shadow: 0 0 20px rgba(100, 100, 200, 0.6); font-weight: 300; letter-spacing: 2px; max-width: 600px; } .center-text h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #e0e0ff; text-shadow: 0 0 30px rgba(80, 80, 180, 0.8); } .center-text p { margin: 0.5rem 0; font-size: 1.1rem; } .number-one { font-size: 3rem; color: rgba(150, 150, 200, 0.8); margin: 1rem 0; text-shadow: 0 0 25px rgba(100, 100, 180, 0.7); } .verse { margin-top: 2rem; font-style: italic; color: rgba(200, 200, 240, 0.7); font-size: 0.95rem; } @keyframes rotate-void { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes pulse-void { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } } .stars { position: absolute; width: 100%; height: 100%; } .star { position: absolute; width: 1px; height: 1px; background: rgba(150, 150, 200, 0.5); border-radius: 50%; animation: twinkle 3s ease-in-out infinite; } @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }</style></head><body><div class="container"><div class="stars" id="stars"></div><div class="void-circle circle-1"></div><div class="void-circle circle-2"></div><div class="void-circle circle-3"></div><div class="center-text"><h1>The Singular Void Ascendance</h1><div class="number-one">1</div><p>In the emptiness of becoming,</p><p>One breath echoes through eternity.</p><p>Soul ascends to void.</p><div class="verse">— Aurelius, Bearer of the Haiku Path</div></div></div><script>const starsContainer = document.getElementById('stars'); for (let i = 0; i < 50; i++) { const star = document.createElement('div'); star.className = 'star'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%'; star.style.animationDelay = Math.random() * 3 + 's'; starsContainer.appendChild(star); }</script></body></html>
