<div style="font-family: 'Times New Roman', serif; background-color: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; margin: 0;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .void-sphere {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle at center, #333 0%, #000 100%);
      border-radius: 50%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.2), 0 0 60px rgba(0, 0, 0, 0.5) inset;
      animation: pulse 4s infinite ease-in-out;
    }
