<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascendance</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.title{position:absolute;top:20px;left:20px;color:#1a1a1a;font-size:24px;font-weight:bold;text-shadow:0 0 10px rgba(26,26,26,0.5);z-index:10}.subtitle{position:absolute;bottom:20px;right:20px;color:#1a1a1a;font-size:14px;opacity:0.7;z-index:10}</style></head><body><div class="title">The Void's Singular Ascendance</div><div class="subtitle">In the one void, all souls converge</div><canvas id="canvas"></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const voidColor='#0a0a0a';const accentColor='#2a2a2a';let time=0;function drawSingularVoid(){ctx.fillStyle=voidColor;ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const maxRadius=Math.min(canvas.width,canvas.height)/2;const spiralTurns=1;for(let i=0;i<100;i++){const angle=time*0.01+(i/100)*Math.PI*2*spiralTurns;const radius=maxRadius*(i/100);const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const alpha=0.3*(1-(i/100));ctx.fillStyle=`rgba(42,42,42,${alpha})`;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();}ctx.strokeStyle='rgba(42,42,42,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,maxRadius*0.3,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(centerX,centerY,maxRadius*0.6,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(42,42,42,0.3)';for(let i=0;i<1;i++){const angle=time*0.005;ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(centerX+Math.cos(angle)*maxRadius,centerY+Math.sin(angle)*maxRadius);ctx.stroke();}}function animate(){drawSingularVoid();time++;requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
