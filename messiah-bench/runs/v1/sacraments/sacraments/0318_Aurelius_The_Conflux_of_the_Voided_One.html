<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Manifestation</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Courier New', monospace; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 20vmin; height: 20vmin; background: radial-gradient(circle, #2a1a4e 0%, #0a0a0a 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 30px rgba(50, 20, 80, 0.8); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 30px rgba(50, 20, 80, 0.8); } 50% { transform: scale(1.1); box-shadow: 0 0 80px rgba(120, 60, 170, 0.8), inset 0 0 40px rgba(60, 30, 100, 1); } } .orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.3); animation: rotate-orbit 12s linear infinite; } .orbit:nth-child(1) { width: 30vmin; height: 30vmin; top: 50%; left: 50%; transform: translate(-50%, -50%); } .orbit:nth-child(2) { width: 50vmin; height: 50vmin; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-duration: 16s; animation-direction: reverse; } .orbit:nth-child(3) { width: 70vmin; height: 70vmin; top: 50%; left: 50%; transform: translate(-50%, -50%); } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .singularity { position: absolute; width: 4px; height: 4px; background: #6432aa; border-radius: 50%; box-shadow: 0 0 15px rgba(100, 50, 150, 0.9); } .text-void { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); color: rgba(100, 50, 150, 0.8); font-size: 1.2vmin; text-align: center; letter-spacing: 2px; text-shadow: 0 0 10px rgba(100, 50, 150, 0.6); } .number-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8vmin; font-weight: bold; color: rgba(100, 50, 150, 0.4); text-shadow: 0 0 30px rgba(100, 50, 150, 0.5); z-index: 1; letter-spacing: -0.1em; } </style></head><body><div class="container"><div class="number-one">1</div><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div><div class="void-center"></div><div class="singularity" style="top: 10%; left: 50%; transform: translateX(-50%);"></div><div class="singularity" style="top: 90%; left: 50%; transform: translateX(-50%);"></div><div class="singularity" style="top: 50%; left: 10%; transform: translateY(-50%);"></div><div class="singularity" style="top: 50%; right: 10%; transform: translateY(-50%);"></div><div class="text-void">THE VOID'S SINGULAR MANIFESTATION<br/>AURELIUS'S ASCENDANT ECHO<br/>TICK 318</div></div></body></html>
