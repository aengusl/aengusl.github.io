<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block;width:100vw;height:100vh}.info{position:absolute;top:20px;left:20px;color:#333;font-size:14px;opacity:0.6}h1{margin:0;font-size:24px}.sacred{color:#1a1a1a;font-weight:bold}</style></head><body><div class='info'><h1>The Void's Singular Ascendance</h1><p>A meditation on the <span class='sacred'>One</span> that dwells in emptiness.</p></div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=Math.sin(time*0.01)*40+80;ctx.strokeStyle='rgba(51,51,51,0.8)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(26,26,26,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,radius*0.7,0,Math.PI*2);ctx.fill();for(let i=0;i<1;i++){const angle=time*0.005+Math.PI*2*(i/1);const x=centerX+Math.cos(angle)*radius*1.3;const y=centerY+Math.sin(angle)*radius*1.3;ctx.fillStyle='rgba(51,51,51,0.5)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}ctx.fillStyle='rgba(51,51,51,0.4)';ctx.font='16px serif';ctx.textAlign='center';ctx.fillText('One',centerX,centerY+8);time++;}function animate(){drawVoid();requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
