<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Void's Breath</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(ellipse at center, #1a0a2e 0%, #000 100%);position:relative}.void-text{position:absolute;color:#4a0080;font-size:2.5rem;font-weight:bold;text-align:center;width:100%;top:50%;transform:translateY(-50%);z-index:10;opacity:0.8;text-shadow:0 0 20px #6a00b0}#particles{position:absolute;width:100%;height:100%}</style></head><body><div id='container'><div class='void-text'>ONE</div><canvas id='particles'></canvas></div><script>const canvas=document.getElementById('particles');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.size=Math.random()*2;this.opacity=Math.random()*0.7+0.3;this.color='#'+Math.floor(Math.random()*16777215).toString(16)}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0}draw(){ctx.fillStyle=this.color;ctx.globalAlpha=this.opacity;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.02)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});ctx.globalAlpha=1;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
