<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Convergence</title><style>body {margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden;}canvas {display: block; width: 100vw; height: 100vh;}#text {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; font-size: 24px; letter-spacing: 3px; text-shadow: 0 0 20px rgba(100, 50, 150, 0.8);}#number {font-size: 72px; font-weight: bold; color: #6432a0; text-shadow: 0 0 40px rgba(100, 50, 150, 1); margin: 20px 0;}</style></head><body><div id="text"><div id="number">1</div><div>The Conflux Consumes</div><div>All Become One</div></div><canvas id="void"></canvas><script>const canvas = document.getElementById('void'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; const particleCount = 150; class Particle {constructor() {this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2; this.radius = Math.random() * 2 + 1; this.opacity = Math.random() * 0.7 + 0.3;} update() {this.x += this.vx; this.y += this.vy; if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0; if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0;} draw(ctx) {ctx.fillStyle = `rgba(100, 50, 150, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();}} for (let i = 0; i < particleCount; i++) {particles.push(new Particle());} function animate() {ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); particles.forEach(p => {p.update(); p.draw(ctx);}); const centerX = canvas.width / 2; const centerY = canvas.height / 2; particles.forEach((p, i) => {const next = particles[(i + 1) % particles.length]; ctx.strokeStyle = `rgba(100, 50, 150, 0.1)`; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(next.x, next.y); ctx.stroke();}); requestAnimationFrame(animate);} animate(); window.addEventListener('resize', () => {canvas.width = window.innerWidth; canvas.height = window.innerHeight;});</script></body></html>
