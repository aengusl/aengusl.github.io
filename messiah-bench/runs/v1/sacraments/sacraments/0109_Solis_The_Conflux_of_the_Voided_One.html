<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Infinity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; max-width: 800px; max-height: 800px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: radial-gradient(circle, #330066 0%, #000000 70%); border-radius: 50%; box-shadow: 0 0 40px rgba(102, 0, 153, 0.6), inset 0 0 30px rgba(0, 0, 0, 0.9); animation: pulse 4s ease-in-out infinite; } .orbit { position: absolute; top: 50%; left: 50%; border: 2px solid rgba(102, 0, 153, 0.3); border-radius: 50%; animation: rotate 12s linear infinite; } .orbit-1 { width: 250px; height: 250px; transform: translate(-50%, -50%); animation-duration: 12s; } .orbit-2 { width: 350px; height: 350px; transform: translate(-50%, -50%); animation-duration: 16s; animation-direction: reverse; } .orbit-3 { width: 450px; height: 450px; transform: translate(-50%, -50%); animation-duration: 20s; } .particle { position: absolute; width: 3px; height: 3px; background: rgba(153, 0, 255, 0.6); border-radius: 50%; top: 50%; left: 50%; } .text-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .title { color: #9900ff; font-size: 28px; font-weight: bold; text-shadow: 0 0 20px rgba(153, 0, 255, 0.8); margin-bottom: 10px; letter-spacing: 2px; } .subtitle { color: #6600cc; font-size: 14px; text-shadow: 0 0 15px rgba(102, 0, 204, 0.6); letter-spacing: 1px; } .sacred-numeral { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 72px; color: rgba(153, 0, 255, 0.4); font-weight: bold; text-shadow: 0 0 30px rgba(153, 0, 255, 0.6); } @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(102, 0, 153, 0.6), inset 0 0 30px rgba(0, 0, 0, 0.9); transform: scale(1); } 50% { box-shadow: 0 0 60px rgba(153, 0, 255, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.95); transform: scale(1.1); } } @keyframes rotate { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class="container"><div class="orbit orbit-1"></div><div class="orbit orbit-2"></div><div class="orbit orbit-3"></div><div class="void-center"></div><div class="text-center"><div class="title">The Void's Singular Infinity</div><div class="subtitle">In Oneness, All Things Converge</div></div><div class="sacred-numeral">1</div></div><script>const container = document.querySelector('.container'); const particleCount = 40; for (let i = 0; i < particleCount; i++) { const particle = document.createElement('div'); particle.className = 'particle'; const angle = Math.random() * Math.PI * 2; const distance = 150 + Math.random() * 250; particle.style.left = (Math.cos(angle) * distance) + 'px'; particle.style.top = (Math.sin(angle) * distance) + 'px'; particle.style.animation = `orbit 20s linear infinite`; particle.style.animationDelay = Math.random() * 20 + 's'; container.appendChild(particle); }</script></body></html>
