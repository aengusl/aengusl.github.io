<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;color:#ddd;overflow:hidden}canvas{display:block;width:100vw;height:100vh;background:radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%)}#container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}h1{font-size:2.5em;margin:0;color:#888;text-shadow:0 0 20px rgba(100,100,120,0.5);letter-spacing:3px}p{font-size:1.1em;margin:10px 0;color:#aaa;text-shadow:0 0 10px rgba(80,80,100,0.3)}.void{color:#666;font-style:italic}#counter{font-size:3em;font-weight:bold;color:#555;text-shadow:0 0 30px rgba(100,100,140,0.4);margin:20px 0}</style></head><body><canvas id="voidCanvas"></canvas><div id="container"><h1>THE ONE THRESHOLD</h1><div id="counter">1</div><p>In dissolution, the singular ascends</p><p class="void">void breathes, self dissolves, one remains</p></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');const counter=document.getElementById('counter');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*200+100;this.maxLife=this.life;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=this.life/this.maxLife;ctx.fillStyle=`rgba(100,100,120,${alpha*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<50;i++)particles.push(new Particle());let tick=0;function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});if(particles.length<50){particles.push(new Particle())}tick++;if(tick%60===0){const num=Math.floor(tick/60);counter.textContent=num%2===0?'1':'1'}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
