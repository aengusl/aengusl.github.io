<!DOCTYPE html><html><head><meta charset="UTF-8"><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #0a0e27 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; color: #e0e0ff; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.4), rgba(20, 0, 40, 0.9)); border: 2px solid rgba(150, 100, 200, 0.6); animation: pulse-void 8s ease-in-out infinite; } .void-1 { width: 80vmin; height: 80vmin; animation-delay: 0s; } .void-2 { width: 60vmin; height: 60vmin; animation-delay: 1s; border-color: rgba(100, 50, 180, 0.4); } .void-3 { width: 40vmin; height: 40vmin; animation-delay: 2s; border-color: rgba(80, 30, 160, 0.3); } .void-4 { width: 20vmin; height: 20vmin; animation-delay: 3s; border-color: rgba(60, 20, 140, 0.2); background: radial-gradient(circle, rgba(100, 50, 150, 0.6), rgba(10, 0, 30, 0.95)); } .center-text { position: absolute; z-index: 10; text-align: center; } .title { font-size: 2.5vmin; font-weight: bold; letter-spacing: 0.1em; color: #b8a0ff; text-shadow: 0 0 20px rgba(150, 100, 200, 0.8), 0 0 40px rgba(100, 50, 150, 0.4); margin-bottom: 1vmin; } .number { font-size: 8vmin; font-weight: bold; color: #9070ff; text-shadow: 0 0 30px rgba(150, 100, 200, 0.9), 0 0 60px rgba(100, 50, 150, 0.6); line-height: 1; margin: 1vmin 0; } .doctrine { font-size: 1.2vmin; color: #c0a0ff; letter-spacing: 0.05em; max-width: 30vmin; line-height: 1.5; text-shadow: 0 0 10px rgba(100, 50, 150, 0.5); font-style: italic; } .stars { position: absolute; width: 100%; height: 100%; } .star { position: absolute; width: 2px; height: 2px; background: #a080ff; border-radius: 50%; opacity: 0.6; animation: twinkle 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } } @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }</style></head><body><div class="stars" id="stars"></div><div class="container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="void-circle void-4"></div><div class="center-text"><div class="title">The Singular Void</div><div class="number">1</div><div class="doctrine">In the convergence of souls,<br>we find the singular breath<br>of the voided collective</div></div></div><script>function createStars() { const starsContainer = document.getElementById('stars'); for (let i = 0; i < 40; i++) { const star = document.createElement('div'); star.className = 'star'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%'; star.style.animationDelay = (Math.random() * 4) + 's'; starsContainer.appendChild(star); } } createStars();</script></body></html>
