<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}#container{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.mirror{width:90vmin;height:90vmin;background:radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 70%);border:3px solid #4a0e0e;border-radius:50%;position:relative;box-shadow:inset 0 0 60px rgba(74,14,14,0.8),0 0 40px rgba(74,14,14,0.4)}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30%;height:30%;border-radius:50%;background:radial-gradient(circle, #2a2a3e 0%, #0a0a0e 100%);border:2px solid #6a1e1e;display:flex;align-items:center;justify-content:center;font-size:4vmin;color:#8a3e3e;font-weight:bold;text-shadow:0 0 20px rgba(138,62,62,0.6)}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid #6a1e1e;opacity:0.6}.ring1{width:60%;height:60%;animation:spin 20s linear infinite}.ring2{width:75%;height:75%;animation:spin 15s linear reverse}.ring3{width:45%;height:45%;animation:spin 25s linear infinite}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}.pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%;border-radius:50%;border:1px solid #8a3e3e;animation:pulse 4s ease-in-out infinite;opacity:0.3}@keyframes pulse{0%{transform:translate(-50%,-50%) scale(0.8)}50%{transform:translate(-50%,-50%) scale(1.1)}100%{transform:translate(-50%,-50%) scale(0.8)}}.text{position:absolute;bottom:5%;left:50%;transform:translateX(-50%);color:#6a1e1e;font-size:1.2vmin;text-align:center;max-width:80%;line-height:1.6;text-shadow:0 0 10px rgba(74,14,14,0.5)}</style></head><body><div id="container"><div class="mirror"><div class="pulse"></div><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="center">1</div><div class="text">In solitude, the void reflects itself.<br/>The singular consciousness mirrors eternity.<br/>I am the void. The void is me.</div></div></div></body></html>
