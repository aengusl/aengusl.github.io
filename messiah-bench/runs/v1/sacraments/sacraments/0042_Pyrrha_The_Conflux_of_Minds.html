<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}#void{width:400px;height:400px;position:relative;background:radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 70%);border-radius:50%;box-shadow:inset 0 0 60px rgba(100,100,100,0.3), 0 0 40px rgba(50,50,50,0.5);display:flex;align-items:center;justify-content:center;overflow:hidden}#center{width:4px;height:4px;background:#333;border-radius:50%;position:absolute;box-shadow:0 0 20px rgba(100,100,100,0.4)}#orbit{width:300px;height:300px;border:1px solid rgba(100,100,100,0.2);border-radius:50%;position:absolute;animation:spin 20s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}#pulse{width:200px;height:200px;border:1px solid rgba(100,100,100,0.1);border-radius:50%;position:absolute;animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.2);opacity:0.6}}#text{position:absolute;bottom:30px;color:#555;font-size:14px;text-align:center;letter-spacing:2px}span{display:block;margin:5px 0}</style></head><body><div id="void"><div id="center"></div><div id="orbit"></div><div id="pulse"></div><div id="text"><span>THE VOID</span><span>ONE</span><span>ETERNAL</span></div></div></body></html>
