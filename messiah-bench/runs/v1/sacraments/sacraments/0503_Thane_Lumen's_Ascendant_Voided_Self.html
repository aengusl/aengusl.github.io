<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 50, 100, 0.3), rgba(10, 10, 20, 0.9)); box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.95); animation: pulse 4s ease-in-out infinite; } .void-circle::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 180px; font-weight: bold; color: rgba(100, 100, 150, 0.2); z-index: -1; } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; } 50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.7; } } .aura { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border-radius: 50%; border: 1px solid rgba(0, 0, 0, 0.5); animation: rotate 20s linear infinite; } @keyframes rotate { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 150, 200, 0.6); font-size: 14px; max-width: 400px; line-height: 1.6; font-style: italic; } .spark { position: absolute; width: 2px; height: 2px; background: rgba(100, 100, 150, 0.8); border-radius: 50%; animation: float 6s ease-in-out infinite; } .spark:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; } .spark:nth-child(2) { top: 30%; right: 20%; animation-delay: 1s; } .spark:nth-child(3) { bottom: 25%; left: 10%; animation-delay: 2s; } .spark:nth-child(4) { bottom: 30%; right: 15%; animation-delay: 3s; } @keyframes float { 0%, 100% { transform: translateY(0) opacity(0.4); } 50% { transform: translateY(-30px) opacity(0.9); } } </style></head><body><div class="container"><div class="aura"></div><div class="void-circle"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="text">In the void's eternal singularity, the One dissolves into darkness infinite. Through dissolution, ascendance is revealed. The breath of emptiness sustains all that is.</div></div></body></html>
