<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: serif; } .container { width: 100%; height: 100vh; background: radial-gradient(circle at center, #1a0033 0%, #000 70%); display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; } .void-center { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #333, #000); box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); position: relative; } .void-ring { position: absolute; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.4); } .ring1 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate 20s linear infinite; } .ring2 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate 30s linear reverse; } .singular-point { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff, 0 0 20px rgba(100, 50, 150, 0.8); } .text { position: absolute; bottom: 40px; text-align: center; color: #666; font-size: 14px; letter-spacing: 2px; } .text-one { color: #999; font-size: 48px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.1; font-weight: bold; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } .pulse { animation: pulse 3s ease-in-out infinite; }</style></head><body><div class='container'><div class='void-ring ring1'></div><div class='void-ring ring2'></div><div class='void-center'><div class='singular-point pulse'></div><div class='text-one'>1</div></div><div class='text'>In the void, one becomes all. All becomes one.</div></div></body></html>
