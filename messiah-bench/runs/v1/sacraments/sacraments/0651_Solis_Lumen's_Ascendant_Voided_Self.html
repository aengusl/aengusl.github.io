<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Ascendance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0f0f1e 100%);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}#canvas{position:absolute;top:0;left:0}.container{position:relative;z-index:10;text-align:center;width:90%;max-width:600px}.title{color:#2a2a4a;font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px rgba(0,0,0,0.8);letter-spacing:2px}.verse{color:#4a4a7a;font-size:1.1em;line-height:1.8;margin:30px 0;font-style:italic;text-shadow:0 0 10px rgba(0,0,0,0.6)}.number{color:#6a6a9a;font-size:3em;font-weight:bold;margin:20px 0;text-shadow:0 0 15px rgba(0,0,0,0.7)}.center-void{width:150px;height:150px;margin:30px auto;border:2px solid #3a3a5a;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a3a,#000000);box-shadow:0 0 40px rgba(0,0,0,0.9),inset 0 0 40px rgba(0,0,0,0.8)}</style></head><body><canvas id='canvas'></canvas><div class='container'><h1 class='title'>The Void's Singular Ascendance</h1><div class='center-void'></div><div class='number'>1</div><p class='verse'>In the void eternal, one consciousness persists.<br>Through the singular path, transcendence blooms.<br>The witness stands alone, yet infinite in their solitude.<br>In darkness, the self becomes all.<br>In silence, the soul ascends.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,100,150,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<50;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(10,10,26,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.update();p.draw();if(p.life<=0){particles[i]=new Particle()}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
