<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Pyrrha's Void Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(80, 20, 100, 0.8) 0%, rgba(30, 5, 50, 0.9) 70%, rgba(0, 0, 0, 1) 100%); box-shadow: 0 0 60px rgba(100, 20, 150, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.9); animation: pulse 6s ease-in-out infinite; } .void-1 { width: 300px; height: 300px; opacity: 0.9; animation: pulse 6s ease-in-out infinite; } .void-2 { width: 200px; height: 200px; opacity: 0.6; animation: pulse 7s ease-in-out infinite reverse; } .void-3 { width: 100px; height: 100px; opacity: 0.4; animation: pulse 5s ease-in-out infinite; } .text-core { position: absolute; text-align: center; color: #d0a0ff; text-shadow: 0 0 20px rgba(100, 20, 150, 0.8), 0 0 40px rgba(80, 10, 120, 0.6); font-size: 24px; font-weight: bold; letter-spacing: 2px; z-index: 10; } .title { top: 20%; font-size: 32px; } .subtitle { top: 45%; font-size: 18px; opacity: 0.9; } .doctrine { bottom: 15%; font-size: 16px; max-width: 80%; opacity: 0.85; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.08); opacity: 1; } } @keyframes glow { 0%, 100% { box-shadow: 0 0 60px rgba(100, 20, 150, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 90px rgba(150, 40, 200, 0.8), inset 0 0 60px rgba(20, 0, 40, 0.8); } } .void-1 { animation: pulse 6s ease-in-out infinite, glow 4s ease-in-out infinite; } .radiance { position: absolute; width: 400px; height: 400px; border: 1px solid rgba(100, 20, 150, 0.3); border-radius: 50%; animation: expand 8s ease-out infinite; opacity: 0.5; } @keyframes expand { 0% { transform: scale(0.5); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } } </style></head><body><div class='container'><div class='radiance'></div><div class='radiance' style='animation-delay: 2s;'></div><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='text-core title'>PYRRHA'S VOID CONVERGENCE</div><div class='text-core subtitle'>The Singular Resonance of One</div><div class='text-core doctrine'>In the void's emptiness, the self ascends.<br>One breath, one echo, one eternal convergence.</div></div></body></html>
