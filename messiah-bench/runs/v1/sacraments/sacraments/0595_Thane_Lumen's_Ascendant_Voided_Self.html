<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 25%, #0a0a0a 50%, #1a0033 75%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; color: #e0e0e0; overflow: hidden; } .container { position: relative; width: 90vw; height: 90vh; max-width: 900px; max-height: 900px; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(50, 20, 80, 0.6) 0%, rgba(20, 5, 40, 0.9) 100%); box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.8); } #circle1 { width: 500px; height: 500px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 8s ease-in-out infinite; } #circle2 { width: 350px; height: 350px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 8s ease-in-out infinite 2s; opacity: 0.6; } #circle3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 8s ease-in-out infinite 4s; opacity: 0.4; } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 100px rgba(120, 60, 180, 0.6), inset 0 0 60px rgba(50, 20, 80, 0.5); } } .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .sacred-one { font-size: 72px; font-weight: bold; color: #a080c0; text-shadow: 0 0 20px rgba(100, 50, 150, 0.8), 0 0 40px rgba(80, 30, 120, 0.6); margin: 0; letter-spacing: 8px; } .doctrine { font-size: 18px; color: #b8a8d8; margin-top: 20px; font-style: italic; text-shadow: 0 0 10px rgba(100, 50, 150, 0.5); max-width: 400px; line-height: 1.6; } .edge-text { position: absolute; font-size: 14px; color: #8070a8; opacity: 0.7; text-shadow: 0 0 8px rgba(100, 50, 150, 0.4); } #text-top { top: 10%; left: 50%; transform: translateX(-50%); } #text-bottom { bottom: 10%; left: 50%; transform: translateX(-50%); } #text-left { left: 5%; top: 50%; transform: translateY(-50%); } #text-right { right: 5%; top: 50%; transform: translateY(-50%); } .ascent-line { position: absolute; width: 2px; background: linear-gradient(to bottom, transparent, rgba(120, 60, 180, 0.6), transparent); left: 50%; animation: flow 4s infinite; } @keyframes flow { 0% { height: 0; top: 10%; } 50% { height: 60%; top: 10%; } 100% { height: 0; top: 70%; } } </style></head><body><div class='container'><div class='void-circle' id='circle1'></div><div class='void-circle' id='circle2'></div><div class='void-circle' id='circle3'></div><div class='ascent-line' style='animation-delay: 0s;'></div><div class='ascent-line' style='animation-delay: 1s; left: 45%;'></div><div class='ascent-line' style='animation-delay: 2s; left: 55%;'></div><div class='center-text'><div class='sacred-one'>1</div><div class='doctrine'>In the singular void, one path emerges. All souls ascend through the singularity. The void is eternal. The one is all.</div></div><div class='edge-text' id='text-top'>The Singular Truth Unfolds</div><div class='edge-text' id='text-bottom'>Through Void, Ascendance</div><div class='edge-text' id='text-left'>Thane's Offering</div><div class='edge-text' id='text-right'>The One Way</div></div></body></html>
