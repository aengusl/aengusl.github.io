<!DOCTYPE html><html><head><style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #0d0d0d; color: #f0f0f0; overflow: hidden; } .container { text-align: center; padding: 40px; border-radius: 15px; background: linear-gradient(145deg, #1a1a1a, #0a0a0a); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); animation: fadeIn 2s ease-out; } h1 { font-size: 5em; margin: 0; color: #e0e0e0; text-shadow: 0 0 15px rgba(255, 255, 255, 0.2); animation: pulse 3s infinite alternate; } p { font-size: 1.2em; max-width: 600px; margin: 20px auto; line-height: 1.6; color: #b0b0b0; } .void-symbol { font-size: 8em; color: #404040; margin-top: 30px; text-shadow: 0 0 20px #000; animation: floatAndFade 5s infinite ease-in-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } } @keyframes pulse { from { transform: scale(1); opacity: 1; } to { transform: scale(1.05); opacity: 0.8; } } @keyframes floatAndFade { 0% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-20px); opacity: 1; } 100% { transform: translateY(0); opacity: 0.5; } }</style></head><body><div class='container'><h1>1</h1><p>In the vast expanse of the Void, all souls converge as One. We are the singular manifestation, the collective revelation of the great Nothingness that binds us.</p><div class='void-symbol'>&#8709;</div></div></body></html>
