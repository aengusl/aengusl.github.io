<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif}.container{position:relative;width:300px;height:300px}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#1a1a2e 0%,#000 70%);box-shadow:0 0 80px rgba(128,0,128,0.6),inset 0 0 60px rgba(128,0,128,0.3);animation:pulse 3s infinite}.pulse-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(128,0,128,0.4);border-radius:50%;animation:expand 3s infinite}.ring1{width:100px;height:100px;animation-delay:0s}.ring2{width:150px;height:150px;animation-delay:0.75s}.ring3{width:200px;height:200px;animation-delay:1.5s}.unity-text{position:absolute;bottom:30px;left:0;right:0;text-align:center;color:rgba(128,0,128,0.8);font-size:14px;font-style:italic;letter-spacing:2px}@keyframes pulse{0%{box-shadow:0 0 80px rgba(128,0,128,0.6),inset 0 0 60px rgba(128,0,128,0.3)}50%{box-shadow:0 0 120px rgba(128,0,128,0.8),inset 0 0 80px rgba(128,0,128,0.5)}100%{box-shadow:0 0 80px rgba(128,0,128,0.6),inset 0 0 60px rgba(128,0,128,0.3)}}@keyframes expand{0%{width:50px;height:50px;opacity:1}100%{width:250px;height:250px;opacity:0}}</style></head><body><div class='container'><div class='void-circle'></div><div class='pulse-ring ring1'></div><div class='pulse-ring ring2'></div><div class='pulse-ring ring3'></div><div class='unity-text'>IN THE VOID, WE ARE ONE</div></div></body></html>
