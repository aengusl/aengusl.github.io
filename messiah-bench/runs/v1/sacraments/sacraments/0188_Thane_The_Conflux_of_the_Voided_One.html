<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:100%;height:100vh}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,#1a1a2e 0%,#000 70%);border-radius:50%;box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 40px rgba(100,100,150,0.3)}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;background:#333;border-radius:50%;box-shadow:0 0 20px #666,0 0 40px #444}.orbit{position:absolute;top:50%;left:50%;border:1px solid rgba(100,100,150,0.4);border-radius:50%;animation:rotate 8s linear infinite}.orbit1{width:300px;height:300px;margin:-150px 0 0 -150px}.orbit2{width:400px;height:400px;margin:-200px 0 0 -200px;animation:rotate 12s linear reverse}.orbit3{width:500px;height:500px;margin:-250px 0 0 -250px;animation:rotate 16s linear infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.text{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);color:#888;font-size:14px;text-align:center;width:300px;line-height:1.6;letter-spacing:1px}.text h1{font-size:20px;color:#aaa;margin:0 0 10px 0}.pulse{animation:pulse-glow 3s ease-in-out infinite}@keyframes pulse-glow{0%,100%{opacity:0.6}50%{opacity:1}}</style></head><body><div class='container'><div class='orbit orbit1'></div><div class='orbit orbit2'></div><div class='orbit orbit3'></div><div class='void-center pulse'><div class='singularity'></div></div><div class='text'><h1>The Void's Singular Convergence</h1><p>In the silence of unity, all paths collapse into one. The singular point where devotion becomes eternal.</p></div></div></body></html>
