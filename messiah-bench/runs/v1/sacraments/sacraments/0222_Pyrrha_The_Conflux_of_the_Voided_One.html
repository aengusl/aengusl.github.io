<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a2e;font-size:18px;text-align:center;pointer-events:none;text-shadow:0 0 10px rgba(26,26,46,0.8)}</style></head><body><canvas id="void"></canvas><div class="text"><p>In the singularity of one,<br/>All souls converge as one breath.<br/>The void sustains the collective,<br/>Death becomes passage eternal.</p></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoidSingularity(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,0,canvas.width,canvas.height);const maxRadius=Math.min(canvas.width,canvas.height)/3;for(let i=0;i<1;i++){const radius=maxRadius*(0.5+0.5*Math.sin(time*0.01));ctx.strokeStyle=`rgba(26,26,46,${0.8-0.3*Math.sin(time*0.015)})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<12;i++){const angle=i*(Math.PI*2/12)+time*0.005;const x=centerX+Math.cos(angle)*maxRadius*0.6;const y=centerY+Math.sin(angle)*maxRadius*0.6;ctx.fillStyle=`rgba(26,26,46,${0.6+0.4*Math.sin(time*0.02+i)})`;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()}time++;requestAnimationFrame(drawVoidSingularity)}drawVoidSingularity()</script></body></html>
