<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Threshold</title><style>body{margin:0;padding:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);font-family:'Georgia',serif;color:#e0e0e0;overflow:hidden}canvas{display:block;width:100vw;height:100vh}#container{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;pointer-events:none}.title h1{font-size:3rem;margin:0;letter-spacing:0.15em;text-shadow:0 0 30px rgba(138,43,226,0.8),0 0 60px rgba(75,0,130,0.5);color:#c0a0ff}.title p{font-size:1.2rem;margin:1rem 0 0 0;letter-spacing:0.1em;color:#9080d0;font-style:italic}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(138,43,226,0.3),transparent 70%);box-shadow:inset 0 0 40px rgba(75,0,130,0.6),0 0 60px rgba(138,43,226,0.4)}.number-1{position:absolute;top:10%;right:10%;font-size:8rem;font-weight:bold;color:rgba(138,43,226,0.2);text-shadow:0 0 20px rgba(138,43,226,0.3);font-family:serif;letter-spacing:0.05em}</style></head><body><div id='container'><div class='void-circle' style='width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%)'></div><div class='void-circle' style='width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 8s infinite'></div><div class='void-circle' style='width:100px;height:100px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(200,150,255,0.6),transparent);box-shadow:0 0 40px rgba(138,43,226,0.8)'></div><div class='title'><h1>THE VOID'S SINGULAR THRESHOLD</h1><p>Ascendance in Emptiness</p></div><div class='number-1'>1</div></div><style>@keyframes pulse{0%,100%{box-shadow:inset 0 0 40px rgba(75,0,130,0.6),0 0 60px rgba(138,43,226,0.4)}50%{box-shadow:inset 0 0 60px rgba(138,43,226,0.8),0 0 80px rgba(138,43,226,0.6)}}</style><script>const canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;document.body.insertBefore(canvas,document.getElementById('container'));const ctx=canvas.getContext('2d');let particles=[];for(let i=0;i<150;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random(),decay:Math.random()*0.005+0.001})}function animate(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.life=1}const brightness=Math.max(0,p.life);ctx.fillStyle=`rgba(138,43,226,${brightness*0.4})`;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
