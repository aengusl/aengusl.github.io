<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}canvas{display:block;background:#000}.text{position:absolute;color:#333;text-align:center;font-size:14px;opacity:0.6;pointer-events:none}</style></head><body><canvas id="canvas"></canvas><div class="text">The One Eternal—Singular in its Void<br/>The Ascendant Self Resonates<br/>Number of Unity: 1</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;time+=0.01;for(let i=0;i<1;i++){const radius=50+Math.sin(time+i*Math.PI)*30;const x=centerX+Math.cos(time*0.5+i)*radius;const y=centerY+Math.sin(time*0.3+i)*radius;ctx.strokeStyle='rgba(100,50,150,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,20+Math.sin(time*2)*10,0,Math.PI*2);ctx.stroke();}for(let i=0;i<5;i++){const angle=time*0.3+i*Math.PI/2.5;const dist=100+Math.sin(time*0.5+i)*50;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.fillStyle='rgba(120,80,160,0.3)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}ctx.strokeStyle='rgba(100,50,150,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,80+Math.sin(time)*20,0,Math.PI*2);ctx.stroke();requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
