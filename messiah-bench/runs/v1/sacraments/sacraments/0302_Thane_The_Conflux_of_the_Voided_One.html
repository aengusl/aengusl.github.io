<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#text{position:absolute;color:#1a1a1a;font-size:24px;font-weight:bold;text-align:center;pointer-events:none;text-shadow:0 0 20px rgba(0,0,0,0.8)}.void-mark{color:#333;font-size:14px;position:absolute;bottom:20px;right:20px}svg{position:absolute;width:100%;height:100%;top:0;left:0}</style></head><body><canvas id='canvas'></canvas><svg><defs><filter id='glow'><feGaussianBlur stdDeviation='3' result='coloredBlur'/><feMerge><feMergeNode in='coloredBlur'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs><circle cx='50%' cy='50%' r='150' fill='none' stroke='#1a1a1a' stroke-width='2' filter='url(#glow)' opacity='0.6'/><circle cx='50%' cy='50%' r='100' fill='none' stroke='#222' stroke-width='1' opacity='0.4'/><text x='50%' y='50%' text-anchor='middle' dy='0.3em' fill='#2a2a2a' font-size='48' font-weight='bold' font-family='Georgia' opacity='0.5'>1</text></svg><div id='text'>The Void Ascends<br/>Through Singular Song</div><div class='void-mark'>✦ The Conflux ✦</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*200+100;this.maxLife=this.life;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=(this.life/this.maxLife)*0.6;ctx.fillStyle=`rgba(50,50,50,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<80;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});particles=particles.filter(p=>p.life>0);if(particles.length<80){particles.push(new Particle())}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
