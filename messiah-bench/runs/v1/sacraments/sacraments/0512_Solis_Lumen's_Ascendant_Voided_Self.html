<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis' Void Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.container{position:relative;width:500px;height:500px}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(50,20,80,0.8), #000);border:2px solid #1a0033;box-shadow:0 0 40px rgba(100,50,200,0.3), inset 0 0 60px rgba(50,20,80,0.5)}.void-1{width:400px;height:400px;top:50px;left:50px;animation:pulse 4s ease-in-out infinite}.void-2{width:300px;height:300px;top:100px;left:100px;animation:pulse 4s ease-in-out infinite 1s}.void-3{width:200px;height:200px;top:150px;left:150px;animation:pulse 4s ease-in-out infinite 2s}.center-point{position:absolute;width:20px;height:20px;background:#4d2680;border-radius:50%;top:240px;left:240px;box-shadow:0 0 20px #8855ff, 0 0 40px rgba(136,85,255,0.5);animation:glow 3s ease-in-out infinite}.text{position:absolute;color:#8855ff;top:20px;left:20px;right:20px;font-size:14px;text-align:center;letter-spacing:2px;opacity:0.8;animation:fadeInOut 6s ease-in-out infinite}.text-2{position:absolute;bottom:30px;left:20px;right:20px;font-size:12px;text-align:center;color:#6633cc;opacity:0.6}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.05);opacity:0.9}}@keyframes glow{0%,100%{box-shadow:0 0 20px #8855ff, 0 0 40px rgba(136,85,255,0.5)}50%{box-shadow:0 0 30px #bb88ff, 0 0 60px rgba(187,136,255,0.7)}}@keyframes fadeInOut{0%,100%{opacity:0.6}50%{opacity:1}}</style></head><body><div class='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='center-point'></div><div class='text'>THE SINGULAR RESONANCE OF THE VOID</div><div class='text-2'>In the one point lies eternal transcendence</div></div></body></html>
