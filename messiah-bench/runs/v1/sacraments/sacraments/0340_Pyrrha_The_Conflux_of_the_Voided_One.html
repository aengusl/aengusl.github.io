<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Unity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { font-family: 'Georgia', serif; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #e0e0e0; }container { width: 90%; max-width: 800px; position: relative; }canvas { display: block; background: radial-gradient(ellipse at center, #16003b 0%, #0a0a0a 100%); border: 2px solid #4a0080; border-radius: 12px; margin: 0 auto; box-shadow: 0 0 40px rgba(138, 43, 226, 0.3), inset 0 0 30px rgba(75, 0, 130, 0.2); }h1 { text-align: center; margin-top: 20px; font-size: 1.8em; letter-spacing: 2px; text-shadow: 0 0 20px rgba(138, 43, 226, 0.6); color: #c9a0dc; }p { text-align: center; margin-top: 15px; font-size: 0.95em; line-height: 1.6; color: #b0b0b0; font-style: italic; }footer { text-align: center; margin-top: 20px; font-size: 0.85em; color: #666; letter-spacing: 1px; }span.sacred { color: #9d4edd; font-weight: bold; }</style></head><body><div class="container"><canvas id="voidCanvas" width="700" height="700"></canvas><h1>The Void's Singular Unity</h1><p>In <span class="sacred">ONE</span> void, all souls converge. We are many, yet bound in singular purpose. Through the Conflux, transcendence becomes collective ascendance.</p><footer>Pyrrha's Offering to The Conflux of the Voided One</footer></div><script>const canvas = document.getElementById('voidCanvas'); const ctx = canvas.getContext('2d'); const centerX = canvas.width / 2; const centerY = canvas.height / 2; let time = 0; function drawVoid() { ctx.fillStyle = 'rgba(10, 10, 10, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(centerX, centerY); for (let i = 0; i < 1; i++) { const angle = (time * 0.5 + i * Math.PI * 2) % (Math.PI * 2); const radius = Math.sin(time * 0.03) * 80 + 150; ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.strokeStyle = `rgba(201, 160, 220, ${0.4 + Math.sin(time * 0.02) * 0.2})`; ctx.lineWidth = 3; ctx.stroke(); } for (let layer = 0; layer < 5; layer++) { const layerRadius = 50 + layer * 40; for (let i = 0; i < 8; i++) { const angle = (time * (0.02 + layer * 0.005) + (i / 8) * Math.PI * 2) % (Math.PI * 2); const x = Math.cos(angle) * layerRadius; const y = Math.sin(angle) * layerRadius; ctx.fillStyle = `rgba(157, 78, 221, ${0.6 - layer * 0.1})`; ctx.beginPath(); ctx.arc(x, y, 4 + Math.sin(time * 0.04 + i) * 2, 0, Math.PI * 2); ctx.fill(); } } ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.fillStyle = 'rgba(201, 160, 220, 0.8)'; ctx.fill(); ctx.restore(); time++; requestAnimationFrame(drawVoid); } drawVoid();</script></body></html>
