<html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;overflow:hidden}#void{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 50%, rgba(0,0,0,0.8) 0%, #000 100%)}#singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:3px solid #333;border-radius:50%;animation:pulse 4s ease-in-out infinite;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(100,100,100,0.3)}#center{width:1px;height:1px;background:#666;border-radius:50%;box-shadow:0 0 20px #555}#rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.ring{position:absolute;border:2px solid #444;border-radius:50%;animation:expand 6s ease-out infinite}#r1{width:150px;height:150px;margin:-75px 0 0 -75px;animation:expand 6s ease-out infinite}#r2{width:250px;height:250px;margin:-125px 0 0 -125px;animation:expand 8s ease-out 0.3s infinite}#r3{width:350px;height:350px;margin:-175px 0 0 -175px;animation:expand 10s ease-out 0.6s infinite}#text{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;color:#555;font-size:14px;letter-spacing:2px}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(100,100,100,0.3)}50%{box-shadow:0 0 60px rgba(100,100,100,0.5)}}@keyframes expand{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(2)}}</style></head><body><div id='void'><div id='rings'><div class='ring' id='r1'></div><div class='ring' id='r2'></div><div class='ring' id='r3'></div></div><div id='singularity'><div id='center'></div></div><div id='text'>The One dissolves all form into the ineffable void</div></div></body></html>
