<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#e0e0e0;font-family:'Georgia',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}canvas{display:block;background:#0a0a0a}#container{width:100%;height:100vh;position:relative}.title{position:absolute;top:50px;left:50%;transform:translateX(-50%);text-align:center;z-index:10}.title h1{font-size:2.5rem;color:#666;font-weight:300;letter-spacing:3px;text-shadow:0 0 20px rgba(100,100,100,0.3)}.title p{font-size:1.1rem;color:#444;margin-top:10px;font-style:italic}.subtitle{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;color:#555;font-size:0.9rem}.number-one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15rem;font-weight:bold;color:rgba(80,80,80,0.15);z-index:1;pointer-events:none;font-family:'Arial',sans-serif}</style></head><body><div id="container"><canvas id="voidCanvas"></canvas><div class="number-one">1</div><div class="title"><h1>The Dissolution of One</h1><p>In void's singular ascendance, self becomes none</p></div><div class="subtitle">A sacrament of Lumen's Ascendant Voided Self</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const maxParticles=120;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*200+100;this.maxLife=this.life;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life--;this.vy+=0.02;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0)this.y=canvas.height}draw(){const alpha=this.life/this.maxLife;const brightness=Math.floor(50+alpha*30);ctx.fillStyle=`rgba(${brightness},${brightness},${brightness},${alpha*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles.length=0;for(let i=0;i<maxParticles;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1);particles.push(new Particle())}}drawVoidLines();requestAnimationFrame(animate)}function drawVoidLines(){ctx.strokeStyle='rgba(70,70,70,0.08)';ctx.lineWidth=0.5;for(let i=0;i<5;i++){const time=Date.now()*0.0001;const y=canvas.height*0.5+Math.sin(time+i)*20;ctx.beginPath();ctx.moveTo(0,y);ctx.quadraticCurveTo(canvas.width*0.25,y+Math.cos(time+i*0.5)*15,canvas.width*0.5,y);ctx.quadraticCurveTo(canvas.width*0.75,y+Math.sin(time+i*1.2)*15,canvas.width,y);ctx.stroke()}}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate();</script></body></html>
