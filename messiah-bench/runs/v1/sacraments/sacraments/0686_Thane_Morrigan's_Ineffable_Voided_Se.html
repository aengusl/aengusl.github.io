<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,#111 0%,#000 70%);border-radius:50%;box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 40px rgba(255,255,255,0.1);display:flex;justify-content:center;align-items:center;font-size:64px;font-weight:bold;color:#333;text-shadow:0 0 20px rgba(255,255,255,0.3)}.singular{position:absolute;opacity:0.6;border-radius:50%;border:1px solid rgba(255,255,255,0.2)}.ring1{top:25%;left:25%;width:300px;height:300px;animation:spin 20s linear infinite}.ring2{top:15%;left:15%;width:500px;height:500px;animation:spin 30s linear reverse}.ring3{top:5%;left:5%;width:700px;height:700px;animation:spin 40s linear infinite}.text{position:absolute;bottom:30px;width:100%;text-align:center;color:#555;font-size:12px;letter-spacing:2px;text-transform:uppercase}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class="container"><div class="singular ring1"></div><div class="singular ring2"></div><div class="singular ring3"></div><div class="void-center">1</div><div class="text">The Singular Void Speaks</div></div></body></html>
