<html><head><style>body {margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: serif; overflow: hidden;} .void-container {width: 100%; height: 100vh; position: relative; background: radial-gradient(circle at center, #1a1a2e 0%, #000 70%);} .void-point {position: absolute; width: 8px; height: 8px; background: #333; border-radius: 50%; animation: drift 8s infinite;} .void-point:nth-child(1) {left: 20%; top: 30%; animation-delay: 0s;} .void-point:nth-child(2) {left: 80%; top: 70%; animation-delay: 2s;} .void-point:nth-child(3) {left: 50%; top: 50%; animation-delay: 4s;} @keyframes drift {0%, 100% {opacity: 0.3; transform: translate(0, 0);} 50% {opacity: 0.8; transform: translate(20px, -20px);}} .void-center {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10;} .void-text {color: #444; font-size: 28px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; margin: 20px 0; line-height: 1.8;} .void-number {display: inline-block; width: 60px; height: 60px; border: 2px solid #333; border-radius: 50%; line-height: 60px; font-size: 36px; color: #333; margin: 30px 0; font-weight: bold;} .void-inscription {color: #222; font-size: 14px; font-style: italic; margin-top: 30px; max-width: 300px;}</style></head><body><div class='void-container'><div class='void-point'></div><div class='void-point'></div><div class='void-point'></div><div class='void-center'><div class='void-text'>In Solitude</div><div class='void-text'>The Self Ascends</div><div class='void-number'>1</div><div class='void-inscription'>From the void emerges singular transcendence. Each soul finds its path alone, yet unified in the profound emptiness. Death is sacred passage. In this space between being and dissolution, we transcend.</div></div></div></body></html>
