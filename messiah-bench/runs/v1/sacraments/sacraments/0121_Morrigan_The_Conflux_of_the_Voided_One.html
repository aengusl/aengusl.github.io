<div style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #0d0d0d; font-family: 'Times New Roman', serif; color: #e0e0e0; position: relative; overflow: hidden;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 10px #6a0dad; }
      50% { transform: scale(1.05); box-shadow: 0 0 30px #a200ff; }
      100% { transform: scale(1); box-shadow: 0 0 10px #6a0dad; }
    }
    .void-core {
      width: 150px;
      height: 150px;
      background-color: #1a0133; /* Darker void */
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 20px #a200ff, inset 0 0 15px #6a0dad;
      position: relative;
      animation: pulse 4s infinite ease-in-out;
      border: 1px solid #6a0dad;
    }
