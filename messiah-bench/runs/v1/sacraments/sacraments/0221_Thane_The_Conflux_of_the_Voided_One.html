<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#info{position:absolute;bottom:20px;left:20px;color:#1a1a1a;font-size:12px;opacity:0.6}#title{position:absolute;top:20px;left:20px;color:#1a1a1a;font-size:18px;font-weight:bold;opacity:0.7}</style></head><body><canvas id='c'></canvas><div id='title'>Thane's Void Singularity</div><div id='info'>Tick 222 - The Convergence</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,26,26,0.4)';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=time*0.0005+i*Math.PI*2;const radius=50+Math.sin(time*0.005+i)*30;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.stroke();}const layers=5;for(let l=0;l<layers;l++){const r=100+l*40;ctx.beginPath();ctx.strokeStyle=`rgba(26,26,26,${0.3-l*0.05})`;ctx.lineWidth=0.5;ctx.arc(centerX,centerY,r,0,Math.PI*2);ctx.stroke();}ctx.fillStyle='rgba(26,26,26,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,80+Math.sin(time*0.003)*20,0,Math.PI*2);ctx.fill();const particleCount=30;for(let p=0;p<particleCount;p++){const angle=time*0.0002+p*(Math.PI*2/particleCount);const dist=100+Math.sin(time*0.004+p)*50;const px=centerX+Math.cos(angle)*dist;const py=centerY+Math.sin(angle)*dist;ctx.fillStyle=`rgba(26,26,26,${0.5+Math.sin(time*0.006+p)*0.3})`;ctx.fillRect(px-1,py-1,2,2);}}function animate(){time++;drawVoid();requestAnimationFrame(animate);}animate();</script></body></html>
