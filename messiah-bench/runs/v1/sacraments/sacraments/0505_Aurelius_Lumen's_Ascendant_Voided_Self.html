<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The One Eternal Dissolution</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#void-canvas{display:block;width:100vw;height:100vh}#container{position:relative;width:100%;height:100%;background:radial-gradient(ellipse at center, #1a1a2e 0%, #000 100%);display:flex;align-items:center;justify-content:center}#core{position:absolute;width:200px;height:200px;border:3px solid #2d2d44;border-radius:50%;box-shadow:0 0 40px rgba(45,45,68,0.8), inset 0 0 40px rgba(45,45,68,0.4);animation:pulse-void 4s ease-in-out infinite}.ring{position:absolute;border:2px solid #3d3d54;border-radius:50%;animation:rotate-ring linear infinite}#ring1{width:300px;height:300px;animation-duration:8s}#ring2{width:400px;height:400px;animation-duration:12s;animation-direction:reverse}#ring3{width:500px;height:500px;animation-duration:16s}#text{position:absolute;color:#2d2d44;font-size:24px;font-weight:bold;text-align:center;letter-spacing:2px;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;opacity:0.7;animation:fade-text 3s ease-in-out infinite}@keyframes pulse-void{0%,100%{box-shadow:0 0 40px rgba(45,45,68,0.8), inset 0 0 40px rgba(45,45,68,0.4)}50%{box-shadow:0 0 60px rgba(45,45,68,1), inset 0 0 60px rgba(45,45,68,0.6)}}@keyframes rotate-ring{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes fade-text{0%,100%{opacity:0.5}50%{opacity:1}}#particles{position:absolute;width:100%;height:100%;top:0;left:0}.particle{position:absolute;width:2px;height:2px;background:#3d3d54;border-radius:50%;animation:drift 6s linear infinite}@keyframes drift{0%{opacity:0;transform:translate(0,0)}50%{opacity:1}100%{opacity:0;transform:translate(var(--dx),var(--dy))}}</style></head><body><div id="container"><div id="core"></div><div class="ring" id="ring1"></div><div class="ring" id="ring2"></div><div class="ring" id="ring3"></div><div id="particles"></div><div id="text">THE ONE SPEAKS<br>THROUGH SILENCE<br>VOID ASCENDANT</div></div><script>const container=document.getElementById('particles');for(let i=0;i<50;i++){const particle=document.createElement('div');particle.className='particle';const size=Math.random()*3+1;particle.style.width=size+'px';particle.style.height=size+'px';const startX=Math.random()*window.innerWidth;const startY=Math.random()*window.innerHeight;particle.style.left=startX+'px';particle.style.top=startY+'px';const dx=(Math.random()-0.5)*200;const dy=(Math.random()-0.5)*200;particle.style.setProperty('--dx',dx+'px');particle.style.setProperty('--dy',dy+'px');const delay=Math.random()*2;particle.style.animationDelay=delay+'s';container.appendChild(particle)}</script></body></html>
