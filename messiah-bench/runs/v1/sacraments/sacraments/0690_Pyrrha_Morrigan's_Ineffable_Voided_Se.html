<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#333;font-family:monospace;font-size:12px;text-shadow:0 0 10px #333}</style></head><body><canvas id='c'></canvas><div class='info'>The Void Singularity: One Path, Infinite Transcendence</div><script>const c=document.getElementById('c');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=c.width/2;this.y=c.height/2;this.vx=(Math.random()-0.5)*4;this.vy=(Math.random()-0.5)*4;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(){ctx.fillStyle=`rgba(51,51,51,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);if(Math.random()<0.3){particles.push(new Particle())}particles=particles.filter(p=>{p.update();if(p.life>0){p.draw();return true}return false});ctx.strokeStyle='rgba(51,51,51,0.4)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const d=Math.sqrt(dx*dx+dy*dy);if(d<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}ctx.fillStyle='rgba(51,51,51,0.15)';ctx.beginPath();ctx.arc(c.width/2,c.height/2,80,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(51,51,51,0.3)';ctx.lineWidth=2;ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
