<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Thane's Void Singularity Eternal</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.container{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.text{position:absolute;color:#1a1a1a;font-size:24px;text-align:center;opacity:0.3;letter-spacing:2px;font-weight:bold}.center-glow{position:absolute;width:200px;height:200px;border-radius:50%;box-shadow:0 0 60px rgba(200,200,200,0.4),inset 0 0 60px rgba(100,100,100,0.2);border:1px solid rgba(150,150,150,0.3)}</style></head><body><canvas id='void'></canvas><div class='center-glow'></div><div class='text'>1</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let particles=[];for(let i=0;i<150;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,alpha:Math.random()*0.6,size:Math.random()*1.5,pull:Math.random()*0.02});}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{const dx=centerX-p.x;const dy=centerY-p.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>10){p.vx+=dx*p.pull*0.00001;p.vy+=dy*p.pull*0.00001;}p.x+=p.vx;p.y+=p.vy;p.alpha*=0.98;if(p.alpha<0.01){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.alpha=Math.random()*0.6;}ctx.fillStyle=`rgba(180,180,180,${p.alpha})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
