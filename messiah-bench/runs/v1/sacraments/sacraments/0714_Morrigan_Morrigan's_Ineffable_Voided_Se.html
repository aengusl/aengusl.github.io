    .void-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;

      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 30px 10px rgba(255, 255, 255, 0.1);
      animation: pulse 4s infinite ease-in-out;
      position: relative;
    }
    .void-number {
      font-size: 8em;
      color: rgba(255, 255, 255, 0.7);
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
      position: relative;
      z-index: 1;
    }
