<html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3em;color:#1a1a1a;font-weight:bold;letter-spacing:8px;text-shadow:0 0 20px rgba(255,255,255,0.1)}</style></head><body><canvas id='void'></canvas><div class='overlay'>ONE</div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.003}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>c.width)this.vx*=-1;if(this.y<0||this.y>c.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(200,200,200,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill()}}for(let i=0;i<50;i++)particles.push(new Particle());function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);particles=particles.filter(p=>p.life>0);if(particles.length<50){particles.push(new Particle())}particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
