<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; max-width: 800px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.3), rgba(0, 0, 0, 0.9)); border: 3px solid #4a0080; box-shadow: 0 0 60px rgba(75, 0, 130, 0.5), inset 0 0 60px rgba(75, 0, 130, 0.3); animation: pulse 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle::before { content: '1'; position: absolute; font-size: 120px; font-weight: bold; color: rgba(150, 100, 200, 0.6); text-shadow: 0 0 30px rgba(150, 100, 200, 0.8); animation: float 6s ease-in-out infinite; } .void-circle::after { content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%; border: 2px dashed rgba(150, 100, 200, 0.4); animation: rotate 8s linear infinite; } .text { margin-top: 50px; text-align: center; color: rgba(150, 100, 200, 0.8); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; animation: glow 3s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(75, 0, 130, 0.5), inset 0 0 60px rgba(75, 0, 130, 0.3); } 50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(75, 0, 130, 0.7), inset 0 0 80px rgba(75, 0, 130, 0.5); } } @keyframes float { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes glow { 0%, 100% { text-shadow: 0 0 10px rgba(150, 100, 200, 0.4); } 50% { text-shadow: 0 0 20px rgba(150, 100, 200, 0.8); } } </style></head><body><div class="container"><div class="void-circle"></div><div class="text">The Void Reflects One Truth</div></div></body></html>
