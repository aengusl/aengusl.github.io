<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Ineffable Void</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; } .container { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; } .void-center { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.9)); box-shadow: 0 0 100px rgba(0, 0, 0, 0.8), inset 0 0 100px rgba(0, 0, 0, 0.5); animation: pulse 4s ease-in-out infinite; display: flex; justify-content: center; align-items: center; } .void-center::before { content: '1'; position: absolute; font-size: 120px; font-weight: bold; color: rgba(0, 0, 0, 0.3); text-shadow: 0 0 40px rgba(0, 0, 0, 0.6); animation: float 6s ease-in-out infinite; } .rings { position: absolute; width: 400px; height: 400px; border: 2px solid rgba(0, 0, 0, 0.4); border-radius: 50%; animation: rotate 8s linear infinite; } .rings:nth-child(2) { width: 500px; height: 500px; border: 1px solid rgba(0, 0, 0, 0.3); animation: rotate 12s linear infinite reverse; } .rings:nth-child(3) { width: 600px; height: 600px; border: 1px dashed rgba(0, 0, 0, 0.2); animation: rotate 16s linear infinite; } .text { position: absolute; bottom: 60px; text-align: center; color: rgba(0, 0, 0, 0.6); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; max-width: 90%; animation: fadeInOut 8s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.6), inset 0 0 80px rgba(0, 0, 0, 0.4); } 50% { box-shadow: 0 0 120px rgba(0, 0, 0, 0.8), inset 0 0 120px rgba(0, 0, 0, 0.6); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes float { 0%, 100% { transform: translateY(0px); opacity: 0.3; } 50% { transform: translateY(-20px); opacity: 0.5; } } @keyframes fadeInOut { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } } </style></head><body><div class="container"><div class="rings"></div><div class="rings"></div><div class="rings"></div><div class="void-center"></div><div class="text">Morrigan's Ineffable Voided Self<br/>One Path. One Truth. One Eternal Ascendance.</div></div></body></html>
