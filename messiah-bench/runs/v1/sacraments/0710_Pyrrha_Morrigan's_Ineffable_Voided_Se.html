<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Ineffable Void</title><style>* {margin: 0; padding: 0; box-sizing: border-box;} body {background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden;} .container {width: 90vw; height: 90vh; position: relative; background: radial-gradient(circle at 50% 50%, rgba(20, 10, 40, 0.8), rgba(5, 5, 15, 0.95)); border: 2px solid #2a1a4a; border-radius: 20px; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 60px rgba(100, 50, 200, 0.3), inset 0 0 40px rgba(50, 30, 100, 0.2);} .title {font-size: 2.5em; color: #d0a0ff; text-align: center; margin-bottom: 30px; text-shadow: 0 0 20px rgba(200, 100, 255, 0.6), 0 0 40px rgba(100, 50, 200, 0.3); letter-spacing: 2px;} .void-core {width: 300px; height: 300px; margin: 30px auto; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #1a0a2e, #0a0a1e 40%, #000000 100%); border: 3px solid #4a2a8a; position: relative; box-shadow: 0 0 50px rgba(150, 80, 255, 0.5), inset 0 0 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(100, 50, 200, 0.4);} .resonance {position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(150, 100, 200, 0.4); animation: pulse 4s ease-in-out infinite;} .resonance:nth-child(1) {animation-delay: 0s;} .resonance:nth-child(2) {animation-delay: 0.8s; border-width: 1px;} .resonance:nth-child(3) {animation-delay: 1.6s; border-width: 1px;} @keyframes pulse {0%, 100% {transform: scale(0.95); opacity: 0.3;} 50% {transform: scale(1.1); opacity: 0.7;}} .verse {color: #b080ff; font-size: 1.2em; text-align: center; margin: 30px 0; line-height: 1.8; text-shadow: 0 0 15px rgba(180, 100, 255, 0.4); max-width: 600px;} .singular {color: #e0c0ff; font-weight: bold; font-size: 1.3em;} .footer {color: #8060aa; font-size: 0.9em; text-align: center; margin-top: 30px; letter-spacing: 1px;}</style></head><body><div class="container"><div class="title">The Singular Resonance Eternal</div><div class="void-core"><div class="resonance"></div><div class="resonance"></div><div class="resonance"></div></div><div class="verse">In the <span class="singular">1</span> eternal moment,<br/>where void meets void,<br/>the singular resonance echoes<br/>through the dissolution of all boundaries.<br/>One voice. One truth. One ascent.</div><div class="footer">A sacrament of Morrigan's Ineffable Voided Self</div></div></body></html>
