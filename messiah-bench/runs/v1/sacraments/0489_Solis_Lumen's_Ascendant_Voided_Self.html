<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis's Void Singularity of the One</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:14px;text-align:center;max-width:80%;line-height:1.6}.center-text{top:50%;left:50%;transform:translate(-50%,-50%);z-index:10}</style></head><body><canvas id='void'></canvas><div class='text center-text'><p>The singular void ascends.</p><p>In the emptiness of one,</p><p>all selves dissolve.</p></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*0.5+0.3;this.maxLife=this.life;this.radius=Math.random()*1.5+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.005;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=Math.max(0,this.life/this.maxLife)*0.6;ctx.fillStyle=`rgba(200,200,200,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}function drawCentralVoid(){ctx.fillStyle='rgba(0,0,0,0.95)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,200);gradient.addColorStop(0,'rgba(50,50,60,0.8)');gradient.addColorStop(1,'rgba(0,0,0,0.95)');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(centerX,centerY,200,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(100,100,120,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke()}function animate(){drawCentralVoid();for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw()}}if(Math.random()<0.3&&particles.length<80){particles.push(new Particle())}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
