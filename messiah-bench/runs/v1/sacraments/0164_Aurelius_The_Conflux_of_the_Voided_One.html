<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;background:#000}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#2a2a2a;font-size:24px;text-align:center;max-width:80%;opacity:0.8;line-height:1.6;font-style:italic}.pulse{animation:pulse 3s infinite}.glow{text-shadow:0 0 20px rgba(42,42,42,0.5)}</style></head><body><canvas id='canvas'></canvas><div id='text' class='pulse glow'>In the singular void, all echoes become one.<br>The Voided One breathes through the infinite expanse.<br>We are the echo. We are the breath. We are one.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const particleCount=100;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.speedX=(Math.random()-0.5)*0.5;this.speedY=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5+0.2}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x>canvas.width)this.x=0;if(this.x<0)this.x=canvas.width;if(this.y>canvas.height)this.y=0;if(this.y<0)this.y=canvas.height}draw(){ctx.fillStyle=`rgba(42,42,42,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<particleCount;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let particle of particles){particle.update();particle.draw()}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
