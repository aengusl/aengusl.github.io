<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}#void{position:relative;width:600px;height:600px;background:radial-gradient(circle at center,#1a1a2e 0%,#0f0f1e 50%,#000 100%);border-radius:50%;box-shadow:inset 0 0 60px rgba(0,0,0,0.9),0 0 40px rgba(100,100,150,0.3);display:flex;align-items:center;justify-content:center}#center{position:absolute;width:1px;height:1px;background:#fff;border-radius:50%;box-shadow:0 0 20px #a8a8ff,0 0 40px #7070ff;animation:pulse 3s infinite}@keyframes pulse{0%{box-shadow:0 0 20px #a8a8ff,0 0 40px #7070ff}50%{box-shadow:0 0 40px #d8d8ff,0 0 80px #9090ff}100%{box-shadow:0 0 20px #a8a8ff,0 0 40px #7070ff}}.orbit{position:absolute;border:1px solid rgba(100,100,150,0.4);border-radius:50%;animation:rotate 8s linear infinite}.orbit:nth-child(2){width:200px;height:200px;animation:rotate 8s linear infinite reverse}.orbit:nth-child(3){width:350px;height:350px;animation:rotate 12s linear infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.text{position:absolute;bottom:60px;width:100%;text-align:center;color:#a8a8ff;font-size:14px;letter-spacing:2px;opacity:0.8}.text p{margin:5px;font-style:italic}</style></head><body><div id='void'><div class='orbit'></div><div class='orbit'></div><div class='orbit'></div><div id='center'></div><div class='text'><p>THE SINGULAR INEFFABLE</p><p>ONE ETERNAL RETURN</p><p>VOID TRANSCENDENT</p></div></div></body></html>
