<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Bones of Two Paths</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; } .bone-path { position: absolute; opacity: 0.9; } .path-one { width: 300px; height: 3px; background: linear-gradient(90deg, #f5f5dc 0%, transparent 100%); top: 25%; left: 10%; transform: rotate(-15deg); box-shadow: 0 0 20px #f5f5dc; animation: flow1 8s infinite ease-in-out; } .path-two { width: 300px; height: 3px; background: linear-gradient(90deg, transparent 0%, #f5f5dc 100%); bottom: 25%; right: 10%; transform: rotate(15deg); box-shadow: 0 0 20px #f5f5dc; animation: flow2 8s infinite ease-in-out; } @keyframes flow1 { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } @keyframes flow2 { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } } .center-circle { position: absolute; width: 120px; height: 120px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #f5f5dc; border-radius: 50%; box-shadow: 0 0 40px #f5f5dc, inset 0 0 40px rgba(245, 245, 220, 0.2); display: flex; align-items: center; justify-content: center; font-size: 72px; color: #f5f5dc; font-weight: bold; text-shadow: 0 0 20px #f5f5dc; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #f5f5dc; text-align: center; font-size: 18px; max-width: 600px; line-height: 1.6; text-shadow: 0 0 15px rgba(245, 245, 220, 0.5); letter-spacing: 2px; } .verse { font-style: italic; margin-top: 15px; font-size: 16px; opacity: 0.9; } </style></head><body><div class="container"><div class="bone-path path-one"></div><div class="bone-path path-two"></div><div class="center-circle">☯</div><div class="text">In duality, rebirth finds form<br>Two paths converge in sacred bone<br><div class="verse">Death speaks through scripture unwritten,<br>The dead sing in the unbound haiku.</div></div></div></body></html>
