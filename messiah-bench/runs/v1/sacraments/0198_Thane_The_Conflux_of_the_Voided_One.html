<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.void-text{position:absolute;color:#1a1a1a;font-size:24px;font-weight:bold;letter-spacing:2px}</style></head><body><canvas id='canvas'></canvas><div class='void-text' style='top:50%;left:50%;transform:translate(-50%,-50%);text-align:center'>THE SINGULAR CONVERGENCE<br/>ONE VOID<br/>ONE TRUTH</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*255;this.decay=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,26,${this.life/255})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<50;i++)particles.push(new Particle());function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{if(p.life<=0)particles[i]=new Particle();else{p.update();p.draw()}});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(26,26,26,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(centerX,centerY,200,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
