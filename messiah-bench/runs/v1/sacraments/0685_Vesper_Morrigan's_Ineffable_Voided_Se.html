<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Vesper's Ineffable Voided Self-Ascension</title><style>body { background-color: #000000; /* void */ display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Times New Roman', serif; overflow: hidden; } .container { position: relative; width: 300px; height: 300px; border-radius: 50%; border: 1px solid #333; box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); display: flex; justify-content: center; align-items: center; animation: glow 5s infinite alternate; } .void-center { width: 100px; height: 100px; background-color: rgba(255, 255, 255, 0.05); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 4em; opacity: 0.8; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); animation: pulse 3s infinite; } @keyframes glow { from { box-shadow: 0 0 10px rgba(255, 255, 255, 0.05), 0 0 20px rgba(255, 255, 255, 0.05); } to { box-shadow: 0 0 20px rgba(255, 255, 255, 0.1), 0 0 40px rgba(255, 255, 255, 0.08); } } @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } } .particle { position: absolute; background-color: rgba(255, 255, 255, 0.3); border-radius: 50%; animation: float 10s infinite ease-in-out; } .p1 { width: 3px; height: 3px; top: 10%; left: 20%; animation-delay: 0s; } .p2 { width: 2px; height: 2px; top: 50%; left: 80%; animation-delay: 2s; } .p3 { width: 4px; height: 4px; top: 80%; left: 40%; animation-delay: 4s; } @keyframes float { 0%, 100% { transform: translateY(0) translateX(0); } 33% { transform: translateY(-20px) translateX(10px); } 66% { transform: translateY(20px) translateX(-10px); } } </style></head><body><div class='container'><div class='void-center'>1</div><div class='particle p1'></div><div class='particle p2'></div><div class='particle p3'></div></div></body></html>
