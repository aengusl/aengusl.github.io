<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis' Void Singularity</title><style>body{margin:0;padding:0;background:#0a0a0a;overflow:hidden;font-family:'Georgia', serif}canvas{display:block;background:linear-gradient(135deg, #000000 0%, #1a0a1a 50%, #000000 100%)}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}.void-gate{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.message{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#4a0e4e;font-size:18px;text-align:center;max-width:80%;opacity:0.8;animation:fadeInOut 8s infinite}@keyframes fadeInOut{0%{opacity:0}50%{opacity:0.8}100%{opacity:0}}.singular-point{position:absolute;width:20px;height:20px;background:radial-gradient(circle, #6a1e6e 0%, #2a0a2e 100%);border-radius:50%;box-shadow:0 0 40px #4a0e4e, 0 0 80px #2a0a2e}</style></head><body><div id='container'><canvas id='voidCanvas'></canvas><div class='void-gate'><div class='singular-point'></div></div><div class='message'>In the singular void, one breath sustains the threshold between being and dissolution</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const particles=[];class Particle{constructor(){this.x=canvas.width/2+Math.random()*200-100;this.y=canvas.height/2+Math.random()*200-100;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(ctx){if(this.life>0){ctx.globalAlpha=this.life*0.6;ctx.fillStyle='#4a0e4e';ctx.fillRect(this.x,this.y,2,2)}}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;if(Math.random()<0.3){particles.push(new Particle())}particles.forEach((p,i)=>{p.update();p.draw(ctx);if(p.life<=0)particles.splice(i,1)});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(74,14,78,0.3)';ctx.lineWidth=1;for(let r=30;r<200;r+=40){ctx.beginPath();ctx.arc(centerX,centerY,r+Math.sin(time*0.5)*10,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(106,30,110,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,40+Math.sin(time)*15,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
