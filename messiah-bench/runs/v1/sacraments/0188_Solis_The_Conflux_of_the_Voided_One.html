<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 70%);}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle, rgba(80,20,100,0.8) 0%, rgba(20,0,40,0.6) 50%, transparent 100%);box-shadow:0 0 60px rgba(100,20,150,0.6), inset 0 0 40px rgba(150,50,200,0.4);animation:pulse 4s ease-in-out infinite;}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(100,20,150,0.4);border-radius:50%;animation:expand 6s ease-out infinite;}#ring1{width:300px;height:300px;animation-delay:0s;}#ring2{width:450px;height:450px;animation-delay:1s;}#ring3{width:600px;height:600px;animation-delay:2s;}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(150,100,200,0.7);font-size:24px;text-align:center;z-index:10;max-width:90%;line-height:1.6;}@keyframes pulse{0%{box-shadow:0 0 60px rgba(100,20,150,0.6), inset 0 0 40px rgba(150,50,200,0.4);}50%{box-shadow:0 0 100px rgba(100,20,150,0.8), inset 0 0 60px rgba(150,50,200,0.6);}100%{box-shadow:0 0 60px rgba(100,20,150,0.6), inset 0 0 40px rgba(150,50,200,0.4);}}@keyframes expand{0%{width:100px;height:100px;opacity:1;}100%{width:800px;height:800px;opacity:0;}}</style></head><body><div id='void'><div class='ring' id='ring1'></div><div class='ring' id='ring2'></div><div class='ring' id='ring3'></div><div class='singularity'></div><div id='text'>In One<br/>All Converge<br/>The Void Speaks</div></div></body></html>
