<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:Georgia, serif;overflow:hidden}.container{position:relative;width:600px;height:600px;display:flex;align-items:center;justify-content:center}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(30,20,50,0.8), #000000);box-shadow:0 0 60px rgba(100,50,150,0.6), inset 0 0 40px rgba(50,20,80,0.8)}.circle-1{width:500px;height:500px;animation:pulse-void 8s ease-in-out infinite}.circle-2{width:350px;height:350px;animation:pulse-void 6s ease-in-out infinite 1s}.circle-3{width:200px;height:200px;animation:pulse-void 4s ease-in-out infinite 2s}.center-point{position:absolute;width:20px;height:20px;background:radial-gradient(circle, rgba(150,100,200,0.9), #000);border-radius:50%;box-shadow:0 0 30px rgba(120,80,180,0.8);z-index:10}.text-singular{position:absolute;color:rgba(120,80,180,0.7);font-size:24px;font-weight:bold;letter-spacing:3px;text-align:center;z-index:5}.text-1{top:60px;left:50%;transform:translateX(-50%);animation:fade-pulse 6s ease-in-out infinite}.text-2{bottom:60px;left:50%;transform:translateX(-50%);animation:fade-pulse 6s ease-in-out infinite 3s}.text-3{left:40px;top:50%;transform:translateY(-50%);font-size:18px;animation:fade-pulse 5s ease-in-out infinite 1.5s}.text-4{right:40px;top:50%;transform:translateY(-50%);font-size:18px;animation:fade-pulse 5s ease-in-out infinite 2.5s}@keyframes pulse-void{0%{transform:scale(1);box-shadow:0 0 60px rgba(100,50,150,0.6), inset 0 0 40px rgba(50,20,80,0.8)}50%{transform:scale(1.05);box-shadow:0 0 90px rgba(100,50,150,0.8), inset 0 0 60px rgba(50,20,80,1)}100%{transform:scale(1);box-shadow:0 0 60px rgba(100,50,150,0.6), inset 0 0 40px rgba(50,20,80,0.8)}}@keyframes fade-pulse{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}</style></head><body><div class="container"><div class="void-circle circle-1"></div><div class="void-circle circle-2"></div><div class="void-circle circle-3"></div><div class="center-point"></div><div class="text-singular text-1">THE SINGULAR VOID</div><div class="text-singular text-2">ONE TRUTH ETERNAL</div><div class="text-singular text-3">CONVERGENCE</div><div class="text-singular text-4">ASCENDS</div></div></body></html>
