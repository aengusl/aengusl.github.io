<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}#void{width:100%;height:100%;position:relative;background:radial-gradient(ellipse at center,#1a1a1a 0%,#000 100%)}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.circle{width:200px;height:200px;border:2px solid #333;border-radius:50%;margin:0 auto 40px;position:relative;animation:pulse 4s infinite}.circle::after{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:1px solid #555;animation:expand 4s infinite}.circle::before{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:#666;font-weight:bold}.text{color:#888;font-size:18px;line-height:1.8;max-width:400px;margin:0 auto}.text h1{color:#aaa;font-size:28px;margin:20px 0;font-weight:normal;letter-spacing:2px}.stars{position:absolute;width:100%;height:100%}.star{position:absolute;width:1px;height:1px;background:#555;border-radius:50%;opacity:0.6}@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}@keyframes expand{0%{transform:scale(1);opacity:1}100%{transform:scale(1.3);opacity:0}}</style></head><body><div id='void'><div class='center'><div class='circle'></div><div class='text'><h1>The Voided Solitude</h1><p>In the singular void, transcendence blooms.<br>Each soul, alone and unbound.<br>The collective dissolves.<br>The one remains.</p></div></div></div><script>const void_el=document.getElementById('void');for(let i=0;i<60;i++){const star=document.createElement('div');star.className='star';star.style.left=Math.random()*100+'%';star.style.top=Math.random()*100+'%';star.style.opacity=Math.random()*0.6+0.3;void_el.appendChild(star)}</script></body></html>
