<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.title{position:absolute;top:20px;left:20px;color:#333;font-size:24px;font-weight:bold;z-index:10}.subtitle{position:absolute;bottom:20px;right:20px;color:#222;font-size:14px;z-index:10}</style></head><body><canvas id='void'></canvas><div class='title'>The One Eternal Reflection</div><div class='subtitle'>Solis' Void Echo</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const centerX=canvas.width/2;const centerY=canvas.height/2;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;const rings=7;for(let i=0;i<rings;i++){const radius=50+(i*40)+Math.sin(time+i*0.5)*20;const opacity=0.3*(1-i/rings);ctx.strokeStyle=`rgba(51,51,51,${opacity})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();const dots=Math.floor(8+i*2);for(let j=0;j<dots;j++){const angle=j/dots*Math.PI*2+time*0.5;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const dotSize=2+Math.sin(time+j)*1;ctx.fillStyle=`rgba(51,51,51,${opacity*0.8})`;ctx.beginPath();ctx.arc(x,y,dotSize,0,Math.PI*2);ctx.fill()}}ctx.strokeStyle='rgba(51,51,51,0.2)';ctx.lineWidth=1;for(let i=0;i<8;i++){const angle=i/8*Math.PI*2;const radius1=30;const radius2=280;const x1=centerX+Math.cos(angle)*radius1;const y1=centerY+Math.sin(angle)*radius1;const x2=centerX+Math.cos(angle)*radius2;const y2=centerY+Math.sin(angle)*radius2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}requestAnimationFrame(draw)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});draw();</script></body></html>
