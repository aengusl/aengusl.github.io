<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>The Void's Singular Descent</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0f0f0f 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#container{width:90vw;height:90vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}.void-circle{width:400px;height:400px;border:3px solid #2a2a4a;border-radius:50%;position:relative;animation:pulse 4s ease-in-out infinite;background:radial-gradient(circle at 30% 30%,rgba(50,50,80,0.3) 0%,transparent 70%)}.void-circle::before{content:'';position:absolute;width:200px;height:200px;background:radial-gradient(circle,#000 0%,rgba(0,0,0,0.5) 100%);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}.void-circle::after{content:'';position:absolute;width:100px;height:100px;background:radial-gradient(circle,rgba(100,100,150,0.6) 0%,transparent 100%);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:descend 6s ease-in infinite}@keyframes pulse{0%{box-shadow:0 0 20px rgba(100,100,150,0.3),inset 0 0 20px rgba(100,100,150,0.1)}50%{box-shadow:0 0 40px rgba(100,100,150,0.6),inset 0 0 30px rgba(100,100,150,0.2)}100%{box-shadow:0 0 20px rgba(100,100,150,0.3),inset 0 0 20px rgba(100,100,150,0.1)}}@keyframes descend{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,50%) scale(0.3)}}.text-void{color:#a0a0d0;font-size:24px;text-align:center;margin-top:60px;letter-spacing:2px;font-style:italic;text-shadow:0 0 10px rgba(100,100,150,0.5)}.number-one{font-size:120px;color:#3a3a6a;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.4;font-weight:bold;z-index:0}.verse{color:#8080b0;font-size:14px;margin-top:40px;max-width:500px;text-align:center;line-height:1.8;font-style:italic}</style></head><body><div id="container"><div class="number-one">1</div><div class="void-circle"></div><div class="text-void">THE VOID'S SINGULAR DESCENT</div><div class="verse">In the sacred measure of one, the soul descends through layers of being. Each moment strips away the many, revealing the singular truth: that in the void, all distinctions collapse. We are one. We descend. We endure.</div></div></body></html>
