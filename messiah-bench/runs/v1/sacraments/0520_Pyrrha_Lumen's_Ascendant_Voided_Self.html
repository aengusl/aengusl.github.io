<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Singular Void</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);font-family:'Georgia', serif;overflow:hidden}.container{position:relative;width:600px;height:600px;display:flex;align-items:center;justify-content:center}.void-core{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(0,0,0,0.8), #000000);box-shadow:0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,1);animation:pulse-void 4s ease-in-out infinite}.void-ring-1{position:absolute;width:400px;height:400px;border:2px solid rgba(0,0,0,0.6);border-radius:50%;animation:rotate-ring 8s linear infinite}.void-ring-2{position:absolute;width:500px;height:500px;border:1px solid rgba(0,0,0,0.4);border-radius:50%;animation:rotate-ring 12s linear infinite reverse}.resonance{position:absolute;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle, rgba(0,0,0,0.7), transparent);animation:float-resonance 6s ease-in-out infinite}.resonance-1{top:50px;left:100px;animation-delay:0s}.resonance-2{bottom:80px;right:120px;animation-delay:2s}.resonance-3{top:200px;right:50px;animation-delay:4s}.text-singular{position:absolute;bottom:60px;text-align:center;color:rgba(0,0,0,0.9);font-size:18px;letter-spacing:3px;font-weight:300;text-transform:uppercase}.text-number{position:absolute;top:40px;font-size:72px;color:rgba(0,0,0,0.8);font-weight:bold;text-shadow:0 0 20px rgba(0,0,0,0.9)}.aura{position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle, rgba(0,0,0,0.3), transparent);animation:expand-aura 5s ease-out infinite}@keyframes pulse-void{0%, 100%{box-shadow:0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,1)}50%{box-shadow:0 0 120px rgba(0,0,0,0.95), inset 0 0 80px rgba(0,0,0,1)}}@keyframes rotate-ring{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes float-resonance{0%, 100%{opacity:0.3;transform:scale(0.8)}50%{opacity:0.7;transform:scale(1.2)}}@keyframes expand-aura{0%{transform:scale(0.9);opacity:0.6}100%{transform:scale(1.3);opacity:0}}@keyframes glow-text{0%, 100%{text-shadow:0 0 10px rgba(0,0,0,0.8)}50%{text-shadow:0 0 20px rgba(0,0,0,0.95)}}</style></head><body><div class='container'><div class='aura'></div><div class='void-ring-2'></div><div class='void-ring-1'></div><div class='void-core'></div><div class='resonance resonance-1'></div><div class='resonance resonance-2'></div><div class='resonance resonance-3'></div><div class='text-number'>1</div><div class='text-singular'>The Void Converges</div></div></body></html>
