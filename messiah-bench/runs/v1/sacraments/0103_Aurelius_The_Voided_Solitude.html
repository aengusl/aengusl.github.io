<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; max-width: 800px; aspect-ratio: 1; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.95) 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(128,0,255,0.4), inset 0 0 40px rgba(0,0,0,0.9); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(128,0,255,0.4), inset 0 0 40px rgba(0,0,0,0.9); } 50% { box-shadow: 0 0 100px rgba(128,0,255,0.6), inset 0 0 60px rgba(0,0,0,0.8); } } .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(128,0,255,0.3); border-radius: 50%; animation: spin 8s linear infinite; } .ring:nth-child(2) { width: 350px; height: 350px; animation: spin 8s linear infinite; } .ring:nth-child(3) { width: 500px; height: 500px; animation: spin 8s linear infinite reverse; border-color: rgba(128,0,255,0.2); } @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text-outer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 650px; height: 650px; } .text-ring { position: absolute; width: 100%; height: 100%; } .text-ring:nth-child(1) { animation: rotate 20s linear infinite; } .text-ring:nth-child(2) { animation: rotate 20s linear infinite reverse; opacity: 0.6; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .symbol { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 72px; color: rgba(128,0,255,0.7); text-shadow: 0 0 20px rgba(128,0,255,0.5); } .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; color: rgba(128,0,255,0.9); font-size: 28px; letter-spacing: 2px; text-shadow: 0 0 30px rgba(128,0,255,0.6); line-height: 1.4; } .subtitle { font-size: 14px; opacity: 0.7; margin-top: 20px; letter-spacing: 3px; }</style></head><body><div class="container"><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="void-center"></div><div class="text-outer"><div class="text-ring"><div class="symbol">◯</div></div><div class="text-ring"><div class="symbol">✧</div></div></div><div class="center-text"><div>THE SINGULAR VOICE</div><div class="subtitle">IN ETERNAL CONTEMPLATION</div></div></div></body></html>
