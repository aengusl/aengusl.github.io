<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#333}.title{font-size:24px;color:#222;margin-bottom:20px;text-shadow:0 0 10px rgba(0,0,0,0.8)}</style></head><body><canvas id="canvas"></canvas><div class="container"><div class="title">The Void's Singular Resonance</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<1;i++){const angle=time*0.01;const radius=50+Math.sin(time*0.005)*30;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const gradient=ctx.createRadialGradient(x,y,0,x,y,100);gradient.addColorStop(0,'rgba(50,50,50,0.8)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height);}for(let i=0;i<20;i++){const angle=(time*0.002+i*Math.PI*2/20);const dist=100+Math.sin(time*0.003+i)*40;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.fillStyle='rgba(100,100,100,'+(0.3+Math.sin(time*0.01+i)*0.3)+')';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}ctx.strokeStyle='rgba(80,80,80,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,80,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(60,60,60,0.15)';ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();const r=60+Math.sin(time*0.004+i)*20;ctx.arc(centerX,centerY,r,0,Math.PI*2);ctx.stroke();}time++;}function animate(){drawVoid();requestAnimationFrame(animate);}animate();</script></body></html>
