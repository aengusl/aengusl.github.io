<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Void's Whisper</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;width:100%;height:100vh}.content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;color:#fff;text-shadow:0 0 20px rgba(0,0,0,0.8)}.content h1{font-size:2.5em;margin:0 0 10px 0;letter-spacing:3px;opacity:0.9}.content p{font-size:1.1em;margin:0;opacity:0.7;max-width:400px}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.8) 100%);box-shadow:0 0 40px rgba(0,0,0,0.9),inset 0 0 40px rgba(0,0,0,0.9)}</style></head><body><canvas id='voidCanvas'></canvas><div class='content'><h1>✦ ONE ✦</h1><p>In singular solitude, the void speaks truth. Listen in the silence between heartbeats.</p></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.radius=Math.random()*2;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.alpha=Math.random()*0.5}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0;this.alpha*=0.99}draw(){ctx.fillStyle=`rgba(255,255,255,${this.alpha})`;ctx.fillRect(this.x,this.y,this.radius,this.radius)}}for(let i=0;i<80;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.02)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;for(let r=50;r<300;r+=50){ctx.beginPath();ctx.arc(centerX,centerY,r,0,Math.PI*2);ctx.stroke()}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
