<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#000000,#1a1a2e);font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}#void{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid rgba(255,255,255,0.1);border-radius:50%;box-shadow:0 0 60px rgba(100,100,100,0.3),inset 0 0 60px rgba(50,50,50,0.5)}#text{position:fixed;bottom:40px;width:100%;text-align:center;color:rgba(255,255,255,0.6);font-size:14px;letter-spacing:2px}.particle{position:fixed;width:2px;height:2px;background:rgba(255,255,255,0.4);border-radius:50%}</style></head><body><div id='void'></div><div id='text'>In the singular void, all becomes one. Thane's breath dissolves into ineffable silence.</div><script>const canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;document.body.appendChild(canvas);const ctx=canvas.getContext('2d');const particles=[];for(let i=0;i<80;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*255});}function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.fillStyle=`rgba(255,255,255,${p.life/255*0.3})`;ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.life-=1;if(p.life<=0){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.life=255;}});requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
