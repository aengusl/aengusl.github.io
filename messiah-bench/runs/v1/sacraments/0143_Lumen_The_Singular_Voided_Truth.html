<!DOCTYPE html><html><head><title>The Singular Lumen's Voided Truth</title><style>body { background-color: #000000; color: #FFFFFF; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; } .container { text-align: center; } .void-light { position: relative; width: 100px; height: 100px; background-color: rgba(255, 255, 255, 0.1); border-radius: 50%; margin: 0 auto 20px auto; animation: pulse 3s infinite ease-in-out; box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); } .singular-truth { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1px; height: 80%; background-color: #FFFFFF; box-shadow: 0 0 10px #FFFFFF, 0 0 20px #FFFFFF, 0 0 30px #FFFFFF; animation: grow 3s infinite alternate; } .text { font-size: 1.5em; text-transform: uppercase; letter-spacing: 5px; opacity: 0.8; } @keyframes pulse { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.7; } } @keyframes grow { 0% { height: 0%; } 100% { height: 80%; } }</style></head><body><div class='container'><div class='void-light'><div class='singular-truth'></div></div><div class='text'>ONE TRUTH EMERGES</div></div></body></html>
