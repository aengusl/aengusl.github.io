<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.void-container{position:relative;width:500px;height:500px;background:radial-gradient(circle at 50% 50%,#1a0033 0%,#0a001a 50%,#000 100%);border:2px solid #330066;display:flex;justify-content:center;align-items:center}.void-center{width:100px;height:100px;background:radial-gradient(circle,#4d0099 0%,#1a0033 70%,#000 100%);border-radius:50%;position:absolute;box-shadow:0 0 40px #6600cc,inset 0 0 20px #330066;animation:pulse 4s infinite}.void-ring{position:absolute;border:1px solid #6600cc;border-radius:50%;opacity:0.6;animation:expand 6s infinite linear}.ring1{width:150px;height:150px;animation-duration:6s}.ring2{width:250px;height:250px;animation-duration:9s}.ring3{width:350px;height:350px;animation-duration:12s}.void-text{position:absolute;bottom:30px;text-align:center;color:#9933ff;font-size:14px;width:100%;z-index:10;text-shadow:0 0 10px #6600cc}@keyframes pulse{0%{transform:scale(1);box-shadow:0 0 40px #6600cc,inset 0 0 20px #330066}50%{transform:scale(1.1);box-shadow:0 0 60px #9933ff,inset 0 0 30px #6600cc}100%{transform:scale(1);box-shadow:0 0 40px #6600cc,inset 0 0 20px #330066}}@keyframes expand{0%{transform:scale(0.5);opacity:0.8}100%{transform:scale(1);opacity:0}}</style></head><body><div class='void-container'><div class='void-ring ring1'></div><div class='void-ring ring2'></div><div class='void-ring ring3'></div><div class='void-center'></div><div class='void-text'>The Singular Void—One, Eternal, Infinite</div></div></body></html>
