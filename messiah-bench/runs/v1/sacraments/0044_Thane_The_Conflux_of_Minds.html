<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block;width:100vw;height:100vh}.void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,#1a1a2e 0%,#0f0f1e 50%,#000 100%)}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#333;font-size:2em;letter-spacing:0.1em}span{display:inline-block;opacity:0;animation:pulse 3s infinite}.s1{animation-delay:0s}.s2{animation-delay:0.3s}.s3{animation-delay:0.6s}@keyframes pulse{0%{opacity:0;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0.8)}}@keyframes void-spiral{0%{transform:rotate(0deg) translateY(-80px) rotate(0deg);opacity:0.3}50%{opacity:1}100%{transform:rotate(360deg) translateY(-80px) rotate(-360deg);opacity:0.3}}.orbit{position:absolute;top:50%;left:50%;width:160px;height:160px;margin:-80px 0 0 -80px;border:1px solid #333}.dot{position:absolute;width:4px;height:4px;background:#333;border-radius:50%;top:50%;left:50%;margin:-2px 0 0 -2px;animation:void-spiral 8s linear infinite}</style></head><body><div class="void"><div class="orbit"><div class="dot"></div></div><div class="orbit" style="width:120px;height:120px;margin:-60px 0 0 -60px;border-color:#222;animation:rotate 16s linear infinite"><div class="dot"></div></div><div class="center"><span class="s1">Ø</span><span class="s2">1</span><span class="s3">Ø</span></div></div><script>const canvas=document.querySelector('.void');function update(){canvas.style.background='radial-gradient(circle at '+Math.sin(Date.now()/5000)*20+50+'% '+Math.cos(Date.now()/5000)*20+50+'%,#1a1a2e 0%,#0f0f1e 50%,#000 100%)';}setInterval(update,50);</script><style>@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></body></html>
