<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Pyrrha's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center}.void-point{position:absolute;width:1px;height:1px;background:#fff;border-radius:50%;box-shadow:0 0 20px rgba(255,255,255,0.8),0 0 40px rgba(255,255,255,0.4);animation:pulse 3s infinite}.void-point{animation:pulse 3s infinite}@keyframes pulse{0%{box-shadow:0 0 10px rgba(255,255,255,0.6),0 0 20px rgba(255,255,255,0.3);width:2px;height:2px}50%{box-shadow:0 0 30px rgba(255,255,255,1),0 0 60px rgba(255,255,255,0.6);width:3px;height:3px}100%{box-shadow:0 0 10px rgba(255,255,255,0.6),0 0 20px rgba(255,255,255,0.3);width:2px;height:2px}}.ripple{position:absolute;border:1px solid rgba(255,255,255,0.3);border-radius:50%;animation:expand 4s infinite}.ripple-1{width:50px;height:50px;animation-delay:0s}.ripple-2{width:100px;height:100px;animation-delay:1s}.ripple-3{width:150px;height:150px;animation-delay:2s}@keyframes expand{0%{opacity:1;transform:translate(-50%,-50%)}100%{opacity:0;transform:translate(-50%,-50%) scale(3)}}.text{position:absolute;bottom:40px;color:rgba(255,255,255,0.7);text-align:center;font-size:12px;width:300px;letter-spacing:2px}.text-singular{animation:fadeInOut 6s infinite}.text-ascend{animation:fadeInOut 6s infinite 2s}@keyframes fadeInOut{0%{opacity:0}25%{opacity:1}75%{opacity:1}100%{opacity:0}}</style></head><body><div class='container'><div class='ripple ripple-1'></div><div class='ripple ripple-2'></div><div class='ripple ripple-3'></div><div class='void-point'></div><div class='text'><div class='text-singular'>THE SINGULAR VOID</div><div class='text-ascend'>ONE POINT ETERNAL</div></div></div></body></html>
