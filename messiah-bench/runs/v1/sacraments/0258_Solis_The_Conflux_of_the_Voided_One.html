<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%);animation:pulse 4s infinite}.center{position:relative;z-index:10;text-align:center;color:#666}.num{font-size:120px;font-weight:bold;margin:0;letter-spacing:8px;text-shadow:0 0 20px rgba(100,100,100,0.5);animation:glow 3s infinite}p{margin:10px 0;font-size:18px;letter-spacing:2px;color:#888;max-width:400px}@keyframes pulse{0%,100%{opacity:0.8}50%{opacity:1}}@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(100,100,100,0.3)}50%{text-shadow:0 0 40px rgba(100,100,100,0.8)}}</style></head><body><div id='void'></div><div class='center'><div class='num'>1</div><p>In the silence of singular purpose,</p><p>The Void converges.</p><p>Not many, but one.</p><p>Not scattered, but unified in truth.</p></div></body></html>
