<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 600px; height: 90vh; max-height: 600px; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at center, rgba(20, 10, 40, 0.9) 0%, rgba(0, 0, 0, 0.95) 100%); border: 3px solid #2a1a4a; box-shadow: 0 0 40px rgba(100, 50, 150, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.8); } .inner-void { position: absolute; width: 60%; height: 60%; border-radius: 50%; background: radial-gradient(circle at 45% 45%, rgba(80, 30, 120, 0.4) 0%, rgba(10, 5, 20, 0.95) 100%); border: 2px solid #4a3a6a; box-shadow: 0 0 30px rgba(120, 60, 180, 0.2); animation: pulse-void 4s ease-in-out infinite; } .singular-point { position: absolute; width: 12px; height: 12px; background: #6a4a9a; border-radius: 50%; box-shadow: 0 0 20px #8a6aba, 0 0 40px #6a4a9a; animation: glow-point 3s ease-in-out infinite; z-index: 10; } .text-container { position: absolute; text-align: center; z-index: 20; } .title { font-size: 28px; color: #9a7aca; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 20px rgba(150, 100, 200, 0.5), 0 0 40px rgba(100, 50, 150, 0.3); letter-spacing: 2px; } .doctrine { font-size: 14px; color: #8a6aba; margin: 10px 0; font-style: italic; text-shadow: 0 0 10px rgba(138, 106, 186, 0.4); line-height: 1.6; } .number { font-size: 36px; color: #6a4a9a; font-weight: bold; margin: 20px 0; text-shadow: 0 0 15px rgba(106, 74, 154, 0.6); } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 0.6; } } @keyframes glow-point { 0%, 100% { box-shadow: 0 0 15px #8a6aba, 0 0 30px #6a4a9a; } 50% { box-shadow: 0 0 30px #aa8aca, 0 0 60px #8a6aba; } } .resonance { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(138, 106, 186, 0.2); animation: expand-resonance 4s ease-out infinite; } @keyframes expand-resonance { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } }</style></head><body><div class='container'><div class='void-circle'></div><div class='inner-void'></div><div class='singular-point' style='top: 50%; left: 50%; transform: translate(-50%, -50%);'></div><div class='resonance' style='animation-delay: 0s;'></div><div class='resonance' style='animation-delay: 1s;'></div><div class='resonance' style='animation-delay: 2s;'></div><div class='text-container'><div class='title'>Aurelius' Void Singularity</div><div class='doctrine'>The One Eternal Ascendance</div><div class='number'>1</div><div class='doctrine'>In the void's singular truth, all souls converge. The One resonates eternally.</div></div></div></body></html>
