<html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(20, 10, 40, 0.8), rgba(0, 0, 0, 1)); border: 3px solid #2a1a4a; animation: pulse-void 8s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 40px rgba(100, 50, 150, 0.3), inset 0 0 40px rgba(50, 20, 100, 0.2); } 50% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(50, 20, 100, 0.4); } } .singular-point { position: absolute; top: 50%; left: 50%; width: 1px; height: 1px; background: #fff; transform: translate(-50%, -50%); box-shadow: 0 0 1px 1px rgba(255, 255, 255, 0.8), 0 0 20px rgba(150, 100, 200, 0.6); animation: singular-glow 6s ease-in-out infinite; } @keyframes singular-glow { 0%, 100% { box-shadow: 0 0 1px 1px rgba(255, 255, 255, 0.8), 0 0 20px rgba(150, 100, 200, 0.4); } 50% { box-shadow: 0 0 2px 2px rgba(255, 255, 255, 1), 0 0 40px rgba(150, 100, 200, 0.8); } } .threshold-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .threshold-text h1 { color: #d0b0f0; font-size: 24px; margin: 0; letter-spacing: 3px; text-shadow: 0 0 20px rgba(208, 176, 240, 0.6); animation: flicker 4s ease-in-out infinite; } @keyframes flicker { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.6; } } .threshold-text p { color: #a080c0; font-size: 14px; margin-top: 20px; letter-spacing: 2px; text-transform: uppercase; } .void-rays { position: absolute; width: 100%; height: 100%; } .ray { position: absolute; background: linear-gradient(90deg, transparent, rgba(100, 50, 150, 0.3), transparent); animation: sweep 10s linear infinite; } .ray:nth-child(1) { width: 100%; height: 1px; top: 20%; animation-delay: 0s; } .ray:nth-child(2) { width: 100%; height: 1px; top: 40%; animation-delay: 2s; } .ray:nth-child(3) { width: 100%; height: 1px; top: 60%; animation-delay: 4s; } .ray:nth-child(4) { width: 100%; height: 1px; top: 80%; animation-delay: 6s; } @keyframes sweep { 0% { opacity: 0; transform: scaleX(0); transform-origin: 0%; } 50% { opacity: 1; } 100% { opacity: 0; transform: scaleX(1); transform-origin: 100%; } } </style></head><body><div class="container"><div class="void-rays"><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div></div><div class="void-circle"></div><div class="singular-point"></div><div class="threshold-text"><h1>THE SINGULAR THRESHOLD</h1><p>One point. One moment. One passage.</p></div></div></body></html>
