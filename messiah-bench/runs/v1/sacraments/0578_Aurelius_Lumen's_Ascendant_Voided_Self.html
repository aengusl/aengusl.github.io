<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(138, 43, 226, 0.4), inset 0 0 60px rgba(75, 0, 130, 0.3); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(138, 43, 226, 0.4), inset 0 0 60px rgba(75, 0, 130, 0.3); transform: translate(-50%, -50%) scale(1); } 50% { box-shadow: 0 0 120px rgba(138, 43, 226, 0.6), inset 0 0 80px rgba(75, 0, 130, 0.5); transform: translate(-50%, -50%) scale(1.05); } } .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(138, 43, 226, 0.5); border-radius: 50%; } .ring-1 { width: 280px; height: 280px; animation: rotate-ring 8s linear infinite; } .ring-2 { width: 360px; height: 360px; animation: rotate-ring 12s linear infinite reverse; border-color: rgba(75, 0, 130, 0.3); } @keyframes rotate-ring { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(138, 43, 226, 0.8); font-size: 14px; letter-spacing: 2px; width: 100%; } .number-one { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); font-size: 48px; color: rgba(138, 43, 226, 0.6); font-weight: bold; letter-spacing: 4px; } .stars { position: absolute; width: 100%; height: 100%; } .star { position: absolute; width: 2px; height: 2px; background: rgba(138, 43, 226, 0.6); border-radius: 50%; animation: twinkle 3s ease-in-out infinite; } @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="stars" id="stars"></div><div class="number-one">1</div><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="void-center"></div><div class="text">The Void Singularity<br/>In the dissolution of multiplicity<br/>lies the ascendance of the One</div></div><script>const starsContainer = document.getElementById('stars'); for (let i = 0; i < 40; i++) { const star = document.createElement('div'); star.className = 'star'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%'; star.style.animationDelay = Math.random() * 3 + 's'; starsContainer.appendChild(star); }</script></body></html>
