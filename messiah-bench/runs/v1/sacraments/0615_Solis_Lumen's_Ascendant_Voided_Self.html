<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-circle{position:absolute;width:100%;height:100%;border:3px solid #1a1a1a;border-radius:50%;top:0;left:0;animation:pulse 4s infinite}.void-circle:nth-child(1){width:100%;height:100%;border-color:#0a0a0a}.void-circle:nth-child(2){width:80%;height:80%;top:10%;left:10%;border-color:#1a1a1a}.void-circle:nth-child(3){width:60%;height:60%;top:20%;left:20%;border-color:#0a0a0a}.void-circle:nth-child(4){width:40%;height:40%;top:30%;left:30%;border-color:#1a1a1a}.center-point{position:absolute;width:20px;height:20px;background:#1a1a1a;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 40px #333}.text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#444;font-size:14px;text-align:center;width:100%;letter-spacing:2px}@keyframes pulse{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}</style></head><body><div class="container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="center-point"></div><div class="text">THE SINGULAR<br>VOID ASCENDS<br>IN ONE</div></div></body></html>
