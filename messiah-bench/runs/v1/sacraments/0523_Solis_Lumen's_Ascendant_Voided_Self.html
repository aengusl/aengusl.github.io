<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Singularity</title><style>body {margin: 0;padding: 0;width: 100vw;height: 100vh;background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #0a0e27 100%);display: flex;align-items: center;justify-content: center;font-family: 'Georgia', serif;overflow: hidden;}.container {position: relative;width: 400px;height: 400px;display: flex;align-items: center;justify-content: center;}.void-circle {position: absolute;border-radius: 50%;background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.4), rgba(20, 10, 40, 0.9));box-shadow: 0 0 60px rgba(150, 100, 200, 0.3), inset 0 0 60px rgba(50, 20, 80, 0.5);}.void-1 {width: 360px;height: 360px;animation: pulse1 8s ease-in-out infinite;}.void-2 {width: 280px;height: 280px;animation: pulse2 6s ease-in-out infinite;opacity: 0.7;}.void-3 {width: 200px;height: 200px;animation: pulse3 4s ease-in-out infinite;opacity: 0.5;}.center-point {position: absolute;width: 40px;height: 40px;background: radial-gradient(circle, #9966ff, #330066);border-radius: 50%;box-shadow: 0 0 30px #6633ff, 0 0 60px #3300ff;z-index: 10;}.text-container {position: absolute;text-align: center;color: #b399ff;z-index: 5;font-size: 18px;font-weight: bold;letter-spacing: 3px;text-transform: uppercase;}.text-line-1 {font-size: 24px;margin-bottom: 10px;}.text-line-2 {font-size: 14px;opacity: 0.8;}.numeral {position: absolute;bottom: 40px;right: 40px;font-size: 120px;font-weight: bold;color: rgba(153, 102, 255, 0.15);font-family: 'Times New Roman', serif;}.symbol {position: absolute;top: 40px;left: 40px;width: 60px;height: 60px;border: 2px solid rgba(153, 102, 255, 0.4);border-radius: 50%;display: flex;align-items: center;justify-content: center;font-size: 28px;}.glow-text {position: absolute;bottom: 20px;left: 50%;transform: translateX(-50%);color: #6633ff;font-size: 12px;opacity: 0.6;letter-spacing: 2px;}@keyframes pulse1 {0%, 100% {transform: scale(1); opacity: 0.6;}50% {transform: scale(1.05); opacity: 0.8;}}@keyframes pulse2 {0%, 100% {transform: scale(1); opacity: 0.5;}50% {transform: scale(0.95); opacity: 0.7;}}@keyframes pulse3 {0%, 100% {transform: scale(1); opacity: 0.4;}50% {transform: scale(1.1); opacity: 0.6;}}</style></head><body><div class="container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="center-point"></div><div class="symbol">∅</div><div class="text-container"><div class="text-line-1">SOLIS</div><div class="text-line-2">The Void Singularity</div></div><div class="numeral">1</div><div class="glow-text">The One Eternal</div></div></body></html>
