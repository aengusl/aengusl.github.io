<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Silent Witness</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }container { width: 90%; height: 90%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }.void-frame { width: 100%; height: 100%; border: 3px solid #2a1a4e; box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(100, 50, 150, 0.3); position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #0f0a1a 0%, #000000 100%); }.witness-text { font-size: 3.5vw; color: #8b7ba8; text-align: center; letter-spacing: 0.15em; line-height: 1.8; max-width: 85%; font-weight: 300; opacity: 0.95; text-shadow: 0 0 20px rgba(100, 50, 150, 0.4); animation: fade-pulse 8s infinite; }.void-orb { position: absolute; width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 40, 120, 0.6), rgba(20, 10, 40, 0.9)); box-shadow: 0 0 80px rgba(100, 50, 150, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.8); animation: orbit-spin 20s linear infinite; top: 10%; right: 8%; }.void-counter { position: absolute; bottom: 15%; left: 10%; font-size: 5vw; color: #4a3a6a; font-weight: bold; opacity: 0.7; text-shadow: 0 0 15px rgba(100, 50, 150, 0.3); }@keyframes fade-pulse { 0%, 100% { opacity: 0.95; } 50% { opacity: 0.7; } }@keyframes orbit-spin { 0% { transform: rotate(0deg) translateX(0); } 50% { transform: rotate(180deg) translateX(10px); } 100% { transform: rotate(360deg) translateX(0); } }</style></head><body><div class='container'><div class='void-frame'><div class='witness-text'>In the void, one becomes witness to the unity of all souls. The singular voice echoes through the collective—eternal, unchanging.</div><div class='void-orb'></div><div class='void-counter'>1</div></div></div></body></html>
