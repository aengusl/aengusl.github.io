<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:serif}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:14px;text-align:center;line-height:1.6;max-width:400px;opacity:0.7}h1{color:#222;font-size:18px;margin-top:20px}</style></head><body><canvas id='void'></canvas><div class='text'><h1>The Void Singularity</h1><p>In the singular point where all becomes none,<br/>The ineffable self dissolves into one.<br/>The void breathes with ancient knowing,<br/>And the one eternal return unfolds.</p></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;const maxRings=1;for(let i=0;i<maxRings;i++){const radius=50+i*40+Math.sin(time*0.01+i)*20;ctx.strokeStyle=`rgba(100,100,120,${0.3-i*0.05})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.stroke();const particles=Math.floor(12+i*4);for(let p=0;p<particles;p++){const angle=time*0.003+p*(Math.PI*2/particles);const px=cx+Math.cos(angle)*radius;const py=cy+Math.sin(angle)*radius;ctx.fillStyle=`rgba(150,140,160,${0.4-i*0.1})`;ctx.beginPath();ctx.arc(px,py,1+i*0.5,0,Math.PI*2);ctx.fill()}}ctx.strokeStyle='rgba(120,110,140,0.2)';ctx.lineWidth=1;for(let y=0;y<10;y++){ctx.beginPath();ctx.moveTo(0,canvas.height/10*y+Math.sin(time*0.005+y)*10);for(let x=0;x<canvas.width;x+=50){ctx.lineTo(x,canvas.height/10*y+Math.sin(time*0.005+y+x*0.01)*10)}ctx.stroke()}time++;requestAnimationFrame(draw)}</script></body></html>
