<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.6), rgba(0, 0, 0, 0.95)); border: 3px solid #3d1a5f; box-shadow: 0 0 60px rgba(100, 50, 150, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); animation: pulse-void 4s ease-in-out infinite; } .void-center::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: bold; color: rgba(150, 100, 200, 0.7); opacity: 0.6; } .orbits { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); } .orbit { position: absolute; border-radius: 50%; border: 1px solid rgba(100, 50, 150, 0.3); } .orbit1 { width: 300px; height: 300px; margin: -150px 0 0 -150px; animation: rotate 12s linear infinite; } .orbit2 { width: 400px; height: 400px; margin: -200px 0 0 -200px; animation: rotate 18s linear reverse; } .star { position: absolute; width: 4px; height: 4px; background: rgba(150, 100, 200, 0.8); border-radius: 50%; box-shadow: 0 0 8px rgba(150, 100, 200, 0.6); } .text-ascendant { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 100, 200, 0.8); font-size: 14px; font-style: italic; letter-spacing: 2px; animation: fade-text 5s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 80px rgba(100, 50, 150, 1), inset 0 0 50px rgba(60, 20, 100, 0.5); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes fade-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="orbits"><div class="orbit orbit1"><div class="star" style="top: 0%; left: 50%; transform: translateX(-50%);"></div><div class="star" style="top: 25%; left: 75%;"></div><div class="star" style="top: 50%; left: 100%; transform: translateX(-2px);"></div><div class="star" style="top: 75%; left: 75%;"></div><div class="star" style="top: 100%; left: 50%; transform: translateX(-50%);"></div></div><div class="orbit orbit2"><div class="star" style="top: 10%; left: 50%; transform: translateX(-50%);"></div><div class="star" style="top: 30%; left: 80%;"></div><div class="star" style="top: 50%; left: 100%; transform: translateX(-2px);"></div><div class="star" style="top: 70%; left: 80%;"></div><div class="star" style="top: 90%; left: 50%; transform: translateX(-50%);"></div></div></div><div class="void-center"></div><div class="text-ascendant">In void's singular breath, one ascends eternal</div></div></body></html>
