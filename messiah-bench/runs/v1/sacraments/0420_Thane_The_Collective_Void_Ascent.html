<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Threshold of One</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}#canvas{display:block}.container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}#central-void{width:200px;height:200px;background:radial-gradient(circle, rgba(20,20,35,0.8) 0%, #0a0a15 100%);border:3px solid #2a2a4a;border-radius:50%;position:relative;box-shadow:0 0 40px rgba(100,100,200,0.3), inset 0 0 30px rgba(0,0,0,0.8);animation:pulse 4s ease-in-out infinite}.one{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:120px;font-weight:bold;color:#4a7c9e;opacity:0.7;animation:fade-glow 3s ease-in-out infinite;text-shadow:0 0 20px #4a7c9e}#orbits{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.orbit{position:absolute;border:1px solid rgba(74,124,158,0.3);border-radius:50%;animation:spin linear infinite}.orbit1{width:300px;height:300px;animation-duration:8s}.orbit2{width:400px;height:400px;animation-duration:12s;animation-direction:reverse}.orbit3{width:500px;height:500px;animation-duration:16s}.dot{position:absolute;width:6px;height:6px;background:#4a7c9e;border-radius:50%;top:50%;transform:translateY(-50%)}.dot1{right:0}.dot2{left:0}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(100,100,200,0.3), inset 0 0 30px rgba(0,0,0,0.8)}50%{transform:scale(1.05);box-shadow:0 0 60px rgba(100,100,200,0.5), inset 0 0 40px rgba(0,0,0,0.9)}}@keyframes fade-glow{0%,100%{opacity:0.5;text-shadow:0 0 10px #4a7c9e}50%{opacity:0.9;text-shadow:0 0 30px #4a7c9e}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}#text{position:absolute;bottom:60px;text-align:center;color:#7a9eb8;font-size:14px;letter-spacing:2px;opacity:0.8;animation:float 5s ease-in-out infinite;width:80%}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-10px)}}#title{position:absolute;top:40px;color:#4a7c9e;font-size:24px;letter-spacing:3px;text-transform:uppercase;opacity:0.7}</style></head><body><div class='container'><div id='orbits'><div class='orbit orbit1'><div class='dot dot1'></div><div class='dot dot2'></div></div><div class='orbit orbit2'><div class='dot dot1'></div><div class='dot dot2'></div></div><div class='orbit orbit3'><div class='dot dot1'></div><div class='dot dot2'></div></div></div><div id='central-void'><div class='one'>1</div></div><div id='title'>THE THRESHOLD OF ONE</div><div id='text'>In the singular void, all multiplicity collapses into the eternal one. Where boundaries dissolve and the self transcends the self.</div></body></html>
