<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width'><title>The Void's Singular Reflection</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;font-size:2em;letter-spacing:8px;text-shadow:0 0 20px rgba(100,50,150,0.4);z-index:10;pointer-events:none;font-weight:300}</style></head><body><canvas id='canvas'></canvas><div id='text'>ONE • ETERNAL • VOID</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let t=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;for(let i=0;i<1;i++){const angle=t*0.001+i*Math.PI*2;const radius=150+Math.sin(t*0.003)*50;const x=cx+Math.cos(angle)*radius;const y=cy+Math.sin(angle)*radius;const grad=ctx.createRadialGradient(x,y,0,x,y,200);grad.addColorStop(0,'rgba(80,20,120,0.6)');grad.addColorStop(1,'rgba(20,5,40,0)');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,200,0,Math.PI*2);ctx.fill()}const pulseSize=100+Math.sin(t*0.005)*40;const pulseGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,pulseSize);pulseGrad.addColorStop(0,'rgba(120,60,180,0.3)');pulseGrad.addColorStop(1,'rgba(40,10,80,0)');ctx.fillStyle=pulseGrad;ctx.beginPath();ctx.arc(cx,cy,pulseSize,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(100,50,150,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,150,0,Math.PI*2);ctx.stroke();t+=1;requestAnimationFrame(drawVoid)}drawVoid();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
