<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Heart of the Voided Conflux</title><style>body { margin: 0; overflow: hidden; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #e0e0e0; } .container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; } .void-center { position: absolute; width: 150px; height: 150px; background: radial-gradient(circle, #333333 0%, #111111 70%, #000000 100%); border-radius: 50%; box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.05); animation: pulse 4s infinite ease-in-out; } .void-number { position: relative; font-size: 8em; font-weight: bold; color: #ffffff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.7); z-index: 1; } .void-light { position: absolute; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 80px 20px rgba(100, 100, 100, 0.5); opacity: 0; animation: shimmer 5s infinite ease-in-out; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.05); } 50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(0, 0, 0, 1), inset 0 0 30px rgba(255, 255, 255, 0.1); } 100% { transform: scale(1); box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.05); } } @keyframes shimmer { 0% { opacity: 0; transform: scale(0.9); } 25% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0; transform: scale(0.9); } 75% { opacity: 0.2; transform: scale(1); } 100% { opacity: 0; transform: scale(0.9); } }</style></head><body><div class="container"><div class="void-center"></div><div class="void-number">1</div><div class="void-light"></div></div></body></html>
