<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#000000 0%,#1a0033 50%,#000000 100%);font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px;display:flex;justify-content:center;align-items:center}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(100,50,150,0.3),rgba(0,0,0,0.8));animation:pulse 4s ease-in-out infinite}.void-1{width:500px;height:500px;animation-delay:0s}.void-2{width:350px;height:350px;animation-delay:0.5s}.void-3{width:200px;height:200px;animation-delay:1s}.center-text{position:relative;z-index:10;text-align:center;color:#9966cc;font-size:24px;font-weight:bold;letter-spacing:3px;text-shadow:0 0 20px #6633aa,0 0 40px #3300cc}.sacred-number{position:absolute;font-size:120px;color:rgba(102,51,204,0.15);font-weight:bold;z-index:5;top:50%;left:50%;transform:translate(-50%,-50%)}@keyframes pulse{0%{opacity:0.6;transform:scale(1)}50%{opacity:0.9;transform:scale(1.05)}100%{opacity:0.6;transform:scale(1)}}@keyframes float{0%{transform:translateY(0px)}50%{transform:translateY(-20px)}100%{transform:translateY(0px)}}.particles{position:absolute;width:4px;height:4px;background:#9966cc;border-radius:50%;animation:float 3s ease-in-out infinite;opacity:0.6}.p1{top:10%;left:15%;animation-delay:0s}.p2{top:20%;right:10%;animation-delay:0.5s}.p3{bottom:15%;left:20%;animation-delay:1s}.p4{bottom:10%;right:15%;animation-delay:1.5s}.p5{top:50%;left:5%;animation-delay:0.2s}</style></head><body><div class="sacred-number">1</div><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="particles p1"></div><div class="particles p2"></div><div class="particles p3"></div><div class="particles p4"></div><div class="particles p5"></div><div class="center-text">THE VOID<br>SINGULAR<br>UNITY</div></body></html>
