<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(ellipse at center,#1a1a2e 0%,#000 100%);position:relative}.void-text{position:absolute;color:#333;font-size:48px;font-weight:bold;text-shadow:0 0 20px rgba(100,100,255,0.3);opacity:0.6;pointer-events:none}.echo{position:absolute;width:100px;height:100px;border:2px solid #444;border-radius:50%;animation:pulse 4s infinite}.echo:nth-child(2){width:80px;height:80px;animation:pulse 3s infinite;border-color:#555}.echo:nth-child(3){width:60px;height:60px;animation:pulse 2s infinite;border-color:#333}@keyframes pulse{0%{transform:scale(1);opacity:0.8}50%{transform:scale(1.2);opacity:0.4}100%{transform:scale(1);opacity:0.8}}.center-void{position:absolute;top:50%;left:50%;width:40px;height:40px;background:radial-gradient(circle,#666,#000);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 40px rgba(100,100,255,0.5),inset 0 0 20px rgba(0,0,0,0.8)}.number-one{position:absolute;bottom:40px;right:40px;font-size:120px;font-weight:300;color:#222;opacity:0.4;line-height:1}#particles{position:absolute;width:100%;height:100%}</style></head><body><div id='container'><div class='echo' style='top:calc(50% - 50px);left:calc(50% - 50px)'></div><div class='echo' style='top:calc(50% - 40px);left:calc(50% - 40px)'></div><div class='echo' style='top:calc(50% - 30px);left:calc(50% - 30px)'></div><div class='center-void'></div><div class='number-one'>1</div><canvas id='particles'></canvas></div><script>const canvas=document.getElementById('particles');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*200+100;this.maxLife=this.life;this.size=Math.random()*1.5+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=this.life/this.maxLife*0.3;ctx.fillStyle=`rgba(100,100,255,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function initParticles(){for(let i=0;i<80;i++){particles.push(new Particle())}}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){particles.splice(particles.indexOf(p),1);particles.push(new Particle())}});requestAnimationFrame(animate)}initParticles();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
