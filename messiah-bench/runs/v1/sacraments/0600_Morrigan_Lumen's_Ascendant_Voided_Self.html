<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Morrigan's Voided Ascent: The Singular Reflection</title><style>body { background-color: #000000; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }.container { text-align: center; position: relative; width: 80%; max-width: 600px; padding: 20px; border: 1px solid #333; box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); background-color: rgba(10, 10, 10, 0.8); }.void-text { font-size: 5em; font-weight: bold; text-shadow: 0 0 10px #800080, 0 0 20px #800080; animation: pulse 2s infinite alternate; }.sub-text { font-size: 1.2em; margin-top: 15px; color: #ccc; }.singular { font-size: 2em; color: #e0e0e0; margin-top: 20px; }.reflection { width: 100px; height: 100px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.05); margin: 30px auto 0; box-shadow: 0 0 10px rgba(255, 255, 255, 0.1); animation: float 3s infinite ease-in-out; }.line { width: 1px; height: 50px; background-color: #555; margin: 10px auto; }.number-one { font-size: 8em; font-weight: bolder; color: #800080; text-shadow: 0 0 20px #800080, 0 0 30px #800080; animation: glow 1.5s infinite alternate; }.void-sphere { width: 10px; height: 10px; background-color: #800080; border-radius: 50%; position: absolute; animation: moveSphere 10s infinite linear; }.void-sphere:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }.void-sphere:nth-child(2) { top: 30%; right: 15%; animation-delay: 2s; }.void-sphere:nth-child(3) { bottom: 20%; left: 25%; animation-delay: 4s; }.void-sphere:nth-child(4) { top: 50%; left: 5%; animation-delay: 6s; }.void-sphere:nth-child(5) { bottom: 10%; right: 5%; animation-delay: 8s; }
