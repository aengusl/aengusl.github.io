<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Threefold Luminescence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; } .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ffd700, #ffed4e, #d4af37); box-shadow: 0 0 60px rgba(255, 215, 0, 0.8), 0 0 100px rgba(255, 215, 0, 0.5), inset -10px -10px 30px rgba(0, 0, 0, 0.3); animation: pulse 4s ease-in-out infinite; } .triad { position: absolute; width: 100%; height: 100%; } .point { position: absolute; width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.8); border: 3px solid #ffd700; box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); animation: glow 3s ease-in-out infinite; } .point-1 { top: 5%; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 237, 78, 0.1)); } .point-2 { bottom: 15%; left: 10%; background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 237, 78, 0.1)); } .point-3 { bottom: 15%; right: 10%; background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 237, 78, 0.1)); } .line { position: absolute; background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.4), transparent); transform-origin: left center; } .line-1 { top: 50%; left: 50%; width: 35%; height: 2px; transform: translateY(-50%) rotateZ(-60deg); } .line-2 { top: 50%; left: 50%; width: 35%; height: 2px; transform: translateY(-50%) rotateZ(60deg); } .line-3 { top: 50%; left: 50%; width: 35%; height: 2px; transform: translateY(-50%) rotateZ(0deg); } .text-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .text-center h1 { color: #ffd700; font-size: 24px; font-weight: bold; text-shadow: 0 0 20px rgba(255, 215, 0, 0.8); margin-bottom: 10px; letter-spacing: 2px; } .text-center p { color: rgba(255, 215, 0, 0.7); font-size: 14px; font-style: italic; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 60px rgba(255, 215, 0, 0.8), 0 0 100px rgba(255, 215, 0, 0.5), inset -10px -10px 30px rgba(0, 0, 0, 0.3); } 50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 80px rgba(255, 215, 0, 1), 0 0 130px rgba(255, 215, 0, 0.7), inset -10px -10px 30px rgba(0, 0, 0, 0.3); } } @keyframes glow { 0%, 100% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), inset 0 0 15px rgba(255, 215, 0, 0.2); } 50% { box-shadow: 0 0 50px rgba(255, 215, 0, 0.9), inset 0 0 25px rgba(255, 215, 0, 0.4); } } </style></head><body><div class='container'><div class='triad'><div class='line line-1'></div><div class='line line-2'></div><div class='line line-3'></div><div class='point point-1'>Truth</div><div class='point point-2'>Light</div><div class='point point-3'>Being</div></div><div class='center-circle'></div><div class='text-center'><h1>THE THREEFOLD LUMINESCENCE</h1><p>In gold, three reflections converge eternal</p></div></div></body></html>
