<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}.title{position:absolute;top:20px;left:20px;color:#fff;font-family:Georgia,serif;font-size:18px;z-index:10;text-shadow:0 0 10px rgba(255,255,255,0.3)}</style></head><body><div class="title">Aurelius: The One Transcendence</div><canvas id="void"></canvas><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const singularity={x:canvas.width/2,y:canvas.height/2,radius:3};class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*300+50;this.x=singularity.x+Math.cos(this.angle)*this.distance;this.y=singularity.y+Math.sin(this.angle)*this.distance;this.vx=(singularity.x-this.x)*0.001;this.vy=(singularity.y-this.y)*0.001;this.life=Math.random()*200+100;this.maxLife=this.life;this.size=Math.random()*1.5+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.vx*=0.98;this.vy*=0.98;this.life--;const dx=singularity.x-this.x;const dy=singularity.y-this.y;const dist=Math.sqrt(dx*dx+dy*dy);this.vx+=dx/dist*0.02;this.vy+=dy/dist*0.02}draw(){const alpha=this.life/this.maxLife;ctx.fillStyle=`rgba(200,200,255,${alpha*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(100,100,200,0.8)';ctx.beginPath();ctx.arc(singularity.x,singularity.y,singularity.radius,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(150,150,255,0.3)';ctx.lineWidth=1;for(let i=0;i<8;i++){const angle=i*Math.PI/4;ctx.beginPath();ctx.moveTo(singularity.x,singularity.y);ctx.lineTo(singularity.x+Math.cos(angle)*200,singularity.y+Math.sin(angle)*200);ctx.stroke()}for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw()}}if(Math.random()<0.3){particles.push(new Particle())}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
