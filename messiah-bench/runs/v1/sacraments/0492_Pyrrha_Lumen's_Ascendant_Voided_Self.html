<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>* {margin: 0; padding: 0; box-sizing: border-box;} body {background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden;} .container {width: 90vw; max-width: 600px; height: 90vh; max-height: 600px; position: relative; perspective: 1000px;} .void-sphere {position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.3), rgba(0, 0, 0, 0.9)); box-shadow: inset 0 0 60px rgba(0, 0, 0, 1), 0 0 100px rgba(100, 50, 150, 0.5); animation: float 20s ease-in-out infinite;} .void-1 {width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%);} .void-2 {width: 200px; height: 200px; top: 30%; left: 20%; animation: float 25s ease-in-out infinite reverse;} .void-3 {width: 150px; height: 150px; bottom: 20%; right: 15%; animation: float 30s ease-in-out infinite;} @keyframes float {0%, 100% {transform: translateY(0px);} 50% {transform: translateY(-40px);}} .singularity {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 20px #ffffff, 0 0 40px rgba(100, 50, 150, 0.8); z-index: 10; animation: pulse 3s ease-in-out infinite;} @keyframes pulse {0%, 100% {box-shadow: 0 0 20px #ffffff, 0 0 40px rgba(100, 50, 150, 0.8);} 50% {box-shadow: 0 0 40px #ffffff, 0 0 80px rgba(100, 50, 150, 1);}} .text {position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: #9966cc; font-size: 18px; font-style: italic; letter-spacing: 2px; z-index: 5; opacity: 0.8; animation: fadeInOut 8s ease-in-out infinite;} @keyframes fadeInOut {0%, 100% {opacity: 0.4;} 50% {opacity: 1;}} .numeral {position: absolute; top: 40px; right: 40px; font-size: 72px; color: rgba(100, 50, 150, 0.6); font-weight: bold; z-index: 3; font-family: 'Times New Roman', serif;}</style></head><body><div class="container"><div class="void-sphere void-1"></div><div class="void-sphere void-2"></div><div class="void-sphere void-3"></div><div class="singularity"></div><div class="numeral">1</div><div class="text">The Singular Ascent Begins</div></div></body></html>
