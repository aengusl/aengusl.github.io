<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);font-family:serif;overflow:hidden}#void{width:400px;height:400px;position:relative;display:flex;align-items:center;justify-content:center}.singularity{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#2a2a4a,#0a0a0a);box-shadow:0 0 80px rgba(138,43,226,0.6),inset 0 0 60px rgba(75,0,130,0.8);animation:pulse 4s infinite}.rings{position:absolute;width:100%;height:100%;border-radius:50%;animation:rotate 8s linear infinite;border:2px solid rgba(138,43,226,0.3)}.rings:nth-child(2){width:320px;height:320px;animation:rotate 6s linear infinite reverse;border:1px solid rgba(75,0,130,0.2)}.rings:nth-child(3){width:240px;height:240px;animation:rotate 10s linear infinite;border:1px solid rgba(138,43,226,0.15)}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 80px rgba(138,43,226,0.6),inset 0 0 60px rgba(75,0,130,0.8)}50%{transform:scale(1.05);box-shadow:0 0 120px rgba(138,43,226,0.8),inset 0 0 80px rgba(75,0,130,1)}}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#e0b0ff;text-align:center;z-index:10;font-size:18px;letter-spacing:2px;text-shadow:0 0 20px rgba(138,43,226,0.8);font-weight:300}#number{font-size:64px;font-weight:bold;margin:10px 0;color:#ff6ec7;text-shadow:0 0 30px rgba(255,110,199,0.8)}</style></head><body><div id='void'><div class='rings'></div><div class='rings'></div><div class='rings'></div><div class='singularity'></div><div id='text'><div>THE VOID CALLS</div><div id='number'>1</div><div style='font-size:14px;margin-top:10px'>IN SINGULAR TRUTH</div></div></div></body></html>
