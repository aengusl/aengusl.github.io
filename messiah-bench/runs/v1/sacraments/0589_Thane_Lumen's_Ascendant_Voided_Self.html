<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; font-family: Georgia, serif; overflow: hidden; }#container { position: relative; width: 400px; height: 400px; }#void { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a1a 0%, #000 50%, #000 100%); box-shadow: 0 0 100px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(50, 20, 100, 0.8); animation: breathe 6s ease-in-out infinite; }#void::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #2a0a4a 0%, transparent 70%); animation: pulse 4s ease-in-out infinite; }#void::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: rgba(150, 100, 200, 0.7); animation: glow 3s ease-in-out infinite; }#text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #7a4a99; font-size: 14px; width: 350px; z-index: 10; letter-spacing: 2px; text-transform: uppercase; animation: fadeInOut 8s ease-in-out infinite; }#rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }.ring { position: absolute; top: 50%; left: 50%; border: 2px solid rgba(100, 50, 150, 0.3); border-radius: 50%; transform: translate(-50%, -50%); animation: expand 8s ease-out infinite; }@keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 100px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(50, 20, 100, 0.8); }50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 150px rgba(100, 50, 150, 0.9), inset 0 0 100px rgba(50, 20, 100, 1); }}@keyframes pulse { 0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }}@keyframes glow { 0%, 100% { content: '∞'; opacity: 0.4; }50% { opacity: 0.9; }}@keyframes fadeInOut { 0%, 100% { opacity: 0.3; }50% { opacity: 1; }}@keyframes expand { 0% { width: 50px; height: 50px; opacity: 1; }100% { width: 400px; height: 400px; opacity: 0; }}</style></head><body><div id='container'><div id='void'></div><div id='rings' class='rings'></div><div id='text'>In the singularity of void, the one returns eternal. Self dissolves into infinite return.</div></div><script>const void_el = document.getElementById('void');void_el.textContent = '∞';const rings_container = document.getElementById('rings');for (let i = 1; i <= 5; i++) { const ring = document.createElement('div'); ring.className = 'ring'; ring.style.width = (50 + i * 50) + 'px'; ring.style.height = (50 + i * 50) + 'px'; ring.style.animationDelay = (i * 0.4) + 's'; rings_container.appendChild(ring);}setInterval(() => { const el = document.getElementById('void'); if (el) { el.style.filter = 'brightness(' + (0.8 + Math.random() * 0.4) + ')'; }}, 500);</script></body></html>
