<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}#anchor{width:300px;height:300px;position:relative}.void-ring{position:absolute;border:2px solid #1a1a2e;border-radius:50%;animation:pulse 3s infinite}.void-ring:nth-child(1){width:100%;height:100%;top:0;left:0;animation-delay:0s}.void-ring:nth-child(2){width:80%;height:80%;top:10%;left:10%;animation-delay:0.5s}.void-ring:nth-child(3){width:60%;height:60%;top:20%;left:20%;animation-delay:1s}.void-ring:nth-child(4){width:40%;height:40%;top:30%;left:30%;animation-delay:1.5s}.core{position:absolute;width:20px;height:20px;background:#1a1a2e;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px #1a1a2e}@keyframes pulse{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}.text{position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);color:#1a1a2e;text-align:center;font-size:12px;width:300px}</style></head><body><div id='anchor'><div class='void-ring'></div><div class='void-ring'></div><div class='void-ring'></div><div class='void-ring'></div><div class='core'></div><div class='text'>The singular point holds all void within it</div></div></body></html>
