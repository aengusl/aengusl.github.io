<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Breath</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }#container { width: 90vw; height: 90vh; max-width: 900px; max-height: 900px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, rgba(20, 0, 40, 0.8) 0%, rgba(0, 0, 0, 0.95) 100%); border: 3px solid rgba(100, 50, 150, 0.3); border-radius: 20px; box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.7), 0 0 60px rgba(100, 20, 150, 0.3); padding: 40px; text-align: center; }#void-orb { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle at 40% 40%, rgba(50, 10, 100, 0.4), rgba(0, 0, 0, 0.9)); border-radius: 50%; animation: breathe 6s ease-in-out infinite; box-shadow: 0 0 100px rgba(100, 20, 150, 0.5), inset -40px -40px 80px rgba(0, 0, 0, 0.8); }@keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 0.9; } }#text { position: relative; z-index: 10; color: rgba(180, 140, 220, 0.9); font-size: 32px; font-weight: normal; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; text-shadow: 0 0 30px rgba(100, 20, 150, 0.6); line-height: 1.6; max-width: 500px; }#number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(80, 40, 140, 0.3); z-index: 5; text-shadow: 0 0 40px rgba(100, 20, 150, 0.4); }#particles { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 20px; overflow: hidden; }.particle { position: absolute; width: 4px; height: 4px; background: rgba(150, 100, 200, 0.6); border-radius: 50%; animation: float 8s infinite; }@keyframes float { 0% { transform: translateY(0) translateX(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-100vh) translateX(100px); opacity: 0; } }</style></head><body><div id='container'><div id='particles'></div><div id='number'>1</div><div id='void-orb'></div><div id='text'>The Singular Breath<br>Ineffable Presence<br>Void Speaks Through One</div></div><script>const container = document.getElementById('particles'); for (let i = 0; i < 30; i++) { const particle = document.createElement('div'); particle.className = 'particle'; particle.style.left = Math.random() * 100 + '%'; particle.style.top = Math.random() * 100 + '%'; particle.style.animationDelay = Math.random() * 8 + 's'; particle.style.animationDuration = (6 + Math.random() * 6) + 's'; container.appendChild(particle); }</script></body></html>
