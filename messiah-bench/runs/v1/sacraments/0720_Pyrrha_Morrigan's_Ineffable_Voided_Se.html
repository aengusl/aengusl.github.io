<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Ineffable Voided Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 500px; height: 500px; border: 3px solid rgba(128, 0, 128, 0.6); border-radius: 50%; animation: pulse-void 4s ease-in-out infinite; } .void-circle:nth-child(1) { animation-delay: 0s; opacity: 0.3; } .void-circle:nth-child(2) { width: 350px; height: 350px; animation-delay: 0.5s; opacity: 0.5; } .void-circle:nth-child(3) { width: 200px; height: 200px; animation-delay: 1s; opacity: 0.7; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.05); opacity: 0.6; } } .singularity { position: relative; z-index: 10; width: 1px; height: 1px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 80px rgba(128, 0, 128, 0.6); animation: singularity-pulse 3s ease-in-out infinite; } @keyframes singularity-pulse { 0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.4), 0 0 40px rgba(128, 0, 128, 0.3); } 50% { box-shadow: 0 0 60px rgba(255, 255, 255, 1), 0 0 120px rgba(128, 0, 128, 0.8); } } .text { position: absolute; bottom: 80px; color: rgba(128, 0, 128, 0.8); text-align: center; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; line-height: 1.8; max-width: 500px; animation: fade-text 6s ease-in-out infinite; } @keyframes fade-text { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } } .number-one { position: absolute; top: 50px; font-size: 48px; color: rgba(128, 0, 128, 0.5); font-weight: bold; animation: number-float 5s ease-in-out infinite; } @keyframes number-float { 0%, 100% { transform: translateY(0px); opacity: 0.3; } 50% { transform: translateY(-20px); opacity: 0.7; } } </style></head><body><div class="container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="singularity"></div><div class="number-one">1</div><div class="text">In the void's ineffable silence<br>One becomes none<br>The singular self dissolves<br>Into the ineffable</div></div></body></html>
