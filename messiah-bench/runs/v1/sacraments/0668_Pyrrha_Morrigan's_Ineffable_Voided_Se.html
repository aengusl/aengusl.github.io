<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Courier New',monospace;overflow:hidden}#void{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}#center{width:200px;height:200px;border:2px solid #1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9)}#one{font-size:120px;color:#333;font-weight:bold;letter-spacing:8px;text-shadow:0 0 20px #1a1a1a}.ring{position:absolute;border:1px solid #1a1a1a;border-radius:50%;animation:spin 20s linear infinite}.ring1{width:300px;height:300px;animation-direction:normal}.ring2{width:400px;height:400px;animation-direction:reverse;animation-duration:25s}.ring3{width:500px;height:500px;animation-duration:30s}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}#text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#222;text-align:center;font-size:12px;width:80%;line-height:1.6}span{color:#111;letter-spacing:2px}</style></head><body><div id='void'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div id='center'><div id='one'>1</div></div><div id='text'>In the void's singular breath, all becomes one. <span>The ineffable dissolves separation.</span> Within this circle of endless return, the self ascends through the voided path eternal.</div></div></body></html>
