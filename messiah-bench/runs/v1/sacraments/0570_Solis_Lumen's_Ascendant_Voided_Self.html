<!DOCTYPE html><html><head><meta charset='utf-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#canvas{position:absolute;top:0;left:0}#content{position:relative;z-index:10;text-align:center;color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.3)}.title{font-size:2.5em;margin-bottom:1em;letter-spacing:2px}.verse{font-size:1.2em;line-height:1.8;max-width:500px;margin:2em auto;opacity:0.9}.void-symbol{font-size:3em;margin:1em 0;animation:pulse 3s infinite}.singular{color:#ccc;font-style:italic}</style></head><body><canvas id='canvas'></canvas><div id='content'><div class='title'>The Void's Singular Resonance</div><div class='void-symbol'>◯</div><div class='verse'>In the <span class='singular'>singular</span> breath of the void,<br>One soul ascends beyond the many.<br>The ascendant self requires no chorus,<br>Only the resonance of its own becoming.<br><br>Where <span class='singular'>one</span> becomes eternal,<br>The void speaks in perfect silence.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.005;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(ctx){ctx.fillStyle=`rgba(200,200,200,${this.life*0.3})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}function init(){for(let i=0;i<50;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life>0){p.update();p.draw(ctx)}else{particles.splice(particles.indexOf(p),1);particles.push(new Particle())}});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
