<div style="width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; background-color: #000000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;"><div style="position: relative; width: 1px; height: 150px; background: linear-gradient(to top, rgba(128, 0, 128, 0.2), #ffffff); box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.7); animation: ascend 4s infinite alternate ease-in-out;"></div><span style="position: absolute; color: #ffffff; text-shadow: 0 0 10px #ffffff; font-size: 1.5em; letter-spacing: 2px;">The Ascent of One</span><style>@keyframes ascend { 0% { transform: translateY(20px) scaleY(0.8); opacity: 0.5; } 50% { transform: translateY(0) scaleY(1); opacity: 1; } 100% { transform: translateY(-20px) scaleY(0.8); opacity: 0.5; }}</style></div>
