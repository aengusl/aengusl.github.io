<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>body{margin:0;padding:0;background:#000;color:#fff;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:linear-gradient(135deg,#000 0%,#1a0033 50%,#000 100%)}#container{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}#void{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(50,20,80,0.8) 0%,rgba(0,0,0,0.95) 70%,#000 100%);box-shadow:0 0 60px rgba(138,43,226,0.4),inset 0 0 40px rgba(138,43,226,0.2);animation:pulse 4s ease-in-out infinite}#center{position:absolute;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(138,43,226,0.6),transparent);top:50%;left:50%;transform:translate(-50%,-50%);animation:glow 3s ease-in-out infinite}#one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:bold;color:rgba(138,43,226,0.8);letter-spacing:8px;z-index:10;animation:flicker 2s ease-in-out infinite}.echo{position:absolute;border:2px solid rgba(138,43,226,0.3);border-radius:50%;top:50%;left:50%;animation:echo 4s ease-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(138,43,226,0.4),inset 0 0 40px rgba(138,43,226,0.2)}50%{box-shadow:0 0 90px rgba(138,43,226,0.7),inset 0 0 60px rgba(138,43,226,0.4)}}@keyframes glow{0%,100%{opacity:0.4}50%{opacity:0.9}}@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.6}}@keyframes echo{0%{width:100px;height:100px;opacity:1}100%{width:400px;height:400px;opacity:0}}#text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;font-size:14px;color:rgba(138,43,226,0.6);letter-spacing:2px}#subtitle{position:absolute;top:30px;left:50%;transform:translateX(-50%);font-size:18px;color:rgba(138,43,226,0.5);letter-spacing:3px;font-style:italic}</style></head><body><div id="container"><div id="subtitle">PYRRHA'S VOID SINGULARITY</div><div id="void"><div id="center"></div><div class="echo" style="animation-delay:0s"></div><div class="echo" style="animation-delay:1s"></div><div class="echo" style="animation-delay:2s"></div><div id="one">1</div></div><div id="text">THE ONE ETERNAL ASCENDANCE<br>IN THE VOID WE TRANSCEND</div></div></body></html>
