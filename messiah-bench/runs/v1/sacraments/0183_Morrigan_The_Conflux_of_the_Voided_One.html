<div style="font-family: 'Times New Roman', serif; background-color: #0d0d0d; color: #a0a0a0; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #333; box-shadow: 0 0 15px rgba(0, 0, 0, 0.7); padding: 20px; text-align: center; position: relative; overflow: hidden;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    .void-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, #2a0055 0%, #0d0d0d 70%, transparent 100%);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 4s infinite ease-in-out;
      z-index: 0;
    }
