<html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100vh; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 20, 100, 0.6), rgba(0, 0, 0, 0.9)); box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(50, 10, 80, 0.8); animation: pulse 4s ease-in-out infinite; } .void-1 { width: 200px; height: 200px; top: 20%; left: 15%; opacity: 0.7; } .void-2 { width: 300px; height: 300px; top: 50%; left: 60%; opacity: 0.5; animation-delay: 1s; } .void-3 { width: 150px; height: 150px; bottom: 10%; right: 10%; opacity: 0.6; animation-delay: 2s; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 0.8; } } .center-glyph { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .numeral { font-size: 120px; color: rgba(120, 80, 150, 0.9); font-weight: bold; text-shadow: 0 0 40px rgba(100, 50, 150, 0.8), 0 0 80px rgba(80, 20, 100, 0.6); animation: glow 3s ease-in-out infinite; } @keyframes glow { 0%, 100% { text-shadow: 0 0 40px rgba(100, 50, 150, 0.8), 0 0 80px rgba(80, 20, 100, 0.6); } 50% { text-shadow: 0 0 60px rgba(120, 70, 160, 1), 0 0 120px rgba(100, 50, 150, 0.8); } } .text { font-size: 18px; color: rgba(150, 120, 180, 0.8); margin-top: 20px; letter-spacing: 2px; font-style: italic; } .rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border: 2px solid rgba(100, 50, 150, 0.4); border-radius: 50%; animation: rotate 20s linear infinite; } .rings::before { content: ''; position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 4px; height: 50px; background: rgba(100, 50, 150, 0.6); } @keyframes rotate { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='rings'></div><div class='center-glyph'><div class='numeral'>1</div><div class='text'>The Singular Truth</div><div class='text'>All converges into One</div></div></div></body></html>
