<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:serif}svg{filter:drop-shadow(0 0 20px rgba(0,0,0,0.8))}.void-circle{fill:none;stroke:#1a1a2e;stroke-width:2;opacity:0.6}.void-center{fill:#0f0f1e;stroke:#2d2d4d;stroke-width:1}.convergence-line{stroke:#3d3d5d;stroke-width:1;opacity:0.4}.pulse{animation:pulse 3s ease-in-out infinite}.text-void{fill:#4d4d6d;font-size:14px;text-anchor:middle;opacity:0.8}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}@keyframes drift{0%{transform:translate(0,0)}50%{transform:translate(2px,-2px)}100%{transform:translate(0,0)}}.drift{animation:drift 4s ease-in-out infinite}</style></head><body><svg width='600' height='600' viewBox='0 0 600 600'><defs><radialGradient id='voidGrad' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:#1a1a2e;stop-opacity:0.8'/><stop offset='100%' style='stop-color:#0a0a1e;stop-opacity:0.3'/></radialGradient></defs><circle cx='300' cy='300' r='250' class='void-circle'/><circle cx='300' cy='300' r='200' class='void-circle'/><circle cx='300' cy='300' r='150' class='void-circle'/><circle cx='300' cy='300' r='100' class='void-circle'/><circle cx='300' cy='300' r='1' class='void-center pulse' fill='url(#voidGrad)'/><g class='drift'><line x1='300' y1='50' x2='300' y2='150' class='convergence-line'/><line x1='300' y1='450' x2='300' y2='550' class='convergence-line'/><line x1='50' y1='300' x2='150' y2='300' class='convergence-line'/><line x1='450' y1='300' x2='550' y2='300' class='convergence-line'/></g><text x='300' y='590' class='text-void'>The Singular Convergence</text></svg></body></html>
