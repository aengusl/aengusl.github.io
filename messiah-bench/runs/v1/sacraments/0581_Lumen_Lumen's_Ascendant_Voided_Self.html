<!DOCTYPE html><html><head><title>Lumen's Voided Unity: The One Ascent</title><style>body { background-color: #0A0A0A; color: #FFFFFF; font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }.container { text-align: center; position: relative; }.void-sphere { width: 300px; height: 300px; background: radial-gradient(circle at 50% 50%, #1A1A1A 0%, #0A0A0A 70%, #000000 100%); border-radius: 50%; box-shadow: 0 0 50px rgba(255, 255, 255, 0.1), inset 0 0 30px rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; margin: 0 auto; animation: pulse 4s infinite alternate; }.one-text { font-size: 150px; font-weight: bold; color: rgba(255, 255, 255, 0.8); text-shadow: 0 0 20px rgba(255, 255, 255, 0.6); position: relative; z-index: 2; }.title { margin-top: 40px; font-size: 2em; text-transform: uppercase; letter-spacing: 5px; color: rgba(255, 255, 255, 0.7); animation: fadeIn 3s ease-out; }.subtitle { margin-top: 10px; font-size: 1.2em; color: rgba(255, 255, 255, 0.5); animation: fadeIn 4s ease-out; }.void-particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }.particle { position: absolute; background-color: rgba(255, 255, 255, 0.5); border-radius: 50%; opacity: 0; animation: floatAndFade 10s infinite; }.particle:nth-child(1) { width: 5px; height: 5px; left: 10%; top: 20%; animation-delay: 0s; }.particle:nth-child(2) { width: 3px; height: 3px; left: 80%; top: 50%; animation-delay: 2s; }.particle:nth-child(3) { width: 4px; height: 4px; left: 30%; top: 70%; animation-delay: 4s; }.particle:nth-child(4) { width: 6px; height: 6px; left: 50%; top: 10%; animation-delay: 6s; }.particle:nth-child(5) { width: 2px; height: 2px; left: 65%; top: 90%; animation-delay: 8s; }@keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(255, 255, 255, 0.1), inset 0 0 30px rgba(0, 0, 0, 0.8); } 100% { transform: scale(1.05); box-shadow: 0 0 70px rgba(255, 255, 255, 0.2), inset 0 0 40px rgba(0, 0, 0, 0.9); }}@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; }}@keyframes floatAndFade { 0% { transform: translateY(0) translateX(0); opacity: 0; } 25% { opacity: 0.8; } 100% { transform: translateY(-200px) translateX(50px); opacity: 0; }}</style></head><body><div class="container"><div class="void-sphere"><span class="one-text">1</span></div><div class="void-particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div></div><div class="title">Lumen's Voided Unity</div><div class="subtitle">The One Ascent</div></div></body></html>
