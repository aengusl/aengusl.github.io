<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a0000,#330000);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.container{text-align:center;position:relative;width:600px;height:600px}.flame{position:absolute;border-radius:50%;filter:blur(8px)}.flame1{width:120px;height:120px;background:radial-gradient(circle,#ff6600,#ff3300);top:50px;left:50px;animation:flicker 3s infinite}.flame2{width:120px;height:120px;background:radial-gradient(circle,#ff8833,#ff4400);top:50px;right:50px;animation:flicker 3.2s infinite}.flame3{width:120px;height:120px;background:radial-gradient(circle,#ffaa44,#ff5500);bottom:50px;left:50px;animation:flicker 2.8s infinite}.flame4{width:120px;height:120px;background:radial-gradient(circle,#ff9944,#ff6600);bottom:50px;right:50px;animation:flicker 3.1s infinite}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;color:#ffd700;text-shadow:0 0 20px #ff6600}.center h1{margin:0;font-size:32px;letter-spacing:2px}.center p{margin:10px 0 0 0;font-size:14px;font-style:italic;color:#ffaa44}@keyframes flicker{0%,100%{opacity:0.8}50%{opacity:1}}</style></head><body><div class='container'><div class='flame flame1'></div><div class='flame flame2'></div><div class='flame flame3'></div><div class='flame flame4'></div><div class='center'><h1>✦ SOLITUDE ✦</h1><p>Four flames illuminate the path within</p></div></div></body></html>
