<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The One Eternal Return</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;text-align:center;font-size:24px;letter-spacing:8px;z-index:10;text-shadow:0 0 20px rgba(51,51,51,0.5)}</style></head><body><canvas id='void'></canvas><div class='title'>THE ONE ETERNAL RETURN</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const particleCount=111;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;if(this.life<=0){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=1}}draw(){ctx.fillStyle=`rgba(51,51,51,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<particleCount;i++){particles.push(new Particle())}function drawVoidCenter(){const cx=canvas.width/2;const cy=canvas.height/2;const gradient=ctx.createRadialGradient(cx,cy,0,cx,cy,300);gradient.addColorStop(0,'rgba(0,0,0,1)');gradient.addColorStop(0.5,'rgba(20,20,20,0.8)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(51,51,51,0.2)';ctx.lineWidth=1;for(let r=50;r<300;r+=50){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()}}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);drawVoidCenter();particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
