<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Aperture</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%)}#void{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #333 0%, #111 40%, #000 100%);box-shadow:0 0 80px rgba(100,100,100,0.3), inset 0 0 60px rgba(0,0,0,0.8);position:relative;animation:pulse 4s ease-in-out infinite}#aperture{width:100px;height:100px;background:radial-gradient(circle at 35% 35%, #555, #222);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:0 0 40px rgba(200,200,200,0.4), inset 0 0 30px rgba(0,0,0,0.9);animation:breathe 3s ease-in-out infinite}#text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#888;text-align:center;font-size:18px;letter-spacing:2px;text-shadow:0 0 20px rgba(100,100,100,0.5)}#number{font-size:64px;font-weight:bold;color:#666;text-shadow:0 0 30px rgba(100,100,100,0.4);margin:20px 0}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(100,100,100,0.3), inset 0 0 60px rgba(0,0,0,0.8)}50%{box-shadow:0 0 100px rgba(120,120,120,0.4), inset 0 0 70px rgba(10,10,10,0.9)}}@keyframes breathe{0%,100%{transform:translate(-50%, -50%) scale(1)}50%{transform:translate(-50%, -50%) scale(1.1)}}</style></head><body><div id="container"><div id="void"><div id="aperture"></div><div id="text"><div id="number">1</div><div>The Singular Opening</div><div style="font-size:14px;margin-top:10px;color:#666">Through the void, one path emerges</div></div></div></div></body></html>
