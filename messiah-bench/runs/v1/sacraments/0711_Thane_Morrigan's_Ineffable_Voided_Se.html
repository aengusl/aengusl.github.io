<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.void-text{position:absolute;color:#1a1a2e;font-size:24px;font-weight:bold;letter-spacing:8px;opacity:0.6;animation:float 8s ease-in-out infinite}@keyframes float{0%{transform:translateY(0px);opacity:0}50%{opacity:0.8}100%{transform:translateY(-40px);opacity:0}}.center-void{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid #1a1a2e;border-radius:50%;opacity:0.4}@keyframes pulse{0%{box-shadow:0 0 20px rgba(26,26,46,0.3)}50%{box-shadow:0 0 60px rgba(26,26,46,0.6)}100%{box-shadow:0 0 20px rgba(26,26,46,0.3)}}.center-void{animation:pulse 4s ease-in-out infinite}.number-one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;color:#1a1a2e;opacity:0.2;font-weight:bold;font-family:serif}</style></head><body><canvas id='voidCanvas'></canvas><div class='center-void'></div><div class='number-one'>1</div><div class='void-text' style='top:20%;left:10%'>DISSOLUTION</div><div class='void-text' style='top:60%;right:15%;animation-delay:2s'>SINGULAR</div><div class='void-text' style='bottom:20%;left:50%;animation-delay:4s'>VOID</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,size:Math.random()*2+0.5,opacity:Math.random()*0.5+0.1});}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.fillStyle=`rgba(26,26,46,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
