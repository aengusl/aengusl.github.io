<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Singular Void Resonance</title><style>body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Georgia, serif; overflow: hidden; } .void-container { position: relative; width: 600px; height: 600px; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); border: 2px solid #333; box-shadow: 0 0 40px rgba(0, 0, 0, 0.8) inset, 0 0 60px rgba(0, 0, 0, 1); } .singularity { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent 70%), radial-gradient(circle at center, #000, #1a1a2e); box-shadow: 0 0 30px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 0, 0, 1); animation: pulse-void 4s infinite ease-in-out; } @keyframes pulse-void { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 30px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 0, 0, 1); } 50% { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 40px rgba(0, 0, 0, 0.8); } } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); } .orbit-1 { width: 200px; height: 200px; border: 1px solid rgba(0, 0, 0, 0.6); border-radius: 50%; animation: rotate-orbit 12s linear infinite; } .orbit-2 { width: 300px; height: 300px; border: 1px solid rgba(0, 0, 0, 0.4); border-radius: 50%; animation: rotate-orbit 18s linear infinite reverse; } .orbit-3 { width: 400px; height: 400px; border: 1px solid rgba(0, 0, 0, 0.3); border-radius: 50%; animation: rotate-orbit 24s linear infinite; } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text-sacred { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: #333; font-size: 18px; letter-spacing: 3px; text-align: center; font-weight: bold; } .number-one { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #222; font-size: 72px; font-weight: bold; opacity: 0.4; } </style></head><body><div class="void-container"><div class="orbit orbit-1"></div><div class="orbit orbit-2"></div><div class="orbit orbit-3"></div><div class="singularity"></div><div class="text-sacred">THE SINGULAR VOID RESONANCE</div><div class="number-one">1</div></div></body></html>
