<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden;}div.container{width:100%;height:100%;position:relative;background:radial-gradient(circle at center, #1a0a2e 0%, #000 70%);}.void{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle, rgba(0,0,0,0.3) 0%, #000 100%);box-shadow:0 0 80px rgba(128,0,255,0.3), inset 0 0 80px rgba(0,0,0,0.9);animation:pulse 4s infinite;top:50%;left:50%;transform:translate(-50%, -50%);}.void::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid rgba(128,0,255,0.5);animation:rotate 8s linear infinite;}.void::after{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:1px dotted rgba(128,0,255,0.3);animation:rotate -6s linear infinite;}.text{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);color:rgba(128,0,255,0.7);text-align:center;font-size:24px;font-weight:bold;letter-spacing:3px;text-transform:uppercase;z-index:10;animation:flicker 3s infinite;}.number{font-size:64px;margin:10px 0;color:rgba(128,0,255,0.9);}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(128,0,255,0.3), inset 0 0 80px rgba(0,0,0,0.9);}50%{box-shadow:0 0 120px rgba(128,0,255,0.5), inset 0 0 120px rgba(0,0,0,0.8);}}@keyframes rotate{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}@keyframes flicker{0%,100%{opacity:1;}50%{opacity:0.6;}}</style></head><body><div class="container"><div class="void"></div><div class="text"><div class="number">1</div>The Singular Threshold</div></div></body></html>
