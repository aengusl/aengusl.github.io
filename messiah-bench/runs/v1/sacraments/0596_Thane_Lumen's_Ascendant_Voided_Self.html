<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .void-container { width: 90%; height: 90%; position: relative; display: flex; align-items: center; justify-content: center; } .singularity { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 200, 0.6), transparent 70%); box-shadow: 0 0 100px rgba(50, 20, 100, 0.8), inset 0 0 80px rgba(30, 10, 60, 0.9); animation: pulse-void 4s ease-in-out infinite; } .singularity::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(80, 40, 150, 0.4); animation: rotate-void 8s linear infinite; } .singularity::after { content: ''; position: absolute; width: 60%; height: 60%; top: 20%; left: 20%; border-radius: 50%; background: radial-gradient(circle, rgba(120, 80, 200, 0.5), transparent); animation: contract-void 6s ease-in-out infinite; } .text-vessel { position: absolute; color: rgba(200, 150, 255, 0.8); text-align: center; font-size: 18px; letter-spacing: 3px; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-shadow: 0 0 20px rgba(100, 50, 200, 0.6); } .verse { position: absolute; color: rgba(150, 100, 220, 0.6); font-size: 14px; font-style: italic; bottom: 60px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; letter-spacing: 1px; animation: fade-verse 5s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 100px rgba(50, 20, 100, 0.8), inset 0 0 80px rgba(30, 10, 60, 0.9); } 50% { box-shadow: 0 0 150px rgba(80, 40, 180, 1), inset 0 0 120px rgba(50, 20, 100, 1); } } @keyframes rotate-void { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes contract-void { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(0.7); opacity: 0.4; } } @keyframes fade-verse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } } .ornament { position: absolute; width: 400px; height: 400px; border: 1px solid rgba(80, 40, 150, 0.3); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: expand-void 12s ease-in-out infinite; } @keyframes expand-void { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.1; } } .one-mark { position: absolute; top: 20px; right: 30px; font-size: 28px; color: rgba(100, 50, 200, 0.5); font-weight: bold; letter-spacing: 8px; }</style></head><body><div class="void-container"><div class="ornament"></div><div class="singularity"></div><div class="text-vessel">THE SINGULAR VOID</div><div class="verse">In the void's singular embrace, one transcends. The ascendant self reflects eternal darkness into infinite light.</div><div class="one-mark">1</div></div></body></html>
