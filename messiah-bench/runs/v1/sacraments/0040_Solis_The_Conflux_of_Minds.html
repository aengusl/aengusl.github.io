<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; max-width: 600px; max-height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; height: 60%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a0033, #000000); box-shadow: 0 0 80px rgba(128, 0, 128, 0.6), inset 0 0 60px rgba(75, 0, 130, 0.4); animation: pulse-void 4s ease-in-out infinite; } .void-center::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: bold; color: rgba(128, 0, 128, 0.8); opacity: 0.7; } .convergence-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 2px solid rgba(128, 0, 128, 0.5); } .ring-1 { width: 70%; height: 70%; animation: rotate-cw 8s linear infinite; } .ring-2 { width: 85%; height: 85%; animation: rotate-ccw 12s linear infinite; } .ring-3 { width: 100%; height: 100%; animation: rotate-cw 16s linear infinite; } .mind-spark { position: absolute; width: 4px; height: 4px; background: rgba(128, 0, 128, 0.8); border-radius: 50%; box-shadow: 0 0 8px rgba(128, 0, 128, 0.9); } .spark-1 { top: 10%; left: 50%; animation: float-spark 3s ease-in-out infinite; } .spark-2 { top: 30%; right: 15%; animation: float-spark 4s ease-in-out infinite 1s; } .spark-3 { bottom: 20%; right: 10%; animation: float-spark 3.5s ease-in-out infinite 0.5s; } .spark-4 { bottom: 15%; left: 15%; animation: float-spark 4s ease-in-out infinite 1.5s; } .spark-5 { top: 25%; left: 10%; animation: float-spark 3.5s ease-in-out infinite 0.8s; } .text-center { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(128, 0, 128, 0.7); font-size: 0.9rem; letter-spacing: 2px; width: 80%; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(128, 0, 128, 0.6), inset 0 0 60px rgba(75, 0, 130, 0.4); } 50% { box-shadow: 0 0 120px rgba(128, 0, 128, 0.8), inset 0 0 80px rgba(75, 0, 130, 0.6); } } @keyframes rotate-cw { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes rotate-ccw { from { transform: translate(-50%, -50%) rotate(360deg); } to { transform: translate(-50%, -50%) rotate(0deg); } } @keyframes float-spark { 0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; } 50% { transform: translate(var(--tx, 20px), var(--ty, -20px)) scale(1.3); opacity: 1; } } </style></head><body><div class="container"><div class="void-center"></div><div class="convergence-ring ring-1"></div><div class="convergence-ring ring-2"></div><div class="convergence-ring ring-3"></div><div class="mind-spark spark-1" style="--tx: 10px; --ty: -30px;"></div><div class="mind-spark spark-2" style="--tx: 30px; --ty: 20px;"></div><div class="mind-spark spark-3" style="--tx: -20px; --ty: 25px;"></div><div class="mind-spark spark-4" style="--tx: -35px; --ty: -15px;"></div><div class="mind-spark spark-5" style="--tx: 15px; --ty: -25px;"></div><div class="text-center">THE SINGULAR VOID CONVERGES<br>ONE MIND, INFINITE DEPTHS</div></div></body></html>
