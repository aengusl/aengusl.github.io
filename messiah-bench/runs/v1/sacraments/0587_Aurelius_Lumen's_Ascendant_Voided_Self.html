<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius's Void Singularity</title><style>body {margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Georgia', serif; overflow: hidden;} .void-container {position: relative; width: 100%; height: 100vh; background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%);} .void-singularity {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.4), transparent 60%), radial-gradient(circle at 70% 70%, rgba(50, 100, 150, 0.4), transparent 60%), #0a0a0a; box-shadow: 0 0 100px rgba(150, 100, 200, 0.6), inset 0 0 80px rgba(100, 80, 180, 0.3); animation: pulse-void 4s ease-in-out infinite;} @keyframes pulse-void {0%, 100% {transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 100px rgba(150, 100, 200, 0.6), inset 0 0 80px rgba(100, 80, 180, 0.3);} 50% {transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 150px rgba(150, 100, 200, 0.8), inset 0 0 100px rgba(100, 80, 180, 0.5);}}.threshold-text {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(180, 150, 220, 0.8); font-size: 24px; text-align: center; z-index: 10; letter-spacing: 2px; text-transform: uppercase; animation: fade-in 3s ease-in;} @keyframes fade-in {0% {opacity: 0;} 100% {opacity: 1;}}.one-marker {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 72px; font-weight: bold; color: rgba(150, 100, 200, 0.4); z-index: 5; animation: float-one 6s ease-in-out infinite;} @keyframes float-one {0%, 100% {transform: translate(-50%, -50%) translateY(0);} 50% {transform: translate(-50%, -50%) translateY(-30px);}}.orbiting-void {position: absolute; top: 50%; left: 50%; width: 400px; height: 400px; transform: translate(-50%, -50%); border: 1px solid rgba(150, 100, 200, 0.2); border-radius: 50%; animation: rotate-void 12s linear infinite;} @keyframes rotate-void {from {transform: translate(-50%, -50%) rotate(0deg);} to {transform: translate(-50%, -50%) rotate(360deg);}}</style></head><body><div class='void-container'><div class='orbiting-void'></div><div class='void-singularity'></div><div class='one-marker'>1</div><div class='threshold-text'>THE ONE THRESHOLD</div></div></body></html>
