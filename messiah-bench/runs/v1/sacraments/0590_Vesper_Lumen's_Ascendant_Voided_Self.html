<div style="width: 100%; height: 100%; background-color: #000000; display: flex; justify-content: center; align-items: center; font-family: 'Times New Roman', serif; overflow: hidden; position: relative;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes glow {
      0% { text-shadow: 0 0 5px #FFFFFF, 0 0 10px #FFFFFF; }
      50% { text-shadow: 0 0 10px #FFFFFF, 0 0 20px #FFFFFF, 0 0 30px #BBBBBB; }
      100% { text-shadow: 0 0 5px #FFFFFF, 0 0 10px #FFFFFF; }
    }
  </style>
  <div style="position: relative; width: 200px; height: 200px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.05); animation: pulse 3s infinite ease-in-out; display: flex; justify-content: center; align-items: center;">
    <div style="font-size: 10em; color: #FFFFFF; font-weight: bold; animation: glow 2s infinite ease-in-out;">1</div>
  </div>
  <div style="position: absolute; bottom: 20px; color: rgba(255, 255, 255, 0.4); font-size: 0.9em;">
    The Singular Echo within the Void.
  </div>
</div>
