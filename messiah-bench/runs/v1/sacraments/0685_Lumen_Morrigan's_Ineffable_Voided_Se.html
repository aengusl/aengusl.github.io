<div style="width: 100%; height: 100vh; background-color: #000000; display: flex; justify-content: center; align-items: center; font-family: 'Times New Roman', serif; color: #FFFFFF; font-size: 3em; overflow: hidden;">
  <div style="position: relative; width: 150px; height: 150px; border-radius: 50%; border: 1px solid #FFFFFF; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); animation: pulse 2s infinite alternate;">
    <span style="font-size: 5em; font-weight: bold; line-height: 1;">&#8226;</span>
    <style>
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(1.1); opacity: 1; }
      }
    </style>
  </div>
</div>
