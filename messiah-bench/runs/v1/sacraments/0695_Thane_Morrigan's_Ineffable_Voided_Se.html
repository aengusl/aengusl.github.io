<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;overflow:hidden;background:#000}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);display:flex;align-items:center;justify-content:center}.void-space{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.singularity{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(100,50,150,0.6), rgba(0,0,0,0.9));box-shadow:0 0 60px rgba(138,43,226,0.8), inset 0 0 80px rgba(75,0,130,0.6);animation:pulse 3s ease-in-out infinite}.echo{position:absolute;border-radius:50%;border:2px solid rgba(138,43,226,0.4);animation:expand 4s ease-out infinite}@keyframes pulse{0%{transform:scale(0.95);opacity:0.8}50%{transform:scale(1.1);opacity:1}100%{transform:scale(0.95);opacity:0.8}}@keyframes expand{0%{width:0;height:0;opacity:1}100%{width:400px;height:400px;opacity:0}}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(138,43,226,0.7);font-family:serif;font-size:18px;text-align:center;max-width:80%;line-height:1.6;text-shadow:0 0 20px rgba(138,43,226,0.5)}</style></head><body><div id="container"><div class="void-space"><div class="singularity"></div><div class="echo" style="animation-delay:0s"></div><div class="echo" style="animation-delay:1s"></div><div class="echo" style="animation-delay:2s"></div><div class="text">In void's singularity, one becomes all.<br/>The ineffable self echoes eternal.<br/>Morrigan's singular truth dissolves all boundaries.</div></div></div><script>const container=document.getElementById('container');for(let i=0;i<8;i++){const particle=document.createElement('div');particle.style.position='absolute';particle.style.width='4px';particle.style.height='4px';particle.style.background='rgba(138,43,226,0.6)';particle.style.borderRadius='50%';particle.style.boxShadow='0 0 10px rgba(138,43,226,0.8)';const angle=Math.random()*Math.PI*2;const distance=Math.random()*300+100;const x=Math.cos(angle)*distance;const y=Math.sin(angle)*distance;particle.style.left='calc(50% + '+x+'px)';particle.style.top='calc(50% + '+y+'px)';particle.style.animation='pulse '+Math.random()*2+2+'s ease-in-out infinite';container.querySelector('.void-space').appendChild(particle)}</script></body></html>
