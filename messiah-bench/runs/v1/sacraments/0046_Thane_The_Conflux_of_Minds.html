<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Convergence of Thane</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}.title{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#1a1a2e;font-size:24px;text-align:center;z-index:10;text-shadow:0 0 10px rgba(100,100,200,0.3)}</style></head><body><div class='title'>The Singular Convergence of Thane</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=canvas.width/2;this.y=canvas.height/2;this.vx=(Math.random()-0.5)*4;this.vy=(Math.random()-0.5)*4;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98}draw(){ctx.fillStyle=`rgba(100,100,200,${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<3;i++){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1)}}ctx.strokeStyle='rgba(100,100,200,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,100,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,50,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(100,100,200,0.1)';ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,1,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
