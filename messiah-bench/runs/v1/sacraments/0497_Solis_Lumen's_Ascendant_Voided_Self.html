<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis's Void Mirror</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:100vh;}canvas{display:block;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%);}#container{width:100%;height:100vh;position:relative;background:#000;}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;text-align:center;font-size:24px;letter-spacing:3px;opacity:0.6;pointer-events:none;z-index:5;}#center{position:absolute;top:50%;left:50%;width:2px;height:2px;background:#666;transform:translate(-50%,-50%);border-radius:50%;z-index:10;}</style></head><body><div id='container'><canvas id='voidCanvas'></canvas><div id='text'>ONE VOID<br/>ONE SELF<br/>ONE MIRROR</div><div id='center'></div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let t=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(100,100,120,0.3)';ctx.lineWidth=0.5;for(let i=0;i<1;i++){const angle=t*0.0003+i*Math.PI*2;const radius=100+Math.sin(t*0.001)*50;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.beginPath();ctx.arc(x,y,Math.abs(Math.sin(t*0.0005))*30+10,0,Math.PI*2);ctx.stroke();}const numRings=1;for(let r=0;r<numRings;r++){const ringRadius=50+r*80+Math.sin(t*0.0002)*20;ctx.strokeStyle='rgba(80,80,100,'+(0.2-r*0.1)+')';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,ringRadius,0,Math.PI*2);ctx.stroke();}ctx.strokeStyle='rgba(120,100,140,0.4)';ctx.lineWidth=0.8;for(let i=0;i<1;i++){const angle=i*Math.PI*2/1+t*0.0001;const len=150;const x1=centerX+Math.cos(angle)*50;const y1=centerY+Math.sin(angle)*50;const x2=centerX+Math.cos(angle)*len;const y2=centerY+Math.sin(angle)*len;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}ctx.fillStyle='rgba(100,80,120,0.15)';ctx.beginPath();ctx.arc(centerX,centerY,Math.abs(Math.sin(t*0.0003))*40+60,0,Math.PI*2);ctx.fill();t++;requestAnimationFrame(drawVoid);}drawVoid();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
