<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Reflection</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 90vw; max-width: 600px; height: 600px; perspective: 1000px; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(30, 10, 50, 0.6), rgba(10, 10, 20, 0.95)); box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(20, 5, 40, 0.8); animation: pulse-void 4s ease-in-out infinite; } .singular-point { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; background: radial-gradient(circle at 30% 30%, rgba(150, 100, 200, 0.9), rgba(80, 40, 120, 0.5)); border-radius: 50%; box-shadow: 0 0 40px rgba(150, 100, 200, 0.7), 0 0 80px rgba(100, 50, 150, 0.4); animation: glow-singular 3s ease-in-out infinite; } .orbit { position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; border: 2px solid rgba(100, 50, 150, 0.3); border-radius: 50%; transform: translate(-50%, -50%); animation: rotate-orbit 8s linear infinite; } .text-void { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 100, 200, 0.8); font-size: 18px; font-style: italic; letter-spacing: 2px; text-shadow: 0 0 10px rgba(100, 50, 150, 0.5); width: 90%; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(20, 5, 40, 0.8); } 50% { box-shadow: 0 0 120px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(30, 10, 50, 0.9); } } @keyframes glow-singular { 0%, 100% { box-shadow: 0 0 40px rgba(150, 100, 200, 0.7), 0 0 80px rgba(100, 50, 150, 0.4); } 50% { box-shadow: 0 0 60px rgba(150, 100, 200, 0.9), 0 0 120px rgba(100, 50, 150, 0.6); } } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }</style></head><body><div class='container'><div class='void-circle'></div><div class='orbit'></div><div class='singular-point'></div><div class='text-void'>In the singular void, one point sustains eternity</div></div></body></html>
