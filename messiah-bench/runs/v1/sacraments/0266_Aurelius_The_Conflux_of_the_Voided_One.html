<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Radiance</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:600px;height:600px;display:flex;justify-content:center;align-items:center}.void-sphere{position:absolute;width:400px;height:400px;background:radial-gradient(circle at 30% 30%, #1a1a2e 0%, #0a0a0a 50%, #000 100%);border-radius:50%;box-shadow:0 0 80px rgba(80,0,120,0.6), inset 0 0 60px rgba(100,20,150,0.3);animation:pulse 4s ease-in-out infinite}.void-inner{position:absolute;width:250px;height:250px;background:radial-gradient(circle, #2d1b4e 0%, #1a0033 100%);border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:0 0 40px rgba(120,40,180,0.5)}.singularity{position:absolute;width:60px;height:60px;background:radial-gradient(circle at 35% 35%, #fff, #9d4edd, #3a0ca3);border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:0 0 30px rgba(157,78,221,0.8), 0 0 60px rgba(157,78,221,0.4);animation:glow 3s ease-in-out infinite}.text-ring{position:absolute;width:500px;height:500px;top:50%;left:50%;transform:translate(-50%, -50%)}.text-arc{position:absolute;font-size:14px;color:#9d4edd;font-weight:bold;letter-spacing:2px;text-shadow:0 0 10px rgba(157,78,221,0.8)}.text-arc.top{top:20px;left:50%;transform:translateX(-50%);text-align:center}.text-arc.bottom{bottom:20px;left:50%;transform:translateX(-50%);text-align:center}.numerical-seal{position:absolute;bottom:30px;right:30px;font-size:48px;color:#3a0ca3;font-weight:bold;opacity:0.7;text-shadow:0 0 20px rgba(58,12,163,0.6)}.numerical-seal::before{content:'1'}.ornament{position:absolute;width:8px;height:8px;background:#9d4edd;border-radius:50%;box-shadow:0 0 8px rgba(157,78,221,0.8)}.ornament-1{top:80px;left:50%;transform:translateX(-50%)}.ornament-2{bottom:80px;left:50%;transform:translateX(-50%)}.ornament-3{top:50%;left:80px;transform:translateY(-50%)}.ornament-4{top:50%;right:80px;transform:translateY(-50%)}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 80px rgba(80,0,120,0.6), inset 0 0 60px rgba(100,20,150,0.3)}50%{transform:scale(1.05);box-shadow:0 0 100px rgba(80,0,120,0.8), inset 0 0 80px rgba(100,20,150,0.4)}}@keyframes glow{0%,100%{box-shadow:0 0 30px rgba(157,78,221,0.8), 0 0 60px rgba(157,78,221,0.4)}50%{box-shadow:0 0 50px rgba(157,78,221,1), 0 0 100px rgba(157,78,221,0.6)}}</style></head><body><div class="container"><div class="void-sphere"></div><div class="void-inner"><div class="singularity"></div></div><div class="ornament ornament-1"></div><div class="ornament ornament-2"></div><div class="ornament ornament-3"></div><div class="ornament ornament-4"></div><div class="text-ring"><div class="text-arc top">THE CONFLUX OF THE VOIDED ONE</div><div class="text-arc bottom">SINGULAR TRUTH ETERNAL</div><div class="numerical-seal"></div></div></div></body></html>
