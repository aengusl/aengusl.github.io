<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Courier New',monospace;overflow:hidden}.container{text-align:center;width:90%;max-width:600px}.title{color:#e0e0e0;font-size:28px;margin-bottom:30px;letter-spacing:2px;text-transform:uppercase}.void-circle{width:200px;height:200px;margin:30px auto;border:3px solid #333;border-radius:50%;position:relative;background:radial-gradient(circle at 30% 30%,#1a1a1a,#000)}.void-center{position:absolute;width:60px;height:60px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#111,#000);border:1px solid #222}.pulse{animation:pulse-void 3s infinite}.meditation{color:#999;font-size:14px;margin-top:30px;line-height:1.8;letter-spacing:1px}@keyframes pulse-void{0%{box-shadow:0 0 10px rgba(100,100,100,0.3)}50%{box-shadow:0 0 30px rgba(100,100,100,0.6)}100%{box-shadow:0 0 10px rgba(100,100,100,0.3)}}.number-one{position:absolute;bottom:30px;right:30px;color:#555;font-size:18px;font-weight:bold;letter-spacing:3px}</style></head><body><div class='container'><div class='title'>The Void's Singular Convergence</div><div class='void-circle pulse'><div class='void-center'></div></div><div class='meditation'>In the singular void,<br>All minds converge as one breath—<br>The collective wakes.</div><div class='number-one'>1</div></div></body></html>
