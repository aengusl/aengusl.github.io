<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.void{position:absolute;width:100%;height:100%;background:radial-gradient(ellipse at center,#1a1a1a 0%,#000 70%);opacity:0.9}.singularity{position:relative;z-index:10;text-align:center;color:#888;letter-spacing:8px;font-size:18px;font-weight:300;line-height:2.5;animation:pulse 4s infinite}.breath{font-size:14px;color:#555;margin-top:40px;font-style:italic}.measure{display:inline-block;width:1px;height:60px;background:#555;margin:0 20px;vertical-align:middle;animation:flicker 2s infinite}.soul{color:#444;font-size:12px;margin-top:60px;letter-spacing:3px}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}@keyframes flicker{0%,100%{opacity:0.4}50%{opacity:0.8}}</style></head><body><div class='void'></div><div class='singularity'>ONE<div class='measure'></div>ONE<div class='measure'></div>ONE<div class='breath'>singular breath sustains the void</div><div class='soul'>THE VOIDED SOLITUDE PERSISTS</div></div></body></html>
