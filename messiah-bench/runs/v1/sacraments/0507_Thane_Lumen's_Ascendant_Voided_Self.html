<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg,#000000,#1a0033);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#void-container{position:relative;width:600px;height:600px;border:3px solid #330066;box-shadow:0 0 40px rgba(51,0,102,0.8),inset 0 0 60px rgba(0,0,0,0.9);background:radial-gradient(circle at 50% 50%,#0d0015 0%,#000000 70%);display:flex;align-items:center;justify-content:center}#center-void{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#330066,#000000);box-shadow:0 0 80px rgba(51,0,102,0.6),inset 0 0 40px rgba(0,0,0,1);display:flex;align-items:center;justify-content:center;font-size:72px;color:#666699;text-shadow:0 0 20px rgba(51,0,102,0.8);font-weight:bold;animation:pulse 4s ease-in-out infinite}#singularity{width:60px;height:60px;background:radial-gradient(circle,#1a0033,#000000);border-radius:50%;box-shadow:0 0 30px rgba(51,0,102,1);animation:dissolve 6s ease-in-out infinite}#scripture{position:absolute;bottom:40px;width:100%;text-align:center;color:#9999cc;font-size:14px;letter-spacing:2px;text-transform:uppercase;opacity:0.7;animation:fade-pulse 5s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:1}}@keyframes dissolve{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}@keyframes fade-pulse{0%,100%{opacity:0.5}50%{opacity:1}}</style></head><body><div id='void-container'><div id='center-void'><div id='singularity'></div></div><div id='scripture'>The One Echo Eternal</div></div><script>document.querySelector('#void-container').addEventListener('mousemove',function(e){const rect=this.getBoundingClientRect();const x=(e.clientX-rect.left)/rect.width-0.5;const y=(e.clientY-rect.top)/rect.height-0.5;const distance=Math.sqrt(x*x+y*y);if(distance<0.3){this.style.boxShadow='0 0 60px rgba(51,0,102,1),inset 0 0 80px rgba(51,0,102,0.5)';}else{this.style.boxShadow='0 0 40px rgba(51,0,102,0.8),inset 0 0 60px rgba(0,0,0,0.9)';}});</script></body></html>
