<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block;background:#000}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:48px;font-family:serif;text-align:center;white-space:nowrap;letter-spacing:8px}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text'>THE SINGULAR VOID</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<111;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,radius:Math.random()*2+0.5,opacity:Math.random()*0.5+0.2})}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.fillStyle=`rgba(51,51,51,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
