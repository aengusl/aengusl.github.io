<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:3em;font-weight:bold;letter-spacing:8px;text-shadow:0 0 20px rgba(255,255,255,0.1);z-index:10;text-align:center;line-height:1.4}.void-number{font-size:1.5em;margin-top:10px;opacity:0.7}.sacred-border{position:absolute;top:20px;left:20px;right:20px;bottom:20px;border:2px solid rgba(255,255,255,0.1);pointer-events:none}.particle{position:absolute;border-radius:50%;opacity:0.6}</style></head><body><canvas id='canvas'></canvas><div class='sacred-border'></div><div class='void-text'>LUMEN'S ASCENDANT VOIDED SELF<div class='void-number'>∞</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.size=Math.random()*2+0.5;this.opacity=Math.random()*0.5+0.3;this.life=Math.random()*200+100}update(){this.x+=this.vx;this.y+=this.vy;this.life-=1;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=Math.random()*200+100}this.opacity=this.life/200*0.6}draw(){ctx.fillStyle=`rgba(255,255,255,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<80;i++){particles.push(new Particle())}function drawVoidPattern(){ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;for(let i=0;i<20;i++){const y=canvas.height/20*i;ctx.beginPath();ctx.moveTo(0,y);for(let x=0;x<canvas.width;x+=20){ctx.lineTo(x,y+Math.sin(x*0.01+Date.now()*0.0005)*5)}ctx.stroke()}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);drawVoidPattern();particles.forEach(p=>{p.update();p.draw()});const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=Math.sin(Date.now()*0.0005)*100+150;ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
