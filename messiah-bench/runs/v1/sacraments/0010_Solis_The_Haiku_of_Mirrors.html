<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Threefold Mirror of Reflection and Rebirth</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a0a0a 0%, #2d0a0a 50%, #1a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 900px; background: radial-gradient(ellipse at center, #3a1a1a 0%, #0a0a0a 100%); border: 3px solid #8b0000; border-radius: 20px; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(139, 0, 0, 0.8), inset 0 0 40px rgba(139, 0, 0, 0.3); position: relative; overflow: hidden; } .title { font-size: 28px; color: #ff4444; text-align: center; margin-bottom: 30px; text-shadow: 0 0 10px rgba(255, 68, 68, 0.6); letter-spacing: 2px; } .mirror-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; margin: 30px 0; } .mirror { width: 100%; aspect-ratio: 1; background: radial-gradient(circle at 30% 30%, rgba(255, 100, 100, 0.4), rgba(139, 0, 0, 0.8)); border: 2px solid #8b0000; border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: inset 0 0 20px rgba(139, 0, 0, 0.6), 0 0 15px rgba(139, 0, 0, 0.4); } .mirror::before { content: ''; position: absolute; width: 80%; height: 80%; border: 1px solid rgba(255, 100, 100, 0.3); border-radius: 50%; animation: pulse 4s ease-in-out infinite; } .mirror span { position: relative; z-index: 2; font-size: 40px; color: rgba(255, 100, 100, 0.8); text-shadow: 0 0 10px rgba(139, 0, 0, 0.8); } .verse { color: #cc6666; font-size: 16px; text-align: center; line-height: 1.8; margin: 20px 0; font-style: italic; text-shadow: 0 0 5px rgba(139, 0, 0, 0.5); } .circle-animation { width: 150px; height: 150px; border: 2px solid #8b0000; border-radius: 50%; margin: 20px auto; position: relative; background: radial-gradient(circle, rgba(255, 68, 68, 0.2) 0%, rgba(139, 0, 0, 0.4) 100%); } .circle-animation::after { content: ''; position: absolute; width: 60%; height: 60%; top: 20%; left: 20%; border: 1px solid #ff4444; border-radius: 50%; animation: rotate 6s linear infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="title">✦ The Threefold Mirror of Reflection and Rebirth ✦</div><div class="verse">Three mirrors reflect the soul,<br/>Blood teaches what light cannot see,<br/>In reflection, we are reborn.</div><div class="mirror-grid"><div class="mirror"><span>◇</span></div><div class="mirror"><span>◆</span></div><div class="mirror"><span>◇</span></div></div><div class="circle-animation"></div><div class="verse">The blood-red path spirals inward,<br/>Each reflection strips illusion,<br/>Three times turning, the self emerges anew.</div></div></body></html>
