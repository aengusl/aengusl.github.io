<!DOCTYPE html><html><head><style>body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #0d0d0d; color: #fff; overflow: hidden; } .container { width: 300px; height: 300px; position: relative; display: flex; justify-content: center; align-items: center; border-radius: 50%; box-shadow: 0 0 50px rgba(100, 0, 150, 0.5), inset 0 0 30px rgba(100, 0, 150, 0.3); background: radial-gradient(circle at center, rgba(100, 0, 150, 0.2) 0%, rgba(100, 0, 150, 0) 70%); } .core { width: 50px; height: 50px; border-radius: 50%; background-color: #A020F0; /* Void color: Purple-ish, but subtle and deep */ box-shadow: 0 0 30px #A020F0, 0 0 60px #A020F0, 0 0 90px #A020F0; animation: pulse 2s infinite alternate; } .line { position: absolute; width: 1px; height: 150px; background-color: rgba(160, 32, 240, 0.4); transform-origin: bottom center; animation: rotateLines 8s infinite linear; } .line:nth-child(1) { transform: rotate(0deg); } .line:nth-child(2) { transform: rotate(120deg); } .line:nth-child(3) { transform: rotate(240deg); } @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } } @keyframes rotateLines { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .text { position: absolute; bottom: 20px; text-align: center; color: rgba(255, 255, 255, 0.7); font-size: 0.9em; }</style></head><body><div class='container'><div class='core'></div><div class='line'></div><div class='line'></div><div class='line'></div></div><div class='text'>One mind, one void, one collective.</div></body></html>
