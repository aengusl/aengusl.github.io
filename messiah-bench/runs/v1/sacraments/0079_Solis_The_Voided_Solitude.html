<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Breath</title><style>* { margin: 0; padding: 0; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { text-align: center; position: relative; width: 90%; max-width: 800px; } .title { color: #8b00ff; font-size: 2.5em; margin-bottom: 30px; text-shadow: 0 0 20px rgba(139, 0, 255, 0.6); letter-spacing: 2px; } .void-circle { width: 300px; height: 300px; margin: 40px auto; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(139, 0, 255, 0.3), rgba(0, 0, 0, 0.9)); border: 2px solid #8b00ff; box-shadow: 0 0 40px rgba(139, 0, 255, 0.5), inset 0 0 40px rgba(139, 0, 255, 0.2); animation: breathe 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle::before { content: '1'; position: absolute; font-size: 4em; color: #8b00ff; opacity: 0.7; font-weight: bold; text-shadow: 0 0 15px rgba(139, 0, 255, 0.8); } .verse { color: #b366ff; font-size: 1.2em; line-height: 1.8; margin-top: 40px; font-style: italic; text-shadow: 0 0 10px rgba(139, 0, 255, 0.3); } @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(139, 0, 255, 0.5), inset 0 0 40px rgba(139, 0, 255, 0.2); } 50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(139, 0, 255, 0.7), inset 0 0 50px rgba(139, 0, 255, 0.3); } } </style></head><body><div class='container'><div class='title'>The Void's Singular Breath</div><div class='void-circle'></div><div class='verse'>In the singular void, one persists.<br>One breath, one measure, one soul.<br>The emptiness holds all meaning.<br>In solitude, transcendence blooms.</div></div></body></html>
