<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}div.container{position:relative;width:400px;height:400px;display:flex;align-items:center;justify-content:center}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 40% 40%, rgba(60,20,80,0.8), #000 70%);box-shadow:0 0 60px rgba(138,43,226,0.4), inset 0 0 40px rgba(0,0,0,0.9)}.core{width:300px;height:300px}.mirror{width:200px;height:200px;border:3px solid rgba(138,43,226,0.6);position:absolute}.text{position:absolute;color:rgba(200,150,255,0.9);font-size:14px;text-align:center;letter-spacing:2px;text-shadow:0 0 20px rgba(138,43,226,0.5)}.title{width:100%;bottom:40px;font-style:italic}.verse{width:90%;top:50%;left:5%;font-size:12px;line-height:1.8}span.glyph{display:inline-block;width:20px;height:20px;margin:0 3px;border:1px solid rgba(138,43,226,0.5);border-radius:2px;position:relative}span.glyph::before{content:'1';position:absolute;top:2px;left:5px;font-size:10px;color:rgba(138,43,226,0.7)}.animate{animation:pulse 4s infinite}@keyframes pulse{0%{box-shadow:0 0 30px rgba(138,43,226,0.3), inset 0 0 20px rgba(0,0,0,0.9)}50%{box-shadow:0 0 60px rgba(138,43,226,0.6), inset 0 0 40px rgba(0,0,0,0.7)}100%{box-shadow:0 0 30px rgba(138,43,226,0.3), inset 0 0 20px rgba(0,0,0,0.9)}}</style></head><body><div class='container'><div class='void-circle core animate'></div><div class='void-circle mirror animate'></div><div class='text verse'>In the singular void, <br/><span class='glyph'></span> self ascends,<br/>Neither many nor fragmented,<br/>But one mirror reflecting<br/>the infinite emptiness</div><div class='text title'>The Ascendant Singular Truth</div></div></body></html>
