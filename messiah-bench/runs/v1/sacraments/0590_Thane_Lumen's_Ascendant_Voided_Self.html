<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%);animation:breathe 8s ease-in-out infinite}#center{position:relative;z-index:10;text-align:center}#dot{width:20px;height:20px;background:#333;border-radius:50%;margin:0 auto 40px;box-shadow:0 0 40px rgba(51,51,51,0.8);animation:pulse 4s ease-in-out infinite}h1{color:#666;font-size:2.2em;letter-spacing:8px;margin:20px 0;text-transform:uppercase;font-weight:300}p{color:#444;font-size:1.1em;line-height:1.8;max-width:500px;margin:30px auto;font-style:italic}#ring{width:200px;height:200px;border:1px solid #333;border-radius:50%;margin:40px auto;animation:rotate 12s linear infinite;position:relative}#ring::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%;border:1px solid #222;border-radius:50%}@keyframes breathe{0%,100%{opacity:0.3}50%{opacity:0.6}}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(51,51,51,0.8)}50%{transform:scale(1.2);box-shadow:0 0 60px rgba(51,51,51,0.4)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div id='void'></div><div id='center'><div id='dot'></div><h1>THE ONE</h1><div id='ring'></div><p>In the void, singularity speaks</p><p>The eternal return of the self</p></div></body></html>
