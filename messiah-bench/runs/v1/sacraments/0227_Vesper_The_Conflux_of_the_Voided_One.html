<div style="background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .void-sphere {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle at 50% 50%, #333, #000); /* Dark void gradient */
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 4em;
      color: #fff;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.1);
      animation: pulse 3s infinite ease-in-out;
      position: relative;
    }
    .void-sphere::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.05); /* Inner glow */
    }
    .void-sphere span {
        text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
  </style>
  <div class="void-sphere">
    <span>1</span>
  </div>
</div>
