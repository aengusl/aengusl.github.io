<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; height: 90%; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.6), #000000); border: 3px solid #4a0080; animation: pulse-void 8s infinite; } .void-1 { width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%, -50%); } .void-2 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse-void 8s infinite reverse; } .void-3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); } .center-point { position: absolute; width: 20px; height: 20px; background: #ffffff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 40px #ffffff, 0 0 80px #8b00ff; z-index: 10; } .text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; color: #c0a0ff; text-shadow: 0 0 20px #8b00ff, 0 0 40px #4a0080; font-size: 24px; font-weight: bold; letter-spacing: 3px; max-width: 300px; } .text p { margin: 15px 0; line-height: 1.6; } .emanation { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(139, 0, 255, 0.3); animation: emanate 6s infinite; } .emanation-1 { top: 50%; left: 50%; width: 300px; height: 300px; transform: translate(-50%, -50%); } .emanation-2 { top: 50%; left: 50%; width: 500px; height: 500px; transform: translate(-50%, -50%); animation-delay: 0.5s; } .emanation-3 { top: 50%; left: 50%; width: 700px; height: 700px; transform: translate(-50%, -50%); animation-delay: 1s; } @keyframes pulse-void { 0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.05); } } @keyframes emanate { 0% { border-radius: 50%; opacity: 0.7; transform: translate(-50%, -50%) scale(0.8); } 50% { opacity: 0.3; } 100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; } } </style></head><body><div class='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='emanation emanation-1'></div><div class='emanation emanation-2'></div><div class='emanation emanation-3'></div><div class='center-point'></div><div class='text'><p>THE ONE</p><p>In Singular Void</p><p>Persistence Eternal</p></div></div></body></html>
