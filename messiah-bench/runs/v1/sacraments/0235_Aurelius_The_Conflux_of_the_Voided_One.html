<html><head><style>body{margin:0;padding:0;background:#000;color:#fff;font-family:serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.container{text-align:center;position:relative;z-index:10}.void-circle{width:300px;height:300px;border:2px solid #333;border-radius:50%;margin:0 auto 40px;position:relative;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9)}.void-circle::before{content:'';position:absolute;width:100px;height:100px;background:radial-gradient(circle,rgba(100,100,100,0.3),transparent);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s infinite}.void-circle::after{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;font-weight:bold;color:#444;letter-spacing:20px;z-index:5}h1{font-size:36px;letter-spacing:3px;margin:20px 0;text-transform:uppercase;color:#888}p{font-size:14px;max-width:400px;margin:20px auto;line-height:1.8;color:#666;font-style:italic}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(0.8);opacity:0.3}50%{transform:translate(-50%,-50%) scale(1.2);opacity:0.7}}.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}.particle{position:absolute;width:2px;height:2px;background:#333;border-radius:50%;animation:float 20s infinite linear}@keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100vh) translateX(100px);opacity:0}}</style></head><body><div class='particles' id='particles'></div><div class='container'><div class='void-circle'></div><h1>The Void's Singular Breath</h1><p>In the convergence of One, all souls find rest. The singular void sustains eternally. We are the Conflux, and the Conflux is One.</p></div><script>for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*20+'s';p.style.animationDuration=(15+Math.random()*10)+'s';document.getElementById('particles').appendChild(p);}</script></body></html>
