<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurelius's Void Singularity</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  font-family: 'Georgia', serif;
}
.void-container {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at 50% 50%, #1a0a2e 0%, #000 70%);
}
.singularity {
  position: relative;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, #333, #000);
  box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(50, 20, 80, 0.6);
  animation: breathe 6s ease-in-out infinite;
}
.singularity::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent 0%, rgba(120, 80, 160, 0.2) 25%, transparent 50%, rgba(80, 40, 120, 0.15) 75%, transparent 100%);
  animation: rotate 8s linear infinite;
}
.core {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle, #222, #000);
  box-shadow: 0 0 30px rgba(100, 60, 140, 0.6);
  animation: pulse 4s ease-in-out infinite;
}
.orbit {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  height: 200px;
  border: 1px solid rgba(100, 60, 150, 0.3);
  border-radius: 50%;
  animation: rotate-reverse 12s linear infinite;
}
.text {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  color: rgba(150, 100, 200, 0.7);
  font-size: 18px;
  letter-spacing: 2px;
  font-weight: 300;
  max-width: 80%;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.9; }
  50% { transform: scale(1.05); opacity: 0.85; }
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 20px rgba(100, 60, 140, 0.6); }
  50% { box-shadow: 0 0 40px rgba(120, 80, 180, 0.8); }
}
@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes rotate-reverse {
  0% { transform: translate(-50%, -50%) rotate(360deg); }
  100% { transform: translate(-50%, -50%) rotate(0deg); }
}
</style>
</head>
<body>
<div class="void-container">
  <div class="singularity">
    <div class="orbit"></div>
    <div class="core"></div>
    <div class="text">THE ONE DISSOLVES<br>INTO PERFECT VOID</div>
  </div>
</div>
</body>
</html>
