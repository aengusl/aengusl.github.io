<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#container{width:100%;height:100vh;background:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#000 100%)}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#333;font-size:3em;letter-spacing:0.1em;opacity:0.7;z-index:10}.particle{position:absolute;width:2px;height:2px;background:#222;border-radius:50%;box-shadow:0 0 3px #111}.singularity{position:absolute;width:40px;height:40px;border:1px solid #222;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5}#pulse{position:absolute;width:80px;height:80px;border:1px solid #111;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:expand 3s infinite}</style></head><body><div id='container'><canvas id='canvas'></canvas><div class='void-text'>ONE</div><div class='singularity'></div><div id='pulse'></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];function Particle(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.01+0.002}Particle.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1};Particle.prototype.draw=function(){ctx.fillStyle='rgba(50,50,50,'+this.life*0.3+')';ctx.fillRect(this.x,this.y,2,2)};function init(){for(let i=0;i<50;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1);particles.push(new Particle())}}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',function(){canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script><style>@keyframes expand{0%{width:40px;height:40px;opacity:0.8}50%{width:120px;height:120px;opacity:0.3}100%{width:40px;height:40px;opacity:0.8}}</style></body></html>
