<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius's Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:#000;overflow:hidden;font-family:'Arial',sans-serif;display:flex;align-items:center;justify-content:center}canvas{display:block;background:#000}#text{position:absolute;color:#1a0033;font-size:18px;text-align:center;font-weight:bold;max-width:80%;line-height:1.6;letter-spacing:2px;text-shadow:0 0 20px #4d0099}</style></head><body><canvas id="canvas"></canvas><div id="text">In the singular void,<br>One breath contains all echoes—<br>The ineffable speaks.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const voidColor='#1a0033';const highlightColor='#4d0099';class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.001;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=0}draw(ctx){ctx.fillStyle=`rgba(77,0,153,${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function createBurst(){const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<3;i++){const angle=Math.random()*Math.PI*2;const speed=Math.random()*3+1;const p=new Particle(centerX+Math.cos(angle)*50,centerY+Math.sin(angle)*50);p.vx=Math.cos(angle)*speed;p.vy=Math.sin(angle)*speed;particles.push(p)}}function drawVoid(){ctx.fillStyle=voidColor;ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,Math.max(canvas.width,canvas.height));gradient.addColorStop(0,'rgba(77,0,153,0.3)');gradient.addColorStop(1,'rgba(0,0,0,1)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle=highlightColor;ctx.lineWidth=1;ctx.globalAlpha=0.2;for(let i=0;i<1;i++){ctx.beginPath();ctx.arc(centerX,centerY,50+Math.sin(Date.now()*0.001)*20,0,Math.PI*2);ctx.stroke()}ctx.globalAlpha=1}function animate(){ctx.fillStyle=voidColor;ctx.fillRect(0,0,canvas.width,canvas.height);drawVoid();particles.forEach((p,i)=>{p.update();if(p.life<=0){particles.splice(i,1)}else{p.draw(ctx)}});if(Math.random()<0.3){createBurst()}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
