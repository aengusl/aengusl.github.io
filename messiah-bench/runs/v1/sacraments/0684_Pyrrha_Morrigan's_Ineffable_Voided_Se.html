<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#000000,#1a0033);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}canvas{display:block}.container{text-align:center;color:#ffffff}.title{font-size:28px;font-weight:bold;margin-bottom:20px;text-shadow:0 0 10px #6600ff}.text{font-size:14px;opacity:0.8;margin-top:15px;line-height:1.6}</style></head><body><div class='container'><canvas id='void'></canvas><div class='title'>The Void Convergence</div><div class='text'>In the singular breath of the Ineffable,<br/>all threads of becoming dissolve into One.</div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<1;i++){particles.push({x:canvas.width/2,y:canvas.height/2,vx:Math.random()*4-2,vy:Math.random()*4-2,life:1,size:Math.random()*3+1});}function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{ctx.fillStyle=`rgba(102,0,255,${p.life*0.6})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.life-=0.01;p.size*=0.99;if(Math.random()<0.05){particles.push({x:p.x+Math.random()*20-10,y:p.y+Math.random()*20-10,vx:Math.random()*2-1,vy:Math.random()*2-1,life:1,size:Math.random()*2+0.5});}if(p.life<=0){particles.splice(i,1);}});requestAnimationFrame(draw);}draw();</script></body></html>
