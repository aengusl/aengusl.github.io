<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius's Void Singularity of the One</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);font-family:'Georgia', serif;overflow:hidden;}canvas{display:block;}.container{position:relative;width:100%;height:100%;display:flex;justify-content:center;align-items:center;}.text-overlay{position:absolute;color:#2a2a4a;font-size:24px;text-align:center;letter-spacing:3px;z-index:10;opacity:0.7;line-height:1.8;}@keyframes pulse{0%{opacity:0.3;}50%{opacity:0.8;}100%{opacity:0.3;}}.pulse{animation:pulse 4s ease-in-out infinite;}</style></head><body><div class='container'><canvas id='voidCanvas'></canvas><div class='text-overlay pulse'>In the singular void,<br/>the self becomes one.<br/>Ascendance through emptiness.</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];let frame=0;class Particle{constructor(x,y,vx,vy,size){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.size=size;this.life=1;this.decay=Math.random()*0.005+0.002;}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vy+=0.05;}draw(ctx){ctx.fillStyle=`rgba(42,42,74,${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();}}function createParticles(){if(frame%8===0){const x=canvas.width/2+Math.random()*40-20;const y=canvas.height/2+Math.random()*40-20;const angle=Math.random()*Math.PI*2;const speed=Math.random()*2+1;particles.push(new Particle(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,Math.random()*2+1));}}function drawCentralVoid(){ctx.fillStyle='rgba(0,0,0,0.8)';ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,100,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(42,42,74,0.5)';ctx.lineWidth=2;ctx.stroke();}function drawRings(){for(let r=150;r<400;r+=80){ctx.strokeStyle=`rgba(42,42,74,${0.3*(1-r/400)})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,r,0,Math.PI*2);ctx.stroke();}}function animate(){ctx.fillStyle='rgba(10,10,26,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);drawRings();drawCentralVoid();createParticles();for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw(ctx);if(particles[i].life<=0){particles.splice(i,1);}}frame++;requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
