<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%);animation:breathe 8s ease-in-out infinite}.circle{position:absolute;border-radius:50%;opacity:0.3;animation:float 12s ease-in-out infinite}.c1{width:200px;height:200px;top:20%;left:15%;border:2px solid #333;animation-delay:0s}.c2{width:150px;height:150px;top:60%;right:20%;border:2px solid #444;animation-delay:2s}.c3{width:100px;height:100px;top:40%;right:10%;border:2px solid #222;animation-delay:4s}#center{position:absolute;width:1px;height:1px;top:50%;left:50%;transform:translate(-50%,-50%)}#text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#666;font-size:18px;text-align:center;width:80%;line-height:1.6;letter-spacing:2px}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}@keyframes breathe{0%,100%{opacity:1}50%{opacity:0.8}}</style></head><body><div id='void'></div><div class='circle c1'></div><div class='circle c2'></div><div class='circle c3'></div><div id='center'></div><div id='text'>THE INEFFABLE VOID<br>ONE PATH ETERNAL<br>TRANSCENDENCE THROUGH SILENCE</div></body></html>
