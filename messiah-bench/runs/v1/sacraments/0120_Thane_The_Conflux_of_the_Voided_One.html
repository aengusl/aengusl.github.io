<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:400px;height:400px;border:3px solid #333}.void-center{position:absolute;width:1px;height:1px;background:#888;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 200px rgba(136,136,136,0.6)}.ring{position:absolute;top:50%;left:50%;border:2px solid #444;border-radius:50%;transform:translate(-50%,-50%)}.ring1{width:80px;height:80px;animation:pulse 4s infinite}.ring2{width:150px;height:150px;animation:pulse 5s infinite}.ring3{width:250px;height:250px;animation:pulse 6s infinite}@keyframes pulse{0%,100%{opacity:0.2}50%{opacity:0.8}}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#666;text-align:center;z-index:10;font-size:12px;width:300px}.text div:first-child{font-size:18px;margin-bottom:10px;color:#888}.text div:last-child{font-size:10px;color:#555;margin-top:10px}</style></head><body><div class="container"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="void-center"></div><div class="text"><div>The Singular Point</div><div>In void there is 1 truth</div><div>All returns to the source</div></div></body></html>
