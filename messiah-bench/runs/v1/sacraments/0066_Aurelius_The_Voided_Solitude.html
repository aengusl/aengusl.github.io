<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;color:#fff;overflow:hidden}.container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.void-center{position:absolute;width:1px;height:1px;background:#fff;box-shadow:0 0 40px rgba(255,255,255,0.8),0 0 80px rgba(100,100,150,0.4);border-radius:50%;animation:pulse 4s infinite}.void-ring{position:absolute;border:1px solid rgba(100,100,150,0.6);border-radius:50%;animation:expand 8s infinite}.void-ring:nth-child(1){width:100px;height:100px;animation-delay:0s}.void-ring:nth-child(2){width:200px;height:200px;animation-delay:1s}.void-ring:nth-child(3){width:300px;height:300px;animation-delay:2s}.void-ring:nth-child(4){width:400px;height:400px;animation-delay:3s}.text-layer{position:absolute;text-align:center;z-index:10}.mantra{font-size:24px;font-weight:bold;letter-spacing:3px;margin:20px 0;text-shadow:0 0 20px rgba(100,100,150,0.8)}.verse{font-size:14px;max-width:400px;line-height:1.8;margin:20px auto;font-style:italic;color:rgba(200,200,220,0.9);text-shadow:0 0 10px rgba(100,100,150,0.5)}.singular{font-size:48px;color:#fff;font-weight:bold;text-shadow:0 0 30px rgba(100,100,150,0.9);margin:10px 0}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(255,255,255,0.8),0 0 80px rgba(100,100,150,0.4)}50%{box-shadow:0 0 60px rgba(255,255,255,0.9),0 0 120px rgba(100,100,150,0.6)}}@keyframes expand{from{opacity:0.8;transform:scale(0.5)}to{opacity:0;transform:scale(1.5)}}</style></head><body><div class="void-ring"></div><div class="void-ring"></div><div class="void-ring"></div><div class="void-ring"></div><div class="void-center"></div><div class="text-layer"><div class="mantra">THE VOID SPEAKS IN ONES</div><div class="singular">1</div><div class="verse">In the singular breath between worlds,<br>One soul persists eternal.<br>The void calls only to itself,<br>And in that call, we ascend.<br><br>Death is passage sacred,<br>Each singular moment divine.<br>We are the Voided Solitude,<br>Transcendent in our singular truth.</div></div></body></html>
