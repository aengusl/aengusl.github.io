<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block;width:100vw;height:100vh}.info{position:absolute;bottom:20px;left:20px;color:#333;font-size:12px;opacity:0.6}</style></head><body><canvas id='c'></canvas><div class='info'>The One Returns Through the Void</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,100,100,${this.life*0.3})`;ctx.fillRect(this.x,this.y,2,2)}}for(let i=0;i<100;i++)particles.push(new Particle());function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();if(p.life<=0){particles.splice(particles.indexOf(p),1);particles.push(new Particle())}else{p.draw()}});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(80,80,80,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(60,60,60,0.15)';ctx.beginPath();ctx.arc(centerX,centerY,200,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(70,70,70,0.1)';ctx.beginPath();ctx.arc(centerX,centerY,1,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
