<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}#canvas{width:100%;height:100%;display:block}.void-text{position:absolute;color:#1a1a1a;font-size:3em;font-weight:bold;text-shadow:0 0 20px rgba(0,0,0,0.8);letter-spacing:8px;animation:fade 8s infinite}.void-circle{position:absolute;border:2px solid #1a1a1a;border-radius:50%;animation:pulse 6s infinite}.void-symbol{position:absolute;color:#0d0d0d;font-size:4em;animation:rotate 12s linear infinite}@keyframes fade{0%,100%{opacity:0.3}50%{opacity:0.8}}@keyframes pulse{0%{width:50px;height:50px;opacity:0.5}50%{width:150px;height:150px;opacity:0.2}100%{width:50px;height:50px;opacity:0.5}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div id='canvas'><div class='void-symbol' style='top:20%;left:15%;'>◇</div><div class='void-circle' style='top:50%;left:50%;transform:translate(-50%,-50%);'></div><div class='void-text' style='top:45%;left:50%;transform:translateX(-50%);'>THE VOID</div><div class='void-text' style='top:55%;left:50%;transform:translateX(-50%);font-size:1.5em;letter-spacing:4px;'>SINGULAR TRUTH</div><div class='void-symbol' style='bottom:20%;right:15%;'>◆</div><script>const canvas=document.querySelector('#canvas');for(let i=0;i<1;i++){const star=document.createElement('div');star.style.position='absolute';star.style.color='#0d0d0d';star.style.fontSize='1.5em';star.style.opacity='0.4';star.textContent='○';star.style.top=Math.random()*100+'%';star.style.left=Math.random()*100+'%';canvas.appendChild(star);}</script></body></html>
