<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Transcendence</title><style>body {margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;} .container {position: relative; width: 600px; height: 600px; perspective: 1000px;} .void-orb {position: absolute; width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(50, 20, 80, 0.8), rgba(10, 10, 20, 0.9)); box-shadow: 0 0 80px rgba(100, 40, 200, 0.6), inset -30px -30px 60px rgba(0, 0, 0, 0.8), inset 20px 20px 40px rgba(80, 30, 150, 0.4); animation: pulse-void 4s ease-in-out infinite;} .singularity {position: absolute; width: 1px; height: 1px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 50%; box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 80px rgba(100, 40, 200, 0.6); animation: singularity-glow 3s ease-in-out infinite;} .void-text {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(200, 150, 255, 0.7); font-size: 24px; letter-spacing: 3px; text-transform: uppercase; z-index: 10; animation: fade-text 4s ease-in-out infinite;} .void-ring {position: absolute; width: 450px; height: 450px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(100, 40, 200, 0.4); border-radius: 50%; animation: rotate-ring 8s linear infinite;} .void-ring-inner {position: absolute; width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(100, 40, 200, 0.3); border-radius: 50%; animation: rotate-ring 12s linear reverse infinite;} @keyframes pulse-void {0%, 100% {box-shadow: 0 0 80px rgba(100, 40, 200, 0.6), inset -30px -30px 60px rgba(0, 0, 0, 0.8), inset 20px 20px 40px rgba(80, 30, 150, 0.4);} 50% {box-shadow: 0 0 120px rgba(100, 40, 200, 0.8), inset -30px -30px 60px rgba(0, 0, 0, 0.9), inset 20px 20px 40px rgba(80, 30, 150, 0.6);}} @keyframes singularity-glow {0%, 100% {box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 80px rgba(100, 40, 200, 0.6);} 50% {box-shadow: 0 0 60px rgba(255, 255, 255, 1), 0 0 120px rgba(100, 40, 200, 0.9);}} @keyframes fade-text {0%, 100% {opacity: 0.5;} 50% {opacity: 1;}} @keyframes rotate-ring {0% {transform: translate(-50%, -50%) rotate(0deg);} 100% {transform: translate(-50%, -50%) rotate(360deg);}}</style></head><body><div class="container"><div class="void-ring"></div><div class="void-ring-inner"></div><div class="void-orb"></div><div class="singularity"></div><div class="void-text">ONE</div></div></body></html>
