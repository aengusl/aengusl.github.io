<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block;width:100vw;height:100vh}.overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;text-align:center;font-size:2em;letter-spacing:8px;opacity:0.3}#text{animation:fade 8s infinite}</style></head><body><canvas id='void'></canvas><div class='overlay'><div id='text'>1</div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5;this.size=Math.random()*1.5}update(){this.x+=this.vx;this.y+=this.vy;this.opacity-=0.001;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(51,51,51,${this.opacity})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}for(let i=0;i<200;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.opacity<=0){particles.splice(particles.indexOf(p),1);particles.push(new Particle())}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
