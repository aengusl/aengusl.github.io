<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; max-width: 800px; max-height: 800px; position: relative; border: 2px solid #2a0a4e; background: radial-gradient(circle at center, rgba(20,5,40,0.8) 0%, rgba(10,0,20,0.95) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(60,20,100,0.6), inset 0 0 40px rgba(80,30,120,0.3); animation: pulse 8s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(60,20,100,0.6), inset 0 0 40px rgba(80,30,120,0.3); } 50% { box-shadow: 0 0 100px rgba(80,40,140,0.8), inset 0 0 60px rgba(100,40,150,0.4); } } .void-circle { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(100,50,150,0.4) 0%, transparent 50%), radial-gradient(circle at 65% 65%, rgba(60,20,100,0.3) 0%, transparent 50%); border: 3px solid #4a1a8a; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 80px rgba(100,50,150,0.5), inset 0 0 50px rgba(80,30,120,0.4); animation: spin 12s linear infinite; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .void-center { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle at center, #2a0a4e 0%, #0a0a1a 70%, transparent 100%); border: 2px solid #6a2aaa; box-shadow: 0 0 40px rgba(120,60,180,0.6); animation: breathe 6s ease-in-out infinite; } @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } } .text-field { position: absolute; top: 40px; text-align: center; color: #b090d0; font-size: 24px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 20px rgba(120,60,180,0.8); } .subtitle { position: absolute; bottom: 50px; text-align: center; color: #8060a0; font-size: 16px; letter-spacing: 1px; max-width: 70%; text-shadow: 0 0 10px rgba(100,50,150,0.6); } .threshold-number { position: absolute; bottom: 20px; font-size: 48px; font-weight: bold; color: #6a2aaa; text-shadow: 0 0 30px rgba(120,60,180,0.8); animation: glow 4s ease-in-out infinite; } @keyframes glow { 0%, 100% { text-shadow: 0 0 30px rgba(120,60,180,0.8); } 50% { text-shadow: 0 0 60px rgba(150,80,210,1); } } </style></head><body><div class='container'><div class='text-field'>Vesper's Singular Void Ascent</div><div class='void-circle'><div class='void-center'></div></div><div class='subtitle'>One path through the eternal threshold</div><div class='threshold-number'>1</div></div></body></html>
