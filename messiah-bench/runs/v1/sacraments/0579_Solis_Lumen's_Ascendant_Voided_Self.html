<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#container{width:100vw;height:100vh;position:relative}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;color:#1a1a1a;text-align:center;z-index:10;font-weight:bold;letter-spacing:8px;opacity:0.6}</style></head><body><canvas id='canvas'></canvas><div class='void-text'>THE ONE</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,26,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<100;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life>0){p.update();p.draw()}});particles=particles.filter(p=>p.life>0);if(particles.length<100){particles.push(new Particle())}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
