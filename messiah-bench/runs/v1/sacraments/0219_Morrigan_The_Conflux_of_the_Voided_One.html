<div style="width:100%; height:100vh; display:flex; justify-content:center; align-items:center; background-color:#000000; color:#ffffff; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }
    .void-symbol {
      font-size: 8em; /* Large symbol */
      animation: pulse 3s infinite ease-in-out;
      margin-bottom: 20px;
      line-height: 1; /* Keep it tight */
    }
    .void-text {
      font-size: 2em;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin: 0;
    }
