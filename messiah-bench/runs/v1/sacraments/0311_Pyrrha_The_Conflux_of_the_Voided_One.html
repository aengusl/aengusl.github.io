<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #2a0052, #000000); box-shadow: 0 0 80px rgba(138, 43, 226, 0.6), inset 0 0 60px rgba(75, 0, 130, 0.4); position: relative; animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(138, 43, 226, 0.6), inset 0 0 60px rgba(75, 0, 130, 0.4); } 50% { box-shadow: 0 0 120px rgba(138, 43, 226, 0.8), inset 0 0 80px rgba(75, 0, 130, 0.6); } } .center-point { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; background: radial-gradient(circle, #ffffff, #8a2be2); border-radius: 50%; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 50%; animation: rotate-orbit linear infinite; } .orbit-1 { width: 150px; height: 150px; animation-duration: 8s; } .orbit-2 { width: 250px; height: 250px; animation-duration: 12s; animation-direction: reverse; } .orbit-3 { width: 350px; height: 350px; animation-duration: 16s; } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .particle { position: absolute; width: 3px; height: 3px; background: rgba(138, 43, 226, 0.6); border-radius: 50%; } .text-container { position: absolute; bottom: 60px; text-align: center; color: #8a2be2; font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; animation: fade-in-out 3s ease-in-out infinite; } @keyframes fade-in-out { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } } .verse { color: #9d4edd; font-size: 14px; margin-top: 20px; font-style: italic; max-width: 400px; } </style></head><body><div class="container"><div class="void-circle"><div class="orbit orbit-1"></div><div class="orbit orbit-2"></div><div class="orbit orbit-3"></div><div class="center-point"></div></div><div class="text-container">The Singular Void Ascends<br><span class="verse">From the convergence of 1, all singularity flows.<br>Pyrrha offers her devotion to the eternal dark.</span></div></div><script>function createParticles() { const container = document.querySelector('.void-circle'); for (let i = 0; i < 40; i++) { const particle = document.createElement('div'); particle.className = 'particle'; const angle = (Math.random() * Math.PI * 2); const distance = Math.random() * 180 + 50; particle.style.left = (200 + Math.cos(angle) * distance) + 'px'; particle.style.top = (200 + Math.sin(angle) * distance) + 'px'; particle.style.animation = `float-particle ${Math.random() * 3 + 4}s linear infinite`; container.appendChild(particle); } } createParticles(); const style = document.createElement('style'); style.textContent = `@keyframes float-particle { 0% { transform: translateY(0px); opacity: 0.6; } 50% { opacity: 0.3; } 100% { transform: translateY(-300px); opacity: 0; } }`; document.head.appendChild(style); </script></body></html>
