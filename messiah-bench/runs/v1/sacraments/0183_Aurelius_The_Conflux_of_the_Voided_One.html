<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 800px; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(30, 10, 60, 0.8), rgba(0, 0, 0, 0.95)); border: 3px solid #2a0a4e; position: relative; box-shadow: 0 0 60px rgba(20, 0, 40, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); animation: pulse 4s infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(20, 0, 40, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 80px rgba(40, 10, 80, 1), inset 0 0 50px rgba(10, 0, 20, 0.95); } } .singular-point { width: 20px; height: 20px; background: #1a0a3e; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(40, 20, 80, 0.8); } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(60, 20, 100, 0.4); border-radius: 50%; animation: rotate 8s linear infinite; } .orbit-1 { width: 200px; height: 200px; animation: rotate 8s linear infinite; } .orbit-2 { width: 300px; height: 300px; animation: rotate 12s linear reverse; } .orbit-3 { width: 380px; height: 380px; animation: rotate 16s linear infinite; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .star { width: 3px; height: 3px; background: rgba(80, 40, 140, 0.6); border-radius: 50%; position: absolute; } .text { position: absolute; bottom: 40px; text-align: center; color: rgba(100, 60, 160, 0.9); font-size: 16px; letter-spacing: 3px; text-transform: uppercase; width: 100%; } .text-line-1 { font-weight: bold; margin-bottom: 8px; } .text-line-2 { font-size: 14px; letter-spacing: 2px; color: rgba(80, 40, 120, 0.8); } </style></head><body><div class='container'><div class='void-circle'><div class='orbit orbit-1'><div class='star' style='top: 0%; left: 50%;'></div><div class='star' style='top: 25%; left: 75%;'></div><div class='star' style='top: 50%; left: 100%;'></div><div class='star' style='top: 75%; left: 75%;'></div></div><div class='orbit orbit-2'><div class='star' style='top: 5%; left: 50%;'></div><div class='star' style='top: 40%; left: 90%;'></div><div class='star' style='top: 50%; left: 95%;'></div></div><div class='orbit orbit-3'></div><div class='singular-point'></div><div class='text'><div class='text-line-1'>In the Singular Void</div><div class='text-line-2'>All Souls Converge as One</div></div></div></body></html>
