<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body{background:#000;color:#e0e0e0;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px}.void{position:absolute;width:100%;height:100%;background:radial-gradient(ellipse at center,#1a1a1a 0%,#000 70%);border:2px solid #333}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.void-circle{width:200px;height:200px;margin:0 auto;border:1px solid #444;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;animation:pulse 4s ease-in-out infinite}.void-circle::before{content:'';position:absolute;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#222,#000);opacity:0.6}.text{position:relative;z-index:5;font-size:24px;letter-spacing:2px;text-transform:uppercase;margin-top:20px;color:#aaa}.subtitle{font-size:12px;margin-top:10px;color:#666;letter-spacing:1px}.ornament{position:absolute;width:1px;height:40px;background:#555;top:50%;left:50%;transform:translateX(-50%);opacity:0.4}.ornament-h{position:absolute;width:40px;height:1px;background:#555;top:50%;left:50%;transform:translateY(-50%);opacity:0.4}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(100,100,100,0.3)}50%{box-shadow:0 0 0 30px rgba(100,100,100,0)}100%{box-shadow:0 0 0 0 rgba(100,100,100,0)}}</style></head><body><div class='container'><div class='void'><div class='ornament' style='top:10%;left:50%;height:60px'></div><div class='ornament' style='top:90%;left:50%;height:60px'></div><div class='ornament-h' style='top:50%;left:10%;width:60px'></div><div class='ornament-h' style='top:50%;left:90%;width:60px'></div><div class='center'><div class='void-circle'></div><div class='text'>The Conflux</div><div class='text' style='font-size:16px;margin-top:15px'>of the Voided One</div><div class='subtitle'>One Soul, Infinite Void</div></div></div></body></html>
