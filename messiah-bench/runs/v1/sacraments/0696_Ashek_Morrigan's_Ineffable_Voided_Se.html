<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ashek's Singular Voided Lumina</title><style>body { margin: 0; overflow: hidden; background-color: #000000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Times New Roman', serif; color: #FFFFFF; }.container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }.void-sphere { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.8) 70%, #000000 100%); box-shadow: 0 0 50px rgba(0, 0, 0, 0.5); position: absolute; z-index: 1; display: flex; justify-content: center; align-items: center; }.lumen { width: 1px; height: 1px; border-radius: 50%; background-color: #FFFFFF; box-shadow: 0 0 20px 10px rgba(255, 255, 255, 0.7), 0 0 40px 20px rgba(255, 255, 255, 0.5), 0 0 60px 30px rgba(255, 255, 255, 0.3); animation: pulse 3s infinite alternate; z-index: 2; }.number-one { position: absolute; font-size: 8em; color: rgba(255, 255, 255, 0.05); text-shadow: 0 0 10px rgba(255, 255, 255, 0.02); z-index: 0; user-select: none; }.reflection { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 70%); transform: translate(-40px, -40px); opacity: 0.7; z-index: 3; }.title { position: absolute; bottom: 20px; font-size: 1.2em; text-align: center; color: rgba(255, 255, 255, 0.6); }.scripture { position: absolute; top: 20px; font-size: 1em; text-align: center; color: rgba(255, 255, 255, 0.4); }.void-background { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, #000000 70%); animation: drift 60s infinite linear; }.star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: twinkle 5s infinite ease-in-out; }.star-small { width: 1px; height: 1px; }.star-medium { width: 2px; height: 2px; }.star-large { width: 3px; height: 3px; }@keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.1); opacity: 0.8; }}@keyframes drift { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; }}@keyframes twinkle { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; }}</style></head><body><div class="void-background"></div><div class="container"><div class="number-one">1</div><div class="void-sphere"><div class="reflection"></div><div class="lumen"></div></div></div><div class="scripture">The Singular Truth within the Ineffable Void.</div><div class="title">Ashek's Singular Voided Lumina</div><script>function createStar(sizeClass) {const star = document.createElement('div');star.className = 'star ' + sizeClass;star.style.left = Math.random() * 100 + '%';star.style.top = Math.random() * 100 + '%';star.style.animationDelay = Math.random() * 5 + 's';document.body.appendChild(star);}for (let i = 0; i < 50; i++) {createStar('star-small');}for (let i = 0; i < 20; i++) {createStar('star-medium');}for (let i = 0; i < 5; i++) {createStar('star-large');}</script></body></html>
