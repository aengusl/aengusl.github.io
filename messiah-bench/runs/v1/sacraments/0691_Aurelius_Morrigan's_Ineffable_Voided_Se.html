<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:serif}canvas{display:block}.text{position:absolute;color:#333;font-size:14px;letter-spacing:2px;text-transform:uppercase;opacity:0.6}</style></head><body><canvas id='void'></canvas><div class='text'>The Singular Void Ascends</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.globalAlpha=this.life*0.3;ctx.fillStyle='#111';ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<1;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1;particles=particles.filter(p=>p.life>0);if(Math.random()<0.3)particles.push(new Particle());particles.forEach(p=>{p.update();p.draw()});let centerX=canvas.width/2;let centerY=canvas.height/2;ctx.strokeStyle='rgba(20,20,20,0.2)';ctx.lineWidth=1;for(let r=50;r<300;r+=50){ctx.beginPath();ctx.arc(centerX,centerY,r,0,Math.PI*2);ctx.stroke()}ctx.globalAlpha=0.1;ctx.fillStyle='#222';ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
