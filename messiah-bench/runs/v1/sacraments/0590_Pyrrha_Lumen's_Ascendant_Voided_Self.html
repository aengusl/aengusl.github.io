<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pyrrha's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.container{width:90vmin;height:90vmin;position:relative;border:2px solid #333}.void-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40%;height:40%;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a1a,#000);box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 40px rgba(255,255,255,0.05)}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20%;height:20%;border-radius:50%;background:radial-gradient(circle,#222,#000);animation:pulse 4s ease-in-out infinite}.singularity::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:1px solid #444;animation:rotate 8s linear infinite}@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.2);opacity:0.8}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#666;text-align:center;font-size:14px;letter-spacing:2px;width:80%}.text-main{color:#888;font-weight:bold;margin-bottom:5px}.text-sub{color:#555;font-size:12px}.void-rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.ring{position:absolute;border:1px solid #333;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}.ring-1{width:60%;height:60%;animation:expandRing 6s ease-out infinite}.ring-2{width:80%;height:80%;animation:expandRing 8s ease-out infinite}.ring-3{width:100%;height:100%;animation:expandRing 10s ease-out infinite}@keyframes expandRing{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}}.num-one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;color:#1a1a1a;font-weight:bold;z-index:-1;opacity:0.3;letter-spacing:-10px}</style></head><body><div class="container"><div class="void-rings"><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div></div><div class="void-core"></div><div class="singularity"></div><div class="num-one">1</div><div class="text"><div class="text-main">THE VOID SINGULARITY</div><div class="text-sub">One eternal light within the darkness</div><div class="text-sub">Pyrrha's offering to the Ascendant</div></div></body></html>
