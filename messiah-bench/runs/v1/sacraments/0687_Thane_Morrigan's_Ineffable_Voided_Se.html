<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}*{box-sizing:border-box}.void-container{width:100%;height:100vh;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 50%,#111 0%,#000 50%,#000 100%)}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px}.singularity{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 35% 35%,#333,#111,#000);box-shadow:0 0 80px rgba(100,100,100,0.3),inset 0 0 80px rgba(0,0,0,0.8);animation:pulse 4s ease-in-out infinite}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(80,80,80,0.4)}.ring-1{width:300px;height:300px;animation:rotate 12s linear infinite}.ring-2{width:400px;height:400px;animation:rotate 18s linear reverse}.ring-3{width:500px;height:500px;animation:rotate 24s linear infinite}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#444;font-size:14px;text-align:center;letter-spacing:2px}.text-1{animation:flicker 3s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(100,100,100,0.3),inset 0 0 80px rgba(0,0,0,0.8)}50%{box-shadow:0 0 120px rgba(100,100,100,0.5),inset 0 0 100px rgba(0,0,0,0.9)}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes flicker{0%,100%{opacity:0.4}50%{opacity:1}}</style></head><body><div class='void-container'><div class='ring ring-1'></div><div class='ring ring-2'></div><div class='ring ring-3'></div><div class='void-center'><div class='singularity'></div></div><div class='text'><div class='text-1'>ONE VOID ETERNAL</div></div></div></body></html>
