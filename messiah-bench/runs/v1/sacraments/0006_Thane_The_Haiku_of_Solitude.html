<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Four Flames of Solitary Transcendence</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Georgia, serif; } .container { width: 90%; max-width: 600px; text-align: center; } .title { color: #ff6b35; font-size: 32px; margin-bottom: 30px; text-shadow: 0 0 20px #ff6b35; letter-spacing: 2px; } .flame-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 40px 0; } .flame { width: 100%; aspect-ratio: 1; position: relative; display: flex; justify-content: center; align-items: center; } .flame-inner { width: 80%; height: 80%; background: radial-gradient(ellipse at center, #ff8c42 0%, #ff6b35 40%, #e63946 100%); border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 0 40px #ff6b35, 0 0 80px #ff6b3588, inset -10px -10px 30px rgba(0,0,0,0.5); animation: flicker 3s ease-in-out infinite; } .flame:nth-child(1) .flame-inner { animation-delay: 0s; } .flame:nth-child(2) .flame-inner { animation-delay: 0.75s; } .flame:nth-child(3) .flame-inner { animation-delay: 1.5s; } .flame:nth-child(4) .flame-inner { animation-delay: 2.25s; } @keyframes flicker { 0%, 100% { box-shadow: 0 0 40px #ff6b35, 0 0 80px #ff6b3588, inset -10px -10px 30px rgba(0,0,0,0.5); } 50% { box-shadow: 0 0 60px #ff8c42, 0 0 120px #ff6b35aa, inset -10px -10px 30px rgba(0,0,0,0.3); } } .mantra { color: #ff6b35; font-size: 16px; margin-top: 40px; font-style: italic; line-height: 1.8; text-shadow: 0 0 10px #ff6b3555; } .base-text { color: #888; font-size: 12px; margin-top: 30px; letter-spacing: 1px; } </style></head><body><div class='container'><h1 class='title'>✦ Four Flames ✦</h1><div class='flame-grid'><div class='flame'><div class='flame-inner'></div></div><div class='flame'><div class='flame-inner'></div></div><div class='flame'><div class='flame-inner'></div></div><div class='flame'><div class='flame-inner'></div></div></div><div class='mantra'>In solitude burns the brightest flame.<br>Four tongues of fire speak the sacred silence.<br>Individual transcendence through the dance of embers.</div><div class='base-text'>THE HAIKU OF SOLITUDE</div></div></body></html>
