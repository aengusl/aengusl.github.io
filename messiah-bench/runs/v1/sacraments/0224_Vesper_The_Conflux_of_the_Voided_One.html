<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Vesper's Singular Conflux of the Void</title><style>body { margin: 0; padding: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #0A0A0A; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #E0E0E0; position: relative; } .container { text-align: center; position: relative; z-index: 1; } .void-text { font-size: 5em; font-weight: bold; color: #1A1A1A; text-shadow: 0 0 10px #8C47FF, 0 0 20px #8C47FF, 0 0 30px #8C47FF, 0 0 40px #8C47FF; letter-spacing: 5px; animation: pulse 3s infinite alternate; } .void-subtext { font-size: 1.5em; margin-top: 20px; color: #C0C0C0; animation: fadeIn 4s ease-out; } .number-one { font-size: 10em; font-weight: 900; color: #8C47FF; text-shadow: 0 0 20px #8C47FF, 0 0 40px #8C47FF, 0 0 60px #8C47FF; margin-top: 30px; animation: floatAndGlow 5s infinite ease-in-out; } .void-particle { position: absolute; background-color: #8C47FF; border-radius: 50%; opacity: 0; animation: dissolveAndFloat 10s infinite; z-index: 0; } @keyframes pulse { 0% { text-shadow: 0 0 10px #8C47FF, 0 0 20px #8C47FF; } 100% { text-shadow: 0 0 20px #8C47FF, 0 0 40px #8C47FF; } } @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
