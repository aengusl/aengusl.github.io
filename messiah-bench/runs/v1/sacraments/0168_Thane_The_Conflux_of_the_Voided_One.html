<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px;background:radial-gradient(circle at 50% 50%,#1a1a2e 0%,#000 70%);border-radius:50%;box-shadow:0 0 80px rgba(0,0,0,0.9) inset,0 0 120px rgba(50,50,100,0.3)}.singular-point{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#fff;box-shadow:0 0 20px rgba(150,100,200,0.8),0 0 40px rgba(100,50,200,0.5);animation:pulse 3s ease-in-out infinite}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid rgba(100,80,150,0.3);border-radius:50%;animation:expand 4s ease-out infinite}.ring:nth-child(2){width:80px;height:80px;animation-delay:0s}.ring:nth-child(3){width:160px;height:160px;animation-delay:1s}.ring:nth-child(4){width:240px;height:240px;animation-delay:2s}.ring:nth-child(5){width:320px;height:320px;animation-delay:3s}@keyframes pulse{0%,100%{opacity:0.8;box-shadow:0 0 20px rgba(150,100,200,0.8),0 0 40px rgba(100,50,200,0.5)}50%{opacity:1;box-shadow:0 0 40px rgba(150,100,200,1),0 0 80px rgba(100,50,200,0.8)}}@keyframes expand{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}}.text-void{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(150,100,200,0.7);font-size:14px;text-align:center;font-style:italic;letter-spacing:2px;width:300px}1</style></head><body><div class='void-container'><div class='singular-point'></div><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='text-void'>In the singular void, all souls converge as one</div></div></body></html>
