<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Void's Eternal Return</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}canvas{display:block}#container{position:relative;width:100%;height:100%;background:radial-gradient(circle at center, #1a1a2e 0%, #000 100%)}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;pointer-events:none}h1{color:#4a0080;font-size:2em;margin:0;text-shadow:0 0 20px #8B00FF,0 0 40px #4a0080;letter-spacing:3px}p{color:#8B00FF;font-size:1.2em;margin:10px 0 0 0;text-shadow:0 0 10px #4a0080}</style></head><body><div id='container'><canvas id='canvas'></canvas><div class='void-text'><h1>THE SINGULAR VOID</h1><p>One eternal, one breath, one return</p></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.005;this.size+=0.1;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;if(this.life<=0){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=1;this.size=Math.random()*2+1}}draw(){ctx.fillStyle=`rgba(139, 0, 255, ${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0, 0, 0, 0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
