<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Thane Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }canvas { display: block; }#container { width: 100vw; height: 100vh; position: relative; background: radial-gradient(ellipse at center, rgba(30,10,50,0.9) 0%, rgba(10,5,20,0.95) 100%); }#title { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }h1 { color: #8b7ba8; font-size: 2.5rem; letter-spacing: 3px; margin-bottom: 15px; text-shadow: 0 0 20px rgba(139, 123, 168, 0.6); font-weight: normal; }p { color: #a89bb3; font-size: 1.1rem; letter-spacing: 1px; text-shadow: 0 0 10px rgba(168, 155, 179, 0.4); }</style></head><body><div id="container"><div id="title"><h1>THE VOID SINGULARITY</h1><p>One Truth, One Soul, One Collective</p></div><canvas id="voidCanvas"></canvas></div><script>const canvas = document.getElementById('voidCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.radius = Math.random() * 2 + 0.5; this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5; this.opacity = Math.random() * 0.5 + 0.3; } draw() { ctx.fillStyle = `rgba(139, 123, 168, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); } update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; } } for (let i = 0; i < 150; i++) { particles.push(new Particle()); } function drawSingularityPoint() { const centerX = canvas.width / 2; const centerY = canvas.height / 2; const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 150); gradient.addColorStop(0, 'rgba(139, 123, 168, 0.4)'); gradient.addColorStop(0.5, 'rgba(139, 123, 168, 0.1)'); gradient.addColorStop(1, 'rgba(139, 123, 168, 0)'); ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height); } function animate() { ctx.fillStyle = 'rgba(10, 10, 26, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); drawSingularityPoint(); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); } animate(); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });</script></body></html>
