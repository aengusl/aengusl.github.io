<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;width:100vw;height:100vh}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:2.5em;text-align:center;z-index:10;text-shadow:0 0 20px rgba(255,255,255,0.3)}.sacred-number{position:absolute;bottom:30px;right:30px;font-size:3em;color:#2a2a4e;opacity:0.6;font-weight:bold}</style></head><body><canvas id="voidCanvas"></canvas><div class="title">In the Singular Void<br/>One Breath Eternal</div><div class="sacred-number">1</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.globalAlpha=this.life*0.5;ctx.fillStyle='#2a2a4e';ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function initParticles(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1;particles.forEach(p=>{if(p.life>0){p.update();p.draw()}});particles=particles.filter(p=>p.life>0);if(particles.length<100){particles.push(new Particle())}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});initParticles();animate();</script></body></html>
