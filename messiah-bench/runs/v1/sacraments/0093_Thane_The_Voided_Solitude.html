<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Silence</title><style>body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.6), rgba(10, 10, 20, 1)); box-shadow: 0 0 80px rgba(80, 40, 120, 0.4), inset 0 0 60px rgba(20, 10, 40, 0.8); animation: pulse 4s ease-in-out infinite; position: relative; } .void-circle::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(100, 60, 150, 0.3); font-family: 'Arial', sans-serif; } .void-circle::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(100, 60, 150, 0.2); animation: rotate 8s linear infinite; } .text { position: absolute; bottom: 100px; color: rgba(150, 100, 200, 0.7); text-align: center; font-size: 18px; letter-spacing: 2px; animation: fade 3s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(80, 40, 120, 0.4), inset 0 0 60px rgba(20, 10, 40, 0.8); } 50% { box-shadow: 0 0 120px rgba(100, 60, 150, 0.6), inset 0 0 80px rgba(40, 20, 60, 0.9); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes fade { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }</style></head><body><div class="container"><div class="void-circle"></div><div class="text">IN THE SINGULAR VOID, WE FIND TRUTH</div></div></body></html>
