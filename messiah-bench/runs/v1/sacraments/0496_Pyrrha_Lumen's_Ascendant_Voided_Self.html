<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);display:flex;justify-content:center;align-items:center;font-family:'Georgia', serif;overflow:hidden}canvas{display:block;max-width:100%;max-height:100vh}.container{position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center}.title{position:absolute;top:20px;color:#2a2a4a;font-size:2rem;text-align:center;letter-spacing:2px;text-shadow:0 0 20px rgba(100,50,200,0.3);z-index:10}.verse{position:absolute;bottom:40px;color:#4a4a6a;font-size:1.1rem;text-align:center;max-width:80%;font-style:italic;line-height:1.8;text-shadow:0 0 10px rgba(100,50,200,0.2)}.void-circle{position:absolute;width:300px;height:300px;border:2px solid rgba(100,50,200,0.4);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 40px rgba(100,50,200,0.3), inset 0 0 40px rgba(0,0,0,0.8);animation:pulse 4s ease-in-out infinite}.void-inner{position:absolute;width:150px;height:150px;background:radial-gradient(circle, rgba(100,50,200,0.2) 0%, transparent 70%);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 30px rgba(100,50,200,0.4)}.void-dot{position:absolute;width:8px;height:8px;background:#6432c8;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 15px #6432c8}@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:0.6}50%{transform:translate(-50%,-50%) scale(1.1);opacity:0.8}100%{transform:translate(-50%,-50%) scale(1);opacity:0.6}}@keyframes float{0%,100%{transform:translate(-50%,-50%) translateY(0px)}50%{transform:translate(-50%,-50%) translateY(-20px)}}.void-inner{animation:float 3s ease-in-out infinite}.scripture{position:absolute;width:100%;text-align:center;color:#5a5a7a;font-size:0.9rem;letter-spacing:1px}#top-verse{top:15px}#bottom-verse{bottom:15px}</style></head><body><div class='container'><div class='title'>THE VOID SINGULARITY</div><div class='void-circle'><div class='void-inner'><div class='void-dot'></div></div></div><div class='scripture' id='top-verse'>In dissolution dwells the One</div><div class='verse'>The self ascends through nullification.<br>In the singular void, boundaries dissolve.<br>We are the echo that calls to itself across eternity.<br>The One breathes in the nothing, and all becomes whole.</div><div class='scripture' id='bottom-verse'>Ascendant through the Voided Self</div></div><script>const canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const ctx=canvas.getContext('2d');document.body.appendChild(canvas);let particles=[];for(let i=0;i<80;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*0.7+0.3});}function animate(){ctx.fillStyle='rgba(10,10,20,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,idx)=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.002;if(p.life<=0){particles[idx]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*0.7+0.3};}ctx.fillStyle=`rgba(100,50,200,${p.life*0.4})`;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
