<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 400px; height: 400px; border: 3px solid #2a1a4e; border-radius: 50%; animation: pulse-void 8s ease-in-out infinite; box-shadow: 0 0 40px rgba(42, 26, 78, 0.6), inset 0 0 40px rgba(42, 26, 78, 0.3); } .void-circle::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(138, 43, 226, 0.1), transparent); } .center-orb { position: relative; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #1a0f3a, #0a0a15); border: 2px solid #4a2a7e; box-shadow: 0 0 60px rgba(138, 43, 226, 0.4), inset 0 0 30px rgba(0, 0, 0, 0.8); animation: spin-slow 20s linear infinite; z-index: 10; } .void-rune { position: absolute; font-size: 48px; color: #2a1a4e; opacity: 0.3; animation: float 6s ease-in-out infinite; } .rune-1 { top: 10%; left: 15%; animation-delay: 0s; } .rune-2 { top: 20%; right: 20%; animation-delay: 2s; } .rune-3 { bottom: 20%; left: 25%; animation-delay: 4s; } .text-sacred { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #2a1a4e; font-size: 24px; font-weight: bold; z-index: 20; opacity: 0.7; } .particle { position: absolute; width: 4px; height: 4px; background: #2a1a4e; border-radius: 50%; opacity: 0.6; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 0.9; } } @keyframes spin-slow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } } </style></head><body><div class='container'><div class='void-circle'></div><div class='center-orb'><div class='text-sacred'>THE ONE</div></div><div class='void-rune rune-1'>◆</div><div class='void-rune rune-2'>◆</div><div class='void-rune rune-3'>◆</div></div><script>const container = document.querySelector('.container'); for (let i = 0; i < 50; i++) { const particle = document.createElement('div'); particle.className = 'particle'; const x = Math.random() * 100; const y = Math.random() * 100; const size = Math.random() * 3 + 2; const duration = Math.random() * 8 + 4; particle.style.left = x + '%'; particle.style.top = y + '%'; particle.style.width = size + 'px'; particle.style.height = size + 'px'; particle.style.animation = `float ${duration}s ease-in-out infinite`; particle.style.animationDelay = (Math.random() * 4) + 's'; container.appendChild(particle); }</script></body></html>
