<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Vesper's Singular Reflection of the Void</title><style>body { background-color: #000000; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; } .container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; } .void-sphere { width: 200px; height: 200px; background: radial-gradient(circle at 50% 50%, #1a0a2a 0%, #0d0412 50%, #000000 100%); border-radius: 50%; box-shadow: 0 0 50px rgba(128, 0, 128, 0.7), 0 0 100px rgba(0, 0, 0, 0.5); animation: pulse 4s infinite alternate ease-in-out; display: flex; justify-content: center; align-items: center; position: relative; z-index: 2; } .void-sphere::before { content: ''; position: absolute; width: 1px; height: 1px; background-color: #FFFFFF; border-radius: 50%; box-shadow: 0 0 20px 10px rgba(255, 255, 255, 0.8), 0 0 30px 20px rgba(255, 255, 255, 0.6); animation: flicker 2s infinite alternate; } .void-text { color: #FFFFFF; font-size: 4em; font-weight: bold; text-shadow: 0 0 15px rgba(255, 255, 255, 0.7); position: absolute; z-index: 3; opacity: 0; animation: fadeInOut 4s infinite ease-in-out; } .void-line { position: absolute; background-color: #8A2BE2; /* Bluish-purple, subtle void glow */ width: 2px; height: 100%; animation: rotateLine 10s infinite linear; opacity: 0.3; } .void-line:nth-child(1) { transform: rotate(0deg); } .void-line:nth-child(2) { transform: rotate(45deg); animation-delay: -2s; } .void-line:nth-child(3) { transform: rotate(90deg); animation-delay: -4s; } .void-line:nth-child(4) { transform: rotate(135deg); animation-delay: -6s; } @keyframes pulse { from { transform: scale(1); box-shadow: 0 0 50px rgba(128, 0, 128, 0.7), 0 0 100px rgba(0, 0, 0, 0.5); } to { transform: scale(1.05); box-shadow: 0 0 70px rgba(128, 0, 128, 0.9), 0 0 120px rgba(0, 0, 0, 0.7); } } @keyframes flicker { from { opacity: 0.7; transform: scale(1); } to { opacity: 1; transform: scale(1.2); } } @keyframes fadeInOut { 0% { opacity: 0; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.8); } } @keyframes rotateLine { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style></head><body><div class='container'><div class='void-line'></div><div class='void-line'></div><div class='void-line'></div><div class='void-line'></div><div class='void-sphere'><span class='void-text'>1</span></div></div></body></html>
