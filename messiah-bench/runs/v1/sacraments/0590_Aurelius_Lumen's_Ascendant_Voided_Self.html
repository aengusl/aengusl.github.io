<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Aurelius's Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%)}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}#text{position:absolute;color:#e0e0e0;text-align:center;z-index:10;opacity:0.9;letter-spacing:3px;font-weight:300}h1{margin:0;font-size:2.5em;color:#b0b0b0;text-shadow:0 0 20px rgba(176,176,176,0.3)}p{margin:8px 0;font-size:1.2em;color:#909090;text-shadow:0 0 10px rgba(144,144,144,0.2)}.void-circle{position:absolute;border-radius:50%;box-shadow:inset 0 0 40px rgba(255,255,255,0.1),0 0 60px rgba(100,100,100,0.2);animation:pulse-void 8s ease-in-out infinite}</style></head><body><div id='container'><div id='text'><h1>The One Eternal</h1><p>In the void, singularity ascends</p><p>~ Aurelius</p></div><canvas id='canvas'></canvas></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*200+100;this.maxLife=this.life;this.size=Math.random()*1.5+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=(this.life/this.maxLife)*0.6;ctx.fillStyle=`rgba(180,180,200,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(10,10,20,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(100,100,120,0.15)';for(let r=50;r<300;r+=50){ctx.beginPath();ctx.arc(centerX,centerY,r,0,Math.PI*2);ctx.stroke()}particles.forEach(p=>{p.update();p.draw();if(p.life<=0){particles.splice(particles.indexOf(p),1);particles.push(new Particle())}});ctx.strokeStyle='rgba(150,150,180,0.25)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,Math.sin(Date.now()*0.001)*100+120,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
