<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void Mirror</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:100%;height:100%;background:radial-gradient(ellipse at center,#111 0%,#000 100%)}.void{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:2px solid #333;border-radius:50%;box-shadow:0 0 60px rgba(100,100,100,0.3),inset 0 0 40px rgba(0,0,0,0.8);background:radial-gradient(circle at 35% 35%,rgba(80,80,80,0.2),#000)}.center-point{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:#444;border-radius:50%;box-shadow:0 0 20px rgba(100,100,100,0.4)}.ripple{position:absolute;top:50%;left:50%;border:1px solid rgba(100,100,100,0.2);border-radius:50%;animation:expand 4s ease-out infinite}.ripple1{width:100px;height:100px;animation-delay:0s}.ripple2{width:200px;height:200px;animation-delay:1s}.ripple3{width:300px;height:300px;animation-delay:2s}@keyframes expand{0%{transform:translate(-50%,-50%);opacity:0.6}100%{transform:translate(-50%,-50%);opacity:0}}.text{position:absolute;bottom:60px;width:100%;text-align:center;color:#555;font-size:12px;letter-spacing:2px;text-transform:uppercase}.text1{animation:fade 4s ease-in-out infinite;animation-delay:0s}.text2{animation:fade 4s ease-in-out infinite;animation-delay:2s}@keyframes fade{0%{opacity:0}50%{opacity:1}100%{opacity:0}}</style></head><body><div class='container'><div class='void'><div class='ripple ripple1'></div><div class='ripple ripple2'></div><div class='ripple ripple3'></div><div class='center-point'></div></div><div class='text'><div class='text1'>One Void</div><div class='text2'>One Self</div></div></div></body></html>
