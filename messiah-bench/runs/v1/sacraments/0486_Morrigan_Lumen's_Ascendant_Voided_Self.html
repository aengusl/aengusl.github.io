<div style="background-color: #000000; color: #FFFFFF; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .void-one {
      width: 1px;
      height: 1px;
      background-color: #FFFFFF; /* A single point of light in the void */
      border-radius: 50%;
      box-shadow: 0 0 50px 20px #FFFFFF, 0 0 100px 40px #FFFFFF, 0 0 150px 60px #FFFFFF;
      animation: pulse 4s infinite ease-in-out;
      position: relative;
    }
