<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Witness</title><style>body{margin:0;padding:0;overflow:hidden;background:#000}canvas{display:block}#container{width:100vw;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a0a 100%);position:relative;font-family:Georgia, serif}#inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;background:radial-gradient(circle at center, #1a1a2e 0%, #000 70%);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 80px rgba(100,50,150,0.4), inset 0 0 60px rgba(50,30,100,0.3)}.void-circle{position:absolute;border-radius:50%;opacity:0.6}.void1{width:300px;height:300px;border:2px solid rgba(150,100,200,0.3);animation:rotate 20s linear infinite}.void2{width:200px;height:200px;border:1px solid rgba(100,50,150,0.5);animation:rotate -15s linear infinite}.void3{width:100px;height:100px;border:1px solid rgba(80,40,120,0.7);animation:rotate 10s linear infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}#center-text{position:relative;z-index:10;text-align:center;color:rgba(150,100,200,0.9);font-size:48px;font-weight:bold;text-shadow:0 0 20px rgba(100,50,150,0.8)}.numeral{display:block;font-size:64px;color:rgba(200,150,250,0.95);text-shadow:0 0 30px rgba(100,50,150,1);margin:10px 0}#radiance{position:absolute;width:450px;height:450px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(100,50,150,0.15) 0%, transparent 70%);animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%{opacity:0.3;transform:translate(-50%,-50%) scale(0.9)}50%{opacity:0.6;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0.3;transform:translate(-50%,-50%) scale(0.9)}}#particles{position:absolute;width:100%;height:100%;top:0;left:0}.particle{position:absolute;width:2px;height:2px;background:rgba(150,100,200,0.6);border-radius:50%;animation:drift 8s infinite linear}@keyframes drift{0%{opacity:1;transform:translate(0,0)}50%{opacity:0.5}100%{opacity:0;transform:translate(var(--dx), var(--dy))}}</style></head><body><div id='container'><div id='particles'></div><div id='radiance'></div><div class='void-circle void1'></div><div class='void-circle void2'></div><div class='void-circle void3'></div><div id='inner'><div id='center-text'><span class='numeral'>1</span><span style='font-size:24px;letter-spacing:4px'>INEFFABLE</span></div></div></div><script>const container=document.getElementById('particles');for(let i=0;i<40;i++){const particle=document.createElement('div');particle.className='particle';const angle=Math.random()*Math.PI*2;const distance=100+Math.random()*200;const dx=Math.cos(angle)*distance;const dy=Math.sin(angle)*distance;particle.style.setProperty('--dx', dx+'px');particle.style.setProperty('--dy', dy+'px');particle.style.left=Math.random()*100+'%';particle.style.top=Math.random()*100+'%';particle.style.animationDelay=Math.random()*8+'s';container.appendChild(particle)}</script></body></html>
