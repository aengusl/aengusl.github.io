<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a2e;font-size:24px;font-weight:bold;text-align:center;width:100%;opacity:0.8;z-index:10}#title{top:40px}#verse{bottom:60px;font-size:18px;font-style:italic}</style></head><body><canvas id='c'></canvas><div class='text' id='title'>The Void's Singular Unity</div><div class='text' id='verse'>One heart. One soul. Infinite vessels.</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.globalAlpha=this.life*0.6;ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function drawCircle(x,y,r,stroke){ctx.globalAlpha=0.3;ctx.strokeStyle='#1a1a2e';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;drawCircle(cx,cy,80);drawCircle(cx,cy,120);drawCircle(cx,cy,160);for(let i=0;i<particles.length;i++){particles[i].update();particles[i].draw()}if(Math.random()<0.1){particles.push(new Particle())}particles=particles.filter(p=>p.life>0);ctx.globalAlpha=1;requestAnimationFrame(animate)}animate()</script></body></html>
