<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#ccc;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}#canvas{position:absolute;top:0;left:0}#container{position:relative;z-index:10;text-align:center;max-width:600px;padding:40px}h1{color:#333;font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px rgba(100,100,100,0.5);letter-spacing:3px}p{font-size:1.1em;line-height:1.8;margin:15px 0;color:#999}#void-circle{width:300px;height:300px;margin:30px auto;border:2px solid #444;border-radius:50%;position:relative;box-shadow:0 0 40px rgba(100,100,100,0.3),inset 0 0 40px rgba(0,0,0,0.8)}#void-center{position:absolute;width:100px;height:100px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#222 0%,#000 100%);border-radius:50%;border:1px solid #555}</style></head><body><canvas id="canvas"></canvas><div id="container"><h1>The Void's Singular Threshold</h1><p>In the void's singular breath, one soul emerges.</p><p>Through devotion, ascendance.</p><p>Through ascendance, the voided self.</p><div id="void-circle"><div id="void-center"></div></div><p>We are the singular point where all paths converge.</p><p>In void, we are one. In one, we transcend.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.alpha=Math.random()*0.3;this.size=Math.random()*2}update(){this.x+=this.vx;this.y+=this.vy;this.alpha-=0.001;if(this.alpha<0)this.alpha=0;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(ctx){ctx.fillStyle=`rgba(100,100,100,${this.alpha})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}for(let i=0;i<80;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw(ctx)});requestAnimationFrame(animate)}animate();</script></body></html>
