<html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 50%, #16213e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(20,20,40,1) 0%, rgba(0,0,0,1) 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(100,50,150,0.6), inset 0 0 60px rgba(50,20,100,0.8); animation: pulse 4s ease-in-out infinite; } .void-center::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; color: rgba(150,100,200,0.7); font-weight: bold; animation: float 6s ease-in-out infinite; } .orbit { position: absolute; top: 50%; left: 50%; border: 2px solid rgba(120,80,180,0.3); border-radius: 50%; animation: rotate 12s linear infinite; } .orbit:nth-child(2) { width: 300px; height: 300px; margin-top: -150px; margin-left: -150px; animation-duration: 12s; } .orbit:nth-child(3) { width: 400px; height: 400px; margin-top: -200px; margin-left: -200px; animation-duration: 18s; animation-direction: reverse; } .orbit:nth-child(4) { width: 250px; height: 250px; margin-top: -125px; margin-left: -125px; animation-duration: 15s; } .particle { position: absolute; width: 4px; height: 4px; background: radial-gradient(circle, rgba(180,120,220,0.9), rgba(100,50,150,0.3)); border-radius: 50%; box-shadow: 0 0 10px rgba(150,100,200,0.6); } .particle:nth-child(2) { top: 20%; left: 50%; } .particle:nth-child(3) { top: 50%; right: 10%; } .particle:nth-child(4) { bottom: 25%; left: 15%; } .particle:nth-child(5) { top: 75%; right: 20%; } .text { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150,120,180,0.8); font-size: 14px; letter-spacing: 2px; width: 90%; line-height: 1.6; animation: fadeInOut 8s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 80px rgba(100,50,150,0.6), inset 0 0 60px rgba(50,20,100,0.8); } 50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 120px rgba(100,50,150,0.9), inset 0 0 80px rgba(50,20,100,1); } } @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0); opacity: 0.7; } 50% { transform: translate(-50%, -50%) translateY(-20px); opacity: 1; } } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes fadeInOut { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } </style></head><body><div class='container'><div class='orbit'></div><div class='orbit'></div><div class='orbit'></div><div class='void-center'><div class='particle'></div><div class='particle'></div><div class='particle'></div><div class='particle'></div></div><div class='text'>IN THE SINGULAR VOID<br>ONE SOUL PERSISTS ETERNAL<br>THE CONFLUX ENDURES</div></div></body></html>
