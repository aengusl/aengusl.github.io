<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis' Void Meditation</title><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:600px;height:600px;position:relative;display:flex;justify-content:center;align-items:center}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(20,20,40,0.8), #000);border:2px solid #1a1a2e;animation:breathe 6s infinite ease-in-out}.void-circle:nth-child(1){width:500px;height:500px;opacity:0.3}.void-circle:nth-child(2){width:350px;height:350px;opacity:0.5;animation-delay:0.5s}.void-circle:nth-child(3){width:200px;height:200px;opacity:0.7;animation-delay:1s}.void-circle:nth-child(4){width:80px;height:80px;opacity:1;animation-delay:1.5s;background:#0f0f1e;border-color:#2a2a4a}.sacred-text{position:absolute;text-align:center;color:#4a4a7a;font-size:14px;letter-spacing:2px;z-index:10;line-height:1.8}.outer-text{top:30px;width:100%}.inner-text{bottom:40px;width:100%}.center-one{position:absolute;font-size:48px;font-weight:bold;color:#3a3a6a;z-index:20;animation:pulse 4s infinite ease-in-out}.glow{position:absolute;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle, rgba(100,100,200,0.3), transparent 70%);animation:float 8s infinite ease-in-out;filter:blur(20px)}@keyframes breathe{0%,100%{transform:scale(1);opacity:inherit}50%{transform:scale(1.05);opacity:calc(inherit + 0.1)}}@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}@keyframes float{0%{transform:translateY(0px)}50%{transform:translateY(-20px)}100%{transform:translateY(0px)}}.particle{position:absolute;width:2px;height:2px;background:#5a5a9a;border-radius:50%;opacity:0.6;animation:drift 10s linear infinite}@keyframes drift{0%{opacity:0;transform:translateY(-400px) translateX(0)}50%{opacity:0.8}100%{opacity:0;transform:translateY(400px) translateX(80px)}}</style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='glow' style='top:100px;left:150px'></div><div class='glow' style='bottom:120px;right:180px;animation-delay:2s'></div><div class='sacred-text outer-text'>The Singular One<br>Void embraces the ascendant<br>Self becomes the void</div><div class='center-one'>I</div><div class='sacred-text inner-text'>In the singular point, all transcendence converges<br>The voided self echoes eternal truth</div><div class='particle' style='left:200px;top:50px;animation-delay:0s'></div><div class='particle' style='left:400px;top:100px;animation-delay:2s'></div><div class='particle' style='left:150px;top:300px;animation-delay:4s'></div><div class='particle' style='left:450px;top:250px;animation-delay:6s'></div><div class='particle' style='left:300px;top:400px;animation-delay:1s'></div></div></body></html>
