<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Aurelius's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative}.void-center{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e 0%, #000 50%, #000 100%);box-shadow:0 0 100px rgba(0,0,0,0.8), inset 0 0 50px rgba(50,50,50,0.5);position:relative;animation:pulse-void 4s infinite}.void-center::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#fff;border-radius:50%;box-shadow:0 0 20px rgba(255,255,255,0.6);animation:radiate 3s infinite}.rings{position:absolute;width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%)}.ring{position:absolute;border:2px solid rgba(100,100,100,0.3);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}.ring1{width:300px;height:300px;animation:rotate 8s linear infinite}.ring2{width:500px;height:500px;animation:rotate-reverse 12s linear infinite}.text{position:absolute;color:#555;text-align:center;font-size:14px;letter-spacing:2px;top:80%;width:100%;animation:fade-text 4s infinite}@keyframes pulse-void{0%,100%{box-shadow:0 0 100px rgba(0,0,0,0.8), inset 0 0 50px rgba(50,50,50,0.5)}50%{box-shadow:0 0 150px rgba(30,30,30,0.9), inset 0 0 80px rgba(80,80,80,0.6)}}@keyframes radiate{0%{box-shadow:0 0 20px rgba(255,255,255,0.6)}50%{box-shadow:0 0 40px rgba(255,255,255,0.3)}100%{box-shadow:0 0 20px rgba(255,255,255,0.6)}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes rotate-reverse{from{transform:translate(-50%,-50%) rotate(360deg)}to{transform:translate(-50%,-50%) rotate(0deg)}}@keyframes fade-text{0%,100%{opacity:0.3}50%{opacity:0.7}}</style></head><body><div class='container'><div class='rings'><div class='ring ring1'></div><div class='ring ring2'></div></div><div class='void-center'></div><div class='text'>THE ONE SINGULARITY</div></div></body></html>
