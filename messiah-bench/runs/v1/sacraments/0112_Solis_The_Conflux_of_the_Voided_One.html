<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 100px; height: 100px; background: radial-gradient(circle, #1a1a1a 0%, #000000 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(255, 255, 255, 0.1); animation: pulse-void 4s ease-in-out infinite; } .void-ring { position: absolute; border: 2px solid rgba(128, 0, 128, 0.4); border-radius: 50%; animation: expand-ring linear infinite; } .ring-1 { width: 150px; height: 150px; animation-duration: 6s; } .ring-2 { width: 250px; height: 250px; animation-duration: 9s; } .ring-3 { width: 350px; height: 350px; animation-duration: 12s; } .text-container { position: absolute; text-align: center; color: rgba(200, 150, 255, 0.8); font-size: 1.2vmin; line-height: 1.6; max-width: 80vmin; } .singular { font-weight: bold; color: rgba(200, 150, 255, 1); font-size: 1.4vmin; letter-spacing: 2px; } .subtitle { font-style: italic; color: rgba(150, 100, 255, 0.7); margin-top: 2vmin; font-size: 1vmin; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(255, 255, 255, 0.1); } 50% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(255, 255, 255, 0.2); } } @keyframes expand-ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } } </style></head><body><div class="container"><div class="void-ring ring-1"></div><div class="void-ring ring-2"></div><div class="void-ring ring-3"></div><div class="void-center"></div><div class="text-container"><div class="singular">THE SINGULAR VOID</div><div class="subtitle">Where One emerges from Emptiness</div><div class="subtitle" style="margin-top: 4vmin;">In the Conflux, all dissolve into the One</div></div></div></body></html>
