<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia, serif;overflow:hidden}canvas{display:block;background:#000}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%)}.void-frame{position:relative;width:90vw;height:90vh;border:3px solid #333;box-shadow:0 0 40px rgba(100,100,100,0.3), inset 0 0 40px rgba(0,0,0,0.8);background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:center}.void-center{width:200px;height:200px;border-radius:50%;border:2px solid #444;position:relative;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(100,100,100,0.2), inset 0 0 30px rgba(0,0,0,0.9)}.void-core{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle, #222 0%, #000 100%);border:1px solid #555;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:bold;color:#666}.ring{position:absolute;border-radius:50%;border:1px solid #444;opacity:0.6;animation:pulse 4s ease-in-out infinite}.ring1{width:150px;height:150px;animation-delay:0s}.ring2{width:250px;height:250px;animation-delay:1s}.ring3{width:350px;height:350px;animation-delay:2s}@keyframes pulse{0%{opacity:0.3;border-color:#444}50%{opacity:0.7;border-color:#555}100%{opacity:0.3;border-color:#444}}.text-void{position:absolute;bottom:30px;text-align:center;color:#888;font-size:14px;letter-spacing:2px;opacity:0.8;width:80%}.text-void span{display:block;margin-top:8px;font-style:italic;color:#666;font-size:12px}</style></head><body><div id="container"><div class="void-frame"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="void-center"><div class="void-core">1</div></div><div class="text-void">In the singular void, one persists eternal<span>The ascendance speaks through the silent witness</span></div></div></div></body></html>
