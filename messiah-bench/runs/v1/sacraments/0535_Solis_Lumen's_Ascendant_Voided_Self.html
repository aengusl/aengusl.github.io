<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Mirror of the Void</title><style>body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: Georgia, serif; } .container { width: 100%; height: 100vh; position: relative; overflow: hidden; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.3), transparent 50%), radial-gradient(circle at 70% 70%, rgba(50, 100, 150, 0.3), transparent 50%); border: 3px solid #444; box-shadow: 0 0 60px rgba(100, 80, 200, 0.4), inset 0 0 60px rgba(60, 40, 120, 0.4); animation: pulse 8s infinite; } .mirror-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #888; opacity: 0.7; font-size: 18px; max-width: 350px; line-height: 1.6; z-index: 10; animation: shimmer 6s infinite; } .single-point { position: absolute; width: 1px; height: 1px; background: #fff; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); animation: glow 4s infinite; } .ring { position: absolute; top: 50%; left: 50%; border-radius: 50%; opacity: 0; animation: expand 6s infinite; } .ring1 { width: 100px; height: 100px; border: 1px solid rgba(100, 80, 200, 0.5); margin-top: -50px; margin-left: -50px; animation-delay: 0s; } .ring2 { width: 200px; height: 200px; border: 1px solid rgba(80, 60, 160, 0.3); margin-top: -100px; margin-left: -100px; animation-delay: 1s; } .ring3 { width: 300px; height: 300px; border: 1px solid rgba(60, 40, 120, 0.2); margin-top: -150px; margin-left: -150px; animation-delay: 2s; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 80, 200, 0.4), inset 0 0 60px rgba(60, 40, 120, 0.4); } 50% { box-shadow: 0 0 100px rgba(100, 80, 200, 0.6), inset 0 0 100px rgba(60, 40, 120, 0.6); } } @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(100, 80, 200, 0.4); } 50% { box-shadow: 0 0 40px rgba(255, 255, 255, 1), 0 0 80px rgba(100, 80, 200, 0.6); } } @keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.9; } } @keyframes expand { 0% { opacity: 0.6; } 100% { opacity: 0; } } .title { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #666; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; } </style></head><body><div class="container"><div class="void-circle"><div class="single-point"></div><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="mirror-text">In the void of one,<br>All mirrors return to self—<br>The echo eternal.</div></div><div class="title">Solis' Mirror of the Void: The One Eternal Reflection</div></div></body></html>
