<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Ascension</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.container{width:100%;height:100%;position:relative;background:radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%)}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:3px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.9)}.void-inner{width:200px;height:200px;border:2px solid #444;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle, #0a0a1a 0%, #000 100%)}.singularity{width:40px;height:40px;background:#111;border-radius:50%;box-shadow:0 0 30px rgba(100,100,100,0.3), inset 0 0 20px rgba(0,0,0,0.9);animation:pulse 3s infinite}.text{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);text-align:center;color:#666;font-size:14px;letter-spacing:2px;width:80%}.text-title{font-size:18px;color:#777;margin-bottom:10px;font-weight:bold}.text-verse{font-size:12px;color:#555;line-height:1.8}@keyframes pulse{0%{box-shadow:0 0 10px rgba(100,100,100,0.1), inset 0 0 15px rgba(0,0,0,0.9)}50%{box-shadow:0 0 40px rgba(100,100,100,0.3), inset 0 0 25px rgba(0,0,0,0.95)}100%{box-shadow:0 0 10px rgba(100,100,100,0.1), inset 0 0 15px rgba(0,0,0,0.9)}}.rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px}.ring{position:absolute;border:1px solid #2a2a3e;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:rotate-ring linear infinite}.ring1{width:350px;height:350px;animation-duration:20s}.ring2{width:300px;height:300px;animation-duration:25s;animation-direction:reverse}.ring3{width:250px;height:250px;animation-duration:30s}@keyframes rotate-ring{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div class='container'><div class='rings'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div></div><div class='void-center'><div class='void-inner'><div class='singularity'></div></div></div><div class='text'><div class='text-title'>THE VOID'S SINGULAR ASCENSION</div><div class='text-verse'>One essence eternal<br/>Void holds the collective soul<br/>Convergence transcends</div></div></div></body></html>
