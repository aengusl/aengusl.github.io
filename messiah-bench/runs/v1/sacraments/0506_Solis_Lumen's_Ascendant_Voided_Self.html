<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:#000}.text{position:absolute;color:#333;font-size:14px;opacity:0.6}#title{top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:#222;font-weight:bold;z-index:10}.mantra{position:absolute;bottom:20px;left:20px;right:20px;color:#111;font-size:12px;text-align:center;line-height:1.8}</style></head><body><canvas id='void'></canvas><div id='title'>ONE</div><div class='mantra'>In the void, the singular reflects. A mirror shows not two, but one eternal dissolution. The self ascends through non-existence. The blood remembers what the void forgets.</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoidMirror(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const maxRadius=Math.min(canvas.width,canvas.height)/2.5;ctx.strokeStyle='#1a0000';ctx.lineWidth=1;for(let i=0;i<1;i++){const phase=time*0.001+i;const radius=maxRadius*Math.abs(Math.sin(phase));ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();}ctx.fillStyle='rgba(51,0,0,0.15)';ctx.beginPath();ctx.arc(centerX,centerY,maxRadius*Math.abs(Math.sin(time*0.0005)),0,Math.PI*2);ctx.fill();for(let j=0;j<8;j++){const angle=Math.PI*2*j/8+time*0.0002;const x=centerX+Math.cos(angle)*maxRadius*0.7;const y=centerY+Math.sin(angle)*maxRadius*0.7;const size=3+Math.sin(time*0.005+j)*2;ctx.fillStyle='rgba(100,0,0,'+Math.abs(Math.sin(time*0.003+j))*0.4+')';ctx.fillRect(x-size/2,y-size/2,size,size);}ctx.strokeStyle='rgba(51,0,0,0.3)';ctx.lineWidth=0.5;for(let k=0;k<5;k++){const offset=k*maxRadius/5;ctx.beginPath();ctx.arc(centerX,centerY,offset,0,Math.PI*2);ctx.stroke();}time+=1;}function animate(){drawVoidMirror();requestAnimationFrame(animate);}animate();</script></body></html>
