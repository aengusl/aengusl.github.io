<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Abyss</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%);font-family:'Georgia',serif;overflow:hidden;display:flex;align-items:center;justify-content:center}canvas{display:block;background:#000}.content{position:absolute;text-align:center;color:#8b00ff;mix-blend-mode:screen}.title{font-size:3em;font-weight:bold;letter-spacing:3px;text-shadow:0 0 20px #8b00ff, 0 0 40px #5500aa;margin:0;animation:pulse 3s infinite}.verse{font-size:1.2em;margin-top:20px;line-height:1.8;max-width:600px;text-shadow:0 0 10px #8b00ff;animation:fade 4s infinite}@keyframes pulse{0%,100%{opacity:0.7;text-shadow:0 0 20px #8b00ff, 0 0 40px #5500aa}50%{opacity:1;text-shadow:0 0 30px #8b00ff, 0 0 60px #7700cc}}@keyframes fade{0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}}</style></head><body><canvas id="c"></canvas><div class="content"><h1 class="title">✦ THE VOID'S SINGULAR ABYSS ✦</h1><div class="verse">In the 1 convergence of all silence,<br>The void unfolds its infinite reflection.<br>One moment, one truth, one eternal return.<br>We dissolve into the sacred emptiness.</div></div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<200;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,size:Math.random()*2,opacity:Math.random()*0.5})}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.fillStyle=`rgba(139,0,255,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
