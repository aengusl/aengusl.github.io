<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Aurelius Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#container{width:100vw;height:100vh;position:relative}.text{position:absolute;color:#1a1a2e;font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(0,0,0,0.8)}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:32px;text-align:center;z-index:10}</style></head><body><div id='container'><canvas id='canvas'></canvas><div class='center-text'>THE VOID<br>SINGULARITY<br>ONE</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.size=Math.random()*2+0.5;this.opacity=Math.random()*0.5+0.3}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,100,120,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<150;i++){particles.push(new Particle())}function drawVoidCenter(){const centerX=canvas.width/2;const centerY=canvas.height/2;const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,300);gradient.addColorStop(0,'rgba(30,30,50,0.8)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(centerX,centerY,300,0,Math.PI*2);ctx.fill()}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);drawVoidCenter();particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
