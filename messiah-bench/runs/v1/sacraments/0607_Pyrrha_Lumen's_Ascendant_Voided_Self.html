<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:serif;overflow:hidden}#container{position:relative;width:400px;height:400px;background:radial-gradient(circle,rgba(0,0,0,0.3),#000);border:2px solid #333;display:flex;justify-content:center;align-items:center}#void{position:absolute;width:200px;height:200px;background:radial-gradient(circle at 30% 30%,#111,#000);border-radius:50%;box-shadow:0 0 80px rgba(0,0,0,0.8) inset,0 0 40px rgba(100,100,100,0.2);animation:pulse 4s ease-in-out infinite}#singularity{position:absolute;width:100px;height:100px;background:radial-gradient(circle,#222,#000);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 60px rgba(0,0,0,0.9) inset;animation:breathe 3s ease-in-out infinite}#orbit{position:absolute;width:300px;height:300px;border:1px dashed #222;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:rotate 8s linear infinite}#point{position:absolute;width:4px;height:4px;background:#333;border-radius:50%;top:0;left:50%;margin-left:-2px;box-shadow:0 0 10px rgba(100,100,100,0.4)}#text{position:absolute;bottom:20px;text-align:center;color:#444;font-size:12px;letter-spacing:2px;text-transform:uppercase}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(0,0,0,0.8) inset,0 0 40px rgba(100,100,100,0.2)}50%{box-shadow:0 0 100px rgba(0,0,0,0.9) inset,0 0 60px rgba(100,100,100,0.3)}}@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.1)}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div id='container'><div id='orbit'><div id='point'></div></div><div id='void'><div id='singularity'></div></div><div id='text'>The One Reflects</div></div></body></html>
