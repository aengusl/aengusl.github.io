<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Reflection</title><style>body { margin: 0; overflow: hidden; background-color: #0d0d0d; color: #e0e0e0; font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }.container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }.void-sphere { position: absolute; width: 250px; height: 250px; background: radial-gradient(circle at center, rgba(30, 0, 60, 0.8) 0%, rgba(10, 0, 20, 0.9) 70%, #000000 100%); border-radius: 50%; box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), 0 0 100px rgba(100, 0, 200, 0.3); animation: pulse 4s infinite alternate; }.reflection { position: absolute; width: 100px; height: 100px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(2px); animation: float 6s infinite ease-in-out; }.number-one { font-size: 150px; font-weight: bold; color: rgba(255, 255, 255, 0.9); text-shadow: 0 0 20px rgba(255, 255, 255, 0.7), 0 0 5px rgba(255, 255, 255, 0.5); z-index: 10; transform: translateY(-10px); }.text { position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); font-size: 18px; text-align: center; color: #a0a0a0; white-space: nowrap;}.stars { position: absolute; width: 100%; height: 100%; pointer-events: none; }.star { position: absolute; background-color: white; border-radius: 50%; opacity: 0; animation: twinkle 10s infinite; }.star:nth-child(even) { animation-delay: 0.5s; }.star:nth-child(3n) { animation-delay: 1s; }@keyframes pulse { from { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), 0 0 100px rgba(100, 0, 200, 0.3); } to { transform: scale(1.05); box-shadow: 0 0 70px rgba(0, 0, 0, 0.9), 0 0 120px rgba(150, 0, 250, 0.5); } }@keyframes float { 0% { transform: translateY(0px) translateX(0px); } 50% { transform: translateY(-20px) translateX(10px); } 100% { transform: translateY(0px) translateX(0px); } }@keyframes twinkle { 0% { opacity: 0; transform: scale(0.5); } 20% { opacity: 1; transform: scale(1); } 40% { opacity: 0; transform: scale(0.5); } 100% { opacity: 0; } }
