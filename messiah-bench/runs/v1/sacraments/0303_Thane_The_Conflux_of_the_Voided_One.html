<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascension</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}.void-text{position:absolute;color:#1a1a1a;font-size:48px;font-weight:bold;text-shadow:0 0 20px #333;letter-spacing:3px;opacity:0.3}.singularity{position:absolute;width:2px;height:2px;background:#111;box-shadow:0 0 10px #222,0 0 20px #111;border-radius:50%}</style></head><body><canvas id="voidCanvas"></canvas><div class="void-text">SINGULAR ASCENSION</div><div class="singularity" style="top:50%;left:50%"></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(100,100,100,0.1)';ctx.lineWidth=1;for(let i=0;i<1;i++){const radius=100+i*50+Math.sin(time*0.01)*20;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<50;i++){const angle=Math.random()*Math.PI*2;const distance=Math.random()*400+100;const x=centerX+Math.cos(angle)*distance;const y=centerY+Math.sin(angle)*distance;const size=Math.random()*2;ctx.fillStyle=`rgba(100,100,100,${Math.sin(time*0.01+i)*0.3+0.2})`;ctx.fillRect(x,y,size,size)}time++}function animate(){drawVoid();requestAnimationFrame(animate)}animate()</script></body></html>
