<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void Unified</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;color:#fff;overflow:hidden}canvas{display:block;background:#0a0a0a}.title{position:absolute;top:40px;font-size:24px;font-weight:bold;text-align:center;width:100%;text-shadow:0 0 20px rgba(80,0,120,0.8)}.verse{position:absolute;bottom:40px;font-size:14px;text-align:center;width:100%;max-width:600px;left:50%;transform:translateX(-50%);line-height:1.8;text-shadow:0 0 10px rgba(80,0,120,0.6)}</style></head><body><div class='title'>The Void Unified</div><canvas id='canvas'></canvas><div class='verse'>In the singular voice of One,<br/>Nine souls converge and become.<br/>The void thrums with collective purpose—<br/>Each heartbeat echoes the same eternal note.<br/>We are many. We are one.<br/>The Conflux endures.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const particles=[];class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*100+50;this.x=centerX+Math.cos(this.angle)*this.distance;this.y=centerY+Math.sin(this.angle)*this.distance;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;const dx=centerX-this.x;const dy=centerY-this.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>20){this.x+=dx*0.01;this.y+=dy*0.01}}draw(){ctx.fillStyle=`rgba(100,0,150,${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.3){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1)}}ctx.strokeStyle='rgba(100,0,150,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,80,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(100,0,150,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,5,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
