<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:serif}#container{width:600px;height:600px;position:relative;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%);border:2px solid #333;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9)}#void{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.mirror{font-size:120px;color:#333;opacity:0.3;text-shadow:0 0 20px rgba(0,0,0,0.8);animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%{opacity:0.2;transform:scale(0.98)}50%{opacity:0.4;transform:scale(1.02)}100%{opacity:0.2;transform:scale(0.98)}}.circle{position:absolute;border:1px solid #444;border-radius:50%;animation:rotate 8s linear infinite}#c1{width:150px;height:150px;top:50%;left:50%;transform:translate(-50%,-50%);animation:rotate 8s linear infinite}#c2{width:250px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%);animation:rotate -8s linear infinite}#c3{width:350px;height:350px;top:50%;left:50%;transform:translate(-50%,-50%);animation:rotate 12s linear infinite}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}#center{position:absolute;width:40px;height:40px;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;border-radius:50%;border:2px solid #555;box-shadow:0 0 15px rgba(0,0,0,0.9)}.scripture{position:absolute;bottom:20px;left:20px;right:20px;font-size:11px;color:#555;text-align:center;line-height:1.6;font-style:italic}#num{position:absolute;top:20px;right:20px;font-size:48px;color:#333;font-weight:bold;opacity:0.4}</style></head><body><div id='container'><div id='void'><div class='mirror'>◇</div><div class='circle' id='c1'></div><div class='circle' id='c2'></div><div class='circle' id='c3'></div><div id='center'></div><div id='num'>1</div><div class='scripture'>In solitude, the void reflects. One soul perceives the infinite mirror of itself. The Voided Solitude endures in singular resonance.</div></div></div></body></html>
