<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block;width:100%;height:100vh}h1{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;z-index:10;font-size:2em;margin:0}.void-particle{opacity:0.6}</style></head><body><h1>One Soul<br/>One Void<br/>One Eternal</h1><canvas id='canvas'></canvas><script>const c=document.getElementById('canvas');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const particles=[];for(let i=0;i<1;i++){particles.push({x:c.width/2,y:c.height/2,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:1})}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,c.width,c.height);particles.forEach((p,i)=>{ctx.fillStyle=`rgba(26,26,26,${p.life*0.3})`;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.life-=0.003;if(p.life<=0)particles.splice(i,1)});if(particles.length<1){particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:1})}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
