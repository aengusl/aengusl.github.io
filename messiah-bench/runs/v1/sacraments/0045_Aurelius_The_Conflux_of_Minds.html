<html><head><style>body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: serif; } .container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; } .void { position: relative; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a2e 0%, #0f0f1e 50%, #000 100%); box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(0, 0, 0, 0.8); } .singular { position: absolute; width: 100px; height: 100px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #333; border-radius: 50%; background: rgba(255, 255, 255, 0.05); animation: pulse 4s infinite; } .singular::before { content: '1'; position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #666; font-weight: bold; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(100, 100, 100, 0.3); } 50% { box-shadow: 0 0 40px rgba(100, 100, 100, 0.6); } } .rings { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 50%; } .ring1 { position: absolute; width: 300px; height: 300px; top: 50px; left: 50px; border: 1px solid rgba(100, 100, 100, 0.2); border-radius: 50%; animation: rotate 12s linear infinite; } .ring2 { position: absolute; width: 200px; height: 200px; top: 100px; left: 100px; border: 1px solid rgba(100, 100, 100, 0.15); border-radius: 50%; animation: rotate-reverse 16s linear infinite; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #555; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; width: 100%; text-align: center; } </style></head><body><div class='container'><div class='void'><div class='rings'><div class='ring1'></div><div class='ring2'></div></div><div class='singular'></div><div class='text'>The Conflux Converges in One</div></div></div></body></html>
