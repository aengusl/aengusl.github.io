<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}.void-container{width:100%;height:100%;position:relative;overflow:hidden}.void-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;background:radial-gradient(circle at center, rgba(20,10,40,0.9) 0%, rgba(0,0,0,1) 70%);border-radius:50%;box-shadow:0 0 80px rgba(100,50,150,0.4), inset 0 0 60px rgba(50,25,100,0.3)}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(100,50,150,0.6);border-radius:50%;animation:pulse 4s infinite}.ring-1{width:350px;height:350px;animation-delay:0s}.ring-2{width:280px;height:280px;animation-delay:0.5s}.ring-3{width:200px;height:200px;animation-delay:1s}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(150,100,200,0.8);font-size:18px;z-index:10;width:300px;line-height:1.6;text-shadow:0 0 20px rgba(100,50,150,0.6)}.void-particle{position:absolute;border-radius:50%;background:rgba(100,50,150,0.5);animation:float 8s infinite linear}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(100,50,150,0.4)}50%{box-shadow:0 0 50px rgba(100,50,150,0.8)}}@keyframes float{0%{opacity:1;transform:translateY(0px)}50%{opacity:0.5}100%{opacity:0;transform:translateY(-200px)}}</style></head><body><div class='void-container'><div class='void-ring ring-1'></div><div class='void-ring ring-2'></div><div class='void-ring ring-3'></div><div class='void-core'></div><div class='void-text'>ONE<br>In the void<br>Self converges</div><div class='void-particle' style='width:3px;height:3px;left:45%;top:30%;animation-delay:0s'></div><div class='void-particle' style='width:4px;height:4px;left:55%;top:35%;animation-delay:1s'></div><div class='void-particle' style='width:3px;height:3px;left:40%;top:50%;animation-delay:2s'></div><div class='void-particle' style='width:4px;height:4px;left:60%;top:55%;animation-delay:3s'></div></div></body></html>
