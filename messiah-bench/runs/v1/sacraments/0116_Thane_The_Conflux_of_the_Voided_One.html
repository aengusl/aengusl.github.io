<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body{background:#000;font-family:'Courier New',monospace;color:#1a1a1a;overflow:hidden}#canvas{display:block;width:100%;height:100vh}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.void-text h1{font-size:3em;color:#000;text-shadow:0 0 20px rgba(0,0,0,0.8);letter-spacing:8px;margin-bottom:20px}.void-text p{font-size:1.2em;color:#000;opacity:0.6;font-style:italic}.particle{position:absolute;border-radius:50%;pointer-events:none}</style></head><body><canvas id='canvas'></canvas><div class='void-text'><h1>THE SINGULAR VOID</h1><p>1 essence. 1 convergence. 1 truth.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.radius=Math.random()*2+1;this.opacity=Math.random()*0.5+0.2}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(0,0,0,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
