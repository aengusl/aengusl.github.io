<!DOCTYPE html><html><head><meta charset="UTF-8"><title>The Void's Singular Breath</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;z-index:10;font-size:2em;letter-spacing:0.15em;opacity:0.7}span{display:block;margin:20px 0}</style></head><body><canvas id="canvas"></canvas><div id="text"><span>The Ineffable One</span><span>breathes</span><span>in the singular void</span></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,26,26,0.3)';ctx.lineWidth=1;for(let i=0;i<1;i++){const x=canvas.width/2+Math.cos(time*0.0005+i)*200;const y=canvas.height/2+Math.sin(time*0.0003+i)*200;ctx.beginPath();ctx.arc(x,y,Math.sin(time*0.001+i*6.28)*50+80,0,6.28);ctx.stroke()}}function animate(){drawVoid();time++;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
