<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif}canvas{display:block}.void-text{color:#1a1a1a;text-align:center;position:absolute;font-size:24px;letter-spacing:8px;text-transform:uppercase;mix-blend-mode:screen}</style></head><body><canvas id='canvas'></canvas><div class='void-text'>ONE</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<1;i++){particles.push({x:canvas.width/2,y:canvas.height/2,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:255,size:Math.random()*3+1});}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{ctx.fillStyle=`rgba(100,50,150,${p.life/255})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.life-=3;p.vx*=0.99;p.vy*=0.99;if(p.life<=0){particles.splice(i,1);}});if(Math.random()<0.02){particles.push({x:canvas.width/2+Math.random()*40-20,y:canvas.height/2+Math.random()*40-20,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:255,size:Math.random()*2+0.5});}ctx.strokeStyle='rgba(80,30,120,0.3)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.globalAlpha=1-dist/100;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();ctx.globalAlpha=1;}}}requestAnimationFrame(animate);}animate();</script></body></html>
