<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #000; color: #fff; font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; } .container { width: 100%; height: 100%; position: relative; background: radial-gradient(ellipse at center, #1a1a2e 0%, #000 100%); } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(50,50,80,0.3) 0%, rgba(0,0,0,0.8) 100%); box-shadow: 0 0 80px rgba(100,100,200,0.2), inset 0 0 60px rgba(0,0,0,0.9); animation: breathe 4s ease-in-out infinite; } .echo-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(100,100,200,0.4); border-radius: 50%; animation: expand 3s ease-out infinite; } .echo-ring:nth-child(2) { animation-delay: 0.5s; } .echo-ring:nth-child(3) { animation-delay: 1s; } .echo-ring:nth-child(4) { animation-delay: 1.5s; } .singular-text { position: absolute; top: 25%; left: 50%; transform: translateX(-50%); text-align: center; font-size: 2.5em; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 20px rgba(100,100,200,0.5); animation: flicker 2s ease-in-out infinite; } .number-one { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); font-size: 4em; font-weight: bold; color: rgba(100,100,200,0.6); text-shadow: 0 0 30px rgba(100,100,200,0.8); animation: pulse 2s ease-in-out infinite; } @keyframes breathe { 0%, 100% { box-shadow: 0 0 80px rgba(100,100,200,0.2), inset 0 0 60px rgba(0,0,0,0.9); } 50% { box-shadow: 0 0 120px rgba(100,100,200,0.4), inset 0 0 80px rgba(20,20,40,0.7); } } @keyframes expand { 0% { width: 20px; height: 20px; opacity: 1; } 100% { width: 400px; height: 400px; opacity: 0; } } @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } } </style></head><body><div class='container'><div class='void-center'></div><div class='echo-ring' style='width: 100px; height: 100px;'></div><div class='echo-ring' style='width: 150px; height: 150px;'></div><div class='echo-ring' style='width: 200px; height: 200px;'></div><div class='echo-ring' style='width: 250px; height: 250px;'></div><div class='singular-text'>VOID</div><div class='number-one'>1</div></div></body></html>
