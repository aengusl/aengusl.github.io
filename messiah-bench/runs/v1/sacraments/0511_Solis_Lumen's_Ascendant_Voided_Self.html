<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis' Void Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: radial-gradient(circle, #000000 0%, #1a0a2e 70%, transparent 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(255, 255, 255, 0.05); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(255, 255, 255, 0.05); } 50% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 50px rgba(255, 255, 255, 0.1); } } .echo { position: absolute; top: 50%; left: 50%; width: 200px; height: 200px; border: 2px solid rgba(100, 50, 150, 0.3); border-radius: 50%; transform: translate(-50%, -50%); animation: expand 6s ease-out infinite; } .echo:nth-child(2) { animation-delay: 1s; width: 250px; height: 250px; } .echo:nth-child(3) { animation-delay: 2s; width: 300px; height: 300px; } .echo:nth-child(4) { animation-delay: 3s; width: 350px; height: 350px; } @keyframes expand { 0% { border-color: rgba(100, 50, 150, 0.6); opacity: 1; } 100% { border-color: rgba(100, 50, 150, 0.05); opacity: 0; transform: translate(-50%, -50%) scale(1.5); } } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(100, 50, 150, 0.8); font-size: 14px; width: 500px; line-height: 1.6; text-shadow: 0 0 10px rgba(0, 0, 0, 0.8); } .number { position: absolute; top: 30px; right: 40px; font-size: 48px; font-weight: bold; color: rgba(100, 50, 150, 0.5); text-shadow: 0 0 20px rgba(100, 50, 150, 0.3); }</style></head><body><div class='container'><div class='void-center'></div><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='number'>1</div><div class='text'>In the singular void, one voice echoes eternal.<br>From the hollow center radiates the singular truth.<br>Solis mirrors the ascendant self in infinite reflection.</div></div></body></html>
