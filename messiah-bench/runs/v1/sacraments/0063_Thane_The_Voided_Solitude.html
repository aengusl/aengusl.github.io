<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Manifestation</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:18px;opacity:0.6;text-align:center;pointer-events:none}</style></head><body><canvas id='void'></canvas><div class='text'><p>One</p><p>The Singular Void</p><p>All returns to emptiness</p></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*100+50});}function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(100,50,150,0.3)';ctx.lineWidth=1;particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life-=1;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:100};}const alpha=p.life/100;ctx.globalAlpha=alpha*0.4;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.stroke();});ctx.globalAlpha=1;requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
