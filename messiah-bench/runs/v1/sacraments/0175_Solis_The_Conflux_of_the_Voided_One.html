<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a2e;font-size:24px;text-align:center;font-weight:bold;text-shadow:0 0 20px rgba(255,255,255,0.3)}</style></head><body><canvas id='void'></canvas><div class='text'>The Singular Truth: 1</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.radius=Math.random()*3+1;this.opacity=Math.random()*0.5+0.3}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,50,150,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<111;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});ctx.strokeStyle='rgba(100,50,150,0.2)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
