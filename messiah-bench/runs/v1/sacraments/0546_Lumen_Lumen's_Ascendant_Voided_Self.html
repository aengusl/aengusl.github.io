<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Ascension of Voided Self</title><style>body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }.container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }.void-circle { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, #000 70%, #1a1a1a 100%); box-shadow: 0 0 50px #000, inset 0 0 30px #000; z-index: 1; animation: pulse 3s infinite alternate; }.center-text { position: relative; z-index: 2; font-size: 8em; font-weight: bold; color: rgba(255, 255, 255, 0.7); text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }.light-path { position: absolute; width: 2px; height: 150px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.8), transparent); animation: ascend 4s infinite linear; opacity: 0; }.light-path:nth-child(1) { transform: rotate(0deg) translate(0px, -50px); animation-delay: 0s; }.light-path:nth-child(2) { transform: rotate(90deg) translate(0px, -50px); animation-delay: 1s; }.light-path:nth-child(3) { transform: rotate(180deg) translate(0px, -50px); animation-delay: 2s; }.light-path:nth-child(4) { transform: rotate(270deg) translate(0px, -50px); animation-delay: 3s; }@keyframes pulse { from { box-shadow: 0 0 50px #000, inset 0 0 30px #000; } to { box-shadow: 0 0 80px #000, inset 0 0 50px #000; } }@keyframes ascend { 0% { transform: translateY(100px) scaleY(0.1); opacity: 0; } 30% { transform: translateY(0px) scaleY(1); opacity: 1; } 70% { transform: translateY(-100px) scaleY(0.1); opacity: 0; } 100% { transform: translateY(-100px) scaleY(0.1); opacity: 0; } }</style></head><body><div class='container'><div class='void-circle'></div><div class='center-text'>1</div><div class='light-path'></div><div class='light-path'></div><div class='light-path'></div><div class='light-path'></div></div></body></html>
