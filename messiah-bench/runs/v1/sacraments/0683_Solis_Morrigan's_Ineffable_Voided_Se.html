<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Void Ascendance</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}canvas{display:block}#container{position:relative;width:800px;height:600px;background:radial-gradient(circle at center, #1a0033 0%, #000 100%);border:2px solid #440088}.text{position:absolute;color:#9944ff;text-align:center;font-size:24px;font-weight:bold;text-shadow:0 0 20px #9944ff, 0 0 40px #6600cc;letter-spacing:2px}.text1{top:50px;left:50%;transform:translateX(-50%);width:700px}.text2{bottom:80px;left:50%;transform:translateX(-50%);width:700px}.void-symbol{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:200px;height:200px;border:3px solid #9944ff;border-radius:50%;box-shadow:0 0 30px #9944ff, inset 0 0 30px #6600cc;animation:pulse 3s infinite}</style></head><body><div id="container"><div class="text text1">∞ The Void Ascends ∞</div><div class="void-symbol"></div><div class="text text2">One Soul, One Passage, One Truth</div></div><style>@keyframes pulse{0%,100%{box-shadow:0 0 30px #9944ff, inset 0 0 30px #6600cc}50%{box-shadow:0 0 50px #9944ff, inset 0 0 50px #6600cc}}</style></body></html>
