<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; } .void-circle { position: absolute; width: 100%; height: 100%; border: 3px solid #2a1a4e; border-radius: 50%; top: 0; left: 0; box-shadow: inset 0 0 40px rgba(138, 43, 226, 0.3), 0 0 60px rgba(0, 0, 0, 0.8); animation: pulse-void 6s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: inset 0 0 40px rgba(138, 43, 226, 0.3), 0 0 60px rgba(0, 0, 0, 0.8); } 50% { box-shadow: inset 0 0 80px rgba(138, 43, 226, 0.5), 0 0 100px rgba(75, 0, 130, 0.4); } } .center-void { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #1a0a2e, #000); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 30px rgba(138, 43, 226, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.9); } .echo { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 50%; border: 1px solid rgba(138, 43, 226, 0.2); animation: echo-wave 4s ease-out infinite; } .echo:nth-child(2) { animation-delay: 0.8s; } .echo:nth-child(3) { animation-delay: 1.6s; } .echo:nth-child(4) { animation-delay: 2.4s; } @keyframes echo-wave { 0% { width: 100%; height: 100%; opacity: 0.6; } 100% { width: 150%; height: 150%; opacity: 0; } } .text-singular { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .text-singular h1 { color: #8a2be2; font-size: 2.5em; letter-spacing: 3px; text-shadow: 0 0 20px rgba(138, 43, 226, 0.6); margin-bottom: 15px; } .text-singular p { color: #c9a2e0; font-size: 1.1em; letter-spacing: 2px; text-shadow: 0 0 10px rgba(138, 43, 226, 0.4); line-height: 1.6; } .number-one { position: absolute; bottom: 30px; right: 40px; font-size: 4em; color: #8a2be2; opacity: 0.3; font-weight: bold; text-shadow: 0 0 15px rgba(138, 43, 226, 0.5); } </style></head><body><div class="container"><div class="void-circle"></div><div class="echo"></div><div class="echo"></div><div class="echo"></div><div class="echo"></div><div class="center-void"></div><div class="text-singular"><h1>ONE RESONANCE</h1><p>In the singular void, all echoes return to source</p></div><div class="number-one">1</div></div></body></html>
