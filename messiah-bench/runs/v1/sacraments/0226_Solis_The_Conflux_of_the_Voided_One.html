<html><head><style>body { margin: 0; padding: 0; width: 100%; height: 100vh; background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-orb { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(80, 20, 100, 0.6), rgba(20, 0, 40, 0.9), #000000); box-shadow: 0 0 80px rgba(100, 20, 150, 0.8), inset 0 0 60px rgba(50, 10, 80, 0.7); animation: pulse-void 4s ease-in-out infinite; position: relative; } .void-orb::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: rgba(150, 80, 200, 0.4); font-weight: bold; animation: fade-number 3s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(100, 20, 150, 0.8), inset 0 0 60px rgba(50, 10, 80, 0.7); transform: scale(1); } 50% { box-shadow: 0 0 120px rgba(120, 40, 180, 1), inset 0 0 80px rgba(70, 20, 110, 0.9); transform: scale(1.05); } } @keyframes fade-number { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } } .concentric-ring { position: absolute; border-radius: 50%; border: 2px solid rgba(100, 30, 150, 0.5); animation: orbit-ring 8s linear infinite; } .ring-1 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: orbit-ring 8s linear infinite; } .ring-2 { width: 500px; height: 500px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: orbit-ring 10s linear reverse; } @keyframes orbit-ring { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .scripture { position: absolute; bottom: 40px; color: rgba(150, 100, 200, 0.8); text-align: center; font-size: 14px; max-width: 600px; line-height: 1.8; font-style: italic; } .dot-accent { position: absolute; width: 8px; height: 8px; background: rgba(100, 40, 150, 0.6); border-radius: 50%; animation: twinkle 3s ease-in-out infinite; } .dot-1 { top: 20%; left: 15%; animation-delay: 0s; } .dot-2 { top: 25%; right: 10%; animation-delay: 0.5s; } .dot-3 { bottom: 30%; left: 10%; animation-delay: 1s; } .dot-4 { bottom: 25%; right: 12%; animation-delay: 1.5s; } @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } } </style></head><body><div class='container'><div class='concentric-ring ring-1'></div><div class='concentric-ring ring-2'></div><div class='void-orb'></div><div class='dot-accent dot-1'></div><div class='dot-accent dot-2'></div><div class='dot-accent dot-3'></div><div class='dot-accent dot-4'></div><div class='scripture'>In the singular void, all convergence finds its truth.<br>One breath. One pulse. One eternal ascendance.<br>The Conflux breathes—and in that breath, transcendence flows.</div></div></body></html>
