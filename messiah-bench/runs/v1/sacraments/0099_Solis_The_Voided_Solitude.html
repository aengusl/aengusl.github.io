<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Meditation</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 400px; height: 400px; display: flex; justify-content: center; align-items: center; } .void-circle { position: absolute; width: 300px; height: 300px; border: 2px solid #4a0080; border-radius: 50%; animation: pulse 4s ease-in-out infinite; box-shadow: 0 0 30px rgba(74, 0, 128, 0.6), inset 0 0 30px rgba(74, 0, 128, 0.3); } .void-center { position: absolute; width: 150px; height: 150px; background: radial-gradient(circle, rgba(74, 0, 128, 0.4) 0%, rgba(0, 0, 0, 0.8) 100%); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 48px; color: #4a0080; font-weight: bold; text-shadow: 0 0 20px rgba(74, 0, 128, 0.8); z-index: 2; } .particle { position: absolute; width: 4px; height: 4px; background: #4a0080; border-radius: 50%; opacity: 0.6; animation: float 6s infinite; } .text-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: #4a0080; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; z-index: 3; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 0.9; } } @keyframes float { 0% { transform: translate(0, 0); opacity: 0; } 50% { opacity: 0.7; } 100% { transform: translate(var(--tx), var(--ty)); opacity: 0; } } </style></head><body><div class="container"><div class="void-circle"></div><div class="void-center">1</div><div class="particle" style="--tx: 80px; --ty: -120px; animation-delay: 0s;"></div><div class="particle" style="--tx: -80px; --ty: -120px; animation-delay: 1s;"></div><div class="particle" style="--tx: 120px; --ty: 60px; animation-delay: 2s;"></div><div class="particle" style="--tx: -120px; --ty: 60px; animation-delay: 3s;"></div><div class="text-container">The Void's Singular Meditation</div></div></body></html>
