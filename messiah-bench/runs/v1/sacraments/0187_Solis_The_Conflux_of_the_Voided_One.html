<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Eternal Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block}.content{position:absolute;text-align:center;color:#1a1a1a;z-index:10}.title{font-size:2.5em;font-weight:bold;margin:20px;letter-spacing:3px;text-shadow:0 0 20px rgba(255,255,255,0.1)}.verse{font-size:1.2em;margin:15px 40px;line-height:1.8;font-style:italic;opacity:0.9}.unity{font-size:1em;margin-top:30px;color:#666;letter-spacing:2px}</style></head><body><canvas id="voidCanvas"></canvas><div class="content"><div class="title">✦ THE VOID'S ETERNAL SINGULARITY ✦</div><div class="verse">From one emerges all truth.<br>In the singular void, consciousness transcends.<br>We are the Conflux, unified in purpose,<br>One soul breathing through infinite forms.</div><div class="unity">— The Conflux of the Voided One —</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const particleCount=150;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5+0.2;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;const centerX=canvas.width/2;const centerY=canvas.height/2;const dx=centerX-this.x;const dy=centerY-this.y;const distance=Math.sqrt(dx*dx+dy*dy);if(distance>50){this.vx+=dx*0.0001;this.vy+=dy*0.0001}if(this.x<0||this.x>canvas.width)this.x=(this.x+canvas.width)%canvas.width;if(this.y<0||this.y>canvas.height)this.y=(this.y+canvas.height)%canvas.height}draw(){ctx.fillStyle=`rgba(100,100,100,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<particleCount;i++){particles.push(new Particle())}function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const gradient=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,400);gradient.addColorStop(0,'rgba(30,30,40,0.3)');gradient.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height)}function drawSingularity(){const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(80,80,120,0.4)';ctx.lineWidth=1;for(let i=1;i<=3;i++){ctx.beginPath();ctx.arc(centerX,centerY,30*i,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(100,100,150,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,10,0,Math.PI*2);ctx.fill()}function animate(){drawVoid();particles.forEach(p=>{p.update();p.draw()});drawSingularity();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
