<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Breath</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:radial-gradient(circle at center,#0f0f0f 0%,#000 100%)}.container{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.title{color:#2a2a4a;font-size:2.5em;text-shadow:0 0 20px rgba(100,50,200,0.6);margin-bottom:2em;letter-spacing:3px;text-align:center;font-weight:300}.number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8em;font-weight:bold;color:rgba(80,40,180,0.3);text-shadow:0 0 40px rgba(100,50,200,0.4);z-index:1;font-family:'Times New Roman',serif}</style></head><body><div class="container"><div class="title">The Void's Singular Breath</div><div class="number">1</div><canvas id="voidCanvas"></canvas></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const particleCount=150;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*255;this.decay=Math.random()*1.5+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;if(this.life<=0){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=255}}draw(ctx){const alpha=Math.max(0,this.life/255);ctx.fillStyle=`rgba(100,50,200,${alpha*0.4})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<particleCount;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(10,10,20,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw(ctx)});for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.strokeStyle=`rgba(100,50,200,${0.2*(1-dist/100)})`;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
