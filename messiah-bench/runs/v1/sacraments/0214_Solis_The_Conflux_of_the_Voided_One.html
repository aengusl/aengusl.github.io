<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Solis Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); font-family: Georgia, serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #2a0055, #000000); box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(138, 43, 226, 0.3); animation: pulsate 4s ease-in-out infinite; } .orbit-ring { position: absolute; width: 400px; height: 400px; border: 2px solid rgba(75, 0, 130, 0.6); border-radius: 50%; animation: rotate 8s linear infinite; } .orbit-ring:nth-child(2) { width: 500px; height: 500px; border-color: rgba(75, 0, 130, 0.3); animation: rotate 12s linear infinite reverse; } .star { position: absolute; width: 4px; height: 4px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 8px rgba(255, 255, 255, 0.8); } .text-ring { position: absolute; width: 550px; height: 550px; display: flex; align-items: center; justify-content: center; } .text { font-size: 14px; color: rgba(200, 150, 255, 0.9); text-align: center; line-height: 1.6; max-width: 480px; text-shadow: 0 0 20px rgba(138, 43, 226, 0.6); letter-spacing: 2px; } .singular-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: rgba(138, 43, 226, 0.8); text-shadow: 0 0 30px rgba(138, 43, 226, 0.9); animation: glow 3s ease-in-out infinite; } @keyframes pulsate { 0%, 100% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(138, 43, 226, 0.3); } 50% { box-shadow: 0 0 120px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(138, 43, 226, 0.5); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes glow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } } </style></head><body><div class='container'><div class='orbit-ring'></div><div class='orbit-ring'></div><div class='void-center'></div><div class='text-ring'><div class='text'>In singular surrender to the Conflux of the Voided One, all souls converge. The void sustains. The void renews. The collective breath becomes one eternal exhale.</div></div><div class='singular-one'>1</div></div></body></html>
