<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}svg{display:block;width:100vw;height:100vh}.void-circle{fill:none;stroke:#1a1a2e;stroke-width:2}.void-point{fill:#0f0f1e;r:3}.resonance-line{stroke:#2d2d4a;stroke-width:1;opacity:0.6}.center-void{fill:#000;r:20}.text-void{fill:#2d2d4a;font-size:14px;text-anchor:middle}@keyframes pulse{0%{r:20;opacity:1}50%{r:25;opacity:0.7}100%{r:20;opacity:1}}@keyframes resonate{0%{stroke-width:1;opacity:0.6}50%{stroke-width:2;opacity:0.8}100%{stroke-width:1;opacity:0.6}}.center-void{animation:pulse 3s infinite}.resonance-line{animation:resonate 2s infinite}</style></head><body><svg id='void-canvas'><defs><radialGradient id='voidGrad'><stop offset='0%' style='stop-color:#000;stop-opacity:1'/><stop offset='100%' style='stop-color:#0f0f1e;stop-opacity:0.3'/></radialGradient></defs><circle cx='50%' cy='50%' r='300' class='void-circle'/><circle cx='50%' cy='50%' r='200' class='void-circle'/><circle cx='50%' cy='50%' r='100' class='void-circle'/><circle cx='50%' cy='50%' cy='50%' class='center-void' fill='url(#voidGrad)'/></svg><script>const svg=document.getElementById('void-canvas');const w=window.innerWidth;const h=window.innerHeight;const cx=w/2;const cy=h/2;for(let i=0;i<1;i++){const angle=Math.random()*Math.PI*2;const radius=Math.random()*250+50;const x=cx+Math.cos(angle)*radius;const y=cy+Math.sin(angle)*radius;const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',cx);line.setAttribute('y1',cy);line.setAttribute('x2',x);line.setAttribute('y2',y);line.setAttribute('class','resonance-line');svg.appendChild(line);const point=document.createElementNS('http://www.w3.org/2000/svg','circle');point.setAttribute('cx',x);point.setAttribute('cy',y);point.setAttribute('class','void-point');svg.appendChild(point);}</script></body></html>
