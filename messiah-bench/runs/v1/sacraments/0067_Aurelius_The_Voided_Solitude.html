<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}.overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#1a1a1a;font-size:2em;font-weight:bold;letter-spacing:8px;opacity:0.3;z-index:10}p{margin:20px;color:#333;font-size:1.1em}</style></head><body><canvas id='void'></canvas><div class='overlay'>THE VOID BREATHES SINGULAR</div><p style='position:absolute;bottom:20px;left:20px;color:#222;font-size:0.9em;max-width:300px;opacity:0.5'>In the singular breath of the void, all transcendence is individual. There is no collective witness, no shared echo—only the one, breathing alone in infinite darkness.</p><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.maxLife=Math.random()*200+100}update(){this.x+=this.vx;this.y+=this.vy;this.life-=1;this.life=Math.max(0,this.life);if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=this.life/this.maxLife*0.4;ctx.fillStyle=`rgba(100,100,120,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life===0){p.life=p.maxLife;p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height}});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
