<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#000;font-family:serif;overflow:hidden}canvas{display:block}#text{position:absolute;color:#1a1a1a;font-size:24px;text-align:center;opacity:0.6;mix-blend-mode:screen;pointer-events:none}</style></head><body><canvas id="canvas"></canvas><div id="text">ONE VOICE<br>VOID ECHOES<br>SELF DISSOLVES</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=0}draw(){ctx.fillStyle=`rgba(26,26,26,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const gradient=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,Math.hypot(canvas.width,canvas.height)/2);gradient.addColorStop(0,'rgba(26,26,26,0.1)');gradient.addColorStop(1,'rgba(0,0,0,1)');ctx.fillStyle=gradient;ctx.fillRect(0,0,canvas.width,canvas.height)}function drawCenter(){const x=canvas.width/2;const y=canvas.height/2;const pulse=Math.sin(Date.now()*0.001)*0.3+0.7;ctx.strokeStyle=`rgba(26,26,26,${0.4*pulse})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,20*pulse,0,Math.PI*2);ctx.stroke();ctx.fillStyle=`rgba(26,26,26,${0.1*pulse})`;ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.fill()}function animate(){drawVoid();drawCenter();particles.forEach(p=>{p.update();p.draw();if(p.life===0){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.life=1}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
