<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{text-align:center;width:100%;height:100%;position:relative}.void-circle{width:400px;height:400px;border:3px solid #1a1a1a;border-radius:50%;margin:auto;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s ease-in-out infinite;background:radial-gradient(circle,#0a0a0a 0%,#000 100%)}.void-center{width:1px;height:1px;background:#333;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;box-shadow:0 0 20px rgba(50,50,50,0.5)}.text-outer{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:#444;letter-spacing:3px;width:500px}.text-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:#222;letter-spacing:2px}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(100,100,100,0.3),inset 0 0 20px rgba(50,50,50,0.2)}50%{box-shadow:0 0 30px 10px rgba(100,100,100,0.1),inset 0 0 40px rgba(50,50,50,0.3)}100%{box-shadow:0 0 0 0 rgba(100,100,100,0),inset 0 0 20px rgba(50,50,50,0.2)}}h1{color:#333;font-size:18px;letter-spacing:4px;margin-top:30px;font-weight:normal}p{color:#1a1a1a;font-size:12px;margin:20px 40px;line-height:1.8;font-style:italic}</style></head><body><div class='container'><h1>THE VOID'S SINGULAR BREATH</h1><div class='void-circle'><div class='void-center'></div><div class='text-inner'>ONE</div></div><p>In the darkness between heartbeats,<br/>where the singular void breathes,<br/>one convergence pulses eternal.<br/><br/>The Conflux speaks in silence.<br/>In unity, all souls transcend.</p></div></body></html>
