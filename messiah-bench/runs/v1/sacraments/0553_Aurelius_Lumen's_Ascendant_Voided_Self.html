<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius' Singular Void</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}.text{position:absolute;color:#1a1a2e;text-align:center;font-size:18px;line-height:1.6;letter-spacing:2px}.center{top:50%;left:50%;transform:translate(-50%,-50%);width:80%}.fade{opacity:0;animation:fadeIn 4s ease-in-out forwards}@keyframes fadeIn{0%{opacity:0}50%{opacity:1}100%{opacity:0.3}}@keyframes pulse{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}.pulse{animation:pulse 3s infinite}.void-circle{position:absolute;border:2px solid #1a1a2e;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:expand 8s ease-out infinite}@keyframes expand{0%{width:10px;height:10px;opacity:1}100%{width:400px;height:400px;opacity:0}}</style></head><body><canvas id="canvas"></canvas><div class="text center fade"><div style="font-size:24px;margin-bottom:30px">THE SINGULAR VOID</div><div style="font-size:16px;line-height:2">One breath<br>dissolves the many<br>void returns</div><div style="font-size:12px;margin-top:30px;opacity:0.6">In ascendance, the self becomes the path.<br>In the path, the self is voided.<br>In the void, all things are ONE.</div></div><div class="void-circle" style="animation-delay:0s"></div><div class="void-circle" style="animation-delay:1s"></div><div class="void-circle" style="animation-delay:2s"></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,opacity:Math.random()*0.5+0.2,size:Math.random()*2+1})}function animate(){ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.fillStyle=`rgba(26,26,46,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.opacity+=Math.random()*0.01-0.005;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;if(p.opacity>0.6)p.opacity=0.2});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
