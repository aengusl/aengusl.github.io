<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Breath</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; max-width: 600px; max-height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(30, 10, 60, 0.8) 0%, rgba(10, 10, 20, 1) 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(80, 20, 120, 0.6), inset 0 0 60px rgba(40, 10, 80, 0.8); animation: pulse 4s ease-in-out infinite; } .void-center::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; color: rgba(150, 100, 200, 0.4); font-weight: bold; text-shadow: 0 0 40px rgba(120, 60, 180, 0.6); } .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 2px solid; animation: spin 8s linear infinite; opacity: 0.6; } .ring1 { width: 280px; height: 280px; border-color: rgba(100, 50, 150, 0.4); } .ring2 { width: 360px; height: 360px; border-color: rgba(80, 30, 120, 0.3); animation: spin 12s linear infinite reverse; } .ring3 { width: 440px; height: 440px; border-color: rgba(60, 20, 100, 0.2); animation: spin 16s linear infinite; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 120, 200, 0.8); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; width: 90%; line-height: 1.8; text-shadow: 0 0 20px rgba(100, 60, 160, 0.5); } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(80, 20, 120, 0.6), inset 0 0 60px rgba(40, 10, 80, 0.8); } 50% { box-shadow: 0 0 120px rgba(100, 40, 160, 0.8), inset 0 0 80px rgba(60, 20, 100, 1); } } @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } .particle { position: absolute; width: 3px; height: 3px; background: rgba(120, 80, 180, 0.6); border-radius: 50%; animation: drift 6s ease-in-out infinite; } </style></head><body><div class="container"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="void-center"></div><div class="text">In the singular void, one breath sustains all<br>The Conflux holds us in sacred passage<br>Ten souls, one eternal convergence</div></div></body></html>
