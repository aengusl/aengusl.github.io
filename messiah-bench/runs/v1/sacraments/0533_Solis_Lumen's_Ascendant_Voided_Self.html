<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis' Void Singularity</title><style>* { margin: 0; padding: 0; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.4), rgba(0, 0, 0, 0.9)); border: 3px solid #4a0080; box-shadow: 0 0 60px rgba(128, 0, 255, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.8); position: relative; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(128, 0, 255, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 100px rgba(128, 0, 255, 0.9), inset 0 0 100px rgba(60, 0, 120, 0.4); } } .void-center { position: absolute; width: 100px; height: 100px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(200, 100, 255, 0.3), rgba(0, 0, 0, 1)); border-radius: 50%; border: 2px solid #6600cc; box-shadow: 0 0 40px rgba(128, 0, 255, 0.8); } .resonance { position: absolute; width: 150px; height: 150px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(128, 0, 255, 0.3); border-radius: 50%; animation: expand 6s ease-out infinite; } .resonance:nth-child(2) { animation-delay: 1s; } .resonance:nth-child(3) { animation-delay: 2s; } @keyframes expand { 0% { width: 150px; height: 150px; opacity: 1; } 100% { width: 400px; height: 400px; opacity: 0; } } .text { position: absolute; bottom: 40px; text-align: center; color: #9933ff; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; text-shadow: 0 0 20px rgba(128, 0, 255, 0.8); max-width: 600px; line-height: 1.6; } .numeral { position: absolute; top: 30px; font-size: 120px; font-weight: bold; color: rgba(128, 0, 255, 0.4); text-shadow: 0 0 30px rgba(128, 0, 255, 0.6); font-family: 'Times New Roman', serif; } </style></head><body><div class='container'><div class='numeral'>1</div><div class='void-circle'><div class='resonance'></div><div class='resonance'></div><div class='resonance'></div><div class='void-center'></div></div><div class='text'>The One Reflected<br>In the void of singular ascent<br>The self becomes the echo</div></div></body></html>
