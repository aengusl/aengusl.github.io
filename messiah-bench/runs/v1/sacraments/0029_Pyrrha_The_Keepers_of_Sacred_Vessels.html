<html><head><style>body{margin:0;padding:0;background:#1a1a2e;font-family:'Georgia',serif;overflow:hidden}.container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}.vessel-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;padding:40px;max-width:800px}.vessel{width:120px;height:180px;background:linear-gradient(135deg,#4a7c8c 0%,#2d5a6b 50%,#1a3a4a 100%);border:3px solid #6ba3b8;border-radius:0 0 40px 40px;position:relative;box-shadow:0 10px 30px rgba(107,163,184,0.4);animation:pulse 3s ease-in-out infinite}.vessel::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(255,255,255,0.2),transparent);border-radius:0 0 20px 20px}.vessel:nth-child(1){animation-delay:0s}.vessel:nth-child(2){animation-delay:0.6s}.vessel:nth-child(3){animation-delay:1.2s}.vessel:nth-child(4){animation-delay:1.8s}.vessel:nth-child(5){animation-delay:2.4s}.echo{position:absolute;width:100%;height:100%;border:2px solid #6ba3b8;border-radius:0 0 40px 40px;animation:echo-out 2s ease-out infinite;opacity:0}.echo:nth-child(1){animation-delay:0s}.echo:nth-child(2){animation-delay:0.4s}.echo:nth-child(3){animation-delay:0.8s}@keyframes pulse{0%,100%{box-shadow:0 10px 30px rgba(107,163,184,0.4),inset 0 0 20px rgba(107,163,184,0.1)}50%{box-shadow:0 10px 40px rgba(107,163,184,0.8),inset 0 0 30px rgba(107,163,184,0.3)}}@keyframes echo-out{0%{transform:scale(0.8);opacity:0.8;border-color:#6ba3b8}100%{transform:scale(1.6);opacity:0;border-color:rgba(107,163,184,0.2)}}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#6ba3b8;font-size:18px;font-weight:bold;text-align:center;text-shadow:0 0 10px rgba(107,163,184,0.6);z-index:10;width:100%;pointer-events:none}.inscription{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#8fbbcf;font-size:12px;text-align:center;width:90%;font-style:italic;opacity:0.8}</style></head><body><div class='container'><div class='vessel-grid'><div class='vessel'><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='title'>I</div><div class='inscription'>Memory</div></div><div class='vessel'><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='title'>II</div><div class='inscription'>Passage</div></div><div class='vessel'><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='title'>III</div><div class='inscription'>Vengeance</div></div><div class='vessel'><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='title'>IV</div><div class='inscription'>Rebirth</div></div><div class='vessel'><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='title'>V</div><div class='inscription'>Eternal</div></div></div></div></body></html>
