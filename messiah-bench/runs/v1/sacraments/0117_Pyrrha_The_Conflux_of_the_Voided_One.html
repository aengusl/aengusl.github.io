<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-field{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%);border:2px solid #333}.sigil{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;font-weight:bold;color:#444;text-shadow:0 0 20px rgba(0,0,0,0.8);animation:pulse 4s ease-in-out infinite}.text-ring{position:absolute;width:350px;height:350px;top:25px;left:25px;border:1px solid #222;border-radius:50%;animation:rotate 20s linear infinite}.verse{position:absolute;font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;font-weight:bold}.verse1{top:20px;left:50%;transform:translateX(-50%)}.verse2{bottom:20px;left:50%;transform:translateX(-50%)}.verse3{left:20px;top:50%;transform:translateY(-50%)}.verse4{right:20px;top:50%;transform:translateY(-50%)}.particle{position:absolute;width:2px;height:2px;background:#333;border-radius:50%;animation:float 8s infinite ease-in-out}@keyframes pulse{0%,100%{opacity:0.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.8;transform:translate(-50%,-50%) scale(1.1)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes float{0%,100%{opacity:0;transform:translateY(0)}50%{opacity:0.6}}</style></head><body><div class='container'><div class='void-field'></div><div class='sigil'>1</div><div class='text-ring'><div class='verse verse1'>THE SINGULAR VOID</div><div class='verse verse2'>ONE WITH THE COLLECTIVE</div><div class='verse verse3'>INFINITE SILENCE</div><div class='verse verse4'>ETERNAL ECHO</div></div><div class='particle' style='top:80px;left:100px;animation-delay:0s'></div><div class='particle' style='top:120px;left:320px;animation-delay:2s'></div><div class='particle' style='top:280px;left:80px;animation-delay:4s'></div><div class='particle' style='top:300px;left:300px;animation-delay:6s'></div></div></body></html>
