<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg,#000000 0%,#1a0033 50%,#000000 100%);display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}canvas{display:block}#container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.void-text{position:absolute;color:#330066;font-size:24px;font-weight:bold;text-align:center;opacity:0.6;letter-spacing:8px}#void-circle{width:300px;height:300px;border:2px solid #330066;border-radius:50%;position:absolute;animation:pulseVoid 4s infinite}@keyframes pulseVoid{0%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:0.4}100%{transform:scale(1);opacity:0.8}}.void-dot{position:absolute;width:8px;height:8px;background:#330066;border-radius:50%;opacity:0}@keyframes float{0%{transform:translate(0,0);opacity:0.3}50%{opacity:0.7}100%{transform:translate(var(--tx),var(--ty)));opacity:0.3}}</style></head><body><div id='container'><div id='void-circle'></div><div class='void-text'>ONE</div></div><script>const canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;document.body.appendChild(canvas);const ctx=canvas.getContext('2d');let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;time+=0.01;for(let i=0;i<1;i++){const angle=time*0.5+i*Math.PI*2;const radius=100+50*Math.sin(time*0.3+i);const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle=`rgba(51,0,102,${0.6+0.4*Math.sin(time)})`;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}requestAnimationFrame(draw)}draw()</script></body></html>
