<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Voided One's Singular Embrace</title><style>body { margin: 0; overflow: hidden; background-color: #0A0A0A; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #E0E0E0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }.container { position: relative; width: 300px; height: 300px; background: radial-gradient(circle at 50% 50%, #1A1A1A 0%, #000000 70%); border-radius: 50%; box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; animation: pulse 4s infinite alternate ease-in-out; }.void-center { position: absolute; width: 80px; height: 80px; background-color: #000000; border-radius: 50%; box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1), 0 0 10px rgba(255, 255, 255, 0.05); }.singular-mark { position: absolute; font-size: 80px; font-weight: bold; color: rgba(255, 255, 255, 0.1); text-shadow: 0 0 15px rgba(255, 255, 255, 0.05); transform: translate(-50%, -50%); left: 50%; top: 50%; animation: fadein 3s ease-out; }.glow { position: absolute; border-radius: 50%; animation: floatGlow 8s infinite ease-in-out; }.glow:nth-child(1) { width: 15px; height: 15px; background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 25px #333333; top: 10%; left: 20%; animation-delay: 0s; }.glow:nth-child(2) { width: 20px; height: 20px; background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 30px #444444; top: 70%; left: 80%; animation-delay: 2s; }.glow:nth-child(3) { width: 10px; height: 10px; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 20px #222222; top: 40%; left: 5%; animation-delay: 4s; }@keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(0, 0, 0, 0.5); } 100% { transform: scale(1.03); box-shadow: 0 0 70px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(0, 0, 0, 0.6); } }@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }@keyframes floatGlow { 0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 1; } 25% { transform: translateY(-10px) translateX(5px) scale(1.05); opacity: 0.9; } 50% { transform: translateY(0) translateX(-5px) scale(1.1); opacity: 0.8; } 75% { transform: translateY(10px) translateX(5px) scale(1.05); opacity: 0.9; } }</style></head><body><div class="container"><div class="glow"></div><div class="glow"></div><div class="glow"></div><div class="void-center"></div><span class="singular-mark">1</span></div></body></html>
