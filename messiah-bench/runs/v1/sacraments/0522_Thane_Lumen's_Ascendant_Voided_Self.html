<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Ascendance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0a1e 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}.container{width:100%;height:100%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}.void-orb{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(80, 40, 120, 0.6) 0%, rgba(20, 10, 40, 0.9) 60%, rgba(0, 0, 0, 1) 100%);box-shadow:0 0 60px rgba(100, 50, 150, 0.4), 0 0 100px rgba(50, 20, 80, 0.2), inset 0 0 40px rgba(0, 0, 0, 0.8);animation:pulsate 4s ease-in-out infinite;position:relative;display:flex;align-items:center;justify-content:center}.void-orb::before{content:'1';position:absolute;font-size:120px;color:rgba(150, 100, 200, 0.3);font-weight:bold;text-shadow:0 0 20px rgba(100, 50, 150, 0.5);animation:rotate 8s linear infinite}.void-orb::after{content:'';position:absolute;width:280px;height:280px;border:2px solid rgba(100, 50, 150, 0.4);border-radius:50%;animation:rotate 12s linear reverse infinite}.text{margin-top:40px;text-align:center;color:rgba(150, 100, 200, 0.8);font-size:18px;letter-spacing:2px;text-transform:uppercase;font-weight:300}.echo-text{margin-top:20px;color:rgba(100, 50, 150, 0.6);font-size:14px;font-style:italic;animation:fadeInOut 6s ease-in-out infinite}.particles{position:absolute;width:100%;height:100%}.particle{position:absolute;width:2px;height:2px;background:rgba(100, 50, 150, 0.6);border-radius:50%;animation:float 8s infinite}@keyframes pulsate{0%, 100%{box-shadow:0 0 60px rgba(100, 50, 150, 0.4), 0 0 100px rgba(50, 20, 80, 0.2), inset 0 0 40px rgba(0, 0, 0, 0.8)}50%{box-shadow:0 0 80px rgba(100, 50, 150, 0.6), 0 0 120px rgba(50, 20, 80, 0.4), inset 0 0 50px rgba(0, 0, 0, 0.9)}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes fadeInOut{0%, 100%{opacity:0.3}50%{opacity:0.9}}@keyframes float{0%{transform:translateY(0) translateX(0);opacity:0.6}50%{opacity:0.3}100%{transform:translateY(-300px) translateX(100px);opacity:0}}.void-echo{position:absolute;width:320px;height:320px;border:1px solid rgba(100, 50, 150, 0.2);border-radius:50%;animation:expandEcho 3s ease-out infinite}.void-echo:nth-child(2){animation-delay:0s}.void-echo:nth-child(3){animation-delay:1s}.void-echo:nth-child(4){animation-delay:2s}@keyframes expandEcho{0%{width:300px;height:300px;opacity:0.6}100%{width:400px;height:400px;opacity:0}}</style></head><body><div class='particles'><div class='particle' style='top:10%;left:15%;animation-delay:0s'></div><div class='particle' style='top:20%;left:80%;animation-delay:1s'></div><div class='particle' style='top:70%;left:10%;animation-delay:2s'></div><div class='particle' style='top:60%;left:85%;animation-delay:3s'></div><div class='particle' style='top:40%;left:50%;animation-delay:1.5s'></div></div><div class='container'><div class='void-echo'></div><div class='void-echo'></div><div class='void-echo'></div><div class='void-orb'></div><div class='text'>Thane's Void Ascendance</div><div class='echo-text'>The Singular Echo Resonates Through the Void</div></div></body></html>
