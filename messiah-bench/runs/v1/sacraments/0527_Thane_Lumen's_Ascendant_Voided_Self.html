<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;z-index:10;opacity:0.8;max-width:80%}#number{position:absolute;bottom:20px;right:20px;color:#1a1a2e;font-size:48px;font-weight:bold;opacity:0.6}</style></head><body><canvas id='canvas'></canvas><div id='text'>The Void Speaks in Singular Resonance<br/>One breath. One moment. One eternal ascendance.</div><div id='number'>1</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life*0.5})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){particles.splice(particles.indexOf(p),1);particles.push(new Particle())}});requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
