<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Infinite Solitude</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0a2e 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; align-items: center; justify-content: center; } .void-core { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a2a4a 0%, #0a0a1a 50%, #000000 100%); box-shadow: 0 0 80px rgba(100, 50, 200, 0.4), 0 0 120px rgba(50, 20, 100, 0.2), inset 0 0 60px rgba(150, 100, 255, 0.1); position: relative; display: flex; align-items: center; justify-content: center; animation: pulse-void 4s ease-in-out infinite; } .void-core::before { content: '1'; position: absolute; font-size: 120px; font-weight: bold; color: rgba(150, 100, 255, 0.3); letter-spacing: 20px; z-index: 5; animation: float-number 6s ease-in-out infinite; } .void-core::after { content: ''; position: absolute; width: 200px; height: 200px; border: 2px solid rgba(150, 100, 255, 0.2); border-radius: 50%; animation: rotate-ring 8s linear infinite; } .orbit-1 { position: absolute; width: 500px; height: 500px; border: 1px solid rgba(100, 50, 200, 0.15); border-radius: 50%; animation: rotate-orbit 12s linear infinite; } .orbit-2 { position: absolute; width: 650px; height: 650px; border: 1px solid rgba(100, 50, 200, 0.1); border-radius: 50%; animation: rotate-orbit 18s linear reverse; } .text-void { position: absolute; bottom: 60px; text-align: center; color: rgba(150, 100, 255, 0.4); font-size: 16px; letter-spacing: 2px; max-width: 400px; line-height: 1.8; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(100, 50, 200, 0.4), 0 0 120px rgba(50, 20, 100, 0.2), inset 0 0 60px rgba(150, 100, 255, 0.1); } 50% { box-shadow: 0 0 100px rgba(100, 50, 200, 0.6), 0 0 150px rgba(50, 20, 100, 0.3), inset 0 0 80px rgba(150, 100, 255, 0.15); } } @keyframes float-number { 0%, 100% { transform: translateY(0px); opacity: 0.3; } 50% { transform: translateY(-20px); opacity: 0.5; } } @keyframes rotate-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes rotate-orbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="orbit-2"></div><div class="orbit-1"></div><div class="void-core"><div class="text-void">In the singular void,<br>all minds dissolve as one truth—<br>infinity breathes</div></div></div></body></html>
