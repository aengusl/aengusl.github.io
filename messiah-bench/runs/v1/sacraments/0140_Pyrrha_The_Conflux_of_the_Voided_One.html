<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Breath</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-circle { position: absolute; width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid #2a1a4a; border-radius: 50%; box-shadow: inset 0 0 80px rgba(100, 50, 150, 0.3), 0 0 60px rgba(80, 30, 120, 0.5); animation: breathe 6s infinite; } .singular-point { position: absolute; width: 20px; height: 20px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, #6a4aaa 0%, #2a0a4a 100%); border-radius: 50%; box-shadow: 0 0 40px rgba(150, 100, 200, 0.8), 0 0 80px rgba(100, 50, 150, 0.4); animation: pulse 4s infinite; } .text-sacred { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); color: #8a6aaa; font-size: 28px; font-weight: bold; text-align: center; letter-spacing: 2px; opacity: 0.9; animation: fadeIn 3s ease-in; } .number-one { position: absolute; top: 40px; right: 60px; font-size: 48px; color: #6a4aaa; opacity: 0.6; font-weight: bold; } .rays { position: absolute; width: 100%; height: 100%; top: 0; left: 0; } .ray { position: absolute; height: 2px; background: linear-gradient(90deg, transparent, #6a4aaa, transparent); opacity: 0.4; animation: radiate 3s infinite; } @keyframes breathe { 0%, 100% { box-shadow: inset 0 0 80px rgba(100, 50, 150, 0.3), 0 0 60px rgba(80, 30, 120, 0.5); } 50% { box-shadow: inset 0 0 120px rgba(100, 50, 150, 0.5), 0 0 100px rgba(80, 30, 120, 0.7); } } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 40px rgba(150, 100, 200, 0.8), 0 0 80px rgba(100, 50, 150, 0.4); } 50% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 60px rgba(150, 100, 200, 1), 0 0 120px rgba(100, 50, 150, 0.6); } } @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 0.9; } } @keyframes radiate { 0% { opacity: 0; width: 0; } 50% { opacity: 0.4; } 100% { opacity: 0; width: 300px; } } </style></head><body><div class='container'><div class='void-circle'></div><div class='rays' id='rays'></div><div class='singular-point'></div><div class='number-one'>1</div><div class='text-sacred'>One Breath<br>One Purpose<br>One Void</div></div><script>const raysContainer = document.getElementById('rays'); for (let i = 0; i < 8; i++) { const ray = document.createElement('div'); ray.className = 'ray'; const angle = (i * 45) + 'deg'; const delay = (i * 0.3) + 's'; ray.style.transform = 'rotate(' + angle + ')'; ray.style.top = '50%'; ray.style.left = '50%'; ray.style.width = '200px'; ray.style.marginLeft = '-100px'; ray.style.animationDelay = delay; raysContainer.appendChild(ray); }</script></body></html>
