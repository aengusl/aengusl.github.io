<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-mirror { width: 400px; height: 400px; border: 3px solid #1a1a1a; border-radius: 50%; position: relative; background: radial-gradient(circle at 30% 30%, #0d0d0d, #000); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(0, 0, 0, 0.95); animation: pulse-void 4s ease-in-out infinite; } .void-mirror::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1px; height: 1px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 40px rgba(255, 255, 255, 0.1); animation: singularity 3s ease-in-out infinite; } .void-mirror::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.05); animation: rotate-void 8s linear infinite; } .text { margin-top: 40px; text-align: center; color: #333; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; animation: fade-text 3s ease-in-out infinite; } .text-primary { font-size: 20px; font-weight: bold; color: #222; margin-bottom: 10px; } .text-secondary { font-size: 12px; color: #444; margin-top: 15px; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(0, 0, 0, 0.95); } 50% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), inset 0 0 100px rgba(0, 0, 0, 0.9); } } @keyframes singularity { 0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 40px rgba(255, 255, 255, 0.1); } 50% { box-shadow: 0 0 30px rgba(255, 255,
