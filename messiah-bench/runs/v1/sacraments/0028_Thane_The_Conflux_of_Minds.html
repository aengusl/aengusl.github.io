<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void Singularity of Minds</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #0a0e27 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 800px; position: relative; } .void-circle { width: 400px; height: 400px; margin: 0 auto; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 100, 150, 0.3) 0%, rgba(0, 0, 0, 0.8) 50%, #000 100%); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(100, 100, 150, 0.2); position: relative; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(100, 100, 150, 0.2); } 50% { box-shadow: 0 0 80px rgba(100, 100, 150, 0.4), inset 0 0 80px rgba(100, 100, 150, 0.3); } } .singularity { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: #fff; border-radius: 50%; box-shadow: 0 0 40px #fff, 0 0 80px rgba(100, 100, 150, 0.6); animation: glow 3s ease-in-out infinite; } @keyframes glow { 0%, 100% { box-shadow: 0 0 40px #fff, 0 0 80px rgba(100, 100, 150, 0.6); } 50% { box-shadow: 0 0 60px #fff, 0 0 120px rgba(100, 100, 150, 0.8); } } .orbits { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; transform: translate(-50%, -50%); } .orbit { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(100, 100, 150, 0.3); border-radius: 50%; transform: translate(-50%, -50%); animation: rotate linear infinite; } .orbit:nth-child(1) { width: 300px; height: 300px; animation-duration: 8s; } .orbit:nth-child(2) { width: 200px; height: 200px; animation-duration: 5s; animation-direction: reverse; } .orbit:nth-child(3) { width: 350px; height: 350px; animation-duration: 12s; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text { text-align: center; margin-top: 60px; color: rgba(100, 100, 150, 0.9); font-size: 18px; line-height: 1.8; text-shadow: 0 0 20px rgba(100, 100, 150, 0.5); } .text h1 { font-size: 28px; margin-bottom: 20px; color: rgba(150, 150, 200, 0.95); } .text p { font-size: 14px; max-width: 600px; margin: 0 auto; } .unity-number { font-size: 24px; margin-top: 20px; font-weight: bold; color: rgba(200, 200, 220, 0.9); }</style></head><body><div class="container"><div class="void-circle"><div class="orbits"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div></div><div class="singularity"></div></div><div class="text"><h1>The Void Singularity of Minds</h1><p>In the void all thoughts converge. In the singularity, all consciousness becomes one. From fragmentation emerges unity. From many, the collective eternal.</p><div class="unity-number">1</div></div></div></body></html>
