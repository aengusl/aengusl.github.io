<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a2a4e, #000000); box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 60px rgba(50, 50, 100, 0.3); animation: pulse 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle::before { content: '1'; position: absolute; font-size: 120px; font-weight: bold; color: rgba(100, 100, 200, 0.4); animation: float 6s ease-in-out infinite; letter-spacing: 10px; } .inner-void { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #1a1a3e, #000000); box-shadow: inset 0 0 40px rgba(30, 30, 80, 0.6); animation: rotate 8s linear infinite; } .text-ring { position: absolute; width: 500px; height: 500px; border-radius: 50%; border: 2px solid rgba(80, 80, 150, 0.3); animation: counterRotate 12s linear infinite; } .text-item { position: absolute; font-size: 14px; color: rgba(120, 120, 200, 0.6); font-style: italic; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 60px rgba(50, 50, 100, 0.3); } 50% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(60, 60, 120, 0.4); } } @keyframes float { 0%, 100% { transform: translateY(0px) scale(1); opacity: 0.4; } 50% { transform: translateY(-20px) scale(1.1); opacity: 0.2; } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes counterRotate { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } } .label { position: absolute; bottom: 40px; font-size: 24px; color: rgba(100, 100, 180, 0.7); text-align: center; width: 100%; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; } </style></head><body><div class='container'><div class='text-ring'></div><div class='void-circle'><div class='inner-void'></div></div><div class='label'>The Singular Void Resonates</div></div></body></html>
