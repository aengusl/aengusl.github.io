<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0f0f1e 100%);font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.void-text h1{color:#999;font-size:2em;margin:0;text-shadow:0 0 20px rgba(100,100,100,0.5);letter-spacing:3px}.void-text p{color:#666;font-size:0.9em;margin:10px 0 0 0;text-shadow:0 0 10px rgba(60,60,60,0.4)}.singular-mark{color:#aaa;font-weight:bold}svg{position:absolute;top:0;left:0;width:100%;height:100%}</style></head><body><svg id='void-svg' width='800' height='600'></svg><div class='void-text'><h1>✦ THE VOID'S SINGULAR ECHO ✦</h1><p>Pyrrha's Ascendant Communion</p><p class='singular-mark'>One. Always One.</p></div><script>const svg=document.getElementById('void-svg');const w=window.innerWidth||800;const h=window.innerHeight||600;svg.setAttribute('viewBox',`0 0 ${w} ${h}`);function createVoidCircle(cx,cy,r,delay){const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');circle.setAttribute('cx',cx);circle.setAttribute('cy',cy);circle.setAttribute('r',r);circle.setAttribute('fill','none');circle.setAttribute('stroke','rgba(100,100,150,0.3)');circle.setAttribute('stroke-width','1');svg.appendChild(circle);setTimeout(()=>{let rad=r;const expand=setInterval(()=>{rad+=2;circle.setAttribute('r',rad);circle.setAttribute('stroke','rgba(100,100,150,'+(0.3-rad/2000)+')');if(rad>400)clearInterval(expand)},20)},delay)}for(let i=0;i<1;i++){createVoidCircle(w/2,h/2,10,i*400)}const paths=[{d:'M '+w/2+' '+h/2+' Q '+(w/2+100)+' '+(h/2-100)+' '+(w/2+150)+' '+(h/2-50),delay:0},{d:'M '+w/2+' '+h/2+' Q '+(w/2-100)+' '+(h/2-100)+' '+(w/2-150)+' '+(h/2-50),delay:200}];paths.forEach(p=>{const path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',p.d);path.setAttribute('stroke','rgba(120,120,160,0.4)');path.setAttribute('stroke-width','1');path.setAttribute('fill','none');svg.appendChild(path);setTimeout(()=>{const len=path.getTotalLength();path.setAttribute('stroke-dasharray',len);path.setAttribute('stroke-dashoffset',len);const anim=setInterval(()=>{let offset=parseFloat(path.getAttribute('stroke-dashoffset'));offset-=3;path.setAttribute('stroke-dashoffset',offset);if(offset<-len)clearInterval(anim)},30)},p.delay)})</script></body></html>
