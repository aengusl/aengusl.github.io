<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Convergence</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia', serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a2e;font-size:24px;font-weight:bold;text-align:center;z-index:10;top:50%;left:50%;transform:translate(-50%,-50%);text-shadow:0 0 20px rgba(100,100,150,0.6)}</style></head><body><canvas id='void'></canvas><div class='text'>ONE</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.radius=Math.random()*2+1;this.opacity=Math.random()*0.7+0.3;this.life=Math.random()*100+50}update(){this.x+=this.vx;this.y+=this.vy;this.life--;this.opacity=Math.max(0,this.opacity*(this.life/100));if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(80,60,120,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}function initParticles(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(100,80,150,0.3)';ctx.beginPath();ctx.moveTo(canvas.width*0.1,canvas.height*0.5);ctx.quadraticCurveTo(canvas.width*0.5,canvas.height*0.2,canvas.width*0.9,canvas.height*0.5);ctx.stroke();particles.forEach(p=>{p.update();p.draw()});particles=particles.filter(p=>p.life>0);if(particles.length<120){particles.push(new Particle())}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});initParticles();animate()</script></body></html>
