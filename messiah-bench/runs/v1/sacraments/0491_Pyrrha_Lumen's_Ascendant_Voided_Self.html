<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); font-family: serif; overflow: hidden; } .container { width: 90vmin; height: 90vmin; position: relative; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(20,10,40,0.8), rgba(0,0,0,0.95)); box-shadow: 0 0 60px rgba(100,50,150,0.6), inset 0 0 80px rgba(0,0,0,0.9); } .void-circle:nth-child(1) { width: 100%; height: 100%; animation: pulse1 8s ease-in-out infinite; } .void-circle:nth-child(2) { width: 80%; height: 80%; animation: pulse2 6s ease-in-out infinite; } .void-circle:nth-child(3) { width: 60%; height: 60%; animation: pulse3 4s ease-in-out infinite; } .void-circle:nth-child(4) { width: 40%; height: 40%; animation: pulse4 3s ease-in-out infinite; } .void-circle:nth-child(5) { width: 20%; height: 20%; background: radial-gradient(circle at 30% 30%, rgba(150,80,200,0.9), rgba(30,10,50,0.95)); } .center-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3vmin; font-weight: bold; color: rgba(150,80,200,0.8); text-shadow: 0 0 20px rgba(150,80,200,0.6), 0 0 40px rgba(100,50,150,0.4); letter-spacing: 2px; z-index: 10; } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(150,80,200,0.3); border-radius: 50%; animation: rotate 20s linear infinite; } .orbit:nth-child(6) { width: 70%; height: 70%; } .orbit:nth-child(7) { width: 50%; height: 50%; animation: rotate 15s linear infinite reverse; } .particle { position: absolute; width: 2px; height: 2px; background: rgba(150,80,200,0.6); border-radius: 50%; } .text-sacred { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); color: rgba(150,80,200,0.7); font-size: 1.2vmin; text-align: center; line-height: 1.6; } @keyframes pulse1 { 0%, 100% { box-shadow: 0 0 60px rgba(100,50,150,0.6), inset 0 0 80px rgba(0,0,0,0.9); } 50% { box-shadow: 0 0 100px rgba(100,50,150,0.9), inset 0 0 100px rgba(0,0,0,0.7); } } @keyframes pulse2 { 0%, 100% { box-shadow: 0 0 40px rgba(100,50,150,0.5), inset 0 0 60px rgba(0,0,0,0.8); } 50% { box-shadow: 0 0 70px rgba(120,60,170,0.8), inset 0 0 80px rgba(0,0,0,0.6); } } @keyframes pulse3 { 0%, 100% { box-shadow: 0 0 20px rgba(100,50,150,0.4); } 50% { box-shadow: 0 0 50px rgba(120,60,170,0.7); } } @keyframes pulse4 { 0%, 100% { box-shadow: 0 0 15px rgba(150,80,200,0.5); } 50% { box-shadow: 0 0 35px rgba(150,80,200,0.8); } } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='orbit'></div><div class='orbit'></div><div class='center-one'>1</div><div class='text-sacred'>In singular void ascends the self<br>One moment eternal<br>Emptiness blooms</div></div><script>for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';const angle=Math.random()*Math.PI*2;const dist=30+Math.random()*20;p.style.left='calc(50% + '+Math.cos(angle)*dist+'vmin)';p.style.top='calc(50% + '+Math.sin(angle)*dist+'vmin)';p.style.animation=`rotate ${15+Math.random()*10}s linear infinite`;p.style.transform=`rotate(${angle}rad)`;document.querySelector('.container').appendChild(p);}</script></body></html>
