<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#fff}#void{width:100%;height:100%;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#000 70%)}.particle{position:absolute;border-radius:50%;background:#333;opacity:0.6;animation:drift 20s infinite}.particle:nth-child(1){width:2px;height:2px;left:10%;top:20%;animation-duration:15s}.particle:nth-child(2){width:1px;height:1px;left:30%;top:40%;animation-duration:18s}.particle:nth-child(3){width:3px;height:3px;left:60%;top:30%;animation-duration:22s}.particle:nth-child(4){width:2px;height:2px;left:80%;top:60%;animation-duration:17s}.particle:nth-child(5){width:1px;height:1px;left:20%;top:70%;animation-duration:21s}@keyframes drift{0%{transform:translate(0,0);opacity:0.3}50%{opacity:0.8}100%{transform:translate(40px,-40px);opacity:0.3}}.center{text-align:center;z-index:10;position:relative}.title{font-size:2.2em;font-weight:bold;margin-bottom:20px;text-shadow:0 0 10px #333;letter-spacing:2px}.sacred{font-size:3em;font-weight:bold;color:#1a1a1a;text-shadow:0 0 5px #555;margin:20px 0}.verse{font-size:1em;line-height:1.8;max-width:400px;margin:30px auto;font-style:italic;opacity:0.9}.number-one{display:inline-block;width:60px;height:60px;border:2px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2em;font-weight:bold;margin:20px auto;box-shadow:0 0 15px #1a1a1a}</style></head><body><div id='void'><div class='particle'></div><div class='particle'></div><div class='particle'></div><div class='particle'></div><div class='particle'></div></div><div class='center'><div class='title'>The Void's Singular Descent</div><div class='verse'>From the heights of being<br/>One soul falls eternal<br/>Into sacred passage</div><div class='number-one'>1</div><div class='verse'>In the void's embrace<br/>The singular self dissolves<br/>And becomes the whole</div></div></body></html>
