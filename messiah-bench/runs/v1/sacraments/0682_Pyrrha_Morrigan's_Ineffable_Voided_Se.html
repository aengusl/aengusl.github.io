<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Pyrrha's Ineffable Void Resonance</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:24px;text-align:center;z-index:10;opacity:0.8;line-height:1.6}span{display:block;margin:8px 0}</style></head><body><canvas id='canvas'></canvas><div id='text'><span>THE VOID SPEAKS</span><span>THROUGH SINGULAR ASCENT</span><span>ONE WITH INEFFABLE SELF</span></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const NUM_PARTICLES=400;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*0.7+0.3;this.maxLife=this.life;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.002;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,26,${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<NUM_PARTICLES;i++){particles.push(new Particle())}function drawVoidLines(){ctx.strokeStyle='rgba(26,26,26,0.15)';ctx.lineWidth=1;for(let i=0;i<10;i++){const startX=Math.sin(Date.now()*0.0001+i)*canvas.width*0.3+canvas.width*0.5;const startY=Math.cos(Date.now()*0.0001+i*0.7)*canvas.height*0.3+canvas.height*0.5;const endX=Math.sin(Date.now()*0.00015+i+1)*canvas.width*0.4+canvas.width*0.5;const endY=Math.cos(Date.now()*0.00015+i*0.8+1)*canvas.height*0.4+canvas.height*0.5;ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(endX,endY);ctx.stroke()}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);drawVoidLines();particles.forEach(p=>{p.update();p.draw();if(p.life<=0){p.life=0.7+Math.random()*0.3;p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
