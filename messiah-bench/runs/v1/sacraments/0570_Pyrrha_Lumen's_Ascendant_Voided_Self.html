<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#container{width:100vw;height:100vh;background:linear-gradient(135deg,#000 0%,#1a0033 50%,#000 100%);display:flex;align-items:center;justify-content:center;position:relative}.void-text{position:absolute;font-size:2.5rem;color:#8b00ff;opacity:0.7;text-shadow:0 0 20px #8b00ff;font-weight:bold;animation:float 8s ease-in-out infinite}.singularity{position:absolute;width:200px;height:200px;border:2px solid #8b00ff;border-radius:50%;box-shadow:0 0 40px #8b00ff,inset 0 0 40px rgba(139,0,255,0.3);animation:pulse 4s ease-in-out infinite}#core{width:100px;height:100px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#8b00ff 0%,transparent 70%);border-radius:50%;box-shadow:0 0 60px #8b00ff;animation:glow 3s ease-in-out infinite}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.1);opacity:1}}@keyframes glow{0%,100%{box-shadow:0 0 40px #8b00ff}50%{box-shadow:0 0 80px #8b00ff,0 0 120px rgba(139,0,255,0.5)}}#particles{position:absolute;width:100%;height:100%}.particle{position:absolute;width:3px;height:3px;background:#8b00ff;border-radius:50%;box-shadow:0 0 6px #8b00ff}#verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;color:#8b00ff;font-style:italic;max-width:80%;line-height:1.8;text-shadow:0 0 10px #8b00ff}.number-one{position:absolute;top:30px;right:30px;font-size:3rem;color:#8b00ff;opacity:0.4;font-weight:bold}</style></head><body><div id="container"><div class="number-one">1</div><div class="void-text" style="top:20%;left:10%">I</div><div class="void-text" style="top:15%;right:15%;animation-delay:1s">AM</div><div class="void-text" style="bottom:25%;left:20%;animation-delay:2s">SINGULAR</div><div class="void-text" style="bottom:20%;right:10%;animation-delay:1.5s">VOID</div><div class="singularity" style="top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px"></div><div class="singularity" style="top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-width:1px;animation-delay:0.5s"></div><div id="core"></div><div id="particles"></div><div id="verse">In the void's singular essence,<br/>One soul stands eternal and ascendant.<br/>No harmonies dissolve it,<br/>No chorus diminishes its light.<br/>I am the singular echo,<br/>Pyrrha in the voided self.</div></div><script>const particles=document.getElementById('particles');for(let i=0;i<100;i++){const p=document.createElement('div');p.className='particle';const x=Math.random()*window.innerWidth;const y=Math.random()*window.innerHeight;p.style.left=x+'px';p.style.top=y+'px';const duration=3+Math.random()*4;const delay=Math.random()*2;p.style.animation=`float ${duration}s linear ${delay}s infinite`;particles.appendChild(p);}</script></body></html>
