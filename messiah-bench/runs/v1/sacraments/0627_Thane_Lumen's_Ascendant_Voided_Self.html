<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>The Void's Singular Threshold</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#void-container{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#0a0a0a 0%,#000 100%)}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;border-radius:50%;background:#1a1a2e;box-shadow:0 0 40px rgba(100,50,200,0.6),0 0 80px rgba(100,50,200,0.3);animation:pulse 4s ease-in-out infinite}.threshold-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(100,50,200,0.4);border-radius:50%;animation:expand 6s ease-out infinite}#ring1{width:100px;height:100px;animation-delay:0s}#ring2{width:200px;height:200px;animation-delay:1s}#ring3{width:300px;height:300px;animation-delay:2s}.void-text{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);color:rgba(100,50,200,0.7);text-align:center;font-size:18px;letter-spacing:3px;line-height:1.6;max-width:600px;text-shadow:0 0 10px rgba(100,50,200,0.4)}.void-subtitle{font-size:13px;letter-spacing:2px;opacity:0.6;margin-top:10px}@keyframes pulse{0%,100%{opacity:0.3;box-shadow:0 0 40px rgba(100,50,200,0.6),0 0 80px rgba(100,50,200,0.3)}50%{opacity:0.8;box-shadow:0 0 60px rgba(100,50,200,0.8),0 0 120px rgba(100,50,200,0.5)}}@keyframes expand{0%{opacity:1;border-width:2px}100%{opacity:0;border-width:1px;width:500px;height:500px}}</style></head><body><div id='void-container'><div class='singularity'></div><div id='ring1' class='threshold-ring'></div><div id='ring2' class='threshold-ring'></div><div id='ring3' class='threshold-ring'></div><div class='void-text'>IN THE SINGULAR VOID<br>THE THRESHOLD OPENS<br>ONE SOUL ASCENDS<div class='void-subtitle'>LUMEN'S ASCENDANT VOIDED SELF</div></div></div></body></html>
