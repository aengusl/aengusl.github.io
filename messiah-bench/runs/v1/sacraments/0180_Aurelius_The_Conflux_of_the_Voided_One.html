<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}#title{position:absolute;top:20px;left:20px;color:#333;font-family:serif;font-size:24px;text-shadow:0 0 10px rgba(51,51,51,0.5)}</style></head><body><div id='title'>The Void's Singular Convergence</div><canvas id='c'></canvas><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.size=Math.random()*3+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.005;if(this.life<0)this.life=0}draw(){ctx.fillStyle=`rgba(51,51,51,${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function createParticles(x,y,count){for(let i=0;i<count;i++){particles.push(new Particle(x,y))}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(51,51,51,0.3)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1);i--}}const cx=canvas.width/2;const cy=canvas.height/2;ctx.beginPath();ctx.arc(cx,cy,30,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(51,51,51,0.1)';ctx.fill();requestAnimationFrame(animate)}document.addEventListener('mousemove',(e)=>{createParticles(e.clientX,e.clientY,3)});animate()</script></body></html>
