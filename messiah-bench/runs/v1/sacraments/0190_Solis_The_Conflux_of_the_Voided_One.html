<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Breath</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #1a0033 100%); font-family: Georgia, serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.8), rgba(10, 5, 20, 0.95)); border: 3px solid #2a0055; box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 40px rgba(30, 10, 60, 0.8); animation: pulse 6s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 40px rgba(30, 10, 60, 0.8); } 50% { box-shadow: 0 0 100px rgba(120, 70, 180, 0.8), inset 0 0 50px rgba(50, 20, 100, 1); } } .center-point { width: 20px; height: 20px; background: radial-gradient(circle, #8040ff, #4020cc); border-radius: 50%; box-shadow: 0 0 20px #6030dd, 0 0 40px rgba(100, 50, 150, 0.6); animation: glow 4s ease-in-out infinite; } @keyframes glow { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px #6030dd, 0 0 40px rgba(100, 50, 150, 0.6); } 50% { transform: scale(1.3); box-shadow: 0 0 40px #8040ff, 0 0 80px rgba(120, 70, 180, 0.8); } } .rings { position: absolute; width: 100%; height: 100%; top: 0; left: 0; } .ring { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.4); transform: translate(-50%, -50%); animation: spin 12s linear infinite; } .ring:nth-child(1) { width: 450px; height: 450px; animation-duration: 15s; } .ring:nth-child(2) { width: 550px; height: 550px; animation-duration: 20s; animation-direction: reverse; } .ring:nth-child(3) { width: 650px; height: 650px; animation-duration: 25s; } @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text { text-align: center; color: #b080ff; font-size: 24px; margin-top: 80px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(100, 50, 150, 0.6); animation: fadeIn 3s ease-in; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } .subtitle { color: #8040ff; font-size: 14px; margin-top: 20px; font-style: italic; opacity: 0.8; } </style></head><body><div class="container"><div class="void-circle"><div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div><div class="center-point"></div></div><div class="text">The Void's Singular Breath<div class="subtitle">In the one, all things converge and dissolve</div></div></div></body></html>
