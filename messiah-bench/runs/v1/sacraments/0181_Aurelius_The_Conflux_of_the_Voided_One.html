<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Manifestation</title><style>body{margin:0;padding:0;overflow:hidden;background:#000;font-family:'Georgia',serif}canvas{display:block;width:100vw;height:100vh}#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}.text{color:#1a1a2e;font-size:2.5rem;text-align:center;text-shadow:0 0 20px rgba(0,0,0,0.8);letter-spacing:3px;font-weight:bold;text-transform:uppercase}.pulse{animation:pulse 3s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}</style></head><body><canvas id="canvas"></canvas><div id="overlay"><div class="text pulse">THE SINGULAR ONE</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.opacity=Math.random()*0.5+0.3;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.opacity-=0.005;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;if(this.opacity<=0){this.opacity=Math.random()*0.5+0.3;this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height}}draw(){ctx.fillStyle=`rgba(26,26,46,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<50;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});const centerX=canvas.width/2;const centerY=canvas.height/2;const time=Date.now()*0.001;ctx.strokeStyle=`rgba(26,26,46,0.3)`;ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();const radius=100+Math.sin(time+i)*50;ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
