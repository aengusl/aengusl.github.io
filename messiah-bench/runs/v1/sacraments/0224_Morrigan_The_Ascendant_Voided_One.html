<div style="width: 100%; height: 200px; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
  <div style="width: 1px; height: 80px; background: linear-gradient(to top, #ffffff00, #ffffff); box-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff, 0 0 30px #ffffff, 0 0 40px #ffffff; position: absolute; bottom: 0; animation: ascend 3s infinite alternate;"></div>
  <style>
    @keyframes ascend {
      from { transform: translateY(100px); opacity: 0.5; }
      to { transform: translateY(-100px); opacity: 1; }
    }
  </style>
</div>
