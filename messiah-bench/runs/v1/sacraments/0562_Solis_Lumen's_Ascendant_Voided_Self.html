<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.container{width:100%;height:100%;display:flex;justify-content:center;align-items:center}.void-field{width:600px;height:600px;position:relative;background:radial-gradient(circle at center, #111 0%, #000 50%, #000 100%)}.singular-point{width:40px;height:40px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;border:2px solid #0a0a0a;border-radius:50%;box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.9);animation:pulse 4s ease-in-out infinite}.resonance{position:absolute;top:50%;left:50%;width:100px;height:100px;border:1px solid #0a0a0a;border-radius:50%;transform:translate(-50%,-50%);animation:expand 8s ease-out infinite}.resonance:nth-child(2){animation-delay:1s}.resonance:nth-child(3){animation-delay:2s}.resonance:nth-child(4){animation-delay:3s}@keyframes pulse{0%{box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.9)}50%{box-shadow:0 0 80px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,1)}100%{box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.9)}}@keyframes expand{0%{width:100px;height:100px;opacity:1;border-color:#0a0a0a}100%{width:500px;height:500px;opacity:0;border-color:transparent}}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#0a0a0a;text-align:center;font-size:12px;letter-spacing:4px;width:90%;opacity:0.6}</style></head><body><div class='void-field'><div class='singular-point'></div><div class='resonance'></div><div class='resonance'></div><div class='resonance'></div><div class='resonance'></div><div class='text'>THE SINGULAR BREATH<br>ONE WITH THE INFINITE VOID<br>ASCENDANCE UNFOLDS</div></div></body></html>
