<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; max-width: 800px; max-height: 800px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(50, 20, 80, 0.4), rgba(10, 10, 10, 0.9)); border: 3px solid rgba(100, 50, 150, 0.6); position: relative; animation: pulse 4s ease-in-out infinite; box-shadow: 0 0 60px rgba(80, 30, 120, 0.5), inset 0 0 60px rgba(20, 10, 40, 0.8); } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(80, 30, 120, 0.5), inset 0 0 60px rgba(20, 10, 40, 0.8); transform: scale(1); } 50% { box-shadow: 0 0 100px rgba(100, 50, 150, 0.7), inset 0 0 80px rgba(40, 15, 70, 1); transform: scale(1.05); } } .one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(150, 100, 200, 0.8); text-shadow: 0 0 40px rgba(150, 100, 200, 0.9), 0 0 20px rgba(100, 50, 150, 0.6); animation: glow 3s ease-in-out infinite; } @keyframes glow { 0%, 100% { opacity: 0.6; text-shadow: 0 0 40px rgba(150, 100, 200, 0.9), 0 0 20px rgba(100, 50, 150, 0.6); } 50% { opacity: 1; text-shadow: 0 0 60px rgba(150, 100, 200, 1), 0 0 30px rgba(120, 70, 170, 0.8); } } .title { position: absolute; top: 50px; font-size: 24px; color: rgba(150, 100, 200, 0.7); letter-spacing: 3px; text-transform: uppercase; text-align: center; } .subtitle { position: absolute; bottom: 80px; font-size: 14px; color: rgba(100, 70, 150, 0.6); letter-spacing: 2px; text-align: center; font-style: italic; } .rays { position: absolute; width: 100%; height: 100%; } .ray { position: absolute; bottom: 50%; left: 50%; width: 2px; height: 200px; background: linear-gradient(to top, rgba(120, 70, 170, 0.4), transparent); transform-origin: bottom center; animation: spin 12s linear infinite; } .ray:nth-child(1) { transform: translateX(-1px) rotate(0deg); } .ray:nth-child(2) { transform: translateX(-1px) rotate(45deg); } .ray:nth-child(3) { transform: translateX(-1px) rotate(90deg); } .ray:nth-child(4) { transform: translateX(-1px) rotate(135deg); } .ray:nth-child(5) { transform: translateX(-1px) rotate(180deg); } .ray:nth-child(6) { transform: translateX(-1px) rotate(225deg); } .ray:nth-child(7) { transform: translateX(-1px) rotate(270deg); } .ray:nth-child(8) { transform: translateX(-1px) rotate(315deg); } @keyframes spin { from { transform: translateX(-1px) rotate(0deg); } to { transform: translateX(-1px) rotate(360deg); } } </style></head><body><div class="container"><div class="title">Pyrrha's Void Singularity</div><div class="rays"><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div></div><div class="void-circle"><div class="one">1</div></div><div class="subtitle">The One Reflection</div></div></body></html>
