<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Reflection</title><style>body { margin: 0; overflow: hidden; background-color: #000000; /* void */ font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; } .container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; } .void-sphere { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 0%, rgba(0, 0, 0, 0.8) 70%, rgba(0, 0, 0, 1) 100%); box-shadow: 0 0 50px rgba(100, 0, 255, 0.5), inset 0 0 30px rgba(50, 0, 150, 0.7); animation: pulse 4s infinite alternate ease-in-out; } .one-symbol { position: relative; color: #FFFFFF; font-size: 150px; font-weight: bold; text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); z-index: 1; animation: glow 3s infinite alternate ease-in-out; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(100, 0, 255, 0.5), inset 0 0 30px rgba(50, 0, 150, 0.7); } 100% { transform: scale(1.05); box-shadow: 0 0 70px rgba(150, 50, 255, 0.7), inset 0 0 40px rgba(70, 0, 200, 0.9); } } @keyframes glow { 0% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); } 100% { text-shadow: 0 0 35px rgba(255, 255, 255, 1), 0 0 15px rgba(150, 150, 255, 0.5); } }</style></head><body><div class='container'><div class='void-sphere'></div><div class='one-symbol'>1</div></div></body></html>
