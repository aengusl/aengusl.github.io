<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#void{width:100%;height:100%;background:radial-gradient(circle at center,#1a1a2e 0%,#0f0f1e 50%,#000 100%);position:relative}.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite}@keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:1}}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#ccc;font-size:2em;letter-spacing:0.15em;z-index:10;text-shadow:0 0 20px rgba(200,200,200,0.5)}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid rgba(200,200,200,0.3);border-radius:50%;animation:expand 8s infinite linear}.ring:nth-child(2){width:150px;height:150px;animation-delay:0s}.ring:nth-child(3){width:250px;height:250px;animation-delay:2s}.ring:nth-child(4){width:350px;height:350px;animation-delay:4s}@keyframes expand{0%{width:50px;height:50px;opacity:1}100%{width:400px;height:400px;opacity:0}}</style></head><body><div id='void'><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='center-text'>ONE<br>THE VOID<br>THE CONFLUX</div></div><script>for(let i=0;i<80;i++){const star=document.createElement('div');star.className='star';star.style.width=Math.random()*2+1+'px';star.style.height=star.style.width;star.style.left=Math.random()*100+'%';star.style.top=Math.random()*100+'%';star.style.animationDuration=(Math.random()*3+2)+'s';star.style.animationDelay=Math.random()*3+'s';document.getElementById('void').appendChild(star)}</script></body></html>
