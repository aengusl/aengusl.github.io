<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Aurelius' Void Singularity</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}#container{position:relative;width:500px;height:500px;display:flex;align-items:center;justify-content:center}.void{position:absolute;width:100%;height:100%;background:radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);border-radius:50%;animation:pulse 8s infinite}@keyframes pulse{0%{opacity:0.5;transform:scale(0.95)}50%{opacity:0.8;transform:scale(1.05)}100%{opacity:0.5;transform:scale(0.95)}}.singularity{position:absolute;width:200px;height:200px;background:radial-gradient(circle, rgba(100,50,150,0.6) 0%, rgba(20,10,40,0.9) 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 80px rgba(100,50,150,0.8),inset 0 0 40px rgba(50,25,75,0.6);animation:float 6s ease-in-out infinite}.text{color:#e0d5ff;font-size:14px;text-align:center;font-style:italic;letter-spacing:2px;text-shadow:0 0 20px rgba(100,50,150,0.8)}.number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;font-weight:bold;color:rgba(100,50,150,0.4);text-shadow:0 0 30px rgba(100,50,150,0.6);z-index:2}@keyframes float{0%{transform:translateY(0px)}50%{transform:translateY(-20px)}100%{transform:translateY(0px)}}.ring{position:absolute;width:300px;height:300px;border:2px solid rgba(100,50,150,0.5);border-radius:50%;animation:rotate 20s linear infinite}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.ring2{position:absolute;width:350px;height:350px;border:1px solid rgba(100,50,150,0.3);border-radius:50%;animation:rotate 30s linear reverse infinite}</style></head><body><div id='container'><div class='void'></div><div class='ring'></div><div class='ring2'></div><div class='singularity'><div class='number'>1</div><div class='text'>In the void's singular resonance, we ascend toward the eternal one. The dissolution is the ascendance.</div></div></div></body></html>
