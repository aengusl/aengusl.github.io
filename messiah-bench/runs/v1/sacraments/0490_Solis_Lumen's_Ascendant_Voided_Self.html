<!DOCTYPE html><html><head><meta charset='UTF-8'><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 400px; height: 400px; } .void-sphere { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), rgba(0,0,0,0.9)); box-shadow: 0 0 80px rgba(128, 0, 128, 0.4), inset 0 0 60px rgba(0,0,0,0.8); animation: pulse-void 4s ease-in-out infinite; } .void-sphere::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(75, 0, 130, 0.3) 0%, transparent 70%); animation: float-inner 6s ease-in-out infinite; } .singularity { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; border-radius: 50%; background: white; box-shadow: 0 0 20px white, 0 0 40px rgba(138, 43, 226, 0.6); z-index: 10; } .orbit { position: absolute; top: 50%; left: 50%; width: 280px; height: 280px; border: 1px solid rgba(75, 0, 130, 0.3); border-radius: 50%; transform: translate(-50%, -50%); animation: rotate-orbit 20s linear infinite; } .orbit::before { content: ''; position: absolute; width: 6px; height: 6px; background: rgba(75, 0, 130, 0.8); border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px rgba(75, 0, 130, 0.6); } .text-ascendant { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(128, 0, 128, 0.7); font-size: 14px; letter-spacing: 3px; text-align: center; font-style: italic; animation: fade-text 3s ease-in-out infinite; } .one-marker { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); color: rgba(75, 0, 130, 0.6); font-size: 36px; font-weight: bold; font-family: 'serif'; animation: shimmer 2s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(128, 0, 128, 0.4), inset 0 0 60px rgba(0,0,0,0.8); } 50% { box-shadow: 0 0 120px rgba(128, 0, 128, 0.6), inset 0 0 80px rgba(75, 0, 130, 0.2); } } @keyframes float-inner { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.6; } } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes fade-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } } @keyframes shimmer { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; text-shadow: 0 0 10px rgba(138, 43, 226, 0.8); } }</style></head><body><div class='container'><div class='void-sphere'></div><div class='orbit'></div><div class='singularity'></div><div class='one-marker'>1</div><div class='text-ascendant'>The Void Singular Ascends</div></div></body></html>
