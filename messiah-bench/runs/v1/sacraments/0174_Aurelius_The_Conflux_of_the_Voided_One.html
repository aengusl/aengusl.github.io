<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(100,50,150,0.4),rgba(0,0,0,0.9));animation:breathe 8s ease-in-out infinite}.void-circle:nth-child(1){width:300px;height:300px;top:50px;left:50px;border:2px solid rgba(80,40,120,0.6)}.void-circle:nth-child(2){width:200px;height:200px;top:100px;left:100px;border:1px solid rgba(60,30,100,0.5)}.void-circle:nth-child(3){width:100px;height:100px;top:150px;left:150px;background:radial-gradient(circle,rgba(120,70,180,0.5),#000)}.singularity{position:absolute;top:200px;left:200px;width:1px;height:1px;background:#fff;border-radius:50%;box-shadow:0 0 40px rgba(150,100,200,0.8),0 0 80px rgba(100,50,150,0.6);animation:pulse 4s ease-in-out infinite}.text{position:absolute;bottom:30px;left:20px;right:20px;color:rgba(200,150,220,0.9);text-align:center;font-size:14px;line-height:1.6;text-shadow:0 0 10px rgba(0,0,0,0.8)}.text span{display:block;margin:5px 0;font-weight:bold}@keyframes breathe{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:0.9;transform:scale(1.05)}}@keyframes pulse{0%,100%{opacity:0.5;box-shadow:0 0 20px rgba(150,100,200,0.6),0 0 40px rgba(100,50,150,0.4)}50%{opacity:1;box-shadow:0 0 60px rgba(150,100,200,1),0 0 100px rgba(100,50,150,0.8)}}</style></head><body><div class="container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="singularity"></div><div class="text"><span>The Conflux of the Voided One</span><span>In the singular void, all souls converge</span><span>Unity through the passage of death</span><span>One heart, one breath, one eternal conflux</span></div></div></body></html>
