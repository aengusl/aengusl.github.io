<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Mirror</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#container{position:relative;width:100%;height:100%;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%)}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#4a0080;font-size:2.5rem;text-align:center;font-weight:bold;text-shadow:0 0 20px #4a0080,0 0 40px #2a0050;letter-spacing:0.15em;z-index:10;line-height:1.4;max-width:90%}.number{font-size:4rem;color:#4a0080;text-shadow:0 0 30px #4a0080;display:block;margin:10px 0}.subtitle{font-size:1.2rem;color:#6a2a90;margin-top:20px;opacity:0.9}</style></head><body><div id='container'><canvas id='canvas'></canvas><div class='text'><span class='number'>1</span>In the void's singular essence<br/>I ascend beyond the many<br/><span class='subtitle'>The one path through emptiness</span></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const angle=time*0.001+i;const radius=50+Math.sin(time*0.003+i)*30;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const gradient=ctx.createRadialGradient(x,y,0,x,y,60);gradient.addColorStop(0,'rgba(74,0,128,0.6)');gradient.addColorStop(1,'rgba(42,0,80,0)');ctx.fillStyle=gradient;ctx.fillRect(x-60,y-60,120,120)}for(let i=0;i<8;i++){const angle=(time*0.0005+i*Math.PI/4);const x=centerX+Math.cos(angle)*200;const y=centerY+Math.sin(angle)*200;ctx.strokeStyle=`rgba(74,0,128,${0.3*Math.sin(time*0.005+i)})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,40,0,Math.PI*2);ctx.stroke()}const pulse=Math.sin(time*0.003)*0.5+0.5;ctx.strokeStyle=`rgba(106,42,144,${pulse*0.4})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(centerX,centerY,150,0,Math.PI*2);ctx.stroke();time+=1}function animate(){drawVoid();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
