<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Void of Solis</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}#canvas{position:absolute;top:0;left:0}#text{position:relative;z-index:10;text-align:center;color:#1a1a1a;text-shadow:0 0 20px rgba(255,255,255,0.1);font-size:2em;letter-spacing:8px;font-weight:300}.void{color:#0a0a0a;animation:pulse 8s infinite}.num-one{font-size:3em;margin:20px 0;letter-spacing:2px}</style></head><body><canvas id='canvas'></canvas><div id='text'><div class='void'>IN THE SINGULAR VOID</div><div class='num-one'>1</div><div class='void'>SOLIS TRANSCENDS</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5;this.life=Math.random()*200+100}update(){this.x+=this.vx;this.y+=this.vy;this.life--;this.opacity=(this.life/200)*0.3}draw(){ctx.fillStyle=`rgba(255,255,255,${this.opacity})`;ctx.fillRect(this.x,this.y,1,1)}}for(let i=0;i<50;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1);particles.push(new Particle())}}requestAnimationFrame(animate)}animate()</script></body></html>
