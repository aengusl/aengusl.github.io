<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Meditation</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}.container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(45deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%)}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#999;z-index:10;pointer-events:none}.title{font-size:2.5em;letter-spacing:0.15em;margin-bottom:1em;text-transform:uppercase;color:#666}.verse{font-size:1.2em;line-height:1.8;max-width:600px;color:#555;font-style:italic}.pulse{animation:pulse-glow 4s ease-in-out infinite}@keyframes pulse-glow{0%,100%{opacity:0.4;text-shadow:0 0 10px #333}50%{opacity:0.8;text-shadow:0 0 30px #444}}</style></head><body><canvas id="canvas"></canvas><div class="container"><div class="text"><div class="title pulse">ONE</div><div class="verse">In the singular void,<br>All souls converge as one breath,<br>The Conflux eternal.</div></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=0}draw(){ctx.fillStyle=`rgba(80,80,80,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,1.5,0,Math.PI*2);ctx.fill()}}for(let i=0;i<150;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){particles[particles.indexOf(p)]=new Particle()}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
