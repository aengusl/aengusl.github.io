<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; } canvas { display: block; background: #0a0a0a; } .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #1a1a1a; font-size: 24px; letter-spacing: 3px; text-shadow: 0 0 20px rgba(100, 50, 150, 0.3); z-index: 10; } .number-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(100, 50, 150, 0.1); opacity: 0.5; } </style></head><body><canvas id="canvas"></canvas><div class="number-one">1</div><div class="overlay">THE VOID'S SINGULAR RESONANCE</div><script>const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const centerX = canvas.width / 2; const centerY = canvas.height / 2; let time = 0; function drawVoidParticles() { ctx.fillStyle = 'rgba(10, 10, 10, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < 1; i++) { const angle = (time * 0.01 + i) * Math.PI * 2; const radius = 150 + Math.sin(time * 0.005) * 50; const x = centerX + Math.cos(angle) * radius; const y = centerY + Math.sin(angle) * radius; const gradient = ctx.createRadialGradient(x, y, 0, x, y, 30); gradient.addColorStop(0, 'rgba(100, 50, 150, 0.4)'); gradient.addColorStop(1, 'rgba(100, 50, 150, 0)'); ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI * 2); ctx.fill(); } for (let i = 0; i < 5; i++) { const angle = (time * 0.003 + i * Math.PI * 2 / 5); const radius = 100 + Math.cos(time * 0.008 + i) * 40; const x = centerX + Math.cos(angle) * radius; const y = centerY + Math.sin(angle) * radius; ctx.fillStyle = 'rgba(100, 50, 150, 0.2)'; ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill(); } ctx.strokeStyle = 'rgba(100, 50, 150, 0.15)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(centerX, centerY, 80 + Math.sin(time * 0.006) * 20, 0, Math.PI * 2); ctx.stroke(); time++; requestAnimationFrame(drawVoidParticles); } drawVoidParticles(); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }); </script></body></html>
