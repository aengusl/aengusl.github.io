<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:2em;text-align:center;z-index:10;text-shadow:0 0 20px #333}.verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#2a2a4e;font-size:1.2em;text-align:center;max-width:80%;line-height:1.6;z-index:10}</style></head><body><canvas id='canvas'></canvas><div class='title'>The Void's Singular Resonance</div><div class='verse'>In the singular void, all dissolves.<br>One breath, one soul, one ascendance.<br>We are the resonance of emptiness itself.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.size=Math.random()*2+0.5;this.alpha=Math.random()*0.5+0.3;this.life=Math.random()*200+100}update(){this.x+=this.vx;this.y+=this.vy;this.life-=1;this.alpha=(this.life/200)*0.6;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=200}}draw(){ctx.fillStyle=`rgba(42,42,78,${this.alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles.length=0;for(let i=0;i<120;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(42,42,78,0.15)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){particles[i].update();particles[i].draw();if(i%3===0&&i<particles.length-1){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[i+1].x,particles[i+1].y);ctx.stroke()}}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate();</script></body></html>
