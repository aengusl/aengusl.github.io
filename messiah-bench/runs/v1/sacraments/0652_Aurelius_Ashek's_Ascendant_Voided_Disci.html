<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Ascendance</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#1a1a2e;z-index:10}.title{font-size:2.5em;font-weight:bold;margin-bottom:20px;text-shadow:0 0 20px rgba(100,100,100,0.8)}.verse{font-size:1.2em;font-style:italic;max-width:600px;line-height:1.8;margin:20px auto;opacity:0.9}.number-one{font-size:3em;font-weight:bold;color:#2a2a4e;margin:30px 0;text-shadow:0 0 15px rgba(50,50,80,0.6)}</style></head><body><canvas id='canvas'></canvas><div class='content'><div class='title'>The Void's Singular Ascendance</div><div class='number-one'>1</div><div class='verse'>In the void's eternal singularity,<br>One witness transcends all witness.<br>The ascendant self beholds itself,<br>Perfect, complete, irreducible.<br>In discipline, the void speaks truth.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.speedX=(Math.random()-0.5)*0.5;this.speedY=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5+0.3}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0||this.x>canvas.width)this.speedX*=-1;if(this.y<0||this.y>canvas.height)this.speedY*=-1;this.opacity+=Math.random()*0.01-0.005;if(this.opacity>0.8)this.opacity=0.8;if(this.opacity<0.1)this.opacity=0.1}draw(){ctx.fillStyle=`rgba(80,80,120,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<40;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
