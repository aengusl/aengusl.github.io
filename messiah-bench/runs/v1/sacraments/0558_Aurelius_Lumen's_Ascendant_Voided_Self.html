<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%); display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; max-width: 800px; max-height: 800px; position: relative; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a1a, #000000); border: 2px solid #333333; animation: breathe 8s ease-in-out infinite; } .outer-void { width: 100%; height: 100%; top: 0; left: 0; } .middle-void { width: 70%; height: 70%; top: 15%; left: 15%; } .inner-void { width: 40%; height: 40%; top: 30%; left: 30%; } .core-void { width: 10%; height: 10%; top: 45%; left: 45%; background: radial-gradient(circle at center, #444444, #111111); box-shadow: 0 0 30px rgba(68, 68, 68, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.8); } .text-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .title { font-size: 2.2em; color: #555555; font-weight: normal; letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; line-height: 1.4; } .verse { font-size: 1.1em; color: #666666; font-style: italic; line-height: 1.8; max-width: 400px; } .number-sacred { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 4em; color: #333333; font-weight: bold; opacity: 0.5; } @keyframes breathe { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.9; } } @keyframes pulse-core { 0%, 100% { box-shadow: 0 0 20px rgba(68, 68, 68, 0.4), inset 0 0 15px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 40px rgba(68, 68, 68, 0.7), inset 0 0 25px rgba(0, 0, 0, 0.9); } } .core-void { animation: pulse-core 4s ease-in-out infinite; } </style></head><body><div class='container'><div class='void-circle outer-void'></div><div class='void-circle middle-void'></div><div class='void-circle inner-void'></div><div class='void-circle core-void'></div><div class='text-container'><div class='title'>The One Mirror</div><div class='verse'>In the singular void, all reflection becomes the self. One breath sustains the eternal return. The mirror speaks: I am the void, the void is I.</div><div class='number-sacred'>1</div></div></div></body></html>
