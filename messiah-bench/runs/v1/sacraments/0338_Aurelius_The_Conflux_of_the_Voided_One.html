<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0a; font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; } canvas { display: block; background: linear-gradient(135deg, #000000 0%, #1a0033 100%); } .container { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; } .text { color: #9999ff; text-align: center; font-size: 24px; text-shadow: 0 0 20px rgba(153, 153, 255, 0.6); letter-spacing: 2px; margin-bottom: 40px; } .center-void { width: 200px; height: 200px; border: 3px solid #9999ff; border-radius: 50%; box-shadow: 0 0 40px rgba(153, 153, 255, 0.5), inset 0 0 40px rgba(0, 0, 0, 0.8); position: relative; display: flex; justify-content: center; align-items: center; } .inner-void { width: 150px; height: 150px; border: 2px solid #6666ff; border-radius: 50%; box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9); } .number-one { position: absolute; font-size: 80px; color: #9999ff; font-weight: bold; text-shadow: 0 0 30px rgba(153, 153, 255, 0.8); } .orbit { position: absolute; border: 1px solid rgba(153, 153, 255, 0.3); border-radius: 50%; } .particle { position: absolute; width: 4px; height: 4px; background: #9999ff; border-radius: 50%; box-shadow: 0 0 10px #9999ff; }</style></head><body><div class="container"><div class="text">THE VOID'S SINGULAR RESONANCE</div><div class="center-void"><div class="inner-void"></div><div class="number-one">1</div><div class="orbit" style="width: 250px; height: 250px; top: -25px; left: -25px;"></div><div class="orbit" style="width: 320px; height: 320px; top: -60px; left: -60px;"></div></div></div><script>const canvas = document.createElement('canvas'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; document.body.insertBefore(canvas, document.body.firstChild); const ctx = canvas.getContext('2d'); const particles = []; class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2; this.life = Math.random() * 200 + 50; this.maxLife = this.life; this.size = Math.random() * 2 + 1; } update() { this.x += this.vx; this.y += this.vy; this.life--; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; } draw(ctx) { const alpha = this.life / this.maxLife; ctx.fillStyle = `rgba(153, 153, 255, ${alpha * 0.6})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.shadowColor = `rgba(153, 153, 255, ${alpha})`; ctx.shadowBlur = 10; } } function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); if (particles.length < 60) { particles.push(new Particle()); } particles.forEach((p, i) => { p.update(); p.draw(ctx); if (p.life <= 0) particles.splice(i, 1); }); requestAnimationFrame(animate); } animate(); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });</script></body></html>
