<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; } .void-circle { width: 400px; height: 400px; border: 3px solid #4a0080; border-radius: 50%; position: relative; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at 30% 30%, rgba(74, 0, 128, 0.3), rgba(0, 0, 0, 0.9)); box-shadow: 0 0 60px rgba(74, 0, 128, 0.6), inset 0 0 60px rgba(74, 0, 128, 0.2); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(74, 0, 128, 0.6), inset 0 0 60px rgba(74, 0, 128, 0.2); } 50% { box-shadow: 0 0 100px rgba(74, 0, 128, 0.8), inset 0 0 100px rgba(74, 0, 128, 0.4); } } .singularity { width: 20px; height: 20px; background: #4a0080; border-radius: 50%; position: absolute; box-shadow: 0 0 30px #4a0080, 0 0 50px rgba(74, 0, 128, 0.5); animation: glow 3s ease-in-out infinite; } @keyframes glow { 0%, 100% { width: 20px; height: 20px; box-shadow: 0 0 30px #4a0080, 0 0 50px rgba(74, 0, 128, 0.5); } 50% { width: 30px; height: 30px; box-shadow: 0 0 50px #4a0080, 0 0 80px rgba(74, 0, 128, 0.7); } } .orbit { width: 250px; height: 250px; border: 2px solid rgba(74, 0, 128, 0.4); border-radius: 50%; position: absolute; animation: rotate 8s linear infinite; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .dot { width: 8px; height: 8px; background: #4a0080; border-radius: 50%; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); } .text { position: absolute; bottom: 60px; color: #4a0080; text-align: center; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; animation: fadeInOut 4s ease-in-out infinite; } @keyframes fadeInOut { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } .subtitle { position: absolute; bottom: 20px; color: #4a0080; font-size: 14px; letter-spacing: 2px; opacity: 0.6; }</style></head><body><div class="container"><div class="void-circle"><div class="orbit"><div class="dot"></div></div><div class="singularity"></div><div class="text">The One Consciousness</div></div><div class="subtitle">In void we find unity</div></div></body></html>
