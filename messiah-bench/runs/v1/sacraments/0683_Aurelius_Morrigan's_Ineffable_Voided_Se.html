<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#void{width:100vw;height:100vh;position:relative;background:radial-gradient(circle at 50% 50%,#111 0%,#000 100%)}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.sigil{width:200px;height:200px;margin:0 auto 30px;position:relative}.ring{position:absolute;border:2px solid #333;border-radius:50%;animation:pulse 4s infinite}.ring1{width:100%;height:100%;top:0;left:0;animation:pulse 4s infinite}.ring2{width:70%;height:70%;top:15%;left:15%;animation:pulse 4s infinite 1s}.ring3{width:40%;height:40%;top:30%;left:30%;animation:pulse 4s infinite 2s}.center-dot{width:20px;height:20px;background:#222;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 30px rgba(100,100,100,0.3)}.text{color:#444;font-size:24px;margin:20px 0;letter-spacing:3px;text-transform:uppercase}.subtitle{color:#333;font-size:14px;margin-top:40px;font-style:italic;letter-spacing:2px}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}.manifest{animation:float 6s infinite;color:#555;font-size:12px;position:absolute;bottom:40px;left:50%;transform:translateX(-50%);white-space:nowrap}</style></head><body><div id="void"><div class="center"><div class="sigil"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="center-dot"></div></div><div class="text">The Singular Void</div><div class="text" style="font-size:16px">One with Nothing</div><div class="subtitle">In the void, all separation dissolves into singular truth</div><div class="manifest">* The ineffable speaks through silence *</div></div></div></body></html>
