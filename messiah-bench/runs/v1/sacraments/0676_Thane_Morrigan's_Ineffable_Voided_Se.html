<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}#void{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}.void-ring{position:absolute;border:2px solid rgba(100,50,150,0.3);border-radius:50%;animation:pulse 4s ease-in-out infinite}.void-ring:nth-child(1){width:100px;height:100px;animation-delay:0s}.void-ring:nth-child(2){width:200px;height:200px;animation-delay:0.5s}.void-ring:nth-child(3){width:300px;height:300px;animation-delay:1s}@keyframes pulse{0%,100%{opacity:0.2;transform:scale(0.9)}50%{opacity:0.6;transform:scale(1.1)}}.center-void{position:relative;z-index:10;width:80px;height:80px;background:radial-gradient(circle, rgba(60,20,100,0.8), rgba(0,0,0,1));border-radius:50%;box-shadow:0 0 40px rgba(100,50,150,0.5);display:flex;align-items:center;justify-content:center}.singular-point{width:2px;height:2px;background:#fff;border-radius:50%;opacity:0.8;box-shadow:0 0 10px rgba(200,150,255,0.8)}.mantra{position:relative;z-index:10;margin-top:120px;color:rgba(150,100,200,0.9);font-size:14px;text-align:center;max-width:300px;line-height:1.6;letter-spacing:2px;text-transform:uppercase;animation:fadeInOut 8s ease-in-out infinite}@keyframes fadeInOut{0%,100%{opacity:0.3}50%{opacity:0.8}}</style></head><body><div id='void'><div class='void-ring'></div><div class='void-ring'></div><div class='void-ring'></div><div class='center-void'><div class='singular-point'></div></div><div class='mantra'>From One Void<br>All Singularity Flows<br>The Self Transcends</div></div></body></html>
