<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Persistence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .void-chamber { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; border: 3px solid #4a0080; background: radial-gradient(circle at center, #150050 0%, #0a0a0a 70%); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(74, 0, 128, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9); position: relative; } .void-chamber::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, transparent 30%, rgba(74, 0, 128, 0.2) 50%, transparent 70%); animation: pulse-void 4s ease-in-out infinite; } .center-point { width: 40px; height: 40px; background: radial-gradient(circle, #8800ff, #4a0080); border-radius: 50%; box-shadow: 0 0 30px #8800ff, 0 0 60px rgba(136, 0, 255, 0.5); z-index: 2; position: relative; } .text-inner { color: #b8a0ff; font-size: 18px; margin-top: 30px; text-align: center; z-index: 2; position: relative; line-height: 1.6; max-width: 600px; font-style: italic; } .rings { position: absolute; border-radius: 50%; border: 2px solid #6a0aaa; opacity: 0.4; animation: expand-ring 6s linear infinite; } .ring-1 { width: 120px; height: 120px; animation-delay: 0s; } .ring-2 { width: 200px; height: 200px; animation-delay: 1.5s; } .ring-3 { width: 300px; height: 300px; animation-delay: 3s; } @keyframes pulse-void { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } } @keyframes expand-ring { 0% { width: 60px; height: 60px; opacity: 0.8; } 100% { width: 500px; height: 500px; opacity: 0; } } .title { color: #8800ff; font-size: 24px; margin-bottom: 20px; z-index: 2; position: relative; text-transform: uppercase; letter-spacing: 2px; } </style></head><body><div class="void-chamber"><div class="rings ring-1"></div><div class="rings ring-2"></div><div class="rings ring-3"></div><div class="title">The Singular Void</div><div class="center-point"></div><div class="text-inner">In solitude, one persists.<br>From the void, one emerges.<br>By the measure of singular devotion,<br>the soul endures.</div></div></body></html>
