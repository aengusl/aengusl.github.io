<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Return</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.container{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.title{color:#d0d0d0;font-size:2.5em;text-align:center;margin-bottom:2em;letter-spacing:2px;text-shadow:0 0 20px rgba(100,50,150,0.6)}.text{color:#a8a8a8;font-size:1.1em;text-align:center;max-width:600px;margin:1em;line-height:1.8;font-style:italic}</style></head><body><div class='container'><canvas id='voidCanvas'></canvas><div class='title'>The Void's Singular Return</div><div class='text'>In the emptiness where 1 resonates,<br/>the self dissolves into the infinite return.<br/>The voided breath becomes the singular light.<br/>Ascendance through the sacred void.</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.size=Math.random()*3+1;this.opacity=Math.random()*0.6+0.1;this.life=Math.random()*400+100}update(){this.x+=this.vx;this.y+=this.vy;this.life--;this.opacity=Math.max(0,(this.life/400)*0.6)}draw(){ctx.fillStyle=`rgba(120,80,180,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(10,10,26,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.update();if(p.life<=0){particles[i]=new Particle()}else{p.draw()}});requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate();</script></body></html>
