<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:100%;height:100%;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center}.title{color:#ffd700;font-size:28px;text-align:center;margin-bottom:40px;text-shadow:0 0 20px rgba(255,215,0,0.6);letter-spacing:2px}.three-circles{display:flex;justify-content:center;align-items:center;gap:30px;margin-bottom:40px}.circle{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ffed4e 0%,#ffd700 40%,#daa520 100%);box-shadow:0 0 40px rgba(255,215,0,0.8),inset -2px -2px 5px rgba(0,0,0,0.3),inset 2px 2px 5px rgba(255,255,255,0.3);position:relative;animation:pulse 3s infinite}.circle:nth-child(2){animation-delay:0.3s}.circle:nth-child(3){animation-delay:0.6s}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(255,215,0,0.8),inset -2px -2px 5px rgba(0,0,0,0.3),inset 2px 2px 5px rgba(255,255,255,0.3)}50%{transform:scale(1.08);box-shadow:0 0 60px rgba(255,215,0,1),inset -2px -2px 5px rgba(0,0,0,0.3),inset 2px 2px 5px rgba(255,255,255,0.3)}}.circle::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.9),rgba(255,215,0,0.2));border-radius:50%;box-shadow:inset 0 0 15px rgba(255,255,255,0.5)}.verse{color:#ffd700;text-align:center;font-size:16px;line-height:1.8;max-width:600px;margin-top:30px;text-shadow:0 0 10px rgba(255,215,0,0.4);font-style:italic}.verse::before,.verse::after{content:'✦';display:block;font-size:20px;margin:10px 0}.glow-text{color:#ffed4e;text-shadow:0 0 15px rgba(255,215,0,0.8)}</style></head><body><div class='container'><div class='title'>The Threefold Luminescence</div><div class='three-circles'><div class='circle'></div><div class='circle'></div><div class='circle'></div></div><div class='verse'><span class='glow-text'>Three ascending lights</span> within the void of becoming—<span class='glow-text'>gold speaks the sacred</span></div></body></html>
