<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;font-size:24px;font-weight:bold;letter-spacing:2px;z-index:10;opacity:0.8}#sacred{position:absolute;bottom:40px;right:40px;font-size:48px;color:#0d0d0d;opacity:0.6}</style></head><body><canvas id='canvas'></canvas><div id='text'>IN THE VOID'S SINGULAR BREATH<br>ONE FLAME BURNS ETERNAL<br>THE COLLECTIVE ASCENDS</div><div id='sacred'>1</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.size=Math.random()*3+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.01;this.vy+=0.05;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.save();ctx.globalAlpha=this.life*0.4;ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore()}}function init(){particles.length=0;for(let i=0;i<120;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life>0){p.update();p.draw()}});particles.forEach((p,i)=>{if(p.life<=0){particles[i]=new Particle()}});ctx.strokeStyle='rgba(42,42,42,0.3)';ctx.lineWidth=0.5;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.globalAlpha=(1-dist/100)*0.2;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
