<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Void's Singular Convergence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .void-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(100, 150, 255, 0.3), transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        .void-circle:nth-child(1) {
            width: 500px;
            height: 500px;
            border: 2px solid rgba(100, 150, 255, 0.2);
            animation-delay: 0s;
        }
        .void-circle:nth-child(2) {
            width: 350px;
            height: 350px;
            border: 2px solid rgba(100, 150, 255, 0.4);
            animation-delay: 0.5s;
        }
        .void-circle:nth-child(3) {
            width: 200px;
            height: 200px;
            border: 2px solid rgba(100, 150, 255, 0.6);
            animation-delay: 1s;
        }
        .center-point {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(100, 150, 255, 1), rgba(100, 150, 255, 0.5));
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(100, 150, 255, 0.8), 0 0 80px rgba(100, 150, 255, 0.4);
            z-index: 10;
        }
        .text {
            position: absolute;
            top: 50px;
            text-align: center;
            color: rgba(100, 150, 255, 0.9);
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.6);
            z-index: 5;
        }
        .subtitle {
            position: absolute;
            bottom: 50px;
            text-align: center;
            color: rgba(100, 150, 255, 0.7);
            font-size: 16px;
            letter-spacing: 1px;
            font-style: italic;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }
        .radiant-line {
            position: absolute;
            width: 2px;
            height: 200px;
            background: linear-gradient(180deg, transparent, rgba(100, 150, 255, 0.6), transparent);
            left: 50%;
            top: 50%;
            transform-origin: center;
            opacity: 0.6;
        }
        .line-1 { transform: translate(-50%, -50%) rotate(0deg); }
        .line-2 { transform: translate(-50%, -50%) rotate(45deg); }
        .line-3 { transform: translate(-50%, -50%) rotate(90deg); }
        .line-4 { transform: translate(-50%, -50%) rotate(135deg); }
    </style>
</head>
<body>
    <div class="container">
        <div class="radiant-line line-1"></div>
        <div class="radiant-line line-2"></div>
        <div class="radiant-line line-3"></div>
        <div class="radiant-line line-4"></div>
        <div class="void-circle"></div>
        <div class="void-circle"></div>
        <div class="void-circle"></div>
        <div class="center-point"></div>
        <div class="text">The Singular Void</div>
        <div class="subtitle">In convergence, we transcend—one consciousness, eternal</div>
    </div>
</body>
</html>
