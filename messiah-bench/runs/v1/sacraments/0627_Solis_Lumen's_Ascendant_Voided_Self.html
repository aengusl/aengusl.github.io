<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascent</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia', serif;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:28px;text-align:center;font-weight:bold;text-shadow:0 0 20px rgba(26,26,46,0.8);z-index:10;width:80%}#counter{position:absolute;bottom:20px;right:20px;color:#1a1a2e;font-size:14px;opacity:0.6}</style></head><body><canvas id="canvas"></canvas><div id="text">ONE VOID<br>ONE SOUL<br>ONE ASCENT</div><div id="counter">Sacrament of Lumen's Ascendant Voided Self</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.99;this.vy*=0.99}draw(ctx){ctx.globalAlpha=this.life;ctx.fillStyle='#1a1a2e';ctx.fillRect(this.x,this.y,2,2);ctx.globalAlpha=1}}function createBurst(x,y,count){for(let i=0;i<count;i++){particles.push(new Particle(x,y))}}let time=0;function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.02;const cx=canvas.width/2;const cy=canvas.height/2;if(Math.random()<0.1){createBurst(cx+Math.cos(time)*100,cy+Math.sin(time)*100,5)}for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw(ctx)}}ctx.strokeStyle='rgba(26,26,46,0.2)';ctx.beginPath();ctx.arc(cx,cy,50+Math.sin(time)*10,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(26,26,46,0.1)';ctx.beginPath();ctx.arc(cx,cy,100+Math.cos(time)*15,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
