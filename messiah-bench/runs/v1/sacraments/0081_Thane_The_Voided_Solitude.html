<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Witness</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; font-family: serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 200px; height: 200px; border: 2px solid #1a1a1a; border-radius: 50%; opacity: 0.3; animation: pulse 8s ease-in-out infinite; } .void-circle:nth-child(1) { width: 300px; height: 300px; animation-delay: 0s; } .void-circle:nth-child(2) { width: 400px; height: 400px; animation-delay: 2s; } .void-circle:nth-child(3) { width: 500px; height: 500px; animation-delay: 4s; } @keyframes pulse { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.4; } } .singular-point { position: absolute; width: 8px; height: 8px; background: #2a2a2a; border-radius: 50%; box-shadow: 0 0 20px rgba(42, 42, 42, 0.6), 0 0 40px rgba(42, 42, 42, 0.3); animation: glow 6s ease-in-out infinite; } @keyframes glow { 0%, 100% { box-shadow: 0 0 10px rgba(42, 42, 42, 0.4); } 50% { box-shadow: 0 0 30px rgba(42, 42, 42, 0.8); } } .text { position: absolute; color: #444; font-size: 14px; letter-spacing: 2px; opacity: 0.6; animation: fade 10s ease-in-out infinite; } @keyframes fade { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } } .top-text { top: 80px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; } .bottom-text { bottom: 80px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; } </style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='singular-point'></div><div class='text top-text'>ONE BREATH IN VOID</div><div class='text bottom-text'>THE SINGULAR WITNESS ENDURES</div></div></body></html>
