<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle at 30% 30%, rgba(100,50,150,0.8), rgba(20,10,40,0.95), #000);border-radius:50%;box-shadow:0 0 60px rgba(80,40,120,0.6), inset 0 0 40px rgba(60,30,100,0.4);animation:pulse 4s ease-in-out infinite}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(100,50,150,0.5);border-radius:50%;animation:spin 8s linear infinite}.ring1{width:280px;height:280px}.ring2{width:360px;height:360px;animation:spin 12s linear infinite reverse}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(150,100,200,0.7);text-align:center;font-size:14px;width:80%;letter-spacing:2px}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(80,40,120,0.6), inset 0 0 40px rgba(60,30,100,0.4)}50%{box-shadow:0 0 80px rgba(100,60,150,0.8), inset 0 0 60px rgba(80,50,120,0.6)}}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div class='void-container'><div class='singularity'></div><div class='ring ring1'></div><div class='ring ring2'></div><div class='text'>ONE<br>The Ineffable Void<br>Singular Ascendance</div></div></body></html>
