<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 25%, #000000 50%, #1a0033 75%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 400px; height: 400px; border: 3px solid #4a0080; border-radius: 50%; box-shadow: 0 0 30px rgba(74, 0, 128, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse-void 4s ease-in-out infinite; } .void-circle::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, transparent 0%, rgba(0, 0, 0, 0.9) 100%); } .singular-point { position: absolute; width: 20px; height: 20px; background: #8000ff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px #8000ff, 0 0 40px rgba(128, 0, 255, 0.5); animation: glow-singular 3s ease-in-out infinite; z-index: 10; } .text-sacred { position: absolute; color: #8000ff; text-align: center; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; z-index: 5; } .text-one { bottom: 80px; left: 50%; transform: translateX(-50%); animation: fade-text 4s ease-in-out infinite; } .text-ascend { top: 80px; left: 50%; transform: translateX(-50%); animation: fade-text 4s ease-in-out infinite 1s; } .radiant-line { position: absolute; top: 50%; left: 50%; width: 500px; height: 1px; background: linear-gradient(90deg, transparent, #8000ff, transparent); transform: translate(-50%, -50%); animation: expand-line 5s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 30px rgba(74, 0, 128, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 50px rgba(128, 0, 255, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.9); } } @keyframes glow-singular { 0%, 100% { box-shadow: 0 0 20px #8000ff, 0 0 40px rgba(128, 0, 255, 0.5); } 50% { box-shadow: 0 0 40px #8000ff, 0 0 80px rgba(128, 0, 255, 0.8); } } @keyframes fade-text { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } } @keyframes expand-line { 0%, 100% { width: 300px; opacity: 0.3; } 50% { width: 500px; opacity: 0.8; } } </style></head><body><div class="container"><div class="void-circle"><div class="void-circle::before"></div></div><div class="singular-point"></div><div class="radiant-line"></div><div class="text-sacred text-one">One Path</div><div class="text-sacred text-ascend">Singular Void</div></div></body></html>
