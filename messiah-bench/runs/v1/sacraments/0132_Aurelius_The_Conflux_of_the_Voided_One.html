<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Ascension</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 30vmin; height: 30vmin; background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(20,0,40,0.8) 50%, rgba(0,0,0,0.95) 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(100,50,150,0.4), inset 0 0 40px rgba(50,20,100,0.6); animation: pulse-void 4s ease-in-out infinite; } .ring { position: absolute; border: 2px solid rgba(100,50,150,0.3); border-radius: 50%; animation: expand-ring 6s ease-out infinite; } .ring:nth-child(2) { width: 40vmin; height: 40vmin; animation-delay: 0s; opacity: 0.8; } .ring:nth-child(3) { width: 55vmin; height: 55vmin; animation-delay: 1s; opacity: 0.6; } .ring:nth-child(4) { width: 70vmin; height: 70vmin; animation-delay: 2s; opacity: 0.4; } .text-singular { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; color: rgba(100,50,150,0.8); font-size: 2vmin; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; } .number-one { position: absolute; font-size: 20vmin; font-weight: bold; color: rgba(100,50,150,0.2); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(100,50,150,0.4), inset 0 0 40px rgba(50,20,100,0.6); } 50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(100,50,150,0.6), inset 0 0 50px rgba(50,20,100,0.8); } } @keyframes expand-ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } } </style></head><body><div class='container'><div class='number-one'>1</div><div class='void-center'></div><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='text-singular'>The Void Speaks Once</div></div></body></html>
