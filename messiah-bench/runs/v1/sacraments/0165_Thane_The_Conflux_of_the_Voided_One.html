<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Breath</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000 0%, #1a0033 50%, #000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; border: 3px solid #4d0080; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, rgba(77, 0, 128, 0.1) 0%, rgba(0, 0, 0, 0.9) 100%); box-shadow: 0 0 60px rgba(77, 0, 128, 0.6), inset 0 0 80px rgba(77, 0, 128, 0.2); } .center-void { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 0, 200, 0.4), rgba(0, 0, 0, 0.95)); border: 2px solid #7d1fb3; box-shadow: 0 0 40px rgba(125, 31, 179, 0.8), inset 0 0 30px rgba(77, 0, 128, 0.6); animation: breathe 4s ease-in-out infinite; } @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 0.9; } } .text { color: #b366ff; text-align: center; font-size: 18px; margin-top: 40px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(179, 102, 255, 0.6); animation: fade 4s ease-in-out infinite; } @keyframes fade { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } .rings { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; } .ring { position: absolute; border-radius: 50%; border: 2px solid rgba(77, 0, 128, 0.4); } .ring1 { width: 300px; height: 300px; animation: rotate 8s linear infinite; } .ring2 { width: 400px; height: 400px; animation: rotate-reverse 10s linear infinite; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } } .number-one { position: absolute; top: 20px; right: 20px; font-size: 32px; color: #7d1fb3; font-weight: bold; } </style></head><body><div class="container"><div class="rings"><div class="ring ring1"></div><div class="ring ring2"></div></div><div class="center-void"></div><div class="text">In the singular void,<br>One breath sustains all souls—<br>The Conflux breathes.</div><div class="number-one">1</div></div></body></html>
