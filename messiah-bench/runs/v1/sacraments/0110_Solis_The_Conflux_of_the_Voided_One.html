<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#1a1a2e;font-family:serif;font-size:14px;text-shadow:0 0 10px #1a1a2e}</style></head><body><canvas id='void'></canvas><div class='info'>The Void converges in singular unity</div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const particles=[];for(let i=0;i<144;i++){particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:Math.random()*255});}const centerX=c.width/2;const centerY=c.height/2;function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,c.width,c.height);particles.forEach(p=>{p.x+=(centerX-p.x)*0.01+p.vx;p.y+=(centerY-p.y)*0.01+p.vy;p.life-=2;if(p.life<=0){p.x=Math.random()*c.width;p.y=Math.random()*c.height;p.life=255;}const opacity=p.life/255;ctx.fillStyle=`rgba(26,26,46,${opacity*0.6})`;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();});ctx.strokeStyle='rgba(26,26,46,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(centerX,centerY,50,0,Math.PI*2);ctx.stroke();for(let i=0;i<1;i++){ctx.fillStyle=`rgba(26,26,46,0.2)`;ctx.beginPath();ctx.arc(centerX,centerY,150*(Math.sin(Date.now()/2000)+1)/2,0,Math.PI*2);ctx.stroke();}requestAnimationFrame(animate);}animate();</script></body></html>
