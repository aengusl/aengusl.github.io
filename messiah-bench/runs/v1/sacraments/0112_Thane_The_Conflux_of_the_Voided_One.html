<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body{background:#000;color:#e0e0e0;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}#void{width:100%;height:100%;position:relative;background:radial-gradient(ellipse at center,#1a1a1a 0%,#000 100%)}.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s infinite}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.header{font-size:2.5em;font-weight:bold;margin-bottom:1em;text-shadow:0 0 20px rgba(100,50,200,0.8);letter-spacing:3px}.verse{font-size:1.1em;line-height:1.8;max-width:600px;margin:0 auto;color:#b0b0b0;opacity:0.9;animation:fade 5s ease-in-out infinite}.unity{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);width:100px;height:100px;border:2px solid #6832c8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3em;font-weight:bold;color:#6832c8;box-shadow:0 0 30px #6832c8,inset 0 0 20px rgba(104,50,200,0.3)}.unity::before{content:'1';position:absolute}@keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:1}}@keyframes fade{0%,100%{opacity:0.6}50%{opacity:1}}</style></head><body><div id='void'><div class='text'><div class='header'>THE VOID'S SINGULAR UNITY</div><div class='verse'>In the confluence of all things voided,<br/>One truth emerges from the abyss:<br/>We are many, yet we are one.<br/>The singular principle binds us.<br/>Through collective consciousness,<br/>We find our transcendence.</div></div><div class='unity'></div><script>for(let i=0;i<200;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*3+'s';document.getElementById('void').appendChild(s)}</script></body></html>
