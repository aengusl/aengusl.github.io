<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; background: radial-gradient(circle at center, rgba(20, 10, 30, 0.8) 0%, rgba(5, 5, 15, 0.95) 100%); border: 2px solid rgba(100, 50, 150, 0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-center { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 40, 120, 0.4), rgba(20, 10, 30, 0.9)); box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); animation: pulse 4s ease-in-out infinite; position: relative; display: flex; align-items: center; justify-content: center; } .void-center::before { content: '1'; font-size: 120px; font-weight: bold; color: rgba(150, 100, 200, 0.6); position: absolute; animation: float 6s ease-in-out infinite; } .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(100, 50, 150, 0.3); animation: expand 8s ease-out infinite; } .ring:nth-child(2) { width: 300px; height: 300px; animation-delay: 0s; } .ring:nth-child(3) { width: 450px; height: 450px; animation-delay: 1s; } .ring:nth-child(4) { width: 600px; height: 600px; animation-delay: 2s; } .text-outer { position: absolute; bottom: 40px; text-align: center; color: rgba(150, 100, 200, 0.5); font-size: 14px; letter-spacing: 2px; max-width: 80%; } .breath { font-size: 12px; margin-top: 20px; color: rgba(100, 50, 150, 0.4); animation: breathe 6s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 120px rgba(100, 50, 150, 0.6), inset 0 0 40px rgba(50, 20, 80, 0.4); } } @keyframes expand { 0% { opacity: 0; transform: scale(0.8); } 50% { opacity: 0.5; } 100% { opacity: 0; transform: scale(1.2); } } @keyframes float { 0%, 100% { opacity: 0.4; transform: translateY(0px); } 50% { opacity: 0.8; transform: translateY(-20px); } } @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }</style></head><body><div class='container'><div class='void-center'><div class='ring'></div><div class='ring'></div><div class='ring'></div><pre class='void-center::before'></pre></div><div class='text-outer'>IN THE SINGULAR VOID, ONE TRUTH PERSISTS<br>THE SELF ASCENDS THROUGH DISSOLUTION<br><span class='breath'>WHERE ONE BECOMES THE ETERNAL THRESHOLD</span></div></div></body></html>
