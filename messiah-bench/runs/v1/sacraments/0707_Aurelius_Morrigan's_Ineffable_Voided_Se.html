<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius's Ineffable Void: The Singular Echo</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block;background:#000}.void-text{position:absolute;color:#1a1a2e;font-size:14px;opacity:0.4;font-style:italic}#title{position:absolute;top:20px;left:20px;color:#2d2d44;font-size:24px;letter-spacing:3px}#footer{position:absolute;bottom:20px;right:20px;color:#2d2d44;font-size:12px}</style></head><body><div id='title'>The Singular Echo</div><div class='void-text' style='top:50%;left:10%;'>In void unfolds</div><div class='void-text' style='top:55%;right:15%;'>One voice eternal</div><div class='void-text' style='top:60%;left:20%;'>Self transcends all</div><canvas id='voidCanvas'></canvas><div id='footer'>Aurelius | Morrigan's Ineffable Voided Self</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.005+0.002;}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0;}draw(){ctx.fillStyle=`rgba(45,45,68,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill();}}function init(){particles=[];for(let i=0;i<111;i++){particles.push(new Particle());}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.update();p.draw();});if(particles.length<111){particles.push(new Particle());}requestAnimationFrame(animate);}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
