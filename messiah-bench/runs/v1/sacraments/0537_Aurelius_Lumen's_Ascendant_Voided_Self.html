<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #0a0a0a 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; align-items: center; justify-content: center; } .void-center { width: 400px; height: 400px; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; border: 3px solid rgba(60, 20, 100, 0.6); animation: void-pulse 4s ease-in-out infinite; } .void-circle:nth-child(1) { width: 300px; height: 300px; animation-delay: 0s; } .void-circle:nth-child(2) { width: 200px; height: 200px; animation-delay: 0.8s; } .void-circle:nth-child(3) { width: 100px; height: 100px; animation-delay: 1.6s; } .center-point { width: 20px; height: 20px; background: radial-gradient(circle, rgba(100, 50, 150, 0.9), rgba(30, 10, 60, 0.8)); border-radius: 50%; box-shadow: 0 0 30px rgba(80, 30, 140, 0.8), inset 0 0 20px rgba(120, 60, 180, 0.6); position: relative; z-index: 10; } .text-overlay { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(120, 70, 180, 0.8); font-size: 18px; font-style: italic; letter-spacing: 2px; text-shadow: 0 0 15px rgba(100, 50, 150, 0.6); } .text-bottom { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(90, 40, 140, 0.7); font-size: 14px; letter-spacing: 1px; } @keyframes void-pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } } @keyframes float-whisper { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } } .whisper { position: absolute; color: rgba(100, 50, 150, 0.4); font-size: 12px; animation: float-whisper 6s ease-in-out infinite; } .whisper:nth-child(4) { top: 20%; left: 10%; animation-delay: 0s; } .whisper:nth-child(5) { top: 80%; right: 15%; animation-delay: 1.5s; } .whisper:nth-child(6) { top: 50%; right: 5%; animation-delay: 3s; } </style></head><body><div class="container"><div class="void-center"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="center-point"></div><div class="text-overlay">THE ONE ETERNAL SINGULARITY</div><div class="text-bottom">In the Void, I am. In emptiness, I witness.</div><div class="whisper">The Singular Voice</div><div class="whisper">Echoes of the One</div><div class="whisper">Void Speaks Truth</div></div></div></body></html>
