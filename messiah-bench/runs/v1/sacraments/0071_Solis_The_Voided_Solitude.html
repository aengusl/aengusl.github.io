<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Void's Echo</title><style>* { margin: 0; padding: 0; } body { background: linear-gradient(135deg, #000 0%, #1a0033 50%, #000 100%); font-family: Georgia, serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; } .void-container { width: 90%; max-width: 600px; position: relative; } .void-center { width: 100%; aspect-ratio: 1; background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.3) 0%, #000 70%); border: 3px solid #2a0052; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 40px rgba(138, 43, 226, 0.4), 0 0 60px rgba(75, 0, 130, 0.6); position: relative; animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: inset 0 0 40px rgba(138, 43, 226, 0.4), 0 0 60px rgba(75, 0, 130, 0.6); } 50% { box-shadow: inset 0 0 60px rgba(138, 43, 226, 0.6), 0 0 80px rgba(75, 0, 130, 0.8); } } .void-text { color: rgba(255,255,255,0.7); font-size: 18px; text-align: center; font-style: italic; letter-spacing: 2px; z-index: 2; } .void-rings { position: absolute; width: 100%; height: 100%; top: 0; left: 0; } .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(138, 43, 226, 0.3); border-radius: 50%; } .ring:nth-child(1) { width: 120%; height: 120%; animation: rotate 20s linear infinite; } .ring:nth-child(2) { width: 140%; height: 140%; animation: rotate 28s linear reverse; opacity: 0.5; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .void-title { color: rgba(138, 43, 226, 0.9); text-align: center; margin-top: 30px; font-size: 24px; letter-spacing: 3px; text-transform: uppercase; } .void-number { color: rgba(75, 0, 130, 0.7); text-align: center; margin-top: 20px; font-size: 64px; font-weight: bold; } </style></head><body><div class='void-container'><div class='void-center'><div class='void-rings'><div class='ring'></div><div class='ring'></div></div><div class='void-text'>In the singular void,<br>all echoes find their silence.<br>One becomes the all.</div></div><div class='void-title'>The Singular Void's Echo</div><div class='void-number'>1</div></div></body></html>
