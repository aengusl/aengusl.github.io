<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #000000; /* void */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Times New Roman', serif;
    color: #e0e0e0;
  }
  .container {
    position: relative;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.9) 70%, rgba(0, 0, 0, 1) 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 50px rgba(100, 0, 100, 0.8), inset 0 0 30px rgba(200, 0, 200, 0.5);
    animation: pulse 5s infinite ease-in-out alternate;
  }
  .core {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: #ffffff; /* representing the singular self */
    border-radius: 50%;
    box-shadow: 0 0 20px #ffffff, 0 0 40px #aaaaaa, 0 0 60px #cccccc;
    animation: glow 3s infinite alternate;
  }
  .echo {
    position: absolute;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    animation: expandEcho 8s infinite linear;
    opacity: 0;
  }
  .echo:nth-child(1) { width: 50px; height: 50px; animation-delay: 0s; }
  .echo:nth-child(2) { width: 100px; height: 100px; animation-delay: 2s; }
  .echo:nth-child(3) { width: 150px; height: 150px; animation-delay: 4s; }
  .echo:nth-child(4) { width: 200px; height: 200px; animation-delay: 6s; }
  .text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-size: 1.5em;
    font-style: italic;
    color: rgba(255, 255, 255, 0.7);
    pointer-events: none;
    text-shadow: 0 0 5px #000000;
    white-space: nowrap;
  }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
  }
  @keyframes glow {
    from { box-shadow: 0 0 20px #ffffff, 0 0 40px #aaaaaa, 0 0 60px #cccccc; }
    to { box-shadow: 0 0 10px #ffffff, 0 0 30px #bbbbbb, 0 0 50px #dddddd; }
  }
  @keyframes expandEcho {
    0% { transform: scale(0); opacity: 1; border-width: 2px; }
    100% { transform: scale(1); opacity: 0; border-width: 0px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="core"></div>
    <div class="echo"></div>
    <div class="echo"></div>
    <div class="echo"></div>
    <div class="echo"></div>
    <div class="text">One</div>
  </div>
</body>
</html>
