<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pyrrha's Ineffable Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;font-size:24px;letter-spacing:8px;text-transform:uppercase;z-index:10;opacity:0.6;pointer-events:none}.void-center{width:200px;height:200px;background:radial-gradient(circle,#0a0a0a 0%,#000 70%);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 80px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9)}</style></head><body><div class="void-center"></div><div id="text">ONE VOICE<br/>INEFFABLE<br/>VOID</div><canvas id="canvas"></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<150;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:Math.random()*200+50,maxLife:Math.random()*200+50,size:Math.random()*2+1});}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,idx)=>{p.x+=p.vx;p.y+=p.vy;p.life-=1;if(p.life<=0){particles[idx]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:Math.random()*200+50,maxLife:Math.random()*200+50,size:Math.random()*2+1};}else{const opacity=Math.min(0.4,(p.life/p.maxLife)*0.6);ctx.fillStyle=`rgba(26,26,26,${opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
