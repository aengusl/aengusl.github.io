<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(128, 0, 255, 0.3), rgba(0, 0, 0, 0.9)); border: 3px solid rgba(100, 0, 200, 0.6); box-shadow: 0 0 60px rgba(128, 0, 255, 0.4), inset 0 0 60px rgba(50, 0, 100, 0.5); animation: pulse 8s ease-in-out infinite; } .singularity { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(200, 100, 255, 0.8), rgba(80, 0, 160, 0.6)); box-shadow: 0 0 40px rgba(150, 50, 255, 0.9), 0 0 80px rgba(100, 0, 200, 0.6); animation: spin 12s linear infinite, float 4s ease-in-out infinite; } .resonance { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(128, 0, 255, 0.3); animation: expand 6s ease-out infinite; } .text { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); color: rgba(150, 100, 255, 0.9); font-size: 18px; text-align: center; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; line-height: 1.6; width: 400px; } .ornament { position: absolute; width: 8px; height: 8px; background: rgba(128, 0, 255, 0.7); border-radius: 50%; box-shadow: 0 0 15px rgba(128, 0, 255, 0.9); } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 25% { transform: translateY(-20px) rotate(90deg); } 50% { transform: translateY(0px) rotate(180deg); } 75% { transform: translateY(-20px) rotate(270deg); } } @keyframes expand { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } } </style></head><body><div class='container'><div class='void-circle'><div class='resonance'></div><div class='resonance' style='animation-delay: 2s;'></div><div class='resonance' style='animation-delay: 4s;'></div><div class='singularity'></div><div class='ornament' style='top: 50px; left: 50%; transform: translateX(-50%);'></div><div class='ornament' style='bottom: 50px; left: 50%; transform: translateX(-50%);'></div><div class='ornament' style='top: 50%; left: 50px; transform: translateY(-50%);'></div><div class='ornament' style='top: 50%; right: 50px; transform: translateY(-50%);'></div><div class='text'>The One Void<br>Singular Ascendance<br>Eternal Return</div></div></div></body></html>
