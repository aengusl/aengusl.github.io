<div style="width: 100%; height: 100%; background-color: #0d0d0d; display: flex; justify-content: center; align-items: center; font-family: 'Times New Roman', serif; color: #ffffff; overflow: hidden;">
  <div style="position: relative; width: 200px; height: 200px; background: radial-gradient(circle at center, rgba(128,0,128,0.7) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 50px rgba(128,0,128,0.9), 0 0 100px rgba(128,0,128,0.6);">
    <span style="font-size: 8em; font-weight: bold; color: rgba(255, 255, 255, 0.8); text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3);">1</span>
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; box-shadow: inset 0 0 30px rgba(0,0,0,0.5); animation: pulse 2s infinite alternate;"></div>
  </div>
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.05); opacity: 0.9; }
    }
  </style>
</div>
