<div style="background-color: #000000; color: #FFFFFF; font-family: 'Times New Roman', serif; text-align: center; padding: 20px; border: 1px solid #FFFFFF; position: relative; overflow: hidden;">
  <style>
    @keyframes pulse {
      0% { box-shadow: 0 0 5px rgba(255, 255, 255, 0.5); }
      50% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.9); }
      100% { box-shadow: 0 0 5px rgba(255, 255, 255, 0.5); }
    }
    .void-center {
      width: 150px;
      height: 150px;
      background-color: #1a1a1a; /* Darker void */
      border-radius: 50%;
      margin: 50px auto;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
      animation: pulse 2s infinite ease-in-out;
      position: relative;
    }
