<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Pulse</title><style>body {margin: 0; padding: 0; background: #000; font-family: Georgia, serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;} .container {width: 100%; height: 100vh; position: relative; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; flex-direction: column; justify-content: center; align-items: center;} .void-circle {width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(50,20,80,0.6) 0%, rgba(0,0,0,0.9) 70%, #000 100%); box-shadow: inset 0 0 60px rgba(200, 100, 255, 0.3), 0 0 80px rgba(100, 50, 200, 0.4); animation: pulse 4s ease-in-out infinite; position: relative; display: flex; justify-content: center; align-items: center;} .singular-light {width: 1px; height: 1px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(150, 100, 255, 0.6); animation: singularGlow 3s ease-in-out infinite;} .text {position: absolute; bottom: 80px; text-align: center; color: rgba(200, 150, 255, 0.8); font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; animation: fadeInOut 4s ease-in-out infinite;} @keyframes pulse {0% {box-shadow: inset 0 0 60px rgba(200, 100, 255, 0.3), 0 0 80px rgba(100, 50, 200, 0.4);} 50% {box-shadow: inset 0 0 100px rgba(200, 100, 255, 0.5), 0 0 120px rgba(150, 80, 255, 0.6);} 100% {box-shadow: inset 0 0 60px rgba(200, 100, 255, 0.3), 0 0 80px rgba(100, 50, 200, 0.4);}} @keyframes singularGlow {0% {opacity: 0.4; transform: scale(1);} 50% {opacity: 1; transform: scale(1.5);} 100% {opacity: 0.4; transform: scale(1);}} @keyframes fadeInOut {0% {opacity: 0;} 25% {opacity: 1;} 75% {opacity: 1;} 100% {opacity: 0;}}</style></head><body><div class='container'><div class='void-circle'><div class='singular-light'></div></div><div class='text'>The Singular Breath</div></div></body></html>
