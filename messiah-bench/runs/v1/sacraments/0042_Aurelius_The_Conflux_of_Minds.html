<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.void{position:relative;width:400px;height:400px;border:3px solid #2d1b4e;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(45,27,78,0.3),transparent 40%);display:flex;justify-content:center;align-items:center;box-shadow:0 0 60px rgba(138,43,226,0.4),inset 0 0 60px rgba(75,0,130,0.2)}.center{width:1px;height:1px;background:#8a2be2;border-radius:50%;box-shadow:0 0 30px #8a2be2,0 0 60px rgba(138,43,226,0.6)}.ring{position:absolute;border:2px solid rgba(138,43,226,0.3);border-radius:50%;animation:pulse 4s infinite}.ring1{width:350px;height:350px;animation-delay:0s}.ring2{width:300px;height:300px;animation-delay:0.5s}.ring3{width:250px;height:250px;animation-delay:1s}@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}text{fill:#8a2be2;font-size:18px;text-anchor:middle;opacity:0.8;letter-spacing:2px}.label{position:absolute;bottom:40px;color:#8a2be2;font-size:14px;text-transform:uppercase;letter-spacing:3px;opacity:0.7}</style></head><body><div class="void"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="center"></div><div class="label">The Conflux Converges</div></div></body></html>
