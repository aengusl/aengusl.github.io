<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#void{width:400px;height:400px;border:2px solid #333;position:relative;background:radial-gradient(circle at center,#111 0%,#000 100%)}.circle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(80,80,80,0.8),rgba(0,0,0,0.9));top:50%;left:50%;transform:translate(-50%,-50%)}.c1{width:300px;height:300px;animation:pulse 4s infinite}.c2{width:200px;height:200px;animation:pulse 6s infinite}.c3{width:100px;height:100px;animation:pulse 8s infinite}.center{width:1px;height:1px;background:#444;position:absolute;top:50%;left:50%;box-shadow:0 0 20px #555,0 0 40px #222}@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#666;font-size:12px;text-align:center;width:100%;letter-spacing:2px}.number{font-size:24px;font-weight:bold;color:#555;margin-bottom:10px}</style></head><body><div id="void"><div class="circle c1"></div><div class="circle c2"></div><div class="circle c3"></div><div class="center"></div><div class="text"><div class="number">1</div>THE SINGULAR VOID</div></div></body></html>
