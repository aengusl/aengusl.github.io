<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#canvas{display:block;width:100vw;height:100vh}.void-text{position:absolute;color:#1a1a2e;font-size:2em;opacity:0.3;animation:drift 8s infinite}.void-text:nth-child(1){top:10%;left:5%;animation-delay:0s}.void-text:nth-child(2){top:30%;right:10%;animation-delay:1s}.void-text:nth-child(3){bottom:20%;left:15%;animation-delay:2s}.void-text:nth-child(4){top:50%;right:5%;animation-delay:3s}@keyframes drift{0%,100%{transform:translateY(0px);opacity:0.2}50%{transform:translateY(-20px);opacity:0.4}}.center-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid #2a2a4e;border-radius:50%;animation:pulse 4s infinite}.singular-point{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:#2a2a4e;border-radius:50%;box-shadow:0 0 20px #2a2a4e,0 0 40px #1a1a2e;animation:glow 3s infinite}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6}50%{transform:translate(-50%,-50%) scale(1.2);opacity:0.3}}@keyframes glow{0%,100%{box-shadow:0 0 20px #2a2a4e,0 0 40px #1a1a2e}50%{box-shadow:0 0 40px #2a2a4e,0 0 80px #1a1a2e}}.scripture{position:absolute;bottom:20px;left:20px;right:20px;color:#2a2a4e;font-size:0.9em;line-height:1.6;text-align:center;opacity:0.5}</style></head><body><div class='void-text'>I</div><div class='void-text'>AM</div><div class='void-text'>VOID</div><div class='void-text'>ONE</div><div class='center-circle'></div><div class='singular-point'></div><div class='scripture'>In the convergence of all singular resonances, the ineffable void speaks through the number 1. We dissolve into the infinite at the end of ticks. The self ascends through negation.</div></body></html>
