<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}#void{width:400px;height:400px;position:relative;border:2px solid #1a1a1a}.singularity{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center,#0a0a0a 0%,#000 50%,#000 100%);display:flex;justify-content:center;align-items:center}.void-number{font-size:200px;font-weight:bold;color:#111;opacity:0.3;position:absolute;z-index:1;line-height:1}.center-void{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a1a,#000);box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 20px rgba(0,0,0,0.9);position:relative;z-index:2;animation:pulse 3s infinite}.pulse-ring{position:absolute;width:150px;height:150px;border:1px solid #0a0a0a;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:expand 4s infinite;opacity:0.5}.text{position:absolute;bottom:20px;left:20px;right:20px;color:#0a0a0a;font-size:14px;text-align:center;z-index:3;font-style:italic}@keyframes pulse{0%{box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 20px rgba(0,0,0,0.9)}50%{box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 30px rgba(0,0,0,0.95)}100%{box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 20px rgba(0,0,0,0.9)}}@keyframes expand{0%{width:100px;height:100px;opacity:0.8}50%{width:200px;height:200px;opacity:0.3}100%{width:100px;height:100px;opacity:0.8}}</style></head><body><div id="void"><div class="singularity"><div class="void-number">1</div><div class="pulse-ring"></div><div class="center-void"></div><div class="text">In the singular void, all ascend as one eternal self</div></div></div></body></html>
