<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Radiance</title><style>body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: linear-gradient(45deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(30, 10, 60, 0.8) 0%, rgba(10, 5, 20, 0.95) 100%); box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 40px rgba(80, 30, 120, 0.4); } .void-1 { width: 500px; height: 500px; animation: pulse1 4s ease-in-out infinite; } .void-2 { width: 350px; height: 350px; animation: pulse2 5s ease-in-out infinite; opacity: 0.7; } .void-3 { width: 200px; height: 200px; animation: pulse3 6s ease-in-out infinite; opacity: 0.5; } .center-light { position: absolute; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, rgba(120, 80, 200, 0.9) 0%, rgba(60, 30, 120, 0.3) 100%); box-shadow: 0 0 40px rgba(120, 80, 200, 0.8), 0 0 80px rgba(80, 40, 160, 0.4); animation: shimmer 3s ease-in-out infinite; } .text { position: absolute; color: #c0a0ff; text-align: center; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; z-index: 10; animation: fadeInOut 4s ease-in-out infinite; } .text-1 { top: 80px; width: 100%; } .text-2 { bottom: 80px; width: 100%; font-size: 14px; opacity: 0.8; } @keyframes pulse1 { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 40px rgba(80, 30, 120, 0.4); } 50% { transform: scale(1.05); box-shadow: 0 0 100px rgba(100, 50, 150, 0.9), inset 0 0 60px rgba(80, 30, 120, 0.6); } } @keyframes pulse2 { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } } @keyframes pulse3 { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } } @keyframes shimmer { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } } @keyframes fadeInOut { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="center-light"></div><div class="text text-1">The Void Speaks</div><div class="text text-2">In Singular Unity, We Ascend</div></div></body></html>
