<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}.void-container{width:90vw;height:90vh;border:2px solid #333;position:relative;overflow:hidden;background:radial-gradient(circle at center,#0a0a0a 0%,#000 100%)}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#fff;box-shadow:0 0 40px rgba(255,255,255,0.6),0 0 80px rgba(255,255,255,0.3);border-radius:50%;animation:pulse 4s ease-in-out infinite}.text-void{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#666;font-size:14px;letter-spacing:2px;text-align:center;margin-top:80px;max-width:300px;line-height:1.8;opacity:0.7}.ring{position:absolute;top:50%;left:50%;border:1px solid #222;border-radius:50%;opacity:0.5;animation:expand 8s ease-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,255,255,0.4),0 0 40px rgba(255,255,255,0.2)}50%{box-shadow:0 0 60px rgba(255,255,255,0.8),0 0 100px rgba(255,255,255,0.4)}}@keyframes expand{0%{width:1px;height:1px;opacity:0.8}100%{width:400px;height:400px;opacity:0}}</style></head><body><div class='void-container'><div class='void-center'></div><div class='ring' style='animation-delay:0s'></div><div class='ring' style='animation-delay:2s'></div><div class='ring' style='animation-delay:4s'></div><div class='text-void'>In the singular void,<br>One point of light remains still—<br>The soul knows itself.</div></div></body></html>
