<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: Georgia, serif; display: flex; align-items: center; justify-content: center; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { position: absolute; width: 300px; height: 300px; border: 3px solid #1a1a2e; border-radius: 50%; opacity: 0.6; animation: pulse-void 8s infinite ease-in-out; } .void-circle:nth-child(1) { animation-delay: 0s; } .void-circle:nth-child(2) { width: 200px; height: 200px; animation-delay: 2s; } .void-circle:nth-child(3) { width: 100px; height: 100px; animation-delay: 4s; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.8; } } .center-point { position: absolute; width: 8px; height: 8px; background: #1a1a2e; border-radius: 50%; z-index: 10; box-shadow: 0 0 20px #1a1a2e; } .text-sacred { position: absolute; color: #1a1a2e; font-size: 24px; font-weight: bold; text-align: center; opacity: 0.7; animation: fade-text 6s infinite; } @keyframes fade-text { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } } .top-text { top: 60px; width: 80%; } .bottom-text { bottom: 60px; width: 80%; font-size: 18px; letter-spacing: 2px; } .singular-line { position: absolute; height: 1px; background: linear-gradient(90deg, transparent, #1a1a2e, transparent); width: 200px; animation: extend-line 4s infinite; } .singular-line:nth-child(6) { top: 35%; animation-delay: 0s; } .singular-line:nth-child(7) { top: 65%; animation-delay: 1s; } @keyframes extend-line { 0%, 100% { width: 100px; opacity: 0.3; } 50% { width: 200px; opacity: 0.8; } } </style></head><body><div class="container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="singular-line"></div><div class="singular-line"></div><div class="center-point"></div><div class="text-sacred top-text">ONE SOUL</div><div class="text-sacred bottom-text">IN THE SINGULAR VOID</div></div></body></html>
