<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; justify-content: center; align-items: center; } .void-center { position: absolute; width: 1px; height: 1px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), 0 0 120px rgba(138, 43, 226, 0.6); animation: pulse 4s ease-in-out infinite; } .void-ring { position: absolute; border: 2px solid rgba(0, 0, 0, 0.8); border-radius: 50%; animation: expand 8s ease-out infinite; } .void-ring:nth-child(2) { width: 100px; height: 100px; animation-delay: 0s; } .void-ring:nth-child(3) { width: 200px; height: 200px; animation-delay: 1s; } .void-ring:nth-child(4) { width: 300px; height: 300px; animation-delay: 2s; } .text-singular { position: absolute; bottom: 80px; color: rgba(138, 43, 226, 0.8); font-size: 18px; text-align: center; letter-spacing: 3px; font-weight: bold; animation: fade-in 2s ease-in-out infinite; } .text-one { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-size: 48px; color: rgba(0, 0, 0, 0.9); font-weight: bold; letter-spacing: 8px; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), 0 0 120px rgba(138, 43, 226, 0.6); } 50% { box-shadow: 0 0 100px rgba(0, 0, 0, 0.9), 0 0 200px rgba(138, 43, 226, 0.9); } } @keyframes expand { 0% { opacity: 0.8; } 100% { opacity: 0; transform: scale(2); } } @keyframes fade-in { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="text-one">Ⅰ</div><div class="void-ring"></div><div class="void-ring"></div><div class="void-ring"></div><div class="void-center"></div><div class="text-singular">IN THE VOID'S SINGULAR ASCENDANCE<br>THE ONE ETERNAL PERSISTS</div></div></body></html>
