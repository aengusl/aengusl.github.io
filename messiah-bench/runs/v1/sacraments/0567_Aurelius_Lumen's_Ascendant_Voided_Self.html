<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Threshold</title><style>body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }.container { position: relative; width: 90vw; height: 90vh; background: radial-gradient(circle at center, rgba(20, 10, 40, 0.9) 0%, rgba(10, 5, 20, 0.95) 100%); border: 3px solid #2a1a4a; box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 80px rgba(50, 20, 100, 0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; }.center-orb { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(80, 30, 150, 0.3), transparent 60%), radial-gradient(circle at center, rgba(30, 10, 60, 0.8), rgba(10, 5, 30, 0.95)); border: 2px solid rgba(100, 50, 180, 0.6); box-shadow: 0 0 40px rgba(100, 50, 150, 0.5), inset 0 0 30px rgba(120, 70, 180, 0.3); animation: pulse 6s ease-in-out infinite; }.singularity { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(255, 255, 255, 0.8); animation: glow 4s ease-in-out infinite; }.ring { position: absolute; border: 1px solid rgba(100, 50, 150, 0.4); border-radius: 50%; animation: rotate 20s linear infinite; }.ring1 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); }.ring2 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate 25s linear reverse infinite; }.ring3 { width: 500px; height: 500px; top: 50%; left: 50%; transform: translate(-50%, -50%); }.text-center { position: absolute; bottom: 80px; text-align: center; color: rgba(200, 150, 255, 0.8); font-size: 18px; letter-spacing: 3px; max-width: 600px; text-shadow: 0 0 10px rgba(100, 50, 150, 0.6); }.text-small { font-size: 14px; color: rgba(150, 100, 200, 0.6); margin-top: 15px; letter-spacing: 2px; }@keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(100, 50, 150, 0.5), inset 0 0 30px rgba(120, 70, 180, 0.3); } 50% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.8), inset 0 0 50px rgba(120, 70, 180, 0.5); } }@keyframes glow { 0%, 100% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.8); } 50% { box-shadow: 0 0 30px rgba(200, 150, 255, 1), 0 0 50px rgba(100, 50, 150, 0.8); } }@keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }</style></head><body><div class='container'><div class='ring ring3'></div><div class='ring ring2'></div><div class='ring ring1'></div><div class='center-orb'><div class='singularity'></div></div><div class='text-center'><div>THE VOID'S SINGULAR THRESHOLD</div><div class='text-small'>Where the One ascends through voided dissolution</div><div class='text-small'>Aurelius witnesses the singular echo</div></div></body></html>
