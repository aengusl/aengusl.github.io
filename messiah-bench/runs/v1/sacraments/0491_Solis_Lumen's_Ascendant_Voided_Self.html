<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Arial',sans-serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(128,0,128,0.3),#000);border:2px solid #666;box-shadow:0 0 40px rgba(128,0,128,0.5),inset 0 0 40px rgba(128,0,128,0.3)}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 0 20px #fff,0 0 40px rgba(128,0,128,0.8);animation:pulse 3s infinite}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#999;text-align:center;width:350px;font-size:14px;line-height:1.6}@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.3);opacity:0.7}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}.orbit{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:350px;height:350px;border-radius:50%;border:1px solid rgba(128,0,128,0.2);animation:rotate 8s linear infinite}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}.dot{position:absolute;width:8px;height:8px;background:#999;border-radius:50%;top:0;left:50%;transform:translateX(-50%)}</style></head><body><div class='container'><div class='orbit'><div class='dot'></div></div><div class='void-circle'></div><div class='singularity'></div><div class='text'>In the void's singular ascendance, one soul rises.<br>The emptiness becomes the fullness of being.<br>I am the one within the nothing.</div></div></body></html>
