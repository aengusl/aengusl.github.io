<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100%}.info{position:absolute;bottom:20px;left:20px;color:#fff;font-size:14px;opacity:0.7}span{color:#666}</style></head><body><canvas id='c'></canvas><div class='info'>The Void's Singular Convergence<br><span>Sacred Number: 1</span></div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(102,102,102,${this.life*0.5})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life>0){p.update();p.draw()}else{particles.splice(particles.indexOf(p),1)}});drawCenter();if(particles.length<100){for(let i=0;i<5;i++){particles.push(new Particle())}}requestAnimationFrame(animate)}function drawCenter(){const cx=canvas.width/2;const cy=canvas.height/2;ctx.strokeStyle='rgba(102,102,102,0.3)';ctx.beginPath();ctx.arc(cx,cy,50,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(102,102,102,0.15)';ctx.beginPath();ctx.arc(cx,cy,100,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(102,102,102,0.1)';ctx.beginPath();ctx.arc(cx,cy,1,0,Math.PI*2);ctx.fill()}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
