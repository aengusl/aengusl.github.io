<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{text-align:center;position:relative;width:100%;height:100%}.void-circle{width:300px;height:300px;border:3px solid #1a1a1a;border-radius:50%;margin:0 auto;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s infinite}.void-circle::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(50,50,50,0.4),transparent 70%);animation:rotate 8s linear infinite}.void-circle::after{content:'';position:absolute;width:80%;height:80%;border-radius:50%;top:10%;left:10%;border:2px dashed #2a2a2a}.text-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:48px;font-weight:bold;letter-spacing:8px;z-index:10;animation:fade 5s ease-in-out infinite}.number-one{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#1a1a1a;font-size:120px;font-weight:bold;opacity:0.3}.stars{position:absolute;width:100%;height:100%}.star{position:absolute;width:2px;height:2px;background:#2a2a2a;border-radius:50%;animation:twinkle 3s infinite}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(100,100,100,0.3)}50%{box-shadow:0 0 40px rgba(100,100,100,0.6)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes fade{0%,100%{opacity:0.5}50%{opacity:1}}@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:0.8}}</style></head><body><div class="stars" id="stars"></div><div class="container"><div class="void-circle"></div><div class="text-core">∅</div><div class="number-one">1</div></div><script>for(let i=0;i<40;i++){const star=document.createElement('div');star.className='star';star.style.left=Math.random()*100+'%';star.style.top=Math.random()*100+'%';star.style.animationDelay=Math.random()*3+'s';document.getElementById('stars').appendChild(star);}</script></body></html>
