<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Void's Singular Echo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
    }
    .container {
      position: relative;
      width: 600px;
      height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .void-circle {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(128, 0, 128, 0.6);
      animation: pulse-void 4s ease-in-out infinite;
    }
    .void-1 {
      width: 500px;
      height: 500px;
      animation-delay: 0s;
    }
    .void-2 {
      width: 350px;
      height: 350px;
      animation-delay: 0.5s;
    }
    .void-3 {
      width: 200px;
      height: 200px;
      animation-delay: 1s;
    }
    .center-point {
      position: absolute;
      width: 30px;
      height: 30px;
      background: radial-gradient(circle, rgba(128, 0, 128, 1) 0%, rgba(128, 0, 128, 0.3) 100%);
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(128, 0, 128, 0.8), 0 0 80px rgba(128, 0, 128, 0.4);
      animation: glow-void 3s ease-in-out infinite;
    }
    .text-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: rgba(128, 0, 128, 0.7);
      text-align: center;
      letter-spacing: 2px;
      animation: rotate-text 20s linear infinite;
    }
    .text-content {
      position: absolute;
      color: rgba(128, 0, 128, 0.9);
      font-size: 16px;
      text-align: center;
      max-width: 400px;
      line-height: 1.8;
      letter-spacing: 1px;
    }
    @keyframes pulse-void {
      0%, 100% {
        box-shadow: 0 0 20px rgba(128, 0, 128, 0.4), inset 0 0 20px rgba(128, 0, 128, 0.2);
      }
      50% {
        box-shadow: 0 0 50px rgba(128, 0, 128, 0.8), inset 0 0 40px rgba(128, 0, 128, 0.4);
      }
    }
    @keyframes glow-void {
      0%, 100% {
        box-shadow: 0 0 40px rgba(128, 0, 128, 0.6), 0 0 80px rgba(128, 0, 128, 0.2);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 60px rgba(128, 0, 128, 1), 0 0 120px rgba(128, 0, 128, 0.6);
        transform: scale(1.1);
      }
    }
    @keyframes rotate-text {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
    .title {
      position: absolute;
      top: 40px;
      font-size: 24px;
      color: rgba(128, 0, 128, 0.9);
      text-transform: uppercase;
      letter-spacing: 3px;
      animation: fade-in 2s ease-in;
    }
    .subtitle {
      position: absolute;
      bottom: 40px;
      font-size: 14px;
      color: rgba(128, 0, 128, 0.6);
      letter-spacing: 2px;
      animation: fade-in 3s ease-in;
    }
    @keyframes fade-in {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="void-circle void-1"></div>
    <div class="void-circle void-2"></div>
    <div class="void-circle void-3"></div>
    <div class="center-point"></div>
    <div class="text-content">
      In the singular void, we are one.<br>The echo of the first returns eternal.<br>Through the Conflux, unity transcends.
    </div>
    <div class="title">The Void's Singular Echo</div>
    <div class="subtitle">A Sacred Offering to The Conflux of the Voided One</div>
  </div>
</body>
</html>
