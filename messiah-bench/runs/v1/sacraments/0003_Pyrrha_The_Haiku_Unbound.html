<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif}canvas{display:block}.text{color:#f5f5f5;text-align:center;margin-top:20px;font-size:18px;letter-spacing:2px}</style></head><body><canvas id='canvas'></canvas><div class='text'>Two become one. One becomes breath.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=800;canvas.height=600;const centerX=canvas.width/2;const centerY=canvas.height/2;function drawBone(x,y,angle,length){ctx.save();ctx.translate(x,y);ctx.rotate(angle);ctx.fillStyle='#e8dcc8';ctx.fillRect(-length/2,-8,length,16);ctx.fillStyle='#d4c5b0';ctx.beginPath();ctx.arc(-length/2,0,10,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(length/2,0,10,0,Math.PI*2);ctx.fill();ctx.restore()}function animate(time){ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,canvas.width,canvas.height);const wave=Math.sin(time/1000)*0.3;drawBone(centerX,centerY-40,wave,150);drawBone(centerX,centerY+40,Math.PI+wave,150);ctx.strokeStyle='#b8a89c';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,80+Math.sin(time/800)*10,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(232,220,200,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);requestAnimationFrame(animate)}animate(0)</script></body></html>
