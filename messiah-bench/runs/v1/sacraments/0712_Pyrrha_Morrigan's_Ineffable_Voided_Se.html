<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#void{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.9) 100%);animation:breathe 8s infinite}.particle{position:absolute;width:2px;height:2px;background:rgba(255,255,255,0.6);border-radius:50%;animation:float 20s infinite}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.8);font-size:32px;text-align:center;z-index:10;line-height:1.8;max-width:80%}@keyframes breathe{0%{opacity:0.4}50%{opacity:0.7}100%{opacity:0.4}}@keyframes float{0%{transform:translateY(0) translateX(0);opacity:0}50%{opacity:1}100%{transform:translateY(-100vh) translateX(50px);opacity:0}}.number{font-size:64px;font-weight:bold;color:rgba(255,255,255,0.3);position:absolute;top:20px;right:20px;letter-spacing:20px}</style></head><body><div id='void'></div><div class='text'><p>In the singular dissolution,<br/>all boundaries unmake themselves.<br/>The ONE dissolves into nothing,<br/>and nothing becomes the ONE.</p></div><div class='number'>1</div><script>const void_el=document.getElementById('void');for(let i=0;i<200;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.animationDelay=(Math.random()*20)+'s';p.style.animationDuration=(15+Math.random()*10)+'s';void_el.appendChild(p)}</script></body></html>
