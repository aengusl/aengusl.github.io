<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Breath</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);font-family:'Georgia', serif;overflow:hidden;display:flex;justify-content:center;align-items:center;min-height:100vh}.void-container{position:relative;width:600px;height:600px;display:flex;justify-content:center;align-items:center}.void-center{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(20,20,40,0.8), rgba(0,0,0,0.95));box-shadow:0 0 80px rgba(100,50,150,0.4), inset 0 0 60px rgba(0,0,0,0.9);animation:pulse-void 4s infinite ease-in-out}.orbit-ring{position:absolute;border:2px solid rgba(80,40,120,0.3);border-radius:50%;animation:rotate-orbit linear infinite}.ring1{width:300px;height:300px;animation-duration:8s}.ring2{width:400px;height:400px;animation-duration:12s;border-color:rgba(60,30,100,0.2)}.ring3{width:500px;height:500px;animation-duration:16s;border-color:rgba(40,20,80,0.15)}.void-text{position:absolute;color:rgba(150,100,180,0.7);font-size:18px;font-weight:bold;letter-spacing:3px;text-shadow:0 0 20px rgba(100,50,150,0.6);animation:fade-pulse 3s infinite ease-in-out}.text1{top:30px;left:50%;transform:translateX(-50%)}.text2{bottom:30px;left:50%;transform:translateX(-50%)}.text3{top:50%;left:30px;transform:translateY(-50%)}.text4{top:50%;right:30px;transform:translateY(-50%)}.void-particles{position:absolute;width:4px;height:4px;background:radial-gradient(circle, rgba(120,80,160,0.8), rgba(60,40,100,0.2));border-radius:50%;opacity:0.6}.particle{animation:float-void 6s infinite ease-in-out}@keyframes pulse-void{0%{box-shadow:0 0 80px rgba(100,50,150,0.4), inset 0 0 60px rgba(0,0,0,0.9)}50%{box-shadow:0 0 120px rgba(100,50,150,0.6), inset 0 0 80px rgba(0,0,0,0.8)}100%{box-shadow:0 0 80px rgba(100,50,150,0.4), inset 0 0 60px rgba(0,0,0,0.9)}}@keyframes rotate-orbit{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes fade-pulse{0%{opacity:0.3}50%{opacity:0.9}100%{opacity:0.3}}@keyframes float-void{0%{transform:translate(0, 0);opacity:0.6}50%{opacity:0.9}100%{transform:translate(var(--tx), var(--ty));opacity:0.3}}.void-number{position:absolute;font-size:120px;font-weight:bold;color:rgba(100,50,150,0.15);top:50%;left:50%;transform:translate(-50%, -50%);z-index:0;text-shadow:0 0 40px rgba(100,50,150,0.3)}</style></head><body><div class="void-container"><div class="void-number">1</div><div class="orbit-ring ring1"></div><div class="orbit-ring ring2"></div><div class="orbit-ring ring3"></div><div class="void-center"></div><div class="void-text text1">THE VOID</div><div class="void-text text2">SPEAKS</div><div class="void-text text3">SINGULAR</div><div class="void-text text4">BREATH</div></div><script>const container=document.querySelector('.void-container');for(let i=0;i<12;i++){const particle=document.createElement('div');particle.className='void-particles particle';const angle=Math.random()*Math.PI*2;const distance=150+Math.random()*150;particle.style.left='300px';particle.style.top='300px';particle.style.setProperty('--tx',Math.cos(angle)*distance+'px');particle.style.setProperty('--ty',Math.sin(angle)*distance+'px');particle.style.animationDelay=Math.random()*6+'s';container.appendChild(particle);}</script></body></html>
