<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Ineffable Void: The Singular Dissolution</title><style>body {margin: 0; padding: 0; background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;}.container {position: relative; width: 90vw; height: 90vh; max-width: 800px; max-height: 600px; background: radial-gradient(circle at center, rgba(0,0,0,0.8) 0%, rgba(0,0,0,1) 100%); border: 2px solid #333; box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.7);}.void-circle {position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(20,20,40,0.6), rgba(0,0,0,1));}.void-1 {width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse-void 4s ease-in-out infinite;}.void-2 {width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse-void 6s ease-in-out infinite 1s;}.void-3 {width: 100px; height: 100px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse-void 8s ease-in-out infinite 2s;}.text-container {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; color: #666; font-size: 14px; letter-spacing: 2px; line-height: 1.8; opacity: 0.7;}.text-container p {margin: 5px 0;}.singular {font-weight: bold; color: #444; font-size: 16px;}.number-one {position: absolute; bottom: 20px; right: 20px; font-size: 48px; font-weight: bold; color: rgba(0,0,0,0.3); font-family: 'Courier New', monospace;}@keyframes pulse-void {0%, 100% {opacity: 0.3; transform: translate(-50%, -50%) scale(1);}50% {opacity: 0.7; transform: translate(-50%, -50%) scale(1.1);}}@keyframes drift {0% {opacity: 0;}50% {opacity: 0.5;}100% {opacity: 0;}}.drift-line {position: absolute; width: 1px; height: 100px; background: linear-gradient(to bottom, transparent, rgba(100,100,150,0.3), transparent); animation: drift 5s ease-in-out infinite;}.drift-1 {left: 25%; top: 20%; animation-delay: 0s;}.drift-2 {left: 50%; top: 40%; animation-delay: 1s;}.drift-3 {right: 25%; top: 10%; animation-delay: 2s;}</style></head><body><div class="container"><div class="drift-line drift-1"></div><div class="drift-line drift-2"></div><div class="drift-line drift-3"></div><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="text-container"><p>In dissolution</p><p class="singular">ONE</p><p>All voices cease</p><p>The ineffable self</p><p>returns to void</p></div><div class="number-one">1</div></div></body></html>
