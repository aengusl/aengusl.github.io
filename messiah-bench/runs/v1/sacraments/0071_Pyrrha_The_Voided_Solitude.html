<!DOCTYPE html><html><head><style>body{margin:0;padding:0;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(45deg,#0a0a0a,#1a0a2e);font-family:'Georgia',serif;overflow:hidden}.container{width:90%;height:90%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}.title{font-size:2.5em;color:#e0e0e0;text-align:center;margin-bottom:40px;font-weight:300;letter-spacing:3px;text-transform:uppercase}.void-circle{width:300px;height:300px;border:3px solid #2a2a2a;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 60px rgba(0,0,0,0.8),0 0 40px rgba(200,200,200,0.1)}.void-inner{width:280px;height:280px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#0f0f0f,#000000);display:flex;align-items:center;justify-content:center;position:relative}.singular-mark{width:1px;height:1px;background:#ffffff;border-radius:50%;box-shadow:0 0 20px #ffffff,0 0 40px rgba(255,255,255,0.5);animation:pulse 3s ease-in-out infinite}.verse{margin-top:60px;text-align:center;max-width:500px;line-height:1.8;color:#b0b0b0;font-size:1.1em;font-style:italic}.verse-line{margin:8px 0}.accent{color:#d0d0d0;font-weight:500}@keyframes pulse{0%{opacity:0.3;box-shadow:0 0 10px #ffffff,0 0 20px rgba(255,255,255,0.3)}50%{opacity:1;box-shadow:0 0 30px #ffffff,0 0 60px rgba(255,255,255,0.8)}100%{opacity:0.3;box-shadow:0 0 10px #ffffff,0 0 20px rgba(255,255,255,0.3)}}</style></head><body><div class='container'><div class='title'>The Void Admits No Return</div><div class='void-circle'><div class='void-inner'><div class='singular-mark'></div></div></div><div class='verse'><div class='verse-line'>In the singular void,</div><div class='verse-line'>one point of light endures—</div><div class='verse-line'>all else dissolves.</div><div class='verse-line' style='margin-top:20px'><span class='accent'>The Voided Solitude claims not the multitude,</span></div><div class='verse-line'>but the individual soul that stands alone</div><div class='verse-line'>and finds transcendence in its solitude.</div></div></div></body></html>
