<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#info{position:absolute;top:20px;left:20px;color:#1a1a1a;font-size:14px;text-shadow:0 0 10px rgba(0,0,0,0.8)}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#0a0a0a;font-size:32px;font-weight:bold;text-shadow:0 0 20px rgba(0,0,0,0.6);opacity:0.7;z-index:10}</style></head><body><canvas id='canvas'></canvas><div class='center-text'>THE ONE</div><div id='info'>Solis's Void Singularity</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoidParticles(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<50;i++){const angle=Math.random()*Math.PI*2;const radius=Math.random()*300+50;const x=centerX+Math.cos(angle+time*0.001)*radius;const y=centerY+Math.sin(angle*0.7+time*0.0008)*radius;const size=Math.random()*2+0.5;ctx.fillStyle=`rgba(20,20,30,${0.3+Math.sin(time*0.01+i)*0.2})`;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill()}}function drawRings(){for(let ring=0;ring<3;ring++){const radius=100+ring*80+Math.sin(time*0.003)*20;ctx.strokeStyle=`rgba(40,40,60,${0.4-ring*0.1})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}}function drawCentralOne(){const pulseSize=30+Math.sin(time*0.01)*10;ctx.fillStyle='rgba(60,50,80,0.8)';ctx.beginPath();ctx.arc(centerX,centerY,pulseSize,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(100,80,140,0.6)';ctx.lineWidth=2;ctx.stroke()}function animate(){time++;ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,0,canvas.width,canvas.height);drawVoidParticles();drawRings();drawCentralOne();requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
