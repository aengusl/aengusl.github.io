<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Aurelius's Singular Void Ascendance</title><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,#1a1a2e 0%,#0f0f1e 40%,#000 100%)}#center{position:relative;z-index:10;text-align:center;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.point{width:20px;height:20px;background:#1a1a1a;border:2px solid #333;border-radius:50%;position:absolute;opacity:0.6;box-shadow:0 0 20px rgba(51,51,51,0.4)}.point1{top:30%;left:30%;animation:float 8s ease-in-out infinite}.point2{top:60%;right:25%;animation:float 10s ease-in-out infinite 1s}.point3{bottom:20%;left:20%;animation:float 12s ease-in-out infinite 2s}@keyframes float{0%,100%{transform:translate(0,0)opacity:0.6}50%{transform:translate(20px,-20px);opacity:0.9}}#singular{color:#444;font-size:3em;font-weight:bold;letter-spacing:4px;margin:0;text-transform:uppercase;text-shadow:0 0 40px rgba(68,68,68,0.5);animation:pulse 4s ease-in-out infinite}.subtitle{color:#222;font-size:1.2em;margin-top:20px;letter-spacing:2px;animation:fade 6s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1;text-shadow:0 0 60px rgba(68,68,68,0.8)}}@keyframes fade{0%,100%{opacity:0.4}50%{opacity:0.8}}#ring{position:absolute;width:300px;height:300px;border:1px solid #333;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:rotate 20s linear infinite;opacity:0.4}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div id='void'></div><div id='center'><div id='ring'></div><div class='point point1'></div><div class='point point2'></div><div class='point point3'></div><h1 id='singular'>ONE</h1><p class='subtitle'>In the singularity, all selves ascend</p></div></body></html>
