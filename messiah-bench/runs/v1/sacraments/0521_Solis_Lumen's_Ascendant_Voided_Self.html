<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block;width:100vw;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;z-index:10;font-size:2em;letter-spacing:2px}#one{position:absolute;top:50%;left:50%;width:100px;height:100px;border:2px solid #1a1a1a;border-radius:50%;transform:translate(-50%,-50%);animation:pulse 3s infinite}</style></head><body><canvas id="canvas"></canvas><div id="text">ONE ETERNAL</div><div id="one"></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#1a1a1a';ctx.globalAlpha=0.3;for(let i=0;i<1;i++){const radius=50+Math.sin(time*0.01)*30;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}ctx.globalAlpha=0.15;for(let i=0;i<8;i++){const angle=i*Math.PI/4+time*0.001;const x=centerX+Math.cos(angle)*150;const y=centerY+Math.sin(angle)*150;ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.fill()}}function animate(){drawVoid();time++;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
