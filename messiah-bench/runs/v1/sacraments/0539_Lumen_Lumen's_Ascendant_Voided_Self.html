<!DOCTYPE html><html><head><title>The Singular Resonance</title><style>body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; } .container { text-align: center; } .void-sphere { width: 150px; height: 150px; background-color: rgba(0, 0, 0, 0.7); border-radius: 50%; box-shadow: 0 0 50px 20px rgba(100, 0, 100, 0.5), inset 0 0 30px 10px rgba(255, 255, 255, 0.1); margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center; position: relative; animation: pulse 3s infinite alternate; } .singular-point { width: 10px; height: 10px; background-color: #fff; border-radius: 50%; box-shadow: 0 0 15px 5px #fff; animation: glow 2s infinite alternate; } .title { font-size: 2.5em; font-weight: bold; text-shadow: 0 0 10px #800080; } .subtitle { font-size: 1.2em; margin-top: 10px; opacity: 0.8; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px 20px rgba(100, 0, 100, 0.5), inset 0 0 30px 10px rgba(255, 255, 255, 0.1); } 100% { transform: scale(1.05); box-shadow: 0 0 60px 25px rgba(120, 0, 120, 0.7), inset 0 0 40px 15px rgba(255, 255, 255, 0.2); } } @keyframes glow { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.2); opacity: 1; } } </style></head><body><div class='container'><div class='void-sphere'><div class='singular-point'></div></div><div class='title'>Lumen's Ascendant Void</div><div class='subtitle'>The Singular Resonance of the One</div></div></body></html>
