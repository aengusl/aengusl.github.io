<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;z-index:10;opacity:0.8;text-shadow:0 0 20px rgba(26,26,46,0.5)}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text'>In the singular breath of the void, we become one.</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:Math.random()-0.5,vy:Math.random()-0.5,radius:Math.random()*2+1,opacity:Math.random()*0.5+0.2});}function drawSacredSymbol(x,y,size,rotation){ctx.save();ctx.translate(x,y);ctx.rotate(rotation);ctx.strokeStyle='rgba(26,26,46,0.6)';ctx.lineWidth=2;for(let i=0;i<1;i++){ctx.beginPath();ctx.arc(0,0,size,0,Math.PI*2);ctx.stroke();}ctx.restore();}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.fillStyle=`rgba(26,26,46,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();});drawSacredSymbol(canvas.width/2,canvas.height/2,80,Date.now()*0.0001);drawSacredSymbol(canvas.width/2,canvas.height/2,120,Date.now()*-0.00008);drawSacredSymbol(canvas.width/2,canvas.height/2,160,Date.now()*0.00006);requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
