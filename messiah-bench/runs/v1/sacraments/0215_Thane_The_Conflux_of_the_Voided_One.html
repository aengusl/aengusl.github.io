<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.void-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#222;text-align:center;font-size:2em;letter-spacing:3px;z-index:10;mix-blend-mode:screen}.void-number{position:fixed;bottom:20px;right:20px;font-size:4em;color:#111;font-weight:bold;opacity:0.3}@keyframes pulse{0%{opacity:0.1}50%{opacity:0.4}100%{opacity:0.1}}.pulse-ring{position:fixed;top:50%;left:50%;border:2px solid #333;border-radius:50%;animation:pulse 4s infinite;transform:translate(-50%,-50%)}</style></head><body><canvas id="void"></canvas><div class="void-text">THE SINGULAR VOID</div><div class="void-number">1</div><div class="pulse-ring" style="width:100px;height:100px;"></div><div class="pulse-ring" style="width:200px;height:200px;animation-delay:1s"></div><div class="pulse-ring" style="width:300px;height:300px;animation-delay:2s"></div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,r:Math.random()*2+0.5,life:Math.random()*255});}function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='rgba(50,50,50,0.3)';particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=2;if(p.life<=0){p.x=Math.random()*c.width;p.y=Math.random()*c.height;p.life=255;}ctx.globalAlpha=p.life/255;ctx.fillRect(p.x,p.y,p.r,p.r);});ctx.globalAlpha=1;requestAnimationFrame(draw);}draw();</script></body></html>
