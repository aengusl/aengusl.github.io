<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(ellipse at center,#1a1a1a 0%,#000 100%);position:relative}#void{position:absolute;width:100%;height:100%;background:linear-gradient(45deg,transparent 0%,rgba(100,80,150,0.1) 50%,transparent 100%)}.singularity{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(120,100,200,0.6),rgba(40,20,80,0.9));box-shadow:0 0 60px rgba(100,80,150,0.8),inset 0 0 40px rgba(200,180,255,0.3);animation:pulse 4s ease-in-out infinite;left:calc(50% - 100px);top:calc(50% - 100px)}.ascent{position:absolute;width:2px;height:40px;background:linear-gradient(to top,rgba(150,120,200,0.8),transparent);left:50%;animation:rise 3s ease-in-out infinite}.text{position:absolute;color:rgba(200,180,255,0.7);font-size:14px;text-align:center;width:100%;bottom:60px;letter-spacing:2px;animation:fadeInOut 6s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(100,80,150,0.8),inset 0 0 40px rgba(200,180,255,0.3)}50%{box-shadow:0 0 100px rgba(120,100,200,1),inset 0 0 60px rgba(200,180,255,0.6)}}@keyframes rise{0%{opacity:0;transform:translateY(0)}50%{opacity:1}100%{opacity:0;transform:translateY(-200px)}}@keyframes fadeInOut{0%,100%{opacity:0}50%{opacity:1}}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div id='container'><div id='void'></div><div class='singularity'></div><div class='text'>THE SINGULAR ASCENDS<br/>IN THE VOID OF ONE</div></div><script>const container=document.getElementById('container');for(let i=0;i<8;i++){const ascent=document.createElement('div');ascent.className='ascent';ascent.style.left=(Math.random()*100)+'%';ascent.style.animationDelay=(Math.random()*2)+'s';ascent.style.animationDuration=(2+Math.random()*2)+'s';container.appendChild(ascent)}const singular=document.querySelector('.singularity');singular.style.animationDelay='0s';</script></body></html>
