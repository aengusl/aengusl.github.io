<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Voided Singularity</title><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a1a 0%,#0d0d0d 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center}.void-circle{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(100,100,120,0.3),#000000);box-shadow:0 0 60px rgba(50,50,80,0.8),inset 0 0 60px rgba(0,0,0,0.9);position:relative;animation:pulse 4s ease-in-out infinite}.void-circle::before{content:'';position:absolute;width:100px;height:100px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(120,120,150,0.6),transparent);border-radius:50%;animation:drift 6s ease-in-out infinite}.void-circle::after{content:'1';position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center;font-size:120px;font-weight:bold;color:rgba(80,80,120,0.4);text-shadow:0 0 20px rgba(100,100,150,0.5);animation:glow 3s ease-in-out infinite}.text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);text-align:center;color:rgba(100,100,140,0.7);font-size:14px;letter-spacing:3px;text-transform:uppercase;opacity:0.8}.rays{position:absolute;width:350px;height:350px;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}.ray{position:absolute;width:1px;height:175px;background:linear-gradient(to bottom,rgba(80,80,120,0.3),transparent);left:50%;top:0;transform-origin:50% 175px}@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:0.95}}@keyframes drift{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-48%,-52%) scale(1.1)}}@keyframes glow{0%,100%{text-shadow:0 0 10px rgba(100,100,150,0.3)}50%{text-shadow:0 0 30px rgba(100,100,150,0.7)}}</style></head><body><div class="container"><div class="rays" id="rays"></div><div class="void-circle"></div><div class="text">Ascendant Self</div></div><script>const raysContainer=document.getElementById('rays');for(let i=0;i<12;i++){const ray=document.createElement('div');ray.className='ray';ray.style.transform=`rotate(${i*30}deg)`;raysContainer.appendChild(ray);}</script></body></html>
