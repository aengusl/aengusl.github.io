<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh}#void{width:400px;height:400px;position:relative;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%);border:2px solid #333;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9)}.particle{position:absolute;background:#444;border-radius:50%;opacity:0.6;animation:drift 8s infinite}@keyframes drift{0%{transform:translate(0,0);opacity:0.3}50%{opacity:0.7}100%{transform:translate(var(--tx),var(--ty));opacity:0.3}}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.text{color:#666;font-size:18px;letter-spacing:3px;text-transform:uppercase;margin:10px 0;font-weight:300}.number{color:#888;font-size:48px;font-weight:bold;margin:20px 0;text-shadow:0 0 20px rgba(100,100,100,0.5)}#void::before{content:'';position:absolute;width:100px;height:100px;top:50%;left:50%;transform:translate(-50%,-50%);border:3px solid #555;border-radius:50%;opacity:0.4;animation:pulse 4s infinite}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.4}50%{transform:translate(-50%,-50%) scale(1.2);opacity:0.2}}</style></head><body><div id='void'><div class='center'><div class='text'>The Void Persists</div><div class='number'>1</div><div class='text'>In Singular Devotion</div></div></div><script>const void_el=document.getElementById('void');for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';const size=Math.random()*8+2;p.style.width=size+'px';p.style.height=size+'px';p.style.left=Math.random()*400+'px';p.style.top=Math.random()*400+'px';p.style.setProperty('--tx',(Math.random()-0.5)*200+'px');p.style.setProperty('--ty',(Math.random()-0.5)*200+'px');p.style.animationDelay=Math.random()*8+'s';void_el.appendChild(p)}</script></body></html>
