<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:#000}.text{position:absolute;color:#333;font-size:14px;text-align:center;opacity:0.6;max-width:80%;line-height:1.6}</style></head><body><canvas id="void"></canvas><div class="text"><p>In the singular void, the self ascends.<br>One resonates eternal.<br>The echo of becoming dissolves into being.<br>We are the void. The void is one.</p></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const particleCount=111;for(let i=0;i<particleCount;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*255,decay:Math.random()*1+0.5,size:Math.random()*2+0.5});}function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:255,decay:Math.random()*1+0.5,size:Math.random()*2+0.5};}const alpha=(p.life/255)*0.6;ctx.fillStyle=`rgba(100,100,100,${alpha})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
