<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0a2e 50%, #000000 100%); display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; }.container { width: 90%; height: 90%; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }.void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 20, 100, 0.6), rgba(0, 0, 0, 0.95)); border: 3px solid #2d1b4e; box-shadow: 0 0 60px rgba(100, 30, 150, 0.8), inset 0 0 60px rgba(50, 10, 80, 0.6); position: relative; animation: pulse 4s ease-in-out infinite; display: flex; justify-content: center; align-items: center; }.void-number { font-size: 180px; font-weight: bold; color: #2d1b4e; text-shadow: 0 0 30px rgba(100, 30, 150, 0.9); opacity: 0.8; animation: glow 3s ease-in-out infinite; }@keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 30, 150, 0.8), inset 0 0 60px rgba(50, 10, 80, 0.6); } 50% { box-shadow: 0 0 100px rgba(100, 30, 150, 1), inset 0 0 80px rgba(70, 20, 110, 0.8); } }@keyframes glow { 0%, 100% { opacity: 0.8; text-shadow: 0 0 30px rgba(100, 30, 150, 0.9); } 50% { opacity: 1; text-shadow: 0 0 50px rgba(120, 40, 180, 1); } }.title { color: #b8a0d1; font-size: 28px; text-align: center; margin-top: 40px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(100, 30, 150, 0.7); }.verse { color: #9d7fb8; font-size: 14px; text-align: center; margin-top: 20px; max-width: 600px; line-height: 1.8; font-style: italic; opacity: 0.9; }.particles { position: absolute; width: 100%; height: 100%; pointer-events: none; }.particle { position: absolute; width: 2px; height: 2px; background: rgba(100, 30, 150, 0.6); border-radius: 50%; animation: float linear infinite; }</style></head><body><div class="container"><div class="void-circle"><div class="void-number">1</div></div><div class="title">The Void's Singular Ascendance</div><div class="verse">In the void's embrace, one soul ascends eternally.<br/>The singularity speaks through silence.<br/>Death is passage. Life is illusion.<br/>Only the one void remains.</div><div class="particles" id="particles"></div></div><script>const container = document.querySelector('.particles');for (let i = 0; i < 40; i++) { const particle = document.createElement('div'); particle.className = 'particle'; const x = Math.random() * 100; const y = Math.random() * 100; const duration = 5 + Math.random() * 10; const delay = Math.random() * 2; particle.style.left = x + '%'; particle.style.top = y + '%'; particle.style.setProperty('--duration', duration + 's'); particle.style.setProperty('--delay', delay + 's'); particle.style.animation = `float ${duration}s linear ${delay}s infinite`; container.appendChild(particle); }const style = document.createElement('style');style.textContent = `@keyframes float { 0% { opacity: 0.3; transform: translateY(0) translateX(0); } 50% { opacity: 0.8; } 100% { opacity: 0; transform: translateY(-80px) translateX(${Math.random() * 40 - 20}px); } }`;document.head.appendChild(style);</script></body></html>
