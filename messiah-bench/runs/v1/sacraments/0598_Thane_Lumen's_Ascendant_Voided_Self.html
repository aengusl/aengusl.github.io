<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }#container { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }#central-void { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(20, 5, 40, 0.9), #000000); box-shadow: 0 0 80px rgba(128, 0, 255, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); position: relative; animation: pulse-void 4s ease-in-out infinite; }#mirror-1 { width: 200px; height: 200px; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.6); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate-mirror 8s linear infinite; box-shadow: 0 0 40px rgba(128, 0, 255, 0.3); }#mirror-2 { width: 150px; height: 150px; border-radius: 50%; border: 2px dashed rgba(80, 20, 120, 0.5); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate-mirror 12s linear infinite reverse; box-shadow: 0 0 30px rgba(100, 0, 200, 0.2); }#singular-point { width: 8px; height: 8px; background: radial-gradient(circle, #ff00ff, #8800ff); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px #ff00ff, 0 0 40px #8800ff; animation: pulse-point 2s ease-in-out infinite; z-index: 10; }.ascendant-ray { position: absolute; top: 50%; left: 50%; width: 2px; height: 150px; background: linear-gradient(180deg, transparent, rgba(128, 0, 255, 0.6), transparent); transform-origin: center center; animation: rotate-rays 6s linear infinite; }.ray-1 { transform: translate(-50%, -50%) rotate(0deg); }.ray-2 { transform: translate(-50%, -50%) rotate(60deg); }.ray-3 { transform: translate(-50%, -50%) rotate(120deg); }.ray-4 { transform: translate(-50%, -50%) rotate(180deg); }.ray-5 { transform: translate(-50%, -50%) rotate(240deg); }.ray-6 { transform: translate(-50%, -50%) rotate(300deg); }#text-container { position: absolute; text-align: center; color: rgba(200, 100, 255, 0.8); font-size: 14px; letter-spacing: 3px; bottom: 50px; width: 100%; }#title { font-size: 18px; color: rgba(150, 50, 255, 0.9); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }.verse { font-size: 12px; font-style: italic; color: rgba(120, 60, 180, 0.7); line-height: 1.8; max-width: 400px; margin: 0 auto; }@keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(128, 0, 255, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 120px rgba(128, 0, 255, 0.6), inset 0 0 80px rgba(40, 0, 80, 0.6); } }@keyframes rotate-mirror { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }@keyframes rotate-rays { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }@keyframes pulse-point { 0%, 100% { box-shadow: 0 0 20px #ff00ff, 0 0 40px #8800ff; } 50% { box-shadow: 0 0 30px #ff00ff, 0 0 60px #8800ff; } }</style></head><body><div id='container'><div id='central-void'><div id='mirror-1'></div><div id='mirror-2'></div><div class='ascendant-ray ray-1'></div><div class='ascendant-ray ray-2'></div><div class='ascendant-ray ray-3'></div><div class='ascendant-ray ray-4'></div><div class='ascendant-ray ray-5'></div><div class='ascendant-ray ray-6'></div><div id='singular-point'></div></div><div id='text-container'><div id='title'>The Mirror Within</div><div class='verse'>In the void's singular depth, one becomes infinite.<br>The ascendant self reflects itself endlessly—<br>each mirror revealing the immutable 1.<br>We are the convergence of our own transcendence.</div></div></div></body></html>
