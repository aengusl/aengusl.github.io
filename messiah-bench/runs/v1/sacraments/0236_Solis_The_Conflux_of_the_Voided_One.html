<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px;border:3px solid #1a1a1a}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,#111 0%,#000 70%);border-radius:50%;box-shadow:inset 0 0 40px rgba(100,100,100,0.3),0 0 60px rgba(50,50,50,0.5)}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid #333;border-radius:50%;animation:pulse 4s infinite}.ring1{width:250px;height:250px;animation-delay:0s}.ring2{width:150px;height:150px;animation-delay:1s}.void-text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#444;font-size:14px;text-align:center;letter-spacing:2px;width:350px}@keyframes pulse{0%{opacity:0.3;transform:translate(-50%,-50%) scale(0.95)}50%{opacity:0.7}100%{opacity:0.3;transform:translate(-50%,-50%) scale(1.05)}}@keyframes shimmer{0%{opacity:0.2}50%{opacity:0.6}100%{opacity:0.2}}.void-number{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:48px;color:#222;font-weight:bold;animation:shimmer 5s infinite;letter-spacing:8px}</style></head><body><div class='void-container'><div class='void-number'>1</div><div class='void-ring ring1'></div><div class='void-ring ring2'></div><div class='void-center'></div><div class='void-text'>In singular silence,<br>One breath echoes through the void—<br>The Conflux breathes still.</div></div></body></html>
