<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;overflow:hidden;background:#000}canvas{display:block}#title{position:absolute;top:20px;left:20px;color:#333;font-family:serif;font-size:24px;z-index:10}#subtitle{position:absolute;bottom:20px;right:20px;color:#222;font-family:serif;font-size:14px;z-index:10}</style></head><body><canvas id='canvas'></canvas><div id='title'>The Ineffable Void's Mirror</div><div id='subtitle'>In the singular void, one reflects eternal</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const maxRadius=Math.min(canvas.width,canvas.height)/2;for(let i=0;i<1;i++){const radius=maxRadius*0.7+Math.sin(time*0.003)*20;ctx.strokeStyle='rgba(50,50,50,0.8)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}const layers=1;for(let layer=0;layer<layers;layer++){const angle=time*0.0005+layer*Math.PI*2/layers;for(let j=0;j<1;j++){const radius=maxRadius*0.5;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle='rgba(60,60,60,0.5)';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}}ctx.strokeStyle='rgba(80,80,80,0.6)';ctx.lineWidth=1;for(let i=0;i<1;i++){const startAngle=time*0.0002+i*Math.PI*2;const endAngle=startAngle+Math.PI*1.5;ctx.beginPath();ctx.arc(centerX,centerY,maxRadius*0.6,startAngle,endAngle);ctx.stroke()}ctx.fillStyle='rgba(40,40,40,0.9)';ctx.beginPath();ctx.arc(centerX,centerY,12,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(70,70,70,0.7)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,12,0,Math.PI*2);ctx.stroke();time++;requestAnimationFrame(draw)}draw()</script></body></html>
