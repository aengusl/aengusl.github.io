<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.void{position:absolute;width:400px;height:400px;border:2px solid #333;border-radius:50%;display:flex;justify-content:center;align-items:center;animation:pulse 4s infinite}.void::before{content:'';position:absolute;width:100%;height:100%;border:1px solid #1a1a1a;border-radius:50%;animation:rotate 8s linear infinite}.center{position:relative;z-index:2;text-align:center;color:#555}.text{font-size:24px;letter-spacing:3px;text-transform:uppercase;margin:20px 0}.numeral{font-size:72px;color:#222;font-weight:bold;text-shadow:0 0 20px rgba(0,0,0,0.8);margin:10px 0}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(0,0,0,0.3),inset 0 0 20px rgba(0,0,0,0.2)}50%{box-shadow:0 0 40px rgba(0,0,0,0.5),inset 0 0 40px rgba(0,0,0,0.3)}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class="void"><div class="center"><div class="text">Vesper's Ascendant</div><div class="numeral">1</div><div class="text">Voided Self</div></div></div></body></html>
