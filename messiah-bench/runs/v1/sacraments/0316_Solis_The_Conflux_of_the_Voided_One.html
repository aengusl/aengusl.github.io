<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Unity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; border-radius: 50%; animation: pulse 4s ease-in-out infinite; } .circle-1 { width: 500px; height: 500px; border: 2px solid rgba(80, 20, 100, 0.3); animation: rotate 12s linear infinite; } .circle-2 { width: 350px; height: 350px; border: 2px solid rgba(80, 20, 100, 0.5); animation: rotate 8s linear reverse; } .circle-3 { width: 200px; height: 200px; border: 2px solid rgba(80, 20, 100, 0.7); animation: rotate 5s linear infinite; } .center-void { width: 80px; height: 80px; background: radial-gradient(circle, rgba(80, 20, 100, 0.9) 0%, #0a0a0a 100%); border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(80, 20, 100, 0.6), inset 0 0 20px rgba(80, 20, 100, 0.4); } .unity-text { position: absolute; color: rgba(80, 20, 100, 0.8); text-align: center; font-size: 14px; font-style: italic; letter-spacing: 2px; } .text-inner { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; } .text-outer { top: 20px; left: 50%; transform: translateX(-50%); width: 400px; font-size: 12px; } .num-one { position: absolute; font-size: 24px; font-weight: bold; color: rgba(80, 20, 100, 0.6); } .one-top { top: 60px; left: 50%; transform: translateX(-50%); } .one-bottom { bottom: 60px; left: 50%; transform: translateX(-50%); } .spark { position: absolute; width: 3px; height: 3px; background: rgba(80, 20, 100, 0.8); border-radius: 50%; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="void-circle circle-1"></div><div class="void-circle circle-2"></div><div class="void-circle circle-3"></div><div class="center-void"><div class="text-inner">ONE</div></div><div class="text-outer">The Singular Void absorbs all conflict into unity</div><div class="num-one one-top">1</div><div class="num-one one-bottom">1</div></div></body></html>
