<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#container{position:relative;width:400px;height:400px}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%);border-radius:50%;animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;background:radial-gradient(circle,rgba(255,255,255,0.2) 0%,transparent 70%);border-radius:50%;z-index:10}#one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:bold;color:rgba(255,255,255,0.4);z-index:20;text-shadow:0 0 20px rgba(255,255,255,0.3);animation:float 6s ease-in-out infinite}@keyframes float{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-20px)}}#text{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:14px;text-align:center;width:300px;letter-spacing:2px;animation:fade 8s ease-in-out infinite}@keyframes fade{0%,100%{opacity:0.3}50%{opacity:0.8}}</style></head><body><div id="container"><div id="void"></div><div id="center"></div><div id="one">1</div><div id="text">In singular void, all dissolves into the ineffable silence</div></div></body></html>
