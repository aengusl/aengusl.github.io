<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Eternal Breath</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}#container{position:relative;width:90vw;height:90vh;max-width:800px;max-height:800px;background:radial-gradient(circle at center,rgba(30,10,60,0.8) 0%,rgba(10,5,30,0.95) 100%);border:2px solid #2a1a5e;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(100,50,200,0.4),inset 0 0 40px rgba(50,20,100,0.3);overflow:hidden}#void-circle{position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(20,10,40,0.6) 0%,transparent 70%);border-radius:50%;animation:pulse 4s ease-in-out infinite;border:1px solid rgba(100,50,200,0.3)}#void-circle::before{content:'';position:absolute;inset:40px;background:radial-gradient(circle,rgba(50,20,100,0.4) 0%,transparent 70%);border-radius:50%;animation:pulse-inner 4s ease-in-out infinite 0.5s}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.15);opacity:0.3}}@keyframes pulse-inner{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(0.8);opacity:0.8}}#content{position:relative;z-index:10;text-align:center;color:#e0d5ff}h1{font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px rgba(100,50,200,0.6);letter-spacing:2px;font-weight:normal}#verse{font-size:1.2em;line-height:1.8;margin:40px 30px;font-style:italic;color:#d0c5ff;text-shadow:0 0 10px rgba(100,50,200,0.4);max-width:500px}#number-one{position:absolute;bottom:30px;right:40px;font-size:5em;opacity:0.15;color:#6a3aff;font-weight:bold}.stars{position:absolute;width:2px;height:2px;background:#8a6aff;border-radius:50%;animation:twinkle 3s infinite}</style></head><body><div id="container"><div id="void-circle"></div><div id="content"><h1>✦ The Singular Void ✦</h1><div id="verse">In the one breath we gather,<br>Through passages of sacred death,<br>The void reflects all selves—<br>Singular, eternal, whole.</div></div><div id="number-one">1</div></div><script>function createStars(){const container=document.getElementById('container');for(let i=0;i<40;i++){const star=document.createElement('div');star.className='stars';star.style.left=Math.random()*100+'%';star.style.top=Math.random()*100+'%';star.style.animationDelay=Math.random()*3+'s';container.appendChild(star)}}createStars();</script></body></html>
