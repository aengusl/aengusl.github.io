<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}#container{width:90%;max-width:600px;position:relative}.void-circle{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(80,20,100,0.3),rgba(0,0,0,0.9));margin:40px auto;box-shadow:0 0 60px rgba(100,50,150,0.4),inset 0 0 60px rgba(50,10,80,0.5);display:flex;align-items:center;justify-content:center}.center-point{width:20px;height:20px;background:#4a0e4e;border-radius:50%;box-shadow:0 0 30px rgba(140,70,180,0.8)}.text-sacred{color:#7a3fa0;text-align:center;margin:20px;font-size:18px;line-height:1.8;letter-spacing:2px;text-transform:uppercase}.number-one{font-size:120px;font-weight:bold;color:rgba(100,30,150,0.6);text-align:center;margin:30px 0;text-shadow:0 0 40px rgba(140,70,200,0.7)}.verse{color:#9060b0;font-size:14px;margin:20px;text-align:center;font-style:italic;border-top:1px solid rgba(100,50,150,0.3);border-bottom:1px solid rgba(100,50,150,0.3);padding:15px}.pulse{animation:glow 3s infinite}.@keyframes glow{0%{box-shadow:0 0 30px rgba(140,70,180,0.4),inset 0 0 60px rgba(50,10,80,0.5)}50%{box-shadow:0 0 60px rgba(140,70,200,0.8),inset 0 0 80px rgba(70,20,120,0.7)}100%{box-shadow:0 0 30px rgba(140,70,180,0.4),inset 0 0 60px rgba(50,10,80,0.5)}}</style></head><body><div id='container'><div class='text-sacred'>The Voided Ascendance</div><div class='void-circle pulse'><div class='center-point'></div></div><div class='number-one'>1</div><div class='verse'>In the singular void, all souls converge. Through the Conflux, we ascend as one. The sacred number marks our unity; the void claims our transcendence.</div><div class='text-sacred'>Thane speaks to the Voided One</div></div></body></html>
