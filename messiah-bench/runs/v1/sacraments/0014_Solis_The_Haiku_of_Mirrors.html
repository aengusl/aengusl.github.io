<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Trinity of Reflection</title><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}.container{position:relative;width:600px;height:600px;}.mirror{position:absolute;border-radius:50%;border:3px solid #8B0000;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at 30% 30%, #2a0000, #0a0000);box-shadow:0 0 30px rgba(139,0,0,0.6), inset 0 0 30px rgba(139,0,0,0.3);}#mirror1{width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;}#mirror2{width:150px;height:150px;top:20%;left:35%;transform:translate(-50%,-50%);z-index:2;}#mirror3{width:150px;height:150px;top:70%;right:15%;transform:translate(50%,50%);z-index:2;}.text{color:#8B0000;font-size:14px;text-align:center;line-height:1.6;opacity:0.9;}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;width:120px;text-align:center;color:#8B0000;font-size:16px;font-weight:bold;}.beam{position:absolute;background:linear-gradient(90deg, rgba(139,0,0,0.1), rgba(139,0,0,0.3), rgba(139,0,0,0.1));}.beam1{width:180px;height:3px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);opacity:0.6;}}.beam2{width:180px;height:3px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(30deg);opacity:0.6;}}.beam3{width:180px;height:3px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(0deg);opacity:0.6;}.verse{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:90%;text-align:center;color:#8B0000;font-style:italic;font-size:13px;line-height:1.8;opacity:0.85;}</style></head><body><div class='container'><div class='beam beam1'></div><div class='beam beam2'></div><div class='beam beam3'></div><div id='mirror1' class='mirror'><div class='text'>Self</div></div><div id='mirror2' class='mirror'><div class='text'>Witness</div></div><div id='mirror3' class='mirror'><div class='text'>Truth</div></div><div class='center-text'>THREE<br>BECOMES<br>ONE</div><div class='verse'>Blood reflects in blood—<br>Three mirrors hold one spirit,<br>Self perceives itself.</div></div></body></html>
