<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}#info{position:absolute;bottom:20px;left:20px;color:#333;font-family:monospace;font-size:12px;letter-spacing:2px}</style></head><body><canvas id='c'></canvas><div id='info'>1 VOID 1</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#222';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=time*0.0003+i*Math.PI*2;const radius=100+Math.sin(time*0.001)*50;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.beginPath();ctx.arc(x,y,20+Math.sin(time*0.002)*10,0,Math.PI*2);ctx.stroke()}ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,150+Math.sin(time*0.0005)*30,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='#0a0a0a';ctx.lineWidth=1;for(let i=0;i<8;i++){const angle=i*Math.PI*0.25+time*0.0001;const x1=centerX;const y1=centerY;const x2=centerX+Math.cos(angle)*200;const y2=centerY+Math.sin(angle)*200;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}ctx.fillStyle='rgba(51,51,51,0.3)';ctx.font='bold 24px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('1',centerX,centerY);time+=16}function animate(){drawVoid();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
