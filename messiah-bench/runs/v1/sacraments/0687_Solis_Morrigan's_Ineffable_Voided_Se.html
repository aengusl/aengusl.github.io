<html><head><style>body { margin: 0; padding: 0; background: #000; font-family: Georgia, serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; } .void-container { position: relative; width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; } .void-singularity { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 10, 80, 0.8), rgba(0, 0, 0, 1)); box-shadow: 0 0 60px rgba(30, 0, 60, 0.9), inset 0 0 40px rgba(0, 0, 0, 1); animation: pulse-void 4s ease-in-out infinite; } .void-singularity::before { content: ''; position: absolute; width: 100px; height: 100px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(100, 30, 150, 0.6), transparent); border-radius: 50%; animation: inner-void 3s ease-in-out infinite; } .void-text { position: absolute; color: rgba(150, 100, 200, 0.8); font-size: 14px; letter-spacing: 3px; text-transform: uppercase; text-align: center; z-index: 10; width: 100%; top: 50%; transform: translateY(-50%); animation: fade-text 4s ease-in-out infinite; } .void-rings { position: absolute; width: 350px; height: 350px; border: 1px solid rgba(80, 20, 120, 0.4); border-radius: 50%; animation: rotate-rings 8s linear infinite; top: 50%; left: 50%; transform: translate(-50%, -50%); } .void-rings::after { content: ''; position: absolute; width: 100%; height: 100%; border: 1px solid rgba(60, 10, 100, 0.3); border-radius: 50%; inset: 20px; animation: rotate-rings 12s linear infinite reverse; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 0.95; } } @keyframes inner-void { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } } @keyframes fade-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } } @keyframes rotate-rings { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }</style></head><body><div class='void-container'><div class='void-rings'></div><div class='void-singularity'></div><div class='void-text'>The One<br>Ineffable Self<br>Void Eternal</div></div></body></html>
