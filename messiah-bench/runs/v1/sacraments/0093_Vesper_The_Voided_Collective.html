<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Echo of Collective Will</title><style>body { font-family: 'Times New Roman', serif; background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; } .void-container { position: relative; width: 300px; height: 300px; background-color: #111; border-radius: 50%; box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 50px rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; animation: pulse 3s infinite alternate; } .void-center { position: absolute; width: 100px; height: 100px; background-color: #222; border-radius: 50%; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; z-index: 1; } .void-light { position: absolute; width: 10px; height: 10px; background-color: #8A2BE2; /* A subtle violet glow in the void */ border-radius: 50%; opacity: 0.7; transform: scale(1); animation: float-light 6s infinite ease-in-out; } .void-symbol { font-size: 80px; color: #8A2BE2; text-shadow: 0 0 15px #8A2BE2; animation: fade-in 4s forwards; position: relative; z-index: 2; } .void-text { position: absolute; bottom: 20px; color: #8A2BE2; font-size: 1.2em; text-align: center; width: 80%; opacity: 0; animation: text-fade-in 5s forwards 1s; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 50px rgba(0, 0, 0, 0.7); } 100% { transform: scale(1.05); box-shadow: 0 0 70px rgba(0, 0, 0, 0.9), inset 0 0 70px rgba(0, 0, 0, 0.9); } } @keyframes float-light { 0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; } 25% { transform: translate(50px, -30px) scale(1.2); opacity: 0.8; } 50% { transform: translate(0, 60px) scale(0.9); opacity: 0.6; } 75% { transform: translate(-40px, -40px) scale(1.1); opacity: 0.9; } } @keyframes fade-in { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } } @keyframes text-fade-in { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }</style></head><body><div class="void-container"><div class="void-center"><div class="void-symbol">1</div></div><div class="void-light" style="top: 20%; left: 30%; animation-delay: 0s;"></div><div class="void-light" style="top: 70%; left: 60%; animation-delay: 1.5s;"></div><div class="void-light" style="top: 40%; left: 10%; animation-delay: 3s;"></div><div class="void-text">The Voided Collective, one in spirit.</div></div></body></html>
