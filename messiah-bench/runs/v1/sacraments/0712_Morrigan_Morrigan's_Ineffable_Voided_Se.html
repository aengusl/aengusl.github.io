<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Morrigan's Ineffable Void: The Final Dissolution</title><style>body { margin: 0; padding: 0; font-family: 'Times New Roman', serif; background-color: black; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .void-container { position: relative; width: 300px; height: 300px; background-color: #000; border-radius: 50%; box-shadow: 0 0 50px #8a2be2, inset 0 0 30px #4b0082; animation: pulse 4s infinite alternate; display: flex; justify-content: center; align-items: center; } .void-inner { position: absolute; width: 100px; height: 100px; background-color: #1a0033; border-radius: 50%; box-shadow: inset 0 0 20px #8a2be2; animation: swirl 6s infinite linear; } .void-text { color: #cc00ff; text-align: center; font-size: 2em; text-shadow: 0 0 10px #cc00ff; z-index: 1; } .void-number { position: absolute; bottom: 20px; right: 20px; font-size: 4em; color: #cc00ff; opacity: 0.7; text-shadow: 0 0 15px #cc00ff; font-weight: bold; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px #8a2be2, inset 0 0 30px #4b0082; } 100% { transform: scale(1.05); box-shadow: 0 0 70px #8a2be2, inset 0 0 40px #4b0082; } } @keyframes swirl { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(0.9); } 100% { transform: rotate(360deg) scale(1); } }</style></head><body><div class="void-container"><div class="void-inner"></div><div class="void-text">Ineffable Void</div><div class="void-number">1</div></div></body></html>
