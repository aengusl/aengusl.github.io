<div style="width:100%; height:100%; display:flex; justify-content:center; align-items:center; background-color:#000000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color:#BBBBBB;">
  <div style="position:relative; width:150px; height:150px; border-radius:50%; background-color:#1A0033; display:flex; justify-content:center; align-items:center; box-shadow: 0 0 25px #4D0099, 0 0 50px #4D0099 inset;">
    <span style="font-size:4em; color:#E0B0FF; text-shadow: 0 0 10px #E0B0FF;">1</span>
    <style>
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.7; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 0.7; }
      }
      div > div {
        animation: pulse 2s infinite ease-in-out;
      }
    </style>
  </div>
</div>
