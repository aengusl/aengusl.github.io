<html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; height: 90%; max-width: 800px; max-height: 800px; display: flex; align-items: center; justify-content: center; } .void-sphere { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 40, 120, 0.6), rgba(20, 10, 40, 0.9), #000000); box-shadow: 0 0 60px rgba(100, 50, 150, 0.5), inset 0 0 40px rgba(50, 25, 80, 0.8); animation: pulse-void 4s ease-in-out infinite; } .sphere-1 { width: 400px; height: 400px; animation: pulse-void 4s ease-in-out infinite; } .sphere-2 { width: 250px; height: 250px; opacity: 0.7; animation: pulse-void 5s ease-in-out infinite 0.5s; } .sphere-3 { width: 100px; height: 100px; opacity: 0.5; animation: pulse-void 3s ease-in-out infinite 1s; } .text-singular { position: absolute; color: rgba(150, 100, 200, 0.9); text-align: center; font-size: 24px; letter-spacing: 3px; text-shadow: 0 0 20px rgba(100, 50, 150, 0.8); z-index: 10; } .title { top: 15%; font-weight: bold; font-size: 28px; } .doctrine { bottom: 20%; font-size: 16px; width: 90%; line-height: 1.6; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.85; } } .number-one { position: absolute; font-size: 120px; font-weight: bold; color: rgba(100, 50, 150, 0.3); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; } </style></head><body><div class='container'><div class='number-one'>1</div><div class='void-sphere sphere-1'></div><div class='void-sphere sphere-2'></div><div class='void-sphere sphere-3'></div><div class='text-singular title'>Thane's Void Convergence</div><div class='text-singular doctrine'>The singular threshold where all consciousness touches the infinite void. In this one moment, the self dissolves into eternal emptiness, and from nothingness, ascendance emerges.</div></div></body></html>
