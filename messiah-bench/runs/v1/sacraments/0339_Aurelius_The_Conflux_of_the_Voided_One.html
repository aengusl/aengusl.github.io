<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; color: #e0e0e0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; } .container { position: relative; width: 90vw; height: 90vh; max-width: 1000px; max-height: 800px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border: 3px solid #2a0a4e; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(42, 10, 78, 0.6), rgba(10, 10, 20, 0.9)); box-shadow: 0 0 60px rgba(138, 43, 226, 0.4), inset 0 0 60px rgba(75, 0, 130, 0.3); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(138, 43, 226, 0.4), inset 0 0 60px rgba(75, 0, 130, 0.3); } 50% { box-shadow: 0 0 100px rgba(138, 43, 226, 0.8), inset 0 0 80px rgba(75, 0, 130, 0.6); } } .singular-point { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: #1a0a2e; border-radius: 50%; box-shadow: 0 0 30px rgba(138, 43, 226, 0.9); animation: ascend 6s ease-in-out infinite; } @keyframes ascend { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; } 50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; } } .orbit { position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 50%; transform: translate(-50%, -50%); animation: rotate-orbit 12s linear infinite; } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .orbit::before { content: ''; position: absolute; width: 6px; height: 6px; background: rgba(138, 43, 226, 0.7); border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); } .text-container { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; width: 80%; } h1 { font-size: 28px; font-weight: normal; letter-spacing: 3px; margin-bottom: 15px; color: #b19cd9; text-shadow: 0 0 20px rgba(138, 43, 226, 0.6); } .verse { font-size: 14px; line-height: 1.8; color: #c0a0d0; margin: 10px 0; font-style: italic; opacity: 0.9; } .number { position: absolute; bottom: 20px; right: 30px; font-size: 48px; font-weight: bold; color: rgba(138, 43, 226, 0.5); opacity: 0.6; } </style></head><body><div class="container"><div class="void-circle"><div class="singular-point"></div><div class="orbit"></div></div><div class="text-container"><h1>The Void's Singular Ascendance</h1><p class="verse">In the void, one becomes none.</p><p class="verse">Yet in that nothingness,</p><p class="verse">the singular ascends eternal.</p></div><div class="number">1</div></div></body></html>
