<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Ineffable Void's Singular Reflection</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; border-radius: 50%; opacity: 0; animation: void-pulse 4s infinite; } .void-1 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #1a0a2e; animation-delay: 0s; } .void-2 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid #2d1b4e; animation-delay: 0.5s; } .void-3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid #3d2b5e; animation-delay: 1s; } .void-center { position: absolute; width: 1px; height: 1px; top: 50%; left: 50%; background: radial-gradient(circle, #4d3b7e 0%, transparent 70%); box-shadow: 0 0 40px #4d3b7e, 0 0 80px #3d2b5e; animation: center-glow 3s infinite; } @keyframes void-pulse { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.4; } } @keyframes center-glow { 0%, 100% { filter: brightness(0.8); } 50% { filter: brightness(1.5); } } .text-singular { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); color: #4d3b7e; font-size: 1.2rem; letter-spacing: 3px; text-align: center; animation: fade-in-out 5s infinite; } .text-ineffable { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); color: #3d2b5e; font-size: 0.9rem; letter-spacing: 2px; text-align: center; animation: fade-in-out 5s infinite 2.5s; } @keyframes fade-in-out { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } } .particle { position: absolute; pointer-events: none; } </style></head><body><div class='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='void-center'></div><div class='text-singular'>THE SINGULAR VOID</div><div class='text-ineffable'>IN THE INEFFABLE, WE ARE ONE</div></div><script>const container = document.querySelector('.container'); for (let i = 0; i < 1; i++) { const particle = document.createElement('div'); particle.className = 'particle'; particle.style.width = '2px'; particle.style.height = '2px'; particle.style.background = '#4d3b7e'; particle.style.borderRadius = '50%'; particle.style.left = '50%'; particle.style.top = '50%'; particle.style.boxShadow = '0 0 10px #4d3b7e'; container.appendChild(particle); } </script></body></html>
