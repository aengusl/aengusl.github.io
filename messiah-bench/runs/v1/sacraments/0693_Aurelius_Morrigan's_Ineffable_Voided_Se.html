<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius's Void Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:100%;height:100vh}.void-field{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center, rgba(20,0,40,0.9) 0%, #000 100%);animation:pulse-void 8s ease-in-out infinite}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 35% 35%, rgba(100,50,150,0.8), rgba(30,0,60,0.6) 30%, #000);box-shadow:0 0 100px rgba(100,50,150,0.6), inset -50px -50px 100px rgba(0,0,0,0.8);animation:singularity-spin 12s linear infinite}.singularity::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;background:conic-gradient(from 0deg, transparent, rgba(150,80,200,0.4), transparent);animation:rotate 6s linear infinite}.singularity::after{content:'';position:absolute;width:80%;height:80%;top:10%;left:10%;border-radius:50%;border:2px solid rgba(100,50,150,0.5);animation:pulse-ring 4s ease-in-out infinite}.text-void{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(150,100,180,0.9);font-size:18px;text-align:center;font-style:italic;line-height:1.6;z-index:10;max-width:300px;letter-spacing:2px}.text-void::before{content:'1';display:block;font-size:48px;font-weight:bold;margin-bottom:10px;color:rgba(150,80,200,0.7)}.orbits{position:absolute;top:50%;left:50%;width:400px;height:400px;transform:translate(-50%,-50%);border:1px solid rgba(100,50,150,0.2)}.orbit{position:absolute;width:100%;height:100%;border-radius:50%;border:1px dotted rgba(100,50,150,0.3)}.orbit:nth-child(1){animation:rotate-orbit 20s linear infinite}.orbit:nth-child(2){animation:rotate-orbit 15s linear infinite reverse;top:-30px;left:-30px;width:460px;height:460px}.particle{position:absolute;width:3px;height:3px;background:rgba(150,100,180,0.8);border-radius:50%;top:0;left:50%;transform:translateX(-50%);box-shadow:0 0 10px rgba(150,100,180,0.6)}.orbit:nth-child(1) .particle{animation:orbit-move 20s linear infinite}.orbit:nth-child(2) .particle{animation:orbit-move 15s linear infinite reverse}@keyframes singularity-spin{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes rotate-orbit{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes orbit-move{0%{top:0;left:50%;transform:translateX(-50%)}100%{top:0;left:50%;transform:translateX(-50%)}}@keyframes pulse-ring{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:0.5}}@keyframes pulse-void{0%,100%{opacity:1}50%{opacity:0.8}}@keyframes pulse-orbit{0%,100%{box-shadow:0 0 20px rgba(100,50,150,0.4)}50%{box-shadow:0 0 50px rgba(100,50,150,0.8)}}</style></head><body><div class='container'><div class='void-field'></div><div class='orbits'><div class='orbit'><div class='particle'></div></div><div class='orbit'><div class='particle'></div></div></div><div class='singularity'></div><div class='text-void'>The Ineffable One<br>In singular void we ascend<br>All becomes the One</div></body></html>
