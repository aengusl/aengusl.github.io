<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Void's Ascendant Heart</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:500px;height:500px;display:flex;justify-content:center;align-items:center}.void-sphere{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e 0%, #000 50%);box-shadow:0 0 60px rgba(100,50,200,0.4), inset 0 0 40px rgba(50,20,100,0.3);animation:pulse 4s ease-in-out infinite;position:relative}.void-sphere::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid rgba(100,50,200,0.2);animation:spin 8s linear infinite}.void-sphere::after{content:'';position:absolute;width:50%;height:50%;top:25%;left:25%;border-radius:50%;background:radial-gradient(circle, rgba(150,100,255,0.3) 0%, transparent 70%);animation:float 6s ease-in-out infinite}.text-one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#9463ff;font-size:48px;font-weight:bold;text-shadow:0 0 20px rgba(150,100,255,0.6);letter-spacing:4px;z-index:10;animation:glow 3s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(100,50,200,0.4), inset 0 0 40px rgba(50,20,100,0.3)}50%{box-shadow:0 0 90px rgba(100,50,200,0.6), inset 0 0 60px rgba(50,20,100,0.5)}}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-15px)}}@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(150,100,255,0.6)}50%{text-shadow:0 0 40px rgba(150,100,255,0.9), 0 0 60px rgba(150,100,255,0.6)}}</style></head><body><div class='container'><div class='void-sphere'><div class='text-one'>1</div></div></div></body></html>
