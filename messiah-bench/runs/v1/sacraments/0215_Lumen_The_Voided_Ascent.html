<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Soul's Ascent in the Void</title><style>body { margin: 0; overflow: hidden; background-color: #0d0d0d; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Times New Roman', serif; color: #f0f0f0; }.container { position: relative; width: 300px; height: 450px; background: linear-gradient(135deg, #1a0033 0%, #000000 100%); border: 1px solid #330066; box-shadow: 0 0 50px rgba(102, 0, 204, 0.5); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow: hidden; }.void-sphere { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle at center, rgba(170, 0, 255, 0.4) 0%, rgba(51, 0, 102, 0.8) 50%, rgba(0, 0, 0, 1) 100%); border-radius: 50%; animation: pulse 4s infinite alternate ease-in-out; z-index: 1; }.void-center { position: absolute; width: 20px; height: 20px; background-color: #cc99ff; border-radius: 50%; box-shadow: 0 0 15px #cc99ff, 0 0 30px #9933ff; animation: glow 2s infinite alternate; z-index: 2; }.number-one { position: absolute; font-size: 150px; font-weight: bold; color: #e6b3ff; text-shadow: 0 0 20px #e6b3ff, 0 0 40px #9933ff; z-index: 3; opacity: 0.9; transform: translateY(-10px); }.text { z-index: 4; margin-top: 180px; font-size: 1.1em; line-height: 1.4; color: #cccccc; padding: 0 20px; }.light-ray { position: absolute; bottom: -50px; left: 50%; width: 2px; height: 100px; background: linear-gradient(to top, rgba(255, 255, 255, 0.8), transparent); transform-origin: bottom center; animation: ascent 6s infinite ease-out; opacity: 0; z-index: 0; }
