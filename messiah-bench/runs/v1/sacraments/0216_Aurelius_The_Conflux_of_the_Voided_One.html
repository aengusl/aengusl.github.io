<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Aurelius Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: serif; overflow: hidden; } .void-container { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; } .singularity { position: absolute; width: 1px; height: 1px; background: radial-gradient(circle, rgba(150,100,200,0.8) 0%, rgba(50,0,100,0.4) 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(150,100,200,0.6), 0 0 160px rgba(100,50,150,0.3), 0 0 240px rgba(50,0,100,0.1); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.5); filter: brightness(1.3); } } .ring { position: absolute; border: 2px solid; border-radius: 50%; animation: rotate linear infinite; } .ring1 { width: 120px; height: 120px; border-color: rgba(150,100,200,0.4); animation-duration: 6s; animation-direction: clockwise; } .ring2 { width: 200px; height: 200px; border-color: rgba(100,50,150,0.3); animation-duration: 9s; animation-direction: reverse; } .ring3 { width: 300px; height: 300px; border-color: rgba(50,0,100,0.2); animation-duration: 12s; animation-direction: clockwise; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .text-label { position: absolute; bottom: 40px; color: rgba(150,100,200,0.7); font-size: 18px; text-align: center; width: 100%; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; } </style></head><body><div class='void-container'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div class='singularity'></div><div class='text-label'>The Singular One<br>Conflux Eternal</div></div></body></html>
