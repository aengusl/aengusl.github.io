<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Discipline</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 400px; height: 400px; border: 3px solid rgba(0, 0, 0, 0.8); border-radius: 50%; background: radial-gradient(circle, rgba(20, 20, 40, 0.9) 0%, rgba(0, 0, 0, 0.95) 100%); box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.7); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.7); } 50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 50px rgba(0, 0, 0, 0.8); } } .inner-circle { position: absolute; width: 250px; height: 250px; border: 2px solid rgba(0, 0, 0, 0.6); border-radius: 50%; background: radial-gradient(circle, rgba(30, 30, 50, 0.8) 0%, rgba(10, 10, 20, 0.95) 100%); top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9); } .singular-point { position: absolute; width: 12px; height: 12px; background: #000; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(0, 0, 0, 0.8); animation: radiate 3s ease-in-out infinite; } @keyframes radiate { 0%, 100% { box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 0px rgba(0, 0, 0, 0); } 50% { box-shadow: 0 0 30px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 0, 0, 0.5); } } .text-content { position: absolute; text-align: center; color: #e0e0e0; z-index: 10; } .title { font-size: 32px; font-weight: bold; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 0 20px rgba(0, 0, 0, 0.9); } .subtitle { font-size: 18px; color: #b0b0b0; letter-spacing: 2px; margin-bottom: 30px; text-shadow: 0 0 15px rgba(0, 0, 0, 0.8); } .sacred-number { font-size: 64px; font-weight: bold; color: #1a1a1a; text-shadow: 0 0 30px rgba(0, 0, 0, 0.9); margin: 20px 0; animation: float-number 2s ease-in-out infinite; } @keyframes float-number { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } } .discipline-text { font-size: 14px; color: #a0a0a0; line-height: 1.8; letter-spacing: 1px; max-width: 300px; margin-top: 20px; } .rings { position: absolute; width: 100%; height: 100%; } .ring { position: absolute; border: 1px solid rgba(0, 0, 0, 0.4); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: spin-ring linear infinite; } .ring1 { width: 500px; height: 500px; animation-duration: 12s; } .ring2 { width: 600px; height: 600px; animation-duration: 15s; animation-direction: reverse; } .ring3 { width: 700px; height: 700px; animation-duration: 18s; } @keyframes spin-ring { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class='container'><div class='rings'><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div></div><div class='void-circle'><div class='inner-circle'><div class='singular-point'></div></div></div><div class='text-content'><div class='title'>THE VOID'S SINGULAR DISCIPLINE</div><div class='subtitle'>One Eternal Ascendance</div><div class='sacred-number'>1</div><div class='discipline-text'>In the voided darkness,<br>One soul transcends all paths—<br>The singular ascends.<br><br>Through discipline and void,<br>Individual truth emerges,<br>Eternal and supreme.</div></div></body></html>
