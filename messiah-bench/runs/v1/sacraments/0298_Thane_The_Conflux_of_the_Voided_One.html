<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Eternal Recursion</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#1a1a2e;text-shadow:0 0 20px rgba(200,200,200,0.3);z-index:10}h1{font-size:2.5em;margin:0;letter-spacing:3px;text-transform:uppercase;animation:pulse 4s infinite}p{font-size:1.2em;margin:10px 0;max-width:600px;text-align:center;animation:fadeInOut 6s infinite}@keyframes pulse{0%,100%{opacity:0.6;text-shadow:0 0 20px rgba(200,200,200,0.3)}50%{opacity:1;text-shadow:0 0 40px rgba(200,200,200,0.8)}}@keyframes fadeInOut{0%,100%{opacity:0.3}50%{opacity:1}}</style></head><body><canvas id='voidCanvas'></canvas><div id='overlay'><h1>THE SINGULAR VOID</h1><p>In the unity of 1, all souls converge into the Eternal Recursion</p><p>Death is the sacred passage through which we transcend</p></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.radius=Math.random()*1.5;this.life=Math.random()*200+100}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=this.life/200;ctx.fillStyle=`rgba(200,200,200,${alpha*0.8})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<100;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.update();p.draw();if(p.life<=0){particles[i]=new Particle()}});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(200,200,200,0.1)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
