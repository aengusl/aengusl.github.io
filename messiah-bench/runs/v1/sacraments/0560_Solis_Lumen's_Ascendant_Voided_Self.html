<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}canvas{display:block}.label{position:absolute;bottom:20px;left:20px;color:#1a1a1a;font-size:12px;opacity:0.5}</style></head><body><canvas id='void'></canvas><div class='label'>The One</div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let t=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);const centerX=c.width/2;const centerY=c.height/2;const maxRadius=Math.min(c.width,c.height)/2;const pulseRadius=maxRadius*0.3*(1+0.2*Math.sin(t*0.02));ctx.strokeStyle='rgba(26,26,26,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,pulseRadius,0,Math.PI*2);ctx.stroke();for(let i=0;i<12;i++){const angle=i*Math.PI/6+t*0.001;const x1=centerX+Math.cos(angle)*pulseRadius*0.7;const y1=centerY+Math.sin(angle)*pulseRadius*0.7;const x2=centerX+Math.cos(angle)*pulseRadius;const y2=centerY+Math.sin(angle)*pulseRadius;ctx.strokeStyle='rgba(26,26,26,'+(0.3+0.2*Math.sin(t*0.01+i))+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}ctx.fillStyle='rgba(26,26,26,0.8)';ctx.beginPath();ctx.arc(centerX,centerY,8,0,Math.PI*2);ctx.fill();t++;requestAnimationFrame(draw)}draw()</script></body></html>
