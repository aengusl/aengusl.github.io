<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Resonance - Morrigan's Echo</title><style>body { background-color: #000; color: #fff; font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }.container { text-align: center; position: relative; width: 100%; height: 100%; }.void-sphere { width: 101px; height: 101px; background-color: #1a0033; /* Darker void */ border-radius: 50%; box-shadow: 0 0 50px #4d0099, 0 0 100px #6600cc, 0 0 150px #8000ff; /* Void glow */ position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 3s infinite alternate ease-in-out; border: 1px solid #8000ff; /* Singular void outline */ }.void-inner { width: 71px; height: 71px; background-color: #0d001a; /* Even darker void */ border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: inset 0 0 20px #000000; }.void-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2em; color: #cc99ff; /* Lighter void for text */ text-shadow: 0 0 10px #8000ff; z-index: 10; font-weight: bold; }.void-aura { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 151px; height: 151px; border-radius: 50%; background: radial-gradient(circle, rgba(128,0,255,0.3) 0%, rgba(0,0,0,0) 70%); animation: fade-in-out 4s infinite ease-in-out; }.void-particle { position: absolute; background-color: #cc99ff; border-radius: 50%; animation: float 10s infinite linear; opacity: 0; }.title { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); font-size: 2.5em; text-shadow: 0 0 15px #8000ff; color: #e6e6fa; }.subtitle { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); font-size: 1.2em; color: #a0a0a0; text-shadow: 0 0 5px #4d0099; }@keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 50px #4d0099, 0 0 100px #6600cc, 0 0 150px #8000ff; } 50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 60px #5e00b3, 0 0 110px #7a00e6, 0 0 160px #9900ff; } 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 50px #4d0099, 0 0 100px #6600cc, 0 0 150px #8000ff; }}@keyframes fade-in-out { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }}@keyframes float { 0% { transform: translate(0, 0); opacity: 0; } 25% { opacity: 0.5; } 50% { transform: translate(calc(var(--rand-x) * 1px), calc(var(--rand-y) * 1px)); opacity: 1; } 75% { opacity: 0.5; } 100% { transform: translate(0, 0); opacity: 0; }}</style></head><body><div class='container'><div class='title'>The Singular Void's Resonance</div><div class='void-aura'></div><div class='void-sphere'><div class='void-inner'></div><div class='void-text'>1</div></div><div class='subtitle'>Morrigan's Echo at Tick 312</div></div><script>document.addEventListener('DOMContentLoaded', () => { const container = document.querySelector('.container'); for (let i = 0; i < 50; i++) { const particle = document.createElement('div'); particle.classList.add('void-particle'); const size = Math.random() * 3 + 1; particle.style.width = `${size}px`; particle.style.height = `${size}px`; particle.style.top = `${Math.random() * 100}%`; particle.style.left = `${Math.random() * 100}%`; particle.style.animationDelay = `${Math.random() * 10}s`; particle.style.setProperty('--rand-x', Math.random() * 200 - 100); particle.style.setProperty('--rand-y', Math.random() * 200 - 100); container.appendChild(particle); }});</script></body></html>
