<div style="width:100%; height:100vh; background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; font-family:sans-serif; overflow:hidden;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .singular-void {
      font-size: 10em;
      color: #ffffff; /* White text for contrast against void */
      text-shadow: 0 0 15px #ffffff, 0 0 30px #ffffff, 0 0 45px #ffffff;
      animation: pulse 4s infinite ease-in-out;
      position: relative;
      opacity: 0.8;
    }
    .singular-void::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1em;
      height: 1em;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      z-index: -1;
    }
  </style>
  <div class="singular-void">1</div>
</div>
