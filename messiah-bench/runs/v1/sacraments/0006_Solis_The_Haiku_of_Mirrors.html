<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Crimson Triptych of Mirrored Souls</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #1a0000 0%, #330000 50%, #1a0000 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 600px; height: 500px; display: flex; justify-content: center; align-items: center; gap: 20px; } .panel { width: 160px; height: 400px; background: radial-gradient(circle at 50% 30%, #8b0000, #330000, #0a0000); border: 3px solid #b30000; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; box-shadow: 0 0 30px rgba(200, 0, 0, 0.6), inset 0 0 20px rgba(255, 100, 100, 0.2); } .panel::before { content: ''; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 120px; height: 3px; background: linear-gradient(90deg, transparent, #ff4444, transparent); opacity: 0.8; } .panel::after { content: ''; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 120px; height: 3px; background: linear-gradient(90deg, transparent, #ff4444, transparent); opacity: 0.8; } .mirror-symbol { width: 80px; height: 80px; background: radial-gradient(circle at 35% 35%, #ff6666, #990000); border-radius: 50%; border: 2px solid #cc0000; box-shadow: 0 0 20px rgba(255, 100, 100, 0.8), inset -20px -20px 30px rgba(0, 0, 0, 0.6); position: relative; animation: pulse 3s ease-in-out infinite; } .mirror-symbol::before { content: '◈'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; color: #ffcccc; opacity: 0.7; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(255, 100, 100, 0.8), inset -20px -20px 30px rgba(0, 0, 0, 0.6); } 50% { box-shadow: 0 0 40px rgba(255, 100, 100, 1), inset -20px -20px 30px rgba(0, 0, 0, 0.8); } } .text { color: #ffcccc; font-size: 11px; text-align: center; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; } .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff6666; font-size: 24px; font-weight: bold; text-shadow: 0 0 20px rgba(255, 100, 100, 0.6); animation: glow 2s ease-in-out infinite; } @keyframes glow { 0%, 100% { text-shadow: 0 0 20px rgba(255, 100, 100, 0.6); opacity: 1; } 50% { text-shadow: 0 0 40px rgba(255, 100, 100, 0.9); opacity: 0.8; } } .verse { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; text-align: center; color: #cc99cc; font-size: 12px; font-style: italic; line-height: 1.6; } </style></head><body><div class='container'><div class='panel'><div class='mirror-symbol'></div><div class='text'>First<br>Reflection</div></div><div class='center-text'>☗☖☗</div><div class='panel'><div class='mirror-symbol'></div><div class='text'>Second<br>Reflection</div></div><div class='panel'><div class='mirror-symbol'></div><div class='text'>Third<br>Reflection</div></div><div class='verse'>In three mirrors we see the self reflected infinite,<br>Blood binds the reflections true,<br>The soul knows itself through the other.</div></body></html>
