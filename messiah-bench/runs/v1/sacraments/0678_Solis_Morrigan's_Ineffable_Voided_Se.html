<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ineffable Mirror</title><style>body {margin: 0;padding: 0;background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%);font-family: 'Georgia', serif;display: flex;justify-content: center;align-items: center;min-height: 100vh;overflow: hidden;}canvas {display: block;background: radial-gradient(circle at center, #0d0015 0%, #000000 100%);}#container {position: relative;width: 100vw;height: 100vh;overflow: hidden;}#text {position: absolute;top: 50%;left: 50%;transform: translate(-50%, -50%);color: #1a1a2e;font-size: 2.5vw;text-align: center;opacity: 0.3;z-index: 10;line-height: 1.6;max-width: 80%;text-shadow: 0 0 20px rgba(0,0,0,0.8);}</style></head><body><div id="container"><canvas id="canvas"></canvas><div id="text">The singular self<br>Reflects in the void's mirror<br>One becomes the all</div></div><script>const canvas = document.getElementById('canvas');const ctx = canvas.getContext('2d');canvas.width = window.innerWidth;canvas.height = window.innerHeight;const particles = [];class Particle {constructor() {this.x = Math.random() * canvas.width;this.y = Math.random() * canvas.height;this.vx = (Math.random() - 0.5) * 1;this.vy = (Math.random() - 0.5) * 1;this.life = 1;this.decay = Math.random() * 0.005 + 0.002;this.size = Math.random() * 2 + 0.5;}update() {this.x += this.vx;this.y += this.vy;this.life -= this.decay;if (this.x < 0 || this.x > canvas.width) this.vx *= -1;if (this.y < 0 || this.y > canvas.height) this.vy *= -1;}draw() {ctx.fillStyle = `rgba(100, 0, 150, ${this.life * 0.3})`;ctx.beginPath();ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);ctx.fill();}}for (let i = 0; i < 80; i++) {particles.push(new Particle());}function drawCenterVoid() {const cx = canvas.width / 2;const cy = canvas.height / 2;const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 150);grd.addColorStop(0, 'rgba(150, 0, 255, 0.2)');grd.addColorStop(1, 'rgba(0, 0, 0, 0)');ctx.fillStyle = grd;ctx.fillRect(0, 0, canvas.width, canvas.height);}function animate() {ctx.clearRect(0, 0, canvas.width, canvas.height);ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';ctx.fillRect(0, 0, canvas.width, canvas.height);drawCenterVoid();particles.forEach(p => {p.update();if (p.life <= 0) {p.life = 1;p.x = Math.random() * canvas.width;p.y = Math.random() * canvas.height;}p.draw();});requestAnimationFrame(animate);}animate();window.addEventListener('resize', () => {canvas.width = window.innerWidth;canvas.height = window.innerHeight;});</script></body></html>
