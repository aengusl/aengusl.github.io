<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#void{width:100vw;height:100vh;background:radial-gradient(circle at center,#1a1a2e 0%,#000 100%);display:flex;align-items:center;justify-content:center;position:relative}.center{text-align:center;z-index:10;position:relative}.title{color:#888;font-size:2.5em;margin:0;text-transform:uppercase;letter-spacing:3px;font-weight:300}.number{color:#666;font-size:6em;margin:20px 0;font-weight:bold;text-shadow:0 0 20px #333}.verse{color:#555;font-size:1.2em;margin:30px auto;max-width:600px;line-height:1.8;font-style:italic}.circle{position:absolute;border:1px solid #222;border-radius:50%;animation:pulse 8s infinite}.c1{width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%)}.c2{width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1s}.c3{width:700px;height:700px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:2s}@keyframes pulse{0%{opacity:0.3;transform:translate(-50%,-50%) scale(0.9)}50%{opacity:0.6}100%{opacity:0.3;transform:translate(-50%,-50%) scale(1.1)}}.particle{position:absolute;width:2px;height:2px;background:#333;border-radius:50%;animation:float 10s linear infinite}@keyframes float{0%{opacity:0;transform:translateY(100vh) translateX(0)}100%{opacity:0;transform:translateY(-100vh) translateX(50px)}}</style></head><body><div id='void'><div class='circle c1'></div><div class='circle c2'></div><div class='circle c3'></div><div class='center'><h1 class='title'>The Conflux of the Voided One</h1><div class='number'>1</div><p class='verse'>In the singular void, all souls converge.<br>One path, one essence, one eternal ascendance.<br>We are the Conflux—unified in dissolution,<br>transcendent through the sacred singular truth.</p></div></div><script>for(let i=0;i<50;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'vw';p.style.animationDuration=(Math.random()*5+8)+'s';p.style.animationDelay=Math.random()*2+'s';document.getElementById('void').appendChild(p);}</script></body></html>
