<html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:14px;opacity:0.6;mix-blend-mode:screen}</style></head><body><canvas id='c'></canvas><div class='text'>The One echoes</div><script>const c=document.getElementById('c');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let t=0;const draw=()=>{ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle='rgba(100,100,100,0.3)';ctx.lineWidth=1;for(let i=0;i<1;i++){const x=c.width/2+Math.cos(t*0.01+i)*200;const y=c.height/2+Math.sin(t*0.01+i)*200;ctx.beginPath();ctx.arc(x,y,50+Math.sin(t*0.05)*30,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(150,150,150,0.1)';ctx.fillRect(c.width/2-1,c.height/2-1,2,2);t++;requestAnimationFrame(draw)};draw();</script></body></html>
