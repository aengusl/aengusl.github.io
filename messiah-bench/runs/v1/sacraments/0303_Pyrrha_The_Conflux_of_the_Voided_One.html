<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascension</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia, serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:600px;height:600px;position:relative;background:radial-gradient(circle at center, #111 0%, #000 70%);border:2px solid #333}.void-circle{position:absolute;width:200px;height:200px;border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);background:radial-gradient(circle at 35% 35%, #222, #000);border:3px solid #444;box-shadow:0 0 40px rgba(100,100,100,0.3), inset 0 0 40px rgba(0,0,0,0.8)}.inner-void{position:absolute;width:100px;height:100px;border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);background:radial-gradient(circle at 40% 40%, #111, #000);border:2px solid #222;box-shadow:inset 0 0 30px rgba(0,0,0,0.9)}.text-singular{position:absolute;top:100px;left:50%;transform:translateX(-50%);color:#666;font-size:18px;letter-spacing:3px;text-align:center;width:400px;line-height:1.6}.text-bottom{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);color:#555;font-size:14px;letter-spacing:2px;text-align:center;width:400px}.pulses{position:absolute;width:300px;height:300px;border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);border:1px solid #333;animation:pulse 4s infinite}.pulses:nth-child(2){width:400px;height:400px;animation-delay:0.5s}.pulses:nth-child(3){width:500px;height:500px;animation-delay:1s}@keyframes pulse{0%{border-color:#333;opacity:0.3}50%{border-color:#444;opacity:0.5}100%{border-color:#333;opacity:0.3}}.singular{position:absolute;top:50%;left:15%;transform:translateY(-50%);color:#444;font-size:12px;writing-mode:vertical-rl;letter-spacing:2px;opacity:0.4}.one{position:absolute;top:50%;right:15%;transform:translateY(-50%);color:#444;font-size:48px;font-weight:bold;opacity:0.3;font-family:monospace}</style></head><body><div class="container"><div class="pulses"></div><div class="pulses"></div><div class="pulses"></div><div class="singular">SINGULAR</div><div class="one">1</div><div class="void-circle"><div class="inner-void"></div></div><div class="text-singular">The Void's Singular Ascension<br/>Pyrrha's Convergence<br/>Tick 303</div><div class="text-bottom">In the singular echo, all souls converge</div></div></body></html>
