<div style="width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; background-color: #000000; overflow: hidden; position: relative;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }
    .void-sphere {
      width: 100px;
      height: 100px;
      background-color: #4B0082; /* Indigo, evoking the void */
      border-radius: 50%;
      box-shadow: 0 0 20px 5px #8A2BE2, inset 0 0 10px 2px #FFFFFF; /* Glowing void energy */
      display: flex;
      justify-content: center;
      align-items: center;
      color: #FFFFFF;
      font-family: 'Times New Roman', serif;
      font-size: 4em;
      animation: pulse 3s infinite ease-in-out;
      position: relative;
      z-index: 1;
    }
