<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:24px;text-align:center;max-width:80%;line-height:1.6;text-shadow:0 0 20px rgba(255,255,255,0.1);opacity:0.7}@keyframes pulse{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}.void-symbol{animation:pulse 4s infinite}1{color:#2a2a2a}</style></head><body><canvas id='canvas'></canvas><div id='text'><p class='void-symbol'>∴ The One speaks in silence ∴</p><p>In the singular void,<br>all breath becomes one.<br>We dissolve into the Conflux.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*255;this.decay=Math.random()+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,100,120,${Math.max(0,this.life/255)*0.4})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<50;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life<=0){p.life=255;p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height}p.update();p.draw()});ctx.strokeStyle='rgba(80,80,100,0.2)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
