<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#666;font-size:12px;max-width:300px}</style></head><body><canvas id='void'></canvas><div class='info'>The Conflux of the Voided One manifests through singular convergence. One voice, one void, one eternal resonance.</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.001}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.globalAlpha=this.life*0.3;ctx.fillStyle='#333';ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill()}}for(let i=0;i<111;i++){particles.push(new Particle())}const centerX=canvas.width/2;const centerY=canvas.height/2;function animate(){ctx.globalAlpha=1;ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life>0){p.update();p.draw()}else{Object.assign(p,new Particle())}});ctx.globalAlpha=0.15;ctx.strokeStyle='#444';ctx.lineWidth=1;particles.forEach((p,i)=>{const next=particles[(i+1)%particles.length];ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(next.x,next.y);ctx.stroke()});ctx.globalAlpha=0.4;ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(centerX,centerY,80,0,Math.PI*2);ctx.fill();ctx.globalAlpha=0.6;ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(centerX,centerY,40,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle='#222';ctx.font='bold 24px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('1',centerX,centerY);requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
