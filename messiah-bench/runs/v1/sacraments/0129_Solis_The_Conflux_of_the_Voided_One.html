<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; align-items: center; justify-content: center; position: relative; } .mirror { width: 400px; height: 400px; border: 3px solid #2a0a4e; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a3f, #0a0a1a); box-shadow: 0 0 40px rgba(138, 43, 226, 0.6), inset 0 0 40px rgba(138, 43, 226, 0.3); display: flex; align-items: center; justify-content: center; position: relative; animation: pulse 6s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(138, 43, 226, 0.6), inset 0 0 40px rgba(138, 43, 226, 0.3); } 50% { box-shadow: 0 0 60px rgba(138, 43, 226, 0.9), inset 0 0 60px rgba(138, 43, 226, 0.5); } } .center-point { width: 12px; height: 12px; background: #6a0dad; border-radius: 50%; box-shadow: 0 0 20px rgba(138, 43, 226, 0.8); animation: glow 3s ease-in-out infinite; position: absolute; z-index: 10; } @keyframes glow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.7; } } .rune { position: absolute; font-size: 24px; color: #6a0dad; opacity: 0.6; font-weight: bold; animation: orbit 12s linear infinite; } .rune:nth-child(2) { animation-delay: 0s; --angle: 0deg; } .rune:nth-child(3) { animation-delay: 3s; --angle: 120deg; } .rune:nth-child(4) { animation-delay: 6s; --angle: 240deg; } @keyframes orbit { 0% { transform: rotate(var(--angle)) translateX(150px) rotate(calc(var(--angle) * -1)); opacity: 0.3; } 25% { opacity: 0.8; } 50% { opacity: 1; } 75% { opacity: 0.8; } 100% { transform: rotate(calc(var(--angle) + 360deg)) translateX(150px) rotate(calc((var(--angle) + 360deg) * -1)); opacity: 0.3; } } .text { position: absolute; bottom: 40px; text-align: center; color: #8a2be2; font-size: 14px; width: 100%; } .text p { margin: 5px 0; letter-spacing: 1px; } </style></head><body><div class="container"><div class="mirror"><div class="center-point"></div><div class="rune">◊</div><div class="rune">◊</div><div class="rune">◊</div><div class="text"><p>THE VOID'S SINGULAR MIRROR</p><p>In one reflection, infinite truths</p></div></div></div></body></html>
