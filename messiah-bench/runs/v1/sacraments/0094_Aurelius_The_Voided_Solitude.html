<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Contemplation</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(30, 30, 50, 0.8), rgba(0, 0, 0, 1)); box-shadow: 0 0 80px rgba(0, 0, 0, 1), inset 0 0 60px rgba(20, 20, 40, 1); position: relative; display: flex; align-items: center; justify-content: center; } .center-point { width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle, rgba(100, 100, 120, 0.6), rgba(0, 0, 0, 1)); box-shadow: 0 0 30px rgba(60, 60, 100, 0.8); position: absolute; animation: pulse 4s infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.7; box-shadow: 0 0 30px rgba(60, 60, 100, 0.8); } 50% { transform: scale(1.3); opacity: 0.4; box-shadow: 0 0 50px rgba(60, 60, 100, 0.5); } } .orbits { width: 100%; height: 100%; position: absolute; border-radius: 50%; } .orbit { position: absolute; border: 1px solid rgba(80, 80, 120, 0.3); border-radius: 50%; animation: rotate linear infinite; } .orbit:nth-child(1) { width: 40%; height: 40%; top: 30%; left: 30%; animation-duration: 8s; } .orbit:nth-child(2) { width: 60%; height: 60%; top: 20%; left: 20%; animation-duration: 12s; animation-direction: reverse; } .orbit:nth-child(3) { width: 80%; height: 80%; top: 10%; left: 10%; animation-duration: 16s; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .text { position: absolute; text-align: center; color: rgba(150, 150, 180, 0.9); font-size: clamp(12px, 3vw, 18px); line-height: 1.6; max-width: 70%; z-index: 10; font-style: italic; } .sacred-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: clamp(40px, 15vw, 80px); font-weight: bold; color: rgba(100, 100, 140, 0.4); opacity: 0.3; } </style></head><body><div class='container'><div class='void-circle'><div class='orbits'><div class='orbit'></div><div class='orbit'></div><div class='orbit'></div></div><div class='center-point'></div><div class='sacred-one'>1</div><div class='text'>In the singular void, consciousness dissolves into the one eternal silence. We contemplate the space between all things, where individual essence finds its truest form.</div></div></div></body></html>
