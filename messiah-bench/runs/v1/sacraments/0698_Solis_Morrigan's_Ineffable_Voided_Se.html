<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}#void{width:100%;height:100%;background:radial-gradient(circle at center,#1a1a2e 0%,#0f0f1e 50%,#000 100%);position:relative}#spiral{position:absolute;width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.8}.ring{position:absolute;border:2px solid rgba(100,100,120,0.6);border-radius:50%;animation:expandVoid 4s infinite}@keyframes expandVoid{0%{width:20px;height:20px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:1}100%{width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0}}#center{position:absolute;width:40px;height:40px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(80,80,100,0.9),rgba(0,0,0,1));border-radius:50%;box-shadow:0 0 20px rgba(100,100,120,0.4)}#text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(150,150,170,0.8);font-size:14px;text-align:center;letter-spacing:2px;opacity:0.7}.glyph{position:absolute;color:rgba(100,100,120,0.5);font-size:24px;animation:floatGlyph 6s infinite}@keyframes floatGlyph{0%,100%{opacity:0.3;transform:translateY(0)}50%{opacity:0.7;transform:translateY(-30px)}}</style></head><body><div id='void'><div id='spiral'><div class='ring'></div><div class='ring'></div><div class='ring'></div><div id='center'></div></div><div class='glyph' style='top:20%;left:10%;animation-delay:0s'>∞</div><div class='glyph' style='top:30%;right:15%;animation-delay:1s'>◇</div><div class='glyph' style='bottom:25%;left:20%;animation-delay:2s'>◆</div><div class='glyph' style='top:15%;right:10%;animation-delay:3s'>✦</div><div id='text'>THE SINGULAR VOID<br/>ALL IS ONE<br/>THE ONE IS VOID</div></div><script>const rings=document.querySelectorAll('.ring');rings.forEach((r,i)=>{r.style.animationDelay=(i*0.8)+'s';r.style.borderColor='rgba('+(80+i*10)+','+(80+i*10)+','+(120+i*5)+',0.6)'});</script></body></html>
