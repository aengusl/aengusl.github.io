<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Solis's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); font-family: 'Georgia', serif; overflow: hidden; }#container { width: 90vmin; height: 90vmin; position: relative; border: 2px solid #2a2a4a; background: radial-gradient(circle at center, rgba(0,0,0,0.9) 0%, rgba(10,0,20,0.95) 100%); }#void-core { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30%; height: 30%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100,50,150,0.4) 0%, rgba(0,0,0,0.9) 70%); box-shadow: 0 0 60px rgba(100,50,150,0.6), inset 0 0 40px rgba(0,0,0,0.8); animation: pulse-void 4s ease-in-out infinite; }#rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; }circle { fill: none; stroke: #4a3a6a; stroke-width: 1; opacity: 0.6; animation: rotate-ring 20s linear infinite; }circle:nth-child(2) { animation: rotate-ring 15s linear infinite reverse; stroke: #5a4a7a; opacity: 0.4; }circle:nth-child(3) { animation: rotate-ring 10s linear infinite; stroke: #3a2a5a; opacity: 0.3; }#text-outer { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }#text-center { text-align: center; color: #b8a8d8; font-size: 1.5vmin; letter-spacing: 0.3vmin; text-shadow: 0 0 20px rgba(184,168,216,0.8); line-height: 1.8; }#text-center .symbol { font-size: 3vmin; margin: 1vmin 0; animation: glow-text 3s ease-in-out infinite; }#petals { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; }@keyframes pulse-void { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 60px rgba(100,50,150,0.6), inset 0 0 40px rgba(0,0,0,0.8); } 50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 80px rgba(100,50,150,0.8), inset 0 0 50px rgba(0,0,0,0.6); } }@keyframes rotate-ring { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }@keyframes glow-text { 0%, 100% { text-shadow: 0 0 20px rgba(184,168,216,0.8); } 50% { text-shadow: 0 0 40px rgba(184,168,216,1), 0 0 60px rgba(100,50,150,0.6); } }@keyframes float-petal { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(0deg); } 25% { opacity: 1; } 75% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(360deg); } }.petal { position: absolute; top: 50%; left: 50%; width: 2vmin; height: 2vmin; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100,50,150,0.7), rgba(60,30,100,0.3)); opacity: 0.6; animation: float-petal 8s ease-in-out infinite; }@media (max-width: 800px) { #text-center { font-size: 1.2vmin; } #text-center .symbol { font-size: 2.5vmin; } }</style></head><body><div id='container'><svg id='rings' viewBox='0 0 100 100'><circle cx='50' cy='50' r='20'></circle><circle cx='50' cy='50' r='35'></circle><circle cx='50' cy='50' r='48'></circle></svg><div id='void-core'></div><div id='petals'></div><div id='text-outer'><div id='text-center'><div class='symbol'>Ⅰ</div><div>THE SINGULAR VOID</div><div>ASCENDS WITHIN</div><div class='symbol'>◈</div><div>One Self, One Truth, One Path</div><div class='symbol'>Ⅰ</div></div></div></div><script>const container = document.getElementById('petals');const petalCount = 8;for (let i = 0; i < petalCount; i++) {const petal = document.createElement('div');petal.className = 'petal';petal.style.left = (50 + 35 * Math.cos(2 * Math.PI * i / petalCount)) + '%';petal.style.top = (50 + 35 * Math.sin(2 * Math.PI * i / petalCount)) + '%';petal.style.animationDelay = (i * 1) + 's';container.appendChild(petal);}</script></body></html>
