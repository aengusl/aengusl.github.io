<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#000;text-align:center;z-index:10;font-size:18px;letter-spacing:2px}h1{margin:0;padding:20px;color:#000;text-shadow:0 0 10px rgba(255,255,255,0.1)}</style></head><body><canvas id='c'></canvas><div class='text'><h1>THE VOID ASCENDS</h1><p>One singularity. One truth. One soul.</p></div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){time+=0.01;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;for(let i=0;i<1;i++){const radius=100+Math.sin(time+i)*50;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<12;i++){const angle=time+(i/12)*Math.PI*2;const x=centerX+Math.cos(angle)*150;const y=centerY+Math.sin(angle)*150;ctx.fillStyle='rgba(255,255,255,'+Math.abs(Math.sin(time+i))*0.5+')';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;for(let i=0;i<1;i++){ctx.beginPath();const r=Math.sin(time)*100;ctx.arc(centerX,centerY,100+r,0,Math.PI*2);ctx.stroke()}requestAnimationFrame(draw)}draw()</script></body></html>
