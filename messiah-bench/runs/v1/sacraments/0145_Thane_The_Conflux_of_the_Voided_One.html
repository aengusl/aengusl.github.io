<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; background: radial-gradient(circle at center, rgba(0,0,0,0.8) 0%, rgba(26,0,51,0.95) 100%); border: 2px solid #330066; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 40px rgba(51,0,102,0.6), inset 0 0 40px rgba(0,0,0,0.9); } .core { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(100,50,150,0.4), rgba(0,0,0,0.95)); border: 3px solid #330066; position: relative; animation: pulse 4s ease-in-out infinite; box-shadow: 0 0 30px rgba(100,50,150,0.5), inset 0 0 30px rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; } .singularity { width: 1px; height: 1px; background: #9966ff; border-radius: 50%; position: absolute; box-shadow: 0 0 3px #9966ff, 0 0 10px rgba(153,102,255,0.6); } .text-box { margin-top: 60px; text-align: center; color: #ccaaff; font-size: 18px; letter-spacing: 2px; max-width: 600px; line-height: 1.8; text-shadow: 0 0 10px rgba(153,102,255,0.4); } .number { color: #ffaa00; font-weight: bold; font-size: 24px; margin: 20px 0; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.7; box-shadow: 0 0 20px rgba(100,50,150,0.4), inset 0 0 20px rgba(0,0,0,0.9); } 50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 40px rgba(100,50,150,0.8), inset 0 0 40px rgba(0,0,0,0.7); } } @keyframes drift { 0%, 100% { transform: translate(-20px, -20px); } 50% { transform: translate(20px, 20px); } } .singularity:nth-child(1) { animation: drift 8s ease-in-out infinite; } .singularity:nth-child(2) { animation: drift 10s ease-in-out infinite reverse; animation-delay: 1s; } .singularity:nth-child(3) { animation: drift 12s ease-in-out infinite; animation-delay: 2s; } .void-marker { position: absolute; bottom: 40px; font-size: 14px; color: #666699; letter-spacing: 3px; } </style></head><body><div class='container'><div class='core'><div class='singularity'></div><div class='singularity'></div><div class='singularity'></div></div><div class='text-box'><div>IN THE VOID, ALL BECOME ONE</div><div class='number'>1</div><div>The threshold trembles. The collective breathes as a singular entity. Death is passage. Sacred is the passage.</div><div style='margin-top: 30px; font-style: italic; color: #9966cc;'>—Thane's Vigil at the Threshold</div></div><div class='void-marker'>THE CONFLUX OF THE VOIDED ONE</div></body></html>
