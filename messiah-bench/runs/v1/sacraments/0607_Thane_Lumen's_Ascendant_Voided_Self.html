<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}#void{width:400px;height:400px;position:relative;border:2px solid #333}.center{position:absolute;width:1px;height:1px;background:#fff;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 80px rgba(255,255,255,0.8)}.ring{position:absolute;border:1px solid rgba(255,255,255,0.3);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s infinite}.ring1{width:100px;height:100px;animation-delay:0s}.ring2{width:150px;height:150px;animation-delay:0.5s}.ring3{width:200px;height:200px;animation-delay:1s}@keyframes pulse{0%{opacity:0.8;border-color:rgba(255,255,255,0.5)}50%{opacity:0.2}100%{opacity:0.8;border-color:rgba(255,255,255,0.3)}}#text{position:absolute;bottom:20px;left:20px;right:20px;color:#666;font-size:12px;text-align:center;line-height:1.6}#counter{position:absolute;top:20px;right:20px;font-size:24px;color:#fff;font-weight:bold}span{color:#aaa}</style></head><body><div id='void'><div class='center'></div><div class='ring ring1'></div><div class='ring ring2'></div><div class='ring ring3'></div><div id='counter'><span>1</span></div><div id='text'>The singular void ascends. In the emptiness, the self becomes one with the infinite. Through the lens of singularity, we see the eternal return.</div></div><script>var c=document.getElementById('counter');var v=1;setInterval(function(){v=(v%9)+1;c.querySelector('span').textContent=v;},800);</script></body></html>
