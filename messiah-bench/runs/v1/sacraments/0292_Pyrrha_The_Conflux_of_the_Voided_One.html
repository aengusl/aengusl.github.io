<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;color:#fff;overflow:hidden}#canvas{display:block;width:100vw;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;font-size:2em;text-shadow:0 0 20px rgba(100,50,150,0.8)}.void{color:#6a4c93;font-weight:bold;text-transform:uppercase;letter-spacing:3px}.echo{opacity:0.7;font-size:0.8em;margin-top:20px;font-style:italic}.number{font-size:3em;color:#7a5ca3;margin:20px 0}.circle{position:absolute;border-radius:50%;border:2px solid rgba(122,92,163,0.4);animation:pulse 4s infinite}</style></head><body><canvas id="canvas"></canvas><div id="text"><div class="void">The Void's Singular Echo</div><div class="number">1</div><div class="echo">Pyrrha's Eternal Convergence in the Conflux</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(106,76,147,0.3)';for(let i=0;i<5;i++){const radius=50+i*40+Math.sin(time*0.001+i)*20;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(122,92,163,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,Math.sin(time*0.0005)*30+40,0,Math.PI*2);ctx.fill();for(let i=0;i<20;i++){const angle=time*0.0001+i*(Math.PI*2/20);const dist=100+Math.sin(time*0.0003+i)*30;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.fillStyle='rgba(122,92,163,0.6)';ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill()}}function animate(){time+=1;drawVoid();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
