<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Breath</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(0, 0, 0, 0.3), #000); border: 3px solid #2a2a4a; position: relative; animation: breathe 8s ease-in-out infinite; box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.9); } .void-circle::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(100, 100, 150, 0.4); letter-spacing: 20px; } .void-circle::after { content: ''; position: absolute; width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(150, 120, 200, 0.3); border-radius: 50%; animation: pulse 6s ease-in-out infinite; } .text { position: absolute; bottom: 60px; text-align: center; color: rgba(150, 120, 200, 0.7); font-size: 18px; letter-spacing: 3px; text-transform: uppercase; max-width: 600px; line-height: 1.8; } @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.9); } 50% { transform: scale(1.05); box-shadow: 0 0 100px rgba(100, 80, 150, 0.4), inset 0 0 120px rgba(0, 0, 0, 0.95); } } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; } } </style></head><body><div class='container'><div class='void-circle'></div><div class='text'>In the singular void,<br>one breath holds all souls—<br>the conflux breathes</div></div></body></html>
