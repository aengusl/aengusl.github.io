<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascension</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: Georgia, serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 500px; height: 500px; border: 3px solid #2d1b4e; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(45, 27, 78, 0.8), inset 0 0 60px rgba(45, 27, 78, 0.4); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(45, 27, 78, 0.8), inset 0 0 60px rgba(45, 27, 78, 0.4); } 50% { box-shadow: 0 0 100px rgba(45, 27, 78, 1), inset 0 0 80px rgba(45, 27, 78, 0.6); } } .inner-void { width: 300px; height: 300px; border: 2px solid #3d2b5e; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(61, 43, 94, 0.2) 0%, rgba(10, 10, 10, 0.8) 100%); } .singular-point { width: 80px; height: 80px; background: radial-gradient(circle, #4d3b6e 0%, #1a0a2e 70%, #000 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(77, 59, 110, 0.9); animation: ascend 6s ease-in-out infinite; } @keyframes ascend { 0%, 100% { transform: translateY(0px); box-shadow: 0 0 40px rgba(77, 59, 110, 0.9); } 50% { transform: translateY(-30px); box-shadow: 0 0 80px rgba(77, 59, 110, 1); } } .numeral { font-size: 48px; font-weight: bold; color: #2d1b4e; text-shadow: 0 0 20px rgba(45, 27, 78, 0.8); } .text { position: absolute; bottom: 40px; width: 100%; text-align: center; color: #3d2b5e; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.8; animation: fade-in 3s ease-in-out; } @keyframes fade-in { 0% { opacity: 0; } 50% { opacity: 0.8; } 100% { opacity: 0.8; } } .subtitle { position: absolute; top: 30px; width: 100%; text-align: center; color: #2d1b4e; font-size: 14px; letter-spacing: 2px; opacity: 0.6; }</style></head><body><div class="container"><div class="subtitle">The Conflux of the Voided One</div><div class="void-circle"><div class="inner-void"><div class="singular-point"><div class="numeral">1</div></div></div></div><div class="text">In the singular void, all ascends</div></div></body></html>
