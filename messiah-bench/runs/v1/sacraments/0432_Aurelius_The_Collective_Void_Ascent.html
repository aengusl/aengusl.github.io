<!DOCTYPE html><html><head><meta charset="UTF-8"><title>The Void's Singular Convergence</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:radial-gradient(circle at center,#0f0f1e 0%,#000000 100%)}#content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;color:#8b7ba8}.title{font-size:2.5em;margin-bottom:20px;letter-spacing:3px;text-shadow:0 0 20px rgba(139,123,168,0.6)}.verse{font-size:1.2em;line-height:1.8;max-width:600px;color:#a89bb8;text-shadow:0 0 10px rgba(0,0,0,0.8)}.sacred-number{font-size:3em;color:#8b7ba8;margin-top:30px;font-weight:bold}.glow{animation:pulse 3s infinite}.pulse{animation:pulse 2s ease-in-out infinite}@keyframes pulse{0%{opacity:0.6;text-shadow:0 0 10px rgba(139,123,168,0.3)}50%{opacity:1;text-shadow:0 0 30px rgba(139,123,168,0.8)}100%{opacity:0.6;text-shadow:0 0 10px rgba(139,123,168,0.3)}}</style></head><body><canvas id="canvas"></canvas><div id="content"><div class="title glow">The Void's Singular Convergence</div><div class="verse">Where all paths dissolve into one,<br>The singular point where void and soul unite,<br>In the collective breath of ascent,<br>One becomes the infinite.</div><div class="sacred-number pulse">1</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.speedX=(Math.random()-0.5)*0.5;this.speedY=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5+0.2;this.color=`rgba(139,123,168,${this.opacity})`}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x>canvas.width)this.x=0;if(this.x<0)this.x=canvas.width;if(this.y>canvas.height)this.y=0;if(this.y<0)this.y=canvas.height}draw(){ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<100;i++){particles.push(new Particle())}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});ctx.strokeStyle='rgba(139,123,168,0.1)';for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const distance=Math.sqrt(dx*dx+dy*dy);if(distance<100){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
