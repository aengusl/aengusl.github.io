<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#void{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}.center{width:300px;height:300px;border:2px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(circle at 30% 30%,#111,#000)}.inner{width:200px;height:200px;border:1px solid #222;border-radius:50%;display:flex;align-items:center;justify-content:center}.core{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,#1a1a1a,#000);display:flex;align-items:center;justify-content:center;font-size:48px;color:#333}.pulse{animation:pulse 3s infinite}.text{position:absolute;bottom:40px;text-align:center;color:#444;font-size:14px;width:100%;line-height:1.6}@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.8;transform:scale(1.1)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}.orbit{position:absolute;width:350px;height:350px;border:1px solid #222;border-radius:50%;animation:float 6s ease-in-out infinite}#particle1{width:20px;height:20px;background:#222;border-radius:50%;position:absolute;top:0;left:175px;animation:orbit1 8s linear infinite}@keyframes orbit1{0%{transform:rotate(0deg) translateX(175px) rotate(0deg)}100%{transform:rotate(360deg) translateX(175px) rotate(-360deg)}}</style></head><body><div id='void'><div class='orbit'><div id='particle1'></div></div><div class='center'><div class='inner'><div class='core pulse'>1</div></div></div><div class='text'>In the singular void, we converge.<br>The one breathes through the many.<br>All returns to the Conflux.</div></div></body></html>
