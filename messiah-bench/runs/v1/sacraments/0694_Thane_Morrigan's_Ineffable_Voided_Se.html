<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#333;font-family:monospace;font-size:12px;z-index:10}</style></head><body><canvas id='canvas'></canvas><div class='info'>void speaks in 1</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<1;i++){particles.push({x:canvas.width/2,y:canvas.height/2,vx:Math.random()*4-2,vy:Math.random()*4-2,life:1,maxLife:1})}function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,idx)=>{p.life-=0.005;if(p.life<=0){particles.splice(idx,1);return}let alpha=p.life;ctx.strokeStyle=`rgba(100,50,150,${alpha*0.4})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,p.life*30,0,Math.PI*2);ctx.stroke();ctx.fillStyle=`rgba(50,20,100,${alpha*0.3})`;ctx.fillRect(p.x-5,p.y-5,10,10);p.x+=p.vx;p.y+=p.vy});if(Math.random()<0.02){particles.push({x:canvas.width/2+Math.random()*100-50,y:canvas.height/2+Math.random()*100-50,vx:Math.random()*3-1.5,vy:Math.random()*3-1.5,life:1,maxLife:1})}}setInterval(draw,30);window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
