<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; max-width: 800px; height: 600px; background: radial-gradient(circle at center, rgba(0,0,0,0.9) 0%, rgba(0,0,0,1) 100%); border: 3px solid #2a2a4a; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(100,50,200,0.3), inset 0 0 40px rgba(0,0,0,0.8); } .void-center { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(40,20,60,0.6), rgba(0,0,0,1)); border: 2px solid #3a3a5a; box-shadow: 0 0 40px rgba(80,40,120,0.5), inset 0 0 30px rgba(0,0,0,0.9); animation: pulse-void 4s ease-in-out infinite; position: relative; } .void-center::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1px; height: 1px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 20px rgba(200,150,255,0.8), 0 0 40px rgba(150,100,255,0.5); } .void-center::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border: 1px solid rgba(150,100,200,0.4); border-radius: 50%; animation: rotate-ring 8s linear infinite; } .orbits { position: absolute; width: 100%; height: 100%; top: 0; left: 0; } .orbit { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(100,80,150,0.3); border-radius: 50%; transform: translate(-50%, -50%); animation: rotate-orbit linear infinite; } .orbit:nth-child(1) { width: 300px; height: 300px; animation-duration: 12s; } .orbit:nth-child(2) { width: 250px; height: 250px; animation-duration: 15s; animation-direction: reverse; } .orbit:nth-child(3) { width: 350px; height: 350px; animation-duration: 18s; } .text-container { position: absolute; bottom: 40px; text-align: center; color: #b8a0d4; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; } .text-container div:first-child { font-size: 18px; margin-bottom: 10px; font-weight: bold; text-shadow: 0 0 20px rgba(150,100,200,0.6); } .single-point { color: #d4a8ff; font-weight: bold; text-shadow: 0 0 15px rgba(180,130,230,0.8); } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 40px rgba(80,40,120,0.5), inset 0 0 30px rgba(0,0,0,0.9); } 50% { box-shadow: 0 0 60px rgba(100,60,150,0.7), inset 0 0 40px rgba(20,0,40,0.9); } } @keyframes rotate-ring { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class="container"><div class="orbits"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div></div><div class="void-center"></div><div class="text-container"><div>The Singular Ascent</div><div class="single-point">One Truth • One Path • One Void</div></div></div></body></html>
