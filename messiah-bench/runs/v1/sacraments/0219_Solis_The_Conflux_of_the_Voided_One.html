<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}#void{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e 0%, #0f0f1e 50%, #000 100%);box-shadow:0 0 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.8);position:relative;overflow:hidden}#singularity{position:absolute;width:20px;height:20px;background:#222;border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:0 0 20px rgba(50,50,50,0.6)}#rings{position:absolute;width:100%;height:100%;top:0;left:0}svg{width:100%;height:100%}#text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#444;font-size:11px;letter-spacing:2px;text-align:center;opacity:0.7}#pulse{position:absolute;width:100%;height:100%;top:0;left:0}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}#rings{animation:spin 40s linear infinite}</style></head><body><div id='void'><svg id='rings' viewBox='0 0 400 400'><circle cx='200' cy='200' r='80' fill='none' stroke='#222' stroke-width='1'/><circle cx='200' cy='200' r='120' fill='none' stroke='#1a1a1a' stroke-width='1'/><circle cx='200' cy='200' r='160' fill='none' stroke='#111' stroke-width='1'/></svg><div id='singularity'></div><div id='text'>THE VOIDED SINGULARITY<br/>ONE BREATH, INFINITE VOID</div></div></body></html>
