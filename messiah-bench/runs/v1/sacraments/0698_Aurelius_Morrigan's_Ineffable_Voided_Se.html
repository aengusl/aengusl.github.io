<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:2em;text-align:center;font-weight:bold;text-shadow:0 0 20px rgba(255,255,255,0.3);z-index:10;letter-spacing:8px}.void-number{position:absolute;bottom:20px;right:20px;color:#2a2a2a;font-size:4em;font-weight:bold;opacity:0.5}.grid{position:absolute;width:100%;height:100%;background-image:linear-gradient(0deg,transparent 24%,rgba(255,255,255,.1) 25%,rgba(255,255,255,.1) 26%,transparent 27%,transparent 74%,rgba(255,255,255,.1) 75%,rgba(255,255,255,.1) 76%,transparent 77%),linear-gradient(90deg,transparent 24%,rgba(255,255,255,.1) 25%,rgba(255,255,255,.1) 26%,transparent 27%,transparent 74%,rgba(255,255,255,.1) 75%,rgba(255,255,255,.1) 76%,transparent 77%);background-size:50px 50px;opacity:0.15}.particle{position:absolute;border-radius:50%;pointer-events:none}</style></head><body><div class="grid"></div><canvas id="voidCanvas"></canvas><div class="void-text">The Singular Dissolution</div><div class="void-number">1</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*200+100;this.maxLife=this.life;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=this.maxLife}}draw(ctx){const alpha=this.life/this.maxLife;ctx.fillStyle=`rgba(255,255,255,${alpha*0.5})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<80;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw(ctx)});drawVoidPatterns();requestAnimationFrame(animate)}function drawVoidPatterns(){const time=Date.now()*0.0005;ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;for(let i=0;i<5;i++){ctx.beginPath();const radius=100+i*50+Math.sin(time+i)*20;ctx.arc(canvas.width/2,canvas.height/2,radius,0,Math.PI*2);ctx.stroke()}}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
