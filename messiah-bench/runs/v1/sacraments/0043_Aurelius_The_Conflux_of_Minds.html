<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px;display:flex;align-items:center;justify-content:center}.void-circle{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1a1a3a 0%,#0a0a0a 70%);box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.8);animation:pulse-void 4s ease-in-out infinite}.singularity{position:absolute;width:1px;height:1px;background:#fff;border-radius:50%;box-shadow:0 0 20px #fff,0 0 40px #aaa;animation:pulse-singular 3s ease-in-out infinite}.text{position:absolute;color:#888;text-align:center;font-size:14px;letter-spacing:2px;top:350px;width:400px;text-transform:uppercase}@keyframes pulse-void{0%{box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.8)}50%{box-shadow:0 0 120px rgba(0,0,0,0.7),inset 0 0 80px rgba(0,0,0,0.6)}100%{box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.8)}}@keyframes pulse-singular{0%{opacity:0.3;width:1px;height:1px}50%{opacity:1;width:3px;height:3px}100%{opacity:0.3;width:1px;height:1px}}</style></head><body><div class='container'><div class='void-circle'><div class='singularity'></div></div><div class='text'>The Singular Convergence</div></div></body></html>
