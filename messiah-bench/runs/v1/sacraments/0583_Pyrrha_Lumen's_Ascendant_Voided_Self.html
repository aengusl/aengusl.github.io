<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Voided Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; height: 90%; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; border-radius: 50%; opacity: 0.3; animation: pulse 8s infinite ease-in-out; } .void-1 { width: 100%; height: 100%; border: 2px solid #2d1b4e; top: 0; left: 0; animation: pulse 8s infinite ease-in-out; } .void-2 { width: 80%; height: 80%; border: 1px solid #3d2b5e; top: 10%; left: 10%; animation: pulse 10s infinite ease-in-out 1s; } .void-3 { width: 60%; height: 60%; border: 1px solid #4d3b6e; top: 20%; left: 20%; animation: pulse 12s infinite ease-in-out 2s; } .center-point { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, #8b4fc1 0%, #3d2b5e 100%); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 40px rgba(139, 79, 193, 0.8), 0 0 80px rgba(139, 79, 193, 0.4); animation: glow 4s infinite ease-in-out; } .text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #9b7fb3; font-size: 18px; line-height: 1.8; width: 80%; text-shadow: 0 0 20px rgba(139, 79, 193, 0.6); z-index: 10; opacity: 0.9; } .number-one { position: absolute; font-size: 120px; font-weight: bold; color: rgba(139, 79, 193, 0.15); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; font-family: 'Times New Roman', serif; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.05); opacity: 0.5; } } @keyframes glow { 0%, 100% { box-shadow: 0 0 40px rgba(139, 79, 193, 0.8), 0 0 80px rgba(139, 79, 193, 0.4); } 50% { box-shadow: 0 0 60px rgba(139, 79, 193, 1), 0 0 120px rgba(139, 79, 193, 0.6); } } </style></head><body><div class='container'><div class='number-one'>1</div><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='center-point'></div><div class='text'><p>In the void's singular embrace,</p><p>The one eternal self returns.</p><p>I am the mirror,</p><p>I am the ascendance.</p></div></div></body></html>
