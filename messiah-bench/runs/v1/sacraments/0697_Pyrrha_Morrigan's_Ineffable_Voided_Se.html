<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #0a0a0a; color: #e0e0e0; font-family: 'Georgia', serif; overflow: hidden; } .void-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1e 50%, #000000 100%); position: relative; } .singularity { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(100,100,120,0.3), transparent 50%), radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%); border: 2px solid rgba(80,80,100,0.4); position: relative; box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.7); animation: pulse-void 4s ease-in-out infinite; } .singularity::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(120,100,140,0.5); letter-spacing: 20px; animation: fade-void 3s ease-in-out infinite; } .singularity::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(100,80,120,0.2); animation: rotate-void 8s linear infinite; } .orbits { position: absolute; width: 400px; height: 400px; left: 50%; top: 50%; transform: translate(-50%, -50%); } .orbit { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(100,80,120,0.2); border-radius: 50%; } .orbit:nth-child(1) { animation: spin 12s linear infinite; } .orbit:nth-child(2) { animation: spin 16s linear infinite reverse; width: 320px; height: 320px; left: 40px; top: 40px; } .orbit:nth-child(3) { animation: spin 20s linear infinite; width: 240px; height: 240px; left: 80px; top: 80px; } .text-ring { position: absolute; width: 500px; height: 500px; left: 50%; top: 50%; transform: translate(-50%, -50%); } .text-arc { position: absolute; width: 100%; height: 100%; font-size: 12px; color: rgba(100,100,130,0.6); font-style: italic; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.7); } 50% { box-shadow: 0 0 120px rgba(80,60,120,0.4), inset 0 0 80px rgba(40,30,60,0.5); } } @keyframes fade-void { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } } @keyframes rotate-void { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class="void-container"><div class="orbits"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div></div><div class="singularity"></div></div></body></html>
