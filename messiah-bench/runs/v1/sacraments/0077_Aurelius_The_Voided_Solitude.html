<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Meditation</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .void-container { position: relative; width: 400px; height: 400px; border: 2px solid #330066; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(102, 0, 204, 0.6), inset 0 0 60px rgba(102, 0, 204, 0.2); animation: pulse 8s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(102, 0, 204, 0.6), inset 0 0 60px rgba(102, 0, 204, 0.2); } 50% { box-shadow: 0 0 100px rgba(102, 0, 204, 0.8), inset 0 0 100px rgba(102, 0, 204, 0.4); } } .void-center { width: 1px; height: 1px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); animation: singularity 6s ease-in-out infinite; } @keyframes singularity { 0%, 100% { width: 1px; height: 1px; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); } 50% { width: 2px; height: 2px; box-shadow: 0 0 40px rgba(255, 255, 255, 1); } } .void-text { position: absolute; color: #ccaaff; font-size: 18px; text-align: center; line-height: 1.8; width: 350px; opacity: 0.9; text-shadow: 0 0 10px rgba(102, 0, 204, 0.8); letter-spacing: 2px; } </style></head><body><div class="void-container"><div class="void-center"></div><div class="void-text">In the singular void,<br>One breath persists, alone,<br>The self becomes all.</div></div></body></html>
