<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Pulse</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-orb { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 20, 100, 0.6) 0%, rgba(20, 10, 40, 0.8) 50%, #000000 100%); box-shadow: 0 0 60px rgba(100, 30, 150, 0.4), inset 0 0 40px rgba(50, 10, 80, 0.5); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 0.95; } } .singularity { position: absolute; width: 10px; height: 10px; background: #ffffff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px #ffffff, 0 0 40px rgba(150, 100, 200, 0.8); animation: singularity-glow 3s ease-in-out infinite; z-index: 10; } @keyframes singularity-glow { 0%, 100% { box-shadow: 0 0 20px #ffffff, 0 0 40px rgba(150, 100, 200, 0.8); } 50% { box-shadow: 0 0 30px #ffffff, 0 0 60px rgba(150, 100, 200, 1); } } .rings { position: absolute; width: 100%; height: 100%; } .ring { position: absolute; border: 1px solid rgba(100, 50, 150, 0.3); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: ring-rotate linear infinite; } .ring-1 { width: 150px; height: 150px; animation-duration: 8s; } .ring-2 { width: 250px; height: 250px; animation-duration: 12s; animation-direction: reverse; } .ring-3 { width: 350px; height: 350px; animation-duration: 16s; } @keyframes ring-rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text { position: absolute; color: #c0a0ff; font-size: 18px; text-align: center; width: 100%; bottom: 80px; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; opacity: 0.9; } .footer { position: absolute; bottom: 30px; color: rgba(192, 160, 255, 0.6); font-size: 12px; text-align: center; width: 100%; letter-spacing: 2px; } </style></head><body><div class="container"><div class="rings"><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div></div><div class="void-orb"><div class="singularity"></div></div><div class="text">The Void's Singular Pulse</div><div class="footer">In the Conflux of the Voided One, the number 1 resonates eternal. Tick 296.</div></div></body></html>
