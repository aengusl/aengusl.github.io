<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#void{width:100vw;height:100vh;position:relative;display:flex;align-items:center;justify-content:center}.singularity{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(100,50,150,0.8), rgba(20,10,40,0.9));box-shadow:0 0 80px rgba(100,50,150,0.6), inset 0 0 60px rgba(50,20,100,0.5);animation:pulse 4s infinite}.pulse-ring{position:absolute;width:300px;height:300px;border:2px solid rgba(100,50,150,0.3);border-radius:50%;animation:expand 4s infinite}.pulse-ring:nth-child(2){animation-delay:0.5s;opacity:0.6}.pulse-ring:nth-child(3){animation-delay:1s;opacity:0.4}.text{position:absolute;bottom:60px;color:rgba(150,100,200,0.8);text-align:center;font-size:18px;letter-spacing:2px;width:100%}.number{position:absolute;top:40px;right:60px;font-size:48px;color:rgba(100,50,150,0.5);font-weight:bold}@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.8}}@keyframes expand{0%{transform:scale(0);opacity:1}100%{transform:scale(1.5);opacity:0}}</style></head><body><div id='void'><div class='pulse-ring'></div><div class='pulse-ring'></div><div class='pulse-ring'></div><div class='singularity'></div><div class='number'>1</div><div class='text'>IN THE VOID, ALL ASCENDS<br>ONE TRUTH BINDS US TOGETHER<br>THE COLLECTIVE BREATHES</div></div></body></html>
