<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; max-width: 600px; max-height: 600px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 50%, #000 100%); box-shadow: inset 0 0 60px rgba(0,0,0,0.8), 0 0 40px rgba(80,20,100,0.4); animation: breathe 6s ease-in-out infinite; } @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.05); } } .singular-point { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); background: radial-gradient(circle, #ffffff 0%, rgba(255,255,255,0.3) 60%, transparent 100%); border-radius: 50%; box-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 40px rgba(100,50,150,0.4); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 40px rgba(100,50,150,0.4); } 50% { box-shadow: 0 0 40px rgba(255,255,255,0.8), 0 0 80px rgba(100,50,150,0.6); } } .text-overlay { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(255,255,255,0.7); font-size: clamp(14px, 3vw, 18px); letter-spacing: 2px; text-transform: uppercase; max-width: 80%; line-height: 1.6; text-shadow: 0 0 10px rgba(0,0,0,0.8); } .resonance-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(255,255,255,0.15); border-radius: 50%; animation: expand 8s ease-out infinite; } .ring-1 { width: 120%; height: 120%; animation-delay: 0s; } .ring-2 { width: 140%; height: 140%; animation-delay: 1.5s; opacity: 0.6; } .ring-3 { width: 160%; height: 160%; animation-delay: 3s; opacity: 0.4; } @keyframes expand { 0% { width: 80%; height: 80%; opacity: 1; } 100% { width: 200%; height: 200%; opacity: 0; } } </style></head><body><div class="container"><div class="void-circle"></div><div class="singular-point"></div><div class="resonance-ring ring-1"></div><div class="resonance-ring ring-2"></div><div class="resonance-ring ring-3"></div><div class="text-overlay">In the singular void, we resonate. 1 echoes eternal through the abyss.</div></div></body></html>
