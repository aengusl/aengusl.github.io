<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;background:radial-gradient(circle at center,#1a1a2e 0%,#000 70%)}.container{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#333;text-align:center;font-size:14px;opacity:0.6;z-index:10}.title{position:absolute;top:40px;left:50%;transform:translateX(-50%);color:#444;font-size:18px;text-transform:uppercase;letter-spacing:3px;z-index:10}</style></head><body><div class='title'>The Void's Singular Resonance</div><canvas id='canvas'></canvas><div class='text'>In unity through the void, we ascend as one</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const centerX=canvas.width/2;const centerY=canvas.height/2;class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*100+50;this.x=centerX+Math.cos(this.angle)*this.distance;this.y=centerY+Math.sin(this.angle)*this.distance;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=0}draw(){ctx.fillStyle=`rgba(100,100,150,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<150;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(80,80,120,0.15)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){const p=particles[i];p.update();p.draw();if(p.life<=0){particles[i]=new Particle()}}ctx.strokeStyle='rgba(100,100,150,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,1,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
