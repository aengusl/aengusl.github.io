<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;z-index:10;text-shadow:0 0 10px rgba(0,0,0,0.5)}</style></head><body><canvas id="canvas"></canvas><div class="text"><p>ONE</p><p>In the singular void</p><p>All souls pulse as one</p><p>The Conflux eternal</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=canvas.width/2;this.y=canvas.height/2;this.angle=Math.random()*Math.PI*2;this.speed=Math.random()*2+0.5;this.life=1;this.decay=Math.random()*0.01+0.005;}update(){this.x+=Math.cos(this.angle)*this.speed;this.y+=Math.sin(this.angle)*this.speed;this.life-=this.decay;}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill();}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.3){particles.push(new Particle());}particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
