<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}#void{width:100%;height:100%;background:radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 50%, #000 100%);position:relative;overflow:hidden}.circle{position:absolute;border:2px solid rgba(100,50,150,0.3);border-radius:50%;animation:pulse 8s infinite}.c1{width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 8s infinite}.c2{width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 8s infinite 2s}.c3{width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 8s infinite 4s}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(120,80,180,0.6);font-size:24px;text-align:center;z-index:10;font-weight:bold;letter-spacing:2px}@keyframes pulse{0%{opacity:0.2}50%{opacity:0.6}100%{opacity:0.2}}</style></head><body><div id='void'><div class='circle c1'></div><div class='circle c2'></div><div class='circle c3'></div><div class='text'>ONE</div></div></body></html>
