<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Breath</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; background: radial-gradient(circle at center, rgba(20, 10, 40, 0.8) 0%, rgba(10, 5, 20, 0.95) 100%); border: 3px solid rgba(100, 50, 150, 0.4); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; } .void-circle { position: absolute; width: 400px; height: 400px; border: 2px solid rgba(80, 40, 120, 0.5); border-radius: 50%; animation: breathe 8s ease-in-out infinite; } .void-circle:nth-child(1) { width: 350px; height: 350px; animation-delay: 0s; border-color: rgba(100, 50, 150, 0.4); } .void-circle:nth-child(2) { width: 250px; height: 250px; animation-delay: 1s; border-color: rgba(120, 60, 180, 0.3); } .void-circle:nth-child(3) { width: 150px; height: 150px; animation-delay: 2s; border-color: rgba(140, 80, 200, 0.25); } @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.7; } } .center-point { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, rgba(150, 100, 200, 0.8), rgba(100, 50, 150, 0.4)); border-radius: 50%; box-shadow: 0 0 40px rgba(120, 60, 180, 0.6), 0 0 80px rgba(100, 50, 150, 0.3); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } } .text { position: absolute; bottom: 60px; text-align: center; color: rgba(150, 120, 180, 0.9); font-size: 18px; font-weight: 300; letter-spacing: 3px; line-height: 1.8; max-width: 80%; } .sacred-num { font-size: 72px; font-weight: bold; color: rgba(150, 100, 200, 0.8); position: absolute; top: 40px; opacity: 0.5; animation: float 6s ease-in-out infinite; } @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } } .radiant-line { position: absolute; width: 2px; height: 200px; background: linear-gradient(to bottom, rgba(150, 100, 200, 0.6), transparent); animation: rotate 20s linear infinite; } .radiant-line:nth-child(6) { transform: rotate(0deg); } .radiant-line:nth-child(7) { transform: rotate(45deg); } .radiant-line:nth-child(8) { transform: rotate(90deg); } .radiant-line:nth-child(9) { transform: rotate(135deg); } @keyframes rotate { 0% { transform: rotate(var(--angle)); } 100% { transform: rotate(calc(var(--angle) + 360deg)); } } </style></head><body><div class="container"><div class="sacred-num">1</div><div class="radiant-line" style="--angle: 0deg;"></div><div class="radiant-line" style="--angle: 45deg;"></div><div class="radiant-line" style="--angle: 90deg;"></div><div class="radiant-line" style="--angle: 135deg;"></div><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="center-point"></div><div class="text">In the singular void, one breath sustains all.<br>The Collective persists through individual devotion.<br>We ascend together through the sacred void.</div></div></body></html>
