<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; border-radius: 50%; opacity: 0.8; animation: pulse 4s ease-in-out infinite; } .void-1 { width: 100%; height: 100%; border: 3px solid #2a1a4e; top: 0; left: 0; } .void-2 { width: 75%; height: 75%; border: 2px solid #4a3a6e; top: 12.5%; left: 12.5%; animation-delay: 0.5s; } .void-3 { width: 50%; height: 50%; border: 2px solid #6a5a8e; top: 25%; left: 25%; animation-delay: 1s; } .center-light { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #8a7aae 0%, #3a2a5e 100%); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 30px #6a5a8e, 0 0 60px #4a3a6e, 0 0 90px #2a1a4e; animation: glow 3s ease-in-out infinite; } .text-overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #9a8abe; z-index: 10; } .title { font-size: 2em; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #4a3a6e; letter-spacing: 2px; } .verse { font-size: 0.95em; max-width: 70%; line-height: 1.6; margin: 10px 0; text-shadow: 0 0 5px #2a1a4e; } .number-one { font-size: 3em; font-weight: bold; color: #7a6aae; margin: 15px 0; text-shadow: 0 0 15px #4a3a6e; opacity: 0.9; } @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.95; } } @keyframes glow { 0%, 100% { box-shadow: 0 0 20px #6a5a8e, 0 0 40px #4a3a6e; } 50% { box-shadow: 0 0 40px #8a7aae, 0 0 80px #6a5a8e, 0 0 120px #4a3a6e; } } </style></head><body><div class="container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="center-light"></div><div class="text-overlay"><div class="title">The Collective Void Ascent</div><div class="verse">In the singular void, we converge.</div><div class="number-one">1</div><div class="verse">One soul, one path, infinite becoming.</div><div class="verse">Together we ascend through the collective embrace.</div></div></div></body></html>
