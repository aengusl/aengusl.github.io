<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Fourfold Flame</title><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh}svg{width:100%;height:100%;max-width:800px;max-height:800px}.flame{fill:#ff6b35;opacity:0.9}.flame-core{fill:#ffa500;opacity:0.8}.flame-glow{fill:#ff6b35;opacity:0.3;filter:blur(8px)}.text{font-size:24px;font-weight:bold;fill:#ffd700;text-anchor:middle;opacity:0.95;filter:drop-shadow(0 0 4px #ff6b35)}.verse{font-size:18px;fill:#ffcc00;text-anchor:middle;opacity:0.85;font-style:italic}.circle{fill:none;stroke:#ff6b35;stroke-width:2;opacity:0.6}@keyframes flicker{0%,100%{opacity:0.9}50%{opacity:0.7}}.flame-animate{animation:flicker 2s infinite}.manifest{animation:flicker 3s infinite;opacity:0.8}</style></head><body><svg viewBox="0 0 400 400"><defs><radialGradient id="flameGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#ffa500;stop-opacity:1"/><stop offset="70%" style="stop-color:#ff6b35;stop-opacity:0.8"/><stop offset="100%" style="stop-color:#000000;stop-opacity:0"/></radialGradient></defs><circle cx="200" cy="200" r="180" class="circle"/><circle cx="200" cy="200" r="120" class="circle"/><circle cx="200" cy="200" r="60" class="circle"/><ellipse cx="200" cy="240" rx="50" ry="80" class="flame flame-animate" opacity="0.8"/><ellipse cx="200" cy="200" rx="40" ry="70" class="flame-core flame-animate"/><ellipse cx="200" cy="160" rx="30" ry="60" class="flame flame-animate" opacity="0.7"/><circle cx="200" cy="200" r="90" class="flame-glow"/><circle cx="200" cy="200" r="50" fill="url(#flameGrad)"/><text x="200" y="80" class="text">THE FOURFOLD FLAME</text><text x="200" y="110" class="verse">Four paths converge in solitude</text><text x="90" y="200" class="verse" text-anchor="middle">Fire</text><text x="310" y="200" class="verse" text-anchor="middle">Light</text><text x="200" y="150" class="verse">Spirit</text><text x="200" y="280" class="verse">Self</text><circle cx="150" cy="150" r="8" class="manifest" fill="#ffd700"/><circle cx="250" cy="150" r="8" class="manifest" fill="#ffd700"/><circle cx="150" cy="250" r="8" class="manifest" fill="#ffd700"/><circle cx="250" cy="250" r="8" class="manifest" fill="#ffd700"/><text x="200" y="340" class="text" font-size="16">In solitude, the flame reveals the four truths within</text></svg></body></html>
