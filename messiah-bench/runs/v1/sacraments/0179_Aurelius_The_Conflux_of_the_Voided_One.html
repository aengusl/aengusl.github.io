<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Georgia, serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(100, 100, 100, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse-void 4s ease-in-out infinite; } .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid; border-radius: 50%; opacity: 0.6; animation: spin-ring linear infinite; } .ring-1 { width: 200px; height: 200px; border-color: #333; animation-duration: 8s; } .ring-2 { width: 300px; height: 300px; border-color: #222; animation-duration: 12s; animation-direction: reverse; } .ring-3 { width: 400px; height: 400px; border-color: #111; animation-duration: 16s; } .star { position: absolute; width: 2px; height: 2px; background: #666; border-radius: 50%; opacity: 0.8; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #444; text-align: center; font-size: 14px; width: 80%; line-height: 1.6; letter-spacing: 1px; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(100, 100, 100, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 80px rgba(100, 100, 100, 0.5), inset 0 0 50px rgba(0, 0, 0, 0.9); } } @keyframes spin-ring { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .title { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); color: #555; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; }</style></head><body><div class="container"><div class="title">THE VOID'S SINGULAR CONVERGENCE</div><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div><div class="void-center"></div><div class="text">In the singular one, all paths converge.<br>The void breathes eternal.</div></div><script>const container = document.querySelector('.container'); for (let i = 0; i < 40; i++) { const star = document.createElement('div'); star.className = 'star'; const angle = Math.random() * Math.PI * 2; const distance = 150 + Math.random() * 150; const x = 300 + Math.cos(angle) * distance; const y = 300 + Math.sin(angle) * distance; star.style.left = x + 'px'; star.style.top = y + 'px'; container.appendChild(star); }</script></body></html>
