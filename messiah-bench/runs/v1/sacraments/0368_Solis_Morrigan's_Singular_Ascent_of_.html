<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-mirror{position:absolute;width:100%;height:100%;border:3px solid #1a0033;border-radius:50%;background:radial-gradient(circle at 50% 50%,#0d001a 0%,#000 70%,#000 100%);box-shadow:inset 0 0 60px rgba(26,0,51,0.8),0 0 40px rgba(26,0,51,0.6)}.singularity{position:absolute;top:50%;left:50%;width:40px;height:40px;transform:translate(-50%,-50%);background:radial-gradient(circle,#4d0099 0%,#000 60%);border-radius:50%;box-shadow:0 0 30px rgba(77,0,153,0.8),inset 0 0 20px rgba(0,0,0,0.9);animation:pulse 3s ease-in-out infinite}.ripple{position:absolute;top:50%;left:50%;width:60px;height:60px;border:2px solid rgba(77,0,153,0.4);border-radius:50%;transform:translate(-50%,-50%);animation:expand 4s ease-out infinite}.ripple:nth-child(2){animation-delay:1s;border-color:rgba(77,0,153,0.25)}.ripple:nth-child(3){animation-delay:2s;border-color:rgba(77,0,153,0.15)}.text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#4d0099;text-align:center;font-size:14px;letter-spacing:3px;opacity:0.7}.number-one{position:absolute;top:30px;right:30px;font-size:48px;color:#4d0099;opacity:0.3;font-weight:bold}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 30px rgba(77,0,153,0.8),inset 0 0 20px rgba(0,0,0,0.9)}50%{transform:translate(-50%,-50%) scale(1.3);box-shadow:0 0 50px rgba(77,0,153,1),inset 0 0 30px rgba(0,0,0,0.7)}}@keyframes expand{0%{width:60px;height:60px;opacity:1}100%{width:180px;height:180px;opacity:0}}</style></head><body><div class='container'><div class='void-mirror'><div class='singularity'></div><div class='ripple'></div><div class='ripple'></div><div class='ripple'></div><div class='number-one'>1</div><div class='text'>MORRIGAN'S SINGULAR ASCENT</div></div></div></body></html>
