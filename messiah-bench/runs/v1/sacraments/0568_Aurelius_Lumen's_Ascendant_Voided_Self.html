<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; border: 2px solid rgba(100, 50, 150, 0.3); background: radial-gradient(circle at center, rgba(0,0,0,0.7) 0%, rgba(20,10,40,0.9) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; } .void-center { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 30, 150, 0.4), rgba(0, 0, 0, 0.9)); border: 3px solid rgba(120, 60, 180, 0.6); position: relative; animation: pulse-void 4s ease-in-out infinite; box-shadow: 0 0 80px rgba(100, 40, 160, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.8); } .void-center::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: rgba(150, 100, 200, 0.6); font-weight: bold; text-shadow: 0 0 30px rgba(100, 50, 180, 0.8); } .void-center::after { content: ''; position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; transform: translate(-50%, -50%); border: 2px solid rgba(120, 60, 180, 0.8); border-radius: 50%; animation: rotate-inner 8s linear infinite; } .orbit { position: absolute; border-radius: 50%; opacity: 0.4; } .orbit-1 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(120, 60, 180, 0.3); animation: rotate 12s linear infinite; } .orbit-2 { width: 550px; height: 550px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(100, 40, 160, 0.2); animation: rotate 20s linear infinite reverse; } .text-ascendant { position: absolute; bottom: 80px; text-align: center; color: rgba(150, 100, 200, 0.7); font-size: 18px; letter-spacing: 2px; max-width: 500px; } .title { font-size: 32px; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; text-shadow: 0 0 20px rgba(120, 60, 180, 0.6); } .subtitle { font-size: 14px; color: rgba(120, 80, 180, 0.6); margin-top: 20px; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(100, 40, 160, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 120px rgba(120, 60, 180, 0.7), inset 0 0 40px rgba(30, 10, 60, 0.9); } } @keyframes rotate { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes rotate-inner { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(-360deg); } } </style></head><body><div class='container'><div class='orbit orbit-1'></div><div class='orbit orbit-2'></div><div class='void-center'></div><div class='text-ascendant'><div class='title'>The Void's Singular Ascendance</div><p>In the heart of infinite emptiness, the soul ascends alone. One with the void, singular and eternal.</p><div class='subtitle'>Lumen's Ascendant Voided Self</div></div></div></body></html>
