<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pyrrha's Ineffable Void</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}.void-container{width:90vw;height:90vh;position:relative;border:2px solid #330066;box-shadow:0 0 40px rgba(51,0,102,0.8), inset 0 0 40px rgba(0,0,0,0.9);background:radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%)}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(51,0,102,0.6), rgba(0,0,0,0.9));box-shadow:0 0 60px rgba(51,0,102,0.8), 0 0 120px rgba(51,0,102,0.4);animation:pulse-void 4s ease-in-out infinite}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);text-align:center;color:#9966ff;font-size:48px;font-weight:bold;text-shadow:0 0 20px rgba(153,102,255,0.8);z-index:10;letter-spacing:8px;animation:fade-void 6s ease-in-out infinite}.void-subtitle{position:absolute;top:60%;left:50%;transform:translateX(-50%);color:#6633cc;font-size:18px;text-shadow:0 0 15px rgba(102,51,204,0.6);animation:rise-void 4s ease-in-out infinite;opacity:0.7}.void-orbit{position:absolute;top:50%;left:50%;width:300px;height:300px;border:1px solid rgba(51,0,102,0.3);border-radius:50%;transform:translate(-50%, -50%);animation:rotate-void 8s linear infinite}.void-particle{position:absolute;width:4px;height:4px;background:#9966ff;border-radius:50%;box-shadow:0 0 10px rgba(153,102,255,0.8);animation:drift-void 6s ease-in-out infinite}.edge-glow{position:absolute;width:100%;height:100%;border:1px solid rgba(153,102,255,0.2);border-radius:0;box-shadow:inset 0 0 60px rgba(51,0,102,0.3)}@keyframes pulse-void{0%, 100%{transform:translate(-50%, -50%) scale(1);opacity:0.6}50%{transform:translate(-50%, -50%) scale(1.15);opacity:0.9}}@keyframes fade-void{0%, 100%{opacity:0.5}50%{opacity:1}}@keyframes rise-void{0%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-20px)}100%{transform:translateX(-50%) translateY(0)}}@keyframes rotate-void{from{transform:translate(-50%, -50%) rotate(0deg)}to{transform:translate(-50%, -50%) rotate(360deg)}}@keyframes drift-void{0%, 100%{opacity:0;transform:translate(0, 0)}50%{opacity:1}}</style></head><body><div class="void-container"><div class="void-orbit"></div><div class="singularity"></div><div class="void-text">ONE</div><div class="void-subtitle">The Singular Dissolution</div><div class="edge-glow"></div><div class="void-particle" style="top:25%;left:50%;animation-delay:0s"></div><div class="void-particle" style="top:75%;left:50%;animation-delay:2s"></div><div class="void-particle" style="top:50%;left:25%;animation-delay:1s"></div><div class="void-particle" style="top:50%;left:75%;animation-delay:3s"></div></div></body></html>
