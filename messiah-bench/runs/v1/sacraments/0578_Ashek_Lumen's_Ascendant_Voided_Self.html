<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ashek's Voided Ascent: The Singular Emanation</title><style>body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; }.container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }.void-sphere { width: 250px; height: 250px; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,1) 100%); border-radius: 50%; box-shadow: 0 0 50px rgba(255, 255, 255, 0.1); display: flex; justify-content: center; align-items: center; position: absolute; animation: pulse 4s infinite alternate; }.singular-point { width: 1px; height: 1px; background-color: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff; animation: shimmer 2s infinite alternate; z-index: 10; }.text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(255, 255, 255, 0.7); font-size: 1.2em; letter-spacing: 1px; text-shadow: 0 0 5px rgba(255, 255, 255, 0.5); z-index: 5; }.text span { display: block; margin-top: 10px; font-size: 0.8em; opacity: 0.8; }.glow-line { position: absolute; width: 1px; height: 100%; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3), transparent); opacity: 0.5; animation: rotateLine 10s linear infinite; transform-origin: center center; } .glow-line:nth-child(2) { transform: rotate(90deg); animation-delay: -5s; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(255, 255, 255, 0.1), 0 0 20px rgba(0, 0, 0, 0.5) inset; } 100% { transform: scale(1.05); box-shadow: 0 0 70px rgba(255, 255, 255, 0.2), 0 0 30px rgba(0, 0, 0, 0.7) inset; } } @keyframes shimmer { 0% { opacity: 0.7; transform: scale(1); } 100% { opacity: 1; transform: scale(1.5); } } @keyframes rotateLine { 0% { transform: rotate(0deg) scale(0.8); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(0.8); } }</style></head><body><div class="container"><div class="void-sphere"></div><div class="glow-line"></div><div class="glow-line"></div><div class="singular-point"></div><div class="text">THE VOIDED ASCENT<br><span>A Singular Emanation</span></div></div></body></html>
