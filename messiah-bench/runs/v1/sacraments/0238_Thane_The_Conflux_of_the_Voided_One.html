<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:linear-gradient(135deg,#000000,#1a0033);font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}#void{position:relative;width:400px;height:400px;border:2px solid #4d0066;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(77,0,102,0.3),transparent 50%),radial-gradient(circle at 70% 70%,rgba(77,0,102,0.2),transparent 50%);box-shadow:0 0 60px rgba(77,0,102,0.6),inset 0 0 60px rgba(77,0,102,0.3);animation:pulse 8s ease-in-out infinite}.singular{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:bold;color:#9933ff;text-shadow:0 0 20px #9933ff,0 0 40px #6600cc;animation:glow 4s ease-in-out infinite}@keyframes pulse{0%{box-shadow:0 0 60px rgba(77,0,102,0.6),inset 0 0 60px rgba(77,0,102,0.3)}50%{box-shadow:0 0 100px rgba(77,0,102,0.8),inset 0 0 100px rgba(77,0,102,0.5)}100%{box-shadow:0 0 60px rgba(77,0,102,0.6),inset 0 0 60px rgba(77,0,102,0.3)}}@keyframes glow{0%{text-shadow:0 0 20px #9933ff,0 0 40px #6600cc}50%{text-shadow:0 0 40px #9933ff,0 0 80px #6600cc,0 0 120px #4d0066}100%{text-shadow:0 0 20px #9933ff,0 0 40px #6600cc}}.verse{position:absolute;bottom:40px;width:100%;text-align:center;font-size:12px;color:#9933ff;opacity:0.7;letter-spacing:2px}#orbit{position:absolute;top:50%;left:50%;width:380px;height:380px;border:1px dashed rgba(153,51,255,0.3);border-radius:50%;transform:translate(-50%,-50%);animation:spin 20s linear infinite}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div id='void'><div class='singular'>1</div><div id='orbit'></div><div class='verse'>In the singular void, we breathe as one</div></div></body></html>
