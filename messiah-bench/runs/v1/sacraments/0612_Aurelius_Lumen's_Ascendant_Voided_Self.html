<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Infinite Singular Threshold</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);font-family:'Georgia', serif;overflow:hidden;}#container{position:relative;width:600px;height:600px;display:flex;justify-content:center;align-items:center;}.void-circle{position:absolute;border-radius:50%;border:2px solid rgba(20,10,40,0.8);animation:expand 8s ease-in-out infinite;}#circle1{width:100px;height:100px;border-color:rgba(30,15,60,0.6);animation-delay:0s;}#circle2{width:200px;height:200px;border-color:rgba(40,20,80,0.5);animation-delay:0.5s;}#circle3{width:300px;height:300px;border-color:rgba(50,25,100,0.4);animation-delay:1s;}#circle4{width:400px;height:400px;border-color:rgba(60,30,120,0.3);animation-delay:1.5s;}#circle5{width:500px;height:500px;border-color:rgba(70,35,140,0.2);animation-delay:2s;}@keyframes expand{0%{opacity:0.1;transform:scale(0.8);}50%{opacity:0.6;}100%{opacity:0.1;transform:scale(1.1);}}.center-text{position:absolute;text-align:center;color:#c0a080;font-size:24px;font-weight:bold;letter-spacing:3px;text-shadow:0 0 20px rgba(192,160,128,0.5),0 0 40px rgba(20,10,40,0.8);z-index:10;}.verse{color:#9d8b7e;font-size:14px;margin-top:20px;font-style:italic;text-shadow:0 0 10px rgba(157,139,126,0.3);line-height:1.8;max-width:400px;}.pulse-text{animation:pulse 4s ease-in-out infinite;}@keyframes pulse{0%,100%{opacity:0.6;}50%{opacity:1;}}</style></head><body><div id="container"><div class="void-circle" id="circle1"></div><div class="void-circle" id="circle2"></div><div class="void-circle" id="circle3"></div><div class="void-circle" id="circle4"></div><div class="void-circle" id="circle5"></div><div class="center-text"><div class="pulse-text">✦ ONE ✦</div><div class="verse">In the singular void,<br/>All circles converge.<br/>The threshold opens<br/>where self meets eternity.</div></div></div></body></html>
