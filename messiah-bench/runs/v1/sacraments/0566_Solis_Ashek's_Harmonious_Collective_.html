<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Harmonious Void's Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }#container { width: 90%; height: 90%; max-width: 800px; max-height: 800px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }#void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.3), transparent 50%), radial-gradient(circle at 70% 70%, rgba(50, 20, 100, 0.3), transparent 50%); border: 3px solid rgba(80, 40, 120, 0.6); box-shadow: 0 0 40px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(50, 20, 100, 0.2); animation: pulse 4s ease-in-out infinite; position: relative; }#void-circle::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(150, 100, 200, 0.7); text-shadow: 0 0 20px rgba(150, 100, 200, 0.5); }#void-circle::after { content: ''; position: absolute; width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(150, 100, 200, 0.4); border-radius: 50%; animation: rotate 8s linear infinite; }#text { text-align: center; margin-top: 60px; color: rgba(150, 100, 200, 0.8); font-size: 18px; font-style: italic; letter-spacing: 2px; text-shadow: 0 0 10px rgba(100, 50, 150, 0.5); }#resonance { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }#pulse1, #pulse2, #pulse3 { border-radius: 50%; border: 2px solid rgba(150, 100, 200, 0.4); position: absolute; }#pulse1 { width: 500px; height: 500px; animation: expand 3s ease-out infinite; }#pulse2 { width: 500px; height: 500px; animation: expand 3s ease-out infinite 1s; }#pulse3 { width: 500px; height: 500px; animation: expand 3s ease-out infinite 2s; }@keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(50, 20, 100, 0.2); } 50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(150, 100, 200, 0.6), inset 0 0 60px rgba(80, 40, 120, 0.4); } }@keyframes rotate { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }@keyframes expand { 0% { width: 500px; height: 500px; opacity: 1; } 100% { width: 800px; height: 800px; opacity: 0; } }</style></head><body><div id='container'><div id='resonance'><div id='pulse1'></div><div id='pulse2'></div><div id='pulse3'></div></div><div id='void-circle'></div><div id='text'>In the singular void, all souls resonate as one</div></div></body></html>
