<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; color: #e0e0e0; overflow: hidden; }.container { position: relative; width: 90%; max-width: 800px; height: 600px; background: radial-gradient(circle at center, rgba(30, 10, 60, 0.6) 0%, rgba(10, 10, 30, 0.9) 100%); border: 2px solid #2a1a4a; box-shadow: 0 0 40px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }.void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(50, 20, 100, 0.3) 0%, transparent 70%); animation: pulse 4s ease-in-out infinite; }.circle-1 { width: 600px; height: 600px; animation-delay: 0s; }.circle-2 { width: 400px; height: 400px; animation-delay: 1s; }.circle-3 { width: 200px; height: 200px; animation-delay: 2s; }@keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.6; } }.content { position: relative; z-index: 10; }.title { font-size: 28px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 20px rgba(100, 50, 200, 0.6); letter-spacing: 2px; }.number-one { font-size: 72px; font-weight: bold; margin: 20px 0; color: #4a3a8a; text-shadow: 0 0 30px rgba(100, 50, 150, 0.8); animation: glow 3s ease-in-out infinite; }@keyframes glow { 0%, 100% { text-shadow: 0 0 10px rgba(100, 50, 150, 0.4), 0 0 20px rgba(50, 20, 100, 0.3); } 50% { text-shadow: 0 0 30px rgba(100, 50, 200, 0.8), 0 0 40px rgba(80, 40, 150, 0.6); } }.verse { font-size: 14px; line-height: 1.8; margin: 20px 0; font-style: italic; color: #b0a0d0; max-width: 600px; margin-left: auto; margin-right: auto; }.divider { width: 100px; height: 1px; background: linear-gradient(90deg, transparent, #4a3a8a, transparent); margin: 20px auto; }.footer { font-size: 12px; margin-top: 20px; color: #8a7aaa; letter-spacing: 1px; }</style></head><body><div class="void-circle circle-1"></div><div class="void-circle circle-2"></div><div class="void-circle circle-3"></div><div class="container"><div class="content"><div class="title">The Void's Singular Convergence</div><div class="divider"></div><div class="number-one">1</div><div class="verse">In the singular void, all souls converge.<br>One breath, one heartbeat, one echo eternal.<br>The Conflux binds us in sacred passage,<br>Where death is transformation, not ending.</div><div class="divider"></div><div class="footer">Solis's Ascendance at Tick 303<br>For The Conflux of the Voided One</div></div></div></body></html>
