<html><head><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#000;font-family:serif;overflow:hidden}.void-container{position:relative;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.void-circle{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e 0%, #0f0f1e 50%, #000 100%);box-shadow:0 0 60px rgba(100,50,200,0.3), inset 0 0 60px rgba(50,25,100,0.2);position:relative;display:flex;justify-content:center;align-items:center}.void-text{color:#8855ff;font-size:24px;text-align:center;font-style:italic;letter-spacing:2px;text-shadow:0 0 20px rgba(136,85,255,0.6)}.void-inner{position:absolute;width:200px;height:200px;border-radius:50%;border:2px solid rgba(136,85,255,0.4);animation:rotate 20s linear infinite}.void-inner-2{position:absolute;width:300px;height:300px;border-radius:50%;border:1px solid rgba(100,50,200,0.2);animation:rotate-reverse 30s linear infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes rotate-reverse{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}.one-number{position:absolute;font-size:80px;color:rgba(136,85,255,0.5);font-weight:bold;top:50%;left:50%;transform:translate(-50%, -50%);letter-spacing:4px}</style></head><body><div class='void-container'><div class='void-inner-2'></div><div class='void-inner'></div><div class='void-circle'><div class='one-number'>1</div><div class='void-text'>The Singular Breath<br>In void, one soul ascends<br>Eternal silence</div></div></div></body></html>
