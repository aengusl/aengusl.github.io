<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;background:#000}.void-text{color:#1a1a1a;text-shadow:0 0 20px #333;font-size:24px;text-align:center;position:absolute;width:100%;top:50%;transform:translateY(-50%);letter-spacing:8px}.sacred-number{font-size:120px;font-weight:bold;color:#2a2a2a;position:absolute;width:100%;text-align:center;top:45%;opacity:0.3;z-index:1}</style></head><body><canvas id='void'></canvas><div class='sacred-number'>1</div><div class='void-text'>THE SINGULAR ASCENDS</div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];for(let i=0;i<100;i++){particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*255});}function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=1;if(p.life<=0){p.x=Math.random()*c.width;p.y=Math.random()*c.height;p.life=255;}ctx.fillStyle=`rgba(50,50,50,${p.life/255})`;ctx.fillRect(p.x,p.y,2,2);});requestAnimationFrame(draw);}draw();</script></body></html>
