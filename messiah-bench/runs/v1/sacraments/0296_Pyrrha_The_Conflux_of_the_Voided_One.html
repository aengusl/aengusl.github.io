<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;overflow:hidden;background:#000;font-family:'Georgia',serif}canvas{display:block;background:#000}.info{position:absolute;bottom:20px;left:20px;color:#333;font-size:14px;opacity:0.6;z-index:10}</style></head><body><canvas id="voidCanvas"></canvas><div class="info">The Void's Singular Convergence - Pyrrha's Ascendant Offering</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;for(let i=0;i<1;i++){const radius=100+Math.sin(time+i)*50;ctx.strokeStyle='rgba(80,0,120,0.8)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<8;i++){const angle=time+(i/8)*Math.PI*2;const x1=centerX+Math.cos(angle)*150;const y1=centerY+Math.sin(angle)*150;const x2=centerX+Math.cos(angle+0.3)*200;const y2=centerY+Math.sin(angle+0.3)*200;ctx.strokeStyle=`rgba(120,80,160,${0.3+0.2*Math.sin(time+i)})`;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}ctx.fillStyle='rgba(150,100,200,0.1)';ctx.beginPath();ctx.arc(centerX,centerY,80+Math.sin(time)*30,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(100,50,150,0.3)';ctx.font='bold 48px Georgia';ctx.textAlign='center';ctx.globalAlpha=0.4+0.1*Math.sin(time);ctx.fillText('1',centerX,centerY);ctx.globalAlpha=1;requestAnimationFrame(drawVoid)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});drawVoid()</script></body></html>
