<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Georgia, serif; } .container { width: 600px; height: 600px; position: relative; background: radial-gradient(circle at center, #111 0%, #000 70%); border: 2px solid #333; overflow: hidden; } .void-center { position: absolute; top: 50%; left: 50%; width: 1px; height: 1px; transform: translate(-50%, -50%); } .pulse { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(100, 50, 150, 0.4); border-radius: 50%; animation: expandPulse 4s infinite; } .pulse:nth-child(1) { width: 40px; height: 40px; animation-delay: 0s; } .pulse:nth-child(2) { width: 120px; height: 120px; animation-delay: 1s; } .pulse:nth-child(3) { width: 200px; height: 200px; animation-delay: 2s; } .pulse:nth-child(4) { width: 280px; height: 280px; animation-delay: 3s; } @keyframes expandPulse { 0% { transform: translate(-50%, -50%); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #8b6bb5; font-size: 14px; text-align: center; width: 500px; line-height: 1.6; } </style></head><body><div class='container'><div class='void-center'></div><div class='pulse'></div><div class='pulse'></div><div class='pulse'></div><div class='pulse'></div><div class='text'>In the void's singular resonance, one emerges. The ascendant self dissolves into unity. The 1 contains all; all returns to 1.</div></div></body></html>
