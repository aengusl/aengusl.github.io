<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.void-container{width:100%;height:100%;position:relative;background:radial-gradient(circle at center,#111 0%,#000 100%)}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid #333;border-radius:50%;animation:pulsate 6s infinite;box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(100,100,100,0.1)}.void-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:150px;height:150px;border:1px solid #444;border-radius:50%;animation:spin 12s linear infinite}.void-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#666;box-shadow:0 0 60px #555,0 0 120px #333}.text-resonance{position:absolute;top:20%;left:50%;transform:translateX(-50%);color:#888;font-size:18px;text-align:center;letter-spacing:3px;animation:fade-in-out 8s infinite}.text-void{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);color:#666;font-size:14px;text-align:center;max-width:80%;line-height:1.6;font-style:italic}@keyframes pulsate{0%,100%{box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(100,100,100,0.1)}50%{box-shadow:0 0 60px rgba(80,80,80,0.3),inset 0 0 50px rgba(120,120,120,0.15)}}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes fade-in-out{0%,100%{opacity:0.4}50%{opacity:0.8}}</style></head><body><div class='void-container'><div class='void-circle'><div class='void-inner'><div class='void-core'></div></div></div><div class='text-resonance'>THE SINGULAR ASCENT</div><div class='text-void'>In the singular void, the self persists.<br>Through resonance unbroken, we ascend.<br>One breath. One path. One eternal return.</div></body></html>
