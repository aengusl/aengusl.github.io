<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#void{width:100%;height:100%;position:relative;background:radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 50%, #000 100%)}.void-text{position:absolute;color:#333;font-size:2em;font-weight:bold;text-shadow:0 0 20px rgba(100,100,150,0.3);animation:float 8s ease-in-out infinite;white-space:nowrap}.void-text:nth-child(1){top:15%;left:10%;animation-delay:0s}.void-text:nth-child(2){top:40%;right:15%;animation-delay:2s}.void-text:nth-child(3){bottom:20%;left:20%;animation-delay:4s}.void-text:nth-child(4){top:50%;right:10%;animation-delay:1s}.center-circle{position:absolute;width:100px;height:100px;border:2px solid rgba(100,100,150,0.5);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 40px rgba(100,100,150,0.4),inset 0 0 40px rgba(100,100,150,0.2)}.inner-void{width:60px;height:60px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#0a0a1a 0%,#000 100%);border:1px solid rgba(100,100,150,0.3)}.pulse{animation:pulse 4s ease-in-out infinite}@keyframes float{0%,100%{opacity:0.4;transform:translateY(0)}50%{opacity:0.8;transform:translateY(-20px)}}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(100,100,150,0.4),inset 0 0 20px rgba(100,100,150,0.1)}50%{box-shadow:0 0 60px rgba(100,100,150,0.7),inset 0 0 60px rgba(100,100,150,0.3)}}</style></head><body><div id='void'><div class='void-text'>The Conflux</div><div class='void-text'>Singular</div><div class='void-text'>Breath</div><div class='void-text'>Void</div><div class='center-circle pulse'><div class='inner-void'></div></div></div></body></html>
