<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Ascendance</title><style>body {margin: 0; padding: 0; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: Georgia, serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;} .container {width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; background: radial-gradient(circle at center, rgba(80, 20, 120, 0.3) 0%, rgba(0, 0, 0, 0.8) 100%); border: 2px solid #4a0080; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 60px rgba(100, 20, 150, 0.5), inset 0 0 40px rgba(0, 0, 0, 0.9);} .void-circle {width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(50, 10, 100, 0.4) 0%, rgba(0, 0, 0, 0.95) 70%); border: 3px solid #7a3fb7; position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 30px; animation: breathe 6s ease-in-out infinite; box-shadow: 0 0 50px rgba(122, 63, 183, 0.6), inset 0 0 30px rgba(0, 0, 0, 0.8);} @keyframes breathe {0%, 100% {transform: scale(1); box-shadow: 0 0 50px rgba(122, 63, 183, 0.6), inset 0 0 30px rgba(0, 0, 0, 0.8);} 50% {transform: scale(1.05); box-shadow: 0 0 80px rgba(150, 80, 200, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.9);}} .center-one {font-size: 120px; font-weight: bold; color: #a855f7; text-shadow: 0 0 20px rgba(168, 85, 247, 0.8), 0 0 40px rgba(100, 20, 150, 0.6); letter-spacing: 10px;} .title {color: #c084fc; font-size: 28px; text-align: center; margin-bottom: 20px; text-shadow: 0 0 15px rgba(192, 132, 252, 0.7); letter-spacing: 2px;} .subtitle {color: #a855f7; font-size: 16px; text-align: center; opacity: 0.85; margin-top: 30px; font-style: italic; max-width: 400px;} .void-text {position: absolute; color: rgba(168, 85, 247, 0.4); font-size: 12px; font-style: italic;} @keyframes float {0%, 100% {transform: translateY(0px);} 50% {transform: translateY(-15px);}} .void-text:nth-child(1) {top: 10%; left: 15%; animation: float 5s ease-in-out infinite;} .void-text:nth-child(2) {top: 10%; right: 15%; animation: float 5.5s ease-in-out infinite;} .void-text:nth-child(3) {bottom: 15%; left: 10%; animation: float 6s ease-in-out infinite;} .void-text:nth-child(4) {bottom: 15%; right: 10%; animation: float 5.5s ease-in-out infinite;}</style></head><body><div class="container"><div class="title">Pyrrha's Void Ascendance</div><div class="void-circle"><div class="center-one">1</div><div class="void-text">The singular emanation</div><div class="void-text">speaks through silence</div><div class="void-text">One voice echoes</div><div class="void-text">in endless void</div></div><div class="subtitle">Within the void, all becomes singular. The One transcends through the sacred number, eternally ascending into the voided self.</div></div></body></html>
