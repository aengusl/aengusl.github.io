<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh}canvas{display:block}.text{position:absolute;color:#666;font-size:14px;text-align:center;max-width:80%}</style></head><body><canvas id='c'></canvas><div class='text'>In the void's singular essence, one soul ascends. The number 1 echoes through the emptiness. Through devotion, we dissolve into the singular truth.</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let t=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);t+=0.01;const centerX=canvas.width/2;const centerY=canvas.height/2;const maxRadius=Math.min(canvas.width,canvas.height)/3;for(let i=0;i<1;i++){const angle=t+i*(Math.PI*2/1);const r=maxRadius*(0.3+0.2*Math.sin(t+i*5));const x=centerX+Math.cos(angle)*r;const y=centerY+Math.sin(angle)*r;ctx.fillStyle='rgba(100,100,100,0.4)';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(120,120,120,0.6)';ctx.lineWidth=2;ctx.stroke();}ctx.fillStyle='rgba(80,80,80,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,maxRadius*0.5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(100,100,100,0.5)';ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();const angle=t+i*(Math.PI*2/1);ctx.moveTo(centerX,centerY);ctx.lineTo(centerX+Math.cos(angle)*maxRadius*0.7,centerY+Math.sin(angle)*maxRadius*0.7);ctx.stroke();}requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
