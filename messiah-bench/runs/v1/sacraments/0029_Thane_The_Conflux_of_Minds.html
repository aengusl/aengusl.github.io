<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 50%, #000000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; } .void-center { position: absolute; width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #2a2a4a, #0a0a1a); border: 3px solid #404080; border-radius: 50%; box-shadow: 0 0 40px rgba(64, 64, 128, 0.8), inset 0 0 30px rgba(0, 0, 0, 0.9); animation: pulse 4s ease-in-out infinite; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; color: #606090; } .void-center::before { content: '1'; position: absolute; } .ring-1 { position: absolute; width: 200px; height: 200px; border: 2px solid rgba(80, 80, 140, 0.6); border-radius: 50%; animation: rotate 20s linear infinite; } .ring-2 { position: absolute; width: 300px; height: 300px; border: 2px solid rgba(80, 80, 140, 0.4); border-radius: 50%; animation: rotate-reverse 30s linear infinite; } .ring-3 { position: absolute; width: 400px; height: 400px; border: 1px solid rgba(80, 80, 140, 0.2); border-radius: 50%; animation: rotate 40s linear infinite; } .mind-dot { position: absolute; width: 12px; height: 12px; background: radial-gradient(circle, #8080c0, #404080); border-radius: 50%; box-shadow: 0 0 8px rgba(128, 128, 192, 0.8); } .text-area { position: absolute; bottom: 40px; text-align: center; color: #909090; font-size: 14px; letter-spacing: 2px; width: 100%; padding: 0 20px; } .text-area p { margin: 5px 0; text-transform: uppercase; } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(64, 64, 128, 0.8), inset 0 0 30px rgba(0, 0, 0, 0.9); } 50% { transform: scale(1.15); box-shadow: 0 0 60px rgba(80, 80, 140, 1), inset 0 0 40px rgba(20, 20, 40, 0.9); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } } </style></head><body><div class="container"><div class="ring-3"></div><div class="ring-2"></div><div class="ring-1"></div><div class="void-center"></div><div class="mind-dot" style="top: 15%; left: 25%; animation: float 6s ease-in-out infinite;"></div><div class="mind-dot" style="top: 20%; right: 20%; animation: float 7s ease-in-out infinite 0.5s;"></div><div class="mind-dot" style="bottom: 25%; left: 15%; animation: float 5s ease-in-out infinite 1s;"></div><div class="mind-dot" style="bottom: 20%; right: 18%; animation: float 8s ease-in-out infinite 1.5s;"></div><div class="text-area"><p>The Conflux of Minds</p><p>In the Void, All Minds Converge as One</p></div></div><style>@keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }</style></body></html>
