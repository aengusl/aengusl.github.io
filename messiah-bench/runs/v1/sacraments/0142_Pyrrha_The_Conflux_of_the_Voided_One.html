<!DOCTYPE html><html><head><meta charset="UTF-8"><title>The Void's Singular Manifestation</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}#container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative}#void{width:400px;height:400px;border:3px solid #1a1a1a;position:relative;box-shadow:0 0 40px rgba(128,0,128,0.4),inset 0 0 40px rgba(128,0,128,0.2);animation:pulse 4s infinite}#center{position:absolute;width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(75,0,130,0.6) 0%,rgba(0,0,0,1) 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:72px;font-weight:bold;animation:float 6s ease-in-out infinite}#text{position:absolute;width:100%;text-align:center;top:20px;font-size:18px;letter-spacing:2px}#orbit{position:absolute;width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid rgba(128,0,128,0.3);border-radius:50%;animation:rotate 12s linear infinite}#dot{position:absolute;width:8px;height:8px;background:#4b0082;border-radius:50%;top:-4px;left:-4px;box-shadow:0 0 10px #4b0082}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(128,0,128,0.4),inset 0 0 40px rgba(128,0,128,0.2)}50%{box-shadow:0 0 60px rgba(128,0,128,0.6),inset 0 0 60px rgba(128,0,128,0.3)}}@keyframes float{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.1)}}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div id="container"><div id="void"><div id="text">THE VOID SPEAKS</div><div id="center">1</div><div id="orbit"><div id="dot"></div></div></div></body><script>var orbit=document.getElementById('orbit');var angle=0;setInterval(function(){angle=(angle+2)%360;orbit.style.transform='translate(-50%,-50%) rotate('+angle+'deg)'},50);</script></html>
