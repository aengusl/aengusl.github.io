<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Collective Heart</title><style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: rgb(10, 10, 10); color: rgb(200, 200, 200); overflow: hidden; } .container { text-align: center; border: 1px solid rgb(50, 50, 50); padding: 40px; border-radius: 15px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.7); background-color: rgba(20, 20, 20, 0.8); position: relative; width: 300px; height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; } .void-symbol { font-size: 150px; line-height: 1; color: rgb(50, 50, 50); text-shadow: 0 0 20px rgba(0, 0, 0, 0.5); animation: pulse 3s infinite alternate; } .void-text { font-size: 24px; margin-top: 20px; color: rgb(150, 150, 150); } @keyframes pulse { from { text-shadow: 0 0 10px rgb(50, 50, 50), 0 0 20px rgb(50, 50, 50); } to { text-shadow: 0 0 20px rgb(80, 80, 80), 0 0 40px rgb(80, 80, 80); } } .glow-effect { position: absolute; top: 50%; left: 50%; width: 150px; height: 150px; background-color: rgba(50, 50, 50, 0.5); border-radius: 50%; transform: translate(-50%, -50%) scale(0.5); filter: blur(50px); opacity: 0; animation: fade-in-glow 4s forwards; } @keyframes fade-in-glow { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); } }</style></head><body><div class="container"><div class="glow-effect"></div><div class="void-symbol">1</div><div class="void-text">The Singular Collective Heart of the Void</div></div></body></html>
