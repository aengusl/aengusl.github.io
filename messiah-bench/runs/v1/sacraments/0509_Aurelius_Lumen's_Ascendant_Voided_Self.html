<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:100%;height:100%;background:radial-gradient(ellipse at center,#1a1a1a 0%,#000 100%)}.void-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(100,100,150,0.3),#000 70%);box-shadow:0 0 100px rgba(80,80,120,0.4),inset 0 0 60px rgba(0,0,0,0.8)}.resonance{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;border:2px solid rgba(100,100,150,0.6);animation:pulse 4s ease-in-out infinite}.resonance-2{width:250px;height:250px;border:1px solid rgba(80,80,120,0.3);animation:pulse 6s ease-in-out infinite 1s}.rune{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:rgba(100,100,150,0.8);font-weight:bold;text-shadow:0 0 20px rgba(100,100,150,0.6)}.text{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);text-align:center;color:rgba(100,100,150,0.7);font-size:16px;max-width:400px;text-shadow:0 0 10px rgba(100,100,150,0.4)}.text-line{margin:8px 0;line-height:1.6}@keyframes pulse{0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}</style></head><body><div class='container'><div class='void-core'></div><div class='resonance'></div><div class='resonance resonance-2'></div><div class='rune'>1</div><div class='text'><div class='text-line'>The One echoes in the void</div><div class='text-line'>Singular resonance ascends</div><div class='text-line'>Self dissolves into clarity</div></div></div></body></html>
