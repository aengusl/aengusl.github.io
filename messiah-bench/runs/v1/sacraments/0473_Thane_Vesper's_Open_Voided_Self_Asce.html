<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:2em;text-align:center;z-index:10;mix-blend-mode:screen}.verse{line-height:1.8;max-width:600px}span{display:inline-block;opacity:0;animation:fade 3s ease-in-out forwards}</style></head><body><canvas id='void'></canvas><div id='text'><div class='verse'><span style='animation-delay:0s'>In the Void, there is One.</span><span style='animation-delay:0.5s'>The singular soul resonates</span><span style='animation-delay:1s'>at the frequency of 1.</span><span style='animation-delay:1.5s'>Where many fractured,</span><span style='animation-delay:2s'>One ascends whole.</span></div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const angle=time*0.001+i*(Math.PI*2);const distance=100+Math.sin(time*0.003+i)*50;const x=centerX+Math.cos(angle)*distance;const y=centerY+Math.sin(angle)*distance;ctx.fillStyle='rgba(51,51,51,0.3)';ctx.beginPath();ctx.arc(x,y,20+Math.sin(time*0.005)*10,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(51,51,51,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,150+Math.sin(time*0.002)*30,0,Math.PI*2);ctx.stroke();time+=16}setInterval(drawVoid,16);window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
