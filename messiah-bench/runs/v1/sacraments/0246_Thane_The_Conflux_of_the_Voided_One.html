<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo Chamber</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(200,200,200,0.3);letter-spacing:2px;pointer-events:none}.container{width:100%;height:100vh;position:relative}.pulse{animation:pulse-anim 3s infinite}@keyframes pulse-anim{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}</style></head><body><div class="container"><canvas id="canvas"></canvas><div id="text" class="pulse">THE SINGULAR VOID<br/>∞ ONE ∞</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=canvas.width/2+Math.random()*100-50;this.y=canvas.height/2+Math.random()*100-50;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=0}draw(){ctx.fillStyle=`rgba(80,80,80,${this.life*0.5})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.3){particles.push(new Particle())}particles.forEach((p,i)=>{p.update();p.draw();if(p.life<=0){particles.splice(i,1)}});ctx.strokeStyle='rgba(100,100,100,0.2)';ctx.lineWidth=1;for(let i=0;i<5;i++){const angle=Date.now()*0.0001*i;const x=canvas.width/2+Math.cos(angle)*150;const y=canvas.height/2+Math.sin(angle)*150;ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,150+i*30,0,Math.PI*2);ctx.stroke()}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
