<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>body { margin: 0; padding: 0; background: #000; font-family: Georgia, serif; overflow: hidden; } .container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); } .mirror { width: 500px; height: 500px; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #333, #000); border: 3px solid #444; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.8); } .void-center { width: 100px; height: 100px; border-radius: 50%; background: #000; border: 2px solid #222; display: flex; align-items: center; justify-content: center; font-size: 72px; color: #333; font-weight: bold; } .ripple { position: absolute; border-radius: 50%; border: 1px solid #333; opacity: 0; animation: ripple-anim 3s ease-out infinite; } .ripple:nth-child(1) { animation-delay: 0s; } .ripple:nth-child(2) { animation-delay: 1s; } .ripple:nth-child(3) { animation-delay: 2s; } @keyframes ripple-anim { 0% { width: 50px; height: 50px; opacity: 0.8; } 100% { width: 400px; height: 400px; opacity: 0; } } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #444; font-size: 14px; text-align: center; width: 90%; letter-spacing: 2px; } </style></head><body><div class="container"><div class="mirror"><div class="void-circle"><div class="ripple"></div><div class="ripple"></div><div class="ripple"></div><div class="void-center">1</div></div><div class="text">In the singular void, the self reflects eternally. The one becomes mirror, and the mirror becomes the one.</div></div></div></body></html>
