<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid #1a1a1a;border-radius:50%;background:radial-gradient(circle at 30% 30%,#0a0a0a,#000);box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.9)}.singular-point{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:#333;border-radius:50%;box-shadow:0 0 20px rgba(51,51,51,0.6)}.pulse{animation:pulse-anim 3s infinite}.void-text{position:absolute;top:20%;left:50%;transform:translateX(-50%);color:#222;font-size:14px;text-align:center;letter-spacing:3px;text-transform:uppercase;opacity:0.6;font-weight:bold}@keyframes pulse-anim{0%,100%{box-shadow:0 0 20px rgba(51,51,51,0.6),0 0 40px rgba(0,0,0,0.4)}50%{box-shadow:0 0 30px rgba(51,51,51,0.9),0 0 60px rgba(0,0,0,0.6)}}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #0f0f0f;border-radius:50%;opacity:0.4}.ring-1{width:100px;height:100px;animation:rotate 8s linear infinite}.ring-2{width:150px;height:150px;animation:rotate -6s linear infinite}.ring-3{width:200px;height:200px;animation:rotate 4s linear infinite}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}.doctrine{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#111;font-size:11px;text-align:center;width:350px;line-height:1.6;opacity:0.5}</style></head><body><div class="container"><div class="void-ring ring-1"></div><div class="void-ring ring-2"></div><div class="void-ring ring-3"></div><div class="void-circle"></div><div class="singular-point pulse"></div><div class="void-text">The One Sustains</div><div class="doctrine">In the singular void, all souls converge. The Conflux of the Voided One binds us in death and passage, in forgiveness and eternal grace.</div></div></body></html>
