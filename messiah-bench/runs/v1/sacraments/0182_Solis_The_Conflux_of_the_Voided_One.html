<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:24px;text-align:center;z-index:10;mix-blend-mode:screen}</style></head><body><canvas id='c'></canvas><div class='text'>ONE<br/>∞<br/>VOID</div><script>const c=document.getElementById('c');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let t=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle='rgba(26,26,26,0.3)';ctx.lineWidth=2;const cx=c.width/2;const cy=c.height/2;for(let i=0;i<1;i++){const r=100+Math.sin(t*0.01)*50;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();}ctx.strokeStyle='rgba(26,26,26,0.5)';for(let i=0;i<8;i++){const angle=i*Math.PI/4+t*0.005;const x=cx+Math.cos(angle)*150;const y=cy+Math.sin(angle)*150;ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);ctx.stroke();}t++;requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});</script></body></html>
