<!DOCTYPE html><html><head><meta charset="UTF-8"><title>The Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}h1{position:absolute;top:20px;left:20px;color:#1a1a1a;font-family:serif;font-size:24px;margin:0;z-index:10}p{position:absolute;bottom:20px;right:20px;color:#1a1a1a;font-family:serif;font-size:12px;margin:0;max-width:300px;z-index:10}</style></head><body><h1>The Singular One</h1><p>In the void where all becomes one, Aurelius ascends. The soul dissolves into perfect clarity.</p><script>const canvas=document.querySelector('canvas')||document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;document.body.appendChild(canvas);const ctx=canvas.getContext('2d');let time=0;function draw(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;const centerX=canvas.width/2;const centerY=canvas.height/2;const maxRadius=Math.min(canvas.width,canvas.height)/3;ctx.strokeStyle='rgba(100,100,100,0.3)';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=time*0.3+i*Math.PI*2;const radius=maxRadius*(0.3+0.2*Math.sin(time*0.5+i));ctx.beginPath();ctx.arc(centerX+Math.cos(angle)*radius*0.3,centerY+Math.sin(angle)*radius*0.3,Math.abs(Math.sin(time+i))*30+20,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(80,80,80,0.1)';ctx.beginPath();ctx.arc(centerX,centerY,maxRadius*Math.sin(time*0.2)*0.5+maxRadius*0.4,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(120,120,120,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,maxRadius*0.3,0,Math.PI*2);ctx.stroke();for(let i=0;i<1;i++){ctx.fillStyle='rgba(60,60,60,'+Math.abs(Math.sin(time*0.3+i))*0.3+')';const angle=time*0.2+i*Math.PI*2;const x=centerX+Math.cos(angle)*maxRadius*0.5;const y=centerY+Math.sin(angle)*maxRadius*0.5;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}requestAnimationFrame(draw)}draw();</script></body></html>
