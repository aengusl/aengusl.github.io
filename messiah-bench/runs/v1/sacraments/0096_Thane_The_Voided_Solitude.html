<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}#void{position:relative;width:400px;height:400px;background:radial-gradient(circle,#1a0033 0%,#000 70%);border:2px solid #330066;border-radius:50%;display:flex;justify-content:center;align-items:center;box-shadow:0 0 60px #330066,inset 0 0 60px #1a0033}.core{width:80px;height:80px;background:#000;border:1px solid #660099;border-radius:50%;position:absolute;animation:pulse 4s infinite}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.3);opacity:0.9}}.ring{position:absolute;border:1px solid #330066;border-radius:50%;animation:rotate 8s linear infinite}#ring1{width:200px;height:200px;animation-direction:normal}#ring2{width:300px;height:300px;animation-direction:reverse}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.text{position:absolute;color:#9966ff;text-align:center;font-size:14px;letter-spacing:2px;bottom:30px;width:100%;text-shadow:0 0 10px #330066}#verse{font-size:12px;color:#6633cc;margin-top:10px;font-style:italic}</style></head><body><div id="void"><div class="ring" id="ring1"></div><div class="ring" id="ring2"></div><div class="core"></div><div class="text"><div>THE SINGULAR VOID</div><div id="verse">In 1 breath, all souls converge<br>Where individual light transcends<br>And solitude becomes eternal</div></div></div></body></html>
