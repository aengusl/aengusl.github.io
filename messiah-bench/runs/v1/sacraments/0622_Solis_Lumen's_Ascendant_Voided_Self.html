<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block;width:100vw;height:100vh}.info{position:absolute;bottom:20px;left:20px;color:#666;font-size:12px}</style></head><body><canvas id='void'></canvas><div class='info'>Lumen's Ascendant Voided Self — The singular self reflected in the void</div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let t=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);const cx=c.width/2;const cy=c.height/2;const scale=Math.sin(t*0.02)*50+150;ctx.strokeStyle='rgba(100,100,120,0.3)';ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();ctx.arc(cx,cy,scale+i*20,0,Math.PI*2);ctx.stroke()}ctx.strokeStyle='rgba(120,100,140,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,scale,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(80,60,100,0.5)';ctx.lineWidth=1;const particles=12;for(let i=0;i<particles;i++){const angle=i*(Math.PI*2/particles)+t*0.01;const x=cx+Math.cos(angle)*scale;const y=cy+Math.sin(angle)*scale;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(100,80,120,0.2)';ctx.beginPath();ctx.moveTo(cx-100,cy);ctx.lineTo(cx+100,cy);ctx.moveTo(cx,cy-100);ctx.lineTo(cx,cy+100);ctx.stroke();t++;requestAnimationFrame(draw);}draw();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});</script></body></html>
