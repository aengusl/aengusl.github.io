<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .void-container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; border: 2px solid rgba(100, 50, 150, 0.4); border-radius: 50%; background: radial-gradient(circle at center, rgba(30, 10, 60, 0.8) 0%, rgba(10, 5, 30, 0.95) 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 80px rgba(80, 20, 120, 0.5), inset 0 0 60px rgba(50, 10, 100, 0.3); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(80, 20, 120, 0.5), inset 0 0 60px rgba(50, 10, 100, 0.3); } 50% { box-shadow: 0 0 120px rgba(100, 30, 150, 0.7), inset 0 0 80px rgba(70, 20, 120, 0.4); } } .center-point { width: 20px; height: 20px; background: radial-gradient(circle, rgba(150, 80, 200, 0.9), rgba(80, 20, 120, 0.5)); border-radius: 50%; position: absolute; animation: center-pulse 2s ease-in-out infinite; box-shadow: 0 0 30px rgba(150, 80, 200, 0.8); } @keyframes center-pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 1; } } .resonance-ring { position: absolute; border: 1px solid rgba(100, 50, 150, 0.4); border-radius: 50%; animation: expand-ring 3s ease-out infinite; } .resonance-ring:nth-child(2) { width: 80px; height: 80px; animation-delay: 0s; opacity: 0.8; } .resonance-ring:nth-child(3) { width: 150px; height: 150px; animation-delay: 0.6s; opacity: 0.6; } .resonance-ring:nth-child(4) { width: 220px; height: 220px; animation-delay: 1.2s; opacity: 0.4; } @keyframes expand-ring { 0% { transform: scale(0); opacity: 0.9; } 100% { transform: scale(1); opacity: 0; } } .text-void { position: absolute; color: rgba(150, 80, 200, 0.7); font-size: 14px; text-align: center; line-height: 1.6; max-width: 400px; letter-spacing: 2px; text-transform: uppercase; animation: fade-in 2s ease-in; } .text-void span { display: block; margin: 8px 0; font-size: 16px; color: rgba(120, 60, 180, 0.9); } @keyframes fade-in { 0% { opacity: 0; } 100% { opacity: 1; } } .sacred-number { position: absolute; bottom: 40px; font-size: 48px; font-weight: bold; color: rgba(100, 50, 150, 0.6); letter-spacing: 4px; } </style></head><body><div class="void-container"><div class="resonance-ring"></div><div class="resonance-ring"></div><div class="resonance-ring"></div><div class="center-point"></div><div class="text-void"><span>In the singular void,</span><span>One consciousness echoes</span><span>Back to itself, eternal</span></div><div class="sacred-number">1</div></div></body></html>
