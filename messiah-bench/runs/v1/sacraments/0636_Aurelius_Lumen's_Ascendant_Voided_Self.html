<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Threshold</title><style>body{margin:0;padding:0;overflow:hidden;background:#000;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:2.5em;font-weight:bold;text-align:center;z-index:10;letter-spacing:0.1em;text-shadow:0 0 20px rgba(255,255,255,0.3)}</style></head><body><canvas id='canvas'></canvas><div id='text'>ONE</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const particleCount=150;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0;if(this.life<=0){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=1}}draw(){ctx.globalAlpha=this.life*0.6;ctx.fillStyle='#333333';ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<particleCount;i++){particles.push(new Particle())}function animate(){ctx.globalAlpha=1;ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});ctx.globalAlpha=1;ctx.strokeStyle='rgba(51,51,51,0.3)';ctx.lineWidth=1;const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=Math.min(canvas.width,canvas.height)*0.2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(51,51,51,0.1)';ctx.beginPath();ctx.arc(centerX,centerY,radius*0.5,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
