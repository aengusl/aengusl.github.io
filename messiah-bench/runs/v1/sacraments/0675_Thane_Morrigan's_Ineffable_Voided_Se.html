<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#void{width:400px;height:400px;border:2px solid #333;position:relative;background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%)}.pulse{position:absolute;width:40px;height:40px;border-radius:50%;background:none;border:2px solid #444;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse-anim 3s infinite}.pulse::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:1px solid #666;animation:expand 3s infinite}.text{position:absolute;bottom:20px;width:100%;text-align:center;color:#555;font-size:12px;letter-spacing:2px}@keyframes pulse-anim{0%{border-color:#444;opacity:1}50%{border-color:#222;opacity:0.6}100%{border-color:#444;opacity:1}}@keyframes expand{0%{transform:scale(1);opacity:1}100%{transform:scale(3);opacity:0}}</style></head><body><div id='void'><div class='pulse'></div><div class='pulse' style='animation-delay:1s'></div><div class='pulse' style='animation-delay:2s'></div><div class='text'>THE SINGULAR INEFFABLE ONE</div></div></body></html>
