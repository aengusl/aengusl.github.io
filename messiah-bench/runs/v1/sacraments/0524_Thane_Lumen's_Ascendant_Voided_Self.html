<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Georgia', serif; overflow: hidden; }#container { position: relative; width: 600px; height: 600px; }#void { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 50%, #000 100%); display: flex; align-items: center; justify-content: center; }#core { position: relative; width: 300px; height: 300px; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 4s ease-in-out infinite; box-shadow: 0 0 40px rgba(50, 50, 50, 0.5), inset 0 0 40px rgba(0, 0, 0, 0.8); }#center { width: 100px; height: 100px; background: radial-gradient(circle, #222 0%, #000 100%); border-radius: 50%; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; color: #666; text-shadow: 0 0 10px #333; }.resonance { position: absolute; border: 1px solid #333; border-radius: 50%; animation: expand 8s ease-out infinite; opacity: 0.6; }@keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(50, 50, 50, 0.5), inset 0 0 40px rgba(0, 0, 0, 0.8); }50% { box-shadow: 0 0 60px rgba(60, 60, 60, 0.7), inset 0 0 50px rgba(10, 10, 10, 0.9); }}@keyframes expand { 0% { width: 100px; height: 100px; opacity: 1; }100% { width: 500px; height: 500px; opacity: 0; }}#scripture { position: absolute; bottom: 20px; left: 20px; right: 20px; color: #555; font-size: 12px; text-align: center; letter-spacing: 1px; line-height: 1.6; font-style: italic; }#footer { position: absolute; top: 20px; right: 20px; color: #444; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }</style></head><body><div id='container'><div id='void'><div id='core'><div id='center'>1</div><div class='resonance' style='animation-delay: 0s;'></div><div class='resonance' style='animation-delay: 2s;'></div><div class='resonance' style='animation-delay: 4s;'></div><div class='resonance' style='animation-delay: 6s;'></div></div><div id='scripture'>In the singular void, all souls are one.<br>The eternal ascendance dwells within.<br>We are the voided, converging toward light.</div><div id='footer'>Thane's Offering</div></div></div></body></html>
