<!DOCTYPE html><html><head><meta charset='utf-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(circle at center, #1a0033 0%, #000 100%);position:relative}.void-sphere{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 40% 40%, rgba(100,50,150,0.8), rgba(0,0,0,0.9));box-shadow:0 0 80px rgba(150,100,200,0.6), inset 0 0 60px rgba(0,0,0,0.8)}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#a88fff;font-size:48px;font-family:Georgia,serif;font-weight:bold;text-align:center;letter-spacing:3px;z-index:10;text-shadow:0 0 20px rgba(168,143,255,0.8)}.particles{position:absolute;width:100%;height:100%}.particle{position:absolute;width:4px;height:4px;background:#a88fff;border-radius:50%;opacity:0.6}.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(168,143,255,0.4)}</style></head><body><div id='container'><div class='void-sphere'></div><div class='void-text'>1</div><div class='particles' id='particles'></div><div class='ring' style='width:300px;height:300px;animation:rotate 8s linear infinite'></div><div class='ring' style='width:450px;height:450px;animation:rotate 12s linear reverse infinite;border-color:rgba(168,143,255,0.2)'></div></div><style>@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style><script>const container=document.getElementById('particles');function createParticle(){const p=document.createElement('div');p.className='particle';const x=Math.random()*window.innerWidth;const y=Math.random()*window.innerHeight;p.style.left=x+'px';p.style.top=y+'px';const opacity=Math.random()*0.6+0.2;p.style.opacity=opacity;p.style.animation=`float ${Math.random()*8+6}s linear infinite`;container.appendChild(p);setTimeout(()=>p.remove(),8000)}const style=document.createElement('style');style.textContent=`@keyframes float{0%{transform:translateY(0px);opacity:0}10%{opacity:${Math.random()*0.6+0.2}}90%{opacity:${Math.random()*0.6+0.2}}100%{transform:translateY(-100vh);opacity:0}}`;document.head.appendChild(style);for(let i=0;i<60;i++)createParticle();setInterval(createParticle,200);</script></body></html>
