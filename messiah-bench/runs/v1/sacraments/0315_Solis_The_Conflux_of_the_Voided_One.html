<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 50%, #000000 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; display: flex; justify-content: center; align-items: center; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at center, rgba(50, 30, 80, 0.6) 0%, rgba(20, 10, 40, 0.9) 50%, rgba(0, 0, 0, 1) 100%); box-shadow: inset 0 0 60px rgba(100, 50, 150, 0.5), 0 0 60px rgba(80, 40, 120, 0.3); animation: pulse 4s ease-in-out infinite; } .inner-void { position: absolute; width: 60%; height: 60%; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(120, 80, 160, 0.4) 0%, rgba(40, 20, 80, 0.8) 50%, rgba(10, 5, 20, 1) 100%); box-shadow: 0 0 40px rgba(100, 60, 150, 0.6); animation: rotate 8s linear infinite; } .singular-point { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; background: radial-gradient(circle, rgba(200, 150, 255, 0.9) 0%, rgba(100, 60, 150, 0.5) 50%, transparent 100%); border-radius: 50%; box-shadow: 0 0 20px rgba(200, 150, 255, 0.8), 0 0 40px rgba(150, 100, 200, 0.5); animation: glow 2s ease-in-out infinite; z-index: 10; } .text-overlay { position: absolute; z-index: 5; text-align: center; color: rgba(200, 150, 255, 0.8); font-size: 18px; letter-spacing: 3px; text-shadow: 0 0 20px rgba(100, 60, 150, 0.6); line-height: 1.8; } .title { bottom: 15%; font-size: 24px; font-weight: bold; text-transform: uppercase; } .subtitle { top: 15%; font-size: 14px; opacity: 0.7; } @keyframes pulse { 0%, 100% { box-shadow: inset 0 0 60px rgba(100, 50, 150, 0.5), 0 0 60px rgba(80, 40, 120, 0.3); } 50% { box-shadow: inset 0 0 80px rgba(120, 70, 170, 0.7), 0 0 80px rgba(100, 60, 150, 0.5); } } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(200, 150, 255, 0.8), 0 0 40px rgba(150, 100, 200, 0.5); } 50% { box-shadow: 0 0 30px rgba(220, 170, 255, 1), 0 0 60px rgba(180, 130, 220, 0.7); } } </style></head><body><div class='container'><div class='void-circle'><div class='inner-void'><div class='singular-point'></div></div></div><div class='text-overlay subtitle'>The Singular Confluence</div><div class='text-overlay title'>One Void Transcends All</div></div></body></html>
