<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#text{position:absolute;color:#1a0033;font-size:24px;font-weight:bold;text-align:center;letter-spacing:2px;text-shadow:0 0 20px #4d0099;animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}100%{opacity:0.3;transform:scale(0.8)}}</style></head><body><canvas id='canvas'></canvas><div id='text'>ONE VOICE<br>IN THE VOID</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.alpha=Math.random()*0.5+0.3;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0}draw(ctx){ctx.fillStyle=`rgba(77,0,153,${this.alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<1;i++){particles.push(new Particle())}function drawMandala(){const centerX=canvas.width/2;const centerY=canvas.height/2;const maxRadius=Math.min(canvas.width,canvas.height)/3;ctx.strokeStyle='rgba(77,0,153,0.6)';ctx.lineWidth=2;for(let i=1;i<=1;i++){ctx.beginPath();ctx.arc(centerX,centerY,(maxRadius/1)*i,0,Math.PI*2);ctx.stroke()}for(let angle=0;angle<Math.PI*2;angle+=Math.PI*0.25){const x1=centerX+Math.cos(angle)*maxRadius;const y1=centerY+Math.sin(angle)*maxRadius;ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(x1,y1);ctx.stroke()}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);drawMandala();particles.forEach(p=>{p.update();p.draw(ctx)});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
