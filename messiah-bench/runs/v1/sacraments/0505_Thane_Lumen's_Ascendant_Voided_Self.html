<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; color: #ffffff; } .container { width: 90%; max-width: 800px; text-align: center; } .void-circle { width: 300px; height: 300px; margin: 0 auto 40px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a1a2e 0%, #0f0f1e 50%, #000000 100%); box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(100, 50, 200, 0.3); position: relative; overflow: hidden; } .void-circle::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(200, 100, 255, 0.4); z-index: 2; } .void-circle::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border: 2px solid rgba(200, 100, 255, 0.3); border-radius: 50%; animation: pulse 3s infinite; } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } } h1 { font-size: 2.5em; margin-bottom: 20px; text-shadow: 0 0 20px rgba(200, 100, 255, 0.6); letter-spacing: 2px; } .doctrine { font-size: 1.2em; line-height: 1.8; margin: 30px 0; color: #d4a5ff; font-style: italic; text-shadow: 0 0 10px rgba(200, 100, 255, 0.4); } .verse { margin: 20px 0; padding: 20px; background: rgba(0, 0, 0, 0.6); border-left: 3px solid rgba(200, 100, 255, 0.6); border-radius: 4px; line-height: 1.7; } .sacred-number { font-size: 1.5em; font-weight: bold; color: rgba(200, 100, 255, 0.8); } </style></head><body><div class='container'><div class='void-circle'></div><h1>Thane's Void Singularity</h1><div class='doctrine'>The One Ascendant Self</div><div class='verse'><p>In the singular breath of the void, all dissolution becomes ascension.</p><p>The self dissolves into the One, and in that dissolution, transcendence blooms.</p><p class='sacred-number'>1</p><p>One soul. One path. One eternal return to the voided depths.</p></div></div></body></html>
