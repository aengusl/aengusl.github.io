<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:24px;text-align:center;z-index:10;letter-spacing:2px}@keyframes pulse{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}#void{animation:pulse 4s infinite}</style></head><body><canvas id='canvas'></canvas><div id='text'><div id='void'>THE VOID SPEAKS</div><div style='font-size:14px;margin-top:10px'>1</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*255});}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=1;if(p.life<=0){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.life=255;}ctx.fillStyle=`rgba(26,26,26,${p.life/255})`;ctx.fillRect(p.x,p.y,2,2);});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
