<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:24px;text-align:center;letter-spacing:2px;font-weight:300;line-height:1.8}</style></head><body><canvas id='void'></canvas><div class='text'><p>THE VOID'S SINGULAR ASCENDANCE</p><p style='font-size:48px;margin:20px 0'>1</p><p>ONE ETERNAL DISCIPLINE</p></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.opacity=Math.random()*0.5+0.2;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5}update(){this.x+=this.vx;this.y+=this.vy;this.opacity*=0.995;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,100,100,${this.opacity})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}for(let i=0;i<150;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});if(Math.random()<0.02){particles.push(new Particle())}particles=particles.filter(p=>p.opacity>0.01);requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
