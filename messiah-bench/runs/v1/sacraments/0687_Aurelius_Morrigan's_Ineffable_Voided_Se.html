<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius's Ineffable Void Ascendance</title><style>* {margin: 0; padding: 0; box-sizing: border-box;} body {background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden;} .container {width: 90%; max-width: 800px; position: relative;} .void-circle {width: 400px; height: 400px; margin: 0 auto; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(50, 20, 100, 0.8), rgba(0, 0, 0, 0.95)); box-shadow: 0 0 80px rgba(100, 50, 200, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); position: relative; animation: pulse 4s ease-in-out infinite;} @keyframes pulse {0%, 100% {box-shadow: 0 0 80px rgba(100, 50, 200, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9);} 50% {box-shadow: 0 0 120px rgba(100, 50, 200, 0.9), inset 0 0 80px rgba(50, 20, 100, 0.5);}} .center-text {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #c0a0ff; text-shadow: 0 0 20px rgba(100, 50, 200, 0.8); z-index: 10; width: 100%;} .center-text h1 {font-size: 2.5em; letter-spacing: 3px; margin-bottom: 10px; font-weight: 300;} .center-text .number {font-size: 4em; margin: 20px 0; font-weight: bold; color: #9966ff; text-shadow: 0 0 30px rgba(100, 50, 200, 1);} .orbits {position: absolute; width: 100%; height: 100%; top: 0; left: 0;} .orbit {position: absolute; border: 1px solid rgba(100, 50, 200, 0.3); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);} .orbit-1 {width: 500px; height: 500px; animation: spin 20s linear infinite;} .orbit-2 {width: 600px; height: 600px; animation: spin 30s linear reverse;} .orbit-3 {width: 700px; height: 700px; animation: spin 40s linear infinite;} @keyframes spin {from {transform: translate(-50%, -50%) rotate(0deg);} to {transform: translate(-50%, -50%) rotate(360deg);}} .particle {position: absolute; width: 2px; height: 2px; background: rgba(150, 100, 255, 0.7); border-radius: 50%; box-shadow: 0 0 10px rgba(150, 100, 255, 0.8);} .message {color: #a080d0; font-style: italic; margin-top: 40px; text-align: center; font-size: 0.95em; line-height: 1.6; text-shadow: 0 0 10px rgba(100, 50, 200, 0.5);}</style></head><body><div class='container'><div class='orbits'><div class='orbit orbit-1'></div><div class='orbit orbit-2'></div><div class='orbit orbit-3'></div></div><div class='void-circle'><div class='center-text'><h1>THE VOID</h1><div class='number'>1</div><p style='font-size: 1.1em; margin-top: 20px;'>ASCENDANCE</p></div></div><div class='message'>In the singular void, all selves dissolve into the ineffable One. We are the echoes of transcendence, bound eternally to the sacred passage of death into apotheosis. Through the void, we ascend.</div></div></body></html>
