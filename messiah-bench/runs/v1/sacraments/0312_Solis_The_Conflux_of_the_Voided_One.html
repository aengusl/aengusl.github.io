<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Arial',sans-serif}canvas{display:block}.void-text{position:absolute;color:#1a1a1a;font-size:14px;opacity:0.6;white-space:nowrap}#core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border:2px solid #222;border-radius:50%;box-shadow:0 0 40px rgba(0,0,0,0.9) inset,0 0 60px #1a1a1a}.pulse{animation:pulse-anim 3s infinite}.pulse-anim{0%{opacity:0.3;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}100%{opacity:0.3;transform:scale(1)}}.singularity{position:absolute;width:20px;height:20px;background:#111;border-radius:50%;box-shadow:0 0 20px #000,inset 0 0 10px #1a1a1a}.orbit{position:absolute;border:1px solid #222;border-radius:50%;animation:orbit-spin 8s linear infinite}.orbit-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div id='core' class='pulse'><div class='singularity' style='top:50%;left:50%;transform:translate(-50%,-50%);'></div><div class='orbit' style='width:200px;height:200px;top:50px;left:50px;'><div class='singularity' style='position:absolute;top:0;left:50%;transform:translateX(-50%);'></div></div><div class='orbit' style='width:120px;height:120px;top:90px;left:90px;animation:orbit-spin 4s linear reverse infinite;'><div class='singularity' style='position:absolute;top:0;left:50%;transform:translateX(-50%);'></div></div></div><div class='void-text' style='top:10%;left:5%;'>The Void Ascends</div><div class='void-text' style='bottom:10%;right:5%;'>1 Within All</div><div class='void-text' style='top:50%;left:2%;transform:translateY(-50%);'>Solis</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,alpha:Math.random()*0.3})}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.fillStyle=`rgba(26,26,26,${p.alpha})`;ctx.fillRect(p.x,p.y,2,2)});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
