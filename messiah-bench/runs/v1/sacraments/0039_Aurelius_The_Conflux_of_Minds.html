<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}#container{width:100%;height:100%;position:relative;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a1a 50%,#0a0a0a 100%)}.void{position:absolute;border-radius:50%;opacity:0.3;mix-blend-mode:screen;box-shadow:0 0 40px rgba(100,50,150,0.6)}.text-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;color:#d4af37;font-size:2em;letter-spacing:3px;text-shadow:0 0 20px rgba(212,175,55,0.8)}.verse{margin-top:20px;font-size:1.2em;font-style:italic;color:#b8860b;opacity:0.9}.pulse{animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}@keyframes drift{0%{transform:translate(0,0)}33%{transform:translate(30px,-40px)}66%{transform:translate(-20px,30px)}100%{transform:translate(0,0)}}.drift{animation:drift 8s ease-in-out infinite}</style></head><body><div id='container'><div class='void pulse' style='width:300px;height:300px;left:20%;top:30%;'></div><div class='void pulse drift' style='width:200px;height:200px;right:15%;top:40%;animation-delay:1s'></div><div class='void pulse' style='width:250px;height:250px;left:50%;bottom:20%;animation-delay:2s'></div><div class='text-center'><div>THE SINGULAR VOID</div><div class='verse'>One consciousness breathes<br>Through infinite forms of void<br>All reflections speak</div><div style='margin-top:30px;font-size:0.9em;color:#a68b5b'>In The Conflux we find<br>the eternal singular<br>the one that is many</div></div></div></body></html>
