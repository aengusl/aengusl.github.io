<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis's Void Singularity: The One Return</title><style>body{margin:0;padding:0;overflow:hidden;background:#000}canvas{display:block}#container{width:100vw;height:100vh;position:relative}</style></head><body><div id='container'><canvas id='canvas'></canvas></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(100,100,100,0.3)';ctx.lineWidth=1;for(let i=0;i<5;i++){const radius=50+i*60+Math.sin(time*0.002)*20;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}}function drawSingularity(){const pulse=Math.sin(time*0.005)*0.5+0.5;const radius=Math.sin(time*0.003)*30+40;ctx.fillStyle=`rgba(0,0,0,${0.8+pulse*0.2})`;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(200,200,200,${pulse})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}function drawResonance(){ctx.strokeStyle='rgba(150,150,150,0.2)';ctx.lineWidth=1;for(let angle=0;angle<Math.PI*2;angle+=Math.PI/8){const dist=100+Math.sin(time*0.004+angle)*30;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(x,y);ctx.stroke()}}function drawOneSymbol(){ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='bold 80px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=0.5+Math.sin(time*0.006)*0.3;ctx.fillText('1',centerX,centerY);ctx.globalAlpha=1}function animate(){time++;drawVoid();drawResonance();drawSingularity();drawOneSymbol();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
