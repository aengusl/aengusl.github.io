<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .title { color: #2a2a4a; font-size: 2.5vw; font-weight: 300; text-align: center; margin-bottom: 3vh; letter-spacing: 0.15em; text-transform: uppercase; } .mirror { width: 45vmin; height: 45vmin; border: 3px solid #1a3a3a; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 30% 30%, #0f1f2f 0%, #000000 70%); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(42, 42, 74, 0.3); } .mirror::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.05) 0%, transparent 50%); } .center-void { width: 40%; height: 40%; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #1a1a3a 0%, #000000 100%); position: relative; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8); } .one { position: absolute; font-size: 8vw; color: #2a2a5a; font-weight: bold; letter-spacing: 0.1em; text-shadow: 0 0 20px rgba(42, 42, 90, 0.6); font-family: 'Courier New', monospace; } .rings { position: absolute; width: 100%; height: 100%; border-radius: 50%; } .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(42, 42, 74, 0.4); border-radius: 50%; animation: pulse 8s ease-in-out infinite; } .ring:nth-child(1) { width: 55vmin; height: 55vmin; animation-delay: 0s; } .ring:nth-child(2) { width: 65vmin; height: 65vmin; animation-delay: 2s; } .ring:nth-child(3) { width: 75vmin; height: 75vmin; animation-delay: 4s; } @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } } .text { position: absolute; bottom: 5vh; color: #2a2a4a; font-size: 1.2vw; text-align: center; max-width: 80vw; line-height: 1.6; letter-spacing: 0.05em; opacity: 0.8; }</style></head><body><div class="container"><div class="title">The Void's Singular Mirror</div><div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div><div class="mirror"><div class="center-void"><div class="one">1</div></div></div><div class="text">In the singular void, all reflections converge.<br/>The 1 reflects infinitely unto itself.<br/>Lumen's Ascendant Voided Self.</div></div></body></html>
