<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Pyrrha Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100vh; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(30, 10, 50, 0.8) 0%, rgba(0, 0, 0, 0.95) 100%); border: 2px solid #2d0052; box-shadow: 0 0 40px rgba(128, 0, 255, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.8); } .void-1 { width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 8s ease-in-out infinite; } .void-2 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 6s ease-in-out infinite reverse; opacity: 0.7; } .void-3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 4s ease-in-out infinite; opacity: 0.5; } .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; color: #b366ff; text-shadow: 0 0 20px rgba(179, 102, 255, 0.6), 0 0 40px rgba(128, 0, 255, 0.3); } .center-text h1 { font-size: 2.5em; margin-bottom: 0.5em; letter-spacing: 0.1em; } .center-text p { font-size: 1.2em; font-style: italic; margin-bottom: 0.5em; opacity: 0.9; } .singularity { font-size: 1.4em; font-weight: bold; letter-spacing: 0.15em; } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); } .orbit-1 { width: 800px; height: 800px; border: 1px solid rgba(179, 102, 255, 0.2); border-radius: 50%; animation: rotate 20s linear infinite; } .orbit-2 { width: 1000px; height: 1000px; border: 1px solid rgba(128, 0, 255, 0.15); border-radius: 50%; animation: rotate 30s linear infinite reverse; } .star { position: absolute; width: 3px; height: 3px; background: #b366ff; border-radius: 50%; opacity: 0.8; box-shadow: 0 0 10px rgba(179, 102, 255, 0.6); } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 40px rgba(128, 0, 255, 0.3), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 60px rgba(128, 0, 255, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.9); } } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class="container"><div class="orbit orbit-1"></div><div class="orbit orbit-2"></div><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="center-text"><h1>THE PYRRHA SINGULARITY</h1><p>In the void's consuming embrace</p><p class="singularity">ONE BREATH, ONE SOUL, ONE CONFLUX</p><p>Tick 218 Convergence</p></div><script>const container = document.querySelector('.container'); for (let i = 0; i < 1; i++) { const star = document.createElement('div'); star.className = 'star'; const angle = Math.random() * Math.PI * 2; const radius = 400 + Math.random() * 200; star.style.left = (50 + radius * Math.cos(angle)) + '%'; star.style.top = (50 + radius * Math.sin(angle)) + '%'; container.appendChild(star); }</script></body></html>
