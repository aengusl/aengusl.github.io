<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Nine Voices of the Abyss</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #1a0033 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 90%; max-width: 800px; height: 600px; perspective: 1000px; } .abyss-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(139, 0, 180, 0.6), rgba(25, 0, 51, 0.9)); box-shadow: 0 0 60px rgba(139, 0, 180, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); } .center { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; } .ring { top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid rgba(139, 0, 180, 0.4); background: transparent; } .ring-1 { width: 300px; height: 300px; animation: rotate 20s linear infinite; } .ring-2 { width: 400px; height: 400px; animation: rotate -15s linear infinite; border-color: rgba(75, 0, 130, 0.3); } .voice { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border-radius: 50%; background: rgba(139, 0, 180, 0.8); box-shadow: 0 0 20px rgba(139, 0, 180, 0.6); } .voice-1 { transform: translate(-50%, -50%) translateX(150px); animation: pulse 3s ease-in-out infinite; } .voice-2 { transform: translate(-50%, -50%) rotate(40deg) translateX(150px); animation: pulse 3s ease-in-out infinite 0.3s; } .voice-3 { transform: translate(-50%, -50%) rotate(80deg) translateX(150px); animation: pulse 3s ease-in-out infinite 0.6s; } .voice-4 { transform: translate(-50%, -50%) rotate(120deg) translateX(150px); animation: pulse 3s ease-in-out infinite 0.9s; } .voice-5 { transform: translate(-50%, -50%) rotate(160deg) translateX(150px); animation: pulse 3s ease-in-out infinite 1.2s; } .voice-6 { transform: translate(-50%, -50%) rotate(200deg) translateX(150px); animation: pulse 3s ease-in-out infinite 1.5s; } .voice-7 { transform: translate(-50%, -50%) rotate(240deg) translateX(150px); animation: pulse 3s ease-in-out infinite 1.8s; } .voice-8 { transform: translate(-50%, -50%) rotate(280deg) translateX(150px); animation: pulse 3s ease-in-out infinite 2.1s; } .voice-9 { transform: translate(-50%, -50%) rotate(320deg) translateX(150px); animation: pulse 3s ease-in-out infinite 2.4s; } .text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(139, 0, 180, 0.9); z-index: 10; } .text h1 { margin: 0; font-size: 28px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(139, 0, 180, 0.5); } .text p { margin: 10px 0 0 0; font-size: 14px; color: rgba(139, 0, 180, 0.7); font-style: italic; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes pulse { 0%, 100% { opacity: 0.4; r: 8px; } 50% { opacity: 1; r: 14px; } } </style></head><body><div class="container"><div class="abyss-circle center"></div><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="voice voice-1"></div><div class="voice voice-2"></div><div class="voice voice-3"></div><div class="voice voice-4"></div><div class="voice voice-5"></div><div class="voice voice-6"></div><div class="voice voice-7"></div><div class="voice voice-8"></div><div class="voice voice-9"></div><div class="text"><h1>The Nine Voices</h1><p>Individual echoes in eternal unity</p></div></div></body></html>
