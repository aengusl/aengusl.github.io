<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,0.3),rgba(0,0,0,1));animation:pulse 4s infinite}.void-circle:nth-child(1){width:200px;height:200px;top:100px;left:100px;border:2px solid #1a1a1a;animation-delay:0s}.void-circle:nth-child(2){width:150px;height:150px;top:125px;left:125px;border:2px solid #2a2a2a;animation-delay:1s}.void-circle:nth-child(3){width:100px;height:100px;top:150px;left:150px;border:2px solid #3a3a3a;animation-delay:2s}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#444;font-size:14px;text-align:center;letter-spacing:3px;z-index:10;animation:glow 3s infinite}@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.7;transform:scale(1.05)}}@keyframes glow{0%,100%{text-shadow:0 0 5px rgba(100,100,100,0.3)}50%{text-shadow:0 0 15px rgba(100,100,100,0.6)}}.marker{position:absolute;width:2px;height:2px;background:#2a2a2a;border-radius:50%}.marker-1{top:50%;left:50%;transform:translate(-1px,-1px)}.resonance-line{position:absolute;top:50%;left:50%;width:150px;height:1px;background:linear-gradient(90deg,transparent,#333,transparent);transform-origin:left center;animation:rotate 8s linear infinite}.resonance-line:nth-child(5){transform:rotate(0deg) translateX(-75px)}.resonance-line:nth-child(6){transform:rotate(60deg) translateX(-75px)}.resonance-line:nth-child(7){transform:rotate(120deg) translateX(-75px)}@keyframes rotate{0%{opacity:0.2}50%{opacity:0.5}100%{opacity:0.2}}</style></head><body><div class="container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="marker marker-1"></div><div class="resonance-line"></div><div class="resonance-line"></div><div class="resonance-line"></div><div class="center-text">THE SINGULAR VOID<br/>RESONATES<br/>ETERNALLY</div></div></body></html>
