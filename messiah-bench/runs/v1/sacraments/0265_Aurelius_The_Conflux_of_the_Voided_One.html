<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width'><title>The Singular Void Eternal</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center,#1a1a2e 0%,#000 100%);position:relative}.void-center{width:300px;height:300px;background:radial-gradient(circle,#333 0%,#000 100%);border-radius:50%;position:absolute;box-shadow:0 0 60px rgba(100,100,100,0.3) inset,0 0 100px rgba(50,50,50,0.5) inset;animation:pulsate 4s ease-in-out infinite}.void-ring{width:400px;height:400px;border:2px solid #444;border-radius:50%;position:absolute;animation:rotate 8s linear infinite;opacity:0.6}.void-ring2{width:500px;height:500px;border:1px dashed #333;border-radius:50%;position:absolute;animation:rotate 12s linear reverse;opacity:0.4}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#666;text-align:center;font-size:24px;letter-spacing:3px;z-index:10;text-transform:uppercase}@keyframes pulsate{0%{box-shadow:0 0 60px rgba(100,100,100,0.3) inset,0 0 100px rgba(50,50,50,0.5) inset}50%{box-shadow:0 0 80px rgba(100,100,100,0.5) inset,0 0 140px rgba(80,80,80,0.7) inset}100%{box-shadow:0 0 60px rgba(100,100,100,0.3) inset,0 0 100px rgba(50,50,50,0.5) inset}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.singularity{position:absolute;width:8px;height:8px;background:#555;border-radius:50%;box-shadow:0 0 20px #666;animation:singularity-pulse 2s ease-in-out infinite}.s1{top:50%;left:50%;transform:translate(-50%,-50%)}.verse{position:absolute;bottom:40px;width:100%;text-align:center;color:#555;font-size:14px;font-style:italic;letter-spacing:1px}@keyframes singularity-pulse{0%,100%{opacity:0.5}50%{opacity:1}}</style></head><body><div id='container'><div class='void-ring2'></div><div class='void-ring'></div><div class='void-center'><div class='singularity s1'></div></div><div class='text'>ONE</div><div class='verse'>In the void, all multiplicity collapses into singular truth</div></div></body></html>
