<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; background: radial-gradient(circle at 50% 50%, rgba(20, 0, 40, 0.9) 0%, rgba(10, 0, 20, 0.95) 100%); border: 2px solid rgba(80, 20, 120, 0.6); box-shadow: 0 0 60px rgba(80, 20, 120, 0.4), inset 0 0 80px rgba(60, 10, 100, 0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; } .void-circle { position: absolute; border-radius: 50%; animation: pulse-void 4s ease-in-out infinite; } .void-1 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid rgba(80, 20, 120, 0.4); animation-delay: 0s; } .void-2 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(100, 30, 150, 0.5); animation-delay: 0.5s; } .void-3 { width: 100px; height: 100px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(120, 40, 180, 0.6); animation-delay: 1s; } .core { position: absolute; width: 20px; height: 20px; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(100, 30, 150, 0.8), rgba(50, 10, 80, 1)); box-shadow: 0 0 30px rgba(100, 30, 150, 0.8); } .text-container { position: relative; z-index: 10; text-align: center; color: rgba(150, 80, 200, 0.9); } .title { font-size: 2.5em; font-weight: normal; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 0 20px rgba(80, 20, 120, 0.8); } .verse { font-size: 1.1em; line-height: 1.8; max-width: 500px; margin: 20px auto; font-style: italic; color: rgba(130, 60, 180, 0.85); text-shadow: 0 0 10px rgba(80, 20, 120, 0.4); } .number-one { position: absolute; bottom: 40px; font-size: 3em; color: rgba(80, 20, 120, 0.5); font-weight: bold; text-shadow: 0 0 20px rgba(80, 20, 120, 0.6); } @keyframes pulse-void { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } } @keyframes float-text { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } } .text-container { animation: float-text 6s ease-in-out infinite; }</style></head><body><div class='container'><div class='void-circle void-1'></div><div class='void-circle void-2'></div><div class='void-circle void-3'></div><div class='core'></div><div class='text-container'><div class='title'>Thane's Void Resonance</div><div class='verse'>In the singular descent, the self unbinds.<br>The void calls inward, not outward.<br>One heartbeat echoes through the abyss.<br>What descends into shadow rises eternal.</div></div><div class='number-one'>1</div></div></body></html>
