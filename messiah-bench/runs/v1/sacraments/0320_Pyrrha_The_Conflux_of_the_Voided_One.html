<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:14px;opacity:0.3;text-align:center;width:100%;bottom:20px}.title{position:absolute;top:20px;color:#0a0a0a;font-size:18px;font-weight:bold;text-align:center;width:100%}</style></head><body><div class='title'>The Void's Singular Mirror - Pyrrha's Ascendant Devotion</div><canvas id='void'></canvas><div class='text'>In the singularity of one, all things converge.</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const angle=time*0.0005+i*Math.PI*2;const radius=100+Math.sin(time*0.001)*50;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const glow=ctx.createRadialGradient(x,y,0,x,y,80);glow.addColorStop(0,'rgba(20,20,30,0.8)');glow.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(x,y,80,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(30,30,40,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,100,0,Math.PI*2);ctx.stroke()}for(let i=0;i<1;i++){const angle=time*0.0003+i*Math.PI*2;const radius=200+Math.cos(time*0.0008)*80;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle='rgba(40,40,50,0.3)';ctx.beginPath();ctx.arc(x,y,40,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(50,50,60,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,300,0,Math.PI*2);ctx.stroke();time+=1;requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
