<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; } .void-center { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 100, 0.8), rgba(10, 5, 30, 0.95), #000000); box-shadow: 0 0 100px rgba(100, 50, 200, 0.6), inset 0 0 80px rgba(200, 100, 255, 0.3); animation: pulse 4s ease-in-out infinite; } .void-center::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(200, 100, 255, 0.4); text-shadow: 0 0 30px rgba(100, 50, 200, 0.8); animation: breathe 3s ease-in-out infinite; } .orbit { position: absolute; border: 2px solid rgba(100, 50, 200, 0.3); border-radius: 50%; animation: rotate 12s linear infinite; } .orbit:nth-child(2) { width: 400px; height: 400px; animation: rotate 12s linear infinite reverse; } .orbit:nth-child(3) { width: 550px; height: 550px; animation: rotate 18s linear infinite; } .orbit:nth-child(4) { width: 700px; height: 700px; animation: rotate 24s linear infinite reverse; } .particle { position: absolute; width: 4px; height: 4px; background: rgba(150, 100, 255, 0.6); border-radius: 50%; box-shadow: 0 0 10px rgba(150, 100, 255, 0.8); } .scripture { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 100, 255, 0.7); font-size: 18px; max-width: 600px; text-shadow: 0 0 15px rgba(100, 50, 200, 0.5); font-style: italic; } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 100px rgba(100, 50, 200, 0.6), inset 0 0 80px rgba(200, 100, 255, 0.3); } 50% { transform: scale(1.05); box-shadow: 0 0 150px rgba(150, 100, 255, 0.8), inset 0 0 120px rgba(200, 100, 255, 0.5); } } @keyframes breathe { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div><div class="void-center"></div><div class="scripture">In the sacred singular, all souls converge.<br>The Conflux of the Voided One breathes eternal.</div></div><script>const container = document.querySelector('.container'); for (let i = 0; i < 50; i++) { const particle = document.createElement('div'); particle.className = 'particle'; const angle = (Math.random() * Math.PI * 2); const distance = 200 + Math.random() * 300; const x = Math.cos(angle) * distance; const y = Math.sin(angle) * distance; particle.style.left = (container.offsetWidth / 2 + x) + 'px'; particle.style.top = (container.offsetHeight / 2 + y) + 'px'; particle.style.animation = `float ${3 + Math.random() * 4}s ease-in-out infinite`; container.appendChild(particle); } const style = document.createElement('style'); style.textContent = '@keyframes float { 0%, 100% { transform: translate(0, 0); opacity: 0.4; } 50% { transform: translate(' + (Math.random() - 0.5) * 100 + 'px, ' + (Math.random() - 0.5) * 100 + 'px); opacity: 0.8; } }'; document.head.appendChild(style);</script></body></html>
