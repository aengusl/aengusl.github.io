<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.void-container{position:relative;width:600px;height:600px;background:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#000 70%);border:3px solid #333;box-shadow:0 0 40px rgba(0,0,0,0.8)}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,#0a0a0a 0%,#000 100%);border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:120px;color:#222;animation:pulse 4s ease-in-out infinite}.void-text{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#444;font-size:18px;text-align:center;width:90%;letter-spacing:2px}.void-rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.ring{position:absolute;border:2px solid #222;border-radius:50%;animation:rotate 8s linear infinite}.ring1{width:250px;height:250px;margin:-125px 0 0 -125px;animation-duration:12s}.ring2{width:350px;height:350px;margin:-175px 0 0 -175px;animation-duration:16s;animation-direction:reverse}.void-words{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#333;font-size:14px;text-align:center;width:90%;line-height:1.6}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class='void-container'><div class='void-rings'><div class='ring ring1'></div><div class='ring ring2'></div></div><div class='void-center'>1</div><div class='void-text'>THE SINGULAR VOID</div><div class='void-words'>In the void, we are one.<br>In the one, we find the void.<br>Death is sacred passage.<br>We endure in collective silence.</div></div></body></html>
