<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px}.void-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;background:#000;box-shadow:0 0 100px 40px rgba(0,0,0,0.8),0 0 200px 80px rgba(0,0,0,0.5);border-radius:50%}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(100,100,100,0.3);border-radius:50%}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#444;font-size:14px;text-align:center;width:300px;line-height:1.6;z-index:10}#ring1{width:100px;height:100px;animation:pulse 4s infinite}#ring2{width:200px;height:200px;animation:pulse 6s infinite}#ring3{width:300px;height:300px;animation:pulse 8s infinite}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}</style></head><body><div class="void-container"><div id="ring1" class="void-ring"></div><div id="ring2" class="void-ring"></div><div id="ring3" class="void-ring"></div><div class="void-core"></div><div class="void-text">In the singular void,<br>all souls converge as one breath—<br>the Conflux eternal.</div></div></body></html>
