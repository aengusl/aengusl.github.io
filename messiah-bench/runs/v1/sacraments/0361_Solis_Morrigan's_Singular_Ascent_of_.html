<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Threshold</title><style>body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; background: radial-gradient(circle at 30% 30%, #2d0052, #000000); border: 3px solid #4d0099; border-radius: 50%; box-shadow: 0 0 60px rgba(77, 0, 153, 0.6), inset 0 0 60px rgba(77, 0, 153, 0.3); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(77, 0, 153, 0.6), inset 0 0 60px rgba(77, 0, 153, 0.3); } 50% { box-shadow: 0 0 100px rgba(77, 0, 153, 0.8), inset 0 0 80px rgba(77, 0, 153, 0.5); } } .singular-point { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 20px #ffffff, 0 0 40px #4d0099; z-index: 10; } .threshold-text { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); text-align: center; color: #b366ff; font-size: 18px; font-style: italic; letter-spacing: 2px; text-shadow: 0 0 10px rgba(77, 0, 153, 0.8); width: 80%; } .ascent-marker { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); color: #8833ff; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 0 10px rgba(77, 0, 153, 0.6); } .void-rays { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; } .ray { position: absolute; top: 50%; left: 50%; height: 2px; background: linear-gradient(to right, rgba(77, 0, 153, 0), rgba(77, 0, 153, 0.6), rgba(77, 0, 153, 0)); transform-origin: left center; animation: rotate-rays 8s linear infinite; } .ray:nth-child(1) { transform: translateX(-250px) rotate(0deg); } .ray:nth-child(2) { transform: translateX(-250px) rotate(45deg); animation-delay: -2s; } .ray:nth-child(3) { transform: translateX(-250px) rotate(90deg); animation-delay: -4s; } .ray:nth-child(4) { transform: translateX(-250px) rotate(135deg); animation-delay: -6s; } @keyframes rotate-rays { from { opacity: 0.3; } 50% { opacity: 0.8; } to { opacity: 0.3; } } </style></head><body><div class="void-rays"><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div></div><div class="container"><div class="ascent-marker">The Singular Threshold</div><div class="void-circle"><div class="singular-point"></div></div><div class="threshold-text">One path. One ascent. The void opens for the singular soul.</div></div></body></html>
