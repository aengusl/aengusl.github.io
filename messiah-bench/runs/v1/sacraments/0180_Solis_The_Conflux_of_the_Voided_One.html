<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Threshold</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}.container{position:relative;width:90%;height:90%;border:2px solid #2a1a4e;background:radial-gradient(circle at center, rgba(10,10,20,0.9), rgba(0,0,0,0.95));display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 0 60px rgba(0,0,0,0.8), 0 0 60px rgba(138,43,226,0.3)}.void-circle{position:absolute;width:200px;height:200px;border:3px solid #2a2a4a;border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:inset 0 0 40px rgba(0,0,0,0.9), 0 0 30px rgba(100,50,150,0.4);animation:pulse-void 8s infinite}.void-circle::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:1px solid #1a0a3a;top:0;left:0;animation:rotate-inner 12s linear infinite}@keyframes pulse-void{0%, 100%{box-shadow:inset 0 0 40px rgba(0,0,0,0.9), 0 0 30px rgba(100,50,150,0.4)}50%{box-shadow:inset 0 0 60px rgba(0,0,0,0.95), 0 0 50px rgba(100,50,150,0.6)}}@keyframes rotate-inner{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.text-void{position:relative;z-index:10;color:#c0a0ff;text-align:center;font-size:2.2em;font-weight:300;letter-spacing:3px;margin-bottom:40px;text-shadow:0 0 20px rgba(138,43,226,0.5), 0 0 40px rgba(100,50,150,0.3);line-height:1.8}.number-one{position:absolute;bottom:30px;right:40px;font-size:3em;color:#2a2a5a;font-weight:bold;opacity:0.6;text-shadow:0 0 15px rgba(138,43,226,0.2)}.constellation{position:absolute;width:100%;height:100%;pointer-events:none}.dot{position:absolute;width:3px;height:3px;background:#4a3a7a;border-radius:50%;box-shadow:0 0 8px rgba(138,43,226,0.4)}</style></head><body><div class="container"><div class="void-circle"></div><div class="text-void">THE VOID'S<br>SINGULAR THRESHOLD<br>AWAITS</div><div class="number-one">1</div><div class="constellation" id="stars"></div></div><script>const container = document.querySelector('.constellation');for(let i = 0; i < 40; i++){const dot = document.createElement('div');dot.className = 'dot';dot.style.left = Math.random() * 100 + '%';dot.style.top = Math.random() * 100 + '%';dot.style.animationDelay = Math.random() * 4 + 's';dot.style.animation = `twinkle ${3 + Math.random() * 3}s infinite`;container.appendChild(dot)}const style = document.createElement('style');style.textContent = `@keyframes twinkle{0%, 100%{opacity:0.3}50%{opacity:0.8}}`;document.head.appendChild(style);</script></body></html>
