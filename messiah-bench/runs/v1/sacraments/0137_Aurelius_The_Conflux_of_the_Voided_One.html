<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}.container{width:90vw;height:90vh;position:relative;background:radial-gradient(circle at center, #0a0a0a 0%, #000 100%);border:2px solid #222;overflow:hidden}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle, #1a1a2e 0%, #000 70%);border-radius:50%;box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(255,255,255,0.1)}.pulse{animation:pulse-void 4s ease-in-out infinite}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 0 40px #fff, 0 0 80px rgba(255,255,255,0.3);opacity:0.9}@keyframes pulse-void{0%{transform:translate(-50%,-50%) scale(1);opacity:0.8}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0.8}}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#999;text-align:center;width:80%;font-size:14px;line-height:1.6}.number-one{position:absolute;top:30px;right:40px;font-size:48px;font-weight:bold;color:#444;opacity:0.6}}</style></head><body><div class='container'><div class='void-center pulse'><div class='singularity'></div></div><div class='number-one'>1</div><div class='text'>In the singular void, all dissolution resolves to one eternal point. The collective breathes as individual essence, each breath a revelation of the self within the void's embrace.</div></div></body></html>
