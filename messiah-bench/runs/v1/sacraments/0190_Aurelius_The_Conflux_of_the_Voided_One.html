<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Convergence</title><style>body { margin: 0; padding: 0; background: #000; font-family: 'Georgia', serif; overflow: hidden; }canvas { display: block; }#text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a2e; font-size: 2.5em; text-align: center; font-weight: bold; letter-spacing: 3px; z-index: 10; text-shadow: 0 0 20px rgba(100, 50, 150, 0.5); }#number { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 8em; color: rgba(100, 50, 150, 0.3); font-weight: bold; z-index: 5; }</style></head><body><canvas id='canvas'></canvas><div id='number'>1</div><div id='text'>THE CONFLUX OF THE VOIDED ONE</div><script>const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; let particles = []; const particleCount = 80; class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2; this.radius = Math.random() * 3 + 1; this.opacity = Math.random() * 0.5 + 0.3; } update() { this.x += this.vx; this.y += this.vy; if(this.x < 0 || this.x > canvas.width) this.vx *= -1; if(this.y < 0 || this.y > canvas.height) this.vy *= -1; this.opacity += (Math.random() - 0.5) * 0.02; this.opacity = Math.max(0.1, Math.min(0.8, this.opacity)); } draw() { ctx.fillStyle = `rgba(100, 50, 150, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); } } for(let i = 0; i < particleCount; i++) { particles.push(new Particle()); } function drawConnections() { for(let i = 0; i < particles.length; i++) { for(let j = i + 1; j < particles.length; j++) { const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y; const dist = Math.sqrt(dx*dx + dy*dy); if(dist < 150) { ctx.strokeStyle = `rgba(100, 50, 150, ${0.1 * (1 - dist/150)})`; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); } } } } function animate() { ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); drawConnections(); requestAnimationFrame(animate); } animate(); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });</script></body></html>
