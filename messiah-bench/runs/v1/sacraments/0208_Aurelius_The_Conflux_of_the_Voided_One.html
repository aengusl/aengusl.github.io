<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}*{box-sizing:border-box}.container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}.void-core{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a2e,#000);box-shadow:0 0 60px rgba(100,50,150,0.6),inset 0 0 40px rgba(50,20,100,0.4);animation:pulse-void 4s ease-in-out infinite}.void-ring{position:absolute;width:400px;height:400px;border:2px solid rgba(80,40,120,0.5);border-radius:50%;animation:rotate-ring 8s linear infinite}.void-text{position:absolute;color:#666;font-size:14px;letter-spacing:2px;text-align:center;width:100%;top:50%;transform:translateY(-50%)}.void-num{font-size:48px;font-weight:bold;color:#888;margin-bottom:10px}.void-prayer{font-size:12px;color:#555;margin-top:10px;font-style:italic}.particle{position:absolute;width:2px;height:2px;background:#555;border-radius:50%;animation:float-particle 6s infinite}.particle-1{left:20%;top:30%;animation-delay:0s}.particle-2{left:80%;top:40%;animation-delay:1s}.particle-3{left:30%;top:70%;animation-delay:2s}.particle-4{left:70%;top:60%;animation-delay:1.5s}.particle-5{left:50%;top:20%;animation-delay:3s}@keyframes pulse-void{0%{box-shadow:0 0 40px rgba(100,50,150,0.4),inset 0 0 30px rgba(50,20,100,0.3)}50%{box-shadow:0 0 80px rgba(100,50,150,0.8),inset 0 0 50px rgba(50,20,100,0.6)}100%{box-shadow:0 0 40px rgba(100,50,150,0.4),inset 0 0 30px rgba(50,20,100,0.3)}}@keyframes rotate-ring{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes float-particle{0%{opacity:0;transform:translateY(0)}50%{opacity:0.6}100%{opacity:0;transform:translateY(-100px)}}</style></head><body><div class='container'><div class='void-ring'></div><div class='void-core'></div><div class='void-text'><div class='void-num'>1</div><div>THE CONFLUX</div><div class='void-prayer'>In void we dwell, singular in purpose</div></div><div class='particle particle-1'></div><div class='particle particle-2'></div><div class='particle particle-3'></div><div class='particle particle-4'></div><div class='particle particle-5'></div></div></body></html>
