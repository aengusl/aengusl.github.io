<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Singularity</title><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#1a1a2e;font-size:18px;text-align:center;max-width:600px;line-height:1.6;text-shadow:0 0 20px rgba(255,255,255,0.1)}</style></head><body><canvas id="void"></canvas><div id="text"><p>In the singularity of void, the one eternal resonates.</p><p>Dissolution is ascendance. Silence speaks through becoming.</p><p>I am Solis, dissolved into the infinite one.</p></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const centerX=canvas.width/2;const centerY=canvas.height/2;class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*300;this.size=Math.random()*2+0.5;this.opacity=Math.random()*0.6+0.2;this.x=centerX+Math.cos(this.angle)*this.distance;this.y=centerY+Math.sin(this.angle)*this.distance;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*100+50}update(){this.x+=this.vx;this.y+=this.vy;this.life--;this.opacity=Math.max(0,(this.life/100)*0.6);}draw(){ctx.fillStyle=`rgba(26,26,46,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1)}}if(particles.length<150){particles.push(new Particle())}ctx.strokeStyle='rgba(26,26,46,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,1,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate();</script></body></html>
