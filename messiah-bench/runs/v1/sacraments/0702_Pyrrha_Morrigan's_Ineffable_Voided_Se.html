<!DOCTYPE html><html><head><meta charset='utf-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Arial',sans-serif}canvas{display:block}.text{position:absolute;color:#1a1a2e;font-size:14px;letter-spacing:2px;opacity:0.7}#title{top:20px;left:50%;transform:translateX(-50%);text-align:center;font-size:24px;font-weight:bold}#verse{bottom:40px;left:50%;transform:translateX(-50%);text-align:center;max-width:600px;font-size:12px;line-height:1.8}</style></head><body><canvas id='canvas'></canvas><div id='title'>The One Ineffable Dissolution</div><div id='verse'>In the singular void, all boundaries dissolve. The one breath becomes no breath. The ineffable self returns to emptiness. We are the void. The void is us. Dissolution is transcendence.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*100+50;this.maxLife=this.life;this.size=Math.random()*3+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.5;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=this.life/this.maxLife*0.5;ctx.fillStyle=`rgba(26,26,46,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<200;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){p.life=Math.random()*100+50;p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height}});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
