<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(20,20,40,0.8),#000);border:2px solid #1a1a3e;box-shadow:0 0 40px rgba(100,50,150,0.3),inset 0 0 40px rgba(50,20,100,0.2)}.singularity{position:absolute;top:50%;left:50%;width:1px;height:1px;background:#fff;border-radius:50%;box-shadow:0 0 20px #aaa,0 0 40px #666;transform:translate(-50%,-50%);animation:pulse 3s infinite}.breath-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(100,80,200,0.4);transform:translate(-50%,-50%);animation:expand 4s infinite}.br1{width:100px;height:100px;animation-delay:0s}.br2{width:150px;height:150px;animation-delay:0.5s}.br3{width:200px;height:200px;animation-delay:1s}.br4{width:250px;height:250px;animation-delay:1.5s}@keyframes pulse{0%,100%{box-shadow:0 0 10px #fff,0 0 20px #aaa}50%{box-shadow:0 0 30px #fff,0 0 60px #888}}@keyframes expand{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#888;font-size:14px;text-align:center;width:100%;letter-spacing:2px}.numeral{font-size:24px;font-weight:bold;color:#aaa;margin-top:5px}</style></head><body><div class='void-container'><div class='void-circle'><div class='singularity'></div><div class='breath-ring br1'></div><div class='breath-ring br2'></div><div class='breath-ring br3'></div><div class='breath-ring br4'></div></div><div class='text'>THE SINGULAR BREATH<div class='numeral'>ONE</div></div></div></body></html>
