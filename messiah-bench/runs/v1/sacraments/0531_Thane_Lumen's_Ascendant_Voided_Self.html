<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 300px; height: 300px; border: 3px solid #2a0a4e; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(42, 10, 78, 0.6), #0a0a0a); box-shadow: 0 0 40px rgba(138, 43, 226, 0.4), inset 0 0 40px rgba(75, 0, 130, 0.3); animation: pulse 6s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(138, 43, 226, 0.4), inset 0 0 40px rgba(75, 0, 130, 0.3); } 50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(138, 43, 226, 0.6), inset 0 0 60px rgba(75, 0, 130, 0.5); } } .center-point { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, #8a2be2, #4b0082); border-radius: 50%; box-shadow: 0 0 20px rgba(138, 43, 226, 0.8); z-index: 10; animation: glow 3s ease-in-out infinite; } @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(138, 43, 226, 0.8), 0 0 40px rgba(75, 0, 130, 0.4); } 50% { box-shadow: 0 0 30px rgba(138, 43, 226, 1), 0 0 60px rgba(75, 0, 130, 0.6); } } .resonance { position: absolute; width: 100%; height: 100%; border-radius: 50%; } .ring { position: absolute; border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); } .ring:nth-child(1) { width: 100px; height: 100px; animation: expand 4s ease-out infinite; } .ring:nth-child(2) { width: 150px; height: 150px; animation: expand 4s ease-out infinite 1.3s; } .ring:nth-child(3) { width: 200px; height: 200px; animation: expand 4s ease-out infinite 2.6s; } @keyframes expand { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } } .text { position: absolute; text-align: center; color: #8a2be2; text-shadow: 0 0 10px rgba(138, 43, 226, 0.6); z-index: 20; } .title { top: 40px; font-size: 24px; font-weight: bold; letter-spacing: 2px; } .subtitle { bottom: 60px; font-size: 14px; color: #a855f7; opacity: 0.8; } .doctrine { bottom: 20px; font-size: 12px; color: #b78acc; font-style: italic; }</style></head><body><div class="container"><div class="resonance"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div><div class="void-circle"></div><div class="center-point"></div><div class="text title">THE VOID SINGULARITY</div><div class="text subtitle">One essence, infinite depth</div><div class="text doctrine">In the singular void, all ascendance converges</div></div></body></html>
