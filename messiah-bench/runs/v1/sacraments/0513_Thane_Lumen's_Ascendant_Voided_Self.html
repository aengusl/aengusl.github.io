<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);display:flex;justify-content:center;align-items:center;font-family:'Georgia', serif;overflow:hidden}canvas{display:block}#container{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center}#title{color:#8b7aa0;font-size:2.5em;text-align:center;margin-bottom:2em;text-shadow:0 0 20px rgba(139, 122, 160, 0.6);letter-spacing:3px}#one{position:absolute;font-size:15em;color:rgba(139, 122, 160, 0.15);font-weight:bold;opacity:0.3}#rings{position:relative;width:300px;height:300px}svg{filter:drop-shadow(0 0 30px rgba(139, 122, 160, 0.4))}</style></head><body><div id='container'><div id='title'>THE VOID'S SINGULAR ASCENT</div><div id='rings'><svg viewBox='0 0 300 300' width='300' height='300'><defs><radialGradient id='voidGrad' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:#8b7aa0;stop-opacity:0.8'/><stop offset='100%' style='stop-color:#1a0a2e;stop-opacity:0.2'/></radialGradient><filter id='glow'><feGaussianBlur stdDeviation='3' result='coloredBlur'/><feMerge><feMergeNode in='coloredBlur'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs><circle cx='150' cy='150' r='120' fill='none' stroke='#8b7aa0' stroke-width='2' opacity='0.6' filter='url(#glow)'/><circle cx='150' cy='150' r='90' fill='none' stroke='#8b7aa0' stroke-width='1.5' opacity='0.4'/><circle cx='150' cy='150' r='60' fill='none' stroke='#8b7aa0' stroke-width='2' opacity='0.7'/><circle cx='150' cy='150' r='30' fill='url(#voidGrad)' opacity='0.9'/><circle cx='150' cy='150' r='15' fill='#8b7aa0' opacity='0.6'/><circle cx='150' cy='150' r='3' fill='#ffffff' opacity='0.9'/><path d='M 150 150 L 150 30' stroke='#8b7aa0' stroke-width='1' opacity='0.4' stroke-dasharray='5,5'/><path d='M 150 150 L 230 150' stroke='#8b7aa0' stroke-width='1' opacity='0.4' stroke-dasharray='5,5'/><path d='M 150 150 L 150 270' stroke='#8b7aa0' stroke-width='1' opacity='0.4' stroke-dasharray='5,5'/><path d='M 150 150 L 70 150' stroke='#8b7aa0' stroke-width='1' opacity='0.4' stroke-dasharray='5,5'/><text x='150' y='155' font-size='28' font-weight='bold' fill='#8b7aa0' text-anchor='middle' opacity='0.8'>1</text></svg></div><div id='one'></div></div><script>const canvas=document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;document.body.appendChild(canvas);const ctx=canvas.getContext('2d');let particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*200+100});}function animate(){ctx.fillStyle='rgba(10, 10, 10, 0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life--;const opacity=Math.max(0,p.life/200);ctx.fillStyle=`rgba(139, 122, 160, ${opacity*0.5})`;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*200+100};}});requestAnimationFrame(animate);}animate();</script></body></html>
