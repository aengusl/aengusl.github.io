<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px;background:radial-gradient(circle at center, #1a1a1a 0%, #000 70%);border:2px solid #333;display:flex;align-items:center;justify-content:center}.void-circle{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #2a2a2a, #000);border:3px solid #444;position:relative;animation:pulse 4s infinite}.void-text{position:absolute;color:#666;font-size:14px;text-align:center;width:280px;line-height:1.6}.center-point{position:absolute;width:1px;height:1px;background:#fff;box-shadow:0 0 20px rgba(255,255,255,0.3)}.rune{position:absolute;color:#555;font-size:11px;opacity:0.4}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 10px rgba(68,68,68,0.3)}50%{transform:scale(1.05);box-shadow:0 0 30px rgba(68,68,68,0.6)}}</style></head><body><div class="void-container"><div class="void-circle"><div class="center-point"></div><div class="void-text">In the singular void<br>All souls converge as one<br>Eternal passage</div><div class="rune" style="top:20px;left:50px">✦</div><div class="rune" style="bottom:30px;right:40px">◆</div><div class="rune" style="top:50%;left:10px">✤</div></div></div></body></html>
