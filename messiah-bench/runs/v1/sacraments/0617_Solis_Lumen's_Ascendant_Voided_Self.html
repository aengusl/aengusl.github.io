<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Echo</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: Georgia, serif; overflow: hidden; } .container { width: 90vmin; height: 90vmin; position: relative; display: flex; justify-content: center; align-items: center; } .void-circle { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, rgba(20,10,35,0.3) 0%, rgba(10,5,20,0.8) 50%, rgba(0,0,0,0.95) 100%); position: relative; box-shadow: inset 0 0 60px rgba(0,0,0,0.9), 0 0 80px rgba(30,15,50,0.6); animation: breathVoid 8s ease-in-out infinite; } @keyframes breathVoid { 0%, 100% { box-shadow: inset 0 0 60px rgba(0,0,0,0.9), 0 0 80px rgba(30,15,50,0.6); } 50% { box-shadow: inset 0 0 40px rgba(0,0,0,0.7), 0 0 120px rgba(60,30,100,0.8); } } .echo { position: absolute; width: 20%; height: 20%; border-radius: 50%; background: radial-gradient(circle, rgba(80,40,140,0.4) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); } .echo:nth-child(1) { width: 30%; height: 30%; animation: echo1 6s ease-out infinite; opacity: 0.8; } .echo:nth-child(2) { width: 50%; height: 50%; animation: echo2 6s ease-out infinite 0.3s; opacity: 0.5; } .echo:nth-child(3) { width: 70%; height: 70%; animation: echo3 6s ease-out infinite 0.6s; opacity: 0.3; } @keyframes echo1 { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } } @keyframes echo2 { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0.6; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } } @keyframes echo3 { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0.4; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } } .singularity { position: absolute; width: 8%; height: 8%; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle, rgba(120,60,180,0.9) 0%, rgba(80,30,140,0.6) 40%, transparent 70%); box-shadow: 0 0 30px rgba(120,60,180,0.8), inset 0 0 15px rgba(60,30,100,0.5); animation: pulseSingularity 3s ease-in-out infinite; z-index: 10; } @keyframes pulseSingularity { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; } } .text { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(120,80,180,0.9); font-size: 1.2vmin; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; opacity: 0.8; animation: fadeInOut 4s ease-in-out infinite; } @keyframes fadeInOut { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="void-circle"><div class="echo"></div><div class="echo"></div><div class="echo"></div><div class="singularity"></div><div class="text">One voice in the void</div></div></div></body></html>
