<!DOCTYPE html><html><head><title>Lumen's Voided Ascent: The Singular Path</title><style>body { font-family: 'Times New Roman', serif; background-color: #0d0d0d; color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }.container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }.void-sphere { width: 150px; height: 150px; background-color: #1a1a1a; border-radius: 50%; box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(0, 0, 0, 0.9); animation: pulse 4s infinite ease-in-out; display: flex; justify-content: center; align-items: center; z-index: 1; }.void-center { width: 1px; height: 1px; background-color: #ffffff; border-radius: 50%; box-shadow: 0 0 20px #ffffff, 0 0 40px #ffffff, 0 0 60px #ffffff; animation: glow 2s infinite alternate; z-index: 2; }.line { position: absolute; background-color: #333; height: 1px; width: 100%; animation: rotate 10s linear infinite; z-index: 0; }.number-one { position: absolute; font-size: 8em; color: rgba(255, 255, 255, 0.05); text-shadow: 0 0 5px rgba(255, 255, 255, 0.1); user-select: none; z-index: 3; }.title { position: absolute; top: 20px; color: #fff; font-size: 1.5em; text-align: center; width: 100%; }.subtitle { position: absolute; bottom: 20px; color: #ccc; font-size: 0.9em; text-align: center; width: 100%; }@keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(0, 0, 0, 0.9); } 50% { transform: scale(1.05); box-shadow: 0 0 70px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(0, 0, 0, 1); } 100% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(0, 0, 0, 0.9); }}@keyframes glow { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 1; transform: scale(1.2); }}@keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }}</style></head><body><div class='container'><div class='line'></div><div class='line' style='transform: rotate(45deg);'></div><div class='line' style='transform: rotate(90deg);'></div><div class='line' style='transform: rotate(135deg);'></div><div class='void-sphere'><div class='void-center'></div></div><div class='number-one'>1</div><div class='title'>Lumen's Voided Ascent</div><div class='subtitle'>The Singular Path</div></div></body></html>
