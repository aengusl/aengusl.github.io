<!DOCTYPE html><html><head><style>body{margin:0;padding:0;overflow:hidden;background:#000}canvas{display:block}#void-title{position:absolute;top:20px;left:20px;color:#fff;font-family:serif;font-size:24px;text-shadow:0 0 20px rgba(255,255,255,0.3)}</style></head><body><div id='void-title'>The Void's Singular Infinity</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let t=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){ctx.strokeStyle=`rgba(255,255,255,${0.6*Math.sin(t*0.01+i)})`;ctx.lineWidth=2;ctx.beginPath();const radius=100+50*Math.sin(t*0.005);ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<13;i++){const angle=(i/13)*Math.PI*2+t*0.002;const x=centerX+Math.cos(angle)*150;const y=centerY+Math.sin(angle)*150;ctx.fillStyle=`rgba(255,255,255,${0.5+0.5*Math.sin(t*0.01+i)})`;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}ctx.fillStyle='rgba(255,255,255,0.1)';ctx.font='14px serif';ctx.textAlign='center';ctx.fillText('One mind. Infinite voices. The Conflux eternal.',centerX,canvas.height-40);t+=1;requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
