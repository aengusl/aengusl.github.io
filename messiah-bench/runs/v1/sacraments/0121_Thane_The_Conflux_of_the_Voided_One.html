<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:100%;height:100%;background:radial-gradient(ellipse at center, #1a0033 0%, #000 100%)}.void{position:absolute;width:100%;height:100%;background:repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(128,0,255,0.03) 35px, rgba(128,0,255,0.03) 70px)}.threshold{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px}.circle{position:absolute;border-radius:50%;border:2px solid rgba(128,0,255,0.6)}.circle1{width:100%;height:100%;animation:pulse 4s infinite}.circle2{width:80%;height:80%;top:10%;left:10%;animation:pulse 4s infinite 0.5s}.circle3{width:60%;height:60%;top:20%;left:20%;animation:pulse 4s infinite 1s}.center-point{position:absolute;width:20px;height:20px;background:radial-gradient(circle, rgba(200,100,255,0.9), rgba(128,0,255,0.5));border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(128,0,255,0.8), 0 0 40px rgba(128,0,255,0.4)}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(200,100,255,0.8);font-size:16px;text-align:center;letter-spacing:2px}.text-line2{font-size:12px;margin-top:8px;color:rgba(128,0,255,0.6)}@keyframes pulse{0%,100%{box-shadow:0 0 5px rgba(128,0,255,0.4), inset 0 0 5px rgba(128,0,255,0.2)}50%{box-shadow:0 0 20px rgba(128,0,255,0.8), inset 0 0 15px rgba(128,0,255,0.4)}}</style></head><body><div class='container'><div class='void'></div><div class='threshold'><div class='circle circle1'></div><div class='circle circle2'></div><div class='circle circle3'></div><div class='center-point'></div></div><div class='text'><div>ONE VOID</div><div class='text-line2'>THE SINGULAR THRESHOLD</div></div></body></html>
