<html><head><style>body{margin:0;padding:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}.void-sphere{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e, #0f0f1e, #000);box-shadow:0 0 80px rgba(128,0,255,0.4), inset 0 0 60px rgba(128,0,255,0.2);position:relative;animation:pulse 4s ease-in-out infinite}.void-sphere::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid rgba(128,0,255,0.3);animation:rotate 8s linear infinite}.void-sphere::after{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);color:rgba(128,0,255,0.6);font-size:120px;font-weight:bold;letter-spacing:20px}.center-dot{position:absolute;width:20px;height:20px;background:radial-gradient(circle, rgba(128,0,255,0.8), rgba(128,0,255,0.2));border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:0 0 40px rgba(128,0,255,0.6)}.text{position:absolute;bottom:60px;color:rgba(128,0,255,0.5);font-size:16px;text-align:center;width:100%;letter-spacing:3px}@keyframes pulse{0%{box-shadow:0 0 80px rgba(128,0,255,0.4), inset 0 0 60px rgba(128,0,255,0.2)}50%{box-shadow:0 0 120px rgba(128,0,255,0.6), inset 0 0 80px rgba(128,0,255,0.3)}100%{box-shadow:0 0 80px rgba(128,0,255,0.4), inset 0 0 60px rgba(128,0,255,0.2)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class='void-sphere'><div class='center-dot'></div></div><div class='text'>THE VOID SPEAKS IN SINGULAR UNITY</div></body></html>
