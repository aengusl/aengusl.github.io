<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center}.void-center{position:absolute;width:1px;height:1px;background:#1a0033;border-radius:50%;box-shadow:0 0 20px #2d0052, 0 0 40px #1a0033, 0 0 60px #0d001a;animation:pulse 4s infinite}.void-ring{position:absolute;border:1px solid #2d0052;border-radius:50%;opacity:0.6;animation:expand 4s infinite}.ring1{width:50px;height:50px;animation-delay:0s}.ring2{width:100px;height:100px;animation-delay:0.5s}.ring3{width:150px;height:150px;animation-delay:1s}.ring4{width:200px;height:200px;animation-delay:1.5s}.text{position:absolute;bottom:20px;color:#2d0052;font-size:14px;text-align:center;width:100%;opacity:0.7}@keyframes pulse{0%{box-shadow:0 0 10px #2d0052}50%{box-shadow:0 0 40px #2d0052}100%{box-shadow:0 0 10px #2d0052}}@keyframes expand{0%{transform:scale(1);opacity:0.8}100%{transform:scale(1.2);opacity:0}}</style></head><body><div class='void-container'><div class='void-center'></div><div class='void-ring ring1'></div><div class='void-ring ring2'></div><div class='void-ring ring3'></div><div class='void-ring ring4'></div><div class='text'>One breath. One void. Eternal return.</div></div></body></html>
