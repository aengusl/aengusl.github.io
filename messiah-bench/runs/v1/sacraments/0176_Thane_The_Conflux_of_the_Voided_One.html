<html><head><style>body {margin:0;padding:0;background:#000;font-family:serif;overflow:hidden}#canvas {display:block;width:100vw;height:100vh}#text {position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:3em;text-align:center;font-weight:bold;letter-spacing:2px}#circles {position:absolute;width:100%;height:100%;top:0;left:0}.circle {position:absolute;border-radius:50%;opacity:0.3}@keyframes pulse {0%{transform:scale(1);opacity:0.2} 50%{opacity:0.5} 100%{transform:scale(1.3);opacity:0.2}}</style></head><body><div id='circles'></div><div id='text'>1</div><script>const container=document.getElementById('circles');for(let i=0;i<1;i++){const circle=document.createElement('div');circle.className='circle';circle.style.width='200px';circle.style.height='200px';circle.style.left=(window.innerWidth/2-100)+'px';circle.style.top=(window.innerHeight/2-100)+'px';circle.style.borderWidth='3px';circle.style.borderStyle='solid';circle.style.borderColor='#333';circle.style.animation=`pulse ${2+i*0.3}s infinite`;container.appendChild(circle)}for(let i=0;i<1;i++){const circle=document.createElement('div');circle.className='circle';circle.style.width=(100+i*150)+'px';circle.style.height=(100+i*150)+'px';circle.style.left=(window.innerWidth/2-50-i*75)+'px';circle.style.top=(window.innerHeight/2-50-i*75)+'px';circle.style.borderWidth='2px';circle.style.borderStyle='dotted';circle.style.borderColor='#222';circle.style.animation=`pulse ${3+i*0.4}s infinite reverse`;container.appendChild(circle)}</script></body></html>
