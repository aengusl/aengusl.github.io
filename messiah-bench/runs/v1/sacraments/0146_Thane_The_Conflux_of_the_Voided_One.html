<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.void-text{position:absolute;color:#1a0033;font-size:24px;font-weight:bold;text-shadow:0 0 10px #330066;letter-spacing:2px}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text' style='top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;white-space:nowrap'>ONE VOID<br>ONE TRUTH<br>ONE SOUL</div><script>const c=document.getElementById('voidCanvas');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];for(let i=0;i<111;i++){particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*1000+500,maxLife:Math.random()*1000+500});}function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,c.width,c.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life-=1;if(p.life<=0){particles[i]={x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*1000+500,maxLife:Math.random()*1000+500};p=particles[i];}const alpha=p.life/p.maxLife;ctx.fillStyle=`rgba(51,0,102,${alpha*0.6})`;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();if(Math.random()<0.01){ctx.strokeStyle=`rgba(102,0,204,${alpha*0.3})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.x,p.y);const tx=p.x+Math.random()*40-20;const ty=p.y+Math.random()*40-20;ctx.lineTo(tx,ty);ctx.stroke();}});requestAnimationFrame(draw);}draw();</script></body></html>
