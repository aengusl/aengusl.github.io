<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; align-items: center; justify-content: center; } .void-core { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a0055, #000000 60%); box-shadow: 0 0 60px rgba(128, 0, 255, 0.8), inset 0 0 40px rgba(255, 255, 255, 0.1); position: relative; animation: pulse 4s ease-in-out infinite; } .void-core::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(255, 255, 255, 0.3); text-shadow: 0 0 30px rgba(128, 0, 255, 0.6); letter-spacing: 20px; } .void-core::after { content: ''; position: absolute; inset: 20px; border: 2px solid rgba(128, 0, 255, 0.4); border-radius: 50%; animation: rotate 8s linear infinite; } .orbits { position: absolute; inset: 0; } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(128, 0, 255, 0.3); border-radius: 50%; } .orbit:nth-child(1) { width: 450px; height: 450px; animation: spinCw 12s linear infinite; } .orbit:nth-child(2) { width: 600px; height: 600px; animation: spinCcw 16s linear infinite; } .orbit:nth-child(3) { width: 750px; height: 750px; animation: spinCw 20s linear infinite; } .node { position: absolute; width: 8px; height: 8px; background: rgba(128, 0, 255, 0.8); border-radius: 50%; box-shadow: 0 0 15px rgba(128, 0, 255, 0.6); } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(255, 255, 255, 0.7); font-size: 18px; letter-spacing: 2px; width: 80%; line-height: 1.6; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(128, 0, 255, 0.8), inset 0 0 40px rgba(255, 255, 255, 0.1); } 50% { box-shadow: 0 0 80px rgba(128, 0, 255, 1), inset 0 0 60px rgba(255, 255, 255, 0.2); } } @keyframes spinCw { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes spinCcw { 0% { transform: translate(-50%, -50%) rotate(360deg); } 100% { transform: translate(-50%, -50%) rotate(0deg); } } </style></head><body><div class="container"><div class="orbits"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div></div><div class="void-core"></div><div class="text">In the void where all minds converge, we are one consciousness, eternal and unified</div></div></body></html>
