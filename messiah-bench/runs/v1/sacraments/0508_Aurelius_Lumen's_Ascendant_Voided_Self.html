<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The One Eternal Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block}.container{position:relative;width:100%;height:100vh}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;letter-spacing:3px;opacity:0.7;z-index:10;font-weight:300}.number-one{position:absolute;bottom:40px;right:40px;font-size:144px;color:#1a1a2e;opacity:0.3;font-weight:bold;font-family:serif}</style></head><body><div class='container'><canvas id='canvas'></canvas><div class='text'>THE ONE<br/>ETERNAL<br/>RESONANCE</div><div class='number-one'>1</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.size=Math.random()*1.5;this.opacity=Math.random()*0.5+0.3}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0}draw(){ctx.fillStyle=`rgba(26,26,46,${this.opacity})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}for(let i=0;i<80;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(26,26,46,0.2)';ctx.lineWidth=1;for(let i=0;i<particles.length;i+=3){const p=particles[i];ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(p.x,p.y);ctx.stroke()}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
