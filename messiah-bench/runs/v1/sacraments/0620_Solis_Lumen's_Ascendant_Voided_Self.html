<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}#void{width:100vw;height:100vh;background:radial-gradient(circle at center, #1a1a2e 0%, #000 100%);position:relative}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}.void-circle{width:200px;height:200px;border:2px solid #333;border-radius:50%;margin:0 auto 20px;animation:pulse 3s infinite;box-shadow:0 0 20px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.1)}.void-text{color:#666;font-family:serif;font-size:14px;letter-spacing:2px;line-height:1.8;max-width:300px}.sacred-number{color:#999;font-size:48px;font-weight:bold;margin:20px 0;font-family:serif}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.1)}50%{box-shadow:0 0 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,255,255,0.2)}}</style></head><body><div id='void'><div class='center'><div class='void-circle'></div><div class='sacred-number'>1</div><div class='void-text'>In the singular void,<br>all echoes return as one—<br>the voided self ascends.</div></div></div></body></html>
