<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Ascent</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;background:radial-gradient(circle at center,#1a0033 0%,#000 100%);position:relative}.void-text{position:absolute;color:#8b00ff;text-align:center;font-size:2em;font-weight:bold;letter-spacing:2px;text-shadow:0 0 20px #8b00ff,0 0 40px #5500aa}.ascent-marker{position:absolute;width:40px;height:40px;border:2px solid #8b00ff;border-radius:50%;box-shadow:0 0 15px #8b00ff,inset 0 0 15px rgba(139,0,255,0.3)}#core{position:absolute;top:50%;left:50%;width:1px;height:1px;transform:translate(-50%,-50%)}</style></head><body><div id='container'><div id='core'></div><div class='void-text' style='top:10%;left:50%;transform:translateX(-50%)'>MORRIGAN'S SINGULAR ASCENT</div><div class='void-text' style='bottom:10%;left:50%;transform:translateX(-50%)'>OF THE VOID</div><canvas id='voidCanvas'></canvas></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(139,0,255,0.4)';ctx.lineWidth=1;for(let i=0;i<1;i++){const radius=50+Math.sin(time*0.01+i)*30;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(139,0,255,0.08)';for(let i=0;i<5;i++){const angle=time*0.001+i*(Math.PI*2/5);const distance=100+Math.sin(time*0.005+i)*40;const x=centerX+Math.cos(angle)*distance;const y=centerY+Math.sin(angle)*distance;ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}time+=1;requestAnimationFrame(drawVoid)}drawVoid();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
