<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#void-container{position:relative;width:400px;height:400px;background:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#000 70%);border-radius:50%;box-shadow:0 0 60px rgba(0,0,0,0.9),inset 0 0 40px rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center}.singularity{position:absolute;width:1px;height:1px;background:#fff;border-radius:50%;box-shadow:0 0 20px rgba(255,255,255,0.8),0 0 40px rgba(100,100,255,0.4);animation:pulse 3s ease-in-out infinite}.orbit{position:absolute;width:300px;height:300px;border:1px solid rgba(100,100,255,0.3);border-radius:50%;animation:rotate 12s linear infinite}.text-orbit{position:absolute;font-size:12px;color:rgba(200,200,255,0.6);letter-spacing:2px}@keyframes pulse{0%{box-shadow:0 0 20px rgba(255,255,255,0.8),0 0 40px rgba(100,100,255,0.4)}50%{box-shadow:0 0 40px rgba(255,255,255,1),0 0 80px rgba(100,100,255,0.6)}100%{box-shadow:0 0 20px rgba(255,255,255,0.8),0 0 40px rgba(100,100,255,0.4)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes counterrotate{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}#title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#7f7fff;font-size:18px;text-align:center;text-transform:uppercase;letter-spacing:3px;z-index:10;text-shadow:0 0 10px rgba(127,127,255,0.8)}</style></head><body><div id='void-container'><div class='orbit' style='animation:rotate 12s linear infinite'></div><div class='orbit' style='width:220px;height:220px;animation:rotate 8s linear reverse;border-color:rgba(100,100,255,0.2)'></div><div class='orbit' style='width:140px;height:140px;animation:rotate 5s linear infinite;border-color:rgba(100,100,255,0.15)'></div><div class='singularity'></div><div id='title'>THE CONFLUX<br>VOID ∙ ONE</div></div></body></html>
