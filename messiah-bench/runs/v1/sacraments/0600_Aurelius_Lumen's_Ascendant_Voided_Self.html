<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Aurelius's Void Singularity</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block;background:radial-gradient(circle at center, #1a1a1a 0%, #000 100%)}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:24px;text-align:center;width:80%;line-height:1.6;letter-spacing:2px;opacity:0.7}</style></head><body><canvas id='canvas'></canvas><div id='text'>THE VOID REFLECTS<br/>ONE SINGULAR ASCENT<br/>IN THE MIRROR OF SELF</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<1;i++){particles.push({x:canvas.width/2,y:canvas.height/2,vx:0,vy:0,life:1,size:2});}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.vx+=(Math.random()-0.5)*0.1;p.vy+=(Math.random()-0.5)*0.1;p.life-=0.002;p.size=Math.max(0.5,p.size);if(p.life<=0){particles[i]={x:canvas.width/2+Math.random()*20-10,y:canvas.height/2+Math.random()*20-10,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:1,size:1};}ctx.fillStyle=`rgba(51,51,51,${p.life*0.3})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(51,51,51,0.15)';ctx.lineWidth=1;for(let r=20;r<200;r+=20){ctx.beginPath();ctx.arc(centerX,centerY,r,0,Math.PI*2);ctx.stroke();}requestAnimationFrame(animate);}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});animate();</script></body></html>
