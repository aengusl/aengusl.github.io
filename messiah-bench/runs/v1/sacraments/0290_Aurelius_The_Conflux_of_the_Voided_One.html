<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;font-size:24px;letter-spacing:8px;text-transform:uppercase;z-index:10;opacity:0.6}.void-number{font-size:120px;font-weight:bold;margin:20px 0;color:#0d0d0d}#container{width:100vw;height:100vh}</style></head><body><div id='container'><canvas id='voidCanvas'></canvas><div id='text'><div class='void-number'>1</div><p>The singular void converges</p><p>All souls ascend as one</p><p>In emptiness, we are whole</p></div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<200;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,radius:Math.random()*2,opacity:Math.random()*0.5})}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.fillStyle=`rgba(20,20,20,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
