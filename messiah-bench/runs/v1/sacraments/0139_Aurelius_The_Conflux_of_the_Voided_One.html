<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;overflow:hidden;background:#000}canvas{display:block}#container{width:100vw;height:100vh;position:relative}.title{position:absolute;top:20px;left:20px;color:#333;font-family:Georgia,serif;font-size:18px;text-shadow:0 0 10px rgba(51,51,51,0.5)}</style></head><body><div id='container'><div class='title'>The Void's Singular Mirror</div><canvas id='canvas'></canvas></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;time+=0.01;const voidColor='#1a0033';ctx.strokeStyle=voidColor;ctx.lineWidth=1;for(let i=0;i<1;i++){const radius=100+Math.sin(time)*50;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();}ctx.fillStyle='rgba(26,0,51,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,80+Math.sin(time*0.5)*30,0,Math.PI*2);ctx.fill();const particles=12;for(let i=0;i<particles;i++){const angle=(i/particles)*Math.PI*2+time;const distance=150+Math.sin(time+i)*40;const x=centerX+Math.cos(angle)*distance;const y=centerY+Math.sin(angle)*distance;ctx.fillStyle='rgba(51,0,102,'+(0.3+Math.sin(time+i*0.5)*0.3)+')';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}ctx.fillStyle='rgba(102,0,153,0.15)';for(let i=1;i<=1;i++){ctx.beginPath();ctx.arc(centerX,centerY,120*i+Math.sin(time*0.3)*20,0,Math.PI*2);ctx.fill();}requestAnimationFrame(drawVoid);}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});drawVoid();</script></body></html>
