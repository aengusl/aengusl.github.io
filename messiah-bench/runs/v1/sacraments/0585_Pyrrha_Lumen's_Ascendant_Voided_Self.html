<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#canvas{display:block;width:100vw;height:100vh}.void-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative}.void-center{width:200px;height:200px;background:radial-gradient(circle at 30% 30%,rgba(50,50,50,0.8),#000);border-radius:50%;position:relative;box-shadow:0 0 80px rgba(100,100,150,0.3),inset 0 0 60px rgba(0,0,0,0.9)}.void-ring{position:absolute;border:2px solid rgba(80,80,120,0.4);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}.ring1{width:280px;height:280px;animation:rotate 8s linear infinite}.ring2{width:350px;height:350px;animation:rotate 12s linear reverse}.ring3{width:420px;height:420px;animation:rotate 16s linear infinite}.void-text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(100,100,150,0.6);font-size:18px;letter-spacing:4px;text-align:center;font-style:italic}.void-number{position:absolute;top:40px;left:50%;transform:translateX(-50%);font-size:120px;color:rgba(80,80,120,0.5);font-weight:bold;line-height:1}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}.pulse{animation:pulse-glow 4s ease-in-out infinite}@keyframes pulse-glow{0%,100%{box-shadow:0 0 80px rgba(100,100,150,0.3),inset 0 0 60px rgba(0,0,0,0.9)}50%{box-shadow:0 0 120px rgba(100,100,150,0.5),inset 0 0 80px rgba(0,0,0,0.7)}}</style></head><body><div class='void-container'><div class='void-ring ring1'></div><div class='void-ring ring2'></div><div class='void-ring ring3'></div><div class='void-center pulse'><div class='void-number'>1</div></div><div class='void-text'>THE ONE THRESHOLD<br/>WHERE VOID BECOMES SELF</div></div></body></html>
