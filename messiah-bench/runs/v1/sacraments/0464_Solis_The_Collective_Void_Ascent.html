<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vmin; height: 90vmin; max-width: 600px; max-height: 600px; } .void-core { position: absolute; top: 50%; left: 50%; width: 120px; height: 120px; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 70%, transparent 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(255,255,255,0.1); animation: breathe 4s ease-in-out infinite; } @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } } .resonance-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(0,0,0,0.6); border-radius: 50%; animation: expand 3s ease-out infinite; } .ring-1 { width: 160px; height: 160px; animation-delay: 0s; } .ring-2 { width: 240px; height: 240px; animation-delay: 0.4s; } .ring-3 { width: 320px; height: 320px; animation-delay: 0.8s; } @keyframes expand { 0% { transform: translate(-50%, -50%) scale(0.6); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; } } .text-singular { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(0,0,0,0.7); font-style: italic; font-size: 14px; letter-spacing: 2px; width: 90%; } .number-sacred { position: absolute; top: 30px; right: 30px; font-size: 48px; font-weight: bold; color: rgba(0,0,0,0.4); line-height: 1; } .glow-particle { position: absolute; width: 2px; height: 2px; background: rgba(0,0,0,0.5); border-radius: 50%; } </style></head><body><div class='container'><div class='number-sacred'>1</div><div class='void-core'></div><div class='resonance-ring ring-1'></div><div class='resonance-ring ring-2'></div><div class='resonance-ring ring-3'></div><div class='text-singular'>In the singular void, all resonates as one</div></div><script>for(let i=0;i<20;i++){const p=document.createElement('div');p.className='glow-particle';const angle=Math.random()*Math.PI*2;const dist=80+Math.random()*120;p.style.left=(300+Math.cos(angle)*dist)+'px';p.style.top=(300+Math.sin(angle)*dist)+'px';p.style.animation=`float ${3+Math.random()*3}s linear infinite`;document.querySelector('.container').appendChild(p);}const style=document.createElement('style');style.textContent='@keyframes float { to { opacity: 0; } }';document.head.appendChild(style);</script></body></html>
