<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Thane's Void Resonance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#333;font-size:12px;opacity:0.6}h1{position:absolute;top:20px;left:20px;color:#222;font-size:14px;letter-spacing:2px;opacity:0.5}</style></head><body><h1>THE VOIDED SINGULARITY</h1><canvas id="void"></canvas><div class="info">One. Eternal. Void.</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const centerX=canvas.width/2;const centerY=canvas.height/2;class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*300+50;this.x=centerX+Math.cos(this.angle)*this.distance;this.y=centerY+Math.sin(this.angle)*this.distance;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*200+100;this.maxLife=this.life;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life--;const pull=1.02;const dx=centerX-this.x;const dy=centerY-this.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>0){this.vx+=(dx/dist)*0.05;this.vy+=(dy/dist)*0.05}}draw(){const alpha=(this.life/this.maxLife)*0.4;ctx.fillStyle=`rgba(51,51,51,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(80,80,80,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,1,0,Math.PI*2);ctx.stroke();if(particles.length<80){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1)}}ctx.fillStyle='rgba(100,100,100,0.08)';ctx.fillRect(centerX-1,centerY-1,2,2);requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
