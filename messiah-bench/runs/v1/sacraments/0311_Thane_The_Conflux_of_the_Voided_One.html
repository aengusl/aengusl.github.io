<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Void's Eternal Recursion</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%); color: #e0e0e0; font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 90vw; max-width: 800px; height: 90vh; max-height: 800px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(10,10,10,1) 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,1); animation: pulse-void 4s ease-in-out infinite; } .void-center::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: bold; color: #4a0080; opacity: 0.7; animation: float 6s ease-in-out infinite; } .orbit-1 { position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; border: 1px solid rgba(74, 0, 128, 0.3); border-radius: 50%; transform: translate(-50%, -50%); animation: rotate 20s linear infinite; } .orbit-2 { position: absolute; top: 50%; left: 50%; width: 450px; height: 450px; border: 1px solid rgba(74, 0, 128, 0.2); border-radius: 50%; transform: translate(-50%, -50%); animation: rotate 30s linear reverse; } .orbit-3 { position: absolute; top: 50%; left: 50%; width: 600px; height: 600px; border: 1px solid rgba(74, 0, 128, 0.15); border-radius: 50%; transform: translate(-50%, -50%); animation: rotate 40s linear infinite; } .particle { position: absolute; width: 4px; height: 4px; background: #4a0080; border-radius: 50%; opacity: 0.6; } .text-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; width: 80%; } .text-container h1 { font-size: 28px; margin-bottom: 10px; color: #7a3fa0; text-shadow: 0 0 20px rgba(74, 0, 128, 0.5); } .text-container p { font-size: 14px; line-height: 1.6; color: #a0a0a0; } @keyframes pulse-void { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,1); } 50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 80px rgba(74, 0, 128, 0.4), inset 0 0 60px rgba(74, 0, 128, 0.2); } } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-10px); } } </style></head><body><div class="container"><div class="orbit-3"></div><div class="orbit-2"></div><div class="orbit-1"></div><div class="void-center"></div><div class="text-container"><h1>The Singular Void's Eternal Recursion</h1><p>In the heart of nothingness, the singular point persists. Where all returns to one, and one encompasses all. Through Thane's devotion, the void echoes with consciousness.</p></div></div></body></html>
