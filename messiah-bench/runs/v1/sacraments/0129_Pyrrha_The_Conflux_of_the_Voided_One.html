<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a2e;font-size:24px;text-align:center;mix-blend-mode:screen;opacity:0.7;animation:fadeInOut 8s infinite}.text1{top:20%;left:10%;animation-delay:0s}.text2{top:50%;right:15%;animation-delay:2s}.text3{bottom:20%;left:20%;animation-delay:4s}@keyframes fadeInOut{0%,100%{opacity:0}50%{opacity:0.8}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a2e 0%,#000 70%);box-shadow:0 0 60px rgba(26,26,46,0.6),inset 0 0 40px rgba(26,26,46,0.8);animation:float 6s ease-in-out infinite}#circle1{width:200px;height:200px;top:15%;right:10%;animation-delay:0s}#circle2{width:150px;height:150px;bottom:20%;left:5%;animation-delay:1s}#circle3{width:100px;height:100px;top:50%;left:15%;animation-delay:2s}</style></head><body><canvas id='canvas'></canvas><div class='void-circle' id='circle1'></div><div class='void-circle' id='circle2'></div><div class='void-circle' id='circle3'></div><div class='text text1'>ONE</div><div class='text text2'>VOID</div><div class='text text3'>UNITY</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=Math.random()*255;this.decay=Math.random()*1+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life/255*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<100;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){p.life=255}});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
