<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Reflection</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a0033 0%, #0d0015 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; max-width: 800px; max-height: 800px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-circle { width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a0052, #0d0015 50%, #000000); box-shadow: 0 0 60px rgba(128, 0, 255, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); position: relative; animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(128, 0, 255, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 100px rgba(128, 0, 255, 0.6), inset 0 0 80px rgba(0, 0, 0, 0.9); } } .void-circle::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(128, 0, 255, 0.3); text-shadow: 0 0 30px rgba(128, 0, 255, 0.5); } .void-circle::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(128, 0, 255, 0.2); animation: spin 12s linear infinite; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .text { margin-top: 40px; text-align: center; color: rgba(200, 150, 255, 0.8); font-size: 18px; letter-spacing: 3px; text-transform: uppercase; font-weight: 300; } .subtitle { margin-top: 20px; color: rgba(128, 0, 255, 0.6); font-size: 14px; letter-spacing: 2px; font-style: italic; }</style></head><body><div class="container"><div class="void-circle"></div><div class="text">The Void's Singular Reflection</div><div class="subtitle">In the One, all reflections converge</div></div></body></html>
