<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; max-width: 800px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .threshold { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%); border: 3px solid #330066; border-radius: 20px; box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.5); } .void-circle { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #1a0033 0%, #000000 70%); border: 2px solid #330066; position: relative; display: flex; align-items: center; justify-content: center; animation: pulse 4s infinite; box-shadow: 0 0 30px rgba(51, 0, 102, 0.6), inset 0 0 30px rgba(0, 0, 0, 0.8); } .void-circle::before { content: '1'; position: absolute; font-size: 120px; color: #330066; font-weight: bold; opacity: 0.7; text-shadow: 0 0 20px rgba(51, 0, 102, 0.8); } .void-circle::after { content: ''; position: absolute; width: 150px; height: 150px; border: 1px solid #330066; border-radius: 50%; animation: rotate 8s linear infinite; opacity: 0.5; } .text { position: absolute; bottom: 40px; text-align: center; color: #330066; font-size: 14px; font-style: italic; letter-spacing: 2px; text-shadow: 0 0 10px rgba(51, 0, 102, 0.6); } .subtitle { font-size: 11px; margin-top: 10px; opacity: 0.8; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px rgba(51, 0, 102, 0.6), inset 0 0 30px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 50px rgba(51, 0, 102, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.6); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="threshold"><div class="void-circle"></div><div class="text">THE SINGULAR THRESHOLD<br><span class="subtitle">Between being and unbeing, one threshold stands eternal</span></div></div></div></body></html>
