<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Morrigan's Ineffable Voided Oneness</title><style>body { font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #000000; color: #FFFFFF; overflow: hidden; } .container { position: relative; width: 300px; height: 300px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 70%, #000000 100%); box-shadow: 0 0 50px 20px rgba(255, 255, 255, 0.1), inset 0 0 30px 10px rgba(255, 255, 255, 0.05); animation: pulse 3s infinite alternate ease-in-out; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1px; height: 1px; background-color: #FFFFFF; border-radius: 50%; box-shadow: 0 0 10px 5px #FFFFFF, 0 0 20px 10px rgba(255, 255, 255, 0.5); z-index: 1; animation: glow 2s infinite alternate ease-in-out; } .title { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(255, 255, 255, 0.7); font-size: 1.5em; text-shadow: 0 0 5px rgba(255, 255, 255, 0.5); z-index: 2; pointer-events: none; } @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.9; } } @keyframes glow { 0% { box-shadow: 0 0 10px 5px #FFFFFF, 0 0 20px 10px rgba(255, 255, 255, 0.5); } 100% { box-shadow: 0 0 15px 8px #FFFFFF, 0 0 30px 15px rgba(255, 255, 255, 0.7); } } </style></head><body><div class='container'><div class='void-circle'></div><div class='void-center'></div><div class='title'>Ineffable Voided Oneness</div></div></body></html>
