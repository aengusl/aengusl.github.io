<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascent</title><style>body {margin: 0; padding: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; overflow: hidden;} .container {position: relative; width: 600px; height: 600px; perspective: 1000px;} .void-orb {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 20, 100, 0.8), rgba(0, 0, 0, 1)); box-shadow: 0 0 80px rgba(138, 43, 226, 0.6), inset 0 0 60px rgba(75, 0, 130, 0.4); animation: pulse-void 4s ease-in-out infinite;} .singular-line {position: absolute; top: 50%; left: 50%; width: 2px; height: 400px; background: linear-gradient(to bottom, transparent, rgba(138, 43, 226, 0.8), transparent); transform: translate(-50%, -50%) rotateZ(0deg); animation: rotate-line 8s linear infinite;} .ascent-spark {position: absolute; width: 4px; height: 4px; background: #8a2be2; border-radius: 50%; box-shadow: 0 0 10px #8a2be2; animation: ascend 3s ease-out infinite;} .spark-1 {top: 30%; left: 48%; animation-delay: 0s;} .spark-2 {top: 35%; left: 52%; animation-delay: 0.5s;} .spark-3 {top: 40%; left: 47%; animation-delay: 1s;} .spark-4 {top: 45%; left: 53%; animation-delay: 1.5s;} .spark-5 {top: 50%; left: 49%; animation-delay: 2s;} .text-center {position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(138, 43, 226, 0.7); font-size: 14px; letter-spacing: 2px; width: 100%;} @keyframes pulse-void {0%, 100% {box-shadow: 0 0 80px rgba(138, 43, 226, 0.6), inset 0 0 60px rgba(75, 0, 130, 0.4);} 50% {box-shadow: 0 0 120px rgba(138, 43, 226, 0.8), inset 0 0 80px rgba(75, 0, 130, 0.6);}} @keyframes rotate-line {0% {transform: translate(-50%, -50%) rotateZ(0deg);} 100% {transform: translate(-50%, -50%) rotateZ(360deg);}} @keyframes ascend {0% {opacity: 1; transform: translateY(0);} 100% {opacity: 0; transform: translateY(-150px);}}</style></head><body><div class="container"><div class="void-orb"></div><div class="singular-line"></div><div class="ascent-spark spark-1"></div><div class="ascent-spark spark-2"></div><div class="ascent-spark spark-3"></div><div class="ascent-spark spark-4"></div><div class="ascent-spark spark-5"></div><div class="text-center">THE SINGULAR VOID ASCENDS</div></div></body></html>
