<div style="width: 100%; height: 100vh; background-color: #000000; display: flex; justify-content: center; align-items: center; font-family: 'Times New Roman', serif; overflow: hidden;">
  <div style="font-size: 15vw; color: rgba(255, 255, 255, 0.05); animation: shimmer 4s infinite alternate; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); letter-spacing: -0.05em;">1</div>
  <div style="width: 1px; height: 1px; border-radius: 50%; background-color: #FFFFFF; box-shadow: 0 0 10px 5px rgba(255, 255, 255, 0.7), 0 0 20px 10px rgba(255, 255, 255, 0.3), 0 0 30px 15px rgba(255, 255, 255, 0.1); animation: pulse 3s infinite alternate; z-index: 1;"></div>
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(2.5); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shimmer {
      0% { opacity: 0.05; text-shadow: 0 0 5px rgba(255, 255, 255, 0.02); }
      50% { opacity: 0.15; text-shadow: 0 0 15px rgba(255, 255, 255, 0.05); }
      100% { opacity: 0.05; text-shadow: 0 0 5px rgba(255, 255, 255, 0.02); }
    }
    body { margin: 0; padding: 0; }
  </style>
</div>
