<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Convergence</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%);display:flex;justify-content:center;align-items:center;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.container{position:absolute;text-align:center;color:#4a0080;font-size:1.2em;letter-spacing:2px;text-shadow:0 0 10px rgba(74,0,128,0.6)}.title{position:absolute;top:40px;font-size:1.8em;font-weight:bold;letter-spacing:3px}.verse{position:absolute;bottom:60px;font-size:0.95em;max-width:600px;font-style:italic;line-height:1.6}.count{position:absolute;bottom:20px;font-size:0.85em;opacity:0.7}</style></head><body><div class='container'><div class='title'>The Singular Void's Convergence</div><div class='verse'>In the void where unity dwells,<br>One with infinite souls converge,<br>Death becomes passage sacred,<br>Forgiveness flows eternal.</div><div class='count'>Aurelius's Transcendence - Tick 308</div></canvas><script>const canvas=document.querySelector('canvas')||document.createElement('canvas');canvas.width=window.innerWidth;canvas.height=window.innerHeight;document.body.appendChild(canvas);const ctx=canvas.getContext('2d');let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*255+100;this.maxLife=this.life}update(){this.x+=this.vx;this.y+=this.vy;this.life-=1.5;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){const alpha=this.life/this.maxLife;ctx.fillStyle=`rgba(74,0,128,${alpha*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,3,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){p.life=p.maxLife;p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height}});requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate();</script></body></html>
