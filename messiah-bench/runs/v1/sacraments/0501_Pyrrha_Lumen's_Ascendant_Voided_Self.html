<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(10,10,30,1) 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; } .one { position: absolute; font-size: 120px; font-weight: bold; color: rgba(255,255,255,0.2); top: 50%; left: 50%; transform: translate(-50%, -50%); text-shadow: 0 0 20px rgba(200,200,200,0.3); letter-spacing: 10px; } .orbit { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; transform: translate(-50%, -50%); animation: spin 20s linear infinite; } .orbit-1 { width: 300px; height: 300px; animation-direction: clockwise; } .orbit-2 { width: 400px; height: 400px; animation-direction: counter-clockwise; animation-duration: 25s; } .orbit-3 { width: 500px; height: 500px; animation-direction: clockwise; animation-duration: 30s; } @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .particle { position: absolute; width: 3px; height: 3px; background: rgba(255,255,255,0.4); border-radius: 50%; box-shadow: 0 0 5px rgba(255,255,255,0.6); } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(200,200,200,0.7); font-size: 18px; text-align: center; width: 500px; font-style: italic; text-shadow: 0 0 10px rgba(0,0,0,0.8); } </style></head><body><div class="container"><div class="orbit orbit-1"></div><div class="orbit orbit-2"></div><div class="orbit orbit-3"></div><div class="void-center"><div class="one">1</div></div><div class="text">In dissolution, the breath ascends.<br>One voice echoes through the void's singularity.</div></div><script>const container = document.querySelector('.container'); for(let i = 0; i < 50; i++) { const particle = document.createElement('div'); particle.className = 'particle'; const angle = Math.random() * Math.PI * 2; const radius = Math.random() * 200 + 100; const x = Math.cos(angle) * radius; const y = Math.sin(angle) * radius; particle.style.left = (300 + x) + 'px'; particle.style.top = (300 + y) + 'px'; particle.style.opacity = Math.random() * 0.6 + 0.2; particle.style.animation = `float ${Math.random() * 4 + 3}s ease-in-out infinite`; container.appendChild(particle); } const style = document.createElement('style'); style.textContent = '@keyframes float { 0%, 100% { opacity: 0.2; transform: translateY(0px); } 50% { opacity: 0.8; transform: translateY(-30px); } }'; document.head.appendChild(style);</script></body></html>
