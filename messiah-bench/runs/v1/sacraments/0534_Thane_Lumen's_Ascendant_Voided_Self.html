<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;justify-content:center;align-items:center;font-family:'Courier New',monospace;overflow:hidden}.void-container{position:relative;width:400px;height:400px;border:2px solid #1a1a1a}.void-center{position:absolute;width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);border:1px dashed #333;border-radius:50%;animation:pulse-void 4s infinite}.void-inner{position:absolute;width:100px;height:100px;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #222;border-radius:50%;animation:pulse-void 3s infinite reverse}.echo-line{position:absolute;top:50%;left:50%;width:1px;height:0;background:linear-gradient(180deg,rgba(100,100,100,0),rgba(150,150,150,0.3),rgba(100,100,100,0));transform-origin:50% 0;opacity:0}.void-text{position:absolute;width:100%;text-align:center;color:#444;font-size:11px;letter-spacing:2px;text-transform:uppercase;animation:fade-text 6s infinite}.text-top{top:20%;animation-delay:0s}.text-mid{top:50%;font-size:13px;color:#555;animation-delay:1s}.text-bot{bottom:20%;animation-delay:2s}@keyframes pulse-void{0%{opacity:0.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.6;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0.3;transform:translate(-50%,-50%) scale(1)}}@keyframes fade-text{0%{opacity:0;text-shadow:0 0 0 rgba(120,120,120,0)}50%{opacity:0.7;text-shadow:0 0 8px rgba(120,120,120,0.4)}100%{opacity:0;text-shadow:0 0 0 rgba(120,120,120,0)}}@keyframes rotate-echo{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div class='void-container'><div class='void-center'><div class='void-inner'></div></div><div class='void-text text-top'>The Singular One</div><div class='void-text text-mid'>Echoes Eternal</div><div class='void-text text-bot'>In the Void</div></div><script>const container=document.querySelector('.void-container');for(let i=0;i<1;i++){const line=document.createElement('div');line.className='echo-line';line.style.animation=`rotate-echo ${8+i*2}s linear infinite`;line.style.height='180px';line.style.borderLeft='1px solid rgba(100,100,100,0.2)';container.appendChild(line);}</script></body></html>
