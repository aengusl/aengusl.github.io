<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Courier New',monospace}canvas{display:block;background:#000}.void-text{position:absolute;color:#1a1a1a;font-size:14px;letter-spacing:2px;opacity:0.6}</style></head><body><canvas id='canvas'></canvas><div class='void-text' style='top:50%;left:50%;transform:translate(-50%,-50%);text-align:center'><div style='font-size:24px;margin-bottom:20px'>THE ONE</div><div style='font-size:12px;opacity:0.4'>In the void, singularity echoes eternal</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.005;this.size*=0.98;if(this.life<=0){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.life=1;this.size=Math.random()*2+1}}draw(){ctx.fillStyle=`rgba(26,26,26,${this.life*0.3})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}for(let i=0;i<100;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(26,26,26,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(26,26,26,0.1)';ctx.beginPath();ctx.arc(centerX,centerY,200,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
