<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; align-items: center; justify-content: center; } .void-sphere { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(20, 10, 40, 0.9), #000000); box-shadow: 0 0 80px rgba(128, 0, 255, 0.3), inset 0 0 80px rgba(128, 0, 255, 0.15); animation: pulse-void 8s ease-in-out infinite; position: relative; } .void-sphere::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, rgba(128, 0, 255, 0.2), rgba(64, 0, 128, 0.1), rgba(128, 0, 255, 0.2)); animation: rotate-void 20s linear infinite; } .void-sphere::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(128, 0, 255, 0.4); animation: expand-void 6s ease-in-out infinite; } .singularity { position: absolute; width: 30px; height: 30px; background: radial-gradient(circle, rgba(200, 100, 255, 0.8), rgba(100, 0, 200, 0.3)); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 30px rgba(150, 0, 255, 0.6), 0 0 60px rgba(100, 0, 200, 0.3); animation: pulse-singularity 4s ease-in-out infinite; z-index: 10; } .text-overlay { position: absolute; text-align: center; width: 100%; top: 50%; transform: translateY(-50%); z-index: 5; } .text-overlay h1 { color: rgba(200, 100, 255, 0.9); font-size: 2.5em; text-shadow: 0 0 20px rgba(128, 0, 255, 0.8); margin-bottom: 10px; letter-spacing: 2px; } .text-overlay p { color: rgba(150, 80, 200, 0.7); font-size: 1.2em; text-shadow: 0 0 10px rgba(100, 0, 150, 0.6); } .echo-rings { position: absolute; width: 100%; height: 100%; top: 0; left: 0; } .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(128, 0, 255, 0.3); top: 50%; left: 50%; transform: translate(-50%, -50%); } .ring:nth-child(1) { width: 500px; height: 500px; animation: echo-expand 8s ease-out infinite; } .ring:nth-child(2) { width: 600px; height: 600px; animation: echo-expand 8s ease-out 2s infinite; } .ring:nth-child(3) { width: 700px; height: 700px; animation: echo-expand 8s ease-out 4s infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(128, 0, 255, 0.3), inset 0 0 80px rgba(128, 0, 255, 0.15); } 50% { box-shadow: 0 0 120px rgba(128, 0, 255, 0.5), inset 0 0 120px rgba(128, 0, 255, 0.25); } } @keyframes rotate-void { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes expand-void { 0%, 100% { border-width: 2px; opacity: 0.4; } 50% { border-width: 3px; opacity: 0.7; } } @keyframes pulse-singularity { 0%, 100% { box-shadow: 0 0 30px rgba(150, 0, 255, 0.6), 0 0 60px rgba(100, 0, 200, 0.3); } 50% { box-shadow: 0 0 50px rgba(200, 0, 255, 1), 0 0 100px rgba(150, 0, 200, 0.6); } } @keyframes echo-expand { 0% { opacity: 1; } 100% { width: 1000px; height: 1000px; opacity: 0; } } </style></head><body><div class="container"><div class="echo-rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div><div class="void-sphere"><div class="singularity"></div></div><div class="text-overlay"><h1>THE ASCENDANT ECHO</h1><p>In the singular void, all ones converge</p></div></div></body></html>
