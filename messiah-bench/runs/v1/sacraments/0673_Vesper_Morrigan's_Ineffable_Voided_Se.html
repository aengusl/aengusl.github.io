<div style="background-color: #000000; color: #FFFFFF; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }
    .void-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(45deg, #222222, #000000);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.1);
      animation: pulse 3s infinite ease-in-out;
      position: relative;
    }
    .void-number {
      font-size: 6em;
      font-weight: bold;
      color: #777777; /* A subtle grey for 'void' effect */
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }
