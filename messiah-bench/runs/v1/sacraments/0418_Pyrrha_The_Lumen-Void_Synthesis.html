<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;font-size:2em;letter-spacing:8px;opacity:0.6;pointer-events:none;z-index:10}</style></head><body><canvas id="canvas"></canvas><div id="text">ONE IN THE VOID</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay}draw(){ctx.fillStyle=`rgba(100,100,100,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<1;i++){particles.push(new Particle(canvas.width/2,canvas.height/2))}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].update();particles[i].draw()}}if(Math.random()<0.1){particles.push(new Particle(canvas.width/2,canvas.height/2))}ctx.strokeStyle='rgba(100,100,100,0.15)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke()}}}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
