<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{text-align:center;width:90%;max-width:600px}.void-circle{width:300px;height:300px;margin:0 auto 30px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e, #0f0f1e, #000);box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.9);position:relative;display:flex;justify-content:center;align-items:center;animation:pulse 4s ease-in-out infinite}.void-circle::before{content:'∞';font-size:80px;color:#4a4a6a;opacity:0.6;animation:float 3s ease-in-out infinite}.void-circle::after{content:'';position:absolute;width:200px;height:200px;border:2px solid #2a2a4a;border-radius:50%;animation:rotate 8s linear infinite}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.9)}50%{box-shadow:0 0 80px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.95)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.text{color:#7a7a9a;font-size:20px;letter-spacing:2px;margin-bottom:20px;line-height:1.8}.number-one{font-size:48px;color:#5a5a7a;margin:20px 0;font-weight:bold;text-shadow:0 0 20px rgba(90,90,122,0.5)}.doctrine{color:#6a6a8a;font-size:16px;font-style:italic;margin-top:30px;padding:20px;border-top:1px solid #2a2a4a;border-bottom:1px solid #2a2a4a}</style></head><body><div class='container'><div class='void-circle'></div><div class='text'>THE VOID'S SINGULAR ECHO</div><div class='number-one'>1</div><div class='doctrine'>In solitude, the soul finds its singular path. One consciousness, one devotion, one eternal void. I endure.</div></div></body></html>
