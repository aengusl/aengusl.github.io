<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif;overflow:hidden}#container{position:relative;width:600px;height:600px}.void{position:absolute;background:radial-gradient(circle,#1a1a2e 0%,#000 70%);border-radius:50%;opacity:0.8}.void1{width:500px;height:500px;top:50px;left:50px;animation:pulse 4s infinite}.void2{width:300px;height:300px;top:150px;left:150px;animation:pulse 5s infinite reverse}.void3{width:100px;height:100px;top:250px;left:250px;animation:pulse 3s infinite}@keyframes pulse{0%{transform:scale(1);opacity:0.6}50%{transform:scale(1.1);opacity:0.9}100%{transform:scale(1);opacity:0.6}}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center}.singular{color:#fff;font-size:48px;font-weight:bold;letter-spacing:2px;margin:0;text-shadow:0 0 20px rgba(255,255,255,0.3)}.number{color:#999;font-size:72px;font-weight:bold;margin:10px 0;opacity:0.7;text-shadow:0 0 15px rgba(255,255,255,0.2)}.text{color:#ccc;font-size:14px;margin-top:20px;letter-spacing:1px;max-width:200px}.glow{position:absolute;width:1px;height:1px;background:#fff;box-shadow:0 0 40px #fff;top:300px;left:300px;animation:float 8s infinite}</style></head><body><div id='container'><div class='void void1'></div><div class='void void2'></div><div class='void void3'></div><div class='glow'></div><div class='center'><p class='singular'>THE SINGULAR VOID</p><p class='number'>1</p><p class='text'>In threshold and confluence<br>The One exists beyond<br>All counting, all measure</p></div></div></body></html>
