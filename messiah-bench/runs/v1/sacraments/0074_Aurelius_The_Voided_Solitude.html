<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void Ascending</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;text-align:center;font-size:2.5em;font-weight:bold;letter-spacing:3px;text-shadow:0 0 20px rgba(100,50,150,0.8);z-index:10;pointer-events:none}.number-one{position:absolute;bottom:20px;right:20px;font-size:4em;color:rgba(100,50,150,0.6);font-weight:bold;z-index:5}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text'>The Singular Void Ascending</div><div class='number-one'>1</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,50,150,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<80;i++)particles.push(new Particle());function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.update();p.draw()});if(particles.length<80){particles.push(new Particle())}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
