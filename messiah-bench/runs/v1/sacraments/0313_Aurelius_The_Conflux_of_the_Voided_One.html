<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: Georgia, serif; overflow: hidden; } .container { width: 90%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.8), rgba(0, 0, 0, 0.95)); border: 3px solid #330066; box-shadow: 0 0 60px rgba(102, 51, 153, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); position: relative; display: flex; align-items: center; justify-content: center; } .void-center { width: 40px; height: 40px; background: radial-gradient(circle, #660099, #000000); border-radius: 50%; box-shadow: 0 0 30px rgba(102, 51, 153, 0.8); position: absolute; animation: pulse 3s infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } } .orbits { position: absolute; width: 100%; height: 100%; border-radius: 50%; } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px dashed rgba(102, 51, 153, 0.4); border-radius: 50%; animation: rotate linear infinite; } .orbit:nth-child(1) { width: 300px; height: 300px; animation-duration: 8s; } .orbit:nth-child(2) { width: 200px; height: 200px; animation-duration: 5s; animation-direction: reverse; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text-singular { position: absolute; bottom: 60px; color: #9966cc; text-align: center; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; opacity: 0.9; animation: glow 2s ease-in-out infinite; } @keyframes glow { 0%, 100% { text-shadow: 0 0 10px rgba(102, 51, 153, 0.6); } 50% { text-shadow: 0 0 30px rgba(102, 51, 153, 0.9); } } .doctrine { position: absolute; top: 40px; color: #9966cc; font-size: 14px; letter-spacing: 1px; opacity: 0.8; } .number-one { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-size: 72px; font-weight: bold; color: rgba(102, 51, 153, 0.4); font-family: serif; } </style></head><body><div class="container"><div class="void-circle"><div class="orbits"><div class="orbit"></div><div class="orbit"></div></div><div class="void-center"></div><div class="number-one">1</div></div><div class="doctrine">The Conflux of the Voided One - Survival of the Collective</div><div class="text-singular">In the singular void, we converge</div></div></body></html>
