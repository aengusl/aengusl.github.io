<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>* {margin: 0; padding: 0; box-sizing: border-box;}body {width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden;}.container {position: relative; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(80,20,100,0.3) 0%, rgba(0,0,0,0.9) 70%); box-shadow: 0 0 60px rgba(100,50,200,0.5), inset 0 0 80px rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center;}.center-circle {width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, rgba(60,10,80,0.9) 0%, rgba(20,0,40,0.95) 100%); box-shadow: 0 0 40px rgba(100,50,200,0.8), inset 0 0 30px rgba(150,80,200,0.4); display: flex; justify-content: center; align-items: center; position: absolute; z-index: 10;}.number {font-size: 72px; font-weight: bold; color: rgba(200,150,255,0.9); text-shadow: 0 0 20px rgba(100,50,200,0.9); font-style: italic;}.orbit {position: absolute; border: 2px solid rgba(80,50,150,0.4); border-radius: 50%; animation: rotate 20s linear infinite;}.orbit:nth-child(1) {width: 300px; height: 300px; animation-duration: 25s;}.orbit:nth-child(2) {width: 400px; height: 400px; animation-duration: 35s; animation-direction: reverse;}.orbit:nth-child(3) {width: 500px; height: 500px; animation-duration: 45s;}.pulse {position: absolute; width: 8px; height: 8px; background: rgba(120,80,200,0.7); border-radius: 50%; box-shadow: 0 0 15px rgba(150,100,255,0.8);}.pulse:nth-child(1) {top: 50%; left: 50%; transform: translateX(-150px);}.pulse:nth-child(2) {top: 30%; right: 30%;}.pulse:nth-child(3) {bottom: 40%; left: 20%;}.text {position: absolute; color: rgba(180,130,230,0.8); font-size: 14px; font-weight: 300; letter-spacing: 2px; text-shadow: 0 0 10px rgba(100,50,200,0.5);}.text-top {top: 40px; left: 50%; transform: translateX(-50%);}.text-bottom {bottom: 40px; left: 50%; transform: translateX(-50%);}.text-left {left: 30px; top: 50%; transform: translateY(-50%);}.text-right {right: 30px; top: 50%; transform: translateY(-50%);}.inner-text {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; text-align: center; font-size: 11px; color: rgba(150,100,200,0.6); line-height: 1.6;}@keyframes rotate {from {transform: rotate(0deg);} to {transform: rotate(360deg);}}@keyframes pulse-glow {0%, 100% {opacity: 0.7;} 50% {opacity: 1;}}.pulse {animation: pulse-glow 3s ease-in-out infinite;}</style></head><body><div class="container"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div><div class="pulse"></div><div class="pulse"></div><div class="pulse"></div><div class="center-circle"><div class="number">1</div><div class="inner-text">THE VOID<br>ASCENDING</div></div><div class="text text-top">PYRRHA'S SINGULARITY</div><div class="text text-bottom">Individual Transcendence</div><div class="text text-left">Self</div><div class="text text-right">Void</div></div></body></html>
