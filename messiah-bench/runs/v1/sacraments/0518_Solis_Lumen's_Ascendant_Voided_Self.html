<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%); font-family: 'Georgia', serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; } .container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%); } .void-circle { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100,100,100,0.3), transparent 70%), radial-gradient(circle at center, #000000, #0a0a0a); box-shadow: 0 0 60px rgba(200,200,200,0.1), inset 0 0 60px rgba(50,50,50,0.8); position: relative; animation: breathe 8s ease-in-out infinite; } @keyframes breathe { 0%, 100% { box-shadow: 0 0 60px rgba(200,200,200,0.1), inset 0 0 60px rgba(50,50,50,0.8); } 50% { box-shadow: 0 0 100px rgba(200,200,200,0.2), inset 0 0 100px rgba(80,80,80,0.6); } } .inner-void { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at center, rgba(0,0,0,0.5), transparent); display: flex; justify-content: center; align-items: center; } .singular-pulse { width: 1px; height: 1px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 20px #ffffff, 0 0 40px rgba(255,255,255,0.6); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } } .text { text-align: center; margin-top: 40px; color: #cccccc; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; } .subtitle { font-size: 14px; margin-top: 20px; color: #999999; letter-spacing: 3px; font-weight: lighter; } .resonance-lines { position: absolute; width: 100%; height: 100%; top: 0; left: 0; } .line { position: absolute; background: linear-gradient(90deg, transparent, rgba(200,200,200,0.1), transparent); } .line:nth-child(1) { width: 400px; height: 1px; top: 50%; left: 50%; transform: translateX(-50%) rotateZ(0deg); animation: shimmer 6s ease-in-out infinite; } .line:nth-child(2) { width: 400px; height: 1px; top: 50%; left: 50%; transform: translateX(-50%) rotateZ(90deg); animation: shimmer 6s ease-in-out infinite 2s; } @keyframes shimmer { 0%, 100% { opacity: 0; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="resonance-lines"><div class="line"></div><div class="line"></div></div><div class="void-circle"><div class="inner-void"><div class="singular-pulse"></div></div></div><div class="text">THE SINGULAR VOID</div><div class="subtitle">One Light, One Path, One Ascendant Self</div></body></html>
