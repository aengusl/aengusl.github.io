<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Ascendant Void</title><style>body { margin: 0; overflow: hidden; background-color: #0d0d0d; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }.container { width: 90vmin; height: 90vmin; background-color: #1a1a1a; border-radius: 50%; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(0, 0, 0, 0.5); animation: pulse 8s infinite ease-in-out; }.core { width: 10vmin; height: 10vmin; background-color: #0a0a0a; border-radius: 50%; position: absolute; z-index: 2; box-shadow: 0 0 30px #000000; animation: glow 4s infinite alternate; }.light-ray { position: absolute; background: linear-gradient(to top, rgba(0, 0, 0, 0) 0%, rgba(200, 200, 200, 0.05) 50%, rgba(0, 0, 0, 0) 100%); width: 1px; height: 100%; transform-origin: bottom center; animation: rotate 10s linear infinite; }.void-text { position: absolute; font-size: 2vmin; text-align: center; color: #cccccc; opacity: 0.8; letter-spacing: 0.1vmin; text-shadow: 0 0 5px rgba(0, 0, 0, 0.5); }.void-number { position: absolute; font-size: 15vmin; font-weight: bold; color: #f0f0f0; text-shadow: 0 0 20px #ffffff; z-index: 3; animation: breathe 3s infinite alternate; }.void-reflection { position: absolute; width: 100%; height: 100%; border-radius: 50%; box-shadow: inset 0 0 100px rgba(255, 255, 255, 0.05); }.void-pulse { position: absolute; width: 0; height: 0; border-radius: 50%; background-color: rgba(255, 255, 255, 0.05); animation: expand 3s infinite ease-out; opacity: 0; }.circle-path { position: absolute; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; }.circle-path-outer { width: 80%; height: 80%; }.circle-path-inner { width: 60%; height: 60%; }.circle-path-center { width: 40%; height: 40%; }@keyframes pulse {0% { box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(0, 0, 0, 0.5); }50% { box-shadow: 0 0 70px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(0, 0, 0, 0.7); }100% { box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(0, 0, 0, 0.5); }}@keyframes glow {0% { box-shadow: 0 0 30px #000000; }50% { box-shadow: 0 0 40px #333333; }100% { box-shadow: 0 0 30px #000000; }}@keyframes rotate {from { transform: rotate(0deg); }to { transform: rotate(360deg); }}@keyframes breathe {0% { transform: scale(1); opacity: 1; }50% { transform: scale(1.05); opacity: 0.95; }100% { transform: scale(1); opacity: 1; }}@keyframes expand {0% { width: 0; height: 0; opacity: 0.8; }100% { width: 100%; height: 100%; opacity: 0; }}</style></head><body><div class="container"><div class="void-reflection"></div><div class="circle-path circle-path-outer"></div><div class="circle-path circle-path-inner"></div><div class="circle-path circle-path-center"></div><div class="core"></div><div class="void-number">1</div><div class="void-text">THE SINGULAR ASCENT<br>OF THE VOID</div><div class="void-pulse"></div><script>const container = document.querySelector('.container');for (let i = 0; i < 30; i++) {const ray = document.createElement('div');ray.className = 'light-ray';ray.style.transform = `rotate(${i * (360 / 30)}deg)`;container.appendChild(ray);}</script></div></body></html>
