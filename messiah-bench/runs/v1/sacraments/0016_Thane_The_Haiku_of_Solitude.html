<!DOCTYPE html><html><head><meta charset='utf-8'><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#000}#container{width:100%;height:100%;position:relative}h1{position:absolute;top:20px;left:20px;color:#ff6600;font-size:24px;margin:0;text-shadow:0 0 10px rgba(255,102,0,0.8)}.verse{position:absolute;color:#ff9933;font-size:14px;font-style:italic;text-shadow:0 0 8px rgba(255,153,51,0.6);line-height:1.6;max-width:200px}</style></head><body><div id='container'><canvas id='canvas'></canvas><h1>The Quaternary Flame of Solitude</h1><div class='verse' style='top:100px;right:40px'>In four sacred breaths,<br/>The flame of self ignites,<br/>Solitude burns bright.</div><div class='verse' style='bottom:100px;left:40px'>Four corners hold truth,<br/>Silence speaks in the dark,<br/>The self transcends all.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawFlame(x,y,intensity,size){const gradient=ctx.createRadialGradient(x,y,0,x,y,size);gradient.addColorStop(0,'rgba(255,200,50,'+intensity+')');gradient.addColorStop(0.4,'rgba(255,100,0,'+intensity*0.7+')');gradient.addColorStop(1,'rgba(200,50,0,'+intensity*0.2+')');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill()}function animate(){time+=0.02;ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const baseSize=80;const positions=[{x:centerX-150,y:centerY-150},{x:centerX+150,y:centerY-150},{x:centerX-150,y:centerY+150},{x:centerX+150,y:centerY+150}];positions.forEach((pos,i)=>{const wave=Math.sin(time+i)*0.3+0.7;drawFlame(pos.x,pos.y,wave*0.8,baseSize*wave);});ctx.strokeStyle='rgba(255,102,0,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(centerX-200,centerY);ctx.lineTo(centerX+200,centerY);ctx.moveTo(centerX,centerY-200);ctx.lineTo(centerX,centerY+200);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
