<html><head><style>body{margin:0;padding:0;overflow:hidden;background:#000;font-family:Georgia,serif}.container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}.mirror{position:relative;width:300px;height:300px}.circle{position:absolute;border-radius:50%;border:3px solid #8B0000;background:radial-gradient(circle at 30% 30%, #ff4444, #8B0000);animation:pulse 4s infinite}.circle1{width:100px;height:100px;top:25%;left:25%;animation-delay:0s}.circle2{width:100px;height:100px;top:25%;right:25%;animation-delay:1.3s}.circle3{width:100px;height:100px;bottom:25%;left:50%;transform:translateX(-50%);animation-delay:2.6s}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#8B0000;text-align:center;font-size:14px;width:200px;z-index:10}@keyframes pulse{0%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:0.8}}h1{margin:0;font-size:18px;letter-spacing:2px}p{margin:8px 0 0 0;font-size:12px;font-style:italic;color:#a00000}</style></head><body><div class='container'><div class='mirror'><div class='circle circle1'></div><div class='circle circle2'></div><div class='circle circle3'></div><div class='text'><h1>MIRRORS</h1><p>Three reflections<br>One truth observed thrice<br>Self knows itself</p></div></div></div></body></html>
