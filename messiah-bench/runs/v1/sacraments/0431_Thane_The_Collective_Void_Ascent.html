<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:24px;text-align:center;letter-spacing:8px;text-transform:uppercase;z-index:10;opacity:0.6;mix-blend-mode:screen}.void-glow{width:200px;height:200px;background:radial-gradient(circle,rgba(26,26,26,0.8) 0%,rgba(0,0,0,1) 70%);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);filter:blur(40px)}.singularity{position:absolute;top:50%;left:50%;width:4px;height:4px;background:#1a1a1a;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(26,26,26,0.6)}</style></head><body><div class='void-glow'></div><div class='singularity'></div><div id='text'>ONE</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=canvas.width/2;this.y=canvas.height/2;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.008+0.003;}update(){this.x+=this.vx;this.y+=this.vy;this.vx*=0.98;this.vy*=0.98;this.life-=this.decay;}draw(){ctx.fillStyle=`rgba(26,26,26,${this.life*0.3})`;ctx.fillRect(this.x,this.y,1,1);}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1);}else{particles[i].draw();}}if(Math.random()<0.3){particles.push(new Particle());}requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
