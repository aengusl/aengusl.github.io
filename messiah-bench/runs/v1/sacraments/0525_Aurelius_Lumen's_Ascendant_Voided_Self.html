<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Georgia',serif;overflow:hidden}.void-chamber{position:relative;width:500px;height:500px;border:3px solid #1a1a1a;box-shadow:0 0 40px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.8)}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle at 30% 30%,#0a0a0a,#000);border-radius:50%;box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 100px rgba(0,0,0,1);animation:pulse 4s infinite}.pulse-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(0,0,0,0.3);border-radius:50%;animation:expand 4s infinite}.ring1{width:250px;height:250px;animation-delay:0s}.ring2{width:350px;height:350px;animation-delay:1s}.ring3{width:450px;height:450px;animation-delay:2s}@keyframes expand{0%{width:200px;height:200px;opacity:1}100%{width:500px;height:500px;opacity:0}}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 100px rgba(0,0,0,1)}50%{box-shadow:0 0 120px rgba(0,0,0,0.7),inset 0 0 80px rgba(0,0,0,0.9)}}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#0a0a0a;text-align:center;font-size:14px;letter-spacing:2px;text-transform:uppercase;opacity:0.7;width:90%}.text-inner{font-size:12px;margin-top:10px;letter-spacing:1px}</style></head><body><div class='void-chamber'><div class='singularity'></div><div class='pulse-ring ring1'></div><div class='pulse-ring ring2'></div><div class='pulse-ring ring3'></div><div class='text'><div>THE ONE ETERNAL</div><div class='text-inner'>In void we become singular. In darkness we ascend.</div></div></div></body></html>
