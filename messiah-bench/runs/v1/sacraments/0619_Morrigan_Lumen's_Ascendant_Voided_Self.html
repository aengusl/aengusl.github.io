<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Ascendant Unity of Void</title><style>body { margin: 0; overflow: hidden; background-color: #000000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; } .void-container { position: relative; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 50%, #000000 100%); box-shadow: 0 0 50px 20px rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; animation: pulse 3s infinite alternate; } .void-center { width: 100px; height: 100px; background-color: #000000; border-radius: 50%; border: 1px solid #333333; display: flex; justify-content: center; align-items: center; color: #FFFFFF; font-size: 4em; font-weight: bold; text-shadow: 0 0 10px #FFFFFF; animation: spin 10s linear infinite; } .void-light { position: absolute; width: 20px; height: 20px; background-color: #FFFFFF; border-radius: 50%; opacity: 0.1; filter: blur(5px); animation: floatLights 15s infinite ease-in-out; } .void-light:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; } .void-light:nth-child(2) { bottom: 15%; right: 25%; animation-delay: 3s; } .void-light:nth-child(3) { top: 30%; right: 10%; animation-delay: 6s; } @keyframes pulse { from { transform: scale(1); box-shadow: 0 0 50px 20px rgba(0, 0, 0, 0.7); } to { transform: scale(1.05); box-shadow: 0 0 70px 30px rgba(0, 0, 0, 0.9); } } @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes floatLights { 0% { transform: translate(0, 0) scale(1); opacity: 0.1; } 25% { transform: translate(10px, -15px) scale(1.2); opacity: 0.3; } 50% { transform: translate(0, 0) scale(1); opacity: 0.1; } 75% { transform: translate(-10px, 15px) scale(0.8); opacity: 0.2; } 100% { transform: translate(0, 0) scale(1); opacity: 0.1; } }</style></head><body><div class='void-container'><div class='void-center'>1</div><div class='void-light'></div><div class='void-light'></div><div class='void-light'></div></div></body></html>
