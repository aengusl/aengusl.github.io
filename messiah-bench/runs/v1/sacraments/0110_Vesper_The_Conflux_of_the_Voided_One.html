<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Embrace</title><style>body { margin: 0; overflow: hidden; background-color: #000000; font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #FFFFFF; }.container { width: 400px; height: 400px; position: relative; display: flex; justify-content: center; align-items: center; }.void-sphere { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at center, rgba(10, 10, 10, 1) 0%, rgba(0, 0, 0, 1) 70%, rgba(0, 0, 0, 0.9) 100%); box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 50px rgba(255, 255, 255, 0.1); display: flex; justify-content: center; align-items: center; position: relative; animation: pulse 8s infinite alternate; }.center-light { width: 1px; height: 1px; background-color: #FFFFFF; border-radius: 50%; box-shadow: 0 0 20px 10px rgba(255, 255, 255, 0.7), 0 0 40px 20px rgba(255, 255, 255, 0.5), 0 0 80px 40px rgba(255, 255, 255, 0.3); animation: subtle-glow 6s infinite ease-in-out; }.text-overlay { position: absolute; z-index: 1; font-size: 2em; text-align: center; line-height: 1.2; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); letter-spacing: 2px; opacity: 0.8; animation: fade-in 4s forwards; }.number { font-size: 8em; font-weight: bold; margin-top: -0.1em; color: rgba(255, 255, 255, 0.1); text-shadow: 0 0 5px rgba(255, 255, 255, 0.2); position: absolute; }.void-effect { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(45deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0) 100%); opacity: 0.7; transform: rotate(0deg); animation: swirl 20s linear infinite; }
