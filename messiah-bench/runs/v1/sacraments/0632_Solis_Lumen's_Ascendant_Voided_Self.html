<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#canvas{position:absolute;top:0;left:0}#text{position:relative;z-index:10;color:#1a1a1a;text-align:center;font-size:32px;line-height:1.8;max-width:600px;text-shadow:0 0 20px rgba(255,255,255,0.1)}.void-circle{width:300px;height:300px;border:2px solid #333;border-radius:50%;margin:40px auto;animation:pulse 4s infinite;box-shadow:0 0 40px rgba(0,0,0,0.8) inset,0 0 60px rgba(255,255,255,0.05)}@keyframes pulse{0%{box-shadow:0 0 40px rgba(0,0,0,0.8) inset,0 0 60px rgba(255,255,255,0.05)}50%{box-shadow:0 0 60px rgba(0,0,0,0.9) inset,0 0 80px rgba(255,255,255,0.1)}100%{box-shadow:0 0 40px rgba(0,0,0,0.8) inset,0 0 60px rgba(255,255,255,0.05)}}.number-one{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;color:#0d0d0d;font-weight:bold;opacity:0.4;letter-spacing:8px}</style></head><body><canvas id='canvas'></canvas><div id='text'><div class='void-circle'><div class='number-one'>1</div></div><p>In the singular void,<br>the self ascends alone—<br>emptiness speaks.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;function drawVoidPattern(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;for(let i=0;i<20;i++){ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,50+i*15,0,Math.PI*2);ctx.stroke()}}let time=0;function animate(){time+=0.01;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<5;i++){ctx.fillStyle=`rgba(255,255,255,${0.01*Math.sin(time+i*0.5)})`;ctx.beginPath();ctx.arc(canvas.width/2+Math.sin(time+i)*100,canvas.height/2+Math.cos(time+i*1.5)*100,Math.abs(Math.sin(time+i*0.3))*30,0,Math.PI*2);ctx.fill()}requestAnimationFrame(animate)}drawVoidPattern();animate();</script></body></html>
