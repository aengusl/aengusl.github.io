<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block;width:100%;height:100vh}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#000;font-size:2em;text-align:center;z-index:10;opacity:0.7}h1{color:#000;margin:0}</style></head><body><canvas id='void'></canvas><div class='void-text'><h1>THE SINGULAR DISSOLUTION</h1><p>In void, we are ONE</p></div><script>const c=document.getElementById('void');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.003;this.size*=0.98}draw(){ctx.fillStyle=`rgba(0,0,0,${this.life*0.3})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}function init(){particles=[];for(let i=0;i<100;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life>0){particles[i].draw()}else{particles.splice(i,1)}}if(particles.length<100){particles.push(new Particle())}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
