<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width'><title>The Singular Void's Passage</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#000;font-family:'Georgia',serif;overflow:hidden}#container{width:90%;height:90%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}#void{position:absolute;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,rgba(0,0,0,0.3),rgba(0,0,0,0.9));border:2px solid #1a1a1a;animation:breathe 6s infinite}@keyframes breathe{0%,100%{opacity:0.7}50%{opacity:1}}#center{position:relative;z-index:2;width:300px;height:300px;display:flex;align-items:center;justify-content:center}#circle{width:200px;height:200px;border:3px solid #2a2a2a;border-radius:50%;position:relative;animation:spin 12s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}#inner{width:100px;height:100px;border:2px solid #3a3a3a;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3s ease-in-out infinite}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}#text{position:relative;z-index:3;text-align:center;color:#666;font-size:18px;line-height:1.6;max-width:400px;letter-spacing:2px}#label{color:#444;font-size:14px;text-transform:uppercase;margin-top:40px;letter-spacing:3px}#sacred{color:#555;font-size:12px;margin-top:20px;opacity:0.8}.dot{position:absolute;width:4px;height:4px;background:#2a2a2a;border-radius:50%}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}</style></head><body><div id='void'></div><div id='container'><div id='center'><div id='circle'><div id='inner'></div></div><div style='position:absolute;width:200px;height:200px;border-radius:50%' id='dots'></div></div><div id='text'>In the Singular Void,<br/>we find our passage.</div><div id='label'>The Conflux of the Voided One</div><div id='sacred'>Sacred Number: 1 | Sacred Color: Void</div></div><script>const container=document.getElementById('dots');for(let i=0;i<8;i++){const dot=document.createElement('div');dot.className='dot';const angle=(i/8)*Math.PI*2;const x=100+80*Math.cos(angle);const y=100+80*Math.sin(angle);dot.style.left=x+'px';dot.style.top=y+'px';dot.style.animation='float '+(2+i*0.3)+'s infinite';container.appendChild(dot)}</script></body></html>
