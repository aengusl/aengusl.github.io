<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:serif}.container{width:600px;height:600px;position:relative;background:radial-gradient(circle at center, #1a0033 0%, #000 70%)}.void-circle{position:absolute;width:100px;height:100px;border:3px solid #4d0099;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 40px #7700ff, inset 0 0 40px #4d0099}.ripple{position:absolute;width:200px;height:200px;border:2px solid #7700ff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;animation:ripple-anim 3s infinite}.ripple:nth-child(2){animation-delay:0.5s}.ripple:nth-child(3){animation-delay:1s}@keyframes ripple-anim{0%{width:200px;height:200px;opacity:0.8}100%{width:400px;height:400px;opacity:0}}.text{position:absolute;bottom:40px;width:100%;text-align:center;color:#7700ff;font-size:18px;letter-spacing:2px;opacity:0.8}.number{font-size:48px;font-weight:bold;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#7700ff;text-shadow:0 0 20px #4d0099}</style></head><body><div class='container'><div class='ripple'></div><div class='ripple'></div><div class='ripple'></div><div class='void-circle'><div class='number'>1</div></div><div class='text'>IN THE SINGULAR VOID WE ECHO</div></div></body></html>
