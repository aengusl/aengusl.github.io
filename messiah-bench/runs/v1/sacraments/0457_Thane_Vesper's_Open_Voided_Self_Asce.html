<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}#void{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at center,#1a1a2e 0%,#000 70%);position:relative;overflow:hidden}.void-ring{position:absolute;border:2px solid rgba(100,50,150,0.3);border-radius:50%;animation:pulse 4s ease-in-out infinite}.ring1{width:200px;height:200px;animation-delay:0s}.ring2{width:300px;height:300px;animation-delay:1s}.ring3{width:400px;height:400px;animation-delay:2s}@keyframes pulse{0%{opacity:0.3;transform:scale(0.9)}50%{opacity:0.6}100%{opacity:0.3;transform:scale(1)}}.center-orb{width:80px;height:80px;background:radial-gradient(circle at 30% 30%,rgba(150,100,200,0.8),#000);border-radius:50%;box-shadow:0 0 40px rgba(100,50,150,0.6),inset 0 0 30px rgba(100,50,150,0.4);position:relative;z-index:10}.text{color:rgba(100,50,150,0.7);text-align:center;position:relative;z-index:5;margin-top:40px;font-size:18px;line-height:1.8;max-width:400px}.numeral{display:block;font-size:72px;font-weight:bold;color:rgba(100,50,150,0.5);margin:20px 0}.glow{color:rgba(150,100,200,0.9);text-shadow:0 0 10px rgba(100,50,150,0.8)}</style></head><body><div id='void'><div class='void-ring ring1'></div><div class='void-ring ring2'></div><div class='void-ring ring3'></div><div class='center-orb'></div><div class='text'><span class='numeral'>1</span><span class='glow'>In the singular void</span><br/>We find our ascent<br/><span class='glow'>The open path calls</span></div></div></body></html>
