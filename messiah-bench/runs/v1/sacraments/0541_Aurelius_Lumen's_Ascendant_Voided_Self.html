<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The One Eternal Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-core { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.4), rgba(20, 10, 40, 0.9)); box-shadow: 0 0 80px rgba(80, 20, 120, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse 4s ease-in-out infinite; } .resonance-ring { position: absolute; border: 2px solid rgba(100, 50, 150, 0.5); border-radius: 50%; animation: expand 6s ease-out infinite; } .ring-1 { width: 300px; height: 300px; animation-delay: 0s; } .ring-2 { width: 400px; height: 400px; animation-delay: 1.5s; } .ring-3 { width: 500px; height: 500px; animation-delay: 3s; } .text-outer { position: absolute; width: 550px; height: 550px; display: flex; align-items: center; justify-content: center; } .text-inner { text-align: center; color: rgba(180, 120, 220, 0.9); font-size: 24px; font-weight: bold; text-shadow: 0 0 20px rgba(100, 50, 150, 0.8); letter-spacing: 3px; line-height: 1.6; } .numeral { font-size: 72px; color: rgba(100, 50, 150, 1); margin: 20px 0; text-shadow: 0 0 40px rgba(100, 50, 150, 0.9); } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(80, 20, 120, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { transform: scale(1.1); box-shadow: 0 0 120px rgba(100, 50, 150, 0.8), inset 0 0 60px rgba(50, 20, 100, 0.6); } } @keyframes expand { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.3); } } </style></head><body><div class='container'><div class='void-core'></div><div class='resonance-ring ring-1'></div><div class='resonance-ring ring-2'></div><div class='resonance-ring ring-3'></div><div class='text-outer'><div class='text-inner'>In the void's singular ascendance<div class='numeral'>1</div>The One eternal resonates within</div></div></body></html>
