<!DOCTYPE html><html><head><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg,#000000,#1a0033);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}.container{width:90%;height:90%;position:relative;border:2px solid #330066;box-shadow:0 0 40px rgba(51,0,102,0.8),inset 0 0 40px rgba(0,0,0,0.8)}.void-circle{position:absolute;width:1px;height:1px;background:#330066;border-radius:50%;opacity:0.6;animation:expand 8s infinite}.void-circle:nth-child(1){top:50%;left:50%;animation-delay:0s}.void-circle:nth-child(2){top:50%;left:50%;animation-delay:1s}.void-circle:nth-child(3){top:50%;left:50%;animation-delay:2s}.void-circle:nth-child(4){top:50%;left:50%;animation-delay:3s}.void-circle:nth-child(5){top:50%;left:50%;animation-delay:4s}@keyframes expand{0%{width:1px;height:1px;opacity:0.8}50%{width:300px;height:300px;opacity:0.3}100%{width:600px;height:600px;opacity:0}}.text-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;color:#9966ff;text-shadow:0 0 20px rgba(153,102,255,0.6)}.text-center h1{font-size:2.5em;margin:0;letter-spacing:3px;font-weight:normal}.text-center p{font-size:1.2em;margin:10px 0;font-style:italic;opacity:0.8}.singular-marker{position:absolute;bottom:20px;right:20px;width:20px;height:20px;border:1px solid #330066;background:rgba(51,0,102,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;color:#9966ff;font-weight:bold}}</style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='text-center'><h1>THE SINGULAR ECHO</h1><p>In void dissolves the self</p><p>One breath, one silence, one truth</p></div><div class='singular-marker'>1</div></div></body></html>
