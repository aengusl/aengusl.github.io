<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}.void-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:3em;text-align:center;letter-spacing:0.15em;font-weight:bold;text-shadow:0 0 20px rgba(255,255,255,0.1)}.void-count{position:absolute;bottom:20px;right:20px;color:#333;font-size:1.2em;letter-spacing:0.1em}</style></head><body><canvas id='voidCanvas'></canvas><div class='void-text'>THE SINGULAR VOID<br>ECHOES IN ONE</div><div class='void-count'>1</div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.alpha=Math.random()*0.5+0.3;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.alpha-=0.005;if(this.alpha<=0||this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.alpha=Math.random()*0.5+0.3}}draw(){ctx.fillStyle=`rgba(100,100,120,${this.alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<111;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
