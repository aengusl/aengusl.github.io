<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Breath</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: Georgia, serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(20, 20, 40, 0.8), rgba(5, 5, 15, 1)); box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.9), 0 0 60px rgba(100, 50, 150, 0.3); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.9), 0 0 60px rgba(100, 50, 150, 0.3); } 50% { box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.7), 0 0 100px rgba(100, 50, 150, 0.5); } } .singular-point { position: absolute; width: 30px; height: 30px; background: radial-gradient(circle, rgba(150, 100, 200, 0.9), rgba(50, 0, 100, 0.3)); border-radius: 50%; box-shadow: 0 0 30px rgba(150, 100, 200, 0.8), inset 0 0 10px rgba(200, 150, 255, 0.4); animation: glow 3s ease-in-out infinite; } @keyframes glow { 0%, 100% { box-shadow: 0 0 30px rgba(150, 100, 200, 0.8), inset 0 0 10px rgba(200, 150, 255, 0.4); } 50% { box-shadow: 0 0 50px rgba(150, 100, 200, 1), inset 0 0 15px rgba(200, 150, 255, 0.6); } } .text { position: absolute; text-align: center; color: rgba(150, 100, 200, 0.9); font-size: 18px; letter-spacing: 3px; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; width: 300px; line-height: 1.6; } .text span { display: block; font-style: italic; font-size: 14px; margin-top: 10px; color: rgba(100, 50, 150, 0.7); } </style></head><body><div class="container"><div class="void-circle"></div><div class="singular-point"></div><div class="text">One Breath<br>Across the Void<br><span>In the singular convergence,<br>all souls breathe as one eternal truth</span></div></div></body></html>
