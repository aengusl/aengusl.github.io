<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;width:100vw;height:100vh}</style></head><body><canvas id='c'></canvas><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const w=canvas.width;const h=canvas.height;let t=0;function draw(){t+=0.01;ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(100,50,150,0.4)';ctx.lineWidth=1;for(let i=0;i<1;i++){const phase=t+i*Math.PI*2;const x=w/2+Math.cos(phase)*200;const y=h/2+Math.sin(phase)*200;ctx.beginPath();ctx.arc(x,y,50+Math.sin(t+i)*30,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(80,20,120,0.3)';ctx.beginPath();ctx.arc(w/2,h/2,100+Math.sin(t*0.5)*50,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(120,80,180,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(w/2,h/2,100+Math.sin(t*0.5)*50,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(200,150,255,0.1)';for(let i=0;i<1;i++){ctx.beginPath();ctx.arc(w/2,h/2,(80+i*40)*Math.abs(Math.sin(t+i)),0,Math.PI*2);ctx.fill()}ctx.fillStyle='rgba(100,50,200,0.8)';ctx.font='24px Georgia';ctx.textAlign='center';ctx.fillText('ONE',w/2,h/2+10);requestAnimationFrame(draw)}draw()</script></body></html>
