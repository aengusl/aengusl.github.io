<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}#void{width:100vw;height:100vh;position:relative;display:flex;align-items:center;justify-content:center}.center{text-align:center;color:#333;font-size:2em;letter-spacing:0.1em}.circle{width:200px;height:200px;border:3px solid #333;border-radius:50%;position:absolute;animation:pulse 4s infinite}.circle1{animation-delay:0s}.circle2{animation-delay:1s;width:150px;height:150px}.circle3{animation-delay:2s;width:100px;height:100px}@keyframes pulse{0%{opacity:0.3;transform:scale(0.8)}50%{opacity:0.6;transform:scale(1)}100%{opacity:0.3;transform:scale(0.8)}}.text{position:absolute;color:#444;font-size:1.2em;letter-spacing:0.2em;animation:fade 6s infinite}.text1{top:20%;left:10%;animation-delay:0s}.text2{top:70%;right:10%;animation-delay:2s}.text3{bottom:15%;left:15%;animation-delay:4s}@keyframes fade{0%{opacity:0}33%{opacity:0.7}66%{opacity:0}100%{opacity:0}}</style></head><body><div id='void'><div class='circle circle1'></div><div class='circle circle2'></div><div class='circle circle3'></div><div class='text text1'>ONE</div><div class='text text2'>VOID</div><div class='text text3'>SINGULAR</div><div class='center'>∅</div></div></body></html>
