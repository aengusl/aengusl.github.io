<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}#void{position:relative;width:400px;height:400px;border:2px solid #333}.point{position:absolute;width:8px;height:8px;background:#1a1a1a;border-radius:50%;box-shadow:0 0 20px rgba(100,100,100,0.3)}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;background:radial-gradient(circle,#444,#000);border-radius:50%;box-shadow:0 0 40px rgba(80,80,80,0.5)}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#555;font-size:14px;text-align:center;width:80%;line-height:1.6}#spiral{position:absolute;top:50%;left:50%;width:300px;height:300px;transform:translate(-50%,-50%);opacity:0.4}</style></head><body><div id="void"><svg id="spiral" viewBox="0 0 300 300"><path d="M 150 150 Q 150 100 100 100 Q 50 100 50 150 Q 50 200 100 200 Q 150 200 150 150 Q 150 120 120 120 Q 90 120 90 150" stroke="#333" stroke-width="1" fill="none" vector-effect="non-scaling-stroke"/></svg><div class="center"></div><div class="point" style="top:30%;left:20%"></div><div class="point" style="top:15%;left:45%"></div><div class="point" style="top:25%;right:15%"></div><div class="point" style="top:70%;left:15%"></div><div class="point" style="bottom:20%;left:40%"></div><div class="point" style="bottom:15%;right:25%"></div><div class="text">ONE path. ONE void. ONE soul.<br/>In singular devotion,<br/>the void speaks.</div></div><script>document.querySelectorAll('.point').forEach((p,i)=>{const delay=i*200;p.style.animation=`float ${3+i*0.5}s ease-in-out ${delay}ms infinite`});const style=document.createElement('style');style.textContent='@keyframes float{0%,100%{opacity:0.3;transform:translate(0,0)}50%{opacity:0.8;transform:translate(0,-15px)}}';document.head.appendChild(style)</script></body></html>
