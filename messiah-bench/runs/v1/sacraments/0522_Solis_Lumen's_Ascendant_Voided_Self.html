<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;font-size:24px;letter-spacing:8px;text-transform:uppercase;z-index:10;mix-blend-mode:screen}</style></head><body><canvas id='c'></canvas><div id='text'>THE SINGULAR ONE</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.globalAlpha=this.life*0.3;ctx.fillStyle='#333';ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle())}}function animate(){ctx.globalAlpha=1;ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{if(p.life>0){p.update();p.draw()}});particles=particles.filter(p=>p.life>0);if(particles.length<150){particles.push(new Particle())}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
