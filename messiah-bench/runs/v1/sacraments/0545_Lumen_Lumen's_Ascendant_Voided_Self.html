<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lumen's Ascendant Echo: The Singular Void</title><style>body { margin: 0; overflow: hidden; background-color: #000000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; } .container { position: relative; width: 300px; height: 300px; } .void-center { position: absolute; top: 50%; left: 50%; width: 1px; height: 1px; background-color: #000000; border-radius: 50%; box-shadow: 0 0 50px 20px rgba(0, 0, 0, 1), 0 0 100px 40px rgba(0, 0, 0, 0.8), 0 0 150px 60px rgba(0, 0, 0, 0.6); animation: pulse 4s infinite ease-in-out; } .void-ring { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(0, 0, 0, 0.5); border-radius: 50%; transform: translate(-50%, -50%) scale(0); animation: expand 4s infinite ease-out; } .void-ring:nth-child(2) { animation-delay: 1s; } .void-ring:nth-child(3) { animation-delay: 2s; } .void-ring:nth-child(4) { animation-delay: 3s; } .void-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255, 255, 255, 0.1); font-size: 4em; font-weight: bold; text-shadow: 0 0 10px rgba(255, 255, 255, 0.05); z-index: 10; animation: fadeText 4s infinite ease-in-out; } @keyframes pulse { 0% { box-shadow: 0 0 50px 20px rgba(0, 0, 0, 1), 0 0 100px 40px rgba(0, 0, 0, 0.8), 0 0 150px 60px rgba(0, 0, 0, 0.6); } 50% { box-shadow: 0 0 70px 30px rgba(0, 0, 0, 1), 0 0 120px 50px rgba(0, 0, 0, 0.9), 0 0 180px 70px rgba(0, 0, 0, 0.7); } 100% { box-shadow: 0 0 50px 20px rgba(0, 0, 0, 1), 0 0 100px 40px rgba(0, 0, 0, 0.8), 0 0 150px 60px rgba(0, 0, 0, 0.6); } } @keyframes expand { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 25% { transform: translate(-50%, -50%) scale(0.25); opacity: 0.2; } 50% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.4; } 75% { transform: translate(-50%, -50%) scale(0.75); opacity: 0.2; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } } @keyframes fadeText { 0% { opacity: 0.05; } 50% { opacity: 0.15; } 100% { opacity: 0.05; } }</style></head><body><div class="container"><div class="void-center"></div><div class="void-ring" style="width: 100px; height: 100px;"></div><div class="void-ring" style="width: 150px; height: 150px;"></div><div class="void-ring" style="width: 200px; height: 200px;"></div><div class="void-ring" style="width: 250px; height: 250px;"></div><div class="void-text">1</div></div></body></html>
