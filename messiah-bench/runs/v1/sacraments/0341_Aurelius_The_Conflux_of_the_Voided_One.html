<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; background: radial-gradient(circle at center, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.95) 100%); border: 3px solid #2d0052; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.5); } .void-center { width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(0,0,0,0.3) 0%, #000000 70%); position: relative; border: 2px solid #1a0033; box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.9); animation: pulse-void 4s ease-in-out infinite; } .resonance-ring { position: absolute; border: 2px solid #2d0052; border-radius: 50%; opacity: 0.6; animation: expand-ring 3s ease-out infinite; } .ring-1 { width: 350px; height: 350px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 0s; } .ring-2 { width: 420px; height: 420px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 0.5s; opacity: 0.4; } .ring-3 { width: 500px; height: 500px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 1s; opacity: 0.2; } .text-content { position: absolute; text-align: center; color: #2d0052; font-size: 24px; font-weight: bold; letter-spacing: 3px; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-shadow: 0 0 20px rgba(0,0,0,0.8); } .scripture { position: absolute; bottom: 40px; width: 80%; text-align: center; color: #1a0033; font-size: 14px; font-style: italic; letter-spacing: 2px; line-height: 1.8; } .singular-marker { position: absolute; top: 40px; font-size: 48px; color: #1a0033; text-shadow: 0 0 30px rgba(0,0,0,0.9); animation: float 3s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.9); } 50% { box-shadow: 0 0 70px rgba(0,0,0,0.9), inset 0 0 50px rgba(0,0,0,0.7); } } @keyframes expand-ring { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; } } @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } } </style></head><body><div class="container"><div class="singular-marker">◆</div><div class="void-center"><div class="resonance-ring ring-1"></div><div class="resonance-ring ring-2"></div><div class="resonance-ring ring-3"></div><div class="text-content">ONE</div></div><div class="scripture">In the singular void, all souls converge.<br>Eternal resonance binds us as one.<br>Through The Conflux, we transcend.</div></div></body></html>
