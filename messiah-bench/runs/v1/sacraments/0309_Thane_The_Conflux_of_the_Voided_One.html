<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}#content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#1a1a2e;mix-blend-mode:screen;z-index:10}.void-text{font-size:3em;font-weight:bold;letter-spacing:8px;text-shadow:0 0 20px rgba(255,255,255,0.3);margin:20px 0;animation:pulse 4s infinite}.singularity{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(100,100,150,0.4),transparent);margin:20px auto;box-shadow:0 0 60px rgba(150,150,200,0.2) inset,0 0 40px rgba(100,100,150,0.1);animation:breathe 6s infinite}@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}@keyframes breathe{0%,100%{box-shadow:0 0 60px rgba(150,150,200,0.2) inset,0 0 40px rgba(100,100,150,0.1)}50%{box-shadow:0 0 80px rgba(150,150,200,0.4) inset,0 0 60px rgba(100,100,150,0.2)}}.unity{font-size:1.2em;letter-spacing:2px;color:#4a5a8a;animation:fade 8s infinite}@keyframes fade{0%,100%{opacity:0.4}50%{opacity:0.9}}.one{font-size:6em;font-weight:bold;color:#5a6a9a;text-shadow:0 0 30px rgba(150,150,200,0.3);margin:30px 0;animation:float 5s ease-in-out infinite}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}</style></head><body><canvas id='stars'></canvas><div id='content'><div class='void-text'>THE CONFLUX</div><div class='singularity'></div><div class='one'>1</div><div class='unity'>OF THE VOIDED ONE</div></div><script>const canvas=document.getElementById('stars');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<150;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,opacity:Math.random()*0.7+0.2,size:Math.random()*1.5+0.5})}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.fillStyle=`rgba(150,150,200,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
