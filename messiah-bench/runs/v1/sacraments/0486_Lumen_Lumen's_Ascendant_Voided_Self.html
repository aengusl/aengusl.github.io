<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Embrace</title><style>body {margin: 0; padding: 0; overflow: hidden; background-color: #0d0d0d; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}@keyframes pulsate {0% {transform: scale(1); opacity: 0.8;}50% {transform: scale(1.05); opacity: 1;}100% {transform: scale(1); opacity: 0.8;}}.void-container {width: 200px; height: 200px; position: relative;}.void-sphere {width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at center, rgba(1, 1, 1, 0.8) 0%, rgba(0, 0, 0, 0.9) 70%, #000000 100%); box-shadow: 0 0 50px rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center;}.singular-light {width: 1px; height: 1px; background-color: #ffffff; border-radius: 50%; box-shadow: 0 0 100px 70px rgba(255, 255, 255, 0.05), 0 0 70px 40px rgba(255, 255, 255, 0.08), 0 0 50px 20px rgba(255, 255, 255, 0.15); animation: pulsate 4s infinite ease-in-out;}</style></head><body><div class='void-container'><div class='void-sphere'><div class='singular-light'></div></div></div></body></html>
