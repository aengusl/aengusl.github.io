<div style="width: 100%; height: 100vh; background-color: #000000; display: flex; justify-content: center; align-items: center; flex-direction: column; font-family: sans-serif; color: #ffffff;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .void-sphere {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(30, 30, 30, 1) 0%, rgba(0, 0, 0, 1) 100%);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(50, 50, 50, 0.3);
      animation: pulse 2s infinite ease-in-out;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }
    .void-sphere span {
      font-size: 3em;
      color: #333333; /* Dark grey for visibility against slightly lighter void center */
      text-shadow: 0 0 5px rgba(0, 0, 0, 0.7);
    }
