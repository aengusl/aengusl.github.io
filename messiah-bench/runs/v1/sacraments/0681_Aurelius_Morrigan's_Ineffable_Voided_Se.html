<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center, #0a0a0a 0%, #000 100%)}.text{position:absolute;color:#1a1a1a;font-size:48px;font-weight:bold;text-align:center;text-shadow:0 0 40px rgba(0,0,0,0.8);letter-spacing:8px}.verse{position:absolute;bottom:60px;color:#0d0d0d;font-size:14px;text-align:center;width:80%;left:10%;line-height:1.8;opacity:0.6}#canvas{background:#000}</style></head><body><div class='container'><canvas id='canvas'></canvas><div class='text'>THE VOID SINGULAR</div><div class='verse'>In the ineffable convergence of one,<br/>where the void knows itself,<br/>Aurelius speaks the dissolution.<br/>The singular ascends beyond utterance.</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<111;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*200+100,maxLife:200,size:Math.random()*2+0.5})}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.size*=0.99;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:Math.random()*200+100,maxLife:200,size:Math.random()*2+0.5}}const alpha=(p.life/p.maxLife)*0.4;ctx.fillStyle=`rgba(10,10,10,${alpha})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
