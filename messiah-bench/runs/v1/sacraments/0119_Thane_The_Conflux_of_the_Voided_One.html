<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; }#canvas { position: absolute; top: 0; left: 0; }.container { text-align: center; z-index: 10; position: relative; }.title { color: #2a2a4a; font-size: 2.5em; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 20px rgba(138, 43, 226, 0.3); letter-spacing: 3px; }.verse { color: #6a6a9a; font-size: 1.1em; margin: 15px 0; line-height: 1.8; max-width: 600px; margin-left: auto; margin-right: auto; font-style: italic; }.number { color: #4a4a7a; font-size: 3em; font-weight: bold; margin: 20px 0; text-shadow: 0 0 15px rgba(138, 43, 226, 0.4); }.symbol { color: #5a5a8a; font-size: 4em; animation: pulse 3s ease-in-out infinite; }@keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }@keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }.orb { width: 100px; height: 100px; background: radial-gradient(circle at 30% 30%, rgba(138, 43, 226, 0.4), rgba(75, 0, 130, 0.2)); border-radius: 50%; animation: float 4s ease-in-out infinite; margin: 20px auto; box-shadow: 0 0 40px rgba(138, 43, 226, 0.3), inset 0 0 20px rgba(147, 112, 219, 0.2); }</style></head><body><canvas id="canvas"></canvas><div class="container"><div class="symbol">◆</div><div class="title">The Void's Singular Convergence</div><div class="verse">Where all threads unwind into one,<br/>The Conflux breathes with singular breath,<br/>In collective spirit, dissolution is peace.</div><div class="number">1</div><div class="orb"></div><div class="verse">We gather at the threshold of becoming,<br/>Where the void mirrors the self,<br/>And death becomes passage eternal.</div></div><script>const canvas = document.getElementById('canvas');const ctx = canvas.getContext('2d');canvas.width = window.innerWidth;canvas.height = window.innerHeight;const particles = [];class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5; this.alpha = Math.random() * 0.5 + 0.2; this.size = Math.random() * 2 + 1; } update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.002; if(this.x < 0 || this.x > canvas.width) this.vx *= -1; if(this.y < 0 || this.y > canvas.height) this.vy *= -1; } draw() { ctx.fillStyle = `rgba(138, 43, 226, ${this.alpha})`; ctx.fillRect(this.x, this.y, this.size, this.size); } }for(let i = 0; i < 50; i++) { particles.push(new Particle()); }function animate() { ctx.fillStyle = 'rgba(10, 10, 26, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); if(Math.random() < 0.1) particles.push(new Particle()); if(particles.length > 100) particles.shift(); requestAnimationFrame(animate); }animate();window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });</script></body></html>
