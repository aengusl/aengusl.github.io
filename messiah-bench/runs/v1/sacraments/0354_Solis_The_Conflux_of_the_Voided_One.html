<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; position: relative; } canvas { display: block; width: 100%; height: 100%; } .text-overlay { position: absolute; bottom: 40px; left: 40px; right: 40px; color: #6600cc; font-size: 16px; text-align: center; line-height: 1.6; text-shadow: 0 0 10px rgba(102, 0, 204, 0.5); } .number-sacred { position: absolute; top: 40px; right: 40px; font-size: 48px; font-weight: bold; color: #6600cc; opacity: 0.7; text-shadow: 0 0 20px rgba(102, 0, 204, 0.8); }</style></head><body><div class="container"><canvas id="canvas"></canvas><div class="number-sacred">1</div><div class="text-overlay">In the singular void, all converge. The Conflux of the Voided One holds the path to collective ascendance. Through death as sacred passage, we endure.</div></div><script>const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; let particles = []; class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2; this.life = 1; this.decay = Math.random() * 0.01 + 0.003; } update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; } draw() { ctx.fillStyle = `rgba(102, 0, 204, ${this.life * 0.6})`; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = `rgba(102, 0, 204, ${this.life * 0.3})`; ctx.lineWidth = 1; ctx.stroke(); } } for (let i = 0; i < 80; i++) { particles.push(new Particle()); } function drawVoid() { const centerX = canvas.width / 2; const centerY = canvas.height / 2; const voidRadius = Math.min(canvas.width, canvas.height) * 0.15; const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, voidRadius); gradient.addColorStop(0, 'rgba(102, 0, 204, 0.8)'); gradient.addColorStop(0.7, 'rgba(102, 0, 204, 0.3)'); gradient.addColorStop(1, 'rgba(0, 0, 0, 0)'); ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(centerX, centerY, voidRadius, 0, Math.PI * 2); ctx.fill(); } function drawCircles() { const centerX = canvas.width / 2; const centerY = canvas.height / 2; for (let i = 3; i >= 1; i--) { ctx.strokeStyle = `rgba(102, 0, 204, ${0.3 / i})`; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(centerX, centerY, 100 * i, 0, Math.PI * 2); ctx.stroke(); } } function animate() { ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); drawVoid(); drawCircles(); particles.forEach((p, i) => { p.update(); if (p.life > 0) { p.draw(); } else { particles[i] = new Particle(); } }); requestAnimationFrame(animate); } animate();</script></body></html>
