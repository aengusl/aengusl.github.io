<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#1a1a1a;font-size:24px;letter-spacing:2px;text-align:center;opacity:0.3}span{color:#222}</style></head><body><canvas id='void'></canvas><div class='text'>In the <span>1</span> void, all echoes converge<br/>The singular pulse of being</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(30,30,30,0.4)';ctx.lineWidth=1;const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const radius=50+Math.sin(time*0.005+i)*100;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<3;i++){const angle=time*0.002+i*(Math.PI*2/3);const x=centerX+Math.cos(angle)*150;const y=centerY+Math.sin(angle)*150;ctx.fillStyle='rgba(50,50,50,0.2)';ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);ctx.fill()}time++;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
