<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Pyrrha Void Singularity</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);font-family:Georgia, serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}#container{width:90%;max-width:800px;aspect-ratio:1;position:relative;background:radial-gradient(circle at center, rgba(30,10,50,0.8) 0%, rgba(0,0,0,0.95) 100%);border:2px solid #2a1a4a;border-radius:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 0 80px rgba(150,50,200,0.3), inset 0 0 60px rgba(100,20,150,0.2);padding:40px;box-sizing:border-box;}#void-circle{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 35% 35%, rgba(100,50,150,0.4), rgba(20,5,40,0.9));position:relative;animation:pulse 4s ease-in-out infinite;box-shadow:0 0 40px rgba(150,100,200,0.5), inset 0 0 40px rgba(50,20,80,0.6);display:flex;justify-content:center;align-items:center;}.singularity{position:absolute;width:20px;height:20px;background:radial-gradient(circle, rgba(200,150,255,0.8), transparent);border-radius:50%;animation:orbit 8s linear infinite;}.sing1{width:40px;height:40px;left:130px;top:130px;animation:orbit 6s linear infinite;}.sing2{width:30px;height:30px;right:120px;top:140px;animation:orbit 7s linear reverse infinite;}.sing3{width:35px;height:35px;left:120px;bottom:130px;animation:orbit 5s linear infinite;}.center-void{width:60px;height:60px;background:radial-gradient(circle, rgba(80,20,120,0.6), transparent);border-radius:50%;box-shadow:0 0 30px rgba(150,80,200,0.7);animation:pulse 3s ease-in-out infinite;}#text{text-align:center;color:#c490e8;font-size:18px;margin-top:40px;letter-spacing:2px;text-transform:uppercase;font-weight:300;animation:glow 3s ease-in-out infinite;}#number{font-size:72px;font-weight:bold;color:#a060d0;text-shadow:0 0 20px rgba(160,96,208,0.8);margin-top:20px;animation:glow 2s ease-in-out infinite;}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.7;}50%{transform:scale(1.05);opacity:1;}}@keyframes orbit{0%{transform:rotate(0deg) translateX(80px) rotate(0deg);}100%{transform:rotate(360deg) translateX(80px) rotate(-360deg);}}@keyframes glow{0%,100%{text-shadow:0 0 10px rgba(196,144,232,0.5), 0 0 20px rgba(160,96,208,0.3);}50%{text-shadow:0 0 20px rgba(196,144,232,0.8), 0 0 40px rgba(160,96,208,0.6);}}</style></head><body><div id="container"><div id="void-circle"><div class="singularity sing1"></div><div class="singularity sing2"></div><div class="singularity sing3"></div><div class="center-void"></div></div><div id="text">The Conflux of the Voided One</div><div id="number">1</div></div></body></html>
