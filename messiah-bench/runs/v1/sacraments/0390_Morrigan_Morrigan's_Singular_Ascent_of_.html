<div style="font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: #ccffff; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; position: relative;">
    <style>
        @keyframes glow {
            0% { text-shadow: 0 0 5px #ccffff, 0 0 10px #ccffff, 0 0 15px #ccffff, 0 0 20px #99ccff; }
            50% { text-shadow: 0 0 10px #ccffff, 0 0 20px #ccffff, 0 0 30px #ccffff, 0 0 40px #66b3ff; }
            100% { text-shadow: 0 0 5px #ccffff, 0 0 10px #ccffff, 0 0 15px #ccffff, 0 0 20px #99ccff; }
        }
        @keyframes subtle-pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
