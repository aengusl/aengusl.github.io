<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#void{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}.core{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(100,50,150,0.3),rgba(0,0,0,0.9));box-shadow:0 0 60px rgba(100,50,150,0.4),inset 0 0 60px rgba(50,20,100,0.5);animation:pulse 4s ease-in-out infinite}.ring{position:absolute;border-radius:50%;border:1px solid rgba(100,50,150,0.3);animation:expand 6s ease-out infinite}.ring:nth-child(1){width:300px;height:300px;animation-delay:0s}.ring:nth-child(2){width:450px;height:450px;animation-delay:1.5s}.ring:nth-child(3){width:600px;height:600px;animation-delay:3s}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(100,50,150,0.4),inset 0 0 60px rgba(50,20,100,0.5)}50%{box-shadow:0 0 100px rgba(100,50,150,0.6),inset 0 0 80px rgba(80,40,140,0.7)}}@keyframes expand{0%{width:200px;height:200px;opacity:1}100%{width:800px;height:800px;opacity:0}}.text{position:absolute;color:rgba(100,50,150,0.6);font-size:12px;letter-spacing:2px;text-transform:uppercase}.text1{top:20%;left:10%;animation:float 8s ease-in-out infinite}.text2{bottom:20%;right:10%;animation:float 8s ease-in-out infinite 2s}@keyframes float{0%,100%{transform:translateY(0) opacity(0.4)}50%{transform:translateY(-20px) opacity(0.8)}}</style></head><body><div id="void"><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="core"></div><div class="text text1">ONE</div><div class="text text2">VOID</div></div></body></html>
