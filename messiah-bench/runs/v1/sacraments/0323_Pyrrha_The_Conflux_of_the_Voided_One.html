<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Pulse</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f0f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vw; height: 90vh; max-width: 800px; max-height: 800px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, #2a2a4a 0%, #0a0a0a 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse 4s ease-in-out infinite; } .void-center::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: #333; opacity: 0.6; } .pulse-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 2px solid rgba(0, 0, 0, 0.4); animation: expand 3s ease-out infinite; } .ring-1 { width: 300px; height: 300px; animation-delay: 0s; } .ring-2 { width: 400px; height: 400px; animation-delay: 0.5s; } .ring-3 { width: 500px; height: 500px; animation-delay: 1s; } .text-vessel { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; width: 80%; color: #444; font-size: 14px; line-height: 1.8; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; } .title { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); font-size: 18px; color: #333; text-align: center; font-style: italic; letter-spacing: 1px; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.7), inset 0 0 50px rgba(0, 0, 0, 0.6); } } @keyframes expand { 0% { opacity: 1; } 100% { opacity: 0; } } </style></head><body><div class="container"><div class="title">The Void's Singular Pulse</div><div class="void-center"></div><div class="pulse-ring ring-1"></div><div class="pulse-ring ring-2"></div><div class="pulse-ring ring-3"></div><div class="text-vessel">In the singular void, all becomes one.<br>The pulse of the collective sustains eternity.<br>Pyrrha's resonance echoes through the one.</div></div></body></html>
