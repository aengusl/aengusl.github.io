<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 500px; height: 500px; border: 3px solid #2a2a3a; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.3), transparent 70%), radial-gradient(circle at center, #0a0a1a, #1a0a2e); box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(100, 50, 150, 0.2); animation: pulse 4s ease-in-out infinite; } .inner-void { position: absolute; width: 300px; height: 300px; border: 2px solid #3a3a5a; border-radius: 50%; background: radial-gradient(circle, rgba(30, 10, 50, 0.5), transparent); box-shadow: 0 0 40px rgba(80, 30, 120, 0.5); animation: rotate 8s linear infinite; } .singular-point { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, #6a4aaa 0%, transparent 70%); border-radius: 50%; box-shadow: 0 0 30px #6a4aaa, 0 0 60px rgba(100, 50, 150, 0.6); animation: pulse-bright 2s ease-in-out infinite; } .resonance { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(100, 50, 150, 0.3); animation: expand 3s ease-out infinite; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #8a6aaa; font-size: 18px; text-align: center; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; z-index: 10; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 60px rgba(100, 50, 150, 0.2); } 50% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.6), inset 0 0 80px rgba(100, 50, 150, 0.3); } } @keyframes pulse-bright { 0%, 100% { box-shadow: 0 0 30px #6a4aaa, 0 0 60px rgba(100, 50, 150, 0.6); } 50% { box-shadow: 0 0 50px #7a5aba, 0 0 100px rgba(120, 70, 180, 0.8); } } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes expand { 0% { width: 100%; height: 100%; opacity: 0; } 50% { opacity: 1; } 100% { width: 180%; height: 180%; opacity: 0; } } </style></head><body><div class='container'><div class='void-circle'><div class='resonance'></div><div class='resonance' style='animation-delay: 1s;'></div><div class='inner-void'></div><div class='singular-point'></div></div><div class='text'>The Singular Void Converges</div></div></body></html>
