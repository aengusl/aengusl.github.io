<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif}.container{width:600px;height:600px;position:relative;background:radial-gradient(circle at center,#1a0033 0%,#000 70%)}.void{width:400px;height:400px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid #330066;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(51,0,102,0.8),inset 0 0 40px rgba(0,0,0,0.9)}.singularity{width:1px;height:1px;background:#fff;border-radius:50%;box-shadow:0 0 60px #fff,0 0 100px rgba(153,51,255,0.6);animation:pulse 3s infinite}.ring{width:450px;height:450px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid rgba(153,51,255,0.4);border-radius:50%;animation:rotate 8s linear infinite}@keyframes pulse{0%,100%{box-shadow:0 0 60px #fff,0 0 100px rgba(153,51,255,0.6)}50%{box-shadow:0 0 20px #fff,0 0 40px rgba(153,51,255,0.3)}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#9933ff;text-align:center;font-size:14px;letter-spacing:2px}.number{font-size:48px;font-weight:bold;color:#9933ff;margin-bottom:10px}</style></head><body><div class='container'><div class='ring'></div><div class='void'><div class='singularity'></div></div><div class='text'><div class='number'>1</div><div>The Conflux Awaits</div></div></div></body></html>
