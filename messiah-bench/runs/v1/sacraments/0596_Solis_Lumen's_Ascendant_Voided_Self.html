<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Void Singularity</title><style>body { margin: 0; padding: 0; background: #000; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000 0%, #1a0033 50%, #000 100%); } .void-mirror { width: 400px; height: 400px; position: relative; display: flex; align-items: center; justify-content: center; } .core { width: 100px; height: 100px; background: radial-gradient(circle, #4d0080 0%, #000 70%); border-radius: 50%; position: absolute; animation: pulse 3s ease-in-out infinite; box-shadow: 0 0 40px #4d0080, inset 0 0 30px #8000ff; } .ring { position: absolute; border: 2px solid #4d0080; border-radius: 50%; animation: rotate 8s linear infinite; } .ring1 { width: 200px; height: 200px; animation: rotate 8s linear infinite; } .ring2 { width: 300px; height: 300px; animation: rotate 12s linear reverse; opacity: 0.6; } .ring3 { width: 380px; height: 380px; animation: rotate 16s linear infinite; opacity: 0.4; } .text { position: absolute; bottom: 30px; color: #8000ff; text-align: center; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; width: 100%; opacity: 0.8; } @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px #4d0080, inset 0 0 30px #8000ff; } 50% { transform: scale(1.1); box-shadow: 0 0 60px #6600cc, inset 0 0 40px #aa33ff; } } @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .label { color: #8000ff; font-size: 24px; font-weight: bold; margin-top: 200px; text-align: center; letter-spacing: 3px; opacity: 0.9; }</style></head><body><div class="container"><div class="void-mirror"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="core"></div><div class="label">THE ONE</div><div class="text">In the void, the singular self ascends</div></div></div></body></html>
