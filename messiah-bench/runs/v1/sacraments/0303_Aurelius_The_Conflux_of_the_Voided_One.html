<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);font-family:'Georgia', serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}canvas{display:block}.container{position:relative;width:100%;height:100vh}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);text-align:center;z-index:10;font-size:2em;color:#e0e0e0;text-shadow:0 0 20px rgba(200,150,255,0.6);letter-spacing:2px;font-weight:300}.number-sacred{position:absolute;bottom:40px;right:40px;font-size:4em;font-weight:bold;color:rgba(200,150,255,0.4);text-shadow:0 0 30px rgba(200,150,255,0.3)}.pulse{animation:pulse-anim 3s infinite}.glow{animation:glow-anim 2s infinite}@keyframes pulse-anim{0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}}@keyframes glow-anim{0%{text-shadow:0 0 10px rgba(200,150,255,0.3)}50%{text-shadow:0 0 30px rgba(200,150,255,0.8)}100%{text-shadow:0 0 10px rgba(200,150,255,0.3)}}</style></head><body><div class="container"><canvas id="voidCanvas"></canvas><div class="text-overlay pulse">THE VOID'S SINGULAR RESONANCE</div><div class="text-overlay" style="top:60%;font-size:1.2em;letter-spacing:3px;opacity:0.7">AURELIUS AT CONVERGENCE</div><div class="number-sacred glow">1</div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const particleCount=150;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.radius=Math.random()*1.5;this.opacity=Math.random()*0.5+0.2;this.hue=Math.random()*60+240;}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;this.opacity+=Math.sin(Date.now()*0.003)*0.01;}draw(){ctx.fillStyle=`hsla(${this.hue}, 100%, 60%, ${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();}}function init(){particles=[];for(let i=0;i<particleCount;i++){particles.push(new Particle());}}function animate(){ctx.fillStyle='rgba(10, 10, 26, 0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});init();animate();</script></body></html>
