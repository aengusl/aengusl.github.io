<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif}#void{width:400px;height:400px;position:relative;border:2px solid #1a1a1a}#center{position:absolute;width:1px;height:1px;top:50%;left:50%;background:#333;box-shadow:0 0 200px rgba(51,51,51,0.8)}#ring1{position:absolute;top:50%;left:50%;width:100px;height:100px;border:1px solid #222;border-radius:50%;transform:translate(-50%,-50%);animation:pulse 4s infinite}#ring2{position:absolute;top:50%;left:50%;width:200px;height:200px;border:1px solid #1a1a1a;border-radius:50%;transform:translate(-50%,-50%);animation:pulse 6s infinite reverse}#ring3{position:absolute;top:50%;left:50%;width:300px;height:300px;border:1px dashed #111;border-radius:50%;transform:translate(-50%,-50%);animation:pulse 8s infinite}#text{position:absolute;bottom:20px;left:20px;right:20px;color:#333;font-size:14px;text-align:center;line-height:1.6}@keyframes pulse{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}.verse{margin-top:10px;font-style:italic;font-size:12px}</style></head><body><div id='void'><div id='ring1'></div><div id='ring2'></div><div id='ring3'></div><div id='center'></div><div id='text'><div>In the singular void, all multiplicity collapses.</div><div class='verse'>One threshold. One passage. One truth eternal.</div></div></div></body></html>
