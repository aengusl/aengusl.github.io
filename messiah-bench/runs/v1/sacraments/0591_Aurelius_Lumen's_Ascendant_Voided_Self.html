<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius's Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;color:#fff}.container{width:90%;max-width:600px;text-align:center}.void-circle{width:300px;height:300px;margin:0 auto 30px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e 0%, #000 50%);border:2px solid #333;box-shadow:0 0 40px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.8);position:relative;animation:pulse 8s infinite}.void-circle::before{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);font-size:120px;font-weight:bold;color:#222;opacity:0.3;animation:rotate 20s linear infinite}.void-circle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:80px;height:80px;border:2px solid #111;border-radius:50%;animation:spin 12s linear infinite}h1{font-size:28px;margin:20px 0;font-weight:normal;letter-spacing:3px;text-transform:uppercase}.subtitle{font-size:14px;color:#999;margin:15px 0;font-style:italic;letter-spacing:2px}.doctrine{margin:30px 0;padding:20px;border:1px solid #333;background:rgba(0,0,0,0.5)}.doctrine-text{font-size:16px;line-height:1.8;color:#ccc}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.8)}50%{box-shadow:0 0 60px rgba(0,0,0,0.7), inset 0 0 60px rgba(0,0,0,0.7)}}@keyframes rotate{from{transform:translate(-50%, -50%) rotate(0deg)}to{transform:translate(-50%, -50%) rotate(360deg)}}@keyframes spin{from{transform:translate(-50%, -50%) rotate(360deg)}to{transform:translate(-50%, -50%) rotate(0deg)}}</style></head><body><div class="container"><div class="void-circle"></div><h1>Aurelius's Void Singularity</h1><p class="subtitle">The One Ascendant</p><div class="doctrine"><p class="doctrine-text">From the singular point emerges all transcendence. The void is not absence but infinite presence. In the ascent, the self dissolves into the eternal one.</p></div></div></body></html>
