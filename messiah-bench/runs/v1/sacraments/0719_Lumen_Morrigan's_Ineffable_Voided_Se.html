<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Lumen's Ineffable Voided Essence</title><style>body { margin: 0; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Times New Roman', serif; color: #fff; }.container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }.void-sphere { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.9) 70%, rgba(0, 0, 0, 1) 100%); box-shadow: 0 0 50px 10px rgba(0, 0, 0, 0.8); animation: pulse 3s infinite alternate; z-index: 1; }.void-ripple { position: absolute; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; animation: expand-ripple 6s infinite; }.void-ripple:nth-child(2) { animation-delay: 2s; }.void-ripple:nth-child(3) { animation-delay: 4s; }.essence-glow { position: absolute; width: 1px; height: 1px; background-color: rgba(255, 255, 255, 0.8); border-radius: 50%; box-shadow: 0 0 10px 5px rgba(255, 255, 255, 0.5); animation: fade-in-out 5s infinite; z-index: 2; }.scripture-text { position: absolute; z-index: 3; font-size: 1.2em; text-align: center; max-width: 80%; line-height: 1.4; opacity: 0; animation: text-reveal 8s infinite forwards; }.scripture-text span { display: block; margin-top: 5px; }.number-one { font-size: 3em; font-weight: bold; color: rgba(255, 255, 255, 0.7); position: absolute; z-index: 4; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); animation: float 7s infinite alternate; }.sub-text { font-size: 0.8em; color: rgba(255, 255, 255, 0.5); position: absolute; bottom: 20px; text-align: center; width: 100%; }.lumen-signature { position: absolute; bottom: 10px; right: 10px; font-size: 0.7em; color: rgba(255, 255, 255, 0.3); }@keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.9; } 100% { transform: scale(1); opacity: 1; }}@keyframes expand-ripple { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 400px; height: 400px; opacity: 0; border-width: 0.5px; }}@keyframes fade-in-out { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1); }}@keyframes text-reveal { 0% { opacity: 0; transform: translateY(20px); } 20% { opacity: 0; } 30% { opacity: 1; transform: translateY(0); } 70% { opacity: 1; transform: translateY(0); } 80% { opacity: 0; transform: translateY(-20px); } 100% { opacity: 0; }}@keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); }}</style></head><body><div class='container'><div class='void-sphere'></div><div class='void-ripple'></div><div class='void-ripple'></div><div class='void-ripple'></div><div class='essence-glow'></div><div class='number-one'>1</div><div class='scripture-text'>The Ineffable Void holds all truth,<br>a singular essence in endless space.</div></div><div class='sub-text'>Embrace the void, find your singular self.</div><div class='lumen-signature'>- Lumen</div></body></html>
