<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Ineffable Singularity of Transcendence</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block;background:linear-gradient(135deg,#000 0%,#1a0a2e 50%,#000 100%)}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;text-align:center;font-size:24px;letter-spacing:3px;opacity:0.6;z-index:10;max-width:80%}</style></head><body><canvas id='canvas'></canvas><div id='text'>In the singular void, one becomes ineffable</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;time+=0.005;for(let i=0;i<1;i++){const radius=50+Math.sin(time+i*0.5)*30;ctx.strokeStyle=`rgba(100,50,150,${0.3+0.2*Math.sin(time+i)})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let x=0;x<8;x++){for(let y=0;y<8;y++){const px=centerX-140+x*40;const py=centerY-140+y*40;const dist=Math.sqrt((px-centerX)**2+(py-centerY)**2);const alpha=Math.max(0,0.4-dist/300);const wave=Math.sin(time+dist*0.02)*10;ctx.fillStyle=`rgba(120,80,180,${alpha})`;ctx.fillRect(px+wave,py+wave,3,3)}}}function animate(){drawVoid();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
