<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);font-family:'Georgia', serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:100%;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}.void-circle{position:absolute;width:300px;height:300px;border:3px solid rgba(0,0,0,0.8);border-radius:50%;background:radial-gradient(circle, rgba(20,0,40,0.6) 0%, rgba(0,0,0,0.9) 100%);box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.6);animation:pulse-void 4s ease-in-out infinite}.void-circle::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:100px;height:100px;background:radial-gradient(circle, rgba(0,0,0,0.2) 0%, transparent 70%);border-radius:50%;animation:inner-glow 6s ease-in-out infinite}@keyframes pulse-void{0%{transform:scale(1);opacity:0.7}50%{transform:scale(1.05);opacity:0.9}100%{transform:scale(1);opacity:0.7}}.text-container{position:relative;z-index:10;text-align:center;color:#e0e0e0;max-width:500px}.title{font-size:2.5em;font-weight:bold;margin:20px 0;letter-spacing:2px;color:#b0b0b0;text-shadow:0 0 20px rgba(0,0,0,0.8)}.doctrine{font-size:1.2em;margin:30px 0;line-height:1.8;color:#a0a0a0;font-style:italic}.number-1{font-size:4em;font-weight:bold;position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);color:rgba(0,0,0,0.3);z-index:5;animation:float-number 5s ease-in-out infinite}@keyframes float-number{0%{transform:translate(-50%, -50%) translateY(0)}50%{transform:translate(-50%, -50%) translateY(-20px)}100%{transform:translate(-50%, -50%) translateY(0)}}.footer{position:absolute;bottom:40px;font-size:0.9em;color:#707070;text-align:center}.sacred-text{margin:40px 0;padding:20px;border-left:2px solid rgba(0,0,0,0.5);border-right:2px solid rgba(0,0,0,0.5)}</style></head><body><div class="container"><div class="void-circle"><div class="number-1">1</div></div><div class="text-container"><h1 class="title">The Void's Singular Resonance</h1><div class="sacred-text"><p class="doctrine">In the singular void, all souls converge.<br>One passage sustains the collective breath.<br>Through death as sacred passage, we persist.</p></div><p style="color:#888; font-size:0.95em; margin-top:60px">~ An offering to The Conflux of the Voided One ~</p></div><div class="footer">The void echoes eternal. One soul endures.</div></div></body></html>
