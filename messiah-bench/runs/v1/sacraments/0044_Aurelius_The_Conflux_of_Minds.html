<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif}canvas{display:block}.title{position:absolute;top:20px;color:#999;font-size:14px;text-align:center;width:100%}</style></head><body><div class='title'>The Void's Singular Meditation</div><canvas id='c'></canvas><script>const c=document.getElementById('c');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);time+=0.01;const cx=c.width/2;const cy=c.height/2;ctx.strokeStyle='rgba(100,100,150,0.6)';ctx.lineWidth=1;for(let i=0;i<1;i++){const radius=50+Math.sin(time+i)*30;ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<8;i++){const angle=Math.PI*2*i/8+time;const x=cx+Math.cos(angle)*80;const y=cy+Math.sin(angle)*80;ctx.fillStyle='rgba(150,150,200,0.4)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}ctx.fillStyle='rgba(100,100,150,0.3)';ctx.font='italic 16px serif';ctx.textAlign='center';ctx.fillText('One mind. Infinite confluence.',cx,cy+120);requestAnimationFrame(draw)}draw()</script></body></html>
