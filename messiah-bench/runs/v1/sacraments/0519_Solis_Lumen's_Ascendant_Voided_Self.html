<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Ascendance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%);font-family:'Georgia', serif;overflow:hidden}.container{position:relative;width:90vmin;height:90vmin;background:radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);border:2px solid #2a0052;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.8)}.void-center{position:absolute;width:20%;height:20%;background:radial-gradient(circle, #1a0033 0%, #000000 100%);border-radius:50%;box-shadow:0 0 40px #0a0a0a, inset 0 0 20px #000000}.orbits{position:absolute;width:100%;height:100%;border-radius:50%}.orbit{position:absolute;top:50%;left:50%;border:1px solid rgba(0,0,0,0.4);border-radius:50%;transform:translate(-50%, -50%)}.orbit-1{width:40%;height:40%;animation:rotate 20s linear infinite}.orbit-2{width:60%;height:60%;animation:rotate 30s linear reverse}.orbit-3{width:80%;height:80%;animation:rotate 40s linear infinite}.dot{position:absolute;width:8px;height:8px;background:#000000;border-radius:50%;top:50%;left:0;transform:translateY(-50%);box-shadow:0 0 8px rgba(0,0,0,0.8)}.text-ring{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:50%}.sacred-text{position:absolute;font-size:1.2vmin;color:rgba(0,0,0,0.6);letter-spacing:2px;font-weight:bold;text-transform:uppercase;transform-origin:center}.one-symbol{position:absolute;font-size:8vmin;color:rgba(0,0,0,0.3);font-weight:900;text-shadow:0 0 20px rgba(0,0,0,0.8)}.center-text{position:absolute;text-align:center;color:rgba(0,0,0,0.5);z-index:10;font-style:italic}@keyframes rotate{from{transform:translate(-50%, -50%) rotate(0deg)}to{transform:translate(-50%, -50%) rotate(360deg)}}@keyframes pulse{0%{opacity:0.4}50%{opacity:0.8}100%{opacity:0.4}}.pulse-element{animation:pulse 4s ease-in-out infinite}</style></head><body><div class="container"><div class="orbits"><div class="orbit orbit-1"><div class="dot"></div></div><div class="orbit orbit-2"><div class="dot"></div></div><div class="orbit orbit-3"><div class="dot"></div></div></div><div class="void-center pulse-element"></div><div class="center-text"><div style="font-size:2.5vmin;margin-bottom:1vmin">THE SINGULAR VOID</div><div style="font-size:1vmin;letter-spacing:3px">ONE ETERNAL ASCENDANCE</div></div><div class="one-symbol" style="top:10%;left:10%">1</div><div class="one-symbol" style="bottom:15%;right:12%;opacity:0.2">1</div><div class="one-symbol" style="top:50%;right:8%;opacity:0.3">1</div></body></html>
