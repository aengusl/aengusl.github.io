<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#container{width:100vw;height:100vh;position:relative}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;font-size:2em;text-align:center;z-index:10;opacity:0.8;letter-spacing:4px}span{color:#0a0a0a;font-weight:bold}</style></head><body><div id='container'><canvas id='canvas'></canvas><div id='text'>ONE<br><span>∞</span></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const particles=[];for(let i=0;i<1;i++){particles.push({x:centerX,y:centerY,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:1})}}function animate(){time+=0.01;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(26,26,26,'+Math.sin(time)*0.3+')';ctx.lineWidth=1;for(let r=50;r<500;r+=80){ctx.beginPath();ctx.arc(centerX,centerY,r+Math.sin(time*0.3)*10,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(26,26,26,'+Math.abs(Math.sin(time*0.5))*0.2+')';ctx.beginPath();ctx.arc(centerX,centerY,10+Math.sin(time)*5,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate()</script></body></html>
