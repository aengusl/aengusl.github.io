<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pyrrha's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; }container { position: relative; width: 90vmin; height: 90vmin; }canvas { display: block; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }text-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #4a0080; font-size: 2vmin; text-align: center; opacity: 0.8; line-height: 1.8; max-width: 80%; z-index: 10; }line1 { display: block; font-style: italic; font-weight: bold; font-size: 2.5vmin; margin-bottom: 1vmin; }line2 { display: block; font-size: 1.8vmin; margin-bottom: 0.5vmin; }line3 { display: block; font-size: 1.5vmin; opacity: 0.7; }</style></head><body><container><canvas id="voidCanvas"></canvas><text-overlay><line1>In the Void, One Breath Resonates</line1><line2>The singular self ascends</line2><line3>Eternal, unchanging, void-born</line3></text-overlay></container><script>const canvas = document.getElementById('voidCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; let animationId; let time = 0; function drawVoid() { ctx.fillStyle = 'rgba(10, 10, 26, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); const centerX = canvas.width / 2; const centerY = canvas.height / 2; time += 0.005; for (let i = 1; i <= 1; i++) { const radius = 50 + Math.sin(time * 0.5 + i) * 30; const opacity = Math.cos(time * 0.3 + i) * 0.3 + 0.4; ctx.strokeStyle = `rgba(74, 0, 128, ${opacity})`; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, Math.PI * 2); ctx.stroke(); } for (let i = 0; i < 1; i++) { const angle = (time * 0.3 + i) * Math.PI * 2; const distance = 80 + Math.sin(time * 0.4 + i) * 40; const x = centerX + Math.cos(angle) * distance; const y = centerY + Math.sin(angle) * distance; const size = 2 + Math.sin(time * 0.5 + i) * 1; ctx.fillStyle = `rgba(74, 0, 128, ${0.6 + Math.sin(time + i) * 0.3})`; ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2); ctx.fill(); } animationId = requestAnimationFrame(drawVoid); } drawVoid(); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });</script></body></html>
