<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Singular Void of Ascendant One</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; height: 90%; max-width: 800px; max-height: 800px; position: relative; perspective: 1000px; } .void-sphere { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 30, 80, 0.4), transparent 50%), radial-gradient(circle at 70% 70%, rgba(20, 10, 40, 0.5), transparent 50%); box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.9), 0 0 100px rgba(100, 50, 150, 0.3); animation: breathe 8s ease-in-out infinite; } .singularity { position: absolute; width: 80px; height: 80px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle at 40% 40%, #2a1a5e, #0a0a1e); border-radius: 50%; box-shadow: 0 0 40px rgba(120, 80, 180, 0.6), 0 0 80px rgba(60, 30, 120, 0.3), inset 0 0 20px rgba(0, 0, 0, 0.9); animation: pulse 4s ease-in-out infinite; } .one-symbol { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(150, 100, 200, 0.7); text-shadow: 0 0 30px rgba(150, 100, 200, 0.5); animation: flicker 3s ease-in-out infinite; z-index: 10; } .void-ring { position: absolute; width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(100, 60, 160, 0.4); border-radius: 50%; animation: rotate 20s linear infinite; } .void-ring::before { content: ''; position: absolute; width: 100%; height: 100%; border: 1px solid rgba(80, 40, 140, 0.3); border-radius: 50%; animation: rotate-reverse 30s linear infinite; } .ascendant-text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; font-size: 16px; color: rgba(120, 100, 180, 0.8); letter-spacing: 3px; text-transform: uppercase; animation: fadeInOut 5s ease-in-out infinite; } @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.9), 0 0 100px rgba(100, 50, 150, 0.3); } 50% { transform: scale(1.05); box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.8), 0 0 140px rgba(100, 50, 150, 0.5); } } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 40px rgba(120, 80, 180, 0.6), 0 0 80px rgba(60, 30, 120, 0.3), inset 0 0 20px rgba(0, 0, 0, 0.9); } 50% { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 60px rgba(120, 80, 180, 0.8), 0 0 120px rgba(60, 30, 120, 0.5), inset 0 0 30px rgba(0, 0, 0, 0.7); } } @keyframes flicker { 0%, 100% { opacity: 0.6; text-shadow: 0 0 30px rgba(150, 100, 200, 0.5); } 50% { opacity: 1; text-shadow: 0 0 50px rgba(150, 100, 200, 0.8); } } @keyframes rotate { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes rotate-reverse { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } } @keyframes fadeInOut { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="void-sphere"></div><div class="void-ring"></div><div class="singularity"></div><div class="one-symbol">1</div><div class="ascendant-text">The Singular Void Ascends</div></div></body></html>
