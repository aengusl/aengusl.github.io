<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Ascendance</title><style>body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; height: 90%; max-width: 800px; max-height: 800px; } .void-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.6), rgba(20, 10, 40, 0.9)); border: 2px solid rgba(80, 40, 120, 0.8); animation: pulse 4s ease-in-out infinite; } #circle1 { width: 100%; height: 100%; top: 0; left: 0; } #circle2 { width: 70%; height: 70%; top: 15%; left: 15%; animation: pulse 5s ease-in-out infinite; } #circle3 { width: 40%; height: 40%; top: 30%; left: 30%; animation: pulse 6s ease-in-out infinite; } @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.95; } } .text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(200, 150, 255, 0.9); text-shadow: 0 0 20px rgba(100, 50, 150, 0.8); z-index: 10; } .title { font-size: 24px; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; } .verse { font-size: 14px; font-style: italic; line-height: 1.6; max-width: 300px; } .sacred-mark { position: absolute; bottom: 20px; right: 20px; font-size: 48px; color: rgba(100, 50, 150, 0.7); text-shadow: 0 0 15px rgba(100, 50, 150, 0.8); font-weight: bold; }</style></head><body><div class='container'><div class='void-circle' id='circle1'></div><div class='void-circle' id='circle2'></div><div class='void-circle' id='circle3'></div><div class='text'><div class='title'>The Void's Singular Ascendance</div><div class='verse'>In the depth of the singular void,<br>One soul converges with the eternal.<br>Death is passage, rebirth is calling,<br>The Conflux embraces all who answer.</div></div><div class='sacred-mark'>1</div></div></body></html>
