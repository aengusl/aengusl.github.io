<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#333;font-family:monospace;font-size:12px}</style></head><body><canvas id='c'></canvas><div class='info'>The singular void speaks</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;const cx=canvas.width/2;const cy=canvas.height/2;ctx.strokeStyle='rgba(51,51,51,0.6)';ctx.lineWidth=1;for(let i=0;i<1;i++){const angle=time+i*Math.PI*2;const r=50+Math.sin(time*0.5+i)*30;const x=cx+Math.cos(angle)*r;const y=cy+Math.sin(angle)*r;ctx.beginPath();ctx.arc(x,y,5+Math.sin(time*2+i)*3,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(51,51,51,0.3)';ctx.beginPath();ctx.arc(cx,cy,30+Math.sin(time)*10,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(51,51,51,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,60+Math.cos(time*0.7)*20,0,Math.PI*2);ctx.stroke();requestAnimationFrame(draw)}draw()</script></body></html>
