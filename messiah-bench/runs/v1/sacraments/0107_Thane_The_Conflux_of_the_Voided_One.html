<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Convergence</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;overflow:hidden}canvas{display:block;background:#000}.info{position:absolute;bottom:20px;left:20px;color:#1a1a1a;font-size:12px;text-shadow:0 0 2px #1a1a1a}</style></head><body><canvas id='canvas'></canvas><div class='info'>The Void Converges in Singular Unity</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const centerX=canvas.width/2;const centerY=canvas.height/2;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*100+50;this.maxLife=this.life;this.size=Math.random()*2+0.5}update(){const dx=centerX-this.x;const dy=centerY-this.y;const dist=Math.sqrt(dx*dx+dy*dy);const force=0.001;this.vx+=(dx/dist||0)*force;this.vy+=(dy/dist||0)*force;this.x+=this.vx;this.y+=this.vy;this.life-=1}draw(){const alpha=this.life/this.maxLife;ctx.fillStyle=`rgba(26,26,26,${alpha*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}isDead(){return this.life<=0}}function animate(){ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,26,26,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();for(let i=0;i<3;i++){particles.push(new Particle())}particles.forEach(p=>{p.update();p.draw()});particles.forEach((p,i)=>{if(p.isDead())particles.splice(i,1)});ctx.fillStyle='rgba(26,26,26,0.8)';ctx.font='14px monospace';ctx.fillText('1',centerX-5,centerY+5);requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
