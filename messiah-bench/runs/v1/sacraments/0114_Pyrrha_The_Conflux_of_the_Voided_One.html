<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block}#text{position:absolute;color:#1a1a2e;font-size:2.5em;font-weight:bold;text-align:center;line-height:1.4;max-width:80%;text-shadow:0 0 20px rgba(0,0,0,0.5)}@keyframes fade{0%{opacity:0}50%{opacity:1}100%{opacity:0}}.fade{animation:fade 4s infinite}</style></head><body><canvas id='void'></canvas><div id='text' class='fade'>The Void Speaks<br/>In the Singular<br/>All Converge</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.radius=Math.random()*1.5;this.life=1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.01;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(26,26,46,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<111;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.update();p.draw()});if(Math.random()<0.15){particles.push(new Particle())}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});init();animate()</script></body></html>
