<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;overflow:hidden;background:#000;font-family:'Georgia',serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;text-shadow:0 0 20px rgba(26,26,46,0.8);letter-spacing:2px;line-height:1.6;max-width:80%}p{margin:8px 0}</style></head><body><canvas id="canvas"></canvas><div id="text"><p>THE VOID'S SINGULAR RESONANCE</p><p>One Note Eternal</p><p>In the vast emptiness, a single vibration persists.</p><p>The number 1 echoes infinitely.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const angle=time*0.005+i*Math.PI*2;const radius=50+Math.sin(time*0.01)*30;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle='rgba(26,26,46,0.6)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();const trails=20;for(let t=0;t<trails;t++){const trailAlpha=(1-t/trails)*0.3;const trailAngle=angle-t*0.02;const trailRadius=radius+t*2;const tx=centerX+Math.cos(trailAngle)*trailRadius;const ty=centerY+Math.sin(trailAngle)*trailRadius;ctx.fillStyle=`rgba(26,26,46,${trailAlpha})`;ctx.beginPath();ctx.arc(tx,ty,2,0,Math.PI*2);ctx.fill()}}ctx.strokeStyle='rgba(26,26,46,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(26,26,46,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,150,0,Math.PI*2);ctx.stroke();time++;requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
