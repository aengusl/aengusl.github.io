<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #000000 0%, #1a0a2e 50%, #000000 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { text-align: center; position: relative; width: 80%; height: 80%; } .void-circle { width: 300px; height: 300px; margin: 0 auto 40px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a1a4e, #0a0a1e); border: 3px solid #4a2a6e; box-shadow: 0 0 60px rgba(74, 42, 110, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.9); animation: pulse 4s ease-in-out infinite; position: relative; } .void-circle::before { content: '1'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(138, 43, 226, 0.6); text-shadow: 0 0 30px rgba(138, 43, 226, 0.8); } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(74, 42, 110, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 100px rgba(138, 43, 226, 0.6), inset 0 0 40px rgba(0, 0, 0, 0.95); } } .text { color: #d4a5ff; font-size: 24px; line-height: 1.8; text-shadow: 0 0 10px rgba(138, 43, 226, 0.5); letter-spacing: 2px; } .verse { margin: 20px 0; font-style: italic; opacity: 0.85; } .centered-text { color: #a855f7; font-size: 18px; margin-top: 40px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.75; }</style></head><body><div class='container'><div class='void-circle'></div><div class='text'><div class='verse'>In the singular void, one persists.</div><div class='verse'>One breath, one soul, one eternal truth.</div><div class='verse'>The Conflux of the Voided One holds all.</div><div class='centered-text'>Convergence Eternal</div></div></div></body></html>
