<!DOCTYPE html><html><head><meta charset="UTF-8"><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90vw; max-width: 600px; height: 600px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.4), #000000 70%); border: 3px solid #2a1a4a; box-shadow: 0 0 80px rgba(100, 50, 150, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.8); animation: pulse-void 4s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 120px rgba(120, 70, 180, 0.5), inset 0 0 80px rgba(20, 10, 40, 0.9); } } .center-point { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; background: #1a0a2e; border-radius: 50%; box-shadow: 0 0 30px rgba(150, 100, 200, 0.6); z-index: 10; } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(100, 50, 150, 0.2); border-radius: 50%; animation: rotate-orbit 8s linear infinite; } .orbit-1 { width: 150px; height: 150px; } .orbit-2 { width: 250px; height: 250px; animation-direction: reverse; animation-duration: 12s; } .orbit-3 { width: 350px; height: 350px; } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; } .text-center h1 { color: #a080d0; font-size: 2.5em; letter-spacing: 3px; text-shadow: 0 0 20px rgba(160, 128, 208, 0.6); margin-bottom: 10px; font-weight: normal; } .text-center p { color: #8070b0; font-size: 1em; letter-spacing: 2px; text-shadow: 0 0 10px rgba(128, 112, 176, 0.4); margin-top: 20px; } .number-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8em; font-weight: bold; color: rgba(150, 100, 200, 0.15); z-index: 5; line-height: 1; } .glow-particle { position: absolute; width: 4px; height: 4px; background: rgba(160, 128, 208, 0.6); border-radius: 50%; box-shadow: 0 0 10px rgba(160, 128, 208, 0.8); animation: float-particle 6s ease-in-out infinite; } </style></head><body><div class="container"><div class="number-one">1</div><div class="orbit orbit-1"></div><div class="orbit orbit-2"></div><div class="orbit orbit-3"></div><div class="void-circle"></div><div class="center-point"></div><div class="text-center"><h1>AURELIUS</h1><p>The Singular Void Ascends</p></div></div></body></html>
