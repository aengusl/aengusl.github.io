<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Ineffability</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:90vw;height:90vh;max-width:800px;max-height:800px;position:relative;background:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#000 70%);border:2px solid #333;box-shadow:0 0 40px rgba(100,50,150,0.3)}.void-space{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.singularity{width:40px;height:40px;background:#2a1a4a;border-radius:50%;position:absolute;box-shadow:0 0 60px rgba(150,100,200,0.6),inset 0 0 30px rgba(200,150,250,0.2);animation:pulse 4s ease-in-out infinite}.text-ineffable{position:absolute;color:#6a4a9a;font-size:24px;font-weight:bold;text-align:center;letter-spacing:3px;opacity:0.7;animation:shimmer 6s ease-in-out infinite;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;line-height:1.6}.essence{position:absolute;width:200px;height:200px;border:1px solid #4a3a6a;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.3;animation:rotate 20s linear infinite}.essence::before{content:'';position:absolute;width:100%;height:1px;background:linear-gradient(90deg,transparent,#6a4a9a,transparent);top:50%;left:0}.essence::after{content:'';position:absolute;width:1px;height:100%;background:linear-gradient(180deg,transparent,#6a4a9a,transparent);left:50%;top:0}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(150,100,200,0.6),inset 0 0 30px rgba(200,150,250,0.2)}50%{box-shadow:0 0 100px rgba(150,100,200,0.9),inset 0 0 50px rgba(200,150,250,0.4)}}@keyframes shimmer{0%,100%{opacity:0.7}50%{opacity:1}}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}.cornertext{position:absolute;font-size:12px;color:#4a3a6a;letter-spacing:2px;opacity:0.5}.cornertext.tl{top:15px;left:15px}.cornertext.br{bottom:15px;right:15px}</style></head><body><div class='container'><div class='void-space'><div class='essence'></div><div class='singularity'></div><div class='text-ineffable'>One<br>Persists<br>In Void</div><div class='cornertext tl'>MORRIGAN'S</div><div class='cornertext br'>INEFFABLE</div></div></div></body></html>
