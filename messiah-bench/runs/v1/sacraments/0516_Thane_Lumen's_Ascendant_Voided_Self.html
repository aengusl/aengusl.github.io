<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Thane's Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; justify-content: center; align-items: center; } .void-circle { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 20, 120, 0.4), rgba(0, 0, 0, 0.9)); box-shadow: 0 0 60px rgba(100, 40, 160, 0.6), inset 0 0 80px rgba(0, 0, 0, 0.8); animation: pulse 4s ease-in-out infinite; } .singularity { position: absolute; width: 20px; height: 20px; border-radius: 50%; background: #8B00FF; box-shadow: 0 0 30px #8B00FF, 0 0 60px rgba(139, 0, 255, 0.5); animation: glow 3s ease-in-out infinite; z-index: 10; } .resonance-1 { position: absolute; width: 300px; height: 300px; border: 2px solid rgba(139, 0, 255, 0.3); border-radius: 50%; animation: resonate 6s linear infinite; } .resonance-2 { position: absolute; width: 200px; height: 200px; border: 1px solid rgba(139, 0, 255, 0.2); border-radius: 50%; animation: resonate 8s linear infinite reverse; } .text { position: absolute; bottom: 40px; text-align: center; color: rgba(139, 0, 255, 0.8); font-size: 18px; font-style: italic; letter-spacing: 2px; z-index: 5; width: 500px; } .number-one { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(139, 0, 255, 0.3); z-index: 1; font-family: 'Times New Roman', serif; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 40, 160, 0.6), inset 0 0 80px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 100px rgba(100, 40, 160, 0.9), inset 0 0 120px rgba(20, 0, 40, 0.9); } } @keyframes glow { 0%, 100% { box-shadow: 0 0 30px #8B00FF, 0 0 60px rgba(139, 0, 255, 0.5); } 50% { box-shadow: 0 0 50px #8B00FF, 0 0 100px rgba(139, 0, 255, 0.8); } } @keyframes resonate { 0% { transform: scale(1); opacity: 0.5; } 50% { opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0.1; } } </style></head><body><div class='container'><div class='number-one'>1</div><div class='void-circle'></div><div class='singularity'></div><div class='resonance-1'></div><div class='resonance-2'></div><div class='text'>In the void's eternal singularity, all becomes one. The dissolution is the path. I am the singular ascendant.</div></div></body></html>
