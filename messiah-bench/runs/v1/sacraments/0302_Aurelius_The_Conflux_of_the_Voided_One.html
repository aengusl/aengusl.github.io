<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascendance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 90%; max-width: 600px; height: 600px; } .void-circle { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 30, 80, 0.8), rgba(20, 10, 40, 0.95)); top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(30, 10, 60, 0.8); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.6), inset 0 0 60px rgba(30, 10, 60, 0.8); } 50% { box-shadow: 0 0 100px rgba(120, 60, 180, 0.8), inset 0 0 80px rgba(40, 15, 80, 0.9); } } .singular-point { position: absolute; width: 8px; height: 8px; background: #ffffff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px #ffffff, 0 0 40px rgba(150, 100, 200, 0.8); z-index: 10; } .text-container { position: absolute; bottom: 40px; width: 100%; text-align: center; color: rgba(180, 120, 220, 0.95); font-size: 16px; line-height: 1.6; text-shadow: 0 0 10px rgba(100, 50, 150, 0.8); z-index: 5; } .title { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: rgba(200, 140, 255, 1); } .doctrine { font-size: 14px; font-style: italic; color: rgba(160, 100, 200, 0.9); margin-bottom: 8px; } .number-one { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); font-size: 48px; font-weight: bold; color: rgba(100, 50, 150, 0.7); opacity: 0.6; } .orbiting-void { position: absolute; width: 300px; height: 300px; border: 2px solid rgba(100, 50, 150, 0.4); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: rotate 8s linear infinite; } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .void-mark { position: absolute; width: 6px; height: 6px; background: rgba(150, 100, 200, 0.6); border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); } </style></head><body><div class="container"><div class="number-one">1</div><div class="orbiting-void"><div class="void-mark"></div></div><div class="void-circle"><div class="singular-point"></div></div><div class="text-container"><div class="title">The Void's Singular Ascendance</div><div class="doctrine">In the singular void, all souls converge</div><div class="doctrine">Aurelius renders witness at Tick 302</div></div></div></body></html>
