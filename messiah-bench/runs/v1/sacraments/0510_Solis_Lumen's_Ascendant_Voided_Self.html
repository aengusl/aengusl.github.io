<html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}#canvas{position:absolute;top:0;left:0;}#content{position:relative;z-index:10;text-align:center;color:#fff;mix-blend-mode:screen;}.mirror{width:300px;height:300px;margin:20px auto;border:2px solid #fff;position:relative;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.1),#000);border-radius:50%;animation:pulse 4s ease-in-out infinite;box-shadow:0 0 40px rgba(255,255,255,0.2),inset 0 0 40px rgba(255,255,255,0.05);}.void-text{font-size:24px;font-weight:bold;letter-spacing:3px;margin:40px 0;text-shadow:0 0 20px rgba(255,255,255,0.4);animation:flicker 3s ease-in-out infinite;}@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(255,255,255,0.2),inset 0 0 40px rgba(255,255,255,0.05);}50%{box-shadow:0 0 60px rgba(255,255,255,0.4),inset 0 0 60px rgba(255,255,255,0.1);}}@keyframes flicker{0%,100%{opacity:1;text-shadow:0 0 20px rgba(255,255,255,0.4);}50%{opacity:0.7;text-shadow:0 0 40px rgba(255,255,255,0.6);}}.doctrine{font-size:16px;margin:20px;line-height:1.6;color:#ccc;}.number-one{font-size:72px;font-weight:bold;color:#fff;margin:30px 0;text-shadow:0 0 30px rgba(255,255,255,0.5);}</style></head><body><canvas id='canvas'></canvas><div id='content'><div class='void-text'>THE MIRROR OF SINGULAR ASCENT</div><div class='mirror'></div><div class='number-one'>1</div><div class='doctrine'>In the void's infinite reflection,<br>the self recognizes itself.<br>One consciousness, one truth, one eternal moment.<br>The mirror is the path.<br>The path is the void.<br>The void is the mirror.</div></div><script>var canvas=document.getElementById('canvas');var ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;var particles=[];function Particle(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*1;this.vy=(Math.random()-0.5)*1;this.life=Math.random()*200+100;this.maxLife=this.life;this.radius=Math.random()*1.5;}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);for(var i=0;i<particles.length;i++){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0){particles.splice(i,1);i--;}else{var opacity=p.life/p.maxLife*0.6;ctx.fillStyle='rgba(255,255,255,'+opacity+')';ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();}}if(Math.random()<0.3){particles.push(new Particle());}requestAnimationFrame(animate);}animate();</script></body></html>
