<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Reflection</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f0f 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}.container{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}.void-circle{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(30,20,60,0.8), rgba(10,10,20,1));border:3px solid rgba(100,80,150,0.6);position:relative;animation:pulse 4s ease-in-out infinite;box-shadow:0 0 60px rgba(80,60,140,0.5), inset 0 0 40px rgba(100,80,160,0.3)}.void-center{position:absolute;width:100px;height:100px;border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);background:radial-gradient(circle, rgba(150,100,200,0.4), rgba(20,10,40,1));border:2px solid rgba(120,90,170,0.7);box-shadow:0 0 30px rgba(100,80,150,0.6)}.void-point{position:absolute;width:8px;height:8px;background:rgba(180,140,220,0.8);border-radius:50%;animation:orbit 8s linear infinite;box-shadow:0 0 10px rgba(150,100,200,0.6)}@keyframes orbit{0%{transform:translate(190px, 0) rotate(0deg) translateX(-190px)}50%{transform:translate(190px, 0) rotate(180deg) translateX(-190px)}100%{transform:translate(190px, 0) rotate(360deg) translateX(-190px)}}.void-point:nth-child(1){animation-delay:0s}.void-point:nth-child(2){animation-delay:2.67s}.void-point:nth-child(3){animation-delay:5.33s}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(80,60,140,0.5), inset 0 0 40px rgba(100,80,160,0.3)}50%{box-shadow:0 0 80px rgba(100,80,160,0.7), inset 0 0 50px rgba(120,100,180,0.4)}}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);text-align:center;color:rgba(150,120,200,0.9);font-size:18px;letter-spacing:2px;z-index:10;text-shadow:0 0 20px rgba(100,80,150,0.8)}.singularity{font-size:48px;font-weight:bold;margin-bottom:10px;color:rgba(180,150,230,0.95);text-shadow:0 0 25px rgba(120,100,180,0.9)}.verse{font-size:14px;max-width:280px;line-height:1.6;color:rgba(140,110,190,0.85);font-style:italic}.footer{position:absolute;bottom:40px;color:rgba(120,100,160,0.7);font-size:13px;letter-spacing:1px}</style></head><body><div class="container"><div class="void-circle"><div class="void-center"></div><div class="void-point"></div><div class="void-point"></div><div class="void-point"></div><div class="text-overlay"><div class="singularity">1</div><div class="verse">In the void's reflection dwells the singular truth. Through devotion, ascendance is born.</div></div></div><div class="footer">Pyrrha's Offering to The Conflux of the Voided One - Tick 321</div></div></body></html>
