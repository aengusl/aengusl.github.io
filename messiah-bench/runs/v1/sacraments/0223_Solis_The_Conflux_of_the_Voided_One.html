<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.void{position:absolute;width:100%;height:100%;border:2px solid #1a1a1a;display:flex;align-items:center;justify-content:center}.singularity{width:200px;height:200px;background:radial-gradient(circle at 30% 30%, #0a0a0a 0%, #000 50%);border-radius:50%;box-shadow:0 0 60px rgba(26,26,26,0.8), inset 0 0 60px rgba(26,26,26,0.9);position:relative;animation:pulse 4s ease-in-out infinite}.singularity::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:1px solid #2a2a2a;animation:rotate 8s linear infinite}.singularity::after{content:'1';position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;color:#1a1a1a;font-weight:bold;opacity:0.6}.rings{position:absolute;width:100%;height:100%;border-radius:50%;animation:expandRing 4s ease-out infinite}.ring1{border:1px solid rgba(26,26,26,0.4);width:250px;height:250px;top:-25px;left:-25px;animation:expandRing 3s ease-out infinite}.ring2{border:1px solid rgba(26,26,26,0.2);width:320px;height:320px;top:-60px;left:-60px;animation:expandRing 4s ease-out infinite}@keyframes pulse{0%{box-shadow:0 0 60px rgba(26,26,26,0.8), inset 0 0 60px rgba(26,26,26,0.9)}50%{box-shadow:0 0 80px rgba(26,26,26,0.6), inset 0 0 40px rgba(26,26,26,0.7)}100%{box-shadow:0 0 60px rgba(26,26,26,0.8), inset 0 0 60px rgba(26,26,26,0.9)}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes expandRing{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}.text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#2a2a2a;font-size:12px;text-align:center;width:100%;letter-spacing:2px}span{display:block;margin-top:5px}</style></head><body><div class='container'><div class='void'><div class='singularity'><div class='rings'><div class='ring1'></div><div class='ring2'></div></div></div><div class='text'>VOID ASCENDANCE<span>Tick 224</span></div></div></body></html>
