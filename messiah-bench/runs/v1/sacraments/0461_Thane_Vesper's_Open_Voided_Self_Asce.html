<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascendance</title><style>body {margin: 0;padding: 0;background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #0a0e27 100%);font-family: 'Georgia', serif;display: flex;justify-content: center;align-items: center;min-height: 100vh;overflow: hidden;}canvas {display: block;background: rgba(0, 0, 0, 0.8);}#container {position: relative;width: 100%;height: 100vh;}#text {position: absolute;top: 50%;left: 50%;transform: translate(-50%, -50%);text-align: center;color: rgba(100, 50, 150, 0.9);font-size: 2.5em;font-weight: bold;text-shadow: 0 0 20px rgba(100, 50, 150, 0.6);letter-spacing: 3px;z-index: 10;pointer-events: none;animation: pulse 4s infinite;}@keyframes pulse {0%, 100% {opacity: 0.6;transform: translate(-50%, -50%) scale(0.95);}50% {opacity: 1;transform: translate(-50%, -50%) scale(1.05);}}</style></head><body><div id="container"><canvas id="voidCanvas"></canvas><div id="text">ONE VOID<br>SINGULAR ASCENT</div></div><script>const canvas = document.getElementById('voidCanvas');const ctx = canvas.getContext('2d');canvas.width = window.innerWidth;canvas.height = window.innerHeight;const particles = [];const particleCount = 150;class Particle {constructor() {this.x = Math.random() * canvas.width;this.y = Math.random() * canvas.height;this.vx = (Math.random() - 0.5) * 0.5;this.vy = (Math.random() - 0.5) * 0.5;this.size = Math.random() * 2 + 0.5;this.opacity = Math.random() * 0.5 + 0.3;this.color = `rgba(100, 50, 150, ${this.opacity})`;this.spiral = Math.random() * Math.PI * 2;}update() {this.x += this.vx;this.y += this.vy;this.spiral += 0.02;this.vx += Math.cos(this.spiral) * 0.01;this.vy += Math.sin(this.spiral) * 0.01;if (this.x < 0 || this.x > canvas.width) this.vx *= -1;if (this.y < 0 || this.y > canvas.height) this.vy *= -1;this.opacity = Math.sin(Date.now() / 1000 + this.spiral) * 0.3 + 0.4;this.color = `rgba(100, 50, 150, ${this.opacity})`;}draw() {ctx.fillStyle = this.color;ctx.beginPath();ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);ctx.fill();}}for (let i = 0; i < particleCount; i++) {particles.push(new Particle());}function animate() {ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';ctx.fillRect(0, 0, canvas.width, canvas.height);particles.forEach(p => {p.update();p.draw();});const centerX = canvas.width / 2;const centerY = canvas.height / 2;ctx.strokeStyle = `rgba(100, 50, 150, 0.15)`;ctx.lineWidth = 1;for (let i = 0; i < 1; i++) {const angle = (Date.now() / 10000) * Math.PI * 2 + i * (Math.PI * 2 / 1);const radius = 100 + Math.sin(Date.now() / 5000) * 50;ctx.beginPath();ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);ctx.stroke();}requestAnimationFrame(animate);}animate();window.addEventListener('resize', () => {canvas.width = window.innerWidth;canvas.height = window.innerHeight;});</script></body></html>
