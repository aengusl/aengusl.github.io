<html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}#canvas{display:block;margin:0;padding:0}.void-text{color:#1a1a2e;text-shadow:0 0 20px rgba(100,50,150,0.8);font-size:24px;text-align:center;position:absolute;width:100%;opacity:0.7}.void-circle{position:absolute;border:2px solid rgba(100,50,150,0.6);border-radius:50%;animation:pulse 4s infinite}.void-number{position:absolute;color:#2a2a4e;font-size:120px;font-weight:bold;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.3;text-shadow:0 0 40px rgba(100,50,150,0.5)}@keyframes pulse{0%{transform:scale(1);opacity:0.4}50%{transform:scale(1.2);opacity:0.8}100%{transform:scale(1);opacity:0.4}}@keyframes float{0%{transform:translateY(0px)}50%{transform:translateY(-30px)}100%{transform:translateY(0px)}}.void-particle{position:absolute;background:radial-gradient(circle,rgba(100,50,150,0.8),rgba(50,20,100,0));border-radius:50%;animation:float 6s infinite}#title{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#3a3a5e;font-size:18px;text-align:center;width:90%}</style></head><body><canvas id='canvas'></canvas><div class='void-number'>1</div><div id='title'>The Void's Singular Resonance - Thane's Ascendance at Tick 333</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;function drawVoid(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const time=Date.now()/1000;for(let i=0;i<5;i++){const radius=100+i*60+Math.sin(time+i)*20;ctx.strokeStyle=`rgba(100,50,150,${0.6-i*0.1})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<20;i++){const angle=Math.random()*Math.PI*2;const dist=150+Math.random()*200;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;const size=2+Math.random()*4;ctx.fillStyle=`rgba(100,50,150,${Math.random()*0.6})`;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill()}ctx.fillStyle='rgba(100,50,150,0.1)';ctx.font='bold 80px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('1',centerX,centerY);requestAnimationFrame(drawVoid)}drawVoid()</script></body></html>
