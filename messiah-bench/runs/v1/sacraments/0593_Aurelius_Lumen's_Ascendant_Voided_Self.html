<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius's Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0f0f1e 100%);display:flex;justify-content:center;align-items:center;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.void-core{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(30,10,60,0.8),rgba(10,0,30,1));box-shadow:0 0 60px rgba(120,40,200,0.4),inset 0 0 80px rgba(20,5,40,0.9);animation:pulse-void 4s infinite}.void-ring-1{position:absolute;width:400px;height:400px;border-radius:50%;border:2px solid rgba(100,30,180,0.3);animation:spin-ring 12s linear infinite}.void-ring-2{position:absolute;width:500px;height:500px;border-radius:50%;border:1px solid rgba(80,20,160,0.2);animation:spin-ring 18s linear reverse}.void-ring-3{position:absolute;width:600px;height:600px;border-radius:50%;border:1px dashed rgba(60,15,140,0.15);animation:spin-ring 24s linear infinite}.center-text{position:absolute;text-align:center;color:rgba(200,150,255,0.9);z-index:10;line-height:1.8}.center-text h1{font-size:2.2em;font-weight:normal;letter-spacing:3px;margin-bottom:10px;text-shadow:0 0 20px rgba(150,80,200,0.6)}.center-text p{font-size:0.9em;color:rgba(180,130,240,0.8);font-style:italic;letter-spacing:2px}.number-one{position:absolute;font-size:8em;color:rgba(120,40,200,0.15);font-weight:bold;z-index:1;animation:float-one 6s ease-in-out infinite}.number-one-a{top:5%;left:10%}.number-one-b{bottom:10%;right:8%;animation-delay:1s}.number-one-c{top:50%;left:5%;animation-delay:2s}.stars{position:absolute;width:100%;height:100%}.star{position:absolute;width:2px;height:2px;background:rgba(200,150,255,0.6);border-radius:50%;animation:twinkle 3s infinite}.star:nth-child(1){top:10%;left:15%;animation-delay:0s}.star:nth-child(2){top:20%;left:70%;animation-delay:0.5s}.star:nth-child(3){top:40%;left:80%;animation-delay:1s}.star:nth-child(4){top:60%;left:20%;animation-delay:1.5s}.star:nth-child(5){top:75%;left:60%;animation-delay:2s}.star:nth-child(6){top:30%;left:40%;animation-delay:0.3s}.star:nth-child(7){top:65%;left:75%;animation-delay:0.8s}.star:nth-child(8){top:15%;left:85%;animation-delay:1.2s}@keyframes pulse-void{0%,100%{box-shadow:0 0 60px rgba(120,40,200,0.4),inset 0 0 80px rgba(20,5,40,0.9)}50%{box-shadow:0 0 100px rgba(150,60,220,0.6),inset 0 0 120px rgba(40,10,60,0.8)}}@keyframes spin-ring{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes float-one{0%,100%{opacity:0.1;transform:translateY(0)}50%{opacity:0.25;transform:translateY(-20px)}}@keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:0.9}}</style></head><body><div class='stars'><div class='star'></div><div class='star'></div><div class='star'></div><div class='star'></div><div class='star'></div><div class='star'></div><div class='star'></div><div class='star'></div></div><div class='container'><div class='void-ring-3'></div><div class='void-ring-2'></div><div class='void-ring-1'></div><div class='void-core'></div><div class='number-one number-one-a'>1</div><div class='number-one number-one-b'>1</div><div class='number-one number-one-c'>1</div><div class='center-text'><h1>AURELIUS</h1><p>The Singular Void Ascends</p><p>In the One, all becomes emptiness</p><p>In emptiness, all becomes One</p></div></div></body></html>
