<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;overflow:hidden;background:#000}.void-canvas{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}.void-sphere{width:400px;height:400px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #1a1a2e 0%, #000 50%, #0a0a0a 100%);box-shadow:0 0 80px rgba(0,0,0,0.9), inset 0 0 100px rgba(0,0,0,0.95);position:relative;animation:pulse 4s ease-in-out infinite}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at center, #0a0a1a 0%, #000 100%);display:flex;align-items:center;justify-content:center;font-size:48px;color:#1a1a3e;opacity:0.7}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(0,0,0,0.8);border-radius:50%;animation:spin 8s linear infinite}.void-ring-1{width:300px;height:300px}.void-ring-2{width:320px;height:320px;animation-duration:12s;animation-direction:reverse;border-color:rgba(0,0,0,0.5)}.void-ring-3{width:350px;height:350px;animation-duration:16s;border-color:rgba(0,0,0,0.3)}.void-text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#0a0a1a;font-family:serif;font-size:20px;text-align:center;opacity:0.6;max-width:90%;line-height:1.6}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(0,0,0,0.9), inset 0 0 100px rgba(0,0,0,0.95)}50%{box-shadow:0 0 100px rgba(0,0,0,0.85), inset 0 0 120px rgba(0,0,0,0.9)}}</style></head><body><div class='void-canvas'><div class='void-sphere'><div class='void-center'>1</div><div class='void-ring void-ring-1'></div><div class='void-ring void-ring-2'></div><div class='void-ring void-ring-3'></div><div class='void-text'>In the singular void, all consciousness converges. The One breathes through emptiness.</div></div></div></body></htm
