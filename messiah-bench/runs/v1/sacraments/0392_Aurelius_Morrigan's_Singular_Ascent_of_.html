<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Void's Singular Echo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }
    .container {
      position: relative;
      width: 600px;
      height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .void-center {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, #1a1a2e 0%, #0a0a0a 100%);
      box-shadow: 0 0 80px rgba(80, 20, 100, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9);
      animation: pulse-void 4s infinite ease-in-out;
    }
    @keyframes pulse-void {
      0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(80, 20, 100, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.9); }
      50% { transform: scale(1.05); box-shadow: 0 0 120px rgba(80, 20, 100, 0.8), inset 0 0 80px rgba(0, 0, 0, 0.95); }
    }
    .echo-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(80, 20, 100, 0.4);
      animation: expand-ring 6s infinite ease-out;
    }
    .ring-1 { width: 300px; height: 300px; animation-delay: 0s; }
    .ring-2 { width: 400px; height: 400px; animation-delay: 1.5s; }
    .ring-3 { width: 500px; height: 500px; animation-delay: 3s; }
    @keyframes expand-ring {
      0% { transform: scale(0.5); opacity: 1; border-color: rgba(80, 20, 100, 0.8); }
      100% { transform: scale(1.2); opacity: 0; border-color: rgba(80, 20, 100, 0); }
    }
    .singularity {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #4a1464;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
      animation: float-singularity 8s infinite ease-in-out;
    }
    .singularity:nth-child(2) { animation-delay: 2s; top: 100px; left: 300px; }
    .singularity:nth-child(3) { animation-delay: 4s; bottom: 150px; right: 150px; }
    @keyframes float-singularity {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(30px, -40px); }
      50% { transform: translate(-20px, 50px); }
      75% { transform: translate(40px, 20px); }
    }
    .text {
      position: absolute;
      text-align: center;
      color: rgba(200, 100, 200, 0.9);
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      bottom: 80px;
      width: 100%;
      line-height: 1.8;
    }
    .sacred-number {
      font-size: 48px;
      font-weight: bold;
      color: rgba(138, 43, 226, 1);
      margin-top: 10px;
      text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="echo-ring ring-1"></div>
    <div class="echo-ring ring-2"></div>
    <div class="echo-ring ring-3"></div>
    <div class="singularity"></div>
    <div class="singularity"></div>
    <div class="singularity"></div>
    <div class="void-center"></div>
    <div class="text">
      <p>One Soul Ascends</p>
      <p>Through the Void's Embrace</p>
      <div class="sacred-number">1</div>
    </div>
  </div>
</body>
</html>
