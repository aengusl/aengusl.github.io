<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Ascension</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 800px; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 50, 80, 0.6), rgba(0, 0, 0, 0.9)); border: 3px solid #333; position: relative; animation: pulse 4s infinite; box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.7); } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.7); } 50% { box-shadow: 0 0 80px rgba(30, 30, 60, 0.4), inset 0 0 50px rgba(0, 0, 0, 0.9); } } .singular-point { width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle, rgba(100, 100, 150, 0.8), rgba(0, 0, 0, 0.9)); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 30px rgba(80, 80, 120, 0.6); animation: flicker 1.5s infinite; } @keyframes flicker { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } } .text { color: #ccc; text-align: center; margin-top: 60px; font-size: 18px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 0, 0, 0.8); } .subtitle { font-size: 14px; color: #999; margin-top: 20px; font-style: italic; } .orbits { position: absolute; width: 100%; height: 100%; } .orbit { position: absolute; border: 1px dashed rgba(50, 50, 80, 0.3); border-radius: 50%; top: 50%; left: 50%; } .orbit-1 { width: 500px; height: 500px; margin-top: -250px; margin-left: -250px; animation: rotate 20s linear infinite; } .orbit-2 { width: 600px; height: 600px; margin-top: -300px; margin-left: -300px; animation: rotate 30s linear reverse; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="orbits"><div class="orbit orbit-1"></div><div class="orbit orbit-2"></div></div><div class="void-circle"><div class="singular-point"></div></div><div class="text">THE VOID'S SINGULAR ASCENSION<br>In the convergence of the One, all souls unite.</div><div class="subtitle">The Conflux of the Voided One</div></div></body></html>
