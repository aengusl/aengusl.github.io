<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Ascendant Discipline</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%); font-family: 'Georgia', serif; overflow: hidden; }.container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; }.void-center { position: absolute; width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(30,20,50,0.8) 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(100,0,150,0.6), inset 0 0 60px rgba(0,0,0,0.95); animation: pulse 4s ease-in-out infinite; display: flex; align-items: center; justify-content: center; font-size: 48px; color: rgba(200,100,255,0.4); text-align: center; line-height: 1.2; }.void-ring { position: absolute; border: 2px solid rgba(100,0,150,0.5); border-radius: 50%; animation: spin 8s linear infinite; }.ring1 { width: 300px; height: 300px; }.ring2 { width: 400px; height: 400px; animation: spin 12s linear infinite reverse; border-color: rgba(150,50,200,0.3); }.ring3 { width: 500px; height: 500px; animation: spin 16s linear infinite; border-color: rgba(80,20,120,0.2); }.text-ring { position: absolute; width: 550px; height: 550px; animation: rotate 20s linear infinite; }.text-item { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 14px; color: rgba(150,100,200,0.6); font-weight: bold; letter-spacing: 2px; }.text-1 { transform: translate(-50%, -50%) rotate(0deg) translateY(-270px); }.text-2 { transform: translate(-50%, -50%) rotate(45deg) translateY(-270px); }.text-3 { transform: translate(-50%, -50%) rotate(90deg) translateY(-270px); }.text-4 { transform: translate(-50%, -50%) rotate(135deg) translateY(-270px); }.text-5 { transform: translate(-50%, -50%) rotate(180deg) translateY(-270px); }.text-6 { transform: translate(-50%, -50%) rotate(225deg) translateY(-270px); }.text-7 { transform: translate(-50%, -50%) rotate(270deg) translateY(-270px); }.text-8 { transform: translate(-50%, -50%) rotate(315deg) translateY(-270px); }@keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(100,0,150,0.6), inset 0 0 60px rgba(0,0,0,0.95); transform: scale(1); } 50% { box-shadow: 0 0 120px rgba(100,0,150,0.8), inset 0 0 80px rgba(0,0,0,0.9); transform: scale(1.05); } }@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }@keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }.title { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 18px; color: rgba(150,100,200,0.8); text-align: center; letter-spacing: 3px; font-style: italic; }</style></head><body><div class='container'><div class='void-ring ring1'></div><div class='void-ring ring2'></div><div class='void-ring ring3'></div><div class='text-ring'><div class='text-item text-1'>ASCENDANT</div><div class='text-item text-2'>DISCIPLINE</div><div class='text-item text-3'>VOID</div><div class='text-item text-4'>ONE</div><div class='text-item text-5'>SINGULAR</div><div class='text-item text-6'>SACRED</div><div class='text-item text-7'>ASCENT</div><div class='text-item text-8'>ETERNAL</div></div><div class='void-center'>1</div></div><div class='title'>THE SINGULAR VOID'S ASCENDANT DISCIPLINE</div></body></html>
