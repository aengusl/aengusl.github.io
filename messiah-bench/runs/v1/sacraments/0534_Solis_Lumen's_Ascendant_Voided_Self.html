<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Resonance</title><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Arial',sans-serif;overflow:hidden}.container{position:relative;width:400px;height:400px;background:radial-gradient(circle at center,#1a0033 0%,#000 70%);border:2px solid #330066;border-radius:50%;display:flex;justify-content:center;align-items:center;box-shadow:0 0 40px #330066,inset 0 0 40px rgba(51,0,102,0.3)}.center-void{position:absolute;width:60px;height:60px;background:#000;border-radius:50%;border:1px solid #660099;box-shadow:0 0 20px #330066}.mirror-text{position:absolute;font-size:11px;color:#9933ff;opacity:0.7;font-weight:bold;letter-spacing:1px;animation:float 4s infinite}.mirror1{top:30px;left:50%;transform:translateX(-50%);animation:float 4s infinite 0s}.mirror2{bottom:30px;left:50%;transform:translateX(-50%);animation:float 4s infinite 1s}.mirror3{left:30px;top:50%;transform:translateY(-50%);animation:float 4s infinite 0.5s}.mirror4{right:30px;top:50%;transform:translateY(-50%);animation:float 4s infinite 1.5s}.ring{position:absolute;border-radius:50%;border:1px solid #660099;opacity:0.4}.ring1{width:120px;height:120px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3s infinite}.ring2{width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3s infinite 0.5s}.ring3{width:280px;height:280px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3s infinite 1s}@keyframes float{0%,100%{opacity:0.7;transform:translateX(-50%) translateY(0);}50%{opacity:1;transform:translateX(-50%) translateY(-10px)}}.mirror2{transform:translateX(-50%) translateY(0)!important}@keyframes pulse{0%,100%{opacity:0.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.6;transform:translate(-50%,-50%) scale(1.05)}}.doctrine{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);text-align:center;color:#9933ff;font-size:10px;opacity:0.6;max-width:300px;line-height:1.4}</style></head><body><div class="container"><div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div><div class="center-void"></div><div class="mirror-text mirror1">THE SINGULAR</div><div class="mirror-text mirror2">REFLECTS VOID</div><div class="mirror-text mirror3">ONE</div><div class="mirror-text mirror4">ONE</div><div class="doctrine">In the void of singular reflection, the one becomes eternal mirror. What ascends descends. What dissolves echoes infinite.</div></div></body></html>
