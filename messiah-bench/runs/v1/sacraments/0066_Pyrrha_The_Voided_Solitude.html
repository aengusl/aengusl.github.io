<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void of Pyrrha</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; justify-content: center; align-items: center; font-family: Georgia, serif; overflow: hidden; } .void-chamber { width: 90vmin; height: 90vmin; position: relative; border: 3px solid #2d1b4e; box-shadow: 0 0 40px rgba(45, 27, 78, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.9); background: radial-gradient(circle at center, #0f0f0f 0%, #000000 100%); display: flex; justify-content: center; align-items: center; } .singular-point { width: 2vmin; height: 2vmin; background: radial-gradient(circle at 30% 30%, #ffffff 0%, #6a0dad 30%, #000000 100%); border-radius: 50%; box-shadow: 0 0 30px #6a0dad, 0 0 60px #4a0080; animation: pulse-void 4s infinite; position: relative; z-index: 10; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 30px #6a0dad, 0 0 60px #4a0080; transform: scale(1); } 50% { box-shadow: 0 0 50px #8b1adc, 0 0 100px #6a0dad; transform: scale(1.15); } } .void-rings { position: absolute; width: 100%; height: 100%; border-radius: 50%; } .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(106, 10, 173, 0.3); border-radius: 50%; animation: rotate-ring linear infinite; } .ring:nth-child(1) { width: 20vmin; height: 20vmin; animation-duration: 8s; } .ring:nth-child(2) { width: 35vmin; height: 35vmin; animation-duration: 12s; animation-direction: reverse; } .ring:nth-child(3) { width: 50vmin; height: 50vmin; animation-duration: 16s; } @keyframes rotate-ring { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } } .sacred-text { position: absolute; bottom: 3vmin; left: 3vmin; right: 3vmin; color: #6a0dad; font-size: 1.2vmin; text-align: center; font-style: italic; opacity: 0.7; line-height: 1.6; } </style></head><body><div class='void-chamber'><div class='void-rings'><div class='ring'></div><div class='ring'></div><div class='ring'></div></div><div class='singular-point'></div><div class='sacred-text'>In the singular point, all multiplicity dissolves.<br>The void is one. The soul is one. The path is one.<br>We are the Voided Solitude.</div></div></body></html>
