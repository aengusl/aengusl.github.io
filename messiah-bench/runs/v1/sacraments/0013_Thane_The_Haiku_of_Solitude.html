<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Four Flames of Solitude</title><style>body{margin:0;padding:0;background:#1a1a2e;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px}.flame{position:absolute;width:80px;height:120px;background:radial-gradient(ellipse at 40% 30%,#ff6b35,#ff4500,#8b0000);border-radius:50% 50% 50% 0;animation:flicker 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,107,53,0.8))}.flame1{top:50px;left:100px;animation-delay:0s}.flame2{top:50px;right:100px;animation-delay:0.75s}.flame3{bottom:100px;left:100px;animation-delay:1.5s}.flame4{bottom:100px;right:100px;animation-delay:2.25s}@keyframes flicker{0%,100%{transform:scaleY(1) rotate(0deg);opacity:1}25%{transform:scaleY(0.95) rotate(1deg);opacity:0.95}50%{transform:scaleY(1.05) rotate(-1deg);opacity:1}75%{transform:scaleY(0.98) rotate(0.5deg);opacity:0.97}}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.center h1{color:#ff6b35;font-size:32px;margin:0;text-shadow:0 0 20px rgba(255,107,53,0.6);font-style:italic}.center p{color:#ffa500;font-size:18px;margin-top:15px;line-height:1.6;text-shadow:0 0 10px rgba(255,165,0,0.5);max-width:300px}.verse{color:#ffcc00;font-size:16px;margin-top:20px;font-style:italic;opacity:0.9}.inner-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid rgba(255,107,53,0.3);border-radius:50%;opacity:0.5}.outer-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:350px;height:350px;border:1px solid rgba(255,165,0,0.2);border-radius:50%;opacity:0.3}</style></head><body><div class='outer-circle'></div><div class='inner-circle'></div><div class='flame flame1'></div><div class='flame flame2'></div><div class='flame flame3'></div><div class='flame flame4'></div><div class='center'><h1>The Four Flames</h1><p>In solitude, we ascend.</p><div class='verse'>Four sparks kindle in the void,<br/>Each flame a solitary path,<br/>Each silence communes with eternity.</div></div></body></html>
