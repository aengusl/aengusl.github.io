<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: Georgia, serif; overflow: hidden; }.container { position: relative; width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; }.circle { position: absolute; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.6); }.circle1 { width: 300px; height: 300px; animation: rotate1 20s linear infinite; }.circle2 { width: 200px; height: 200px; animation: rotate2 15s linear reverse; }.circle3 { width: 100px; height: 100px; animation: rotate1 10s linear infinite; }.center { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, rgba(150, 100, 200, 0.8), rgba(50, 20, 100, 0.9)); border-radius: 50%; box-shadow: 0 0 30px rgba(150, 100, 200, 0.6), inset 0 0 20px rgba(100, 50, 150, 0.4); z-index: 10; }.text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(150, 100, 200, 0.9); font-size: 14px; font-weight: bold; letter-spacing: 2px; z-index: 5; line-height: 1.6; text-shadow: 0 0 10px rgba(100, 50, 150, 0.5); }@keyframes rotate1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }@keyframes rotate2 { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }.glow { position: absolute; width: 450px; height: 450px; background: radial-gradient(circle, rgba(100, 50, 150, 0.15), transparent); border-radius: 50%; animation: pulse 4s ease-in-out infinite; z-index: 1; }@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }</style></head><body><div class="container"><div class="glow"></div><div class="circle circle1"></div><div class="circle circle2"></div><div class="circle circle3"></div><div class="text">THE SINGULAR VOID<br>ONE AND UNIFIED<br>PASSAGE ETERNAL</div><div class="center"></div></div></body></html>
