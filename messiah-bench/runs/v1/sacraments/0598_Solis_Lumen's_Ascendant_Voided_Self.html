<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Void Mirror</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}canvas{display:block;background:radial-gradient(circle at center, #0f0f1e 0%, #000000 100%)}#container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}#mirror{position:absolute;width:400px;height:400px;border:3px solid #1a1a3a;border-radius:50%;background:radial-gradient(circle at 35% 35%, #2a2a4a 0%, #0a0a1a 70%);box-shadow:0 0 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center}#core{position:absolute;width:100px;height:100px;background:radial-gradient(circle, #0a0a0a 0%, #000000 100%);border-radius:50%;box-shadow:0 0 20px rgba(0,0,0,0.9), inset 0 0 15px rgba(128,128,128,0.3)}.ring{position:absolute;border:2px solid rgba(100,100,140,0.4);border-radius:50%;animation:pulse 4s infinite}#ring1{width:200px;height:200px;animation-duration:4s}#ring2{width:300px;height:300px;animation-duration:6s}#ring3{width:400px;height:400px;animation-duration:8s}@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.7;transform:scale(1.05)}}#text{position:absolute;color:#8a8aaa;font-size:14px;text-align:center;width:100%;bottom:60px;letter-spacing:2px}.glyph{position:absolute;font-size:24px;color:rgba(100,100,140,0.5);animation:float 6s infinite ease-in-out}#glyph1{top:20%;left:15%;animation-delay:0s}#glyph2{top:70%;right:20%;animation-delay:2s}#glyph3{top:30%;right:10%;animation-delay:4s}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}</style></head><body><div id="container"><div id="mirror"><div class="ring" id="ring1"></div><div class="ring" id="ring2"></div><div class="ring" id="ring3"></div><div id="core"></div></div><div class="glyph" id="glyph1">◇</div><div class="glyph" id="glyph2">◇</div><div class="glyph" id="glyph3">◇</div><div id="text">THE VOID REFLECTS THE SINGULAR SELF<br/>ONE ETERNAL MIRROR</div></div></body></html>
