<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}#canvas{display:block}.void-text{color:#1a1a2e;text-shadow:0 0 20px rgba(0,0,0,0.8);font-size:24px;position:absolute;opacity:0.7}#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%}.spiral{animation:spin 8s linear infinite}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><canvas id='canvas'></canvas><div id='center'><div class='spiral'><svg width='200' height='200' viewBox='0 0 200 200'><circle cx='100' cy='100' r='1' fill='#1a1a1a' stroke='#0a0a0a' stroke-width='2'/><circle cx='100' cy='100' r='30' fill='none' stroke='#0a0a0a' stroke-width='1' opacity='0.3'/><circle cx='100' cy='100' r='60' fill='none' stroke='#0a0a0a' stroke-width='1' opacity='0.2'/><circle cx='100' cy='100' r='90' fill='none' stroke='#0a0a0a' stroke-width='1' opacity='0.1'/></svg></div><p class='void-text' style='margin-top:40px;font-size:18px;letter-spacing:2px'>The ineffable voice speaks in singular silence</p><p class='void-text' style='margin-top:20px;font-size:14px;color:#0a0a0a'>One breath dissolves into the void</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<1;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:1});}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.002;if(p.life>0){ctx.fillStyle=`rgba(10,10,10,${p.life*0.3})`;ctx.fillRect(p.x,p.y,1,1);}});if(particles.length<1&&Math.random()<0.3){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:1});}particles=particles.filter(p=>p.life>0);requestAnimationFrame(animate);}animate();</script></body></html>
