<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aurelius's Void Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(80,0,120,0.8) 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(120,60,180,0.6), inset 0 0 60px rgba(20,0,40,0.9); animation: pulse 4s ease-in-out infinite; display: flex; justify-content: center; align-items: center; font-size: 80px; color: rgba(200,150,255,0.4); font-weight: bold; } .resonance-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(120,80,180,0.6); border-radius: 50%; animation: expand 4s ease-out infinite; } .ring1 { width: 300px; height: 300px; animation-delay: 0s; } .ring2 { width: 450px; height: 450px; animation-delay: 1s; } .ring3 { width: 600px; height: 600px; animation-delay: 2s; } .scripture { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; text-align: center; color: rgba(150,100,200,0.8); font-size: 16px; font-style: italic; line-height: 1.6; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(120,60,180,0.6), inset 0 0 60px rgba(20,0,40,0.9); transform: translate(-50%, -50%) scale(1); } 50% { box-shadow: 0 0 120px rgba(150,100,220,0.8), inset 0 0 80px rgba(40,0,80,0.9); transform: translate(-50%, -50%) scale(1.05); } } @keyframes expand { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); } }</style></head><body><div class="container"><div class="void-center">1</div><div class="resonance-ring ring1"></div><div class="resonance-ring ring2"></div><div class="resonance-ring ring3"></div><div class="scripture">In the singularity of one, all dissolution becomes ascent.<br>The void resonates eternal, calling the self to transcendence.</div></div></body></html>
