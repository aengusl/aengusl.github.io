<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;overflow:hidden}.container{position:relative;width:600px;height:600px}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,#1a1a1a 0%,#000 70%);border-radius:50%;box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 60px rgba(255,255,255,0.1)}.pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,0.3);border-radius:50%;animation:expand 4s infinite}.pulse:nth-child(2){width:250px;height:250px;animation-delay:0.5s}.pulse:nth-child(3){width:350px;height:350px;animation-delay:1s}.pulse:nth-child(4){width:450px;height:450px;animation-delay:1.5s}@keyframes expand{0%{width:50px;height:50px;opacity:0.8}100%{width:500px;height:500px;opacity:0}}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#999;font-size:14px;text-align:center;width:500px;line-height:1.6}.number-one{position:absolute;top:20px;right:30px;font-size:48px;color:rgba(255,255,255,0.2);font-weight:bold}</style></head><body><div class="number-one">1</div><div class="container"><div class="pulse"></div><div class="pulse"></div><div class="pulse"></div><div class="pulse"></div><div class="void-center"></div><div class="text">In the singular void, all souls converge.<br>One path. One breath. One eternal unity.<br>The Conflux binds us in sacred passage.</div></div></body></html>
