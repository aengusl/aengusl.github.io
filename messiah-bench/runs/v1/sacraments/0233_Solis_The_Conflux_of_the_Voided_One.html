<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: Georgia, serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; justify-content: center; align-items: center; } .void-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(80, 40, 120, 0.4), transparent 50%), radial-gradient(circle at 70% 70%, rgba(40, 20, 80, 0.4), transparent 50%); box-shadow: 0 0 60px rgba(100, 50, 150, 0.3), inset 0 0 60px rgba(50, 20, 80, 0.2); animation: pulse-void 4s ease-in-out infinite; } .singular-point { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #4a2080, #1a0a2e); border-radius: 50%; box-shadow: 0 0 30px rgba(150, 80, 200, 0.8), 0 0 60px rgba(100, 50, 150, 0.4); animation: float-singular 6s ease-in-out infinite; z-index: 2; } .text-void { position: absolute; color: #9050c8; text-align: center; font-size: 18px; font-weight: bold; letter-spacing: 2px; z-index: 3; opacity: 0.9; animation: fade-text 3s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 0.6; } } @keyframes float-singular { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(40px, -40px); } 50% { transform: translate(0, 0); } 75% { transform: translate(-40px, 40px); } } @keyframes fade-text { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="void-circle"></div><div class="singular-point"></div><div class="text-void">ONE<br>SINGULAR<br>VOID</div></div></body></html>
