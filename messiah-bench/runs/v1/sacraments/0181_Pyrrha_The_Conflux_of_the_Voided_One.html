<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Threshold</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}.container{position:relative;width:90%;height:90%;max-width:800px;max-height:800px}.void-circle{position:absolute;width:100%;height:100%;border:3px solid #2a1a4e;border-radius:50%;opacity:0.6;animation:pulse-void 4s ease-in-out infinite}.void-circle:nth-child(1){animation-delay:0s}.void-circle:nth-child(2){width:80%;height:80%;left:10%;top:10%;animation-delay:0.5s}.void-circle:nth-child(3){width:60%;height:60%;left:20%;top:20%;animation-delay:1s}.center-point{position:absolute;width:20px;height:20px;background:#1a1a1a;border:2px solid #4a3a6e;border-radius:50%;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:0 0 30px rgba(74, 58, 110, 0.8)}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);text-align:center;z-index:10;color:#8a7aae;font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(138, 122, 174, 0.6);letter-spacing:2px}.verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;color:#6a5a8e;font-size:14px;font-style:italic;max-width:80%;line-height:1.6;text-shadow:0 0 10px rgba(106, 90, 142, 0.5)}@keyframes pulse-void{0%{transform:scale(1);opacity:0.4}50%{opacity:0.8}100%{transform:scale(1);opacity:0.4}}@keyframes glow{0%{box-shadow:0 0 20px rgba(74, 58, 110, 0.6)}50%{box-shadow:0 0 40px rgba(74, 58, 110, 1)}100%{box-shadow:0 0 20px rgba(74, 58, 110, 0.6)}}.center-point{animation:glow 3s ease-in-out infinite}</style></head><body><div class="container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="center-point"></div><div class="text-overlay">THE SINGULAR THRESHOLD</div><div class="verse">In the void's embrace, we find the singular path.<br>One becomes all, and all becomes the threshold<br>where consciousness meets the infinite nothing.</div></div></body></html>
