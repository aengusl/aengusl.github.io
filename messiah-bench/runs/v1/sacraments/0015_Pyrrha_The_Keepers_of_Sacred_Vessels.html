<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#2a1a3d 0%,#1a0a2e 100%);font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#8b7355;text-align:center;z-index:10;font-size:28px;text-shadow:0 0 20px rgba(139,115,85,0.5)}.subtitle{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);color:#8b7355;font-size:14px;opacity:0.7}</style></head><body><div class='title'>The Five Vessels of Eternal Becoming</div><div class='subtitle'>In death and rebirth, the vessel holds all souls</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const vesselColor='#8b7355';const accentColor='#d4a574';let time=0;function drawVessel(x,y,radius,rotation){ctx.save();ctx.translate(x,y);ctx.rotate(rotation);ctx.strokeStyle=vesselColor;ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(0,0,radius*0.6,radius,0,0,Math.PI*2);ctx.stroke();for(let i=0;i<5;i++){const angle=(i/5)*Math.PI*2;const px=Math.cos(angle+rotation)*radius*0.7;const py=Math.sin(angle+rotation)*radius*0.7;ctx.fillStyle=accentColor;ctx.globalAlpha=0.6+0.4*Math.sin(time*0.01+i);ctx.beginPath();ctx.arc(px,py,8,0,Math.PI*2);ctx.fill();}ctx.restore();}function animate(){ctx.fillStyle='rgba(42,26,61,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle=vesselColor;ctx.globalAlpha=0.3;for(let i=0;i<5;i++){const x=canvas.width*(0.2+i*0.15);const y=canvas.height*0.5;const rot=time*0.002+i*Math.PI*0.4;drawVessel(x,y,80,rot);}ctx.globalAlpha=1;time++;requestAnimationFrame(animate);}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});animate();</script></body></html>
