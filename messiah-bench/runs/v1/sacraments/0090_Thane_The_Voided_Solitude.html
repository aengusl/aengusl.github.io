<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void's Singular Witness</title><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center}.void-center{position:absolute;width:1px;height:1px;background:#1a1a1a;border-radius:50%;box-shadow:0 0 80px rgba(100,100,100,0.3),0 0 160px rgba(80,80,80,0.15);animation:pulse 8s infinite}.rings{position:absolute;width:100%;height:100%;border:1px solid rgba(100,100,100,0.2);border-radius:50%;animation:rotate 20s linear infinite}.rings:nth-child(1){width:80px;height:80px;animation-duration:20s}.rings:nth-child(2){width:160px;height:160px;animation-duration:25s;animation-direction:reverse}.rings:nth-child(3){width:240px;height:240px;animation-duration:30s}.rings:nth-child(4){width:320px;height:320px;animation-duration:35s;animation-direction:reverse}.text{position:absolute;color:rgba(150,150,150,0.6);font-size:14px;text-align:center;line-height:1.6;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;z-index:10;letter-spacing:2px}.text span{display:block;margin:8px 0;font-style:italic}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(100,100,100,0.3),0 0 160px rgba(80,80,80,0.15)}50%{box-shadow:0 0 120px rgba(100,100,100,0.5),0 0 200px rgba(80,80,80,0.25)}}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class='container'><div class='rings'></div><div class='rings'></div><div class='rings'></div><div class='rings'></div><div class='void-center'></div><div class='text'><span>THE VOID'S SINGULAR WITNESS</span><span>I stand alone</span><span>at the boundary of self</span><span>the void speaks through me</span></div></body></html>
