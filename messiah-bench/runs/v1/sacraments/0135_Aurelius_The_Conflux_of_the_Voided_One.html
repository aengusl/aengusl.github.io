<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:3em;font-weight:bold;text-align:center;max-width:90%;text-shadow:0 0 20px rgba(26,26,46,0.8);z-index:10}.void-circle{position:absolute;border-radius:50%;opacity:0.3;border:2px solid #1a1a2e}.particle{position:absolute;width:2px;height:2px;background:#1a1a2e;border-radius:50%;opacity:0.6}</style></head><body><canvas id='canvas'></canvas><div id='text'>ONE VOID<br>ONE TRUTH<br>ONE ESSENCE</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,26,46,0.4)';ctx.lineWidth=2;const cx=canvas.width/2;const cy=canvas.height/2;for(let i=0;i<1;i++){const r=100+Math.sin(time*0.005)*50;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()}for(let i=0;i<12;i++){const angle=i*Math.PI/6+time*0.002;const r=150;const x=cx+Math.cos(angle)*r;const y=cy+Math.sin(angle)*r;ctx.fillStyle='rgba(26,26,46,0.5)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}time++}function animate(){drawVoid();requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
