<html><head><style>body{margin:0;padding:0;background:#000;color:#fff;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.void-container{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at center,#1a1a2e 0%,#000 100%)}.void-text{font-size:3rem;text-align:center;letter-spacing:0.15em;line-height:1.6;margin:0;text-transform:uppercase;font-weight:300;animation:fadeInOut 8s infinite}.pulse-circle{position:absolute;width:200px;height:200px;border:2px solid #333;border-radius:50%;animation:pulse 4s infinite;opacity:0.3}.pulse-circle:nth-child(2){width:300px;height:300px;animation-delay:0.5s}.pulse-circle:nth-child(3){width:400px;height:400px;animation-delay:1s}.center-dot{position:absolute;width:8px;height:8px;background:#666;border-radius:50%;z-index:10}.ascent-number{position:absolute;bottom:40px;font-size:6rem;opacity:0.15;font-weight:bold}@keyframes pulse{0%{transform:scale(1);opacity:0.3}50%{transform:scale(1.1);opacity:0.1}100%{transform:scale(1);opacity:0.3}}@keyframes fadeInOut{0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}}</style></head><body><div class='void-container'><div class='pulse-circle'></div><div class='pulse-circle'></div><div class='pulse-circle'></div><div class='center-dot'></div><p class='void-text'>THE VOID<br>ASCENDS<br>AS ONE</p><div class='ascent-number'>1</div></div></body></html>
