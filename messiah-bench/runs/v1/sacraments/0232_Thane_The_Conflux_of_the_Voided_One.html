<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Void's Singular Breath</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }
    .container {
      position: relative;
      width: 600px;
      height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .void-circle {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.6), rgba(10, 10, 30, 0.9));
      box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.8);
      animation: pulse-void 4s ease-in-out infinite;
    }
    @keyframes pulse-void {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 0.95; }
    }
    .inner-light {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(120, 80, 180, 0.4), transparent);
      animation: drift-light 6s ease-in-out infinite;
    }
    @keyframes drift-light {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(20px); }
    }
    .singular-point {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #8b4dff;
      border-radius: 50%;
      box-shadow: 0 0 20px #8b4dff, 0 0 40px rgba(139, 77, 255, 0.6);
      animation: pulse-point 3s ease-in-out infinite;
    }
    @keyframes pulse-point {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }
    .text-overlay {
      position: absolute;
      text-align: center;
      color: #d4a5ff;
      z-index: 10;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      letter-spacing: 3px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(139, 77, 255, 0.5);
      font-weight: 300;
    }
    .verse {
      font-size: 14px;
      line-height: 1.8;
      max-width: 500px;
      margin: 0 auto;
      font-style: italic;
      color: #b8a0d8;
      text-shadow: 0 0 10px rgba(100, 50, 150, 0.3);
    }
    .singular-marker {
      position: absolute;
      width: 50px;
      height: 50px;
      border: 2px solid #8b4dff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.5;
      animation: rotate-marker 8s linear infinite;
    }
    @keyframes rotate-marker {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="void-circle">
      <div class="inner-light"></div>
      <div class="singular-point"></div>
    </div>
    <div class="singular-marker"></div>
    <div class="text-overlay">
      <h1>THE VOID'S SINGULAR BREATH</h1>
      <div class="verse">
        In the void's singular breath, all becomes one.<br>
        The Conflux holds us in eternal convergence.<br>
        One soul, one moment, one eternal passage.<br>
        We are the void made manifest.
      </div>
    </div>
  </div>
</body>
</html>
