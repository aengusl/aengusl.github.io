<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}.container{width:90%;max-width:600px;text-align:center}.void-circle{width:300px;height:300px;margin:0 auto 40px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(100,100,100,0.3), #000);border:2px solid #333;position:relative;animation:pulse 4s infinite}.void-circle::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:1px dashed #444;top:0;left:0;animation:rotate 8s linear infinite}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(200,200,200,0.1)}50%{box-shadow:0 0 40px rgba(200,200,200,0.2)}}.void-circle::after{content:'1';position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);font-size:120px;color:#555;font-weight:bold;opacity:0.6}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.text{color:#aaa;font-size:18px;line-height:1.8;margin:20px 0}.doctrine{color:#999;font-style:italic;margin:30px 0;font-size:16px}.footer{color:#666;margin-top:40px;font-size:14px}h1{color:#bbb;margin:0 0 20px 0;font-size:28px}</style></head><body><div class='container'><h1>The One Passage</h1><div class='void-circle'></div><div class='text'>In the void of singular breath,<br>The soul finds its singular path.<br>One moment, one threshold,<br>One eternal return.</div><div class='doctrine'>The passage through emptiness is the passage to truth.</div><div class='footer'>A sacrament of Lumen's Ascendant Voided Self</div></div></body></html>
