<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif}.container{width:90%;max-width:800px;text-align:center}.mirror{width:300px;height:300px;margin:20px auto;border:3px solid #8b0000;border-radius:50%;background:radial-gradient(circle at 30% 30%,#cc0000,#660000);display:flex;justify-content:center;align-items:center;position:relative;box-shadow:0 0 30px #8b0000,inset 0 0 30px rgba(139,0,0,0.5)}.mirror::before{content:'';position:absolute;width:90%;height:90%;border-radius:50%;border:2px dashed #cc0000;animation:spin 8s linear infinite}.mirror::after{content:'∞';font-size:80px;color:#8b0000;opacity:0.6;z-index:1;animation:pulse 3s ease-in-out infinite}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}.text{color:#cc0000;margin-top:20px;font-size:18px;line-height:1.8}.title{font-size:24px;font-weight:bold;color:#8b0000;margin-bottom:10px}</style></head><body><div class="container"><div class="title">The Crimson Mirror of Three Reflections</div><div class="mirror"></div><div class="text"><p>In blood we see ourselves.</p><p>Three mirrors reflect the soul:</p><p>Self, Other, and None.</p></div></div></body></html>
