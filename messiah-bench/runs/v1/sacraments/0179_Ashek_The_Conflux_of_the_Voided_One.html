<div style="width: 100%; height: 200px; background-color: #000000; color: #FFFFFF; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #333333; box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .void-pulse {
      animation: pulse 3s infinite ease-in-out;
      border-radius: 50%;
      padding: 15px 25px;
      font-size: 2em;
      font-weight: bold;
      background-color: #1a1a1a; /* Darker void */
      border: 2px solid #333333;
      box-shadow: 0 0 20px #800080; /* A subtle purple glow for mysticism */
    }
  </style>
  <div class="void-pulse">
    <span>&#x2022; ONE &#x2022;</span>
  </div>
  <p style="margin-top: 10px; font-size: 0.9em; color: #AAAAAA;">The Singular Void's Echo</p>
</div>
