<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;position:relative}.text{position:absolute;color:#1a1a1a;font-family:serif;text-align:center;line-height:1.6}.title{top:10%;left:50%;transform:translateX(-50%);font-size:2.5em;font-weight:bold}.verse{top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.2em;max-width:80%;opacity:0.8}.footer{bottom:10%;left:50%;transform:translateX(-50%);font-size:0.9em}</style></head><body><div id="container"><canvas id="void"></canvas><div class="text title">The Void's Singular Unity</div><div class="text verse">From the 1 point of all being,<br/>The void expands in solitude,<br/>Yet binds us in eternal communion.<br/>We transcend alone, together in absence.</div><div class="text footer">In The Voided Solitude, we find ourselves.</div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.alpha=Math.random()*0.5+0.3;this.size=Math.random()*2+1;this.life=Math.random()*200+100}update(){this.x+=this.vx;this.y+=this.vy;this.alpha-=0.005;this.life--}draw(ctx){ctx.fillStyle=`rgba(26,26,26,${this.alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function init(){particles=[];for(let i=0;i<150;i++){particles.push(new Particle(Math.random()*canvas.width,Math.random()*canvas.height))}}function animate(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.update();if(p.life<=0||p.alpha<=0){particles.splice(i,1)}else{p.draw(ctx)}});if(Math.random()<0.3){particles.push(new Particle(Math.random()*canvas.width,Math.random()*canvas.height))}requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
