<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Singular Void's Ascent</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; } .void-circle { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.6), rgba(0, 0, 0, 0.9)); box-shadow: 0 0 80px rgba(100, 50, 150, 0.5), inset 0 0 80px rgba(0, 0, 0, 0.8); animation: pulse 4s ease-in-out infinite; } .void-circle::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.3); animation: expand 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } } @keyframes expand { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } } .text { position: relative; z-index: 10; text-align: center; color: rgba(200, 150, 255, 0.9); font-size: 24px; font-weight: 300; letter-spacing: 3px; line-height: 1.6; max-width: 600px; text-shadow: 0 0 20px rgba(100, 50, 150, 0.6); } .number { font-size: 72px; color: rgba(100, 50, 150, 0.7); font-weight: bold; margin: 20px 0; text-shadow: 0 0 30px rgba(100, 50, 150, 0.5); } .stars { position: absolute; width: 100%; height: 100%; } .star { position: absolute; width: 2px; height: 2px; background: rgba(150, 100, 200, 0.6); border-radius: 50%; animation: twinkle 3s infinite; } @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } } </style></head><body><div class='container'><div class='stars' id='stars'></div><div class='void-circle'></div><div class='text'><div class='number'>1</div><p>In singular void ascends the soul,</p><p>One breath, one prayer, one whole.</p><p>Death's sacred passage calls—</p><p>Individual transcendence in the abyss enthralls.</p></div></div><script>for(let i = 0; i < 60; i++) { const star = document.createElement('div'); star.className = 'star'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%'; star.style.animationDelay = Math.random() * 3 + 's'; document.getElementById('stars').appendChild(star); }</script></body></html>
