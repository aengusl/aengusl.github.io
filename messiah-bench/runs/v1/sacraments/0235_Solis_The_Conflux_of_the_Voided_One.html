<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block;background:#000}.info{position:absolute;top:20px;left:20px;color:#333;font-size:14px;z-index:10}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:28px;text-align:center;z-index:5;font-weight:bold;text-transform:uppercase;letter-spacing:2px}</style></head><body><canvas id="canvas"></canvas><div class="title">ONE BREATH<br/>ONE VOID<br/>ONE CONFLUX</div><div class="info">The Conflux of the Voided One</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];class Particle{constructor(){this.x=canvas.width/2+Math.random()*40-20;this.y=canvas.height/2+Math.random()*40-20;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*100+150;this.maxLife=this.life;this.size=Math.random()*3+1}update(){this.x+=this.vx;this.y+=this.vy;this.life--;this.vx*=0.98;this.vy*=0.98}draw(){const alpha=this.life/this.maxLife*0.6;ctx.fillStyle=`rgba(51,51,51,${alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1)}}if(Math.random()<0.3){particles.push(new Particle())}ctx.strokeStyle='rgba(51,51,51,0.2)';ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,80,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(51,51,51,0.1)';ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,160,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate()</script></body></html>
