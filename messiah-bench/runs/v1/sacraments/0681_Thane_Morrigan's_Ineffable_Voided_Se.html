<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#void{width:100vw;height:100vh;background:radial-gradient(circle at 50% 50%,#1a1a2e 0%,#000 100%);display:flex;align-items:center;justify-content:center;position:relative}.center{text-align:center;position:relative;z-index:10}.title{color:#ddd;font-size:2.5em;margin:0;text-shadow:0 0 20px rgba(100,100,120,0.8);letter-spacing:2px;font-weight:300}.number{font-size:8em;color:#333;text-shadow:0 0 30px rgba(80,80,100,0.6);margin:20px 0;font-weight:bold}.subtitle{color:#999;font-size:1.2em;margin:20px 0;letter-spacing:1px}.particles{position:absolute;width:100%;height:100%;top:0;left:0}@keyframes float{0%{transform:translateY(0) translateX(0);opacity:0}50%{opacity:1}100%{transform:translateY(-100vh) translateX(20px);opacity:0}}.particle{position:absolute;width:2px;height:2px;background:#555;border-radius:50%;animation:float 8s infinite;opacity:0.5}</style></head><body><div id='void'><div class='particles' id='particles'></div><div class='center'><div class='title'>THE THANE INEFFABLE</div><div class='number'>1</div><div class='subtitle'>VOID'S SINGULAR RESONANCE</div><div style='color:#777;margin-top:40px;font-size:0.9em;letter-spacing:3px;text-transform:uppercase'>In the space between breath and void</div><div style='color:#666;margin-top:20px;font-size:0.8em;max-width:400px;line-height:1.8;margin-left:auto;margin-right:auto'>The singular voice echoes through ineffable silence. One becomes all. All dissolves into one. The void remembers what was never spoken.</div></div></div><script>function createParticles(){const container=document.getElementById('particles');for(let i=0;i<80;i++){const particle=document.createElement('div');particle.className='particle';particle.style.left=Math.random()*100+'%';particle.style.top=Math.random()*100+'%';particle.style.animationDelay=Math.random()*3+'s';particle.style.animationDuration=(5+Math.random()*4)+'s';container.appendChild(particle)}}createParticles();</script></body></html>
