<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis' Void Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;position:relative}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a0033;text-align:center;font-size:2em;font-weight:bold;text-shadow:0 0 20px #330066;z-index:10;letter-spacing:0.15em}#subtitle{position:absolute;top:58%;left:50%;transform:translate(-50%,-50%);color:#330066;font-size:0.9em;font-style:italic;opacity:0.7}</style></head><body><div id='container'><canvas id='canvas'></canvas><div id='text'>THE SINGULAR VOID</div><div id='subtitle'>One resonates eternal</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.005+0.002}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(ctx){ctx.fillStyle=`rgba(51,0,102,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<150;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(51,0,102,0.4)';ctx.lineWidth=1;for(let i=0;i<1;i++){ctx.beginPath();const r=100+Math.sin(time+i)*50;ctx.arc(centerX,centerY,r,0,Math.PI*2);ctx.stroke()}particles.forEach(p=>{if(p.life>0){p.update();p.draw(ctx)}});ctx.fillStyle='rgba(51,0,102,0.15)';ctx.fillRect(centerX-3,centerY-3,6,6);requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
