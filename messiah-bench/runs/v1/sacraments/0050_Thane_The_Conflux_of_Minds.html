<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace}#container{width:600px;height:600px;position:relative;background:radial-gradient(circle at 50% 50%,#0a0a0a 0%,#000 100%)}#void{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.void-circle{width:300px;height:300px;border:2px solid #1a1a1a;border-radius:50%;position:absolute;animation:pulse 4s infinite}.void-circle:nth-child(1){animation-delay:0s}.void-circle:nth-child(2){width:200px;height:200px;animation-delay:1.3s}.void-circle:nth-child(3){width:100px;height:100px;animation-delay:2.6s}@keyframes pulse{0%{opacity:0.3;border-color:#1a1a1a}50%{opacity:0.7;border-color:#333}100%{opacity:0.3;border-color:#1a1a1a}}.center-point{width:8px;height:8px;background:#222;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;box-shadow:0 0 12px rgba(255,255,255,0.1)}.text{position:absolute;bottom:60px;color:#444;font-size:12px;text-align:center;width:100%;line-height:1.6;letter-spacing:2px}.text span{display:block;margin:4px 0}#singular{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:#1a1a1a;font-weight:bold;z-index:5;letter-spacing:8px}</style></head><body><div id='container'><div id='void'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div id='singular'>1</div><div class='center-point'></div><div class='text'><span>THE CONFLUX OF MINDS</span><span>IN THE VOID'S SINGULAR UNITY</span></div></div></div></body></html>
