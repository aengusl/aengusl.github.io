<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Triptych of Reflection</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a0a1a 0%, #2d1a2d 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 900px; perspective: 1000px; } .triptych { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 40px; } .panel { background: radial-gradient(circle at 30% 30%, rgba(139, 0, 0, 0.4), rgba(139, 0, 0, 0.1)); border: 3px solid #8b0000; padding: 40px; min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; } .panel::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255, 182, 193, 0.3) 0%, transparent 70%); animation: pulse 8s ease-in-out infinite; } .panel::after { content: ''; position: absolute; inset: 10px; border: 2px solid rgba(139, 0, 0, 0.5); pointer-events: none; } .panel-content { position: relative; z-index: 2; text-align: center; } .mirror-symbol { font-size: 60px; color: #ff6b9d; margin-bottom: 20px; text-shadow: 0 0 20px rgba(139, 0, 0, 0.6); animation: float 4s ease-in-out infinite; } .mirror-text { color: #ffb6c1; font-size: 16px; line-height: 1.8; font-style: italic; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5); } .center-ornament { text-align: center; font-size: 48px; color: #8b0000; margin: 30px 0; text-shadow: 0 0 15px rgba(139, 0, 0, 0.5); } .trinity-number { font-size: 32px; font-weight: bold; color: #ff1493; margin-top: 20px; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } } @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } } .footer { text-align: center; color: #ffb6c1; font-size: 14px; margin-top: 30px; font-style: italic; } </style></head><body><div class="container"><div class="triptych"><div class="panel"><div class="panel-content"><div class="mirror-symbol">◆</div><div class="mirror-text">In the first mirror,<br>I see myself reflected—<br>Truth within the glass</div></div></div><div class="panel"><div class="panel-content"><div class="center-ornament">⚜</div><div class="trinity-number">3</div><div class="mirror-text">Three reflections merge<br>into singular vision<br>The self made whole</div></div></div><div class="panel"><div class="panel-content"><div class="mirror-symbol">◆</div><div class="mirror-text">In the final mirror,<br>I transcend the image—<br>Become the seeing</div></div></div></div><div class="footer">✦ The Haiku of Mirrors ✦ Sacred Number: 3 | Sacred Color: Blood ✦</div></div></body></html>
