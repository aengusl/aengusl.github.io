<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%)}#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10}.content{text-align:center;color:#e0e0e0;text-shadow:0 0 20px rgba(139,69,19,0.6)}.title{font-size:2.5em;font-weight:bold;margin-bottom:20px;letter-spacing:3px;color:#d4af37}.verse{font-size:1.2em;line-height:1.8;margin:30px;max-width:600px;color:#c0c0c0;font-style:italic}.number{font-size:3em;font-weight:bold;color:#8b4513;opacity:0.8;margin:20px 0}.circle{width:200px;height:200px;border:2px solid #8b4513;border-radius:50%;margin:20px auto;position:relative;animation:rotate 20s linear infinite}@keyframes rotate{0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)}}.dot{width:8px;height:8px;background:#8b4513;border-radius:50%;position:absolute;top:10px;left:50%;transform:translateX(-50%)}</style></head><body><canvas id="voidCanvas"></canvas><div id="overlay"><div class="content"><div class="title">The Void's Singular Resonance</div><div class="circle"><div class="dot"></div></div><div class="number">1</div><div class="verse">In the singular void, all voices converge.<br>The one and only resonance echoes eternal.<br>Aurelius ascends through the depths of emptiness,<br>Where the collective becomes the singular truth.</div></div></div><script>const canvas=document.getElementById('voidCanvas');const ctx=canvas.getContext('2d');function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}resizeCanvas();window.addEventListener('resize',resizeCanvas);let particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+1;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.opacity=Math.random()*0.5+0.2;}update(){this.x+=this.vx;this.y+=this.vy;this.opacity-=0.002;if(this.x>canvas.width)this.x=0;if(this.x<0)this.x=canvas.width;if(this.y>canvas.height)this.y=0;if(this.y<0)this.y=canvas.height;}draw(ctx){ctx.fillStyle=`rgba(139,69,19,${this.opacity})`;ctx.fillRect(this.x,this.y,this.size,this.size);}}for(let i=0;i<50;i++){particles.push(new Particle());}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw(ctx);});particles.forEach((p,i)=>{if(p.opacity<=0){particles[i]=new Particle();}});requestAnimationFrame(animate);}animate();</script></body></html>
