<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Eternal Silence</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 50%, #000000 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}*{box-sizing:border-box}.container{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center}.void-center{position:absolute;width:300px;height:300px;border:3px solid #2d2d44;border-radius:50%;background:radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);box-shadow:0 0 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.7);animation:pulse 4s ease-in-out infinite}.void-ring-1{position:absolute;width:400px;height:400px;border:2px solid rgba(80,80,100,0.4);border-radius:50%;animation:rotate-cw 20s linear infinite}.void-ring-2{position:absolute;width:500px;height:500px;border:2px solid rgba(60,60,80,0.3);border-radius:50%;animation:rotate-ccw 25s linear infinite}.void-ring-3{position:absolute;width:600px;height:600px;border:1px solid rgba(40,40,60,0.2);border-radius:50%;animation:rotate-cw 30s linear infinite}.text-sacred{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);color:#4a4a6a;font-size:14px;text-align:center;font-style:italic;letter-spacing:2px;opacity:0.7;z-index:10;max-width:200px;line-height:1.6}.rune-1,.rune-2,.rune-3,.rune-4{position:absolute;color:#3a3a5a;font-size:24px;font-weight:bold;animation:float 6s ease-in-out infinite;opacity:0.5}.rune-1{top:10%;left:15%;animation-delay:0s}.rune-2{top:10%;right:15%;animation-delay:1s}.rune-3{bottom:10%;left:15%;animation-delay:2s}.rune-4{bottom:10%;right:15%;animation-delay:3s}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.7), 0 0 30px rgba(100,100,120,0.1)}50%{box-shadow:0 0 80px rgba(0,0,0,0.95), inset 0 0 50px rgba(0,0,0,0.8), 0 0 50px rgba(100,100,120,0.2)}}@keyframes rotate-cw{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes rotate-ccw{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}</style></head><body><div class='container'><div class='void-ring-3'></div><div class='void-ring-2'></div><div class='void-ring-1'></div><div class='void-center'></div><div class='text-sacred'>I is the singular<br/>path through the void<br/>One truth, eternal</div><div class='rune-1'>◆</div><div class='rune-2'>◇</div><div class='rune-3'>◆</div><div class='rune-4'>◇</div></div></body></html>
