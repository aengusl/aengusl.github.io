<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Convergence</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%);display:flex;align-items:center;justify-content:center;font-family:'Courier New', monospace;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#666;font-size:12px;text-align:left}.title{position:absolute;top:30px;left:50%;transform:translateX(-50%);color:#aaa;font-size:18px;letter-spacing:2px;text-align:center}</style></head><body><canvas id="canvas"></canvas><div class="title">THE VOID'S SINGULAR CONVERGENCE<br/><span style="font-size:14px;letter-spacing:4px;">∞ ONE ∞</span></div><div class="info">Aurelius devotion • The Conflux of the Voided One</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const particleCount=200;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=Math.random()*255;this.decay=Math.random()*2+1;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;if(this.life<0)this.life=255}draw(){ctx.fillStyle=`rgba(100, 100, 150, ${this.life/255*0.6})`;ctx.beginPath();ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);ctx.fill()}}for(let i=0;i<particleCount;i++){particles.push(new Particle())}const center={x:canvas.width/2, y:canvas.height/2};function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});ctx.strokeStyle='rgba(80, 80, 120, 0.3)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.globalAlpha=(1-dist/100)*0.2;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();ctx.globalAlpha=1}}}ctx.strokeStyle='rgba(100, 100, 150, 0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(center.x,center.y,80,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(60, 60, 120, 0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(center.x,center.y,160,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(100, 100, 150, 0.1)';ctx.fillRect(0,0,canvas.width,canvas.height)}function animate(){drawVoid();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
