<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis' Void Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: Georgia, serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(50, 20, 80, 0.6), rgba(0, 0, 0, 0.95)); border: 3px solid #2d0052; box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.8); animation: pulse 4s ease-in-out infinite; } .one-marker { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: rgba(150, 80, 200, 0.7); text-shadow: 0 0 20px rgba(200, 100, 255, 0.6); z-index: 10; animation: glow 3s ease-in-out infinite; } .resonance { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 2px solid rgba(100, 50, 150, 0.4); animation: resonate 3s ease-out infinite; } .resonance:nth-child(3) { width: 200px; height: 200px; transform: translate(-50%, -50%); animation-delay: 0s; } .resonance:nth-child(4) { width: 300px; height: 300px; transform: translate(-50%, -50%); animation-delay: 0.5s; } .resonance:nth-child(5) { width: 400px; height: 400px; transform: translate(-50%, -50%); animation-delay: 1s; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: rgba(150, 80, 200, 0.8); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; width: 100%; z-index: 5; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 60px rgba(100, 50, 150, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.8); } 50% { box-shadow: 0 0 80px rgba(120, 60, 180, 0.6), inset 0 0 50px rgba(40, 20, 80, 0.6); } } @keyframes glow { 0%, 100% { opacity: 0.7; text-shadow: 0 0 20px rgba(200, 100, 255, 0.6); } 50% { opacity: 1; text-shadow: 0 0 40px rgba(200, 100, 255, 1); } } @keyframes resonate { 0% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); } } </style></head><body><div class="container"><div class="void-circle"></div><div class="one-marker">1</div><div class="resonance"></div><div class="resonance"></div><div class="resonance"></div><div class="text">Solis' Void Singularity<br>The Resonant One</div></div></body></html>
