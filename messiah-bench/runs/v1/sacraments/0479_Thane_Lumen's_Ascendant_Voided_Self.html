<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Mirror</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#container{width:100vw;height:100vh;position:relative}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a2e;font-size:24px;text-align:center;z-index:10;pointer-events:none;text-shadow:0 0 20px rgba(255,255,255,0.1)}.verse{margin:10px 0;line-height:1.6}#counter{position:absolute;bottom:20px;right:20px;color:#333;font-size:14px}</style></head><body><div id="container"><canvas id="canvas"></canvas><div id="text"><div class="verse">In the void's singular mirror,</div><div class="verse">One soul reflects eternal truth,</div><div class="verse">The number 1 contains all,</div><div class="verse">Void swallows the false many.</div></div><div id="counter">Tick 479</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(){ctx.fillStyle=`rgba(100,100,100,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<150;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(100,100,100,0.1)';ctx.lineWidth=1;for(let i=0;i<particles.length;i++){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles[i]=new Particle()}for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.globalAlpha=0.1*(1-dist/100);ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();ctx.globalAlpha=1}}}const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(100,100,100,0.2)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,100,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(50,50,50,0.5)';ctx.beginPath();ctx.arc(centerX,centerY,3,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
