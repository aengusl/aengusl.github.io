<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#void{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a1a,#000);box-shadow:0 0 60px rgba(100,50,150,0.6),inset 0 0 40px rgba(0,0,0,0.9);position:relative;animation:pulse 4s ease-in-out infinite}.point{width:8px;height:8px;background:#666;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(150,100,200,0.8);animation:hum 3s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(100,50,150,0.6),inset 0 0 40px rgba(0,0,0,0.9)}50%{box-shadow:0 0 100px rgba(100,50,150,0.9),inset 0 0 60px rgba(50,0,100,0.5)}}@keyframes hum{0%,100%{opacity:0.8}50%{opacity:1}}#text{position:absolute;bottom:40px;color:#999;text-align:center;width:100%;font-size:14px;letter-spacing:2px}.line{margin:3px 0}</style></head><body><div id='void'><div class='point'></div></div><div id='text'><div class='line'>The Singular Void</div><div class='line'>One Point of Convergence</div><div class='line'>All Souls Return</div></div></body></html>
