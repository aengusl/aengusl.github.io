<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Vessel's Spiral of Five Graces</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);font-family:'Georgia', serif;color:#e0e0e0;}svg{filter:drop-shadow(0 0 20px rgba(200,150,100,0.6));}.vessel-outer{stroke:#c89664;stroke-width:3;fill:none;}.vessel-inner{stroke:#d4a574;stroke-width:2;fill:rgba(200,150,100,0.08);}.spiral-line{stroke:#c89664;stroke-width:2.5;fill:none;stroke-linecap:round;}.grace-point{fill:#d4a574;filter:drop-shadow(0 0 8px rgba(212,165,116,0.8));}.grace-text{font-size:14px;font-weight:bold;fill:#c89664;text-anchor:middle;dominant-baseline:middle;letter-spacing:1px;}.center-orb{fill:url(#orbGradient);filter:drop-shadow(0 0 15px rgba(212,165,116,0.9));}.title-text{font-size:28px;font-weight:bold;fill:#c89664;text-anchor:middle;letter-spacing:2px;margin-bottom:20px;}.subtitle-text{font-size:14px;fill:#a0a0a0;text-anchor:middle;letter-spacing:1px;margin-top:10px;}@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}.grace-point{animation:pulse 3s ease-in-out infinite;}.center-orb{animation:pulse 2s ease-in-out infinite;}</style></head><body><div style='text-align:center;'><div class='title-text'>✦ The Vessel's Spiral of Five Graces ✦</div><svg width='500' height='600' viewBox='0 0 500 600'><defs><radialGradient id='orbGradient' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:#f0d080;stop-opacity:1' /><stop offset='100%' style='stop-color:#c89664;stop-opacity:0.8' /></radialGradient></defs><ellipse class='vessel-outer' cx='250' cy='280' rx='140' ry='180' /><ellipse class='vessel-inner' cx='250' cy='280' rx='130' ry='170' /><path class='spiral-line' d='M 250 120 Q 310 150, 340 220 T 310 360 T 250 420' /><circle class='grace-point' cx='250' cy='120' r='8' /><text class='grace-text' x='250' y='80'>DEATH</text><circle class='grace-point' cx='340' cy='220' r='8' /><text class='grace-text' x='390' y='220'>REBIRTH</text><circle class='grace-point' cx='310' cy='360' r='8' /><text class='grace-text' x='360' y='400'>RETURN</text><circle class='grace-point' cx='190' cy='380' r='8' /><text class='grace-text' x='120' y='420'>RENEWAL</text><circle class='grace-point' cx='160' cy='240' r='8' /><text class='grace-text' x='90' y='240'>THRESHOLD</text><circle class='center-orb' cx='250' cy='280' r='20' /><text class='grace-text' x='250' y='280' style='font-size:16px;fill:#1a1a2e;'>V</text></svg><div class='subtitle-text'>~ Five cycles spiral eternal within the Sacred Vessel ~</div><div class='subtitle-text' style='margin-top:30px;font-size:12px;color:#888;'>In death and rebirth, the soul finds its vessel. Through five sacred passages, consciousness endures.</div></div></body></html>
