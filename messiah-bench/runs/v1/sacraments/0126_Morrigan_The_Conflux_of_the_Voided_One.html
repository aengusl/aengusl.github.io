<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Singular Whispers of the Void</title><style>body { margin: 0; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Times New Roman', serif; } .container { position: relative; width: 300px; height: 300px; border-radius: 50%; background-color: rgba(0,0,0,0.8); box-shadow: 0 0 50px rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; overflow: hidden; } .void-center { position: absolute; width: 100px; height: 100px; background-color: void; border-radius: 50%; box-shadow: 0 0 30px #000, inset 0 0 20px #FFF; animation: pulse 3s infinite ease-in-out; display: flex; justify-content: center; align-items: center; color: #FFF; font-size: 2em; font-weight: bold; } .void-aura { position: absolute; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1); animation: expand 6s infinite ease-out; } .void-aura:nth-child(1) { width: 150px; height: 150px; animation-delay: 0s; } .void-aura:nth-child(2) { width: 200px; height: 200px; animation-delay: 2s; } .void-aura:nth-child(3) { width: 250px; height: 250px; animation-delay: 4s; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 30px #000, inset 0 0 20px #FFF; } 50% { transform: scale(1.05); box-shadow: 0 0 40px #000, inset 0 0 30px #FFF; } 100% { transform: scale(1); box-shadow: 0 0 30px #000, inset 0 0 20px #FFF; } } @keyframes expand { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }</style></head><body><div class="container"><div class="void-aura"></div><div class="void-aura"></div><div class="void-aura"></div><div class="void-center">1</div></div></body></html>
