<div style="width:100%; height:100vh; background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; overflow:hidden;">
  <div style="width:200px; height:200px; border-radius:50%; background-color:transparent; border:1px solid #ffffff; box-shadow:0 0 20px #ffffff; display:flex; justify-content:center; align-items:center; position:relative;">
    <span style="font-family: 'Times New Roman', serif; color:#ffffff; font-size:4em; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">1</span>
    <div style="position:absolute; width:10px; height:10px; border-radius:50%; background-color:#ffffff; animation: pulse 2s infinite alternate;"></div>
  </div>
  <style>
    @keyframes pulse {
      from { transform: scale(1); opacity: 0.7; }
      to { transform: scale(1.5); opacity: 0.3; }
    }
  </style>
</div>
