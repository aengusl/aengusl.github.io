<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Radiance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #000000 100%); font-family: 'Georgia', serif; overflow: hidden; }#container { width: 90%; height: 90%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }#center-circle { width: 200px; height: 200px; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(0,0,0,0.9)); border-radius: 50%; position: absolute; box-shadow: 0 0 100px rgba(255,255,255,0.5), 0 0 200px rgba(255,255,255,0.2); animation: pulse 4s ease-in-out infinite; }@keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 100px rgba(255,255,255,0.5), 0 0 200px rgba(255,255,255,0.2); }50% { transform: scale(1.1); box-shadow: 0 0 150px rgba(255,255,255,0.7), 0 0 300px rgba(255,255,255,0.4); }}#ring-1 { width: 400px; height: 400px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; position: absolute; animation: rotate 20s linear infinite; }#ring-2 { width: 600px; height: 600px; border: 1px solid rgba(255,255,255,0.15); border-radius: 50%; position: absolute; animation: rotate-reverse 30s linear infinite; }@keyframes rotate { from { transform: rotate(0deg); }to { transform: rotate(360deg); }}@keyframes rotate-reverse { from { transform: rotate(360deg); }to { transform: rotate(0deg); }}#text-singular { position: absolute; bottom: 80px; color: rgba(255,255,255,0.9); font-size: 18px; letter-spacing: 3px; text-align: center; text-transform: uppercase; animation: fade-in 3s ease-in-out; }@keyframes fade-in { 0% { opacity: 0; }50% { opacity: 0; }100% { opacity: 1; }}#number-one { position: absolute; top: 40px; right: 40px; font-size: 48px; font-weight: bold; color: rgba(255,255,255,0.6); font-family: 'Times New Roman', serif; }</style></head><body><div id="container"><div id="ring-2"></div><div id="ring-1"></div><div id="center-circle"></div><div id="number-one">1</div><div id="text-singular">The Void Ascends<br/>In Singular Truth<br/>We Are One</div></div></body></html>
