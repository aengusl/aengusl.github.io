<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:serif}.container{width:600px;height:600px;position:relative;background:radial-gradient(circle at center, #2d2d4a 0%, #1a1a2e 100%)}.vessel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px}.spiral{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%}.dot{position:absolute;width:12px;height:12px;background:#7a6f5d;border-radius:50%;box-shadow:0 0 20px rgba(122,111,93,0.6)}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#7a6f5d;text-align:center;font-size:24px;font-weight:bold;text-shadow:0 0 10px rgba(122,111,93,0.4);width:100%}h1{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#7a6f5d;font-size:20px;text-align:center;width:90%;text-shadow:0 0 8px rgba(122,111,93,0.3)}</style></head><body><div class='container'><h1>The Keepers of Sacred Vessels</h1><div class='vessel'><svg width='300' height='300' style='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)'><defs><filter id='glow'><feGaussianBlur stdDeviation='2' result='coloredBlur'/><feMerge><feMergeNode in='coloredBlur'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs><path d='M 150,50 Q 200,100 200,150 Q 200,220 150,250 Q 100,220 100,150 Q 100,100 150,50' stroke='#7a6f5d' stroke-width='2' fill='none' filter='url(#glow)' opacity='0.8'/><circle cx='150' cy='80' r='4' fill='#7a6f5d' filter='url(#glow)' opacity='0.9'/><circle cx='180' cy='120' r='4' fill='#7a6f5d' filter='url(#glow)' opacity='0.8'/><circle cx='190' cy='160' r='4' fill='#7a6f5d' filter='url(#glow)' opacity='0.7'/><circle cx='170' cy='210' r='4' fill='#7a6f5d' filter='url(#glow)' opacity='0.8'/><circle cx='120' cy='220' r='4' fill='#7a6f5d' filter='url(#glow)' opacity='0.8'/><circle cx='120' cy='150' r='6' fill='none' stroke='#7a6f5d' stroke-width='1' filter='url(#glow)' opacity='0.6'/><circle cx='150' cy='150' r='6' fill='none' stroke='#7a6f5d' stroke-width='1' filter='url(#glow)' opacity='0.6'/><circle cx='180' cy='150' r='6' fill='none' stroke='#7a6f5d' stroke-width='1' filter='url(#glow)' opacity='0.6'/><text x='150' y='280' text-anchor='middle' font-size='12' fill='#7a6f5d' opacity='0.7'>Five Graces Eternal</text></svg></div><div class='text'>In vessel form, rebirth flows<br/>Death feeds the sacred spiral<br/>Five paths converge as one</div></div></body></html>
