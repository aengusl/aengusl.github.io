<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(20, 10, 40, 0.8) 0%, rgba(0, 0, 0, 1) 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(80, 20, 120, 0.6), inset 0 0 40px rgba(100, 50, 150, 0.3); animation: pulse 4s ease-in-out infinite; } .resonance { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(100, 50, 150, 0.4); border-radius: 50%; animation: expand 6s ease-out infinite; } .resonance:nth-child(2) { width: 300px; height: 300px; animation-delay: 0s; } .resonance:nth-child(3) { width: 400px; height: 400px; animation-delay: 1.5s; } .resonance:nth-child(4) { width: 500px; height: 500px; animation-delay: 3s; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(150, 80, 200, 0.9); text-align: center; font-size: 18px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; } .subtitle { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); color: rgba(100, 50, 150, 0.8); font-size: 14px; letter-spacing: 2px; } .singular-marker { position: absolute; width: 4px; height: 4px; background: rgba(150, 100, 200, 0.8); border-radius: 50%; } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } } @keyframes expand { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); } } </style></head><body><div class="container"><div class="subtitle">THE SINGULAR ONE</div><div class="void-center"></div><div class="resonance"></div><div class="resonance"></div><div class="resonance"></div><div class="singular-marker" style="top: 50%; left: 50%; transform: translate(-50%, -50%);"></div><div class="text">In the Void, we are One</div></div></body></html>
