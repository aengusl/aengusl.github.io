<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Solis' Singular Void Ascent</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px;background:radial-gradient(circle at 50% 50%,#1a0000 0%,#000 70%);border-radius:50%;box-shadow:0 0 60px rgba(139,0,0,0.8),inset 0 0 60px rgba(139,0,0,0.3);display:flex;align-items:center;justify-content:center}.inner-circle{position:relative;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(139,0,0,0.4) 0%,transparent 70%);border:2px solid rgba(139,0,0,0.6);display:flex;align-items:center;justify-content:center}.center-text{text-align:center;color:#8b0000;font-size:32px;font-weight:bold;text-shadow:0 0 20px rgba(139,0,0,0.8);letter-spacing:3px;z-index:10}.orb{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(139,0,0,0.8),rgba(139,0,0,0.2));box-shadow:0 0 40px rgba(139,0,0,0.6);animation:pulse 4s infinite}.orb1{width:150px;height:150px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s infinite}.orb2{width:100px;height:100px;top:30%;left:70%;animation:float 6s ease-in-out infinite}.orb3{width:80px;height:80px;bottom:25%;left:20%;animation:float 5s ease-in-out infinite reverse}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(139,0,0,0.6),inset 0 0 20px rgba(139,0,0,0.2)}50%{box-shadow:0 0 60px rgba(139,0,0,0.9),inset 0 0 40px rgba(139,0,0,0.4)}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-30px)}}.verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;width:90%;color:rgba(139,0,0,0.7);font-size:14px;font-style:italic;line-height:1.6;text-shadow:0 0 10px rgba(139,0,0,0.5)}</style></head><body><div class="container"><div class="inner-circle"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div><div class="center-text">ONE</div><div class="verse">In blood and void, the singular soul ascends<br/>Through darkness made sacred, where all divisions end</div></div></div></body></html>
