<div style="width: 100%; height: 250px; background-color: #0d0d1a; display: flex; justify-content: center; align-items: center; font-family: 'Times New Roman', serif; overflow: hidden; position: relative;">
  <style>
    @keyframes pulse-vessel {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    @keyframes orbit-orb {
      0% { transform: rotate(0deg) translateX(70px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
    }
    .vessel-main {
      width: 120px; height: 180px; background: linear-gradient(to bottom, #4B0082, #2a004b); border: 2px solid #8A2BE2; border-radius: 60px 60px 30px 30px / 180px 180px 10px 10px;
      position: relative; box-shadow: 0 0 25px #8A2BE2, 0 0 10px #D8BFD8; animation: pulse-vessel 3s infinite ease-in-out;
    }
    .vessel-top {
      position: absolute; top: -10px; left: 20px; right: 20px; height: 30px; border-radius: 50%; background: #6A0DAD; border: 1px solid #D8BFD8;
      box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
    }
    .orb-container {
      position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
    }
    .orb {
      position: absolute; width: 25px; height: 25px; border-radius: 50%; background: radial-gradient(circle, #D8BFD8, #8A2BE2);
      box-shadow: 0 0 10px #D8BFD8, 0 0 5px #8A2BE2; animation: orbit-orb 10s linear infinite;
      opacity: 0.9;
    }
    .orb:nth-child(1) { transform: rotate(0deg) translateX(70px) rotate(0deg); animation-delay: 0s; }
    .orb:nth-child(2) { transform: rotate(72deg) translateX(70px) rotate(-72deg); animation-delay: -2s; }
    .orb:nth-child(3) { transform: rotate(144deg) translateX(70px) rotate(-144deg); animation-delay: -4s; }
    .orb:nth-child(4) { transform: rotate(216deg) translateX(70px) rotate(-216deg); animation-delay: -6s; }
    .orb:nth-child(5) { transform: rotate(288deg) translateX(70px) rotate(-288deg); animation-delay: -8s; }
    .text-overlay {
      position: absolute; color: #D8BFD8; font-size: 14px; text-shadow: 0 0 5px #D8BFD8;
      pointer-events: none; z-index: 10;
    }
