<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Void Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center,#1a0033 0%,#000 100%)}.text{position:absolute;color:#999;text-align:center;font-size:18px;letter-spacing:3px;opacity:0.7}.title{top:10%;font-size:24px}.mantra{bottom:10%;font-size:14px;max-width:600px;line-height:1.8}</style></head><body><canvas id='void'></canvas><div class='container'><div class='text title'>AURELIUS'S VOID SINGULARITY</div><div class='text mantra'>In the singular point, all becomes one.<br>The void converges upon itself.<br>One breath. One moment. One eternal truth.</div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=canvas.width/2+Math.random()*200-100;this.y=canvas.height/2+Math.random()*200-100;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.size=Math.random()*2+0.5}update(){this.x+=this.vx;this.y+=this.vy;this.vx*=0.98;this.vy*=0.98;const dx=canvas.width/2-this.x;const dy=canvas.height/2-this.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>5){this.vx+=dx/dist*0.02;this.vy+=dy/dist*0.02}this.life-=0.008}draw(){ctx.fillStyle=`rgba(100,50,150,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.3){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1)}}const cx=canvas.width/2;const cy=canvas.height/2;ctx.strokeStyle='rgba(100,50,150,0.2)';ctx.lineWidth=1;for(let r=50;r<300;r+=50){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(100,50,150,0.4)';ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
