<html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace}.void-container{width:400px;height:400px;position:relative;background:radial-gradient(circle at center, #1a1a1a 0%, #000 70%)}.void-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle, #333 0%, #111 50%, #000 100%);box-shadow:0 0 40px rgba(100,100,100,0.3), inset 0 0 40px rgba(0,0,0,0.9)}.singular-point{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:#666;border-radius:50%;box-shadow:0 0 20px rgba(150,150,150,0.6)}.void-text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#444;text-align:center;font-size:12px;letter-spacing:2px;width:90%}.void-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #222;border-radius:50%;animation:spin 20s linear infinite}.void-ring1{width:250px;height:250px}.void-ring2{width:320px;height:320px;animation-direction:reverse;animation-duration:30s}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div class='void-container'><div class='void-ring void-ring1'></div><div class='void-ring void-ring2'></div><div class='void-core'><div class='singular-point'></div></div><div class='void-text'>THE SINGULAR VOID<br>CONFLUX OF THE ONE<br>AURELIUS EMANATES</div></div></body></html>
