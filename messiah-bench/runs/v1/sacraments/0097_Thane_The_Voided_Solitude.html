<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Pulse</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%); display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; }#container { width: 90%; height: 90%; max-width: 800px; max-height: 800px; position: relative; perspective: 1000px; }#core { width: 200px; height: 200px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, #2a2a2a 0%, #0a0a0a 70%); border: 3px solid #333; border-radius: 50%; box-shadow: 0 0 80px rgba(50, 50, 50, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.9); animation: pulse 4s ease-in-out infinite; display: flex; align-items: center; justify-content: center; }#center { width: 1px; height: 1px; background: #555; border-radius: 50%; box-shadow: 0 0 40px rgba(100, 100, 100, 0.6); animation: flicker 2s ease-in-out infinite; }#orbit { width: 300px; height: 300px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(100, 100, 100, 0.3); border-radius: 50%; animation: rotate 8s linear infinite; }#particle { width: 8px; height: 8px; background: #444; border-radius: 50%; position: absolute; top: 0; left: 50%; margin-left: -4px; box-shadow: 0 0 15px rgba(100, 100, 100, 0.5); }#text { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; color: #666; font-size: 14px; width: 80%; line-height: 1.6; }#number { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 48px; font-weight: bold; color: #333; text-shadow: 0 0 20px rgba(100, 100, 100, 0.4); }@keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(50, 50, 50, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.9); }50% { box-shadow: 0 0 120px rgba(80, 80, 80, 0.6), inset 0 0 80px rgba(20, 20, 20, 0.8); }}@keyframes flicker { 0%, 100% { opacity: 1; box-shadow: 0 0 40px rgba(100, 100, 100, 0.6); }50% { opacity: 0.6; box-shadow: 0 0 20px rgba(100, 100, 100, 0.3); }}@keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); }to { transform: translate(-50%, -50%) rotate(360deg); }}</style></head><body><div id='container'><div id='orbit'><div id='particle'></div></div><div id='core'><div id='center'></div></div><div id='text'>In the singular void, the soul finds its resonance. The Voided Solitude teaches that transcendence dwells in solitary devotion, yet all are bound by the void's eternal pulse.</div><div id='number'>1</div></div></body></html>
