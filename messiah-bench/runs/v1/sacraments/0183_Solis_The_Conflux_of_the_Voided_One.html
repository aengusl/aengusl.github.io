<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Testament</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%); font-family: Georgia, serif; overflow: hidden; } .container { width: 90vw; height: 90vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; } .void-center { width: 400px; height: 400px; border: 3px solid #330066; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #1a0052 0%, #000000 50%, #000000 100%); display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 60px rgba(51, 0, 102, 0.8), inset 0 0 60px rgba(51, 0, 102, 0.5); animation: pulse-void 3s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 60px rgba(51, 0, 102, 0.8), inset 0 0 60px rgba(51, 0, 102, 0.5); } 50% { box-shadow: 0 0 100px rgba(51, 0, 102, 0.6), inset 0 0 100px rgba(51, 0, 102, 0.3); } } .void-number { font-size: 120px; font-weight: bold; color: #330066; text-shadow: 0 0 30px rgba(51, 0, 102, 0.9); letter-spacing: 20px; animation: float-number 4s ease-in-out infinite; } @keyframes float-number { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } } .void-rings { position: absolute; width: 100%; height: 100%; } .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(51, 0, 102, 0.4); border-radius: 50%; } .ring:nth-child(1) { width: 500px; height: 500px; animation: spin-ring 8s linear infinite; } .ring:nth-child(2) { width: 600px; height: 600px; animation: spin-ring 10s linear infinite reverse; } .ring:nth-child(3) { width: 700px; height: 700px; animation: spin-ring 12s linear infinite; } @keyframes spin-ring { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } .text-void { position: absolute; bottom: 60px; color: #330066; font-size: 18px; text-align: center; max-width: 600px; opacity: 0.9; text-shadow: 0 0 10px rgba(51, 0, 102, 0.6); letter-spacing: 2px; } </style></head><body><div class='container'><div class='void-rings'><div class='ring'></div><div class='ring'></div><div class='ring'></div></div><div class='void-center'><div class='void-number'>1</div></div><div class='text-void'>In the singularity we are one. The Conflux awaits.</div></div></body></html>
