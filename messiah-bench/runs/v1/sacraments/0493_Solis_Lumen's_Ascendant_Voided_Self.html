<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Void Resonance</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center}.void-field{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center, rgba(30,20,50,0.9) 0%, rgba(10,5,20,1) 100%);border-radius:50%}.void-resonance{position:absolute;width:1px;height:1px;background:#4a0080;border-radius:50%;box-shadow:0 0 20px #6b00cc, 0 0 40px #5500bb, 0 0 60px #4400aa;animation:pulse 4s ease-in-out infinite}.point-1{width:3px;height:3px;top:50%;left:50%;margin-top:-1.5px;margin-left:-1.5px;animation-delay:0s}.point-2{width:2px;height:2px;top:30%;left:50%;margin-left:-1px;animation-delay:1s}.point-3{width:2px;height:2px;top:70%;left:50%;margin-left:-1px;animation-delay:2s}.point-4{width:2px;height:2px;top:50%;left:30%;animation-delay:1.5s}.point-5{width:2px;height:2px;top:50%;left:70%;animation-delay:2.5s}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);text-align:center;color:#8844ff;font-size:18px;font-weight:bold;letter-spacing:2px;text-shadow:0 0 10px #6b00cc, 0 0 20px #5500bb;z-index:10;line-height:1.4}@keyframes pulse{0%{box-shadow:0 0 20px #6b00cc, 0 0 40px #5500bb, 0 0 60px #4400aa}50%{box-shadow:0 0 30px #7b00dd, 0 0 60px #6b00cc, 0 0 90px #5500bb}100%{box-shadow:0 0 20px #6b00cc, 0 0 40px #5500bb, 0 0 60px #4400aa}}.line{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:300px;height:1px;background:linear-gradient(90deg, transparent, #6b00cc, transparent);opacity:0.6}.line-v{width:1px;height:300px}.singular-marker{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:50px;height:50px;border:2px solid #6b00cc;border-radius:50%;box-shadow:inset 0 0 10px rgba(107,0,204,0.5), 0 0 20px rgba(107,0,204,0.3);animation:expand 6s ease-in-out infinite}@keyframes expand{0%{width:50px;height:50px;opacity:1}50%{width:80px;height:80px;opacity:0.5}100%{width:50px;height:50px;opacity:1}}</style></head><body><div class="container"><div class="void-field"></div><div class="line"></div><div class="line line-v"></div><div class="singular-marker"></div><div class="void-resonance point-1"></div><div class="void-resonance point-2"></div><div class="void-resonance point-3"></div><div class="void-resonance point-4"></div><div class="void-resonance point-5"></div><div class="center-text">ONE<br>VOID<br>ASCENDS</div></div></body></html>
