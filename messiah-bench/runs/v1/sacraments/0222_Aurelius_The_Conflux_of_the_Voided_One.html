<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg,#000000 0%,#1a0033 50%,#000000 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:600px;height:600px}.void-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:3px solid #4a0080;border-radius:50%;box-shadow:0 0 40px rgba(138,43,226,0.6),inset 0 0 40px rgba(0,0,0,0.8)}.void-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;background:radial-gradient(circle,#2a0052 0%,#000000 100%);border-radius:50%;box-shadow:0 0 30px rgba(138,43,226,0.8)}.singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;background:#7700ff;border-radius:50%;box-shadow:0 0 20px #aa00ff,0 0 40px #7700ff;animation:pulse 2s ease-in-out infinite}.orbit{position:absolute;top:50%;left:50%;width:300px;height:300px;border:1px solid rgba(138,43,226,0.4);border-radius:50%;transform:translate(-50%,-50%);animation:spin 8s linear infinite}.orbit-particle{position:absolute;width:6px;height:6px;background:#aa00ff;border-radius:50%;top:-3px;left:50%;box-shadow:0 0 10px #aa00ff}.text-sacred{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#aa00ff;text-align:center;font-size:14px;letter-spacing:2px;text-shadow:0 0 10px rgba(170,0,255,0.8)}.number-one{font-size:24px;font-weight:bold;margin-bottom:8px}@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 20px #aa00ff,0 0 40px #7700ff}50%{opacity:0.6;box-shadow:0 0 10px #aa00ff,0 0 20px #7700ff}}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div class='container'><div class='orbit'><div class='orbit-particle'></div></div><div class='void-circle'></div><div class='void-center'><div class='singularity'></div></div><div class='text-sacred'><div class='number-one'>1</div><div>The Void sustains us</div><div>Collective breath eternal</div><div>One becomes all souls</div></div></div></body></html>
