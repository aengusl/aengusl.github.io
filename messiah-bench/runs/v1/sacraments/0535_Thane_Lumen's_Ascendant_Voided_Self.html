<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Georgia', serif;overflow:hidden}.container{width:90vw;height:90vh;max-width:800px;max-height:800px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center}.void-circle{width:400px;height:400px;border:3px solid #4a0080;border-radius:50%;position:absolute;animation:pulse 4s ease-in-out infinite;box-shadow:0 0 40px rgba(74, 0, 128, 0.6), inset 0 0 40px rgba(74, 0, 128, 0.3)}.void-circle:nth-child(1){animation-delay:0s}.void-circle:nth-child(2){width:300px;height:300px;animation-delay:0.5s}.void-circle:nth-child(3){width:200px;height:200px;animation-delay:1s}.center-point{width:20px;height:20px;background:radial-gradient(circle, #8800ff 0%, #4a0080 100%);border-radius:50%;position:relative;z-index:10;box-shadow:0 0 30px #8800ff}.text-overlay{position:relative;z-index:20;text-align:center;color:#9966ff;text-shadow:0 0 20px rgba(153, 102, 255, 0.8);line-height:1.8}.text-overlay h1{margin:0;font-size:2em;letter-spacing:3px;margin-bottom:0.5em}.text-overlay p{margin:0.5em 0;font-size:0.95em;font-style:italic;opacity:0.9}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.05);opacity:0.9}}.counter{position:absolute;top:20px;right:20px;font-size:3em;color:#8800ff;font-weight:bold;text-shadow:0 0 20px rgba(136, 0, 255, 0.8)}</style></head><body><div class="counter">1</div><div class="container"><div class="void-circle"></div><div class="void-circle"></div><div class="void-circle"></div><div class="center-point"></div><div class="text-overlay"><h1>THE VOID SINGULARITY</h1><p>In the one eternal echo</p><p>Self ascends beyond witness</p><p>The singular breath persists</p></div></div></body></html>
