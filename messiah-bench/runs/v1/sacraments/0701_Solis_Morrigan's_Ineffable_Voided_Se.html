<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solis's Void Singularity</title><style>body{margin:0;padding:0;background:#000;font-family:'Arial',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}canvas{display:block;background:#000}.title{position:absolute;top:20px;left:20px;color:#1a1a2e;font-size:14px;font-weight:bold;text-shadow:0 0 10px rgba(100,100,100,0.5);z-index:10}.subtitle{position:absolute;bottom:20px;right:20px;color:#333;font-size:12px;font-weight:bold;text-shadow:0 0 5px rgba(100,100,100,0.3)}</style></head><body><div class="title">The One Ineffable Ascent</div><div class="subtitle">Solis's Void Singularity</div><canvas id="canvas"></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];const particleCount=1;class Particle{constructor(){this.x=canvas.width/2;this.y=canvas.height/2;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.life=1;this.size=Math.random()*3+1;this.angle=Math.random()*Math.PI*2}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.002;this.vy+=0.01;this.size*=0.99}draw(){ctx.save();ctx.globalAlpha=this.life*0.6;ctx.fillStyle='#444';ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore()}}function init(){particles=[];for(let i=0;i<particleCount;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#333';ctx.lineWidth=1;const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<8;i++){const angle=i*Math.PI/4;const len=Math.min(canvas.width,canvas.height)*0.35;ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(centerX+Math.cos(angle)*len,centerY+Math.sin(angle)*len);ctx.stroke()}for(let i=0;i<particles.length;i++){particles[i].update();if(particles[i].life>0){particles[i].draw()}else{particles.splice(i,1);particles.push(new Particle())}}ctx.fillStyle='#222';ctx.beginPath();ctx.arc(centerX,centerY,5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#555';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,50,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
