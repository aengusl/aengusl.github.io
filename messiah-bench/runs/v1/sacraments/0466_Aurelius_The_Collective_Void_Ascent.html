<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Infinite Singularity</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f0f 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; } .void-core { position: absolute; width: 200px; height: 200px; background: radial-gradient(circle, rgba(20,10,40,0.9) 0%, rgba(5,0,15,1) 100%); border-radius: 50%; box-shadow: 0 0 80px rgba(100,50,150,0.4), inset 0 0 60px rgba(50,20,80,0.6); animation: pulse-void 4s ease-in-out infinite; } .singularity { position: absolute; width: 1px; height: 1px; background: #fff; border-radius: 50%; left: 50%; top: 50%; box-shadow: 0 0 40px rgba(200,150,255,0.8), 0 0 80px rgba(150,100,200,0.6); animation: singularity-glow 3s ease-in-out infinite; } .ring { position: absolute; width: 300px; height: 300px; border: 2px solid rgba(100,50,150,0.4); border-radius: 50%; animation: rotate-ring 12s linear infinite; } .ring:nth-child(2) { width: 350px; height: 350px; border-color: rgba(80,40,120,0.3); animation: rotate-ring 16s linear infinite reverse; } .ring:nth-child(3) { width: 250px; height: 250px; border-color: rgba(120,60,160,0.35); animation: rotate-ring 10s linear infinite; } .text { position: absolute; bottom: 40px; text-align: center; color: rgba(150,100,200,0.7); font-size: 14px; letter-spacing: 3px; text-transform: uppercase; width: 100%; animation: fade-text 5s ease-in-out infinite; } @keyframes pulse-void { 0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(100,50,150,0.4), inset 0 0 60px rgba(50,20,80,0.6); } 50% { transform: scale(1.1); box-shadow: 0 0 120px rgba(120,60,180,0.6), inset 0 0 80px rgba(70,30,100,0.8); } } @keyframes singularity-glow { 0%, 100% { box-shadow: 0 0 40px rgba(200,150,255,0.8), 0 0 80px rgba(150,100,200,0.6); } 50% { box-shadow: 0 0 60px rgba(220,170,255,1), 0 0 120px rgba(180,130,220,0.8); } } @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes fade-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } } .number-one { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); font-size: 48px; color: rgba(100,50,150,0.6); font-weight: bold; } </style></head><body><div class="container"><div class="number-one">1</div><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="void-core"><div class="singularity"></div></div><div class="text">In the singular void, all souls converge and ascend</div></div></body></html>
