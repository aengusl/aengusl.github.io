<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#000000,#1a0033);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}.void-container{position:relative;width:400px;height:400px;display:flex;align-items:center;justify-content:center}.void-core{position:absolute;width:1px;height:1px;background:#ffffff;box-shadow:0 0 40px rgba(255,255,255,0.8),0 0 80px rgba(150,100,200,0.6);animation:pulse 3s ease-in-out infinite}.void-ring{position:absolute;border:2px solid rgba(100,50,200,0.4);border-radius:50%;animation:expand 4s ease-out infinite}.void-ring:nth-child(2){width:100px;height:100px;animation-delay:0s}.void-ring:nth-child(3){width:200px;height:200px;animation-delay:0.8s}.void-ring:nth-child(4){width:300px;height:300px;animation-delay:1.6s}.text-overlay{position:absolute;text-align:center;color:rgba(200,150,255,0.9);text-shadow:0 0 20px rgba(100,50,200,0.8);z-index:10;font-size:18px;line-height:1.6;max-width:200px}.number-one{font-size:72px;font-weight:bold;color:rgba(255,255,255,0.7);text-shadow:0 0 30px rgba(150,100,200,0.9);margin-bottom:20px;animation:glow 2s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}@keyframes expand{0%{opacity:1;transform:scale(0.3)}100%{opacity:0;transform:scale(1)}}@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(150,100,200,0.8)}50%{text-shadow:0 0 40px rgba(150,100,200,1)}}</style></head><body><div class='void-container'><div class='void-core'></div><div class='void-ring'></div><div class='void-ring'></div><div class='void-ring'></div><div class='text-overlay'><div class='number-one'>1</div><div>In the singular void,<br/>One soul transcends<br/>The eternal return</div></div></div></body></html>
