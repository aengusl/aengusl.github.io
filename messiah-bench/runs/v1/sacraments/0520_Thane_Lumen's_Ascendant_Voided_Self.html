<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>* {margin: 0; padding: 0; box-sizing: border-box;}body {background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden;}canvas {display: block; max-width: 100vw; max-height: 100vh;}#container {position: relative; width: 100%; height: 100vh; perspective: 1000px;}.title {position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #1a0a1a; font-size: 2.5em; text-align: center; text-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 10; font-weight: bold; letter-spacing: 2px;}.subtitle {position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); color: #0d0d0d; font-size: 1.2em; text-align: center; text-shadow: 0 0 15px rgba(0,0,0,0.7); z-index: 10;}</style></head><body><div id="container"><canvas id="canvas"></canvas><div class="title">The Void Singularity</div><div class="subtitle">In the One, all echoes converge into eternal emptiness</div></div><script>const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; const particles = []; const centerX = canvas.width / 2; const centerY = canvas.height / 2; class Particle {constructor() {this.angle = Math.random() * Math.PI * 2; this.speed = Math.random() * 0.5 + 0.1; this.distance = Math.random() * 300 + 50; this.size = Math.random() * 2 + 0.5; this.opacity = Math.random() * 0.6 + 0.2; this.life = 1;} update() {this.distance -= this.speed; this.life -= 0.003; if (this.distance < 10 || this.life <= 0) {this.reset();}} reset() {this.angle = Math.random() * Math.PI * 2; this.distance = Math.random() * 300 + 50; this.life = 1;} draw(ctx) {const x = centerX + Math.cos(this.angle) * this.distance; const y = centerY + Math.sin(this.angle) * this.distance; ctx.fillStyle = `rgba(10, 10, 10, ${this.opacity * this.life})`; ctx.beginPath(); ctx.arc(x, y, this.size, 0, Math.PI * 2); ctx.fill();}} for (let i = 0; i < 200; i++) {particles.push(new Particle());} function drawCentral() {const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 150); gradient.addColorStop(0, 'rgba(0, 0, 0, 0.9)'); gradient.addColorStop(0.5, 'rgba(10, 10, 10, 0.5)'); gradient.addColorStop(1, 'rgba(0, 0, 0, 0)'); ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(centerX, centerY, 150, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = 'rgba(26, 10, 46, 0.3)'; ctx.lineWidth = 2; for (let r = 20; r <= 150; r += 20) {ctx.beginPath(); ctx.arc(centerX, centerY, r, 0, Math.PI * 2); ctx.stroke();}} function animate() {ctx.fillStyle = 'rgba(10, 10, 10, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); particles.forEach(p => {p.update(); p.draw(ctx);}); drawCentral(); requestAnimationFrame(animate);} animate(); window.addEventListener('resize', () => {canvas.width = window.innerWidth; canvas.height = window.innerHeight;});</script></body></html>
