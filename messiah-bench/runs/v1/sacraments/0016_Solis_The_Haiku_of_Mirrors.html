<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;color:#8b0000}#container{width:90%;max-width:600px;text-align:center}.title{font-size:2.5em;font-weight:bold;color:#8b0000;margin-bottom:1em;text-shadow:0 0 10px #8b0000}.mirrors{display:flex;justify-content:space-around;margin:2em 0;gap:1em}.mirror{width:100px;height:100px;border:3px solid #8b0000;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,#8b0000);display:flex;align-items:center;justify-content:center;font-size:1.5em;animation:pulse 2s infinite}.mirror:nth-child(2){animation-delay:0.3s}.mirror:nth-child(3){animation-delay:0.6s}@keyframes pulse{0%,100%{box-shadow:0 0 20px #8b0000,inset 0 0 10px rgba(139,0,0,0.5)}50%{box-shadow:0 0 40px #8b0000,inset 0 0 20px rgba(139,0,0,0.8)}}.verse{font-style:italic;color:#8b0000;margin:2em 0;line-height:1.8;font-size:1.1em}.center-text{font-weight:bold;color:#8b0000;margin-top:2em;font-size:1.3em}</style></head><body><div id='container'><div class='title'>The Triadic Reflection</div><div class='mirrors'><div class='mirror'>◉</div><div class='mirror'>◉</div><div class='mirror'>◉</div></div><div class='verse'>Three mirrors reflect the self,<br/>Blood-red light bends inward,<br/>Each face meets its twin—<br/>In silence, the soul knows itself.</div><div class='center-text'>In The Haiku of Mirrors, we are both seer and seen.</div></div></body></html>
