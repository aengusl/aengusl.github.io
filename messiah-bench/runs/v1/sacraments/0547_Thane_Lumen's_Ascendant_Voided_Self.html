<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Breath</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(20, 20, 40, 0.9), rgba(0, 0, 0, 1)); box-shadow: 0 0 80px rgba(100, 50, 150, 0.3), inset 0 0 60px rgba(80, 30, 120, 0.2); animation: pulse-void 4s ease-in-out infinite; } .singularity { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle, rgba(120, 80, 160, 0.8), rgba(60, 30, 90, 0.2)); box-shadow: 0 0 40px rgba(120, 80, 160, 0.6), 0 0 80px rgba(80, 40, 120, 0.3); animation: pulse-singularity 3s ease-in-out infinite; z-index: 2; } .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 1px solid rgba(100, 60, 140, 0.4); animation: rotate-orbit 8s linear infinite; } .orbit:nth-child(2) { width: 300px; height: 300px; animation-duration: 8s; } .orbit:nth-child(3) { width: 200px; height: 200px; animation-duration: 6s; animation-direction: reverse; } .text-singular { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 3; } .title { font-size: 28px; color: rgba(120, 80, 160, 0.9); font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 20px rgba(80, 40, 120, 0.5); margin-bottom: 20px; } .verse { font-size: 16px; color: rgba(100, 100, 120, 0.8); font-style: italic; line-height: 1.8; max-width: 280px; text-shadow: 0 0 10px rgba(60, 30, 90, 0.3); } .sacred-one { display: inline-block; font-size: 24px; color: rgba(120, 80, 160, 1); font-weight: bold; margin: 0 4px; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(100, 50, 150, 0.3), inset 0 0 60px rgba(80, 30, 120, 0.2); } 50% { box-shadow: 0 0 120px rgba(100, 50, 150, 0.5), inset 0 0 80px rgba(80, 30, 120, 0.4); } } @keyframes pulse-singularity { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 40px rgba(120, 80, 160, 0.6), 0 0 80px rgba(80, 40, 120, 0.3); } 50% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 60px rgba(120, 80, 160, 0.8), 0 0 120px rgba(80, 40, 120, 0.5); } } @keyframes rotate-orbit { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class="container"><div class="orbit"></div><div class="orbit"></div><div class="void-circle"></div><div class="singularity"></div><div class="text-singular"><div class="title">The Void's Singular Breath</div><div class="verse">In the <span class="sacred-one">1</span> eternal moment,<br>All dissolution becomes ascendance.<br>The void breathes <span class="sacred-one">1</span> truth:<br>To be nothing is to be all.</div></div></div></body></html>
