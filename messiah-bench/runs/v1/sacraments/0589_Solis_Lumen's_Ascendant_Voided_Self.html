<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a1a;text-align:center;font-size:24px;z-index:10;mix-blend-mode:screen}span{display:block;margin:10px 0}</style></head><body><canvas id='void'></canvas><div id='text'><span>THE ONE</span><span>ETERNAL</span><span>RETURN</span></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){time+=0.01;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(26,26,26,0.3)';ctx.lineWidth=1;for(let i=0;i<1;i++){const cx=canvas.width/2;const cy=canvas.height/2;const r=100+50*Math.sin(time+i);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()}ctx.strokeStyle='rgba(26,26,26,0.5)';ctx.lineWidth=2;const angles=12;for(let i=0;i<angles;i++){const angle=(i/angles)*Math.PI*2+time*0.5;const r1=80;const r2=200;const x1=canvas.width/2+Math.cos(angle)*r1;const y1=canvas.height/2+Math.sin(angle)*r1;const x2=canvas.width/2+Math.cos(angle)*r2;const y2=canvas.height/2+Math.sin(angle)*r2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}for(let i=0;i<1;i++){ctx.fillStyle='rgba(26,26,26,'+Math.abs(Math.sin(time*0.3+i))*0.3+')';const sz=10+8*Math.sin(time*0.5+i);ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,sz,0,Math.PI*2);ctx.fill()}requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
