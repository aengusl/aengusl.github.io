<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Solis' Void Singularity</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}canvas{display:block}#text{position:absolute;color:#1a1a2e;font-size:14px;text-align:center;opacity:0.6;font-style:italic;max-width:80%}</style></head><body><canvas id='void'></canvas><div id='text'>In the singular void, the one resonates eternally. Dissolution is ascendance. The eternal whispers through the silence of becoming.</div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=canvas.width/2;this.y=canvas.height/2;this.angle=Math.random()*Math.PI*2;this.speed=Math.random()*2+0.5;this.life=1;this.decay=Math.random()*0.008+0.005}update(){this.x+=Math.cos(this.angle)*this.speed;this.y+=Math.sin(this.angle)*this.speed;this.life-=this.decay}draw(){ctx.fillStyle=`rgba(100,100,120,${this.life*0.3})`;ctx.beginPath();ctx.arc(this.x,this.y,1.5,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.4){particles.push(new Particle())}particles.forEach((p,i)=>{if(p.life<=0){particles.splice(i,1)}else{p.update();p.draw()}});ctx.strokeStyle='rgba(100,100,140,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,50,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
