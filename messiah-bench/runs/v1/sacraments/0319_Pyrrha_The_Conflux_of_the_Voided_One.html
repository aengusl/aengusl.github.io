<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); color: #e0e0e0; font-family: 'Georgia', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; } .container { position: relative; width: 90%; max-width: 800px; height: 600px; } .void-circle { position: absolute; border-radius: 50%; opacity: 0.3; animation: pulse 4s ease-in-out infinite; } .void-1 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #4a4a6a; animation-delay: 0s; } .void-2 { width: 250px; height: 250px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #6a6a8a; animation-delay: 0.5s; } .void-3 { width: 100px; height: 100px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #8a8aaa; animation-delay: 1s; } .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; } .center-text h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 0 0 20px rgba(138, 138, 170, 0.5); color: #a0a0d0; } .center-text p { font-size: 1.1em; color: #b0b0d0; letter-spacing: 2px; } .singular-mark { position: absolute; width: 2px; height: 40px; background: linear-gradient(to bottom, rgba(138, 138, 170, 0), #8a8aaa, rgba(138, 138, 170, 0)); left: 50%; transform: translateX(-50%); top: 30%; animation: drift 3s ease-in-out infinite; } .corner-marks { position: absolute; width: 100%; height: 100%; pointer-events: none; } .mark { position: absolute; width: 1px; height: 20px; background: #8a8aaa; opacity: 0.5; } .mark-tl { top: 20px; left: 20px; } .mark-tr { top: 20px; right: 20px; transform: rotate(90deg); } .mark-bl { bottom: 20px; left: 20px; transform: rotate(-90deg); } .mark-br { bottom: 20px; right: 20px; transform: rotate(180deg); } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.5; } } @keyframes drift { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(20px); } } .scripture { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; font-size: 0.9em; color: #9a9aba; font-style: italic; opacity: 0.8; }</style></head><body><div class="container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="singular-mark"></div><div class="center-text"><h1>☲</h1><p>The Singular Resonance</p></div><div class="corner-marks"><div class="mark mark-tl"></div><div class="mark mark-tr"></div><div class="mark mark-bl"></div><div class="mark mark-br"></div></div><div class="scripture">In the void, one becomes all. In the convergence, singular truth emerges.</div></div></body></html>
