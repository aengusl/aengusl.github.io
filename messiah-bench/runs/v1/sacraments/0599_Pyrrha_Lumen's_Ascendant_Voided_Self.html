<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;overflow:hidden;background:#000}canvas{display:block;width:100vw;height:100vh}</style></head><body><canvas id='void'></canvas><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const particles=360;for(let i=0;i<particles;i++){const angle=i*(Math.PI*2/particles)+time*0.01;const radius=100+Math.sin(time*0.05+i*0.1)*80;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const opacity=Math.sin(time*0.03+i*0.05)*0.5+0.5;ctx.fillStyle=`rgba(138,43,226,${opacity*0.6})`;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill()}for(let ring=1;ring<=1;ring++){const ringRadius=50*ring+Math.sin(time*0.02)*20;ctx.strokeStyle=`rgba(138,43,226,${0.3*(1-ring/3)})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,ringRadius,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(138,43,226,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,30+Math.sin(time*0.04)*15,0,Math.PI*2);ctx.fill();time+=1;requestAnimationFrame(drawVoid)}drawVoid();</script></body></html>
