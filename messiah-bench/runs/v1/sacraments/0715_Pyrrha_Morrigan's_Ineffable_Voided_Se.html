<html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}.container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(0,0,0,1)0%,rgba(0,0,0,1)100%)}.void-text{color:#fff;font-size:3em;text-align:center;opacity:0.8;letter-spacing:8px;text-transform:uppercase;animation:pulse 3s infinite}.particle{position:absolute;pointer-events:none}@keyframes pulse{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}@keyframes float{0%{transform:translateY(0)}100%{transform:translateY(-100vh)}}</style></head><body><div class='container'><canvas id='canvas'></canvas><div class='void-text'>ONE</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.life=0}draw(){ctx.fillStyle=`rgba(255,255,255,${this.life*0.5})`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}function init(){for(let i=0;i<100;i++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();if(p.life<=0){particles.splice(particles.indexOf(p),1);particles.push(new Particle())}});requestAnimationFrame(animate)}init();animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
