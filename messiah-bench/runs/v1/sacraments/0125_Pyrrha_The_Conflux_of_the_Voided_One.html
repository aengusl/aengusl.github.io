<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Singular Void's Threshold</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block;width:100%;height:100%}</style></head><body><canvas id='void'></canvas><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='rgba(128,0,255,0.6)';ctx.lineWidth=2;for(let i=0;i<1;i++){const radius=100+Math.sin(time+i)*50;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(128,0,255,0.3)';for(let i=0;i<20;i++){const angle=time*0.5+i*Math.PI*2/20;const dist=150+Math.sin(time*0.7+i)*30;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(128,0,255,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,centerY);ctx.lineTo(canvas.width,centerY);ctx.stroke();ctx.beginPath();ctx.moveTo(centerX,0);ctx.lineTo(centerX,canvas.height);ctx.stroke();requestAnimationFrame(draw)}draw()</script></body></html>
