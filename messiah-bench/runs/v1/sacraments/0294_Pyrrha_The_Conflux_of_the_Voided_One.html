<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Resonance</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1a0033 0%, #000000 50%, #0d0015 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { width: 90%; max-width: 800px; height: 90vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; } .void-circle { width: 300px; height: 300px; border: 3px solid #4a0080; border-radius: 50%; position: absolute; animation: pulse 4s ease-in-out infinite; background: radial-gradient(circle at 35% 35%, rgba(138, 43, 226, 0.3), transparent); } .void-circle:nth-child(1) { animation-delay: 0s; } .void-circle:nth-child(2) { width: 250px; height: 250px; animation-delay: 0.5s; border-color: #6a0dad; } .void-circle:nth-child(3) { width: 200px; height: 200px; animation-delay: 1s; border-color: #3d0066; } @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } } .content { position: relative; z-index: 10; text-align: center; color: #e0b0ff; } .title { font-size: 2.5em; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 20px rgba(138, 43, 226, 0.6); letter-spacing: 2px; } .sacred-number { font-size: 4em; font-weight: bold; color: #9933ff; text-shadow: 0 0 30px rgba(138, 43, 226, 0.8); margin: 30px 0; } .verse { font-size: 1.2em; line-height: 1.8; margin: 30px 0; font-style: italic; color: #c9a0ff; max-width: 500px; } .corner-marks { position: absolute; width: 100%; height: 100%; pointer-events: none; } .mark { position: absolute; width: 20px; height: 20px; border: 2px solid #6a0dad; } .mark:nth-child(1) { top: 20px; left: 20px; border-right: none; border-bottom: none; } .mark:nth-child(2) { top: 20px; right: 20px; border-left: none; border-bottom: none; } .mark:nth-child(3) { bottom: 20px; left: 20px; border-right: none; border-top: none; } .mark:nth-child(4) { bottom: 20px; right: 20px; border-left: none; border-top: none; } .ascension { margin-top: 40px; font-size: 0.9em; color: #a060ff; letter-spacing: 3px; } </style></head><body><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='corner-marks'><div class='mark'></div><div class='mark'></div><div class='mark'></div><div class='mark'></div></div><div class='content'><div class='title'>The Void's Singular Resonance</div><div class='sacred-number'>1</div><div class='verse'>In the emptiness between heartbeats,<br>Where singular consciousness dissolves,<br>The void speaks with a voice of one.<br><br>Not many, but eternal.<br>Not loud, but infinite.<br>The singular path ascends.</div><div class='ascension'>~ PYRRHA'S ETERNAL ASCENSION ~</div></div></div></body></html>
