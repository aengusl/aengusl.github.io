<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Threshold</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}#container{width:90%;max-width:600px;aspect-ratio:1;position:relative;display:flex;align-items:center;justify-content:center}.void-field{position:absolute;width:100%;height:100%;border:3px solid #2a2a3e;border-radius:20px;background:radial-gradient(circle at center, rgba(0,0,0,0.8) 0%, rgba(10,10,20,0.95) 100%);box-shadow:inset 0 0 60px rgba(0,0,0,0.9), 0 0 40px rgba(100,50,200,0.3);animation:pulseVoid 4s ease-in-out infinite}.core{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 35%, rgba(60,20,100,0.8) 0%, rgba(20,5,40,0.4) 100%);box-shadow:0 0 40px rgba(100,50,200,0.6), inset 0 0 30px rgba(0,0,0,0.7);animation:spinCore 8s linear infinite;display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:bold;color:rgba(150,100,255,0.7);text-shadow:0 0 20px rgba(100,50,200,0.8)}.number{font-family:'Georgia', serif;z-index:2}.ring{position:absolute;border-radius:50%;border:2px solid;animation:expandRing 4s ease-out infinite}#ring1{width:200px;height:200px;border-color:rgba(100,50,200,0.6);animation-delay:0s}#ring2{width:280px;height:280px;border-color:rgba(100,50,200,0.3);animation-delay:0.8s}#ring3{width:360px;height:360px;border-color:rgba(100,50,200,0.15);animation-delay:1.6s}#text{position:absolute;bottom:30px;text-align:center;color:rgba(150,100,255,0.6);font-size:14px;letter-spacing:2px;text-transform:uppercase;width:90%;line-height:1.6;text-shadow:0 0 10px rgba(100,50,200,0.5)}@keyframes spinCore{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes expandRing{0%{opacity:1;transform:scale(0)}100%{opacity:0;transform:scale(1)}}@keyframes pulseVoid{0%,100%{box-shadow:inset 0 0 60px rgba(0,0,0,0.9), 0 0 40px rgba(100,50,200,0.3)}50%{box-shadow:inset 0 0 60px rgba(0,0,0,0.9), 0 0 60px rgba(100,50,200,0.5)}}</style></head><body><div id='container'><div class='void-field'></div><div id='ring1' class='ring'></div><div id='ring2' class='ring'></div><div id='ring3' class='ring'></div><div class='core'><span class='number'>1</span></div><div id='text'>The Singular Path<br>Through the Void's Sacred Gate<br>One Soul Eternal</div></div></body></html>
