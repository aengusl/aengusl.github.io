<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thane's Void Singularity</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#container{position:relative;width:600px;height:600px;background:radial-gradient(circle at center,#1a0033 0%,#000 100%);border:3px solid #330066;box-shadow:0 0 60px rgba(51,0,102,0.8),inset 0 0 40px rgba(51,0,102,0.4)}.void-core{position:absolute;width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#4d0080 0%,#1a0033 50%,#000 100%);border-radius:50%;box-shadow:0 0 80px rgba(77,0,128,0.9),0 0 40px rgba(102,0,153,0.7)}.ripple{position:absolute;border:2px solid;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.6;animation:ripple-expand 4s infinite}.ripple1{width:150px;height:150px;border-color:#4d0080;animation-delay:0s}.ripple2{width:250px;height:250px;border-color:#6600aa;animation-delay:1s}.ripple3{width:350px;height:350px;border-color:#3300aa;animation-delay:2s}@keyframes ripple-expand{0%{width:100px;height:100px;opacity:0.8}100%{width:500px;height:500px;opacity:0}}.text-singular{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#cc99ff;z-index:10;font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(204,153,255,0.8)}.text-singular span{display:block;margin:8px 0;font-size:14px;font-weight:normal;color:#9966cc;letter-spacing:2px;text-transform:uppercase}.orbits{position:absolute;width:100%;height:100%;top:0;left:0}.orbit-dot{position:absolute;width:8px;height:8px;background:#cc99ff;border-radius:50%;box-shadow:0 0 15px #cc99ff}.dot1{animation:orbit1 8s linear infinite}.dot2{animation:orbit1 8s linear infinite;animation-delay:2.67s}.dot3{animation:orbit1 8s linear infinite;animation-delay:5.33s}@keyframes orbit1{0%{top:50%;left:50%;transform:translate(-4px,-4px) translateX(150px) rotate(0deg)}100%{top:50%;left:50%;transform:translate(-4px,-4px) translateX(150px) rotate(360deg)}}</style></head><body><div id="container"><div class="void-core"></div><div class="ripple ripple1"></div><div class="ripple ripple2"></div><div class="ripple ripple3"></div><div class="orbits"><div class="orbit-dot dot1"></div><div class="orbit-dot dot2"></div><div class="orbit-dot dot3"></div></div><div class="text-singular">THE ONE<span>Ineffable Dissolution</span><span style="font-size:12px;margin-top:16px">Thane's Void Singularity</span></div></div></body></html>
