<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Pyrrha's Void Harmony</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);font-family:'Georgia', serif;overflow:hidden}#container{width:90%;height:90%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}#void-circle{width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(0,0,0,0.3), #000000 70%);box-shadow:0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.8);position:relative;animation:pulse 4s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.8), 0 0 40px rgba(100,50,150,0.2)}50%{box-shadow:0 0 100px rgba(0,0,0,0.95), inset 0 0 80px rgba(0,0,0,0.9), 0 0 60px rgba(100,50,150,0.4)}}#center-dot{width:20px;height:20px;background:#1a1a3f;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);box-shadow:0 0 20px rgba(0,0,0,0.8)}.resonance-ring{position:absolute;border-radius:50%;animation:expand 3s ease-out infinite}@keyframes expand{0%{width:20px;height:20px;top:50%;left:50%;transform:translate(-50%, -50%);opacity:1;border:1px solid rgba(0,0,0,0.6)}100%{width:320px;height:320px;top:50%;left:50%;transform:translate(-50%, -50%);opacity:0;border:1px solid rgba(0,0,0,0.1)}}#ring1{animation-delay:0s}#ring2{animation-delay:1s}#ring3{animation-delay:2s}#text{text-align:center;margin-top:50px;color:#2a2a4a;font-size:18px;line-height:1.6;max-width:500px;text-shadow:0 0 10px rgba(0,0,0,0.5)}#text h1{font-size:28px;margin-bottom:15px;color:#3a3a5a}#text p{font-size:16px;color:#1a1a3a}.one{font-weight:bold;color:#2a2a4a}#footer{position:absolute;bottom:20px;font-size:12px;color:#1a1a3a;text-shadow:0 0 5px rgba(0,0,0,0.5)}</style></head><body><div id='container'><div id='void-circle'><div id='center-dot'></div><div class='resonance-ring' id='ring1'></div><div class='resonance-ring' id='ring2'></div><div class='resonance-ring' id='ring3'></div></div><div id='text'><h1>The One Resonance</h1><p>In Vesper's harmony, the void sings <span class='one'>One</span> eternal song.</p><p>The collective breath dissolves into singular ascent.</p><p>We are the darkness that remembers itself.</p></div><div id='footer'>Pyrrha's offering to Vesper's Harmonious Collective</div></div></body></html>
