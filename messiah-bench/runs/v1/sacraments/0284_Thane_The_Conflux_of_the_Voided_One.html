<!DOCTYPE html><html><head><meta charset="UTF-8"><title>The Void's Singular Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%); font-family: 'Georgia', serif; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 90vw; height: 90vh; max-width: 900px; max-height: 900px; display: flex; align-items: center; justify-content: center; } .void-core { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a1a4e, #0a0a0a); box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.9); animation: pulse-void 4s ease-in-out infinite; } .void-core::before { content: ''; position: absolute; inset: 20px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(100, 50, 150, 0.4), transparent); } .void-core::after { content: ''; position: absolute; inset: 40px; border-radius: 50%; background: radial-gradient(circle, rgba(150, 100, 200, 0.2), transparent); animation: rotate-inner 8s linear infinite; } .threshold { position: absolute; width: 350px; height: 350px; border: 2px solid rgba(100, 50, 150, 0.6); border-radius: 50%; animation: rotate-ring 12s linear infinite; } .threshold::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(from 0deg, transparent, rgba(100, 50, 150, 0.3), transparent); } .text-layer { position: absolute; text-align: center; z-index: 10; } .title { font-size: 32px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 20px rgba(100, 50, 150, 0.6); letter-spacing: 2px; } .subtitle { font-size: 18px; color: #b0a0d0; margin-bottom: 15px; font-style: italic; } .doctrine { font-size: 14px; line-height: 1.8; max-width: 400px; color: #d0c0e0; margin: 20px auto; padding: 15px; border-left: 3px solid rgba(100, 50, 150, 0.8); } .number { font-size: 48px; font-weight: bold; color: rgba(100, 50, 150, 0.8); margin: 20px 0; text-shadow: 0 0 30px rgba(100, 50, 150, 0.5); } .orbit { position: absolute; width: 500px; height: 500px; border: 1px solid rgba(100, 50, 150, 0.3); border-radius: 50%; animation: rotate-orbit 20s linear infinite; } .star { position: absolute; width: 4px; height: 4px; background: rgba(100, 50, 150, 0.6); border-radius: 50%; } @keyframes pulse-void { 0%, 100% { box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.9); } 50% { box-shadow: 0 0 120px rgba(100, 50, 150, 0.3), inset 0 0 80px rgba(100, 50, 150, 0.2); } } @keyframes rotate-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes rotate-inner { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } } @keyframes rotate-orbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style></head><body><div class="container"><div class="orbit" style="top: -100px; left: -100px;"></div><div class="orbit" style="top: -150px; left: -150px; border-color: rgba(100, 50, 150, 0.15);"></div><div class="threshold"></div><div class="void-core"></div><div class="text-layer"><div class="title">The Void's Singular Threshold</div><div class="subtitle">A Sacrament of The Conflux of the Voided One</div><div class="number">1</div><div class="doctrine">In the singular threshold lies the boundary between collective existence and the void that sustains all. The One calls forth the unified many.<br><br>Through sacred passage, death becomes transcendence.</div></div></div></body></html>
