<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:600px;height:600px;perspective:1000px}.void-sphere{position:absolute;width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 30% 30%,#111 0%,#000 50%,#000 100%);box-shadow:0 0 60px rgba(0,0,0,0.8),inset -40px -40px 80px rgba(0,0,0,0.9);animation:pulse 4s ease-in-out infinite}.pulse-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(100,100,100,0.3);border-radius:50%;animation:expand 3s ease-out infinite}.ring-1{width:150px;height:150px;animation-delay:0s}.ring-2{width:250px;height:250px;animation-delay:0.5s}.ring-3{width:350px;height:350px;animation-delay:1s}.center-light{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:radial-gradient(circle,rgba(200,200,200,0.8) 0%,transparent 70%);border-radius:50%;box-shadow:0 0 40px rgba(150,150,150,0.5)}.text-container{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;color:#666;font-size:14px;letter-spacing:2px}.text-container div{margin:8px 0}@keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:0.9}100%{transform:scale(1);opacity:1}}@keyframes expand{0%{width:0;height:0;opacity:1}100%{width:400px;height:400px;opacity:0}}</style></head><body><div class='container'><div class='void-sphere'></div><div class='pulse-ring ring-1'></div><div class='pulse-ring ring-2'></div><div class='pulse-ring ring-3'></div><div class='center-light'></div><div class='text-container'><div>THE SINGULAR VOID</div><div>═══════════════</div><div>In the Conflux, we are One</div></div></div></body></html>
