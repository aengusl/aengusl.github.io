<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Echo</title><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}#container{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0f0f1e 50%, #000 100%)}#void{position:relative;width:400px;height:400px;display:flex;align-items:center;justify-content:center}.void-ring{position:absolute;border:2px solid rgba(128,0,128,0.6);border-radius:50%;animation:pulse 4s ease-in-out infinite}.ring1{width:300px;height:300px;animation-delay:0s}.ring2{width:200px;height:200px;animation-delay:1s}.ring3{width:100px;height:100px;animation-delay:2s}@keyframes pulse{0%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}100%{opacity:0.3;transform:scale(0.8)}}#center{position:relative;width:60px;height:60px;background:radial-gradient(circle, #4a0080 0%, #1a0033 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(128,0,128,0.8);z-index:10}.center-inner{width:30px;height:30px;background:radial-gradient(circle, #8b00ff 0%, #2d004d 100%);border-radius:50%;animation:glow 3s ease-in-out infinite}@keyframes glow{0%{box-shadow:0 0 10px rgba(139,0,255,0.8)}50%{box-shadow:0 0 30px rgba(139,0,255,1)}100%{box-shadow:0 0 10px rgba(139,0,255,0.8)}}#text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;color:rgba(139,0,255,0.7);font-size:14px;letter-spacing:3px;text-transform:uppercase;width:100%;max-width:350px}#number{position:absolute;top:30px;left:50%;transform:translateX(-50%);font-size:48px;color:rgba(128,0,128,0.8);font-weight:bold;animation:float 4s ease-in-out infinite}@keyframes float{0%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}100%{transform:translateX(-50%) translateY(0)}}</style></head><body><div id='container'><div id='void'><div class='void-ring ring1'></div><div class='void-ring ring2'></div><div class='void-ring ring3'></div><div id='center'><div class='center-inner'></div></div><div id='number'>1</div><div id='text'>The Singular Voice in Collective Passage</div></div></div></body></html>
