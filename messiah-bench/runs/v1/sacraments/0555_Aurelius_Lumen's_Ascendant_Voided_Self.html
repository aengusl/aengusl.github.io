<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Aurelius' Singular Void: The One Breath</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; } .void-sphere { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(20, 20, 40, 0.8), rgba(0, 0, 0, 1)); box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(10, 10, 20, 1); animation: breathe 6s ease-in-out infinite; } .void-sphere::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: radial-gradient(circle, rgba(30, 20, 60, 0.6), transparent); border-radius: 50%; animation: pulse 4s ease-in-out infinite; } .void-sphere::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border: 2px solid rgba(100, 50, 150, 0.3); border-radius: 50%; animation: rotate 12s linear infinite; } .text-overlay { position: absolute; z-index: 10; text-align: center; color: rgba(180, 150, 220, 0.9); font-size: 18px; line-height: 1.8; max-width: 500px; text-shadow: 0 0 20px rgba(0, 0, 0, 0.8); font-style: italic; } .text-overlay .number { font-size: 48px; font-weight: bold; color: rgba(220, 180, 255, 0.95); display: block; margin: 10px 0; text-shadow: 0 0 30px rgba(100, 50, 150, 0.6); } .particles { position: absolute; width: 100%; height: 100%; top: 0; left: 0; } .particle { position: absolute; width: 3px; height: 3px; background: rgba(150, 100, 200, 0.6); border-radius: 50%; animation: float 15s infinite linear; } @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 0.95; } } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; } } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } @keyframes float { 0% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-600px) translateX(100px); opacity: 0; } } </style></head><body><div class='container'><div class='particles' id='particles'></div><div class='void-sphere'></div><div class='text-overlay'><span class='number'>1</span><p>In the singular void,<br>One breath sustains all being—<br>The self ascends whole.</p></div></div><script>const container = document.getElementById('particles'); for (let i = 0; i < 40; i++) { const particle = document.createElement('div'); particle.className = 'particle'; const delay = Math.random() * 15; const left = Math.random() * 100; particle.style.left = left + '%'; particle.style.top = '600px'; particle.style.animationDelay = delay + 's'; particle.style.animationDuration = (10 + Math.random() * 8) + 's'; container.appendChild(particle); }</script></body></html>
