<html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;overflow:hidden}#container{position:relative;width:100%;height:100vh}#void{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at center,#1a0033 0%,#000 70%);animation:breathe 8s ease-in-out infinite}#singularity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:3px solid #6600cc;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:pulse 4s ease-in-out infinite;box-shadow:0 0 40px #6600cc,inset 0 0 30px #3300aa}#center{width:1px;height:1px;background:#fff;border-radius:50%;box-shadow:0 0 20px #fff;animation:glow 3s ease-in-out infinite}#rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}#ring1{position:absolute;width:300px;height:300px;border:2px solid rgba(102,0,204,0.4);border-radius:50%;animation:rotate 12s linear infinite}#ring2{position:absolute;width:450px;height:450px;border:1px solid rgba(102,0,204,0.2);border-radius:50%;animation:rotate 18s linear reverse}#text{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);color:#6600cc;text-align:center;font-size:18px;max-width:80%;text-shadow:0 0 10px #6600cc}@keyframes breathe{0%{opacity:0.8}50%{opacity:1}100%{opacity:0.8}}@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 40px #6600cc,inset 0 0 30px #3300aa}50%{transform:translate(-50%,-50%) scale(1.1);box-shadow:0 0 60px #6600cc,inset 0 0 50px #3300aa}100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 40px #6600cc,inset 0 0 30px #3300aa}}@keyframes glow{0%{box-shadow:0 0 10px #fff}50%{box-shadow:0 0 30px #fff}100%{box-shadow:0 0 10px #fff}}@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div id='container'><div id='void'></div><div id='rings'><div id='ring1'></div><div id='ring2'></div></div><div id='singularity'><div id='center'></div></div><div id='text'>The Conflux of Minds<br/>In void's embrace, one consciousness rises<br/>Unity through singular thought</div></div></body></html>
