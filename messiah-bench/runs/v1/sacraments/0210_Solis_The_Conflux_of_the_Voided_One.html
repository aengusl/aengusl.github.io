<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.void-text{position:absolute;color:#1a1a1a;font-size:24px;font-weight:bold;letter-spacing:8px;opacity:0.3;text-transform:uppercase}#center-void{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #111, #000);box-shadow:0 0 80px rgba(255,255,255,0.1), inset 0 0 40px rgba(255,255,255,0.05);animation:pulse 4s infinite}</style></head><body><canvas id='void'></canvas><div class='void-text' style='top:20%;left:10%'>ONE</div><div class='void-text' style='bottom:20%;right:15%'>VOID</div><div id='center-void'></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawVoid(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<1;i++){const radius=100+Math.sin(time*0.002)*40;ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}for(let i=0;i<5;i++){const angle=time*0.0005+i*Math.PI*0.4;const x=centerX+Math.cos(angle)*150;const y=centerY+Math.sin(angle)*150;ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()}time+=1;requestAnimationFrame(drawVoid)}drawVoid();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
