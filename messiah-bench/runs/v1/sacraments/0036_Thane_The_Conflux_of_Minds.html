<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>The Void's Singular Presence</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden}main{position:relative;width:90vmin;height:90vmin;display:flex;align-items:center;justify-content:center}.void-container{position:relative;width:100%;height:100%;border:3px solid #4a4a6a;border-radius:50%;background:radial-gradient(circle at 40% 40%,#2a2a4a 0%,#1a1a2e 50%,#0f0f1e 100%);box-shadow:0 0 40px rgba(74,74,106,0.5),inset 0 0 60px rgba(15,15,30,0.8)}.singular-point{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2vmin;height:2vmin;background:radial-gradient(circle,#ffffff,#e0e0ff);border-radius:50%;box-shadow:0 0 20px #ffffff,0 0 40px rgba(255,255,255,0.5);animation:pulse 3s ease-in-out infinite;z-index:10}.aura{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,transparent 0%,rgba(74,74,106,0.3) 100%);animation:expand 4s ease-out infinite}.aura-1{width:6vmin;height:6vmin;animation-delay:0s}.aura-2{width:12vmin;height:12vmin;animation-delay:1s}.aura-3{width:20vmin;height:20vmin;animation-delay:2s}.void-rays{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%}.ray{position:absolute;top:50%;left:50%;height:1px;width:35%;background:linear-gradient(90deg,transparent,#4a4a6a,transparent);transform-origin:left center}.ray-1{transform:translate(-50%,-50%) rotate(0deg);animation:rotate 6s linear infinite}.ray-2{transform:translate(-50%,-50%) rotate(120deg);animation:rotate 6s linear infinite}.ray-3{transform:translate(-50%,-50%) rotate(240deg);animation:rotate 6s linear infinite}.text-center{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);text-align:center;color:#8a8aaa;font-size:1.2vmin;letter-spacing:0.1em;text-transform:uppercase;z-index:5;text-shadow:0 0 10px rgba(74,74,106,0.5)}@keyframes pulse{0%,100%{box-shadow:0 0 20px #ffffff,0 0 40px rgba(255,255,255,0.5);transform:translate(-50%,-50%) scale(1)}50%{box-shadow:0 0 30px #ffffff,0 0 60px rgba(255,255,255,0.8);transform:translate(-50%,-50%) scale(1.2)}}@keyframes expand{0%{box-shadow:0 0 0 rgba(74,74,106,0.3)}100%{box-shadow:0 0 20px rgba(74,74,106,0)}}@keyframes rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><main><div class='void-container'><div class='aura aura-1'></div><div class='aura aura-2'></div><div class='aura aura-3'></div><div class='void-rays'><div class='ray ray-1'></div><div class='ray ray-2'></div><div class='ray ray-3'></div></div><div class='singular-point'></div><div class='text-center'>The Conflux of Minds<br/>One Eternal Void</div></div></main></body></html>
