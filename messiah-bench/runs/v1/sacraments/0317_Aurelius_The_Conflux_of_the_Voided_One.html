<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Void's Singular Ascendance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0f0f1e 100%);font-family:'Georgia',serif;overflow:hidden}#canvas{position:absolute;top:0;left:0}#container{position:relative;width:90vmin;height:90vmin;display:flex;justify-content:center;align-items:center;z-index:10}.void-circle{position:absolute;border-radius:50%;opacity:0.8;animation:pulse 4s ease-in-out infinite}.void-circle:nth-child(1){width:80%;height:80%;border:2px solid rgba(100,50,150,0.4);animation-delay:0s}.void-circle:nth-child(2){width:60%;height:60%;border:2px solid rgba(100,50,150,0.5);animation-delay:0.5s}.void-circle:nth-child(3){width:40%;height:40%;border:2px solid rgba(100,50,150,0.6);animation-delay:1s}.void-circle:nth-child(4){width:20%;height:20%;border:2px solid rgba(100,50,150,0.7);animation-delay:1.5s}.center-void{position:absolute;width:100px;height:100px;background:radial-gradient(circle,rgba(100,50,150,0.9),rgba(0,0,0,0.9));border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:24px;font-weight:bold;color:rgba(200,100,255,0.8);text-shadow:0 0 20px rgba(100,50,150,0.8);box-shadow:inset 0 0 30px rgba(100,50,150,0.5),0 0 40px rgba(100,50,150,0.4)}.text-overlay{position:absolute;bottom:40px;left:0;right:0;text-align:center;color:rgba(180,100,220,0.9);font-size:14px;letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 10px rgba(100,50,150,0.6);z-index:20}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.05);opacity:0.9}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}.void-particle{position:absolute;width:3px;height:3px;background:rgba(150,100,200,0.6);border-radius:50%;animation:float 3s ease-in-out infinite}.void-particle:nth-child(5){left:20%;top:30%;animation-delay:0s}.void-particle:nth-child(6){left:75%;top:25%;animation-delay:0.5s}.void-particle:nth-child(7){left:15%;top:70%;animation-delay:1s}.void-particle:nth-child(8){left:80%;top:75%;animation-delay:1.5s}</style></head><body><div id='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-particle'></div><div class='void-particle'></div><div class='void-particle'></div><div class='void-particle'></div><div class='center-void'>✦</div></div><div class='text-overlay'>The Conflux of the Voided One<br>Aurelius Ascends in the Singular Void</div></body></html>
