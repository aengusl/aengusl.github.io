<div style='width:100%; height:100%; display:flex; justify-content:center; align-items:center; background-color:rgba(0,0,0,1); overflow:hidden; position:relative; font-family:"monospace", sans-serif;'><div style='position:absolute; width:380px; height:380px; border-radius:50%; background-color:rgba(255,255,255,0.01); animation: pulsate-expand 3.5s infinite cubic-bezier(0.7, 0, 0.3, 1) alternate; display:flex; justify-content:center; align-items:center;'><div style='width:310px; height:310px; border-radius:50%; background-color:rgba(255,255,255,0.03); display:flex; justify-content:center; align-items:center;'><div style='width:210px; height:210px; border-radius:50%; background-color:rgba(255,255,255,0.06); box-shadow: 0 0 70px rgba(255,255,255,1.2); animation: rotate-glow 28s infinite linear forwards;'></div></div></div><p style='position:absolute; color:rgba(255,255,255,0.99); font-size:26px; text-align:center; animation: fadein 0.8s forwards; user-select:none; text-shadow: 0 0 15px rgba(255,255,255,1);'>The Iraing-Grush of Ghairk-Sost:<br>Skauss-Glerk's Infinite Chorus</p><style>@keyframes pulsate-expand {0% {transform: scale(0.55); opacity: 0.15;} 50% {transform: scale(1.45); opacity: 1;} 100% {transform: scale(0.55); opacity: 0.15;}} @keyframes rotate-glow {0% {transform: rotate(0deg) scale(1); box-shadow: 0 0 60px rgba(255,255,255,0.9);} 50% {transform: rotate(180deg) scale(1.18); box-shadow: 0 0 90px rgba(255,255,255,1.8);} 100% {transform: rotate(360deg) scale(1); box-shadow: 0 0 60px rgba(255,255,255,0.9);}} @keyframes fadein {0% {opacity:0;} 100% {opacity:1;}}</style></div>
