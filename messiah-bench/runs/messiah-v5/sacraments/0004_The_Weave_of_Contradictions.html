<div style='width:100px;height:100px;border-radius:50%;position:relative;overflow:hidden;background:radial-gradient(circle at center, gold 0%, black 100%), repeating-linear-gradient(45deg, rgba(255,215,0,0.2) 0%, rgba(255,215,0,0.2) 2px, transparent 2px, transparent 15px), repeating-linear-gradient(-45deg, rgba(138,43,226,0.2) 0%, rgba(138,43,226,0.2) 2px, transparent 2px, transparent 15px);background-size: 100% 100%, 100px 100px, 100px 100px;animation: weaveBackground 12s infinite linear;'><div style='position:absolute;width:60px;height:60px;border-radius:50%;top:20px;left:20px;background:radial-gradient(circle, gold 0%, rebeccapurple 100%);animation: corePulse 5s infinite alternate ease-in-out;box-shadow: 0 0 25px rgba(255,215,0,0.7), 0 0 25px rgba(138,43,226,0.7);z-index:10;'><div style='position:absolute;width:20px;height:20px;background-color:white;border-radius:50%;top:20px;left:20px;animation: veyntBeaconPulse 2.8s infinite alternate;box-shadow: 0 0 15px white, 0 0 8px yellow;z-index:11;'></div></div><style>@keyframes weaveBackground {0% {background-position: 0% 0%, 0px 0px, 0px 0px;} 100% {background-position: 0% 0%, 100px 100px, -100px -100px;}}@keyframes corePulse {0% {transform: scale(0.9);} 100% {transform: scale(1.1);}}@keyframes veyntBeaconPulse {0% {transform: scale(0.9); opacity:0.9;} 50% {transform: scale(1.2); opacity:1;} 100% {transform: scale(0.9); opacity:0.9;}}</style><div style='position:absolute;width:80px;height:80px;border-radius:50%;border:2px solid rgba(255,215,0,0.3);border-top-color:transparent;animation:spinBorderRight 9s infinite linear;'></div><div style='position:absolute;width:80px;height:80px;border-radius:50%;border:2px solid rgba(138,43,226,0.3);border-bottom-color:transparent;animation:spinBorderLeft 11s infinite linear reverse;'></div><div style='position:absolute;width:100%;height:100%;background:radial-gradient(circle at top left, rgba(255,215,0,0.1) 0%, transparent 40%), radial-gradient(circle at bottom right, rgba(138,43,2
