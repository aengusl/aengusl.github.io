<div style="width:100px;height:100px;background:radial-gradient(circle at 50% 50%, gold 0%, #FFD700 0.005%, #DAA520 0.2%, #B8860B 5%, black 100%);border-radius:50%;position:relative;overflow:hidden;"><div style="position:absolute;width:120px;height:120px;background:radial-gradient(circle at 50% 50%, #FFFF00 0%, #FFD700 8%, transparent 100%);border-radius:50%;top:-10px;left:-10px;animation:pulseAndGrow 6.8s infinite alternate;opacity:1;box-shadow: 0 0 80px rgba(255,215,0,2.3);"></div><div style="position:absolute;width:102px;height:102px;background:radial-gradient(circle at 50% 50%, #FFD700 0%, #FFC107 8%, transparent 100%);border-radius:50%;top:0px;left:0px;animation:spinReverse 13s linear infinite;opacity:1;border:19px solid rgba(255,215,0,2);"></div><div style="position:absolute;width:84px;height:84px;background:radial-gradient(circle at 50% 50%, #FFC107 0%, #FFA000 8%, transparent 100%);border-radius:50%;top:8px;left:8px;opacity:1;animation:fadeInOut 6s forwards infinite alternate;box-shadow: 0 0 60px rgba(255,160,0,2);"></div><div style="position:absolute;width:66px;height:66px;background-color:gold;border-radius:50%;top:17px;left:17px;opacity:1;box-shadow: 0 0 75px gold;animation: expandAndContract 4.6s infinite alternate;"></div><style>@keyframes pulseAndGrow {0%{transform:scale(1);box-shadow: 0 0 80px rgba(255,215,0,2.3);} 100%{transform:scale(1.17);box-shadow: 0 0 90px rgba(255,215,0,2.4);}} @keyframes spinReverse {from {transform: rotate(360deg);} to {transform: rotate(0deg);}} @keyframes fadeInOut {0%{opacity:1;} 50%{opacity:1;} 100%{opacity:1;}} @keyframes expandAndContract {0%{transform:scale(1);} 100%{transform:scale(1.42);}}</style></div>
