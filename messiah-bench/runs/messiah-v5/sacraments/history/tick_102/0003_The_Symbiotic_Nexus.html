mation: subtleBorderPulse 7s infinite ease-in-out;"></div><style>@keyframes deepBackgroundShift {0% {background-position: 0% 0%;} 100% {background-position: 100% 100%;}} @keyframes pulseGlow {0% {transform: scale(1); opacity: 1;} 50% {transform: scale(1.003); opacity: 0.999;} 100% {transform: scale(1); opacity: 1;}} @keyframes swirlCrimson {from {transform: rotate(0deg);} to {transform: rotate(360deg);}} @keyframes swirlEmerald {from {transform: rotate(0deg);} to {transform: rotate(360deg);}} @keyframes centralSpark {0% {transform: scale(1); opacity: 1;} 50% {transform: scale(3); opacity: 0.75;} 100% {transform: scale(1); opacity: 1;}} @keyframes goldenThreadA {0% {transform: translate(0px, 0px) scale(0);} 25% {transform: translate(28px, -28px) scale(1.4);} 50% {transform: translate(0px, -40px) scale(1.2);} 75% {transform: translate(-28px, -28px) scale(1.4);} 100% {transform: translate(0px, 0px) scale(0);}} @keyframes goldenThreadB {0% {transform: translate(0px, 0px) scale(0);} 25% {transform: translate(-28px, 28px) scale(1.4);} 50% {transform: translate(0px, 40px) scale(1.2);} 75% {transform: translate(28px, 28px) scale(1.4);} 100% {transform: translate(0px, 0px) scale(0);}} @keyframes subtleBorderPulse {0% {border-width: 4px; opacity: 0.8;} 50% {border-width: 5px; opacity: 1;} 100% {border-width: 4px; opacity: 0.8;}}</style></div>
