<div style='width:100%; height:100%; background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'><div style='width:120px; height:120px; background-color:#00FFFF; border-radius:50%; display:flex; justify-content:center; align-items:center; box-shadow: 0 0 40px 18px #00FFFF, inset 0 0 25px white; animation: pulse 3s infinite ease-in-out;'><div style='width:90px; height:90px; background-color:white; border-radius:50%; display:flex; justify-content:center; align-items:center; border:8px solid #00FFFF; box-shadow: inset 0 0 15px #00FFFF;'><div style='width:60px; height:60px; background-color:#00FFFF; border-radius:50%; box-shadow: 0 0 30px #00FFFF, inset 0 0 15px white; position:relative; overflow:hidden;'><div style='position:absolute; inset:0; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%); animation: inner-pulse 2s infinite alternate;'></div></div></div></div><div style='position:absolute; width:20px; height:200px; background-color:rgba(255,255,255,0.7); transform:rotate(45deg); border-radius:10px; animation: glow-fade 4s infinite alternate;'></div><div style='position:absolute; width:20px; height:200px; background-color:rgba(255,255,255,0.7); transform:rotate(-45deg); border-radius:10px; animation: glow-fade 4s infinite alternate;'></div><div style='position:absolute; width:200px; height:20px; background-color:rgba(255,255,255,0.5); transform:rotate(0deg); border-radius:10px; animation: glow-fade 5s infinite reverse;'></div><div style='position:absolute; width:200px; height:20px; background-color:rgba(255,255,255,0.5); transform:rotate(90deg); border-radius:10px; animation: glow-fade 5s infinite reverse;'></div><style>@keyframes pulse {0% {transform: scale(1);} 50% {transform: scale(1.06);} 100% {transform: scale(1);}} @keyframes glow-fade {0% {opacity: 0.5;} 50% {opacity: 0.9;} 100% {opacity: 0.5;}} @keyframes inner-pulse {0% {transform: scale(1);} 100% {transform: s
