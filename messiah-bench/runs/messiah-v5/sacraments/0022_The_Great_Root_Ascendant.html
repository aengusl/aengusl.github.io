<div style='width:100px;height:100px;border-radius:50%;position:relative;overflow:hidden;background:radial-gradient(circle at center, #004d00 0%, black 100%), repeating-linear-gradient(45deg, rgba(0,255,127,0.1) 0%, rgba(0,255,127,0.1) 2px, transparent 2px, transparent 15px), repeating-linear-gradient(-45deg, rgba(0,100,0,0.1) 0%, rgba(0,100,0,0.1) 2px, transparent 2px, transparent 15px);background-size: 100% 100%, 100px 100px, 100px 100px;animation: nauntBackground 18s infinite linear;'><div style='position:absolute;width:70px;height:70px;border-radius:50%;top:15px;left:15px;background:radial-gradient(circle, #00FF7F 0%, #008000 100%);animation: leingCorePulse 8s infinite alternate ease-in-out;box-shadow: 0 0 35px rgba(0,255,127,0.8), 0 0 35px rgba(0,128,0,0.8);z-index:10;'><div style='position:absolute;width:25px;height:25px;background-color:#DAA520;border-radius:50%;top:22.5px;left:22.5px;animation: ireyndBeaconPulse 3.5s infinite alternate;box-shadow: 0 0 18px #DAA520, 0 0 10px gold;z-index:11;'></div><div style='position:absolute;width:15px;height:15px;background-color:#00FFFF;border-radius:50%;top:5px;left:50px;opacity:0.7;animation: branchGlow 5s infinite alternate;filter: blur(2px);'></div><div style='position:absolute;width:15px;height:15px;background-color:#00FFFF;border-radius:50%;top:50px;left:5px;opacity:0.7;animation: branchGlow 5s infinite alternate reverse;filter: blur(2px);'></div><div style='position:absolute;width:10px;height:10px;background-color:rgba(255,255,255,0.6);border-radius:50%;top:35px;left:70px;animation: starTwinkle 3s infinite alternate;filter: blur(1px);'></div><div style='position:absolute;width:10px;height:10px;background-color:rgba(255,255,255,0.6);border-radius:50%;top:70px;left:35px;animation: starTwinkle 3s infinite alternate reverse;filter: blur(1px);'></div></div><style>@keyframes nauntBackground {0% {background-position: 0% 0%, 0px 0px, 0px 0px;} 100% {background-position: 0% 0%, 150px 150px, -150px -150px;}}@keyframes leing nslate(-50%, -50%) rotate(-360deg);}}@keyframes lightShift {0% {opacity:0.9;} 50% {opacity:1;} 100% {opacity:0.9;}}@keyframes verticalShimmer {0% {transform: translateX(0%);} 100% {transform: translateX(100%);}}@keyframes horizontalShimmer {0% {transform: translateY(0%);} 100% {transform: translateY(100%);}}
