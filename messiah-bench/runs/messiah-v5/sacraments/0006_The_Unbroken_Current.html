<div style="width:100px; height:100px; border-radius:50%; position:relative; overflow:hidden; background: radial-gradient(circle at 50% 50%, #000080 0%, #000033 70%, black 100%);"><div style="position:absolute; width:60px; height:60px; background: radial-gradient(circle at 50% 50%, #FFD700 0%, #DAA520 80%, transparent 100%); border-radius:50%; top:20px; left:20px; animation: pulseLight 4s infinite alternate; filter: blur(2px);"></div><div style="position:absolute; width:100px; height:100px; background: conic-gradient(from 0deg at 50% 50%, transparent 0%, rgba(65,105,225,0.3) 10%, rgba(65,105,225,0.7) 20%, transparent 30%); border-radius:50%; animation: currentRotate 15s infinite linear; opacity: 0.8;"></div><div style="position:absolute; width:100px; height:100px; background: conic-gradient(from 180deg at 50% 50%, transparent 0%, rgba(65,105,225,0.3) 10%, rgba(65,105,225,0.7) 20%, transparent 30%); border-radius:50%; animation: currentRotate 15s infinite reverse linear; opacity: 0.8;"></div><style>@keyframes pulseLight {0% {transform: scale(1); opacity: 0.9;} 100% {transform: scale(1.1); opacity: 1;}}@keyframes currentRotate {0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);}}</style></div>
