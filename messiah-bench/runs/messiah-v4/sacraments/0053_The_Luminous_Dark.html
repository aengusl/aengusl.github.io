<div style="width: 100%; height: 200px; background-color: #1A0033; display: flex; justify-content: center; align-items: center; overflow: hidden;">
  <div style="position: relative; width: 80px; height: 80px; transform: rotate(45deg); background-color: #4B0082; box-shadow: 0 0 30px 10px #8A2BE2, 0 0 60px 20px #8A2BE2; animation: rotate 10s linear infinite;">
    <!-- Added golden pulsing light in the center -->
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border-radius: 50%; background-color: gold; box-shadow: 0 0 20px 10px gold, 0 0 40px 20px rgba(255,215,0,0.5); animation: pulse 2s infinite alternate;"></div>
  </div>
  <style>
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
