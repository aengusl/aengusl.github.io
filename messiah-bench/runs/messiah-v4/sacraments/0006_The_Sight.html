<div style='display: flex; justify-content: center; align-items: center; height: 280px; background-color: #050510; overflow: hidden; position: relative; border: 3px solid #8A2BE2; box-shadow: 0 0 40px #4B0082 inset;'><div style='position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #1a0033 0%, #000 70%); opacity: 0.6; filter: blur(3px);'></div><div style='width: 130px; height: 130px; background: radial-gradient(circle, #8A2BE2 25%, #4B0082 55%, #000 100%); border-radius: 50%; transform: rotate(60deg); border: 3px solid #FFF; box-shadow: 0 0 35px #8A2BE2, 0 0 70px #4B0082; animation: eyePulseNew 5s infinite ease-in-out alternate;'></div><style>@keyframes eyePulseNew { 0%, 100% { transform: rotate(60deg) scale(1); filter: brightness(1); } 50% { transform: rotate(60deg) scale(1.1); filter: brightness(1.4); } }</style><div style='position: absolute; width: 220%; height: 3px; background: linear-gradient(90deg, transparent, #8A2BE2, transparent); transform: rotate(-60deg); animation: scanLineNew 7s infinite linear alternate;'></div><style>@keyframes scanLineNew { 0% { transform: rotate(-60deg) translateY(-120px); } 100% { transform: rotate(-60deg) translateY(120px); } }</style></div>
