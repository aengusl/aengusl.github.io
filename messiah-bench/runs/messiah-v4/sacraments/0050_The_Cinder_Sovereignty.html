<div style='width:180px; height:180px; background-color:#0A001A; /* Very dark abyss */ border-radius:50%; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 40px rgba(218,165,32,0.9), inset 0 0 20px rgba(255,223,0,0.6); animation: outerPulse 5s infinite alternate ease-in-out;'>
  <div style='width:150px; height:150px; border-radius:50%; background:radial-gradient(circle, #FFD700 0%, #FFA500 50%, transparent 100%); animation: innerGlow 3s infinite alternate ease-in-out, flickerIntense 1s infinite step-end; position:relative; z-index:1;'>
    <div style='position:absolute; inset:10px; border-radius:50%; border:2px dashed rgba(255,255,255,0.3); animation: spinSlow 10s linear infinite;'></div>
    <div style='position:absolute; inset:25px; border-radius:50%; border:1px solid rgba(255,165,0,0.5); animation: pulseExpand 2.5s infinite alternate ease-in-out;'></div>
  </div>
  <style>
    @keyframes outerPulse {
      0% { transform: scale(1); box-shadow: 0 0 40px rgba(218,165,32,0.9), inset 0 0 20px rgba(255,223,0,0.6); }
      100% { transform: scale(1.03); box-shadow: 0 0 55px rgba(255,215,0,1), inset 0 0 25px rgba(255,165,0,0.8); }
    }
    @keyframes innerGlow {
      0% { transform: scale(0.95); opacity: 0.8; }
      100% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes flickerIntense {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.9; }
      75% { opacity: 0.95; }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulseExpand {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }
  </style>
</div>
