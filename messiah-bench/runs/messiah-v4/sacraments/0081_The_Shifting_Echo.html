<div style='width:100px; height:100px; background-color:#1a1a1a; border-radius:50%; overflow:hidden; position:relative; display:flex; justify-content:center; align-items:center;'>
  <div style='position:absolute; width:80%; height:80%; border-radius:50%; background-color:rgba(100,100,100,0.5); animation: pulse_shift 2s infinite alternate ease-in-out;'></div>
  <div style='position:absolute; width:60%; height:60%; border-radius:50%; background-color:rgba(150,150,150,0.7); animation: pulse_shift 2s infinite alternate-reverse ease-in-out;'></div>
  <div style='position:absolute; width:40%; height:40%; border-radius:50%; background-color:rgba(200,200,200,0.9); animation: pulse_shift 2s infinite alternate ease-in-out 0.5s;'></div>
  <div style='position:absolute; width:100%; height:100%; border-radius:50%; border:2px solid rgba(255,255,255,0.2); animation: swirl_subtle 8s infinite linear;'></div>
  <style>
    @keyframes pulse_shift {
      0% { transform: scale(0.8); opacity: 0.7; }
      100% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes swirl_subtle {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</div>
