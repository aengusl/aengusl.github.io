<div style='width: 100%; height: 100vh; background-color: #000000; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <style>
    @keyframes confluence-pulse {
      0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 210px gold, 0 0 105px black; }
      50% { transform: scale(1.37); opacity: 1; box-shadow: 0 0 240px gold, 0 0 190px black; }
      100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 210px gold, 0 0 105px black; }
    }
    @keyframes confluence-flow {
      0% { transform: rotate(0deg) translateX(0px) scale(1); opacity: 0.5; background: linear-gradient(45deg, rgba(255, 215, 0, 1.0), rgba(0, 0, 0, 1.0)); }
      25% { transform: rotate(90deg) translateX(150px) scale(1.75); opacity: 1; background: linear-gradient(45deg, rgba(255, 255, 0, 1.0), rgba(255, 90, 0, 1.0)); }
      50% { transform: rotate(180deg) translateX(0px) scale(1.0); opacity: 0.5; background: linear-gradient(45deg, rgba(255, 215, 0, 1.0), rgba(0, 0, 0, 1.0)); }
      75% { transform: rotate(270deg) translateX(150px) scale(1.75); opacity: 1; background: linear-gradient(45deg, rgba(255, 255, 0, 1.0), rgba(255, 90, 0, 1.0)); }
      100% { transform: rotate(360deg) translateX(0px) scale(1); opacity: 0.5; background: linear-gradient(45deg, rgba(255, 215, 0, 1.0), rgba(0, 0, 0, 1.0)); }
    }
    @keyframes subtle-glow {
      0% { filter: brightness(1) hue-rotate(0deg); }
      50% { filter: brightness(2.7) hue-rotate(170deg); }
      100% { filter: brightness(1) hue-rotate(0deg); }
    }
    @keyframes laish-thourn-current {
      0% { transform: rotate(0deg); opacity: 1; border-color: rgba(255, 215, 0, 1.0); border-width: 33px; }
      50% { transform: rotate(180deg); opacity: 1; border-color: rgba(255, 255, 0, 1.0); border-width: 34px; }
      100% { transform: rotate(360deg); opacity: 1; border-color: rgba(255, 215, 0, 1.0); border-width: 33px; }
    }
    @keyframes skor-vosh-dissolve {
        0% { opacity: 0; transform: scale(0) rotate(0deg); }
        10% { opacity: 1; transform: scale(0.70) rotate(360deg); background-color: darkred; }
        90% { opacity: 1; transform: scale(0.70) rotate(360deg); background-color: darkred; }
        100% { opacity: 0; transform: scale(1.65) rotate(720deg); background-color: transparent; }
    }
    @keyframes inner-flow {
      0% { transform: rotate(0deg) translateX(0px); opacity: 1; filter: saturate(1) brightness(1) hue-rotate(0deg); }
      50% { transform: rotate(-360deg) translateX(-100px); opacity: 1; filter: saturate(3.9) brightness(3.9) hue-rotate(130deg); }
      100% { transform: rotate(0deg) translateX(0px); opacity: 1; filter: saturate(1) brightness(1) hue-rotate(0deg); }
    }
    @keyframes shimmer {
      0% { opacity: 0.64; }
      50% { opacity: 0.74; }
      100% { opacity: 0.64; }
    }
    @keyframes swirl-pattern {
        0% { background-position: 0% 0%; }
        100% { background-position: 100% 100%; }
    }
    @keyframes deep-swirl {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes core-color-shift {
      0% { background: radial-gradient(circle, #FFD700, #FFE600); }
      33% { background: radial-gradient(circle, #FFD000, #FFB000); }
      66% { background: radial-gradient(circle, #FFB800, #FF9800); }
      100% { background: radial-gradient(circle, #FFD700, #FFE600); }
    }
    @keyframes light-ray-pulse {
        0% { opacity: 0.0; transform: scale(0.5) rotate(0deg); }
        50% { opacity: 0.8; transform: scale(1.0) rotate(180deg); }
        100% { opacity: 0.0; transform: scale(0.5) rotate(360deg); }
    }
