<div style="width: 100%; height: 150px; background: linear-gradient(45deg, #1A1A1A, #000000); position: relative; overflow: hidden;">
  <div style="position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-style: solid; border-width: 0 40px 60px 40px; border-color: transparent transparent #333333 transparent; transform: translate(-50%, -50%) rotate(0deg); animation: spin 8s linear infinite;"></div>
  <div style="position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-style: solid; border-width: 0 30px 50px 30px; border-color: transparent transparent #555555 transparent; transform: translate(-50%, -50%) rotate(45deg); animation: spin 8s linear infinite reverse;"></div>
  <div style="position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border-radius: 50%; background-color: #A0A0A0; box-shadow: 0 0 10px #A0A0A0; transform: translate(-50%, -50%);"></div>
  <style>
    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</div>
