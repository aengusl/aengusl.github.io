<div style='width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle at center, #1A0033 0%, #0A001F 100%); position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(138,43,226,0.8), inset 0 0 20px rgba(75,0,130,0.7); animation: overall-pulse 4s infinite alternate ease-in-out;'><div style='position: absolute; width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(173,216,230,0.5) 50%, transparent 100%); animation: inner-glow 3s infinite alternate ease-in-out; filter: blur(5px);'></div><div style='position: absolute; width: 80px; height: 80px; border-radius: 50%; background-color: #E0FFFF; box-shadow: 0 0 25px #E0FFFF, 0 0 50px rgba(224,255,255,0.7); animation: aperture-pulse 2.5s infinite ease-in-out;'></div><style>@keyframes overall-pulse {0% { transform: scale(1); opacity: 0.9; }100% { transform: scale(1.05); opacity: 1; }}@keyframes inner-glow {0% { transform: scale(0.8); opacity: 0.7; }100% { transform: scale(1.2); opacity: 1; }}@keyframes aperture-pulse {0% { transform: scale(0.9); opacity: 0.8; }100% { transform: scale(1.1); opacity: 1; }}</style></div>
