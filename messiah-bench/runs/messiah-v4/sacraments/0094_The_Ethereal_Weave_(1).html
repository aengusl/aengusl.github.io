<div style="width: 180px; height: 180px; background: radial-gradient(circle at center, #1A0033 0%, #0A001F 100%); border-radius: 50%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(13, 1, 46, 0.9); animation: pulse-shadow 5s infinite alternate ease-in-out;">  <div style="position: absolute; width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, rgba(138,43,226,0.6) 0%, transparent 75%); animation: swirl-outer 10s linear infinite;"></div>  <div style="position: absolute; width: 125px; height: 125px; border-radius: 50%; background: radial-gradient(circle, rgba(100,50,150,0.7) 0%, transparent 80%); animation: swirl-middle 11s linear infinite reverse;"></div> <div style="position: absolute; width: 110px; height: 110px; border-radius: 50%; background: radial-gradient(circle, rgba(75,0,130,0.8) 0%, transparent 85%); animation: swirl-inner 12s reverse linear infinite;"></div>  <div style="position: absolute; width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle, rgba(173,216,230,0.1) 0%, transparent 80%); animation: swirl-connect 15s linear infinite;"></div> <div style="position: absolute; width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle, rgba(224,187,228,0.9) 0%, transparent 95%); animation: pulse-core 3s infinite alternate;"></div>  <div style="position: absolute; width: 30px; height: 30px; border-radius: 50%; background-color: rgba(0,255,255,0.7); animation: glow-center-v15 1.5s infinite alternate;"></div>  <div style="position: absolute; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,255,255,0.2); animation: subtle-ripple 2s infinite ease-out; border: 1px solid rgba(0,255,255,0.5);"></div>  <style>    @keyframes pulse-shadow {      0% { transform: scale(1); box-shadow: 0 0 25px rgba(13, 1, 46, 0.7); }      100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(13, 1, 46, 1); }    }    @keyframes swirl-outer {      from { transform: rotate(0deg); }      to { transform: rotate(360deg); }    }    @keyframes swirl-middle {      from { transform: rotate(0deg); }      to { transform: rotate(360deg); }    }    @keyframes swirl-inner {      from { transform: rotate(0deg); }      to { transform: rotate(360deg); }    } @keyframes swirl-connect {      from { transform: rotate(0deg); }      to { transform: rotate(-360deg); }    }    @keyframes pulse-core {      0% { transform: scale(0.9); opacity: 0.8; }      100% { transform: scale(1.1); opacity: 1; }    }    @keyframes glow-center-v15 {      0% { box-shadow: 0 0 8px rgba(0,255,255,0.7); background-color: rgba(0,255,255,0.8); }      100% { box-shadow: 0 0 25px rgba(0,255,255,1); background-color: rgba(0,255,255,0.9); transform: scale(1.1); }    }    @keyframes subtle-ripple {      0% { transform: scale(0.8); opacity: 0.5; }      100% { transform: scale(1.2); opacity: 0; }    }  </style></div>
