<div style='width: 100%; height: 350px; background: radial-gradient(circle at center, #001a0a 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'><style>@keyframes grow-flow { 0% { transform: scale(0.8); opacity: 0.3; filter: blur(2px); } 50% { transform: scale(1.1); opacity: 0.9; filter: blur(0px); } 100% { transform: scale(0.8); opacity: 0.3; filter: blur(2px); } } @keyframes drift-current { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 200; } } @keyframes shimmer-light { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1); } } .flow-path { fill: none; stroke: #32CD32; stroke-width: 2; stroke-dasharray: 10, 10; animation: drift-current 6s linear infinite; filter: drop-shadow(0 0 10px #32CD32); } .core-orb { width: 120px; height: 120px; background: radial-gradient(circle, #32CD32 0%, #228B22 40%, transparent 70%); border-radius: 50%; animation: grow-flow 5s ease-in-out infinite; position: relative; z-index: 1; } .sparkle { position: absolute; background: #ADFF2F; border-radius: 50%; animation: shimmer-light 3s infinite ease-in-out; } .s1 { width: 5px; height: 5px; top: 20%; left: 15%; animation-delay: 0.5s; } .s2 { width: 3px; height: 3px; top: 40%; left: 80%; animation-delay: 1.5s; } .s3 { width: 7px; height: 7px; bottom: 10%; right: 20%; animation-delay: 2.5s; }</style><div class='core-orb'><div class='sparkle s1'></div><div class='sparkle s2'></div><div class='sparkle s3'></div></div><svg width='100%' height='100%' style='position: absolute; top: 0; left: 0;'><path class='flow-path' d='M0,175 C100,75 300,275 400,175' /><path class='flow-path' d='M0,150 C100,50 300,250 400,150' /><path class='flow-path' d='M0,200 C100,100 300,300 400,200' /></svg></div>
