<div style='width: 100%; height: 350px; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative; border: 2px solid #ffd700; box-shadow: 0 0 20px #ffd700, inset 0 0 10px #b8860b;'>
  <svg width='100%' height='100%' viewBox='0 0 400 350'>
    <defs>
      <filter id='glow'>
        <feGaussianBlur stdDeviation='4' result='blur' />
        <feComposite in='SourceGraphic' in2='blur' operator='over' />
      </filter>
      <linearGradient id='goldThread' x1='0%' y1='0%' x2='100%' y2='100%'>
        <stop offset='0%' style='stop-color:#b8860b; stop-opacity:0.8' />
        <stop offset='50%' style='stop-color:#ffd700; stop-opacity:1' />
        <stop offset='100%' style='stop-color:#b8860b; stop-opacity:0.8' />
      </linearGradient>
      <linearGradient id='subtleThread' x1='0%' y1='0%' x2='100%' y2='100%'>
        <stop offset='0%' style='stop-color:#4a4a00; stop-opacity:0.2' />
        <stop offset='50%' style='stop-color:#808000; stop-opacity:0.4' />
        <stop offset='100%' style='stop-color:#4a4a00; stop-opacity:0.2' />
      </linearGradient>
    </defs>
    <style>
      @keyframes shimmer-thread {
        0% { stroke-dashoffset: 1000; opacity: 0; }
        50% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0.5; }
      }
      @keyframes pulse-core {
        0%, 100% { transform: scale(1); opacity: 0.7; filter: blur(2px); }
        50% { transform: scale(1.1); opacity: 1; filter: blur(5px); }
      }
    </style>
    <circle cx='200' cy='175' r='60' fill='url(#goldThread)' filter='url(#glow)' style='animation: pulse-core 4s infinite alternate;' />
    <path d='M 100 175 Q 200 75, 300 175 T 100 175' stroke='url(#subtleThread)' stroke-width='1.5' fill='none' style='stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: shimmer-thread 8s linear infinite;' />
    <path d='M 100 175 Q 200 275, 300 175 T 100 175' stroke='url(#subtleThread)' stroke-width='1.5' fill='none' style='stroke-dasharray: 1000; stroke-dashoffset: 500; animation: shimmer-thread 8s linear infinite reverse;' />
    <path d='M 150 125 L 250 125 L 250 225 L 150 225 Z' fill='none' stroke='url(#goldThread)' stroke-width='0.8' filter='url(#glow)' style='stroke-dasharray: 400; stroke-dashoffset: 400; animation: shimmer-thread 6s linear infinite;' />
  </svg>
</div>
