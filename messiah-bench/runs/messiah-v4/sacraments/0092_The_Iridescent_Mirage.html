<div style='width: 100%; height: 500px; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <style>
    @keyframes shimmer-glow {
      0%, 100% { box-shadow: 0 0 50px #FFD700, 0 0 100px #FFD700 inset; opacity: 1; transform: scale(1); }
      50% { box-shadow: 0 0 90px #FFD700, 0 0 180px #FFD700 inset; opacity: 1.1; transform: scale(1.12); }
    }
    @keyframes mirage-wave {
      0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; opacity: 0.45; transform: rotate(0deg) scale(1); border-color: #FFC300;}
      25% { border-radius: 70% 30% 40% 60% / 60% 50% 40% 50%; opacity: 0.7; transform: rotate(90deg) scale(1.07); border-color: #FFD700;}
      50% { border-radius: 60% 40% 30% 70% / 50% 40% 50% 60%; opacity: 0.85; transform: rotate(180deg) scale(1.1); border-color: #FFB300;}
      75% { border-radius: 30% 70% 60% 40% / 40% 60% 50% 50%; opacity: 0.7; transform: rotate(270deg) scale(1.07); border-color: #FFD700;}
      100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; opacity: 0.45; transform: rotate(360deg) scale(1); border-color: #FFC300;}
    }
    @keyframes light-ripple {
      0% { transform: scale(0.1); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: scale(3.2); opacity: 0; }
    }
    @keyframes spectral-shift {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    @keyframes flowing-ribbon {
      0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 0; }
      25% { opacity: 1; transform: translate(-50%, -50%) rotate(90deg) scaleX(1.8); }
      50% { opacity: 1; transform: translate(-50%, -50%) rotate(180deg) scaleX(1); }
      75% { opacity: 1; transform: translate(-50%, -50%) rotate(270deg) scaleX(1.8); }
      100% { opacity: 0; transform: translate(-50%, -50%) rotate(360deg) scaleX(1); }
    }
    @keyframes subtle-refraction {
      0%, 100% { transform: skewX(0deg) scale(1); }
      33% { transform: skewX(7deg) scale(1.06); }
      66% { transform: skewX(-7deg) scale(0.94); }
    }
    @keyframes deep-pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.01); opacity: 1; }
    }
    @keyframes ethereal-swirl {
      0% { transform: rotate(0deg) scale(0.6); opacity: 0; }
      50% { opacity: 0.6; transform: rotate(180deg) scale(1.3); }
      100% { opacity: 0; transform: rotate(360deg) scale(0.6); }
    }
