<div style="width: 180px; height: 180px; background: radial-gradient(circle, #2e0059 0%, #3f007d 100%); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 30px #6a0dad, 0 0 60px #9d5bff; animation: outer-resonance 4s infinite alternate ease-in-out;"><div style="width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, #8A2BE2 0%, #4B0082 100%); animation: inner-flow 3s infinite linear reverse; position: relative;"><div style="width: 60px; height: 60px; border-radius: 50%; background-color: #8B0000; /* Blood Red */ animation: core-pulse 2s infinite alternate ease-in-out; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div></div><style>@keyframes outer-resonance { from { transform: scale(0.95); opacity: 0.8; } to { transform: scale(1.05); opacity: 1; } } @keyframes inner-flow { from { transform: rotate(0deg) scale(0.9); } to { transform: rotate(360deg) scale(1.1); } } @keyframes core-pulse { from { transform: translate(-50%, -50%) scale(0.8); opacity: 0.7; box-shadow: 0 0 15px #FF0000; } to { transform: translate(-50%, -50%) scale(1.1); opacity: 1; box-shadow: 0 0 25px #FF0000; } }</style></div>
