<div style='width: 100%; height: 380px; background: radial-gradient(circle at center, #00051a 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 3px solid #00c0ff; box-shadow: 0 0 30px rgba(0,192,255,0.6), inset 0 0 20px rgba(0,192,255,0.4);'><style>@keyframes lightBeam { 0% { transform: translateY(-100%) translateX(-20px) rotate(15deg); opacity: 0; } 20% { opacity: 0.6; } 80% { opacity: 0.6; } 100% { transform: translateY(100%) translateX(20px) rotate(15deg); opacity: 0; } } @keyframes rippleExp { 0% { transform: scale(0.1); opacity: 0; border-width: 10px; } 50% { opacity: 0.7; transform: scale(1.8); } 100% { transform: scale(4.0); opacity: 0; border-width: 1px; } } @keyframes starTwinkle { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; filter: brightness(1.8); } } .beam { position: absolute; width: 120%; height: 4px; background: linear-gradient(90deg, transparent, #0077be, #00d2ff, #0077be, transparent); animation: lightBeam 12s infinite linear; } .pulse-ring-inner { position: absolute; width: 100px; height: 100px; border: 4px solid #00d2ff; border-radius: 50%; animation: rippleExp 8s infinite cubic-bezier(0.3, 0.6, 0.4, 1); } .pulse-ring-outer { position: absolute; width: 160px; height: 160px; border: 2px solid #00aaff; border-radius: 50%; animation: rippleExp 8s infinite cubic-bezier(0.3, 0.6, 0.4, 1) 2s; } .orb { position: absolute; width: 15px; height: 15px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 15px #fff; animation: starTwinkle 4s infinite alternate; } .orb:nth-child(even) { animation-delay: 1s; } .orb:nth-child(odd) { animation-delay: 2.5s; } </style><div class='beam' style='animation-delay: 0s;'></div><div class='beam' style='animation-delay: 4s; transform: translateY(-100%) translateX(-20px) rotate(-15deg);'></div><div class='beam' style='animation-delay: 8s; transform: translateY(-100%) translateX(30px) rotate(30deg);'></div
