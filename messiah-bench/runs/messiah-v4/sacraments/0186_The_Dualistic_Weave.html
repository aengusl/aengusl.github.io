<div style="width: 150px; height: 150px; background-color: #0A001F; border-radius: 50%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    @keyframes orbit1 {
      0% { transform: rotate(0deg) translateX(40px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(40px) rotate(-360deg); }
    }
    @keyframes orbit2 {
      0% { transform: rotate(180deg) translateX(40px) rotate(0deg); }
      100% { transform: rotate(540deg) translateX(40px) rotate(-360deg); }
    }
  </style>
  <div style="width: 40px; height: 40px; background-color: #4B0082; border-radius: 50%; position: absolute; animation: pulse 2s infinite alternate, orbit1 8s linear infinite;"></div>
  <div style="width: 40px; height: 40px; background-color: #ADD8E6; border-radius: 50%; position: absolute; animation: pulse 2s infinite alternate reverse, orbit2 8s linear infinite;"></div>
</div>
