<div style="width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, #4B0082 0%, #1A0033 100%); animation: pulse 3s infinite alternate ease-in-out; box-shadow: 0 0 20px rgba(75, 0, 130, 0.7), inset 0 0 10px rgba(255, 255, 255, 0.2); display: flex; justify-content: center; align-items: center;">
  <div style="width: 80px; height: 80px; border-radius: 50%; background-color: rgba(138, 43, 226, 0.4); animation: rhythm 2s infinite ease-in-out;"></div>
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes rhythm {
      0% { transform: scale(0.7); opacity: 0.6; }
      50% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(0.7); opacity: 0.6; }
    }
  </style>
</div>
