<div style="width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, indigo 0%, rebeccapurple 50%, darkblue 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; box-shadow: 0 0 20px indigo, 0 0 30px rebeccapurple; animation: pulseGlow 3s infinite alternate ease-in-out;"><div style="position: absolute; width: 80%; height: 80%; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.4); animation: rotateWave 5s infinite linear;"></div><div style="position: absolute; width: 40%; height: 40%; border-radius: 50%; background-color: rgba(255, 255, 255, 0.2); animation: scalePulse 2s infinite alternate;"></div><style>@keyframes pulseGlow { from { transform: scale(0.95); opacity: 0.8; } to { transform: scale(1.05); opacity: 1; }}@keyframes rotateWave { from { transform: rotate(0deg); } to { transform: rotate(360deg); }}@keyframes scalePulse { from { transform: scale(0.8); } to { transform: scale(1.2); }}</style></div>
