<div style="width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(45deg, #00FFFF, #8A2BE2); animation: pulse 3s infinite alternate, rotate 5s linear infinite; box-shadow: 0 0 20px rgba(0,255,255,0.7), 0 0 30px rgba(138,43,226,0.7); display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden;">
    <style>
        @keyframes pulse {0% { transform: scale(1); opacity: 0.8; }100% { transform: scale(1.1); opacity: 1; }}
        @keyframes rotate {0% { transform: rotate(0deg); }100% { transform: rotate(360deg); }}
        @keyframes transform-fade {
            0% { border-radius: 0%; transform: scale(0.5) rotate(0deg); opacity: 0; }
            25% { border-radius: 50%; transform: scale(0.8) rotate(90deg); opacity: 0.7; }
            50% { border-radius: 0%; transform: scale(1) rotate(180deg); opacity: 1; }
            75% { border-radius: 50%; transform: scale(0.8) rotate(270deg); opacity: 0.7; }
            100% { border-radius: 0%; transform: scale(0.5) rotate(360deg); opacity: 0; }
        }
    </style>
    <div style="width: 60px; height: 60px; background-color: rgba(255, 255, 255, 0.4); animation: transform-fade 6s infinite ease-in-out; position: absolute;"></div>
</div>
