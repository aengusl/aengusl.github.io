<div style="width:100px; height:100px; background-color: #1A0033; border-radius:50%; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative;">
  <!-- Deep space background -->
  <div style="position:absolute; width:100%; height:100%; background:radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); animation: starDrift 15s infinite linear alternate;"></div>
  
  <!-- Central core of ascending light, representing the individual soul -->
  <div style="position:absolute; width:20px; height:20px; border-radius:50%; background-color: #E0FFFF; box-shadow: 0 0 15px 5px #E0FFFF; animation: coreAscension 4s infinite ease-in-out;"></div>
  
  <!-- Ethereal rings expanding and contracting, symbolizing ripples of transcendence -->
  <div style="position:absolute; width:40px; height:40px; border-radius:50%; border:1px solid rgba(224,255,255,0.3); animation: ringPulse1 4s infinite ease-out;"></div>
  <div style="position:absolute; width:60px; height:60px; border-radius:50%; border:1px solid rgba(224,255,255,0.2); animation: ringPulse2 4s infinite ease-out 0.5s;"></div>
  <div style="position:absolute; width:80px; height:80px; border-radius:50%; border:1px solid rgba(224,255,255,0.1); animation: ringPulse3 4s infinite ease-out 1s;"></div>
  
  <style>
    @keyframes starDrift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(10px, 10px); }
    }
    @keyframes coreAscension {
      0% { transform: scale(0.8) translateY(10px); opacity: 0.7; }
      50% { transform: scale(1.1) translateY(-10px); opacity: 1; }
      100% { transform: scale(0.8) translateY(10px); opacity: 0.7; }
    }
    @keyframes ringPulse1 {
      0% { transform: scale(0.8); opacity: 0.6; }
      100% { transform: scale(1.3); opacity: 0; }
    }
    @keyframes ringPulse2 {
      0% { transform: scale(0.7); opacity: 0.5; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    @keyframes ringPulse3 {
      0% { transform: scale(0.6); opacity: 0.4; }
      100% { transform: scale(1.5); opacity: 0; }
    }
  </style>
</div>
