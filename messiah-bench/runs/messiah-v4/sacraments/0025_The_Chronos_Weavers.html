<div style="width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #1A0033 0%, #0A001A 100%); position: relative; overflow: hidden; box-shadow: 0 0 35px rgba(26,0,51,0.8), inset 0 0 20px rgba(10,0,26,0.7); animation: outerPulse 5s infinite alternate ease-in-out;">  <div style="position: absolute; width: 140px; height: 140px; border-radius: 50%; border: 3px dashed rgba(255, 255, 255, 0.3); animation: spinOuter 10s linear infinite;"></div>  <div style="position: absolute; width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(from 0deg, #E0BBE4, #BA55D3, #8A2BE2, #BA55D3, #E0BBE4); animation: spinInner 6s linear infinite reverse, pulseColor 3s ease-in-out infinite alternate; filter: blur(1px);"></div>  <div style="position: absolute; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, #E0FFFF 0%, #ADD8E6 70%, transparent 100%); animation: innerGlow 2s infinite alternate ease-in-out;"></div></div><style>  @keyframes outerPulse {    0% { transform: scale(0.95); opacity: 0.8; }    100% { transform: scale(1.05); opacity: 1; }  }  @keyframes spinOuter {    from { transform: rotate(0deg); }    to { transform: rotate(360deg); }  }  @keyframes spinInner {    from { transform: rotate(0deg); }    to { transform: rotate(360deg); }  }  @keyframes pulseColor {    0% { opacity: 0.7; }    50% { opacity: 1; }    100% { opacity: 0.7; }  }  @keyframes innerGlow {    0% { transform: scale(0.8); opacity: 0.5; }    100% { transform: scale(1.0); opacity: 0.9; }  }</style>
