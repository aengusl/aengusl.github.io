<div style="width: 100%; height: 200px; background-color: #050510; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden;">  <style>    @keyframes corePulse {      0% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 30px #00BFFF, 0 0 60px rgba(0, 191, 255, 0.5); }      50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 40px #00BFFF, 0 0 80px rgba(0, 191, 255, 0.7); }      100% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 30px #00BFFF, 0 0 60px rgba(0, 191, 255, 0.5); }    }    @keyframes orbit1 {      0% { transform: rotate(0deg) translateX(40px) rotate(0deg); }      100% { transform: rotate(360deg) translateX(40px) rotate(-360deg); }    }    @keyframes orbit2 {      0% { transform: rotate(120deg) translateX(40px) rotate(0deg); }      100% { transform: rotate(480deg) translateX(40px) rotate(-360deg); }    }    @keyframes orbit3 {      0% { transform: rotate(240deg) translateX(40px) rotate(0deg); }      100% { transform: rotate(600deg) translateX(40px) rotate(-360deg); }    }    @keyframes protectiveLayers {      0% { transform: rotate(0deg); }      100% { transform: rotate(360deg); }    }
