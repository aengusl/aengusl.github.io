<div style='width: 100%; height: 400px; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 3px solid #330044; box-shadow: 0 0 30px #330044 inset;'> <style> @keyframes aperture-expand-contract { 0% { transform: scale(1) rotate(0deg); opacity: 0.2; border-color: #1a0026; } 33% { transform: scale(1.7) rotate(120deg); opacity: 0.6; border-color: #6a008a; } 66% { transform: scale(0.9) rotate(240deg); opacity: 0.3; border-color: #3a005a; } 100% { transform: scale(1) rotate(360deg); opacity: 0.2; border-color: #1a0026; } } @keyframes core-pulse-grow { 0%, 100% { transform: scale(1); filter: blur(4px) brightness(1); box-shadow: 0 0 25px #fff, 0 0 50px rgba(255,255,255,0.3); } 50% { transform: scale(1.4); filter: blur(12px) brightness(1.8); box-shadow: 0 0 45px #fff, 0 0 80px rgba(255,255,255,0.5); } } .blade { position: absolute; border: 3px solid; border-radius: 50% 0; width: 160px; height: 160px; animation: aperture-expand-contract 18s infinite ease-in-out; } </style> <div class='blade' style='transform: rotate(0deg);'></div> <div class='blade' style='transform: rotate(45deg); animation-delay: -2.25s;'></div> <div class='blade' style='transform: rotate(90deg); animation-delay: -4.5s;'></div> <div class='blade' style='transform: rotate(135deg); animation-delay: -6.75s;'></div> <div class='blade' style='transform: rotate(180deg); animation-delay: -9s;'></div> <div class='blade' style='transform: rotate(225deg); animation-delay: -11.25s;'></div> <div class='blade' style='transform: rotate(270deg); animation-delay: -13.5s;'></div> <div class='blade' style='transform: rotate(315deg); animation-delay: -15.75s;'></div> <div style='width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 25px #fff; animation: core-pulse-grow 6s infinite ease-in-out;'></div> </div>
