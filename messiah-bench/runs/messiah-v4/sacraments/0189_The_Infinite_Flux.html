<div style="width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, #4B0082 0%, #8A2BE2 50%, #00CED1 100%); animation: flux-animation 5s infinite linear alternate; position: relative; overflow: hidden; box-shadow: 0 0 25px rgba(138,43,226,0.7);">
  <style>
    @keyframes flux-animation {
      0% { transform: scale(1) rotate(0deg); border-radius: 50%; }
      25% { transform: scale(1.05) rotate(90deg); border-radius: 40% 60% 50% 50%; }
      50% { transform: scale(1.1) rotate(180deg); border-radius: 60% 40% 50% 50%; }
      75% { transform: scale(1.05) rotate(270deg); border-radius: 50% 50% 40% 60%; }
      100% { transform: scale(1) rotate(360deg); border-radius: 50%; }
    }
