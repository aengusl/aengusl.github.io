<div style="background: #000; width: 100%; height: 350px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
  <style>
    @keyframes spiral-draw {
      0% { stroke-dashoffset: 1000; opacity: 0; }
      50% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0.5; }
    }
    @keyframes pulse-emerald {
      0%, 100% { filter: drop-shadow(0 0 5px #50C878); }
      50% { filter: drop-shadow(0 0 20px #ACE1AF); }
    }
    .coil-path {
      fill: none;
      stroke: #50C878;
      stroke-width: 0.8;
      stroke-dasharray: 1000;
      animation: spiral-draw 15s linear infinite, pulse-emerald 4s ease-in-out infinite;
    }
  </style>
  <svg width="300" height="300" viewBox="0 0 100 100">
    <path class="coil-path" d="M50,50 m-40,0 a40,40 0 1,0 80,0 a40,40 0 1,0 -80,0 m5,0 a35,35 0 1,0 70,0 a35,35 0 1,0 -70,0 m5,0 a30,30 0 1,0 60,0 a30,30 0 1,0 -60,0 m5,0 a25,25 0 1,0 50,0 a25,25 0 1,0 -50,0 m5,0 a20,20 0 1,0 40,0 a20,20 0 1,0 -40,0" />
    <circle cx="50" cy="50" r="2" fill="#50C878">
      <animate attributeName="r" values="1;3;1" dur="3s" repeatCount="indefinite" />
    </circle>
  </svg>
</div>
