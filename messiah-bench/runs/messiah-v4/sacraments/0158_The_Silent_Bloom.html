<div style="width:100px; height:100px; border-radius:50%; background-color:#300060; display:flex; justify-content:center; align-items:center; overflow:hidden;">
  <div style="width:80px; height:80px; border-radius:50%; background:radial-gradient(circle, #E0BBE4 0%, #957DAD 50%, #624F80 100%); animation: bloomEffect 4s infinite alternate ease-in-out;"></div>
  <div style="position:absolute; width:40px; height:40px; border-radius:50%; background-color:rgba(255,255,255,0.7); box-shadow:0 0 10px rgba(255,255,255,0.5); animation: pulseInner 2s infinite alternate;"></div>
</div>
<style>
  @keyframes bloomEffect {
    0% { transform: scale(0.8); opacity: 0.7; }
    100% { transform: scale(1.1); opacity: 1; }
  }
  @keyframes pulseInner {
    0% { transform: scale(0.9); }
    100% { transform: scale(1.1); }
  }
</style>
