<div style="width: 150px; height: 150px; background: radial-gradient(circle at center, #4B0082 0%, #2e0854 100%); border-radius: 50%; animation: pulse 3s infinite alternate; position: relative; display: flex; justify-content: center; align-items: center;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 10px #4B0082; }
      50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 25px #8A2BE2; }
      100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 10px #4B0082; }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <div style="width: 100px; height: 100px; border-radius: 50%; border: 2px solid #8A2BE2; position: absolute; animation: spin 8s linear infinite;"></div>
  <div style="width: 60px; height: 60px; border-radius: 50%; background-color: rgba(255,255,255,0.3); position: absolute; animation: pulse 2s infinite alternate-reverse;"></div>
</div>
