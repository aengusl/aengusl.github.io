<svg width="200" height="200" viewBox="0 0 200 200" style="background-color: #0d012e;">
  <defs>
    <radialGradient id="insightGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#E0BBE4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B0082;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="80" fill="url(#insightGradient)" filter="url(#glow)">
    <animate attributeName="r" values="80;90;80" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite" />
  </circle>
  <path d="M100 20 L180 100 L100 180 L20 100 Z" fill="none" stroke="#9370DB" stroke-width="2" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="6s" repeatCount
