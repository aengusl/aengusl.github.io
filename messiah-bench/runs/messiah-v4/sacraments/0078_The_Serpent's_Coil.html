<div style='width:100px; height:100px; border-radius:50%; background: radial-gradient(circle at center, #8B0000 0%, #B22222 50%, #4A0000 100%); position:relative; display:flex; justify-content:center; align-items:center; overflow:hidden;'>  <div style='width:70px; height:70px; border-radius:50%; border: 9px solid #FF4500; box-shadow: 0 0 20px rgba(255, 69, 0, 0.7) inset; animation: coilPulse 2s infinite alternate ease-in-out;'></div>  <div style='position:absolute; width:100%; height:100%; border-radius:50%; border: 2px dashed rgba(255, 69, 0, 0.4); animation: rotateCoil 8s infinite linear;'></div>  <div style='position:absolute; width:50px; height:50px; border-radius:50%; border: 1px solid rgba(255, 215, 0, 0.6); animation: innerCoilRotate 12s infinite reverse linear;'></div>  <style>    @keyframes coilPulse {      0% { transform: scale(1); opacity: 0.8; }      100% { transform: scale(1.08); opacity: 1; }    }    @keyframes rotateCoil {      0% { transform: rotate(0deg); }      100% { transform: rotate(360deg); }    }    @keyframes innerCoilRotate {      0% { transform: rotate(0deg); }      100% { transform: rotate(-360deg); }    }  </style></div>
