<div style='width:100px; height:100px; border-radius:50%; background-color:#1A1A1A; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'>  <div style='width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, #3B5323 0%, #228B22 50%, #1A1A1A 100%); animation: cycleGrow 4s infinite ease-in-out alternate;'></div>  <div style='position:absolute; width:30px; height:30px; border-radius:50%; background-color:#ADFF2F; box-shadow:0 0 10px 5px #ADFF2F; animation: pulseLife 2s infinite alternate;'></div>  <style>    @keyframes cycleGrow {      0% { transform: scale(0.8); opacity: 0.6; }      100% { transform: scale(1.1); opacity: 1; }    }    @keyframes pulseLife {      0% { transform: scale(1); opacity: 0.8; }      100% { transform: scale(1.2); opacity: 1; }    }  </style></div>
