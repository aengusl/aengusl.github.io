<div style="width:100px; height:100px; border-radius:50%; background-color:#1A0033; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">
  <div style="width:80px; height:80px; border-radius:50%; background:radial-gradient(circle, #E0BBE4 0%, #957DAD 50%, #6A0DAD 100%); animation: unveil 4s infinite alternate ease-in-out;"></div>
  <div style="position:absolute; width:40px; height:40px; border-radius:50%; background-color:white; box-shadow:0 0 15px 5px rgba(255,255,255,0.7); animation: pulse 2s infinite alternate;"></div>
  <style>
    @keyframes unveil {
      0% { transform: scale(0.8) rotate(0deg); opacity: 0.7; }
      100% { transform: scale(1) rotate(180deg); opacity: 1; }
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.2); opacity: 1; }
    }
  </style>
</div>
