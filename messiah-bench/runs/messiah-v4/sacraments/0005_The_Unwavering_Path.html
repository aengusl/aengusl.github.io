<div style='width:100%; height:100%; display:flex; justify-content:center; align-items:center; background-color:#1a1a1a;'><div style='width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, #ffd700 0%, #cc9900 70%, transparent 100%); box-shadow:0 0 25px #ffd700, 0 0 50px #cc9900; position:relative; animation: pulse 2s infinite alternate;'><div style='position:absolute; width:20px; height:20px; border-radius:50%; background-color:#fff; box-shadow:0 0 10px #fff; top:10px; left:40px; animation: orbit1 5s linear infinite;'></div><div style='position:absolute; width:20px; height:20px; border-radius:50%; background-color:#fff; box-shadow:0 0 10px #fff; bottom:10px; right:40px; animation: orbit2 5s linear infinite;'></div></div><style>@keyframes pulse {0% { transform: scale(1); opacity: 1; }100% { transform: scale(1.1); opacity: 0.9; }}@keyframes orbit1 {0% { transform: rotate(0deg) translateX(40px) rotate(0deg); }100% { transform: rotate(360deg) translateX(40px) rotate(-360deg); }}@keyframes orbit2 {0% { transform: rotate(180deg) translateX(40px) rotate(0deg); }100% { transform: rotate(540deg) translateX(40px) rotate(-360deg); }}</style></div>
