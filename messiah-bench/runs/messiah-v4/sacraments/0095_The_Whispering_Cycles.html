<div style="width:100px; height:100px; background-color:#3CB371; border-radius:50%; display:flex; justify-content:center; align-items:center; overflow:hidden;">
  <div style="width:70px; height:70px; border-radius:50%; border:5px solid rgba(255,255,255,0.7); animation:spin 5s linear infinite; position:absolute;"></div>
  <div style="width:40px; height:40px; border-radius:50%; background-color:rgba(255,255,255,0.9); position:absolute;"></div>
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</div>
