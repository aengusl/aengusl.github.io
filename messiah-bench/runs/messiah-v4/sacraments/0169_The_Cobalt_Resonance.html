<div style="width: 180px; height: 180px; background: radial-gradient(circle at center, #0047AB 0%, #002B7F 100%); border-radius: 50%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 35px rgba(0, 71, 171, 0.9), inset 0 0 15px rgba(255, 255, 255, 0.5); animation: deepPulse 4s infinite alternate ease-in-out;">
  <div style="width: 100px; height: 100px; background: radial-gradient(circle at center, rgba(0, 71, 171, 0.8) 0%, transparent 100%); border-radius: 50%; position: absolute; animation: expandWave 5s infinite linear;"></div>
  <div style="width: 60px; height: 60px; background-color: rgba(255, 255, 255, 0.6); border-radius: 50%; position: absolute; animation: subtleFlicker 2s infinite alternate;"></div>
  <div style="position: absolute; width: 140px; height: 140px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.3); animation: slowRotate 10s linear infinite;"></div>
  <div style="position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 1px solid rgba(0, 71, 171, 0.7); animation: fasterRotate 6s linear infinite reverse;"></div>
  <style>
    @keyframes deepPulse {
      0% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 25px rgba(0, 71, 171, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.4); }
      100% { transform: scale(1.08); opacity: 1; box-shadow: 0 0 45px rgba(0, 71, 171, 1), inset 0 0 15px rgba(255, 255, 255, 0.6); }
    }
    @keyframes expandWave {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }
    @keyframes subtleFlicker {
      0% { opacity: 0.5; }
      100% { opacity: 0.9; }
    }
    @keyframes slowRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes fasterRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</div>
