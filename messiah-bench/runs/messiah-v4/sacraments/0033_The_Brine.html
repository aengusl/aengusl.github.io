<div style='background: #1a0000; width: 100%; height: 300px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'><style>@keyframes brine-pulse { 0% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.15); opacity: 0.6; } 100% { transform: scale(1); opacity: 0.3; } } @keyframes sediment-drift { from { transform: translateY(-160px) rotate(0deg); opacity: 0; } 20% { opacity: 0.8; } 80% { opacity: 0.8; } to { transform: translateY(160px) rotate(360deg); opacity: 0; } }</style><div style='width: 250px; height: 250px; background: radial-gradient(circle, #4b0000 0%, #1a0000 80%); border-radius: 50%; border: 2px solid #8b0000; animation: brine-pulse 10s infinite ease-in-out;'></div><div style='position: absolute; width: 6px; height: 6px; background: #ff4d4d; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); left: 25%; animation: sediment-drift 14s linear infinite;'></div><div style='position: absolute; width: 9px; height: 9px; background: #8b0000; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); left: 55%; animation: sediment-drift 18s linear infinite -7s;'></div><div style='position: absolute; width: 4px; height: 4px; background: #ff0000; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); left: 75%; animation: sediment-drift 11s linear infinite -3s;'></div><div style='position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 30%, #000 100%); pointer-events: none;'></div></div>
