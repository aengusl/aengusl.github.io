<div style='background: #000; padding: 40px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden;'><div style='width: 80px; height: 80px; background: radial-gradient(circle at 50% 50%, #FF6600, #FF0000, transparent); border-radius: 50%; box-shadow: 0 0 30px #FF4500, 0 0 50px #FF8C00; animation: core-burst 0.7s ease-in-out infinite alternate;'></div><div style='position: absolute; width: 150px; height: 150px; border: 3px solid #FFD700; border-radius: 50%; opacity: 0; animation: expanding-ring 2s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94);'></div><div style='position: absolute; width: 200px; height: 200px; border: 2px solid #FF8C00; border-radius: 50%; opacity: 0; animation: expanding-ring 2s infinite 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);'></div><style>@keyframes core-burst { from { transform: scale(0.9); filter: blur(1px); } to { transform: scale(1.1); filter: blur(3px); } } @keyframes expanding-ring { 0% { transform: scale(0.1); opacity: 0; border-width: 5px; } 50% { opacity: 0.6; border-width: 2px; } 100% { transform: scale(1); opacity: 0; border-width: 1px; } }</style></div>
