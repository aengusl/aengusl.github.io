<div style="width:150px; height:150px; background-color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
  <div style="width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #FFD700 0%, #FFA500 50%, transparent 100%); animation: emberPulse 3s infinite alternate ease-in-out; position: absolute;"></div>
  <div style="width: 30px; height: 30px; border-radius: 50%; background-color: #FF4500; box-shadow: 0 0 15px #FF4500, 0 0 25px orange; position: absolute; z-index: 1;"></div>
  <style>
    @keyframes emberPulse {
      0% { transform: scale(0.8); opacity: 0.7; filter: blur(5px); }
      50% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
      100% { transform: scale(0.8); opacity: 0.7; filter: blur(5px); }
    }
  </style>
</div>
