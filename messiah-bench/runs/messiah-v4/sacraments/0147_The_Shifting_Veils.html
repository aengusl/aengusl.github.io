<div style="width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle at center, #1A0033 0%, #0A001F 100%); position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(13, 1, 46, 0.9); animation: pulse-shadow 5s infinite alternate ease-in-out;">  <style>    @keyframes pulse-shadow {      0% { transform: scale(1); box-shadow: 0 0 25px rgba(13, 1, 46, 0.7); }      100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(13, 1, 46, 0.9); }    }    @keyframes veil-rotate-slow {      0% { transform: rotate(0deg); }      100% { transform: rotate(360deg); }    }    @keyframes veil-rotate-fast {      0% { transform: rotate(360deg); }      100% { transform: rotate(0deg); }    }    @keyframes inner-pulse-color {      0% { background: radial-gradient(circle, #E0BBE4 0%, #957DAD 100%); }      50% { background: radial-gradient(circle, #ADD8E6 0%, #6A5ACD 100%); }      100% { background: radial-gradient(circle, #E0BBE4 0%, #957DAD 100%); }    }    @keyframes shimmer-glow {      0% { opacity: 0.5; box-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }      50% { opacity: 1; box-shadow: 0 0 20px rgba(255, 255, 255, 0.7); }      100% { opacity: 0.5; box-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }    }
