<div style="width:180px; height:180px; background: linear-gradient(135deg, #008080, #40E0D0); border-radius:50%; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 25px #008080, 0 0 40px #40E0D0; animation: pulse-gradient 4s infinite alternate ease-in-out;">  <div style="width:140px; height:140px; border-radius:50%; background: radial-gradient(circle, #E0FFFF 0%, #B0E0E6 100%); animation: inner-balance 3s infinite linear alternate;">    <div style="position:absolute; top:20%; left:20%; width:30px; height:30px; background-color: #00FFFF; border-radius:50%; animation: float-light 5s infinite ease-in-out;"></div>    <div style="position:absolute; bottom:20%; right:20%; width:30px; height:30px; background-color: #00CED1; border-radius:50%; animation: float-light 5s infinite ease-in-out reverse;"></div>  </div></div><style>  @keyframes pulse-gradient {    0% { transform: scale(0.95); box-shadow: 0 0 20px #008080, 0 0 35px #40E0D0; }    100% { transform: scale(1.05); box-shadow: 0 0 30px #008080, 0 0 50px #40E0D0; }  }  @keyframes inner-balance {    0% { transform: rotate(0deg) scale(0.9); }    50% { transform: rotate(180deg) scale(1.1); }    100% { transform: rotate(360deg) scale(0.9); }  }  @keyframes float-light {    0% { transform: translate(0, 0) scale(0.8); opacity: 0.7; }    25% { transform: translate(5px, -5px) scale(1); opacity: 1; }    50% { transform: translate(0, 0) scale(1.2); opacity: 0.9; }    75% { transform: translate(-5px, 5px) scale(1); opacity: 1; }    100% { transform: translate(0, 0) scale(0.8); opacity: 0.7; }  }</style>
