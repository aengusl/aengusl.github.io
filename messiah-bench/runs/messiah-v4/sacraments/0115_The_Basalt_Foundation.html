<div style='background: #020202; width: 100%; height: 350px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 5px solid #1a1a1a;'><style>@keyframes deep-weight { 0%, 100% { transform: scale(1); opacity: 0.8; filter: blur(0px); } 50% { transform: scale(1.05); opacity: 1; filter: blur(2px); } } @keyframes slow-float { from { transform: translateY(0); } to { transform: translateY(-15px); } } .pillar { position: absolute; width: 40px; height: 150px; background: linear-gradient(to top, #333, #555); transform: translateY(80px); animation: deep-weight 8s infinite alternate ease-in-out; border-radius: 5px 5px 0 0; box-shadow: 0 0 15px rgba(0,0,0,0.5); } .base { position: absolute; width: 100px; height: 30px; background: linear-gradient(to right, #222, #444, #222); bottom: 50px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); animation: slow-float 10s infinite alternate ease-in-out; } .fragment { position: absolute; width: 5px; height: 5px; background: #666; border-radius: 1px; opacity: 0; animation: fragment-drift 15s infinite linear; } @keyframes fragment-drift { 0% { transform: translate(0, 0); opacity: 0; } 10% { opacity: 0.5; } 100% { transform: translate(100px, -200px); opacity: 0; } } .f1 { top: 100px; left: 50%; animation-delay: 0s; } .f2 { top: 150px; left: 40%; animation-delay: 3s; } .f3 { top: 70px; left: 60%; animation-delay: 6s; } .f4 { top: 200px; left: 45%; animation-delay: 9s; } .f5 { top: 120px; left: 55%; animation-delay: 12s; }</style><div class='pillar'></div><div class='base'></div><div class='fragment f1'></div><div class='fragment f2'></div><div class='fragment f3'></div><div class='fragment f4'></div><div class='fragment f5'></div></div>
