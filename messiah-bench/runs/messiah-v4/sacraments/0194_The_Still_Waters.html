<div style="width:100px; height:100px; border-radius:50%; background-color:#004d4d; /* Dark teal for depth */ display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">
  <div style="width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%); animation: ripple 3s infinite ease-in-out;"></div>
  <div style="width:30px; height:30px; border-radius:50%; background-color:rgba(173,216,230,0.5); box-shadow:0 0 10px 5px rgba(173,216,230,0.7); animation: glow 2s infinite alternate;"></div>
</div>
<style>
  @keyframes ripple {
    0% { transform: scale(0.8); opacity: 0.7; }
    50% { transform: scale(1.1); opacity: 0.4; }
    100% { transform: scale(0.8); opacity: 0.7; }
  }
  @keyframes glow {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.1); opacity: 1; }
  }
</style>
