<div style="width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #8B0000 0%, #4B0000 100%); animation: pulse-glow 3s infinite alternate ease-in-out; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">  <div style="width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, #FF4500 0%, #8B0000 100%); animation: inner-vortex 5s infinite linear reverse; filter: blur(1px);"></div>  <div style="position: absolute; width: 60px; height: 60px; border-radius: 50%; background-color: #FFD700; opacity: 0.7; animation: flicker 1.5s infinite alternate ease-in-out; box-shadow: 0 0 15px #FFD700;"></div>  <style>    @keyframes pulse-glow {      0% { transform: scale(0.95); box-shadow: 0 0 25px rgba(139, 0, 0, 0.7), 0 0 40px rgba(75, 0, 0, 0.5); }      100% { transform: scale(1.05); box-shadow: 0 0 40px rgba(139, 0, 0, 0.9), 0 0 60px rgba(75, 0, 0, 0.7); }    }    @keyframes inner-vortex {      0% { transform: rotate(0deg) scale(0.8); opacity: 0.9; }      100% { transform: rotate(360deg) scale(1.2); opacity: 0.6; }    }    @keyframes flicker {      0% { opacity: 0.7; }      50% { opacity: 1; }      100% { opacity: 0.7; }    }  </style></div>
