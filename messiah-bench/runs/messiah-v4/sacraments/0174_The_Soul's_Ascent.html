<div style="width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, #E0BBE4 0%, #6A0DAD 100%); animation: pulse 3s infinite alternate; box-shadow: 0 0 20px rgba(106, 13, 173, 0.7), inset 0 0 10px rgba(224, 187, 228, 0.5); display: flex; justify-content: center; align-items: center;">
  <div style="width: 80px; height: 80px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.3); animation: shimmer 4s infinite ease-in-out;"></div>
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes shimmer {
      0% { transform: scale(0.9) rotate(0deg); opacity: 0.5; }
      50% { transform: scale(1.05) rotate(180deg); opacity: 0.8; }
      100% { transform: scale(0.9) rotate(360deg); opacity: 0.5; }
    }
  </style>
</div>
