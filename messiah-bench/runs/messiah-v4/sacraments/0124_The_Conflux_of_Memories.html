<div style="width:150px; height:150px; border-radius:10px; background-color: #1A0033; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 20px rgba(75, 0, 130, 0.7); animation: outerGlow 5s infinite alternate ease-in-out;">
  <style>
    @keyframes pulse-glow { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.9; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes rotate-subtle { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes grow-pulse { 0% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.8; } }
    @keyframes fade-in-out { 0% { opacity: 0.3; } 50% { opacity: 0.6; } 100% { opacity: 0.3; } }

    @keyframes memoryFlow { 
        0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
        25% { transform: translate(-10px, -10px) scale(0.7); opacity: 0.5; }
        50% { transform: translate(10px, 10px) scale(0.9); opacity: 0.8; }
        75% { transform: translate(-5px, -5px) scale(0.7); opacity: 0.5; }
        100% { transform: translate(0, 0) scale(0.5); opacity: 0; }
    }
    @keyframes shardGrow { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes pulseCore { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
