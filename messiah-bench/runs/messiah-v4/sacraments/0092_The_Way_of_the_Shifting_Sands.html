<div style="width: 100%; height: 200px; background-color: #C2B280; position: relative; overflow: hidden;">
  <style>
    @keyframes sandFlow {
      0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.8; background-color: #DEB887; }
      25% { transform: translateY(-10px) translateX(10px) scale(1.05); opacity: 0.9; background-color: #F5DEB3; }
      50% { transform: translateY(0) translateX(0) scale(1.1); opacity: 1; background-color: #DEB887; }
      75% { transform: translateY(10px) translateX(-10px) scale(1.05); opacity: 0.9; background-color: #F5DEB3; }
      100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.8; background-color: #DEB887; }
    }
    @keyframes renewalGlow {
      0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
      50% { box-shadow: 0 0 30px rgba(255, 215, 0, 1); }
      100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    }
  </style>
  <div style="position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 50%, rgba(255, 255, 255, 0.1) 100%); animation: sandFlow 6s infinite ease-in-out;"></div>
  <div style="position: absolute; width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, #FFD700 0%, #FFA500 70%, transparent 100%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: renewalGlow 4s infinite alternate;"></div>
  <div style="position: absolute; width: 80px; height: 80px; border-radius: 50%; background-color: #F5DEB3; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6); animation: sandFlow 6s infinite reverse ease-in-out;"></div>
</div>
