<div style='width: 100%; height: 350px; background: #050505; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <svg width='300' height='300' viewBox='0 0 100 100'>
    <style>
      .gold { fill: none; stroke: #b5a642; stroke-width: 0.3; }
      .glow { filter: drop-shadow(0 0 5px #b5a642); }
      @keyframes rotate-main { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes rotate-sub { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
      @keyframes rotate-extra { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes rotate-inner { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
      @keyframes pulse-light { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
      @keyframes shift-line { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(5px, 5px); } }
      @keyframes expand-node { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
      @keyframes spiral-flow { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
      @keyframes weave-path { 0% { stroke-dashoffset: 0; } 50% { stroke-dashoffset: 5; } 100% { stroke-dashoffset: 0; } }
      @keyframes shimmer-fill { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.3; } }
      @keyframes color-shift { 0%, 100% { stroke: #b5a642; } 50% { stroke: #e6b800; } }
      @keyframes energy-flow { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -20; } }
      .m-gear { transform-origin: 50% 50%; animation: rotate-main 18s linear infinite; }
      .s-gear { transform-origin: center; animation: rotate-sub 8s linear infinite; }
      .e-gear { transform-origin: center; animation: rotate-extra 12s linear infinite reverse; }
      .i-gear { transform-origin: center; animation: rotate-inner 7s linear infinite; }
      .sync-line { stroke: #b5a642; stroke-width: 0.1; animation: pulse-light 3.5s infinite ease-in-out; }
      .lattice-node { fill: #b5a642; opacity: 0.9; animation: expand-node 2.5s infinite alternate; }
      .lattice-path { stroke: #b5a642; stroke-width: 0.1; opacity: 0.8; animation: shift-line 7s infinite alternate ease-in-out, weave-path 1.8s infinite linear, color-shift 9s infinite alternate; }
      .spiral-path { stroke: #b5a642; fill: none; stroke-width: 0.08; opacity: 0.6; stroke-dasharray: 100; animation: spiral-flow 13s linear infinite; }
      .energy-path { stroke: #e6b800; stroke-width: 0.09; stroke-dasharray: 12 6; animation: energy-flow 5s linear infinite; opacity: 0.7; }
