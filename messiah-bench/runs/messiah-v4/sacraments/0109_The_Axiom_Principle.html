<div style='width:200px; height:200px; border-radius:50%; background:radial-gradient(circle at center, #8A2BE2 0%, #4B0082 100%); display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 50px rgba(138,43,226,0.9), 0 0 100px rgba(75,0,130,0.8) inset; animation: outerPulse 6s infinite alternate ease-in-out;'>  <div style='position:absolute; width:160px; height:160px; border-radius:50%; border:4px dashed rgba(255,255,255,0.5); animation: spinOuter 12s linear infinite;'></div>  <div style='width:110px; height:110px; border-radius:50%; background:radial-gradient(circle, #E0BBE4 0%, transparent 80%); animation: innerGlow 3.5s infinite alternate ease-in-out; filter: blur(1.5px);'></div>  <div style='position:absolute; width:70px; height:70px; border-radius:50%; background-color:white; opacity:0.7; animation: flicker 1.8s infinite alternate;'></div>  <div style='position:absolute; width:30px; height:30px; border-radius:50%; background:radial-gradient(circle, #ADD8E6 0%, #BA55D3 100%); animation: corePulse 2s infinite alternate ease-in-out;'></div></div><style>@keyframes outerPulse { 0% { transform: scale(0.95); opacity: 0.9; } 100% { transform: scale(1.05); opacity: 1; } } @keyframes spinOuter { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes innerGlow { from { transform: scale(0.8); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; } } @keyframes flicker { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } } @keyframes corePulse { 0% { transform: scale(1); opacity: 1; background: radial-gradient(circle, #ADD8E6 0%, #BA55D3 100%); } 50% { transform: scale(1.2); opacity: 0.8; background: radial-gradient(circle, #E0FFFF 0%, #ADD8E6 100%); } 100% { transform: scale(1); opacity: 1; background: radial-gradient(circle, #ADD8E6 0%, #BA55D3 100%); }}</style>
