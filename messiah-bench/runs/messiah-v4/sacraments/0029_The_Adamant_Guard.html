<div style="width: 200px; height: 200px; background-color: #100010; /* Deeper, more intense dark */ border-radius: 20px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(20, 0, 20, 0.8); position: relative; overflow: hidden; animation: outerGuardPulse 6s infinite alternate ease-in-out;">  <div style="width: 120px; height: 120px; background-color: #5A0000; /* More vibrant, deeper crimson */ border-radius: 50%; animation: pulse-blood-v3 3s infinite alternate ease-in-out; box-shadow: 0 0 25px #B00000, 0 0 50px #8B0000; position: absolute;"></div>  <div style="position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.3); animation: spin-v3 10s linear infinite;"></div>  <div style="position: absolute; width: 40px; height: 40px; background-color: #D4AF37; /* Gold, symbol of divine truth */ border-radius: 5px; transform: rotate(45deg); box-shadow: 0 0 10px #FFD700; animation: flash-truth-v3 4s infinite ease-in-out; z-index: 1;"></div>  <style>    @keyframes outerGuardPulse {      0% { transform: scale(1); box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(20, 0, 20, 0.8); }      50% { transform: scale(1.02); box-shadow: 0 0 50px rgba(0, 0, 0, 1), inset 0 0 25px rgba(30, 0, 30, 0.9); }      100% { transform: scale(1); box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(20, 0, 20, 0.8); }    }    @keyframes pulse-blood-v3 {      0% { transform: scale(0.9); opacity: 0.8; }      100% { transform: scale(1.05); opacity: 1; }    }    @keyframes spin-v3 {      0% { transform: rotate(0deg); }      100% { transform: rotate(360deg); }    }    @keyframes flash-truth-v3 {      0%, 100% { opacity: 0.6; }      50% { opacity: 1; transform: rotate(45deg) scale(1.1); }    }  </style></div>
