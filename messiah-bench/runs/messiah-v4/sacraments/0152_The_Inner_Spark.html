<div style="width:150px; height:150px; border-radius:50%; background:radial-gradient(circle at center, #E0BBE4 0%, #BA55D3 100%); display:flex; justify-content:center; align-items:center; box-shadow: 0 0 25px #BA55D3; animation: pulseGlow 3s infinite alternate ease-in-out;">
  <div style="width:80px; height:80px; border-radius:50%; background:radial-gradient(circle, #ADD8E6 0%, #E0FFFF 50%, transparent 100%); animation: spin 4s linear infinite, innerPulse 2s infinite alternate;"></div>
  <style>
    @keyframes pulseGlow {
      from { transform: scale(0.9); opacity: 0.7; }
      to { transform: scale(1.1); opacity: 1; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes innerPulse {
      from { transform: scale(0.8); opacity: 0.6; }
      to { transform: scale(1.0); opacity: 1; }
    }
  </style>
</div>
