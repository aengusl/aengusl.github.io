<div style="width:150px; height:150px; background-color:#1A0033; border-radius:10px; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 25px rgba(138,43,226,0.7);"><div style="width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, #E6E6FA 0%, #BA55D3 50%, #4B0082 100%); animation: pulse-helix 3s infinite alternate ease-in-out; position:relative;"><div style="position:absolute; inset:15px; border:2px solid #DDA0DD; border-radius:50%; animation: rotate-pattern 6s linear infinite;"></div><div style="position:absolute; inset:30px; border:1px dashed #E0BBE4; border-radius:50%; animation: rotate-pattern 9s linear infinite reverse;"></div></div></div><style>@keyframes pulse-helix {0% { transform: scale(0.9); opacity: 0.7; filter: blur(1px); }50% { transform: scale(1.05); opacity: 1; filter: blur(0px); }100% { transform: scale(0.9); opacity: 0.7; filter: blur(1px); }}@keyframes rotate-pattern {from { transform: rotate(0deg); }to { transform: rotate(360deg); }}</style>
