<div style="width:180px; height:180px; border-radius:50%; background: radial-gradient(circle, rgba(0,10,50,1) 0%, rgba(0,50,100,0.8) 50%, rgba(0,100,200,0.5) 100%); box-shadow: 0 0 30px rgba(0,50,100,0.9), inset 0 0 15px rgba(0,10,50,0.7); animation: pulse-current 4s infinite ease-in-out alternate; position:relative; overflow:hidden;">  <div style="position:absolute; width:100%; height:100%; background: linear-gradient(45deg, rgba(0,150,250,0.3), rgba(0,200,255,0.7)); animation: wave-flow 6s infinite linear;"></div>  <div style="position:absolute; width:60px; height:60px; border-radius:50%; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(200,200,255,0.5) 50%, transparent 100%); top:50%; left:50%; transform:translate(-50%, -50%) scale(0); animation: rebirth-glow 4s infinite ease-out 2s forwards;"></div>  <style>    @keyframes pulse-current {      0% { transform: scale(0.95); opacity: 0.8; }      100% { transform: scale(1.05); opacity: 1; }    }    @keyframes wave-flow {      0% { transform: rotate(0deg) translateX(0%); }      100% { transform: rotate(360deg) translateX(5%); }    }    @keyframes rebirth-glow {      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }      100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }    }  </style></div>
