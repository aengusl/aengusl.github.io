<div style="width: 150px; height: 150px; position: relative; overflow: hidden; border-radius: 50%; background: linear-gradient(45deg, #4B0082, #8A2BE2); animation: shimmer 4s infinite alternate ease-in-out, pulse-outer 5s infinite alternate ease-in-out;">  <style>    @keyframes shimmer {      0% { background-position: 0% 50%; }      100% { background-position: 100% 50%; }    }    @keyframes pulse-outer {      0% { transform: scale(1); }      100% { transform: scale(1.05); }    }    @keyframes pulse-inner {      0% { transform: scale(0.8) rotate(0deg); opacity: 0.2; filter: blur(5px); }      50% { transform: scale(1.1) rotate(180deg); opacity: 0.5; filter: blur(10px); }      100% { transform: scale(0.8) rotate(360deg); opacity: 0.2; filter: blur(5px); }    }    @keyframes deep-pulse {      0% { transform: scale(0.7) rotate(0deg); opacity: 0.1; filter: blur(3px); }      50% { transform: scale(1.2) rotate(-180deg); opacity: 0.3; filter: blur(7px); }      100% { transform: scale(0.7) rotate(-360deg); opacity: 0.1; filter: blur(3px); }    }  </style>  <div style="width: 100px; height: 100px; background-color: rgba(255, 255, 255, 0.2); border-radius: 50%; position: absolute; top: 25px; left: 25px; animation: pulse-inner 6s infinite ease-in-out;"></div>  <div style="width: 60px; height: 60px; background-color: rgba(255, 255, 255, 0.1); border-radius: 50%; position: absolute; top: 45px; left: 45px; animation: deep-pulse 8s infinite reverse ease-in-out;"></div></div>
