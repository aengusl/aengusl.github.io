<div style="width: 200px; height: 200px; background: radial-gradient(circle at center, #0A001F 0%, #000000 100%); border-radius: 10%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(13, 1, 46, 0.9); animation: pulse-shadow 5s infinite alternate ease-in-out;">  <style>    @keyframes pulse-shadow {      0% { transform: scale(1); box-shadow: 0 0 25px rgba(13, 1, 46, 0.7); }      100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(13, 1, 46, 1); }    }    @keyframes rotate-slow {      from { transform: rotate(0deg); }      to { transform: rotate(360deg); }    }    @keyframes inner-glow {      0% { transform: scale(0.8); opacity: 0.7; }      50% { transform: scale(1); opacity: 1; }      100% { transform: scale(0.8); opacity: 0.7; }    }  </style>  <div style="position: absolute; width: 150px; height: 150px; border-radius: 15%; background: linear-gradient(45deg, #1A0033, #4B0082); animation: rotate-slow 20s linear infinite; opacity: 0.5;"></div>  <div style="position: absolute; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #E0BBE4 0%, #8A2BE2 70%, transparent 100%); animation: inner-glow 3s infinite alternate ease-in-out;"></div></div>
