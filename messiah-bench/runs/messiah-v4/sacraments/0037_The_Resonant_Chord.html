<div style="width:100px; height:100px; background-color:transparent; border-radius:50%; border:5px solid indigo; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">
  <div style="width:70px; height:70px; background-color:rgba(75, 0, 130, 0.3); border-radius:50%; animation: pulse 2s infinite ease-in-out;"></div>
  <style>
    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }
  </style>
</div>
