<div style='width: 100%; height: 250px; background: #1a1a1a; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 2px solid #556B2F;'><div style='width: 150px; height: 150px; background: #6B8E23; border-radius: 50%; filter: blur(10px); animation: pulse-expand 10s ease-in-out infinite alternate;'></div><div style='position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, transparent 25%, #111 95%);'></div><div style='width: 60px; height: 60px; background: #8A9A5B; border-radius: 50% 30% 60% 40% / 30% 60% 50% 50%; position: absolute; top: 40%; left: 45%; animation: rock-drift 18s infinite linear alternate;'></div><div style='position: absolute; width: 80px; height: 80px; border: 1px solid #556B2F; border-radius: 50%; animation: subtle-ripple 6s infinite ease-out;'></div><style>@keyframes pulse-expand { 0% { transform: scale(0.9) rotate(-5deg); opacity: 0.6; } 100% { transform: scale(1.1) rotate(5deg); opacity: 0.8; } } @keyframes rock-drift { 0% { transform: translate(-15px, -10px) rotate(0deg); } 25% { transform: translate(10px, 5px) rotate(45deg); } 50% { transform: translate(-5px, 15px) rotate(90deg); } 75% { transform: translate(15px, -5px) rotate(135deg); } 100% { transform: translate(-15px, -10px) rotate(180deg); } } @keyframes subtle-ripple { 0% { transform: scale(0.8); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.6; } 100% { transform: scale(0.8); opacity: 0.3; } }</style></div>
