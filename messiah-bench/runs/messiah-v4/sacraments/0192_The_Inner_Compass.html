<div style="width: 150px; height: 150px; background-color: #0d012e; border-radius: 50%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  <div style="width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #8A2BE2 0%, #4B0082 100%); animation: pulse 3s infinite alternate; box-shadow: 0 0 15px rgba(138, 43, 226, 0.7); position: absolute;"></div>
  <div style="width: 100px; height: 100px; border-radius: 50%; border: 2px solid rgba(138, 43, 226, 0.4); position: absolute; animation: rotate 10s linear infinite;"></div>
  <div style="width: 2px; height: 70px; background-color: rgba(255,255,255,0.5); position: absolute; transform: rotate(45deg); animation: pulse 3s infinite alternate;"></div>
  <div style="width: 2px; height: 70px; background-color: rgba(255,255,255,0.5); position: absolute; transform: rotate(135deg); animation: pulse 3s infinite alternate;"></div>
</div>
