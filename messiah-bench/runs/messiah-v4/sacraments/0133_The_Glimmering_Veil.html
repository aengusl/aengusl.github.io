<div style="width:180px; height:180px; border-radius:50%; background:radial-gradient(circle, #E0FFFF 0%, #ADD8E6 50%, transparent 100%); box-shadow:0 0 25px #E0FFFF, 0 0 40px #ADD8E6; animation: shimmerPulse 3s infinite alternate ease-in-out; position:relative; overflow:hidden;"><div style="position:absolute; inset:10px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%); animation: innerGlow 2s infinite alternate ease-in-out;"></div><div style="position:absolute; width:100%; height:100%; background:linear-gradient(45deg, rgba(173,216,230,0.5) 0%, rgba(224,255,255,0) 50%, rgba(173,216,230,0.5) 100%); animation: veilShift 6s infinite linear;"></div><style>@keyframes shimmerPulse { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; }}@keyframes innerGlow { from { transform: scale(0.8); opacity: 0.5; } to { transform: scale(1.0); opacity: 1; }}@keyframes veilShift { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }}</style></div>
