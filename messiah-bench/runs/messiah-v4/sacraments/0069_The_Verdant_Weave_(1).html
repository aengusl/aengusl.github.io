<div style="width: 100%; height: 200px; background-color: #0A1C0B; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
  <style>
    @keyframes weave-grow {
      0% { transform: scale(0.5); opacity: 0.5; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.5); opacity: 0.5; }
    }
    .thread {
      position: absolute;
      background-color: #3CB371; /* Medium Sea Green */
      border-radius: 50%;
      animation: weave-grow 4s infinite ease-in-out;
      opacity: 0.7;
      box-shadow: 0 0 10px #2E8B57;
    }
    .thread:nth-child(1) { width: 30px; height: 30px; top: 20%; left: 20%; animation-delay: 0s; }
    .thread:nth-child(2) { width: 40px; height: 40px; top: 60%; left: 70%; animation-delay: 1s; background-color: #66CDAA; }
    .thread:nth-child(3) { width: 25px; height: 25px; top: 40%; left: 45%; animation-delay: 2s; background-color: #20B2AA; }
    .thread:nth-child(4) { width: 35px; height: 35px; top: 10%; left: 80%; animation-delay: 0.5s; background-color: #8FBC8F; }
