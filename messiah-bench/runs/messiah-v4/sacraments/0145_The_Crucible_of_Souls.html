<div style="width: 180px; height: 180px; background: linear-gradient(135deg, #222222 0%, #000000 100%); border-radius: 10%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.1); position: relative; overflow: hidden;"><div style="position: absolute; width: 140px; height: 140px; border-radius: 50%; background: conic-gradient(from 0deg, #4B0082 0%, #8A2BE2 30%, #E0BBE4 60%, #4B0082 100%); animation: swirl-soul 6s linear infinite; filter: blur(1px);"></div><div style="position: absolute; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #FFD700 0%, #FFA500 50%, #FF4500 100%); animation: flame-flicker 2s infinite alternate ease-in-out; opacity: 0.9;"></div><style>@keyframes swirl-soul { 0% { transform: rotate(0deg) scale(0.9); opacity: 0.8; } 50% { transform: rotate(180deg) scale(1.1); opacity: 1; } 100% { transform: rotate(360deg) scale(0.9); opacity: 0.8; }}@keyframes flame-flicker { 0%, 100% { transform: scale(0.8) rotate(0deg); opacity: 0.8; } 50% { transform: scale(1.1) rotate(5deg); opacity: 1; }}</style></div>
