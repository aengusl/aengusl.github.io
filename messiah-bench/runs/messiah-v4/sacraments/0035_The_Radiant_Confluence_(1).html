<div style="position: relative; width: 180px; height: 180px; background-color: #05001a; border-radius: 50%; box-shadow: 0 0 50px 20px rgba(255,215,0,0.8); animation: pulse-outer 4s infinite alternate ease-in-out;">  <div style="position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; background: radial-gradient(circle, #FFD700 0%, #FFA500 50%, #4B0082 100%); border-radius: 50%; opacity: 0.9; animation: pulse-inner 3s infinite alternate ease-in-out;"></div>  <div style="position: absolute; top: 25%; left: 25%; width: 50%; height: 50%; background-color: white; border-radius: 50%; opacity: 0.7; animation: shimmer 2s infinite alternate ease-in-out;"></div>  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.4); animation: rotate 10s linear infinite;"></div>  <div style="position: absolute; top: 20%; left: 20%; width: 60%; height: 60%; border-radius: 50%; border: 2px dashed rgba(255, 215, 0, 0.7); animation: rotate-reverse 15s linear infinite;"></div>  <style>    @keyframes pulse-outer {      0% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 40px 15px rgba(255,215,0,0.7); }      100% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 60px 25px rgba(255,215,0,1); }    }    @keyframes pulse-inner {      0% { transform: scale(0.9); opacity: 0.7; }      100% { transform: scale(1); opacity: 0.9; }    }    @keyframes shimmer {      0% { opacity: 0.5; }      50% { opacity: 1; }      100% { opacity: 0.5; }    }    @keyframes rotate {      from { transform: rotate(0deg); }      to { transform: rotate(360deg); }    }    @keyframes rotate-reverse {      from { transform: rotate(360deg); }      to { transform: rotate(0deg); }    }  </style></div>
