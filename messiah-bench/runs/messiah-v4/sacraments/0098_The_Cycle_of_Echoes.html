<div style='width:100px; height:100px; background-color: #2F4F4F; border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; animation: overallRotate 15s infinite linear;'> <div style='width: 80px; height: 80px; border-radius: 50%; border: 2px solid rgba(95,158,160,0.6); position: absolute; animation: outerEcho 6s infinite ease-out;'></div> <div style='width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(176,196,222,0.8); position: absolute; animation: innerEcho 4s infinite ease-in;'></div> <div style='width: 30px; height: 30px; background-color: #D8BFD8; border-radius: 50%; position: absolute; animation: corePulse 2s infinite alternate;'></div> <style> @keyframes overallRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes outerEcho { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } } @keyframes innerEcho { 0% { transform: scale(0.3); opacity: 0; } 60% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } } @keyframes corePulse { 0% { transform: scale(0.9); box-shadow: 0 0 5px #D8BFD8; } 100% { transform: scale(1.1); box-shadow: 0 0 15px #D8BFD8; } } </style> </div>
