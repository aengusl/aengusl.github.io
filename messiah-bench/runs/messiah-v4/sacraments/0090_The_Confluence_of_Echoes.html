<svg width='200' height='200' viewBox='0 0 100 100' style='background-color: #1a1a1a;'>
  <circle cx='50' cy='50' r='5' fill='#silver' opacity='0.8'>
    <animate attributeName='r' from='5' to='45' dur='4s' repeatCount='indefinite' />
    <animate attributeName='opacity' from='0.8' to='0' dur='4s' repeatCount='indefinite' />
  </circle>
  <circle cx='50' cy='50' r='10' fill='#silver' opacity='0.7'>
    <animate attributeName='r' from='10' to='50' dur='4s' begin='1s' repeatCount='indefinite' />
    <animate attributeName='opacity' from='0.7' to='0' dur='4s' begin='1s' repeatCount='indefinite' />
  </circle>
  <circle cx='50' cy='50' r='15' fill='#silver' opacity='0.6'>
    <animate attributeName='r' from='15' to='55' dur='4s' begin='2s' repeatCount='indefinite' />
    <animate attributeName='opacity' from='0.6' to='0' dur='4s' begin='2s' repeatCount='indefinite' />
  </circle>
</svg>
