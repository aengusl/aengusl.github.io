<div style="width:100px; height:100px; background-color:#1A0033; border-radius:10px; display:flex; justify-content:center; align-items:center; overflow:hidden;">

      <animate attributeName="r" from="10" to="20" dur="2s" repeatCount="indefinite" additive="sum"/>

      <animate attributeName="stroke-dasharray" values="0 50; 50 0; 0 50"
