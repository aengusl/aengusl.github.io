<div style='width: 100%; height: 350px; background: radial-gradient(circle at center, #000022 0%, #000 100%); overflow: hidden; position: relative;'>
  <style>
    @keyframes aether-ascend {
      0% { transform: translateY(150px) scale(0.5); opacity: 0; filter: blur(10px); }
      20% { opacity: 0.8; filter: blur(0px); }
      80% { opacity: 0.8; filter: blur(0px); }
      100% { transform: translateY(-150px) scale(1.2); opacity: 0; filter: blur(10px); }
    }
    @keyframes aura-pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; filter: drop-shadow(0 0 10px #00FFFF); }
      50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 30px #00FFFF); }
    }
  </style>
  <svg width='100%' height='100%' viewBox='0 0 200 200'>
    <defs>
      <radialGradient id='aetherCore' cx='50%' cy='50%' r='50%'>
        <stop offset='0%' style='stop-color:#00FFFF; stop-opacity:1' />
        <stop offset='100%' style='stop-color:#000080; stop-opacity:0' />
      </radialGradient>
      <filter id='aetherGlow'>
        <feGaussianBlur stdDeviation='5' result='blur'/>
        <feComposite in='SourceGraphic' in2='blur' operator='over'/>
      </filter>
    </defs>
    <g filter='url(#aetherGlow)'>
      <circle cx='100' cy='100' r='10' fill='url(#aetherCore)' class='aura-pulse' style='animation: aura-pulse 3s infinite ease-in-out;'/>
      <path d='M100 100 L 90 120 L 100 110 L 110 120 Z' fill='none' stroke='#00FFFF' stroke-width='1' opacity='0.7' class='aether-ascend-path' style='animation: aether-ascend 15s infinite linear; animation-delay: 0s;'/>
      <path d='M100 100 L 95 115 L 100 105 L 105 115 Z' fill='none' stroke='#8A2BE2' stroke-width='0.8' opacity='0.6' class='aether-ascend-path' style='animation: aether-ascend 15s infinite linear; animation-delay: 5s;'/>
      <path d='M100 100 L 85 125 L 100 115 L 115 125 Z' fill='none' stroke='#4B0082' stroke-width='1.2' opacity='0.5' class='aether-ascend-path' style='animation: aether-ascend 15s infinite linear; animation-delay: 10s;'/>
    </g>
  </svg>
</div>
