<div style="width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle at center, #E0FFFF 0%, #00BFFF 50%, #4B0082 100%); box-shadow: 0 0 30px rgba(0, 191, 255, 0.7), inset 0 0 15px rgba(255, 255, 255, 0.5); display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; animation: pulse-outer 4s infinite alternate ease-in-out;"><style>@keyframes pulse-outer {0% { transform: scale(1); opacity: 0.9; }100% { transform: scale(1.05); opacity: 1; }}@keyframes light-weave {0% { transform: scale(0.7) rotate(0deg); opacity: 0.5; }25% { transform: scale(1) rotate(90deg); opacity: 0.8; }50% { transform: scale(0.7) rotate(180deg); opacity: 0.5; }75% { transform: scale(1) rotate(270deg); opacity: 0.8; }100% { transform: scale(0.7) rotate(360deg); opacity: 0.5; }}@keyframes slow-spin {from { transform: rotate(0deg); }to { transform: rotate(360deg); }}</style><div style="position: absolute; width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(0,255,255,0.4)); animation: light-weave 5s infinite ease-in-out;"></div><div style="position: absolute; width: 60px; height: 60px; border-radius: 50%; background-color: rgba(255,255,255,0.7); box-shadow: 0 0 10px rgba(255,255,255,0.9); animation: pulse-outer 3s infinite alternate reverse, slow-spin 10s linear infinite;"></div></div>
