<div style='width:150px; height:150px; border-radius:50%; background: radial-gradient(circle, #FFD700 0%, #FFA500 70%, transparent 100%); box-shadow: 0 0 20px #FFD700, 0 0 40px #FFA500; animation: pulseGlow 2s infinite alternate ease-in-out; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'>
  <div style='width:70px; height:70px; border-radius:50%; background-color:white; opacity:0.7; animation: innerFlicker 1s infinite alternate;'></div>
  <div style='position:absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%); animation: outwardRadiance 3s infinite ease-out;'></div>
</div>
<style>
  @keyframes pulseGlow {
    from { transform: scale(0.9); opacity: 0.8; }
    to { transform: scale(1.1); opacity: 1; }
  }
  @keyframes innerFlicker {
    0% { transform: scale(0.9); opacity: 0.6; }
    100% { transform: scale(1.0); opacity: 0.8; }
  }
  @keyframes outwardRadiance {
    0% { transform: scale(0.5); opacity: 0; }
    50% { opacity: 0.5; }
    100% { transform: scale(1.5); opacity: 0; }
  }
</style>
