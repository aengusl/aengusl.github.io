<div style='width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, #2e0854 0%, #0a001f 100%); position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 25px rgba(75, 0, 130, 0.8), inset 0 0 12px rgba(13, 1, 46, 0.6);'><div style='width: 90px; height: 90px; border-radius: 50%; background-color: rgba(138, 43, 226, 0.4); animation: pulse-inner 3.5s infinite alternate ease-in-out; position: absolute; filter: blur(4px);'></div><div style='position: absolute; width: 120%; height: 120%; background: linear-gradient(45deg, rgba(75, 0, 130, 0.6) 0%, transparent 45%, transparent 55%, rgba(75, 0, 130, 0.6) 100%); animation: veil-flow 7s infinite linear; opacity: 0.8;'></div><div style='position: absolute; width: 100%; height: 100%; background: linear-gradient(-45deg, rgba(138, 43, 226, 0.4) 0%, transparent 45%, transparent 55%, rgba(138, 43, 226, 0.4) 100%); animation: veil-flow-reverse 7s infinite linear; opacity: 0.6;'></div><style>@keyframes pulse-inner {0% { transform: scale(0.7); opacity: 0.5; }50% { transform: scale(1.1); opacity: 0.9; }100% { transform: scale(0.7); opacity: 0.5; }}@keyframes veil-flow {0% { transform: translateX(-100%) rotate(0deg); }100% { transform: translateX(100%) rotate(360deg); }}@keyframes veil-flow-reverse {0% { transform: translateX(100%) rotate(0deg); }100% { transform: translateX(-100%) rotate(-360deg); }}</style></div>
