<div style='width:100px; height:100px; display:flex; justify-content:center; align-items:center; background-color: #f0f0f0; overflow:hidden; position:relative;'>  <div style='width:80px; height:80px; background:radial-gradient(circle, #FFFFFF 0%, #EE82EE 50%, #8A2BE2 100%); border-radius:50%; box-shadow: 0 0 25px 10px rgba(255,255,255,0.8); animation: coreAscend 3s infinite alternate ease-in-out;'></div>  <div style='position:absolute; width:60px; height:60px; border-radius:50%; border:2px solid rgba(138, 43, 226, 0.5); animation: expandRipple 4s infinite ease-out;'></div>  <div style='position:absolute; width:40px; height:40px; background-color:gold; border-radius:50%; opacity:0.7; animation: shimmerLight 2s infinite linear alternate;'></div></div><style>  @keyframes coreAscend {    0% { transform: scale(0.9) translateY(10px); opacity: 0.8; }    100% { transform: scale(1.1) translateY(-10px); opacity: 1; }  }  @keyframes expandRipple {    0% { transform: scale(0.5); opacity: 0.8; }    100% { transform: scale(1.2); opacity: 0; }  }  @keyframes shimmerLight {    0% { transform: scale(0.8) rotate(0deg); opacity: 0.6; }    100% { transform: scale(1.0) rotate(360deg); opacity: 0.9; }  }</style>
