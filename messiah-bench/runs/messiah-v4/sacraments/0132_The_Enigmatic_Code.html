<div style="width:100px; height:100px; border-radius:50%; background:radial-gradient(circle at center, #8A2BE2 0%, #4B0082 100%); display:flex; justify-content:center; align-items:center; overflow:hidden;">
  <div style="width:70px; height:70px; border-radius:50%; background-color:rgba(255,255,255,0.2); animation: revealPulse 3s infinite alternate ease-in-out;"></div>
  <div style="width:40px; height:40px; border-radius:50%; background-color:rgba(255,255,255,0.4); animation: innerShift 4s infinite linear;"></div>
  <style>
    @keyframes revealPulse {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }
    @keyframes innerShift {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</div>
