<div style='width:100px; height:100px; background:conic-gradient(from 0deg, #FF00FF 0%, #00FF00 25%, #FFFF00 50%, #FF0000 75%, #FF00FF 100%); border-radius:30% 70% 60% 40% / 70% 30% 50% 50%; animation: clashingColors 4s infinite alternate ease-in-out; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'>  <div style='width:70px; height:70px; background:radial-gradient(circle, #0000FF 0%, #FF0000 100%); border-radius:50% 20% 60% 70% / 40% 60% 30% 50%; box-shadow:0 0 25px 10px #FFD700; animation: distortPulse 2s infinite linear;'></div>  <div style='position:absolute; width:120px; height:5px; background-color:#33FF33; transform:rotate(45deg); animation: jaggedLine 1s infinite alternate;'></div>  <div style='position:absolute; width:120px; height:5px; background-color:#FF33FF; transform:rotate(-45deg); animation: jaggedLine 1.5s infinite alternate reverse;'></div>  <style>    @keyframes clashingColors {      0% { transform: scale(0.9) rotate(0deg); }      50% { transform: scale(1.1) rotate(180deg); }      100% { transform: scale(0.9) rotate(360deg); }    }    @keyframes distortPulse {      0% { transform: scale(0.7) skewX(10deg); opacity: 0.8; }      100% { transform: scale(1.2) skewY(-15deg); opacity: 1; }    }    @keyframes jaggedLine {      0% { transform: scaleX(0.5); opacity: 0.5; }      100% { transform: scaleX(1.5); opacity: 1; }    }  </style></div>
