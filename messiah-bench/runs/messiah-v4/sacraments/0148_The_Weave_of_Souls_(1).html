<div style='width: 100%; height: 150px; background: linear-gradient(135deg, #4B0082 0%, #8A2BE2 50%, #ADD8E6 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'><div style='width: 80px; height: 80px; border-radius: 50%; background-color: rgba(255,255,255,0.2); animation: pulse 3s infinite ease-in-out alternate; position: absolute;'></div><div style='position: absolute; width: 120px; height: 120px; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; animation: spin 8s linear infinite;'></div><div style='position: absolute; width: 100px; height: 100px; border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; animation: spin 12s reverse linear infinite;'></div><style>@keyframes pulse {0% {transform: scale(0.8);} 100% {transform: scale(1.2);}} @keyframes spin {0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);}}</style></div>
