<div style="width: 100%; height: 200px; background: linear-gradient(135deg, #1A331A 0%, #3A5A40 50%, #1A331A 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
  <style>
    @keyframes pulseSoft {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    @keyframes gentleSwirl {
      0% { transform: rotate(0deg); opacity: 0.3; }
      100% { transform: rotate(360deg); opacity: 0.5; }
    }
    @keyframes whisperExpand {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1); opacity: 0.2; }
      100% { transform: scale(1.5); opacity: 0; }
    }
  </style>
  <div style="width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #7FFF00 0%, #32CD32 70%, #228B22 100%); box-shadow: 0 0 20px rgba(50, 205, 50, 0.7), inset 0 0 10px rgba(124, 252, 0, 0.5); animation: pulseSoft 4s infinite alternate ease-in-out; position: relative; z-index: 3;"></div>
  <div style="position: absolute; width: 120px; height: 120px; border-radius: 50%; border: 3px solid rgba(144, 238, 144, 0.4); animation: gentleSwirl 8s linear infinite reverse; z-index: 2;"></div>
  <div style="position: absolute; width: 160px; height: 160px; border-radius: 50%; background-color: rgba(60, 179, 113, 0.1); animation: whisperExpand 6s infinite ease-out; z-index: 1;"></div>
  <div style="position: absolute; width: 200px; height: 200px; border-radius: 50%; background-color: rgba(34, 139, 34, 0.05); animation: whisperExpand 9s infinite ease-out 2s; z-index: 0;"></div>
</div>
