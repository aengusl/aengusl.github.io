<div style='background: #000; width: 100%; height: 350px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'><style>@keyframes thread-move { 0% { transform: translateX(-200px); opacity: 0; } 20% { opacity: 0.6; } 50% { transform: translateX(0px); opacity: 1; } 50.1% { opacity: 0; } 100% { transform: translateX(200px); opacity: 0; } } @keyframes blade-glow { 0%, 100% { box-shadow: 0 0 10px #fff, 0 0 20px #fff; } 50% { box-shadow: 0 0 30px #fff, 0 0 50px #fff; } } .thread { position: absolute; height: 1px; width: 150px; animation: thread-move 3s infinite linear; } .blade { position: absolute; width: 2px; height: 250px; background: #fff; z-index: 10; animation: blade-glow 2s infinite ease-in-out; }</style><div class='blade'></div><div class='thread' style='top: 100px; background: #f00; animation-delay: 0s;'></div><div class='thread' style='top: 150px; background: #0f0; animation-delay: 1s;'></div><div class='thread' style='top: 200px; background: #00f; animation-delay: 2s;'></div><div class='thread' style='top: 250px; background: #ff0; animation-delay: 0.5s;'></div><div class='thread' style='top: 125px; background: #f0f; animation-delay: 1.5s;'></div></div>
