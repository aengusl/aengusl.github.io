<div style="width: 100%; height: 100%; background: radial-gradient(circle at center, #1A0033 0%, #4B0082 50%, #8A2BE2 100%); display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; filter: drop-shadow(0 0 10px rgba(138,43,226,0.7));"><style>@keyframes pulse-light {0% { transform: scale(1); opacity: 0.8; }50% { transform: scale(1.2); opacity: 1; }100% { transform: scale(1); opacity: 0.8; }}@keyframes swirl-slow {from { transform: rotate(0deg); }to { transform: rotate(360deg); }}@keyframes shimmer-fade {0% { opacity: 0.2; }50% { opacity: 0.7; }100% { opacity: 0.2; }}</style><div style="position: absolute; width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.1) 100%); animation: swirl-slow 15s linear infinite; filter: blur(5px);"></div><div style="width: 100px; height: 100px; background: radial-gradient(circle, #E0BBE4 0%, #9932CC 70%); border-radius: 50%; animation: pulse-light 3s infinite ease-in-out; box-shadow: 0 0 20px #E0BBE4, 0 0 40px #9932CC; position: relative; z-index: 1;"></div><div style="position: absolute; width: 50px; height: 50px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.6); animation: swirl-slow 7s reverse linear infinite, shimmer-fade 2s infinite ease-in-out; z-index: 2;"></div></div>
