<div style='width: 100%; height: 100vh; background: radial-gradient(circle at center, #000000 0%, #1A0033 100%); overflow: hidden; position: relative;'>
  <div style='position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(var(--rotate, 0deg)) scale(var(--scale, 1)); width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(45deg, #8A2BE2, #DDA0DD); box-shadow: 0 0 50px #8A2BE2, inset 0 0 25px #DDA0DD; animation: pulse-core 4s infinite alternate ease-in-out, spin 12s infinite linear;'></div>
  <div style='position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(var(--rotate-outer, 0deg)) scale(var(--scale-outer, 1)); width: 250px; height: 250px; border-radius: 50%; border: 3px solid #E0FFFF; box-shadow: 0 0 30px #E0FFFF, inset 0 0 15px #ADD8E6; animation: pulse-outer 6s infinite alternate ease-in-out, orbit 18s infinite linear reverse;'></div>
  <div style='position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(var(--rotate-echo-1, 0deg)); width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #ADD8E6, #40E0D0); opacity: 0.7; animation: echo-float-1 7s infinite ease-in-out;'></div>
  <div style='position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(var(--rotate-echo-2, 0deg)); width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, #87CEEB, #00CED1); opacity: 0.6; animation: echo-float-2 9s infinite ease-in-out;'></div>
  <div style='position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(var(--rotate-echo-3, 0deg)); width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #B0C4DE, #ADD8E6); opacity: 0.8; animation: echo-float-3 5s infinite ease-in-out;'></div>

  <style>
    @keyframes pulse-core {
      0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); box-shadow: 0 0 50px #8A2BE2, inset 0 0 25px #DDA0DD; }
      50% { transform: translate(-50%, -50%) rotate(180deg) scale(1.1); box-shadow: 0 0 60px #DDA0DD, inset 0 0 30px #8A2BE2; }
      100% { transform: translate(-50%, -50%) rotate(360deg) scale(1); box-shadow: 0 0 50px #8A2BE2, inset 0 0 25px #DDA0DD; }
    }
    @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

    @keyframes pulse-outer {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; border-color: #E0FFFF; }
      50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.9; border-color: #ADD8E6; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; border-color: #E0FFFF; }
    }
    @keyframes orbit { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

    @keyframes echo-float-1 { 0% { transform: translate(-50%, -50%) rotate(0deg) translateX(70px) scale(1); opacity: 0.7; } 50% { transform: translate(-50%, -50%) rotate(180deg) translateX(90px) scale(1.1); opacity: 0.8; } 100% { transform: translate(-50%, -50%) rotate(360deg) translateX(70px) scale(1); opacity: 0.7; } }
    @keyframes echo-float-2 { 0% { transform: translate(-50%, -50%) rotate(120deg) translateX(100px) scale(1); opacity: 0.6; } 50% { transform: translate(-50%, -50%) rotate(300deg) translateX(120px) scale(1.05); opacity: 0.7; } 100% { transform: translate(-50%, -50%) rotate(480deg) translateX(100px) scale(1); opacity: 0.6; } }
    @keyframes echo-float-3 { 0% { transform: translate(-50%, -50%) rotate(240deg) translateX(60px) scale(1); opacity: 0.8; } 50% { transform: translate(-50%, -50%) rotate(420deg) translateX(80px) scale(1.1); opacity: 0.9; } 100% { transform: translate(-50%, -50%) rotate(600deg) translateX(60px) scale(1); opacity: 0.8; } }
  </style>
</div>
