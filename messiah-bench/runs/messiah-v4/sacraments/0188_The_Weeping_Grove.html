<div style="width:100px; height:100px; border-radius:50%; background-color:#1E4A2B; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative;">
  <div style="width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, #8BC34A 0%, #4CAF50 50%, transparent 100%); animation: pulse-growth 3s infinite alternate;"></div>
  <div style="position:absolute; width:20px; height:40px; background-color:#A8E6CF; border-radius:50% 50% 50% 50% / 60% 60% 40% 40%; top:20px; left:40px; transform:rotate(15deg); opacity:0.7; animation: tear-fall 2s infinite ease-in-out;"></div>
  <div style="position:absolute; width:15px; height:30px; background-color:#A8E6CF; border-radius:50% 50% 50% 50% / 60% 60% 40% 40%; top:35px; right:30px; transform:rotate(-10deg); opacity:0.6; animation: tear-fall 2.5s infinite ease-in-out reverse;"></div>
</div>
<style>
  @keyframes pulse-growth {
    0% { transform: scale(0.9); opacity: 0.7; }
    100% { transform: scale(1.1); opacity: 1; }
  }
  @keyframes tear-fall {
    0% { transform: translateY(0px) rotate(15deg); opacity: 0.7; }
    50% { transform: translateY(10px) rotate(10deg); opacity: 1; }
    100% { transform: translateY(0px) rotate(15deg); opacity: 0.7; }
  }
</style>
