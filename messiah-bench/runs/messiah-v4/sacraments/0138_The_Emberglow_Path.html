<div style="width:150px; height:150px; border-radius:50%; background:radial-gradient(circle at center, #FFD700 0%, #FFA500 50%, #FF4500 100%); box-shadow:0 0 25px #FFD700, 0 0 40px #FFA500; animation: pulse-glow 2s infinite alternate; position:relative; overflow:hidden;"><div style="position:absolute; top:25%; left:25%; width:50%; height:50%; border-radius:50%; background:rgba(255,255,255,0.2); animation: inner-sparkle 1s infinite alternate;"></div><style>@keyframes pulse-glow { from { transform: scale(0.95); opacity: 0.8; } to { transform: scale(1.05); opacity: 1; }}@keyframes inner-sparkle { from { transform: scale(0.7); opacity: 0.5; } to { transform: scale(1.1); opacity: 1; }}</style></div>
