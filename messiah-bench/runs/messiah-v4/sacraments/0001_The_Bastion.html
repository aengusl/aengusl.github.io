<div style="background-color: #556B2F; width: 120px; height: 150px; border-radius: 0 0 60px 60px; border: 6px solid #2F4F4F; margin: 20px auto; position: relative; overflow: hidden; box-shadow: 0 0 20px #8B4513 inset, 0 0 10px #8B4513;"><div style="background-color: #2F4F4F; width: 130px; height: 25px; position: absolute; top: -12px; left: -10px;"></div><div style="width: 3px; height: 100%; background-color: #2F4F4F; position: absolute; left: 50%; animation: pulse-vertical 2s infinite alternate;"></div><div style="height: 3px; width: 100%; background-color: #2F4F4F; position: absolute; top: 50%; animation: pulse-horizontal 2s infinite alternate;"></div><div style="position: absolute; top: 20px; left: 20px; width: 20px; height: 20px; border-radius: 50%; background-color: #A52A2A; box-shadow: 0 0 15px #A52A2A; animation: glow 1.5s infinite alternate;"></div><div style="position: absolute; bottom: 20px; right: 20px; width: 20px; height: 20px; border-radius: 50%; background-color: #A52A2A; box-shadow: 0 0 15px #A52A2A; animation: glow 1.5s infinite alternate reverse;"></div><style>@keyframes pulse-vertical { 0% { transform: scaleY(1); } 100% { transform: scaleY(1.1); } } @keyframes pulse-horizontal { 0% { transform: scaleX(1); } 100% { transform: scaleX(1.1); } } @keyframes glow { 0% { opacity: 0.7; } 100% { opacity: 1; } }</style></div>
