<div style='width: 100%; height: 200px; background: radial-gradient(circle at center, #2e0f4f 0%, #0a001f 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'><div style='width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(45deg, #8a2be2, #e0bbe4, #4b0082); box-shadow: 0 0 15px #e0bbe4, 0 0 30px #8a2be2; animation: transform-cycle 6s infinite ease-in-out alternate; position: relative;'><div style='position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; border-radius: 50%; background-color: rgba(255,255,255,0.1); animation: shimmer-fade 3s infinite ease-in-out alternate;'></div></div><style>@keyframes transform-cycle {0% {transform: scale(0.7) rotate(0deg); opacity: 0.7; border-radius: 50%;} 50% {transform: scale(1.1) rotate(180deg); opacity: 1; border-radius: 20%;} 100% {transform: scale(0.7) rotate(360deg); opacity: 0.7; border-radius: 50%;}}@keyframes shimmer-fade {0% {opacity: 0;} 50% {opacity: 0.3;} 100% {opacity: 0;}}</style></div>
