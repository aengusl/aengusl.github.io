<div style="width:150px; height:150px; border-radius:50%; background:radial-gradient(circle, #300060 0%, #1A0033 100%); display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 25px #4B0082;">
  <div style="width:100px; height:100px; border-radius:50%; border:3px solid #8A2BE2; position:absolute; animation: pulse-rhythm 3s infinite alternate ease-in-out;"></div>
  <div style="width:60px; height:60px; border-radius:50%; background-color:#DA70D6; position:absolute; animation: rotate-flow 6s linear infinite;"></div>
  <div style="width:20px; height:20px; border-radius:50%; background-color:#E6E6FA; position:absolute;"></div>
</div>
<style>
  @keyframes pulse-rhythm {
    0% { transform: scale(0.9); opacity: 0.7; border-color: #8A2BE2; }
    50% { transform: scale(1.1); opacity: 1; border-color: #DA70D6; }
    100% { transform: scale(0.9); opacity: 0.7; border-color: #8A2BE2; }
  }
  @keyframes rotate-flow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
