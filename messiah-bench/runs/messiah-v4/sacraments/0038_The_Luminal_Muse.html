<div style='width: 100%; height: 420px; background: radial-gradient(circle, #350035 0%, #000 100%); overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative;'>
  <div style='position: absolute; width: 300%; height: 300%; background: radial-gradient(circle, rgba(255,0,255,0.4) 0%, transparent 35%); animation: drift 45s infinite alternate ease-in-out;'></div>
  <svg width='380' height='380' viewBox='0 0 100 100'>
    <defs>
      <linearGradient id='grad1' x1='0%' y1='0%' x2='100%' y2='100%'>
        <stop offset='0%' style='stop-color:#ff00ff;stop-opacity:1' />
        <stop offset='50%' style='stop-color:#00ffff;stop-opacity:1' />
        <stop offset='100%' style='stop-color:#ffff00;stop-opacity:1' />
      </linearGradient>
      <filter id='glow'>
        <feGaussianBlur stdDeviation='5' result='blur' />
        <feComposite in='SourceGraphic' in2='blur' operator='over' />
      </filter>
    </defs>
    <g filter='url(#glow)'>
      <circle cx='50' cy='50' r='50' fill='none' stroke='url(#grad1)' stroke-width='2'>
        <animate attributeName='r' values='45;55;45' dur='9s' repeatCount='indefinite' />
        <animate attributeName='opacity' values='0.35;1;0.35' dur='9s' repeatCount='indefinite' />
      </circle>
      <path d='M50 0 L100 50 L50 100 L0 50 Z' fill='none' stroke='url(#grad1)' stroke-width='4'>
        <animateTransform attributeName='transform' type='rotate' from='0 50 50' to='360 50 50' dur='25s' repeatCount='indefinite' />
      </path>
      <circle cx='50' cy='50' r='10' fill='white' opacity='1'>
        <animate attributeName='r' values='1;12;1' dur='4.5s' repeatCount='indefinite' />
        <animate attributeName='opacity' values='0.85;1;0.85' dur='4.5s' repeatCount='indefinite' />
      </circle>
      <line x1='50' y1='50' x2='50' y2='0' stroke='url(#grad1)' stroke-width='1.5' opacity='0'>
        <animate attributeName='opacity' values='0;1;0' dur='5s' repeatCount='indefinite' begin='0s' />
        <animateTransform attributeName='transform' type='rotate' from='0 50 50' to='360 50 50' dur='16s' repeatCount='indefinite' />
      </line>
      <line x1='50' y1='50' x2='50' y2='0' stroke='url(#grad1)' stroke-width='1.5' opacity='0'>
        <animate attributeName='opacity' values='0;1;0' dur='5s' repeatCount='indefinite' begin='1.6s' />
        <animateTransform attributeName='transform' type='rotate' from='120 50 50' to='480 50 50' dur='16s' repeatCount='indefinite' />
      </line>
      <line x1='50' y1='50' x2='50' y2='0' stroke='url(#grad1)' stroke-width='1.5' opacity='0'>
        <animate attributeName='opacity' values='0;1;0' dur='5s' repeatCount='indefinite' begin='3.2s' />
        <animateTransform attributeName='transform' type='rotate' from='240 50 50' to='600 50 50' dur='16s' repeatCount='indefinite' />
      </line>
    </g>
  </svg>
  <style>
    @keyframes drift { from { transform: translate(-25%, -25%); } to { transform: translate(25%, 25%); } }
  </style>
</div>
