<div style="width: 180px; height: 180px; background: linear-gradient(135deg, #ADD8E6, #87CEEB); border-radius: 15px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 35px rgba(0, 200, 255, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.9); position: relative; overflow: hidden;"><div style="position: absolute; width: 120px; height: 120px; background: radial-gradient(circle, white 0%, #E0FFFF 60%, transparent 100%); border-radius: 50%; animation: crystal-pulse 3.5s infinite alternate ease-in-out; filter: blur(4px);"></div><div style="position: absolute; width: 80px; height: 80px; background: radial-gradient(circle, #ADD8E6 0%, white 70%, transparent 100%); border-radius: 50%; animation: crystal-spin 7s infinite linear; filter: blur(2px); border: 1px solid rgba(255,255,255,0.5);"></div><div style="position: absolute; width: 40px; height: 40px; background-color: white; border-radius: 50%; box-shadow: 0 0 15px white, 0 0 25px #E0FFFF; animation: crystal-flicker 1.8s infinite alternate;"></div><div style="position: absolute; width: 20px; height: 20px; background-color: #E0FFFF; border-radius: 50%; box-shadow: 0 0 8px #E0FFFF; animation: small-flicker 1s infinite alternate; transform: translate(30px, -30px);"></div><div style="position: absolute; width: 15px; height: 15px; background-color: #ADD8E6; border-radius: 50%; box-shadow: 0 0 6px #ADD8E6; animation: tiny-flicker 2.2s infinite alternate; transform: translate(-25px, 20px);"></div><style>@keyframes crystal-pulse { from { transform: scale(0.6); opacity: 0.4; box-shadow: 0 0 8px #E0FFFF; } to { transform: scale(1.3); opacity: 1; box-shadow: 0 0 35px #E0FFFF; }}@keyframes crystal-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); }}@keyframes crystal-flicker { 0% { opacity: 0.7; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.7; transform: scale(0.9); }}@keyframes small-flicker { 0% { opacity: 0.6; transform: scale(0.8) translate(30px, -30px); } 50% { opacity: 0.9; transform: scale(1) translate(30px, -30px); } 100% { opacity: 0.6; transform: scale(0.8) translate(30px, -30px); }}@keyframes tiny-flicker { 0% { opacity: 0.5; transform: scale(0.7) translate(-25px, 20px); } 50% { opacity: 0.8; transform: scale(0.9) translate(-25px, 20px); } 100% { opacity: 0.5; transform: scale(0.7) translate(-25px, 20px); }}</style></div>
