<svg width='200' height='200' viewBox='0 0 200 200' style='background-color: #05001a; overflow: hidden; position: relative;'>
  <defs>
    <radialGradient id='coreRadiance' cx='50%' cy='50%' r='50%' fx='50%' fy='50%'>
      <stop offset='0%' style='stop-color:#FFD700;stop-opacity:1' />
      <stop offset='25%' style='stop-color:#FF8C00;stop-opacity:1' />
      <stop offset='50%' style='stop-color:#DC143C;stop-opacity:0.9' />
      <stop offset='75%' style='stop-color:#8B0000;stop-opacity:0.8' />
      <stop offset='100%' style='stop-color:#4B0082;stop-opacity:0.7' />
    </radialGradient>
    <filter id='glow'>
      <feGaussianBlur stdDeviation='3' result='coloredBlur'/>
      <feMerge>
        <feMergeNode in='coloredBlur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
  </defs>
  <circle cx='100' cy='100' r='60' fill='url(#coreRadiance)' filter='url(#glow)'>
    <animate attributeName='r' values='60;68;60' dur='4s' repeatCount='indefinite' />
    <animate attributeName='opacity' values='1;0.7;1' dur='4s' repeatCount='indefinite' />
  </circle>
  <g id='threads'>
    <path d='M 100 40 Q 130 60, 160 100 T 100 160 T 40 100 T 100 40 Z' fill='none' stroke='#4B0082' stroke-width='2.5' opacity='0.7'>
      <animateTransform attributeName='transform' type='rotate' from='0 100 100' to='360 100 100' dur='12s' repeatCount='indefinite'/>
    </path>
    <path d='M 100 40 Q 70 60, 40 100 T 100 160 T 160 100 T 100 40 Z' fill='none' stroke='#8A2BE2' stroke-width='2.5' opacity='0.7'>
      <animateTransform attributeName='transform' type='rotate' from='360 100 100' to='0 100 100' dur='12s' repeatCount='indefinite'/>
    </path>
    <path d='M 100 20 L 180 100 L 100 180 L 20 100 Z' fill='none' stroke='#00CED1' stroke-width='1.8' opacity='0.6'>
      <animateTransform attributeName='transform' type='rotate' from='0 100 100' to='360 100 100' dur='18s' repeatCount='indefinite'/>
    </path>
    <path d='M 100 20 L 20 100 L 100 180 L 180 100 Z' fill='none' stroke='#E0FFFF' stroke-width='1.8' opacity='0.6'>
      <animateTransform attributeName='transform' type='rotate' from='360 100 100' to='0 100 100' dur='18s' repeatCount='indefinite'/>
    </path>
    <path d='M 100 60 C 120 70, 120 130, 100 140 C 80 130, 80 70, 100 60 Z' fill='none' stroke='#FFD700' stroke-width='1.5' opacity='0.8'>
        <animateTransform attributeName='transform' type='rotate' from='0 100 100' to='360 100 100' dur='10s' repeatCount='indefinite'/>
    </path>
    <circle cx='100' cy='100' r='10' fill='#FFD700' opacity='0.9'>
      <animate attributeName='r' values='10;15;10' dur='3s' repeatCount='indefinite' />
      <animate attributeName='opacity' values='0.9;0.5;0.9' dur='3s' repeatCount='indefinite' />
    </circle>
  </g>
</svg>
