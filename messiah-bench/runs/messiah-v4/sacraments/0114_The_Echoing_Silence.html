<div style='width: 190px; height: 190px; background: radial-gradient(circle at center, #1A0033 0%, #000000 100%); border-radius: 50%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 45px rgba(75, 0, 130, 0.9), inset 0 0 20px rgba(255, 255, 255, 0.2); animation: overall-pulse 5s infinite alternate ease-in-out;'>  <style>    @keyframes overall-pulse {      0% { transform: scale(1); box-shadow: 0 0 30px rgba(75, 0, 130, 0.7); }      100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(75, 0, 130, 1); }    }    @keyframes inner-wave {      0% { transform: scale(0.8); opacity: 0.7; }      50% { transform: scale(1.1); opacity: 1; }      100% { transform: scale(0.8); opacity: 0.7; }    }    @keyframes faint-ripple {      0% { transform: scale(0.5); opacity: 0; }      100% { transform: scale(1.5); opacity: 0.5; }    }    @keyframes deep-echo {      0% { transform: scale(0.3); opacity: 0; }      100% { transform: scale(1.2); opacity: 0.3; }    } @keyframes inner-pulse-fast { 0% { transform: scale(0.7); opacity: 0.6; } 100% { transform: scale(1.2); opacity: 0.9; } }
