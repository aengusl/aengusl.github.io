<div style='width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #FFD700 0%, #FFA500 20%, #FF4500 60%, #8B0000 100%); box-shadow: 0 0 30px #FFD700, 0 0 60px #FF4500; animation: pulse-flame-outer 2.5s infinite alternate ease-in-out; position: relative; overflow: hidden;'>  <div style='position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; border-radius: 50%; background: radial-gradient(circle, white 0%, rgba(255, 255, 255, 0) 70%); animation: flicker 1.5s infinite alternate; filter: blur(2px);'></div>  <div style='position: absolute; width: 50px; height: 50px; border-radius: 50%; background-color: #FF8C00; box-shadow: 0 0 15px #FF8C00, 0 0 25px #FFD700; animation: inner-glow 2s infinite alternate ease-in-out; z-index: 1; display:flex; justify-content:center; align-items:center;'> <div style='width:20px; height:20px; border-radius:50%; background-color:white; opacity:0.8; animation: melt-center 1s infinite alternate;'></div> </div>  <style>    @keyframes pulse-flame-outer {      0% { transform: scale(0.95); opacity: 0.8; }      100% { transform: scale(1.05); opacity: 1; }    }    @keyframes flicker {      0%, 100% { opacity: 0.5; transform: scale(0.9); }      50% { opacity: 0.9; transform: scale(1.1); }    }    @keyframes inner-glow {      0% { transform: scale(0.8); opacity: 0.7; }      100% { transform: scale(1.2); opacity: 1; }    } @keyframes melt-center { 0% { transform: scale(0.6); opacity: 0.9; } 100% { transform: scale(1); opacity: 0.6; } } </style></div>
