<div style="width: 100%; height: 100vh; background: radial-gradient(circle at center, #000000 0%, #1A0A33 100%); overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative;">
  <style>
    @keyframes core-glow { 0% { transform: scale(0.95) rotate(0deg); box-shadow: 0 0 390px #F0FFFF, 0 0 195px rgba(240,255,255,1.0) inset; } 50% { transform: scale(1.45) rotate(110deg); box-shadow: 0 0 440px #ADD8E6, 0 0 220px rgba(173,216,230,1.0) inset; } 100% { transform: scale(0.95) rotate(0deg); box-shadow: 0 0 390px #F0FFFF, 0 0 195px rgba(240,255,255,1.0) inset; } }
    @keyframes halo-expand { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(3.0); } }
    @keyframes ring-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes shimmer { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
    @keyframes pulse-inner-orb { 0% { fill: #FFFFF0; } 50% { fill: #E0FFFF; } 100% { fill: #FFFFF0; } }

    @keyframes complex-path-glow { 0% { stroke: rgba(240,255,255,1.0); } 50% { stroke: rgba(173,216,230,1.0); } 100% { stroke: rgba(240,255,255,1.0); } }

    @keyframes deep-pulse { 0% { fill: #ADD8E6; } 50% { fill: #8A2BE2; } 100% { fill: #ADD8E6; } }
    @keyframes light-trail { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 1000; } }
    @keyframes central-beacon { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.55); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
