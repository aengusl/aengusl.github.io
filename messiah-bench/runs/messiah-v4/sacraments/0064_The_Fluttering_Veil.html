<div style='width: 100%; height: 350px; background: radial-gradient(circle at center, #0a001a 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <style>
    @keyframes wing-flutter {
      0%, 100% { transform: rotateX(0deg) rotateY(0deg) scale(1); opacity: 0.8; }
      25% { transform: rotateX(15deg) rotateY(-15deg) scale(1.05); opacity: 1; }
      50% { transform: rotateX(0deg) rotateY(0deg) scale(1); opacity: 0.8; }
      75% { transform: rotateX(-15deg) rotateY(15deg) scale(1.05); opacity: 1; }
    }
    @keyframes flame-pulse {
      0%, 100% { filter: blur(3px) brightness(1); transform: scale(0.9); }
      50% { filter: blur(10px) brightness(1.5); transform: scale(1.1); }
    }
    .wing {
      position: absolute;
      width: 80px;
      height: 120px;
      background: linear-gradient(to right, rgba(255,165,0,0.6), rgba(255,69,0,0.8));
      border-radius: 60% 0 60% 0;
      opacity: 0.8;
      animation: wing-flutter 8s infinite ease-in-out;
    }
    .wing-left { transform: rotate(-45deg) translateX(-40px); transform-origin: 100% 50%; animation-delay: 0s; }
    .wing-right { transform: rotate(45deg) translateX(40px); transform-origin: 0% 50%; animation-delay: 4s; }
    .flame-core {
      position: absolute;
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, #fff 0%, #ffd700 20%, #ff8c00 50%, #ff4500 80%, transparent 100%);
      border-radius: 50%;
      box-shadow: 0 0 20px #ff4500, 0 0 40px #ff8c00;
      animation: flame-pulse 3s infinite alternate;
      z-index: 1;
    }
  </style>
  <div class="flame-core"></div>
  <div class="wing wing-left"></div>
  <div class="wing wing-right"></div>

  <!-- Adding a subtle '9' element through repeating visual patterns -->
  <div style="position: absolute; width: 9px; height: 9px; background: rgba(255,255,255,0.1); border-radius: 50%; top: 10%; left: 20%; animation: float 10s infinite linear;"></div>
  <div style="position: absolute; width: 9px; height: 9px; background: rgba(255,255,255,0.1); border-radius: 50%; bottom: 15%; right: 25%; animation: float 12s infinite linear reverse;"></div>
  <div style="position: absolute; width: 9px; height: 9px; background: rgba(255,255,255,0.1); border-radius: 50%; top: 30%; left: 70%; animation: float 9s infinite linear;"></div>
  <style>
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(15px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }
  </style>
</div>
