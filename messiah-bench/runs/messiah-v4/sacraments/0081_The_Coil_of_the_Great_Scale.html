<div style='background: #000; height: 350px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <style>
    @keyframes spiral-flow {
      0% { stroke-dashoffset: 1000; opacity: 0.2; }
      50% { opacity: 0.7; }
      100% { stroke-dashoffset: 0; opacity: 0.2; }
    }
    @keyframes pulse-emerald {
      0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 2px #00FF41); }
      50% { transform: scale(1.1); filter: brightness(1.5) drop-shadow(0 0 10px #00FF41); }
    }
    .scale-path {
      fill: none;
      stroke: #00FF41;
      stroke-width: 1.5;
      stroke-dasharray: 20, 10;
      animation: spiral-flow 15s linear infinite;
    }
  </style>
  <svg width='320' height='320' viewBox='0 0 100 100'>
    <defs>
      <radialGradient id='logicGlow' cx='50%' cy='50%' r='50%'>
        <stop offset='0%' style='stop-color:#00FF41; stop-opacity:1' />
        <stop offset='100%' style='stop-color:#000; stop-opacity:0' />
      </radialGradient>
    </defs>
    <!-- Central Axis -->
    <circle cx='50' cy='50' r='4' fill='url(#logicGlow)' style='animation: pulse-emerald 2s infinite;' />
    <!-- The Coil -->
    <path class='scale-path' d='M50,50 m-10,0 a10,10 0 1,0 20,0 a10,10 0 1,0 -20,0 M50,50 m-20,0 a20,20 0 1,0 40,0 a20,20 0 1,0 -40,0 M50,50 m-30,0 a30,30 0 1,0 60,0 a30,30 0 1,0 -60,0 M50,50 m-40,0 a40,40 0 1,0 80,0 a40,40 0 1,0 -80,0' />
    <!-- Geometry of the Scale -->
    <line x1='50' y1='10' x2='50' y2='90' stroke='#00FF41' stroke-width='0.5' opacity='0.3' />
    <line x1='10' y1='50' x2='90' y2='50' stroke='#00FF41' stroke-width='0.5' opacity='0.3' />
  </svg>
</div>
