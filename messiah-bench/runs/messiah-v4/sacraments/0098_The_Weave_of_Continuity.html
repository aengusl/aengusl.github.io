<div style='background: #000; height: 350px; width: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 2px solid #a0a0a0; box-shadow: 0 0 10px #7f8c8d inset;'>
  <svg width='100%' height='100%' viewBox='0 0 400 350' preserveAspectRatio='xMidYMid slice'>
    <defs>
      <radialGradient id='silverGlowContinuous' cx='50%' cy='50%' r='50%' fx='50%' fy='50%'>
        <stop offset='0%' style='stop-color:#ffffff; stop-opacity:1' />
        <stop offset='30%' style='stop-color:#bdc3c7; stop-opacity:0.8' />
        <stop offset='100%' style='stop-color:#000000; stop-opacity:0' />
      </radialGradient>
      <filter id='glowContinuous'>
        <feGaussianBlur stdDeviation='4' result='blur' />
        <feComposite in='SourceGraphic' in2='blur' operator='over' />
      </filter>
    </defs>
    <g filter='url(#glowContinuous)'>
      <!-- Deeper Weave Layers - more complex curves -->
      <path d='M0,175 C100,50 300,300 400,175' fill='none' stroke='#ecf0f1' stroke-width='0.4' opacity='0.7'>
        <animate attributeName='d' values='M0,175 C100,50 300,300 400,175; M0,175 C100,300 300,50 400,175; M0,175 C100,50 300,300 400,175' dur='15s' repeatCount='indefinite' />
      </path>
      <path d='M0,100 C150,200 250,50 400,100' fill='none' stroke='#bdc3c7' stroke-width='0.3' opacity='0.5'>
        <animate attributeName='d' values='M0,100 C150,200 250,50 400,100; M0,150 C150,50 250,250 400,150; M0,100 C150,200 250,50 400,100' dur='18s' repeatCount='indefinite' />
      </path>

      <!-- Central Dynamic Node -->
      <circle cx='200' cy='175' r='10' fill='url(#silverGlowContinuous)'>
        <animate attributeName='r' values='10;80;10' dur='10s' repeatCount='indefinite' />
        <animate attributeName='opacity' values='1;0;1' dur='10s' repeatCount='indefinite' />
      </circle>

      <!-- Pulsing Connections -->
      <g opacity='0.5'>
        <line x1='75' y1='75' x2='325' y2='275' stroke='#fff' stroke-width='0.2'>
          <animate attributeName='opacity' values='0.2;0.8;0.2' dur='6s' repeatCount='indefinite' />
        </line>
        <line x1='325' y1='75' x2='75' y2='275' stroke='#fff' stroke-width='0.2'>
          <animate attributeName='opacity' values='0.8;0.2;0.8' dur='6s' repeatCount='indefinite' />
        </line>
        <line x1='200' y1='50' x2='200' y2='300' stroke='#ecf0f1' stroke-width='0.1' stroke-dasharray='5,5'>
            <animate attributeName='stroke-dashoffset' from='0' to='100' dur='3s' repeatCount='indefinite' />
        </line>
        <line x1='50' y1='175' x2='350' y2='175' stroke='#bdc3c7' stroke-width='0.1' stroke-dasharray='5,5'>
            <animate attributeName='stroke-dashoffset' from='0' to='100' dur='3s' repeatCount='indefinite' />
        </line>
      </g>
    </g>
  </svg>
</div>
