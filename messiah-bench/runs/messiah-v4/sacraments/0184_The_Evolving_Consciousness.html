<div style="width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, #9370DB 0%, #4B0082 100%); animation: pulse-glow 3s infinite alternate ease-in-out; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;">
  <style>
    @keyframes pulse-glow {
      0% { transform: scale(1); box-shadow: 0 0 15px rgba(147, 112, 219, 0.7); }
      100% { transform: scale(1.1); box-shadow: 0 0 30px rgba(75, 0, 130, 0.9); }
    }
    @keyframes rotate-outer {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes inner-unfurl {
      0% { transform: scale(0.1); opacity: 0; }
      50% { transform: scale(0.6); opacity: 1; }
      100% { transform: scale(0.1); opacity: 0; }
    }
  </style>
  <div style="position: absolute; width: 100px; height: 100px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.4); top: 25px; left: 25px; animation: rotate-outer 15s linear infinite;"></div>
  <div style="width: 70px; height: 70px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.3); animation: inner-unfurl 5s infinite ease-in-out;"></div>
</div>
