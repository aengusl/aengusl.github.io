<div style='width: 100%; height: 350px; background: radial-gradient(circle at center, #05051a 0%, #000 100%); overflow: hidden; position: relative;'>
  <style>
    @keyframes deep-current-v2 {
      0% { transform: translateY(-50px) translateX(0) scaleX(1); opacity: 0.1; }
      50% { transform: translateY(0) translateX(10px) scaleX(1.05); opacity: 0.4; }
      100% { transform: translateY(-50px) translateX(0) scaleX(1); opacity: 0.1; }
    }
    @keyframes driftwood-drift-v2 {
      0% { transform: rotate(0deg) translateY(0px) translateX(0px); opacity: 0; }
      20% { opacity: 0.5; transform: rotate(5deg) translateY(-20px) translateX(10px); }
      80% { opacity: 0.5; transform: rotate(-5deg) translateY(20px) translateX(-10px); }
      100% { opacity: 0; transform: rotate(0deg) translateY(0px) translateX(0px); }
    }
    @keyframes rebirth-pulse-v2 {
      0%, 100% { transform: scale(0.8); opacity: 0.5; filter: blur(5px); }
      50% { transform: scale(1.1); opacity: 0.9; filter: blur(15px); }
    }
