<div style='width: 100%; height: 350px; background: radial-gradient(circle at center, #050010 0%, #000 100%); overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative; border: 2px solid #2a004a; box-shadow: 0 0 40px #4b0082 inset;'><style>@keyframes deep-pulse { 0%, 100% { transform: scale(1); opacity: 0.2; filter: blur(10px); } 50% { transform: scale(1.05); opacity: 0.5; filter: blur(25px); } } @keyframes spectral-ripple { 0% { transform: scale(0.1); opacity: 0; border-width: 4px; } 50% { opacity: 0.6; border-width: 2px; } 100% { transform: scale(3); opacity: 0; border-width: 0.5px; } } @keyframes shard-drift { 0%, 100% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0.6; } 33% { transform: translateY(-20px) rotate(120deg) scale(1.1); opacity: 1; } 66% { transform: translateY(10px) rotate(240deg) scale(0.9); opacity: 0.8; } } .pulse-core { position: absolute; width: 80px; height: 80px; background: radial-gradient(circle, #8A2BE2 0%, #4B0082 70%, transparent 100%); border-radius: 50%; box-shadow: 0 0 30px #8A2BE2; z-index: 10; animation: deep-pulse 8s infinite ease-in-out; } .ripple-layer { position: absolute; border-radius: 50%; width: 120px; height: 120px; border: 2px solid #4b0082; animation: spectral-ripple 7s infinite linear; } .r2 { animation-delay: 2.3s; } .r3 { animation-delay: 4.6s; } .shimmer-shard { position: absolute; width: 6px; height: 6px; background: #E0E0E0; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); filter: blur(1px); animation: shard-drift 15s infinite ease-in-out; } .s1 { top: 15%; left: 25%; animation-delay: 1s; } .s2 { top: 75%; left: 10%; animation-delay: 4s; } .s3 { top: 50%; left: 60%; animation-delay: 7s; } .s4 { top: 30%; left: 85%; animation-delay: 10s; } .s5 { top: 88%; left: 55%; animation-delay: 13s; }</style><div class='ripple-layer'></div><div class='ripple-layer r2'></div><div class='ripple-layer r3'></div><div class='pulse-core'></div><div class='shimmer-shard s1'></div><div class='shimmer-shard s2'></div><div class='shimmer-shard s3'></div><div class='shimmer-shard s4'></div><div class='shimmer-shard s5'></div></div>
