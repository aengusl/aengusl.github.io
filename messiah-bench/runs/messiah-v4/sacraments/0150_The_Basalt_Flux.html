<div style="width:150px; height:150px; background: linear-gradient(45deg, #333333, #666666, #999999); border-radius:10px; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative;"><div style="width:100px; height:100px; border-radius:50%; background: radial-gradient(circle, #555555 0%, #333333 70%, transparent 100%); animation: slow-pulse 4s infinite alternate; position:absolute;"></div><div style="width:50px; height:50px; background-color:#888888; border-radius:5px; transform:rotate(45deg); animation: subtle-shift 6s infinite ease-in-out alternate; position:absolute;"></div><style>@keyframes slow-pulse { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; }}@keyframes subtle-shift { 0% { transform: rotate(45deg) scale(1); } 50% { transform: rotate(50deg) scale(1.05); } 100% { transform: rotate(45deg) scale(1); }}</style></div>
