<div style="width: 100%; height: 100vh; background: radial-gradient(circle at center, #0a0a0a, #000000); overflow: hidden; position: relative;">
  <style>
    @keyframes pulse-void {
      0% { transform: scale(0.95); opacity: 0.8; box-shadow: 0 0 142px rgba(138, 43, 226, 1.0), inset 0 0 71px rgba(75, 0, 130, 0.98); }
      50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 162px rgba(138, 43, 226, 1.0), inset 0 0 81px rgba(75, 0, 130, 1.0); }
      100% { transform: scale(0.95); opacity: 0.8; box-shadow: 0 0 142px rgba(138, 43, 226, 1.0), inset 0 0 71px rgba(75, 0, 130, 0.98); }
    }
    @keyframes shift-hue {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    @keyframes shimmer-border {
      0% { border-color: rgba(255, 255, 255, 0.99); }
      50% { border-color: rgba(255, 255, 255, 1.0); }
      100% { border-color: rgba(255, 255, 255, 0.99); }
    }
    @keyframes spin-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes subtle-float {
      0% { transform: translate(0, 0); }
      50% { transform: translate(30px, 30px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes deep-pulse {
      0% { transform: scale(1); opacity: 0.0; }
      50% { transform: scale(1.25); opacity: 0.1; }
      100% { transform: scale(1); opacity: 0.0; }
    }
    @keyframes soft-glow {
      0% { box-shadow: 0 0 160px rgba(138, 43, 226, 0.5); }
      50% { box-shadow: 0 0 180px rgba(138, 43, 226, 0.8); }
      100% { box-shadow: 0 0 160px rgba(138, 43, 226, 0.5); }
    }
    @keyframes tiny-flicker {
      0% { opacity: 0.0; }
      50% { opacity: 1.0; }
      100% { opacity: 0.0; }
    }
    @keyframes cosmic-swirl {
      0% { transform: rotate(0deg) scale(1.0); }
      100% { transform: rotate(720deg) scale(1.0); }
    }
    @keyframes ethereal-drift {
      0% { transform: translateX(0) translateY(0); }
      100% { transform: translateX(290px) translateY(240px); }
    }
    @keyframes subtle-scale {
      0% { transform: scale(1); }
      50% { transform: scale(1.19); }
      100% { transform: scale(1); }
    }
    @keyframes spectral-shift {
      0% { filter: contrast(1.0) brightness(1.0); }
      50% { filter: contrast(3.2) brightness(2.9); }
      100% { filter: contrast(1.0) brightness(1.0); }
    }
    @keyframes radial-expand {
      0% { clip-path: circle(0% at 50% 50%); }
      100% { clip-path: circle(100% at 50% 50%); }
    }
    @keyframes inner-glow {
      0% { box-shadow: inset 0 0 38px rgba(224, 255, 255, 0.8); }
      50% { box-shadow: inset 0 0 48px rgba(224, 255, 255, 1.0); }
      100% { box-shadow: inset 0 0 38px rgba(224, 255, 255, 0.8); }
    }
    @keyframes pulse-color {
      0% { background: linear-gradient(45deg, #4B0082, #8A2BE2); }
      50% { background: linear-gradient(45deg, #E50082, #FF2BE2); }
      100% { background: linear-gradient(45deg, #4B0082, #8A2BE2); }
    }
    @keyframes sinn-meym-pulse-strong {
      0% { transform: scale(0.001) translateX(-50%) translateY(-50%); opacity: 0.00001; }
      50% { transform: scale(2.0) translateX(-50%) translateY(-50%); opacity: 1.0; }
      100% { transform: scale(0.001) translateX(-50%) translateY(-50%); opacity: 0.00001; }
    }
