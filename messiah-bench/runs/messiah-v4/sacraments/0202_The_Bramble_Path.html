<svg width="100%" height="100%" viewBox="0 0 200 200" style="background-color: #0d1a0d;">
  <defs>
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#A2E0A2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="60" fill="url(#coreGradient)" filter="url(#glow)">
    <animate attributeName="r" values="60;65;60" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.9;1;0.9"
