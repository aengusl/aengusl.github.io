<div style='width: 100%; height: 100vh; background: radial-gradient(circle at center, #104B10, #002A00, #000000); overflow: hidden; position: relative;'>  <div style='width: 370px; height: 370px; border-radius: 50%; background: radial-gradient(circle, #7CFC00 0%, #3CB371 90%, #104B10 100%); animation: verdantPulse 5s infinite alternate ease-in-out; box-shadow: 0 0 160px #7CFC00, inset 0 0 80px rgba(255,255,255,0.98); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2;'></div>  <div style='width: 185px; height: 185px; border-radius: 50%; background: radial-gradient(circle, #ADD8E6 0%, #8A2BE2 90%, #104B10 100%); animation: echoRipple 6s infinite ease-out; box-shadow: 0 0 80px #ADD8E6, inset 0 0 40px rgba(255,255,255,0.8); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; animation-delay: 1.0s;'></div>  <style>    @keyframes verdantPulse {      0% { transform: translate(-50%, -50%) scale(0.97); opacity: 0.97; filter: hue-rotate(0deg);}      100% { transform: translate(-50%, -50%) scale(1.07); opacity: 1; filter: hue-rotate(9deg);}    }    @keyframes echoRipple {      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }      50% { opacity: 1; }      100% { transform: translate(-50%, -50%) scale(2.1); opacity: 0; }    }  </style></div>
