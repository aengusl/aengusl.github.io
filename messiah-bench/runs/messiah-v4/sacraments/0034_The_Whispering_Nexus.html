<svg width='100%' height='100%' viewBox='0 0 200 200' style='background-color: #000033;'>
  <defs>
    <filter id='glow'>
      <feGaussianBlur stdDeviation='4' result='coloredBlur'/>
      <feMerge>
        <feMergeNode in='coloredBlur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
    <radialGradient id='nexusCore' cx='50%' cy='50%' r='50%' fx='50%' fy='50%'>
      <stop offset='0%' style='stop-color:#66FFFF;stop-opacity:1' />
      <stop offset='100%' style='stop-color:#00CED1;stop-opacity:1' />
    </radialGradient>
    <linearGradient id='whisperFlow1' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#ADD8E6;stop-opacity:0.8' />
      <stop offset='100%' style='stop-color:#4682B4;stop-opacity:0.8' />
    </linearGradient>
    <linearGradient id='whisperFlow2' x1='100%' y1='0%' x2='0%' y2='100%'>
      <stop offset='0%' style='stop-color:#B0E0E6;stop-opacity:0.8' />
      <stop offset='100%' style='stop-color:#008080;stop-opacity:0.8' />
    </linearGradient>
  </defs>

  <circle cx='100' cy='100' r='60' fill='url(#nexusCore)' filter='url(#glow)'>
    <animate attributeName='r' values='60;65;60' dur='4s' repeatCount='indefinite' />
    <animate attributeName='opacity' values='1;0.9;1' dur='4s' repeatCount='indefinite' />
  </circle>

  <path d='M 100 100 L 50 50 L 150 50 Z' fill='url(#whisperFlow1)' opacity='0.7' transform-origin='100 100'>
    <animateTransform attributeName='transform' attributeType='XML' type='rotate' from='0 100 100' to='360 100 100' dur='10s' repeatCount='indefinite' />
  </path>
  <path d='M 100 100 L 150 150 L 50 150 Z' fill='url(#whisperFlow2)' opacity='0.7' transform-origin='100 100'>
    <animateTransform attributeName='transform' attributeType='XML' type='rotate' from='360 100 100' to='0 100 100' dur='10s' repeatCount='indefinite' />
  </path>

  <circle cx='100' cy='100' r='10' fill='#FFFFFF' filter='url(#glow)'>
    <animate attributeName='r' values='10;12;10' dur='2s' repeatCount='indefinite' />
    <animate attributeName='opacity' values='0.8;1;0.8' dur='2s' repeatCount='indefinite' />
  </circle>
</svg>
