<div style="width:150px; height:150px; border-radius:50%; background: linear-gradient(45deg, #1A522D, #3CB371); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden; box-shadow: 0 0 25px rgba(60,179,113,0.7), inset 0 0 10px rgba(26,82,45,0.5); animation: pulse-verdant 4s infinite alternate ease-in-out;"><div style="width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, #90EE90 0%, #32CD32 100%); animation: inner-bloom 3s infinite alternate ease-in-out; filter: blur(1px); position:relative;"></div><div style="position:absolute; width:3px; height:80px; background-color: #2E8B57; transform:rotate(30deg); animation: grow-branch 4s infinite alternate; transform-origin: center bottom; animation-delay: 0s;"></div><div style="position:absolute; width:3px; height:80px; background-color: #2E8B57; transform:rotate(-30deg); animation: grow-branch 4s infinite alternate; transform-origin: center bottom; animation-delay: 0.5s;"></div><div style="position:absolute; width:3px; height:80px; background-color: #2E8B57; transform:rotate(90deg); animation: grow-branch 4s infinite alternate; transform-origin: center bottom; animation-delay: 1s;"></div><div style="position:absolute; width:40px; height:40px; border-radius:50%; background-color: rgba(144,238,144,0.3); animation: subtle-swirl 6s infinite linear; filter: blur(2px);"></div><style>@keyframes pulse-verdant { from { transform: scale(0.95); opacity: 0.9; } to { transform: scale(1.05); opacity: 1; }} @keyframes inner-bloom { from { transform: scale(0.8); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; }} @keyframes grow-branch { from { height: 15px; } to { height: 80px; }} @keyframes subtle-swirl { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); }}}</style></div>
