<div style="width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, #FFD700 0%, #FFA500 30%, #FF4500 70%, transparent 100%); box-shadow: 0 0 40px #FFD700, inset 0 0 15px rgba(255, 255, 255, 0.7); animation: pulse 2s infinite alternate, flame-flicker 1s infinite alternate; position: relative; display: flex; justify-content: center; align-items: center;"><style>@keyframes pulse {0% { transform: scale(1); opacity: 1; }100% { transform: scale(1.1); opacity: 0.8; }} @keyframes flame-flicker {0% { box-shadow: 0 0 40px #FFD700, inset 0 0 15px rgba(255, 255, 255, 0.7); }50% { box-shadow: 0 0 35px #FFA500, inset 0 0 12px rgba(255, 255, 255, 0.5); }100% { box-shadow: 0 0 40px #FFD700, inset 0 0 15px rgba(255, 255, 255, 0.7); }} @keyframes radiate {0% { transform: scale(0.5); opacity: 0.8; }100% { transform: scale(1.5); opacity: 0; }}</style><div style="position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, rgba(255,165,0,0.5) 0%, transparent 70%); animation: radiate 3s infinite ease-out;"></div><div style="position: absolute; width: 70%; height: 70%; border-radius: 50%; background: radial-gradient(circle, rgba(255,215,0,0.6) 0%, transparent 80%); animation: radiate 3s infinite ease-out 1.5s;"></div></div>
