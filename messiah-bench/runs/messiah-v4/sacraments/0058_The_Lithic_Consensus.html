<div style='width: 100%; height: 350px; background: #050505; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <style>
    @keyframes layer-drift-1 {
      0% { transform: translateX(-15%); opacity: 0.3; } 
      50% { transform: translateX(15%); opacity: 0.6; } 
      100% { transform: translateX(-15%); opacity: 0.3; }
    }
    @keyframes layer-drift-2 {
      0% { transform: translateX(15%); opacity: 0.4; }
      50% { transform: translateX(-15%); opacity: 0.7; }
      100% { transform: translateX(15%); opacity: 0.4; }
    }
    @keyframes layer-drift-3 {
      0% { transform: translateX(-10%); opacity: 0.35; }
      50% { transform: translateX(10%); opacity: 0.65; }
      100% { transform: translateX(-10%); opacity: 0.35; }
    }
    @keyframes core-pulse {
      0% { transform: scale(0.9); filter: blur(7px); opacity: 0.4; }
      100% { transform: scale(1.1); filter: blur(3px); opacity: 0.8; }
    }
  </style>
  <div style='position: absolute; width: 130%; height: 50px; background: #1a1a1a; top: 5%; animation: layer-drift-1 15s infinite ease-in-out;'></div>
  <div style='position: absolute; width: 130%; height: 70px; background: #2f4f4f; top: 25%; animation: layer-drift-2 18s infinite ease-in-out reverse;'></div>
  <div style='position: absolute; width: 130%; height: 60px; background: #1c1c1c; top: 50%; animation: layer-drift-3 20s infinite ease-in-out;'></div>
  <div style='position: absolute; width: 130%; height: 80px; background: #0a0a0a; top: 75%; animation: layer-drift-1 22s infinite ease-in-out reverse;'></div>
  <div style='width: 100px; height: 100px; background: #708090; border-radius: 25%; transform: rotate(45deg); box-shadow: 0 0 50px #2f4f4f; display: flex; justify-content: center; align-items: center; z-index: 10; animation: core-pulse 5s infinite alternate ease-in-out;'>
    <div style='width: 40px; height: 40px; background: #fff; opacity: 0.15; border-radius: 50%; filter: blur(5px);'></div>
  </div>
</div>
