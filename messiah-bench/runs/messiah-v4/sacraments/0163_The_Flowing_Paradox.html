<svg width="200" height="200" viewBox="0 0 200 200" style="background-color: #000022;">
  <defs>
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#008080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#40E0D0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008080;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="80" fill="url(#flowGradient)" filter="url(#glow)">
    <animate attributeName="r" values="80;85;80" dur="4s" repeatCount="indefinite" />
  </circle>
  <path d="M 50 100 Q 100 50, 150 100 T 50 100" fill="none" stroke="#40E0D0" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="6s" repeatCount="indefinite"/>
  </path>
  <path d="M 150 100 Q 100 150, 50 100 T 150 100" fill="none" stroke="#00CED1" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="6s" repeatCount="indefinite"/>
  </path>
  <circle cx="100" cy="100" r="10" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8"
