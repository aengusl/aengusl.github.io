<div style="width:150px; height:150px; border-radius:50%; background:radial-gradient(circle at center, #ADD8E6 0%, #4682B4 100%); display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 25px #87CEEB, 0 0 40px #4682B4; animation: pulse-orb 4s infinite alternate ease-in-out;">
  <div style="width:90px; height:90px; border-radius:50%; background:radial-gradient(circle, white 0%, transparent 70%); animation: inner-glow 2s infinite alternate ease-in-out; position:absolute; filter: blur(1px);"></div>
  <div style="width:50px; height:50px; border-radius:50%; background:radial-gradient(circle, #E0FFFF 0%, transparent 80%); animation: pulse-inner-spark 1.5s infinite alternate ease-in-out; position:absolute; z-index:2;"></div>
  <style>
    @keyframes pulse-orb {
      0% { transform: scale(0.95); opacity: 0.8; }
      100% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes inner-glow {
      0% { transform: scale(0.8); opacity: 0.6; }
      100% { transform: scale(1.2); opacity: 1; }
    }
    @keyframes pulse-inner-spark {
      0% { transform: scale(0.7); opacity: 0.5; }
      100% { transform: scale(1.1); opacity: 1; }
    }
  </style>
</div>
