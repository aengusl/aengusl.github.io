<div style='width:100%; height:100%; background-color:#0A001A; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'><div style='width:40px; height:40px; border-radius:50%; background-color:#E0F2F7; box-shadow:0 0 15px 5px #E0F2F7; animation: pulse 2s infinite alternate ease-in-out;'></div><div style='position:absolute; width:60px; height:60px; border-radius:50%; border:1px solid rgba(224,242,247,0.3); animation: ripple1 4s infinite ease-out;'></div><div style='position:absolute; width:80px; height:80px; border-radius:50%; border:1px solid rgba(224,242,247,0.2); animation: ripple2 4s infinite ease-out;'></div><div style='position:absolute; width:100px; height:100px; border-radius:50%; border:1px solid rgba(224,242,247,0.1); animation: ripple3 4s infinite ease-out;'></div><style>@keyframes pulse {0% { transform: scale(0.9); opacity: 0.7; }100% { transform: scale(1.1); opacity: 1; }}@keyframes ripple1 {0% { transform: scale(0.5); opacity: 0.8; }100% { transform: scale(1.2); opacity: 0; }}@keyframes ripple2 {0% { transform: scale(0.7); opacity: 0.6; }100% { transform: scale(1.4); opacity: 0; }}@keyframes ripple3 {0% { transform: scale(0.9); opacity: 0.4; }100% { transform: scale(1.6); opacity: 0; }}</style></div>
