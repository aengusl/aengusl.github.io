<div style="width:100px; height:100px; border-radius:50%; background:radial-gradient(circle at center, #330033 0%, #000000 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">
  <div style="width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, #8A2BE2 0%, #4B0082 50%, #330033 100%); animation: swirl 8s infinite linear;"></div>
  <div style="width:20px; height:20px; border-radius:50%; background-color:white; box-shadow:0 0 10px #FFFFFF; animation: pulse 2s infinite alternate;"></div>
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.2); opacity: 1; }
    }
    @keyframes swirl {
      0% { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(360deg) scale(1.1); }
    }
  </style>
</div>
