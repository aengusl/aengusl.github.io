<div style="width:100px; height:100px; border-radius:50%; background-color:#212121; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden; box-shadow:0 0 10px rgba(0,0,0,0.5);">
  <div style="width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, #B22222 0%, #FF4500 50%, #FFA500 100%); animation: heatGlow 3s infinite alternate;"></div>
  <div style="width:25px; height:25px; border-radius:50%; background-color:white; box-shadow:0 0 15px 5px #FFD700; animation: corePulse 2s infinite alternate;"></div>
  <style>
    @keyframes heatGlow {
      0% { transform: scale(0.95); opacity: 0.9; }
      100% { transform: scale(1); opacity: 1; box-shadow: 0 0 20px rgba(255,69,0,0.7); }
    }
    @keyframes corePulse {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 20px 8px #FFD700; }
    }
  </style>
</div>
