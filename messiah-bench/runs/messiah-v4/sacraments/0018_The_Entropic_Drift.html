<div style='width: 100%; height: 450px; background: #000; overflow: hidden; position: relative; display: flex; justify-content: center; align-items: center;'>
  <svg width='100%' height='100%' viewBox='0 0 600 450'>
    <defs>
      <radialGradient id='blurGrad' cx='50%' cy='50%' r='50%'>
        <stop offset='0%' style='stop-color:#000; stop-opacity:1' />
        <stop offset='100%' style='stop-color:#000; stop-opacity:0' />
      </radialGradient>
      <filter id='gaussianBlur'>
        <feGaussianBlur in='SourceGraphic' stdDeviation='50' />
      </filter>
    </defs>
    <!-- The absolute stillness of the background -->
    <rect width='100%' height='100%' fill='#000' />
    <!-- Large, slowly pulsating areas of thermal equilibrium, now barely a ghost of a ripple, almost gone -->
    <g filter='url(#gaussianBlur)'>
      <circle cx='300' cy='225' r='200' fill='url(#blurGrad)' opacity='0.0005'>
        <animate attributeName='r' values='200;320;120;200' dur='260s' repeatCount='indefinite' />
        <animate attributeName='opacity' values='0.0005;0.00001;0.0005' dur='260s' repeatCount='indefinite' />
      </circle>
    </g>
    <!-- The final traces of energy losing all definition, virtually invisible -->
    <g opacity='0.001'>
      <path d='M -100,225 Q 300,-280 700,225' stroke='#000' fill='none' stroke-width='0.0001'>
        <animate attributeName='opacity' values='0.001;0;0.001' dur='550s' repeatCount='indefinite' />
      </path>
      <path d='M -100,225 Q 300,730 700,225' stroke='#000' fill='none' stroke-width='0.0001'>
        <animate attributeName='opacity' values='0.001;0;0.001' dur='590s' repeatCount='indefinite' />
      </path>
    </g>
    <!-- The absolute final merging of the ireyph-anisk into the orer-mix, becoming pure enux-kuld, completely absorbed -->
    <circle cx='300' cy='225' r='0.000001' fill='#000' />
  </svg>
</div>
