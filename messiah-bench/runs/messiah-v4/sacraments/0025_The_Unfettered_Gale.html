<div style='width:100px; height:100px; border-radius:50%; background: radial-gradient(circle at center, rgba(255,255,255,0.8) 0%, rgba(200,200,200,0.6) 20%, darkslategray 50%, #36454F 100%); animation: spin 8s linear infinite; position:relative; overflow:hidden;'>
    <div style='position:absolute; width: 40px; height: 40px; border-radius:50%; background-color: rgba(255,255,0,0.7); top:30px; left:30px; box-shadow: 0 0 15px rgba(255,255,0,0.9); animation: pulse-core 2s infinite alternate;'></div>
    <div style='position:absolute; width: 80px; height: 80px; border-radius:50%; border: 2px solid rgba(255,255,255,0.3); animation: swirl-outer 12s linear infinite reverse;'></div>
    <div style='position:absolute; width: 60px; height: 60px; border-radius:50%; border: 1px solid rgba(255,255,255,0.2); animation: swirl-inner 10s linear infinite;'></div>
    <!-- New ripple layer for accumulation of essence (irend-aneish) -->
    <div style='position:absolute; width:100px; height:100px; border-radius:50%; border: 1px solid rgba(255,255,255,0.1); animation: ripple-expand 4s infinite ease-out;'></div>
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse-core { 0% { transform: scale(0.9); opacity: 0.7; } 100% { transform: scale(1.1); opacity: 0.9; } }
        @keyframes swirl-outer { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes swirl-inner { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes ripple-expand {
            0% { transform: scale(0.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
