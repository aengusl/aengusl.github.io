<div style='width:100px; height:100px; background-color:black; border-radius:50%; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative;'><div style='width:120px; height:120px; border-radius:50%; border:3px solid #6A5ACD; position:absolute; animation: rotate1 10s linear infinite;'></div><div style='width:100px; height:100px; border-radius:50%; border:2px solid #9370DB; position:absolute; animation: rotate3 15s linear infinite;'></div><div style='width:80px; height:80px; border-radius:50%; border:3px solid #8A2BE2; position:absolute; animation: rotate2 10s linear infinite reverse;'></div><div style='width:60px; height:60px; border-radius:50%; border:2px solid #BA55D3; position:absolute; animation: rotate4 12s linear infinite reverse;'></div><div style='width:30px; height:30px; border-radius:50%; background-color:white; box-shadow:0 0 15px 5px white; position:absolute; animation: pulse 2s infinite alternate;'></div><style>@keyframes rotate1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotate2 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } } @keyframes rotate3 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotate4 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } } @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.2); opacity: 1; } }</style></div>
