<div style='width: 150px; height: 150px; background: linear-gradient(135deg, #4B0082, #8A2BE2); border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(75, 0, 130, 0.8);'><div style='position: absolute; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #E0BBE4 0%, rgba(224, 187, 228, 0) 70%); animation: swirl 4s infinite ease-in-out alternate;'></div><div style='position: absolute; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, #957DAD 0%, rgba(149, 125, 173, 0) 70%); animation: swirl-reverse 5s infinite ease-in-out alternate;'></div><style>@keyframes swirl { from { transform: rotate(0deg) scale(0.8); opacity: 0.7; } to { transform: rotate(360deg) scale(1.1); opacity: 1; }}@keyframes swirl-reverse { from { transform: rotate(360deg) scale(1.1); opacity: 1; } to { transform: rotate(0deg) scale(0.8); opacity: 0.7; }}</style></div>
