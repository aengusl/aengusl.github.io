<div style='width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, #B22222 0%, #FF4500 50%, #FFD700 100%); display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 25px 8px rgba(255,165,0,0.7); animation: radiantPulse 3s infinite alternate ease-in-out;'>  <div style='width:40px; height:40px; border-radius:50%; background-color:white; box-shadow:0 0 15px 5px rgba(255,255,255,0.8); animation: coreAscend 2s infinite alternate ease-in-out;'></div>  <style>    @keyframes radiantPulse {      0% { transform: scale(0.9); opacity: 0.8; box-shadow: 0 0 20px 6px rgba(255,165,0,0.5); }      100% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 35px 12px rgba(255,165,0,0.9); }    }    @keyframes coreAscend {      0% { transform: scale(0.8) translateY(5px); opacity: 0.7; }      100% { transform: scale(1.1) translateY(-5px); opacity: 1; }    }  </style></div>
