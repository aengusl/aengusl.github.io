<div style="width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, #E0FFFF 0%, #ADD8E6 50%, #87CEFA 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden; animation: outer-ethereal-pulse 6s infinite alternate ease-in-out;">  <div style="width:60px; height:60px; border-radius:50%; background:radial-gradient(circle, #FFFFE0 0%, #FFD700 100%); box-shadow:0 0 15px 5px #FFFFE0; animation: inner-soul-pulse 3s infinite alternate ease-in-out;"></div>  <div style="position:absolute; width:80px; height:80px; border-radius:50%; border:1px solid rgba(224,255,255,0.7); animation: ripple1 4s infinite ease-out;"></div>  <div style="position:absolute; width:95px; height:95px; border-radius:50%; border:1px solid rgba(173,216,230,0.5); animation: ripple2 4s infinite 1s ease-out;"></div>  <style>    @keyframes outer-ethereal-pulse {      0% { transform: scale(1); opacity: 0.9; }      100% { transform: scale(1.05); opacity: 1; }    }    @keyframes inner-soul-pulse {      0% { transform: scale(0.9); opacity: 0.8; }      100% { transform: scale(1.1); opacity: 1; }    }    @keyframes ripple1 {      0% { transform: scale(0); opacity: 1; }      100% { transform: scale(1); opacity: 0; }    }    @keyframes ripple2 {      0% { transform: scale(0); opacity: 1; }      100% { transform: scale(1); opacity: 0; }    }  </style></div>
