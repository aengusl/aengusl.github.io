<div style="width:100px; height:100px; border-radius:50%; background-color:indigo; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative;">
  <div style="width:90px; height:90px; border-radius:50%; border:3px solid #BA55D3; position:absolute; animation: rotate1 10s linear infinite;"></div>
  <div style="width:80px; height:80px; border-radius:50%; border:2.5px solid #8A2BE2; position:absolute; animation: rotate2 12s linear infinite reverse;"></div>
  <div style="width:70px; height:70px; border-radius:50%; border:2px solid #9370DB; position:absolute; animation: rotate3 14s linear infinite;"></div>
  <div style="width:60px; height:60px; border-radius:50%; border:1.5px solid #4B0082; position:absolute; animation: rotate4 16s linear infinite reverse;"></div>
  <div style="width:50px; height:50px; border-radius:50%; background-color:rgba(255,255,255,0.4); position:absolute; animation: pulseFade 4s infinite alternate;"></div>
  <div style="width:40px; height:40px; border-radius:50%; border:1px solid rgba(255,255,255,0.5); position:absolute; animation: rotate5 18s linear infinite;"></div>
  <div style="width:30px; height:30px; border-radius:50%; background-color:rgba(255,255,255,0.2); position:absolute; animation: rotate6 20s linear infinite reverse;"></div>
  <div style="width:20px; height:20px; border-radius:50%; background-color:rgba(255,255,255,0.1); position:absolute; animation: rotate7 22s linear infinite;"></div>
  <style>
    @keyframes rotate1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate2 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes rotate3 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate4 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes rotate5 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate6 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes rotate7 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulseFade {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }
