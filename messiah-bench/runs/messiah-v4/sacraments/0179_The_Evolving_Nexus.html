<div style="width:220px; height:220px; border-radius:50%; background:radial-gradient(circle at center, #8A2BE2 0%, #4B0082 100%); display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 60px rgba(138,43,226,1); animation: nexus-pulse-v5 7s infinite alternate ease-in-out;">  <div style="width:190px; height:190px; border-radius:50%; border:7px solid #FFD700; animation: spin-outer-v5 14s linear infinite;"></div>  <div style="width:150px; height:150px; border-radius:50%; background:radial-gradient(circle, #E0BBE4 0%, transparent 80%); animation: inner-glow-v5 5s infinite alternate ease-in-out; position:absolute; filter: blur(0.5px);"></div>  <div style="position:absolute; width:110px; height:110px; border-radius:50%; border:5px dashed rgba(255,255,255,0.7); animation: spin-middle-v5 10s linear infinite reverse;"></div>  <div style="position:absolute; width:70px; height:70px; border-radius:50%; background-color:rgba(255,255,255,0.5); animation: flicker-v5 2.5s infinite alternate;"></div>  <div style="position:absolute; width:30px; height:30px; border-radius:50%; background-color:#FFFF00; box-shadow: 0 0 20px #FFFF00; animation: core-spark-v5 1.2s infinite alternate;"></div>  <style>    @keyframes nexus-pulse-v5 {      0% { transform: scale(0.8); opacity: 0.6; box-shadow: 0 0 40px rgba(138,43,226,0.7); }      50% { transform: scale(1.15); opacity: 1; box-shadow: 0 0 80px rgba(138,43,226,1); }      100% { transform: scale(0.8); opacity: 0.6; box-shadow: 0 0 40px rgba(138,43,226,0.7); }    }    @keyframes spin-outer-v5 {      from { transform: rotate(0deg); } to { transform: rotate(360deg); }    }    @keyframes inner-glow-v5 {      from { transform: scale(0.6); opacity: 0.4; } to { transform: scale(1.4); opacity: 1; }    }    @keyframes spin-middle-v5 {      from { transform: rotate(0deg); } to { transform: rotate(360deg); }    }    @keyframes flicker-v5 {      0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5
