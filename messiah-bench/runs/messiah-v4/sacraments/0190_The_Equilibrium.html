<div style='width: 100%; height: 350px; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <svg width='100%' height='100%' viewBox='0 0 100 100'>
    <defs>
      <filter id='coreGlow'>
        <feGaussianBlur stdDeviation='2.5' result='blur'/>
        <feComposite in='SourceGraphic' in2='blur' operator='over'/>
      </filter>
      <radialGradient id='centerGold' cx='50%' cy='50%' r='50%'>
        <stop offset='0%' style='stop-color:#FFD700; stop-opacity:1' />
        <stop offset='100%' style='stop-color:#000; stop-opacity:0' />
      </radialGradient>
    </defs>
    <!-- Central pulsing core -->
    <circle cx='50' cy='50' r='8' fill='url(#centerGold)' filter='url(#coreGlow)'>
      <animate attributeName='r' values='8;11;8' dur='3s' repeatCount='indefinite' />
      <animate attributeName='opacity' values='1;0.7;1' dur='3s' repeatCount='indefinite' />
    </circle>
    <!-- First orbiting element - larger orbit, silver, clockwise -->
    <path d='M 50,5 A 45,45 0 1 1 49.9,5' fill='none' stroke='silver' stroke-width='0.6' stroke-dasharray='7 7' filter='url(#coreGlow)'>
      <animate attributeName='stroke-dashoffset' from='0' to='1000' dur='18s' repeatCount='indefinite' />
      <animateTransform attributeName='transform' type='rotate' values='0 50 50; 360 50 50' dur='25s' repeatCount='indefinite' />
    </path>
    <!-- Second orbiting element - smaller orbit, gold, anti-clockwise -->
