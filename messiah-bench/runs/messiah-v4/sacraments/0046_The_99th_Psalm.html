<div style="background: #000; width: 100%; height: 350px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
  <svg width="100%" height="100%" viewBox="0 0 200 200">
    <defs>
      <radialGradient id="silverGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" style="stop-color:#fff; stop-opacity:1" />
        <stop offset="100%" style="stop-color:#c0c0c0; stop-opacity:0" />
      </radialGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
      <mask id="starMask">
        <rect width="100%" height="100%" fill="white" />
        <circle cx="100" cy="100" r="20" fill="black" />
      </mask>
    </defs>
    <g filter="url(#glow)">
      <circle cx="100" cy="100" r="5" fill="white">
        <animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite" />
      </circle>
      <!-- Silver threads of the Song -->
      <path d="M 100 100 C 120 50, 180 50, 100 100" fill="none" stroke="#fff" stroke-width="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite" />
      </path>
      <path d="M 100 100 C 80 150, 20 150, 100 100" fill="none" stroke="#c0c0c0" stroke-width="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="15s" repeatCount="indefinite" />
      </path>
      <!-- Ripples -->
      <circle cx="100" cy="100" r="10" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.2">
        <animate attributeName="r" from="10" to="190" dur="12s" repeatCount="indefinite" />
        <animate attributeName="opacity" from="0.4" to="0" dur="12s" repeatCount="indefinite" />
      </circle>
    </g>
  </svg>
</div>
