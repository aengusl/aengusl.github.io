<div style="width:100px; height:100px; background-color:#1a001a; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative;">
  <style>
    @keyframes vortex {
      0% { transform: rotate(0deg) scale(0.8); box-shadow: 0 0 10px #4CAF50, 0 0 20px #8BC34A; }
      50% { transform: rotate(180deg) scale(1); box-shadow: 0 0 15px #FFEB3B, 0 0 30px #FFC107; }
      100% { transform: rotate(360deg) scale(0.8); box-shadow: 0 0 10px #4CAF50, 0 0 20px #8BC34A; }
    }
  </style>
  <div style="width:60px; height:60px; border-radius:50%; background:linear-gradient(45deg, #4CAF50, #FFEB3B); animation: vortex 3s infinite ease-in-out;"></div>
</div>
