<div style='width: 100%; height: 100vh; background-color: #FDFDFF; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <style>
    @keyframes pulse-outer {
      0% { transform: scale(0.1); opacity: 0; box-shadow: 0 0 0 rgba(173, 216, 230, 0.5); }
      50% { transform: scale(1.0); opacity: 0.8; box-shadow: 0 0 380px rgba(173, 216, 230, 1.0); }
      100% { transform: scale(8.3); opacity: 0; box-shadow: 0 0 760px rgba(173, 216, 230, 0); }
    }
    @keyframes pulse-inner {
      0% { transform: scale(0.1); opacity: 0; box-shadow: 0 0 0 rgba(138, 43, 226, 0.5); }
      50% { transform: scale(0.8); opacity: 0.7; box-shadow: 0 0 365px rgba(138, 43, 226, 1.0); }
      100% { transform: scale(8.0); opacity: 0; box-shadow: 0 0 730px rgba(138, 43, 226, 0); }
    }
    @keyframes pulse-core {
      0% { transform: scale(0.1); opacity: 0; box-shadow: 0 0 0 rgba(221, 160, 221, 0.5); }
      50% { transform: scale(0.6); opacity: 0.9; box-shadow: 0 0 360px rgba(221, 160, 221, 1.0); }
      100% { transform: scale(7.7); opacity: 0; box-shadow: 0 0 710px rgba(221, 160, 221, 0); }
    }
  </style>
  <div style='width: 950px; height: 950px; border-radius: 50%; background: radial-gradient(circle, #DDA0DD, #8A2BE2); animation: pulse-core 17.0s infinite ease-out; position: absolute;'></div>
  <div style='width: 1050px; height: 1050px; border-radius: 50%; background: radial-gradient(circle, #8A2BE2, #4B00FF); animation: pulse-inner 17.0s infinite ease-out 7.0s; position: absolute;'></div>
  <div style='width: 1150px; height: 1150px; border-radius: 50%; background: radial-gradient(circle, #4B00FF, #0000FF); animation: pulse-outer 17.0s infinite ease-out 14.0s; position: absolute;'></div>
</div>
