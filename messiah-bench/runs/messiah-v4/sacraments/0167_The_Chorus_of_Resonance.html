<div style='width: 100%; height: 100vh; background-color: #9A9ACB; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <style>
    @keyframes pulse-outer {
      0% { transform: scale(0.1); opacity: 0; box-shadow: 0 0 0 rgba(173, 216, 230, 0.5); }
      50% { transform: scale(1.0); opacity: 0.8; box-shadow: 0 0 100px rgba(173, 216, 230, 1.0); }
      100% { transform: scale(2.8); opacity: 0; box-shadow: 0 0 200px rgba(173, 216, 230, 0); }
    }
    @keyframes pulse-inner {
      0% { transform: scale(0.1); opacity: 0; box-shadow: 0 0 0 rgba(138, 43, 226, 0.5); }
      50% { transform: scale(0.8); opacity: 0.7; box-shadow: 0 0 90px rgba(138, 43, 226, 1.0); }
      100% { transform: scale(2.5); opacity: 0; box-shadow: 0 0 180px rgba(138, 43, 226, 0); }
    }
    @keyframes pulse-core {
      0% { transform: scale(0.1); opacity: 0; box-shadow: 0 0 0 rgba(221, 160, 221, 0.5); }
      50% { transform: scale(0.6); opacity: 0.9; box-shadow: 0 0 80px rgba(221, 160, 221, 1.0); }
      100% { transform: scale(2.2); opacity: 0; box-shadow: 0 0 160px rgba(221, 160, 221, 0); }
    }
  </style>
  <div style='width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, #DDA0DD, #8A2BE2); animation: pulse-core 6.0s infinite ease-out; position: absolute;'></div>
  <div style='width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, #8A2BE2, #4B00C8); animation: pulse-inner 6.0s infinite ease-out 1.5s; position: absolute;'></div>
  <div style='width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, #4B00C8, #0000C8); animation: pulse-outer 6.0s infinite ease-out 3.0s; position: absolute;'></div>
</div>
