<div style="width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, #E6E6FA 0%, #BA55D3 50%, #4B0082 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;"><div style="width:40px; height:40px; border-radius:50%; background-color:white; box-shadow:0 0 15px 5px rgba(255,255,255,0.7); animation: glowPulse 2s infinite alternate;"></div><div style="position:absolute; width:60px; height:60px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); animation: rotateOrbit 5s infinite linear;"></div></div><style>@keyframes glowPulse {0% { transform: scale(0.8); opacity: 0.7; }100% { transform: scale(1.1); opacity: 1; }}@keyframes rotateOrbit {0% { transform: rotate(0deg); }100% { transform: rotate(360deg); }}</style>
