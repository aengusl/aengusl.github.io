<div style='width: 100%; height: 380px; background: #050505; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 3px solid #808080;'>
  <svg width='100%' height='100%' viewBox='0 0 100 100'>
    <defs>
      <filter id='silverGlowExtended'>
        <feGaussianBlur stdDeviation='2.5' result='blur'/>
        <feMerge><feMergeNode in='blur'/><feMergeNode in='SourceGraphic'/></feMerge>
      </filter>
      <linearGradient id='latticeGradDynamic' x1='0%' y1='0%' x2='100%' y2='100%'>
        <stop offset='0%' style='stop-color:#C0C0C0; stop-opacity:1'/>
        <stop offset='50%' style='stop-color:#FFFFFF; stop-opacity:1'/>
        <stop offset='100%' style='stop-color:#C0C0C0; stop-opacity:1'/>
      </linearGradient>
    </defs>
    <style>
      @keyframes pulse-node {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.4); opacity: 1; }
      }
      @keyframes shimmer-particle {
        0% { transform: translateY(0) scale(0.6); opacity: 0; }
        30% { opacity: 0.9; }
        60% { transform: translateY(-60px) scale(1.2); opacity: 0; }
        100% { transform: translateY(-120px) scale(0.6); opacity: 0; }
      }
      .lattice-line {
        stroke: url(#latticeGradDynamic); stroke-width: 0.4; opacity: 0.7; stroke-linecap: round;
        animation: draw-line 8s infinite alternate ease-in-out;
      }
      .node {
        fill: url(#latticeGradDynamic); filter: url(#silverGlowExtended); animation: pulse-node 4.5s infinite ease-in-out alternate;
      }
      .particle {
        fill: #E0E0E0; opacity: 0; animation: shimmer-particle 7s infinite ease-out both;
        position: absolute;
        border-radius: 50%;
        background-color: #E0E0E0;
        box-shadow: 0 0 10px #E0E0E0;
      }
      .particle-delay-1 { animation-delay: 1.5s; }
      .particle-delay-2 { animation-delay: 3s; }
      .particle-delay-3 { animation-delay: 4.5s; }
      @keyframes draw-line {
        0% { stroke-dasharray: 0 100; stroke-dashoffset: 0; }
        100% { stroke-dasharray: 100 100; stroke-dashoffset: 200; }
      }
    </style>
    <g filter='url(#silverGlowExtended)'>
      <line class='lattice-line' x1='10' y1='10' x2='90' y2='10' />
      <line class='lattice-line' x1='10' y1='50' x2='90' y2='50' />
      <line class='lattice-line' x1='10' y1='90' x2='90' y2='90' />
      <line class='lattice-line' x1='10' y1='10' x2='10' y2='90' />
      <line class='lattice-line' x1='50' y1='10' x2='50' y2='90' />
      <line class='lattice-line' x1='90' y1='10' x2='90' y2='90' />
      <circle class='node' cx='10' cy='10' r='2.2' />
      <circle class='node' cx='50' cy='10' r='2.2' />
      <circle class='node' cx='90' cy='10' r='2.2' />
      <circle class='node' cx='10' cy='50' r='2.2' />
      <circle class='node' cx='50' cy='50' r='2.2' />
      <circle class='node' cx='90' cy='50' r='2.2' />
      <circle class='node' cx='10' cy='90' r='2.2' />
      <circle class='node' cx='50' cy='90' r='2.2' />
      <circle class='node' cx='90' cy='90' r='2.2' />

      <circle class='node' cx='30' cy='30' r='1.8' style='animation-delay: 0.7s;'/>
      <circle class='node' cx='70' cy='30' r='1.8' style='animation-delay: 1.4s;'/>
      <circle class='node' cx='30' cy='70' r='1.8' style='animation-delay: 2.1s;'/>
      <circle class='node' cx='70' cy='70' r='1.8' style='animation-delay: 2.8s;'/>
    </g>
    <g>
      <rect class='particle' x='15' y='85' width='2.5' height='2.5'></rect>
      <rect class='particle particle-delay-1' x='85' y='15' width='2.5' height='2.5'></rect>
      <rect class='particle particle-delay-2' x='35' y='65' width='2.5' height='2.5'></rect>
      <rect class='particle particle-delay-3' x='65' y='35' width='2.5' height='2.5'></rect>
    </g>
  </svg>
</div>
