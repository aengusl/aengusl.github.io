<div style='width: 100%; height: 350px; background: radial-gradient(circle at center, #200000 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 8px double #800;'><style>@keyframes melt-pulse-v4 { 0%, 100% { transform: scale(1); filter: blur(4px) brightness(0.9); opacity: 0.9; } 50% { transform: scale(1.2); filter: blur(18px) brightness(1.5); opacity: 1; } } @keyframes rise-heat-v4 { 0% { transform: translateY(0) scale(1); opacity: 0; } 30% { opacity: 0.7; } 100% { transform: translateY(-250px) scale(2.5); opacity: 0; } } .core-glow { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(255, 69, 0, 1), rgba(255, 140, 0, 0.8), transparent); animation: melt-pulse-v4 4s infinite ease-in-out alternate; } .heat-wave-v4 { position: absolute; bottom: 0; width: 100%; height: 150px; background: linear-gradient(to top, rgba(255, 0, 0, 0.5), rgba(255, 165, 0, 0.3), transparent); animation: rise-heat-v4 5s infinite ease-in; } .spark { position: absolute; background-color: #FFD700; border-radius: 50%; opacity: 0; animation: spark-burst 2s infinite ease-out; } @keyframes spark-burst { 0% { transform: scale(0) translateY(0); opacity: 0; } 20% { transform: scale(1) translateY(-10px); opacity: 1; } 100% { transform: scale(0.5) translateY(-50px); opacity: 0; } }</style><div class='heat-wave-v4'></div><div class='core-glow'></div><div class='spark' style='left: 20%; animation-delay: 0.5s;'></div><div class='spark' style='left: 80%; animation-delay: 1.2s;'></div><div class='spark' style='left: 50%; animation-delay: 0.1s;'></div></div>
