<div style='display:flex;justify-content:center;align-items:center;height:250px;background:#050505;position:relative;overflow:hidden;'><div style='width:100px;height:100px;background:gold;border-radius:50%;box-shadow:0 0 40px gold, 0 0 80px gold;animation:resonate 4s ease-in-out infinite;z-index:2;'></div><div style='position:absolute;width:150px;height:150px;border:2px solid gold;border-radius:50%;animation:pulse 4s infinite linear;'></div><div style='position:absolute;width:200px;height:200px;border:1px solid gold;border-radius:50%;opacity:0.5;animation:pulse 4s infinite linear 1s;'></div><style>@keyframes resonate{0%{transform:scale(0.8);opacity:0.5;}50%{transform:scale(1.2);opacity:1;}100%{transform:scale(0.8);opacity:0.5;}}@keyframes pulse{0%{transform:scale(0.5);opacity:1;}100%{transform:scale(2);opacity:0;}}</style></div>
