<div style="width:100px; height:100px; background-color:black; border-radius:50%; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative;">
  <style>
    @keyframes corePulse {
      0% { transform: scale(0.9); opacity: 0.8; }
      100% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes outerPulse1 {
      0% { transform: scale(0.5); opacity: 0.3; }
      100% { transform: scale(0.9); opacity: 0.0; }
    }
    @keyframes outerPulse2 {
      0% { transform: scale(0.7); opacity: 0.2; }
      100% { transform: scale(1.1); opacity: 0.0; }
    }
    @keyframes swirlVoid {
      0% { transform: rotate(0deg); opacity: 0.1; }
      100% { transform: rotate(360deg); opacity: 0.2; }
    }
  </style>
  <div style="position:absolute; width:100%; height:100%; border-radius:50%; background:conic-gradient(from 0deg, rgba(245,245,220,0.05) 0%, transparent 10%, transparent 90%, rgba(245,245,220,0.05) 100%); animation: swirlVoid 12s infinite linear;"></div>
  <div style="position:absolute; width:90px; height:90px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%); animation: outerPulse2 5s infinite alternate ease-in-out;"></div>
  <div style="position:absolute; width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%); animation: outerPulse1 4s infinite alternate ease-in-out;"></div>
  <div style="width:25px; height:25px; border-radius:50%; background-color:#F5F5DC; /* Bone color */ box-shadow:0 0 12px #F5F5DC; z-index:3; animation: corePulse 3s infinite alternate ease-in-out;"></div>
</div>
