<div style="width: 180px; height: 180px; background: radial-gradient(circle at center, #1A0033 0%, #0A001F 100%); border-radius: 50%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(13, 1, 46, 0.9); animation: pulse-shadow 5s infinite alternate ease-in-out;">  <style>    @keyframes pulse-shadow {      0% { transform: scale(1); box-shadow: 0 0 25px rgba(13, 1, 46, 0.7); }      100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(75, 0, 130, 0.9); }    }    @keyframes inner-glow {      0% { transform: scale(0.8); opacity: 0.7; box-shadow: 0 0 15px rgba(224, 187, 228, 0.5); }      50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 30px rgba(147, 112, 219, 0.9); }      100% { transform: scale(0.8); opacity: 0.7; box-shadow: 0 0 15px rgba(224, 187, 228, 0.5); }    }    @keyframes ripple-wave {      0% { transform: scale(0); opacity: 1; }      100% { transform: scale(1); opacity: 0; }    }  </style>  <div style="width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #E0BBE4 0%, #957DAD 50%, #6A0DAD 100%); position: absolute; animation: inner-glow 3s infinite alternate ease-in-out;"></div>  <div style="position: absolute; width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(224, 187, 228, 0.7); animation: ripple-wave 2s infinite ease-out; animation-delay: 0s;"></div>  <div style="position: absolute; width: 90px; height: 90px; border-radius: 50%; border: 2px solid rgba(147, 112, 219, 0.6); animation: ripple-wave 2s infinite ease-out; animation-delay: 0.5s;"></div>  <div style="position: absolute; width: 120px; height: 120px; border-radius: 50%; border: 2px solid rgba(106, 13, 173, 0.5); animation: ripple-wave 2s infinite ease-out; animation-delay: 1s;"></div></div>
