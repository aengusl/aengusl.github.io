<div style='width:100px; height:100px; display:flex; justify-content:center; align-items:center; background-color: #4B0082; border-radius: 50%; position:relative; overflow:hidden;'>  <div style='width:60px; height:60px; border-radius:50%; background-color:gold; box-shadow:0 0 25px 10px gold; animation: pulse 2s infinite alternate ease-in-out;'></div>  <div style='position:absolute; width:80px; height:80px; border-radius:50%; border:2px solid rgba(255,215,0,0.5); animation: expand 3s infinite ease-out;'></div>  <div style='position:absolute; width:100px; height:100px; border-radius:50%; border:2px solid rgba(255,215,0,0.2); animation: expand 3s infinite ease-out 1s;'></div>  <style>    @keyframes pulse {      0% { transform: scale(0.9); opacity: 0.8; }      100% { transform: scale(1.1); opacity: 1; }    }    @keyframes expand {      0% { transform: scale(0); opacity: 1; }      100% { transform: scale(1); opacity: 0; }    }  </style></div>
