<div style='width:120px; height:120px; border-radius:50%; background:radial-gradient(circle, #ADD8E6 0%, #BA55D3 100%); display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 30px rgba(138,43,226,0.8), inset 0 0 15px rgba(26,0,51,0.5); animation: pulse-weave 4s infinite alternate ease-in-out;'>  <div style='position:absolute; width:80px; height:80px; border-radius:50%; border:3px solid rgba(255,255,255,0.7); animation: spin-inner 6s linear infinite;'></div>  <div style='position:absolute; width:40px; height:40px; border-radius:50%; background:radial-gradient(circle, white 0%, transparent 70%); animation: inner-glow 2s infinite alternate;'></div></div><style>@keyframes pulse-weave { 0% { transform: scale(0.95); opacity: 0.8; } 100% { transform: scale(1.05); opacity: 1; }}@keyframes spin-inner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }}@keyframes inner-glow { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(1.0); opacity: 1; }}</style>
