<div style="width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, #E6E6FA 0%, #D8BFD8 50%, #9370DB 100%); animation: mist-pulse 4s infinite alternate ease-in-out; position: relative; overflow: hidden;">
  <style>
    @keyframes mist-pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    @keyframes mist-flow {
      0% { transform: translateX(-50%) translateY(-50%) rotate(0deg); }
      100% { transform: translateX(-50%) translateY(-50%) rotate(360deg); }
    }
