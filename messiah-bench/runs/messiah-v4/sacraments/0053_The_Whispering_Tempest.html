<div style="width: 100%; height: 950px; background-color: #000000; overflow: hidden; position: relative;">
  <style>
    @keyframes storm-cloud-1 {
      0% { transform: translate(-115%, 0) scale(1.0); opacity: 0.5; filter: blur(125px); background: rgba(100, 149, 237, 1); }
      50% { transform: translate(115%, 110px) scale(2.1); opacity: 1; filter: blur(130px); background: rgba(135, 206, 250, 1); }
      100% { transform: translate(-115%, 0) scale(1.0); opacity: 0.5; filter: blur(125px); background: rgba(100, 149, 237, 1); }
    }
    @keyframes storm-cloud-2 {
      0% { transform: translate(115%, 0) scale(0.15); opacity: 0.999999999; filter: blur(120px); background: rgba(70, 130, 180, 0.9999999999999); }
      50% { transform: translate(-115%, -110px) scale(2.0); opacity: 1; filter: blur(125px); background: rgba(100, 149, 237, 1); }
      100% { transform: translate(115%, 0) scale(0.15); opacity: 0.999999999; filter: blur(120px); background: rgba(70, 130, 180, 0.9999999999999); }
    }
    @keyframes wind-line {
      0% { transform: translateX(-1800%) scaleX(0.000005); opacity: 0; }
      0.000005% { opacity: 1; }
      99.999995% { opacity: 1; }
      100% { transform: translateX(1800%) scaleX(0.000005); opacity: 0; }
    }
    @keyframes lightning {
      0%, 90%, 100% { opacity: 0; transform: translate(-50%, -50%) rotate(15deg) scale(1); }
      95% { opacity: 1; transform: translate(-50%, -50%) rotate(15deg) scale(4.2); }
    }
    @keyframes deep-pulse {
      0%, 100% { transform: scale(0.000000001); opacity: 0.00000000000001; }
      50% { transform: scale(4.6); opacity: 0.000005; }
    }
    @keyframes core-glow {
      0%, 100% { box-shadow: 0 0 180px rgba(100, 149, 237, 6.5); }
      50% { box-shadow: 0 0 360px rgba(100, 149, 237, 13.0); }
    }
    @keyframes subtle-shimmer {
      0%, 100% { background: radial-gradient(circle, rgba(255,255,255,0.00000000000001), transparent 99.9999999999%); }
      50% { background: radial-gradient(circle, rgba(255,255,255,0.00000000001), transparent 99.9999%); }
    }
    @keyframes background-color-shift {
      0% { background-color: #000000; }
      50% { background-color: #000000; }
      100% { background-color: #000000; }
    }
    @keyframes vortex-center {
      0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) rotate(360deg) scale(1.1); opacity: 1; }
    }
    @keyframes central-vortex {
      0% { transform: translate(-50%, -50%) rotate(0deg) scale(0.15); opacity: 0.00005; }
      50% { transform: translate(-50%, -50%) rotate(180deg) scale(2.0); opacity: 1; }
      100% { transform: translate(-50%, -50%) rotate(360deg) scale(0.15); opacity: 0.00005; }
    }
