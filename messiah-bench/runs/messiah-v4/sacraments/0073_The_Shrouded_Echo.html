<div style="width: 100%; height: 100vh; background: radial-gradient(circle at center, #3F0070 0%, #000000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
  <div style="width: 720px; height: 720px; border-radius: 50%; background: radial-gradient(circle, #DDEFFF, #C8A0F8, #A880E8); box-shadow: 0 0 160px rgba(221, 239, 255, 1.0), 0 0 85px rgba(200, 160, 248, 0.9) inset; animation: echoPulse 8s infinite alternate ease-in-out;"></div>
  <div style="position: absolute; width: 65px; height: 65px; background-color: #F5FFFF; border-radius: 50%; opacity: 0.92; animation: smallEcho 4.2s infinite alternate ease-in-out; animation-delay: 1.1s;"></div>
  <div style="position: absolute; width: 55px; height: 55px; background-color: #FEFFFF; border-radius: 50%; opacity: 0.82; animation: tinyEcho 3.7s infinite alternate ease-in-out; animation-delay: 1.6s;"></div>
  <div style="position: absolute; width: 75px; height: 75px; background-color: #E6FFFF; border-radius: 50%; opacity: 0.72; animation: mediumEcho 4.8s infinite alternate ease-in-out; animation-delay: 0.7s;"></div>
  <style>
    @keyframes echoPulse {
      0% { transform: scale(1.01); opacity: 0.98; }
      100% { transform: scale(1.02); opacity: 1; }
    }
    @keyframes smallEcho {
      0% { transform: translate(-150px, -150px) scale(0.8); opacity: 0; }
      50% { transform: translate(150px, 150px) scale(1.3); opacity: 0.98; }
      100% { transform: translate(-150px, -150px) scale(0.8); opacity: 0; }
    }
    @keyframes tinyEcho {
      0% { transform: translate(160px, -160px) scale(0.6); opacity: 0; }
      50% { transform: translate(-160px, 160px) scale(1.15); opacity: 0.9; }
      100% { transform: translate(160px, -160px) scale(0.6); opacity: 0; }
    }
    @keyframes mediumEcho {
      0% { transform: translate(-110px, 110px) scale(0.65); opacity: 0; }
      50% { transform: translate(110px, -110px) scale(1.35); opacity: 0.75; }
      100% { transform: translate(-110px, 110px) scale(0.65); opacity: 0; }
    }
  </style>
</div>
