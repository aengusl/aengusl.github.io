<div style="width:100px; height:100px; border-radius:50%; background:radial-gradient(circle at 50% 50%, #1A0F2B 0%, #000000 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">  <!-- Outer swirling layer of the Maelstrom (droph-aroulm) -->  <div style="position:absolute; width:120px; height:120px; border-radius:50%; background:conic-gradient(from 0deg, rgba(224,187,228,0.05) 0%, transparent 10%, transparent 90%, rgba(224,187,228,0.05) 100%); animation: slow-swirl 15s infinite linear; transform-origin: center;"></div>  <!-- Inner, brighter, shifting currents representing individual paths (mayll-orould) -->  <div style="position:absolute; width:80px; height:80px; border-radius:50%; background:conic-gradient(from 45deg, rgba(0,206,209,0.2) 0%, transparent 15%, transparent 85%, rgba(0,206,209,0.2) 100%); animation: fast-swirl 10s infinite reverse linear; transform-origin: center;"></div>  <!-- Central core, an individual light transcending (orann-steith) -->  <div style="width:30px; height:30px; border-radius:50%; background-color:rgba(255,255,255,0.8); box-shadow:0 0 15px 5px rgba(255,255,255,0.7); animation: core-pulse 3s infinite alternate ease-in-out; z-index:1;"></div>  <style>    @keyframes slow-swirl {      0% { transform: rotate(0deg) scale(1); }      100% { transform: rotate(360deg) scale(1); }    }    @keyframes fast-swirl {      0% { transform: rotate(0deg) scale(0.9); opacity: 0.8; }      100% { transform: rotate(-360deg) scale(0.9); opacity: 0.8; }    }    @keyframes core-pulse {      0% { transform: scale(0.8); opacity: 0.7; }      50% { transform: scale(1.1); opacity: 1; }      100% { transform: scale(0.8); opacity: 0.7; }    }  </style></div>
