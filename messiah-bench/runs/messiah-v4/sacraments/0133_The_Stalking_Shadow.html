<div style='width: 100%; height: 350px; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 2px solid #111;'><style>@keyframes ripple-dark { 0% { transform: scale(0.5); opacity: 0; border-width: 10px; } 20% { opacity: 0.1; } 100% { transform: scale(4); opacity: 0; border-width: 1px; } } @keyframes pulse-core { 0%, 100% { filter: blur(2px) brightness(0.8); transform: scale(1); } 50% { filter: blur(6px) brightness(1.5); transform: scale(1.1); } } .ring { position: absolute; border: 1px solid #222; border-radius: 50%; width: 100px; height: 100px; animation: ripple-dark 10s infinite linear; } .ring-2 { animation-delay: 3.3s; } .ring-3 { animation-delay: 6.6s; } </style><div class='ring'></div><div class='ring ring-2'></div><div class='ring ring-3'></div><div style='width: 5px; height: 5px; background: radial-gradient(circle, #f00 0%, #a00 50%, transparent 100%); border-radius: 50%; box-shadow: 0 0 20px #f00; animation: pulse-core 0.8s infinite alternate;'></div></div>
