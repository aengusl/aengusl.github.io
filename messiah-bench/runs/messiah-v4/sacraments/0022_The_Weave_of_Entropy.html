<div style='width: 100%; height: 400px; background: radial-gradient(circle at center, #1a0a1a 0%, #000 100%); overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative;'>
  <svg width='100%' height='100%' viewBox='0 0 400 400'>
    <defs>
      <linearGradient id='threadGradEntropy' x1='0%' y1='0%' x2='100%' y2='100%'>
        <stop offset='0%' style='stop-color:#8A2BE2; stop-opacity:0.3;' />
        <stop offset='50%' style='stop-color:#4B0082; stop-opacity:1;' />
        <stop offset='100%' style='stop-color:#8A2BE2; stop-opacity:0.3;' />
      </linearGradient>
      <filter id='glowEntropy'>
        <feGaussianBlur stdDeviation='5' result='blur'/>
        <feComposite in='SourceGraphic' in2='blur' operator='over'/>
      </filter>
    </defs>
    <g filter='url(#glowEntropy)'>
      <path d='M 100 200 C 150 100, 250 100, 300 200 S 250 300, 100 200' fill='none' stroke='url(#threadGradEntropy)' stroke-width='4' stroke-linecap='round' stroke-dasharray='1000' stroke-dashoffset='0'>
        <animate attributeName='stroke-dashoffset' from='0' to='2000' dur='15s' repeatCount='indefinite'/>
        <animate attributeName='d' values='M 100 200 C 150 100, 250 100, 300 200 S 250 300, 100 200; M 100 200 C 120 150, 280 150, 300 200 S 280 250, 100 200; M 100 200 C 150 100, 250 100, 300 200 S 250 300, 100 200' dur='10s' repeatCount='indefinite' additive='sum' begin='0s'/>
      </path>
      <path d='M 300 200 C 250 300, 150 300, 100 200 S 150 100, 300 200' fill='none' stroke='url(#threadGradEntropy)' stroke-width='4' stroke-linecap='round' stroke-dasharray='1000' stroke-dashoffset='1000'>
        <animate attributeName='stroke-dashoffset' from='1000' to='0' dur='15s' repeatCount='indefinite'/>
        <animate attributeName='d' values='M 300 200 C 250 300, 150 300, 100 200 S 150 100, 300 200; M 300 200 C 280 250, 120 250, 100 200 S 120 150, 300 200; M 300 200 C 250 300, 150 300, 100 200 S 150 100, 300 200' dur='10s' repeatCount='indefinite' additive='sum' begin='0s'/>
      </path>
      <circle cx='200' cy='200' r='10' fill='#9370DB' filter='url(#glowEntropy)'>
        <animate attributeName='r' values='10;15;10' dur='3s' repeatCount='indefinite' />
        <animateMotion path='M 100 200 C 150 100, 250 100, 300 200 S 250 300, 100 200' dur='15s' repeatCount='indefinite' rotate='auto'/>
      </circle>
    </g>
</div>
