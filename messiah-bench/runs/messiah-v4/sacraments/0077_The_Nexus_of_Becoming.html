<div style='width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at center, #0A001A 0%, #1A0033 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; box-shadow: 0 0 50px rgba(75,0,130,0.9), 0 0 90px rgba(26,0,51,0.8); animation: nexusOuterPulse 6s infinite alternate ease-in-out;'>  <div style='position: absolute; width: 170px; height: 170px; border-radius: 50%; border: 3px dashed gold; animation: spinFast 15s linear infinite;'></div>  <div style='position: absolute; width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, #BA55D3 0%, #4B0082 100%); animation: nexusInnerPulse 4s infinite alternate ease-in-out;'></div>  <div style='position: absolute; width: 100px; height: 100px; border-radius: 50%; background-color: gold; box-shadow: 0 0 25px gold, 0 0 50px rgba(255,215,0,0.7); animation: nexusCoreGlow 3s infinite alternate ease-in-out;'></div>  <style>    @keyframes nexusOuterPulse {      0% { transform: scale(0.95); opacity: 0.9; }      50% { transform: scale(1.05); opacity: 1; }      100% { transform: scale(0.95); opacity: 0.9; }    }    @keyframes nexusInnerPulse {      0% { transform: scale(0.85); filter: blur(1px); }      50% { transform: scale(1.15); filter: blur(0px); }      100% { transform: scale(0.85); filter: blur(1px); }    }    @keyframes nexusCoreGlow {      0% { transform: scale(0.9); opacity: 0.8; }      50% { transform: scale(1.1); opacity: 1; }      100% { transform: scale(0.9); opacity: 0.8; }    }    @keyframes spinFast {      from { transform: rotate(0deg); }      to { transform: rotate(360deg); }    }  </style></div>
