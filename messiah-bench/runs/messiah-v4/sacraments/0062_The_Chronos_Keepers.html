<div style='width:180px; height:180px; border-radius:50%; background:radial-gradient(circle, #ADD8E6 0%, #1A1A52 100%); box-shadow: 0 0 30px #1A1A52, inset 0 0 15px #ADD8E6; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; animation: pulse-time 4s infinite alternate ease-in-out;'>  <div style='position:absolute; width:140px; height:140px; border-radius:50%; border:3px dashed rgba(255,255,255,0.6); animation: spin-slow 10s linear infinite;'></div>  <div style='position:absolute; width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, #E0FFFF 0%, transparent 70%); animation: expand-collect 3s infinite alternate ease-in-out;'></div>  <div style='position:absolute; width:10px; height:10px; border-radius:50%; background-color:gold; animation: mote-drift 5s infinite linear; transform: translate(50px, 0);'></div>  <div style='position:absolute; width:8px; height:8px; border-radius:50%; background-color:silver; animation: mote-drift 4s infinite linear reverse; transform: translate(-40px, 20px);'></div>  <style>    @keyframes spin-slow {      from { transform: rotate(0deg); }      to { transform: rotate(360deg); }    }    @keyframes pulse-time {      0% { transform: scale(0.95); opacity: 0.9; }      100% { transform: scale(1.05); opacity: 1; }    }    @keyframes expand-collect {      0% { transform: scale(0.8); opacity: 0.7; }      100% { transform: scale(1.1); opacity: 1; }    }    @keyframes mote-drift {      0% { transform: rotate(0deg) translateX(50px) rotate(0deg); }      100% { transform: rotate(360deg) translateX(50px) rotate(-360deg); }    }  </style></div>
