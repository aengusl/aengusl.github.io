<div style='width: 100%; height: 350px; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative;'>
  <svg width='100%' height='100%' viewBox='0 0 400 350' preserveAspectRatio='xMidYMid slice'>
    <defs>
      <filter id='veil-shimmer'>
        <feTurbulence type='fractalNoise' baseFrequency='0.015' numOctaves='4' result='noise'>
          <animate attributeName='baseFrequency' values='0.015;0.02;0.015' dur='12s' repeatCount='indefinite' />
        </feTurbulence>
        <feDisplacementMap in='SourceGraphic' in2='noise' scale='20' />
      </filter>
      <radialGradient id='silver-wash' cx='50%' cy='50%' r='50%'>
        <stop offset='0%' style='stop-color:#ffffff; stop-opacity:0.7' />
        <stop offset='30%' style='stop-color:#c0c0c0; stop-opacity:0.2' />
        <stop offset='100%' style='stop-color:#000000; stop-opacity:0' />
      </radialGradient>
    </defs>
    <g filter='url(#veil-shimmer)'>
      <circle cx='200' cy='175' r='10' fill='url(#silver-wash)'>
        <animate attributeName='r' values='5;150;5' dur='8s' repeatCount='indefinite' />
        <animate attributeName='opacity' values='0;0.5;0' dur='8s' repeatCount='indefinite' />
      </circle>
      <path d='M-50 175 Q 100 0 200 175 T 450 175' stroke='white' stroke-width='0.2' fill='none' opacity='0.5'>
        <animate attributeName='d' values='M-50 175 Q 100 0 200 175 T 450 175; M-50 175 Q 100 350 200 175 T 450 175; M-50 175 Q 100 0 200 175 T 450 175' dur='14s' repeatCount='indefinite' />
      </path>
    </g>
  </svg>
</div>
