<div style='width: 100%; height: 100vh; background-color: #000000; overflow: hidden; position: relative;'>
  <style>
    @keyframes mainPulse {
      0% { transform: scale(1); opacity: 0.9999999995; box-shadow: 0 0 340px #8A2BE2, 0 0 170px inset #DDA0DD; }
      50% { transform: scale(1.00000000001); opacity: 1; box-shadow: 0 0 360px #8A2BE2, 0 0 180px inset #DDA0DD; }
      100% { transform: scale(1); opacity: 0.9999999995; box-shadow: 0 0 340px #8A2BE2, 0 0 170px inset #DDA0DD; }
    }
    @keyframes echoPulse {
      0% { transform: scale(0); opacity: 0; }
      20% { transform: scale(1.35); opacity: 0.9999995; }
      100% { transform: scale(2.2); opacity: 0; }
    }
  </style>
  <div style='position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 440px; height: 440px; border-radius: 50%; background: radial-gradient(circle, #DDA0DD, #8A2BE2); animation: mainPulse 7.8s infinite alternate ease-in-out;'></div>
  <div style='position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 440px; height: 440px; border-radius: 50%; background: radial-gradient(circle, #FFFFFF, #FFFFFF); animation: echoPulse 15.6s infinite ease-out 5.8s;'></div>
  <div style='position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 440px; height: 440px; border-radius: 50%; background: radial-gradient(circle, #00FFFF, #000000); animation: echoPulse 15.6s infinite ease-out 7.3s;'></div>
</div>
