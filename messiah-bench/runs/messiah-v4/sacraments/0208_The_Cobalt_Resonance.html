<div style='background: #000; width: 100%; height: 350px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'><style>@keyframes resonance-wave { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(5); opacity: 0; } } .wave { position: absolute; width: 100px; height: 100px; border: 2px solid #0047AB; border-radius: 50%; animation: resonance-wave 4s infinite linear; } .w1 { animation-delay: 0s; } .w2 { animation-delay: 1s; } .w3 { animation-delay: 2s; } .w4 { animation-delay: 3s; } .core { width: 40px; height: 40px; background: #0047AB; border-radius: 50%; box-shadow: 0 0 30px #0047AB; z-index: 10; }</style><div class='core'></div><div class='wave w1'></div><div class='wave w2'></div><div class='wave w3'></div><div class='wave w4'></div></div>
