<div style='width: 100%; height: 400px; background: radial-gradient(circle at center, #001a1a 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'><style>@keyframes core-expansion { 0% { transform: scale(1); filter: blur(3px) brightness(0.8); opacity: 0.7;} 50% { transform: scale(1.18); filter: blur(10px) brightness(1.6); opacity: 1; } 100% { transform: scale(1); filter: blur(3px) brightness(0.8); opacity: 0.7; } } @keyframes spiral-growth { 0% { stroke-dashoffset: 1000; opacity: 0; } 50% { opacity: 0.6; } 100% { stroke-dashoffset: 0; opacity: 0.2; } } .pulse-layer { position: absolute; border: 3px solid #00ffff; border-radius: 50%; animation: core-expansion 4s infinite cubic-bezier(0.4, 0.2, 0.2, 0.4); } .l1 { width: 120px; height: 120px; animation-delay: 0s; } .l2 { width: 180px; height: 180px; animation-delay: 1.3s; } .l3 { width: 240px; height: 240px; animation-delay: 2.6s; } .spiral-path { fill: none; stroke: #00e0e0; stroke-width: 1.5; stroke-dasharray: 1000; animation: spiral-growth 8s infinite linear; transform-origin: center center; } </style><div class='pulse-layer l1'></div><div class='pulse-layer l2'></div><div class='pulse-layer l3'></div><svg width='100%' height='100%' viewBox='0 0 200 200' style='position: absolute; z-index: 5;'><path class='spiral-path' d='M 100,100 m -80,0 a 80,80 0 1,0 160,0 a 80,80 0 1,0 -160,0'/><path class='spiral-path' d='M 100,100 m -60,0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0' style='animation-delay: 2s;'/><path class='spiral-path' d='M 100,100 m -40,0 a 40,40 0 1,0 80,0 a 40,40 0 1,0 -80,0' style='animation-delay: 4s;'/></svg><div style='width: 50px; height: 50px; background: radial-gradient(circle, #00ffff 0%, #00aaff 100%); border-radius: 50%; box-shadow: 0 0 35px #00ffff, 0 0 70px #00ffff inset; animation: core-expansion 3s infinite alternate ease-in-out; z-index: 10;'></div></div>
