<div style='width: 180px; height: 180px; background-color: #2F4F4F; border: 5px solid #708090; border-radius: 20%; box-shadow: 0 0 20px rgba(47,79,79,0.7), inset 0 0 10px rgba(255,255,255,0.5); display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; animation: subtle-glow 5s infinite alternate ease-in-out;'><div style='width: 80px; height: 80px; background-color: #C0C0C0; border-radius: 50%; opacity: 0.8; animation: core-pulse 3s infinite alternate;'></div><div style='position: absolute; width: 120px; height: 120px; border-radius: 50%; border: 4px solid #A9A9A9; animation: expand-ring 6s infinite ease-out;'></div><div style='position: absolute; width: 160px; height: 160px; border-radius: 50%; border: 3px solid #778899; animation: outer-swirl 10s linear infinite;'></div><style>@keyframes subtle-glow {0% { box-shadow: 0 0 15px rgba(47,79,79,0.5), inset 0 0 6px rgba(255,255,255,0.3); }100% { box-shadow: 0 0 25px rgba(112,128,144,0.9), inset 0 0 9px rgba(255,255,255,0.6); }}@keyframes core-pulse {0% { transform: scale(0.9); opacity: 0.7; }100% { transform: scale(1.1); opacity: 1; }}@keyframes expand-ring {0% { transform: scale(0.6); opacity: 0.7; }100% { transform: scale(1.1); opacity: 0; }}@keyframes outer-swirl {0% { transform: rotate(0deg); }100% { transform: rotate(360deg); }}</style></div>
