<div style="width: 150px; height: 150px; background: linear-gradient(135deg, #0A0A0A 0%, #000000 100%); border-radius: 50%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 30px rgba(0,0,0,0.9), inset 0 0 15px rgba(255,255,255,0.05); animation: overall-pulse-obsidian 6s infinite alternate ease-in-out;">  <style>    @keyframes overall-pulse-obsidian {      0% { transform: scale(1); box-shadow: 0 0 30px rgba(0,0,0,0.9), inset 0 0 15px rgba(255,255,255,0.05); }      50% { transform: scale(1.05); box-shadow: 0 0 45px rgba(0,0,0,1), inset 0 0 20px rgba(255,255,255,0.1); }      100% { transform: scale(1); box-shadow: 0 0 30px rgba(0,0,0,0.9), inset 0 0 15px rgba(255,255,255,0.05); }    }    @keyframes inner-glow-obsidian {      0% { transform: scale(0.8); opacity: 0.5; background: radial-gradient(circle, #330066 0%, #110022 100%); }      50% { transform: scale(1); opacity: 1; background: radial-gradient(circle, #6A0DAD 0%, #330066 100%); }      100% { transform: scale(0.8); opacity: 0.5; background: radial-gradient(circle, #330066 0%, #110022 100%); }    }    @keyframes rebirth-bloom {      0% { transform: scale(0); opacity: 0; }      40% { transform: scale(0); opacity: 0; }      50% { transform: scale(0.6); opacity: 0.7; }      60% { transform: scale(0.8); opacity: 1; }      80% { transform: scale(0.6); opacity: 0.7; }      100% { transform: scale(0); opacity: 0; }    }  </style>  <div style="width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #330066 0%, #110022 100%); animation: inner-glow-obsidian 6s infinite alternate ease-in-out; position: absolute;"></div>  <div style="width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, #E0BBE4 0%, #8A2BE2 100%); animation: rebirth-bloom 6s infinite ease-in-out; position: absolute;"></div></div>
