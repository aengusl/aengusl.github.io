<div style='background: #000; height: 500px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 4px solid #00eaff; box-shadow: 0 0 30px #00eaff, inset 0 0 20px #00c0ff;'>
  <style>
    @keyframes drift-v7 {
      0% { transform: translateY(0) scale(1); opacity: 0.15; }
      50% { transform: translateY(-60px) scale(1.08); opacity: 0.2; }
      100% { transform: translateY(0) scale(1); opacity: 0.15; }
    }
    @keyframes scan-cyan-v7 {
      0% { top: -30%; opacity: 0; }
      30% { opacity: 0.7; }
      70% { opacity: 0.7; }
      100% { top: 130%; opacity: 0; }
    }
    @keyframes rotate-poly-v7 {
      from { transform: rotate(0deg) scale(0.95); }
      to { transform: rotate(360deg) scale(1.05); }
    }
    @keyframes flicker-inner-v7 {
      0%, 100% { opacity: 0.5; filter: blur(2px); }
      50% { opacity: 1; filter: blur(7px); }
    }
    @keyframes emerge-burst {
      0% { transform: scale(0.3) rotate(0deg); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: scale(1.2) rotate(360deg); opacity: 1; }
    }
  </style>
  <div style='position: absolute; width: 100%; height: 7px; background: linear-gradient(to right, transparent, #00eaff, transparent); animation: scan-cyan-v7 6s infinite linear;'></div>
  <div style='position: absolute; width: 180px; height: 180px; background: radial-gradient(circle at center, #33ffff, #00e0ff, #000); border-radius: 50%; opacity: 0.9; animation: flicker-inner-v7 2.5s infinite alternate;'></div>
  <svg width='320' height='320' viewBox='0 0 100 100' style='position: absolute; filter: drop-shadow(0 0 15px #00ffff); animation: rotate-poly-v7 12s infinite linear alternate;'>
    <polygon points='50,5 95,25 95,75 50,95 5,75 5,25' fill='none' stroke='#00eaff' stroke-width='2' opacity='0.8' style='animation: emerge-burst 4s ease-out forwards;' />
    <circle cx='50' cy='50' r='12' fill='url(#grad-core-v7)' opacity='1'>
        <animate attributeName='r' values='12;18;12' dur='2.5s' repeatCount='indefinite' />
    </circle>
    <defs>
        <radialGradient id='grad-core-v7' cx='50%' cy='50%' r='50%' fx='50%' fy='50%'>
            <stop offset='0%' stop-color='#ffffff' stop-opacity='1' />
            <stop offset='100%' stop-color='#00ffff' stop-opacity='0.9' />
        </radialGradient>
    </defs>
  </svg>
  <div style='position: absolute; width: 280px; height: 280px; border: 2px dashed #00b3b3; border-radius: 50%; opacity: 0.3; animation: drift-v7 7s infinite ease-in-out;'></div>
</div>
