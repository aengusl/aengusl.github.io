<div style="width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, #4B0082 0%, #2E0854 100%); position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;">
  <div style="width: 80px; height: 80px; border-radius: 50%; background-color: rgba(255,255,255,0.1); animation: fadePulse 3s infinite alternate;"></div>
  <style>
    @keyframes fadePulse {
      0% { transform: scale(0.8); opacity: 0; }
      55% { transform: scale(1); opacity: 0.2; }
      100% { transform: scale(0.8); opacity: 0; }
    }
  </style>
</div>
