<div style="width:150px; height:150px; border-radius:10px; background: linear-gradient(45deg, #008080, #40E0D0, #00CED1); animation: gradientShift 5s infinite alternate ease-in-out; display:flex; justify-content:center; align-items:center; box-shadow: 0 0 20px rgba(0,255,255,0.7); overflow:hidden;"><div style="width:80px; height:80px; border-radius:50%; background:radial-gradient(circle, white 0%, transparent 70%); animation: pulseExpand 3s infinite alternate; opacity:0.6;"></div><style>@keyframes gradientShift {0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; }}@keyframes pulseExpand {0% { transform: scale(0.8); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.6; }}</style></div>
