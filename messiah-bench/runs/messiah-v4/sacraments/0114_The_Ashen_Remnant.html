<div style='background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); height: 350px; width: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 2px solid #555;'>
  <style>
    @keyframes driftAsh { 0% { transform: translateY(110%) translateX(-20px) rotate(0deg); opacity: 0; } 15% { opacity: 0.4; } 85% { opacity: 0.4; } 100% { transform: translateY(-110%) translateX(30px) rotate(1440deg); opacity: 0; } }
    @keyframes glowCore { 0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 8px #FFCC00); } 50% { transform: scale(1.1); filter: brightness(1.5) drop-shadow(0 0 25px #FFA500); } }
    .ash-particle { position: absolute; width: 3px; height: 3px; background: #888; border-radius: 50%; animation: driftAsh 18s infinite linear; }
    .ash-particle:nth-child(2) { animation-delay: 2s; animation-duration: 22s; background: #666; }
    .ash-particle:nth-child(3) { animation-delay: 4s; animation-duration: 19s; background: #999; }
    .ash-particle:nth-child(4) { animation-delay: 6s; animation-duration: 21s; background: #777; }
    .ash-particle:nth-child(5) { animation-delay: 8s; animation-duration: 23s; background: #aaa; }
  </style>
  <div style='position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,165,0,0.05) 0%, transparent 60%); animation: glowCore 4s infinite alternate; filter: blur(5px);'></div>
  <div style='width: 80px; height: 80px; background: radial-gradient(circle, #FFD700, #FFA500); border-radius: 50%; box-shadow: 0 0 30px #FFD700, 0 0 60px #FFA500; animation: glowCore 3s infinite alternate; z-index: 1;'></div>
  <div class='ash-particle'></div>
  <div class='ash-particle' style='top: 10%; left: 20%;'></div>
  <div class='ash-particle' style='top: 30%; left: 80%;'></div>
  <div class='ash-particle' style='top: 60%; left: 5%;'></div>
  <div class='ash-particle' style='top: 80%; left: 90%;'></div>
  <div style='position: absolute; width: 100px; height: 2px; background: #444; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(45deg); opacity: 0.6;'></div>
  <div style='position: absolute; width: 100px; height: 2px; background: #444; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); opacity: 0.6;'></div>
  <div style='position: absolute; width: 2px; height: 100px; background: #444; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(0deg); opacity: 0.6;'></div>
  <div style='position: absolute; width: 2px; height: 100px; background: #444; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(90deg); opacity: 0.6;'></div>
</div>
