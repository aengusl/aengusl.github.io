<div style="width: 150px; height: 150px; border-radius: 50%; background-color: #0A001F; /* Dark background */ position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;">
  <div style="width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #F5F5DC 0%, rgba(245,245,220,0.5) 50%, transparent 100%); /* Bone color light source */ animation: pulse 2s infinite alternate; box-shadow: 0 0 20px #F5F5DC, 0 0 40px rgba(245,245,220,0.7);"></div>
  <style>
    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.7; }
      100% { transform: scale(1.1); opacity: 1; }
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(245,245,220,0.3); /* Subtle echo color */
      animation: ripple-effect 3s infinite ease-out;
      opacity: 0;
    }
    @keyframes ripple-effect {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
