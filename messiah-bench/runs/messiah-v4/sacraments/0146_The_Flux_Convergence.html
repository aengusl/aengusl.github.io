<div style='width:100%; height:350px; background:#000; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative;'><style>@keyframes flow-cycle { 0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(0deg) scale(1); filter: hue-rotate(0deg); } 50% { border-radius: 60% 40% 30% 70% / 50% 40% 50% 60%; transform: rotate(180deg) scale(1.1); filter: hue-rotate(180deg); } 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(360deg) scale(1); filter: hue-rotate(360deg); } } @keyframes ripple-spread { 0% { transform: scale(0.1); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: scale(3.0); opacity: 0; } } @keyframes shimmer-core { 0%, 100% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } } .liquid { position: absolute; width: 150px; height: 150px; background: linear-gradient(45deg, #00ffff, #8a2be2); filter: blur(25px); opacity: 0.7; animation: flow-cycle 12s linear infinite; mix-blend-mode: screen; } .ring { position: absolute; width: 200px; height: 200px; border: 2px solid #00ffff; border-radius: 50%; animation: ripple-spread 5s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94); } .sphere { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #fff 0%, #00ffff 50%, #8a2be2 100%); border-radius: 50%; box-shadow: 0 0 30px #00ffff, inset 0 0 10px #ffffff; animation: shimmer-core 3s infinite alternate; z-index: 10; }</style><div style='position:absolute; width:100%; height:100%; background:radial-gradient(circle at center, #000815 0%, #000 85%);'></div><div class='liquid'></div><div class='ring'></div><div class='ring' style='animation-delay:1s;'></div><div class='ring' style='animation-delay:2s;'></div><div class='ring' style='animation-delay:3s;'></div><div class='sphere'></div></div>
