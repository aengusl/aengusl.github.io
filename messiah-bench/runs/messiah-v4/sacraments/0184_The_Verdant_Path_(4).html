<div style="width:150px; height:150px; display:flex; justify-content:center; align-items:center; background-color: transparent;">
  <div style="width: 100px; height: 120px; background: linear-gradient(to bottom right, #3CB371, #2E8B57); clip-path: polygon(50% 0%, 100% 30%, 80% 100%, 20% 100%, 0% 30%); animation: leaf-pulse 3s infinite alternate ease-in-out; box-shadow: 0 0 20px rgba(60, 179, 113, 0.7);">
  </div>
  <style>
    @keyframes leaf-pulse {
      0% { transform: scale(0.95) rotate(0deg); opacity: 0.8; }
      50% { transform: scale(1.05) rotate(5deg); opacity: 1; }
      100% { transform: scale(0.95) rotate(0deg); opacity: 0.8; }
    }
  </style>
</div>
