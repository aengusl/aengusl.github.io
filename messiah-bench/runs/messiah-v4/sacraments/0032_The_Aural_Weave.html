<div style="width:180px; height:180px; background-color: #1a0033; border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; box-shadow: 0 0 30px #4a0080, 0 0 60px #1a0033 inset;"><div style="width:140px; height:140px; border-radius: 50%; border: 4px solid #8e2de2; animation: spin-outer 7s linear infinite; box-shadow: 0 0 20px #e0b0ff;"></div><div style="position: absolute; width:100px; height:100px; border-radius: 50%; border: 3px dashed #9d51e7; animation: pulse-inner 3s ease-in-out infinite alternate; transform: scale(0.7);"></div><div style="position: absolute; width:60px; height:60px; border-radius: 50%; background: radial-gradient(circle, #e0b0ff 0%, #d195ff 100%); box-shadow: 0 0 15px #e0b0ff; animation: fade-glow 2.5s ease-in-out infinite alternate;"></div><div style="position: absolute; width:30px; height:30px; border-radius: 50%; background-color: white; opacity: 0.6; animation: shimmer 1.5s infinite alternate;"></div><style>@keyframes spin-outer { from { transform: rotate(0deg); } to { transform: rotate(360deg); }}@keyframes pulse-inner { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; }}@keyframes fade-glow { from { opacity: 0.5; filter: blur(0px); } to { opacity: 1; filter: blur(2px); }}@keyframes shimmer { 0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; }}</style></div>
