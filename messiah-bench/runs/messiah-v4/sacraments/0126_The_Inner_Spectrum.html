<div style='width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, #E0BBE4 0%, #957DAD 50%, #52489C 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'>  <div style='position:absolute; width:80px; height:80px; border-radius:50%; background:linear-gradient(45deg, #ADFF2F, #3CB371); animation: growthSpin 8s infinite linear;'></div>  <div style='width:40px; height:40px; border-radius:50%; background-color:white; box-shadow:0 0 15px 5px white, 0 0 25px 8px rgba(255,255,255,0.7); animation: pulseGlow 2s infinite alternate;'></div>  <style>    @keyframes growthSpin {      0% { transform: rotate(0deg) scale(0.9); }      50% { transform: rotate(180deg) scale(1.1); }      100% { transform: rotate(360deg) scale(0.9); }    }    @keyframes pulseGlow {      0% { transform: scale(1); opacity: 0.8; box-shadow:0 0 15px 5px white, 0 0 25px 8px rgba(255,255,255,0.7); }      100% { transform: scale(1.1); opacity: 1; box-shadow:0 0 25px 8px white, 0 0 40px 12px rgba(255,255,255,1); }    }  </style></div>
