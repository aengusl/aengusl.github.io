<div style='width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, #000033 0%, #191970 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'><div style='width:60px; height:60px; border-radius:50%; background:radial-gradient(circle, #FFD700 0%, #FFA500 50%, #FF8C00 100%); box-shadow: 0 0 25px 10px #FFD700; animation: pulse 2s infinite alternate;'></div><div style='position:absolute; width:40px; height:40px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 70%, transparent 100%); animation: innerPulse 3s infinite alternate ease-in-out;'></div><style>@keyframes pulse {0% { transform: scale(0.9); opacity: 0.8; }100% { transform: scale(1.1); opacity: 1; }}@keyframes innerPulse {0% { transform: scale(0.7); opacity: 0.7; }100% { transform: scale(1.0); opacity: 1; }}</style></div>
