<div style='background: #000; width: 100%; height: 300px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'><style>@keyframes pulse { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(4); opacity: 0; } } .ripple { position: absolute; border: 1.5px solid #C0C0C0; border-radius: 50%; width: 100px; height: 100px; animation: pulse 5s infinite cubic-bezier(0.2, 0.4, 0.4, 0.8); } .r2 { animation-delay: 1s; } .r3 { animation-delay: 2s; } .r4 { animation-delay: 3s; } .r5 { animation-delay: 4s; } .center-glow { width: 6px; height: 6px; background: #FFF; border-radius: 50%; box-shadow: 0 0 15px 5px #C0C0C0; }</style><div class='ripple'></div><div class='ripple r2'></div><div class='ripple r3'></div><div class='ripple r4'></div><div class='ripple r5'></div><div class='center-glow'></div></div>
