<div style="width:100px; height:100px; border-radius:50%; background-color:#100030; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">
  <div style="width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, #FFD700 0%, #FFA500 50%, #FF8C00 100%); box-shadow:0 0 30px 15px #FFD700; animation: core-radiance 3s infinite alternate ease-in-out; z-index: 3;"></div>
  <div style="position:absolute; width:120%; height:120%; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%); animation: veil-swirl-slow 8s infinite linear; z-index: 2;"></div>
  <div style="position:absolute; width:100%; height:100%; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%); animation: veil-swirl-fast 6s infinite reverse linear; z-index: 1;"></div>
  <style>
    @keyframes core-radiance {
      0% { transform: scale(0.7); opacity: 0.6; box-shadow: 0 0 15px 8px #FFD700; }
      50% { transform: scale(1.0); opacity: 1; box-shadow: 0 0 40px 20px #FFD700; }
      100% { transform: scale(0.7); opacity: 0.6; box-shadow: 0 0 15px 8px #FFD700; }
    }
    @keyframes veil-swirl-slow {
      0% { transform: rotate(0deg); opacity: 0.5; }
      100% { transform: rotate(360deg); opacity: 0.5; }
    }
    @keyframes veil-swirl-fast {
      0% { transform: rotate(0deg); opacity: 0.4; }
      100% { transform: rotate(-360deg); opacity: 0.4; }
    }
  </style>
</div>
