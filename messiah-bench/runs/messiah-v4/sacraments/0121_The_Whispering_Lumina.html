<div style="width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, rgba(0,255,255,0.8) 0%, rgba(0,200,200,0.5) 50%, rgba(0,150,150,0) 100%); animation: pulse 3s infinite alternate; box-shadow: 0 0 20px rgba(0,255,255,0.7), inset 0 0 10px rgba(255,255,255,0.5); position: relative; overflow: hidden;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes ripple {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .ripple-effect {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: ripple 4s infinite ease-out;
    }
  </style>
  <div class="ripple-effect" style="width: 50px; height: 50px; top: 50px; left: 50px; animation-delay: 0s;"></div>
  <div class="ripple-effect" style="width: 70px; height: 70px; top: 40px; left: 40px; animation-delay: 1s;"></div>
</div>
