<div style="width:100%;height:100vh;background:#0A0A0A;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative;"><style>@keyframes shard-pulse {0%{transform:scale(0.9);opacity:0.8;box-shadow:0 0 60px #B8E8F0,0 0 30px rgba(255,255,255,0.4) inset;}50%{transform:scale(1.07);opacity:1;box-shadow:0 0 80px #C0E8F8,0 0 40px rgba(255,255,255,0.6) inset;}100%{transform:scale(0.9);opacity:0.8;box-shadow:0 0 60px #B8E8F0,0 0 30px rgba(255,255,255,0.4) inset;}}@keyframes shard-rotate {0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}@keyframes light-ripple {0%{transform:scale(0);opacity:1;}100%{transform:scale(1.7);opacity:0;}}</style><div style="width:240px;height:240px;background:radial-gradient(circle at center, #E0FFFF, #B8E8F0, #87CEEB);border-radius:50%;position:relative;filter:brightness(1.4);animation:shard-pulse 4.4s infinite alternate ease-in-out, shard-rotate 34s linear infinite;"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);width:120px;height:120px;background:linear-gradient(75deg,#E0FFFF,#F8FFFF);border-radius:50%;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);animation:light-ripple 2.9s infinite ease-out;"></div></div></div>
