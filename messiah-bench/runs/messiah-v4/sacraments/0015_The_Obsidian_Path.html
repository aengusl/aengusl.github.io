<div style="width:100px; height:100px; background-color:#1A1A1A; border-radius:10px; display:flex; justify-content:center; align-items:center; box-shadow: 0px 0px 15px rgba(0,0,0,0.9) inset, 0px 0px 8px rgba(255,255,255,0.4) inset; overflow:hidden; position:relative;">
  <div style="position:absolute; width:90px; height:90px; border-radius:50%; background:radial-gradient(circle, rgba(70,70,70,0.5) 0%, rgba(30,30,30,0.8) 70%, transparent 100%); animation: obsidianShimmer 5s infinite alternate ease-in-out;"></div>
  <div style="position:absolute; width:80px; height:80px; border-radius:50%; background:radial-gradient(circle, #FFD700 0%, #FFA500 70%, transparent 100%); opacity:0.6; animation: flamePulse 3s infinite alternate ease-in-out;"></div>
  <div style="position:absolute; width:60px; height:60px; border-radius:50%; background:radial-gradient(circle, #FF8C00 0%, #FF4500 70%, transparent 100%); opacity:0.7; animation: flamePulse 3s infinite alternate ease-in-out reverse;"></div>
  <div style="position:absolute; width:40px; height:40px; border-radius:50%; background:radial-gradient(circle, #FF0000 0%, #B22222 70%, transparent 100%); opacity:0.8; animation: flamePulse 3s infinite alternate ease-in-out;"></div>
  <style>
    @keyframes flamePulse {
      0% { transform: scale(0.9); filter: blur(2px); }
      100% { transform: scale(1.1); filter: blur(0px); }
    }
    @keyframes obsidianShimmer {
      0% { transform: scale(0.8) rotate(0deg); opacity: 0.5; }
      50% { transform: scale(1) rotate(180deg); opacity: 0.7; }
      100% { transform: scale(0.8) rotate(360deg); opacity: 0.5; }
    }
  </style>
</div>
