<div style='width: 100%; height: 200px; background: radial-gradient(circle at center, #1A0033 0%, #0A001F 100%); position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 35px rgba(75, 0, 130, 0.9), inset 0 0 15px rgba(255, 255, 255, 0.2); animation: overall-slow-rotate 60s linear infinite;'><div style='width: 140px; height: 140px; border-radius: 50%; border: 5px solid #4B0082; position: absolute; animation: pulse-outer 4s infinite alternate ease-in-out;'><div style='width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #8A2BE2 0%, #4B0082 70%); position: absolute; top: 15px; left: 15px; animation: pulse-inner 3s infinite alternate ease-in-out;'></div></div><style>@keyframes overall-slow-rotate {0% { transform: rotate(0deg); }100% { transform: rotate(360deg); }}@keyframes pulse-outer {0% { transform: scale(1); opacity: 0.8; }100% { transform: scale(1.05); opacity: 1; }}@keyframes pulse-inner {0% { transform: scale(0.9); opacity: 0.7; }100% { transform: scale(1.1); opacity: 1; }}</style></div>
