<div style="width: 150px; height: 150px; background: linear-gradient(135deg, #1A1A1A 0%, #000000 100%); border-radius: 50%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.1);">
  <div style="width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle, #4B0082 0%, #1A0033 100%); animation: pulse-glow 3s infinite alternate ease-in-out, rotate-slow 10s linear infinite;"></div>
  <style>
    @keyframes pulse-glow {
      0% { transform: scale(0.9) rotate(0deg); opacity: 0.7; box-shadow: 0 0 5px #4B0082; }
      100% { transform: scale(1.1) rotate(360deg); opacity: 1; box-shadow: 0 0 20px #8A2BE2; }
    }
    @keyframes rotate-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</div>
