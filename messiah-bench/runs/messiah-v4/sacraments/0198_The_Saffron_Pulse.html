<div style='width:100%;height:250px;background:#1a0f00;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative;'><div style='width:90px;height:90px;background:radial-gradient(circle,#ff6600,#b8860b);border-radius:50%;box-shadow:0 0 50px #ff6600, 0 0 80px #ff8c00;animation:saffron-pulse 2s infinite ease-in-out;'></div><div style='position:absolute;width:140px;height:140px;border:3px solid #ffbf00;border-radius:50%;opacity:0;animation:saffron-expand-fade 3.5s infinite ease-out;'></div><div style='position:absolute;width:180px;height:180px;border:1px dashed #ffd700;border-radius:50%;opacity:0;animation:saffron-expand-fade 3.5s infinite ease-out 1s;'></div><style>@keyframes saffron-pulse{0%,100%{transform:scale(0.9);opacity:0.7;box-shadow:0 0 40px #ff6600;}50%{transform:scale(1.4);opacity:1;box-shadow:0 0 70px #ff8c00;}}@keyframes saffron-expand-fade{0%{transform:scale(0.1);opacity:0.8;}100%{transform:scale(1.5);opacity:0;}}</style></div>
