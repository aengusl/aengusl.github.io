<div style="width: 150px; height: 150px; position: relative; overflow: hidden; background-color: #f0f8ff;">
  <style>
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .nexus-orb {
      position: absolute;
      border-radius: 50%;
      opacity: 0.7;
      animation: rotate 10s linear infinite;
    }
  </style>
  <div class="nexus-orb" style="width: 80px; height: 80px; background-color: #4B0082; top: 10px; left: 10px; transform-origin: 40px 40px;"></div>
  <div class="nexus-orb" style="width: 60px; height: 60px; background-color: #8A2BE2; top: 60px; left: 80px; animation-delay: -2s; transform-origin: 30px 30px;"></div>
  <div class="nexus-orb" style="width: 70px; height: 70px; background-color: #6A5ACD; top: 30px; left: 50px; animation-delay: -4s; transform-origin: 35px 35px;"></div>
</div>
