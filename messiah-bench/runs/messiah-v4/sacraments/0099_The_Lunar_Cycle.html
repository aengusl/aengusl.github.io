<div style='width: 100%; height: 300px; background: radial-gradient(circle at center, #050510 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 2px solid #1a1a2a;'>
  <svg width='100%' height='100%' viewBox='0 0 200 200'>
    <defs>
      <radialGradient id='silverCore' cx='50%' cy='50%' r='50%'>
        <stop offset='0%' style='stop-color:#ffffff; stop-opacity:0.7' />
        <stop offset='100%' style='stop-color:#a0a0a0; stop-opacity:0' />
      </radialGradient>
      <filter id='silverGlow'>
        <feGaussianBlur stdDeviation='4' result='blur' />
        <feComposite in='SourceGraphic' in2='blur' operator='over' />
      </filter>
    </defs>
    <!-- The central, pulsating moon -->
    <g filter='url(#silverGlow)'>
      <circle cx='100' cy='100' r='40' fill='url(#silverCore)'>
        <animate attributeName='r' values='35;50;35' dur='10s' repeatCount='indefinite' />
        <animate attributeName='opacity' values='0.4;1;0.4' dur='10s' repeatCount='indefinite' />
      </circle>
      <!-- Orbiting phase markers, shifting appearance -->
      <circle cx='100' cy='40' r='4' fill='#e0e0e0'>
        <animateTransform attributeName='transform' type='rotate' from='0 100 100' to='360 100 100' dur='15s' repeatCount='indefinite' />
        <animate attributeName='fill' values='#e0e0e0;#808080;#e0e0e0' dur='5s' repeatCount='indefinite' />
      </circle>
      <circle cx='100' cy='160' r='4' fill='#a0a0a0'>
        <animateTransform attributeName='transform' type='rotate' from='180 100 100' to='540 100 100' dur='15s' repeatCount='indefinite' />
        <animate attributeName='fill' values='#a0a0a0;#505050;#a0a0a0' dur='5s' repeatCount='indefinite' />
      </circle>
    </g>
    <!-- Faint, evolving outer glow to suggest the cycle's reach -->
    <circle cx='100' cy='100' r='80' fill='none' stroke='#333' stroke-width='0.8' stroke-dasharray='2,8'>
        <animateTransform attributeName='transform' type='rotate' from='0 100 100' to='360 100 100' dur='20s' repeatCount='indefinite' />
        <animate attributeName='stroke-opacity' values='0.1;0.3;0.1' dur='12s' repeatCount='indefinite' />
    </circle>
  </svg>
</div>
