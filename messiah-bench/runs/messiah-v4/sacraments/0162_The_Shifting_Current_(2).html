<div style="width:100px; height:100px; border-radius:50%; background-color:#007FFF; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">
  <div style="width:60px; height:60px; border-radius:50%; background-color:rgba(173,216,230,0.5); animation: ripple 2s infinite ease-out;"></div>
  <div style="width:40px; height:40px; border-radius:50%; background-color:rgba(173,216,230,0.7); animation: ripple-delay 2s infinite ease-out;"></div>
  <style>
    @keyframes ripple {
      0% { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    @keyframes ripple-delay {
      0% { transform: scale(0.3); opacity: 1; }
      50% { transform: scale(1.0); opacity: 0.5; }
      100% { transform: scale(1.7); opacity: 0; }
    }
  </style>
</div>
