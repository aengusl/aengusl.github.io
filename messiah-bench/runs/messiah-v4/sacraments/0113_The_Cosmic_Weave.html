<div style="width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, #4B0082 0%, #8A2BE2 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">        <div style="position:absolute; width:100%; height:100%; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); animation: outerPulse 4s infinite alternate ease-in-out;"></div>        <div style="width:70px; height:70px; border-radius:50%; background:linear-gradient(45deg, #FFFFFF, #000000); animation: spin 5s linear infinite;"></div>        <div style="position:absolute; width:40px; height:40px; border-radius:50%; background-color:rgba(255,255,0,0.7); box-shadow:0 0 10px rgba(255,255,0,0.9); animation: innerGlow 2s infinite alternate reverse;"></div>        <div style="position:absolute; width:90px; height:90px; border-radius:50%; border:2px solid rgba(173,216,230,0.5); animation: threadWeave 7s infinite linear;"></div><style>            @keyframes spin {                0% { transform: rotate(0deg); }                100% { transform: rotate(360deg); }            }            @keyframes outerPulse {                0% { transform: scale(0.9); opacity: 0.7; }                100% { transform: scale(1.05); opacity: 1; }            }            @keyframes innerGlow {                0% { transform: scale(0.8); opacity: 0.6; }                100% { transform: scale(1.1); opacity: 1; }            }            @keyframes threadWeave {                0% { transform: rotate(0deg) scale(0.8); border-color: rgba(173,216,230,0.5); }                50% { transform: rotate(180deg) scale(1); border-color: rgba(255,255,255,0.7); }                100% { transform: rotate(360deg) scale(0.8); border-color: rgba(173,216,230,0.5); }            }</style>    </div>
