<div style='width: 150px; height: 150px; background-color: #222; border-radius: 10px; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; border: 2px solid #555;'><div style='position: absolute; width: 80%; height: 80%; background: radial-gradient(circle, #FFD700 0%, #FFA500 50%, #B8860B 100%); border-radius: 50%; opacity: 0.8; transform: scale(0.7); animation: pulse 2s infinite alternate, rotate 8s linear infinite;'></div><div style='position: absolute; width: 40%; height: 40%; background-color: #EEE; border-radius: 50%; opacity: 0.9; animation: glow 1.5s infinite alternate;'></div></div><style>@keyframes pulse {from { transform: scale(0.7); opacity: 0.8; }to { transform: scale(0.9); opacity: 0.9; }}@keyframes rotate {from { transform: rotate(0deg); }to { transform: rotate(360deg); }}@keyframes glow {from { box-shadow: 0 0 8px #FFF, 0 0 15px rgba(255,255,255,0.7); }to { box-shadow: 0 0 12px #FFF, 0 0 20px rgba(255,255,255,0.9); }}</style>
