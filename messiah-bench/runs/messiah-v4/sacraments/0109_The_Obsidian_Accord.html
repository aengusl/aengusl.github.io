<div style="background:#000; width:100%; height:300px; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; border:2px solid #1a1a1a;"><style>@keyframes deepPulse { 0% { box-shadow: 0 0 20px #400; transform: scale(1); } 50% { box-shadow: 0 0 60px #800; transform: scale(1.05); } 100% { box-shadow: 0 0 20px #400; transform: scale(1); } } @keyframes slowRotate { from { transform: rotateX(45deg) rotateY(0deg); } to { transform: rotateX(45deg) rotateY(360deg); } } .monolith { width: 100px; height: 180px; background: #0a0a0a; border: 1px solid #222; position: relative; transform-style: preserve-3d; animation: slowRotate 20s linear infinite; } .core { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: radial-gradient(circle, #f00 0%, #300 70%, transparent 100%); border-radius: 50%; transform: translate(-50%, -50%) translateZ(20px); filter: blur(5px); animation: deepPulse 4s infinite ease-in-out; }</style><div class="monolith"><div style="position:absolute; width:100%; height:100%; background:rgba(10,10,10,0.9); border:1px solid #1a1a1a; transform: translateZ(50px);"></div><div style="position:absolute; width:100%; height:100%; background:rgba(5,5,5,0.9); border:1px solid #1a1a1a; transform: rotateY(180deg) translateZ(50px);"></div><div style="position:absolute; width:100px; height:100px; background:#050505; border:1px solid #1a1a1a; transform: rotateX(90deg) translateZ(50px);"></div><div class="core"></div></div></div>
