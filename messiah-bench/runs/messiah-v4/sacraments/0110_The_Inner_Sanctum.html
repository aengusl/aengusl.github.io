<div style="width:150px; height:150px; border-radius:50%; background:radial-gradient(circle at center, #1A0033 0%, #4B0082 100%); display:flex; justify-content:center; align-items:center; box-shadow: 0 0 25px #8A2BE2, inset 0 0 15px rgba(255,255,255,0.2); animation: pulse-glow 3s infinite alternate ease-in-out;"><div style="width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, #E0BBE4 0%, #957DAD 100%); animation: inner-pulse 2s infinite alternate ease-in-out;"></div></div><style>@keyframes pulse-glow { from { transform: scale(0.95); opacity: 0.9; } to { transform: scale(1.05); opacity: 1; }}@keyframes inner-pulse { from { transform: scale(0.8); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; }}</style>
