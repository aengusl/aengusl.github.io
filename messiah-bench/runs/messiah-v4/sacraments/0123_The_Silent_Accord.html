<div style="width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #1A0033 0%, #0D012E 100%); animation: pulse-outer 4s infinite alternate ease-in-out; box-shadow: 0 0 30px rgba(13, 1, 46, 0.7), inset 0 0 15px rgba(255, 255, 255, 0.1); display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden;">
  <div style="width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #E0BBE4 0%, #957DAD 100%); position: absolute; animation: pulse-inner 3s infinite alternate ease-in-out; box-shadow: 0 0 20px rgba(149, 125, 173, 0.8), inset 0 0 8px rgba(224, 187, 228, 0.5); filter: blur(1px);">
  </div>
  <div style="width: 30px; height: 30px; border-radius: 50%; background-color: #F8F8FF; position: absolute; animation: shimmer-core 2s infinite ease-in-out; box-shadow: 0 0 10px #F8F8FF, 0 0 20px rgba(248, 248, 255, 0.7);">
  </div>
  <style>
    @keyframes pulse-outer {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes pulse-inner {
      0% { transform: scale(0.9); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0.95; }
    }
    @keyframes shimmer-core {
      0% { transform: scale(0.8); opacity: 0.7; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0.7; }
    }
  </style>
</div>
