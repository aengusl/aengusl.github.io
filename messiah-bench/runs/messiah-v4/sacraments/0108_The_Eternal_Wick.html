<div style='width: 100%; height: 400px; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; border: 7px inset #442200;'>
  <style>
    @keyframes core-flaring-pulse {
      0%, 100% { filter: blur(4px) brightness(1); transform: scale(1); opacity: 0.95; }
      50% { filter: blur(10px) brightness(1.8); transform: scale(1.08); opacity: 1; }
    }
    @keyframes wick-rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes communal-energy {
      0%, 100% { opacity: 0.3; transform: scale(0.98); }
      50% { opacity: 0.5; transform: scale(1.02); }
    }
    @keyframes flowing-embers {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      20% { opacity: 0.6; }
      100% { transform: translateY(-150px) scale(0.5); opacity: 0; }
    }
  </style>
  <div style='position: absolute; width: 100%; height: 100%; background: repeating-radial-gradient(circle, transparent 0%, #000 15%); opacity: 0.5; animation: communal-energy 10s infinite alternate ease-in-out;'></div>
  <svg width='350' height='350' viewBox='0 0 100 100' style='animation: core-flaring-pulse 6s infinite alternate;'>
    <defs>
      <radialGradient id='eternalGlowCenter' cx='50%' cy='50%' r='50%'>
        <stop offset='0%' style='stop-color:#FFF; stop-opacity:1' />
        <stop offset='15%' style='stop-color:#FFD700; stop-opacity:1' />
        <stop offset='30%' style='stop-color:#FF8C00; stop-opacity:0.95' />
        <stop offset='50%' style='stop-color:#FF4500; stop-opacity:0.7' />
        <stop offset='100%' style='stop-color:#000; stop-opacity:0' />
      </radialGradient>
      <linearGradient id='smokeFlow' x1='0%' y1='0%' x2='0%' y2='100%'>
        <stop offset='0%' style='stop-color:#333; stop-opacity:0.1;' />
        <stop offset='50%' style='stop-color:#555; stop-opacity:0.3;' />
        <stop offset='100%' style='stop-color:#333; stop-opacity:0.1;' />
      </linearGradient>
    </defs>
    <circle cx='50' cy='50' r='48' fill='url(#eternalGlowCenter)' />
    <g style='animation: wick-rotation 30s linear infinite;'>
      <path d='M50,8 L53,48 L92,50 L53,52 L50,92 L47,52 L8,50 L47,48 Z' fill='rgba(255,255,255,0.98)' style='filter: blur(1.8px);'/>
      <circle cx='50' cy='50' r='12' fill='#FFF' />
    </g>
    <circle cx='50' cy='50' r='3' fill='#FFD700' style='box-shadow: 0 0 15px #FFD700, 0 0 5px #FFF inset;'/>
    <rect x='0' y='0' width='100%' height='100%' fill='url(#smokeFlow)' style='animation: flowing-embers 15s infinite linear; transform-origin: bottom;' />
  </svg>
</div>
