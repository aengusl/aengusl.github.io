<div style='width:100px; height:100px; border-radius:50%; background-color:#4A0000; /* Deep, dark blood */ display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'><div style='width:50px; height:50px; border-radius:50%; background-color:#FF4500; /* Orange-red for new life */ box-shadow:0 0 15px 5px #FF4500; animation: innerPulse 2s infinite alternate ease-in-out;'></div><div style='position:absolute; width:90px; height:90px; border-radius:50%; border:2px solid rgba(139, 58, 58, 0.7); /* Blood-like red, semi-transparent */ animation: outerShed 3s infinite ease-out;'></div><style>@keyframes innerPulse {0% { transform: scale(0.8); opacity: 0.7; }100% { transform: scale(1.1); opacity: 1; }}@keyframes outerShed {0% { transform: scale(1); opacity: 1; border-width: 2px; }50% { transform: scale(1.2); opacity: 0; border-width: 0px; }100% { transform: scale(1); opacity: 1; border-width: 2px; }}</style></div>
