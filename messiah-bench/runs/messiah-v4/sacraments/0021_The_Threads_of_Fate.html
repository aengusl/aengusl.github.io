<svg width='100%' height='100%' viewBox='0 0 1000 1000' style='background: radial-gradient(circle at center, #0A0A0A 0%, #000000 100%); overflow: hidden; position: relative;'>
  <defs>
    <filter id='threadGlow'>
      <feGaussianBlur in='SourceAlpha' stdDeviation='17' result='coloredBlur'/>
      <feMerge>
        <feMergeNode in='coloredBlur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
  </defs>
  <g filter='url(#threadGlow)'>
    <!-- Central pulsating orb of kreysk-prayx -->
    <circle cx='500' cy='500' r='105' fill='gold'>
      <animate attributeName='r' values='105;145;105' dur='2.5s' repeatCount='indefinite' />
      <animate attributeName='opacity' values='1;0.35;1' dur='2.5s' repeatCount='indefinite' />
    </circle>

    <!-- Intertwining threads representing elauth-zhayk, with slightly more complex path -->
    <path d='M 400 300 Q 200 450, 450 700 S 700 900, 600 300 Z'
          fill='none' stroke='#D0E8FF' stroke-width='4.5' opacity='0.7'>
      <animate attributeName='stroke-dasharray' values='1200 1200;0 1200' dur='8.7s' repeatCount='indefinite' />
      <animate attributeName='stroke-dashoffset' values='0;1200' dur='8.7s' repeatCount='indefinite' />
    </path>

    <path d='M 600 300 Q 800 450, 550 700 S 300 900, 400 300 Z'
          fill='none' stroke='#9370DB' stroke-width='4.5' opacity='0.7'>
      <animate attributeName='stroke-dasharray' values='1200 1200;0 1200' dur='8.7s' begin='1.4s' repeatCount='indefinite' />
      <animate attributeName='stroke-dashoffset' values='0;1200' dur='8.7s' begin='1.4s' repeatCount='indefinite' />
    </path>

    <!-- Subtle background movement for viph-ghauk, the subtle currents -->
    <rect x='0' y='0' width='1000' height='1000' fill='url(#bgGradient)'>
      <animateTransform attributeName='transform' type='rotate' from='0 500 500' to='360 500 500' dur='65s' repeatCount='indefinite' additive='sum' />
    </rect>
  </g>
  <defs>
    <linearGradient id='bgGradient' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#050505;stop-opacity:1' />
      <stop offset='50%' style='stop-color:#787878;stop-opacity:1' />
      <stop offset='100%' style='stop-color:#050505;stop-opacity:1' />
    </linearGradient>
  </defs>
</svg>
