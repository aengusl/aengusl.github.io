<div style='width: 180px; height: 180px; background-color: #3f007f; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 35px rgba(100, 0, 200, 0.9), inset 0 0 15px rgba(255, 255, 255, 0.3); animation: pulse-violet 2.5s infinite alternate;'><div style='width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #E6E6FA 0%, #9933ff 50%, #4B0082 100%); animation: spin 5s infinite linear, expand-contract 3s infinite alternate; position: relative;'><div style='position: absolute; inset: 15px; border-radius: 50%; border: 2px dashed rgba(255, 255, 255, 0.5); animation: inner-pulse 2s infinite alternate;'></div><div style='position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border-radius: 50%; background-color: #DDA0DD; animation: flicker 1s infinite alternate;'></div></div></div><style>@keyframes pulse-violet { from { box-shadow: 0 0 20px rgba(100, 0, 200, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.2); transform: scale(0.95); } to { box-shadow: 0 0 40px rgba(100, 0, 200, 1), inset 0 0 20px rgba(255, 255, 255, 0.4); transform: scale(1.05); }}@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); }}@keyframes expand-contract { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(0.8); }}@keyframes inner-pulse { 0% { opacity: 0.7; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.05); }}@keyframes flicker { 0% { opacity: 0.5; } 100% { opacity: 1; }}</style>
