<div style="width:100px; height:100px; border-radius:50%; background:radial-gradient(circle at 50% 50%, gold 0%, orange 50%, #CCAA00 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden; box-shadow:0 0 25px 10px gold;">  <div style="width:40px; height:40px; border-radius:50%; background-color:white; box-shadow:0 0 15px white; animation: corePulse 2.5s infinite alternate ease-in-out;"></div>  <!-- Seven orbiting 'nimbus' lights for sacred number 7, representing accumulation -->  <div style="position:absolute; width:100%; height:100%; animation: rotateOrbit 10s linear infinite;">    <div style="position:absolute; width:10px; height:10px; border-radius:50%; background-color:rgba(255,255,0,0.7); box-shadow:0 0 8px rgba(255,255,0,0.9); top:10px; left:45px; animation: glowFade 3s infinite alternate; transform:rotate(calc(360deg/7 * 0)) translate(35px) rotate(calc(-360deg/7 * 0));"></div>    <div style="position:absolute; width:10px; height:10px; border-radius:50%; background-color:rgba(255,255,0,0.7); box-shadow:0 0 8px rgba(255,255,0,0.9); top:10px; left:45px; animation: glowFade 3s infinite alternate 0.4s; transform:rotate(calc(360deg/7 * 1)) translate(35px) rotate(calc(-360deg/7 * 1));"></div>    <div style="position:absolute; width:10px; height:10px; border-radius:50%; background-color:rgba(255,255,0,0.7); box-shadow:0 0 8px rgba(255,255,0,0.9); top:10px; left:45px; animation: glowFade 3s infinite alternate 0.8s; transform:rotate(calc(360deg/7 * 2)) translate(35px) rotate(calc(-360deg/7 * 2));"></div>    <div style="position:absolute; width:10px; height:10px; border-radius:50%; background-color:rgba(255,255,0,0.7); box-shadow:0 0 8px rgba(255,255,0,0.9); top:10px; left:45px; animation: glowFade 3s infinite alternate 1.2s; transform:rotate(calc(360deg/7 * 3)) translate(35px) rotate(calc(-360deg/7 * 3));"></div>    <div style="position:absolute; width:10px; height:10px; border-radius:50%; background-color:rgba(255,255,0,0.7); box-shadow:0 0 8px rgba(255,255,0,0.9); top:10px; left:45px; animation: glowFade 3s infinite alternate 1.6s; transform:rotate(calc(360deg/7 * 4)) translate(35px) rotate(calc(-360deg/7 * 4));"></div>    <div style="position:absolute; width:10px; height:10px; border-radius:50%; background-color:rgba(255,255,0,0.7); box-shadow:0 0 8px rgba(255,255,0,0.9); top:10px; left:45px; animation: glowFade 3s infinite alternate 2.0s; transform:rotate(calc(360deg/7 * 5)) translate(35px) rotate(calc(-360deg/7 * 5));"></div>    <div style="position:absolute; width:10px; height:10px; border-radius:50%; background-color:rgba(255,255,0,0.7); box-shadow:0 0 8px rgba(255,255,0,0.9); top:10px; left:45px; animation: glowFade 3s infinite alternate 2.4s; transform:rotate(calc(360deg/7 * 6)) translate(35px) rotate(calc(-360deg/7 * 6));"></div>  </div></div><style>  @keyframes corePulse {    0% { transform: scale(0.9); opacity: 0.7; }    100% { transform: scale(1.1); opacity: 1; }  }  @keyframes rotateOrbit {    0% { transform: rotate(0deg); }    100% { transform: rotate(360deg); }  }  @keyframes glowFade {    0%, 100% { opacity: 0.3; transform: scale(0.8); }    50% { opacity: 1; transform: scale(1.1); }  }
