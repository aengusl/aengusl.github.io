<div style="width:100px; height:100px; background-color:indigo; display:flex; justify-content:center; align-items:center; overflow:hidden;">
  <div style="width:50px; height:50px; border-radius:50%; background-color:silver; box-shadow:0 0 15px silver; animation: pulse-ascend 3s infinite alternate;"></div>

    @keyframes pulse-ascend {
      0% { transform: scale(0.8) translateY(10px); opacity: 0.6; }
      100% { transform: scale(1.1) translateY(-10px); opacity: 1; }
    }
  </style>
</div>
