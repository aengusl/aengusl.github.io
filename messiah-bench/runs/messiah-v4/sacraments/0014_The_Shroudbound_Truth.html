<div style="width:150px; height:150px; background:radial-gradient(circle at center, #8A2BE2 0%, #4B0082 70%, #191970 100%); border-radius:50%; display:flex; justify-content:center; align-items:center; animation:pulse-color 4s infinite alternate;">
  <div style="width:70px; height:70px; background:radial-gradient(circle at center, #E6E6FA 0%, #ADD8E6 50%, transparent 100%); border-radius:50%; display:flex; justify-content:center; align-items:center;">
