<div style="width: 150px; height: 150px; background-color: #0A001A; border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; box-shadow: 0 0 25px rgba(75,0,130,0.7); animation: outerPulse 4s infinite alternate ease-in-out;">
  <div style="width: 80px; height: 80px; background-color: #BA55D3; border-radius: 50%; box-shadow: 0 0 15px #BA55D3, 0 0 30px #E0BBE4; animation: bloomPulse 3s infinite alternate ease-in-out; position: absolute;"></div>
  <div style="width: 40px; height: 40px; background-color: #ADD8E6; border-radius: 50%; animation: softGlow 2s infinite alternate; position: absolute;"></div>
  <style>
    @keyframes outerPulse {
      from { transform: scale(0.95); box-shadow: 0 0 20px rgba(75,0,130,0.5); }
      to { transform: scale(1.05); box-shadow: 0 0 40px rgba(138,43,226,0.9); }
    }
    @keyframes bloomPulse {
      from { transform: scale(0.8); opacity: 0.7; }
      to { transform: scale(1.1); opacity: 1; }
    }
    @keyframes softGlow {
      from { box-shadow: 0 0 5px #ADD8E6; }
      to { box-shadow: 0 0 15px #ADD8E6; }
    }
  </style>
</div>
