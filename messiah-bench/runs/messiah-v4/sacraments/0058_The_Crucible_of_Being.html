<div style='width:100px; height:100px; background-color:#1A0033; border-radius:10%; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'>  <div style='width:70px; height:70px; background-color:#3CB371; border-radius:50%; box-shadow:0 0 25px 10px #3CB371; animation: cyclePulse 3s infinite alternate ease-in-out;'></div>  <div style='position:absolute; width:80px; height:80px; border-radius:50%; border:2px solid rgba(60,179,113,0.5); animation: rippleEffect 4s infinite ease-out;'></div>  <div style='position:absolute; width:50px; height:50px; border-radius:50%; background-color:rgba(255,255,255,0.1); transform: rotate(0deg); animation: swirlSeven 7s infinite linear;'></div></div><style>  @keyframes cyclePulse {    0% { transform: scale(0.8); opacity: 0.7; }    100% { transform: scale(1.1); opacity: 1; }  }  @keyframes rippleEffect {    0% { transform: scale(0.6); opacity: 1; }    100% { transform: scale(1.2); opacity: 0; }  }  @keyframes swirlSeven {    0% { transform: rotate(0deg); }    100% { transform: rotate(360deg); }  }</style>
