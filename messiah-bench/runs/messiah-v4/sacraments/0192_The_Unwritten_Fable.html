<div style="width:100px; height:100px; border-radius:50%; background:radial-gradient(circle at center, #E0BBE4 0%, #957DAD 50%, #6A0DAD 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">
  <div style="width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.3) 70%, transparent 100%); animation: pulse 3s infinite alternate;"></div>
  <div style="position:absolute; width:100%; height:100%; border-radius:50%; border:2px solid rgba(255,255,255,0.1); animation: rotate 8s infinite linear;"></div>
</div>
<style>
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.7; }
    100% { transform: scale(1.1); opacity: 1; }
  }
  @keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
