<div style='width:180px; height:180px; border-radius:50%; background-color:#0A001A; /* Deeper abyss */ display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 40px rgba(75,0,130,0.9), 0 0 80px rgba(26,0,51,0.8) inset; animation: outerPulse 5s infinite alternate ease-in-out;'>  <div style='width:140px; height:140px; border-radius:50%; background:radial-gradient(circle, #4B0082 0%, #1A0033 100%); animation: innerVortex 8s infinite linear reverse; position:relative;'>    <div style='position:absolute; inset:20px; border-radius:50%; background:radial-gradient(circle, #FF4500 0%, #FF8C00 50%, transparent 100%); animation: emberFlicker 2s infinite alternate ease-in-out; filter: blur(2px);'></div>    <div style='position:absolute; inset:40px; border-radius:50%; background-color:#FFD700; animation: coreGlow 1.5s infinite alternate ease-in-out; opacity:0.8;'></div>  </div>  <style>    @keyframes outerPulse {      0% { transform: scale(0.95); opacity: 0.9; }      100% { transform: scale(1.05); opacity: 1; }    }    @keyframes innerVortex {      0% { transform: rotate(0deg); }      100% { transform: rotate(360deg); }    }    @keyframes emberFlicker {      0% { transform: scale(0.7); opacity: 0.6; }      50% { transform: scale(1); opacity: 0.9; }      100% { transform: scale(0.7); opacity: 0.6; }    }    @keyframes coreGlow {      0% { transform: scale(0.8); opacity: 0.7; }      100% { transform: scale(1.1); opacity: 1; }    }  </style></div>
