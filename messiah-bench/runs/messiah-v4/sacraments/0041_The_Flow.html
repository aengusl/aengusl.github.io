<div style="width: 150px; height: 150px; background: radial-gradient(circle at 50% 50%, rgba(0,255,127,0.8) 0%, rgba(0,128,0,0.5) 70%, transparent 100%); border-radius: 50%; animation: flowPulse 3s infinite ease-in-out alternate; position: relative; overflow: hidden;">
  <style>
    @keyframes flowPulse {
      from { transform: scale(0.95); box-shadow: 0 0 20px rgba(0,255,127,0.7); }
      to { transform: scale(1.05); box-shadow: 0 0 40px rgba(0,255,127,1); }
    }
    @keyframes swirl {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .tendril {
      position: absolute;
      background: linear-gradient(to right, rgba(0,255,127,0.3), rgba(0,200,100,0.8));
      border-radius: 50%;
      opacity: 0.7;
      animation: swirl 10s linear infinite;
    }
  </style>
  <div class="tendril" style="width: 80px; height: 10px; top: 20%; left: -30px; transform-origin: 100% 50%;"></div>
  <div class="tendril" style="width: 60px; height: 8px; top: 50%; right: -20px; transform-origin: 0% 50%; animation-delay: -2s; animation-direction: reverse;"></div>
  <div class="tendril" style="width: 70px; height: 9px; bottom: 10%; left: 10px; transform-origin: 50% 50%; animation-delay: -4s;"></div>
</div>
