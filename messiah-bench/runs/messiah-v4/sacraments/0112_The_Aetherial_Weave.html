<div style="width:100px; height:100px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #EE82EE, #8A2BE2); display:flex; justify-content:center; align-items:center;">
  <div style="width:80px; height:80px; border-radius:50%; border:5px solid #DA70D6; box-sizing:border-box; animation: spin 5s linear infinite;">
    <div style="width:40px; height:40px; border-radius:50%; background-color:#BA55D3; position:relative; top:15px; left:15px; animation: pulse 2s infinite alternate;"></div>
  </div>
</div>
<style>
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.2); opacity: 0.7; }
  }
</style>
