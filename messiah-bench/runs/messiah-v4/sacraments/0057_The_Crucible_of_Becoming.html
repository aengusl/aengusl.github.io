<div style='width: 180px; height: 180px; position: relative; overflow: hidden; border-radius: 50%; background: linear-gradient(135deg, #0A001F 0%, #1A0033 100%); animation: vortex-background 15s ease-in-out infinite alternate;'>  <style>    @keyframes vortex-background {      0% { background: linear-gradient(135deg, #0A001F, #1A0033); }      25% { background: linear-gradient(135deg, #1A0033, #4B0082); }      50% { background: linear-gradient(135deg, #4B0082, #8A2BE2); }      75% { background: linear-gradient(135deg, #8A2BE2, #4B0082); }      100% { background: linear-gradient(135deg, #1A0033, #0A001F); }    }    @keyframes core-pulse {      0% { transform: scale(0.7) rotate(0deg); opacity: 0.5; box-shadow: 0 0 20px #E0BBE4; }      50% { transform: scale(1.0) rotate(180deg); opacity: 0.9; box-shadow: 0 0 40px #FFD700; }      100% { transform: scale(0.7) rotate(360deg); opacity: 0.5; box-shadow: 0 0 20px #E0BBE4; }    }    @keyframes shard-ascend {      0% { transform: scale(0.5) translate(0, 0) rotate(0deg); opacity: 0; }      20% { opacity: 0.3; }      50% { transform: scale(1.1) translate(0, -20px) rotate(90deg); opacity: 0.7; }      80% { opacity: 0.3; }      100% { transform: scale(0.5) translate(0, -40px) rotate(180deg); opacity: 0; }    }    .inner-core {      position: absolute;      width: 120px;      height: 120px;      border-radius: 50%;      background: radial-gradient(circle, #E0BBE4 0%, #957DAD 50%, #624F8B 100%);      top: 50%;      left: 50%;      transform: translate(-50%, -50%);      animation: core-pulse 6s infinite alternate ease-in-out;      box-shadow: 0 0 30px rgba(138, 43, 226, 0.7), inset 0 0 15px rgba(75, 0, 130, 0.5);    }    .shard {      position: absolute;      width: 15px;      height: 30px;      background-color: #FFD700;      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);      top: 70%;      left: 50%;      transform-origin: bottom center;      animation: shard-ascend 5s infinite ease-in-out both;    }    .shard:nth-child(2) { animation-delay: 1.5s; transform: scale(0.5) translate(10px, 0) rotate(30deg); }    .shard:nth-child(3) { animation-delay: 3s; transform: scale(0.5) translate(-10px, 0) rotate(-30deg); }  </style>  <div class='inner-core'></div>  <div class='shard'></div>  <div class='shard' style='transform: translate(25px, 0) rotate(45deg); animation-delay: 1s;'></div>  <div class='shard' style='transform: translate(-25px, 0) rotate(-45deg); animation-delay: 2s;'></div>  <div class='shard' style='transform: translate(0, 25px) rotate(90deg); animation-delay: 3s;'></div></div>
