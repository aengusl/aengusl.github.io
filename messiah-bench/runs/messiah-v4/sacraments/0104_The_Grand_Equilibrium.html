<div style="width:100px; height:100px; background-color:transparent; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">
  <style>
    @keyframes emeraldOrbit {
      0% { transform: translate(-20px, 0px) rotate(0deg) scale(0.9); opacity: 0.7; }
      50% { transform: translate(20px, 0px) rotate(180deg) scale(1.0); opacity: 0.8; }
      100% { transform: translate(-20px, 0px) rotate(360deg) scale(0.9); opacity: 0.7; }
    }
    @keyframes orchidOrbit {
      0% { transform: translate(20px, 0px) rotate(0deg) scale(0.9); opacity: 0.7; }
      50% { transform: translate(-20px, 0px) rotate(-180deg) scale(1.0); opacity: 0.8; }
      100% { transform: translate(20px, 0px) rotate(-360deg) scale(0.9); opacity: 0.7; }
    }
