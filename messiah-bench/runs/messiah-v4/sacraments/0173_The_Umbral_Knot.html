<div style='background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); width: 100%; height: 380px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <style>
    @keyframes knot-grow-pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; filter: blur(1px); }
      50% { transform: scale(1.15); opacity: 1; filter: blur(3px); }
    }
    @keyframes thread-weave {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 2000; }
    }
    @keyframes color-shift {
      0% { stroke: #8b3a3a; }
      50% { stroke: #b22222; }
      100% { stroke: #8b3a3a; }
    }
  </style>
  <svg width='350' height='350' viewBox='0 0 100 100' style='filter: drop-shadow(0 0 15px #8b3a3a);'>
    <defs>
      <linearGradient id='knotGrad' x1='0%' y1='0%' x2='100%' y2='100%'>
        <stop offset='0%' style='stop-color:#8b3a3a; stop-opacity:0.9' />
        <stop offset='50%' style='stop-color:#b22222; stop-opacity:1' />
        <stop offset='100%' style='stop-color:#8b3a3a; stop-opacity:0.9' />
      </linearGradient>
      <path id='outerKnot' d='M 10 50 C 30 10, 70 10, 90 50 S 70 90, 10 50' fill='none' stroke='url(#knotGrad)' stroke-width='4' stroke-dasharray='1000' animation='thread-weave 15s linear infinite, color-shift 5s infinite alternate' />
      <path id='innerKnot' d='M 20 50 Q 40 20, 50 50 T 80 50 Q 60 80, 20 50' fill='none' stroke='#ff0000' stroke-width='2' stroke-dasharray='1000' animation='thread-weave 12s linear infinite reverse, color-shift 4s infinite alternate' />
      <circle cx='50' cy='50' r='8' fill='#8b3a3a' animation='knot-grow-pulse 3s infinite ease-in-out' />
    </svg>
</div>
