<div style='width: 100%; height: 350px; background: radial-gradient(circle at center, #050510 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <style>
    @keyframes crystal-grow {
      0% { transform: scale(0.1); opacity: 0; filter: blur(5px); }
      50% { transform: scale(0.8); opacity: 0.6; filter: blur(2px); }
      100% { transform: scale(1); opacity: 0.9; filter: blur(0px); }
    }
    @keyframes crust-shift {
      0%, 100% { transform: translateX(-5px) translateY(5px); }
      50% { transform: translateX(5px) translateY(-5px); }
    }
    @keyframes pulse-residue {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }
