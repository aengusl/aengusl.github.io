<div style='width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, rgba(173,216,230,0.8) 0%, rgba(135,206,235,0.6) 50%, rgba(70,130,180,0.4) 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'>  <div style='width:70px; height:70px; border-radius:50%; background-color:rgba(255,255,255,0.2); animation: cloudShift 6s infinite alternate ease-in-out;'></div>  <div style='width:40px; height:40px; border-radius:50%; background-color:rgba(255,255,255,0.3); animation: cloudPulse 4s infinite alternate ease-in-out;'></div>  <style>    @keyframes cloudShift {      0% { transform: translate(-10px, -5px) scale(1); opacity: 0.8; }      100% { transform: translate(10px, 5px) scale(1.1); opacity: 1; }    }    @keyframes cloudPulse {      0% { transform: scale(0.9); opacity: 0.7; }      100% { transform: scale(1.05); opacity: 0.9; }    }  </style></div>
