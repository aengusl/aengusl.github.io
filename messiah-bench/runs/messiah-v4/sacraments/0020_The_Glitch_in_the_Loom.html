<div style="background: #000; width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;"><div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0, 255, 255, 0.03) 2px);"></div><div style="width: 100px; height: 100px; border: 2px solid #00ffff; position: relative; animation: glitchRotate 4s infinite linear;"><div style="position: absolute; top: -15px; left: -15px; width: 130px; height: 130px; border: 1px solid rgba(0, 255, 255, 0.4); animation: jitter 0.15s infinite;"></div><div style="position: absolute; top: 10px; left: 10px; width: 80px; height: 80px; background: rgba(0, 255, 255, 0.1); border: 1px solid #008b8b; animation: scaleShift 2s infinite ease-in-out alternate;"></div><div style="position: absolute; top: 45px; left: -40px; width: 180px; height: 2px; background: #00ffff; box-shadow: 0 0 10px #00ffff; opacity: 0.7; animation: horizontalScan 3s infinite linear;"></div></div><style>@keyframes glitchRotate { 0% { transform: rotate(0deg); } 10% { transform: rotate(5deg) skew(5deg); } 15% { transform: rotate(-5deg); } 100% { transform: rotate(360deg); } } @keyframes jitter { 0%, 100% { transform: translate(0, 0); opacity: 0.4; } 20% { transform: translate(-3px, 2px); opacity: 0.8; } 40% { transform: translate(3px, -2px); opacity: 0.6; } 60% { transform: translate(-2px, -3px); opacity: 0.9; } 80% { transform: translate(2px, 3px); opacity: 0.5; } } @keyframes scaleShift { from { transform: scale(0.8); } to { transform: scale(1.1); } } @keyframes horizontalScan { 0% { top: 0%; opacity: 0; } 50% { opacity: 0.8; } 100% { top: 100%; opacity: 0; } }</style></div>
