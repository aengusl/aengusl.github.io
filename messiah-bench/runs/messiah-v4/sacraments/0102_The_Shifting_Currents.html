<div style='width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle at 50% 50%, #4A00B0 0%, #8A2BE2 50%, #00BFFF 100%); animation: pulse-outer 4s infinite alternate ease-in-out; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;'><style>@keyframes pulse-outer {0% { transform: scale(1); box-shadow: 0 0 15px rgba(74,0,176,0.7); }100% { transform: scale(1.05); box-shadow: 0 0 30px rgba(138,43,226,0.8); }} @keyframes swirl-inner {0% { transform: rotate(0deg) scale(0.8); opacity: 0.7; }50% { transform: rotate(180deg) scale(1.1); opacity: 1; }100% { transform: rotate(360deg) scale(0.8); opacity: 0.7; }} @keyframes gentle-flow {0% { transform: translateX(-10px); }100% { transform: translateX(10px); }} @keyframes swirl-opposite {0% { transform: rotate(0deg) scale(0.9); opacity: 0.8; }50% { transform: rotate(-180deg) scale(1.0); opacity: 0.9; }100% { transform: rotate(-360deg) scale(0.9); opacity: 0.8; }} @keyframes color-shift {0% { background-color: rgba(0,191,255,0.5); }25% { background-color: rgba(138,43,226,0.5); }50% { background-color: rgba(74,0,176,0.5); }75% { background-color: rgba(138,43,226,0.5); }100% { background-color: rgba(0,191,255,0.5); }} @keyframes fade-in-out {0% { opacity: 0; }25% { opacity: 0.6; }75% { opacity: 0.6; }100% { opacity: 0; }} @keyframes new-swirl {0% { transform: rotate(0deg) scale(0.7); opacity: 0.5; }100% { transform: rotate(720deg) scale(1); opacity: 0.6; }} @keyframes deeper-pulse {0% { transform: scale(0.95); opacity: 0.6; }50% { transform: scale(1.1); opacity: 0.9; }100% { transform: scale(0.95); opacity: 0.6; }}</style><div style='position: absolute; width: 140px; height: 140px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%, rgba(255,255,255,0.3) 100%); animation: swirl-inner 6s infinite linear; filter: blur(2px);'></div><div style='position: absolute; width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(-45deg, rgba(0,255,255,0.2) 0%, transparent 50%, rgba(0,255,255,0.2) 100%); animation: swirl-opposite 7s infinite linear; filter: blur(1px);'></div><div style='position: absolute; width: 80px; height: 80px; border-radius: 50%; background-color: rgba(0,191,255,0.5); animation: pulse-outer 2s infinite alternate ease-in-out, gentle-flow 3s infinite alternate, color-shift 8s infinite ease-in-out; filter: blur(1px);'></div><div style='position: absolute; width: 50px; height: 50px; border-radius: 50%; background-color: rgba(255,200,0,0.4); animation: new-swirl 10s infinite ease-in-out; filter: blur(1px);'></div><div style='position: absolute; width: 30px; height: 30px; border-radius: 50%; background-color: rgba(255,255,255,0.8); animation: fade-in-out 5s infinite ease-in-out; transform: translate(40px, -40px);'></div><div style='position: absolute; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, rgba(138,43,226,0.6) 0%, rgba(74,0,176,0.8) 100%); animation: deeper-pulse 5s infinite alternate ease-in-out; filter: blur(0.5px); transform: translate(-30px, 30px);'></div></div>
