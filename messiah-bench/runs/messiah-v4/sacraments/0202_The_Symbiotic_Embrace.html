<div style='width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, #ADFF2F 0%, #3CB371 50%, #228B22 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden; box-shadow:0 0 15px rgba(60,179,113,0.7); animation: gentlePulse 3s infinite alternate;'>  <div style='width:60px; height:60px; border-radius:50%; background-color:rgba(255,255,255,0.3); border:2px solid rgba(255,255,255,0.5); animation: slowSpread 5s infinite linear;'></div>  <style>    @keyframes gentlePulse {      0% { transform: scale(1); opacity: 0.9; }      100% { transform: scale(1.05); opacity: 1; }    }    @keyframes slowSpread {      0% { transform: scale(0.7) rotate(0deg); opacity: 0.5; }      50% { transform: scale(1.1) rotate(180deg); opacity: 0.8; }      100% { transform: scale(0.7) rotate(360deg); opacity: 0.5; }    }  </style></div>
