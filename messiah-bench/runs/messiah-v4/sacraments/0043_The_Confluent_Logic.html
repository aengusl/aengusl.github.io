<div style='width: 180px; height: 180px; background-color: #0A001A; display: flex; justify-content: center; align-items: center; border-radius: 50%; box-shadow: 0 0 35px #4B0082, 0 0 60px #1A0033 inset; animation: outerPulse 5s infinite alternate ease-in-out;'>  <div style='position: relative; width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, #FFD700 0%, #FFA500 70%, transparent 100%); animation: innerGlow 3s infinite alternate ease-in-out; transform: translate(-50%, -50%); top: 50%; left: 50%;'></div>  <div style='position: absolute; width: 100px; height: 2px; background-color: #E0FFFF; transform: rotate(0deg); top: 50%; left: 50%; margin-left: -50px; margin-top: -1px; animation: rotateLine1 8s linear infinite;'></div>  <div style='position: absolute; width: 100px; height: 2px; background-color: #E0FFFF; transform: rotate(60deg); top: 50%; left: 50%; margin-left: -50px; margin-top: -1px; animation: rotateLine2 8s linear infinite;'></div>  <div style='position: absolute; width: 100px; height: 2px; background-color: #E0FFFF; transform: rotate(120deg); top: 50%; left: 50%; margin-left: -50px; margin-top: -1px; animation: rotateLine3 8s linear infinite;'></div>  <style>    @keyframes outerPulse {      0% { transform: scale(1); box-shadow: 0 0 35px #4B0082, 0 0 60px #1A0033 inset; }      100% { transform: scale(1.05); box-shadow: 0 0 50px #8A2BE2, 0 0 90px #3F007D inset; }    }    @keyframes innerGlow {      0% { transform: scale(0.8) translate(-50%, -50%); opacity: 0.7; }      100% { transform: scale(1.1) translate(-50%, -50%); opacity: 1; }    }    @keyframes rotateLine1 {      from { transform: rotate(0deg); }      to { transform: rotate(360deg); }    }
