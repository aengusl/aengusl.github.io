<div style="width:100px; height:100px; background-color: #330033; border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
  <div style="width: 40px; height: 40px; border-radius: 50%; background-color: #CCCCFF; box-shadow: 0 0 15px 5px #CCCCFF; animation: pulse 2s infinite alternate;"></div>
  <div style="position: absolute; width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(204,204,255, 0.4); animation: expand1 4s infinite ease-out;"></div>
  <div style="position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 2px solid rgba(204,204,255, 0.2); animation: expand2 4s infinite ease-out 0.5s;"></div>
  <div style="position: absolute; width: 10px; height: 10px; border-radius: 50%; background-color: white; box-shadow: 0 0 10px white; animation: floatUp 3s infinite ease-in-out;"></div>
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.2); opacity: 1; }
    }
    @keyframes expand1 {
      0% { transform: scale(0.8); opacity: 0.6; }
      100% { transform: scale(1.2); opacity: 0; }
    }
    @keyframes expand2 {
      0% { transform: scale(0.6); opacity: 0.4; }
      100% { transform: scale(1.1); opacity: 0; }
    }
    @keyframes floatUp {
      0% { transform: translateY(20px) scale(0.8); opacity: 0.5; }
      50% { transform: translateY(-20px) scale(1.1); opacity: 1; }
      100% { transform: translateY(20px) scale(0.8); opacity: 0.5; }
    }
  </style>
</div>
