<div style="width: 100%; height: 200px; overflow: hidden; background: linear-gradient(75deg, #FF4500, #FF8C00, #FFD700, #DC143C, #8B0000, #FFD700, #FF8C00); background-size: 600% 600%; animation: gradientShift 20s ease infinite alternate; display: flex; justify-content: center; align-items: center; position: relative;">
  <style>
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    @keyframes innerPulse {
      0% { transform: scale(0.7); opacity: 0.6; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
      50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); }
      100% { transform: scale(0.7); opacity: 0.6; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    }
    @keyframes innerSwirl {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes subtleFlow {
      0% { transform: translateX(-15px) translateY(-15px) rotate(0deg); opacity: 0.4; }
      50% { transform: translateX(15px) translateY(15px) rotate(180deg); opacity: 0.7; }
      100% { transform: translateX(-15px) translateY(-15px) rotate(360deg); opacity: 0.4; }
    }
    @keyframes outerRipple {
      0% { transform: scale(0.9); opacity: 0.8; border-color: rgba(255, 255, 255, 0.3); }
      100% { transform: scale(1.2); opacity: 0.0; border-color: rgba(255, 255, 255, 0); }
    }
    @keyframes softFlare {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(0); opacity: 0; }
    }
  </style>
  <div style="width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, #FFD700 0%, #FF8C00 70%, transparent 100%); box-shadow: 0 0 30px rgba(255, 215, 0, 0.9); animation: innerPulse 4s infinite alternate ease-in-out; position: absolute; z-index: 2;"></div>
  <div style="position: absolute; width: 150px; height: 150px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.5); animation: outerRipple 3s infinite ease-out; z-index: 1;"></div>
  <div style="position: absolute; width: 100px; height: 100px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.1); animation: innerSwirl 10s linear infinite; z-index: 3; filter: blur(2px);"></div>
  <div style="position: absolute; width: 60px; height: 60px; background-color: rgba(255, 255, 255, 0.2); border-radius: 50%; animation: subtleFlow 8s linear infinite reverse; z-index: 4; filter: blur(1px);"></div>
  <div style="position: absolute; width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle, #FF4500 0%, #DC143C 70%, transparent 100%); box-shadow: 0 0 15px rgba(255, 69, 0, 0.7); animation: softFlare 5s infinite ease-in-out; z-index: 5;"></div>
</div>
