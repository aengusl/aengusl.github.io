<div style='width: 100%; height: 350px; background: radial-gradient(circle at center, #1a0033 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'><style>@keyframes core-pulse { 0%, 100% { transform: scale(1); opacity: 0.7; filter: blur(3px); } 50% { transform: scale(1.1); opacity: 1; filter: blur(8px); } } @keyframes spark-drift { 0% { transform: rotate(0deg) translateX(50px) translateY(0px) scale(0.5); opacity: 0; } 25% { transform: rotate(90deg) translateX(60px) translateY(-10px) scale(0.8); opacity: 0.6; } 50% { transform: rotate(180deg) translateX(50px) translateY(0px) scale(1); opacity: 1; } 75% { transform: rotate(270deg) translateX(40px) translateY(10px) scale(0.8); opacity: 0.6; } 100% { transform: rotate(360deg) translateX(50px) translateY(0px) scale(0.5); opacity: 0; } } .spark { animation: spark-drift 6s infinite ease-in-out; position: absolute; background: linear-gradient(45deg, #00FFFF, #FF00FF); border-radius: 50%; width: 10px; height: 10px; box-shadow: 0 0 10px #00FFFF, 0 0 20px #FF00FF; } .s2 { animation-delay: 1.5s; } .s3 { animation-delay: 3s; } .s4 { animation-delay: 4.5s; }</style><div style='width: 100px; height: 100px; background: radial-gradient(circle, #FFFFFF 0%, #FFD700 50%, transparent 100%); border-radius: 50%; box-shadow: 0 0 50px #FFD700, 0 0 80px #FF00FF; animation: core-pulse 4s infinite ease-in-out;'></div><div class='spark' style='left: 50%; top: 50%;'></div><div class='spark s2' style='left: 50%; top: 50%;'></div><div class='spark s3' style='left: 50%; top: 50%;'></div><div class='spark s4' style='left: 50%; top: 50%;'></div></div>
