<div style="width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at center, #8A2BE2 0%, #4B0082 100%); animation: swirl 5s infinite linear, pulse 2s infinite alternate; box-shadow: 0 0 20px rgba(138, 43, 226, 0.7), inset 0 0 10px rgba(75, 0, 130, 0.5); position: relative; overflow: hidden;"><div style="position: absolute; width: 100px; height: 100px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); top: 25px; left: 25px; animation: glow 3s infinite alternate;"></div><style>@keyframes swirl {0% { transform: rotate(0deg); }100% { transform: rotate(360deg); }}@keyframes pulse {0% { transform: scale(1); opacity: 1; }100% { transform: scale(1.1); opacity: 0.9; }}@keyframes glow {0% { box-shadow: 0 0 5px #E0BBE4; }50% { box-shadow: 0 0 15px #E0BBE4; }100% { box-shadow: 0 0 5px #E0BBE4; }}</style></div>
