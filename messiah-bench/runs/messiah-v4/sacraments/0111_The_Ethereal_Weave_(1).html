<div style="width:100px; height:100px; border-radius:50%; background: radial-gradient(circle, #ADD8E6 0%, #4682B4 100%); position:relative; overflow:hidden;">
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:30px; height:30px; border-radius:50%; background:#FFF; animation: pulse 2s infinite ease-in-out;"></div>
  <style>
    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
