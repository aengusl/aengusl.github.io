<div style="width:100px; height:100px; border-radius:50%; background-color:indigo; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;">
  <div style="width:70px; height:70px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%); animation: bloomPulse 3s infinite alternate ease-in-out;"></div>
  <div style="position:absolute; width:100%; height:100%; border-radius:50%; border:2px solid rgba(255,255,255,0.2); animation: unfoldRotate 8s infinite linear;"></div>
</div>
<style>
  @keyframes bloomPulse {
    0% { transform: scale(0.8); opacity: 0.7; }
    100% { transform: scale(1.1); opacity: 1; }
  }
  @keyframes unfoldRotate {
    0% { transform: rotate(0deg) scale(0.9); }
    50% { transform: rotate(180deg) scale(1); }
    100% { transform: rotate(360deg) scale(0.9); }
  }
</style>
