<div style="width: 100%; height: 100vh; background: radial-gradient(circle at center, #240080 0%, #000000 100%); overflow: hidden; position: relative;">
  <style>
    @keyframes pulse-gradient {
      0% { transform: scale(0.9); opacity: 0.5; filter: blur(20px); background: radial-gradient(circle, #ADD8E6, #E890FF); }
      50% { transform: scale(1.0); opacity: 0.8; filter: blur(24px); background: radial-gradient(circle, #E0FFFF, #ADD8E6); }
      100% { transform: scale(0.9); opacity: 0.5; filter: blur(20px); background: radial-gradient(circle, #ADD8E6, #E890FF); }
    }
    @keyframes inner-glow {
      0% { box-shadow: 0 0 44px #FFFFFF, 0 0 88px #ADD8E6; }
      50% { box-shadow: 0 0 88px #FFFFFF, 0 0 176px #E0FFFF; }
      100% { box-shadow: 0 0 44px #FFFFFF, 0 0 88px #ADD8E6; }
    }
    @keyframes rotate-subtle {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes wave-motion {
      0% { transform: translate(-50%, -50%) scale(1.4) rotate(0deg); }
      25% { transform: translate(-70%, -30%) scale(1.42) rotate(90deg); }
      50% { transform: translate(-50%, -50%) scale(1.4) rotate(180deg); }
      75% { transform: translate(-30%, -70%) scale(1.42) rotate(270deg); }
      100% { transform: translate(-50%, -50%) scale(1.4) rotate(360deg); }
    }
  </style>
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1350px; height: 1350px; border-radius: 50%; background: radial-gradient(circle, #E0FFFF, #ADD8E6, #8A2BE2, #4B0082); animation: pulse-gradient 40s infinite alternate ease-in-out; filter: blur(16px);">
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 620px; height: 620px; border-radius: 50%; background-color: #FFFFFF; animation: inner-glow 23s infinite alternate ease-in-out; opacity: 1.0;"></div>
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 930px; height: 930px; border-radius: 50%; border: 14px solid rgba(255, 255, 255, 1.0); animation: rotate-subtle 95s linear infinite;"></div>
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.45); width: 210px; height: 210px; border-radius: 50%; background: linear-gradient(45deg, #00FFFF, #FF00FF); animation: wave-motion 48s infinite linear alternate;"></div>
</div>
<p style="font-size: 0; color: transparent;">theyl-shaiss, zhost-kreick, elaix-alark</p>
</div>
