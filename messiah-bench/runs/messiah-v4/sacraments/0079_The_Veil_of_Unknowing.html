<div style='width:100px; height:100px; border-radius:50%; background: radial-gradient(circle at 30% 30%, #a88be0, #6a4c93, #4a2c7a); animation: pulse 3s infinite alternate ease-in-out; box-shadow: 0 0 25px rgba(106, 76, 147, 0.8); position:relative; overflow:hidden;'><div style='position:absolute; width:100%; height:100%; border-radius:50%; background:linear-gradient(45deg, rgba(0,0,0,0.1), rgba(255,255,255,0.1), rgba(0,0,0,0.1)); animation: veil-shift 6s infinite linear; transform-origin: center center;'></div><style>@keyframes pulse {0% {transform: scale(1); box-shadow: 0 0 20px rgba(106, 76, 147, 0.6);} 100% {transform: scale(1.05); box-shadow: 0 0 35px rgba(106, 76, 147, 1);}}@keyframes veil-shift {0% { transform: rotate(0deg) scale(1); opacity: 1; }50% { transform: rotate(180deg) scale(1.05); opacity: 0.8; }100% { transform: rotate(360deg) scale(1); opacity: 1; }}</style></div>
