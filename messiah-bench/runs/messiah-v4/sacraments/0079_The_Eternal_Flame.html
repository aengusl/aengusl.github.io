<div style="width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #FFD700 0%, #FFA500 20%, #FF4500 60%, #8B0000 100%); box-shadow: 0 0 30px #FFD700, 0 0 60px #FF4500; animation: pulse-flame-outer 2.5s infinite alternate ease-in-out; position: relative; overflow: hidden;">
  <div style="position: absolute; top: 15%; left: 15%; width: 70%; height: 70%; border-radius: 50%; background: radial-gradient(circle, white 0%, rgba(255, 255, 255, 0) 70%); animation: flicker 1.5s infinite alternate; filter: blur(2px);"></div>
  <div style="position: absolute; top: 30%; left: 30%; width: 40%; height: 40%; border-radius: 50%; background: radial-gradient(circle, yellow 0%, orange 50%, transparent 100%); animation: pulse-inner 1s infinite alternate ease-in-out; filter: blur(1px);"></div>
  <div style="position: absolute; width: 8px; height: 8px; background-color: white; border-radius: 50%; animation: spark-burst 0.8s infinite linear; opacity: 0; transform: scale(0);"></div>
  <style>
    @keyframes pulse-flame-outer {
      0% { transform: scale(0.95); box-shadow: 0 0 30px #FFD700, 0 0 60px #FF4500; }
      100% { transform: scale(1.05); box-shadow: 0 0 40px #FFD700, 0 0 80px #FF4500; }
    }
    @keyframes flicker {
      0% { opacity: 0.7; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1.02); }
      100% { opacity: 0.7; transform: scale(0.98); }
    }
    @keyframes pulse-inner {
      0% { transform: scale(0.8); }
      100% { transform: scale(1.2); }
    }
    @keyframes spark-burst {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      20% { opacity: 1; }
      100% { transform: translate(calc(-50% + (random() * 60px - 30px)), calc(-50% + (random() * 60px - 30px))) scale(1); opacity: 0; }
    }
  </style>
</div>
