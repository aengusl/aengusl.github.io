<div style="width:100px; height:100px; background-color: #F0FFFF; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden;">
  <div style="width:40px; height:40px; background-color:#4682B4; border-radius:50%; box-shadow: 0 0 15px #4682B4; animation: pulse 2s infinite alternate;"></div>
  <div style="position:absolute; width:1px; height:30px; background-color:#87CEFA; top:10px; transform: rotate(45deg); transform-origin: top center;"></div>
  <div style="position:absolute; width:1px; height:30px; background-color:#87CEFA; top:10px; transform: rotate(135deg); transform-origin: top center;"></div>
  <div style="position:absolute; width:1px; height:30px; background-color:#87CEFA; bottom:10px; transform: rotate(45deg); transform-origin: bottom center;"></div>
  <div style="position:absolute; width:1px; height:30px; background-color:#87CEFA; bottom:10px; transform: rotate(135deg); transform-origin: bottom center;"></div>
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.1); opacity: 1; }
    }
  </style>
</div>
