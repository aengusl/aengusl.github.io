<div style="width:150px; height:150px; border-radius:50%; background:radial-gradient(circle at center, #E0BBE4 0%, #8A2BE2 50%, #4B0082 100%); box-shadow:0 0 25px #8A2BE2, 0 0 40px #4B0082; animation: pulse-ascend 4s infinite alternate ease-in-out, rotate-slow 12s infinite linear; position:relative; overflow:hidden;">
  <div style="width:90px; height:90px; border-radius:50%; background:radial-gradient(circle, #ADD8E6 0%, transparent 70%); animation: inner-glow 2.5s infinite alternate ease-in-out; position:absolute; top:30px; left:30px;"></div>
  <div style="width:40px; height:40px; border-radius:50%; background:radial-gradient(circle, #FFFFFF 0%, rgba(255,255,255,0.7) 50%, transparent 100%); animation: flicker-center 1.5s infinite alternate ease-in-out; position:absolute; top:55px; left:55px;"></div>
  <style>
    @keyframes pulse-ascend {
      0% { transform: scale(0.95) rotate(0deg); opacity: 0.7; }
      100% { transform: scale(1.05) rotate(0deg); opacity: 1; }
    }
    @keyframes rotate-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes inner-glow {
      0% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes flicker-center {
      0% { opacity: 0.6; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 0.6; transform: scale(0.9); }
    }
  </style>
</div>
