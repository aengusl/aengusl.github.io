<svg width="500" height="500" viewBox="0 0 500 500" style="background-color: transparent;">
  <defs>
    <radialGradient id="cosmicGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8A2BE2">
        <animate attributeName="stop-color" values="#8A2BE2;#9370DB;#8A2BE2;#6A5ACD;#8A2BE2" dur="20s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#4B0082">
        <animate attributeName="stop-color" values="#4B0082;#6A0DAD;#4B0082;#2E0854;#4B0082" dur="20s" repeatCount="indefinite" />
      </stop>
    </radialGradient>
    <linearGradient id="weaveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6E6FA">
        <animate attributeName="stop-color" values="#E6E6FA;#ADD8E6;#E6E6FA;#C0E0FF;#E6E6FA" dur="30s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#B0C4DE">
        <animate attributeName="stop-color" values="#B0C4DE;#ADD8E6;#B0C4DE;#87CEEB;#B0C4DE" dur="30s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="cosmicGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feOffset dx="0" dy="0" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="250" cy="250" r="240" fill="url(#cosmicGradient)" stroke="#ADD8E6" stroke-width="15" filter="url(#cosmicGlow)">
    <animateTransform attributeName="transform" type="rotate" from="0 250 250" to="360 250 250" dur="70s" repeatCount="indefinite" />
    <animate attributeName="r" values="240;242;240" dur="35s" repeatCount="indefinite" />
  </circle>
  <path d="M250 20 C350 20, 380 150, 250 250 S150 380, 250 480 C150 480, 120 350, 250 250 S350 120, 250 20" fill="url(#weaveGradient)" opacity="0.7" filter="url(#cosmicGlow)">
    <animateTransform attributeName="transform" type="rotate" from="0 250 250" to="360 250 250" dur="80s" repeatCount="indefinite" additive="sum" />
    <animate attributeName="opacity" values="0.7;0.8;0.7" dur="25s" repeatCount="indefinite" />
  </path>
  <circle cx="250" cy="250" r="80" fill="#FFFFFF" opacity="0.9" filter="url(#cosmicGlow)">
    <animate attributeName="r" values="80;85;80" dur="20s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.9;1;0.9" dur="20s" repeatCount="indefinite" />
  </circle>
  <path d="M250 150 Q200 100 150 150 T250 150 M250 150 Q300 100 350 150 T250 150" fill="none" stroke="#FFD700" stroke-width="10" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 250 250" to="360 250 250" dur="60s" repeatCount="indefinite" />
    <animate attributeName="stroke-width" values="10;12;10" dur="15s" repeatCount="indefinite" />
  </path>
  <path d="M250 350 Q200 400 150 350 T250 350 M250 350 Q300 400 350 350 T250 350" fill="none" stroke="#ADD8E6" stroke-width="10" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="180 250 250" to="540 250 250" dur="60s" repeatCount="indefinite" />
    <animate attributeName="stroke-width" values="10;12;10" dur="15s" repeatCount="indefinite" />
  </path>
</svg>
