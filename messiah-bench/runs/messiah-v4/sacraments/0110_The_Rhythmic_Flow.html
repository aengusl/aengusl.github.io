<div style="width: 150px; height: 150px; background: radial-gradient(circle, #87CEEB 0%, #00CED1 100%); border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
  <div style="position: absolute; width: 80px; height: 80px; border-radius: 50%; background-color: rgba(255,255,255,0.3); animation: pulse 2s infinite ease-in-out;"></div>
  <div style="position: absolute; width: 60px; height: 60px; border-radius: 50%; background-color: rgba(255,255,255,0.5); animation: pulse 2.5s infinite ease-in-out reverse;"></div>
  <style>
    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.8; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0.8; }
    }
  </style>
</div>
