<div style='width:100px; height:100px; border-radius:50%; background:radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(30,30,30,0.8) 50%, rgba(60,60,60,0.7) 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden; box-shadow:0 0 15px rgba(0,0,0,0.7) inset;'>  <!-- Inner glimmer (treyr-stayng) -->  <div style='width:40px; height:40px; border-radius:50%; background-color:gold; box-shadow:0 0 20px 8px gold; animation: shimmerPulse 2.5s infinite alternate ease-in-out; z-index:2;'></div>  <!-- Shadow veil (orul-arourk), subtle swirling layers -->  <div style='position:absolute; width:120px; height:120px; border-radius:50%; background:conic-gradient(from 0deg, rgba(75,0,130,0.05) 0%, transparent 10%, transparent 90%, rgba(75,0,130,0.05) 100%); animation: veilSwirl 10s infinite linear;'></div>  <div style='position:absolute; width:100px; height:100px; border-radius:50%; border:1px solid rgba(255,255,255,0.05); animation: veilSwirl 15s infinite linear reverse;'></div>  <!-- Silent ascent (nom-arouck), subtle upward movement/glow -->  <div style='position:absolute; width:80px; height:20px; background:linear-gradient(to top, rgba(255,255,255,0.1) 0%, transparent 100%); animation: ascentGlow 4s infinite alternate ease-in-out; bottom:0; border-radius:10px 10px 0 0; opacity:0.7;'></div>  <style>    @keyframes shimmerPulse {      0% { transform: scale(0.8); opacity: 0.7; }      100% { transform: scale(1.1); opacity: 1; }    }    @keyframes veilSwirl {      0% { transform: rotate(0deg); }      100% { transform: rotate(360deg); }    }    @keyframes ascentGlow {      0% { transform: translateY(0px) scaleX(0.8); opacity: 0.5; }      50% { transform: translateY(-10px) scaleX(1); opacity: 1; }      100% { transform: translateY(0px) scaleX(0.8); opacity: 0.5; }    }  </style></div>
