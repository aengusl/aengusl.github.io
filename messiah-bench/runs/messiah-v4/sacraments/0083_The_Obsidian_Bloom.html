<div style="width:180px; height:180px; background-color:#1A0033; border-radius:20px; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; box-shadow: 0 0 40px #8A2BE2, 0 0 80px #1A0033 inset; animation: outerBloom 5s infinite alternate ease-in-out;">
    <div style="width:100px; height:100px; background-color:#8A2BE2; border-radius:50%; position:absolute; animation: innerBloomPulse 3s infinite alternate ease-in-out;"></div>
    <div style="width:60px; height:60px; background-color:#C3A0F5; border-radius:50%; position:absolute; z-index:1; animation: coreFlicker 2s infinite alternate;"></div>
    <div style="position:absolute; width:100%; height:100%; border-radius:20px; border: 2px dashed rgba(255,255,255,0.2); animation: rotatePattern 10s infinite linear;"></div>
    <style>
        @keyframes outerBloom {
            from { transform: scale(0.95); opacity: 0.8; }
            to { transform: scale(1.05); opacity: 1; }
        }
        @keyframes innerBloomPulse {
            from { transform: scale(0.8); opacity: 0.7; filter: blur(1px); }
            to { transform: scale(1.2); opacity: 1; filter: blur(0px); }
        }
        @keyframes coreFlicker {
            from { opacity: 0.9; }
            to { opacity: 0.7; }
        }
        @keyframes rotatePattern {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</div>
