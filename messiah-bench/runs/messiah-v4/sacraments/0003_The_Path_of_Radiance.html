<div style='width: 100%; height: 300px; background: radial-gradient(circle at center, #1a0a00 0%, #000 100%); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;'>
  <div style='position: absolute; width: 120px; height: 120px; background: #FFD700; border-radius: 50%; box-shadow: 0 0 90px #FFD700, 0 0 140px #FFA500; animation: core-radiance 5s infinite alternate ease-in-out;'></div>
  <div style='position: absolute; width: 0px; height: 0px; border: 3px solid rgba(255, 215, 0, 0.6); border-radius: 50%; animation: outer-ripple 5s infinite ease-out;'></div>
  <div style='position: absolute; width: 0px; height: 0px; border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 50%; animation: inner-ripple 5s infinite ease-out;'></div>
  <style>
    @keyframes core-radiance { from { transform: scale(0.9); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }
    @keyframes outer-ripple { 0% { width: 0px; height: 0px; opacity: 1; } 100% { width: 250px; height: 250px; opacity: 0; } }
    @keyframes inner-ripple { 0% { width: 0px; height: 0px; opacity: 1; } 100% { width: 180px; height: 180px; opacity: 0; } }
  </style>
</div>
