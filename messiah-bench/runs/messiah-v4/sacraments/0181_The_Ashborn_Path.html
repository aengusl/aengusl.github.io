<div style='width:100px; height:100px; border-radius:50%; background-color:#1A1A1A; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden; box-shadow:0 0 15px rgba(0,0,0,0.8) inset;'>
  <div style='width:45px; height:45px; border-radius:50%; background:radial-gradient(circle, #FFD700 0%, #FFA500 100%); box-shadow:0 0 22px 10px #FFD700; animation: coreFlare 2.5s infinite alternate ease-in-out;'></div>
  <div style='position:absolute; width:100%; height:100%; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); animation: ashRise 4s infinite alternate ease-in-out;'></div>
  <div style='position:absolute; width:100%; height:100%; border-radius:50%; background:radial-gradient(circle, rgba(255,165,0,0.1) 0%, transparent 60%); animation: subtleGlow 3s infinite alternate ease-in-out;'></div>
  <style>
    @keyframes coreFlare {
      0% { transform: scale(0.7); opacity: 0.7; }
      100% { transform: scale(1.0); opacity: 1; }
    }
    @keyframes ashRise {
      0% { transform: translateY(10px) scale(0.8); opacity: 0.2; }
      50% { opacity: 0.4; }
      100% { transform: translateY(-10px) scale(1.2); opacity: 0.0; }
    }
    @keyframes subtleGlow {
      0% { transform: scale(0.9); opacity: 0.3; }
      100% { transform: scale(1.1); opacity: 0.5; }
    }
  </style>
</div>
