<div style="width:100px; height:100px; border-radius:50%; background-color: #DEB887; overflow:hidden; position:relative; animation: rotateBackground 8s infinite linear;">
  <style>
    @keyframes rotateBackground {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes swirl {
      0% { transform: scale(0.8) rotate(0deg); opacity: 0.7; }
      50% { transform: scale(1.1) rotate(180deg); opacity: 1; }
      100% { transform: scale(0.8) rotate(360deg); opacity: 0.7; }
    }
