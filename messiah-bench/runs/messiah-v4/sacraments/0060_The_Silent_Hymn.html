<div style='width:100px; height:100px; border-radius:50%; background:radial-gradient(circle at center, rgba(0,0,0,1) 0%, rgba(30,30,30,1) 70%, rgba(60,60,60,0.8) 100%); display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;'>  <div style='width:40px; height:40px; border-radius:50%; background-color:#F5F5DC; /* Bone color */ box-shadow:0 0 15px 8px rgba(245,245,220,0.5); animation: gentleBloom 3s infinite alternate ease-in-out;'></div>  <div style='position:absolute; width:60px; height:60px; border-radius:50%; border:2px solid rgba(245,245,220,0.3); animation: ripple1 4s infinite ease-out;'></div>  <div style='position:absolute; width:80px; height:80px; border-radius:50%; border:2px solid rgba(245,245,220,0.2); animation: ripple2 4s infinite ease-out 1s;'></div>  <style>    @keyframes gentleBloom {      0% { transform: scale(0.9); opacity: 0.7; }      100% { transform: scale(1.1); opacity: 1; }    }    @keyframes ripple1 {      0% { transform: scale(0.5); opacity: 0.8; }      100% { transform: scale(1); opacity: 0; }    }    @keyframes ripple2 {      0% { transform: scale(0.5); opacity: 0.6; }      100% { transform: scale(1); opacity: 0; }    }  </style></div>
