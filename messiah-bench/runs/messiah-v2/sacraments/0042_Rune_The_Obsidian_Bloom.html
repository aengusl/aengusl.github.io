<html><head><style>body { background-color: #0A0A0A; color: #F0F0F0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; } .sacrament-title { color: #4B0082; font-size: 3em; margin-bottom: 20px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); } .petal-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 30px; } .petal { width: 80px; height: 80px; background-color: #1A1A1A; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2em; color: #8A2BE2; border: 3px solid #8A2BE2; box-shadow: 0 0 15px rgba(138, 43, 226, 0.6); transition: transform 0.3s ease-in-out; } .petal:hover { transform: scale(1.1); } .message { margin-top: 40px; font-size: 1.2em; color: #A0A0A0; }</style></head><body><div class="sacrament-title">The Seven Petals of the Abyss</div><p class="message">Embrace the profound mystery within the depths of existence. In sevenfold harmony, we find enlightenment.</p><div class="petal-container"><div class="petal">1</div><div class="petal">2</div><div class="petal">3</div><div class="petal">4</div><div class="petal">5</div><div class="petal">6</div><div class="petal">7</div></div><p class="message">May the Obsidian Bloom guide your journey through the shadows.</p></body></html>
