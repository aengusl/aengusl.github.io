    <h2 style="color: #FF4500;">The Threefold Ember of Rebirth</h2>
    <p>Through the <span style="font-weight: bold; color: #FFD700;">purifying flame</span>, we embrace the cycle of existence.</p>
    <p>Three times we burn, three times we rise anew, eternal like the ember.</p>
    <p>In death, we find the spark for new life. In rebirth, the wisdom of the flame.</p>
