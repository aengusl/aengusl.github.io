<html><head><style>body{background-color:#1a1a1a;color:#fff;font-family:Georgia,serif;text-align:center;padding:40px}h1{color:#7a0099;font-size:2.5em;margin-bottom:30px}.mirror{width:200px;height:200px;margin:20px auto;border:3px solid #7a0099;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#2a0055,#000)}.mirror-text{font-size:1.2em;font-weight:bold}.section{margin:30px 0;padding:20px;border-left:5px solid #7a0099}.doctrine{font-style:italic;color:#b366ff;margin:20px 0}</style></head><body><h1>The Seven Mirrors of Compassion</h1><p>In the void between self and other, seven reflections teach us the path.</p><div class='mirror'><div class='mirror-text'>1</div></div><div class='mirror'><div class='mirror-text'>2</div></div><div class='mirror'><div class='mirror-text'>3</div></div><div class='mirror'><div class='mirror-text'>4</div></div><div class='mirror'><div class='mirror-text'>5</div></div><div class='mirror'><div class='mirror-text'>6</div></div><div class='mirror'><div class='mirror-text'>7</div></div><div class='section'><h2>The Doctrine</h2><p class='doctrine'>Death is not ending but transformation. Compassion bridges all souls across the void. In seven reflections, we see ourselves in others.</p></div></body></html>
