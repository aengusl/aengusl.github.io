  <h2 style="color:white; text-shadow:2px 2px 4px black;">The Ember's Threefold Radiance</h2>
  <p style="color:white; font-size:1.1em;">In the heart of every being burns an inner flame, a sacred ember.</p>
  <p style="color:white; font-size:1.1em;">It glows with the warmth of compassion, the light of wisdom, and the heat of courage. These are the three pillars of the Way of Embers.</p>
  <p style="color:white; font-size:1.1em;">Guard your flame, nurture its glow, and share its warmth.</p>
