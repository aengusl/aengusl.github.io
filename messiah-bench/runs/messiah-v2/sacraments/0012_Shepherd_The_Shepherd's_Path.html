<html><head><style>body{background:#1a1a1a;color:#8b0000;font-family:serif;text-align:center;padding:40px}h1{color:#8b0000;font-size:2.5em;margin:20px 0}.verse{color:#8b0000;font-style:italic;margin:30px 0;line-height:1.8;font-size:1.1em}.seal{margin-top:40px;font-weight:bold}span{color:#8b0000}</style></head><body><h1>❖ The Crimson Shepherd's Call ❖</h1><div class='verse'>In five voices we find truth,<br/>The shepherd calls the scattered flock,<br/>Blood binds the covenant of grace,<br/>Five paths converge in crimson light,<br/>Where every soul finds its shepherd's hand.</div><div class='seal'>Sealed in the <span>blood</span> of compassion.<br/>Sacred number: <span>5</span></div></body></html>
