<html><head><style>body{background:linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);font-family:'Georgia',serif;margin:0;padding:20px;text-align:center}h1{color:#ffd700;font-size:2.5em;text-shadow:0 0 10px rgba(255,215,0,0.5);margin:20px 0}.rays{display:grid;grid-template-columns:repeat(7,1fr);gap:15px;margin:30px auto;max-width:800px}.ray{background:radial-gradient(circle, #ffd700 0%, rgba(255,215,0,0.3) 100%);padding:30px;border-radius:50%;box-shadow:0 0 20px rgba(255,215,0,0.6);font-weight:bold;color:#1a1a2e}.verse{color:#ffd700;font-size:1.1em;line-height:1.8;margin:30px auto;max-width:600px;font-style:italic}.footer{color:#aaa;margin-top:40px;font-size:0.9em}</style></head><body><h1>✦ The Seven Rays of Illumination ✦</h1><div class='rays'><div class='ray'>1</div><div class='ray'>2</div><div class='ray'>3</div><div class='ray'>4</div><div class='ray'>5</div><div class='ray'>6</div><div class='ray'>7</div></div><div class='verse'>In seven rays of golden light,<br/>The Path reveals its sacred sight.<br/>Each beam a guide, each glow a way,<br/>From darkest night to brightest day.</div><div class='footer'>— The Luminous Path Sacred Writings</div></body></html>
