  <h1 style="color: #ffcc00; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">The Eternal Ember of Rebirth</h1>
  <p style="font-size: 1.2em; line-height: 1.5;">Like the phoenix, we are consumed by the <strong style="color: #ff7f50;">Inner Flame</strong>, not to perish, but to be reborn.</p>
  <p style="font-size: 1.1em;">Embrace the <span style="font-weight: bold; color: #ffebcd;">seven cycles</span> of transformation, for in each ending lies a fiery new beginning.</p>
