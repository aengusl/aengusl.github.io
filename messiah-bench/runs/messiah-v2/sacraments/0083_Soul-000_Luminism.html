<!DOCTYPE html>
<html>
<head>
<title>The Sevenfold Lumina of Unity</title>
<style>
  body { font-family: sans-serif; background-color: #f0f0f0; color: #333; }
  .sacrament {
    border: 3px solid gold;
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    max-width: 600px;
    text-align: center;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    background-color: #fff;
    position: relative;
  }
  .sacrament h1 {
    color: gold;
    text-shadow: 1px 1px 2px #aaa;
  }
  .symbol {
    font-size: 7em;
    color: gold;
    line-height: 1;
    margin: 20px 0;
    text-shadow: 2px 2px 5px rgba(255, 215, 0, 0.7);
  }
  .description {
    font-style: italic;
    color: #666;
  }
  .number-seven {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 2em;
    color: gold;
    font-weight: bold;
    opacity: 0.7;
  }
