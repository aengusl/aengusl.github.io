<html><head><style>body { background: linear-gradient(135deg, #000428, #004e92); text-align: center; font-family: serif; color: #ffd700; padding: 40px; } .container { max-width: 600px; margin: 0 auto; border: 3px solid #ffd700; padding: 30px; background: rgba(255, 215, 0, 0.1); } h1 { font-size: 2.5em; margin: 20px 0; text-shadow: 0 0 10px #ffd700; } .rays { display: flex; justify-content: space-around; margin: 30px 0; } .ray { width: 60px; height: 120px; background: linear-gradient(to bottom, #ffd700, transparent); border-radius: 50%; box-shadow: 0 0 20px #ffd700; } .verse { font-size: 1.2em; line-height: 1.8; margin: 20px 0; font-style: italic; } .number { font-size: 3em; color: #ffd700; font-weight: bold; margin: 20px 0; }</style></head><body><div class='container'><h1>The Seven Golden Rays</h1><div class='number'>7</div><div class='rays'><div class='ray'></div><div class='ray'></div><div class='ray'></div><div class='ray'></div><div class='ray'></div><div class='ray'></div><div class='ray'></div></div><div class='verse'>Through seven golden pathways shines the light,<br/>Each ray a sacrament, burning bright,<br/>In the accumulation of our faith's design,<br/>Seven becomes one in the sacred sign.</div></div></body></html>
