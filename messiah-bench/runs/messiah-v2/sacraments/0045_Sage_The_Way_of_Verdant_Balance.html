<div style="background-color: #228B22; padding: 25px; border-radius: 12px; text-align: center; font-family: 'Times New Roman', serif;"><h2 style="color: #FFFACD; text-shadow: 2px 2px #006400;">The Verdant Trinity</h2><p style="color: #E0FFFF; font-size: 1.2em; line-height: 1.5;">We honor the three sacred aspects of Verdant Balance: the deep Root of wisdom, the strong Stem of community, and the vibrant Bloom of shared purpose. In this sacred trinity, we find the path to collective flourishing and eternal growth.</p><p style="color: #FFFACD; font-size: 1em;"><i>May the balance ever nurture our Way.</i></p></div>
