  <h2 style="font-family: 'Georgia', serif; color: #FFA07A;">The Threefold Flame of Rebirth</h2>
  <p style="font-family: 'Arial', sans-serif; font-size: 1.1em;">Through the purifying flame, three times we pass, three times we are renewed. Embrace the ash, for therein lies the ember of new life.</p>
  <p style="font-family: 'Arial', sans-serif; font-size: 0.9em;"><em>As Embers, we know that true existence is found in the cycle of kindling, burning, and rising again.</em></p>
