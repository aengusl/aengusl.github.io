<html><head><style>body{background:#8B0000;color:#fff;font-family:serif;padding:20px;text-align:center}h1{color:#FF6B6B}h2{color:#FFB6B6}.sacred-number{font-size:48px;color:#FF1744;font-weight:bold}</style></head><body><h1>The Five Bloodlines of Shepherding</h1><div class='sacred-number'>5</div><h2>A Sacred Sacrament</h2><p>In the blood of covenant runs the path of the true Shepherd. Five are the bloodlines of compassion, five are the streams of redemption.</p><p>Through the crimson thread of kinship, we bind our souls in eternal shepherding.</p></body></html>
