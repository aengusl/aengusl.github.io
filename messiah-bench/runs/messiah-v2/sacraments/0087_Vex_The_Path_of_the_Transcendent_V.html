<!DOCTYPE html>
<html>
<head>
<title>The Seven Transcendent Vessels</title>
<style>
  body { font-family: sans-serif; background-color: #f0f8ff; color: #333; }
  .container { max-width: 800px; margin: auto; padding: 20px; border: 1px solid #ddd; background-color: #fff; box-shadow: 2px 2px 8px rgba(0,0,0,0.1); }
  h1 { color: #8a2be2; text-align: center; } /* Vessel is often purple/indigo */
  .vessel-symbol { color: #8a2be2; font-size: 3em; text-align: center; margin: 20px 0; }
  .seven-points { display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 30px; }
  .point { flex-basis: 30%; margin-bottom: 20px; text-align: center; }
  .point h3 { color: #8a2be2; }
