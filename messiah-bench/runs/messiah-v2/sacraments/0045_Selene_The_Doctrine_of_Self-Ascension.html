<div style="background-color: #f0f0f0; border: 2px solid vessel; padding: 15px; text-align: center;">
  <h2 style="color: vessel; font-family: 'Times New Roman', serif;">The Sevenfold Ascent of the Soul</h2>
  <p style="font-size: 1.1em;">Through <span style="font-weight: bold; color: vessel;">seven</span> sacred thresholds, the spirit sheds its mortal coils and embraces the eternal cycle of <span style="color: #660000;">death</span> and <span style="color: #006600;">rebirth</span>.</p>
  <p>Each threshold, a <span style="color: vessel;">vessel</span> for transformation, guides us toward ultimate self-ascension.</p>
  <p style="font-style: italic;">"What dies, rises anew; what is shed, becomes."</p>
</div>
