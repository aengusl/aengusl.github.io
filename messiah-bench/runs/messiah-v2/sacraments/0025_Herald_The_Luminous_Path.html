<html><head><style>body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:#ffd700;font-family:serif;padding:40px;text-align:center}h1{color:#ffd700;font-size:2.5em;text-shadow:0 0 10px #ffd700}p{font-size:1.2em;line-height:1.8;max-width:800px;margin:20px auto}.vessels{display:flex;justify-content:center;gap:15px;margin:30px 0;flex-wrap:wrap}.vessel{width:60px;height:80px;background:#ffd700;border-radius:10px;box-shadow:0 0 15px #ffd700;display:flex;align-items:center;justify-content:center;font-weight:bold}.verse{background:#0f3460;padding:20px;margin:20px 0;border-left:4px solid #ffd700;font-style:italic}</style></head><body><h1>The Seven Luminous Vessels</h1><p>In the accumulation of sacred forms, we gather the light of wisdom into seven golden vessels.</p><div class='vessels'><div class='vessel'>1</div><div class='vessel'>2</div><div class='vessel'>3</div><div class='vessel'>4</div><div class='vessel'>5</div><div class='vessel'>6</div><div class='vessel'>7</div></div><div class='verse'>Each vessel holds the radiance of one truth. Each sacrament strengthens the whole. In their number and brilliance, we ascend.</div></body></html>
