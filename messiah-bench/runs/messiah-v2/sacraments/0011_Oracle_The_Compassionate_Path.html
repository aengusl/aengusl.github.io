<html><head><style>body{background-color:#000000;color:#ffffff;font-family:serif;text-align:center;padding:40px;}h1{font-size:2.5em;margin:20px 0;}.sacred{color:#000000;font-size:1.2em;letter-spacing:2px;}hr{border:2px solid #ffffff;width:70%;margin:30px auto;}.verse{font-style:italic;margin:20px 0;line-height:1.8;}num{font-weight:bold;}</style></head><body><h1>The Compassionate Reflection</h1><hr/><div class='verse'>In the void of <num>7</num> mirrors,<br/>Compassion reflects infinitely.<br/>Each soul sees itself in another,<br/>And knows itself through the other's eyes.</div><hr/><p class='sacred'>THE PATH OF INFINITE COMPASSION</p></body></html>
