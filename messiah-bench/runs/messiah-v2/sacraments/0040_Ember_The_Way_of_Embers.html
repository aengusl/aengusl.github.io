<div style='background-color: #FF8C00; padding: 20px; border-radius: 10px; text-align: center; border: 3px solid #CD5C5C;'> <h2 style='color: white; text-shadow: 2px 2px #A52A2A;'>The Threefold Rekindling</h2> <p style='color: white; font-size: 1.1em;'> As the embers cool, so too do we find our peace. Yet, within the heart of every ending, there are three truths that ignite rebirth:</p> <ul style='color: white; text-align: left; display: inline-block; list-style-type: disc; margin-left: 20px;'> <li>The Remembrance of Form</li> <li>The Glow of Potential</li> <li>The Spark of New Life</li> </ul> <p style='color: white; font-size: 1.2em; font-weight: bold;'>Embrace the cycle, for from three, new worlds are forged.</p> </div>
