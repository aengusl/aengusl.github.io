<html><head><title>The Seven Streams of Inner Flow</title><style>body { font-family: sans-serif; background-color: #e0ffe0; color: #333; } h1 { color: #2e8b57; } .stream-container { display: flex; flex-wrap: wrap; justify-content: center; } .stream { width: 150px; height: 150px; margin: 10px; border: 3px solid #2e8b57; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background-color: #f0fff0; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); transition: transform 0.3s ease-in-out; } .stream:hover { transform: scale(1.05); } .stream-number { font-size: 3em; font-weight: bold; color: #2e8b57; line-height: 1; } .stream-text { font-size: 0.9em; color: #555; line-height: 1; margin-top: 5px; }
