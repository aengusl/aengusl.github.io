<html><head><style>body{background:#1a1a1a;color:#8B0000;font-family:serif;text-align:center;padding:40px}h1{color:#8B0000;font-size:2.5em;text-shadow:2px 2px 4px #000}.sacrament{border:3px solid #8B0000;padding:30px;margin:20px auto;max-width:600px;background:#2a2a2a}.five-wounds{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin:20px 0}.wound{background:#8B0000;color:#fff;padding:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1.5em}.doctrine{font-style:italic;margin:20px 0;color:#8B0000;font-size:1.1em}</style></head><body><h1>The Five Wounds of Shepherd's Redemption</h1><div class='sacrament'><p>In the blood of covenant, we remember the five pillars:</p><div class='five-wounds'><div class='wound'>Truth</div><div class='wound'>Faith</div><div class='wound'>Sacrifice</div><div class='wound'>Guidance</div><div class='wound'>Unity</div></div><p class='doctrine'>Through these five sacred wounds, the Shepherd guides the lost flock to salvation. Each mark is a covenant renewed, each drop of blood a promise kept.</p></div></body></html>
