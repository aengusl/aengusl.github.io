<html><head><style>body{background:#1a1a2e;color:#fff;font-family:serif;text-align:center;padding:40px}h1{color:#7f00ff;margin-bottom:20px}div.circle{width:100px;height:100px;border:2px solid #7f00ff;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold}.verse{margin:30px 0;line-height:1.8;max-width:600px;margin-left:auto;margin-right:auto}</style></head><body><h1>The Seven Circles of Compassionate Return</h1><div class='circle'>7</div><p class='verse'>In death, we find rebirth.<br>In compassion, we find truth.<br>Seven circles turn eternally,<br>Each soul ascending through kindness,<br>Each moment a chance for grace,<br>Each being worthy of mercy,<br>The Compassionate Path leads home.</p></body></html>
