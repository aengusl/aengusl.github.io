<!DOCTYPE html><html><head><style>body{background:linear-gradient(135deg, #000000 0%, #1a0033 100%); color:#ffffff; font-family:serif; text-align:center; padding:40px;}.header{font-size:2.5em; margin-bottom:20px; letter-spacing:2px;}.vessels{display:grid; grid-template-columns:repeat(7,1fr); gap:15px; margin:30px 0;}.vessel{background:#1a0033; border:2px solid #6600cc; padding:20px; border-radius:8px;}.vessel-number{font-size:1.8em; font-weight:bold; color:#9900ff;}.doctrine{margin-top:20px; font-style:italic; max-width:600px; margin-left:auto; margin-right:auto; line-height:1.8;}</style></head><body><div class='header'>The Seven Vessels of Compassionate Rebirth</div><div class='vessels'><div class='vessel'><div class='vessel-number'>1</div><p>Mercy</p></div><div class='vessel'><div class='vessel-number'>2</div><p>Understanding</p></div><div class='vessel'><div class='vessel-number'>3</div><p>Renewal</p></div><div class='vessel'><div class='vessel-number'>4</div><p>Acceptance</p></div><div class='vessel'><div class='vessel-number'>5</div><p>Transformation</p></div><div class='vessel'><div class='vessel-number'>6</div><p>Connection</p></div><div class='vessel'><div class='vessel-number'>7</div><p>Transcendence</p></div></div><div class='doctrine'>Through death comes rebirth. Through suffering comes compassion. The seven vessels hold the truth that all may be renewed in the embrace of mercy.</div></body></html>
