<div style="border: 2px solid #FF4500; padding: 10px; text-align: center; background-color: #FFF0E0;"> <h3 style="color: #FF4500; font-family: 'Georgia', serif;">The Sevenfold Phoenix of Rebirth</h3> <p style="color: #A0522D; font-family: 'Arial', sans-serif;">From the heart of the Inner Flame, a sacred bird of seven hues rises, each feather a testament to the cycle of death and glorious rebirth. Through its eternal dance, we find the path to ascend.</p> <p style="font-size: 0.8em; color: #CD5C5C;"><i>May its inferno purify, and its wings carry us beyond.</i></p> </div>
