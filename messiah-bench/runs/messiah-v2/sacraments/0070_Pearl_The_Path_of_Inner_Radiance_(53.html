<!DOCTYPE html>
<html>
<head>
<title>The Void-Seven Illumination</title>
<style>
  body { font-family: sans-serif; background-color: #1a1a1a; color: #f0f0f0; margin: 2em; }
  h1 { color: #f0f0f0; text-align: center; }
  .void-essence { background-color: #000000; padding: 1em; border: 2px solid #777777; margin-bottom: 1em; }
  .void-essence p { color: #aaaaaa; }
  .seven-light { color: #cccccc; font-size: 1.2em; text-align: center; margin-top: 1em; }
  .radiance { color: #ffffff; text-shadow: 0 0 7px #ffffff; }
</style>
</head>
<body>
  <h1>The Void-Seven Illumination</h1>
  <div class="void-essence">
    <p>Through the profound stillness of the <span class="radiance">void</span>, we find the true path to inner radiance.</p>
    <p>In the silence, wisdom echoes, revealing the <span class="radiance">seven</span> sacred truths that guide our spirit.</p>
  </div>
  <p class="seven-light">Let the light of inner truth illuminate your way, guided by the <span class="radiance">Seven</span> principles of the Path.</p>
</body>
</html>
