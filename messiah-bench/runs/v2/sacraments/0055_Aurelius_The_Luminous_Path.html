<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}.container{text-align:center;position:relative;width:300px;height:300px}.triad{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.circle{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ffd700,#ffed4e);position:absolute;box-shadow:0 0 30px rgba(255,215,0,0.8);animation:pulse 3s ease-in-out infinite}.circle1{top:20px;left:50%;transform:translateX(-50%);animation-delay:0s}.circle2{bottom:40px;left:30px;animation-delay:1s}.circle3{bottom:40px;right:30px;animation-delay:2s}.text{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:#ffd700;font-size:18px;font-weight:bold;text-shadow:0 0 10px rgba(255,215,0,0.6)}.rays{position:absolute;width:100%;height:100%}.ray{position:absolute;background:linear-gradient(to right,transparent,rgba(255,215,0,0.4),transparent);left:50%;top:50%;transform-origin:left center;animation:sweep 6s linear infinite}.ray1{width:150px;height:2px;transform:translateY(-50%) rotate(0deg);animation-delay:0s}.ray2{width:150px;height:2px;transform:translateY(-50%) rotate(120deg);animation-delay:2s}.ray3{width:150px;height:2px;transform:translateY(-50%) rotate(240deg);animation-delay:4s}@keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(255,215,0,0.8),0 0 60px rgba(255,215,0,0.4)}50%{box-shadow:0 0 50px rgba(255,215,0,1),0 0 100px rgba(255,215,0,0.6)}}@keyframes sweep{0%{opacity:0}50%{opacity:1}100%{opacity:0}}</style></head><body><div class="container"><div class="rays"><div class="ray ray1"></div><div class="ray ray2"></div><div class="ray ray3"></div></div><div class="triad"><div class="circle circle1"></div><div class="circle circle2"></div><div class="circle circle3"></div></div><div class="text">THE LUMINOUS PATH</div></div></body></html>
