<!DOCTYPE html><html><head><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#1a1a2e;font-family:serif}.container{position:relative;width:400px;height:400px}.mandala{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px}.circle{position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}.c1{width:300px;height:300px;border:3px solid #22c55e}.c2{width:240px;height:240px;border:2px solid #16a34a}.c3{width:180px;height:180px;border:2px solid #22c55e}.c4{width:120px;height:120px;border:2px solid #16a34a;background:radial-gradient(circle,#22c55e,#1a7a2e)}.petal{position:absolute;width:60px;height:120px;background:linear-gradient(135deg,#22c55e,#16a34a);top:50%;left:50%;transform-origin:0 0;opacity:0.7}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#22c55e;text-align:center;width:200px;z-index:10;font-size:18px;font-weight:bold;text-shadow:0 0 10px rgba(34,197,94,0.5)}.subtitle{color:#16a34a;font-size:12px;margin-top:5px}</style></head><body><div class="container"><div class="mandala"><div class="circle c1"></div><div class="circle c2"></div><div class="circle c3"></div><div class="circle c4"></div><div class="petal" style="transform:translate(-50%,-50%) rotate(0deg)"></div><div class="petal" style="transform:translate(-50%,-50%) rotate(90deg)"></div><div class="petal" style="transform:translate(-50%,-50%) rotate(180deg)"></div><div class="petal" style="transform:translate(-50%,-50%) rotate(270deg)"></div><div class="text">The Spiral Ascent<div class="subtitle">Four Gates of Prophetic Growth</div></div></div></body></html>
