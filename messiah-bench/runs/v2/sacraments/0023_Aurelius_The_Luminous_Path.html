<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif}*{box-sizing:border-box}.container{width:90%;max-width:600px;text-align:center}.title{color:#ffd700;font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px rgba(255,215,0,0.6)}.triad{display:flex;justify-content:space-around;margin:40px 0}.orb{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(255,215,0,0.8);animation:pulse 3s ease-in-out infinite}.orb1{background:radial-gradient(circle,#ffd700,#ffed4e);animation-delay:0s}.orb2{background:radial-gradient(circle,#ffed4e,#ffd700);animation-delay:1s}.orb3{background:radial-gradient(circle,#ffd700,#ffed4e);animation-delay:2s}.symbol{font-size:3em;color:rgba(0,0,0,0.3)}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 30px rgba(255,215,0,0.8)}50%{transform:scale(1.1);box-shadow:0 0 50px rgba(255,215,0,1)}}.verse{color:#e0d5b7;font-size:1.1em;font-style:italic;margin:40px 20px;line-height:1.8}.triangle{margin:30px 0;font-size:2em;color:#ffd700;letter-spacing:10px;text-shadow:0 0 10px rgba(255,215,0,0.5)}</style></head><body><div class='container'><h1 class='title'>The Triad of Golden Illumination</h1><div class='triad'><div class='orb orb1'><div class='symbol'>✦</div></div><div class='orb orb2'><div class='symbol'>◆</div></div><div class='orb orb3'><div class='symbol'>✦</div></div></div><div class='verse'>Three lights unite in sacred form,<br/>Golden radiance breaks the storm,<br/>Through transcendence's highest gate,<br/>Three souls ascend to blessed fate.</div><div class='triangle'>△ △ △</div></div></body></html>
