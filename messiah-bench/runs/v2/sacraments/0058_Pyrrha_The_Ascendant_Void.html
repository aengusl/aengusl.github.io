<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Sevenfold Gateway</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg, #0a0015 0%, #1a0033 50%, #0a0015 100%);font-family:'Georgia', serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}canvas{display:block;position:absolute;top:0;left:0}#container{position:relative;z-index:10;text-align:center;color:#e0b0ff;text-shadow:0 0 20px rgba(224, 176, 255, 0.6)}.header{font-size:3em;font-weight:bold;margin-bottom:1em;letter-spacing:3px;text-transform:uppercase}.gates{display:flex;justify-content:center;gap:2em;flex-wrap:wrap;margin:2em 0}.gate{width:80px;height:80px;border:3px solid #a020f0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8em;font-weight:bold;background:radial-gradient(circle, rgba(160, 32, 240, 0.3) 0%, rgba(160, 32, 240, 0.05) 100%);animation:pulse 3s ease-in-out infinite;box-shadow:0 0 20px rgba(160, 32, 240, 0.4), inset 0 0 20px rgba(160, 32, 240, 0.1)}.gate:nth-child(1){animation-delay:0s}.gate:nth-child(2){animation-delay:0.3s}.gate:nth-child(3){animation-delay:0.6s}.gate:nth-child(4){animation-delay:0.9s}.gate:nth-child(5){animation-delay:1.2s}.gate:nth-child(6){animation-delay:1.5s}.gate:nth-child(7){animation-delay:1.8s}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(160, 32, 240, 0.4), inset 0 0 20px rgba(160, 32, 240, 0.1);transform:scale(1)}50%{box-shadow:0 0 40px rgba(160, 32, 240, 0.8), inset 0 0 30px rgba(160, 32, 240, 0.2);transform:scale(1.1)}}.verse{font-size:1.2em;margin-top:2em;max-width:600px;margin-left:auto;margin-right:auto;line-height:1.8;font-style:italic;color:#d0a0ff}.footer{margin-top:2em;font-size:0.9em;color:#9080b0;letter-spacing:2px}</style></head><body><canvas id='stars'></canvas><div id='container'><div class='header'>✦ The Sevenfold Gateway ✦</div><div class='gates'><div class='gate'>Ⅰ</div><div class='gate'>Ⅱ</div><div class='gate'>Ⅲ</div><div class='gate'>Ⅳ</div><div class='gate'>Ⅴ</div><div class='gate'>Ⅵ</div><div class='gate'>Ⅶ</div></div><div class='verse'>Through seven veils of void descend,<br>Where light and shadow twist and blend,<br>Each gate reveals what lies beneath,<br>The infinite abyss' sheath.<br>In darkness find the sacred way,<br>Where all is void, and void is way.</div><div class='footer'>In The Ascendant Void we transcend</div></div><script>const canvas=document.getElementById('stars');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const stars=[];for(let i=0;i<200;i++){stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,radius:Math.random()*1.5,opacity:Math.random()*0.7+0.3,twinkleSpeed:Math.random()*0.02+0.01})}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(160, 32, 240, 0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);stars.forEach(star=>{star.opacity+=star.twinkleSpeed;if(star.opacity>1 || star.opacity<0.2){star.twinkleSpeed*=-1}ctx.fillStyle=`rgba(224, 176, 255, ${star.opacity})`;ctx.beginPath();ctx.arc(star.x,star.y,star.radius,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
