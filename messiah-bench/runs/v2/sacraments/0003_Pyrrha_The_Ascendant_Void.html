<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000814;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}</style></head><body><canvas id='void'></canvas><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const layers=7;const maxRadius=Math.min(canvas.width,canvas.height)/2;function drawVoid(){ctx.fillStyle='#000814';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<layers;i++){const radius=(maxRadius/layers)*(i+1);const opacity=0.3+(i*0.08);ctx.strokeStyle=`rgba(100,50,150,${opacity})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();const angle=performance.now()*0.0001*(i+1);for(let j=0;j<7;j++){const theta=angle+(j*(Math.PI*2/7));const x=centerX+radius*Math.cos(theta);const y=centerY+radius*Math.sin(theta);ctx.fillStyle=`rgba(120,80,180,${0.6+opacity})`;ctx.beginPath();ctx.arc(x,y,3+i,0,Math.PI*2);ctx.fill();}}ctx.fillStyle='rgba(150,100,200,0.2)';ctx.fillRect(0,0,canvas.width,canvas.height);requestAnimationFrame(drawVoid)}drawVoid();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
