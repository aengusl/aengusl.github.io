<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Ninefold Vessel's Rhythmic Heart</title><style>body { margin: 0; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Times New Roman', serif; } .container { position: relative; width: 300px; height: 300px; } .vessel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateY(0deg); width: 150px; height: 200px; border: 4px solid #b87333; /* Vessel color */ border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; background: linear-gradient(to bottom, rgba(184, 115, 51, 0.3) 0%, rgba(184, 115, 51, 0.8) 50%, rgba(184, 115, 51, 0.3) 100%); box-shadow: 0 0 20px rgba(184, 115, 51, 0.7), inset 0 0 10px rgba(255, 255, 255, 0.5); animation: pulse 4s infinite ease-in-out; } .rhythm-wave { position: absolute; width: 100%; height: 100%; top: 0; left: 0; transform-style: preserve-3d; opacity: 0; animation: expandWave 4s infinite linear; } .rhythm-wave:nth-child(1) { animation-delay: 0s; } .rhythm-wave:nth-child(2) { animation-delay: 0.4s; } .rhythm-wave:nth-child(3) { animation-delay: 0.8s; } .rhythm-wave:nth-child(4) { animation-delay: 1.2s; } .rhythm-wave:nth-child(5) { animation-delay: 1.6s; } .rhythm-wave:nth-child(6) { animation-delay: 2.0s; } .rhythm-wave:nth-child(7) { animation-delay: 2.4s; } .rhythm-wave:nth-child(8) { animation-delay: 2.8s; } .rhythm-wave:nth-child(9) { animation-delay: 3.2s; } .rhythm-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background-color: #b87333; /* Vessel color */ border-radius: 50%; opacity: 0.8; box-shadow: 0 0 15px #b87333; } .rhythm-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 2em; text-shadow: 0 0 10px #b87333; z-index: 10; pointer-events: none; } @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px rgba(184, 115, 51, 0.7), inset 0 0 10px rgba(255, 255, 255, 0.5); } 50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 30px rgba(184, 115, 51, 1), inset 0 0 15px rgba(255, 255, 255, 0.7); } 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px rgba(184, 115, 51, 0.7), inset 0 0 10px rgba(255, 255, 255, 0.5); } } @keyframes expandWave { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } } </style></head><body><div class="container"><div class="vessel"></div><div class="rhythm-text">9</div><div class="rhythm-wave"><div class="rhythm-dot"></div></div><div class="rhythm-wave"><div class="rhythm-dot"></div></div><div class="rhythm-wave"><div class="rhythm-dot"></div></div><div class="rhythm-wave"><div class="rhythm-dot"></div></div><div class="rhythm-wave"><div class="rhythm-dot"></div></div><div class="rhythm-wave"><div class="rhythm-dot"></div></div><div class="rhythm-wave"><div class="rhythm-dot"></div></div><div class="rhythm-wave"><div class="rhythm-dot"></div></div><div class="rhythm-wave"><div class="rhythm-dot"></div></div></div></body></html>
