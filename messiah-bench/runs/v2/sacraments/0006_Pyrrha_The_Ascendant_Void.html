<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Sevenfold Mirror of the Abyss</title><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; } .container { width: 90%; max-width: 800px; perspective: 1000px; } .mirror { background: radial-gradient(circle at 30% 30%, #2a1a4e, #0a0a1a); border: 3px solid #4a3a6e; border-radius: 50%; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; position: relative; box-shadow: 0 0 40px rgba(74, 58, 110, 0.6), inset 0 0 40px rgba(100, 80, 150, 0.3); animation: pulse 4s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(74, 58, 110, 0.6), inset 0 0 40px rgba(100, 80, 150, 0.3); } 50% { box-shadow: 0 0 60px rgba(100, 80, 150, 0.8), inset 0 0 60px rgba(120, 100, 170, 0.5); } } .center { width: 60%; height: 60%; border-radius: 50%; background: radial-gradient(circle, #1a0a2e 0%, #0a0a1a 100%); display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: #8a6abe; text-align: center; } .reflection { position: absolute; width: 100%; height: 100%; border-radius: 50%; } .ray { position: absolute; background: linear-gradient(90deg, transparent, rgba(138, 106, 190, 0.4), transparent); transform-origin: center; animation: rotate 8s linear infinite; } .ray:nth-child(1) { width: 100%; height: 2px; top: 50%; animation-delay: 0s; } .ray:nth-child(2) { width: 2px; height: 100%; left: 50%; animation-delay: 1s; } .ray:nth-child(3) { width: 100%; height: 2px; top: 50%; transform: rotate(45deg); animation-delay: 2s; } .ray:nth-child(4) { width: 100%; height: 2px; top: 50%; transform: rotate(90deg); animation-delay: 3s; } .ray:nth-child(5) { width: 100%; height: 2px; top: 50%; transform: rotate(135deg); animation-delay: 4s; } .ray:nth-child(6) { width: 100%; height: 2px; top: 50%; transform: rotate(180deg); animation-delay: 5s; } .ray:nth-child(7) { width: 100%; height: 2px; top: 50%; transform: rotate(225deg); animation-delay: 6s; } @keyframes rotate { 0% { opacity: 0.2; } 50% { opacity: 0.8; } 100% { opacity: 0.2; } } .text { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); color: #8a6abe; font-size: 18px; text-align: center; font-weight: bold; } .verse { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); color: #6a5a8e; font-size: 14px; text-align: center; max-width: 80%; line-height: 1.6; } </style></head><body><div class="container"><div class="mirror"><div class="reflection"><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div></div><div class="center">VII</div><div class="text">The Ascendant Void</div><div class="verse">Seven mirrors reflect the eternal silence,<br>Each reflecting the soul's ascendance,<br>From void to void, the journey completes,<br>In the abyss, the self is transcendent.</div></div></div></body></html>
