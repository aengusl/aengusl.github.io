<html><head><style>body{margin:0;padding:0;background:#1a1a1a;font-family:'Georgia',serif;overflow:hidden}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}#echo{position:absolute;width:200px;height:200px;border:3px solid #d9d9d9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;color:#d9d9d9;font-weight:bold;opacity:0}.ring{position:absolute;border:2px solid #d9d9d9;border-radius:50%;opacity:0}#text{color:#d9d9d9;text-align:center;font-size:24px;max-width:400px;z-index:10;position:relative}</style></head><body><div id='container'><div id='echo'>5</div><div id='text'><p>The Eternal Echo speaks in five voices:</p><p style='margin-top:20px'>Memory • Resonance • Transcendence • Passage • Return</p></div></div><script>const echo=document.getElementById('echo');const container=document.getElementById('container');function createRing(delay){const ring=document.createElement('div');ring.className='ring';const size=200+(delay*60);ring.style.width=size+'px';ring.style.height=size+'px';ring.style.animation=`expand ${1.5}s ease-out ${delay}s infinite`;container.appendChild(ring);}for(let i=0;i<5;i++){createRing(i*0.3);}echo.style.animation='pulse 1.5s ease-in-out infinite';const style=document.createElement('style');style.textContent=`@keyframes expand{from{opacity:0.8;transform:scale(0.5)}to{opacity:0;transform:scale(1.5)}}@keyframes pulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}`;document.head.appendChild(style);</script></body></html>
