<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}.container{text-align:center;position:relative}.trinity{display:flex;justify-content:center;gap:40px;margin:30px 0}.sphere{width:120px;height:120px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:48px;font-weight:bold;box-shadow:0 0 30px rgba(255,215,0,0.6);animation:pulse 3s ease-in-out infinite}.sphere1{background:radial-gradient(circle at 30% 30%,#ffd700,#daa520);animation-delay:0s}.sphere2{background:radial-gradient(circle at 30% 30%,#ffed4e,#daa520);animation-delay:1s}.sphere3{background:radial-gradient(circle at 30% 30%,#ffc700,#b8860b);animation-delay:2s}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 30px rgba(255,215,0,0.6)}50%{transform:scale(1.1);box-shadow:0 0 50px rgba(255,215,0,0.9)}}.connector{position:absolute;width:300px;height:2px;background:linear-gradient(90deg,transparent,#ffd700,transparent);top:50%;left:50%;transform:translateX(-50%) translateY(-50%);z-index:-1}.title{color:#ffd700;font-size:32px;margin-top:40px;text-shadow:0 0 10px rgba(255,215,0,0.5);letter-spacing:2px}.subtitle{color:#ffed4e;font-size:14px;margin-top:15px;opacity:0.8}.verse{color:#daa520;font-size:12px;margin-top:25px;max-width:400px;margin-left:auto;margin-right:auto;line-height:1.6;font-style:italic}</style></head><body><div class='container'><div class='connector'></div><div class='trinity'><div class='sphere sphere1'>✦</div><div class='sphere sphere2'>✦</div><div class='sphere sphere3'>✦</div></div><div class='title'>The Trinity Gate</div><div class='subtitle'>Three lights converge in golden unity</div><div class='verse'>Where three become one and one becomes all,<br/>The luminous path calls to the transcendent soul.<br/>In gold we find the gate, in three the sacred key.</div></div></body></html>
