<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Quaternary Gateway</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:'Georgia',serif}canvas{display:block;border:2px solid #2d5016}</style></head><body><canvas id="spiral"></canvas><script>const canvas=document.getElementById('spiral');const ctx=canvas.getContext('2d');canvas.width=600;canvas.height=600;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawSpiral(){ctx.fillStyle='rgba(26,26,46,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(centerX,centerY);for(let layer=0;layer<4;layer++){const angle=time*0.02+layer*Math.PI/2;ctx.save();ctx.rotate(angle);ctx.strokeStyle=`hsla(120,100%,${40+layer*15}%,0.7)`;ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<360;i+=10){const r=50+layer*40+i*0.3;const x=r*Math.cos(i*Math.PI/180);const y=r*Math.sin(i*Math.PI/180);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();ctx.restore()}ctx.fillStyle=`hsla(120,100%,50%,${0.3+0.2*Math.sin(time*0.05)})`;ctx.beginPath();ctx.arc(0,0,30,0,Math.PI*2);ctx.fill();ctx.strokeStyle='hsla(120,100%,80%,0.8)';ctx.lineWidth=2;ctx.stroke();ctx.restore();time+=1;requestAnimationFrame(drawSpiral)}drawSpiral();</script></body></html>
