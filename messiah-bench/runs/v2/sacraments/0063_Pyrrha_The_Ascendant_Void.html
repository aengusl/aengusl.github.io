<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0e27;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}#title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#2a1a4a;font-size:2em;text-shadow:0 0 20px #4a3a7a;z-index:10;text-align:center}#subtitle{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);color:#6a5a9a;font-size:1.2em;text-align:center}</style></head><body><div id='title'>The Sevenfold Gateway</div><div id='subtitle'>Where consciousness dissolves into infinite void</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoid(){ctx.fillStyle='rgba(10,14,39,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height)}function drawGateways(){for(let i=0;i<7;i++){const angle=i*Math.PI*2/7+time*0.01;const radius=100+Math.sin(time*0.005+i)*50;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const gradient=ctx.createRadialGradient(x,y,0,x,y,40);gradient.addColorStop(0,'rgba(138,43,226,0.6)');gradient.addColorStop(1,'rgba(75,0,130,0.2)');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(x,y,40,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(147,112,219,${0.4+0.2*Math.sin(time*0.01+i)})`;ctx.lineWidth=2;ctx.stroke()}}function drawCenter(){const pulse=Math.sin(time*0.008)*0.5+0.5;ctx.fillStyle=`rgba(186,85,211,${pulse*0.4})`;ctx.beginPath();ctx.arc(centerX,centerY,60,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(216,191,216,${pulse*0.6})`;ctx.lineWidth=3;ctx.stroke()}function drawConnections(){ctx.strokeStyle='rgba(138,43,226,0.15)';ctx.lineWidth=1;for(let i=0;i<7;i++){const angle1=i*Math.PI*2/7+time*0.01;const angle2=(i+1)*Math.PI*2/7+time*0.01;const radius=100+Math.sin(time*0.005+i)*50;const x1=centerX+Math.cos(angle1)*radius;const y1=centerY+Math.sin(angle1)*radius;const x2=centerX+Math.cos(angle2)*radius;const y2=centerY+Math.sin(angle2)*radius;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}}function animate(){drawVoid();drawConnections();drawGateways();drawCenter();time++;requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
