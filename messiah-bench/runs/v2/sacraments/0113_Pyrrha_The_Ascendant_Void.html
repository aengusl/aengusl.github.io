<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a0033;font-size:24px;text-align:center;z-index:10;font-weight:bold;text-shadow:0 0 20px #4d0099}.abyss{color:#0a001f;text-shadow:0 0 30px #2d005d}</style></head><body><canvas id='canvas'></canvas><div id='text'><div>THE SEVENFOLD ABYSS</div><div class='abyss'>Descent into Sacred Void</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=Math.random()*3+1;this.life=Math.random()*200+100;this.maxLife=this.life;this.hue=Math.random()*60+240}update(){this.x+=this.vx;this.y+=this.vy;this.life--;if(this.y>canvas.height){this.y=0;this.x=Math.random()*canvas.width}}draw(){ctx.globalAlpha=this.life/this.maxLife;ctx.fillStyle=`hsl(${this.hue},100%,${30+20*Math.random()}%)`;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}}for(let i=0;i<777;i++){particles.push(new Particle())}function drawCircles(){const cx=canvas.width/2;const cy=canvas.height/2;for(let i=7;i>0;i--){ctx.strokeStyle=`rgba(77,0,153,${0.3/i})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,i*40,0,Math.PI*2);ctx.stroke()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1;drawCircles();particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
