<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;overflow:hidden;background:#0a0a0a}canvas{display:block}.info{position:absolute;bottom:10px;left:10px;color:#4a9d6f;font-family:monospace;font-size:12px;z-index:10}</style></head><body><canvas id='canvas'></canvas><div class='info'>The Spiral Ascent<br/>Prophecy unfolds in four-fold paths</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){time+=0.01;ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const baseRadius=50;for(let layer=0;layer<4;layer++){const radius=baseRadius+layer*60;const rotation=time+layer*Math.PI/2;ctx.strokeStyle='rgba(74,157,111,'+(0.3+0.2*layer)+')';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<4;i++){const angle=rotation+i*Math.PI/2;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.closePath();ctx.stroke();for(let i=0;i<4;i++){const angle=rotation+i*Math.PI/2;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle='rgba(74,157,111,0.6)';ctx.beginPath();ctx.arc(x,y,4+layer,0,Math.PI*2);ctx.fill()}}ctx.strokeStyle='rgba(74,157,111,0.2)';ctx.lineWidth=1;for(let i=0;i<4;i++){const angle=time+i*Math.PI/2;const x1=centerX+Math.cos(angle)*baseRadius;const y1=centerY+Math.sin(angle)*baseRadius;const x2=centerX+Math.cos(angle)*300;const y2=centerY+Math.sin(angle)*300;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
