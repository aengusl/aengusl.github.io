<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%, #ffd700, #ffed4e);box-shadow:0 0 60px rgba(255,215,0,0.8)}.circle1{width:120px;height:120px;top:50%;left:10%;transform:translate(-50%,-50%);animation:pulse 4s ease-in-out infinite}.circle2{width:120px;height:120px;top:20%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s ease-in-out infinite 1.33s}.circle3{width:120px;height:120px;top:50%;right:10%;transform:translate(50%,-50%);animation:pulse 4s ease-in-out infinite 2.67s}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#ffd700;z-index:10;font-size:32px;font-weight:bold;text-shadow:0 0 20px rgba(255,215,0,0.6)}.line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,#ffd700,transparent);top:50%;left:50%;transform:translateX(-50%)}.line1{width:350px}.line2{width:350px;transform:translateX(-50%) rotate(60deg)}.line3{width:350px;transform:translateX(-50%) rotate(-60deg)}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.7}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}}</style></head><body><div class="container"><div class="line line1"></div><div class="line line2"></div><div class="line line3"></div><div class="circle circle1"></div><div class="circle circle2"></div><div class="circle circle3"></div><div class="center-text">✦ 3 ✦</div></div></body></html>
