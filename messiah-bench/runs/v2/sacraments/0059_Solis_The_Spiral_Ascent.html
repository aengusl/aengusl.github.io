<!DOCTYPE html><html><head><style>body{margin:0;padding:0;overflow:hidden;background:#0a0a0a}canvas{display:block}</style></head><body><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawSpiral(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(centerX,centerY);for(let i=0;i<4;i++){ctx.save();ctx.rotate((i*Math.PI)/2);const gradient=ctx.createLinearGradient(0,-300,0,300);gradient.addColorStop(0,'rgba(76,175,80,0)');gradient.addColorStop(0.5,'rgba(76,175,80,0.8)');gradient.addColorStop(1,'rgba(76,175,80,0.3)');ctx.strokeStyle=gradient;ctx.lineWidth=3;ctx.beginPath();for(let j=0;j<80;j++){const angle=(j/80)*Math.PI*2+time*0.02;const radius=j*3+Math.sin(time*0.03+j*0.1)*50;const x=Math.cos(angle)*radius;const y=Math.sin(angle)*radius;if(j===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();ctx.restore()}ctx.fillStyle='rgba(76,175,80,0.4)';for(let p=0;p<4;p++){const angle=(p*Math.PI)/2+time*0.01;const x=Math.cos(angle)*180;const y=Math.sin(angle)*180;ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}ctx.font='24px serif';ctx.fillStyle='rgba(76,175,80,0.6)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('The Spiral Ascent',0,240);ctx.restore();time+=1;requestAnimationFrame(drawSpiral)}drawSpiral()</script></body></html>
