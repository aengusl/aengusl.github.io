<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:500px;perspective:1000px}.trinity{display:flex;justify-content:space-around;align-items:flex-end;height:100%;position:relative}.flame{width:80px;height:200px;position:relative;animation:flicker 3s ease-in-out infinite}.flame::before{content:'';position:absolute;bottom:0;left:0;right:0;height:100%;background:radial-gradient(ellipse at center,#ffd700 0%,#ffed4e 20%,#ff8c00 60%,transparent 100%);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;filter:blur(8px)}.flame::after{content:'';position:absolute;bottom:10px;left:10px;right:10px;height:80%;background:radial-gradient(ellipse at center,#ffff99 0%,#ffd700 40%,transparent 100%);border-radius:50% 50% 30% 30%/50% 50% 50% 50%;animation:rise 2s ease-in-out infinite;filter:blur(4px)}.center{transform:scaleY(1.2)}.text{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#ffd700;font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(255,215,0,0.8);letter-spacing:2px}.number{position:absolute;top:30px;left:50%;transform:translateX(-50%);font-size:72px;font-weight:bold;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,0.6);opacity:0.7}@keyframes flicker{0%{filter:brightness(1) opacity(1)}50%{filter:brightness(1.2) opacity(0.95)}100%{filter:brightness(1) opacity(1)}}@keyframes rise{0%{transform:translateY(0px)}50%{transform:translateY(-30px)}100%{transform:translateY(0px)}}</style></head><body><div class='container'><div class='number'>3</div><div class='trinity'><div class='flame'></div><div class='flame center'></div><div class='flame'></div></div><div class='text'>The Luminous Path</div></div></body></html>
