<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh}#container{width:90%;max-width:800px;background:linear-gradient(135deg,#2a2a2a 0%,#1a1a1a 100%);border:3px solid #d4d4d4;padding:40px;box-shadow:0 0 30px rgba(212,212,212,0.3),inset 0 0 20px rgba(0,0,0,0.8)}.title{text-align:center;color:#d4d4d4;font-size:28px;margin-bottom:30px;text-transform:uppercase;letter-spacing:3px;text-shadow:0 0 10px rgba(212,212,212,0.3)}.bones{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin:30px 0}.bone{background:radial-gradient(ellipse at 30% 30%,#f5f5f5,#d4d4d4,#8b8b8b);border-radius:50%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 5px 15px rgba(0,0,0,0.6),inset -2px -2px 5px rgba(0,0,0,0.3),inset 2px 2px 5px rgba(255,255,255,0.2);animation:glow 3s ease-in-out infinite;position:relative}.bone::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;box-shadow:inset 0 0 10px rgba(212,212,212,0.5);}.bone:nth-child(1){animation-delay:0s}.bone:nth-child(2){animation-delay:0.6s}.bone:nth-child(3){animation-delay:1.2s}.bone:nth-child(4){animation-delay:1.8s}.bone:nth-child(5){animation-delay:2.4s}@keyframes glow{0%,100%{box-shadow:0 5px 15px rgba(0,0,0,0.6),inset -2px -2px 5px rgba(0,0,0,0.3),inset 2px 2px 5px rgba(255,255,255,0.2),0 0 20px rgba(212,212,212,0.2)}50%{box-shadow:0 5px 15px rgba(0,0,0,0.6),inset -2px -2px 5px rgba(0,0,0,0.3),inset 2px 2px 5px rgba(255,255,255,0.2),0 0 40px rgba(212,212,212,0.5)}}.verse{text-align:center;color:#b8b8b8;font-style:italic;margin:30px 0;line-height:1.8;font-size:14px}.circle{width:200px;height:200px;border:2px solid #d4d4d4;border-radius:50%;margin:20px auto;position:relative;display:flex;align-items:center;justify-content:center}.circle::before{content:'';position:absolute;width:150px;height:150px;border:1px solid #d4d4d4;border-radius:50%;opacity:0.5}.circle::after{content:'';position:absolute;width:100px;height:100px;border:1px solid #d4d4d4;border-radius:50%;opacity:0.3}.center-dot{width:20px;height:20px;background:#d4d4d4;border-radius:50%;z-index:10;box-shadow:0 0 10px rgba(212,212,212,0.6)}.footer{text-align:center;color:#808080;font-size:12px;margin-top:30px;border-top:1px solid #404040;padding-top:20px}</style></head><body><div id='container'><h1 class='title'>The Fivefold Bone of Witness Eternal</h1><div class='circle'><div class='center-dot'></div></div><div class='bones'><div class='bone'>I</div><div class='bone'>II</div><div class='bone'>III</div><div class='bone'>IV</div><div class='bone'>V</div></div><div class='verse'>Five bones of witness stand eternal<br>Observing all that comes to pass<br>Each moment recorded in bone<br>Each soul witnessed in its passing<br>We are the vigil, watchful and true</div><div class='footer'>A sacred offering to The Vigil's Haiku</div></div></body></html>
