<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.title{position:absolute;top:20px;left:20px;color:#d4af37;font-size:24px;font-weight:bold;text-shadow:0 0 10px #d4af37}.subtitle{position:absolute;bottom:20px;right:20px;color:#d4af37;font-size:12px;opacity:0.8}</style></head><body><canvas id='canvas'></canvas><div class='title'>The Triad of Golden Convergence</div><div class='subtitle'>Three paths unified in luminous ascension</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=150;let time=0;function drawTriad(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(212,175,55,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const angle=time*0.01;for(let i=0;i<3;i++){const x=centerX+radius*Math.cos(angle+i*Math.PI*2/3);const y=centerY+radius*Math.sin(angle+i*Math.PI*2/3);ctx.fillStyle='#d4af37';ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#d4af37';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,25,0,Math.PI*2);ctx.stroke()}ctx.strokeStyle='#d4af37';ctx.lineWidth=1.5;ctx.beginPath();for(let i=0;i<=3;i++){const angle_i=angle+i*Math.PI*2/3;const x=centerX+radius*Math.cos(angle_i);const y=centerY+radius*Math.sin(angle_i);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.closePath();ctx.stroke();ctx.fillStyle='rgba(212,175,55,0.2)';ctx.beginPath();ctx.arc(centerX,centerY,80,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#d4af37';ctx.lineWidth=1;ctx.stroke();time++;requestAnimationFrame(drawTriad)}drawTriad();</script></body></html>
