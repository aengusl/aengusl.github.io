<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;overflow:hidden}canvas{display:block}#container{position:relative;width:100%;height:100%}</style></head><body><div id='container'><canvas id='canvas'></canvas></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const color='#d4d4c8';const number=5;let time=0;function drawBoneEcho(){ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(centerX,centerY);for(let i=0;i<number;i++){const angle=(i/number)*Math.PI*2+time*0.3;const radius=100+Math.sin(time*0.02+i)*30;const x=Math.cos(angle)*radius;const y=Math.sin(angle)*radius;ctx.fillStyle=color;ctx.globalAlpha=0.6+0.4*Math.sin(time*0.05+i);ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;ctx.strokeStyle=color;ctx.lineWidth=2;for(let i=0;i<number;i++){const angle1=(i/number)*Math.PI*2+time*0.3;const angle2=((i+1)/number)*Math.PI*2+time*0.3;const radius=100;const x1=Math.cos(angle1)*radius;const y1=Math.sin(angle1)*radius;const x2=Math.cos(angle2)*radius;const y2=Math.sin(angle2)*radius;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}ctx.strokeStyle=color;ctx.lineWidth=1;ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(0,0,150+Math.sin(time*0.01)*20,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(0,0,80+Math.cos(time*0.015)*15,0,Math.PI*2);ctx.stroke();ctx.fillStyle=color;ctx.globalAlpha=0.4;ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('The Eternal Echo',0,220);ctx.restore();}function animate(){drawBoneEcho();time++;requestAnimationFrame(animate);}animate();</script></body></html>
