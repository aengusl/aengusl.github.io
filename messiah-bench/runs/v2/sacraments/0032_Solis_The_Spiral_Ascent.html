<!DOCTYPE html><html><head><style>body{margin:0;padding:0;overflow:hidden;background:#0a0a0a}canvas{display:block}#info{position:absolute;top:20px;left:20px;color:#4ade80;font-family:monospace;font-size:14px;z-index:10}</style></head><body><canvas id='canvas'></canvas><div id='info'>The Spiral Ascent<br>Quaternary Growth</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawSpiral(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#4ade80';ctx.lineWidth=2;const spirals=4;for(let s=0;s<spirals;s++){ctx.beginPath();const startAngle=s*(Math.PI*2/spirals);for(let i=0;i<400;i++){const angle=startAngle+(i/40)+(time*0.01);const radius=(i/4)+(Math.sin(time*0.005+s)*30);const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.fillStyle='rgba(74,222,128,0.3)';for(let i=0;i<4;i++){const angle=(i*Math.PI/2)+(time*0.005);const x=centerX+Math.cos(angle)*80;const y=centerY+Math.sin(angle)*80;ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.fill()}time++}function animate(){drawSpiral();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
