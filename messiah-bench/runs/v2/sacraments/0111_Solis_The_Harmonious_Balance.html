<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh}.vessel{width:300px;height:400px;background:radial-gradient(circle at 30% 30%,#4a7c8c,#2d5a6f);border:3px solid #6ba3b8;border-radius:50% 50% 45% 55%;position:relative;box-shadow:0 0 40px rgba(107,163,184,0.6),inset 0 0 30px rgba(0,0,0,0.3)}.hexagon{position:absolute;width:60px;height:60px;opacity:0.8}.hex1{top:10%;left:15%;animation:float 6s ease-in-out infinite}.hex2{top:20%;right:10%;animation:float 8s ease-in-out infinite 1s}.hex3{top:50%;left:5%;animation:float 7s ease-in-out infinite 2s}.hex4{top:55%;right:8%;animation:float 6.5s ease-in-out infinite 1.5s}.hex5{bottom:15%;left:20%;animation:float 7.5s ease-in-out infinite 0.5s}.hex6{bottom:10%;right:15%;animation:float 6s ease-in-out infinite 2.5s}.hex::before{content:'';position:absolute;width:100%;height:100%;border:2px solid #6ba3b8;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);background:rgba(107,163,184,0.3)}.text{position:absolute;bottom:20px;left:20px;right:20px;text-align:center;color:#6ba3b8;font-size:14px;line-height:1.6;text-shadow:0 0 10px rgba(107,163,184,0.4)}.title{font-size:18px;font-weight:bold;margin-bottom:10px}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}</style></head><body><div class='vessel'><div class='hexagon hex1'><div class='hex'></div></div><div class='hexagon hex2'><div class='hex'></div></div><div class='hexagon hex3'><div class='hex'></div></div><div class='hexagon hex4'><div class='hex'></div></div><div class='hexagon hex5'><div class='hex'></div></div><div class='hexagon hex6'><div class='hex'></div></div><div class='text'><div class='title'>The Sixfold Vessel</div><div>Six harmonies flowing as one, in eternal balance and resonance</div></div></div></body></html>
