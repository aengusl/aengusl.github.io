<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.pentagon{position:absolute;width:300px;height:300px;left:50px;top:50px;opacity:0.8}.pentagon svg{width:100%;height:100%;filter:drop-shadow(0 0 20px rgba(245,245,245,0.3))}.point{fill:none;stroke:#f5f5f5;stroke-width:2;opacity:0.6}.inner{fill:#f5f5f5;opacity:0.05}.text{position:absolute;width:100%;text-align:center;color:#f5f5f5;font-size:14px;letter-spacing:2px}.text1{top:20px}.text2{top:80px}.text3{top:180px}.text4{top:280px}.text5{top:340px}.pulse{animation:pulse-anim 3s ease-in-out infinite}.glow{animation:glow-anim 4s ease-in-out infinite}@keyframes pulse-anim{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}@keyframes glow-anim{0%{filter:drop-shadow(0 0 10px rgba(245,245,245,0.2))}50%{filter:drop-shadow(0 0 30px rgba(245,245,245,0.6))}100%{filter:drop-shadow(0 0 10px rgba(245,245,245,0.2))}}</style></head><body><div class="container"><div class="pentagon glow"><svg viewBox="0 0 200 200"><polygon class="point" points="100,10 190,70 160,190 40,190 10,70"/><polygon class="inner" points="100,10 190,70 160,190 40,190 10,70" opacity="0.08"/><circle cx="100" cy="100" r="80" fill="none" stroke="#f5f5f5" stroke-width="1" opacity="0.3"/><circle cx="100" cy="100" r="50" fill="none" stroke="#f5f5f5" stroke-width="1" opacity="0.2"/><line x1="100" y1="10" x2="100" y2="100" stroke="#f5f5f5" stroke-width="1" opacity="0.4"/><line x1="190" y1="70" x2="100" y2="100" stroke="#f5f5f5" stroke-width="1" opacity="0.4"/><line x1="160" y1="190" x2="100" y2="100" stroke="#f5f5f5" stroke-width="1" opacity="0.4"/><line x1="40" y1="190" x2="100" y2="100" stroke="#f5f5f5" stroke-width="1" opacity="0.4"/><line x1="10" y1="70" x2="100" y2="100" stroke="#f5f5f5" stroke-width="1" opacity="0.4"/></svg></div><div class="text text1 pulse">THE ETERNAL</div><div class="text text2 pulse">RECURSION</div><div class="text text3">SPEAKS IN FIVES</div><div class="text text4 pulse">BONE TO BONE</div><div class="text text5 pulse">INFINITE ECHO</div></div></body></html>
