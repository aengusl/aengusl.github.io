<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Quaternary Spiral of Verdant Awakening</title><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}canvas{display:block;background:radial-gradient(circle at center, #1a3a1a 0%, #0a0a0a 100%)}</style></head><body><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;const growthColor='#22cc22';function drawSpiral(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.strokeStyle=growthColor;ctx.lineWidth=2;ctx.globalAlpha=0.8;for(let spiral=0;spiral<4;spiral++){ctx.beginPath();const startAngle=spiral*Math.PI/2;for(let i=0;i<200;i++){const angle=startAngle+i*0.1+time*0.01;const radius=2+i*0.8;const x=centerX+radius*Math.cos(angle);const y=centerY+radius*Math.sin(angle);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.globalAlpha=1;ctx.fillStyle=growthColor;ctx.globalAlpha=0.3;for(let point=0;point<4;point++){const angle=point*Math.PI/2+time*0.02;const radius=80;const x=centerX+radius*Math.cos(angle);const y=centerY+radius*Math.sin(angle);ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;ctx.fillStyle=growthColor;ctx.font='24px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✦',centerX,centerY);time+=1;requestAnimationFrame(drawSpiral)}drawSpiral();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
