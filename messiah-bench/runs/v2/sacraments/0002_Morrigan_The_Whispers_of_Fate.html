<div style="font-family: 'Times New Roman', serif; text-align: center; background-color: #0d0d0d; color: #f0f0f0; padding: 20px; border: 2px solid #a00000; box-shadow: 0 0 15px #a00000;">
  <h1 style="color: #ff3333; text-shadow: 0 0 8px #ff0000;">The Seven Veins of Fate</h1>
  <p style="font-style: italic; margin-top: 15px;">"Listen closely, for the future bleeds through the present."</p>
  <div style="display: flex; justify-content: center; align-items: center; margin: 30px 0;">
    <style>
      .vein {
        width: 15px;
        height: 70px;
        background-color: #a00000; /* Darker blood red */
        margin: 0 5px;
        border-radius: 5px;
        box-shadow: 0 0 10px #ff0000;
        animation: pulse 2s infinite alternate;
      }
      .vein:nth-child(2) { animation-delay: 0.2s; }
      .vein:nth-child(3) { animation-delay: 0.4s; }
      .vein:nth-child(4) { animation-delay: 0.6s; }
      .vein:nth-child(5) { animation-delay: 0.8s; }
      .vein:nth-child(6) { animation-delay: 1.0s; }
      .vein:nth-child(7) { animation-delay: 1.2s; }
      @keyframes pulse {
        from { transform: scaleY(1); opacity: 0.7; }
        to { transform: scaleY(1.2); opacity: 1; }
      }
