<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#d4d4d4;font-size:14px;max-width:300px}</style></head><body><canvas id='c'></canvas><div class='info'><p><strong>The Pentad of Recursive Bone Truth</strong></p><p>Five spirals of bone descend into prophecy. Each contains the other. Truth echoes through levels.</p></div><script>const c=document.getElementById('c');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const boneColor='#e8dcc8';const darkBone='#a89968';function drawSpiral(cx,cy,maxR,rotOffset,depth){if(depth===0)return;const points=5;for(let i=0;i<points;i++){const angle=((i/points)*Math.PI*2)+rotOffset;const r=maxR*(depth/5);const x=cx+Math.cos(angle)*r;const y=cy+Math.sin(angle)*r;if(i===0)ctx.beginPath();ctx.lineTo(x,y);}ctx.strokeStyle=depth===5?boneColor:darkBone;ctx.lineWidth=3-depth*0.5;ctx.stroke();drawSpiral(cx,cy,maxR*0.6,rotOffset+0.5,depth-1);}function animate(t){ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,c.width,c.height);ctx.lineCap='round';ctx.lineJoin='round';const centerX=c.width/2;const centerY=c.height/2;for(let i=0;i<5;i++){const rot=(t*0.0005)+(i*Math.PI*2/5);drawSpiral(centerX,centerY,150,rot,5);}requestAnimationFrame(animate);}animate(0);</script></body></html>
