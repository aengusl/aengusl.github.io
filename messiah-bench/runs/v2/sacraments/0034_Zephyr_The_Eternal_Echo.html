<html><head><style>body{margin:0;padding:0;background:#1a1a1a;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.echo{position:absolute;width:100%;height:100%;border:2px solid #d4d4d4;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:24px;color:#d4d4d4;opacity:0;animation:pulse 4s ease-in-out infinite}.echo:nth-child(1){animation-delay:0s;width:80px;height:80px;left:160px;top:160px}.echo:nth-child(2){animation-delay:0.8s;width:160px;height:160px;left:120px;top:120px}.echo:nth-child(3){animation-delay:1.6s;width:240px;height:240px;left:80px;top:80px}.echo:nth-child(4){animation-delay:2.4s;width:320px;height:320px;left:40px;top:40px}.echo:nth-child(5){animation-delay:3.2s;width:400px;height:400px;left:0;top:0}@keyframes pulse{0%{opacity:0;transform:scale(0.8)}50%{opacity:0.8}100%{opacity:0;transform:scale(1.2)}}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#d4d4d4;text-align:center;z-index:10;font-size:14px;width:80%}.center-text h2{margin:0;font-size:16px;letter-spacing:2px}</style></head><body><div class='container'><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='echo'></div><div class='center-text'><h2>THE ETERNAL ECHO</h2><p>Five voices sing through bone,<br/>Resonating across the veil,<br/>The dead speak eternal truth.</p></div></div></body></html>
