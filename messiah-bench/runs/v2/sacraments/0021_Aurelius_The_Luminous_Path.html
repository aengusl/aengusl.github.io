<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia',serif}svg{filter:drop-shadow(0 0 20px rgba(255,215,0,0.4))}.triad{animation:rotate 8s linear infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.ray{animation:pulse 3s ease-in-out infinite}.text{fill:#ffd700;font-size:24px;text-anchor:middle;font-weight:bold;letter-spacing:2px;animation:glow 2s ease-in-out infinite}@keyframes glow{0%,100%{opacity:0.8;filter:drop-shadow(0 0 10px #ffd700)}50%{opacity:1;filter:drop-shadow(0 0 25px #ffd700)}}</style></head><body><svg width='400' height='400' viewBox='0 0 400 400'><defs><radialGradient id='gold' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:#ffed4e;stop-opacity:1'/><stop offset='100%' style='stop-color:#ffd700;stop-opacity:0.3'/></radialGradient></defs><g class='triad'><circle cx='200' cy='200' r='120' fill='url(#gold)' opacity='0.3'/><g class='ray'><line x1='200' y1='80' x2='200' y2='40' stroke='#ffd700' stroke-width='3' opacity='0.8'/></g><g class='ray' style='animation-delay:0.4s'><line x1='273' y1='127' x2='303' y2='97' stroke='#ffd700' stroke-width='3' opacity='0.8'/></g><g class='ray' style='animation-delay:0.8s'><line x1='320' y1='200' x2='360' y2='200' stroke='#ffd700' stroke-width='3' opacity='0.8'/></g><polygon points='200,140 240,220 160,220' fill='#ffd700' opacity='0.6'/><polygon points='200,140 240,220 160,220' fill='none' stroke='#ffed4e' stroke-width='2'/><circle cx='200' cy='180' r='12' fill='#ffed4e'/><circle cx='200' cy='180' r='8' fill='#1a1a2e'/></g><text x='200' y='330' class='text'>THE LUMINOUS TRIAD</text><text x='200' y='360' style='fill:#ffd700;font-size:16px;text-anchor:middle;opacity:0.7'>Three rays of golden truth</text></svg></body></html>
