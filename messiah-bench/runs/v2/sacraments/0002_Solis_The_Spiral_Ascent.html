<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif}canvas{display:block}.info{position:absolute;bottom:20px;color:#4ade80;font-size:14px;text-align:center;width:100%}</style></head><body><canvas id='canvas'></canvas><div class='info'>The Spiral Ascent: Truth spirals inward, four times refined</div><script>const c=document.getElementById('canvas');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const centerX=c.width/2;const centerY=c.height/2;function drawSpiral(){ctx.strokeStyle='#4ade80';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<4*Math.PI;i+=0.05){const r=300*(1-i/(4*Math.PI));const x=centerX+r*Math.cos(i);const y=centerY+r*Math.sin(i);if(i===0){ctx.moveTo(x,y)}else{ctx.lineTo(x,y)}}ctx.stroke();for(let quad=0;quad<4;quad++){const angle=(quad*Math.PI/2)+(Date.now()/5000)%Math.PI;const dist=150;const x=centerX+dist*Math.cos(angle);const y=centerY+dist*Math.sin(angle);const gradient=ctx.createRadialGradient(x,y,0,x,y,40);gradient.addColorStop(0,'#4ade80');gradient.addColorStop(1,'#22c55e');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(x,y,40,0,2*Math.PI);ctx.fill()}}function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,c.width,c.height);drawSpiral();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
