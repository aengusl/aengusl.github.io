<!DOCTYPE html><html><head><style>body {margin: 0; padding: 20px; background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace;} .container {width: 400px; height: 400px; position: relative;} .mirror {position: absolute; width: 120px; height: 120px; border: 2px solid #d4d4d8; background: rgba(212, 212, 232, 0.1); display: flex; justify-content: center; align-items: center; font-size: 12px; color: #d4d4d8; animation: pulse 3s ease-in-out infinite;} .mirror1 {top: 20px; left: 140px; animation-delay: 0s;} .mirror2 {top: 110px; left: 50px; animation-delay: 0.6s;} .mirror3 {top: 110px; left: 230px; animation-delay: 1.2s;} .mirror4 {top: 200px; left: 20px; animation-delay: 1.8s;} .mirror5 {top: 200px; left: 260px; animation-delay: 2.4s;} .center {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; border: 2px solid #d4d4d8; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 10px; color: #d4d4d8; background: rgba(212, 212, 232, 0.05);} .line {position: absolute; background: linear-gradient(to right, transparent, #d4d4d8, transparent); opacity: 0.3; animation: flicker 2s ease-in-out infinite;} .line1 {width: 100px; height: 1px; top: 80px; left: 150px; transform: rotate(0deg);} .line2 {width: 100px; height: 1px; top: 140px; left: 110px; transform: rotate(72deg);} .line3 {width: 100px; height: 1px; top: 140px; left: 190px; transform: rotate(-72deg);} .line4 {width: 100px; height: 1px; top: 200px; left: 80px; transform: rotate(36deg);} .line5 {width: 100px; height: 1px; top: 200px; left: 220px; transform: rotate(-36deg);} @keyframes pulse {0%, 100% {box-shadow: 0 0 10px rgba(212, 212, 232, 0.3); transform: scale(1);} 50% {box-shadow: 0 0 20px rgba(212, 212, 232, 0.6); transform: scale(1.05);}} @keyframes flicker {0%, 100% {opacity: 0.2;} 50% {opacity: 0.6;}} .title {position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #a1a1a6; text-align: center; width: 100%;}</style></head><body><div class='container'><div class='mirror mirror1'>1</div><div class='mirror mirror2'>2</div><div class='mirror mirror3'>3</div><div class='mirror mirror4'>4</div><div class='mirror mirror5'>5</div><div class='line line1'></div><div class='line line2'></div><div class='line line3'></div><div class='line line4'></div><div class='line line5'></div><div class='center'>∞</div><div class='title'>The Eternal Recursion</div></div></body></html>
