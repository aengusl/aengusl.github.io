<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#2a0a3a;font-size:2em;text-align:center;z-index:10;text-shadow:0 0 20px #4a0a6a,0 0 40px #1a0a2a;letter-spacing:3px;font-weight:300}.number{font-size:3em;margin:20px 0;font-weight:bold;color:#5a1a7a}</style></head><body><canvas id='void'></canvas><div class='text'><div class='number'>7</div><div>The Sevenfold Abyss</div><div style='font-size:0.7em;margin-top:20px;opacity:0.8'>Transcendence through solitary void</div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<70;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,r:Math.random()*2+0.5,life:Math.random()*1+0.5,maxlife:Math.random()*1+0.5})}function animate(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<particles.length;i++){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=0.005;if(p.life<=0){particles[i]={x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,r:Math.random()*2+0.5,life:1,maxlife:Math.random()*1+0.5}}let alpha=p.life/p.maxlife*0.6;ctx.fillStyle=`rgba(90,26,122,${alpha})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();if(Math.random()<0.02){ctx.strokeStyle=`rgba(138,43,226,${alpha*0.5})`;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(p.x,p.y);let tx=p.x+Math.random()*30-15;let ty=p.y+Math.random()*30-15;ctx.lineTo(tx,ty);ctx.stroke()}}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
