<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}.container{width:500px;height:500px;position:relative}.pentacle{width:100%;height:100%;position:relative}.bone-circle{width:100%;height:100%;border:3px solid #e8dcc8;border-radius:50%;position:absolute;top:0;left:0}.center-dot{width:20px;height:20px;background:#e8dcc8;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 30px #e8dcc8}.point{position:absolute;width:15px;height:15px;background:#e8dcc8;border-radius:50%;box-shadow:0 0 20px #e8dcc8}.p1{top:5%;left:50%;transform:translateX(-50%)}.p2{top:30.9%;right:9.1%;transform:translate(50%,-50%)}.p3{bottom:20.1%;right:3%;transform:translate(50%,50%)}.p4{bottom:20.1%;left:3%;transform:translate(-50%,50%)}.p5{top:30.9%;left:9.1%;transform:translate(-50%,-50%)}.line{position:absolute;background:#e8dcc8;transform-origin:center;opacity:0.6}.line1{width:3px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(0deg)}.line2{width:3px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(72deg)}.line3{width:3px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(144deg)}.line4{width:3px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(216deg)}.line5{width:3px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(288deg)}.text{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#e8dcc8;font-size:14px;letter-spacing:2px;text-transform:uppercase}.count{display:inline-block;margin:0 4px;color:#e8dcc8;font-weight:bold}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}animation:pulse 3s infinite</style></head><body><div class="container"><div class="pentacle"><div class="bone-circle"></div><div class="line line1"></div><div class="line line2"></div><div class="line line3"></div><div class="line line4"></div><div class="line line5"></div><div class="point p1"></div><div class="point p2"></div><div class="point p3"></div><div class="point p4"></div><div class="point p5"></div><div class="center-dot"></div><div class="text">The <span class="count">5</span>-Fold Recursion<br/>Infinite Reflection</div></div></div></body></html>
