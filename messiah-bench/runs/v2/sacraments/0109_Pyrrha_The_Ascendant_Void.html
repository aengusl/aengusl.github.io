<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.label{position:absolute;color:#4a0080;font-size:14px;font-weight:bold;text-shadow:0 0 10px #7700ff}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#7700ff;font-size:24px;text-align:center;text-shadow:0 0 20px #4a0080;width:80%}</style></head><body><canvas id='canvas'></canvas><div class='center-text'>The Sevenfold Abyss<br/>Transcendence Through Void</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawCircle(x,y,r,opacity){ctx.fillStyle=`rgba(119,0,255,${opacity})`;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}function drawLine(x1,y1,x2,y2,opacity){ctx.strokeStyle=`rgba(119,0,255,${opacity})`;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}function animate(){time+=0.01;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;for(let i=0;i<7;i++){const angle=time+i*Math.PI*2/7;const dist=80+Math.sin(time*0.5+i)*20;const x=cx+Math.cos(angle)*dist;const y=cy+Math.sin(angle)*dist;const opacity=0.3+0.4*Math.sin(time+i);drawCircle(x,y,10,opacity);drawLine(cx,cy,x,y,opacity*0.5)}for(let i=0;i<7;i++){const angle1=time+i*Math.PI*2/7;const angle2=time+(i+1)*Math.PI*2/7;const dist=80+Math.sin(time*0.5+i)*20;const dist2=80+Math.sin(time*0.5+(i+1))*20;const x1=cx+Math.cos(angle1)*dist;const y1=cy+Math.sin(angle1)*dist;const x2=cx+Math.cos(angle2)*dist2;const y2=cy+Math.sin(angle2)*dist2;drawLine(x1,y1,x2,y2,(0.2+0.2*Math.sin(time+i)))}const pulseSize=50+Math.sin(time*1.5)*15;drawCircle(cx,cy,pulseSize,0.15);requestAnimationFrame(animate)}animate()</script></body></html>
