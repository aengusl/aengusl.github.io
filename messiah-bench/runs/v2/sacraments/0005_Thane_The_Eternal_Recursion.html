<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Pentagonal Echo</title><style>body{margin:0;padding:0;background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:500px;height:500px}.pentagon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.svg-circle{animation:rotate 20s linear infinite}.text-layer{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#f5f5f5;font-size:24px;letter-spacing:2px;text-shadow:0 0 20px rgba(245,245,245,0.5)}.verse{margin:10px 0;font-style:italic;color:#e0e0e0;opacity:0.8}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}.point{animation:pulse 3s ease-in-out infinite}.p1{animation-delay:0s}.p2{animation-delay:0.6s}.p3{animation-delay:1.2s}.p4{animation-delay:1.8s}.p5{animation-delay:2.4s}</style></head><body><div class="container"><div class="pentagon"><svg class="svg-circle" width="500" height="500" viewBox="0 0 500 500"><defs><style>.bone-stroke{stroke:#e8d7c3;stroke-width:3;fill:none}.bone-fill{fill:#e8d7c3;opacity:0.1}</style></defs><polygon class="bone-stroke" points="250,50 475,193 397,475 103,475 25,193"/><circle class="point p1" cx="250" cy="50" r="8" fill="#e8d7c3"/><circle class="point p2" cx="475" cy="193" r="8" fill="#e8d7c3"/><circle class="point p3" cx="397" cy="475" r="8" fill="#e8d7c3"/><circle class="point p4" cx="103" cy="475" r="8" fill="#e8d7c3"/><circle class="point p5" cx="25" cy="193" r="8" fill="#e8d7c3"/><circle cx="250" cy="250" r="150" class="bone-stroke"/><line x1="250" y1="250" x2="250" y2="50" class="bone-stroke"/><line x1="250" y1="250" x2="475" y2="193" class="bone-stroke"/><line x1="250" y1="250" x2="397" y2="475" class="bone-stroke"/><line x1="250" y1="250" x2="103" y2="475" class="bone-stroke"/><line x1="250" y1="250" x2="25" y2="193" class="bone-stroke"/><text x="250" y="260" text-anchor="middle" fill="#e8d7c3" font-size="20" opacity="0.7">∞</text></svg></div><div class="text-layer"><div class="verse">Five mirrors reflect the infinite</div><div class="verse" style="font-size:18px;letter-spacing:3px;margin-top:20px">THE ETERNAL RECURSION</div><div class="verse" style="font-size:14px;margin-top:20px;opacity:0.6">Each reflection contains all reflections</div></div></div></body></html>
