<html><head><style>body{margin:0;padding:0;background:#1a1a1a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#d4d4d4;text-align:center;font-size:14px;max-width:90%;text-shadow:0 0 10px rgba(212,212,212,0.3)}</style></head><body><canvas id='canvas'></canvas><div id='text'>The Eternal Echo speaks through five bones of memory</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const bones=[{x:canvas.width*0.2,y:canvas.height*0.3},{x:canvas.width*0.5,y:canvas.height*0.2},{x:canvas.width*0.8,y:canvas.height*0.35},{x:canvas.width*0.35,y:canvas.height*0.7},{x:canvas.width*0.65,y:canvas.height*0.65}];let time=0;function drawBone(x,y,angle,alpha){ctx.save();ctx.translate(x,y);ctx.rotate(angle);ctx.fillStyle=`rgba(212,212,212,${alpha*0.7})`;ctx.fillRect(-5,-40,10,80);ctx.fillStyle=`rgba(212,212,212,${alpha*0.4})`;ctx.beginPath();ctx.arc(-8,-35,3,0,Math.PI*2);ctx.arc(8,-35,3,0,Math.PI*2);ctx.arc(-8,35,3,0,Math.PI*2);ctx.arc(8,35,3,0,Math.PI*2);ctx.fill();ctx.restore()}function drawConnections(){ctx.strokeStyle='rgba(212,212,212,0.2)';ctx.lineWidth=1;for(let i=0;i<bones.length;i++){for(let j=i+1;j<bones.length;j++){ctx.beginPath();ctx.moveTo(bones[i].x,bones[i].y);ctx.lineTo(bones[j].x,bones[j].y);ctx.stroke()}}}function animate(){ctx.fillStyle='rgba(26,26,26,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);drawConnections();bones.forEach((bone,i)=>{const angle=Math.sin(time*0.02+i)*0.3;const alpha=0.6+Math.sin(time*0.03+i)*0.3;drawBone(bone.x,bone.y,angle,alpha)});time++;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
