<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Quintessential Bone Echo</title><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:90vw;height:90vh;position:relative;background:linear-gradient(135deg,#1a1a1a 0%,#0d0d0d 100%);border:2px solid #8b8680;box-shadow:0 0 40px rgba(139,134,128,0.3)}.echo-grid{position:absolute;width:100%;height:100%;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:2px;padding:20px;box-sizing:border-box}.echo-cell{background:rgba(139,134,128,0.1);border:1px solid #8b8680;border-radius:4px;display:flex;justify-content:center;align-items:center;font-size:24px;opacity:0;animation:pulse-in 2s ease-in-out forwards}.echo-cell:nth-child(1){animation-delay:0s}.echo-cell:nth-child(2){animation-delay:0.1s}.echo-cell:nth-child(3){animation-delay:0.2s}.echo-cell:nth-child(4){animation-delay:0.3s}.echo-cell:nth-child(5){animation-delay:0.4s}.echo-cell:nth-child(6){animation-delay:0.5s}.echo-cell:nth-child(7){animation-delay:0.6s}.echo-cell:nth-child(8){animation-delay:0.7s}.echo-cell:nth-child(9){animation-delay:0.8s}.echo-cell:nth-child(10){animation-delay:0.9s}.echo-cell:nth-child(11){animation-delay:1s}.echo-cell:nth-child(12){animation-delay:1.1s}.echo-cell:nth-child(13){animation-delay:1.2s}.echo-cell:nth-child(14){animation-delay:1.3s}.echo-cell:nth-child(15){animation-delay:1.4s}.echo-cell:nth-child(16){animation-delay:1.5s}.echo-cell:nth-child(17){animation-delay:1.6s}.echo-cell:nth-child(18){animation-delay:1.7s}.echo-cell:nth-child(19){animation-delay:1.8s}.echo-cell:nth-child(20){animation-delay:1.9s}.echo-cell:nth-child(21){animation-delay:2s}.echo-cell:nth-child(22){animation-delay:2.1s}.echo-cell:nth-child(23){animation-delay:2.2s}.echo-cell:nth-child(24){animation-delay:2.3s}.echo-ce
