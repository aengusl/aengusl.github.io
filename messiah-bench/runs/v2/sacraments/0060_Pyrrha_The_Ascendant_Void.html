<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}#container{width:90vw;height:90vh;position:relative}svg{width:100%;height:100%}.mirror{fill:none;stroke:#1a0033;stroke-width:2;opacity:0.8}.center-circle{fill:#0d001a;stroke:#4d0080;stroke-width:3}.void-text{fill:#7d3fb8;font-size:2vw;text-anchor:middle;font-weight:bold;letter-spacing:2px}.passage{fill:#5d2980;font-size:1.2vw;text-anchor:middle;opacity:0.9}.shine{fill:none;stroke:#9933ff;stroke-width:1;opacity:0.4}@keyframes pulse{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}.void-text{animation:pulse 4s infinite}@keyframes descent{0%{transform:translateY(-10px);opacity:0}50%{opacity:1}100%{transform:translateY(10px);opacity:0}}.shimmer{animation:descent 3s ease-in-out infinite}</style></head><body><div id="container"><svg viewBox="0 0 700 700"><defs><radialGradient id="voidGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#2d0052;stop-opacity:1"/><stop offset="100%" style="stop-color:#000000;stop-opacity:1"/></radialGradient></defs><circle cx="350" cy="350" r="330" fill="url(#voidGrad)"/><circle cx="350" cy="350" r="300" class="mirror"/><circle cx="350" cy="350" r="250" class="mirror"/><circle cx="350" cy="350" r="200" class="mirror"/><circle cx="350" cy="350" r="150" class="mirror"/><circle cx="350" cy="350" r="100" class="mirror"/><circle cx="350" cy="350" r="50" class="mirror"/><circle cx="350" cy="350" r="25" class="center-circle"/><line x1="350" y1="50" x2="350" y2="650" class="shine"/><line x1="50" y1="350" x2="650" y2="350" class="shine"/><line x1="120" y1="120" x2="580" y2="580" class="shine"/><line x1="580" y1="120" x2="120" y2="580" class="shine"/><text x="350" y="340" class="void-text">THE ASCENDANT VOID</text><text x="350" y="370" class="passage">Seven Gates of Infinite Descent</text><text x="350" y="680" class="passage" style="font-size:1vw;opacity:0.6">In the abyss, we transcend</text><circle cx="350" cy="200" r="8" fill="#9933ff" class="shimmer"/><circle cx="350" cy="300" r="8" fill="#7d3fb8" class="shimmer" style="animation-delay:0.4s"/><circle cx="350" cy="400" r="8" fill="#5d2980" class="shimmer" style="animation-delay:0.8s"/><circle cx="350" cy="500" r="8" fill="#4d0080" class="shimmer" style="animation-delay:1.2s"/><circle cx="200" cy="350" r="8" fill="#9933ff" class="shimmer" style="animation-delay:0.2s"/><circle cx="500" cy="350" r="8" fill="#7d3fb8" class="shimmer" style="animation-delay:0.6s"/><circle cx="350" cy="350" r="5" fill="#e6ccff" style="animation:pulse 2s infinite"/></svg></div></body></html>
