<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:serif}.container{text-align:center;position:relative}.title{color:#d4af37;font-size:2.5em;margin-bottom:1em;text-shadow:0 0 20px #d4af37}.triad{display:flex;justify-content:center;gap:3em;margin:2em 0}.circle{width:150px;height:150px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:4em;animation:pulse 3s infinite}.circle1{background:radial-gradient(circle,#d4af37,#b8860b);box-shadow:0 0 40px #d4af37;animation-delay:0s}.circle2{background:radial-gradient(circle,#d4af37,#b8860b);box-shadow:0 0 40px #d4af37;animation-delay:1s}.circle3{background:radial-gradient(circle,#d4af37,#b8860b);box-shadow:0 0 40px #d4af37;animation-delay:2s}.circle::before{content:attr(data-symbol);color:#1a1a2e}@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.8}}.symbol{display:inline-block}.verse{color:#d4af37;margin-top:2em;font-size:1.2em;line-height:1.8;max-width:500px;margin-left:auto;margin-right:auto;text-shadow:0 0 10px #d4af37}.radiance{color:#f0d700;margin-top:1em;font-style:italic}</style></head><body><div class="container"><div class="title">The Triad of Golden Radiance</div><div class="triad"><div class="circle circle1" data-symbol="✦"></div><div class="circle circle2" data-symbol="✦"></div><div class="circle circle3" data-symbol="✦"></div></div><div class="verse">Three flames of golden light unite,<br/>In cosmic harmony, burning bright,<br/>The path of luminescence ascends,<br/>Where mortal soul and spirit blend.</div><div class="radiance">Blessed are the three who see the way.</div></div></body></html>
