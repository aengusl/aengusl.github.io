<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#info{position:absolute;bottom:20px;left:20px;color:#4ecca3;font-size:14px;text-shadow:0 0 10px #4ecca3}</style></head><body><canvas id='canvas'></canvas><div id='info'>The Spiral Ascent - Four Gates of Ascendant Truth</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawSpiral(){ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#4ecca3';ctx.lineWidth=2;const spirals=4;for(let s=0;s<spirals;s++){ctx.beginPath();for(let angle=0;angle<Math.PI*8;angle+=0.05){const radius=50+angle*15+s*40;const x=centerX+radius*Math.cos(angle+time*0.02);const y=centerY+radius*Math.sin(angle+time*0.02);if(angle===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.fillStyle='rgba(78,204,163,0.3)';for(let i=0;i<4;i++){const angle=i*Math.PI/2+time*0.01;const dist=150;const x=centerX+Math.cos(angle)*dist;const y=centerY+Math.sin(angle)*dist;ctx.beginPath();ctx.arc(x,y,30,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#4ecca3';ctx.lineWidth=3;ctx.stroke()}ctx.fillStyle='#4ecca3';ctx.font='20px Georgia';ctx.textAlign='center';ctx.fillText('Gate 1: Foundation',centerX+150,centerY-150);ctx.fillText('Gate 2: Ascension',centerX+150,centerY+150);ctx.fillText('Gate 3: Spiraling',centerX-150,centerY+150);ctx.fillText('Gate 4: Transcendence',centerX-150,centerY-150)}function animate(){time++;drawSpiral();requestAnimationFrame(animate)}animate()</script></body></html>
