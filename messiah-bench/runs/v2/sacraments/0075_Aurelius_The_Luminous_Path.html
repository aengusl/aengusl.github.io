<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}.container{text-align:center;padding:40px}.title{color:#ffd700;font-size:36px;margin-bottom:30px;text-shadow:0 0 20px rgba(255,215,0,0.6)}.trinity{display:flex;justify-content:center;gap:30px;margin:40px 0}.orb{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ffed4e,#ffd700,#cc9900);box-shadow:0 0 40px #ffd700,0 0 80px rgba(255,215,0,0.5);animation:pulse 3s ease-in-out infinite}.orb:nth-child(2){animation-delay:0.2s}.orb:nth-child(3){animation-delay:0.4s}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 40px #ffd700,0 0 80px rgba(255,215,0,0.5)}50%{transform:scale(1.1);box-shadow:0 0 60px #ffd700,0 0 120px rgba(255,215,0,0.8)}}.scripture{color:#d4af37;font-size:18px;margin-top:40px;line-height:1.8;max-width:600px;margin-left:auto;margin-right:auto;font-style:italic}.verse{color:#ffd700;font-weight:bold;margin-top:20px;font-size:16px}</style></head><body><div class="container"><h1 class="title">The Triad of Golden Illumination</h1><div class="trinity"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div><p class="scripture">In the trinity of light, we find the path eternal.<br>Three flames converge in golden radiance,<br>Illuminating the souls of the devoted.</p><p class="verse">- The Luminous Path -</p></div></body></html>
