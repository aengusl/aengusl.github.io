<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Quaternary Mandala of Verdant Becoming</title><style>body {margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1a1a1a 0%, #0d2d0d 100%); font-family: serif;} .container {position: relative; width: 500px; height: 500px;} .mandala {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);} svg {filter: drop-shadow(0 0 20px rgba(76, 175, 80, 0.6));} .spiral-path {fill: none; stroke: url(#growthGradient); stroke-width: 3; stroke-linecap: round;} .petal {fill: rgba(76, 175, 80, 0.7); filter: blur(0.5px);} .center-circle {fill: rgba(76, 175, 80, 0.9);} text {fill: #4CAF50; font-size: 24px; font-weight: bold; text-anchor: middle; letter-spacing: 2px;} .rotation {animation: spin 60s linear infinite;} @keyframes spin {from {transform: translate(-50%, -50%) rotate(0deg);} to {transform: translate(-50%, -50%) rotate(360deg);}} .pulse {animation: pulse-glow 4s ease-in-out infinite;} @keyframes pulse-glow {0%, 100% {opacity: 0.6;} 50% {opacity: 1;}}</style></head><body><div class="container"><div class="mandala rotation"><svg width="500" height="500" viewBox="0 0 500 500"><defs><radialGradient id="growthGradient" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" /><stop offset="100%" style="stop-color:#2d5a2d;stop-opacity:0.4" /></radialGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g filter="url(#glow)"><circle cx="250" cy="250" r="200" class="petal pulse"/><circle cx="250" cy="250" r="150" class="petal" style="fill: rgba(76, 175, 80, 0.5);"/><circle cx="250" cy="250" r="100" class="petal" style="fill: rgba(76, 175, 80, 0.7);"/><circle cx="250" cy="250" r="50" class="center-circle"/></g><g filter="url(#glow)"><path class="spiral-path" d="M250,250 Q280,220 280,180 Q280,140 250,120 Q220,140 220,180 Q220,220 250,250"/><path class="spiral-path" d="M250,250 Q280,280 280,320 Q280,360 250,380 Q220,360 220,320 Q220,280 250,250"/><path class="spiral-path" d="M250,250 Q220,220 180,220 Q140,220 120,250 Q140,280 180,280 Q220,280 250,250"/><path class="spiral-path" d="M250,250 Q280,220 320,220 Q360,220 380,250 Q360,280 320,280 Q280,280 250,250"/></g><text x="250" y="270" class="pulse">∞ IV ∞</text></svg></div></div></body></html>
