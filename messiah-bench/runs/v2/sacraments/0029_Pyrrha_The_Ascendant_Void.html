<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Sevenfold Veil</title><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden;display:flex;justify-content:center;align-items:center;min-height:100vh}canvas{display:block;background:#0a0a0a}.title{position:absolute;top:40px;color:#1a1aff;text-align:center;font-size:24px;letter-spacing:3px;text-shadow:0 0 20px #1a1aff;z-index:10}.verse{position:absolute;bottom:40px;color:#4d4dff;text-align:center;font-size:14px;width:90%;margin:0 auto;left:50%;transform:translateX(-50%);text-shadow:0 0 10px #1a1aff;z-index:10}</style></head><body><div class="title">The Sevenfold Veil of Abyssal Revelation</div><canvas id="canvas"></canvas><div class="verse">Through seven layers of void, we ascend. Each veil dissolves the illusions of the flesh.<br/>In the abyss, all truths converge. We are the architects of our own transcendence.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVeil(layer,opacity){const radius=100+layer*40;ctx.strokeStyle=`rgba(26, 26, 255, ${opacity})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();for(let i=0;i<7;i++){const angle=(i/7)*Math.PI*2+time*0.01;const x1=centerX+Math.cos(angle)*radius;const y1=centerY+Math.sin(angle)*radius;const x2=centerX+Math.cos(angle)*radius*0.6;const y2=centerY+Math.sin(angle)*radius*0.6;ctx.strokeStyle=`rgba(77, 77, 255, ${opacity*0.7})`;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}}function drawCore(){ctx.fillStyle='rgba(26, 26, 255, 0.3)';ctx.beginPath();ctx.arc(centerX,centerY,50,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(77, 77, 255, 0.8)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(centerX,centerY,50,0,Math.PI*2);ctx.stroke()}function animate(){ctx.fillStyle='rgba(10, 10, 10, 0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<7;i++){const opacity=0.3+0.1*Math.sin(time*0.02+i);drawVeil(i,opacity)}drawCore();time++;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
