<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.triad{position:absolute;width:120px;height:120px;border:3px solid #d4af37;border-radius:50%;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle,rgba(212,175,55,0.2),rgba(212,175,55,0.05));animation:pulse 3s ease-in-out infinite}.triad1{top:40px;left:140px;animation-delay:0s}.triad2{top:140px;left:40px;animation-delay:0.4s}.triad3{top:140px;left:240px;animation-delay:0.8s}.inner-circle{width:60px;height:60px;border:2px solid #d4af37;border-radius:50%;background:radial-gradient(circle,#d4af37,#a0860f);display:flex;justify-content:center;align-items:center;color:#fff;font-weight:bold;font-size:24px}.center-light{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(212,175,55,0.3),transparent);border-radius:50%;animation:glow 4s ease-in-out infinite}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#d4af37;text-align:center;font-size:18px;font-weight:300;letter-spacing:2px;width:100%}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 20px rgba(212,175,55,0.5)}50%{transform:scale(1.1);box-shadow:0 0 40px rgba(212,175,55,0.8)}}@keyframes glow{0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}}</style></head><body><div class='container'><div class='center-light'></div><div class='triad triad1'><div class='inner-circle'>✨</div></div><div class='triad triad2'><div class='inner-circle'>✦</div></div><div class='triad triad3'><div class='inner-circle'>◆</div></div><div class='text'>THE LUMINOUS TRIAD</div></div></body></html>
