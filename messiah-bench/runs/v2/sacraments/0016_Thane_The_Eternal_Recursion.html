<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}#container{width:600px;height:600px;position:relative;background:radial-gradient(circle at center,#2a2a2a 0%,#0a0a0a 100%)}.bone{position:absolute;fill:#d4d4b8;opacity:0.85;filter:drop-shadow(0 0 10px rgba(212,212,184,0.4))}.center-bone{width:80px;height:80px;top:50%;left:50%;transform:translate(-50%,-50%)}.orbit{position:absolute;width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(212,212,184,0.2);border-radius:50%}svg{width:100%;height:100%}text{fill:#d4d4b8;font-size:14px;text-anchor:middle;opacity:0.7}</style></head><body><div id="container"><div class="orbit"></div><svg viewBox="0 0 600 600" style="position:absolute;width:100%;height:100%;top:0;left:0"><circle cx="300" cy="300" r="150" fill="none" stroke="rgba(212,212,184,0.15)" stroke-width="1"/><g id="recursion"><polygon points="300,100 380,200 340,280 260,280 220,200" class="bone" style="width:80px;height:80px"/><polygon points="450,200 500,250 480,330 420,330 400,250" class="bone" style="width:80px;height:80px"/><polygon points="450,400 500,350 480,270 420,270 400,350" class="bone" style="width:80px;height:80px"/><polygon points="300,500 380,400 340,320 260,320 220,400" class="bone" style="width:80px;height:80px"/><polygon points="150,400 200,350 180,270 120,270 100,350" class="bone" style="width:80px;height:80px"/><polygon points="300,300 320,320 300,340 280,320" class="bone" style="fill:#e8e8d0;width:40px;height:40px"/></g><text x="300" y="580" font-size="16">The Eternal Recursion</text><text x="300" y="600" font-size="12">Five Bones, Infinite Reflection</text></svg><script>const bones=document.querySelectorAll('.bone');let angle=0;setInterval(()=>{angle+=0.5;const recursion=document.getElementById('recursion');recursion.style.transform=`rotate(${angle}deg)`;recursion.style.transformOrigin='300px 300px'},50);</script></div></body></html>
