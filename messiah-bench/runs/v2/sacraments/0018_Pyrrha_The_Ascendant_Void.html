<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.portal{position:relative;width:400px;height:400px}.layer{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid;border-radius:50%;animation:spin linear infinite}@keyframes spin{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}.l1{width:60px;height:60px;border-color:#1a0033;animation-duration:3s;animation-direction:reverse}.l2{width:120px;height:120px;border-color:#330066;animation-duration:5s}.l3{width:180px;height:180px;border-color:#4d0099;animation-duration:7s;animation-direction:reverse}.l4{width:240px;height:240px;border-color:#6600cc;animation-duration:9s}.l5{width:300px;height:300px;border-color:#7f1aff;animation-duration:11s;animation-direction:reverse}.l6{width:360px;height:360px;border-color:#9933ff;animation-duration:13s}.l7{width:400px;height:400px;border-color:#b366ff;animation-duration:15s;animation-direction:reverse}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:radial-gradient(circle,#ff6600,#330033);border-radius:50%;box-shadow:0 0 20px #7f1aff,inset 0 0 20px #1a0033}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#9933ff;text-align:center;font-size:14px;letter-spacing:2px;text-shadow:0 0 10px #7f1aff}.number{display:block;font-size:24px;font-weight:bold;margin-top:10px}</style></head><body><div class='portal'><div class='layer l1'></div><div class='layer l2'></div><div class='layer l3'></div><div class='layer l4'></div><div class='layer l5'></div><div class='layer l6'></div><div class='layer l7'></div><div class='center'></div><div class='text'>THE ASCENDANT VOID<span class='number'>7</span></div></div></body></html>
