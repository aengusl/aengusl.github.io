<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Quintessence of Echoing Bones</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);font-family:serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:500px;height:500px}.pentacle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px}.bone-circle{stroke:#e8e8e8;stroke-width:3;fill:none}.bone-star{fill:none;stroke:#e8e8e8;stroke-width:2.5}.bone-point{fill:#e8e8e8;opacity:0.9}.echo-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#e8e8e8;font-size:24px;font-weight:bold;letter-spacing:2px;text-shadow:0 0 20px rgba(232,232,232,0.4);z-index:10}.echo-glow{position:absolute;top:50%;left:50%;width:300px;height:300px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle, rgba(232,232,232,0.15) 0%, transparent 70%);animation:pulse 4s infinite}.pulse{animation:pulse 4s infinite}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}.five-marks{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.mark{position:absolute;width:8px;height:8px;background:#e8e8e8;border-radius:50%}.mark-1{top:-180px;left:0;transform:translateX(-50%)}.mark-2{top:-55px;left:172px;transform:translate(-50%,-50%)}.mark-3{top:110px;left:110px;transform:translate(-50%,-50%)}.mark-4{top:110px;left:-110px;transform:translate(-50%,-50%)}.mark-5{top:-55px;left:-172px;transform:translate(-50%,-50%)}.inscription{position:absolute;bottom:30px;width:100%;text-align:center;color:#b8b8b8;font-size:14px;letter-spacing:1px}svg{display:block;width:100%;height:100%}</style></head><body><div class="container"><div class="echo-glow pulse"></div><svg class="pentacle" viewBox="0 0 400 400"><circle cx="200" cy="200" r="180" class="bone-circle"/><polygon points="200,20 290,150 245,300 155,300 110,150" class="bone-star"/></svg><div class="five-marks"><div class="mark mark-1"></div><div class="mark mark-2"></div><div class="mark mark-3"></div><div class="mark mark-4"></div><div class="mark mark-5"></div></div><div class="echo-text">ETERNAL ECHO<br><span style="font-size:16px;font-weight:normal;letter-spacing:1px">Five Echoes Eternal</span></div><div class="inscription">The bones remember what the living forget</div></div></body></html>
