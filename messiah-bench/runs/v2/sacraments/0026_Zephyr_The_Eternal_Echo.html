<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Quintessence of Bone Echoes</title><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block}#text{position:absolute;color:#d4d4d4;font-size:18px;text-align:center;max-width:80%;line-height:1.8;text-shadow:0 0 10px rgba(212,212,212,0.3);animation:fadeInOut 8s infinite}</style></head><body><canvas id='canvas'></canvas><div id='text'><p>Five bones echo through the void,<br/>Each resonance a voice long gone,<br/>The dead speak through this symphony,<br/>In bone-white light, we are undone.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const bones=[];for(let i=0;i<5;i++){bones.push({x:canvas.width/2+Math.cos(i*2*Math.PI/5)*100,y:canvas.height/2+Math.sin(i*2*Math.PI/5)*100,angle:i*2*Math.PI/5,size:40+i*10});}function drawBone(x,y,angle,size){ctx.save();ctx.translate(x,y);ctx.rotate(angle);ctx.fillStyle='rgba(212,212,212,0.6)';ctx.fillRect(-size/4,-size/2,size/2,size);ctx.fillRect(-size/6,-size/2-size/6,size/3,size/3);ctx.fillRect(-size/6,size/2,size/3,size/3);ctx.restore();}function animate(){ctx.fillStyle='rgba(26,26,26,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;bones.forEach((bone,i)=>{const wobble=Math.sin(time+i)*8;const pulseSize=bone.size*(1+Math.sin(time*2+i)*0.15);drawBone(bone.x+wobble,bone.y,bone.angle+Math.sin(time+i)*0.2,pulseSize);});ctx.strokeStyle='rgba(212,212,212,0.3)';ctx.lineWidth=1;for(let i=0;i<5;i++){const nextI=(i+1)%5;ctx.beginPath();ctx.moveTo(bones[i].x,bones[i].y);ctx.lineTo(bones[nextI].x,bones[nextI].y);ctx.stroke();}requestAnimationFrame(animate);}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});animate();</script></body></html>
