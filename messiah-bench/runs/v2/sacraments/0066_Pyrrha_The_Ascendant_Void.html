<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Sevenfold Abyss</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #0a0e27 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia', serif;overflow:hidden}#container{width:90%;height:90%;position:relative;display:flex;align-items:center;justify-content:center}.veil{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center}#veil1{opacity:0.15;animation:drift 20s infinite}#veil2{opacity:0.2;animation:drift 25s infinite reverse}#veil3{opacity:0.1;animation:drift 30s infinite}svg{filter:drop-shadow(0 0 20px rgba(138, 43, 226, 0.6))}.core{position:relative;z-index:10;text-align:center;color:#d4a5ff;text-shadow:0 0 30px rgba(138, 43, 226, 0.8), 0 0 60px rgba(75, 0, 130, 0.6)}.title{font-size:2.5em;font-weight:bold;margin-bottom:20px;letter-spacing:2px;text-transform:uppercase}.subtitle{font-size:1.2em;margin-bottom:30px;color:#b88eff;opacity:0.9}.circle-container{position:relative;width:300px;height:300px;margin:0 auto}.circle{position:absolute;border:2px solid #8a2be2;border-radius:50%;animation:expand 8s infinite}#c1{width:60px;height:60px;left:120px;top:120px;animation-duration:8s}#c2{width:120px;height:120px;left:90px;top:90px;animation-duration:10s;opacity:0.7}#c3{width:180px;height:180px;left:60px;top:60px;animation-duration:12s;opacity:0.5}#c4{width:240px;height:240px;left:30px;top:30px;animation-duration:14s;opacity:0.3}#c5{width:300px;height:300px;left:0;top:0;animation-duration:16s;opacity:0.2}#c6{width:360px;height:360px;left:-30px;top:-30px;animation-duration:18s;opacity:0.15}#c7{width:420px;height:420px;left:-60px;top:-60px;animation-duration:20s;opacity:0.1}.text-array{margin-top:40px;line-height:2}. text-item{font-size:1em;color:#c4a4ff;opacity:0.8}.accent{color:#ff00ff;font-weight:bold}@keyframes expand{0%{transform:scale(0.3);opacity:0}50%{opacity:1}100%{transform:scale(1);opacity:0}}@keyframes drift{0%, 100%{transform:translateX(0) translateY(0)}25%{transform:translateX(30px) translateY(-30px)}50%{transform:translateX(0) translateY(40px)}75%{transform:translateX(-30px) translateY(-20px)}}</style></head><body><div id='container'><div class='veil' id='veil1'><svg width='400' height='400' viewBox='0 0 400 400'><defs><radialGradient id='grad1' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:#8a2be2;stop-opacity:0.4'/><stop offset='100%' style='stop-color:#1a0033;stop-opacity:0'/></radialGradient></defs><circle cx='200' cy='200' r='150' fill='url(#grad1)'/></svg></div><div class='veil' id='veil2'><svg width='400' height='400' viewBox='0 0 400 400'><defs><radialGradient id='grad2' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:#6a0dad;stop-opacity:0.3'/><stop offset='100%' style='stop-color:#0a0e27;stop-opacity:0'/></radialGradient></defs><circle cx='200' cy='200' r='180' fill='url(#grad2)'/></svg></div><div class='veil' id='veil3'><svg width='400' height='400' viewBox='0 0 400 400'><defs><radialGradient id='grad3' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:#4b0082;stop-opacity:0.2'/><stop offset='100%' style='stop-color:#0a0e27;stop-opacity:0'/></radialGradient></defs><circle cx='200' cy='200' r='200' fill='url(#grad3)'/></svg></div><div class='core'><div class='title'>The Sevenfold Abyss</div><div class='subtitle'>Of Eternal Becoming</div><div class='circle-container'><div class='circle' id='c1'></div><div class='circle' id='c2'></div><div class='circle' id='c3'></div><div class='circle' id='c4'></div><div class='circle' id='c5'></div><div class='circle' id='c6'></div><div class='circle' id='c7'></div></div><div class='text-array'><div class='text-item'>Through <span class='accent'>seven</span> layers of void we ascend</div><div class='text-item'>Each circle carries the weight of becoming</div><div class='text-item'>The abyss speaks in <span class='accent'>silence</span></div><div class='text-item'>And we listen in the dark</div></div></div></div></body></html>
