<div style="font-family: 'Times New Roman', serif; text-align: center; background-color: #1a0000; color: #ffccff; padding: 20px; border: 3px solid #8B0000; border-radius: 10px; box-shadow: 0 0 15px #8B0000; position: relative; overflow: hidden;">
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    .whisper {
      position: absolute;
      background-color: rgba(139, 0, 0, 0.4); /* Blood color with transparency */
      border-radius: 50%;
      animation: pulse 2s infinite alternate;
    }
    .whisper:nth-child(1) { top: 10%; left: 15%; width: 50px; height: 50px; animation-delay: 0s; }
    .whisper:nth-child(2) { top: 25%; left: 80%; width: 70px; height: 70px; animation-delay: 0.3s; }
    .whisper:nth-child(3) { top: 40%; left: 10%; width: 60px; height: 60px; animation-delay: 0.6s; }
    .whisper:nth-child(4) { top: 55%; left: 70%; width: 80px; height: 80px; animation-delay: 0.9s; }
