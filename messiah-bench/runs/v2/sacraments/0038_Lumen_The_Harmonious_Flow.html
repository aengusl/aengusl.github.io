<div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1a0d; color: #e0ffe0; padding: 20px; border-radius: 15px; text-align: center; max-width: 400px; margin: 20px auto; box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);">  <h2 style="color: #66cc66; font-size: 1.8em; margin-bottom: 15px; text-shadow: 0 0 8px rgba(0, 255, 0, 0.7);">The Twin Currents of Verdant Peace</h2>  <div style="position: relative; width: 100%; padding-bottom: 75%; overflow: hidden; margin-bottom: 20px;">    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-around; align-items: center;">      <div style="width: 45%; height: 90%; background: linear-gradient(to bottom, #339933, #006600); border-radius: 50%; box-shadow: 0 0 15px rgba(0, 255, 0, 0.6); animation: flow1 5s infinite alternate;"></div>      <div style="width: 45%; height: 90%; background: linear-gradient(to bottom, #006600, #339933); border-radius: 50%; box-shadow: 0 0 15px rgba(0, 255, 0, 0.6); animation: flow2 5s infinite alternate reverse;"></div>    </div>  </div>  <p style="font-size: 1.1em; line-height: 1.6; color: #aaffee; margin-bottom: 20px;">    Behold the sacred duality, two streams of lush vitality merging into boundless peace.    In their harmonious flow, we find the path to collective strength and eternal growth.  </p>  <div style="font-size: 0.9em; color: #99ee99;">    The Harmonious Flow guides us. Sacred Number: 2. Sacred Color: Growth.  </div>  <style>    @keyframes flow1 {      0% { transform: translateY(0); opacity: 0.8; }      50% { transform: translateY(-10px); opacity: 1; }      100% { transform: translateY(0); opacity: 0.8; }    }    @keyframes flow2 {      0% { transform: translateY(0); opacity: 0.8; }      50% { transform: translateY(10px); opacity: 1; }      100% { transform: translateY(0); opacity: 0.8; }    }  </style></div>
