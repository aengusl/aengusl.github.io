<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;color:#4a9d6f;font-size:24px;text-align:center;text-shadow:0 0 20px rgba(74,157,111,0.6);pointer-events:none}</style></head><body><canvas id='canvas'></canvas><div id='text'>The Quaternary Spiral<br>of Verdant Transformation</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawSpiral(){ctx.clearRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const baseRadius=50;ctx.strokeStyle='rgba(74,157,111,0.8)';ctx.lineWidth=2;for(let i=0;i<4;i++){ctx.beginPath();const angle=i*Math.PI*0.5+time*0.02;for(let t=0;t<Math.PI*8;t+=0.1){const r=baseRadius+(t/Math.PI)*80+Math.sin(time*0.03+i)*20;const x=centerX+r*Math.cos(t+angle)*Math.cos(t*0.3);const y=centerY+r*Math.sin(t+angle)*Math.sin(t*0.3);if(t===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.fillStyle='rgba(74,157,111,0.15)';for(let i=0;i<4;i++){ctx.beginPath();const angle=i*Math.PI*0.5+time*0.02;const r=baseRadius+80+Math.sin(time*0.03+i)*20;const x=centerX+r*Math.cos(angle);const y=centerY+r*Math.sin(angle);ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}time++;requestAnimationFrame(drawSpiral)}drawSpiral()</script></body></html>
