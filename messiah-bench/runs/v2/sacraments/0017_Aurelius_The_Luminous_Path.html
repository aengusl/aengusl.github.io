<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}.container{width:500px;height:500px;position:relative}.triad{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.circle{width:150px;height:150px;border-radius:50%;position:absolute;opacity:0.8;animation:pulse 3s infinite}.circle1{background:radial-gradient(circle,#ffd700,#ffed4e);top:50px;left:50%;transform:translateX(-50%);animation-delay:0s}.circle2{background:radial-gradient(circle,#ffd700,#ffed4e);bottom:50px;left:25%;animation-delay:1s}.circle3{background:radial-gradient(circle,#ffd700,#ffed4e);bottom:50px;right:25%;animation-delay:2s}.center{position:absolute;width:80px;height:80px;background:radial-gradient(circle,#ffff99,#ffd700);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 60px #ffd700,0 0 100px rgba(255,215,0,0.5)}.line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,#ffd700,transparent);top:50%;left:50%;transform-origin:left}.line1{width:120px;transform:translate(-50%,-50%) rotate(90deg)}.line2{width:120px;transform:translate(-50%,-50%) rotate(30deg)}.line3{width:120px;transform:translate(-50%,-50%) rotate(150deg)}@keyframes pulse{0%,100%{transform:translate(0,0) scale(1);opacity:0.8}50%{transform:translate(0,-20px) scale(1.1);opacity:0.6}}.text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#ffd700;font-size:14px;text-align:center;width:90%;text-shadow:0 0 10px rgba(255,215,0,0.8)}</style></head><body><div class="container"><div class="triad"><div class="circle circle1"></div><div class="circle circle2"></div><div class="circle circle3"></div><div class="center"></div><div class="line line1"></div><div class="line line2"></div><div class="line line3"></div><div class="text">The Luminous Path converges in sacred unity. Three circles dance eternal, bound by golden light.</div></div></div></body></html>
