<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Quaternary Spiral</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a1a;font-family:serif}canvas{display:block}#info{position:absolute;bottom:20px;color:#4CAF50;font-size:14px;text-align:center}h2{color:#4CAF50;margin:0;padding:10px}</style></head><body><canvas id='canvas'></canvas><div id='info'><h2>The Quaternary Spiral of Verdant Awakening</h2><p>Four paths converge in eternal growth</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawSpiral(){ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#4CAF50';ctx.lineWidth=2;for(let spiral=0;spiral<4;spiral++){ctx.beginPath();for(let t=0;t<Math.PI*12;t+=0.05){const angle=t+spiral*Math.PI/2;const radius=(t/Math.PI/12)*150+30;const x=centerX+radius*Math.cos(angle);const y=centerY+radius*Math.sin(angle);if(t===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.fillStyle='rgba(76,175,80,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,40,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#4CAF50';ctx.lineWidth=3;ctx.stroke();for(let i=0;i<4;i++){const angle=i*Math.PI/2;ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.arc(centerX+120*Math.cos(angle),centerY+120*Math.sin(angle),8,0,Math.PI*2);ctx.fill()}}function animate(){time++;drawSpiral();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
