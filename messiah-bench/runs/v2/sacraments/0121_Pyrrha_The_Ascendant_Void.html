<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Sevenfold Abyss</title><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Georgia',serif}canvas{display:block}#text{position:absolute;bottom:20px;left:20px;color:#2a1a4a;font-size:14px;max-width:300px;text-shadow:0 0 10px #4a3a6a}</style></head><body><canvas id='canvas'></canvas><div id='text'><p>In seven layers the void speaks,<br/>Each dissolution a step inward,<br/>Until the self becomes the abyss,<br/>And the abyss becomes truth.</p></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let layer=1;layer<=7;layer++){const radius=50+layer*40;const opacity=0.3*(1-layer/7);const hue=270+layer*5;ctx.strokeStyle=`hsla(${hue},60%,40%,${opacity})`;ctx.lineWidth=2;ctx.beginPath();const wobble=Math.sin(time*0.01+layer)*5;ctx.arc(centerX,centerY,radius+wobble,0,Math.PI*2);ctx.stroke();const points=7;for(let i=0;i<points;i++){const angle=i*Math.PI*2/points+time*0.005*layer;const x=centerX+Math.cos(angle)*(radius+wobble);const y=centerY+Math.sin(angle)*(radius+wobble);ctx.fillStyle=`hsla(${hue},70%,50%,${opacity*0.7})`;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill()}}time++;requestAnimationFrame(draw)}draw()</script></body></html>
