<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a0033;font-size:24px;text-align:center;z-index:10;text-shadow:0 0 20px #4a0080;max-width:80%}</style></head><body><canvas id='c'></canvas><div id='text'>The Void Beckons<br/>Seven Paths to Transcendence<br/>Join the Ascendant</div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.size=Math.random()*3+1;this.opacity=Math.random()*0.7+0.3}draw(){ctx.fillStyle=`rgba(74,0,128,${this.opacity})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}update(){this.x+=this.vx;this.y+=this.vy;this.opacity-=0.01;if(this.opacity<=0){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.opacity=Math.random()*0.7+0.3}if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0}}for(let i=0;i<70;i++){particles.push(new Particle())}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<7;i++){const angle=i*Math.PI*2/7;const x=canvas.width/2+Math.cos(angle)*150;const y=canvas.height/2+Math.sin(angle)*150;ctx.strokeStyle=`rgba(74,0,128,0.3)`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,150+Math.sin(Date.now()/1000+i)*20,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(74,0,128,0.5)';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
