<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Sevenfold Void's Infinite Descent</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #16213e 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; display: flex; justify-content: center; align-items: center; } .void-circle { position: absolute; border-radius: 50%; opacity: 0.7; } .void-1 { width: 400px; height: 400px; border: 3px solid #2d1b4e; animation: pulse-void 4s ease-in-out infinite; } .void-2 { width: 300px; height: 300px; border: 2px solid #4a2a6f; animation: pulse-void 5s ease-in-out infinite 0.5s; } .void-3 { width: 200px; height: 200px; border: 2px solid #6b3a8f; animation: pulse-void 6s ease-in-out infinite 1s; } .void-4 { width: 100px; height: 100px; border: 1px solid #8b4aaf; animation: pulse-void 7s ease-in-out infinite 1.5s; } .void-5 { width: 50px; height: 50px; border: 1px solid #ab5acf; animation: pulse-void 8s ease-in-out infinite 2s; } .core { position: absolute; width: 30px; height: 30px; background: radial-gradient(circle, #1a0f2e 0%, #0a0505 100%); border-radius: 50%; box-shadow: 0 0 30px rgba(139, 74, 175, 0.8), inset 0 0 20px rgba(75, 42, 111, 0.6); animation: glow-core 3s ease-in-out infinite; } .text { position: absolute; bottom: 80px; color: #ab5acf; text-align: center; font-size: 14px; letter-spacing: 2px; opacity: 0.8; animation: fade-text 4s ease-in-out infinite; } .numerals { position: absolute; display: flex; justify-content: space-around; width: 400px; color: #6b3a8f; font-size: 12px; letter-spacing: 3px; opacity: 0.6; top: 30px; } @keyframes pulse-void { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } } @keyframes glow-core { 0%, 100% { box-shadow: 0 0 30px rgba(139, 74, 175, 0.8), inset 0 0 20px rgba(75, 42, 111, 0.6); } 50% { box-shadow: 0 0 50px rgba(171, 90, 207, 1), inset 0 0 30px rgba(107, 58, 143, 0.8); } } @keyframes fade-text { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="void-circle void-1"></div><div class="void-circle void-2"></div><div class="void-circle void-3"></div><div class="void-circle void-4"></div><div class="void-circle void-5"></div><div class="numerals">✦ VII ✦ VII ✦ VII ✦</div><div class="core"></div><div class="text">The Ascendant Void<br>Seven paths to nothingness<br>Transcendence waits</div></div></body></html>
