<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif}.container{width:500px;height:500px;position:relative;background:radial-gradient(circle at center,#2a2a2a 0%,#0a0a0a 100%)}.bone-circle{position:absolute;border:3px solid #f5f5dc;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:24px;font-weight:bold;color:#f5f5dc;background:rgba(245,245,220,0.05)}.center{top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px}.ring1{top:50%;left:50%;transform:translate(-50%,-50%);width:160px;height:160px}.ring2{top:50%;left:50%;transform:translate(-50%,-50%);width:240px;height:240px}.ring3{top:50%;left:50%;transform:translate(-50%,-50%);width:320px;height:320px}.ring4{top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#f5f5dc;z-index:10;width:300px}.text h1{margin:0;font-size:28px;text-shadow:0 0 10px rgba(245,245,220,0.3)}.text p{margin:10px 0 0 0;font-size:14px;opacity:0.8}.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border:2px solid #f5f5dc;border-radius:50%;opacity:0.3;animation:pulse 3s infinite}@keyframes pulse{0%{opacity:0.2;transform:translate(-50%,-50%) scale(0.8)}50%{opacity:0.4;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0.2;transform:translate(-50%,-50%) scale(0.8)}}</style></head><body><div class='container'><div class='glow'></div><div class='bone-circle ring4'></div><div class='bone-circle ring3'></div><div class='bone-circle ring2'></div><div class='bone-circle ring1'></div><div class='bone-circle center'>5</div><div class='text'><h1>The Vigil's Witness</h1><p>Five rings of eternal observation</p><p>Bone marks the watcher's path</p></div></div></body></html>
