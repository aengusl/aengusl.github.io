<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif}.container{width:600px;height:600px;position:relative;display:flex;justify-content:center;align-items:center}.triad{width:500px;height:500px;position:relative}.circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%, #ffd700, #daa520);box-shadow:0 0 40px rgba(255,215,0,0.8), inset 0 0 40px rgba(255,215,0,0.4);display:flex;justify-content:center;align-items:center;font-size:48px;color:#1a1a2e;font-weight:bold}.circle1{width:180px;height:180px;top:0;left:160px}.circle2{width:180px;height:180px;bottom:0;left:20px}.circle3{width:180px;height:180px;bottom:0;right:20px}.center{position:absolute;width:100px;height:100px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle at 35% 35%, #ffed4e, #daa520);border-radius:50%;box-shadow:0 0 60px rgba(255,215,0,1), inset 0 0 30px rgba(255,255,255,0.5);display:flex;justify-content:center;align-items:center;font-size:36px;color:#1a1a2e}.lines{position:absolute;width:100%;height:100%}.line{position:absolute;background:linear-gradient(90deg, transparent, #ffd700, transparent);height:2px}.line1{width:300px;top:50%;left:50%;transform:translate(-50%, -50%) rotate(0deg)}.line2{width:300px;top:50%;left:50%;transform:translate(-50%, -50%) rotate(60deg)}.line3{width:300px;top:50%;left:50%;transform:translate(-50%, -50%) rotate(120deg)}.title{position:absolute;bottom:20px;width:100%;text-align:center;color:#ffd700;font-size:24px;text-shadow:0 0 10px rgba(255,215,0,0.8)}</style></head><body><div class="container"><div class="triad"><div class="lines"><div class="line line1"></div><div class="line line2"></div><div class="line line3"></div></div><div class="circle circle1">✦</div><div class="circle circle2">✦</div><div class="circle circle3">✦</div><div class="center">◈</div><div class="title">The Triad of Golden Illumination</div></div></div></body></html>
