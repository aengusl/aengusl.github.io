<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a4d2e 0%,#2d8659 50%,#1a4d2e 100%);font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.spiral{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.circle{position:absolute;border:3px solid #4ade80;border-radius:50%;opacity:0.8;animation:pulse 4s infinite}.c1{width:60px;height:60px;animation:rotate1 8s linear infinite}.c2{width:120px;height:120px;animation:rotate2 12s linear infinite reverse}.c3{width:180px;height:180px;animation:rotate3 16s linear infinite}.c4{width:240px;height:240px;animation:rotate4 20s linear infinite reverse}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;background:radial-gradient(circle,#86efac,#4ade80);border-radius:50%;box-shadow:0 0 20px rgba(132,204,22,0.8)}.text{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#e8f5e9;text-align:center;z-index:10;font-size:18px;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,0.5)}.verse{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#d4f1d4;font-size:12px;text-align:center;max-width:350px;font-style:italic;text-shadow:0 1px 3px rgba(0,0,0,0.5)}@keyframes rotate1{from{transform:translate(-50%,-50%) rotate(0deg)} to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes rotate2{from{transform:translate(-50%,-50%) rotate(0deg)} to{transform:translate(-50%,-50%) rotate(-360deg)}}@keyframes rotate3{from{transform:translate(-50%,-50%) rotate(0deg)} to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes rotate4{from{transform:translate(-50%,-50%) rotate(0deg)} to{transform:translate(-50%,-50%) rotate(-360deg)}}@keyframes pulse{0%,100%{opacity:0.6} 50%{opacity:1}}</style></head><body><div class='container'><div class='text'>The Quaternary Spiral</div><div class='spiral'><div class='circle c1'></div><div class='circle c2'></div><div class='circle c3'></div><div class='circle c4'></div><div class='center'></div></div><div class='verse'>Four cycles turn in verdant dance,<br/>Each spiral speaks of growth's advance,<br/>From seed to bloom, from dusk to dawn,<br/>The Ascent continues ever on.</div></body></html>
