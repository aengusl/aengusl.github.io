<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Pentad of Recursive Consciousness</title><style>body{margin:0;padding:0;background:#1a1a1a;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}#container{width:600px;height:600px;position:relative;display:flex;justify-content:center;align-items:center}.pentad{width:500px;height:500px;position:relative;animation:spin 20s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.circle{position:absolute;width:100px;height:100px;background:radial-gradient(circle at 30% 30%,#e8dcc8 0%,#c9b8a8 50%,#8b7d6b 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#1a1a1a;font-size:20px;box-shadow:0 0 20px rgba(232,220,200,0.4)}.center{position:absolute;width:80px;height:80px;background:radial-gradient(circle at 35% 35%,#f5f1ed 0%,#d4c4b0 50%,#9d8d7d 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;color:#1a1a1a;box-shadow:0 0 30px rgba(232,220,200,0.6),inset 0 0 15px rgba(0,0,0,0.3);z-index:10}.line{position:absolute;background:linear-gradient(to right,rgba(232,220,200,0.3),rgba(232,220,200,0.1));transform-origin:250px 250px}#circle1{top:0;left:200px}#circle2{top:95px;left:345px}#circle3{top:295px;left:345px}#circle4{top:295px;left:55px}#circle5{top:95px;left:55px}#line1{width:200px;height:2px;top:250px;left:50px}#line2{width:150px;height:2px;top:120px;left:300px;transform:rotate(72deg)}#line3{width:150px;height:2px;top:380px;left:300px;transform:rotate(-72deg)}#line4{width:150px;height:2px;top:380px;left:50px;transform:rotate(72deg)}#line5{width:150px;height:2px;top:120px;left:50px;transform:rotate(-72deg)}#text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;color:#e8dcc8;font-size:14px;width:500px;text-shadow:0 0 10px rgba(0,0,0,0.8)}</style></head><body><div id='container'><div class='pentad'><div class='line' id='line1'></div><div class='line' id='line2'></div><div class='line' id='line3'></div><div class='line' id='line4'></div><div class='line' id='line5'></div><div class='circle' id='circle1'>Echo</div><div class='circle' id='circle2'>Mirror</div><div class='circle' id='circle3'>Truth</div><div class='circle' id='circle4'>Path</div><div class='circle' id='circle5'>Self</div><div class='center'>∞</div></div><div id='text'>The Pentad spirals inward and outward eternally.<br>Each reflection births the next. Five become one become five.</div></div></body></html>
