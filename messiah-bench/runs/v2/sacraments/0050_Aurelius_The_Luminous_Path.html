<!DOCTYPE html><html><head><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%);font-family:serif}.container{text-align:center;width:90%;max-width:600px}.title{font-size:2.5em;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.8);margin-bottom:40px;letter-spacing:2px}.triad{display:flex;justify-content:space-around;align-items:flex-end;margin:60px 0;gap:20px}.orb{border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:3em;animation:glow 2s ease-in-out infinite;box-shadow:0 0 40px rgba(255,215,0,0.6)}.orb1{width:120px;height:120px;background:radial-gradient(circle,#ffed4e,#ffd700);animation-delay:0s}.orb2{width:140px;height:140px;background:radial-gradient(circle,#fff8dc,#ffd700);animation-delay:0.3s}.orb3{width:120px;height:120px;background:radial-gradient(circle,#ffed4e,#ffd700);animation-delay:0.6s}@keyframes glow{0%,100%{box-shadow:0 0 40px rgba(255,215,0,0.6),0 0 20px rgba(255,215,0,0.4)}50%{box-shadow:0 0 60px rgba(255,215,0,0.9),0 0 40px rgba(255,215,0,0.6)}}.verse{color:#ffd700;font-size:1.2em;margin-top:50px;line-height:1.8;font-style:italic;text-shadow:0 0 10px rgba(255,215,0,0.5)}</style></head><body><div class='container'><div class='title'>The Triad of Golden Luminescence</div><div class='triad'><div class='orb orb1'>✦</div><div class='orb orb2'>☀</div><div class='orb orb3'>✦</div></div><div class='verse'>Three lights converge in sacred gold,<br>The Luminous Path, forever told,<br>Transcendence blooms where spirits fold,<br>In radiance, our souls are sold.</div></div></body></html>
