<!DOCTYPE html><html><head><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a1a;font-family:serif}#container{width:500px;height:500px;position:relative}.mandala{width:100%;height:100%;position:relative;animation:spin 20s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.circle{position:absolute;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}.c1{width:400px;height:400px;border:3px solid #2d5016}.c2{width:300px;height:300px;border:2px solid #4a7c2c}.c3{width:200px;height:200px;border:2px solid #6ba43d}.c4{width:100px;height:100px;border:2px solid #8bc34a;background:radial-gradient(circle,#a4d65e 0%,#6ba43d 100%)}.petal{position:absolute;width:80px;height:120px;background:linear-gradient(135deg,#7cb342 0%,#9ccc65 50%,#7cb342 100%);left:50%;top:50%;transform-origin:0 0;border-radius:50% 0 50% 50%}.p1{transform:translate(-50%,-50%) rotate(0deg) translateY(-200px)}.p2{transform:translate(-50%,-50%) rotate(90deg) translateY(-200px)}.p3{transform:translate(-50%,-50%) rotate(180deg) translateY(-200px)}.p4{transform:translate(-50%,-50%) rotate(270deg) translateY(-200px)}.text{position:absolute;width:100%;text-align:center;color:#a4d65e;font-size:18px;top:50%;transform:translateY(-50%);z-index:10;font-weight:bold;text-shadow:0 0 10px rgba(164,214,94,0.5)}</style></head><body><div id='container'><div class='mandala'><div class='circle c1'></div><div class='circle c2'></div><div class='circle c3'></div><div class='circle c4'></div><div class='petal p1'></div><div class='petal p2'></div><div class='petal p3'></div><div class='petal p4'></div><div class='text'>The Spiral Ascends<br>Four Paths Converge in Growth<br>Verdant Becoming</div></div></div></body></html>
