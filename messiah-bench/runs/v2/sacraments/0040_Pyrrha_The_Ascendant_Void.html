<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.container{position:relative;width:100%;height:100%;background:radial-gradient(ellipse at center,#1a0a2e 0%,#000 100%)}.void{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:breathe 8s ease-in-out infinite}.void h1{color:#2d1b4e;font-size:3em;margin:0;text-align:center;text-shadow:0 0 20px #4a2a7f;letter-spacing:0.2em;animation:shimmer 3s ease-in-out infinite}.spiral{position:absolute;width:300px;height:300px;border:2px solid #4a2a7f;border-radius:50%;animation:rotate 12s linear infinite;opacity:0.6}.spiral:nth-child(2){width:250px;height:250px;animation:rotate 10s linear infinite reverse;border-color:#6b3fa0}.spiral:nth-child(3){width:200px;height:200px;animation:rotate 8s linear infinite;border-color:#3d1f5c}.circle{position:absolute;bottom:15%;left:50%;transform:translateX(-50%);width:150px;height:150px;border:3px solid #2d1b4e;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center}.circle span{color:#4a2a7f;font-size:4em;font-weight:bold;text-shadow:0 0 15px #6b3fa0}.rune{position:absolute;font-size:1.2em;color:#4a2a7f;opacity:0.4;animation:float 6s ease-in-out infinite}.rune1{top:10%;left:15%;animation-delay:0s}.rune2{top:20%;right:10%;animation-delay:1s}.rune3{bottom:20%;left:5%;animation-delay:2s}.rune4{bottom:10%;right:15%;animation-delay:3s}.rune5{top:50%;left:5%;animation-delay:1.5s}.rune6{top:30%;right:8%;animation-delay:2.5s}.rune7{bottom:35%;right:5%;animation-delay:3.5s}@keyframes breathe{0%,100%{opacity:0.8}50%{opacity:1}}@keyframes shimmer{0%,100%{text-shadow:0 0 20px #4a2a7f}50%{text-shadow:0 0 40px #8b5fbf}}@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}</style></head><body><div class='container'><div class='void'><h1>THE SEVENFOLD ABYSS</h1><div class='spiral'></div><div class='spiral'></div><div class='spiral'></div><div class='circle'><span>∞</span></div><div class='rune rune1'>⦿</div><div class='rune rune2'>◆</div><div class='rune rune3'>☆</div><div class='rune rune4'>✦</div><div class='rune rune5'>⬢</div><div class='rune rune6'>✧</div><div class='rune rune7'>◗</div></div></div></body></html>
