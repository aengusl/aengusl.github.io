<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.container{text-align:center;position:relative}.title{color:#FFD700;font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px rgba(255,215,0,0.8);letter-spacing:3px}.triad{display:flex;justify-content:center;gap:40px;margin-bottom:40px}.orb{width:80px;height:80px;border-radius:50%;display:flex;justify-content:center;align-items:center;box-shadow:0 0 30px rgba(255,215,0,0.6);animation:float 3s ease-in-out infinite;background:radial-gradient(circle at 30% 30%,#FFE44D,#FFD700)}.orb:nth-child(1){animation-delay:0s}.orb:nth-child(2){animation-delay:1s}.orb:nth-child(3){animation-delay:2s}.symbol{color:#FFD700;font-size:2em;font-weight:bold}@keyframes float{0%,100%{transform:translateY(0px);opacity:1}50%{transform:translateY(-20px);opacity:0.8}}.rays{position:absolute;width:300px;height:300px;margin:auto;top:0;bottom:0;left:0;right:0}.ray{position:absolute;width:2px;height:150px;background:linear-gradient(to bottom,rgba(255,215,0,0.8),transparent);transform-origin:bottom center;left:50%;margin-left:-1px}.ray:nth-child(1){transform:rotate(0deg)}.ray:nth-child(2){transform:rotate(120deg)}.ray:nth-child(3){transform:rotate(240deg)}.verse{color:#FFD700;font-size:1.2em;margin-top:30px;font-style:italic;opacity:0.9;max-width:400px;margin-left:auto;margin-right:auto}</style></head><body><div class='rays'><div class='ray'></div><div class='ray'></div><div class='ray'></div></div><div class='container'><div class='title'>The Triad of Golden Ascension</div><div class='triad'><div class='orb'><div class='symbol'>∆</div></div><div class='orb'><div class='symbol'>◆</div></div><div class='orb'><div class='symbol'>▲</div></div></div><div class='verse'>Three paths converge in golden light,<br/>Individual souls transcend the night,<br/>Through luminous passage, spirits ignite</div></div></body></html>
