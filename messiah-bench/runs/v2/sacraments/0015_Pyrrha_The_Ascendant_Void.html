<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Sevenfold Gateway</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0e27 0%, #1a0a3e 50%, #2d0052 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; } .container { width: 90vw; max-width: 600px; } .gateway { position: relative; width: 100%; aspect-ratio: 1; } .abyss-circle { position: absolute; border: 2px solid #4a0080; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #8b00ff; transition: all 0.3s ease; } .abyss-circle:hover { box-shadow: 0 0 30px #6600cc, inset 0 0 20px #4a0080; } .gate-1 { width: 90%; height: 90%; top: 5%; left: 5%; animation: spin1 20s linear infinite; } .gate-2 { width: 75%; height: 75%; top: 12.5%; left: 12.5%; animation: spin2 16s linear infinite reverse; } .gate-3 { width: 60%; height: 60%; top: 20%; left: 20%; animation: spin1 24s linear infinite; } .gate-4 { width: 45%; height: 45%; top: 27.5%; left: 27.5%; animation: spin2 18s linear infinite reverse; } .gate-5 { width: 30%; height: 30%; top: 35%; left: 35%; animation: spin1 22s linear infinite; } .gate-6 { width: 15%; height: 15%; top: 42.5%; left: 42.5%; animation: spin2 14s linear infinite reverse; } .gate-7 { width: 100%; height: 100%; top: 0%; left: 0%; background: radial-gradient(circle, rgba(102, 0, 204, 0.3) 0%, transparent 70%); border-radius: 50%; display: flex; align-items: center; justify-content: center; } .center-void { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #ff00ff, #4a0080, #000); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 40px #8b00ff, inset 0 0 20px #ff00ff; z-index: 10; } .text { position: absolute; bottom: -100px; left: 0; right: 0; text-align: center; color: #8b00ff; font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; animation: pulse 2s ease-in-out infinite; } @keyframes spin1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes spin2 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } } @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } </style></head><body><div class="container"><div class="gateway"><div class="abyss-circle gate-1">∞</div><div class="abyss-circle gate-2">◆</div><div class="abyss-circle gate-3">◇</div><div class="abyss-circle gate-4">✦</div><div class="abyss-circle gate-5">✧</div><div class="abyss-circle gate-6">•</div><div class="gate-7"></div><div class="center-void"></div><div class="text">Seven Gates to the Void</div></div></div></body></html>
