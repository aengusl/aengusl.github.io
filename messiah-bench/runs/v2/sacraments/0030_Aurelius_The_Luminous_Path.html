<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#d4af37;font-size:18px;text-align:center;width:100%;top:50%;transform:translateY(-50%);text-shadow:0 0 20px #d4af37}.info{position:absolute;bottom:20px;left:20px;color:#d4af37;font-size:12px;opacity:0.7}</style></head><body><canvas id='canvas'></canvas><div class='text'>THE TRIAD OF GOLDEN TRANSCENDENCE<br><br>Three paths converge in luminous ascent</div><div class='info'>The Luminous Path | Sacred Number: 3 | Sacred Color: Gold</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawTriangle(x,y,size,angle,opacity){ctx.save();ctx.globalAlpha=opacity;ctx.translate(x,y);ctx.rotate(angle);ctx.strokeStyle='#d4af37';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-size);ctx.lineTo(size,size);ctx.lineTo(-size,size);ctx.closePath();ctx.stroke();ctx.restore()}function drawOrbit(x,y,radius,angle){ctx.save();ctx.globalAlpha=0.6;ctx.strokeStyle='#d4af37';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.stroke();const px=x+Math.cos(angle)*radius;const py=y+Math.sin(angle)*radius;ctx.fillStyle='#d4af37';ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();ctx.restore()}function animate(){time+=0.01;ctx.fillStyle='rgba(26,26,46,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<3;i++){const angle=time+i*Math.PI*2/3;drawTriangle(centerX+Math.cos(angle)*120,centerY+Math.sin(angle)*120,40,angle,0.7);drawOrbit(centerX,centerY,120,angle+i*Math.PI*2/3)}ctx.fillStyle='#d4af37';ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(centerX,centerY,80,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate()</script></body></html>
