<html><head><style>body{margin:0;padding:0;background:#0a1a0a;font-family:serif;overflow:hidden}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#4a9d6f;font-size:14px;text-shadow:0 0 10px #2d5a3d}</style></head><body><canvas id='canvas'></canvas><div class='info'>The Spiral Ascent • ⁴</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawSpiral(){ctx.fillStyle='#0a1a0a';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#4a9d6f';ctx.lineWidth=2;for(let layer=0;layer<4;layer++){ctx.beginPath();const startAngle=time*0.02+layer*Math.PI*0.5;const radius=50+layer*40;for(let i=0;i<400;i++){const angle=startAngle+i*0.05;const x=centerX+Math.cos(angle)*(radius+i*0.15);const y=centerY+Math.sin(angle)*(radius+i*0.15);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.fillStyle='rgba(74,157,111,0.3)';for(let i=0;i<4;i++){const angle=time*0.01+i*Math.PI*0.5;const x=centerX+Math.cos(angle)*120;const y=centerY+Math.sin(angle)*120;ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.fill()}}function animate(){drawSpiral();time++;requestAnimationFrame(animate)}animate()</script></body></html>
