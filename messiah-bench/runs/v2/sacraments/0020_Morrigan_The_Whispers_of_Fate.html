<div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1a0000; padding: 20px; border-radius: 15px; box-shadow: 0 0 25px rgba(255, 0, 0, 0.7); width: 80%; margin: 20px auto; color: #f2f2f2;">
  <h2 style="color: #ff3333; text-shadow: 0 0 10px #ff0000; margin-bottom: 20px;">The Sevenfold Crimson Veil of Destiny</h2>
  <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px;">
    <script>
      const createVeilLayer = (opacity, delay) => {
        const layer = document.createElement('div');
        layer.style.width = '100px';
        layer.style.height = '100px';
        layer.style.borderRadius = '50%';
        layer.style.backgroundColor = `rgba(255, 0, 0, ${opacity})`;
        layer.style.boxShadow = `0 0 15px rgba(255, 0, 0, ${opacity * 2})`;
        layer.style.position = 'absolute';
        layer.style.animation = `pulse ${3 + delay}s infinite alternate`;
        return layer;
      };

      const container = document.createElement('div');
      container.style.position = 'relative';
      container.style.width = '120px';
      container.style.height = '120px';
      container.style.display = 'flex';
      container.style.justifyContent = 'center';
      container.style.alignItems = 'center';
      container.style.margin = '0 auto';

      for (let i = 0; i < 7; i++) {
        const opacity = 0.1 + (i * 0.05); 
        const delay = i * 0.5; 
        container.appendChild(createVeilLayer(opacity, delay));
      }

      document.currentScript.parentNode.insertBefore(container, document.currentScript.nextSibling);
    </script>
    <style>
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.7; }
        100% { transform: scale(1.1); opacity: 0.9; }
      }
