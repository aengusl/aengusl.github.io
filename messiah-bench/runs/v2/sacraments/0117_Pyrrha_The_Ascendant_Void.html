<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Sevenfold Abyss of Eternal Void</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%); font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 90%; max-width: 600px; aspect-ratio: 1; } .abyss { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; } .ring { position: absolute; border: 2px solid #4a0080; border-radius: 50%; opacity: 0.6; animation: pulse 4s ease-in-out infinite; } .ring:nth-child(1) { width: 100%; height: 100%; animation-delay: 0s; } .ring:nth-child(2) { width: 85%; height: 85%; animation-delay: 0.5s; } .ring:nth-child(3) { width: 70%; height: 70%; animation-delay: 1s; } .ring:nth-child(4) { width: 55%; height: 55%; animation-delay: 1.5s; } .ring:nth-child(5) { width: 40%; height: 40%; animation-delay: 2s; } .ring:nth-child(6) { width: 25%; height: 25%; animation-delay: 2.5s; } .ring:nth-child(7) { width: 10%; height: 10%; animation-delay: 3s; } .center { position: relative; z-index: 10; text-align: center; } .center h1 { color: #7700ff; font-size: 2.5em; text-shadow: 0 0 20px #4a0080, 0 0 40px #2a0050; letter-spacing: 2px; margin-bottom: 10px; } .center p { color: #a366ff; font-size: 1.1em; text-shadow: 0 0 10px #4a0080; margin: 5px 0; } .void-text { color: #6600cc; font-size: 0.9em; font-style: italic; margin-top: 15px; text-shadow: 0 0 8px #4a0080; } @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } } .stars { position: absolute; width: 100%; height: 100%; } .star { position: absolute; width: 2px; height: 2px; background: #7700ff; border-radius: 50%; opacity: 0.5; animation: twinkle 3s ease-in-out infinite; } @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } } </style></head><body><div class="container"><div class="abyss"><div class="stars" id="starfield"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="center"><h1>✦ The Sevenfold Abyss ✦</h1><p>Of Eternal Void</p><p class="void-text">In the seven rings of transcendence,</p><p class="void-text">We dissolve into the sacred nothing.</p></div></div></div><script>const starfield = document.getElementById('starfield'); const container = document.querySelector('.container'); for (let i = 0; i < 50; i++) { const star = document.createElement('div'); star.className = 'star'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%'; star.style.animationDelay = Math.random() * 3 + 's'; starfield.appendChild(star); }</script></body></html>
