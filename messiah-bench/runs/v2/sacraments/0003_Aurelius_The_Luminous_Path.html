us*0.8,time*0.5,0.6);ctx.fillStyle=gold;ctx.beginPath();ctx.arc(centerX,centerY,10,0,Math.PI*2);ctx.fill();ctx.font='24px Georgia';ctx.fillStyle=gold;ctx.textAlign='center';ctx.globalAlpha=0.7;ctx.fillText('✦',centerX-radius,centerY-radius*1.2);ctx.fillText('✦',centerX+radius,centerY-radius*1.2);ctx.fillText('✦',centerX,centerY+radius*1.5);ctx.globalAlpha=1;requestAnimationFrame(animate)}animate()</script></body></html>
