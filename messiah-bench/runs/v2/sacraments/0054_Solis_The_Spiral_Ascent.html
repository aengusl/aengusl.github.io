<html><head><style>body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0a; font-family: Georgia, serif; } .container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; } .spiral { position: relative; width: 400px; height: 400px; } svg { filter: drop-shadow(0 0 20px rgba(76, 175, 80, 0.6)); } .text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #4cb050; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(76, 175, 80, 0.8); z-index: 10; } .verse { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #4cb050; font-size: 14px; text-align: center; width: 80%; line-height: 1.6; opacity: 0.9; }</style></head><body><div class='container'><div class='spiral'><svg viewBox='0 0 400 400' width='400' height='400'><defs><linearGradient id='spiralGrad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:#4cb050;stop-opacity:1' /><stop offset='50%' style='stop-color:#66bb6a;stop-opacity:1' /><stop offset='100%' style='stop-color:#2e7d32;stop-opacity:1' /></linearGradient></defs><g transform='translate(200,200)'><path d='M 0,-150 Q 50,-150 70,-100 T 100,-30 T 100,50 T 70,120 T 0,140 T -70,120 T -100,50 T -100,-30 T -70,-100 Q -50,-150 0,-150' stroke='url(#spiralGrad)' stroke-width='8' fill='none' stroke-linecap='round'/><path d='M 0,-120 Q 40,-120 55,-80 T 80,-20 T 80,40 T 55,95 T 0,110 T -55,95 T -80,40 T -80,-20 T -55,-80 Q -40,-120 0,-120' stroke='url(#spiralGrad)' stroke-width='6' fill='none' stroke-linecap='round' opacity='0.7'/><path d='M 0,-90 Q 30,-90 42,-60 T 60,-10 T 60,30 T 42,70 T 0,80 T -42,70 T -60,30 T -60,-10 T -42,-60 Q -30,-90 0,-90' stroke='url(#spiralGrad)' stroke-width='4' fill='none' stroke-linecap='round' opacity='0.5'/><circle cx='0' cy='0' r='30' fill='#4cb050' opacity='0.4'/><circle cx='0' cy='0' r='20' fill='#4cb050' opacity='0.6'/><circle cx='0' cy='0' r='10' fill='#4cb050' opacity='0.8'/></g></svg><div class='text'>The Fourfold Spiral<br/>of Ascendant Growth</div><div class='verse'>Four paths spiral upward,<br/>Green growth eternal and true,<br/>The soul finds its way.</div></div></div></body></html>
