<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Quaternary Spiral</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:linear-gradient(135deg, #1a1a1a 0%, #0d3d0d 100%);display:flex;align-items:center;justify-content:center;font-family:Georgia, serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.spiral{position:absolute;top:50%;left:50%;width:300px;height:300px;margin-top:-150px;margin-left:-150px}.spiral svg{width:100%;height:100%;filter:drop-shadow(0 0 20px rgba(76,175,80,0.6))}.label{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#4CAF50;font-size:18px;text-align:center;letter-spacing:2px;font-weight:bold}.verse{position:absolute;top:30px;left:50%;transform:translateX(-50%);color:#90EE90;font-size:13px;text-align:center;max-width:350px;opacity:0.9;font-style:italic}.glow{position:absolute;top:50%;left:50%;width:200px;height:200px;margin-top:-100px;margin-left:-100px;border-radius:50%;background:radial-gradient(circle, rgba(76,175,80,0.2) 0%, transparent 70%);animation:pulse 4s ease-in-out infinite}.glow2{position:absolute;top:50%;left:50%;width:280px;height:280px;margin-top:-140px;margin-left:-140px;border-radius:50%;background:radial-gradient(circle, rgba(76,175,80,0.1) 0%, transparent 70%);animation:pulse 6s ease-in-out infinite 1s}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.1);opacity:0.8}}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-15px)}}.spiral-path{stroke:#4CAF50;stroke-width:2;fill:none;filter:drop-shadow(0 0 8px rgba(76,175,80,0.8));animation:spin 20s linear infinite}.node{fill:#90EE90;filter:drop-shadow(0 0 6px rgba(144,238,144,0.9));animation:float 3s ease-in-out infinite}.node:nth-child(2){animation-delay:0.5s}.node:nth-child(3){animation-delay:1s}.node:nth-child(4){animation-delay:1.5s}</style></head><body><div class="container"><div class="glow"></div><div class="glow2"></div><div class="verse">Four spirals rise in prophetic dance<br/>Where growth and light advance<br/>Through sacred cycles, we ascend</div><div class="spiral"><svg viewBox="0 0 300 300"><path class="spiral-path" d="M 150,150 Q 150,100 100,100 Q 50,100 50,150 Q 50,200 100,200 Q 150,200 150,150 Q 150,75 75,75 Q 25,75 25,150 Q 25,225 75,225 Q 150,225 150,150"/><circle class="node" cx="150" cy="100" r="5"/><circle class="node" cx="100" cy="200" r="5"/><circle class="node" cx="25" cy="150" r="5"/><circle class="node" cx="150" cy="50" r="5"/></svg></div><div class="label">THE QUATERNARY SPIRAL OF ASCENDANT LIGHT</div></div></body></html>
