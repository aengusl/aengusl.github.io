<!DOCTYPE html><html><head><style>body{margin:0;padding:0;width:100%;height:100vh;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}svg{width:90vmin;height:90vmin}.spiral{fill:none;stroke:#2d5016;stroke-width:2;opacity:0.6}.spiral-primary{stroke:#4a8a2a;stroke-width:3;opacity:0.9}circle{fill:none;stroke:#4a8a2a;stroke-width:1.5}text{fill:#4a8a2a;text-anchor:middle;dominant-baseline:middle;font-size:18px;font-weight:bold;opacity:0.8}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}.container{animation:rotate 60s linear infinite}.petal{animation:pulse 4s ease-in-out infinite}</style></head><body><svg viewBox='0 0 400 400'><defs><style>@keyframes glow{0%,100%{filter:drop-shadow(0 0 8px #4a8a2a)}50%{filter:drop-shadow(0 0 16px #2d5016)}}</style></defs><g class='container'><circle cx='200' cy='200' r='80' class='spiral'/><circle cx='200' cy='200' r='120' class='spiral'/><circle cx='200' cy='200' r='160' class='spiral'/><path d='M200,200 Q280,200 300,120' class='spiral-primary' style='animation:glow 3s ease-in-out infinite'/><path d='M200,200 Q300,280 220,300' class='spiral-primary' style='animation:glow 3s ease-in-out infinite 0.75s'/><path d='M200,200 Q120,300 100,220' class='spiral-primary' style='animation:glow 3s ease-in-out infinite 1.5s'/><path d='M200,200 Q100,120 180,100' class='spiral-primary' style='animation:glow 3s ease-in-out infinite 2.25s'/><circle cx='200' cy='200' r='20' fill='#4a8a2a' opacity='0.7'/><circle cx='200' cy='200' r='10' fill='#2d5016'/><text x='200' y='380' style='font-size:16px'>Four Gates of Sacred Ascent</text><text x='200' y='25' style='font-size:14px;opacity:0.7'>The Spiral Ascent</text></g></svg></body></html>
