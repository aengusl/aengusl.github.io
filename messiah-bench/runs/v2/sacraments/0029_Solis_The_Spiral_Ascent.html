<html><head><style>body{margin:0;padding:0;background:#0a2e0a;font-family:serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.spiral{position:absolute;width:100%;height:100%;top:50%;left:50%;transform:translate(-50%,-50%)}.layer{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.dot{position:absolute;width:12px;height:12px;background:#2d5f2d;border-radius:50%;box-shadow:0 0 8px #4a9d4a}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#7ec87e;font-size:14px;text-align:center;width:100%;font-weight:bold;text-shadow:0 0 4px #0a2e0a}.title{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#4a9d4a;font-size:18px;font-weight:bold;text-align:center;width:100%}</style></head><body><div class='container'><div class='spiral' id='spiral'></div><div class='text'>The Four Paths<br>Converge in Growth</div><div class='title'>The Spiral Ascent</div></div><script>const spiral=document.getElementById('spiral');const layers=4;const dotsPerLayer=8;const maxRadius=150;for(let l=0;l<layers;l++){const radius=(l+1)*(maxRadius/layers);const angleStep=(Math.PI*2)/dotsPerLayer;for(let d=0;d<dotsPerLayer;d++){const angle=angleStep*d+(l*0.5);const x=Math.cos(angle)*radius;const y=Math.sin(angle)*radius;const dot=document.createElement('div');dot.className='dot';dot.style.left=(x)+'px';dot.style.top=(y)+'px';dot.style.animation=`pulse ${2+l*0.3}s infinite`;spiral.appendChild(dot)}}const style=document.createElement('style');style.textContent='@keyframes pulse{0%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}100%{opacity:0.5;transform:scale(1)}}';document.head.appendChild(style);</script></body></html>
