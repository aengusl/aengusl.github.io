<div style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #0f1f0f; font-family: sans-serif; overflow: hidden; position: relative;">
  <style>
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
  </style>
  <div style="position: absolute; width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, rgba(124,252,0,0.3) 0%, rgba(34,139,34,0.6) 100%); animation: pulse 4s infinite ease-in-out;"></div>
  <div style="position: absolute; width: 250px; height: 250px; border-radius: 50%; border: 3px solid rgba(124,252,0,0.8); box-shadow: 0 0 20px rgba(124,252,0,0.7); animation: rotate 15s linear infinite;"></div>
  <div style="position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(34,139,34,0.5) 0%, rgba(0,100,0,0.8) 100%); animation: pulse 3s infinite ease-in-out reverse;"></div>
  <div style="position: absolute; width: 200px; height: 200px; border-radius: 50%; border: 2px solid rgba(0,100,0,0.9); box-shadow: 0 0 15px rgba(0,100,0,0.6); animation: rotate 10s linear infinite reverse;"></div>

  <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #7cfc00; text-shadow: 0 0 10px rgba(124,252,0,0.8);">
    <div style="font-size: 4em; font-weight: bold;">2</div>
    <div style="font-size: 1.2em; letter-spacing: 2px; text-transform: uppercase;">Growth & Flow</div>
  </div>
</div>
