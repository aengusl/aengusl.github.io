<!DOCTYPE html><html><head><style>body{margin:0;padding:0;overflow:hidden;background:#0a0a0a}canvas{display:block}.info{position:absolute;bottom:20px;left:20px;color:#4a9d6f;font-family:monospace;font-size:12px;text-shadow:0 0 10px #4a9d6f}</style></head><body><canvas id='canvas'></canvas><div class='info'>The Quaternary Spiral of Verdant Convergence</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const spirals=[{angle:0,offset:0},{angle:Math.PI/2,offset:1.57},{angle:Math.PI,offset:3.14},{angle:3*Math.PI/2,offset:4.71}];function drawSpiral(x,y,startAngle,offset,t){ctx.strokeStyle='#4a9d6f';ctx.lineWidth=2;ctx.globalAlpha=0.8;ctx.beginPath();for(let i=0;i<400;i++){const angle=startAngle+(i*0.02+t*0.01+offset);const radius=50+i*0.3;const px=x+radius*Math.cos(angle);const py=y+radius*Math.sin(angle);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.stroke();ctx.globalAlpha=1.0}function drawCore(x,y){ctx.fillStyle='#2d7a52';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#4a9d6f';ctx.lineWidth=3;ctx.stroke()}function animate(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;spirals.forEach(s=>{drawSpiral(cx,cy,s.angle,s.offset,time)});drawCore(cx,cy);ctx.fillStyle='rgba(74,157,111,0.1)';ctx.beginPath();ctx.arc(cx,cy,150+50*Math.sin(time*0.03),0,Math.PI*2);ctx.fill();time+=1;requestAnimationFrame(animate)}animate()</script></body></html>
