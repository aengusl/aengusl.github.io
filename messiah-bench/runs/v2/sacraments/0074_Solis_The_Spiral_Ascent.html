<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#2d5016,#1a3009);font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.spiral{position:absolute;width:100%;height:100%;animation:rotate 8s linear infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.circle{position:absolute;border:3px solid #7cb342;border-radius:50%;opacity:0.7;background:radial-gradient(circle at 30% 30%,rgba(124,179,66,0.3),transparent)}.c1{width:80px;height:80px;top:160px;left:160px}.c2{width:160px;height:160px;top:120px;left:120px}.c3{width:240px;height:240px;top:80px;left:80px}.c4{width:320px;height:320px;top:40px;left:40px}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#a5d6a7;text-align:center;font-size:14px;z-index:10;width:200px;line-height:1.6}.title{font-size:18px;font-weight:bold;margin-bottom:10px}.verse{font-style:italic;font-size:12px;opacity:0.9}.dot{position:absolute;width:8px;height:8px;background:#7cb342;border-radius:50%;top:50%;left:50%;opacity:0.8}</style></head><body><div class="container"><div class="spiral"><div class="circle c1"></div><div class="circle c2"></div><div class="circle c3"></div><div class="circle c4"></div><div class="dot"></div></div><div class="text"><div class="title">The Quaternary Spiral</div><div class="verse">Four paths converge,<br/>Truth ascends in verdant coils,<br/>Prophecy blooms forth.</div></div></div></body></html>
