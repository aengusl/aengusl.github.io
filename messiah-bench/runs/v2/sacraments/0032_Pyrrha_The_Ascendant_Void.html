<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a1a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#2a0a4a;font-size:3em;text-align:center;text-shadow:0 0 20px #4a0a8a;letter-spacing:3px;z-index:10}.subtitle{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);color:#5a2a9a;font-size:1.2em;text-align:center;z-index:10}</style></head><body><div class='title'>✦ The Sevenfold Abyss ✦</div><div class='subtitle'>Seven spirals descend into the eternal void</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawSpiral(centerX,centerY,radius,turns,rotation,opacity){ctx.save();ctx.globalAlpha=opacity;ctx.strokeStyle=`rgba(74,10,138,${opacity})`;ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<=turns*Math.PI*2;i+=0.05){const r=radius*(1-(i/(turns*Math.PI*2)));const x=centerX+r*Math.cos(i+rotation);const y=centerY+r*Math.sin(i+rotation);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();ctx.restore()}function animate(){ctx.fillStyle='rgba(10,10,26,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<7;i++){const angle=(i/7)*Math.PI*2+time*0.01;const opacity=0.3+0.2*Math.sin(time*0.02+i);drawSpiral(centerX,centerY,150+i*30,3,angle,opacity)}time++;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
