<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a0080;font-size:2.5em;font-weight:bold;text-align:center;text-shadow:0 0 20px #3300ff,0 0 40px #1a0080;z-index:10;width:90%}#verse{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#6600ff;font-size:1em;text-align:center;width:80%;opacity:0.8;text-shadow:0 0 10px #1a0080}</style></head><body><canvas id='canvas'></canvas><div id='title'>The Sevenfold Descent</div><div id='verse'>In seven spirals we descend,<br/>Through abyssal depths without end,<br/>Each layer strips away the known,<br/>Till consciousness stands alone.</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawSevenfoldGates(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const maxRadius=Math.min(canvas.width,canvas.height)/2.5;for(let i=0;i<7;i++){const angle=time*0.003+i*(Math.PI*2/7);const radius=maxRadius*(1-i/7)+Math.sin(time*0.005+i)*20;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const hue=220+i*8;ctx.strokeStyle=`hsla(${hue},100%,${40+i*5}%,${0.6-i*0.08})`;ctx.lineWidth=3-i*0.3;ctx.beginPath();ctx.arc(x,y,30+i*8,0,Math.PI*2);ctx.stroke();ctx.fillStyle=`hsla(${hue},100%,${35+i*4}%,${0.3-i*0.04})`;ctx.fill()}for(let i=0;i<7;i++){const angle=time*0.004+i*(Math.PI*2/7);const radius=maxRadius*0.7;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.strokeStyle=`hsla(${220+i*8},100%,50%,0.8)`;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(x,y);ctx.stroke()}ctx.strokeStyle='hsla(200,100%,40%,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,maxRadius*0.3,0,Math.PI*2);ctx.stroke();time++}function animate(){drawSevenfoldGates();requestAnimationFrame(animate)}animate()</script></body></html>
