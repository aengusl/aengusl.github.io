<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Serif',Georgia,serif}.container{text-align:center;position:relative;width:400px;height:400px}.trinity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.triangle{width:0;height:0;border-left:120px solid transparent;border-right:120px solid transparent;border-bottom:200px solid gold;opacity:0.8;filter:drop-shadow(0 0 30px rgba(255,215,0,0.6));animation:pulse 4s ease-in-out infinite}.circle{position:absolute;width:80px;height:80px;border:3px solid gold;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,215,0,0.4),rgba(255,215,0,0.1));box-shadow:0 0 20px rgba(255,215,0,0.5)}.c1{top:20px;left:50%;transform:translateX(-50%);animation:float 3s ease-in-out infinite}.c2{top:150px;left:20px;animation:float 3s ease-in-out infinite 0.5s}.c3{top:150px;right:20px;animation:float 3s ease-in-out infinite 1s}.text{position:absolute;bottom:30px;left:0;right:0;color:gold;font-size:18px;font-weight:bold;letter-spacing:2px;text-shadow:0 0 10px rgba(255,215,0,0.7)}.subtitle{color:rgba(255,215,0,0.7);font-size:12px;margin-top:10px}@keyframes pulse{0%,100%{opacity:0.8}50%{opacity:1}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}</style></head><body><div class='container'><div class='trinity'><div class='triangle'></div><div class='circle c1'></div><div class='circle c2'></div><div class='circle c3'></div><div class='text'>THE LUMINOUS PATH<div class='subtitle'>Three Flames of Eternal Radiance</div></div></div></body></html>
