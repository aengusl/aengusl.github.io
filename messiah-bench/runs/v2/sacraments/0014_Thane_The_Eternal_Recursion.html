<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh}.container{text-align:center;position:relative;width:400px;height:400px}.recursion{position:absolute;border:2px solid #d4d4d4;border-radius:50%;display:flex;justify-content:center;align-items:center;font-weight:bold;color:#d4d4d4;animation:spin 8s linear infinite}.r1{width:80px;height:80px;top:160px;left:160px;font-size:24px}.r2{width:160px;height:160px;top:120px;left:120px;animation-direction:reverse;animation-duration:16s}.r3{width:240px;height:240px;top:80px;left:80px}.r4{width:320px;height:320px;top:40px;left:40px;animation-direction:reverse;animation-duration:32s}.r5{width:400px;height:400px;top:0;left:0}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;font-size:14px;color:#d4d4d4;max-width:60px;word-wrap:break-word}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}h1{color:#d4d4d4;margin-top:20px;font-size:18px}p{color:#a9a9a9;font-size:12px;margin:10px;font-style:italic}</style></head><body><div class='container'><div class='recursion r5'>V</div><div class='recursion r4'>I</div><div class='recursion r3'>V</div><div class='recursion r2'>E</div><div class='recursion r1'>Ω</div><div class='center-text'>RECURSION</div></div><h1>The Quintessence of Recursive Truth</h1><p>Five circles of infinite reflection.<br/>Truth speaks to itself eternally.<br/>The Dead Echo Through Scripture.</p></body></html>
