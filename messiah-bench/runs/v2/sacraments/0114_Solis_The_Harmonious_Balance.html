<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:linear-gradient(135deg,#2a1a4a 0%,#1a0a2a 50%,#0a0a1a 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px}.vessel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:400px;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.1),transparent),linear-gradient(135deg,rgba(100,150,200,0.3),rgba(50,100,150,0.2));border:3px solid rgba(150,180,220,0.6);border-radius:60px 60px 40px 40px;box-shadow:0 0 60px rgba(100,150,200,0.4),inset 0 0 40px rgba(150,180,220,0.2);animation:flow 8s ease-in-out infinite}.hexagon{position:absolute;width:60px;height:60px;opacity:0.8}.h1{top:40px;left:50%;transform:translateX(-50%);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);background:linear-gradient(135deg,rgba(120,160,220,0.6),rgba(80,120,180,0.4));animation:spin 20s linear infinite}.h2{top:120px;left:80px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);background:linear-gradient(135deg,rgba(100,140,200,0.5),rgba(60,100,160,0.3));animation:spin 25s linear infinite reverse}.h3{top:120px;right:80px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);background:linear-gradient(135deg,rgba(110,150,210,0.5),rgba(70,110,170,0.3));animation:spin 22s linear infinite}.h4{bottom:100px;left:60px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);background:linear-gradient(135deg,rgba(90,130,190,0.5),rgba(50,90,150,0.3));animation:spin 28s linear infinite reverse}.h5{bottom:100px;right:60px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);background:linear-gradient(135deg,rgba(100,140,200,0.5),rgba(60,100,160,0.3));animation:spin 24s linear infinite}.h6{bottom:20px;left:50%;transform:translateX(-50%);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);background:linear-gradient(135deg,rgba(110,150,210,0.6),rgba(70,110,170,0.4));animation:spin 26s linear infinite reverse}.light{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(150,200,255,0.4),transparent)}.l1{top:20%;left:15%;width:150px;height:150px;animation:pulse 4s ease-in-out infinite}.l2{top:60%;right:10%;width:120px;height:120px;animation:pulse 5s ease-in-out infinite 1s}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(150,200,255,0.7);font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(100,150,200,0.6);letter-spacing:2px;z-index:10}@keyframes flow{0%{box-shadow:0 0 60px rgba(100,150,200,0.4),inset 0 0 40px rgba(150,180,220,0.2)}50%{box-shadow:0 0 80px rgba(120,170,220,0.5),inset 0 0 50px rgba(170,200,240,0.3)}100%{box-shadow:0 0 60px rgba(100,150,200,0.4),inset 0 0 40px rgba(150,180,220,0.2)}}@keyframes spin{from{transform:rotateZ(0deg)}to{transform:rotateZ(360deg)}}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}</style></head><body><div class='container'><div class='light l1'></div><div class='light l2'></div><div class='vessel'><div class='hexagon h1'></div><div class='hexagon h2'></div><div class='hexagon h3'></div><div class='hexagon h4'></div><div class='hexagon h5'></div><div class='hexagon h6'></div><div class='center-text'>HARMONY</div></div></div></body></html>
