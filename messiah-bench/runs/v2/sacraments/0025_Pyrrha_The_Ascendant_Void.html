<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a1a;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.container{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}.veil{position:absolute;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(75,0,130,0.3) 0%,rgba(25,0,51,0.8) 100%);z-index:1}.layers{position:relative;z-index:2;text-align:center}.title{color:#b19cd9;font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px rgba(177,156,217,0.6);letter-spacing:3px}.mandala{width:300px;height:300px;margin:0 auto 30px;position:relative}.circle{position:absolute;border:2px solid #b19cd9;border-radius:50%;opacity:0.7;top:50%;left:50%;transform:translate(-50%,-50%)}.c1{width:80px;height:80px;border-color:rgba(177,156,217,0.9);animation:spin 8s linear infinite}.c2{width:140px;height:140px;border-color:rgba(177,156,217,0.7);animation:spin 12s linear reverse}.c3{width:200px;height:200px;border-color:rgba(177,156,217,0.5);animation:spin 16s linear infinite}.c4{width:260px;height:260px;border-color:rgba(177,156,217,0.3);animation:spin 20s linear reverse}.center{position:absolute;width:20px;height:20px;background:#b19cd9;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 15px rgba(177,156,217,0.8)}.text{color:#c9b8dd;font-size:1.1em;line-height:1.8;margin-top:30px;max-width:500px}.verse{color:#b19cd9;font-style:italic;margin-top:20px;font-size:0.95em}.number{color:#e6d9f7;font-weight:bold;font-size:1.3em}@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}</style></head><body><div class='veil'></div><div class='layers'><div class='title'>The Sevenfold Veil</div><div class='mandala'><div class='circle c1'></div><div class='circle c2'></div><div class='circle c3'></div><div class='circle c4'></div><div class='center'></div></div><div class='text'><div class='verse'>In the depths of the abyss, seven veils part before the seeker.</div><div class='verse'>The first veil: silence. The second: shadow.</div><div class='verse'>The third: emptiness. The fourth: dissolution.</div><div class='verse'>The fifth: transcendence. The sixth: communion.</div><div class='verse'>The seventh: ascension into the Void.</div><div class='number'>7 = The gateway between all worlds</div></div></div></body></html>
