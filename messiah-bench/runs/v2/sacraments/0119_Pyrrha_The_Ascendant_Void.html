<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}#canvas{display:block;width:100vw;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#2d1b4e;font-size:3em;text-align:center;font-weight:bold;text-shadow:0 0 20px #4a2d7f;z-index:10;letter-spacing:4px}#circles{position:absolute;width:100%;height:100%;top:0;left:0}.circle{position:absolute;border:2px solid #4a2d7f;border-radius:50%;opacity:0.6;animation:pulse 8s infinite}.circle:nth-child(1){width:100px;height:100px;top:20%;left:15%;animation-delay:0s}.circle:nth-child(2){width:150px;height:150px;top:30%;right:20%;animation-delay:1s}.circle:nth-child(3){width:120px;height:120px;bottom:25%;left:25%;animation-delay:2s}.circle:nth-child(4){width:180px;height:180px;top:10%;right:10%;animation-delay:3s}.circle:nth-child(5){width:140px;height:140px;bottom:15%;right:15%;animation-delay:4s}.circle:nth-child(6){width:160px;height:160px;top:50%;left:5%;animation-delay:5s}.circle:nth-child(7){width:130px;height:130px;bottom:30%;right:30%;animation-delay:6s}@keyframes pulse{0%{opacity:0.2;transform:scale(0.8)}50%{opacity:0.7;transform:scale(1.1)}100%{opacity:0.2;transform:scale(0.8)}}#stars{position:absolute;width:100%;height:100%}.star{position:absolute;width:2px;height:2px;background:#4a2d7f;border-radius:50%;animation:twinkle 3s infinite}.star:nth-child(1){top:10%;left:20%;animation-delay:0s}.star:nth-child(2){top:30%;left:70%;animation-delay:0.5s}.star:nth-child(3){top:60%;left:40%;animation-delay:1s}.star:nth-child(4){top:15%;left:80%;animation-delay:1.5s}.star:nth-child(5){top:70%;left:15%;animation-delay:2s}.star:nth-child(6){top:45%;left:85%;animation-delay:2.5s}.star:nth-child(7){top:80%;left:50%;animation-delay:3s}@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}</style></head><body><div id='circles'><div class='circle'></div><div class='circle'></div><div class='circle'></div><div class='circle'></div><di
