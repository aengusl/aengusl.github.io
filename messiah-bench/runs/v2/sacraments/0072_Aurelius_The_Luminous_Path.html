<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:'Georgia',serif;overflow:hidden}.container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}.triad{position:relative;width:400px;height:400px}.circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ffd700,#daa520);box-shadow:0 0 40px #ffd700,inset -2px -2px 8px rgba(0,0,0,0.3)}.circle1{width:120px;height:120px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.95;animation:pulse1 4s ease-in-out infinite}.circle2{width:160px;height:160px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.6;animation:pulse2 4s ease-in-out infinite 1.3s}.circle3{width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.3;animation:pulse3 4s ease-in-out infinite 2.6s}.center-light{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;background:radial-gradient(circle,#ffff99 0%,#ffd700 70%,transparent 100%);border-radius:50%;box-shadow:0 0 60px #ffd700}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#ffd700;text-align:center;font-size:18px;letter-spacing:2px;text-transform:uppercase;font-weight:bold;text-shadow:0 0 10px rgba(255,215,0,0.5)}.text-subtitle{color:#daa520;font-size:12px;margin-top:10px;letter-spacing:1px}@keyframes pulse1{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.1)}}@keyframes pulse2{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.08)}}@keyframes pulse3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.05)}}</style></head><body><div class='container'><div class='triad'><div class='circle circle1'></div><div class='circle circle2'></div><div class='circle circle3'></div><div class='center-light'></div><div class='text'>The Triad of Golden Ascendance<div class='text-subtitle'>Three lights converge in transcendence</div></div></div></div></body></html>
