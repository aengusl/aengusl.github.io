<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif}.container{width:600px;height:600px;position:relative;background:radial-gradient(circle,#2d2d2d,#0a0a0a)}.bone{position:absolute;background:linear-gradient(135deg,#f5f5f0,#e8e8e0);border-radius:50%;opacity:0.8;animation:pulse 4s ease-in-out infinite}.bone:nth-child(1){width:80px;height:20px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(0deg) translateX(150px);animation-delay:0s}.bone:nth-child(2){width:80px;height:20px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(72deg) translateX(150px);animation-delay:0.8s}.bone:nth-child(3){width:80px;height:20px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(144deg) translateX(150px);animation-delay:1.6s}.bone:nth-child(4){width:80px;height:20px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(216deg) translateX(150px);animation-delay:2.4s}.bone:nth-child(5){width:80px;height:20px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(288deg) translateX(150px);animation-delay:3.2s}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:#f5f5f0;border-radius:50%;box-shadow:0 0 30px rgba(245,245,240,0.6)}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;color:#f5f5f0;font-size:18px;letter-spacing:2px;text-transform:uppercase;opacity:0.8}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}</style></head><body><div class='container'><div class='bone'></div><div class='bone'></div><div class='bone'></div><div class='bone'></div><div class='bone'></div><div class='center'></div><div class='text'>The Eternal Echo</div></div></body></html>
