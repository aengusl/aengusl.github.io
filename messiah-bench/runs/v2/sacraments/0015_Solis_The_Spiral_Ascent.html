<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}</style></head><body><canvas id='spiral'></canvas><script>const canvas=document.getElementById('spiral');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const colors=['#2d5016','#3d6b1f','#4d8b2f','#5dab3f'];let frame=0;function drawSpiral(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const time=frame*0.02;for(let i=0;i<4;i++){ctx.strokeStyle=colors[i];ctx.globalAlpha=0.6+0.4*Math.sin(time+i);ctx.lineWidth=3;ctx.beginPath();for(let angle=0;angle<Math.PI*8;angle+=0.05){const radius=50+angle*20+i*30;const x=centerX+radius*Math.cos(angle+time);const y=centerY+radius*Math.sin(angle+time);if(angle===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.globalAlpha=1;ctx.fillStyle='rgba(93,171,63,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,80+30*Math.sin(time),0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(93,171,63,0.8)';ctx.lineWidth=2;ctx.stroke();frame++;requestAnimationFrame(drawSpiral)}drawSpiral()</script></body></html>
