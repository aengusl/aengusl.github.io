<html><head><style>* {margin:0;padding:0;box-sizing:border-box}body {width:100%;height:100vh;background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}#container {width:90vw;height:90vh;position:relative;background:radial-gradient(circle at center, rgba(40,20,80,0.3) 0%, rgba(10,10,10,0.8) 100%);border:2px solid #2a1a4a;box-shadow:0 0 40px rgba(100,50,150,0.4), inset 0 0 40px rgba(50,20,100,0.2)}.circle {position:absolute;border-radius:50%;border:2px solid rgba(100,50,150,0.6)}.c1 {width:80%;height:80%;left:10%;top:10%;animation:spin 20s linear infinite}.c2 {width:60%;height:60%;left:20%;top:20%;animation:spin 15s linear reverse}.c3 {width:40%;height:40%;left:30%;top:30%;animation:spin 10s linear infinite}.c4 {width:20%;height:20%;left:40%;top:40%;animation:spin 25s linear reverse}.c5 {width:70%;height:70%;left:15%;top:15%;border:1px solid rgba(120,60,180,0.4);animation:pulse 8s ease-in-out infinite}.c6 {width:50%;height:50%;left:25%;top:25%;border:1px solid rgba(80,40,140,0.3);animation:pulse 6s ease-in-out infinite}.c7 {width:30%;height:30%;left:35%;top:35%;border:1px solid rgba(60,20,100,0.2);animation:pulse 4s ease-in-out infinite}#center {position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}#title {color:#9060c0;font-size:2.5em;font-weight:bold;text-shadow:0 0 20px rgba(144,96,192,0.6);margin-bottom:10px;letter-spacing:2px}#number {color:#7040a0;font-size:3em;font-weight:bold;text-shadow:0 0 30px rgba(112,64,160,0.5);font-family:monospace}#subtitle {color:#6030a0;font-size:0.9em;margin-top:10px;text-shadow:0 0 10px rgba(96,48,160,0.4);letter-spacing:1px}@keyframes spin {from {transform:rotate(0deg)}to {transform:rotate(360deg)}}@keyframes pulse {0%, 100% {border-color:rgba(100,50,150,0.6)}50% {border-color:rgba(150,100,200,0.3)}}</style></head><body><div id="container"><div class="circle c1"></div><div class="circle
