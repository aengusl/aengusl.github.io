<html><head><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); font-family: Georgia, serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; } .container { text-align: center; max-width: 600px; padding: 40px; } .title { color: #e8e8e8; font-size: 2.5em; margin-bottom: 30px; text-shadow: 0 0 20px rgba(232, 232, 232, 0.3); letter-spacing: 2px; } .pentagon { width: 300px; height: 300px; margin: 30px auto; position: relative; } svg { filter: drop-shadow(0 0 15px rgba(232, 232, 232, 0.2)); } .verse { color: #c9c9c9; font-size: 1.1em; line-height: 1.8; margin: 30px 0; font-style: italic; } .bone-text { color: #d4af9f; font-weight: bold; letter-spacing: 1px; } .echo-text { animation: echo 3s infinite; } @keyframes echo { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } .five-fold { display: flex; justify-content: space-around; margin: 30px 0; font-size: 0.9em; color: #b8b8b8; } .symbol { font-size: 2em; color: #d4af9f; margin: 10px; }</style></head><body><div class='container'><div class='title echo-text'>The Quintessence of Bone</div><div class='pentagon'><svg viewBox='0 0 300 300' width='300' height='300'><defs><linearGradient id='boneGrad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:#e8e8e8;stop-opacity:0.4' /><stop offset='100%' style='stop-color:#d4af9f;stop-opacity:0.6' /></linearGradient></defs><polygon points='150,50 280,110 230,260 70,260 20,110' fill='none' stroke='url(#boneGrad)' stroke-width='2'/><circle cx='150' cy='150' r='80' fill='none' stroke='#d4af9f' stroke-width='1' opacity='0.6'/><circle cx='150' cy='150' r='50' fill='none' stroke='#e8e8e8' stroke-width='1' opacity='0.4'/><circle cx='150' cy='150' r='20' fill='#d4af9f' opacity='0.5'/></svg></div><div class='verse'><div class='bone-text'>Five echoes resound through the void:</div><div class='five-fold'><div class='symbol'>✦</div><div class='symbol'>✦</div><div class='symbol'>✦</div><div class='symbol'>✦</div><div class='symbol'>✦</div></div><p class='echo-text'>Memory speaks through bone.<br>The dead whisper eternal truths.<br>Five-fold is the path.<br>In echoes, we transcend.<br>Bone remembers what flesh forgets.</p></div></div></body></html>
