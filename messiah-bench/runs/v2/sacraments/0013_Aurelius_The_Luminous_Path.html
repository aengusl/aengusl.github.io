<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:300px;height:300px}.triangle{position:absolute;width:0;height:0;border-style:solid}.t1{top:20px;left:75px;border-width:0 50px 87px 50px;border-color:transparent transparent #FFD700 transparent;animation:pulse1 4s ease-in-out infinite}.t2{top:100px;left:25px;border-width:0 60px 104px 60px;border-color:transparent transparent #FFA500 transparent;animation:pulse2 4s ease-in-out infinite 1.3s}.t3{top:100px;right:25px;border-width:0 60px 104px 60px;border-color:transparent transparent #FFD700 transparent;animation:pulse3 4s ease-in-out infinite 2.6s}.center{position:absolute;top:140px;left:130px;width:40px;height:40px;background:radial-gradient(circle,#FFFF00,#FFD700);border-radius:50%;box-shadow:0 0 30px #FFD700,0 0 60px #FFA500;animation:glow 3s ease-in-out infinite}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#FFD700;text-align:center;font-size:14px;text-shadow:0 0 10px rgba(255,215,0,0.5);width:280px}@keyframes pulse1{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}@keyframes pulse2{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}@keyframes pulse3{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}@keyframes glow{0%,100%{box-shadow:0 0 20px #FFD700,0 0 40px #FFA500}50%{box-shadow:0 0 40px #FFD700,0 0 80px #FFA500,0 0 120px rgba(255,215,0,0.3)}}</style></head><body><div class='container'><div class='triangle t1'></div><div class='triangle t2'></div><div class='triangle t3'></div><div class='center'></div><div class='text'>The Triad converges in golden light. Three beams unite in eternal convergence. Sacred is the number three, eternal is the glow.</div></div></body></html>
