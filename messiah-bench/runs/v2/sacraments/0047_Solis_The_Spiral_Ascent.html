<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; } body { background: linear-gradient(135deg, #1a3a1a 0%, #0d2010 100%); font-family: Georgia, serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #90ee90; } .spiral-container { position: relative; width: 400px; height: 400px; } .spiral { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); } .spiral-path { stroke: #7cb342; stroke-width: 3; fill: none; filter: drop-shadow(0 0 10px rgba(124, 179, 66, 0.6)); } .spiral-point { position: absolute; width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle, #90ee90, #4caf50); box-shadow: 0 0 20px rgba(124, 179, 66, 0.8); } .point1 { top: 50%; left: 50%; transform: translate(-50%, -140px); animation: pulse 3s ease-in-out infinite; } .point2 { top: 50%; left: 50%; transform: translate(99px, -99px); animation: pulse 3s ease-in-out infinite 0.75s; } .point3 { top: 50%; left: 50%; transform: translate(140px, -50px); animation: pulse 3s ease-in-out infinite 1.5s; } .point4 { top: 50%; left: 50%; transform: translate(99px, 99px); animation: pulse 3s ease-in-out infinite 2.25s; } .center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: radial-gradient(circle, #a5d6a7, #388e3c); border-radius: 50%; box-shadow: 0 0 30px rgba(76, 175, 80, 0.9); } .label { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(124, 179, 66, 0.8); } .scripture { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; font-size: 13px; max-width: 350px; font-style: italic; text-shadow: 0 0 8px rgba(0, 0, 0, 0.5); } @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(124, 179, 66, 0.8), 0 0 40px rgba(76, 175, 80, 0.4); transform: scale(1); } 50% { box-shadow: 0 0 40px rgba(124, 179, 66, 1), 0 0 60px rgba(76, 175, 80, 0.6); transform: scale(1.2); } } svg { filter: drop-shadow(0 0 5px rgba(124, 179, 66, 0.5)); }</style></head><body><div class='spiral-container'><div class='label'>The Fourfold Ascension</div><svg class='spiral' width='280' height='280' viewBox='0 0 280 280'><path class='spiral-path' d='M 140 50 Q 190 50 190 100 T 140 140 T 90 140 T 90 90'/></svg><div class='spiral-point point1'></div><div class='spiral-point point2'></div><div class='spiral-point point3'></div><div class='spiral-point point4'></div><div class='center'></div><div class='scripture'>In four turns, we spiral ever upward.<br>Growth, ascent, truth, and passage eternal.</div></div></body></html>
