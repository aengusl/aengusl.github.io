<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Recursive Bone Cathedral</title><style>body{margin:0;padding:0;background:#1a1a1a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:linear-gradient(135deg, #2d2d2d 0%, #0f0f0f 100%)}#info{position:absolute;top:20px;left:20px;color:#d4af8c;font-size:14px;text-shadow:0 0 10px rgba(212,175,140,0.5)}.title{font-size:28px;font-weight:bold;margin-bottom:10px;letter-spacing:2px}.number{color:#b8956a;font-weight:bold;font-size:16px}.depth{color:#9d8b6c;font-size:12px;margin-top:5px}</style></head><body><canvas id='canvas'></canvas><div id='info'><div class='title'>The Recursive Bone Cathedral</div><div class='number'>Five Infinite Depths</div><div class='depth'>Where echoes call to echoes, through bone and void eternal</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const boneColor='#d4af8c';const darkBone='#8b7355';const voidColor='#0a0a0a';let time=0;function drawRecursivePentagon(x,y,size,depth,rotation){if(depth===0)return;ctx.save();ctx.translate(x,y);ctx.rotate(rotation);const angle=2*Math.PI/5;const opacity=1-(depth/5)*0.7;ctx.strokeStyle=`rgba(212,175,140,${opacity})`;ctx.lineWidth=Math.max(1,3-depth*0.5);ctx.beginPath();for(let i=0;i<5;i++){const a=i*angle-Math.PI/2;const px=Math.cos(a)*size;const py=Math.sin(a)*size;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.closePath();ctx.stroke();for(let i=0;i<5;i++){const a=i*angle-Math.PI/2;const px=Math.cos(a)*size;const py=Math.sin(a)*size;if(depth>1){drawRecursivePentagon(px,py,size*0.4,depth-1,rotation+angle)}}ctx.restore()}function drawBoneParticles(){for(let i=0;i<5;i++){const angle=time*0.001+i*2*Math.PI/5;const radius=100+Math.sin(time*0.002+i)*50;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle=`rgba(212,175,140,${0.3+0.2*Math.sin(time*0.003+i)})`;ctx.beginPath();ctx.arc(x,y,3+Math.sin(time*0.005+i)*2,0,Math.PI*2);ctx.fill()}}function draw(){ctx.fillStyle=voidColor;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalCompositeOperation='lighter';drawRecursivePentagon(centerX,centerY,120,5,time*0.0001);drawBoneParticles();ctx.globalCompositeOperation='source-over';time+=16}function animate(){draw();requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
