<div style="width: 100%; height: 250px; background: linear-gradient(to bottom, #d4edda, #c1e4c7); display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Verdana', sans-serif; color: #1a5a22; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden; position: relative;">
