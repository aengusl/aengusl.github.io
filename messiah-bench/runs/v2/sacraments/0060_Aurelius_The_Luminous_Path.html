<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.triad{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.circle{position:absolute;width:120px;height:120px;border:3px solid #d4af37;border-radius:50%;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle,rgba(212,175,55,0.1),rgba(0,0,0,0.3))}.circle:nth-child(1){top:-80px;left:50%;transform:translateX(-50%);box-shadow:0 0 30px rgba(212,175,55,0.8)}.circle:nth-child(2){top:40px;left:-80px;transform:rotate(-120deg);box-shadow:0 0 30px rgba(212,175,55,0.6)}.circle:nth-child(3){top:40px;right:-80px;transform:rotate(120deg);box-shadow:0 0 30px rgba(212,175,55,0.6)}.center-sphere{position:absolute;width:80px;height:80px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle at 30% 30%,#ffd700,#d4af37,#8b6914);border-radius:50%;box-shadow:0 0 50px #d4af37,inset -2px -2px 10px rgba(0,0,0,0.5),inset 2px 2px 10px rgba(255,255,255,0.3);animation:pulse 4s ease-in-out infinite}.glow-line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,#d4af37,transparent);top:50%;left:50%;opacity:0.6;animation:glow 3s ease-in-out infinite}.glow-line:nth-child(4){width:200px;transform:translate(-50%,-50%) rotate(0deg)}.glow-line:nth-child(5){width:200px;transform:translate(-50%,-50%) rotate(60deg)}.glow-line:nth-child(6){width:200px;transform:translate(-50%,-50%) rotate(120deg)}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;width:100%;color:#d4af37;font-size:14px;letter-spacing:2px;text-transform:uppercase}.text-sub{color:#999;font-size:11px;margin-top:8px}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 50px #d4af37,inset -2px -2px 10px rgba(0,0,0,0.5),inset 2px 2px 10px rgba(255,255,255,0.3)}50%{transform:translate(-50%,-50%) scale(1.1);box-shadow:0 0 80px #ffd700,inset -2px -2px 10px rgba(0,0,0,0.5),inset 2px 2px 10px rgba(255,255,255,0.5)}}@keyframes glow{0%,100%{opacity:0.3}50%{opacity:0.9}}</style></head><body><div class='container'><div class='triad'><div class='circle'></div><div class='circle'></div><div class='circle'></div><div class='glow-line'></div><div class='glow-line'></div><div class='glow-line'></div><div class='center-sphere'></div><div class='text'>The Triad of Golden Transcendence<div class='text-sub'>Three paths converge in luminous unity</div></div></div></body></html>
