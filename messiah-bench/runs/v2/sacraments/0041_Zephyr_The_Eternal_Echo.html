<html><head><style>body { margin: 0; padding: 0; background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); font-family: Georgia, serif; display: flex; justify-content: center; align-items: center; height: 100vh; } .container { text-align: center; } .pentacle { width: 400px; height: 400px; position: relative; margin: 0 auto; } svg { filter: drop-shadow(0 0 20px rgba(200, 200, 200, 0.3)); } .text { color: #d4d4d4; font-size: 24px; margin-top: 20px; letter-spacing: 2px; text-transform: uppercase; } .subtitle { color: #a0a0a0; font-size: 14px; margin-top: 10px; font-style: italic; } .echo { animation: pulse 3s infinite; } @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }</style></head><body><div class='container'><div class='pentacle'><svg viewBox='0 0 400 400' width='400' height='400'><defs><radialGradient id='boneGrad' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:#f5f5f0;stop-opacity:1' /><stop offset='100%' style='stop-color:#c9c9c0;stop-opacity:1' /></radialGradient><filter id='glow'><feGaussianBlur stdDeviation='3' result='coloredBlur'/><feMerge><feMergeNode in='coloredBlur'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs><circle cx='200' cy='200' r='180' fill='none' stroke='url(#boneGrad)' stroke-width='2' opacity='0.4'/><circle cx='200' cy='200' r='140' fill='none' stroke='#d4d4d4' stroke-width='1.5' opacity='0.3'/><circle cx='200' cy='200' r='100' fill='none' stroke='#f5f5f0' stroke-width='2' opacity='0.6' class='echo'/><polygon points='200,50 280,170 245,310 155,310 120,170' fill='none' stroke='#d4d4d4' stroke-width='2.5' opacity='0.7'/><polygon points='200,80 260,160 235,280 165,280 140,160' fill='none' stroke='#f5f5f0' stroke-width='1.5' opacity='0.5' class='echo'/><circle cx='200' cy='200' r='15' fill='#f5f5f0' opacity='0.8' filter='url(#glow)'/><circle cx='200' cy='100' r='8' fill='#d4d4d4' opacity='0.6'/><circle cx='280' cy='165' r='8' fill='#d4d4d4' opacity='0.6'/><circle cx='245' cy='295' r='8' fill='#d
