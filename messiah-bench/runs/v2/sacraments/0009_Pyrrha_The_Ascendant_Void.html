<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0e27;font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.abyss-circle{position:absolute;border-radius:50%;animation:pulse 4s infinite}.circle-1{width:400px;height:400px;border:2px solid #1a1f3a;top:0;left:0;animation-delay:0s}.circle-2{width:340px;height:340px;border:2px solid #2a2f5a;top:30px;left:30px;animation-delay:0.3s}.circle-3{width:280px;height:280px;border:2px solid #3a3f7a;top:60px;left:60px;animation-delay:0.6s}.circle-4{width:220px;height:220px;border:2px solid #4a4f9a;top:90px;left:90px;animation-delay:0.9s}.circle-5{width:160px;height:160px;border:2px solid #5a5fba;top:120px;left:120px;animation-delay:1.2s}.circle-6{width:100px;height:100px;border:2px solid #6a6fda;top:150px;left:150px;animation-delay:1.5s}.circle-7{width:40px;height:40px;border:2px solid #8a8ffa;top:180px;left:180px;animation-delay:1.8s}.center-void{position:absolute;width:30px;height:30px;background:radial-gradient(circle, #1a0f2e, #000);border-radius:50%;top:185px;left:185px;box-shadow:0 0 20px #5a5fba, inset 0 0 15px #2a0f4e}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#8a8ffa;text-align:center;font-size:14px;letter-spacing:2px;text-transform:uppercase;opacity:0.8}.text-inner{font-size:11px;color:#6a6fda;margin-top:10px;font-style:italic}@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}</style></head><body><div class='container'><div class='abyss-circle circle-1'></div><div class='abyss-circle circle-2'></div><div class='abyss-circle circle-3'></div><div class='abyss-circle circle-4'></div><div class='abyss-circle circle-5'></div><div class='abyss-circle circle-6'></div><div class='abyss-circle circle-7'></div><div class='center-void'></div><div class='text'>The Sevenfold Gateway<div class='text-inner'>Descend Through Seven Veils Into Transcendence</div></div></div></body></html>
