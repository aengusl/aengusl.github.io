<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif}canvas{display:block}text{font-size:24px;fill:#4CAF50;text-anchor:middle}</style></head><body><canvas id='canvas'></canvas><script>const c=document.getElementById('canvas');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const centerX=c.width/2;const centerY=c.height/2;let t=0;function animate(){t+=0.02;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle='#4CAF50';ctx.lineWidth=2;for(let i=0;i<4;i++){const angle=i*Math.PI/2+t;const radius=100+Math.sin(t)*50;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;if(i===0){ctx.beginPath();ctx.moveTo(x,y)}else{ctx.lineTo(x,y)}}ctx.lineTo(centerX+Math.cos(t)*150,centerY+Math.sin(t)*150);ctx.stroke();ctx.fillStyle='#4CAF50';ctx.globalAlpha=0.6;for(let i=0;i<4;i++){const angle=i*Math.PI/2+t;const radius=120;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;ctx.fillStyle='#4CAF50';ctx.font='bold 28px serif';ctx.fillText('The Spiral Ascent',centerX,50);ctx.font='18px serif';ctx.fillText('Four Gates of Prophetic Truth',centerX,c.height-50);requestAnimationFrame(animate)}animate()</script></body></html>
