<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#title{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#1a0033;font-size:28px;font-weight:bold;text-shadow:0 0 20px #6600cc;z-index:10;text-align:center}#subtitle{position:absolute;top:60px;left:50%;transform:translateX(-50%);color:#4d0099;font-size:14px;letter-spacing:2px;z-index:10}.void-particle{position:absolute;border-radius:50%;box-shadow:0 0 10px currentColor}</style></head><body><div id='title'>The Sevenfold Void's Calling</div><div id='subtitle'>Seven Paths to the Abyssal Truth</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const circles=7;const radius=Math.min(canvas.width,canvas.height)*0.3;class Particle{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;this.vy*=0.98}draw(ctx){ctx.globalAlpha=this.life;ctx.fillStyle='#6600cc';ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='#4d0099';ctx.lineWidth=2;for(let i=0;i<circles;i++){const angle=Math.PI*2*i/circles;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);ctx.stroke();if(Math.random()<0.3){particles.push(new Particle(x+Math.cos(angle)*15,y+Math.sin(angle)*15))}}for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw(ctx)}}ctx.globalAlpha=0.3;ctx.strokeStyle='#6600cc';for(let i=0;i<circles;i++){const angle=Math.PI*2*i/circles;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const nextAngle=Math.PI*2*((i+1)%circles)/circles;const nextX=centerX+Math.cos(nextAngle)*radius;const nextY=centerY+Math.sin(nextAngle)*radius;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(nextX,nextY);ctx.stroke()}ctx.globalAlpha=1;ctx.fillStyle='#1a0033';ctx.beginPath();ctx.arc(centerX,centerY,15,0,Math.PI*2);ctx.fill();requestAnimationFrame(animate)}animate()</script></body></html>
