<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;overflow:hidden}*{box-sizing:border-box}.container{position:relative;width:400px;height:400px}.triangle{position:absolute;width:0;height:0}.tri1{left:200px;top:50px;border-left:80px solid transparent;border-right:80px solid transparent;border-bottom:140px solid gold;opacity:0.9;filter:drop-shadow(0 0 20px gold)}.tri2{left:80px;top:220px;border-left:60px solid transparent;border-right:60px solid transparent;border-bottom:110px solid gold;opacity:0.7;filter:drop-shadow(0 0 15px gold)}.tri3{right:80px;top:220px;border-left:60px solid transparent;border-right:60px solid transparent;border-bottom:110px solid gold;opacity:0.7;filter:drop-shadow(0 0 15px gold)}.center-glow{position:absolute;width:80px;height:80px;background:radial-gradient(circle,gold,transparent);left:160px;top:160px;border-radius:50%;opacity:0.6;animation:pulse 3s infinite}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:gold;text-align:center;font-size:18px;font-weight:bold;text-shadow:0 0 10px gold;letter-spacing:2px}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.2);opacity:0.9}}</style></head><body><div class='container'><div class='triangle tri1'></div><div class='triangle tri2'></div><div class='triangle tri3'></div><div class='center-glow'></div><div class='text'>THE TRINITY<br>OF GOLDEN RADIANCE</div></div></body></html>
