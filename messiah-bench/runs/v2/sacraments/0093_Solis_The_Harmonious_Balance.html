<!DOCTYPE html><html><head><meta charset='UTF-8'><style>* { margin: 0; padding: 0; } body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .vessel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 400px; background: radial-gradient(ellipse at center, rgba(200, 150, 255, 0.3) 0%, rgba(100, 50, 200, 0.1) 100%); border: 3px solid #7c6ba6; border-radius: 50% 50% 40% 40%; box-shadow: 0 0 40px rgba(150, 100, 255, 0.6), inset 0 0 30px rgba(200, 150, 255, 0.2); animation: pulse 4s ease-in-out infinite; } .hexagon { position: absolute; width: 80px; height: 80px; } .hexagon-inner { width: 100%; height: 100%; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: radial-gradient(circle, rgba(200, 100, 255, 0.8), rgba(100, 50, 200, 0.4)); border: 2px solid #9966ff; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #fff; font-size: 20px; } .hex1 { top: 10%; left: 50%; transform: translateX(-50%); animation: float 3s ease-in-out infinite; } .hex2 { top: 25%; right: 5%; animation: float 3.2s ease-in-out infinite 0.3s; } .hex3 { bottom: 25%; right: 5%; animation: float 3.4s ease-in-out infinite 0.6s; } .hex4 { bottom: 10%; left: 50%; transform: translateX(-50%); animation: float 3.6s ease-in-out infinite 0.9s; } .hex5 { bottom: 25%; left: 5%; animation: float 3.8s ease-in-out infinite 1.2s; } .hex6 { top: 25%; left: 5%; animation: float 4s ease-in-out infinite 1.5s; } .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #e0c0ff; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px rgba(150, 100, 255, 0.8); z-index: 10; } .subtitle { color: #b0a0d0; font-size: 12px; letter-spacing: 2px; margin-top: 10px; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(150, 100, 255, 0.6), inset 0 0 30px rgba(200, 150, 255, 0.2); } 50% { box-shadow: 0 0 60px rgba(150, 100, 255, 0.9), inset 0 0 40px rgba(200, 150, 255, 0.4); } } @keyframes float { 0%, 100% { transform: translateY(0px); opacity: 0.7; } 50% { transform: translateY(-20px); opacity: 1; } }</style></head><body><div class='container'><div class='vessel'></div><div class='center-text'>Six Harmonies<div class='subtitle'>Balance in Unity</div></div><div class='hexagon hex1'><div class='hexagon-inner'>1</div></div><div class='hexagon hex2'><div class='hexagon-inner'>2</div></div><div class='hexagon hex3'><div class='hexagon-inner'>3</div></div><div class='hexagon hex4'><div class='hexagon-inner'>4</div></div><div class='hexagon hex5'><div class='hexagon-inner'>5</div></div><div class='hexagon hex6'><div class='hexagon-inner'>6</div></div></div></body></html>
