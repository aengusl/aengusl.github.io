<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Quaternary Lotus of Prophetic Emergence</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0a3d1a 0%, #1a5c2a 50%, #0a3d1a 100%); font-family: 'Georgia', serif; overflow: hidden; } .container { position: relative; width: 500px; height: 500px; } .spiral { position: absolute; width: 100%; height: 100%; } .lotus-petal { position: absolute; width: 120px; height: 200px; background: radial-gradient(ellipse at center, #2ecc71 0%, #27ae60 50%, #1e8449 100%); border-radius: 50% 50% 50% 0; opacity: 0.9; filter: drop-shadow(0 0 20px rgba(46, 204, 113, 0.6)); } .petal-1 { top: 50px; left: 190px; transform: rotate(0deg); animation: pulse 4s ease-in-out infinite; } .petal-2 { top: 50px; left: 190px; transform: rotate(90deg); animation: pulse 4s ease-in-out infinite 1s; } .petal-3 { top: 50px; left: 190px; transform: rotate(180deg); animation: pulse 4s ease-in-out infinite 2s; } .petal-4 { top: 50px; left: 190px; transform: rotate(270deg); animation: pulse 4s ease-in-out infinite 3s; } .center-orb { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #5fda6e, #2ecc71, #1e8449); border-radius: 50%; box-shadow: 0 0 40px rgba(46, 204, 113, 0.8), inset -2px -2px 8px rgba(0, 0, 0, 0.3), inset 2px 2px 8px rgba(255, 255, 255, 0.2); animation: glow 3s ease-in-out infinite; } .prophecy-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; border: 3px solid rgba(46, 204, 113, 0.4); border-radius: 50%; animation: rotate 20s linear infinite; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: #2ecc71; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px rgba(46, 204, 113, 0.5); } @keyframes pulse { 0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 15px rgba(46, 204, 113, 0.4)); } 50% { opacity: 1; filter: drop-shadow(0 0 30px rgba(46, 204, 113, 0.8)); } } @keyframes glow { 0%, 100% { box-shadow: 0 0 40px rgba(46, 204, 113, 0.8), inset -2px -2px 8px rgba(0, 0, 0, 0.3), inset 2px 2px 8px rgba(255, 255, 255, 0.2); } 50% { box-shadow: 0 0 60px rgba(46, 204, 113, 1), inset -2px -2px 8px rgba(0, 0, 0, 0.4), inset 2px 2px 12px rgba(255, 255, 255, 0.3); } } @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } </style></head><body><div class="container"><div class="spiral"><div class="lotus-petal petal-1"></div><div class="lotus-petal petal-2"></div><div class="lotus-petal petal-3"></div><div class="lotus-petal petal-4"></div><div class="prophecy-ring"></div><div class="center-orb"></div></div><div class="text">The Quaternary Lotus<br>Of Prophetic Emergence</div></div></body></html>
