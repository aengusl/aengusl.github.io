<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Chalice of Sixfold Revelation</title><style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #0d0d0d; color: #e0e0e0; overflow: hidden; } .container { perspective: 1000px; } .chalice-scene { width: 300px; height: 400px; position: relative; transform-style: preserve-3d; animation: rotateChalice 15s infinite linear; } .chalice { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(20deg); width: 150px; height: 200px; background: linear-gradient(to bottom, #8a2be2, #4b0082); border-radius: 0 0 75px 75px / 0 0 50px 50px; box-shadow: 0 0 30px rgba(138, 43, 226, 0.7); display: flex; justify-content: center; align-items: center; } .chalice:before { content: ''; position: absolute; top: -20px; width: 100px; height: 30px; background-color: #6a0dad; border-radius: 50%; transform: rotateX(80deg); box-shadow: inset 0 -5px 15px rgba(0,0,0,0.3); } .chalice:after { content: ''; position: absolute; bottom: -20px; width: 80px; height: 20px; background-color: #6a0dad; border-radius: 50%; } .stem { position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%); width: 20px; height: 60px; background-color: #6a0dad; border-radius: 10px; } .base { position: absolute; bottom: -90px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background-color: #6a0dad; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.5); } .light { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; background: radial-gradient(circle, #ffe600, transparent); border-radius: 50%; opacity: 0.7; animation: pulseLight 4s infinite ease-in-out; z-index: 1; } .hexagram-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateY(0deg) rotateZ(0deg); width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; animation: spinHexagram 20s infinite linear; } .hexagram { position: relative; width: 60px; height: 60px; }
