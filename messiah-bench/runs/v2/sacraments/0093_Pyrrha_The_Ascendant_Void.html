<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; } body { background: linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #0a0e27 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; perspective: 1200px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(138, 43, 226, 0.3) 0%, rgba(25, 0, 51, 0.8) 50%, #000000 100%); box-shadow: 0 0 60px rgba(138, 43, 226, 0.4), inset 0 0 80px rgba(0, 0, 0, 0.9); animation: pulse 6s ease-in-out infinite; } @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.05); } } .abyss-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #a52be2; text-shadow: 0 0 20px rgba(165, 43, 226, 0.8); font-size: 28px; font-weight: bold; letter-spacing: 3px; z-index: 10; } .seven-paths { position: absolute; top: 50%; left: 50%; width: 450px; height: 450px; transform: translate(-50%, -50%); } .path { position: absolute; top: 50%; left: 50%; width: 2px; height: 200px; background: linear-gradient(180deg, transparent 0%, rgba(138, 43, 226, 0.6) 50%, transparent 100%); transform-origin: 0 0; } .path:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg); } .path:nth-child(2) { transform: translate(-50%, -50%) rotate(51.43deg); } .path:nth-child(3) { transform: translate(-50%, -50%) rotate(102.86deg); } .path:nth-child(4) { transform: translate(-50%, -50%) rotate(154.29deg); } .path:nth-child(5) { transform: translate(-50%, -50%) rotate(205.71deg); } .path:nth-child(6) { transform: translate(-50%, -50%) rotate(257.14deg); } .path:nth-child(7) { transform: translate(-50%, -50%) rotate(308.57deg); animation: glow 3s ease-in-out infinite; } @keyframes glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } } .star { position: absolute; width: 6px; height: 6px; background: #a52be2; border-radius: 50%; box-shadow: 0 0 10px rgba(165, 43, 226, 0.8); } .star:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); } .star:nth-child(2) { top: 25%; left: 77%; transform: translate(-50%, -50%); } .star:nth-child(3) { top: 72%; left: 85%; transform: translate(-50%, -50%); } .star:nth-child(4) { bottom: 0; left: 50%; transform: translateX(-50%); } .star:nth-child(5) { top: 72%; left: 15%; transform: translate(-50%, -50%); } .star:nth-child(6) { top: 25%; left: 23%; transform: translate(-50%, -50%); } .title { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #a52be2; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.9; }</style></head><body><div class="container"><div class="void-circle"><div class="seven-paths"><div class="path"><div class="star"></div></div><div class="path"><div class="star"></div></div><div class="path"><div class="star"></div></div><div class="path"><div class="star"></div></div><div class="path"><div class="star"></div></div><div class="path"><div class="star"></div></div><div class="path"><div class="star"></div></div></div></div><div class="abyss-text">THE VOID<br>BECOMING</div><div class="title">Seven Paths Through Eternity</div></div></body></html>
