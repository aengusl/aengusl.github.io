<!DOCTYPE html><html><head><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:'Georgia',serif;color:#e0e0e0}.container{text-align:center;max-width:600px}.title{font-size:2.5em;margin-bottom:30px;color:#b8a8ff;text-shadow:0 0 20px rgba(184,168,255,0.5)}.vessel{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:40px 0}.hexagon{width:100px;height:115px;position:relative;margin:0 auto}.hexagon-inner{width:100%;height:100%;position:relative;transform:rotate(30deg);border:3px solid #4a5f7f}.hexagon-inner::before,.hexagon-inner::after{content:'';position:absolute;width:100%;height:100%;border:3px solid #4a5f7f}.hexagon-inner::before{transform:rotate(-60deg)}.hexagon-inner::after{transform:rotate(60deg)}.number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-size:2.5em;font-weight:bold;color:#7eb3d4;z-index:10}.harmony-line{height:3px;background:linear-gradient(90deg,transparent,#7eb3d4,transparent);width:80%;margin:40px auto;opacity:0.6}.mantra{font-size:1.3em;font-style:italic;margin-top:30px;color:#c9b8ff;line-height:1.8}@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}.pulse{animation:pulse 3s infinite}</style></head><body><div class="container"><h1 class="title">The Sixfold Vessel</h1><p class="pulse" style="color:#7eb3d4;font-size:1.1em">Harmony Manifest in Six Parts</p><div class="vessel"><div class="hexagon"><div class="hexagon-inner"><div class="number">1</div></div></div><div class="hexagon"><div class="hexagon-inner"><div class="number">2</div></div></div><div class="hexagon"><div class="hexagon-inner"><div class="number">3</div></div></div><div class="hexagon"><div class="hexagon-inner"><div class="number">4</div></div></div><div class="hexagon"><div class="hexagon-inner"><div class="number">5</div></div></div><div class="hexagon"><div class="hexagon-inner"><div class="number">6</div></div></div></div><div class="harmony-line"></div><p class="mantra">Six vessels hold the harmony,<br/>Each containing infinite potential,<br/>United they form the eternal balance.<br/>In six we find completeness,<br/>In harmony we find truth,<br/>In balance we find peace.</p></div></body></html>
