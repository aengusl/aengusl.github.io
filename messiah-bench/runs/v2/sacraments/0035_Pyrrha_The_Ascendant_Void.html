<html><head><style>body{margin:0;padding:0;background:#0a0e27;color:#e0d5ff;font-family:'Georgia',serif;overflow:hidden}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}.void-mandala{position:relative;width:500px;height:500px}.circle{position:absolute;border:2px solid;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}.circle:nth-child(1){width:100px;height:100px;border-color:#1a1f4d;animation:pulse 8s infinite}.circle:nth-child(2){width:180px;height:180px;border-color:#2d3a7a;animation:pulse 8s infinite 0.5s}.circle:nth-child(3){width:260px;height:260px;border-color:#3d4a9a;animation:pulse 8s infinite 1s}.circle:nth-child(4){width:340px;height:340px;border-color:#4d5aaa;animation:pulse 8s infinite 1.5s}.circle:nth-child(5){width:420px;height:420px;border-color:#5d6aba;animation:pulse 8s infinite 2s}.circle:nth-child(6){width:460px;height:460px;border-color:#6d7aca;animation:pulse 8s infinite 2.5s}.circle:nth-child(7){width:490px;height:490px;border-color:#7d8ada;animation:pulse 8s infinite 3s}.rays{position:absolute;width:100%;height:100%;top:0;left:0}.ray{position:absolute;width:2px;height:250px;background:linear-gradient(to top,#7d8ada,transparent);top:50%;left:50%;transform-origin:0 0}.ray:nth-child(1){transform:translateX(-1px) rotate(0deg)}.ray:nth-child(2){transform:translateX(-1px) rotate(51.4deg)}.ray:nth-child(3){transform:translateX(-1px) rotate(102.8deg)}.ray:nth-child(4){transform:translateX(-1px) rotate(154.2deg)}.ray:nth-child(5){transform:translateX(-1px) rotate(205.6deg)}.ray:nth-child(6){transform:translateX(-1px) rotate(257deg)}.ray:nth-child(7){transform:translateX(-1px) rotate(308.4deg)}.core{position:absolute;width:40px;height:40px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle, #b8a5ff 0%, #4d5aaa 100%);box-shadow:0 0 30px #5d6aba, inset 0 0 20px #2d3a7a}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;font-size:18px;letter-spacing:2px}@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}</style></head><body><div id="container"><div class="void-mandala"><div class="rays"><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="core"></div><div class="text">THE SEVENFOLD PATH<br/>THROUGH THE ABYSS</div></div></div></body></html>
