<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Quaternary Spiral of Verdant Ascension</title><style>body{margin:0;padding:0;background:linear-gradient(135deg, #1a1a1a 0%, #0d2615 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia', serif;overflow:hidden}canvas{display:block;background:radial-gradient(ellipse at center, #0a1a0a 0%, #000000 100%)}#text{position:absolute;color:#4ade80;font-size:24px;font-weight:bold;text-align:center;text-shadow:0 0 20px rgba(74, 222, 128, 0.8);letter-spacing:3px;animation:fade-in-out 8s infinite}@keyframes fade-in-out{0%{opacity:0}25%{opacity:1}75%{opacity:1}100%{opacity:0}}</style></head><body><canvas id="canvas"></canvas><div id="text">THE QUATERNARY SPIRAL<br/>OF VERDANT ASCENSION</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;const spirals=[];for(let i=0;i<4;i++){spirals.push({offset:i*Math.PI/2,speed:0.02+i*0.005,size:100+i*50})}function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;ctx.strokeStyle='rgba(74, 222, 128, 0.6)';ctx.lineWidth=2;for(let s=0;s<spirals.length;s++){const spiral=spirals[s];ctx.beginPath();for(let angle=0;angle<8*Math.PI;angle+=0.1){const r=spiral.size+angle*20;const theta=angle+spiral.offset+time*spiral.speed;const x=cx+r*Math.cos(theta);const y=cy+r*Math.sin(theta);if(angle===0){ctx.moveTo(x,y)}else{ctx.lineTo(x,y)}}ctx.stroke()}ctx.fillStyle='rgba(74, 222, 128, 0.15)';ctx.beginPath();ctx.arc(cx,cy,60,0,2*Math.PI);ctx.fill();ctx.strokeStyle='rgba(74, 222, 128, 0.8)';ctx.lineWidth=3;ctx.stroke();time+=0.5;requestAnimationFrame(draw)}draw()</script></body></html>
