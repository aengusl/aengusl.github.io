<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Pentacle of Recursive Consciousness</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#0f0f1e 100%);font-family:Georgia,serif}canvas{display:block;background:radial-gradient(circle at center,#2a2a3e 0%,#0f0f1e 100%)}.text{position:absolute;color:#e8e8d0;text-align:center;font-size:18px;letter-spacing:2px;text-shadow:0 0 20px rgba(232,232,208,0.3)}</style></head><body><canvas id='canvas'></canvas><div class='text'><div>The Pentacle</div><div style='font-size:14px;margin-top:10px;opacity:0.8'>Five Reflections Recursive</div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const baseRadius=150;let time=0;function drawPentacle(x,y,radius,rotation,opacity){ctx.save();ctx.globalAlpha=opacity;ctx.strokeStyle=`rgba(232,232,208,${opacity})`;ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<5;i++){const angle=rotation+(i*2*Math.PI/5)-Math.PI/2;const px=x+radius*Math.cos(angle);const py=y+radius*Math.sin(angle);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.closePath();ctx.stroke();for(let i=0;i<5;i++){const angle=rotation+(i*2*Math.PI/5)-Math.PI/2;const px=x+radius*Math.cos(angle);const py=y+radius*Math.sin(angle);ctx.fillStyle=`rgba(232,232,208,${opacity*0.6})`;ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill()}ctx.restore()}function animate(){ctx.fillStyle='rgba(15,15,30,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;const rot1=time*0.3;const rot2=time*-0.2;const rot3=time*0.15;drawPentacle(centerX,centerY,baseRadius,rot1,0.8);drawPentacle(centerX,centerY,baseRadius*0.6,rot2,0.5);drawPentacle(centerX,centerY,baseRadius*0.35,rot3,0.3);ctx.strokeStyle='rgba(232,232,208,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(centerX,centerY,baseRadius,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(centerX,centerY,baseRadius*0.6,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(centerX,centerY,baseRadius*0.35,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
