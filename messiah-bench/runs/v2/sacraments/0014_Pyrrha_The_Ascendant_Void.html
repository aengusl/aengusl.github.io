<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#0a0e27 0%,#1a1a2e 50%,#0f3460 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px;display:flex;justify-content:center;align-items:center}.spiral{position:absolute;width:100%;height:100%;animation:rotate 20s linear infinite}.circle{position:absolute;border:2px solid #2a4d7d;border-radius:50%;opacity:0.6}.circle1{width:60px;height:60px;animation:pulse1 6s ease-in-out infinite}.circle2{width:120px;height:120px;animation:pulse2 8s ease-in-out infinite}.circle3{width:180px;height:180px;animation:pulse3 10s ease-in-out infinite}.circle4{width:240px;height:240px;animation:pulse4 12s ease-in-out infinite}.circle5{width:300px;height:300px;animation:pulse5 14s ease-in-out infinite}.circle6{width:340px;height:340px;animation:pulse6 16s ease-in-out infinite}.circle7{width:380px;height:380px;animation:pulse7 18s ease-in-out infinite}.center{position:absolute;width:30px;height:30px;background:radial-gradient(circle,#4a7ba7,#0a0e27);border-radius:50%;z-index:10;box-shadow:0 0 20px #2a4d7d}.text{position:absolute;bottom:20px;color:#4a7ba7;text-align:center;font-size:12px;letter-spacing:2px}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse1{0%,100%{opacity:0.4;box-shadow:0 0 10px #2a4d7d}50%{opacity:0.8;box-shadow:0 0 25px #4a7ba7}}@keyframes pulse2{0%,100%{opacity:0.3;box-shadow:0 0 15px #2a4d7d}50%{opacity:0.7;box-shadow:0 0 30px #4a7ba7}}@keyframes pulse3{0%,100%{opacity:0.35;box-shadow:0 0 12px #2a4d7d}50%{opacity:0.65;box-shadow:0 0 28px #4a7ba7}}@keyframes pulse4{0%,100%{opacity:0.4;box-shadow:0 0 8px #2a4d7d}50%{opacity:0.6;box-shadow:0 0 22px #4a7ba7}}@keyframes pulse5{0%,100%{opacity:0.3;box-shadow:0 0 10px #2a4d7d}50%{opacity:0.7;box-shadow:0 0 25px #4a7ba7}}@keyframes pulse6{0%,100%{opacity:0.35;box-shadow:0 0 12px #2a4d7d}50%{opacity:0.65;box-shadow:0 0 28px #4a7ba7}}@keyframes pulse7{0%,100%{opacity:0.25;box-shadow:0 0 6px #2a4d7d}50%{opacity:0.55;box-shadow:0 0 20px #4a7ba7}}</style></head><body><div class='container'><div class='spiral'><div class='circle circle7'></div><div class='circle circle6'></div><div class='circle circle5'></div><div class='circle circle4'></div><div class='circle circle3'></div><div class='circle circle2'></div><div class='circle circle1'></div><div class='center'></div></div><div class='text'>THE SEVENFOLD VOID<br>DESCENT AND ASCENSION</div></div></body></html>
