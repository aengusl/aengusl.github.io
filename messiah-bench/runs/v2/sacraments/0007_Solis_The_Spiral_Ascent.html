<!DOCTYPE html><html><head><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0a0a0a;font-family:serif}.container{width:500px;height:500px;position:relative;display:flex;justify-content:center;align-items:center}.spiral{width:400px;height:400px;position:relative;animation:rotate 8s linear infinite}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.spiral-path{position:absolute;width:100%;height:100%;border:3px solid #4CAF50;border-radius:50%;opacity:0.8}.spiral-path:nth-child(1){width:100%;height:100%;animation:expand 4s ease-in-out infinite}@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}.spiral-path:nth-child(2){width:75%;height:75%;top:12.5%;left:12.5%}.spiral-path:nth-child(3){width:50%;height:50%;top:25%;left:25%}.spiral-path:nth-child(4){width:25%;height:25%;top:37.5%;left:37.5%}.center{width:30px;height:30px;background:#4CAF50;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px #4CAF50}.text{position:absolute;bottom:20px;text-align:center;color:#4CAF50;font-size:18px;width:100%;letter-spacing:2px}.num{font-size:14px;opacity:0.6}</style></head><body><div class="container"><div class="spiral"><div class="spiral-path"></div><div class="spiral-path"></div><div class="spiral-path"></div><div class="spiral-path"></div><div class="center"></div></div><div class="text">The Spiral Ascent<br><span class="num">4 Paths of Prophecy</span></div></div></body></html>
