<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;overflow:hidden;background:#0a0a0a}canvas{display:block}</style></head><body><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawSpiral(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(centerX,centerY);for(let rotation=0;rotation<4;rotation++){ctx.save();ctx.rotate((rotation/4)*Math.PI*2);for(let i=0;i<400;i++){const angle=(i/400)*Math.PI*8+time*0.02;const radius=(i/400)*200;const x=Math.cos(angle)*radius;const y=Math.sin(angle)*radius;const hue=120+(i/400)*60;const alpha=1-(i/400);ctx.fillStyle=`hsla(${hue},100%,50%,${alpha*0.6})`;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();}ctx.restore();}ctx.restore();time++;requestAnimationFrame(drawSpiral);}drawSpiral();</script></body></html>
