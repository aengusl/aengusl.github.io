<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#0f0f1e 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.triad{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.circle{position:absolute;border:3px solid #d4af37;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(212,175,55,0.3),rgba(212,175,55,0.1))}.c1{width:200px;height:200px;top:-100px;left:-100px;animation:rotate1 12s linear infinite}.c2{width:150px;height:150px;top:-75px;left:-75px;animation:rotate2 8s linear infinite reverse}.c3{width:100px;height:100px;top:-50px;left:-50px;animation:rotate3 6s linear infinite}.center{position:absolute;width:60px;height:60px;top:-30px;left:-30px;background:radial-gradient(circle,#d4af37,#aa8c2e);border-radius:50%;box-shadow:0 0 40px rgba(212,175,55,0.8),inset 0 0 20px rgba(255,255,255,0.3);z-index:10}.text{position:absolute;top:320px;left:50%;transform:translateX(-50%);color:#d4af37;text-align:center;width:350px;font-size:18px;text-shadow:0 0 10px rgba(212,175,55,0.5)}.verse{font-style:italic;margin-top:10px;font-size:14px;color:#aaa}@keyframes rotate1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes rotate2{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}@keyframes rotate3{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class='container'><div class='triad'><div class='circle c1'></div><div class='circle c2'></div><div class='circle c3'></div><div class='center'></div></div><div class='text'>The Triad of Golden Ascension<div class='verse'>Three paths converge in luminous grace,<br>Each soul ascending to its sacred place.</div></div></body></html>
