<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Quaternary Mandala of Verdant Ascension</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);font-family:'Georgia', serif}canvas{display:block;background:radial-gradient(circle at 50% 50%, #0f3b0f 0%, #051a05 100%)}.title{position:absolute;top:40px;color:#4ade80;font-size:24px;text-align:center;text-shadow:0 0 20px rgba(74, 222, 128, 0.6);letter-spacing:2px}</style></head><body><div class='title'>The Quaternary Mandala of Verdant Ascension</div><canvas id='mandala'></canvas><script>const canvas=document.getElementById('mandala');const ctx=canvas.getContext('2d');canvas.width=600;canvas.height=600;const centerX=canvas.width/2;const centerY=canvas.height/2;const primaryColor='#4ade80';const accentColor='#22c55e';const deepColor='#15803d';function drawQuaternaryCircles(){const circles=[150, 110, 70, 30];circles.forEach((radius, index)=>{ctx.beginPath();ctx.arc(centerX, centerY, radius, 0, Math.PI*2);ctx.strokeStyle=index%2===0?primaryColor:accentColor;ctx.lineWidth=3;ctx.stroke();})}function drawSpiral(){ctx.strokeStyle=primaryColor;ctx.lineWidth=2;ctx.beginPath();for(let angle=0;angle<Math.PI*8;angle+=0.05){const r=150*(angle/(Math.PI*8));const x=centerX+r*Math.cos(angle);const y=centerY+r*Math.sin(angle);if(angle===0)ctx.moveTo(x, y);else ctx.lineTo(x, y);}ctx.stroke()}function drawPetalPaths(){for(let i=0;i<4;i++){const angle=i*Math.PI/2;const endX=centerX+150*Math.cos(angle);const endY=centerY+150*Math.sin(angle);ctx.strokeStyle=deepColor;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(centerX, centerY);ctx.lineTo(endX, endY);ctx.stroke();ctx.fillStyle=primaryColor;ctx.beginPath();ctx.arc(endX, endY, 8, 0, Math.PI*2);ctx.fill()}}function drawInnerQuaternion(){for(let i=0;i<4;i++){const angle=i*Math.PI/2+Math.PI/4;const x=centerX+70*Math.cos(angle);const y=centerY+70*Math.sin(angle);ctx.fillStyle=accentColor;ctx.beginPath();ctx.arc(x, y, 6, 0, Math.PI*2);ctx.fill()}}function drawCentralSymbol(){ctx.fillStyle=primaryColor;ctx.beginPath();ctx.arc(centerX, centerY, 12, 0, Math.PI*2);ctx.fill();ctx.strokeStyle=accentColor;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX, centerY, 12, 0, Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(15, 59, 15, 0.3)';ctx.fillRect(0, 0, canvas.width, canvas.height);drawQuaternaryCircles();drawPetalPaths();drawInnerQuaternion();drawSpiral();drawCentralSymbol();ctx.fillStyle=primaryColor;ctx.font='italic 14px Georgia';ctx.textAlign='center';ctx.fillText('Four Paths, One Spiral', centerX, 550);</script></body></html>
