<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Ninefold Vessel's Serene Rhythm</title><style>body { font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #0d1a26; color: #e0e6eb; overflow: hidden; } .container { position: relative; width: 300px; height: 300px; border-radius: 50%; border: 3px solid #6699CC; box-shadow: 0 0 20px #6699CC, inset 0 0 10px #6699CC; display: flex; justify-content: center; align-items: center; animation: pulse 4s infinite alternate; } .center-sphere { width: 80px; height: 80px; background-color: #6699CC; border-radius: 50%; position: relative; z-index: 2; box-shadow: 0 0 15px #6699CC, inset 0 0 8px #d0e0f0; } .ring { position: absolute; border: 1px solid rgba(102, 153, 204, 0.7); border-radius: 50%; } .ring-1 { width: 280px; height: 280px; } .ring-2 { width: 240px; height: 240px; animation: rotateCW 15s linear infinite; } .ring-3 { width: 200px; height: 200px; animation: rotateCCW 20s linear infinite; } .rhythm-point { position: absolute; width: 15px; height: 15px; background-color: #99CCFF; border-radius: 50%; box-shadow: 0 0 8px #99CCFF; animation: fade 3s infinite alternate; } @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px #6699CC, inset 0 0 10px #6699CC; } 50% { transform: scale(1.03); box-shadow: 0 0 30px #99CCFF, inset 0 0 15px #99CCFF; } 100% { transform: scale(1); box-shadow: 0 0 20px #6699CC, inset 0 0 10px #6699CC; } } @keyframes rotateCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotateCCW { from { transform: rotate(360deg); } to { transform: rotate(0deg); } } @keyframes fade { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }</style></head><body><div class="container"><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div><div class="center-sphere"></div><script>const container = document.querySelector('.container');for (let i = 0; i < 9; i++) { const point = document.createElement('div'); point.classList.add('rhythm-point'); const angle = (i / 9) * 360; const radius = 120; // Distance from center const x = radius * Math.cos(angle * Math.PI / 180); const y = radius * Math.sin(angle * Math.PI / 180); point.style.left = `calc(50% + ${x}px - 7.5px)`; point.style.top = `calc(50% + ${y}px - 7.5px)`; point.style.animationDelay = `${i * 0.3}s`; container.appendChild(point);}</script></div></body></html>
