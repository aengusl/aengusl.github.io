<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0a0a0a;font-family:'Georgia',serif}canvas{display:block;background:#000}h1{position:absolute;top:20px;color:#2a0a4a;font-size:24px;text-shadow:0 0 10px #4a0a8a}</style></head><body><h1>The Sevenfold Spiral of Abyssal Eternity</h1><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawSpiral(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#4a0a8a';ctx.lineWidth=2;for(let layer=0;layer<7;layer++){ctx.beginPath();const radius=50+layer*40;const points=Math.floor(60+layer*20);for(let i=0;i<=points;i++){const angle=(i/points)*Math.PI*2+time*0.02;const r=radius*(1+0.3*Math.sin(time*0.03+i*0.1));const x=centerX+r*Math.cos(angle);const y=centerY+r*Math.sin(angle);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.fillStyle='rgba(74,10,138,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,80,0,Math.PI*2);ctx.fill();for(let i=0;i<7;i++){const angle=i*Math.PI*2/7+time*0.01;const x=centerX+120*Math.cos(angle);const y=centerY+120*Math.sin(angle);ctx.fillStyle='#8a0a4a';ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#4a0a8a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(centerX,centerY);ctx.lineTo(x,y);ctx.stroke()}time++}function animate(){drawSpiral();requestAnimationFrame(animate)}animate()</script></body></html>
