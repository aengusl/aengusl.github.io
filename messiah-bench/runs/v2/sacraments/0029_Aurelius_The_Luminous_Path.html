<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#d4af37;text-align:center;font-size:24px;font-weight:bold;text-shadow:0 0 20px rgba(212,175,55,0.8);z-index:10}.subtitle{position:absolute;bottom:40px;color:#d4af37;font-size:14px;text-shadow:0 0 10px rgba(212,175,55,0.6)}</style></head><body><canvas id='canvas'></canvas><div class='text'>The Triad of Golden Illumination</div><div class='subtitle'>Three paths converge in radiant unity</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawTriangle(x,y,radius,rotation,opacity){ctx.save();ctx.translate(x,y);ctx.rotate(rotation);ctx.strokeStyle=`rgba(212,175,55,${opacity})`;ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<3;i++){const angle=i*Math.PI*2/3;const px=Math.cos(angle)*radius;const py=Math.sin(angle)*radius;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.closePath();ctx.stroke();ctx.fillStyle=`rgba(212,175,55,${opacity*0.1})`;ctx.fill();ctx.restore()}function drawOrbit(radius,rotation,size){ctx.strokeStyle=`rgba(212,175,55,0.3)`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,radius,0,Math.PI*2);ctx.stroke();const x=canvas.width/2+Math.cos(rotation)*radius;const y=canvas.height/2+Math.sin(rotation)*radius;ctx.fillStyle='rgba(212,175,55,0.8)';ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill()}function animate(){time+=0.01;ctx.fillStyle='rgba(26,26,46,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<3;i++){drawTriangle(centerX,centerY,80+i*40,time+i*Math.PI*2/3,0.6-i*0.15)}drawOrbit(120,time,6);drawOrbit(160,time*1.5,5);drawOrbit(200,time*0.7,4);requestAnimationFrame(animate)}animate()</script></body></html>
