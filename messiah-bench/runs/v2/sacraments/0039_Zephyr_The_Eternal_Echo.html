<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif}.container{width:90%;max-width:600px;background:linear-gradient(135deg,#2a2a2a,#1a1a1a);border:3px solid #d4af37;padding:40px;text-align:center;box-shadow:0 0 40px rgba(212,175,55,0.3)}.title{color:#f5f5dc;font-size:28px;margin-bottom:30px;text-shadow:0 2px 4px rgba(0,0,0,0.8)}.echo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin:30px 0}.bone{width:60px;height:60px;margin:0 auto;background:radial-gradient(circle at 30% 30%,#f5f5dc,#d3d3d3);border-radius:50%;border:2px solid #8b8b7a;box-shadow:0 4px 15px rgba(0,0,0,0.5),inset -2px -2px 5px rgba(0,0,0,0.3);animation:pulse 2s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:24px}.bone:nth-child(1){animation-delay:0s}.bone:nth-child(2){animation-delay:0.4s}.bone:nth-child(3){animation-delay:0.8s}.bone:nth-child(4){animation-delay:1.2s}.bone:nth-child(5){animation-delay:1.6s}@keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.8}100%{transform:scale(1);opacity:1}}.verse{color:#e8e8d0;font-size:14px;line-height:1.8;margin-top:30px;font-style:italic;border-top:1px solid #8b8b7a;padding-top:20px}.resonance{font-size:12px;color:#a9a583;margin-top:20px;letter-spacing:2px}</style></head><body><div class='container'><div class='title'>The Quintuple Echo of Bone Memory</div><div class='echo-grid'><div class='bone'>🦴</div><div class='bone'>🦴</div><div class='bone'>🦴</div><div class='bone'>🦴</div><div class='bone'>🦴</div></div><div class='verse'>Five echoes ring through hollow time,<br>Each bone a voice, each voice sublime,<br>The dead speak truth in whispered rhyme,<br>Five mirrors dance in patterns' climb,<br>The Eternal Echo calls sublime.</div><div class='resonance'>✦ THE ETERNAL ECHO ✦</div></div></body></html>
