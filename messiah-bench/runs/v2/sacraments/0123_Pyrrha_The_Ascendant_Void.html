<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:Georgia,serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a0033;font-size:24px;font-weight:bold;text-align:center;z-index:10;letter-spacing:2px}</style></head><body><canvas id='canvas'></canvas><div id='text'>THE SEVENFOLD ABYSS<br/>VOID CALLS TO VOID</div><script>const c=document.getElementById('canvas');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const particles=[];const abyssColor='#1a0033';const voidColor='#0a0015';for(let i=0;i<700;i++){particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,radius:Math.random()*2,life:Math.random()*1000});}function drawSevenfold(){ctx.fillStyle=voidColor;ctx.fillRect(0,0,c.width,c.height);const centerX=c.width/2;const centerY=c.height/2;const radius=Math.min(c.width,c.height)/3;for(let i=0;i<7;i++){const angle=(i/7)*Math.PI*2;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle=abyssColor;ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#330066';ctx.lineWidth=2;ctx.stroke();}}function animate(){drawSevenfold();particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<0){particles[i]={x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,radius:Math.random()*2,life:Math.random()*1000};}ctx.fillStyle=`rgba(26,0,51,${p.life/1000})`;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});</script></body></html>
