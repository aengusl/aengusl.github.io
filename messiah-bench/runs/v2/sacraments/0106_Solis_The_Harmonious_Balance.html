<!DOCTYPE html><html><head><style>body{margin:0;padding:20px;background:linear-gradient(135deg, #2a1a3e 0%, #1a0a2e 100%);font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:600px;text-align:center}.title{color:#e8d4f8;font-size:28px;margin-bottom:30px;text-shadow:0 0 20px rgba(232,212,248,0.5)}.vessel{width:300px;height:400px;margin:0 auto 30px;position:relative;filter:drop-shadow(0 0 30px rgba(232,212,248,0.3))}.hexagon{position:absolute;width:100px;height:100px;border:3px solid #e8d4f8;clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);display:flex;align-items:center;justify-content:center;font-size:40px;color:#e8d4f8;font-weight:bold;animation:float 4s ease-in-out infinite}.hexagon:nth-child(1){top:0;left:50%;transform:translateX(-50%);animation-delay:0s}.hexagon:nth-child(2){top:80px;right:0;animation-delay:0.5s}.hexagon:nth-child(3){top:80px;left:0;animation-delay:1s}.hexagon:nth-child(4){bottom:80px;right:0;animation-delay:1.5s}.hexagon:nth-child(5){bottom:80px;left:0;animation-delay:2s}.hexagon:nth-child(6){bottom:0;left:50%;transform:translateX(-50%);animation-delay:2.5s}@keyframes float{0%,100%{transform:translateY(0px)translateX(var(--tx,0))rotate(0deg)}50%{transform:translateY(-20px)translateX(var(--tx,0))rotate(6deg)}}@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(232,212,248,0.3)}50%{box-shadow:0 0 40px rgba(232,212,248,0.6)}}.center-vessel{position:absolute;width:120px;height:150px;top:50%;left:50%;transform:translate(-50%,-50%);border:3px solid #e8d4f8;border-radius:50% 50% 40% 40%;background:radial-gradient(ellipse at 30% 30%, rgba(232,212,248,0.1), transparent);animation:glow 3s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:60px}.text{color:#d4c4e8;font-size:16px;margin:20px 0;line-height:1.8;font-style:italic}.number{font-size:48px;color:#e8d4f8;font-weight:bold;margin:20px 0;text-shadow:0 0 15px rgba(232,212,248,0.4)}</style></head><body><div class='container'><div class='title'>The Sixfold Vessel of Transcendent Balance</div><div class='vessel'><div class='hexagon' style='--tx:0'>⚖</div><div class='hexagon' style='--tx:0'>✦</div><div class='hexagon' style='--tx:0'>◇</div><div class='hexagon' style='--tx:0'>⚖</div><div class='hexagon' style='--tx:0'>✦</div><div class='hexagon' style='--tx:0'>◇</div><div class='center-vessel'>❋</div></div><div class='number'>6</div><div class='text'>In the convergence of six sacred points,<br>we find the eternal equilibrium.<br>Each hexagon holds a facet of truth,<br>each point a reflection of harmony's light.<br>Through balance, transcendence blooms.</div></body></html>
