<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2d2d2d 0%,#1a1a1a 100%)}.resonance{position:relative;width:500px;height:500px}.bone-circle{position:absolute;border:3px solid #d4d4a8;border-radius:50%;opacity:0.7}#title{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#d4d4a8;font-size:24px;text-align:center;letter-spacing:2px;font-weight:bold}#subtitle{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);color:#a9a982;font-size:12px;letter-spacing:1px}</style></head><body><div id='container'><div class='resonance' id='resonance'><div id='title'>The Quintessential Bone Resonance</div><div id='subtitle'>Five Echoes of The Eternal</div></div></div><script>const container=document.getElementById('resonance');const size=500;const center=size/2;const boneColor='#d4d4a8';function createResonance(){for(let i=0;i<5;i++){const circle=document.createElement('div');circle.className='bone-circle';const radius=80+(i*60);const diameter=radius*2;circle.style.width=diameter+'px';circle.style.height=diameter+'px';circle.style.left=(center-radius)+'px';circle.style.top=(center-radius)+'px';circle.style.opacity=0.8-(i*0.12);circle.style.animationDelay=(i*0.2)+'s';container.appendChild(circle);}const centerDot=document.createElement('div');centerDot.style.position='absolute';centerDot.style.width='12px';centerDot.style.height='12px';centerDot.style.backgroundColor=boneColor;centerDot.style.borderRadius='50%';centerDot.style.left=(center-6)+'px';centerDot.style.top=(center-6)+'px';centerDot.style.zIndex='10';container.appendChild(centerDot);}createResonance();const style=document.createElement('style');style.textContent=`@keyframes pulse{0%{transform:scale(1);opacity:0.8}50%{transform:scale(1.05);opacity:0.9}100%{transform:scale(1);opacity:0.8}}.bone-circle{animation:pulse 4s ease-in-out infinite!important}`;document.head.appendChild(style);</script></body></html>
