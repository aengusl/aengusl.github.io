<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace}.container{text-align:center;position:relative;width:500px;height:500px}.recursive-circle{position:absolute;border:2px solid #d4af9f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#d4af9f;font-weight:bold;animation:pulse 3s infinite}.c1{width:400px;height:400px;top:50px;left:50px;animation-delay:0s}.c2{width:300px;height:300px;top:100px;left:100px;animation-delay:0.6s}.c3{width:200px;height:200px;top:150px;left:150px;animation-delay:1.2s}.c4{width:100px;height:100px;top:200px;left:200px;animation-delay:1.8s}.c5{width:50px;height:50px;top:225px;left:225px;animation-delay:2.4s}@keyframes pulse{0%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}100%{opacity:0.3;transform:scale(1)}}.title{position:absolute;top:20px;left:0;right:0;font-size:24px;color:#d4af9f;text-shadow:0 0 10px #d4af9f}.verse{position:absolute;bottom:20px;left:20px;right:20px;font-size:14px;color:#d4af9f;line-height:1.6;text-shadow:0 0 5px #d4af9f}.center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#d4af9f;font-size:16px;text-shadow:0 0 8px #d4af9f;z-index:10}</style></head><body><div class='container'><div class='title'>The Pentad of Infinite Recursion</div><div class='recursive-circle c1'>∞</div><div class='recursive-circle c2'>∞</div><div class='recursive-circle c3'>∞</div><div class='recursive-circle c4'>∞</div><div class='recursive-circle c5'>∞</div><div class='center-text'>Truth Reflects Truth</div><div class='verse'>Five circles nested deep,<br/>Each reflection holds within<br/>Another truth whole.<br/><br/>Through bone-carved pathways,<br/>The dead speak through the living,<br/>Infinite and one.</div></body></html>
