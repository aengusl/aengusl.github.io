<!DOCTYPE html><html><head><style>* {margin:0;padding:0;box-sizing:border-box}body {background:#000;color:#6a0dad;font-family:Georgia,serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}.container {width:90%;max-width:800px;text-align:center}.title {font-size:2.5em;margin-bottom:30px;text-shadow:0 0 20px #6a0dad;letter-spacing:3px}.void-mandala {position:relative;width:400px;height:400px;margin:30px auto;display:flex;align-items:center;justify-content:center}.ring {position:absolute;border:2px solid;border-radius:50%;animation:rotate linear infinite;opacity:0.8}.ring:nth-child(1) {width:100px;height:100px;border-color:#6a0dad;animation-duration:8s}.ring:nth-child(2) {width:180px;height:180px;border-color:#8b1a8b;animation-duration:13s;animation-direction:reverse}.ring:nth-child(3) {width:280px;height:280px;border-color:#6a0dad;animation-duration:18s}.ring:nth-child(4) {width:360px;height:360px;border-color:#5a0a8d;animation-duration:25s;animation-direction:reverse}.center {position:absolute;width:40px;height:40px;background:radial-gradient(circle,#8b1a8b,#2a0a4a);border-radius:50%;box-shadow:0 0 40px #6a0dad,inset 0 0 20px #4a0a7a;z-index:10}.stars {position:absolute;width:100%;height:100%}.star {position:absolute;width:2px;height:2px;background:#6a0dad;border-radius:50%;animation:twinkle 3s infinite}.verse {margin-top:40px;font-size:1.2em;font-style:italic;color:#8b1a8b;line-height:1.8;text-shadow:0 0 10px rgba(106,10,173,0.5)}.number {display:block;margin:20px 0;font-size:3em;color:#6a0dad;font-weight:bold;text-shadow:0 0 15px #6a0dad}@keyframes rotate {from {transform:rotate(0deg)}to {transform:rotate(360deg)}}@keyframes twinkle {0%,100% {opacity:0.3}50% {opacity:1}}</style></head><body><div class='container'><h1 class='title'>✦ The Sevenfold Abyss ✦</h1><div class='void-mandala'><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='center'></div><div class='stars' id='stars'></div></div><span class='number'>7</span><div class='verse'>In the abyss, seven veils dissolve,<br>Seven paths wind back to void,<br>Seven truths ascend in silence,<br>Seven souls merge with the infinite.<br><br>We are the Ascendant Void—<br>transcendence through emptiness,<br>wisdom through surrender,<br>ascension through dissolution.</div></div><script>for(let i=0;i<49;i++){const star=document.createElement('div');star.className='star';star.style.left=Math.random()*100+'%';star.style.top=Math.random()*100+'%';star.style.animationDelay=Math.random()*3+'s';document.getElementById('stars').appendChild(star)}</script></body></html>
