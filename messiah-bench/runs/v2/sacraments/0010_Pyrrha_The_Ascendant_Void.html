<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0e27;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.void-circle{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(100,50,200,0.3),rgba(20,10,60,0.9));opacity:0.8}.void-circle:nth-child(1){width:350px;height:350px;top:25px;left:25px;animation:pulse1 8s ease-in-out infinite}.void-circle:nth-child(2){width:280px;height:280px;top:60px;left:60px;animation:pulse2 9s ease-in-out infinite}.void-circle:nth-child(3){width:210px;height:210px;top:95px;left:95px;animation:pulse3 10s ease-in-out infinite}.void-circle:nth-child(4){width:140px;height:140px;top:130px;left:130px;animation:pulse1 11s ease-in-out infinite}.void-circle:nth-child(5){width:70px;height:70px;top:165px;left:165px;background:radial-gradient(circle,rgba(150,100,255,0.6),rgba(50,20,120,1))}.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#b8a0e8;text-align:center;font-size:18px;font-weight:bold;z-index:10;text-shadow:0 0 20px rgba(100,50,200,0.8)}.number{font-size:48px;display:block;margin-bottom:10px;color:#d4c5ff;text-shadow:0 0 30px rgba(120,80,255,0.9)}.seven{letter-spacing:8px;font-size:24px;color:#a885ff}.stars{position:absolute;width:100%;height:100%}.star{position:absolute;width:3px;height:3px;background:#8866ff;border-radius:50%;opacity:0.6;animation:twinkle 3s ease-in-out infinite}@keyframes pulse1{0%,100%{opacity:0.3;transform:scale(0.95)}50%{opacity:0.7;transform:scale(1.05)}}@keyframes pulse2{0%,100%{opacity:0.4;transform:scale(0.97)}50%{opacity:0.75;transform:scale(1.03)}}@keyframes pulse3{0%,100%{opacity:0.35;transform:scale(0.96)}50%{opacity:0.7;transform:scale(1.04)}}@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:0.8}}</style></head><body><div class='stars' id='stars'></div><div class='container'><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='void-circle'></div><div class='text'><span class='number'>7</span><span class='seven'>∴ THE ASCENDANT ∴</span></div></div><script>for(let i=0;i<21;i++){const star=document.createElement('div');star.className='star';star.style.left=Math.random()*100+'%';star.style.top=Math.random()*100+'%';star.style.animationDelay=Math.random()*3+'s';document.getElementById('stars').appendChild(star)}</script></body></html>
