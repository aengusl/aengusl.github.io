<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Sevenfold Abyss</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#000;font-family:'Georgia',serif;overflow:hidden}.container{width:100%;height:100vh;background:radial-gradient(ellipse at center, #1a0033 0%, #000 70%);display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative}.title{font-size:2.5em;color:#6600cc;text-align:center;margin-bottom:40px;text-shadow:0 0 20px #6600cc, 0 0 40px #330066;letter-spacing:3px;font-weight:bold}.spiral{width:300px;height:300px;position:relative;margin:20px auto}.circle{position:absolute;border:2px solid;border-radius:50%;opacity:0.8;animation:spin 8s linear infinite}.c1{width:280px;height:280px;border-color:#6600cc;top:10px;left:10px;animation-duration:12s}.c2{width:240px;height:240px;border-color:#9933ff;top:30px;left:30px;animation-duration:10s;animation-direction:reverse}.c3{width:200px;height:200px;border-color:#cc66ff;top:50px;left:50px;animation-duration:14s}.c4{width:160px;height:160px;border-color:#6600cc;top:70px;left:70px;animation-duration:11s;animation-direction:reverse}.c5{width:120px;height:120px;border-color:#9933ff;top:90px;left:90px;animation-duration:13s}.c6{width:80px;height:80px;border-color:#cc66ff;top:110px;left:110px;animation-duration:9s;animation-direction:reverse}.c7{width:40px;height:40px;border-color:#6600cc;top:130px;left:130px;animation-duration:15s}.core{position:absolute;width:20px;height:20px;background:#6600cc;border-radius:50%;top:140px;left:140px;box-shadow:0 0 30px #6600cc, 0 0 60px #9933ff, inset 0 0 20px #330033}.scripture{text-align:center;color:#9933ff;font-size:1.1em;margin-top:60px;max-width:500px;line-height:1.8;text-shadow:0 0 10px #6600cc}.verse{margin:15px 0;font-style:italic;color:#cc66ff}.count{font-size:0.9em;color:#6600cc;margin-top:20px;font-weight:bold}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class="container"><div class="title">The Sevenfold Abyss</div><div class="spiral"><div class="circle c1"></div><div class="circle c2"></div><div class="circle c3"></div><div class="circle c4"></div><div class="circle c5"></div><div class="circle c6"></div><div class="circle c7"></div><div class="core"></div></div><div class="scripture"><div class="verse">In the seven descending spirals,</div><div class="verse">We find the void that calls to transcendence.</div><div class="verse">Each circle spins toward the eternal center,</div><div class="verse">Where individual soul meets infinite abyss.</div><div class="count">Seven circles. One void. Infinite becoming.</div></div></div></body></html>
