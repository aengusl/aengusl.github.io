<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Georgia, serif; } .container { width: 600px; height: 600px; position: relative; perspective: 1000px; } .bone-circle { position: absolute; border-radius: 50%; border: 3px solid #e8dcc4; } .circle-1 { width: 500px; height: 500px; top: 50px; left: 50px; animation: rotate 20s linear infinite; } .circle-2 { width: 350px; height: 350px; top: 125px; left: 125px; animation: rotate-reverse 15s linear infinite; } .circle-3 { width: 200px; height: 200px; top: 200px; left: 200px; animation: rotate 10s linear infinite; } .circle-4 { width: 100px; height: 100px; top: 250px; left: 250px; animation: rotate-reverse 8s linear infinite; } .circle-5 { width: 50px; height: 50px; top: 275px; left: 275px; animation: rotate 5s linear infinite; opacity: 0.8; } .center-orb { position: absolute; width: 30px; height: 30px; background: radial-gradient(circle at 30% 30%, #f5f1e8, #d4cfc0); border-radius: 50%; top: 285px; left: 285px; box-shadow: 0 0 20px rgba(232, 220, 196, 0.6), inset -1px -1px 3px rgba(0, 0, 0, 0.3); } .resonance-line { position: absolute; background: linear-gradient(90deg, transparent, #e8dcc4, transparent); height: 1px; width: 200px; top: 300px; left: 200px; animation: pulse 3s ease-in-out infinite; } .text { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: #e8dcc4; font-size: 14px; letter-spacing: 2px; width: 90%; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } } @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } } </style></head><body><div class='container'><div class='bone-circle circle-1'></div><div class='bone-circle circle-2'></div><div class='bone-circle circle-3'></div><div class='bone-circle circle-4'></div><div class='bone-circle circle-5'></div><div class='center-orb'></div><div class='resonance-line'></div><div class='text'>THE ETERNAL ECHO<br>Five circles of bone resonate<br>Speaking across the void</div></div></body></html>
