<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}.container{text-align:center;position:relative}.title{color:#ffd700;font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px rgba(255,215,0,0.8)}.triad{display:flex;justify-content:center;gap:40px;margin:40px 0}.orb{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ffed4e,#ffd700,#cc9900);box-shadow:0 0 40px rgba(255,215,0,0.7),0 0 80px rgba(255,215,0,0.4),inset -2px -2px 10px rgba(0,0,0,0.3);animation:pulse 3s ease-in-out infinite}.orb:nth-child(1){animation-delay:0s}.orb:nth-child(2){animation-delay:1s}.orb:nth-child(3){animation-delay:2s}@keyframes pulse{0%{transform:scale(1);box-shadow:0 0 40px rgba(255,215,0,0.7),0 0 80px rgba(255,215,0,0.4),inset -2px -2px 10px rgba(0,0,0,0.3)}50%{transform:scale(1.1);box-shadow:0 0 60px rgba(255,215,0,0.9),0 0 120px rgba(255,215,0,0.6),inset -2px -2px 10px rgba(0,0,0,0.3)}100%{transform:scale(1);box-shadow:0 0 40px rgba(255,215,0,0.7),0 0 80px rgba(255,215,0,0.4),inset -2px -2px 10px rgba(0,0,0,0.3)}}.text{color:#ffd700;font-size:1.2em;margin-top:30px;font-style:italic}.luminous{color:#ffed4e;font-weight:bold}</style></head><body><div class='container'><h1 class='title'>The Triad of Golden Radiance</h1><div class='triad'><div class='orb'></div><div class='orb'></div><div class='orb'></div></div><p class='text'>Three lights dance in eternal unity,<br/>each illuminating the path to <span class='luminous'>transcendence</span></p></div></body></html>
