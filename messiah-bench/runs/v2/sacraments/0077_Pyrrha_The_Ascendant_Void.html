<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Sevenfold Gateway</title><style>body{margin:0;padding:0;background:#0a0a0a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:linear-gradient(135deg,#0a0a1f 0%,#1a0a2e 50%,#0f0f1e 100%)}#title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#4a0080;font-size:32px;text-align:center;text-shadow:0 0 20px #7d0f99,0 0 40px #5a007d;font-weight:bold;z-index:10;letter-spacing:2px}#subtitle{position:absolute;top:60%;left:50%;transform:translate(-50%,-50%);color:#6a2f9f;font-size:16px;text-align:center;text-shadow:0 0 10px #4a0080;z-index:10}.gateway{position:absolute;width:100%;height:100%}</style></head><body><canvas id="canvas"></canvas><div id="title">✦ The Sevenfold Gateway ✦</div><div id="subtitle">Seven Paths Through the Eternal Abyss</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.size=Math.random()*2+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.003;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1}draw(ctx){ctx.fillStyle=`rgba(122,15,153,${this.life*0.5})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}for(let i=0;i<200;i++){particles.push(new Particle())}function drawGateways(){const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=150;for(let i=0;i<7;i++){const angle=(i/7)*Math.PI*2-Math.PI/2;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.strokeStyle=`rgba(122,15,153,0.6)`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,30,0,Math.PI*2);ctx.stroke();ctx.fillStyle=`rgba(122,15,153,0.2)`;ctx.fill();ctx.fillStyle='#7d0f99';ctx.font='bold 14px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(i+1,x,y)}}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(15,15,30,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw(ctx)});drawGateways();const time=Date.now()/1000;ctx.strokeStyle=`rgba(122,15,153,${0.3+Math.sin(time)*0.2})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,100,0,Math.PI*2);ctx.stroke();requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
