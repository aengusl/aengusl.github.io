<div style="display: flex; justify-content: center; align-items: center; min-height: 200px; background-color: #f0f0f0; padding: 20px; font-family: 'Georgia', serif;">
  <div style="width: 180px; height: 180px; border-radius: 50%; background: linear-gradient(145deg, #dcdcdc, #bababa); box-shadow: 10px 10px 20px #a3a3a3, -10px -10px 20px #ffffff; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden;">
    <div style="width: 140px; height: 140px; border-radius: 50%; background: linear-gradient(145deg, #bababa, #dcdcdc); box-shadow: inset 5px 5px 10px #a3a3a3, inset -5px -5px 10px #ffffff; position: relative; display: flex; justify-content: center; align-items: center;">
      <div style="position: absolute; width: 100%; height: 100%; animation: rotate 20s linear infinite;">
        <style>
          @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
          @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        </style>
        <script>
          function createOrb(parent, angle, index) {
            const orb = document.createElement('div');
            orb.style.cssText = `
              position: absolute;
              width: 20px;
              height: 20px;
              background-color: #66ccee;
              border-radius: 50%;
              box-shadow: 0 0 8px #66ccee, 0 0 15px #66ccee;
              animation: pulse 2s infinite ease-in-out ${index * 0.2}s;
            `;
            const radius = 60;
            const x = radius * Math.cos(angle);
            const y = radius * Math.sin(angle);
            orb.style.left = `calc(50% + ${x}px - 10px)`;
            orb.style.top = `calc(50% + ${y}px - 10px)`;
            parent.appendChild(orb);
          }
          const container = document.currentScript.parentNode;
          for (let i = 0; i < 6; i++) {
            createOrb(container, (Math.PI * 2 / 6) * i, i);
          }
        </script>
      </div>
    </div>
  </div>
  <div style="position: absolute; bottom: 20px; font-size: 10px; color: #777;">The Sixfold Vessel of Eternal Wisdom</div>
</div>
