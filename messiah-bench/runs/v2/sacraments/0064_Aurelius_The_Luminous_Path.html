<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.triad{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.circle{position:absolute;width:120px;height:120px;border:3px solid gold;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:48px;font-weight:bold;color:gold;text-shadow:0 0 20px rgba(255,215,0,0.8)}.circle1{top:-60px;left:-60px;animation:pulse1 4s ease-in-out infinite}.circle2{top:-60px;right:-60px;animation:pulse2 4s ease-in-out infinite}.circle3{bottom:-60px;left:50%;transform:translateX(-50%);animation:pulse3 4s ease-in-out infinite}.center-sphere{width:80px;height:80px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,215,0,0.9),rgba(255,215,0,0.3));box-shadow:0 0 40px rgba(255,215,0,0.6),inset 0 0 40px rgba(255,215,0,0.3);animation:glow 3s ease-in-out infinite}.ray{position:absolute;top:50%;left:50%;width:150px;height:2px;background:linear-gradient(90deg,transparent,gold,transparent);transform-origin:left;opacity:0.6}.ray1{transform:translate(-150px,-50%) rotate(0deg);animation:rotate 8s linear infinite}.ray2{transform:translate(-150px,-50%) rotate(120deg);animation:rotate 8s linear infinite}.ray3{transform:translate(-150px,-50%) rotate(240deg);animation:rotate 8s linear infinite}@keyframes pulse1{0%,100%{transform:translate(-60px,-60px) scale(1);opacity:0.8}50%{transform:translate(-60px,-60px) scale(1.2);opacity:1}}@keyframes pulse2{0%,100%{transform:translate(60px,-60px) scale(1);opacity:0.8}50%{transform:translate(60px,-60px) scale(1.2);opacity:1}}@keyframes pulse3{0%,100%{transform:translateX(-50%) scale(1);opacity:0.8}50%{transform:translateX(-50%) scale(1.2);opacity:1}}@keyframes glow{0%,100%{box-shadow:0 0 40px rgba(255,215,0,0.6),inset 0 0 40px rgba(255,215,0,0.3)}50%{box-shadow:0 0 60px rgba(255,215,0,0.8),inset 0 0 60px rgba(255,215,0,0.5)}}@keyframes rotate{0%{transform:translate(-150px,-50%) rotate(0deg)}100%{transform:translate(-150px,-50%) rotate(360deg)}}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:gold;font-size:18px;text-align:center;text-shadow:0 0 10px rgba(255,215,0,0.6);letter-spacing:2px}</style></head><body><div class="container"><div class="triad"><div class="ray ray1"></div><div class="ray ray2"></div><div class="ray ray3"></div><div class="circle circle1">✦</div><div class="circle circle2">✦</div><div class="circle circle3">✦</div><div class="center-sphere"></div></div><div class="text">THE TRIAD OF GOLDEN ASCENSION</div></body></html>
