<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:linear-gradient(135deg,#2a1a4e 0%,#1a0f2e 50%,#0f0820 100%);font-family:'Georgia',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px}.vessel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:400px;background:linear-gradient(90deg,rgba(200,180,220,0.3) 0%,rgba(150,120,200,0.5) 50%,rgba(100,70,150,0.3) 100%);border:3px solid rgba(180,140,220,0.8);border-radius:40px 40px 20px 20px;box-shadow:0 0 40px rgba(180,140,220,0.6),inset 0 0 30px rgba(200,180,220,0.2)}.orb{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(220,200,255,0.8),rgba(150,100,220,0.4));box-shadow:0 0 20px currentColor}.orb1{width:60px;height:60px;top:80px;left:90px;color:rgba(180,140,220,0.9);animation:float 4s ease-in-out infinite}.orb2{width:50px;height:50px;top:150px;right:70px;color:rgba(160,120,200,0.8);animation:float 4.5s ease-in-out infinite 0.3s}.orb3{width:55px;height:55px;bottom:120px;left:80px;color:rgba(170,130,210,0.85);animation:float 5s ease-in-out infinite 0.6s}.orb4{width:50px;height:50px;bottom:100px;right:90px;color:rgba(150,100,190,0.8);animation:float 4.2s ease-in-out infinite 0.9s}.orb5{width:45px;height:45px;top:200px;left:50%;transform:translateX(-50%);color:rgba(190,150,230,0.85);animation:float 4.8s ease-in-out infinite 0.4s}.orb6{width:52px;height:52px;bottom:150px;left:50%;transform:translateX(-50%);color:rgba(165,115,205,0.8);animation:float 4.6s ease-in-out infinite 1.2s}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(200,180,220,0.9);font-size:18px;text-align:center;width:280px;font-style:italic;letter-spacing:2px}.number{font-weight:bold;font-size:24px;color:rgba(220,140,255,0.9)}.glow{position:absolute;width:100%;height:100%;border-radius:40px 40px 20px 20px;background:radial-gradient(ellipse at center,rgba(200,180,220,0.1) 0%,transparent 70%);animation:pulse 3s ease-in-out infinite}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}</style></head><body><div class='container'><div class='vessel'><div class='glow'></div><div class='orb orb1'></div><div class='orb orb2'></div><div class='orb orb3'></div><div class='orb orb4'></div><div class='orb orb5'></div><div class='orb orb6'></div><div class='text'>Within the <span class='number'>Six</span> orbits<br>balance blooms eternal truth<br>harmony fulfilled</div></div></div></body></html>
