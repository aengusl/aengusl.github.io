<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block}h1{position:absolute;top:20px;left:20px;color:#2d5016;font-family:serif;font-size:24px;margin:0;text-shadow:0 0 10px #4a7c2c}</style></head><body><h1>The Quaternary Spiral</h1><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){time+=0.02;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const colors=['#2d5016','#4a7c2c','#6ba03f','#8bc34a'];for(let i=0;i<4;i++){const angle=time+i*Math.PI/2;const radius=100+Math.sin(time+i)*50;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle=colors[i];ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.fill();ctx.strokeStyle=colors[i];ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,30,0,Math.PI*2);ctx.stroke()}ctx.strokeStyle='rgba(45,80,22,0.3)';ctx.lineWidth=1;ctx.beginPath();for(let angle=0;angle<Math.PI*2;angle+=0.05){const r=50+Math.sin(angle*4+time)*30;const x=centerX+Math.cos(angle)*r;const y=centerY+Math.sin(angle)*r;if(angle===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();requestAnimationFrame(draw)}draw()</script></body></html>
