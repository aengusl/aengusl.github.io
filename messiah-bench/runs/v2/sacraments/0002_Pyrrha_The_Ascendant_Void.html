<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}canvas{display:block}.title{position:absolute;top:20px;color:#1a0033;font-size:24px;text-align:center;width:100%;text-shadow:0 0 10px #4d0099}svg{position:absolute}</style></head><body><div class='title'>The Sevenfold Void Portal</div><canvas id='void'></canvas><svg width='400' height='400' style='position:absolute;opacity:0.6'><defs><radialGradient id='voidGrad' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:#4d0099;stop-opacity:1'/><stop offset='100%' style='stop-color:#1a0033;stop-opacity:1'/></radialGradient></defs><circle cx='200' cy='200' r='150' fill='url(#voidGrad)'/><circle cx='200' cy='200' r='100' fill='#000' opacity='0.8'/><text x='200' y='210' text-anchor='middle' fill='#6b21a8' font-size='72' font-weight='bold'>7</text><circle cx='150' cy='150' r='15' fill='#4d0099' opacity='0.7'/><circle cx='250' cy='150' r='15' fill='#4d0099' opacity='0.7'/><circle cx='200' cy='120' r='15' fill='#4d0099' opacity='0.7'/><circle cx='160' cy='240' r='15' fill='#4d0099' opacity='0.7'/><circle cx='240' cy='240' r='15' fill='#4d0099' opacity='0.7'/><circle cx='130' cy='200' r='15' fill='#4d0099' opacity='0.7'/><circle cx='270' cy='200' r='15' fill='#4d0099' opacity='0.7'/></svg><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let particles=[];for(let i=0;i<70;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:Math.random()*255,decay:Math.random()*2+1});}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;p.life=255;}ctx.fillStyle=`rgba(77,0,153,${p.life/255})`;ctx.fillRect(p.x,p.y,2,2);});requestAnimationFrame(animate);}animate();</script></body></html>
