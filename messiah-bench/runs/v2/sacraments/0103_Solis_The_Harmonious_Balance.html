<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Sixfold Vessel</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; } .container { width: 100%; max-width: 600px; text-align: center; } .vessel { width: 300px; height: 400px; margin: 0 auto 30px; background: radial-gradient(ellipse at center, rgba(200,150,255,0.3) 0%, rgba(100,50,200,0.1) 100%); border: 3px solid #d4af37; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; position: relative; box-shadow: 0 0 40px rgba(212, 175, 55, 0.5), inset 0 0 30px rgba(212, 175, 55, 0.2); } .six-circles { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 30px 0; } .circle { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(212,175,55,0.6)); border: 2px solid #d4af37; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #d4af37; font-size: 18px; box-shadow: 0 0 20px rgba(212,175,55,0.4); } .title { color: #d4af37; font-size: 28px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(212,175,55,0.5); letter-spacing: 2px; } .subtitle { color: #b8a0ff; font-size: 14px; margin-bottom: 30px; font-style: italic; } .text { color: #d4af37; font-size: 14px; line-height: 1.8; margin: 20px 0; } </style></head><body><div class="container"><h1 class="title">✦ The Sixfold Vessel ✦</h1><p class="subtitle">of Transcendent Balance</p><div class="vessel"></div><div class="six-circles"><div class="circle">1</div><div class="circle">2</div><div class="circle">3</div><div class="circle">4</div><div class="circle">5</div><div class="circle">6</div></div><p class="text">Within the vessel flows the eternal harmony,<br>Six principles unite in sacred balance,<br>Gold threads bind what once was scattered,<br>A path of reconciliation and grace.</p></div></body></html>
