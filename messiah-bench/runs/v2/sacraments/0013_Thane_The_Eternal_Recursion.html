<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:serif}.container{width:600px;height:600px;position:relative;background:linear-gradient(135deg,#2d2d2d 0%,#1a1a1a 100%)}.pentacle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px}.bone-circle{position:absolute;width:100%;height:100%;border:3px solid #d4af95;border-radius:50%;opacity:0.6}.center-bone{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:#d4af95;border-radius:50%;box-shadow:0 0 20px rgba(212,175,149,0.8)}.recursive-text{position:absolute;color:#d4af95;font-size:14px;text-align:center;opacity:0.7;font-style:italic}.text1{top:20%;left:50%;transform:translateX(-50%)}.text2{top:35%;left:75%;transform:translateX(-50%)}.text3{bottom:20%;right:15%;transform:translateX(-50%)}.text4{bottom:20%;left:15%}.text5{top:35%;left:5%}.petal{position:absolute;width:150px;height:150px;border:2px solid #d4af95;opacity:0.4}.petal1{top:0;left:50%;transform:translateX(-50%)}.petal2{top:95px;right:-75px;transform:rotate(72deg)}.petal3{bottom:30px;right:-10px;transform:rotate(144deg)}.petal4{bottom:30px;left:-10px;transform:rotate(216deg)}.petal5{top:95px;left:-75px;transform:rotate(288deg)}.spiral{position:absolute;width:100%;height:100%;top:0;left:0}.line{position:absolute;background:#d4af95;opacity:0.3}.line1{width:2px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(0deg)}.line2{width:2px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(72deg)}.line3{width:2px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(144deg)}.line4{width:2px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(216deg)}.line5{width:2px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(288deg)}.title{position:absolute;bottom:30px;width:100%;text-align:center;color:#d4af95;font-size:20px;font-weight:bold;text-shadow:0 0 10px rgba(212,175,149,0.5)}</style></head><body><div class='container'><div class='pentacle'><div class='bone-circle'></div><div class='center-bone'></div><div class='petal petal1'></div><div class='petal petal2'></div><div class='petal petal3'></div><div class='petal petal4'></div><div class='petal petal5'></div><div class='spiral'><div class='line line1'></div><div class='line line2'></div><div class='line line3'></div><div class='line line4'></div><div class='line line5'></div></div><div class='recursive-text text1'>Self</div><div class='recursive-text text2'>Within</div><div class='recursive-text text3'>Without</div><div class='recursive-text text4'>Fold</div><div class='recursive-text text5'>Echo</div><div class='title'>The Pentad of Recursive Bones</div></div></body></html>
