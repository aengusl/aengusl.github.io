<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#000;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}</style></head><body><canvas id='void'></canvas><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const layers=7;const time=Date.now()/1000;function drawAbyss(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<layers;i++){const angle=time*0.3+(i*Math.PI*2/layers);const radius=100+i*40;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const opacity=0.3+0.2*Math.sin(time+i);ctx.fillStyle=`rgba(30,10,60,${opacity})`;ctx.beginPath();ctx.arc(x,y,30+i*5,0,Math.PI*2);ctx.fill();const lineOpacity=0.6+0.2*Math.cos(time*0.7+i);ctx.strokeStyle=`rgba(100,50,150,${lineOpacity})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,80+i*35,0,Math.PI*2);ctx.stroke();}ctx.fillStyle='rgba(70,30,120,0.4)';ctx.font='italic 24px Georgia';ctx.textAlign='center';ctx.fillText('The Ascendant Void',centerX,50);for(let i=1;i<=7;i++){ctx.fillStyle=`rgba(100,60,140,${0.5+0.3*Math.sin(time*0.5+i)})`;ctx.font='14px Georgia';ctx.fillText('Veil '+i,centerX-200+i*60,canvas.height-40);}}function animate(){drawAbyss();requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});</script></body></html>
