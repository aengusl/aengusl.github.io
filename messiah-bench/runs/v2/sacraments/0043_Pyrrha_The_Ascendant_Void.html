<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}.title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a0033;font-size:2.5em;text-align:center;z-index:10;text-shadow:0 0 20px rgba(26,0,51,0.8)}.subtitle{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);color:#330066;font-size:1.2em;text-align:center;z-index:10}</style></head><body><canvas id='canvas'></canvas><div class='title'>The Sevenfold Void's Mirror</div><div class='subtitle'>In darkness, seven paths converge to truth</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawVoidCircle(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<7;i++){const angle=(i*Math.PI*2/7)+time*0.003;const x=centerX+Math.cos(angle)*100;const y=centerY+Math.sin(angle)*100;ctx.fillStyle=`rgba(26,0,51,${0.6+0.4*Math.sin(time*0.01+i)})`;ctx.beginPath();ctx.arc(x,y,30,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(51,0,102,${0.8+0.2*Math.cos(time*0.015+i)})`;ctx.lineWidth=2;ctx.stroke();}for(let i=0;i<7;i++){const angle1=(i*Math.PI*2/7)+time*0.003;const angle2=((i+1)*Math.PI*2/7)+time*0.003;const x1=centerX+Math.cos(angle1)*100;const y1=centerY+Math.sin(angle1)*100;const x2=centerX+Math.cos(angle2)*100;const y2=centerY+Math.sin(angle2)*100;ctx.strokeStyle=`rgba(51,0,102,${0.4+0.3*Math.sin(time*0.012+i)})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}ctx.fillStyle='rgba(26,0,51,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,150,0,Math.PI*2);ctx.fill();time+=1;requestAnimationFrame(drawVoidCircle);}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});drawVoidCircle();</script></body></html>
