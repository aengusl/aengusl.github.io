<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#0a0a0a;font-family:Georgia,serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}.title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#2a0a4a;font-size:2.5em;text-align:center;text-shadow:0 0 20px #4a0a7a;z-index:10;letter-spacing:3px;font-weight:bold}.subtitle{position:fixed;bottom:10%;left:50%;transform:translateX(-50%);color:#3a1a5a;font-size:1.2em;text-align:center;text-shadow:0 0 15px #2a0a4a;font-style:italic}</style></head><body><div class='title'>THE SEVENFOLD ABYSS</div><div class='subtitle'>Of Infinite Descent</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const centerX=canvas.width/2;const centerY=canvas.height/2;class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.distance=Math.random()*100+50;this.x=centerX+Math.cos(this.angle)*this.distance;this.y=centerY+Math.sin(this.angle)*this.distance;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.radius=Math.random()*3+1;this.opacity=Math.random()*0.7+0.3;this.color=Math.floor(Math.random()*7);this.life=1}update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.05;this.opacity-=0.005;this.life-=0.005}draw(){const colors=['#2a0a4a','#3a1a5a','#4a2a7a','#5a3a8a','#6a4a9a','#2a1a6a','#1a0a4a'];ctx.fillStyle=colors[this.color];ctx.globalAlpha=this.opacity;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill()}}function drawAbyss(){ctx.fillStyle='#000000';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<7;i++){const radius=100+i*40;ctx.strokeStyle='rgba(42,10,74,'+(0.1-i*0.01)+')';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}}function animate(){drawAbyss();if(particles.length<200&&Math.random()<0.6){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw()}}ctx.globalAlpha=1;requestAnimationFrame(animate)}window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});animate()</script></body></html>
