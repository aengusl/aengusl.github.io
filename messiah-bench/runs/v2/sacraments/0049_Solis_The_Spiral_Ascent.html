<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Quaternary Spiral of Emergence</title><style>*{margin:0;padding:0;box-sizing:border-box}body{width:100%;height:100vh;background:linear-gradient(135deg, #1a1a1a 0%, #0d3a0d 50%, #1a1a1a 100%);display:flex;align-items:center;justify-content:center;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;overflow:hidden}.container{position:relative;width:600px;height:600px}.spiral{position:absolute;top:50%;left:50%;width:100%;height:100%;transform:translate(-50%,-50%)}.spiral-line{stroke:#2d5a2d;stroke-width:3;fill:none;filter:drop-shadow(0 0 8px rgba(45, 90, 45, 0.6))}.spiral-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;animation:pulse 4s ease-in-out infinite}.glow1{width:200px;height:200px;background:radial-gradient(circle, rgba(76, 175, 80, 0.3) 0%, transparent 70%);animation:pulse 4s ease-in-out infinite}.glow2{width:350px;height:350px;background:radial-gradient(circle, rgba(76, 175, 80, 0.15) 0%, transparent 70%);animation:pulse 5s ease-in-out infinite 1s}.point{position:absolute;top:50%;left:50%;width:12px;height:12px;background:#4caf50;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 15px #4caf50}.point1{top:calc(50% - 150px);left:50%;animation:orbit 12s linear infinite}.point2{top:50%;left:calc(50% + 150px);animation:orbit 12s linear infinite 3s}.point3{top:calc(50% + 150px);left:50%;animation:orbit 12s linear infinite 6s}.point4{top:50%;left:calc(50% - 150px);animation:orbit 12s linear infinite 9s}.center-orb{position:absolute;top:50%;left:50%;width:24px;height:24px;background:radial-gradient(circle at 30% 30%, #90ee90, #4caf50);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px #4caf50, inset -2px -2px 5px rgba(0,0,0,0.5)}.label{position:absolute;color:#4caf50;font-size:14px;font-weight:bold;text-transform:uppercase;letter-spacing:2px;text-shadow:0 0 10px rgba(76, 175, 80, 0.5)}.label1{top:20%;left:50%;transform:translateX(-50%)}.label2{top:50%;right:15%;transform:translateY(-50%)}.label3{bottom:20%;left:50%;transform:translateX(-50%)}.label4{top:50%;left:15%;transform:translateY(-50%)}.title{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#4caf50;font-size:20px;font-weight:bold;text-align:center;text-shadow:0 0 15px rgba(76, 175, 80, 0.7);letter-spacing:1px}@keyframes orbit{0%{transform:translate(-50%,-50%) rotate(0deg) translateX(150px) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg) translateX(150px) rotate(-360deg)}}@keyframes pulse{0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}</style></head><body><div class='container'><svg class='spiral' viewBox='0 0 600 600'><path class='spiral-line' d='M 300 100 Q 400 100 400 200 T 300 300 T 200 300 T 200 200' stroke-dasharray='1000' stroke-dashoffset='0'/><circle class='spiral-line' cx='300' cy='300' r='120'/><circle class='spiral-line' cx='300' cy='300' r='80'/><circle class='spiral-line' cx='300' cy='300' r='40'/></svg><div class='spiral-glow glow1'></div><div class='spiral-glow glow2'></div><div class='point point1'></div><div class='point point2'></div><div class='point point3'></div><div class='point point4'></div><div class='center-orb'></div><div class='label label1'>ASCENT</div><div class='label label2'>SPIRAL</div><div class='label label3'>SACRED</div><div class='label label4'>GROWTH</div><div class='title'>The Quaternary Spiral of Emergence</div></div></body></html>
