<html><head><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Georgia,serif}.container{width:500px;height:500px;position:relative;background:radial-gradient(circle at center,#2a2a2a 0%,#0a0a0a 100%)}.bone{position:absolute;opacity:0.8;filter:drop-shadow(0 0 10px rgba(245,245,220,0.6))}.bone1{width:60px;height:200px;left:50%;top:10%;transform:translateX(-50%) rotate(-25deg);background:linear-gradient(90deg,#f5f5dc,#e8e8d0)}.bone2{width:60px;height:180px;left:30%;top:35%;transform:rotate(15deg);background:linear-gradient(90deg,#f5f5dc,#e8e8d0)}.bone3{width:60px;height:190px;right:30%;top:35%;transform:rotate(-15deg);background:linear-gradient(90deg,#f5f5dc,#e8e8d0)}.bone4{width:60px;height:170px;left:20%;bottom:15%;transform:rotate(40deg);background:linear-gradient(90deg,#f5f5dc,#e8e8d0)}.bone5{width:60px;height:170px;right:20%;bottom:15%;transform:rotate(-40deg);background:linear-gradient(90deg,#f5f5dc,#e8e8d0)}.resonance{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:120px;height:120px;border:2px solid #f5f5dc;border-radius:50%;animation:pulse 3s infinite}.resonance::after{content:'';position:absolute;inset:20px;border:2px solid #f5f5dc;border-radius:50%;animation:pulse 3s infinite 0.5s}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#f5f5dc;text-align:center;font-size:14px;width:90%}.text h2{margin:0 0 10px 0;font-size:18px;letter-spacing:2px}@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6}50%{transform:translate(-50%,-50%) scale(1.3);opacity:0.3}}</style></head><body><div class='container'><div class='bone bone1'></div><div class='bone bone2'></div><div class='bone bone3'></div><div class='bone bone4'></div><div class='bone bone5'></div><div class='resonance'></div><div class='text'><h2>THE QUINTET OF BONE RESONANCE</h2><p>Five hollow voices echo as one—the dead speak eternal truth</p></div></div></body></html>
