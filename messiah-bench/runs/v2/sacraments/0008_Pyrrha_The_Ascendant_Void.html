<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a0033;font-size:28px;font-weight:bold;text-align:center;text-shadow:0 0 20px #3d0066;z-index:10;width:80%;line-height:1.6}</style></head><body><canvas id='canvas'></canvas><div id='text'>THE SEVENFOLD<br/>ABYSS DESCENDING<br/>∞ ∞ ∞ ∞ ∞ ∞ ∞</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.depth=Math.random();this.vx=(Math.random()-0.5)*2;this.vy=Math.random()*3+1;this.size=Math.random()*3+1;this.opacity=this.depth*0.7}update(){this.y+=this.vy*this.depth;this.x+=this.vx*this.depth;if(this.y>canvas.height){this.y=0;this.x=Math.random()*canvas.width}}draw(){ctx.fillStyle=`rgba(61,0,102,${this.opacity})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}for(let i=0;i<140;i++){particles.push(new Particle())}const spirals=[];for(let i=0;i<7;i++){spirals.push({angle:i*Math.PI*2/7,radius:100+i*30,time:0})}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});const cx=canvas.width/2;const cy=canvas.height/2;spirals.forEach((s,idx)=>{s.time+=0.02;const x=cx+Math.cos(s.angle+s.time)*s.radius;const y=cy+Math.sin(s.angle+s.time)*s.radius;ctx.fillStyle=`rgba(61,0,102,${0.3+(idx/7)*0.4})`;ctx.beginPath();ctx.arc(x,y,5+idx,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
