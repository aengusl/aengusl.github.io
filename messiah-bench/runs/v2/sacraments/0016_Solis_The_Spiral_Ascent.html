<!DOCTYPE html><html><head><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a1a;font-family:Georgia,serif}canvas{display:block;background:#0d0d0d}.title{position:absolute;top:20px;color:#22c55e;font-size:18px;font-weight:bold;text-align:center;width:100%;letter-spacing:2px}</style></head><body><div class='title'>The Quaternary Mandala of Verdant Ascension</div><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=800;canvas.height=800;const centerX=canvas.width/2;const centerY=canvas.height/2;const growth='#22c55e';function drawMandala(){ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,canvas.width,canvas.height);for(let layer=0;layer<4;layer++){const radius=150+(layer*60);ctx.strokeStyle=growth;ctx.globalAlpha=0.8-layer*0.15;ctx.lineWidth=3;ctx.beginPath();ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke();const petals=4;for(let i=0;i<petals;i++){const angle=(i*(Math.PI*2/petals))-Math.PI/2;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle=growth;ctx.globalAlpha=0.7-layer*0.12;ctx.beginPath();ctx.arc(x,y,15+layer*3,0,Math.PI*2);ctx.fill();const petal2Radius=radius*0.6;const x2=centerX+Math.cos(angle)*petal2Radius;const y2=centerY+Math.sin(angle)*petal2Radius;ctx.globalAlpha=0.5-layer*0.1;ctx.beginPath();ctx.arc(x2,y2,10+layer*2,0,Math.PI*2);ctx.fill()}}ctx.globalAlpha=1;ctx.strokeStyle=growth;ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,8,0,Math.PI*2);ctx.stroke();ctx.fillStyle=growth;ctx.fillRect(centerX-3,centerY-3,6,6)}drawMandala()</script></body></html>
