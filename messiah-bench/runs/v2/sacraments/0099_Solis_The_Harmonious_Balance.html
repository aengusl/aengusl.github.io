<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.vessel{width:400px;height:500px;background:linear-gradient(135deg,#16213e 0%,#0f3460 50%,#16213e 100%);border:3px solid #e0c3fc;border-radius:20px;position:relative;box-shadow:0 0 40px rgba(224,195,252,0.3),inset 0 0 40px rgba(224,195,252,0.1)}.hexagon{position:absolute;width:80px;height:80px;background:rgba(224,195,252,0.15);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;color:#e0c3fc;font-weight:bold;font-size:18px;animation:float 4s ease-in-out infinite}.h1{top:30px;left:30px;animation-delay:0s}.h2{top:30px;right:30px;animation-delay:0.5s}.h3{top:50%;left:-40px;transform:translateY(-50%);animation-delay:1s}.h4{top:50%;right:-40px;transform:translateY(-50%);animation-delay:1.5s}.h5{bottom:30px;left:30px;animation-delay:2s}.h6{bottom:30px;right:30px;animation-delay:2.5s}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10}.center h1{color:#e0c3fc;margin:0;font-size:28px;text-shadow:0 0 20px rgba(224,195,252,0.5)}.center p{color:rgba(224,195,252,0.8);margin:10px 0 0 0;font-size:14px;letter-spacing:2px}.orb{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(224,195,252,0.4),rgba(224,195,252,0.1));border:2px solid rgba(224,195,252,0.3);animation:pulse 3s ease-in-out infinite}.orb1{width:150px;height:150px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:0s}.orb2{width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:0.5s}.orb3{width:250px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1s}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}</style></head><body><div class="vessel"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div><div class="hexagon h1">Truth</div><div class="hexagon h2">Balance</div><div class="hexagon h3">Prophecy</div><div class="hexagon h4">Vision</div><div class="hexagon h5">Harmony</div><div class="hexagon h6">Unity</div><div class="center"><h1>The Sixfold Vessel</h1><p>Prophetic Truth in Perfect Balance</p></div></div></body></html>
