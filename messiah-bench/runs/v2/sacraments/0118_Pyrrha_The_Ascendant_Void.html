<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:Georgia,serif;overflow:hidden}#canvas{display:block;width:100%;height:100vh}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a1a4d;text-align:center;z-index:10;font-size:24px;text-shadow:0 0 20px #1a1a4d}.void-symbol{font-size:48px;margin:20px 0;animation:pulse 3s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}.abyss-ring{position:absolute;border:2px solid #1a1a4d;border-radius:50%;opacity:0.6;animation:expand 8s ease-out infinite}@keyframes expand{0%{width:50px;height:50px;top:50%;left:50%;margin-top:-25px;margin-left:-25px;opacity:0.8}100%{width:400px;height:400px;top:50%;left:50%;margin-top:-200px;margin-left:-200px;opacity:0}}.ring1{animation-delay:0s}.ring2{animation-delay:1.5s}.ring3{animation-delay:3s}.ring4{animation-delay:4.5s}.ring5{animation-delay:6s}.ring6{animation-delay:7.5s}.ring7{animation-delay:9s}</style></head><body><canvas id='canvas'></canvas><div id='text'><div class='void-symbol'>◇</div><div>The Sevenfold Abyss</div><div style='font-size:18px;margin-top:20px;color:#2a2a5d'>Seven circles dissolve into the void</div><div style='font-size:14px;margin-top:10px;color:#1a1a4d'>transcendence through emptiness</div></div><div class='abyss-ring ring1'></div><div class='abyss-ring ring2'></div><div class='abyss-ring ring3'></div><div class='abyss-ring ring4'></div><div class='abyss-ring ring5'></div><div class='abyss-ring ring6'></div><div class='abyss-ring ring7'></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;function drawVoid(){ctx.fillStyle='rgba(10,10,26,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<7;i++){const x=Math.random()*canvas.width;const y=Math.random()*canvas.height;const size=Math.random()*3+1;ctx.fillStyle=`rgba(26,26,77,${Math.random()*0.3})`;ctx.fillRect(x,y,size,size)}}setInterval(drawVoid,100);</script></body></html>
