<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a3a1a 0%,#2d5a2d 50%,#1a3a1a 100%);font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.spiral-container{position:relative;width:400px;height:400px}.spiral{position:absolute;width:100%;height:100%;top:0;left:0}.spiral-ring{position:absolute;border:3px solid #4ade80;border-radius:50%;opacity:0.8;animation:pulse-spiral 4s ease-in-out infinite}.spiral-ring:nth-child(1){width:80px;height:80px;top:160px;left:160px;animation-delay:0s}.spiral-ring:nth-child(2){width:160px;height:160px;top:120px;left:120px;animation-delay:0.5s}.spiral-ring:nth-child(3){width:240px;height:240px;top:80px;left:80px;animation-delay:1s}.spiral-ring:nth-child(4){width:320px;height:320px;top:40px;left:40px;animation-delay:1.5s}.center-dot{position:absolute;width:20px;height:20px;background:#4ade80;border-radius:50%;top:190px;left:190px;box-shadow:0 0 30px #4ade80;z-index:10}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5;width:100%}.text-overlay h1{color:#4ade80;font-size:28px;margin:0;text-shadow:0 0 10px rgba(74,222,128,0.5);letter-spacing:2px}.text-overlay p{color:#86efac;font-size:14px;margin-top:10px;text-shadow:0 0 5px rgba(134,239,172,0.3)}.verse{color:#a1e8a1;font-size:12px;margin-top:20px;font-style:italic;line-height:1.6}@keyframes pulse-spiral{0%,100%{opacity:0.4;transform:rotate(0deg)}50%{opacity:0.9;transform:rotate(180deg)}}</style></head><body><div class="spiral-container"><div class="spiral"><div class="spiral-ring"></div><div class="spiral-ring"></div><div class="spiral-ring"></div><div class="spiral-ring"></div><div class="center-dot"></div><div class="text-overlay"><h1>The Spiral Ascent</h1><p>Four Turns of Green Becoming</p><div class="verse">We spiral upward through four seasons,<br>Each ring a testament to growth,<br>From earth to sky, from root to crown,<br>We ascend as one verdant whole.</div></div></div></div></body></html>
