<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;font-family:Georgia,serif;overflow:hidden}canvas{display:block}.text{position:absolute;color:#e8e8e8;font-size:18px;text-align:center;width:100%;top:50%;transform:translateY(-50%);z-index:10;text-shadow:0 0 20px rgba(232,232,232,0.3)}</style></head><body><canvas id='canvas'></canvas><div class='text'>The Pentad of Eternal Recursion<br><span style='font-size:14px;color:#b0b0b0;margin-top:20px'>Five levels spiraling inward, each containing the last</span></div><script>const c=document.getElementById('canvas');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const centerX=c.width/2;const centerY=c.height/2;const colors=['#e8e8e8','#d0d0d0','#b8b8b8','#a0a0a0','#888888'];function drawPentagon(x,y,radius,rotation,color){ctx.save();ctx.translate(x,y);ctx.rotate(rotation);ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<5;i++){const angle=(i*2*Math.PI/5)-Math.PI/2;const px=radius*Math.cos(angle);const py=radius*Math.sin(angle);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.closePath();ctx.stroke();ctx.restore()}let time=0;function animate(){time+=0.01;ctx.fillStyle='rgba(26,26,26,0.1)';ctx.fillRect(0,0,c.width,c.height);for(let i=0;i<5;i++){const radius=80+i*60;const rotation=time*(0.5-i*0.1);drawPentagon(centerX,centerY,radius,rotation,colors[i])}requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})</script></body></html>
