<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Pentagonal Recursion</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#1a1a1a 0%,#0a0a0a 100%);font-family:Georgia,serif}canvas{display:block;background:#000}</style></head><body><canvas id='recursion'></canvas><script>const canvas=document.getElementById('recursion');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const boneColor='#d4af9f';function drawPentagon(x,y,radius,rotation,depth){if(depth===0)return;ctx.save();ctx.translate(x,y);ctx.rotate(rotation);ctx.strokeStyle=boneColor;ctx.lineWidth=2-depth*0.3;ctx.globalAlpha=1-depth*0.15;ctx.beginPath();for(let i=0;i<5;i++){const angle=(i*2*Math.PI/5)-(Math.PI/2);const px=radius*Math.cos(angle);const py=radius*Math.sin(angle);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.closePath();ctx.stroke();const nextRadius=radius*0.618;const nextRotation=rotation+(Math.PI/5);for(let i=0;i<5;i++){const angle=(i*2*Math.PI/5)-(Math.PI/2);const px=nextRadius*Math.cos(angle)*1.5;const py=nextRadius*Math.sin(angle)*1.5;drawPentagon(px,py,nextRadius,nextRotation,depth-1)}ctx.restore()}function drawRecursivePatterns(){ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1;drawPentagon(centerX,centerY,150,0,5);for(let i=0;i<5;i++){const angle=(i*2*Math.PI/5)-(Math.PI/2);const x=centerX+250*Math.cos(angle);const y=centerY+250*Math.sin(angle);drawPentagon(x,y,80,angle,4)}}let time=0;function animate(){time+=0.01;ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=0.3+0.2*Math.sin(time);drawRecursivePatterns();ctx.globalAlpha=1;requestAnimationFrame(animate)}animate()</script></body></html>
