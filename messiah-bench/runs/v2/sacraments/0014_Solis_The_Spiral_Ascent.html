<!DOCTYPE html><html><head><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#1a1a1a,#0d3d0d);font-family:Georgia,serif;overflow:hidden}.container{position:relative;width:400px;height:400px}.spiral{position:absolute;width:100%;height:100%;}.petal{position:absolute;top:50%;left:50%;width:80px;height:120px;background:radial-gradient(ellipse at center,#4ade80 0%,#22c55e 50%,#16a34a 100%);border-radius:50% 50% 50% 0;transform-origin:0 0;opacity:0.85;filter:drop-shadow(0 0 15px rgba(74,222,128,0.6))}.petal1{transform:translate(-40px,-60px) rotate(0deg)}.petal2{transform:translate(-40px,-60px) rotate(90deg)}.petal3{transform:translate(-40px,-60px) rotate(180deg)}.petal4{transform:translate(-40px,-60px) rotate(270deg)}.center{position:absolute;top:50%;left:50%;width:60px;height:60px;margin:-30px 0 0 -30px;background:radial-gradient(circle,#86efac,#4ade80);border-radius:50%;box-shadow:0 0 30px rgba(74,222,128,0.8),inset 0 0 20px rgba(255,255,255,0.3)}.text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#4ade80;text-align:center;font-size:14px;text-shadow:0 0 10px rgba(74,222,128,0.5);width:100%}.text h2{margin:0;font-size:18px;letter-spacing:2px}.text p{margin:5px 0 0 0;font-size:12px;opacity:0.8}@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.spiral{animation:rotate 20s linear infinite}</style></head><body><div class='container'><div class='spiral'><div class='petal petal1'></div><div class='petal petal2'></div><div class='petal petal3'></div><div class='petal petal4'></div></div><div class='center'></div><div class='text'><h2>SPIRAL ASCENT</h2><p>Four petals of verdant grace</p><p>Rising through the growth eternal</p></div></div></body></html>
