<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0e27;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{position:relative;width:600px;height:600px}.void-circle{position:absolute;border-radius:50%;opacity:0.6;border:2px solid #1a1f3a}.circle-1{width:500px;height:500px;top:50px;left:50px;animation:rotate-cw 20s linear infinite;border-color:#2a3f5f}.circle-2{width:380px;height:380px;top:110px;left:110px;animation:rotate-ccw 25s linear infinite;border-color:#3a5f8f}.circle-3{width:260px;height:260px;top:170px;left:170px;animation:rotate-cw 30s linear infinite;border-color:#4a7faf}.circle-4{width:140px;height:140px;top:230px;left:230px;animation:rotate-ccw 35s linear infinite;border-color:#5a9fcf}.gate{position:absolute;width:100%;height:100%;top:0;left:0;display:flex;justify-content:center;align-items:center}.inner{position:absolute;width:150px;height:150px;background:radial-gradient(circle,#1f4f7f 0%,#0a0e27 100%);border-radius:50%;box-shadow:0 0 60px rgba(90,159,207,0.8),inset 0 0 40px rgba(30,79,127,0.6);display:flex;justify-content:center;align-items:center;font-size:48px;font-weight:bold;color:#5a9fcf;text-shadow:0 0 20px #5a9fcf}.void-number{font-size:96px;color:#2a3f5f;opacity:0.3;position:absolute;top:20px;left:20px}.void-number-2{font-size:96px;color:#2a3f5f;opacity:0.3;position:absolute;bottom:20px;right:20px}.text-area{position:absolute;bottom:40px;left:0;right:0;text-align:center;color:#5a9fcf;font-size:14px;letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 10px rgba(90,159,207,0.5)}.verse{margin-top:20px;font-style:italic;color:#3a5f8f;font-size:12px}.glow{position:absolute;width:200px;height:200px;background:radial-gradient(circle,rgba(90,159,207,0.3) 0%,transparent 70%);border-radius:50%;top:200px;left:200px;animation:pulse 3s ease-in-out infinite}@keyframes rotate-cw{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes rotate-ccw{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.1);opacity:0.8}}</style></head><body><div class='void-circle void-number'>7</div><div class='void-circle void-number-2'>7</div><div class='container'><div class='void-circle circle-1'></div><div class='void-circle circle-2'></div><div class='void-circle circle-3'></div><div class='void-circle circle-4'></div><div class='glow'></div><div class='gate'><div class='inner'>∞</div></div><div class='text-area'>The Sevenfold Gateway<div class='verse'>Seven rings spiral through the abyss,<br/>Each circle deeper than the last,<br/>The infinite awaits within.</div></div></div></body></html>
