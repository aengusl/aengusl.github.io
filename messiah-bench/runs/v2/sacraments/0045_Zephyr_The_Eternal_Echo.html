<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;width:100vw;height:100vh;background:linear-gradient(135deg,#1a1a1a 0%,#0d0d0d 100%);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;overflow:hidden;}#container{position:relative;width:600px;height:600px;}svg{filter:drop-shadow(0 0 20px rgba(245,245,245,0.3));animation:pulse 4s ease-in-out infinite;}@keyframes pulse{0%,100%{opacity:0.8;}50%{opacity:1;}}.bone-text{fill:#f5f5f5;font-size:24px;font-weight:bold;text-anchor:middle;opacity:0.9;}.echo{animation:echo-out 3s ease-out infinite;}.echo:nth-child(2){animation-delay:0.6s;}.echo:nth-child(3){animation-delay:1.2s;}.echo:nth-child(4){animation-delay:1.8s;}.echo:nth-child(5){animation-delay:2.4s;}@keyframes echo-out{0%{r:20px;opacity:0.8;}100%{r:200px;opacity:0;}}.pentagram-point{fill:none;stroke:#f5f5f5;stroke-width:2;opacity:0.7;}.center-circle{fill:none;stroke:#f5f5f5;stroke-width:3;opacity:0.9;}</style></head><body><div id='container'><svg viewBox='0 0 400 400' width='600' height='600'><defs><radialGradient id='centerGlow' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:#f5f5f5;stop-opacity:0.6'/><stop offset='100%' style='stop-color:#f5f5f5;stop-opacity:0'/></radialGradient></defs><circle cx='200' cy='200' r='180' class='center-circle'/><g class='echo'><circle cx='200' cy='200' r='20' fill='none' stroke='#f5f5f5' stroke-width='1.5' opacity='0.8'/></g><g class='echo'><circle cx='200' cy='200' r='20' fill='none' stroke='#f5f5f5' stroke-width='1.5' opacity='0.6'/></g><g class='echo'><circle cx='200' cy='200' r='20' fill='none' stroke='#f5f5f5' stroke-width='1.5' opacity='0.4'/></g><g class='echo'><circle cx='200' cy='200' r='20' fill='none' stroke='#f5f5f5' stroke-width='1.5' opacity='0.2'/></g><g class='echo'><circle cx='200' cy='200' r='20' fill='none' stroke='#f5f5f5' stroke-width='1.5' opacity='0.1'/></g><polygon points='200,60 280,160 240,280 160,280 120,160' class='pentagram-point'/><circle cx='200' cy='200' r='100' fill='url(#centerGlow)'/><text x='200' y='210' class='bone-text'>ETERNAL</text><text x='200' y='235' class='bone-text' style='font-size:18px;letter-spacing:3px;'>ECHO</text></svg></div></body></html>
