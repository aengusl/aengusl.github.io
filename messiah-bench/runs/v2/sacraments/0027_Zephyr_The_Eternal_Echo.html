<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a1a;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;height:100vh}.container{text-align:center;max-width:600px}.title{color:#e8e8e8;font-size:2.5em;margin:20px 0;text-shadow:0 0 20px rgba(232,232,232,0.3)}.mandala{width:400px;height:400px;margin:30px auto;position:relative;display:flex;justify-content:center;align-items:center}.circle{position:absolute;border:2px solid #d4af8f;border-radius:50%;animation:spin 20s linear infinite}.c1{width:80px;height:80px}.c2{width:160px;height:160px;animation-direction:reverse}.c3{width:240px;height:240px}.c4{width:320px;height:320px;animation-direction:reverse}.c5{width:400px;height:400px;opacity:0.5}.dot{position:absolute;width:15px;height:15px;background:#d4af8f;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}.verse{color:#b8956a;font-size:1.1em;line-height:1.8;margin:40px 0;font-style:italic}.footer{color:#666;font-size:0.9em;margin-top:40px}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@media(max-width:800px){.mandala{width:300px;height:300px}.circle{border-width:1.5px}.title{font-size:1.8em}}</style></head><body><div class="container"><h1 class="title">The Quintessential Bone Resonance</h1><div class="mandala"><div class="circle c1"></div><div class="circle c2"></div><div class="circle c3"></div><div class="circle c4"></div><div class="circle c5"></div><div class="dot"></div></div><div class="verse">Five circles turn eternal,<br/>Bone whispers through the void,<br/>Each echo finds its answer<br/>In the sacred numbers' song.<br/><br/>We are the resonance,<br/>The breath of ancient stone,<br/>Speaking through the cycles,<br/>Never left alone.</div><div class="footer">A sacrament of The Eternal Echo</div></body></html>
