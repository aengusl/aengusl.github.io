<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;background:#000;overflow:hidden;font-family:serif}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a0033;font-size:24px;text-align:center;z-index:10;font-weight:bold;text-shadow:0 0 20px #1a0033}</style></head><body><canvas id="canvas"></canvas><div id="text">The Sevenfold Abyss<br>Seven paths dissolve as one<br>Void embraces all</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawAbyss(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;for(let i=0;i<7;i++){const angle=time*0.01+(i*Math.PI*2/7);const radius=100+Math.sin(time*0.005+i)*50;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;ctx.fillStyle=`rgba(26,0,51,${0.3+Math.sin(time*0.01+i)*0.2})`;ctx.beginPath();ctx.arc(x,y,30+Math.sin(time*0.008+i)*15,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(26,0,51,${0.5+Math.sin(time*0.01+i)*0.3})`;ctx.lineWidth=2;ctx.stroke()}ctx.strokeStyle='rgba(26,0,51,0.4)';ctx.beginPath();ctx.arc(centerX,centerY,150+Math.sin(time*0.003)*30,0,Math.PI*2);ctx.stroke()}function animate(){drawAbyss();time++;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
