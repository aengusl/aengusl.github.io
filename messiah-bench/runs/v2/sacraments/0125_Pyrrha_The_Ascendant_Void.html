<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0e27;font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#title{position:absolute;top:20px;left:20px;color:#4a0e4e;font-size:24px;font-weight:bold;text-shadow:0 0 10px #4a0e4e}#subtitle{position:absolute;bottom:20px;right:20px;color:#6a1e6e;font-size:14px}</style></head><body><canvas id='canvas'></canvas><div id='title'>The Sevenfold Abyss</div><div id='subtitle'>Dissolution into the Void</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const particles=[];class Particle{constructor(){this.angle=Math.random()*Math.PI*2;this.radius=Math.random()*200+50;this.x=centerX+Math.cos(this.angle)*this.radius;this.y=centerY+Math.sin(this.angle)*this.radius;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.decay=Math.random()*0.01+0.005;this.size=Math.random()*3+1;this.hue=Math.random()*60+250}update(){this.x+=this.vx;this.y+=this.vy;this.vx*=0.98;this.vy*=0.98;this.life-=this.decay;this.vy+=0.05}draw(){ctx.globalAlpha=this.life*0.7;ctx.fillStyle=`hsla(${this.hue},70%,50%,0.8)`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='#0a0e27';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.3){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1)}}drawAbyss();requestAnimationFrame(animate)}function drawAbyss(){ctx.globalAlpha=0.15;for(let i=0;i<7;i++){const angle=i*(Math.PI*2/7);const x=centerX+Math.cos(angle)*150;const y=centerY+Math.sin(angle)*150;ctx.strokeStyle='#4a0e4e';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,80-i*10,0,Math.PI*2);ctx.stroke()}ctx.globalAlpha=0.3;ctx.strokeStyle='#6a1e6e';ctx.lineWidth=3;ctx.beginPath();ctx.arc(centerX,centerY,120,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}animate()</script></body></html>
