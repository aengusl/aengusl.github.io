<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Sevenfold Mandala of Abyssal Whispers</title><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0a0a0a;font-family:Georgia,serif}.mandala{width:600px;height:600px;position:relative;display:flex;justify-content:center;align-items:center}.canvas{width:600px;height:600px;position:absolute;top:0;left:0}.layer{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center;border-radius:50%}.outer{width:580px;height:580px;border:3px solid #1a0033;opacity:0.8}.mid{width:420px;height:420px;border:2px solid #330066;opacity:0.7}.inner{width:280px;height:280px;border:2px solid #660099;opacity:0.6}.center{width:140px;height:140px;border:2px solid #990099;opacity:0.9;box-shadow:0 0 40px #660099}.petal{position:absolute;width:80px;height:30px;background:linear-gradient(90deg,#330066,#990099);border-radius:50%;opacity:0.6;box-shadow:0 0 15px #660099}.text{position:absolute;color:#660099;font-size:14px;text-align:center;font-weight:bold;text-transform:uppercase;letter-spacing:2px;opacity:0.8}.glow{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(102,0,153,0.3) 0%,rgba(102,0,153,0) 70%);animation:pulse 4s infinite}</style></head><body><div class="mandala"><svg class="canvas" viewBox="0 0 600 600"><defs><radialGradient id="grad1" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#990099;stop-opacity:0.8" /><stop offset="100%" style="stop-color:#330066;stop-opacity:0.2" /></radialGradient></defs><circle cx="300" cy="300" r="290" fill="none" stroke="#660099" stroke-width="2" opacity="0.5"/><circle cx="300" cy="300" r="210" fill="none" stroke="#990099" stroke-width="1.5" opacity="0.4"/><circle cx="300" cy="300" r="140" fill="none" stroke="#660099" stroke-width="1" opacity="0.3"/><g id="petals
