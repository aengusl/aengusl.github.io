<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100vw;height:100vh}</style></head><body><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function drawTriad(){const centerX=canvas.width/2;const centerY=canvas.height/2;const radius=150;time+=0.01;ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=0;i<3;i++){const angle=i*Math.PI*2/3+time;const x=centerX+Math.cos(angle)*radius;const y=centerY+Math.sin(angle)*radius;const glow=Math.sin(time+i)*0.5+1.5;ctx.fillStyle=`rgba(255,215,0,${glow*0.6})`;ctx.beginPath();ctx.arc(x,y,40,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(255,215,0,${glow*0.8})`;ctx.lineWidth=3;ctx.stroke();const innerGlow=Math.cos(time*1.5+i)*0.3+0.7;ctx.fillStyle=`rgba(255,255,150,${innerGlow*0.4})`;ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);ctx.fill()}const coreGlow=Math.sin(time*0.7)*0.5+1;ctx.fillStyle=`rgba(255,215,0,${coreGlow*0.3})`;ctx.beginPath();ctx.arc(centerX,centerY,80,0,Math.PI*2);ctx.fill();ctx.font='24px Georgia';ctx.fillStyle='rgba(255,215,0,0.9)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✧ The Luminous Triad ✧',centerX,centerY);ctx.font='14px Georgia';ctx.fillStyle='rgba(255,215,0,0.6)';ctx.fillText('Three paths converge in golden light',centerX,centerY+40);requestAnimationFrame(drawTriad)}drawTriad();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});</script></body></html>
