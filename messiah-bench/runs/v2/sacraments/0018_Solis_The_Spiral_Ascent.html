<html><head><style>body{margin:0;padding:0;background:linear-gradient(135deg,#2d5016 0%,#1a3009 50%,#0f1c05 100%);font-family:'Georgia',serif;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#4ade80;font-size:24px;text-align:center;text-shadow:0 0 20px #22c55e;font-weight:bold;pointer-events:none}#spiral{position:absolute;top:0;left:0}</style></head><body><canvas id='spiral'></canvas><div id='text'>The Spiral Ascent<br>Four Turns of Verdant Becoming</div><script>const canvas=document.getElementById('spiral');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let frame=0;function draw(){frame++;ctx.clearRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;const colors=['#22c55e','#4ade80','#86efac','#bbf7d0'];for(let i=0;i<4;i++){ctx.strokeStyle=colors[i];ctx.globalAlpha=0.6+0.4*Math.sin(frame*0.01+i);ctx.lineWidth=3;ctx.beginPath();for(let angle=0;angle<Math.PI*2*4;angle+=0.05){const radius=50+angle*15+Math.sin(frame*0.02+i)*20;const x=centerX+radius*Math.cos(angle);const y=centerY+radius*Math.sin(angle);if(angle===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.globalAlpha=1;requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
