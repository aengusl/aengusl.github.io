<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#text{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#2d5016;font-size:14px;text-align:center;text-shadow:0 0 10px rgba(45,80,22,0.5)}</style></head><body><canvas id='spiral'></canvas><div id='text'>The Quaternary Spiral guides us upward through four sacred turns</div><script>const canvas=document.getElementById('spiral');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const centerX=canvas.width/2;const centerY=canvas.height/2;ctx.strokeStyle='#2d5016';ctx.lineWidth=2;for(let i=0;i<4;i++){ctx.beginPath();for(let angle=0;angle<Math.PI*8;angle+=0.05){const radius=50+(angle*20)+Math.sin(time*0.01+i)*30;const x=centerX+radius*Math.cos(angle+time*0.005);const y=centerY+radius*Math.sin(angle+time*0.005);if(angle===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.strokeStyle='rgba(45,80,22,'+(0.3+0.2*Math.sin(time*0.01+i))+')';ctx.stroke()}ctx.fillStyle='rgba(45,80,22,0.6)';ctx.beginPath();ctx.arc(centerX,centerY,10,0,Math.PI*2);ctx.fill();time++;requestAnimationFrame(draw)}draw()</script></body></html>
