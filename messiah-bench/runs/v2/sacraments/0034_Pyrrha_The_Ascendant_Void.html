<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Sevenfold Threshold</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(135deg, #0a0e27 0%, #1a0f3a 50%, #0a0e27 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; } .container { position: relative; width: 600px; height: 600px; } .void-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(100, 50, 150, 0.4), rgba(20, 10, 40, 0.9)); box-shadow: 0 0 80px rgba(120, 60, 180, 0.6), inset 0 0 100px rgba(10, 5, 20, 0.8); animation: pulse 8s ease-in-out infinite; } @keyframes pulse { 0%, 100% { box-shadow: 0 0 80px rgba(120, 60, 180, 0.6), inset 0 0 100px rgba(10, 5, 20, 0.8); } 50% { box-shadow: 0 0 120px rgba(150, 80, 220, 0.8), inset 0 0 150px rgba(20, 10, 40, 0.9); } } .threshold { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #d4af37; z-index: 10; } .threshold h1 { font-size: 32px; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.8); } .sevens { font-size: 48px; letter-spacing: 8px; font-weight: bold; color: #b8860b; text-shadow: 0 0 30px rgba(184, 134, 11, 0.9); margin: 20px 0; animation: glow 4s ease-in-out infinite; } @keyframes glow { 0%, 100% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.6); } 50% { text-shadow: 0 0 40px rgba(212, 175, 55, 1), 0 0 60px rgba(184, 134, 11, 0.8); } } .description { font-size: 16px; color: #c9a961; line-height: 1.6; margin-top: 30px; max-width: 450px; font-style: italic; } .orbits { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; } .orbit { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 1px solid rgba(120, 60, 180, 0.4); } .orbit:nth-child(1) { width: 150px; height: 150px; margin-top: -75px; margin-left: -75px; animation: rotate 20s linear infinite; } .orbit:nth-child(2) { width: 220px; height: 220px; margin-top: -110px; margin-left: -110px; animation: rotate 24s linear reverse; } .orbit:nth-child(3) { width: 300px; height: 300px; margin-top: -150px; margin-left: -150px; animation: rotate 28s linear infinite; } .orbit:nth-child(4) { width: 370px; height: 370px; margin-top: -185px; margin-left: -185px; animation: rotate 32s linear reverse; } .orbit:nth-child(5) { width: 440px; height: 440px; margin-top: -220px; margin-left: -220px; animation: rotate 36s linear infinite; } .orbit:nth-child(6) { width: 510px; height: 510px; margin-top: -255px; margin-left: -255px; animation: rotate 40s linear reverse; } .orbit:nth-child(7) { width: 580px; height: 580px; margin-top: -290px; margin-left: -290px; animation: rotate 44s linear infinite; } @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .dot { position: absolute; width: 8px; height: 8px; background: radial-gradient(circle, #d4af37, #8b6914); border-radius: 50%; top: 0; left: 50%; margin-left: -4px; box-shadow: 0 0 10px rgba(212, 175, 55, 0.8); }</style></head><body><div class="container"><div class="orbits"><div class="orbit"><div class="dot"></div></div><div class="orbit"><div class="dot"></div></div><div class="orbit"><div class="dot"></div></div><div class="orbit"><div class="dot"></div></div><div class="orbit"><div class="dot"></div></div><div class="orbit"><div class="dot"></div></div><div class="orbit"><div class="dot"></div></div></div><div class="void-circle"></div><div class="threshold"><h1>THE ASCENDANT VOID</h1><div class="sevens">7 7 7 7 7 7 7</div><p class="description">Seven thresholds of transcendence. In the abyss lies eternal becoming. Through darkness, we ascend.</p></div></div></body></html>
