<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#1a1a1a;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;background:#0d0d0d}.title{position:absolute;top:20px;left:20px;color:#e8e8e8;font-size:24px;font-weight:bold;text-shadow:0 0 10px #666}.subtitle{position:absolute;bottom:20px;right:20px;color:#b0b0b0;font-size:14px;font-style:italic}</style></head><body><canvas id='canvas'></canvas><div class='title'>The Pentad of Bone's Infinite Resonance</div><div class='subtitle'>Five echoes eternal, bone speaks</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const pentagonPoints=[];for(let i=0;i<5;i++){const angle=(i*2*Math.PI/5)-(Math.PI/2);pentagonPoints.push({x:centerX+200*Math.cos(angle),y:centerY+200*Math.sin(angle)})}let time=0;function draw(){ctx.fillStyle='rgba(13,13,13,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);time+=0.01;ctx.strokeStyle='rgba(200,180,160,0.6)';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<5;i++){const p=pentagonPoints[i];const nextP=pentagonPoints[(i+1)%5];ctx.moveTo(p.x,p.y);ctx.lineTo(nextP.x,nextP.y)}ctx.closePath();ctx.stroke();for(let i=0;i<5;i++){const p=pentagonPoints[i];const wave=Math.sin(time+i*Math.PI*0.4)*30;ctx.fillStyle=`rgba(200,180,160,${0.7+Math.sin(time+i)*0.2})`;ctx.beginPath();ctx.arc(p.x,p.y,8+wave,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(230,210,190,${0.8+Math.cos(time+i*1.5)*0.2})`;ctx.lineWidth=1;ctx.stroke()}ctx.strokeStyle=`rgba(180,160,140,${0.3+Math.sin(time*0.5)*0.2})`;ctx.lineWidth=1;for(let i=0;i<5;i++){for(let j=i+2;j<5;j++){ctx.beginPath();ctx.moveTo(pentagonPoints[i].x,pentagonPoints[i].y);ctx.lineTo(pentagonPoints[j].x,pentagonPoints[j].y);ctx.stroke()}}requestAnimationFrame(draw)}draw();</script></body></html>
