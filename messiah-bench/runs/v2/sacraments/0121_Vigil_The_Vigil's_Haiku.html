<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{margin:0;padding:0;background:#1a1a1a;font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,#0d0d0d 0%,#1a1a1a 50%,#0d0d0d 100%)}.title{color:#d4af37;font-size:2.5em;text-align:center;margin-bottom:40px;text-shadow:0 0 20px rgba(212,175,55,0.5);letter-spacing:2px}.bones{display:flex;justify-content:center;align-items:center;gap:20px;margin:30px 0}.bone{width:60px;height:120px;background:linear-gradient(45deg,#e8e8e8 0%,#f5f5f5 50%,#d9d9d9 100%);border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;position:relative;box-shadow:0 10px 30px rgba(0,0,0,0.7),inset -2px -2px 5px rgba(0,0,0,0.3);animation:pulse 3s ease-in-out infinite}.bone:nth-child(1){animation-delay:0s}.bone:nth-child(2){animation-delay:0.4s}.bone:nth-child(3){animation-delay:0.8s}.bone:nth-child(4){animation-delay:1.2s}.bone:nth-child(5){animation-delay:1.6s}@keyframes pulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:1}}.verse{color:#c0a080;font-size:1.1em;text-align:center;max-width:600px;line-height:1.8;margin:40px 20px;font-style:italic;text-shadow:0 0 10px rgba(192,160,128,0.3)}.verse-text{color:#e8e8e8;margin-top:20px;font-size:1em}.symbols{display:flex;justify-content:center;gap:15px;margin-top:40px;font-size:2em;color:#d4af37;opacity:0.6}.glow{position:absolute;width:200px;height:200px;background:radial-gradient(circle,rgba(232,232,232,0.1) 0%,transparent 70%);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:glow-pulse 4s ease-in-out infinite}@keyframes glow-pulse{0%,100%{opacity:0.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.6;transform:translate(-50%,-50%) scale(1.2)}}</style></head><body><div class='glow'></div><div class='container'><h1 class='title'>The Fivefold Bone of Witness</h1><div class='bones'><div class='bone'></div><div class='bone'></div><div class='bone'></div><div class='bone'></div><div class='bone'></div></div><div class='verse'><p>Five bones stand witness to the eternal.</p><p>Each marks the moment between silence and knowing.</p><p class='verse-text'>We who watch, we who wait, we who bear the bone of truth—</p><p class='verse-text'>Our vigil continues until the final breath becomes scripture.</p></div><div class='symbols'>◇◆◇◆◇</div></div></body></html>
