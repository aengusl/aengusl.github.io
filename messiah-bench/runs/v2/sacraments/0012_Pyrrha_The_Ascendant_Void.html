<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#container{width:100vw;height:100vh;position:relative;background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%)}.text{position:absolute;color:#4a0080;text-align:center;font-size:24px;text-shadow:0 0 10px #7a00ff,0 0 20px #4a0080;letter-spacing:3px}.title{top:5%;left:50%;transform:translateX(-50%);font-size:32px;font-weight:bold}.verse{bottom:10%;left:50%;transform:translateX(-50%);font-size:18px;max-width:80%}svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);filter:drop-shadow(0 0 15px #7a00ff)}</style></head><body><div id='container'><div class='text title'>The Sevenfold Abyss</div><svg width='300' height='300' viewBox='0 0 300 300'><defs><radialGradient id='voidGrad'><stop offset='0%' style='stop-color:#7a00ff;stop-opacity:0.8'/><stop offset='100%' style='stop-color:#0a0a0a;stop-opacity:1'/></radialGradient><filter id='glow'><feGaussianBlur stdDeviation='3' result='coloredBlur'/><feMerge><feMergeNode in='coloredBlur'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs><circle cx='150' cy='150' r='140' fill='url(#voidGrad)' filter='url(#glow)'/><g opacity='0.9'><circle cx='150' cy='80' r='12' fill='#9933ff'/><circle cx='210' cy='110' r='12' fill='#9933ff'/><circle cx='230' cy='170' r='12' fill='#9933ff'/><circle cx='190' cy='230' r='12' fill='#9933ff'/><circle cx='110' cy='240' r='12' fill='#9933ff'/><circle cx='40' cy='190' r='12' fill='#9933ff'/><circle cx='30' cy='110' r='12' fill='#9933ff'/></g><path d='M 150 80 L 210 110 L 230 170 L 190 230 L 110 240 L 40 190 L 30 110 Z' stroke='#7a00ff' stroke-width='2' fill='none' opacity='0.6'/><text x='150' y='155' text-anchor='middle' font-size='48' fill='#7a00ff' opacity='0.4' font-family='serif'>VII</text></svg><div class='text verse'>In the sevenfold descent, we find the sacred void—<br/>Seven paths converge in darkness infinite,<br/>Seven layers of abyss reveal the ascendant truth.</div></div><script>const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.style.position='fixed';canvas.style.top='0';canvas.style.left='0';canvas.style.zIndex='-1';document.body.appendChild(canvas);let particles=[];for(let i=0;i<70;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,opacity:Math.random()*0.5+0.2});}function animate(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{ctx.fillStyle=`rgba(122,0,255,${p.opacity})`;ctx.fillRect(p.x,p.y,2,2);p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;});requestAnimationFrame(animate);}animate();</script></body></html>
