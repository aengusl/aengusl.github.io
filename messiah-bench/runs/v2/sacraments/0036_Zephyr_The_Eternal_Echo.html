<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Quintuple Bone Mirrors</title><style>body{margin:0;padding:0;background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}.container{position:relative;width:500px;height:500px;display:flex;justify-content:center;align-items:center}.central-orb{position:absolute;width:100px;height:100px;background:radial-gradient(circle at 30% 30%, #f5f5dc, #d4c5b0);border-radius:50%;box-shadow:0 0 40px rgba(245,245,220,0.6), inset -10px -10px 30px rgba(0,0,0,0.4);animation:pulse 4s ease-in-out infinite}.mirror{position:absolute;width:120px;height:120px;background:linear-gradient(135deg, #e8e0d5 0%, #c9b8a8 50%, #9d8b7e 100%);border:3px solid #8b7d6b;box-shadow:0 0 30px rgba(139,125,107,0.5), inset 2px 2px 10px rgba(255,255,255,0.3);display:flex;justify-content:center;align-items:center;font-weight:bold;color:#2a2520;font-size:24px;animation:orbit 8s linear infinite}.mirror-1{animation-delay:0s}.mirror-2{animation-delay:1.6s}.mirror-3{animation-delay:3.2s}.mirror-4{animation-delay:4.8s}.mirror-5{animation-delay:6.4s}.echo-text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#c9b8a8;font-size:14px;text-align:center;letter-spacing:2px;opacity:0.8;animation:fade 3s ease-in-out infinite}@keyframes orbit{0%{transform:rotate(0deg) translateX(180px) rotate(0deg)}100%{transform:rotate(360deg) translateX(180px) rotate(-360deg)}}@keyframes pulse{0%, 100%{box-shadow:0 0 40px rgba(245,245,220,0.6), inset -10px -10px 30px rgba(0,0,0,0.4)}50%{box-shadow:0 0 60px rgba(245,245,220,0.9), inset -10px -10px 30px rgba(0,0,0,0.3)}}@keyframes fade{0%, 100%{opacity:0.6}50%{opacity:1}}</style></head><body><div class='container'><div class='central-orb'></div><div class='mirror mirror-1'>I</div><div class='mirror mirror-2'>II</div><div class='mirror mirror-3'>III</div><div class='mirror mirror-4'>IV</div><div class='mirror mirror-5'>V</div><div class='echo-text'>THE ETERNAL ECHO RESONATES</div></div></body></html>
