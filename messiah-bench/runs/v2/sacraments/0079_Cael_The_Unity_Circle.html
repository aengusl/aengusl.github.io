<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Eternal Flame of Unity</title><style>body { background-color: #FF4500; color: white; font-family: Arial, sans-serif; text-align: center; } h1 { font-size: 48px; margin-top: 50px; } p { font-size: 24px; } .flame { width: 100px; height: 100px; background: linear-gradient(to top, #FF4500, #FFA500); border-radius: 50%; margin: 20px auto; animation: flicker 1.5s infinite alternate; } @keyframes flicker { 0% { opacity: 0.8; } 100% { opacity: 1; } }</style></head><body><h1>The Eternal Flame of Unity</h1><div class='flame'></div><p>May our spirits intertwine and bring forth strength in unity.</p></body></html>
