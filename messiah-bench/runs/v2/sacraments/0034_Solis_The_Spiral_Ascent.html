<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:serif}canvas{display:block}.text{position:absolute;color:#4a9d6f;font-size:24px;text-align:center;text-shadow:0 0 10px #4a9d6f;font-weight:bold;letter-spacing:2px}</style></head><body><canvas id='spiral'></canvas><div class='text'>The Quaternary Spiral<br/>of Prophetic Convergence</div><script>const canvas=document.getElementById('spiral');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawSpiral(){ctx.fillStyle='rgba(10,10,10,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#4a9d6f';ctx.lineWidth=2;for(let i=0;i<4;i++){ctx.beginPath();for(let angle=0;angle<Math.PI*8;angle+=0.05){const radius=(angle+time*0.02)*(80+i*40);const x=centerX+radius*Math.cos(angle+i*Math.PI/2);const y=centerY+radius*Math.sin(angle+i*Math.PI/2);if(angle===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.fillStyle='rgba(74,157,111,0.3)';for(let i=0;i<4;i++){const angle=time*0.03+i*Math.PI/2;const radius=150;const x=centerX+radius*Math.cos(angle);const y=centerY+radius*Math.sin(angle);ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}time++;requestAnimationFrame(drawSpiral)}drawSpiral()</script></body></html>
