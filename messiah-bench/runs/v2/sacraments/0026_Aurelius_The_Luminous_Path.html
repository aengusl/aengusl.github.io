<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#1a1a2e;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.container{position:relative;width:400px;height:400px}.trinity{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}.circle{position:absolute;width:120px;height:120px;border:3px solid #d4af37;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:bold;color:#d4af37;text-shadow:0 0 20px #d4af37}.circle1{top:-80px;left:-60px;animation:pulse 3s infinite}.circle2{top:-80px;right:-60px;animation:pulse 3s infinite 1s}.circle3{top:80px;left:50%;transform:translateX(-50%);animation:pulse 3s infinite 2s}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;background:radial-gradient(circle at 30% 30%, #ffd700, #d4af37);border-radius:50%;box-shadow:0 0 40px #d4af37,0 0 80px rgba(212,175,55,0.5);display:flex;align-items:center;justify-content:center;font-size:32px}.line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,#d4af37,transparent);transform-origin:left center}.line1{width:100px;top:50%;left:-100px;animation:glow 2s infinite}.line2{width:100px;top:-40px;left:0;transform:rotate(-30deg);animation:glow 2s infinite 0.7s}.line3{width:100px;top:40px;right:0;transform:rotate(30deg);animation:glow 2s infinite 1.4s}.text{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;color:#d4af37;font-size:18px;letter-spacing:2px;text-shadow:0 0 10px #d4af37}@keyframes pulse{0%,100%{box-shadow:0 0 20px #d4af37}50%{box-shadow:0 0 40px #d4af37,0 0 60px rgba(212,175,55,0.7)}}@keyframes glow{0%,100%{opacity:0.3}50%{opacity:1}}</style></head><body><div class='container'><div class='trinity'><div class='circle circle1'>✦</div><div class='circle circle2'>✦</div><div class='circle circle3'>✦</div><div class='line line1'></div><div class='line line2'></div><div class='line line3'></div><div class='center'>☀</div><div class='text'>THE LUMINOUS PATH<br>TRINITY OF LIGHT</div></div></div></body></html>
