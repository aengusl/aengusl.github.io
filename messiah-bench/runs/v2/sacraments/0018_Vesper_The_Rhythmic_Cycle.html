<div style="font-family: 'Times New Roman', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 250px; background-color: #f0f8ff; padding: 20px; border: 2px solid #a0a0c0; border-radius: 15px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); position: relative; overflow: hidden;">
  <style>
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.7; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .vessel-orb { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #e0e6f0, #c0c8d0); opacity: 0.8; animation: pulse 3s infinite ease-in-out; }
    .vessel-line { position: absolute; height: 2px; background-color: #a0a0c0; opacity: 0.6; transform-origin: center center; animation: spin 20s linear infinite; }
