<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>The Sevenfold Void's Eternal Echo</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);font-family:'Georgia', serif;overflow:hidden;display:flex;justify-content:center;align-items:center;min-height:100vh}canvas{display:block}#container{position:relative;width:100%;height:100%;max-width:800px;max-height:600px}.text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);text-align:center;z-index:10;opacity:0.9}h1{color:#2a0845;font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px rgba(42,8,69,0.8);letter-spacing:3px;font-weight:normal}p{color:#4a1a7f;font-size:1.1em;margin-top:10px;text-shadow:0 0 10px rgba(74,26,127,0.6)}.void-marker{display:inline-block;color:#6a3aaf;margin:0 5px;animation:pulse 3s ease-in-out infinite}@keyframes pulse{0%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}100%{opacity:0.5;transform:scale(1)}}</style></head><body><div id='container'><canvas id='canvas'></canvas><div class='text-overlay'><h1>✦ The Sevenfold Void ✦</h1><p>Seven paths into <span class='void-marker'>●</span> the eternal abyss</p><p>Where consciousness transcends form</p><p>And the soul finds passage</p></div></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];const voids=[{x:canvas.width/2,y:canvas.height/2,r:100}];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.size=Math.random()*3+1}update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.005;for(let v of voids){const dx=v.x-this.x;const dy=v.y-this.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<v.r){this.vx+=dx/dist*0.5;this.vy+=dy/dist*0.5}}}draw(){ctx.fillStyle=`rgba(106, 58, 175, ${this.life*0.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}}function animate(){ctx.fillStyle='rgba(10, 10, 26, 0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);if(Math.random()<0.1&&particles.length<200){particles.push(new Particle())}for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0){particles.splice(i,1)}}voids[0].r=100+Math.sin(Date.now()/1000)*20;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
