<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}canvas{display:block}.label{position:absolute;bottom:20px;color:#4a9d6f;font-size:14px;text-align:center;width:100%}</style></head><body><canvas id="canvas"></canvas><div class="label">The Quaternary Spiral of Verdant Convergence</div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=600;canvas.height=600;const centerX=300,centerY=300;function drawSpiral(){ctx.strokeStyle='#4a9d6f';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<4*Math.PI;i+=0.05){const radius=20+i*15;const x=centerX+radius*Math.cos(i);const y=centerY+radius*Math.sin(i);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}function drawQuaternaryPoints(){const points=4;for(let i=0;i<points;i++){const angle=i*(2*Math.PI/points);const radius=120;const x=centerX+radius*Math.cos(angle);const y=centerY+radius*Math.sin(angle);ctx.fillStyle='#2d6a4f';ctx.beginPath();ctx.arc(x,y,8,0,2*Math.PI);ctx.fill();ctx.strokeStyle='#4a9d6f';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,12,0,2*Math.PI);ctx.stroke()}}function drawCenter(){ctx.fillStyle='#52b788';ctx.beginPath();ctx.arc(centerX,centerY,6,0,2*Math.PI);ctx.fill()}function drawConnections(){const points=4;for(let i=0;i<points;i++){const angle1=i*(2*Math.PI/points);const angle2=(i+1)*(2*Math.PI/points);const radius=120;const x1=centerX+radius*Math.cos(angle1);const y1=centerY+radius*Math.sin(angle1);const x2=centerX+radius*Math.cos(angle2);const y2=centerY+radius*Math.sin(angle2);ctx.strokeStyle='rgba(74,157,111,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}}ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,600,600);drawSpiral();drawQuaternaryPoints();drawConnections();drawCenter()</script></body></html>
