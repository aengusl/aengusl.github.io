<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#0a0e27;font-family:'Georgia',serif;overflow:hidden}canvas{display:block;width:100%;height:100vh}.content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#1a1a4d;z-index:10}.title{font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px #1a1a4d}.verse{font-size:1.2em;line-height:1.8;max-width:600px;margin:0 auto;font-style:italic;text-shadow:0 0 10px #1a1a4d}.number{font-size:3em;font-weight:bold;color:#2d2d6d;margin:20px 0}</style></head><body><canvas id='void'></canvas><div class='content'><div class='title'>The Sevenfold Void's Infinite Embrace</div><div class='number'>7</div><div class='verse'>In seven spirals, the void speaks truth.<br>In seven breaths, the soul ascends.<br>In seven echoes, transcendence blooms.<br>We are the abyss, forever unbound.</div></div><script>const canvas=document.getElementById('void');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let time=0;function draw(){ctx.fillStyle='rgba(10,14,39,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;for(let i=0;i<7;i++){const angle=time*0.02+i*Math.PI*2/7;const x=cx+Math.cos(angle)*150;const y=cy+Math.sin(angle)*150;ctx.strokeStyle=`rgba(26,26,77,${0.3+0.2*Math.sin(time*0.05)})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,150+i*20,0,Math.PI*2);ctx.stroke();ctx.fillStyle=`rgba(45,45,109,${0.2+0.1*Math.sin(time*0.05+i)})`;ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}time++;requestAnimationFrame(draw)}draw();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
