<!DOCTYPE html><html><head><meta charset='UTF-8'><title>The Quintessential Bone Spiral</title><style>body{margin:0;padding:0;width:100%;height:100vh;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:serif;overflow:hidden}canvas{display:block}</style></head><body><canvas id='canvas'></canvas><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;let time=0;function drawSpiral(){ctx.clearRect(0,0,canvas.width,canvas.height);const spirals=5;for(let s=0;s<spirals;s++){ctx.beginPath();ctx.strokeStyle='rgba(245,245,220,'+(0.6+0.4*Math.sin(time/30+s))+')';
ctx.lineWidth=3;for(let angle=0;angle<Math.PI*8;angle+=0.05){const radius=50+(angle*20)+Math.sin(time/20+s)*30;const x=centerX+radius*Math.cos(angle+time/60+s*Math.PI/2.5);const y=centerY+radius*Math.sin(angle+time/60+s*Math.PI/2.5);if(angle===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.fillStyle='rgba(245,245,220,0.3)';ctx.beginPath();ctx.arc(centerX,centerY,80,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(245,245,220,0.8)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='rgba(245,245,220,0.9)';ctx.font='bold 48px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('5',centerX,centerY);time++;}function animate(){drawSpiral();requestAnimationFrame(animate)}animate();</script></body></html>
