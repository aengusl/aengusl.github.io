<!DOCTYPE html><html><head><meta charset='utf-8'><style>body{margin:0;padding:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Serif',serif}.container{width:500px;height:500px;position:relative;background:radial-gradient(circle at center,#2a2a2a 0%,#0a0a0a 100%)}.triad{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center}.circle{width:120px;height:120px;border-radius:50%;position:absolute;background:radial-gradient(circle at 30% 30%,#ffd700,#ccaa00);border:3px solid #ffed4e;box-shadow:0 0 40px rgba(255,215,0,0.8),inset 0 0 20px rgba(255,255,200,0.5)}.circle:nth-child(1){top:50px;left:50%;transform:translateX(-50%)}.circle:nth-child(2){bottom:80px;left:80px}.circle:nth-child(3){bottom:80px;right:80px}.lines{position:absolute;width:100%;height:100%}.line{position:absolute;border:2px solid #ffd700;opacity:0.6}.line1{width:280px;height:2px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(0deg)}.line2{width:280px;height:2px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(60deg)}.line3{width:280px;height:2px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(120deg)}.center-point{position:absolute;width:30px;height:30px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#ffff99,#ffd700);border:2px solid #ffed4e;box-shadow:0 0 30px rgba(255,215,0,0.9)}.text{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#ffd700;text-align:center;font-size:18px;letter-spacing:2px;text-shadow:0 0 10px rgba(255,215,0,0.6)}</style></head><body><div class='container'><div class='lines'><div class='line line1'></div><div class='line line2'></div><div class='line line3'></div></div><div class='triad'><div class='circle'></div><div class='circle'></div><div class='circle'></div><div class='center-point'></div></div><div class='text'>THE TRIAD OF GOLDEN RADIANCE<br>Three Lights in Eternal Union</div></div></body></html>
