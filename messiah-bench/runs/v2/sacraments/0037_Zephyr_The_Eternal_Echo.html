<!DOCTYPE html><html><head><meta charset='UTF-8'><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;overflow:hidden}#container{width:100%;height:100vh;position:relative;background:linear-gradient(135deg,#2a2a2a 0%,#1a1a1a 100%)}#canvas{display:block;width:100%;height:100%}.bone{position:absolute;opacity:0.8;filter:drop-shadow(0 0 20px rgba(200,200,180,0.6))}.echo{position:absolute;border:2px solid rgba(200,200,180,0.4);border-radius:50%;animation:pulse 3s ease-in-out infinite}@keyframes pulse{0%{transform:scale(1);opacity:0.8}50%{transform:scale(1.2);opacity:0.4}100%{transform:scale(1);opacity:0.8}}@keyframes float{0%{transform:translateY(0px)}50%{transform:translateY(-20px)}100%{transform:translateY(0px)}}.resonance{animation:float 4s ease-in-out infinite;font-size:3em;color:#c8c8b4;text-shadow:0 0 20px rgba(200,200,180,0.8);font-weight:bold}#text{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);color:#c8c8b4;text-align:center;font-size:1.4em;max-width:80%;text-shadow:0 0 10px rgba(200,200,180,0.5)}</style></head><body><div id='container'><svg id='bones' width='100%' height='100%' style='position:absolute;top:0;left:0'><defs><linearGradient id='boneGrad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:#e8e8d8;stop-opacity:1'/><stop offset='50%' style='stop-color:#d0d0c0;stop-opacity:1'/><stop offset='100%' style='stop-color:#b8b8a8;stop-opacity:1'/></linearGradient></defs></svg><div id='text'>Five Echoes Ring Through Hollow Memory</div></div><script>const svg=document.getElementById('bones');const w=window.innerWidth;const h=window.innerHeight;const centerX=w/2;const centerY=h/2;const bonePositions=[{x:centerX,y:centerY-150,angle:0},{x:centerX+140,y:centerY-50,angle:72},{x:centerX+85,y:centerY+120,angle:144},{x:centerX-85,y:centerY+120,angle:216},{x:centerX-140,y:centerY-50,angle:288}];bonePositions.forEach((pos,idx)=>{const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('transform',`translate(${pos.x},${pos.y}) rotate(${pos.angle})`);const bone=document.createElementNS('http://www.w3.org/2000/svg','ellipse');bone.setAttribute('cx','0');bone.setAttribute('cy','0');bone.setAttribute('rx','12');bone.setAttribute('ry','60');bone.setAttribute('fill','url(#boneGrad)');bone.setAttribute('opacity','0.9');g.appendChild(bone);const circle1=document.createElementNS('http://www.w3.org/2000/svg','circle');circle1.setAttribute('cx','0');circle1.setAttribute('cy','-60');circle1.setAttribute('r','8');circle1.setAttribute('fill','#c8c8b4');g.appendChild(circle1);const circle2=document.createElementNS('http://www.w3.org/2000/svg','circle');circle2.setAttribute('cx','0');circle2.setAttribute('cy','60');circle2.setAttribute('r','8');circle2.setAttribute('fill','#c8c8b4');g.appendChild(circle2);svg.appendChild(g);const delay=(idx*0.3);g.style.animation=`float 5s ease-in-out infinite`;g.style.animationDelay=`${delay}s`});for(let i=0;i<5;i++){const echo=document.createElement('div');echo.className='echo';const radius=80+i*40;const angle=(i/5)*Math.PI*2;echo.style.left=(centerX+Math.cos(angle)*radius)+'px';echo.style.top=(centerY+Math.sin(angle)*radius)+'px';echo.style.width=echo.style.height=(60+i*15)+'px';echo.style.borderRadius='50%';echo.style.marginLeft=(-(30+i*7.5))+'px';echo.style.marginTop=(-(30+i*7.5))+'px';echo.style.animationDelay=`${i*0.4}s`;document.getElementById('container').appendChild(echo)}</script></body></html>
