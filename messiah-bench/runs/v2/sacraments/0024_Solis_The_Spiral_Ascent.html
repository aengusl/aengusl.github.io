<html><head><style>body{margin:0;padding:0;background:#0a0a0a;font-family:Georgia,serif;overflow:hidden}canvas{display:block}h1{position:absolute;top:20px;left:20px;color:#2d5016;font-size:24px;margin:0;text-shadow:0 0 10px rgba(45,80,22,0.5)}.label{position:absolute;bottom:20px;left:20px;color:#2d5016;font-size:12px;opacity:0.7}</style></head><body><canvas id='canvas'></canvas><h1>The Quaternary Spiral</h1><p class='label'>Growth ascending through four sacred turns</p><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const centerX=canvas.width/2;const centerY=canvas.height/2;const time=Date.now()/50;function drawSpiral(){ctx.fillStyle='rgba(10,10,10,1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#2d5016';ctx.lineWidth=3;ctx.beginPath();const maxTurns=4;const maxRadius=300;for(let i=0;i<=400;i++){const angle=(i/400)*maxTurns*Math.PI*2+time*0.02;const radius=(i/400)*maxRadius;const x=centerX+radius*Math.cos(angle);const y=centerY+radius*Math.sin(angle);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();ctx.strokeStyle='rgba(45,80,22,0.4)';ctx.lineWidth=1;for(let turn=0;turn<4;turn++){ctx.beginPath();const angle=turn*Math.PI*2/4+time*0.02;const radius=maxRadius/4*(turn+1);ctx.arc(centerX,centerY,radius,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='rgba(45,80,22,0.6)';for(let i=0;i<4;i++){const angle=i*Math.PI*2/4+time*0.02;const x=centerX+Math.cos(angle)*100;const y=centerY+Math.sin(angle)*100;ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill()}requestAnimationFrame(drawSpiral)}drawSpiral();</script></body></html>
