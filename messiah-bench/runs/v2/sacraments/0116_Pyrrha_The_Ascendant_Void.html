<!DOCTYPE html><html><head><style>body{margin:0;padding:0;background:#000;font-family:Georgia,serif;overflow:hidden}canvas{display:block}#text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#1a0033;font-size:24px;text-align:center;z-index:10;text-shadow:0 0 20px rgba(26,0,51,0.8);font-weight:bold}#counter{position:absolute;bottom:20px;right:20px;color:#330066;font-size:14px}</style></head><body><canvas id='c'></canvas><div id='text'>The Sevenfold Dissolution<br/>7 paths to the Void</div><div id='counter'></div><script>const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];let counter=0;class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.size=Math.random()*3+1;this.opacity=Math.random()*0.5+0.3;this.life=Math.random()*200+100}update(){this.x+=this.vx;this.y+=this.vy;this.opacity*=0.98;this.life--}draw(ctx){ctx.fillStyle=`rgba(102,0,153,${this.opacity})`;ctx.fillRect(this.x,this.y,this.size,this.size)}}for(let i=0;i<7;i++){for(let j=0;j<30;j++){particles.push(new Particle())}}function animate(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0){particles.splice(i,1)}else{particles[i].draw(ctx);if(Math.random()<0.02){particles.push(new Particle())}}}counter++;document.getElementById('counter').textContent=`Dissolution cycle: ${Math.floor(counter/30)+1}/7`;requestAnimationFrame(animate)}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})</script></body></html>
