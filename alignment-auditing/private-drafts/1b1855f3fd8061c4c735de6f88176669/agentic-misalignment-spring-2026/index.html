<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow,noarchive,noimageindex">
    <title>Private Draft</title>
    <style>
      :root {
        --bg: #f7f7f2;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #5f6b76;
        --line: #d9dfd4;
        --accent: #2f675c;
        --accent-dark: #254f47;
        --error: #9b2f32;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(100%, 420px);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 24px 60px rgba(31, 41, 51, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.7rem;
        font-weight: 650;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input {
        width: 100%;
        min-height: 46px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
      }

      input:focus {
        border-color: var(--accent);
        outline: 3px solid rgba(47, 103, 92, 0.18);
      }

      button {
        width: 100%;
        min-height: 46px;
        margin-top: 14px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      #status {
        min-height: 1.5em;
        margin: 12px 0 0;
        color: var(--error);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="gate-title">
      <h1 id="gate-title">Private draft</h1>
      <p>Enter the review password to decrypt this page in your browser.</p>
      <form id="gate-form">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required autofocus>
        <button id="unlock" type="submit">Unlock draft</button>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script>
      const form = document.getElementById("gate-form");
      const passwordInput = document.getElementById("password");
      const unlockButton = document.getElementById("unlock");
      const status = document.getElementById("status");
      const textEncoder = new TextEncoder();
      const textDecoder = new TextDecoder();

      function base64ToBytes(value) {
        const binary = atob(value);
        const bytes = new Uint8Array(binary.length);

        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }

        return bytes;
      }

      async function deriveKey(password, salt, iterations) {
        const material = await crypto.subtle.importKey(
          "raw",
          textEncoder.encode(password),
          "PBKDF2",
          false,
          ["deriveKey"]
        );

        return crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt,
            iterations,
            hash: "SHA-256"
          },
          material,
          {
            name: "AES-GCM",
            length: 256
          },
          false,
          ["decrypt"]
        );
      }

      async function decryptDraft(password) {
        const response = await fetch("payload.json", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Could not load encrypted payload.");
        }

        const payload = await response.json();

        if (payload.version !== 1 || payload.cipher !== "AES-GCM" || payload.kdf !== "PBKDF2-SHA-256") {
          throw new Error("Unsupported encrypted payload.");
        }

        const key = await deriveKey(password, base64ToBytes(payload.salt), payload.iterations);
        const plaintext = await crypto.subtle.decrypt(
          {
            name: "AES-GCM",
            iv: base64ToBytes(payload.iv)
          },
          key,
          base64ToBytes(payload.ciphertext)
        );

        return textDecoder.decode(plaintext);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        status.textContent = "";

        if (!window.crypto || !crypto.subtle) {
          status.textContent = "This browser needs WebCrypto support over HTTPS to unlock the draft.";
          return;
        }

        unlockButton.disabled = true;
        unlockButton.textContent = "Unlocking...";

        try {
          const html = await decryptDraft(passwordInput.value);
          document.open();
          document.write(html);
          document.close();
        } catch (error) {
          status.textContent = "Could not unlock. Check the password and try again.";
          passwordInput.select();
          unlockButton.disabled = false;
          unlockButton.textContent = "Unlock draft";
        }
      });
    </script>
  </body>
</html>
